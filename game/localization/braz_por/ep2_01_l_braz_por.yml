 japan_events.1.t: "Cartas para Todos"
 japan_events.1.d: "Conforme os pensadores modernistas ganham influência no país [ROOT.GetCountry.GetName], as limitações do antigo sistema de mensageiros ficam cada vez mais aparentes. Seja por meio do fim da ordem feudal ou da disseminação da instrução entre a população, agora há condições para um serviço postal centralizado, capaz de atender a um estado moderno."
 japan_events.1.f: "Mensageiros marcados com o selo do governo corriam pelas ruas com suas bolsas carregando uma quantidade incomum de cartas. Na capital, os oficiais debruçavam-se sobre mapas, ajustando rotas e contando selos durante toda a noite. Mercadores reclamavam da interrupção das antigas redes de correio, enquanto crianças curiosas depositavam suas primeiras cartas nas novas caixas postais. O país, outrora dividido pelo costume, começava a falar com uma só voz."
 japan_events.1.a: "Financiar completamente a implementação nacional."
 japan_events.1.b: "Focar nos principais centros urbanos."
 japan_events.1.c: "As áreas rurais são prioridade."
 japan_events.1.e: "Confiar a reforma a [SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')]."
 japan_events.1.g: "Preservar o antigo sistema de mensageiros."
