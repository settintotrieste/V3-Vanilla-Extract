 japan_events.3.t: "Um Ano Recontado"
 japan_events.3.d: "A adoção do novo calendário encurtou silenciosamente o ano. Com menos dias contabilizados, os salários, aluguéis e impostos não atendem mais às expectativas criadas sob o antigo sistema. Trabalhadores descobrem que o pagamento diminuiu, e oficiais se esforçam para explicar a discrepância."
 japan_events.3.f: "Trabalhadores contavam e recontavam as moedas, balançando a cabeça em desaprovação. Suas mãos foram endurecidas pelo trabalho, mas viam pouca recompensa. O ano ficou mais curto, e cada dia perdido deixava uma marca nos braços cansados e nos bolsos vazios."
 japan_events.3.a: "O ano está mais curto. É isso."
 japan_events.3.b: "Redistribuir o fardo entre a população."
 japan_events.3.c: "Absorver a perda em prol da estabilidade."
