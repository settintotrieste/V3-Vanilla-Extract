 je_ryukyu_rivalry: "O Domínio Oculto"
 je_ryukyu_rivalry_reason: "Desde a #b invasão de 1609#! pelas forças do #b Domínio de Satsuma#!, o Reino de [SCOPE.sCountry('ryukyu_scope').GetName] existe como um domínio do país [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')] apenas na prática. Apesar de sua subjugação por Satsuma, a corte de Shuri continuou recebendo poder do país [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')] e enviando missões de tributação para Pequim para manter a aparência de independência.\n\nEsse acordo se sustentou por gerações, mas o equilíbrio do poder no Leste Asiático mudou com a presença crescente das potências ocidentais e a abertura do Japão. Agora, os dois lados devem explicar a relação com Ryukyu, causando uma disputa aberta pelas ilhas ao sul.\n$TOOLTIP_DELIMITER$\n@warning! #r Fracasso:#! \n A Afirmação do país [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] atinge #variable 100%#!\n [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')] ou [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')] estão [Concept('concept_subject', 'Subjugados')] ou foram #b Anexados#!\n O país [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] está [Concept('concept_subject', 'Subjugado')] ou foi #b Anexado#! por um país não envolvido\n\n@information! Para Persuadir:\n Ter um [concept_article] de #v Transferência de Dinheiro#! (#g @money!0,1 - 2 mil#!) com o país [SCOPE.sCountry('ryukyu_scope').GetName]\n Ter [concept_relations] #v Amigáveis#! ou #v Amistosas#! com o país [SCOPE.sCountry('ryukyu_scope').GetName]\n Ter a maior [concept_naval_power_projection]\n Fazer o país [SCOPE.sCountry('ryukyu_scope').GetName] dever uma [concept_obligation] \n Usar as ações de [concept_journal_entry]"
 #je_ryukyu_rivalry_goal:1 "You are asserting more influence over [SCOPE.sCountry('ryukyu_scope').GetName] than your rival."
 je_ryukyu_rivalry_victory_japan: "Para conquistar uma vitória #b japonesa#!:\n"
 je_ryukyu_rivalry_victory_china: "Para conquistar uma vitória #b chinesa#!:\n"
 je_ryukyu_rivalry_victory_ryukyu: "Para conquistar uma vitória #b ryukyuana#!:\n"
 ryukyu_rivalry_sway_tt: "Persuadir Ryukyu totalmente para o seu lado quebra qualquer controle que os oponentes possam ter sobre a região, reativando a [Concept('concept_subject', 'Subjugação')].\n\nPara Persuadir:\n Ter um [concept_article] de #v Transferência de Dinheiro#! (#g @money!0,1 - 2 mil#!) com Ryukyu\n Ter [concept_relations] #v Amigáveis#! ou #v Amistosas#! com Ryukyu\n Ter a maior [concept_naval_power_projection]\n Fazer Ryukyu dever uma [concept_obligation]\n Usar as ações de [concept_journal_entry]"
 ryukyu_rivalry_assertiveness_tt: "Ryukyu afirmará sua neutralidade quando a barra atingir #v 100%#!. Uma vez afirmada, ele não poderá mais ser transformado em um [concept_subject] por meio de [concept_diplomatic_action] durante #v 50#! anos.\n\nA barra de Afirmação aumentará em #g 0,5#! a cada mês se a barra de Persuasão continuar entre #v -20#! e #v +20#!.\n\nRyukyu pode afirmar neutralidade ao jogar o Japão contra a China e usar as ações disponíveis que afetam a Persuasão. \n\nExemplos:\n Ter um [concept_article] de #v Transferência de Dinheiro#! (#g @money!0,1 - 2 mil#!) com os dois lados ou nenhum deles\n Ter [concept_relations] #v Amigáveis#! ou #v Amistosas#! com os dois lados ou nenhum deles\n Dever uma [concept_obligation] aos dois lados ou a nenhum deles\n Cancelar ou assinar os tratados citados quando um dos lados tiver vantagem ou desvantagem"
 ryukyu_rivalry_completion_japan_victory_tt: "O país [SCOPE.sCountry('ryukyu_scope').GetName] se [Concept('concept_unification', 'unificará')] com o país [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')]"
 ryukyu_rivalry_completion_japan_victory_subject_tt: "O país [SCOPE.sCountry('ryukyu_scope').GetName] se torna um [concept_subject] do país [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')]"
 ryukyu_influence_victory_china_tt: "O país [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')] consegue chegar à #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b Persuasão#!#! máxima em relação ao país [SCOPE.sCountry('ryukyu_scope').GetName]"
