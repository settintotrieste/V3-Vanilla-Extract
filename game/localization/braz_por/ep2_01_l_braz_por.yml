 japan_events.2.t: "Os Calendários Desiguais"
 japan_events.2.d: "O calendário lunissolar centenário do Japão está cada vez mais dessincronizado com o mundo ocidental. Comerciantes reclamaram da dificuldade de coordenação com parceiros estrangeiros, e a população relatou confusão em festivais, aluguéis e impostos em desalinho."
 japan_events.2.f: "Funcionários sentavam-se curvados sobre seus livros, copiando cada linha cuidadosamente. Suas pilhas de papel aumentavam a cada repetição, e os olhos deles doíam ao acompanhar meses que não existiam mais. O antigo calendário estava desaparecendo silenciosamente."
 japan_events.2.f_telegraph: "Estafetas apressavam-se pelas ruas, entregando mensagem após mensagem. As pessoas paravam para ler cada aviso, confusas enquanto as datas mudavam mais rápido do que podiam acompanhar. As notícias viajavam instantaneamente, e o antigo calendário sumiu quase da noite para o dia."
 japan_events.2.a: "Prosseguir imediatamente com a reforma do calendário."
 japan_events.2.b: "Usar a tecnologia [GetTechnology('electric_telegraph').GetName] para acelerar as mudanças."
 japan_events.2.c: "Preservar o antigo sistema por enquanto."
