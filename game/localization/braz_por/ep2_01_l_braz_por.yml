 japan_events.5.t: "A Questão do Kanbun"
 japan_events.5.d: "Decretos, regulamentos e registros usam há muito tempo uma linguagem clássica que só algumas pessoas instruídas entendem. Reformistas alegaram que a administração conduzida em japonês vernáculo melhoraria a clareza e a eficiência, enquanto outros insistiram que a própria tradição deu autoridade à palavra escrita."
 japan_events.5.f: "Burocratas trabalhavam até tarde da noite, reescrevendo diretrizes incansavelmente com determinação silenciosa. Um deles parou para esfregar os olhos e então prosseguiu, cuidadoso para não perder uma única marca. Cada risco da pena parecia uma pequena batalha contra a confusão e a desordem."
 japan_events.5.a: "Promover o japonês vernáculo na administração oficial."
 japan_events.5.b: "Permitir uma reforma limitada nas correspondências internas."
 japan_events.5.c: "Manter o Kanbun clássico em todos os documentos estatais."
