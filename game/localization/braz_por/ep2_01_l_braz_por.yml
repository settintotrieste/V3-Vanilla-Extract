 japan_events.4.t: "A Ocidentalização dos Nomes"
 japan_events.4.d: "Conforme o país [ROOT.GetCountry.GetName] conduz a diplomacia e o comércio com potências estrangeiras, surgem questões sobre como os nomes do povo [GetCulture('japanese').GetName] devem ser redigidos em tratados, correspondências e documentos oficiais. Cada vez mais, os representantes ocidentais esperam que os nomes sigam as próprias convenções, com o nome do indivíduo antecedendo o nome da família."
 japan_events.4.f: "Funcionários se debruçavam sobre as mesas, redigindo cartas para oficiais estrangeiros. Eles sussurravam entre si, questionando se a clareza no exterior justificava uma mudança em uma tradição de longa data. A mão segurando um selo hesitou sobre um papel, pairando por um momento antes que a tinta fosse fixada."
 japan_events.4.a: "Adotar as convenções ocidentais em correspondências estrangeiras."
 japan_events.4.b: "Manter a ordem tradicional dos nomes."
 japan_events.4.c: "Esta é uma nova era. Adote a convenção ocidental para todos os casos."
