l_braz_por:
 edo_system: "Sistema de Status de Edo"
 # Edo Social Classes
 strata_samurai_high: "Samurais Superiores" # High-Class Samurai
 strata_samurai_high_desc: "Elites de guerreiros de alta patente, como os Daimyō e retentores experientes. Os escalões superiores da classe de samurais monopolizaram a maioria dos gabinetes e desfrutam de muito prestígio hereditário."
 strata_samurai_low: "Samurais Inferiores" # Low-Class Samurai
 strata_samurai_low_desc: "Guerreiros e retentores de baixa patente, como gokenin e ashigaru, que atuam como a força administrativa e militar abaixo da elite de samurais."
 strata_religious: "Jisha" # Priests
 strata_religious_desc: "Clero de santuários organizados em templos e regulamentados pelas autoridades. Apesar de influentes na vida, no ensino e nos rituais religiosos locais, eles são alheios às classes de status legalmente definidas."
 strata_commoners_peasants: "Hyakushō" # Peasants
 strata_commoners_peasants_desc: "Uma subdivisão dos plebeus, os camponeses compõem a classe social mais numerosa do Japão. Os camponeses são registrados em vilarejos e estão sujeitos às obrigações e tributação locais. Eles são definidos pelo registro, não pela ocupação, e incluem artesãos e comerciantes rurais, além de fazendeiros."
 strata_commoners_townspeople: "Chōnin" # Townspeople
 strata_commoners_townspeople_desc: "Uma subdivisão dos plebeus, o povo da cidade corresponde aos principais habitantes dos centros urbanos do Japão. O povo da cidade é registrado em instituições urbanas e está tradicionalmente associado às artes e ao comércio. Mesmo podendo acumular muita riqueza e influência, a mobilidade social é prejudicada pelo fato de não serem guerreiros."
 strata_outcastes: "Eta-Hinin" # Outcastes Eta, Hinin, etc.
 strata_outcastes_desc: "Os Eta e os Hinin ocupam os ranques mais baixos da sociedade japonesa. Eles sofrem muita discriminação e são associados a ocupações \"sujas\", como coveiros, pedintes e artistas de rua."
 # Edo Social System Laws
 lawgroup_edo_social_system: "Sistema de Status de Edo"
 lawgroup_edo_social_system_desc: "Aplicação do $lawgroup_edo_social_system$"
 law_strict_edo_system: "Ordem de Status Rígida"
 law_strict_edo_system_desc: "Tudo, desde oportunidades legais e profissionais até o número de portões residenciais que o status pode conceder, é estritamente regulamentado e forçado pelo Estado. Qualquer brecha desse protocolo é fortemente sancionada, então o povo da cidade e os camponeses não conseguem acessar formalmente o ranque dos samurais."
 law_intermediate_edo_system: "Ordem de Status Flexível"
 law_intermediate_edo_system_desc: "Leis suntuárias e legais foram flexibilizadas, então os plebeus ganharam mais influência e status na sociedade. Pessoas da cidade ou camponeses ricos podem comprar o status de gokenin, um samurai de baixa patente."
 law_lax_edo_system: "Ordem de Status Permissiva"
 law_lax_edo_system_desc: "Cargos e funções antes exclusivos aos samurais se abriram para plebeus, e a imposição das últimas limitações profissionais e suntuárias ocorre de maneira seletiva, geralmente nos casos de ofensas mais graves."
 # Tenpo Crisis
 je_tenpo_crisis: "Crise de Tenpō"
 je_tenpo_crisis_reason: "Declarada em 1830, Tenpō, ou Era da \"Proteção Divina\", fez jus ao nome promissor no início. No entanto, as condições climáticas precárias em [GetGeographicRegion('geographic_region_honshu').GetName] logo resultaram em elevação do preço do arroz e fome no país, enquanto a riqueza e a influência crescentes do grupo [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] ameaçam a ordem estabelecida pelo grupo [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName].\n\nEnquanto isso, no horizonte, [Concept('concept_great_power', '$concept_great_powers$')] ocidentais ficam mais ousadas, com navios mercantes e canhoneiras cada vez mais perto da nossa costa.\n\nBuscando resolver esses problemas, reformistas notáveis compartilharam suas visões com o Bakufu.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b Pauta Reformista#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] [ROOT.GetCountry.GetNameNoFlag] promulgou a lei de [GetLawType('law_lax_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] [ROOT.GetCountry.GetNameNoFlag] #b não#! promulgou a lei de [GetLawType('law_hereditary_bureaucrats').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] [ROOT.GetCountry.GetNameNoFlag] tem #v 3#! [Concept('concept_state', '$concept_states$')] com [GetBuildingType('building_urban_center').GetName] de nível #v 3#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')] A [concept_clout] do [concept_interest_group] [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] é #v 10#! ou mais\n#tooltippable;tooltip:tenpo_hardliner_tt #b Pauta Linha-Dura#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] [ROOT.GetCountry.GetNameNoFlag] promulgou a lei de [GetLawType('law_strict_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] [ROOT.GetCountry.GetNameNoFlag] promulgou a lei de [GetLawType('law_shinsengumi').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] [ROOT.GetCountry.GetNameNoFlag] tem #v 40#! níveis da construção [GetBuildingType('building_rice_farm').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')] O [concept_interest_group] [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] é [concept_marginalized]\n#tooltippable;tooltip:tenpo_shared_tt #b Pauta Compartilhada#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] #b Nenhum#! [concept_state] que é [concept_homeland] [GetCulture('japanese').GetCustom('getSingularDemonymFemale')] está sofrendo de [concept_famine]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [ROOT.GetCountry.GetNameNoFlag] tem um [Concept('concept_gdp', '$concept_gdp_short$')] de @gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! ou mais\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] A [concept_power_projection] do exército [ROOT.GetCountry.GetAdjectiveNoFlag] é maior que #v 500#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] Nós temos #v 10#! níveis ou mais de [GetBuildingType('building_naval_fortification').GetName] em nossos [Concept('concept_state', '$concept_states$')]"
 je_tenpo_crisis_complete_header: "Concluirá em uma reforma Tenpō de sucesso se:\n"
 je_tenpo_crisis_failure_header: "Concluirá em uma reforma Tenpō fracassada se:\n"
 je_tenpo_crisis_success_tt: "Nós concluímos pelo menos #v 8#! objetivos da pauta"
 je_tenpo_crisis_success_2_tt: "Dependendo do número de objetivos concluídos da pauta #tooltippable;tooltip:tenpo_shared_tt #b Compartilhada#!#!, #tooltippable;tooltip:tenpo_reformer_tt #b Reformista#!#! ou #tooltippable;tooltip:tenpo_hardliner_tt #b Linha-Dura#!#!, a recompensa mudará."
 je_tenpo_crisis_success_outcome_tt: "Dependendo do número de objetivos concluídos da pauta #b Compartilhada#!, #b Reformista#! ou #b Linha-Dura#!, a recompensa mudará."
 je_tenpo_crisis_success_outcome_1_tt: "Se concluímos mais objetivos da pauta #b Linha-Dura#!:"
 je_tenpo_crisis_success_outcome_2_tt: "Se concluímos mais objetivos da pauta #b Reformista#!:"
 je_tenpo_crisis_success_outcome_3_tt: "Se concluímos a mesma quantidade de objetivos das pautas #b Linha-Dura#! e #b Reformista#!:"
 modifier_tenpo_crisis_reward_hardliner: "Volta à Ordem"
 modifier_tenpo_crisis_reward_reformer: "Consagrando o Novo"
 modifier_tenpo_crisis_reward_balanced: "Reformas Avaliadas"
 modifier_rice_hoarding: "Acúmulo Generalizado de Arroz"
 tenpo_hardliner_tt: "A #b Facção Linha-Dura#! acredita que a sociedade japonesa está em uma decadência moral que só pode ser evitada pela volta à tradição.\n\nEla crê na promulgação de leis suntuárias mais estritas e que os samurais devem abandonar os luxos da cidade em prol da função de administradores rurais austeros."
 tenpo_reformer_tt: "A #b Facção Reformista#! acredita que a sociedade japonesa foi permanentemente alterada e que as leis do país devem ser baseadas na situação atual, não nos ideais de um passado romantizado.\n\nEla crê na elevação política dos plebeus japoneses e na promoção do comércio."
 tenpo_shared_tt: "As facções #b Linha-Dura#! e #b Reformista#! acreditam que é imprescindível proteger o Japão contra ameaças externas, e que os problemas de segurança alimentar e economia devem ser abordados."
 button_je_tenpo_combat_rice_hoarding: "Combater o Acúmulo de Arroz"
 button_je_tenpo_combat_rice_hoarding_desc: "A instabilidade política e econômica do país [ROOT.GetCountry.GetNameNoFlag] fez pessoas inescrupulosas comprarem e acumularem grandes quantidades de arroz, elevando os preços. Como consequência, muitas famílias japonesas não têm como comprar arroz suficiente para se alimentarem."
 button_je_tenpo_frugal_ordinance: "Emitir a Ordenança Frugal"
 button_je_tenpo_frugal_ordinance_desc: "A decadência crescente do grupo urbano [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] está ameaçando a estabilidade do nosso governo. Eles começaram a agir além da posição, exibindo a riqueza para todos.\n\nDevemos lembrá-los da função deles na sociedade, impondo mais restrições legais a artigos de luxo, entretenimento e literatura."
 button_je_tenpo_confiscate_land: "Emitir a Ordem de Apreensão Edo-Osaka"
 button_je_tenpo_confiscate_land_desc: "A área dentro de 10 #italic #tooltippable;tooltip:glossary_ri ri#!#! de Edo e Osaka é uma mistura complicada de terras de posse dos tenryo, daimiô e hatamoto. Como a falta de uma estrutura administrativa unificada tem efeitos graves na defesa nacional e na nossa capacidade de explorar as terras ao máximo, um líder Rōjū sugeriu a apreensão e a consolidação delas.\n\nLatifundiários desalojados receberão terras em outros lugares do Japão."
 modifier_consolidation_payments: "Pagamentos de Consolidação de Terras"
 modifier_consolidated_state_land: "Lei de Consolidação de 10 Ri"
 glossary_ri: "#b #italic Ri#!#! é uma unidade de medida tradicional, derivada do #italic li#! chinês.\n\nO tamanho definido de um ri mudou com o tempo, mas no antigo período Edo, correspondia a aproximadamente 36 #italic chō#! ou 3,9 km."
 modifier_tenpo_crisis_ongoing: "Inquietações da Era Tenpō"
 tenpo_events.1.t: "Era da Proteção Divina"
 tenpo_events.1.d: "Depois de anos de clima adverso, a [concept_famine] assola o país [ROOT.GetCountry.GetNameNoFlag]. Diante da dificuldade dos pobres e desamparados, o Bakufu enfrenta o descontentamento crescente daqueles que acreditavam que o governo seria mais capaz."
 tenpo_events.1.f: "Os tecidos trançados da esposa dele sempre renderam um bom valor no mercado e, nos dias favoráveis, até bancavam alguns doces da confeitaria. Agora, quando muito, eles só conseguiam comprar quatro ou cinco gō de arroz. Mal era o suficiente para alimentá-los por um dia, ele pensou, e muito menos por uma semana, mesmo quando acrescentavam folhas e ervas que colhiam.\n\nNa volta para casa, ele parou diante da casa do velho Tora por um momento. A varíola havia roubado dois de seus filhos e, se os boatos sobre as capas de chuva fossem verdadeiros, roubaria mais nas próximas semanas. Ele se agarrou ao saco de arroz, fez uma prece silenciosa e foi embora."
 tenpo_events.1.a: "Ó Céus, proteja-nos!"
 tenpo_events.1.tt_1: "[GetHarvestConditionType('torrential_rains').GetName] #r severas#! acometeram [GetGeographicRegion('geographic_region_honshu').GetName], #r devastando#! as #b safras de arroz#! cruciais e degradando muito a [concept_food_security] do povo [ROOT.GetCountry.GetAdjectiveNoFlag]."
 tenpo_events.1.tt_2: "Por toda a região de [GetGeographicRegion('geographic_region_honshu').GetName], as moradias de agiotas e dos suspeitos de acumular arroz são alvejadas por multidões praticando #italic #tooltippable;tooltip:glossary_uchikowashi uchikowashi#!#!, o que está resultando na [concept_devastation] #r nacional#!."
 glossary_uchikowashi: "#b #italic Uchikowashi#!#! se refere à destruição da propriedade de pessoas consideradas imorais – como agiotas, acumuladores de arroz e inflacionistas – por parte do povo.\n\nEmbora esses atos fossem geralmente acompanhados de pilhagem, muitas vezes os praticantes de uchikowashi evitavam isso para deixar evidente a legitimidade de suas ações."
 tenpo_events.2.t: "Revolta do Samurai Filósofo"
 tenpo_events.2.d: "De mãos atadas pela ordem estabelecida e sua incapacidade de lidar com a [concept_famine] que assola [SCOPE.sState('osaka_scope').GetName], o magistrado e acadêmico [SCOPE.sCharacter('oshio_scope').GetFullName] se rebelou contra as autoridades locais. Grande parte de [SCOPE.sState('osaka_scope').GetCityHubName] já está em chamas, conforme os apoiadores [SCOPE.sCharacter('oshio_scope').GetHerHis] queimam gabinetes locais do governo."
 tenpo_events.2.f: "\"Embora não tenhamos o poder de Tang e Wu, nem a virtude de Confúcio e Mêncio, não há outra saída: pelo bem do reino, nós decidimos agir, apesar da maldição que possa recair sobre a nossa própria linhagem.\n\nNós puniremos e executaremos os vários oficiais que atormentam e perturbam as pessoas comuns e, em seguida, também puniremos e executaremos as pessoas ricas da cidade de Osaka que engordaram por extravagância.\n\nEntão o ouro, a prata e as moedas que eles guardaram em cofres ocultos e os fardos de arroz que esconderam em seus armazéns e propriedades serão distribuídos e partilhados.\"\n\n–Ōshio Heihachirō, #italic Trechos do Manifesto#!"
 tenpo_events.2.a: "Reunir a milícia e crucificar esse traidor."
 tenpo_events.2.b: "Um ato desesperado, mas justo."
 tenpo_events.2.c: "Os rebeldes dominam a guarnição local e tomam [SCOPE.sState('osaka_scope').GetCityHubName]."
 tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName] evita a captura e comete suicídio por imolação."
 tenpo_events.2.tt_2: "As autoridades torturam e crucificam [SCOPE.sCharacter('oshio_scope').GetFullName]."
 tenpo_events.2.tt_3: "As milícias locais #b cessam a rebelião#! antes que se espalhe mais."
 tenpo_events.2.tt_4: "O [concept_agitator] [SCOPE.sCharacter('oshio_scope').GetFullName] sofre uma pena leve e simbólica e recebe permissão para continuar o trabalho."
 modifier_osaka_burning: "Crítica Assinada em Sangue"
 modifier_controversial_pardon: "Perdão Controverso"
 tenpo_events.3.t: "Reformas Obrigatórias"
 tenpo_events.3.d: "Feliz com o ritmo das reformas, [ROOT.GetCountry.GetRuler.GetCustom('BR_OA')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] parabenizou o progresso dos conselheiros, acreditando que a nação do povo [ROOT.GetCountry.GetAdjective] é capaz de superar qualquer desafio externo ou nacional."
 tenpo_events.3.f: "\"Doze, senhor\", disse o conselheiro-chefe, apoiando o pincel sobre a mesa. \"E os relatórios de Kinai mostram praticamente o mesmo, nossas reformas parecem estar se consolidando\".\n\nDo palanque, [ROOT.GetCountry.GetRuler.GetCustom('BR_OA')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] acenou brevemente com a cabeça. \"Muito bem. Quero que a corte seja devidamente informada. Agora, quanto ao relatório do magistrado de Nagasaki...\"."
 tenpo_events.3.a: "Que isso marque o fim da decadência moral e política do povo [ROOT.GetCountry.GetAdjective]."
 tenpo_events.3.b: "Dos camponeses aos samurais, não somos todos súditos do Imperador?"
 tenpo_events.3.c: "A estabilidade do reino é primordial."
 tenpo_outcome_hardliner_tt: "Nós concluímos mais objetivos da pauta #b Linha-Dura#! do que da #b Reformista#!"
 tenpo_outcome_reformer_tt: "Nós concluímos mais objetivos da pauta #b Reformista#! do que da #b Linha-Dura#!"
 tenpo_outcome_balanced_tt: "Nós concluímos a mesma quantidade de objetivos das pautas #b Linha-Dura#! e #b Reformista#!:"
 tenpo_events.4.t: "Ação e Inanição"
 tenpo_events.4.d: "Indiferente diante dos resultados do programa de reformas e enfrentando a insatisfação crescente do povo com os conselheiros-chefes, [ROOT.GetCountry.GetRuler.GetCustom('BR_OA')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] demitiu [SCOPE.sCharacter('roju_scope').GetFullName] do cargo."
 tenpo_events.4.f: "Exílio. O ex-conselheiro saboreou a palavra e não gostou nada, embora talvez fosse melhor do que ficar em Edo, considerando os eventos do dia anterior. Seus últimos assistentes ainda estavam tirando pedras e tijolos arremessados no lago e no pátio, e algumas das ameaças que ele ouviu naquele dia jamais seriam esquecidas.\n\nEle saboreou a palavra de novo e a achou menos repulsiva. Além disso, ele pensou que sempre quis ver o Monte Gassan com os próprios olhos."
 tenpo_events.4.a: "Nunca mais quero ver esse tolo de novo."
 tenpo_events.4.b: "Reverter cada decisão dele e garantir que o povo fique sabendo."
 tenpo_events.4.tt_1: "[SCOPE.sCharacter('roju_scope').GetFullName] foi #r rebaixado#! e exilado internamente para a província de #b Dewa#!"
 modifier_tenpo_fail: "Reformas da Era Tenpō Interrompidas"
 tenpo_events_4_demotion_tt: "A [concept_leader] de um [concept_interest_group] [concept_in_government] é rebaixada e exilada internamente" # tooltip for event_outcome_failed_effect_desc in je_tenpo_crisis
 tenpo_events.5.t: "Latifundiários Resistem à Centralização"
 tenpo_events.5.d: "Nosso ato para confiscar a terra em [SCOPE.sState('kanto_scope').GetName] e [SCOPE.sState('kansai_scope').GetName] está sendo encarado com oposição dos latifundiários locais. As maiores reclamações vêm daqueles cujas terras foram cedidas como recompensa pelo serviço militar."
 tenpo_events.5.f: "\"O mérito militar deu ao meu ancestral a terra que agora está em meu nome. Desde Sekigahara, cada geração arou a terra, aumentando a produtividade e agraciando os nossos mestres sem nunca reclamar.\n\nEsse serviço merece o tratamento que estamos recebendo? Nossa recompensa é a realocação sem a devida compensação?\"."
 tenpo_events.5.a: "Cancelar a centralização antes que isso saia do controle."
 tenpo_events.5.b: "Oferecer terra adicional aos realocados como compensação."
 tenpo_events.5.c: "Lembrá-los de que essa é a vontade [ROOT.GetCountry.GetRuler.GetCustom('BR_DoDa')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 modifier_heavy_handed_land_confiscations: "Apreensão Pesada de Terras"
 modifier_promotions_and_koku_redistribution: "Promoções e Redistribuição de Koku"
 modifier_reckless_roju: "Rōjū Imprudente"
 modifier_will_of_the_shogun: "Em Nome do Xogum"
 tenpo_events.6.t: "Leão no Covil do Dragão"
 tenpo_events.6.d: "A vitória do país [SCOPE.sCountry('britain_scope').GetName] contra o governo [SCOPE.sCountry('china_scope').GetAdjective] abalou profundamente a nossa nação. Embarcações e exércitos chineses foram facilmente derrotados pelas forças superiores do povo [SCOPE.sCountry('britain_scope').GetAdjectiveNoFormatting], e agora muitos questionam a capacidade do país [ROOT.GetCountry.GetName] de resistir a um ataque semelhante."
 tenpo_events.6.f: "\"Do Templo Ganlu, a oeste, ao Templo Jinshan, a leste, as terras próximas a Zhenjiang estavam tomadas por bárbaros trajados em preto e branco, como peças espalhadas em um tabuleiro de go, e os moradores locais se perguntavam se eles algum dia iriam embora\".\n\n–Mineta Fūkō, #italic Novas Histórias do Exterior#!"
 tenpo_events.6.a: "Que os céus nos protejam, pois nossos samurais talvez falhem."
 tenpo_events.6.b: "Censurar qualquer relatório negativo da China."
 tenpo_events.6.c: "Somos o penhasco que bloqueará as ondas de bárbaros."
 modifier_opium_war_aftermath: "Bárbaros nos Portões"
 modifier_defenses_strengthened: "Guarnições Costeiras Fortalecidas"
 tenpo_events.7.t: "A Escola Takashima"
 tenpo_events.7.d: "Temendo pelo futuro do Japão após a Guerra do Ópio, [SCOPE.sCharacter('takashima_scope').GetFullName], magistrado de Nagasaki, organizou uma unidade militar moderna e inspirada nos holandeses e pede que o resto do país siga seu exemplo."
 tenpo_events.7.f: "\"Os chapéus armados dos homens dele parecem coroas estranhas, e as ordens são proclamadas no idioma ríspido dos holandeses. No entanto, as formações são bem treinadas, organizadas e conseguem soltar saraivadas duas vezes mais rápido que os meus retentores, mesmo com a precisão inferior.\"\n\n\"E quanto à artilharia?\"\n\n\"Incomparável. Temo que, quanto mais esperarmos para adotar, menores serão as chances de repelirmos o ataque dos bárbaros.\""
 tenpo_events.7.a: "Autorizar a adoção de exércitos e técnicas dos bárbaros."
 tenpo_events.7.b: "Favorecer as casas tradicionais de mosquetaria."
 modifier_inoue_tatsuke_primacy: "Supremacia Inoue-Tatsuke"
 modifier_favouring_traditional_musketry_houses: "Favorecendo Casas Tradicionais de Mosquetaria"
 modifier_favouring_takashima: "Casas de Mosquetaria Marginalizadas"
 modifier_takashima_school: "Promovendo a Escola Takashima"
 tenpo_events.8.t: "Por uma Tigela de Arroz"
 tenpo_events.8.d: "As acusações de acúmulo de arroz e inflação fizeram as tensões entre fazendeiros e comerciantes em [SCOPE.sState('tenpo_unrest_state_scope').GetName] explodirem. Com os camponeses apoiados por bandidos e pedintes, as autoridades locais agora enfrentam uma rebelião de toda a província."
 tenpo_events.8.f: "Ele foi um dos primeiros, um dos poucos felizardos no grupo que atacou a casa do comerciante perverso e distribuiu entre as massas os ganhos ilícitos encontrados nela. Enquanto contemplava a fogueira, ele percebeu que restavam pouquíssimos. Eikichi e Matsuzō estavam parados, mas mal lembravam os homens que eram, transparecendo uma fúria justa. Fukumatsu havia perdido a vida no segundo dia, depois foi Takeshichi no sétimo. O resto havia se espalhado como folhas conforme os homens do magistrado os perseguiam.\n\nA índole dos homens substitutos o enchia de vergonha e desespero, mas ele não via outra opção. Afinal, até uma pobre companhia como a deles parecia divina quando comparada à lâmina do executor."
 tenpo_events.8.a: "Enviar homens para acabar com esses vilões."
 tenpo_events.8.b: "Deixar a inquietação morrer por conta própria."
 tenpo_events.8.c: "Subornar as lideranças rurais locais para que ajudem a reprimir a inquietação."
 modifier_consulted_headsmen: "Concessões Rurais"
 modifier_lingering_brigandry: "Bandidagem Persistente"
 modifier_brutal_anti_bandit_campaigns: "Campanhas Brutais Contra Bandidos"
 je_taming_the_north: "Domando o Norte"
 je_taming_the_north_reason: "Com a formação da #b Comissão de Desenvolvimento de [SCOPE.sState('hokkaido_state_scope').GetName]#!, comumente conhecida como #b Kaitakushi#!, esta antiga fronteira está em polvorosa. Todos os dias, novos homens e mulheres chegam do sul em busca de novas terras e oportunidades.\n\nContudo, este não é um fluxo comum de pessoas. Pois junto com os colonos vêm os burocratas, os intelectuais e os visionários modernizadores com a missão de moldar a terra, ansiosos para ver sua visão do futuro do país [ROOT.GetCountry.GetName] concretizar-se em [SCOPE.sState('hokkaido_state_scope').GetName]."
 taming_the_north_agriculture_potentials_goal_tt: "Usamos a ação #b $button_je_taming_the_north_agriculture_potentials$#! #v 3#! vezes"
 taming_the_north_agriculture_arable_goal_tt: "Usamos a ação #b $button_je_taming_the_north_agriculture_arable_land$#! #v 3#! vezes"
 taming_the_north_colonies_goal_tt: "Usamos a ação #b $button_je_taming_the_north_establish_colonies$#!"
 je_taming_the_north_additional_goal_pre: "Se tivermos posse de tudo em #b $STATE_SAKHALIN$#!, o [concept_timed_modifier] #b $modifier_tamed_north$#! também será aplicado à [concept_state_region] de $STATE_SAKHALIN$:"
 je_taming_the_north_additional_goal: "Se tivermos posse de tudo em [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName], o [concept_timed_modifier] #b $modifier_tamed_north$#! também será aplicado em [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]:"
 je_taming_the_north_additional_goal_completed: "Já que temos posse de tudo em [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName], o [concept_timed_modifier] #b $modifier_tamed_north$#! também será aplicado em [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]:"
 modifier_tamed_north: "A Colônia Modelo"
 modifier_northern_learnings: "Aprendizados da Kaitakushi"
 button_je_taming_the_north_establish_colonies: "Estabelecer Colônias Patrocinadas pelo Estado"
 button_je_taming_the_north_establish_colonies_desc: "Uma colônia sem colonos suficientes está fadada ao fracasso. Devemos considerar incentivos para ajudar a atrair famílias de todo o país [ROOT.GetCountry.GetName] para se estabelecerem no norte."
 button_je_taming_the_north_integrate_ainu: "Implementar Proteções Legais aos Ainu"
 button_je_taming_the_north_integrate_ainu_desc: "Até agora, a posição da Comissão em relação aos [GetCulture('ainu').GetName] tem sido de integração forçada e apagamento cultural. No entanto, nossos passos graduais em direção a uma relação mais igualitária com os habitantes [GetCulture('ainu').GetNameNoFormatting] do Norte resultaram em um aquecimento das relações entre nossos povos.\n\nUma proposta foi, portanto, enviada para [ROOT.GetCountry.GetRuler.GetCustom('BR_OA')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] para consagrar legalmente os [GetCulture('ainu').GetNameNoFormatting] como um povo irmão, protegido sob a lei do país [ROOT.GetCountry.GetName], com os mesmos direitos e deveres do povo [GetCulture('japanese').GetName]."
 ainu_frenship_tt: "Temos promovido consistentemente os interesses dos [GetCulture('ainu').GetName] em #b eventos#!"
 button_je_taming_the_north_sapporo_agricultural_college: "Fundar a Escola Agrícola de Sapporo"
 button_je_taming_the_north_sapporo_agricultural_college_desc: "O norte é a arena perfeita para testarmos as teorias mais recentes das áreas de agricultura e gerenciamento de terras. Vamos fundar uma escola agrícola de ponta, conduzida por estrangeiros habilidosos, que servirá como núcleo para a transformação científica da nossa terra."
 sapporo_partner_positive_catalyst_tt: "Um [concept_diplomatic_catalyst] #g positivo#! será acionado com um país aleatório que cumpra os requisitos"
 button_je_taming_the_north_agriculture_potentials: "Introduzir Novas Plantações"
 button_je_taming_the_north_agriculture_potentials_desc: "A área disponível na ilha pode ser de suma importância, mas o verdadeiro desenvolvimento econômico só ocorrerá se também cultivarmos as plantações certas.\n\nNovos desenvolvimentos no campo da agricultura, liderados pela #b Escola Agrícola de Sapporo#!, nos permitem introduzir plantações nesta fronteira gélida que antes eram consideradas impossíveis.\n\nOpções disponíveis:\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#! (ampliável)\n• [GetBuildingType('building_rice_farm').GetName]\n• [GetBuildingType('building_dye_plantation').GetName]\n• [GetBuildingType('building_opium_plantation').GetName]\n• [GetBuildingType('building_vineyard').GetName]"
 established_sapporo_college_tt: "Estabelecemos a #b Escola Agrícola de Sapporo#!"
 hokkaido_agriculture_potentials_tt: "Esta decisão pode ser tomada #v 3#! vezes no total. (atualmente [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0])"
 modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]"
 button_je_taming_the_north_agriculture_arable_land: "Continuar a Reclamação de Terras"
 button_je_taming_the_north_agriculture_arable_land_desc: "Embora estas vastas terras estejam com a agricultura subdesenvolvida, elas têm um grande potencial. As grandes cordilheiras, de onde flui água abundante, oferecem amplas oportunidades para estender a área cultivável para o norte.\n\nDrenaremos os pântanos, irrigaremos os campos e domaremos a terra como uma demonstração do espírito inabalável do povo [GetCulture('japanese').GetName]."
 hokkaido_agriculture_arable_tt: "Esta decisão pode ser tomada #v 3#! vezes no total. (atualmente [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0])"
 hokkaido_events.1.t: "O Oitavo Circuito"
 hokkaido_events.1.d: "Com a incorporação de [SCOPE.sState('hokkaido_scope').GetName] – ou as terras Ainu – ao Japão propriamente dito, um novo nome deve ser escolhido para refletir o novo status desta terra. A recém-estabelecida Comissão de Desenvolvimento apresentou uma série de propostas que [ROOT.GetCountry.GetRuler.GetCustom('BR_OA')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] deve analisar."
 hokkaido_events.1.f: "\"Uma terra de selvagens, isso sim. De brejos e lama. De pescadores humildes e devoradores de carne. O que você espera conseguir naquele lugar desolado que [ROOT.GetCountry.GetCapital.GetCityHubName] já não oferece?\"\n\n\"Propósito, mãe. E algo que possa ser meu.\""
 hokkaido_events.1.a: "Seu nome será #tooltippable;tooltip:hokkaido_events.1_tt_3 #b Hokkai-dō#!#!: O Circuito do Mar do Norte." # 北加伊道
 hokkaido_events.1.b: "#tooltippable;tooltip:hokkaido_events.1_tt_2 #b Hokkai-dō#!#!, em homenagem aos habitantes desta terra." # 北海道
 hokkaido_events.1.c: "#tooltippable;tooltip:hokkaido_events.1_tt_4 #b Kaitō-dō#!#!, o Circuito Ilha-Mar, é claramente a melhor opção."
 hokkaido_events.1.e: "#tooltippable;tooltip:hokkaido_events.1_tt_5 #b Hitakami-dō#!#! tem um certo tom literário."
 hokkaido_events.1.tt_1: "A cidade de #b Sapporo#! é fundada e torna-se a nova capital administrativa da ilha, substituindo #b Hakodate#!"
 modifier_ainu_heritage_aknowleged: "Terra dos Kai"
 modifier_breaking_new_ground: "Abrindo Novos Caminhos"
 modifier_hokkaido_naval_connections: "O Circuito Delimitado pelo Mar"
 modifier_call_of_the_frontier: "O Chamado da Fronteira"
 the_ainu_will_appreciate_this_tt: "@information! Os [GetCulture('ainu').GetName] se lembrarão disso"
 hokkaido_events.1_tt_2: "#b O Circuito Kai do Norte#!\nNas palavras do membro da comissão Matsuura Takeshirō, #italic kai#! (加伊) é entendido como um antigo endônimo Ainu para seu povo."
 hokkaido_events.1_tt_3: "#b O Circuito do Mar do Norte#!\nUma contraproposta do governo à proposta original de Matsuura Takeshirō. Aqui, os caracteres para #italic kai#! (加伊) são substituídos pelo caractere de som idêntico #italic kai#! (海), que significa \"mar\".\n\n@information! Esta é a proposta que foi selecionada historicamente."
 hokkaido_events.1_tt_4: "#b O Circuito Ilha-Mar#!\nAcima de tudo, a ilha é definida por sua relação com o mar – um fato que deve ser representado em seu novo nome."
 hokkaido_events.1_tt_5: "#b O Circuito da Terra do Sol Nascente#!\nUm nome arcaico da era Yamato para as terras da fronteira nordeste. Escolher esta opção enraíza a nova colônia firmemente no passado antigo do Japão."
 hokkaido_events.2.t: "A Nova Fronteira"
 hokkaido_events.2.d: "A questão de como melhor colonizar a região tem ocupado as mentes da Comissão de Desenvolvimento de [SCOPE.sState('hokkaido_state_scope').GetName] já há algum tempo. Administradores impacientes agora exigem que cheguemos a uma decisão final."
 hokkaido_events.2.f: "Quando era jovem, seu pai sempre falava dos antepassados. Dos nobres e orgulhosos guerreiros do período de guerras entre os estados. Da dignidade austera deles e suas grandes façanhas na guerra. As histórias o cativavam na infância, mas agora que estava mais velho elas só conseguiam deixá-lo melancólico. A ironia do pai, um bêbado burocrata da cidade que só carregava uma espada por dignidade e enaltecia as virtudes do passado, era insuportável.\n\nEntão, quando o pai pediu ajuda na administração do negócio, ele rejeitou com desdém e partiu imediatamente para o norte. Talvez lá ele encontrasse a salvação da linhagem."
 hokkaido_events.2.a: "Priorizar o assentamento por colonos-soldados."
 hokkaido_events.2.b: "O simples camponês é a base do país [ROOT.GetCountry.GetName]."
 hokkaido_events.2.c: "Restringir a maioria dos assentamentos do povo [GetCulture('japanese').GetName] a áreas não utilizadas pelo povo [GetCulture('ainu').GetName]."
 modifier_tondenhei_settlements: "Assentamentos Tondenhei"
 modifier_peasant_settlements: "Assentamentos Camponeses"
 modifier_restricted_settlements: "Terras Centrais Ainu Preservadas"
 hokkaido_events.2.tt_1: "#v 1,5%#! de todos os [Concept('concept_pop', '$concept_pops$')] do povo [GetCulture('japanese').GetName] do [concept_capital_state] se mudarão para [SCOPE.sState('hokkaido_state_scope').GetName]"
 hokkaido_events.2.tt_2: "#v 3%#! de todos os [Concept('concept_pop', '$concept_pops$')] do povo [GetCulture('japanese').GetName] em [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (um dos [Concept('concept_state', '$concept_states$')] com o menor [Concept('concept_gdp', '$concept_gdp_short$')] em [GetGeographicRegion('geographic_region_home_islands').GetName]) se mudarão para [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_old_swords_in_new_lands: "Espadas Antigas em Novas Terras"
 modifier_go_north_young_man: "Vá para o Norte, Jovem"
 hokkaido_events.3.t: "Sementes do Progresso"
 hokkaido_events.3.d: "Avanços recentes na Escola Agrícola de Sapporo motivaram propostas para introduzir novas plantações nos campos de [SCOPE.sState('hokkaido_state_scope').GetName]."
 hokkaido_events.3.f: "#b Registro pessoal do laboratório, 154#!\nEnxertos das variantes ocidentais foram abandonados em prol das do sul devido aos resultados dos últimos testes. Os rapazes dizem que o limite de cultivo pode se estender bem em direção ao norte, talvez até além de Kamikawa. Mais estudos são necessários para avaliar o potencial de rendimento, mas estou otimista. Solicitei uma reunião com o reitor amanhã. Preciso comprar uma gravata nova."
 hokkaido_events.3.a: "Concentrar nossos esforços em melhorar as plantações já presentes."
 hokkaido_events.3.b: "Desenvolver variedades resistentes ao frio para permitir [GetBuildingType('building_rice_farm').GetName] locais."
 hokkaido_events.3.c: "As terras baixas são bem adequadas para [GetBuildingType('building_dye_plantation').GetName] de Índigo."
 hokkaido_events.3.e: "A papoula se adapta bem aqui, [GetBuildingType('building_opium_plantation').GetName] são o futuro."
 hokkaido_events.3.g: "Estabelecer [GetBuildingType('building_vineyard').GetName] usando cepas de uvas especializadas."
 button_je_taming_the_north_complete: "Desenvolvemos a terra o máximo que nossa tecnologia nos permite"
 modifier_introducing_new_crops: "Introduzindo Novas Plantações"
 modifier_opimizing_existing_variants: "Variantes de Colheitas Otimizadas para o Frio"
 hokkaido_events.4.t: "O Crescimento do Solo" # Markens Grøde really does sound better in Norwegian
 hokkaido_events.4.d: "A Comissão de Desenvolvimento de [SCOPE.sState('hokkaido_state_scope').GetName] alcançou outro marco importante, com trechos extensos de antigos pântanos convertidos em terras agrícolas valiosas."
 hokkaido_events.4.f: "Era realmente impressionante. Há uma década, a maior embarcação capaz de navegar em segurança pelo rio diante dele era uma pequena canoa. Agora ele observava um grupo de trabalhadores descarregando caixas e sacas de estopa de um enorme barco a vapor que soltava fumaça no ar frio da montanha. Materiais para o próximo bloqueio, talvez? Ou para o projeto de drenagem rio acima? Ou apenas suprimentos do novo vilarejo no vale além do rio? Ele não sabia dizer, e na verdade não importava, pois qualquer conteúdo que fosse, trazia com ele o futuro."
 hokkaido_events.4.a: "A cada golpe da enxada, moldamos esta terra."
 hokkaido_events.4.b: "E com cada novo lar, nós a fazemos crescer."
 hokkaido_events.4.tt_1: "#v 2%#! de todos os [Concept('concept_pop', '$concept_pops$')] do povo [GetCulture('japanese').GetName] em [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (um dos [Concept('concept_state', '$concept_states$')] com o menor [Concept('concept_gdp', '$concept_gdp_short$')] em [GetGeographicRegion('geographic_region_home_islands').GetName]) se mudarão para [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_immigration_burst: "Onda de Imigração"
 modifier_open_to_business: "Aberta para Negócios"
 hokkaido_events.5.t: "Rapazes, Sejam Ambiciosos..."
 hokkaido_events.5.d: "Com a graduação da primeira turma da Escola Agrícola de Sapporo, composta por funcionários do país [SCOPE.sCountry('sapporo_partner_country_scope').GetName], os ex-alunos estão ansiosos para colocar suas novas habilidades em prática. Enquanto isso, o conselho da escola delibera sobre a futura direção e o foco da instituição."
 hokkaido_events.5.f: "\"... sejam ambiciosos, não pelo dinheiro, não por egoísmo, não pela coisa evanescente que os homens chamam de fama. Sejam ambiciosos pela conquista de tudo o que um homem pode ser.\"\n\n– William Smith Clark, #italic Discurso de despedida do presidente da Escola Agrícola de Sapporo#!"
 hokkaido_events.5.a: "Uma escola agrícola deve concentrar-se primordialmente na agricultura."
 hokkaido_events.5.b: "Devemos priorizar a expansão do corpo docente de engenharia."
 hokkaido_events.5.c: "Estabelecer um corpo docente de humanas e iniciar estudos culturais locais."
 hokkaido_events.5.tt_1: "A influência dos funcionários do país [SCOPE.sCountry('sapporo_partner_country_scope').GetName] em #b Sapporo#! leva à criação de uma comunidade local de religião [SCOPE.sReligion('sapporo_partner_religion_scope').GetName] do povo [GetCulture('japanese').GetName]."
 hokkaido_events.5.tt_2: "Desbloqueia #b $button_je_taming_the_north_agriculture_potentials$#! e #b $button_je_taming_the_north_agriculture_arable_land$#! no [concept_journal_entry] #b $je_taming_the_north$#!"
 modifier_sapporo_expanded_agricultural_faculty: "Métodos Agrícolas Inovadores"
 modifier_sapporo_expanded_engineering_faculty: "Corpo Docente de Engenharia de Ponta"
 modifier_sapporo_humanities_faculty: "Grupo de Estudos Culturais de Sapporo"
 hokkaido_events.6.t: "Ainu Mosir, Sisam Mosir"
 hokkaido_events.6.d: "Em uma atmosfera de certa controvérsia doméstica, [ROOT.GetCountry.GetCapital.GetCityHubName] emitiu um novo decreto sobre o status legal de [SCOPE.sState('hokkaido_state_scope').GetName], delineando formalmente uma terra natal Ainu e estabelecendo instituições limitadas para existirem em paralelo com o aparato burocrático oficial [ROOT.GetCountry.GetAdjective]."
 hokkaido_events.6.f: "\"Hinna! Hinna!\" Com um sorriso quase desdentado, o velho Ainu lhe ofereceu a tigela de sopa. Ele olhou para o conteúdo variado e agradeceu aos céus pelo fato de seus pais não estarem lá para julgá-lo.\n\n\"As coisas que eu faço pela paz\", ele murmurou para si, aceitando a refeição com um sorriso forçado."
 hokkaido_events.6.a: "\"Esta terra é grande o suficiente para ambos.\""
 modifier_opposes_ainu_rights: "Concessões aos Bárbaros"
 modifier_supports_ainu_rights: "Direitos Ainu Consagrados"
 hokkaido_events.7.t: "O Ato Final da Comissão"
 hokkaido_events.7.d: "Anunciando formalmente o sucesso de sua missão incumbida pelo governo, a Comissão de Desenvolvimento de [SCOPE.sState('hokkaido_state_scope').GetName] optou por transferir suas responsabilidades restantes para o Estado."
 hokkaido_events.7.f: "#b Proclamação nº 8#!\nA Comissão de Desenvolvimento de [SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting] foi abolida, e as três províncias de Hakodate, Sapporo e Nemuro foram estabelecidas. Os limites das respectivas jurisdições serão promulgados posteriormente."
 hokkaido_events.7.a: "Um exemplo brilhante para futuros empreendimentos coloniais..."
 hokkaido_events.7.b: "... e para as [GetGeographicRegion('geographic_region_home_islands').GetName], inclusive."
 modifier_external_applications: "Kaitakushi: Aplicações Externas"
 modifier_domestic_applications: "Kaitakushi: Aplicações Domésticas"
 hokkaido_events.8.t: "Comissão Sem Causa"
 hokkaido_events.8.d: "A perda de [SCOPE.sStateRegion('hokkaido_state_region_scope').GetName] forçou a Comissão de Desenvolvimento a se dissolver sem ter completado sua missão. Em resposta, cidadãos indignados tomaram as ruas do país [ROOT.GetCountry.GetName], protestando tanto contra a perda de prestígio nacional quanto de seus investimentos pessoais."
 hokkaido_events.8.f: "Exausto, o administrador honorário afundou na cadeira do escritório e se serviu de uma dose generosa de saquê. Depois de virá-la de uma vez, ele contemplou os mapas abertos diante dele na mesa. Cheios de rabiscos, anotações e marcações, e cada uma representava uma trama diferente na qual ele depositou muita energia. Agora já não restava trama e nem energia, e o otimismo implícito em cada anotação parecia uma zombaria.\n\n\"Que se dane tudo\", ele pensou enquanto preparava outra dose."
 hokkaido_events.8.a: "Lamentavelmente, este resultado está fora do controle do governo."
 modifier_lost_northern_investments: "Investimentos do Norte Perdidos"
