l_braz_por:
 #Japan Single-Fire Events
 japan_events.31.t: "O Teatro de [SCOPE.sState('kabuki_theatre_state').GetCityHubName] É Queimado"
 japan_events.31.d: "Um incêndio devastou um teatro de kabuki popular em [SCOPE.sState('kabuki_theatre_state').GetName]. Enquanto a trupe do teatro planeja a reconstrução, membros do grupo [SCOPE.gsInterestGroup('relevant_ig').GetName], principalmente [SCOPE.sCharacter('relevant_leader').GetFullName], vê isso como uma oportunidade de regulamentar o entretenimento em [SCOPE.sState('kabuki_theatre_state').GetCityHubName] e forçar os artistas a reerguer o teatro fora da cidade."
 japan_events.31.f: "Sobre a plataforma de uma torre de vigia, um homem inquieto observa atentamente [SCOPE.sState('kabuki_theatre_state').GetCityHubName]. Durante a madrugada, ele vê os sinais claros de um incêndio de seu mirante. Conforme a fumaça sobe e o aroma pungente do fogo preenche o ar, ele corre para soar o alarme.\n\nO povo da cidade é alertado sobre o perigo e brigadas de incêndio partem para a ação, subindo nos telhados para controlar as chamas. Quando o incêndio é apagado, torna-se evidente o grande dano causado. De um dos teatros proeminentes de kabuki, só restam cinzas e brasas depois das labaredas devastadoras."
 japan_events.31.a: "Devem reerguê-lo fora dos limites da cidade."
 japan_events.31.b: "Permitir que a trupe do teatro reconstrua."
 modifier_kabuki_regulated: "Repressão do Teatro de Kabuki"
 modifier_theatre_affronted_official: "Oficial Afrontado"
 modifier_shogunate_opposition_ig_approval: "Oposição Oportunista"
 japan_events.32.t: "Imagens do Mundo Flutuante"
 japan_events.32.d: "A obra de um artista criativo de ukiyo-e em [SCOPE.sState('ukiyo_e_state').GetCityHubName] inspirou a imaginação de artistas no país [ROOT.GetCountry.GetName] e no exterior."
 japan_events.32.f: "Uma xilogravura popular que mostra o distrito animado dos teatros nos arredores de [SCOPE.sState('ukiyo_e_state').GetCityHubName]. O luar prateado ilumina a rua principal, repleta de pessoas e suas sombras projetadas. O lado leste da rua é marcado por casas de chá e teatros de marionetes. Já no lado oeste, há três teatros de kabuki, cada um sob uma torre de tambor.\n\n\"Apenas uma mão primorosa poderia fazer traços tão firmes e sinceros com um sombreamento tão delicado e perfeitamente posicionado. E só uma mente genial poderia criar uma figura tão harmoniosamente organizada, tão forte e, ao mesmo tempo, tão elegante.\"\n— F.W.G., #italic Boletim do Instituto de Arte de Chicago#!"
 japan_events.32.a: "Certamente, a arte do país [ROOT.GetCountry.GetNameNoFormatting] continuará ganhando proeminência global."
 japan_events.32.b: "Excelente. Incentivar a produção de mais obras assim."
 modifier_ukiyo_e_prestige: "Xilogravuras Criativas"
 modifier_ukiyo_e_production: "Produção de Xilogravuras"
 japan_events.33.t: "Embate Contra a Tradição"
 japan_events.33.d: "O efeito da ocidentalização na cultura do povo [ROOT.GetCountry.GetAdjectiveNoFormatting] é significativo. Conforme os costumes mudam rapidamente, [SCOPE.sCharacter('relevant_character').GetCustom('BR_OA')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullName] está patrocinando um torneio de sumô em [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] para combater o antagonismo do povo à tradição."
 japan_events.33.f: "Multidões começam a se reunir no Salão de Sumô recém-construído nas terras do templo, curiosas com o evento que tem o apoio [SCOPE.sCharacter('relevant_character').GetCustom('BR_DoDa')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]. Dentre os presentes, há alguns aristocratas e estadistas obcecados pela cultura oriental, agora céticos quanto à permanência dessa tradição. A era de ouro do sumô já passou, mas a presença [SCOPE.sCharacter('relevant_character').GetCustom('BR_DoDa')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] pode restabelecer a importância cultural desse esporte para o povo."
 japan_events.33.a: "Os esforços [SCOPE.sCharacter('relevant_character').GetCustom('BR_DoDa')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] vão restaurar a imagem pública desse esporte."
 japan_events.33.b: "A tradição desse esporte [ROOT.GetCountry.GetAdjectiveNoFormatting] terá muita longevidade."
 modifier_restored_sumo_popularity: "Popularidade do Sumô Restaurada"
 modifier_traditional_sports_movement_support: "Esporte Nacional"
 japan_events.34.t: "Desastre na Caça a Baleias em [SCOPE.sState('whaling_state').GetPortHubName]"
 japan_events.34.d: "Um barco que navegava na costa de [SCOPE.sState('whaling_state').GetName] avistou duas baleias, uma mãe e um filhote. Desesperado depois de uma temporada fraca, um grupo de caça a baleias se aventurou no mar, apesar das condições climáticas adversas. Mais de 100 pessoas estão desaparecidas."
 japan_events.34.f: "A fogueira no barco já havia desaparecido e a frota não podia mais ser vista da terra, o que causou uma grande comoção em [SCOPE.sState('whaling_state').GetPortHubName].\n\n\"Por mais crítica que seja a situação, nós sempre evitamos caçar uma mãe com filhote\", alega um homem. \"Devíamos ter deixado as baleias em paz\".\n\n\"Bobagem\", responde o primo. \"As baleias são bênçãos. Tenho certeza de que a expedição voltará em breve com uma caça generosa\"."
 japan_events.34.a: "$bg_whaling$ é uma indústria crucial em [SCOPE.sState('whaling_state').GetNameNoFormatting]."
 japan_events.34.b: "Concentrar nossos esforços nos $bg_fishing$ de [SCOPE.sState('whaling_state').GetNameNoFormatting]."
 modifier_whaling_deaths: "Baixas na Caça a Baleias"
 modifier_redouble_on_whaling: "Futuro na Caça a Baleias"
 modifier_fishing_not_whaling: "Futuro na Pesca"
 japan_events.35.t: "Medidas Contra Incêndios Criminosos"
 japan_events.35.d: "O grupo [SCOPE.gsInterestGroup('relevant_ig').GetName] teme que a frequência de casos de incêndio criminoso nos limites urbanos de [SCOPE.sState('relevant_state').GetCityHubName] tenha aumentado os preços de [SCOPE.sGoods('expensive_good').GetName] no país [ROOT.GetCountry.GetName]. Ele alega que aumentar as medidas rigorosas contra incêndios criminosos é necessário."
 japan_events.35.f: "O alarme soa da torre de vigia, alertando a todos sobre o perigo iminente onde outro incêndio em [SCOPE.sState('relevant_state').GetCityHubName] devasta residências e negócios. Conforme as brigadas de incêndio chegam para extinguir as chamas, os $strata_commoners_townspeople$ se aglomeram na rua. Alguns encaram os vizinhos com suspeita, outros começam a especular se foi um acidente ou obra de algum criminoso. Uma coisa é certa: os preços de [SCOPE.sGoods('expensive_good').GetNameNoFormatting] logo aumentarão."
 japan_events.35.a: "Medidas rigorosas são necessárias. Executar os criminosos suspeitos."
 japan_events.35.b: "Perdoar alegações de crimes de quem ajudou nas prisões."
 modifier_arson_measure_strict_ig: "Medidas Rigorosas Contra Incêndios Criminosos"
 modifier_arson_measure_strict_pop: "Execuções de Criminosos"
 modifier_arson_measure_lenient_ig: "Medidas Tolerantes Contra Incêndios Criminosos"
 # Colonization of Korea Content
 je_colonize_korea: "O Governo de Chōsen"
 je_colonize_korea_reason: "#italic \"A indústria e o comércio terão um desenvolvimento acentuado sob paz e uma boa governança. Temos a absoluta certeza de que a paz na Ásia Oriental consequentemente terá uma base mais forte do que nunca.\"\n— Registro do Imperador Meiji, Volume 12#!\n\nChegou a hora de estabelecermos uma presença permanente na Península Coreana. Só assim poderemos assegurar a futura prosperidade e a segurança do país [JournalEntry.GetCountry.GetName] e do resto de [GetGeographicRegion('geographic_region_east_asia').GetName]. Para garantirmos o controle, devemos supervisionar o desenvolvimento de [GetGeographicRegion('geographic_region_korea').GetName] e não fraquejar em nossa ambição."
 je_colonize_korea_is_owned_by_tt: "Pertence ao país [JournalEntry.GetCountry.GetName]"
 je_colonize_korea_culture_percent_seoul_tt: "O [Concept('concept_pop', 'Povo')|l] [GetCulture('japanese').GetName] de $STATE_SEOUL$ é maior ou igual a #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_busan_tt: "O [Concept('concept_pop', 'Povo')|l] [GetCulture('japanese').GetName] de $STATE_BUSAN$ é maior ou igual a #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_yangho_tt: "O [Concept('concept_pop', 'Povo')|l] [GetCulture('japanese').GetName] de $STATE_YANGHO$ é maior ou igual a #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_sariwon_tt: "O [Concept('concept_pop', 'Povo')|l] [GetCulture('japanese').GetName] de $STATE_SARIWON$ é maior ou igual a #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_pyongyang_tt: "O [Concept('concept_pop', 'Povo')|l] [GetCulture('japanese').GetName] de $STATE_PYONGYANG$ é maior ou igual a #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
