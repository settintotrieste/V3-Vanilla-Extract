 modifier_peninsula_control_approval_pol_str_loss_tt: "[GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetDesc]"
 korea_colonization.2.t: "Um Futuro Promissor"
 korea_colonization.2.d: "Agora o mundo sabe que [GetGeographicRegion('geographic_region_korea').GetName] é parte do país [ROOT.GetCountry.GetName] e está totalmente sob o nosso controle. Ao estabelecermos nossa presença na península, nosso sucesso mostra ainda mais a nossa proeminência no cenário mundial."
 korea_colonization.2.f: "Agora que a visão de unificação entre as nações se concretizou, a ambição [ROOT.GetCountry.GetRuler.GetCustom('BR_DoDa')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] está aumentando. Em seu assento em [ROOT.GetCountry.GetCapital.GetCityHubName], [ROOT.GetCountry.GetRuler.GetSheHe] compõe um poema tanka que reflete o sucesso de sua empreitada e a satisfação com os desdobramentos na península.\n\nNesse momento, em $STATE_SEOUL$, um burocrata [GetCulture('korean').GetNameNoFormatting] reprime o clamor de civis que protestam contra a nova ordem social. Falando com tranquilidade, ele insiste que essa união garantirá prosperidade a todos."
 korea_colonization.2.a: "O futuro próspero e seguro da península parece promissor."
 korea_colonization.2.b: "Os negócios têm sido fundamentais para a nossa pauta."
 modifier_peninsula_control_prestige_authority: "Prestígio da Península"
 modifier_peninsula_control_assimilation_migration: "Assimilação Acelerada"
 modifier_peninsula_control_loyal_prominence: "Supervisão Excepcional"
 modifier_peninsula_control_company_bonus: "Elogio da Companhia"
 korea_colonization.3.t: "Oportunidade Perdida"
 korea_colonization.3.d: "[GetGeographicRegion('geographic_region_korea').GetName] não está mais sob o nosso controle. O país [ROOT.GetCountry.GetName] sentirá o impacto econômico e diplomático por anos."
 korea_colonization.3.f: "Oficiais do povo [ROOT.GetCountry.GetAdjectiveNoFormatting] se reúnem, cheios de frustração e descontentamento, para debater como o governo não conseguiu manter a ordem na península. Muitos não querem se comprometer a superar esse golpe e nem pensar no poder considerável que o país [ROOT.GetCountry.GetNameNoFormatting] conquistou nos últimos anos.\n\nUm cavalheiro se levantou para falar em meio à discussão: \"Certamente o grupo [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] pode se responsabilizar por esse revés\"."
 korea_colonization.3.a: "Todos nós devemos carregar o fardo do fracasso da nossa empreitada."
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName] e o grupo [SCOPE.gsInterestGroup('relevant_ig').GetName] devem se responsabilizar por esse fracasso."
 modifier_peninsula_control_prestige_loss: "Controle em Declínio"
 modifier_peninsula_control_loyal_prominence_loss: "Fim da Proeminência"
 modifier_peninsula_control_approval_pol_str_loss: "Influência em Queda"
