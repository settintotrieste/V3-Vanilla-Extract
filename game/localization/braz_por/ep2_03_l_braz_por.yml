 korea_colinzation_2b_executive_tt: "Um [concept_executive] ganha #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_tt $modifier_peninsula_control_loyal_prominence$#! por #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! anos"
 korea_colinzation_2b_company_tt: "Uma [concept_company] ganha #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_company_bonus_tt $modifier_peninsula_control_company_bonus$#! por #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! anos"
 modifier_peninsula_control_loyal_prominence_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetDesc]"
 modifier_peninsula_control_company_bonus_tt: "[GetStaticModifier('modifier_peninsula_control_company_bonus').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_company_bonus').GetDesc]"
 korea_colinzation_3b_tt: "Alguém deve se responsabilizar por esse fracasso."
 korea_colinzation_3b_ig_leader_tt: "Uma [concept_leader] ganha #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_loss_tt $modifier_peninsula_control_loyal_prominence$#! por #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! anos"
 korea_colinzation_3b_ig_tt: "Um [concept_interest_group] ganha #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_approval_pol_str_loss_tt $modifier_peninsula_control_approval_pol_str_loss$#! por #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! anos"
