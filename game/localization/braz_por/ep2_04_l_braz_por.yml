 ep2_meiji.1.t: "Sonnō Jōi"
 ep2_meiji.1.d: "O fim do Sakoku gerou um sentimento de impotência contra a invasão estrangeira, minando a autoridade do clã [ROOT.GetCountry.GetRuler.GetLastName]. Os inimigos do xogunato se reuniram sob o jargão #italic Sonnō Jōi#!: \"Reverenciar o Imperador e expulsar os bárbaros\"."
 ep2_meiji.1.f: "No segundo andar de uma estalagem em Kyōto, longe de quaisquer janelas, uma dúzia de rōnin vestidos de preto se amontoava ao redor de uma mesa. Lá fora, a chuva caía com uma fúria que abafava os sons da rua. Sussurros coléricos passavam entre eles: queixas, depois denúncias, seguidas por um juramento solene e a sentença de morte de um intruso.\n\nLonge dali, em uma casa com vista para Iso, um homem em um quimono verde observava uma coluna de fumaça subir aos céus. As colinas projetavam sombras longas sobre as obras à beira-mar. À medida que o sol se aproximava do horizonte, o brilho das fornalhas abaixo tornava-se cada vez mais nítido. Além delas, refletidas na água, ele podia ver as luzes dos navios. Um dia, esperava ele, seus canhões os baniriam para além do horizonte."
 ep2_meiji.1.a: "Temos que nos adaptar às novas circunstâncias."
 ep2_meiji.2.t: "A Forma do Xogunato"
 ep2_meiji.2.d: "Os reformistas do xogunato estão divididos entre duas teorias de governança. A teoria de #italic Kōbu Gattai#! quer renovar a legitimidade de [GetLawType('law_bakufu').GetName] por meio da fusão com a corte imperial, enquanto a teoria de Deliberação Pública busca estabelecer um sistema parlamentar liderado pelo clã [SCOPE.sCharacter('shogun_scope').GetLastName]."
 ep2_meiji.2.f: "O anfitrião colocou uma bandeja de higashi sobre a mesa e serviu uma tigela de chá ralo para cada um de seus convidados. Três homens sentavam-se ao redor da mesa: o anfitrião e o primeiro convidado com os cabelos presos em chonmage, e o segundo de cabelos curtos. O vapor subia das tigelas à frente deles.\n\nO anfitrião dirigiu seu olhar ao homem de cabelos curtos e começou a falar.\n\n\"Eu o parabenizo pelo seu retorno, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]-#italic kun#!. Achei cada uma de suas cartas mais interessante que a anterior. Você nos contaria mais sobre o seu tempo entre os bárbaros?\""
 ep2_meiji.2.a: "O Bakufu deve ser renovado."
 ep2_meiji.2.b: "A deliberação pública é o caminho esclarecido."
 traditionalist_shogun_warning_tt: "@warning! [ROOT.GetCountry.GetRuler.GetCustom('BR_OA')U] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] com a ideologia [GetIdeology('ideology_traditionalist').GetName] não terá interesse em buscar um #b Governo Parlamentar#!"
 traditionalist_shogun_warning_present_tt: "O [concept_ruler] #b não#! tem a [concept_ideology] [GetIdeology('ideology_traditionalist').GetName]"
 ep2_meiji.3.t: "O Casamento Imperial"
 ep2_meiji.3.d: "O Imperador aceitou organizar um casamento entre [SCOPE.sCharacter('shogun_scope').GetFullName] e a Princesa [SCOPE.sCharacter('imperial_princess_scope').GetFullName]. A condição para isso é o repúdio do xogum ao tratado [SCOPE.sTreaty('relevant_treaty_scope').GetName] e a volta de uma política isolacionista."
 ep2_meiji.3.d2: "O Imperador aceitou organizar um casamento entre [SCOPE.sCharacter('shogun_scope').GetFullName] e a Princesa [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. A condição para isso é a expulsão dos estrangeiros pelo xogum e a volta de uma política isolacionista."
 ep2_meiji.3.f: "A procissão envolvia toda a Nakasendō. Um comboio de trinta mil trabalhadores, retentores e membros da casa da Princesa, guardado por um perímetro de soldados do Domínio de Owari, estendia-se da cidade de Iijima até a Estação de Shiojiri. No coração da procissão, a Princesa viajava em um palanquim de ouro e seda vermelha. Ao lado dela cavalgavam samurais de uma dúzia de domínios: [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] e [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')] e [SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')] e [SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')].\n\nDentro de seu palanquim, a Princesa olhava pela fresta entre as cortinas. Cidade após cidade passava, com as janelas fechadas e em silêncio. Ela teria os próximos trinta #italic ri#! para ponderar seu destino."
 ep2_meiji.3.a: "Pelo bem do país."
 has_broken_relevant_treaty_tt: "Quebrou [SCOPE.sTreaty('relevant_treaty_scope').GetName]"
