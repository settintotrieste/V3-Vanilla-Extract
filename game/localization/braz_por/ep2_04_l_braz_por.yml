 zaibatsu.1.t: "O Império Corporativo"
 zaibatsu.1.d: "A parceria duradoura entre o Estado [ROOT.GetCountry.GetAdjective] e o grupo [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] consolidou o poder dos conglomerados em [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Os políticos podem governar, mas os generais e executivos dominarão."
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting] olhava a disputa de sua cabine protegida. O adversário do seu pugilista favorito empurrou o campeão até a beirada do ringue de fibras de arroz, e [SCOPE.sCharacter('pm_scope').GetSheHe] teve dificuldades para impedir que seus punhos ficassem brancos. Ao lado do Primeiro-Ministro, com absoluta serenidade, estava [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting].\n\nO juiz apontou o leque, e a torcida ecoou dos assentos abaixo. Uma chuva de almofadas jogadas para o alto caiu no ringue. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting] se voltou para [SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting] e sorriu. Lá, do outro lado do ringue e gravado na parede, estava o #italic mon#! de [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]."
 zaibatsu.1.a: "Que [ROOT.GetCountry.GetCapital.GetCityHubName] se revele como um mar de luzes."
 zaibatsu.1.b: "Nossa cadeia de suprimentos sempre pode ser mais protegida."
 zaibatsu.2.t: "Sob Controle"
 zaibatsu.2.t_1: "A Mão Niveladora"
 zaibatsu.2.d: "Os esforços do gabinete de [SCOPE.sCharacter('pm_scope').GetLastName] limitaram a capacidade do grupo [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] de exercer controle sobre [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Os políticos governarão, e os executivos se concentrarão nos próprios lucros."
 zaibatsu.2.d_1: "As políticas de livre mercado do gabinete de [SCOPE.sCharacter('pm_scope').GetLastName] prejudicaram a rede de contratos militares e industriais essenciais para o grupo [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] conseguir controlar [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Os políticos governarão, e os executivos se concentrarão nos próprios lucros."
 zaibatsu.2.f: "Um grupo de executivos se infiltrou na sala de reuniões mais alta da sede de [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] foi a terceira pessoa a entrar, depois dos secretários. [SCOPE.sCharacter('name_a_scope').GetSheHe|U] sentou-se perto da porta e observou seus superiores passando. Um leve vapor saía da xícara de chá diante [SCOPE.sCharacter('name_a_scope').GetHerHis].\n\n[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting] entrou por último e olhou um empregado de cada vez. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] notou que havia uma expressão no olhar [SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis], algo que o Barão jamais havia demonstrado: exaustão. As sombras no rosto [SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis] nunca pareceram tão profundas e seus cabelos grisalhos jamais estiveram tão ralos."
 zaibatsu.2.a: "O poder da soberania é só nosso."
 zaibatsu.2.b: "O povo deve saber que não é possível comprar [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]."
