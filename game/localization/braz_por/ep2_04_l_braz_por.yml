 je_meiji_imperial_marriage: "O Casamento Imperial"
 je_meiji_imperial_marriage_reason: "Na busca pela unificação entre a corte imperial e o xogunato, o Xogum [SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] assegurou um casamento político com a Princesa Imperial [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. O consentimento do Imperador vem da premissa de expulsão dos estrangeiros de [GetGeographicRegion('geographic_region_home_islands').GetName] e da volta de uma política isolacionista.\n\nSe o xogum cumprir seus juramentos, o casamento ajudará muito a aproximar os governantes de direito e de fato."
 je_will_fail_tt: "O [concept_journal_entry] #b fracassará#!"
 je_has_timed_out_tt: "O [concept_journal_entry] #b expirou#!"
 ep2_meiji.4.t: "A Guerra [ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')]"
 ep2_meiji.4.d: "Alienados pela tomada de suas terras e títulos, [SCOPE.sCharacter('shogun_scope').GetCustom('BR_OA')] [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('shogun_scope').GetFullName] e seus retentores leais se rebelaram contra a corte imperial. [SCOPE.sCharacter('shogun_scope').GetSheHe|U] busca acabar com a volta do poder imperial e restaurar o Bakufu."
 ep2_meiji.4.f: "\"Seu criado [SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting], depois de muito considerar a situação atual desde o nono dia do mês passado, acredita que nenhum desses eventos nasce das verdadeiras intenções da corte imperial, mas sim das conspirações dos ministros traiçoeiros de [SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting]. Esse fato é sabido por todo o reino, particularmente em Edo, Nagasaki e nas províncias de Yashu e Sōshū, onde surgiram perturbações.\n\nComo esses atos são repudiados pelos céus e pelos homens, nós suplicamos que Sua Majestade emita um decreto de rendição desses ministros traiçoeiros. Caso essa súplica não seja atendida, não teremos escolha a não ser executá-los.\"" # Edited petition by Yoshinobu
 ep2_meiji.4.a: "Esse é o nosso desejo: eliminar o traidor e restaurar a paz." # Emperor Meiji's plausibly fraudulent imperial decree of 1867
 ep2_meiji.4.b: "O Imperador foi persuadido por ladrões."
 ep2_meiji.41.d: "Enfurecidos com os esforços do clã [SCOPE.sCharacter('shogun_scope').GetLastName] para se manter no poder, uma coalisão de domínios restauracionistas surgiu em protesto contra [SCOPE.sCharacter('shogun_scope').GetFullName]. Ela busca restaurar a supremacia política do Imperador sem a influência dos Tokugawa."
 ep2_meiji.41.d_1: "Enfurecida com o governo de [ROOT.GetCountry.GetCapital.GetCityHubName] por se recusar a expulsar os estrangeiros, uma coalisão de domínios alinhados ao Sonnō Jōi se rebelou. Ela quer depor os conselheiros ocidentalizados do Imperador e expulsar a influência estrangeira do Japão."
 ep2_meiji.41.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] estava no topo das muralhas do castelo, olhando para baixo. Diante de si, fileira após fileira de soldados de [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] saíam pelos portões. Alguns estavam modernizados, vestidos com os novos uniformes azul-escuros com capacetes cônicos. Outros mantinham suas roupas tradicionais: vermelhas, verdes, azuis. Aqueles com os novos uniformes foram colocados primeiro na coluna, recebendo olhares de aprovação do grupo de observadores estrangeiros que se posicionara vários metros à esquerda de [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]. Atrás deles vinham os samurais montados com seus mosquetes e, depois deles, a artilharia.\n\nNos arredores de [SCOPE.sState('revolter_state').GetCityHubName], aguardava a área de concentração, na qual encontrariam as forças de seus domínios aliados para marchar contra o exército do xogum. Longe dali, além daquela parede de espadas e baionetas, o imperador cativo esperava."
 ep2_meiji.41.f_1: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] estava no topo das muralhas do castelo, olhando para baixo. Diante de si, fileira após fileira de soldados de [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] saíam pelos portões. Alguns estavam modernizados, vestidos com os novos uniformes azul-escuros com capacetes cônicos. Outros mantinham suas roupas tradicionais: vermelhas, verdes, azuis. Aqueles com os novos uniformes foram colocados primeiro na coluna, e um arco-íris de sansaibaori seguia logo atrás. Os samurais montados com seus mosquetes vieram em seguida e a artilharia logo após eles.\n\nNos arredores de [SCOPE.sState('revolter_state').GetCityHubName], aguardava a área de concentração, na qual encontrariam as forças de seus domínios aliados para marchar contra o exército lealista. Longe dali, além daquela parede de espadas e baionetas, o imperador cativo esperava."
 ep2_meiji.41.a: "Esses fanáticos devem ser repelidos."
 ep2_meiji.41.b: "Sonnō jōi!"
 kinmon_civil_war_tt: "O país [ROOT.GetCountry.GetName] cairá em #r $concept_civil_war$#! entre o #b xogunato#! e a #b corte imperial#!"
 ep2_meiji.5.t: "Taisei Hōkan"
 ep2_meiji.5.d: "Diante da pressão crescente dos opositores da lei de [GetLawType('law_bakufu').GetName], [SCOPE.sCharacter('shogun_scope').GetFullName] pediu ao Imperador para devolver a autoridade de governo à corte imperial."
 ep2_meiji.5.f: "\"A menos que o poder esteja unido na corte imperial, as bases da nossa nação não vão se sustentar. Portanto, na atual conjuntura, devemos reformar os antigos costumes e devolver a administração à corte imperial.\n\nDepois de exaurir o conselho público do reino e buscar o julgamento final de Sua Majestade, eu acredito profundamente que, se todos os corações estiverem unidos a serviço da nação, nós poderemos proteger nossa pátria imperial juntos e nos equiparar aos países do mundo.\"\n\n—Tokugawa Yoshinobu, 1867"
 ep2_meiji.5.a: "Ele não tem embasamento algum."
 ep2_meiji.51.t: "A Sanção Imperial"
 ep2_meiji.51.d: "O Imperador emitiu uma resposta à petição de [SCOPE.sCharacter('shogun_scope').GetFullName] para devolver a autoridade de governo à corte imperial. O pedido do xogum foi aceito, e a supremacia política do Imperador foi restaurada."
 ep2_meiji.51.f: "\"O Imperador do Japão anuncia aos soberanos de todos os países estrangeiros e seus súditos que foi concedida ao xogum [SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] a permissão para voltar ao poder conforme seu desejo. Portanto, nós exerceremos a autoridade suprema em todos os assuntos internos e externos do país. Consequentemente, o título de Imperador deverá ser substituído pelo de Taikun, usado nos tratados firmados. Oficiais estão sendo indicados por nós e cuidarão dos assuntos externos. É desejável que os representantes das potências do tratado reconheçam essa declaração.\""
 ep2_meiji.51.a: "Uma sensação terrível."
 ep2_meiji.52.t: "A Sanção Imperial"
 ep2_meiji.52.d: "O Imperador emitiu uma resposta à petição de [SCOPE.sCharacter('shogun_scope').GetFullName] para devolver a autoridade de governo à corte imperial. Ele diz que o xogum mantém a confiança na corte e que a autoridade pode continuar com o xogunato."
 ep2_meiji.52.f: "O som de botas reverberava pelo Castelo [ROOT.GetCountry.GetCustom('japan_choshu_castle_name')]. Mensageiros e retentores entravam e saíam o dia todo, com versões novas e cada vez mais detalhadas das notícias da semana passada. [SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting] os recebeu pessoalmente e manteve o silêncio absoluto durante todas as reuniões. Seu semblante ficava cada vez mais pesado conforme ouvia as histórias: a procissão triunfante do xogum, Aizu ficando para proteger o Palácio Imperial...\n\nFora do palácio frontal, o sol se punha. De onde estava, [SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting] encarou os vinte retentores reunidos. \"O Domínio de Chōshū não se submeterá\", disse [SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe]. \"Entendam isso\".\n\nEle se levantou e saiu da sala."
 ep2_meiji.52.a: "As ramificações o envolveram."
 ep2_meiji.6.t: "O Decreto de Restauração"
 ep2_meiji.6.d: "Opositores do clã [SCOPE.sCharacter('shogun_scope').GetLastName] na corte persuadiram o Imperador a emitir um decreto que restaura formalmente o próprio poder dele. Esse decreto abole o xogunato e estabelece um governo que exclui [SCOPE.sCharacter('shogun_scope').GetFullName] de qualquer posição oficial."
 ep2_meiji.6.f: "\"[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] pediu a restauração da autoridade administrativa, que estava comissionada há tanto tempo, e agora deseja renunciar ao cargo de xogum. A proposta dele foi aceita. O país é ameaçado por perigos sem precedentes, e todos sabem que o finado imperador se ocupava muito com eles. Assim, foi decidido, pela sábia deliberação de Sua Majestade, que a base para restaurar o governo imperial e revigorar a dignidade nacional deve ser estabelecida.\n\nPortanto, os cargos de sesshō, kanpaku e xogum serão abolidos, e três cargos, de conselheiro-chefe, conselheiro do estado e conselheiro do palácio serão estabelecidos. Tudo será decidido por meio da deliberação sensata do povo, sem qualquer distinção entre oficiais civis e militares e entre nobres e as pessoas comuns\"." #- Modifier text of the Great Proclamation of the Restoration of Imperial Rule
 ep2_meiji.6.a: "Só na escuridão."
 ep2_meiji.7.t: "O Taikunato"
 ep2_meiji.7.d: "Com a Corte Imperial carecendo de experiência prática para governar, aliados do clã [SCOPE.sCharacter('shogun_scope').GetLastName] na corte persuadiram o Imperador a conceder a [SCOPE.sCharacter('shogun_scope').GetFullName] o título de Taikun e o cargo de liderança do gabinete imperial."
 ep2_meiji.7.f: "\"Conforme os vários Daimyō se reúnem, ocorre a deliberação. O foco do espírito da época é a deliberação pública, uma frase amplamente discutida, e está sendo inevitável seguir a opinião do povo. Portanto, peço encarecidamente que, conforme possível, essas discussões cheguem a um acordo e que medidas sejam tomadas para que o propósito da assembleia seja devidamente estabelecido.\n\nCaso a discordância aumente durante a deliberação e leve a um conflito, mesmo que acabe em vitória para a sua casa, será equivalente a irmãos brigando entre quatro paredes enquanto as nações estrangeiras pressionam do lado de fora.\"\n\n—Nishi Shūsuke, \"Pauta Inicial\""
 ep2_meiji.7.a: "Em uma posição segura de novo."
 ep2_meiji.8.t: "Corte e Xogunato"
 ep2_meiji.8.d: "Através do casamento com a Família Imperial e do cumprimento de seus votos ao imperador, [SCOPE.sCharacter('shogun_scope').GetFullName] aliviou as tensões entre a Corte e o Xogunato. O imperador pode continuar sua existência reclusa, seguro de que o xogum garantirá a paz duradoura."
 ep2_meiji.8.f: "Mesmo que ventos tempestuosos\nArrasem o país,\nEu esperarei\nA volta do sol no céu\nEm todo seu resplendor.\n\n—Imperador Kōmei"
 ep2_meiji.8.a: "A tempestade chegou ao fim."
 ep2_meiji.9.t: "Primeiro Entre Iguais"
 ep2_meiji.9.d: "Por meio da confiança e de manobras hábeis, [SCOPE.sCharacter('taikun_scope').GetFullName] assegurou tanto a restauração do Imperador quanto a preservação de seu clã. Os Taikuns [SCOPE.sCharacter('taikun_scope').GetLastName] reinarão como os primeiros entre os pares de um $JAP$ moderno."
 ep2_meiji.9.f: "O imperador já não se sentava mais atrás de um painel. Os ministros estavam à mesa diante dele e o Taikun à sua esquerda. Cada um trajava um novo uniforme da corte, com mangas e peitoral decorados com padrões detalhados, folheados a ouro. Medalhas tilintavam conforme eles se acomodavam nos assentos estranhos.\n\nO Taikun passou a última hora moderando a discussão, e o Imperador não disse uma palavra. Ouvir já era o bastante, e ele se dirigia a cada pessoa que falava por vez. No canto mais distante da sala, um ex-discípulo dos #italic sonnō jōi#! falou sobre a necessidade de uma missão à América."
 ep2_meiji.9.a: "O Xogum cai, o Taikun ascende."
 ep2_meiji.9.b: "O Imperador é o Filho do Paraíso, e os Tokugawa, seus instrumentos."
