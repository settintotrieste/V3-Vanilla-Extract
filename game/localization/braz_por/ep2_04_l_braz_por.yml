 ep2_meiji_pulse.3.t: "A Guerra de Shimonoseki"
 ep2_meiji_pulse.3.d: "[SCOPE.sCharacter('choshu_daimyo_scope').GetFullName], Daimyō do Domínio de Chōshū, mostrou estar de acordo com a ordem do imperador de expulsar os estrangeiros. [SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe|U] ordenou que a marinha atirasse em qualquer embarcação estrangeira que passasse pelo Estreito de Shimonoseki, o que causou um fogo cruzado com um navio de guerra [SCOPE.sCountry('relevant_gp').GetAdjective]."
 ep2_meiji_pulse.3.f: "Uma trovoada à luz do dia ressoou na encosta de Hinoyama, e Masatake olhou para o céu. Ele se deparou com uma nuvem branca.\n\n\"Veja!\", gritou Jiro. Uma mão invadiu o campo de visão dele, apontando para baixo. Um navio estava avançando pelo estreito a todo vapor, disparando os canhões contra algo que Masatake não conseguia ver. Lascas voaram do casco, mas o navio continuou. Acima de toda essa cena, outra nuvem se formava."
 ep2_meiji_pulse.3.a: "Os estrangeiros fazem o que não podemos."
 ep2_meiji_pulse.3.b: "Ajudar o domínio a chegar a um acordo."
 ep2_meiji_pulse.3.c: "Oferecer um porto aos ocidentais em troca de um acordo."
 treaty_name_shimonoseki_war_indemnity: "Indenização da Guerra de Shimonoseki"
 modifier_defeated_westerners: "Expedição Ocidental Derrotada"
