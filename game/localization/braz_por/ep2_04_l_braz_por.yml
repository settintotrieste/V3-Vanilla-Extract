 special_character_japanese_emperor_desc: "Este personagem é o Imperador atual do Japão, indispensável para os estabelecimentos religiosos e políticos japoneses."
 japan_monarchy.1.t1: "A Era Kaei"
 japan_monarchy.1.t2: "A Era Tenkyū"
 japan_monarchy.1.d1: "O Príncipe [SCOPE.sCharacter('emperor_scope').GetFirstName] assumiu o Trono do Crisântemo como Imperador do Japão. Sua ascensão marcou o início da Era Kaei, que significava felicidade eterna."
 japan_monarchy.1.d2: "O Príncipe [SCOPE.sCharacter('emperor_scope').GetFirstName] assumiu o Trono do Crisântemo como Imperador do Japão. Sua ascensão marcou o início da Era Tenkyū, que significava permanência divina."
 japan_monarchy.1.f: "Em algum lugar fora de vista, um músico deu o sinal. Duas moças da corte abriram as cortinas do trono. Lá estava o imperador, usando vestes escarlates decoradas com dragões brancos e verdes. A imponência ofuscou o assento, dando a impressão de que ele estava flutuando. Uma cortina de contas descia da coroa. As sombras que ela lançava ocultavam os olhos dele da visão geral.\n\nTecidos farfalhavam ao redor de [SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting], que curvou a cabeça. As pessoas presentes se prostraram em uma grande onda. [SCOPE.sCharacter('name_scope').GetSheHe|U] fez o mesmo, e a face sombreada do imperador desapareceu.\n\nDias depois, no caminho de volta para Edo, [SCOPE.sCharacter('name_scope').GetSheHe] tentou recordar o que viu, mas não conseguiu. [SCOPE.sCharacter('name_scope').GetSheHe|U] se lembrava da coroa, das cortinas e das caixas ao lado do imperador. Quanto ao homem em si, nada lhe vinha à mente."
 japan_monarchy.1.a: "Seus anos serão tão numerosos quanto os grãos de areia na praia."
 japan_monarchy.2.t: "A Era Meiji"
 japan_monarchy.2.d: "O Príncipe [SCOPE.sCharacter('emperor_scope').GetFirstName] assumiu o Trono do Crisântemo como Imperador do Japão. Sua ascensão marcou o início da Era [SCOPE.sCharacter('emperor_scope').GetFirstName], que significava a promessa de um governo esclarecido."
 japan_monarchy.2.f: "Um gongo soou e a cortina subiu. Por uma fração de segundo, o público viu o imperador, envolto em seda amarela ricamente decorada e com a face parcialmente ocultada. Havia uma caixa com verniz verde em um suporte ao lado dele, guardando a espada e a joia sagradas. Então o mestre de armas deu o sinal, e todos direcionaram os olhos ao chão. O arauto falou com uma foz firme e potente.\n\n\"Em tempos antigos, na era dos deuses, as bases do reino foram estabelecidas, e depois o imperador divino fundou a dinastia imperial em Kashihara. Desde então, a linhagem imperial continuou intacta. Seguindo os antigos costumes e a tradição de reinados passados, nós recebemos agora a divina sucessão e assumimos o Grande Trono Imperial\"." # Very heavily pared down excerpt of the rites at Meiji's enthronement
 japan_monarchy.2.a: "Seus anos serão tão numerosos quanto os grãos de areia na praia."
 japan_monarchy.3.t: "A Era Taishō"
 japan_monarchy.3.d: "O Príncipe [SCOPE.sCharacter('emperor_scope').GetFirstName] ascendeu ao Trono do Crisântemo como Imperador do Japão. Sua ascensão marcou o início da era [SCOPE.sCharacter('emperor_scope').GetFirstName], que significava a virtude da grande justiça."
 japan_monarchy.3.f: "A junção rangeu quando o homem passou pelo andaime. Yatarō segurou o mais firme que pôde. Quando os passos acabaram, ele firmou tudo no lugar com o martelo.\n\nYatarō ouvia sons parecidos em toda parte. Pelo canto dos olhos, ele conseguiu ver outra equipe erguendo as paredes de tábua preta da outra construção. Um feitor gritava instruções para um homem que carregava uma pilha frágil de palha.\n\nEm seis dias, o imperador atravessaria a passagem que ele estava construindo como parte de uma cerimônia única que culminaria na destruição dela. Yatarō não poderia participar. O máximo que poderia esperar era testemunhar o brilho refletido nas nuvens."
 japan_monarchy.3.a: "Seus anos serão tão numerosos quanto os grãos de areia na praia."
 japan_monarchy.4.t: "A Era Shōwa"
 japan_monarchy.4.d: "O Príncipe [SCOPE.sCharacter('emperor_scope').GetFirstName] assumiu o Trono do Crisântemo como Imperador do Japão. Sua ascensão marcou o início da Era [SCOPE.sCharacter('emperor_scope').GetFirstName], que significava a promessa de paz e harmonia esclarecidas."
 japan_monarchy.4.f: "Quatro gerações da família Takaishi se reuniram ao redor do rádio. A voz que saía dele parecia vir do fundo de um poço, marcada por estática. Giyō girou o botão para um lado, depois para o outro. Quando a voz saiu de novo, estava firme e forte.\n\n\"... Secretário-chefe do gabinete emitiu um rescrito imperial anunciando a nova era. Deste dia em diante, a era mudará para o primeiro ano de [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]...\".\n\nA mãe dele virou-se para encarar o jornal sobre a mesa da cozinha. \"Não de Kobun? Ele está falando a verdade?\".\n\nMurmúrios conflitantes preencheram o cômodo, e Giyō aumentou o volume do rádio. Não adiantou. Se houvesse mais alguma informação, ele teria que ler amanhã."
 japan_monarchy.4.a: "Seus anos serão tão numerosos quanto os grãos de areia na praia."
 japan_monarchy.5.t: "Um Imperador, Uma Era"
 japan_monarchy.5.d: "Com a supremacia política da corte imperial restaurada, o imperador promulgou um édito imperial que reformava o sistema de eras. Uma nova era será declarada com a ascensão de um novo imperador e terá a duração do governo dele."
 japan_monarchy.5.f: "#bold Édito Imperial#!\n\nO estabelecimento de uma nova era mediante o recebimento do mandato divino pelo soberano sagrado constitui o modelo exemplar de uma era esclarecida e o padrão para dez mil gerações. Eu herdei a grande linhagem e participei pessoalmente de inúmeros assuntos do estado e agora altero o nome da era para marcar um novo início com inúmeros súditos do reino. Conhecerão [ROOT.GetCountry.GetCustom('JAP_era_year_name')] como o primeiro ano de [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]. Deste dia em diante, o antigo sistema será reformado, estabelecendo o princípio de um nome de era por reinado como prática permanente." # Shortened 'One Emperor, One Era' edict - 今後年號ハ御一代一號ニ定メ慶應四年ヲ改テ明治元年ト爲ス及詔書
 japan_monarchy.5.a: "As autoridades implementarão isso."
 japan_monarchy.6.t: "A Morte do Daijō Tennō"
 japan_monarchy.6.d: "O imperador afastado que abdicou, pai do imperador atual, faleceu. [SCOPE.sCharacter('retired_emperor_scope').GetSheHe|U] é lembrado pelo esforço para restaurar o prestígio imperial e recebeu o nome póstumo de [SCOPE.sCharacter('retired_emperor_scope').GetFirstName]."
 japan_monarchy.6.f: "Tōhō mergulhou o pincel na tinta. A ponta passou para a página e formou os ideogramas de dia, ano e clima. Ele a moveu para a próxima coluna e parou.\n\nQuais palavras seriam adequadas? Como expressar da melhor maneira o significado do que aconteceu? Ele ouviu boatos sobre os grandes esforços do Imperador afastado para restaurar a corte e se lembrou do reinado dele, dos relatórios das cerimônias que reviveu. Então ele recebeu o emissário da corte e descobriu a verdade.\n\nO pincel tocou no papel. \"Recebi uma solicitação de jurisprudência quanto ao título do imperador. Consultei a genealogia imperial e dei o meu conselho...\"."
 japan_monarchy.6.a: "Os descendentes dele realizarão esse desejo?"
