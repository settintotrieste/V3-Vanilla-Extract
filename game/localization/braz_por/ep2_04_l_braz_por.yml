 ig_in_pro_country_lobby_tt: "O [concept_interest_group] está em um [concept_political_lobby] amigável"
 iwakura_mission.1.t: "A Missão ao Ocidente"
 iwakura_mission.1.d: "O governo elaborou uma lista com vários ministros e funcionários aptos para o cargo de Embaixador Extraordinário e Plenipotenciário. O candidato escolhido será enviado para liderar a expedição ao Ocidente por um período previsto de dez meses."
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting] parou diante do espelho, ajustando e reajustando sua gravata repetidamente. Já fazia algum tempo que ela chegara ao Japão, primeiro como uma moda, e depois por decreto estatal, mas ainda não parecia natural. [SCOPE.sCharacter('expedition_leader_1').GetSheHe|U] precisaria se conformar. Se seu acordo prosperasse, se o governo endossasse sua proposta, se ele viesse a acordar em Londres, Boston e Paris, o fim do dia não seria mais para descanso."
 iwakura_mission.1.a: "O assunto exige a atenção de [SCOPE.sCharacter('expedition_leader_1').GetFullName]."
 iwakura_mission.1.b: "Nomear [SCOPE.sCharacter('expedition_leader_2').GetFullName] para a função."
 iwakura_mission.1.c: "Podemos confiar em [SCOPE.sCharacter('expedition_leader_3').GetFullName]."
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName] poderia se beneficiar desta oportunidade."
 iwakura_mission.2.t: "O Relatório [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]"
 iwakura_mission.2.d: "Com o retorno da Missão [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] ao $JAP$, [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] e colegas embaixadores enviaram seus relatórios ao país [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Seus relatórios contêm observações sobre a sociedade industrial e recomendações para novas políticas de Estado."
 iwakura_mission.2.f: "\"Refletindo profundamente, é evidente que o sucesso das nações europeias e americanas provém da aplicação adequada de princípios. Aqueles que viajam pelo mundo observam que, entre a dezena de nações pesquisadas, as estruturas de governança podem diferir, mas todas direcionam sua força para a educação, o que as une sob um único estandarte. Assim, ao entrar em qualquer uma dessas terras, não há lugar sem escolas, e não há pessoa sem o espírito do iluminismo.\"\n\n— Tanaka Fujimaro"
 iwakura_mission.2.a: "O Ocidente nos forneceu uma janela para a modernidade."
 iwakura_mission.2.b: "Indústrias ao estilo [SCOPE.sCountry('iwakura_good_economy_country').GetAdjective] serão o futuro do Japão."
 iwakura_mission.2.c: "Há muito a se aprender com a política do povo [SCOPE.sCountry('iwakura_desired_law_country').GetAdjective]."
 iwakura_mission.2.e: "Uma reforma agrária inspirada no país [SCOPE.sCountry('iwakura_land_reform_law_country').GetName] revitalizaria o campo."
 iwakura_mission.4.t: "Golden Gate"
 iwakura_mission.4.d: "Após uma longa viagem pelo mar, a Missão [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] chegou ao país [SCOPE.sCountry('iwakura_mission_host').GetName]. A Missão planeja viajar por suas ferrovias até [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName], analisando as instituições e instalações industriais no caminho."
 iwakura_mission.4.f: "\"Ao amanhecer, a neblina marítima estava tão espessa que mal podíamos enxergar o que estava logo à nossa frente, e o navio parou, esperando o romper do dia. Assim que clareou, a névoa se dissipou gradualmente, e diante de nós surgiu a costa da Califórnia. No devido tempo, alcançamos o meio de dois promontórios rochosos, onde as montanhas de ambos os lados se erguiam altas; suas superfícies encontravam o mar, e a fumaça dos navios a vapor podia ser vista passando de um lado para o outro. Esta bela cena é o que chamam de Golden Gate.\n\nPor vinte e dois dias cruzamos o oceano e, finalmente, aqui no Leste, contemplamos montanhas e águas pela primeira vez. Enquanto olhávamos para isso, só escutávamos o som da alegria.\"\n\n— Kume Kunitake, #italic A Embaixada Iwakura, 1871-73#!"
 iwakura_mission.4.a: "O conhecimento de todo um continente está aberto a nós."
 iwakura_mission.4.b: "Os Estados Unidos são meramente a porta de entrada para a Europa."
 iwakura_mission.5.t: "O Ventre da Baleia"
 iwakura_mission.5.d: "Tendo atravessado do Pacífico ao Atlântico, a Missão [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] chegou ao país [SCOPE.sCountry('iwakura_mission_host').GetName]. A Missão busca estabelecer relações diplomáticas com o Governo [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetCustom('BR_DoDa')] [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle] e visitar os locais de fundação da Revolução Industrial."
 iwakura_mission.5.f: "\"À medida que os Estados Unidos prosperavam, o porto de Liverpool tornava-se cada vez mais próspero. Uma linha de docas foi construída no ancoradouro, estendendo-se por seis milhas ao longo da costa norte. Do lado do mar, aterros de pedra foram empilhados como muralhas de castelo e, dentro deles, docas foram escavadas em todas as direções. Todas as embarcações, entrando e saindo, chegam a estas docas e ali ancoram. Seus mastros assemelham-se a uma floresta de árvores densas, e o cordame assemelha-se a redes estendidas para secar em um vilarejo de pescadores. Estas, nos disseram, eram as maiores docas do mundo.\"\n\n— Kume Kunitake, #italic A Embaixada Iwakura, 1871-73#!"
 iwakura_mission.5.a: "Sigamos cada pista que nos for apresentada."
 iwakura_mission.5.b: "Dois meses são tempo suficiente para ver tudo de [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName]."
 iwakura_mission.6.t: "Através do Continente"
 iwakura_mission.6.d: "A Missão [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] chegou à Europa continental, começando pelo país [SCOPE.sCountry('iwakura_mission_host').GetName]. Nos próximos meses, a Missão pretende observar, avaliar e estabelecer relações com as inúmeras nações do Continente."
 iwakura_mission.6.f: "\"Esta tarde, visitamos um cemitério cujo nome não conseguimos perguntar. Ele fica na periferia leste de Paris, estendendo-se por uma área de quarenta acres. Fora uma única estrada larga, mal há espaço sobrando.\n\nHoje, houve um funeral para o que parecia ser uma família humilde. Uma pequena procissão acompanhava um caixão de madeira, que foi baixado à sepultura. Quando o padre terminou de recitar a oração, cada um dos presentes, chorando, lançou um punhado de terra. Embora todas as pessoas na procissão tivessem os olhos cheios de lágrimas, nenhuma chorou alto.\"\n\n— Kume Kunitake, #italic A Embaixada Iwakura, 1871-73#!"
 iwakura_mission.6.a: "Levaremos o tempo necessário para comparar e contrastar."
 iwakura_mission.6.b: "O cronograma exige uma visita rápida."
 iwakura_mission.8.t: "A Outra Metade"
 iwakura_mission.8.d: "A caminho do país [ROOT.GetCountry.GetName], a Missão [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] fez uma parada na colônia do país [SCOPE.sCountry('iwakura_mission_host').GetName], [SCOPE.sState('iwakura_mission_location').GetName]. A Missão passou vários dias observando tanto a sociedade colonial europeia quanto as práticas nativas de [GetReligion('theravada').GetNameNoIcon]."
 iwakura_mission.8.f: "\"Em nossa visita aqui, fomos guiados por um monge que chamava a nós de #italic danna#!, e ao templo de #italic garan#!. Ficamos impressionados que a origem sânscrita dessas palavras seja preservada até hoje. Ceilão é uma terra sagrada da prática de Buda, e o povo nativo ainda permanece devoto ao Budismo. Como a vida do povo já é simples, a vida dos monges é ainda mais. Suas refeições são escassas, seus eremitérios estão cobertos de mato, e tudo atingiu um estado de extrema humildade.\n\nEm comparação com os locais sagrados do cristianismo ou do islamismo, o contraste aqui é impressionante. Será porque essa religião se desfez dos ornamentos mundanos? Talvez. Mas também pode ser porque lhe falta o poder de prosperar.\n\n— Kume Kunitake, #italic A Embaixada Iwakura, 1871-73#!"
 iwakura_mission.8.a: "Poderia este destino ter recaído sobre nós?"
 iwakura_mission.9.t: "Porto de Yokohama"
 iwakura_mission.9.d: "Após passar meses no exterior e completar uma circunavegação total do globo, a Missão [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] retornou ao país [ROOT.GetCountry.GetName]. Eles trouxeram consigo compilações de dados, mercadorias estrangeiras e relatos em primeira mão de tecnologias e instituições políticas ocidentais."
 iwakura_mission.9.f: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] estava no convés do navio a vapor, olhando para o oeste. Ao longe, [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe] podia ver a imensidão do Monte Fuji, envolto em uma névoa matinal que se dissipara apenas pela metade. Um grupo de ocidentais, talvez mercadores ou viajantes do mundo recém-formado como [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe], se aglomerou ao redor da grade. Um alemão se sentou em um banco junto à porta da cabine, desenhando a cena em um bloco de esboços. [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] se perguntava se aquela era a primeira vez deles, ou se, assim como [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe], perdiam o fôlego sempre que viam aquele cenário.\n\nQuantas pessoas poderiam realmente dizer que fizeram o mesmo? Quantas pessoas cruzaram três oceanos e visitaram quatro continentes? \"Virão cada vez mais\", pensou. A ferrovia e o navio a vapor criariam cada vez mais pessoas como [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe], mas a história se lembraria de [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] como uma das primeiras."
 iwakura_mission.9.a: "Nosso lar é a visão mais bela de todas."
 je_iwakura_mission: "Restauração: A Missão de [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]"
 je_iwakura_mission_reason: "Como parte de suas medidas de modernização, o novo governo [ROOT.GetCountry.GetAdjective] enviou [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] e uma comitiva considerável de ministros e estudiosos em uma missão diplomática pelo mundo ocidental. A Missão [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] busca renegociar tratados desiguais com o Ocidente e realizar pesquisas sobre os fundamentos políticos e tecnológicos das Superpotências.\n\nPara cada #b mês#! que a Missão permanecer em um país, haverá uma chance de coletar descobertas sobre as Leis ou Tecnologias daquele país. Essas descobertas afetarão o relatório que a Missão emitirá em seu retorno, bem como a [concept_ideology] da liderança da expedição."
 iwakura_mission_leader_change_ideology_tt: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] mudará sua [concept_ideology] para corresponder às [Concept('concept_law', '$concept_laws$')] dos [Concept('concept_country', '$concept_countries$')] visitados"
