 shogunate.1.t: "A Indicação de [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Ieyoshi
 shogunate.1.d: "Como nova liderança do clã [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] recebeu do Imperador o título de xogum, mas muitos membros do grupo [SCOPE.gsInterestGroup('daimyo_scope').GetName] encaram essa nomeação com desprezo, pois ainda não viram uma demonstração de autoridade pessoal."
 shogunate.1.f: "Um arco-íris de Daimyō abriu caminho pelo Ō-hiroma. Sobre o palanque mais elevado estava o xogum, trajando preto e vermelho e com o decreto imperial em uma caixa à direita.\n\nUm a um, os nobres de vermelho, azul e violeta se curvaram diante dele, apresentando espadas e presentes de ouro. Nada foi dito pelo xogum ou por quem se prostrava. As pessoas de ranques inferiores eram proibidas de vê-lo e se aglomeravam do lado de fora. Um cântico ressoou do jardim."
 shogunate.1.a: "Goshōshin, goshōshin!"
 shogunate.2.t: "O Problema da Sucessão"
 shogunate.2.d: "A saúde frágil de [SCOPE.sCharacter('iesada_scope').GetFirstName], filho mais velho do [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle], gerou preocupação quanto à sua capacidade de realizar os deveres de [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle]. Outros Daimyō liderados por [SCOPE.sCharacter('armed_forces_leader').GetFullName] passaram a apoiar [SCOPE.sCharacter('yoshinobu_scope').GetFullName] como uma possível alternativa."
 shogunate.2.f: "O quarto de [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] estava vazio. Os painéis estavam fechados e a varanda, desocupada. [SCOPE.sCharacter('armed_forces_leader').GetSheHe|U] se sentou ao lado da cama, segurando uma folha de papel em branco. Seus olhos estavam fechados. Se um gato caminhasse pela sala ao lado, [SCOPE.sCharacter('armed_forces_leader').GetSheHe] certamente ouviria, mas ainda assim não tinha certeza de ninguém estar ouvindo. Em uma fase tão inicial, era melhor manter as ambições dentro da própria mente.\n\nA corte imperial veria essa questão da mesma maneira que [SCOPE.sCharacter('armed_forces_leader').GetSheHe]? [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] tinha motivos para acreditar que sim, mas até agora, essa era a pergunta mais fácil. Sua mente mudou de foco. Qual seria a melhor maneira de providenciar um decreto? Como garantir que não desapareceria?"
 shogunate.2.a: "O círculo interno de [GetLawType('law_bakufu').GetName] agirá como quiser."
 shogunate.2.b: "A situação requer uma liderança decisiva."
 shogunate.3.t: "A Indicação de [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iesada
 shogunate.3.d: "Como a nova liderança do clã [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] recebeu do imperador o título de xogum. Enfermo desde criança, o estado de saúdo do xogum já levou a uma corrida pela sucessão."
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "Goshōshin, goshōshin!"
 shogunate.4.t: "A Indicação de [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Yoshinobu
 shogunate.4.d: "Como a nova liderança do clã [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] recebeu do imperador o título de xogum. Apoiadores do novo xogum nos domínios reformistas têm grandes expectativas para o governo dele."
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "Goshōshin, goshōshin!"
 shogunate.5.t: "Hitotsubashi e Nanki"
 shogunate.5.d: "As facções que surgiram acerca da sucessão do xogum Ieyoshi se desentenderam de novo quanto a quem assumirá o cargo de [SCOPE.sCharacter('shogun_scope').GetFullName], que não tem filhos. A facção Hitotsubashi – de Daimyō externos e do grupo inferior [SCOPE.gsInterestGroup('armed_forces_ig').GetName] – apoia [SCOPE.sCharacter('yoshinobu_scope').GetFullName], enquanto a facção Nanki, do grupo interno [SCOPE.gsInterestGroup('daimyo_ig').GetName], apoia [SCOPE.sCharacter('iemochi_scope').GetFullName]."
 shogunate.5.f: "Com uma expressão vazia, o mensageiro contemplou o chão diante do homem no palanque. Seu pincel pairava sobre o papel.\n\n\"Uma mensagem para Yoshikatsu-sama\", disse o magistrado. \"Alguns membros da corte ficaram confortáveis com a especulação indecente sobre a saúde do xogum. Debatem como se ele não tivesse voz. Quero que me informe caso surja algum documento sobre essa suposição\"."
 shogunate.5.a: "O xogum deseja que [SCOPE.sCharacter('iemochi_scope').GetFirstName] governe."
 shogunate.5.b: "A corte imperial exige um sucessor experiente."
 shogunate.6.t: "A Indicação de [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iemochi
 shogunate.6.d: "Como a nova liderança do clã [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] recebeu do imperador o título de xogum. Embora seja jovem, o xogum já ganhou a reputação de ter um julgamento austero e meticuloso."
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "Goshōshin, goshōshin!"
 shogunate.6.a_regency: "[SCOPE.sCharacter('shogun_scope').GetSheHe|U] governará sob um guardião leal."
 shogunate.6.b_regency: "Comprometer-se com os Hitotsubashi e indicar [SCOPE.sCharacter('yoshinobu_scope').GetFirstName] como guardião."
 shogunate.7.t: "A Indicação de [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iesato
 shogunate.7.d: "Como a nova liderança do clã [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] recebeu do imperador o título de xogum. Por ter a mente global e aberta, espera-se que o xogum patrocine as facções reformistas de [GetLawType('law_bakufu').GetName]."
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "Goshōshin, goshōshin!"
 shogunate.8.t: "Verão Quente"
 shogunate.8.d: "O calor do verão fez a saúde de [SCOPE.sCharacter('shogun_scope').GetFullName], já com idade avançada, se deteriorar rapidamente. Agora de cama, [SCOPE.sCharacter('shogun_scope').GetCustom('BR_OA')] [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] deve travar uma última batalha contra seu coração enfraquecido."
 shogunate.8.f: "Os assistentes do xogum moveram a cama dele para perto da janela, esperando que a brisa refrescante do mar complementasse os leques. Havia um baú de gelo aberto na base da cama e um pano úmido sobre a testa dele.\n\nHoje não havia vento. O ar se distorcia sob o sol poente. Envolvente e impiedoso. Ele não conseguia mais distinguir o formato das ondas abaixo."
 shogunate.8.a: "Esse é o fim."
 shogunate.8.b: "Providenciar tratamentos holandeses."
