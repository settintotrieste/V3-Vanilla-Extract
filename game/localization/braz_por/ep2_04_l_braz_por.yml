 ep2_meiji_pulse.1.t: "O Direito de Atacar"
 ep2_meiji_pulse.1.d: "Enquanto viajava por [SCOPE.sState('relevant_treaty_port_state').GetName], um comerciante [SCOPE.sCountry('relevant_gp').GetAdjective] foi morto pela comitiva de [SCOPE.sCharacter('daimyo_scope').GetFullName] por se recusar a descer do cavalo. O Daimyō de [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] reafirmou a legalidade do assassinato, citando o direito de atacar qualquer pessoa comum que o desrespeite."
 ep2_meiji_pulse.1.f: "Os estrangeiros quebraram as fileiras do esquadrão de mosqueteiros, e os gritos vieram de todos os lados. Notando os homens armados ao redor, o estrangeiro na liderança puxou as rédeas para o lado, fazendo o cavalo se virar tão rápido a ponto de quase derrubar um dos mosqueteiros da própria montaria. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] sacou a espada, e seus companheiros próximos fizeram o mesmo.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] deu o primeiro golpe, rasgando a lateral do intruso. Ele gritou e puxou as rédeas mais uma vez. Não adiantou. O mosqueteiro mais próximo sacou a própria espada e atacou. Um arco vermelho se formou no ar como uma nuvem."
 ep2_meiji_pulse.1.a: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] só quer nos causar problemas."
 ep2_meiji_pulse.11.t: "A Situação de [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]"
 ep2_meiji_pulse.11.d: "Enquanto negociava no país [SCOPE.sCountry('japan_scope').GetName], um comerciante [ROOT.GetCountry.GetAdjectiveNoFlag] chamado [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] foi morto pelo lorde local [SCOPE.sCharacter('daimyo_scope').GetFullName], que se justificou usando a lei de sua terra e se recusou a pagar qualquer compensação pelo crime."
 ep2_meiji_pulse.11.f: "#b Editorial#!\n\nNa atual circunstância, insistimos que o país [ROOT.GetCountry.GetNameNoFormatting] não tem alternativa além de se preparar para uma grande guerra ou se despedir do Japão. Abandonar o ponto de apoio que conquistou lá não será uma opção, então podemos nos preparar para um conflito entre os dois impérios. Muitos [SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')] não gostam dessa ideia, mas [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] de [ROOT.GetCountry.GetCapital.GetCityHubName] não julga ser inevitável e sim justificável, baseando-se apenas no fato de os japoneses se recusarem a punir os assassinos de [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]... (#italic continua na p. 2#!)" #largely copied from The Anglo-Japanese War, New York Times, 1863
 ep2_meiji_pulse.11.a: "#italic Alguém#! deve pagar. Levar essa questão aos magnatas."
 ep2_meiji_pulse.11.b: "Nós queremos mesmo nos envolver mais com o Oriente?"
 modifier_namamugi_incident_prestige_loss: "Assassinato do Comerciante Tolerado"
 castle_yamaguchi: "Yamaguchi"
 castle_hagi: "Hagi"
 ep2_meiji_pulse.2.t: "O Bombardeio de [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]"
 ep2_meiji_pulse.2.d: "Em retaliação à falta de indenização por parte do Domínio de [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] pela morte de [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting], embarcações do país [SCOPE.sCountry('relevant_gp').GetName] iniciaram um duelo de artilharia de vários dias contra as defesas costeiras de [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]."
 ep2_meiji_pulse.2.f: "A baía estava nublada pelo fogo dos canhões, e [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] estava em chamas. Cruzando as águas, um dos navios estrangeiros disparava foguetes contra as fundições no norte da cidade. A cada disparo, um brilho vermelho infernal sufocava a luz pálida do sol poente.\n\nO último canhão operacional na bateria de [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] rugiu. Em boas condições, haveria uma chance mínima de acerto, mas naquele momento não. A bala atingiu um local distante do terceiro navio na coluna estrangeira, enviando um enorme jato de água para o ar. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] agarrou sua vareta e correu para atender à arma. Em algum lugar atrás da muralha traseira, os homens feridos pela última salva ainda gritavam. De alguma forma, apesar do zumbido em seus ouvidos, [SCOPE.sCharacter('name_a_scope').GetSheHe] ainda podia ouvi-los."
 ep2_meiji_pulse.2.a: "Um preço alto pela imprudência."
