 je_meiji_restoration_imperial_marriage_desc: "O projeto de #b Kōbu Gattai#! exige uma união do tipo mais literal, um casamento político entre o atual $RULER_TITLE_SHOGUN$ e uma Princesa Imperial. Para realizar esta união, o $RULER_TITLE_SHOGUN$ deve estar preparado para cumprir as condições substanciais estabelecidas pela Corte Imperial."
