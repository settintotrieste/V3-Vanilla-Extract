 ep2_meiji_pulse.4.t: "Embaixada do País [SCOPE.sCountry('relevant_gp').GetName] em Chamas"
 ep2_meiji_pulse.4.d: "Samurais #italic Sonnō Jōi#! do Domínio de [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] atacaram a embaixada do país [SCOPE.sCountry('relevant_gp').GetName] ainda em obras em [SCOPE.sState('edo_state').GetCityHubName]. O que seria a primeira construção em estilo ocidental da cidade foi totalmente queimada, e não há sinal dos criminosos."
 ep2_meiji_pulse.4.f: "Dois homens de capuz e máscara montaram acampamento no topo da colina com vista para o que seria a embaixada. A estrutura, agora escurecida, ainda emitia um brilho laranja. Com o fim de todo o combustível acessível, as chamas lutavam para sobreviver em meio às vigas internas densas.\n\nO brilho começou a desaparecer, mas os dois homens permaneceram. Um deles falou em voz baixa, encarando o pilar de fumaça.\n\n\"Não seria lindo se as cinzas caíssem sobre nós como a neve?\"."
 ep2_meiji_pulse.4.a: "[SCOPE.sState('edo_state').GetCityHubName] se tornou impossível de governar."
 ep2_meiji_pulse.4.b: "Proibir que [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] empunhe armas na cidade."
 shimonoseki_indemnity_tt: "O país [ROOT.GetCountry.GetName] pagará uma indenização de @money!#v 3 milhões#! durante #v 10 anos#! para o país [SCOPE.sCountry('relevant_gp').GetName]"
 shimonoseki_indemnity_port_tt: "A cidade de $HUB_NAME_STATE_KANSAI_port_japanese$ em [GetStateRegion('STATE_KANSAI').GetName] será aberta como um [concept_treaty_port] [SCOPE.sCountry('relevant_gp').GetAdjective]"
 modifier_ungovernable_capital: "Admitiu a Incapacidade de Governar"
 ep2_meiji_pulse.5.t: "Uma Vingança Sangrenta"
 ep2_meiji_pulse.5.d: "O ministro-chefe do xogunato, [SCOPE.sCharacter('tairo_scope').GetFullName], foi assassinado no portão do Castelo de Edo por ronins dos Domínios de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] e [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]. O manifesto deixado pelos assassinos mostra os princípios de #italic Sonnō Jōi#!, condenando as concessões do ministro-chefe aos estrangeiros."
 ep2_meiji_pulse.5.f: "Chuzaburo observou Gorokuro avançando à frente da procissão e um dos guardas de [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] se movendo para interceptá-lo. Gorokuro não deu tempo para a reação. Ele sacou a espada e atacou. Um grande arco de sangue jorrou do rosto cortado do homem de [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')], e os companheiros dele avançaram para vingá-lo.\n\nChuzaburo deixou o casaco cair e sacou a arma. Ele mirou no lado exposto do palanquim e apertou o gatilho. O estrondo do tiro interrompeu o som das lâminas e dos gritos, depois veio outro. Um dos guardas apareceu para enfrentá-lo, e Jizaemon, o ronin de [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], brandiu a espada em direção ao torso dele. Além da dupla em batalha, Chuzaburo conseguia ver um rio rubro escorrendo pelas portas do palanquim e manchando a rua coberta de neve. Ele sacou a wakizashi e correu em direção à cena."
 ep2_meiji_pulse.5.a: "Os samurais voltam a brandir as lâminas."
 modifier_tairo_assassinated: "Tairō Assassinado"
 ep2_meiji_pulse.6.t: "O Incidente de Ikedaya"
 ep2_meiji_pulse.6.d: "Guiada pelas informações obtidas com a tortura de um militante do [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName], a [GetLawType('law_shinsengumi').GetName] lançou um ataque contra um grupo de supostos conspiradores no Hotel Ikedaya de [SCOPE.sState('kyoto_state').GetName]. O ataque se transformou em uma batalha feroz de espadas dentro e fora do local."
 ep2_meiji_pulse.6.f: "Otaka se agarrou ao corrimão conforme a Shinsengumi entrava com tudo pela porta. Ele conseguia ver as manchas de sangue nas mangas do #italic haori#! azul-claro deles, algo preto sobre o branco na luz fraca. Ele ergueu a espada e assumiu uma posição de defesa.\n\nDois se separaram do resto e, lado a lado, avançaram pela escada que ele protegia. Ele brandiu a espada e sentiu o bloqueio. Faíscas voaram com o impacto. O segundo homem estava golpeando. Ele deu um passo para trás e girou o pulso para...\n\nHouve um clarão de aço iluminado pelo fogo, então algo frio atingiu seu peito."
 ep2_meiji_pulse.6.a: "Recompensar a Shinsengumi pela iniciativa."
 ep2_meiji_pulse.6.b: "Essa brutalidade só estimula a retaliação."
 modifier_shinsengumi_meddling: "Shinsengumi Desenfreada"
 modifier_shinsengumi_crackdown: "Repressão da Shinsengumi"
 modifier_refrained_from_crackdowns: "Shinsengumi Reprimida"
 sufficient_pressure_from_sonno_joi_tt: "O [concept_activism] de [SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')] está acima de @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!)"
 ep2_meiji_pulse.7.t: "O Portão Proibido"
 ep2_meiji_pulse.7.d: "Soldados do Domínio de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] aliado ao [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] tentaram invadir o palácio imperial em [SCOPE.sState('kyoto_state').GetName] e restaurar o Imperador à força. Eles enfrentam a oposição de soldados dos Domínios de [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] e Aizu."
 ep2_meiji_pulse.7.f: "O Portão Hamaguri estava tomado pela fumaça das armas. Ao redor deles, Kyōto reluzia.\n\nOs soldados de Aizu se concentravam ao longo da parede, soltando rajadas de fogo de mosquetes que se espalhava pela estrada e pelos chassis dos canhões de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]. Em intervalos curtos, os projéteis acertavam a carne, causando gritos que abafavam brevemente os estalos das armas de fogo. Kōzō se recostou na roda de um canhão, tentando desobstruir o mosquete. A apenas um #italic ken#! de distância, o líder do esquadrão dele estava de barriga no chão, sem braços e sem pernas. De algum modo, ele ainda estava agonizando."
 ep2_meiji_pulse.7.a: "Os Domínios de [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] e Aizu conseguem impedir os agressores."
 ep2_meiji_pulse.7.b: "O palácio imperial fica sob o controle de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]."
 coup_resistance_below_daimyo_coup_strength_tt: "A [concept_coup_resistance] do país [ROOT.GetCountry.GetName] ([SCOPE.ScriptValue('country_coup_resistance')|v2]) é menor que a [concept_coup_strength] de [SCOPE.sCharacter('daimyo_1_scope').GetFullName] ([SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2])"
 ep2_meiji_pulse.8.t: "A Expedição de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]"
 ep2_meiji_pulse.8.d: "Como retaliação pelo ataque de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] ao palácio imperial, o xogum enviou uma expedição punitiva para expulsar a facção #italic Sonnō Jōi#! do domínio. Conselheiros simpatizantes de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] sugeriram um plano para assegurar a paz em troca do seppuku dos culpados."
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting], Daimyō de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], parou na varanda do castelo, contemplando a vista. Ao longe, o céu estava manchado de fumaça: as fogueiras dos acampamentos do exército que se aproximava.\n\n\"O xogum exige o seppuku dos três retentores sêniores\", disse o retentor. \"A decapitação dos quatro oficiais. O exílio dos cinco ministros\".\n\n[SCOPE.sCharacter('daimyo_1_scope').GetFirstNameNoFormatting] olhou para as fogueiras. Havia, no mínimo, centenas. O horizonte, antes azul, havia se tornado algo doentio. \"Finalmente\", ele disse.\n\n\"... o Domínio de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] se renderá\"."
 ep2_meiji_pulse.8.a: "Se puderem ser derrotados sem uma luta, que assim seja."
 ep2_meiji_pulse.8.b: "O domínio deve ser purificado de cima para baixo."
 modifier_daimyo_house_arrest: "Daimyō Confinado"
 modifier_daimyo_executed: "Daimyō Desalojado"
 ep2_meiji_pulse.9.t: "A Ordem para Expulsar Bárbaros"
 ep2_meiji_pulse.9.d: "Irritado com os tratados forçados no país [ROOT.GetCountry.GetName] pelas potências ocidentais, o Imperador ignorou o xogum e emitiu um édito para expulsar os estrangeiros do solo [ROOT.GetCountry.GetAdjectiveNoFormatting]. Militantes do [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] se juntaram à causa do Imperador."
 ep2_meiji_pulse.9.f: "O retentor ficou ao lado de um dos canhões e olhou para o estreito. A esta hora, as embarcações que passavam estavam contornadas pelo sol poente. Do outro lado, samurais inferiores do Domínio de Chōshū se ocupavam com buchas e sacas de pólvora preta.\n\nEnquanto contemplava o formato de Hinoyama e a cidade de Shimonoseki abaixo, um trecho do édito lhe ocorreu. \"Mesmo que a terra fosse reduzida a cinzas\", dizia, \"não permitiremos a abertura dos portos para o comércio\".\n\nEra justificado? Ele permitiria que essa encosta verdejante e suave fosse carbonizada, que os campos de flores ardessem, que seu lar fosse destruído? \"Sim\", ele pensou. Sem hesitação."
 ep2_meiji_pulse.9.a: "O xogum deve viajar para Kyōto a fim de debater isso."
 ep2_meiji_pulse.9.b: "Essa ordem é fraudulenta e deve ser suprimida."
