l_braz_por:
 japan_politics.1.t: "Aprendizado Prático"
 japan_politics.1.d: "A abertura do país [ROOT.GetCountry.GetName] deixou boa parte da escola de Aprendizado Holandês antiquada. Novas ideias começaram a circular entre a comunidade intelectual do povo [ROOT.GetCountry.GetAdjectiveNoFormatting], como a pioneira escola de \"aprendizado prático\"."
 japan_politics.1.f: "\"O importante é que todos regulem a própria conduta de acordo com os princípios de humanidade, estudem com afinco para obter um vasto conhecimento e desenvolvam habilidades adequadas à nação. Assim, o governo poderá administrar mais facilmente, o povo aceitará isso de bom grado e cada pessoa achará o próprio lugar e ajudará a preservar a paz da nação. Esse deve ser o único objetivo.\"\n\n— Fukuzawa Yūkichi, \"Um Incentivo do Aprendizado\"" # Translated by Eiichi Kiyooka
 japan_politics.1.a: "Riqueza por meio do aprendizado."
 japan_politics.2.t: "As Grandes Casas"
 japan_politics.2.d: "Com a industrialização do país [ROOT.GetCountry.GetName], o grupo [SCOPE.gsInterestGroup('industrialists_ig').GetName] se aventurou na economia manufatureira. Aproveitando a condição financeira e as conexões com o Estado, ele conseguiu concentrar a maior parte da base industrial sob o próprio controle."
 japan_politics.2.f: "Da sacada, o ministro das finanças observava os corretores fazendo as ofertas. Nos dias do câmbio de arroz, o fim da negociação era sinalizado por um homem jogando um balde d'água na multidão.\n\nAgora, era um homem com um martelo na mão e os olhos fixos no relógio. Perto da mesa dele, quase engolida por um mar de corretores tentando comprar títulos com juros de 7%, ele via alguém assinando um contrato, segurando fortemente um título com a boca. A cacofonia era ensurdecedora, compras e vendas se mesclando em algo que parecia ondas batendo nas rochas.\n\nO relógio soou, e o homem à mesa bateu o martelo em um disco de bronze. Gritos indignados reverberaram na multidão, e o som de acordos de última hora só ficava mais alto. Resmungando, ele se agachou sob a mesa e pegou o balde."
 japan_politics.2.a: "Agora os banqueiros vão dominar."
 japan_politics.3.t: "O Cidadão Comum"
 japan_politics.3.d: "A erosão do sistema de classes do período Edo deu lugar a uma sociedade civil baseada na nacionalidade comum. Aqueles antes considerados parte do grupo [SCOPE.gsInterestGroup('pb_ig').GetName] passaram a se enxergar, acima de tudo, como cidadãos patriotas."
 japan_politics.3.f: "Shizo virava a cabeça de um lado para outro lentamente, avaliando o novo corte de cabelo no espelho de bronze. Ele nunca havia cortado tão curto, sumindo com o coque que existia desde que conseguia se lembrar. As pontas dos cabelos recém-cortados pareciam ásperas, e ele não parava de tocá-las.\n\nEle sacudiu a cabeça abruptamente, e as mechas balançaram de um jeito que ele nunca havia sentido. Parecia um traje novo, com um colarinho alto que irritava seu pescoço. Desconfortável, mas benéfico. Os novos estilos eram uma afirmação e atraíam as pessoas para o seu estabelecimento. O negócio dele era civilizado, e ele era um contribuinte, um guarda, um homem nacional civilizado."
 japan_politics.3.a: "A força da nação é a paz dos cidadãos."
