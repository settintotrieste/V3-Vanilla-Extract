 shogunate_strategy_title_decide_loc: "Decidir a Estratégia de Reforma"
 shogunate_strategy_title_revise_loc: "Revisar a Estratégia de Reforma"
 shogunate_strategy_title_decide_desc_loc: "Para o poder de Tokugawa sobreviver, o xogunato deve reformar, e isso pode acontecer de duas maneiras: o xogum pode tentar renovar a legitimidade do Bakufu por meio da unificação com a corte imperial, ou ele pode buscar restaurar o Imperador de uma maneira controlada para se tornar a liderança do governo parlamentar."
 shogunate_strategy_title_revise_desc_loc: "A estratégia de reforma atual do xogum não é necessariamente vantajosa. A abordagem de mudança gerará um custo, mas é melhor não seguir um rumo fracassado."
 je_meiji_restoration_proclaim_imperial_restoration: "Petição pela Restauração Imperial"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "O imperador continua sendo o soberano do Japão. Sem a sanção imperial, o xogum é apenas o daimyō mais poderoso dentre centenas deles. A sobrevivência ou a queda do xogunato dependerá da vontade da corte imperial."
 imperial_restoration_kobu_gattai_loc: "Para que a crise acabe, deve haver uma união entre o xogunato e a corte. Os Daimyō devem acreditar que as ordens do xogum têm o comando imperial e que ele tem a total confiança da corte. Para alcançar esse objetivo, o xogum deve se colocar em uma posição vulnerável e confiar no Imperador para voltar a ter autoridade.\n\nEsse plano é fatídico: se a corte imperial não estiver disposta a cooperar, o clã Tokugawa ficará sozinho em meio à oposição vingativa."
 imperial_restoration_kogi_yoron_loc: "Para que a crise acabe, o imperador deve governar. Para o poder dos Tokugawa sobreviver à restauração, o xogum deve garantir que aconteça como o imperador quer. A última etapa das reformas do xogum deve ser a devolução dos poderes administrativos ao imperador e estabelecer uma nova função para seu próprio clã em um governo imperial reformado.\n\nEsse plano é fatídico: se a corte imperial não estiver disposta a cooperar, o clã Tokugawa ficará sozinho em meio à oposição vingativa."
