 # Zaibatsu
 je_zaibatsu: "O Império Corporativo"
 je_zaibatsu_reason: "A rápida industrialização do país [ROOT.GetCountry.GetName] deixou grande parte da economia sob a alçada do [concept_zaibatsu]. Lucrando muito por meio do envolvimento com as instituições estaduais, essas empresas se tornaram núcleos vitais na estrutura militar e industrial do #v $JAP$#!.\n\nA natureza concentrada da capital do país [ROOT.GetCountry.GetNameNoFormatting] o transformou em um competidor internacional, mas o preço é depositar um poder político cada vez maior nas mãos do Zaibatsu e dos patronos militares.[SCOPE.GetRootScope.GetCountry.GetCustom('zaibatsu_democracy_snippet')]\n$ZAIBATSU_LIST_HEADER$$ZAIBATSU_LIST_CONTENT$"
 je_zaibatsu_complete_header: "Para #b consolidar#! o Zaibatsu:\n"
 je_zaibatsu_on_complete_header: "Ao #b consolidar#! o Zaibatsu:\n$EFFECT$"
 je_zaibatsu_fail_header: "Para #b restringir#! o Zaibatsu:\n"
 je_zaibatsu_on_fail_header: "Ao #b restringir#! o Zaibatsu:\n$EFFECT$"
 zaibatsu_democracy_info: "\n\nEnquanto este [concept_journal_entry] estiver ativo, a [concept_electoral_confidence] diminuirá em #v 0,5%#! por mês"
 two_more_more_company_slots_tt: "Pode estabelecer mais de [SCOPE.ScriptValue('je_zaibatsu_company_slots_threshold')|v0] [Concept('concept_company', '$concept_companies$')]"
 glossary_zaibatsu: "Um #b #italic Zaibatsu#!#! é um conglomerado financeiro e industrial integrado verticalmente e de posse familiar.\n\nA organização de um zaibatsu tradicional envolve uma holding e um banco, e detém participações de posse em várias companhias subsidiárias, geralmente industriais. O zaibatsu surgiu de conglomerados comerciais familiares do antigo período Edo, que se aproveitaram da própria riqueza e dos laços com o Estado para consolidar o controle da maior parte da base industrial do Japão."
 country_levels_owned_by_zaibatsu_100_tt: "Mais de [SCOPE.ScriptValue('je_zaibatsu_possible_levels_threshold')|v0] [Concept('concept_building_level', '$concept_building_levels$')] pertencem ao [concept_zaibatsu] (atualmente [SCOPE.ScriptValue('country_levels_owned_by_zaibatsu')|v0])"
