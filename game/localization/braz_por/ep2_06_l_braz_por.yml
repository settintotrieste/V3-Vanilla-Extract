l_braz_por:
 japan_earthquakes.1.t: "Grandes Terremotos de [ROOT.GetCountry.GetCustom('JAP_era_name')]"
 japan_earthquakes.1.d: "Ao longo de quatro dias, três terremotos distantes da costa causaram dano em uma área extensa, e as ondas subsequentes aumentaram ainda mais o impacto nas áreas litorâneas."
 japan_earthquakes.1.f: "Em pouquíssimo tempo, o vilarejo todo notou o fenômeno. Aparentemente, ninguém havia sentido a movimentação prévia do chão, mas todos ficaram claramente chocados com o movimento da água. Eles corriam para a praia e além dela para observar. Nenhum homem vivo havia testemunhado essa vazante na costa. Coisas jamais vistas surgiam; espaços desconhecidos na areia estriada e fendas de rochas repletas de algas eram expostos enquanto Hamaguchi contemplava. E nenhuma pessoa abaixo parecia imaginar o que aquela vazante monstruosa significava.\n\n—Lafcadio Hearn, #italic Um Deus Vivo#!"
 japan_earthquakes.1.a: "Solicitar a assistência do Daimyō vizinho."
 japan_earthquakes.1.b: "Deixar os governantes locais lidarem com os esforços de apoio."
 earthquake_assisting_daimyo: "Ajuda do Daimyō Vizinho"
 earthquake_affected_daimyo: "Consequências do Terremoto"
 japan_earthquakes.2.t: "Terremoto de [ROOT.GetCountry.GetCustom('JAP_era_name')] [SCOPE.sState('japan_earthquake_state').GetCityHubName]"
 japan_earthquakes.2.d: "Um grande terremoto atingiu a região perto da costa de [SCOPE.sState('japan_earthquake_state').GetName], causando danos extensos à cidade de [SCOPE.sState('japan_earthquake_state').GetCityHubName] e seu castelo."
 japan_earthquakes.2.f: "As figuras do grande bagre Namazu, que começaram a ficar populares depois do terremoto, pareciam remeter às histórias tradicionais. A criatura aparecia sendo dominada pelos deuses para que não causasse mais terremotos.\n\nMas, com o tempo, as representações evoluíram. Uma imagem mostrava Namazu rasgando a própria barriga e soltando moedas. Outra mostrava construtores bebendo junto com ela. Uma veia satírica transpareceu na arte, sugerindo que, apesar do desastre causado pela fera, talvez ela também estivesse corrigindo alguma coisa."
 japan_earthquakes.2.a: "Nossos vassalos em [SCOPE.sState('japan_earthquake_state').GetCityHubName] precisam de ajuda!"
 japan_earthquakes.2.b: "A riqueza deve ir para aqueles que podem reconstruir."
 earthquake_vassal_support: "Apoiando os Vassalos"
 earthquake_rebuilding_focus: "Reconstruindo Após o Terremoto"
 earthquake_rebuilding_redistribution: "Retificação Mundial"
 japan_earthquakes.3.t: "Terremoto de Mino-Owari"
 japan_earthquakes.3.d: "Um terremoto intenso atingiu o coração do país [ROOT.GetCountry.GetName], matando milhares de pessoas e criando falhas anormalmente grandes pela terra."
 japan_earthquakes.3.f: "\"A reação dos seres humanos sempre foi enxergar desastres como crimes, geralmente se perguntando 'quem' e assim dando origem aos monstros e demônios mitológicos que dizem ser os responsáveis por um terremoto.\n\nO sismólogo moderno deve rejeitar a superstição, mas ironicamente acaba na função de detetive que sai investigando a cena de um crime. Quais objetos caíram? Como caíram? Todas essas perguntas não buscam 'quem', mas sim o 'como' e o 'por quê'.\""
 japan_earthquakes.3.a: "Convidar acadêmicos estrangeiros para estudar essas falhas."
 japan_earthquakes.3.b: "Usar esse conhecimento para construir mais observatórios meteorológicos."
 japan_earthquakes.3.c: "Preparar-se para possíveis abalos secundários."
 meteorological_observatories: "Observatórios Meteorológicos"
 meteorological_observatories_cost: "$meteorological_observatories$"
 earthquake_bracing_for_aftershocks: "Preparando-se para Abalos Secundários"
 japan_earthquakes.4.t: "Terremoto de Sanriku"
 japan_earthquakes.4.d: "Uma onda gigantesca atingiu [SCOPE.sState('japan_earthquake_state').GetName], causada por um terremoto na costa de Sanriku. Depois do impacto devastador, sugeriram a construção de monumentos para alertar sobre futuros maremotos."
 japan_earthquakes.4.f: "\"Erguer monumentos aos mortos não é suficiente. Os vivos também não precisam de lembretes da calamidade que os afetou. Qualquer pessoa que veja uma mensagem na pedra saberá que os ancestrais estavam dizendo algo que não deve ser esquecido. Esses monumentos são para aqueles que ainda não nasceram.\""
 japan_earthquakes.4.a: "[SCOPE.sState('japan_earthquake_state').GetName] precisa desses monumentos."
 japan_earthquakes.4.b: "Erguer essas pedras nos locais atingidos pelo maremoto!"
 japan_earthquakes.4.c: "Devemos focar os esforços no presente."
 tsunami_stones: "Pedras do Maremoto"
 tsunami_relief_efforts: "Esforços de Alívio do Maremoto"
 japan_earthquakes.5.t: "Grande Terremoto de Kantō"
 japan_earthquakes.5.d: "Um terremoto intenso e sem precedentes atingiu a região perto de [SCOPE.sState('japan_earthquake_state').GetCityHubName]. Em minutos, o desastre assolou a maior parte da cidade e matou centenas de milhares de pessoas."
 japan_earthquakes.5.f: "A muralha de água que se seguiu aos tremores parecia ser a maior ameaça, mas ela não era nada comparada aos incêndios. Em pouco tempo, a cidade toda estava em chamas, e parecia que a terra e o próprio vento também estavam.\n\nAs pessoas que conseguiram escapar das construções ficaram presas em um tornado de labaredas, como se a conflagração estivesse decidida a não deixar ninguém com vida. [SCOPE.sState('japan_earthquake_state').GetCityHubName] se tornou uma visão infernal."
 japan_earthquakes.5.a: "O povo japonês deve se manter unido contra essa devastação!"
 japan_earthquakes.5.b: "Esse golpe à nossa riqueza material precede a decadência."
 japan_earthquakes.5.c: "Devemos aproveitar essa oportunidade para reconstruir [SCOPE.sState('japan_earthquake_state').GetCityHubName] com modernidade."
 earthquake_national_tragedy: "Tragédia Nacional"
 earthquake_divine_punishment: "Punição Divina"
 earthquake_modernization: "Reconstrução Modernizada"
 earthquake_modernization_land_confiscation: "Reajuste de Terras"
 shinbutsu_bunri_decision: "$je_shinbutsu_bunri$"
 shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$"
 elevate_buddhism_decision: "$je_elevate_buddhism$"
 elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$"
 je_shinbutsu_bunri: "Shinbutsu Bunri"
 je_shinbutsu_bunri_reason: "Com o poder do Imperador restaurado, precisamos distinguir e enaltecer as tradições religiosas nativas que mantêm a santidade da linhagem imperial. Para isso, elas devem ser separadas da influência estrangeira do budismo, que está estreitamente conectado à adoração dos kami há séculos por meio de tradições sincréticas. Se nos aproveitarmos do descontentamento com as instituições budistas por causa das conexões com o xogunato, podemos abrir caminho para o xintoísmo como princípio superior."
 je_taikyo_proclamation_button: "Proclamação de Taikyō"
 je_taikyo_proclamation_button_desc: "Tornar o xintoísmo, com adoração aos kami e reverência ao Imperador, o princípio do Estado."
 je_taikyo_proclamation_conversion_tt: "Cada liderança do [concept_interest_group] tem #v 75%#! de chance de se converter para o [GetReligion('shinto').GetName]."
 je_elevate_buddhism: "Elevar o Budismo"
 je_elevate_buddhism_reason: "As instituições budistas do $JAP$ têm vínculos históricos fortes com o ramo administrativo do xogunato. Evitamos o fim do xogunato uma vez, então fortalecer essas instituições pode nos ajudar a manter o poder delas e reforçar as tradições religiosas para o $JAP$ sem foco na adoração ao Imperador."
 je_elevate_buddhism_goal: "$je_communism_2_goal$"
 arahitogami: "Arahitogami"
 extended_danka_system: "Sistema Danka Prolongado"
 japan_religion.1.t: "Jingū-ji"
 japan_religion.1.d: "Nos templos santuários, é comum que monges budistas realizem rituais juntamente com as práticas xintoístas. Com a separação entre budismo e xintoísmo, a função desses monges está sendo questionada."
 japan_religion.1.f: "\"Qual é o propósito desses rituais? Guiar os kami ao iluminismo? Aliviar o karma deles? Obviamente, a implicação é que eles não são dignos de adoração, mas são seres perdidos que precisam ser guiados. Não vamos mais aceitar isso!\""
 japan_religion.1.a: "Exigir que os monges sejam convertidos e se tornem sacerdotes xintoístas."
 japan_religion.1.b: "Tirar os títulos dos monges."
 japan_religion.1.c: "Deixar que os monges mantenham os deveres."
 forced_monk_conversions: "Forçou a Conversão dos Monges"
 monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$"
 monks_stripped_of_titles: "Perda de Títulos dos Monges"
 monks_left_to_duties: "Monges Deixados aos seus Deveres"
 japan_religion.1.a.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] dos [GetPopType('clergymen').GetName] se converterão para o [GetReligion('shinto').GetName]"
 japan_religion.2.t: "Honji Suijaku"
 japan_religion.2.d: "O fato de Budas se revelarem no Japão como kami já é uma ideia estabelecida e refletida em terminologias como [concept_gongen], que os considera duas partes da mesma entidade. Essa terminologia reforça a influência do budismo."
 japan_religion.2.f: "\"Antigamente, devia fazer sentido. Amaterasu é o sol. Dainichi Nyorai, Vairocana, é o sol. No entanto, o sol não é dividido e nem um reflexo ou a manifestação da luz de outro. Ele brilha sozinho e com o próprio poder. E hoje, o país [ROOT.GetCountry.GetNameNoFormatting] só tem espaço para um sol.\""
 japan_religion.2.a: "Banir o conceito de [concept_gongen]."
 japan_religion.2.b: "Banir a referência a Hachiman como [concept_boddhisattva]."
 japan_religion.2.c: "Abster-se de regulamentar a terminologia."
 banned_syncretic_terminology: "Terminologia Sincrética Banida"
 retained_syncretic_terminology: "Terminologia Sincrética Mantida"
 japan_religion.2.a.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] dos [GetPopType('farmers').GetName] se converterão para o [GetReligion('shinto').GetName]"
 japan_religion.2.b.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] dos [GetPopType('soldiers').GetName] se converterão para o [GetReligion('shinto').GetName]"
 japan_religion.3.t: "O Soar dos Sinos"
 japan_religion.3.d: "A tentativa de acabar com a influência do budismo levou a um sentimento antibudista generalizado. Os templos estão sendo tomados e danificados, alguns totalmente destruídos e outros perdendo a iconografia budista."
 japan_religion.3.f: "Ele parou conforme se aproximava do santuário. Os dois Niō, estátuas poderosas de Buda que protegiam a entrada, haviam sido removidas. Não havia nada no lugar.\n\nQuando entrou, ele não conseguiu afastar a sensação de que, apesar de toda a pureza, o santuário já não era mais tão seguro. Um portão desprotegido."
 japan_religion.3.a: "Transformar os sinos dos templos em canhões!"
 japan_religion.3.b: "Destruir ou remover as estátuas de Buda dos templos."
 japan_religion.3.c: "Deixar os templos em paz."
 smelted_temple_bells: "Sinos dos Templos Derretidos"
 smelted_temple_bells_opinion: "$smelted_temple_bells$"
 removed_buddha_statues: "Estátuas de Buda Removidas"
 removed_buddha_statues_opinion: "$removed_buddha_statues$"
 retained_buddhist_iconography: "Iconografia Budista Mantida"
 japan_religion.4.t: "O Gabinete de Assuntos Xintoístas"
 japan_religion.4.d: "Os esforços para padronizar as práticas xintoístas e garantir que os kami do Estado sejam incluídos em rituais locais encontraram oposição de monges locais e sacerdotes de santuários, que consideram esses ensinamentos um rompimento com a tradição."
 japan_religion.4.f: "\"O xintoísmo não se resume a dar continuidade a rituais e práticas já existentes que podem ocorrer em santuários da nação, confusos e contaminados pelas influências externas. As tradições da casa imperial, descendentes dos céus, devem ser ensinadas no país [ROOT.GetCountry.GetNameNoFormatting] para fazer o xintoísmo voltar à sua forma pura.\""
 japan_religion.4.a: "Forçar as interpretações do Estado."
 japan_religion.4.b: "Os sacerdotes locais sabem o que mais se adequa aos rituais locais."
 standardized_priest_training: "Treinamento de Sacerdotes Padronizado"
 standardized_priest_training_opinion: "$standardized_priest_training$"
 deferred_to_local_priests: "Adiamento para Sacerdotes Locais"
 deferred_to_local_priests_opinion: "$deferred_to_local_priests$"
 japan_religion.5.t: "Confucionismo e Xintoísmo"
 japan_religion.5.d: "No processo de separação entre o budismo e o xintoísmo, a função do confucionismo foi questionada. Muitos estudiosos consideram a filosofia altamente compatível com o xintoísmo, mas outros descartam isso como mais uma influência estrangeira."
 japan_religion.5.f: "\"O Confucionismo pode ter chegado por caminhos semelhantes aos do budismo, mas não há contradição entre essa filosofia e a adoração aos kami. Na verdade, ambas se complementam e englobam os mesmos princípios de céu e terra, governante e súdito.\""
 japan_religion.5.a: "O Confucionismo é um complemento importante do xintoísmo."
 japan_religion.5.b: "Devemos fazer o xintoísmo voltar às tradições antigas."
 fukko_shinto: "Fukko Shintō"
 japan_religion.6.t: "Cristianismo no País Aberto"
 japan_religion.6.d: "Embora o país [ROOT.GetCountry.GetName] tenha se aberto aos estrangeiros, a religião continua regulamentada. Países cristãos podem considerar a importação livre da própria fé tão importante quanto das mercadorias."
 japan_religion.6.f: "\"No geral, o cristianismo ama os seguidores na morte e a morte pela fé acima de tudo. Cada missionário crucificado ou queimado se torna o próximo capítulo de uma história que começou com um homem pregado na cruz. Talvez esteja na hora de pararmos de oferecer mártires.\""
 japan_religion.6.a: "Os missionários devem ter permissão para pregar a própria fé."
 japan_religion.6.b: "Pode ser praticado, mas não deve ser espalhado."
 japan_religion.6.c: "O cristianismo era e ainda é uma ameaça externa."
 permitted_christianity: "Cristianismo Permitido"
 christianity_disallowed: "Cristianismo Proibido"
 japan_religion.7.t: "Linhagens de Pensamento"
 japan_religion.7.d: "O país [ROOT.GetCountry.GetName] tem uma antiga tradição de escolas diferentes do budismo, e muitas delas ainda são influentes. Agora que o grupo [SCOPE.gsInterestGroup('devout_ig').GetName] está ganhando poder político, uma escola se destaca."
 japan_religion.7.f: "\"Novas escolas de budismo surgiram em [ROOT.GetCountry.GetNameNoFormatting] ao longo dos séculos. Não há motivo para achar que uma pode se sobressair. No entanto, o momento atual exige liderança e direcionamento político, e é provável que algumas dominarão mais que outras.\""
 japan_religion.7.a: "A escola da Terra Pura."
 japan_religion.7.b: "A escola Zen."
 japan_religion.7.c: "A escola Nichiren."
 japan_religion.7.e: "A escola Shingon."
 pure_land_buddhism: "Escola da Terra Pura"
 zen_buddhism: "Escola Zen"
 shingon_buddhism: "Escola Shingon"
 japan_religion.8.t: "Palavras de Buda"
 japan_religion.8.d: "Agora que o país [ROOT.GetCountry.GetName] se abriu para o mundo, estudantes budistas se mostraram interessados em traduzir mais textos estrangeiros para incorporar ideias ao budismo moderno."
 japan_religion.8.f: "\"Não podemos deixar que ortodoxias desenvolvidas pelo isolamento nos contenham e não devemos ter medo de descobrir a verdade em lugares inesperados. Demorou muito até os ensinamentos de Buda chegarem até nós. Estudar por onde eles passaram e aonde podem ir só nos dará mais informações.\""
 japan_religion.8.a: "Textos em sânscrito e em páli, as raízes do budismo."
 japan_religion.8.b: "Textos chineses mais próximos das nossas escolas de pensamento."
 japan_religion.8.c: "Obras da filosofia europeia para estudo comparativo."
 japan_religion.9.t: "Monges Guerreiros"
 japan_religion.9.d: "Os esforços atuais de guerra levaram a debates no grupo [SCOPE.gsInterestGroup('devout_ig').GetName] sobre a função do budismo no apoio aos países durante um conflito violento."
 japan_religion.9.f: "\"Os antigos monges não hesitavam ao defender os templos. Devemos hesitar ao defender nossa nação? Uma vida não deve ser menosprezada, mas o Estado [ROOT.GetCountry.GetAdjective] não buscaria uma guerra que pode levar a uma paz duradoura? Que não salvaria mais vidas do que tomaria?\""
 japan_religion.9.a: "A força é necessária para estabelecer a paz duradoura."
 japan_religion.9.b: "Sem violência acima de tudo."
 war_buddhism: "Budismo em Guerra"
 peaceful_buddhism: "Budismo Pacífico"
 japan_religion.10.t: "Yōshoku"
 japan_religion.10.d: "Desde o fim do Sakoku, restaurantes voltados para o consumo de carne tornaram-se cada vez mais comuns em cidades portuárias para atender aos estrangeiros. Isso colocou em questão a proibição vigente de comer carne no país [ROOT.GetCountry.GetName]."
 japan_religion.10.f: "\"Com licença, mas a carne de vaca é deliciosa, não é? Depois que você se acostuma com o sabor, nunca mais quer voltar ao cervo ou ao javali. Eu me pergunto por que nós, no Japão, nunca comemos algo tão puro antes?\"\n\n— Kanagaki Robun, #italic O Comedor de Carne #!"
 japan_religion.10.a: "Devemos suspender esta proibição, em prol da nutrição e da expansão culinária!"
 japan_religion.10.b: "Não deixaremos que esta prática bárbara se estabeleça!"
 maintained_meat_ban: "Proibição de Carne Mantida"
 maintained_meat_ban_opinion: "$maintained_meat_ban$"
 japan_religion.11.t: "O Caminho dos Kami"
 japan_religion.11.d: "A separação entre as práticas xintoístas e budistas foi um sucesso. A influência das antigas instituições religiosas está diminuindo, e uma nova era de devoção aos deuses, ao Imperador e ao país [ROOT.GetCountry.GetName] nasce."
 japan_religion.11.f: "\"O país [ROOT.GetCountry.GetNameNoFormatting] abriga muitas fés e muitos rituais. Alguns antigos, outros novos. Nosso objetivo não é favorecer uns mais que outros, é traçar uma linha entre crenças adoradas e verdades inquestionáveis.\""
 japan_religion.11.a: "A divindade é absoluta."
 japan_religion.12.t: "O Caminho do Meio"
 japan_religion.12.d: "Depois de passar por um momento conturbado de inquietação no país [ROOT.GetCountry.GetName], o grupo [SCOPE.gsInterestGroup('devout_ig').GetName] conseguiu se reafirmar como autoridade religiosa da nação e fortalecer os laços com [ROOT.GetCountry.GetGovernment.GetName]."
 japan_religion.12.f: "\"Os homens falam do Caminho dos Deuses. Se ele existe,\nNão compete aos homens trilhá-lo; apenas os deuses\npodem percorrer o caminho sagrado dos deuses.\"\n—Hagura Toman" # Arthur Lloyd, Poems by Buddhist Priests of Japan
 japan_religion.12.a: "O caminho é óbvio."
 japan_religion.13.t: "$je_taikyo_proclamation_button$"
 japan_religion.13.d: "A Proclamação da Grande Doutrina declara a adoração aos kami e a reverência ao Imperador divino como princípios do estado [ROOT.GetCountry.GetAdjective] e o dever dos cidadãos."
 japan_religion.13.f: "\"O respeito pelos kami e o amor pelo nosso país estão intimamente conectados. Esses são os primeiros ensinamentos.\n\nOs Princípios do Céu e o Caminho do Homem estão intimamente conectados. Esses são os segundos ensinamentos.\n\nA reverência ao Imperador e a obediência à vontade da corte estão intimamente conectadas. Esses são os terceiros ensinamentos.\""
 japan_religion.13.a: "Devem ser ouvidos por todo o país!"
 concept_gongen: "Gongen"
 concept_gongen_desc: "Um Buda que se manifesta como kami, combinando uma entidade nativa com um arauto do iluminismo budista."
 concept_boddhisattva: "Boddhisattva"
 concept_boddhisattva_desc: "No budismo, um ser iluminado e mentor que ajuda as pessoas a alcançar o nirvana."
