l_braz_por:
 je_sakoku: "O País Bloqueado"
 je_sakoku_reason: "Desde a Era Kan'ei e os primórdios do poder dos Tokugawa, o $JAP$ é um país fechado para o exterior. Um fluxo mínimo de comércio com algumas nações selecionadas em pouquíssimos portos é tudo que já foi permitido. Embora esse sistema tenha durado mais de dois séculos, o mundo está começando a mudar de uma maneira que dificulta a situação de um país fechado, mesmo que o interesse do $JAP$ seja que tudo se mantenha igual para sempre. Se não pudermos impedir as tentativas estrangeiras de abrir nossas terras, então devemos importar ideias e mercadorias."
 je_sakoku_meiji_restoration: "O #b Imperador#! voltou ao poder, e o #b xogum#! foi derrubado"
 je_sakoku_stop_being_closed_button: "Revogar [GetLawType('law_sakoku').GetName]"
 je_sakoku_stop_being_closed_button_desc: "A situação tensa e a pressão crescente do exterior fizeram com que o fim da lei de [GetLawType('law_sakoku').GetName] se tornasse uma emergência. Nessas circunstâncias, talvez possamos forçar o encerramento do antigo sistema de isolamento, mas isso enfurecerá a todos que ainda apoiam as leis do passado."
 notification_morrison_incident_has_incidented_name: "Comerciante baleado pelo $JAP$"
 notification_morrison_incident_has_incidented_desc: "Um comerciante aventureiro das nossas terras tentou violar as restrições do governo $JAP_ADJ$ relacionadas a navios comerciais estrangeiros e foi alvejado por uma bateria costeira, prejudicando a relação entre as nossas nações."
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners: "Delicadeza com Estrangeiros"
 caved_to_foreign_pressure_opposition: "Cedeu à Pressão Externa"
 caved_to_foreign_pressure_government: "Cedeu à Pressão Externa"
 overdue_break_with_tradition: "Rompimento Tardio com a Tradição"
 forced_transition_from_tradition: "Transição Forçada da Tradição"
 the_picked_lock_modifier: "A Fechadura Aberta"
 sakoku_entrenched_modifier: "Sakoku Entrincheirado"
 meiji_failure_modifier: "Reformas de Restauração Fracassadas"
 ep2_sakoku.1.t: "A Derrota Perturbadora do Governo [SCOPE.sCountry('opium_wars_loser').GetAdjectiveNoFormatting]"
 ep2_sakoku.1.d: "Nosso vasto e venerável vizinho, o país [SCOPE.sCountry('opium_wars_loser').GetName], acabou de perder a guerra do ópio e do comércio contra uma nação emergente do exterior. Se o país [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] não conseguir controlar o próprio mercado e afastar os estrangeiros, como poderemos manter a lei de [GetLawType('law_sakoku').GetName] em nossas próprias terras?"
 ep2_sakoku.1.f: "\"Todas as terras, toda a riqueza e todo o poder que tinham não se comparavam à potência que recaiu sobre eles. Os estrangeiros já estão começando a ser permitidos em nosso país. Devemos tentar afastá-los até que disparem os canhões contra as nossas cidades, seguindo o exemplo do país [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting]? Ou devemos escolher nosso próprio caminho? Temos que decidir agora, antes que essas forças de ferro e seus canhões invadam nossos mares e tomem uma decisão por nós.\""
 ep2_sakoku.1.a: "Agora, devemos considerar o inimaginável."
 ep2_sakoku.1.b: "Agora, devemos abraçar o inimaginável."
 end_sakoku_button_now_available: "Agora, a opção de forçar o fim da lei de [GetLawType('law_sakoku').GetName] precocemente ficará visível em $je_sakoku$."
 ep2_sakoku.2.t: "Abrindo a Fechadura"
 ep2_sakoku.2.d: "Com o tumulto crescendo interna e externamente, o [GetLawType('law_bakufu').GetName] decidiu pressionar pelo fim imediato da lei de [GetLawType('law_sakoku').GetName]."
 ep2_sakoku.2.f: "Uma multidão de comerciantes ocupou a alfândega. Sozinho, um oficial sobrecarregado os encarou. \"Sim, é lógico que isso significa que o país não ficará mais isolado\".\n\nVárias perguntas da aglomeração alvejaram o administrador como um rugido. \"Como vai ficar então? Eu... eu não sei. Talvez haja... Não, espere, Só porque... Não cabe a mim e nem a você tomar essa decisão, você não pode...\".\n\nCada resposta dele gerava ainda mais perguntas. #italic O trabalho era tão mais fácil quando ninguém queria saber desse país#!, ele pensou."
 ep2_sakoku.2.a: "O futuro do país [ROOT.GetCountry.GetNameNoFormatting] depende da lei de [GetLawType('law_mercantilism').GetName]."
 ep2_sakoku.2.b: "A lei de [GetLawType('law_free_trade').GetName] libertará o país [ROOT.GetCountry.GetNameNoFormatting]."
 ep2_sakoku.2.c: "A lei de [GetLawType('law_protectionism').GetName] nos permitirá lidar com os interesses estrangeiros com cautela."
 ep2_sakoku.3.t: "O Incidente de  [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]"
 ep2_sakoku.3.d: "Um comerciante do país [SCOPE.sCountry('morrison_incident_country').GetName] tentou ignorar os protocolos rigorosos da lei de [GetLawType('law_sakoku').GetName] e fazer negócio em um porto não autorizado. Baterias costeiras dispararam contra a embarcação #italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#! e a expulsaram. As relações atuais com o país [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] foram prejudicadas."
 ep2_sakoku.3.f: "O comandante sorriu quando a bola de canhão finalmente acertou o navio. A lei era muito clara: o navio não tinha o direito de navegar por essas águas. Ele não queria saber o que o capitão a bordo achava, só queria que o navio desse meia-volta e fosse embora."
 ep2_sakoku.3.a: "A guarnição local fez o que era necessário."
 ep2_sakoku.3.b: "Devemos pedir desculpas ao país [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] e compensar o comerciante para acalmar a situação."
 ep2_sakoku.3.c: "É a chance que precisamos para rever a necessidade da lei de [GetLawType('law_sakoku').GetName]."
 ep2_sakoku.4.t: "A Fechadura Aberta"
 ep2_sakoku.4.d: "Em meio à pressão interna e externa, a lei de [GetLawType('law_sakoku').GetName] foi revogada. O país [ROOT.GetCountry.GetNameNoFormatting] tem um novo futuro pela frente."
 ep2_sakoku.4.f: "O oficial contemplou a baía. Havia novos navios nas docas. Navios desconhecidos com bandeiras que ele nunca havia visto. O que queriam oferecer ao país [ROOT.GetCountry.GetNameNoFormatting]? E o que queriam tomar?\n\nEle manteve o olhar fixo nos navios atracados por muito tempo, até que finalmente desistiu. Seus olhos não lhe dariam a resposta que ele queria. Não naquele dia. Só o tempo poderia dizer o que essa nova era traria à sua terra natal."
 ep2_sakoku.4.a: "Hoje o Japão se abre!"
 ep2_sakoku.5.t: "Emperrado"
 ep2_sakoku.5.d: "O cumprimento contínuo da lei de [GetLawType('law_sakoku').GetName] no país [ROOT.GetCountry.GetNameNoFormatting], mesmo diante do abalo das mudanças políticas, não é promissor para a esperança de acabar com o isolamento autoimposto. Parece que a lei de [GetLawType('law_sakoku').GetNameNoFormatting] chegou para ficar."
 ep2_sakoku.5.f: "O oficial contemplou a baía. Havia navios antigos nas docas, os mesmos que seu pai, seu avô ou seus ancestrais viam há muitas gerações. Seus filhos veriam esses mesmos navios? Seus netos? Essa paisagem algum dia mudaria?\n\nEle manteve o olhar fixo nos navios atracados por muito tempo, até que finalmente desistiu. Seus olhos não lhe dariam a resposta que ele queria. Não naquele dia. Só o tempo poderia dizer se sua terra natal continuaria a mesma para sempre."
 ep2_sakoku.5.a: "A fechadura continua trancada."
 meiji.14.t: "A Restauração Vazia"
 meiji.14.d: "Apesar das promessas empolgantes de uma reforma liderada pelo novo governo [ROOT.GetCountry.GetCustom('JAP_era_name')], o país [ROOT.GetCountry.GetNameNoFlag] não passou por grandes mudanças. Críticos lamentam que o Estado atual não é muito diferente do Estado antes da Restauração."
 meiji.14.f: "Um motor enorme vibrava e ressoava no chão da fábrica, girando um volante gigantesco e energizando grandes tornos e brocas. Essas máquinas criavam novos tambores, novas travas e novos gatilhos para um novo e variado arsenal de armas. Uma nação logo usaria esse ferro e vapor para deixar uma marca no mundo, e essa nação não seria o país [ROOT.GetCountry.GetNameNoFormatting]."
 meiji.14.a: "Hoje o sol se põe em um sonho."
 je_end_edo_system_button_name: "Fim do Sistema de Status de Edo"
 je_end_edo_system_button_desc: "Nesta era de reforma e renovação, o antigo sistema de castas nos atrapalha. Cada cidadão pode ser uma parte valiosa do Estado, seja qual for a posição na vida."
 edo_system_not_support_enforcement_tt: "Não apoia a promulgação da lei de [GetLawType('law_intermediate_edo_system').GetName] ou [GetLawType('law_strict_edo_system').GetName]"
 edo_system_ends_tt: "O país [ROOT.GetCountry.GetNameNoFlag] abole totalmente o [Concept('concept_social_hierarchy', '$edo_system$')]"
 notification_edo_system_disappears_name: "O Sistema de Edo Entra em Colapso"
 notification_edo_system_disappears_desc: "Devido às mudanças culturais e sociais recentes, o Sistema de Edo não é mais uma [concept_social_hierarchy] reconhecida no país [SCOPE.sCountry('relevant_country_scope').GetName]."
 notification_edo_system_disappears_tooltip: "#header $notification_edo_system_disappears_name$#!\n$TOOLTIP_DELIMITER$\n$notification_edo_system_disappears_desc$"
 je_meiji_army_barracks_condition: "Cada construção [GetBuildingType('building_barrack').GetName] do país [ROOT.GetCountry.GetNameNoFlag]:\n$EFFECT_LIST_BULLET$ #bold Não#! ativou #yellow $pm_no_organization$#! nem #yellow $pm_samurai_training$#!"
