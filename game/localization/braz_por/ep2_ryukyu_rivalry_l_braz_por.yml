 je_ryukyu_rivalry_reaffirm_suzerainty_japan: "Reafirmar Suserania"
 je_ryukyu_rivalry_reaffirm_suzerainty_china: "Reafirmar Laços Tributários"
 je_ryukyu_rivalry_reaffirm_suzerainty_button_desc: "A corte de Ryukyu favorece nosso oponente. Devemos lembrá-los de suas obrigações para com nosso domínio e trazê-los de volta para nossa influência."
 ryukyu_rivalry_reaffirm_suzerainty_button_tt: "O país [ROOT.GetCountry.GetName] exerce menos #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b Persuasão#!#! sobre o país [SCOPE.sCountry('ryukyu_scope').GetName] que seu oponente"
 ryukyu_rivalry_small_influence_gain_self_tt: "O país [ROOT.GetCountry.GetName] ganha #green 2#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b Persuasão#!#!"
 ryukyu_rivalry_medium_influence_gain_self_tt: "O país [ROOT.GetCountry.GetName] ganha mensalmente #green 3#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b Persuasão#!#! por #v 5 anos#!"
 ryukyu_rivalry_large_influence_gain_self_tt: "O país [ROOT.GetCountry.GetName] ganha mensalmente #green 3#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b Persuasão#!#! até o fim do [concept_journal_entry]"
 ryukyu_rivalry_small_influence_loss_self_tt: "O país [ROOT.GetCountry.GetName] perdeu #red 1#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b Persuasão#!#!"
 ryukyu_rivalry_medium_influence_loss_self_tt: "O país [ROOT.GetCountry.GetName] perdeu #red 2#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b Persuasão#!#!"
 ryukyu_rivalry_large_influence_loss_self_tt: "O país [ROOT.GetCountry.GetName] perdeu #red 10#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b Persuasão#!#!"
 ryukyu_rivalry_large_influence_loss_japan_tt: "O país [SCOPE.sCountry('japan_scope').GetName] perde #red 10#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b Persuasão#!#!"
 ryukyu_rivalry_large_influence_loss_china_tt: "O país [SCOPE.sCountry('china_scope').GetName] perde #red 10#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b Persuasão#!#!"
 ryukyu_rivalry_send_general_tt: "O país [ROOT.GetCountry.GetName] designa permanentemente um [concept_general] para o país [SCOPE.sCountry('ryukyu_scope').GetName]"
 je_ryukyu_rivalry_sway_merchants_button: "Enviar Supervisores de Comércio"
 je_ryukyu_rivalry_sway_merchants_button_desc: "Se supervisionarmos o ancoradouro de Naha, podemos colocar emissários na corte para persuadir e decidir quais potências estrangeiras ganham acesso ao comércio e aos tributos."
 ryukyu_rivalry_sway_merchants_button_tt: "O país [ROOT.GetCountry.GetName] tem uma construção [GetBuildingType('building_port').GetName] de nível #v 2#! ou superior no [concept_capital_state] [SCOPE.sCountry('ryukyu_scope').GetAdjective]"
 je_ryukyu_rivalry_inspect_defenses_button: "Inspecionar Defesas Costeiras"
 je_ryukyu_rivalry_inspect_defenses_button_desc: "Com o acesso militar garantido, podemos enviar um general de confiança para examinar as fortificações de Ryukyu e garantir que as muralhas e torres de vigia reflitam nossa supervisão e intenção estratégica."
 ryukyu_rivalry_inspect_defenses_button_tt: "O país [ROOT.GetCountry.GetName] tem um [concept_treaty] de #v Acesso Militar#! com o país [SCOPE.sCountry('ryukyu_scope').GetName]"
 je_ryukyu_rivalry_honor_kikoeogimi_button: "Honrar Kikoe-ōgimi"
 je_ryukyu_rivalry_honor_kikoeogimi_button_desc: "Pagar tributo a Kikoe-ōgimi, cuja autoridade em rituais da corte e observâncias sagradas pode dar credibilidade à nossa influência nos conselhos de Ryukyu."
 # Modifiers
 modifier_ryukyu_rivalry_overreach: "Suserania Extrapolada"
 modifier_ryukyu_rivalry_landowner_discontent: "Preocupações com a Rivalidade de Ryukyu"
 modifier_ryukyu_rivalry_merchant_influence_strain: "Fardo da Influência do Porto"
 modifier_ryukyu_strained_diplomatic_corps: "Presença Diplomática Intensificada"
 modifier_ryukyu_rivalry_failed_ryukyu: "Perdeu Ryukyu"
 modifier_ryukyu_rivalry_succeeded_ryukyu: "Ganhou Ryukyu"
 modifier_ryukyu_rivalry_officer_training: "Inspecionando as Defesas Ryukyuanas"
 modifier_ryukyu_rivalry_secured_neutrality: "Neutralidade Garantida"
 modifier_ryukyu_rivalry_southern_secured: "Abordagens pelo Sul Garantidas"
 modifier_ryukyu_rivalry_scholars_pleased: "Ordem Tributária Mantida"
 modifier_ryukyu_rivalry_honor_kikoeogimi: "Envolvimento Cerimonial"
