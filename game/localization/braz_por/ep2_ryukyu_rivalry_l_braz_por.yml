 # Events
 ryukyu_rivalry.1.t: "Deliberações Tributárias"
 ryukyu_rivalry.1.d: "O país [SCOPE.sCountry('ryukyu_scope').GetName] favorece cada vez mais o país [ROOT.GetCountry.GetName]. Em resposta, o país [SCOPE.sCountry('rival_scope').GetName] apressou seus próprios esforços diplomáticos, oferecendo demonstrações de respeito enquanto reforça silenciosamente as obrigações da relação tributária do país [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]."
 ryukyu_rivalry.1.f: "Caixas seladas foram depositadas com grande cuidado no salão de Ryukyu. Cortesãos sussurravam atrás de biombos enquanto cartas eram lidas em voz alta: uma selada com a estampa vermelha da China, outra portando a caligrafia cuidadosa do Japão. Em cada frase, delineavam deveres e promessas, enquanto duas potências tentavam atrair o reino para seus respectivos lados."
 ryukyu_rivalry.1.a: "Emitir um protesto formal para o país [SCOPE.sCountry('rival_scope').GetName]."
 ryukyu_rivalry.1.b: "Aproveitar nossos laços estabelecidos no país [SCOPE.sCountry('ryukyu_scope').GetName]."
 ryukyu_rivalry.1.c: "Relembrar a corte da nossa patronagem de longa data."
 ryukyu_rivalry.1.e: "Essa questão não exige intervenção."
 ryukyu_rivalry.1.tt1: "O país [SCOPE.sCountry('ryukyu_scope').GetName] é súdito do país [ROOT.GetCountry.GetName] com [concept_liberty_desire] inferior a #v 25#!"
 ryukyu_rivalry.1.tt2: "O país [SCOPE.sCountry('ryukyu_scope').GetName] não é súdito do país [ROOT.GetCountry.GetName] com [concept_relations] no mínimo #v Amistosas#!"
 ryukyu_rivalry.1.tt3: "O país [ROOT.GetCountry.GetName] tem pelo menos 3 [Concept('concept_building', '$concept_buildings$')] em [SCOPE.sCountry('ryukyu_scope').GetCapital.GetName]"
 ryukyu_rivalry.2.t: "Rivalidade nos Portos"
 ryukyu_rivalry.2.d: "A presença de emissários do governo [SCOPE.sCountry('rival_scope').GetAdjective] nos portos do país [SCOPE.sCountry('ryukyu_scope').GetName] atraiu a atenção e a cooperação de muitos comerciantes do povo [GetCulture('ryukyuan').GetName], fortalecendo a posição deles aos olhos da corte. Nossa própria persuasão diminuiu."
 ryukyu_rivalry.2.f: "Livros-razão de mercadores foram fechados e reabertos com selos diferentes. Aqueles que antes buscavam nossas garantias se demoravam em outras recepções, debatendo sobre tarifas revisadas e passagem segura. Parecia que a moeda havia achado uma administração mais persuasiva."
 ryukyu_rivalry.2.a: "Jogo sujo."
 ryukyu_rivalry.3.t: "General Visitante no País [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]"
 ryukyu_rivalry.3.d: "[SCOPE.sCharacter('ryukyu_general_scope').GetFullName], general com uma comitiva de oficiais, chegou ao país [SCOPE.sCountry('ryukyu_scope').GetName] para, supostamente, inspecionar as defesas costeiras. Essa presença foi tratada com submissão respeitosa, fortalecendo a influência do país [SCOPE.sCountry('rival_scope').GetName] na corte e minando discretamente a nossa."
 ryukyu_rivalry.3.f: "O general caminhou pelas muralhas com seus oficiais, tomando nota de cada canhão e torre de vigia. As forças de Ryukyu entraram em formação, bem cientes dos olhos que as avaliavam. Cada gesto e saudação ajudaria a apertar os fios invisíveis tecidos entre as duas potências."
 ryukyu_rivalry.3.a: "Um avanço perigoso."
 ryukyu_rivalry_risk_of_confrontation: "@warning! Se as forças dos países [SCOPE.sCountry('china_scope').GetName] e [SCOPE.sCountry('japan_scope').GetName] estiverem inspecionando as defesas costeiras, um #r confronto#! pode começar"
 ryukyu_rivalry.4.t: "General Visitante"
 ryukyu_rivalry.4.d: "[SCOPE.sCharacter('ryukyu_general_scope').GetFullName], general com uma comitiva de oficiais do país [SCOPE.sCountry('from_scope').GetName], chegou ao país [SCOPE.sCountry('ryukyu_scope').GetName] e quer inspecionar nossas defesas costeiras. Essa presença foi tratada com submissão respeitosa."
 ryukyu_rivalry.4.f: "$ryukyu_rivalry.3.f$"
 ryukyu_rivalry.4.a: "Ficar de olho nessas pessoas."
 ryukyu_rivalry_officer_arrives: "[concept_general] do país [SCOPE.sCountry('from_scope').GetName] fica disponível"
 ryukyu_rivalry.5.t: "O Destino do País [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]"
 ryukyu_rivalry.5.d_victor: "Nossos esforços no país [SCOPE.sCountry('ryukyu_scope').GetName] renderam resultados. Por meio de diplomacia contínua, economia e pressão política, a corte deles agora busca o nosso conselho, e a questão da soberania foi solucionada a nosso favor."
 ryukyu_rivalry.5.d_loser: "Apesar dos nossos esforços, o país [SCOPE.sCountry('victor_scope').GetName] garantiu uma persuasão decisiva sobre o país [SCOPE.sCountry('ryukyu_scope').GetName]. A corte deles aceitou uma nova realidade política, garantindo a posição das ilhas na esfera do governo [SCOPE.sCountry('victor_scope').GetAdjectiveNoFormatting]."
 ryukyu_rivalry.5.d_ryu: "O equilíbrio que tentamos manter não se sustenta mais. Sob a pressão crescente do país [SCOPE.sCountry('victor_scope').GetName], nossa corte aceitou um novo acordo político. O futuro do país [SCOPE.sCountry('ryukyu_scope').GetName] será escrito sob a influência deles."
 ryukyu_rivalry.5.f_annexed: "Proclamações, escritas com tinta ainda fresca sobre selos emitidos em [SCOPE.sCountry('victor_scope').GetCapital.GetName], foram lidas na praça do mercado de Naha. Os estandartes do povo [SCOPE.sCountry('ryukyu_scope').GetAdjectiveNoFormatting] foram retirados e substituídos pelos do governante. À noite, o escritório administrativo foi estabelecido e novos éditos, publicados."
 ryukyu_rivalry.5.f_subject: "Proclamações, escritas com tinta ainda fresca sobre selos emitidos em [SCOPE.sCountry('victor_scope').GetCapital.GetNameNoFormatting], foram lidas na praça do mercado de Naha. Cada decreto definiria o novo lugar de [SCOPE.sCountry('ryukyu_scope').GetName] no reino. Antigo tributário de cortes distantes, o reino agora via os próprios magistrados limitados por obrigações formais a uma grande potência. À noite, o rumo já estava definido."
 ryukyu_rivalry_ryukyu_vassalise_tt: "O país [SCOPE.sCountry('ryukyu_scope').GetName] se torna um [concept_puppet] [SCOPE.sCountry('victor_scope').GetAdjective]"
 ryukyu_rivalry_ryukyu_transfer_subject_tt: "O país [SCOPE.sCountry('ryukyu_scope').GetName] é transferido como [concept_subject] para o país [SCOPE.sCountry('victor_scope').GetName]"
 ryukyu_rivalry_ryukyu_annex_tt: "O país [SCOPE.sCountry('victor_scope').GetName] anexará o país [SCOPE.sCountry('ryukyu_scope').GetName]"
 ryukyu_rivalry.5.a: "Então está decidido."
 ryukyu_rivalry.6.t: "Confronto em [SCOPE.sCountry('ryukyu_scope').GetCapital.GetNameNoFormatting]"
 ryukyu_rivalry.6.d_brawl: "Oficiais enviados pelos países [SCOPE.sCountry('japan_scope').GetName] e [SCOPE.sCountry('china_scope').GetName] entraram em conflito enquanto inspecionavam as defesas costeiras do país [SCOPE.sCountry('ryukyu_scope').GetName]. A disputa resultou em uma morte e atraiu olhares ansiosos da corte ryukyuana."
 ryukyu_rivalry.6.d_accident: "Forças dos países [SCOPE.sCountry('japan_scope').GetName] e [SCOPE.sCountry('china_scope').GetName] enviadas para inspecionar defesas costeiras se sobrepuseram nas mesmas fortificações no país [SCOPE.sCountry('ryukyu_scope').GetName], causando confusão entre a guarnição e uma breve troca de tiros."
 ryukyu_rivalry.6.d_fire: "Um incêndio eclodiu nos alojamentos destinados às missões de inspeção estrangeiras no país [SCOPE.sCountry('ryukyu_scope').GetName], consumindo os aposentos dos contingentes [SCOPE.sCountry('japan_scope').GetAdjective] e [SCOPE.sCountry('china_scope').GetAdjective]. A causa permanece incerta, embora funcionários locais sussurrem sobre lanternas mal posicionadas."
 ryukyu_rivalry.6.f: "O oficial Kaimon corria entre torres de vigia e armazéns, passando ordens aos guardas. Cada comando era gritado, contradito e repetido em rápida sucessão. Embora a calma tenha retornado no fim, Kaimon fora lembrado de como missões rivais entre potências estrangeiras poderiam expor a situação frágil de Ryukyu."
 ryukyu_rivalry.6.a: "As tensões estão aumentando."
 ryukyu_rivalry_ryukyu_confrontation_tt1: "A [concept_infamy] dos países [SCOPE.sCountry('japan_scope').GetName] e [SCOPE.sCountry('china_scope').GetName] aumenta em #v 6#!"
 ryukyu_rivalry.7.t: "O Decreto Ryukyuano"
 ryukyu_rivalry.7.d_ryukyu: "Após anos de observação cuidadosa e diplomacia sutil, nosso conselho declarou sua intenção de governar seus próprios assuntos sem interferência externa. A corte impôs firmes limites à influência estrangeira e consagrou a primazia de seus próprios rituais, ministros e conselhos tradicionais. O reino agora traça seu próprio curso."
 ryukyu_rivalry.7.d: "Após anos de observação cuidadosa e diplomacia sutil, o país [SCOPE.sCountry('ryukyu_scope').GetName] livrou-se de nossa influência e declarou sua intenção de governar seus próprios assuntos sem interferência externa. A corte impôs limites firmes à nossa presença, mantendo seus rituais, ministros e conselhos tradicionais enquanto o reino se afasta de nossa autoridade."
 ryukyu_rivalry.7.f: "Selos e registros de tributo foram rasgados e espalhados pelo chão polido do Castelo de Shuri. Nos salões de audiência, as influências das potências estrangeiras ainda eram sentidas, mas não mais ditavam as ações. O caminho de Ryukyu se revelaria sob a forma de uma neutralidade frágil, conquistada por meio de uma diplomacia paciente."
 ryukyu_rivalry.7.a: "A questão da fidelidade está resolvida."
 ryukyu_rivalry.7.b: "O uso da força continua disponível para nós."
 ryukyu_rivalry.8.t: "O Domínio Oculto"
 ryukyu_rivalry.8.d: "Agora que o país [SCOPE.sCountry('japan_scope').GetName] está abrindo os portos, a questão há muito adormecida da fidelidade do país [SCOPE.sCountry('ryukyu_scope').GetName] ressurgiu. Por gerações o reino trilhou um caminho cuidadoso, sendo aparentemente um tributário do país [SCOPE.sCountry('china_scope').GetName], mas mantendo discretamente a fidelidade ao país [SCOPE.sCountry('japan_scope').GetNameNoFormatting]. Agora, as duas potências devem considerar como afirmar a própria influência."
 ryukyu_rivalry.8.f: "Lanternas brilhavam ao longo dos corredores do Castelo de Shuri, lançando luz sobre vigas de vermelhão que os reis de Chūzan ergueram em seus dias de glória. Sob os tetos pintados, funcionários depositavam tributos ao lado de decretos de Satsuma. A corte por muito tempo se equilibrou entre a investidura do Reino Médio e a sombra de Kagoshima. A calma perdurava por enquanto, mas a questão da fidelidade logo exigiria atenção total."
 ryukyu_rivalry.8.a: "A questão ainda não foi resolvida."
