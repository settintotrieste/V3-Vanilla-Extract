l_braz_por:
 ## Interest Tier Types
 interest_tier_none: "Nada"
 interest_tier_none_desc: "Neste $concept_interest_tier_short$, um [concept_country] está total ou marginalmente envolvido em uma [concept_strategic_region]. Não há efeito sobre o $concept_country$ ou a $concept_strategic_region$."
 interest_tier_observant: "Observador"
 interest_tier_observant_desc: "Neste $concept_interest_tier_short$, as primeiras medidas foram tomadas para estabelecer uma presença diplomática na [concept_strategic_region], embarcações da Marinha podem estar patrulhando a costa ou enviados podem ser trocados com [Concept('concept_local_country', '$concept_local_countries$')]."
 interest_tier_engaged: "Engajado"
 interest_tier_engaged_desc: "Neste $concept_interest_tier_short$, um [concept_country] está começando a se envolver nos assuntos locais, assinando [Concept('concept_treaty', '$concept_treaties$')] e estabelecendo uma presença mais permanente."
 interest_tier_influential: "Influente"
 interest_tier_influential_desc: "Neste $concept_interest_tier_short$, uma presença foi totalmente estabelecida em uma [concept_strategic_region], [Concept('concept_country', '$concept_countries$')] estão assinando acordos de longo prazo e arriscando reivindicações.\n\n@information! $concept_countries$ com a [Concept('concept_capital_state', '$concept_capital_state_short$')] nesta $concept_strategic_region$ nunca podem ficar abaixo desse $concept_interest_tier_short$."
 interest_tier_pervasive: "Difundido"
 interest_tier_pervasive_desc: "Neste $concept_interest_tier_short$, um [concept_country] estabeleceu um controle significativo em uma [concept_strategic_region]. [Concept('concept_great_power', '$concept_great_powers$')] e forças de [Concept('concept_local_country', 'Países Locais')] disputam a dominância conforme o poder é consolidado."
 interest_tier_hegemonic: "Hegemônico"
 interest_tier_hegemonic_desc: "Neste $concept_interest_tier_short$, um [concept_country] se estabeleceu fortemente como um articulador de poder indisputável na [concept_strategic_region]. Outras nações, #italic se existirem#!, terão que ser subordinadas ou fazer um acordo com a Hegemonia para que haja a certeza de que não se envolverão em assuntos locais."
 ## Interface
 INTEREST_TIER_TYPE_BOUNDS_DESC: "Aplica-se a um [concept_involvement] entre [InterestTierType.GetLowerBound|v] e [InterestTierType.GetUpperBound|v]"
 INTEREST_TIER_TYPE_NO_EFFECT: "#italic Sem efeito#!"
 INTEREST_TIER_ACTIVE: "#i #b Patamar atual#!#! para o país [Country.GetName][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'YOU'))]"
 INTEREST_TIER_ACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#! $INTEREST_TIER_ACTIVE$\n$INTEREST_TIER_BOUNDS_DESC$\n[SelectLocalization(EqualTo_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_CURRENT_INVOLVEMENT_DESC', 'INTEREST_TIER_TARGET_INVOLVEMENT_DESC')]\n$TOOLTIP_DELIMITER$\n$INTEREST_TIER_EFFECTS_AND_BREAKDOWN$"
 INTEREST_TIER_INACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#!\n$INTEREST_TIER_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n#title Efeitos:#!#indent_newline:3 \n[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)]#!"
 INTEREST_TIER_EFFECTS_AND_BREAKDOWN: "#title Efeitos:#!#indent_newline:3 [ConcatIfNeitherEmpty('\n', InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', AddLocalizationIf(And(And3(StringIsEmpty(InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetStateModifier.GetDesc)), StringIsEmpty(InterestTierType.GetTradeAdvantageDesc)), 'INTEREST_TIER_NO_EFFECT'))]#!\n\n#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! de [concept_involvement] se deve a:#!#indent_newline:3 \n[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]#!\n $INTEREST_TIER_ACTIVE$: #i #b (Atualmente Ativo)#!#!"
 INTEREST_TIER_PREDICTED: "#i #b (Previsto)#!#!"
 INTEREST_TIER_BOUNDS_DESC: "Aplica-se entre um [concept_involvement] de [InterestTierType.GetLowerBound|v0] e [InterestTierType.GetUpperBound|v0]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC: "#v [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! de [concept_involvement] para o país [Country.GetName]"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC: "[AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetTargetInvolvementIn(StrategicRegion.Self), Country.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP')][AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN')] de [concept_involvement] para o país [Country.GetName]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Nós temos [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] #v [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! de [concept_involvement] atualmente"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Nós temos [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] [AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self), GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT')][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self), GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT')] de [concept_involvement] atualmente"
 INTEREST_TIER_TARGET_UP: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/semana)"
 INTEREST_TIER_TARGET_DOWN: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/semana)"
 INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/semana)"
 INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/semana)"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN_TITLE: "#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! de $concept_involvement$ alvo devido a:#!"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN: "[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]"
 INTEREST_TIER_EFFECTS_TITLE: "#title Efeitos:#!"
 INTEREST_TIER_EFFECTS: "[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetDescription)]"
 INTEREST_TIER_NO_EFFECT: "#italic Sem efeito#!"
 INTEREST_TIER_TRADE_ADVANTAGE_EXPORTS_DESC: "$VAL|0=+v$ de [concept_trade_advantage] para [Concept('concept_trade', '$concept_exports$')] em $concept_markets$ locais"
 INTEREST_TIER_TRADE_ADVANTAGE_IMPORTS_DESC: "$VAL|0=+v$ de [concept_trade_advantage] para [Concept('concept_trade', '$concept_imports$')] em $concept_markets$ locais"
 INTEREST_TIER_ON_ACTIVATE_EFFECT: "#title Ao ganhar:#!"
 INTEREST_TIER_ON_DEACTIVATE_EFFECT: "#title Ao perder:#!"
 STRATEGIC_REGION_AI_STANCE_TT_HEADER: "O país [Country.GetNameNoFormatting] assumiu a [Concept('concept_strategic_region_stance', '$concept_strategic_region_stance_short$')] de #b [Country.GetAIStrategicRegionStanceTypeIn(StrategicRegion.Self).GetNameNoFormatting]#! em [StrategicRegion.GetName] pelos seguintes motivos:\n$TOOLTIP_DELIMITER$"
 ## Effects
 interest_tier_effect_establish_missions_decree: "@checkmark! Ativa o [concept_decree] de [GetDecreeType('decree_establish_missions').GetName] em [Concept('concept_unincorporated_state', '$concept_unincorporated_states$')]"
 interest_tier_effect_colonization: "@checkmark! Ativa a Ação Regional #yellow;tooltip:[GetPlayer.GetTooltipTag],establish_colony_tooltip $establish_colony$#!"
 interest_tier_effect_stake_colonial_claim: "@checkmark! Ativa a [concept_diplomatic_action] [GetDiplomaticActionType('da_stake_colonial_claim').GetName] em [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')]"
 interest_tier_effect_colonial_claim_generation: "@checkmark! Gerará uma [concept_claim] quando a colonização de uma [concept_state_region] chegar a [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_colonial_claim_generation_threshold')|v%0]"
 interest_tier_effect_infamy_cost_increase_high: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_high_value')|=n%0] de custo de [concept_infamy] visando [Concept('concept_war_goal', '$concept_war_goals$')] nesta [concept_strategic_region]"
 interest_tier_effect_infamy_cost_increase_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_medium_value')|=n%0] de custo de [concept_infamy] visando [Concept('concept_war_goal', '$concept_war_goals$')] nesta [concept_strategic_region]"
 interest_tier_effect_infamy_cost_decrease_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_decrease_medium_value')|=p%0] de custo de [concept_infamy] visando [Concept('concept_war_goal', '$concept_war_goals$')] nesta [concept_strategic_region]"
 interest_tier_effect_can_start_diplomatic_plays: "@checkmark! Permite iniciar [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] nesta [concept_strategic_region]"
 interest_tier_effect_can_join_diplomatic_plays: "@checkmark! Permite escolher lados em [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] nesta [concept_strategic_region]"
 interest_tier_effect_can_sign_alliance: "@checkmark! Permite assinar [Concept('concept_article', '$concept_treaties$')] de [GetArticleType('alliance').GetName]"
 interest_tier_effect_can_sign_defensive_pact: "@checkmark! Permite assinar [Concept('concept_article', '$concept_treaties$')] de [GetArticleType('defensive_pact').GetName]"
 interest_tier_effect_can_sign_support_independence: "@checkmark! Permite assinar [Concept('concept_article', '$concept_treaties$')] de [GetArticleType('support_independence').GetName]"
 interest_tier_effect_can_sign_guarantee_independence: "@checkmark! Permite assinar [Concept('concept_article', '$concept_treaties$')] de [GetArticleType('guarantee_independence').GetName]"
 interest_tier_effect_stake_colonial_claim_unrecognized: "@checkmark! Ativa a [concept_diplomatic_action] [GetDiplomaticActionType('da_stake_colonial_claim').GetName] em [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')] e [Concept('concept_unrecognized_power', '$concept_unrecognized_powers$')]"
 interest_tier_effect_can_sign_foreign_investment_rights: "@checkmark! Permite assinar [Concept('concept_article', '$concept_treaties$')] de [GetArticleType('foreign_investment_rights').GetName]"
 ## Diplomatic Actions
 da_stake_colonial_claim: "Arriscar Reivindicação Colonial"
 da_stake_colonial_claim_desc: "Arrisca uma [concept_claim] em uma [concept_state_region] no exterior."
 da_stake_colonial_claim_action_notification_name: "O país [INITIATOR_COUNTRY.GetName] arrisca uma [concept_claim|l] colonial em [TARGET_STATE.GetStateRegion.GetName]"
 da_stake_colonial_claim_action_notification_desc: "O país [INITIATOR_COUNTRY.GetName] reivindicou [TARGET_STATE.GetStateRegion.GetName] como parte das próprias ambições coloniais crescentes!"
 DA_STAKE_COLONIAL_CLAIM_COOLDOWN: "Não pode realizar essa ação novamente até #v [TimeKeeper.GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'da_stake_colonial_claim_cooldown') )]#!"
 DA_STAKE_COLONIAL_CLAIM_EMPTY_EFFECT: "Escolha uma [concept_state_region] em um continente diferente do seu [concept_capital_state] para [concept_claim|l]"
 ## Notifications
 notification_colonial_claim_generated_name: "[SCOPE.sState('colony_notification_state').GetName] se tornou uma #bold Grande Colônia#!"
 notification_colonial_claim_generated_desc: "[SCOPE.sState('colony_notification_state').GetName] ficou grande o bastante para permitir a nossa [concept_claim] de toda a região de [SCOPE.sState('colony_notification_state').GetStateRegion.GetName]."
 notification_colonial_claim_generated_tooltip: "#header $notification_colonial_claim_generated_name$#!\n$TOOLTIP_DELIMITER$\n$notification_colonial_claim_generated_desc$"
