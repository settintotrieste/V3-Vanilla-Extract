 ship_type_coastal_defense_ship: "Navio de Defesa Costeira"
 ship_type_coastal_defense_ship_desc: "Uma embarcação blindada e fortemente armada, feita para ser usada em ancoradouros e águas costeiras."
 ship_type_destroyer: "Destróier"
 ship_type_destroyer_desc: "Uma embarcação rápida e fortemente armada, feita para operações de frota e escolta."
 ship_type_aircraft_carrier: "Porta-Aviões"
 ship_type_aircraft_carrier_desc: "Um navio em que aviões podem pousar e decolar, as funções do Porta-Aviões envolvem reconhecimento e algumas operações ofensivas."
 ship_type_torpedo_boat: "Barco Torpedeiro"
 ship_type_torpedo_boat_desc: "Embarcações pequenas e ágeis, feitas para desferir ataques devastadores em navios de guerra maiores e mais lentos."
 ship_type_torpedo_boat_destroyer: "Destróier Contratorpedeiro"
 ship_type_torpedo_boat_destroyer_desc: "Uma embarcação feita para contra-atacar barcos torpedeiros menores e ainda ser capaz de lançar torpedos por conta própria."
 ship_type_light_cruiser: "Cruzador Leve"
 ship_type_light_cruiser_desc: "Cruzadores com blindagem leve, construídos para patrulhas longas, proteção de comércio e demonstração de poder."
 ship_type_armored_cruiser: "Cruzador Blindado"
 ship_type_armored_cruiser_desc: "Um grande cruzador com um cinturão de blindagem pesada, capaz de enfrentar a maioria dos alvos, exceto encouraçados."
 ship_type_protected_cruiser: "Cruzador Protegido"
 ship_type_protected_cruiser_desc: "Um cruzador rápido e de longo alcance com um deque blindado que protege os componentes vitais."
 ship_type_seaplane_tender: "Barco Auxiliar de Hidroaviões"
 ship_type_seaplane_tender_desc: "Um navio feito para transportar e lançar hidroaviões para reconhecimento e operações ofensivas limitadas."
 ship_type_early_ironclad: "Navio Blindado Inicial"
 ship_type_early_ironclad_desc: "Uma poderosa embarcação oceânica, movida a vapor e com blindagem de ferro."
 ship_type_modern_ironclad: "Navio Blindado Moderno"
 ship_type_modern_ironclad_desc: "Uma evolução do tradicional, o navio blindado moderno incorpora"
 ship_type_pre_dreadnought: "Pré-Dreadnought"
 ship_type_pre_dreadnought_desc: "Um encouraçado poderoso com uma bateria mista de armas pesadas."
 ship_type_dreadnought: "Dreadnought"
 ship_type_dreadnought_desc: "Um encouraçado revolucionário, construído com uma bateria uniforme de armas pesadas."
 ship_type_super_dreadnought: "Superdreadnought"
 ship_type_super_dreadnought_desc: "Um dreadnought grande, com armas mais pesadas e blindagem superior."
 ship_type_submarine: "Submarino"
 ship_type_submarine_desc: "Uma embarcação capaz de submergir, destinada principalmente a ser usada contra navios mercantes inimigos."
 ship_type_troop_ship: "Navio de Tropas"
 ship_type_troop_ship_desc: "Um navio de abastecimento especializado, feito para transportar homens e materiais pelo mundo."
 ship_type_supply_ship: "Navio de Abastecimento"
 ship_type_supply_ship_desc: "Um navio que transporta mercadorias militares de um lugar para outro."
 ship_graphics_type_borodino: "Borodino"
 ship_graphics_type_borodino_desc: "Os pré-dreadnoughts da classe Borodino foram os mais novos encouraçados da Marinha Imperial Russa na época da Guerra Russo-Japonesa. Formando o núcleo da trágica Segunda Esquadra do Pacífico do Almirante Rozhestvensky, quatro membros dessa classe seriam afundados ou capturados na Batalha de Tsushima."
 ship_graphics_type_mikasa: "Mikasa"
 ship_graphics_type_mikasa_desc: "Navio-chefe do Almirante Tōgō durante a Guerra Russo-Japonesa, o encouraçado pré-dreadnought Mikasa participou de todas as principais ações de guerra da frota, tornando-se um símbolo persistente da ascensão naval do Japão."
 ship_graphics_type_dingyuan: "Dingyuan"
 ship_graphics_type_dingyuan_desc: "Orgulho da Frota Beiyang, os encouraçados blindados Dingyuan e Zhenyuan eram os símbolos mais marcantes da modernização militar da finada dinastia Qing. Eles lutaram bravamente na Batalha do Rio Yalu, mas o desempenho foi prejudicado pela falta crônica de financiamento da Marinha Imperial Chinesa."
 ship_group_capital_ships: "Navios Capitais"
 ship_group_capital_ships_desc: "Navios capitais são os maiores e mais ofensivos de todas as embarcações, destinados a servir na linha de batalha."
 ship_group_cruisers: "Cruzadores"
 ship_group_cruisers_desc: "Cruzadores são embarcações menores e com blindagem mais leve, destinados a operações de deslocamento longo."
 ship_group_torpedo_craft: "Embarcações Torpedeiras"
 ship_group_torpedo_craft_desc: "Embarcações torpedeiras são pequenas e ágeis que contam com torpedos de autopropulsão como armamento principal."
 ship_group_supply_ships: "Navios de Abastecimento"
 ship_group_supply_ships_desc: "Navios de abastecimento são embarcações civis e específicas que apoiam e reabastecem as operações de frotas militares."
