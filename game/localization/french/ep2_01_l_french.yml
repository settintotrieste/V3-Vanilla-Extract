 ## The Hidden Domain JE
 je_ryukyu_rivalry: "Le domaine caché"
 je_ryukyu_rivalry_reason: "Depuis l’#b invasion de 1609#! par les forces du #b domaine de Satsuma#!, le royaume [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('ryukyu_scope').GetName] existe officieusement en tant que domaine du [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')]. Malgré son assujettissement par Satsuma, la cour de Shuri a continué de recevoir l’investiture de la [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')] et d’envoyer des délégations à Pékin pour conserver l’apparence d’une indépendance.\n\nCet arrangement a perduré pendant des générations, mais l’ouverture du Japon et la présence accrue des puissances occidentales ont modifié l’équilibre des forces en Asie de l’Est. Les deux empires doivent désormais clarifier leur position à l’égard de Ryūkyū, entraînant ainsi une lutte ouverte pour le contrôle des îles du sud.\n$TOOLTIP_DELIMITER$\n@warning! #r Échec :#!\n L’assurance [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] atteint #variable 100 %#!\n Le [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')] ou la [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')] sont [Concept('concept_subject','assujettis')] ou #b annexés#!\n [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')|U][SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] est [Concept('concept_subject','assujetti')] ou #b annexé#! par un pays non impliqué\n\n@information! Pour avoir une emprise :\n Ayez un [concept_article|l] #v Transfert d’argent#! (#g 0,1-2K @money!#!) avec [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('ryukyu_scope').GetName]\n Ayez des [concept_relations|l] #v amicales#! ou #v cordiales#! avec [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('ryukyu_scope').GetName]\n Ayez la plus grande [concept_naval_power_projection|l]\n Faites en sorte que [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('ryukyu_scope').GetName] ait une [concept_obligation|l] \n Utilisez les actions de l’[concept_journal_entry|l]"
 #je_ryukyu_rivalry_goal:1 "You are asserting more influence over [SCOPE.sCountry('ryukyu_scope').GetName] than your rival."
 je_ryukyu_rivalry_victory_japan: "Pour obtenir une victoire du #b Japon#! :\n"
 je_ryukyu_rivalry_victory_china: "Pour obtenir une victoire de la #b Chine#! :\n"
 je_ryukyu_rivalry_victory_ryukyu: "Pour obtenir une victoire de #b Ryūkyū#! :\n"
 ryukyu_rivalry_sway_tt: "En faisant basculer totalement Ryūkyū d’un côté, les adversaires ne pourront plus avoir d’emprise dessus, permettant ainsi de nouveau l’[Concept('concept_subject','assujettissement')].\n\nPour avoir une emprise :\n Ayez un [concept_article|l] #v Transfert d’argent#! (#g 0,1-2K@money!#!) avec Ryūkyū\n Ayez des [concept_relations|l] #v amicales#! ou #v cordiales#! avec Ryūkyū\n Ayez la plus grande [concept_naval_power_projection|l]\n Faites en sorte que Ryūkyū ait une [concept_obligation|l]\n Utilisez les actions de l’[concept_journal_entry|l]"
 ryukyu_rivalry_assertiveness_tt: "Lorsque la jauge atteindra #v 100 %#!, Ryūkyū affirmera sa neutralité et ne pourra plus être [concept_subject|l] via une [concept_diplomatic_action|l] pendant #v 50#! ans.\n\nLa jauge d’assurance augmentera de #g 0,5#! chaque mois si la jauge d’emprise reste comprise entre #v -20#! et #v +20#!.\n\nRyūkyū pourra affirmer sa neutralité en montant le Japon et la Chine l’un contre l’autre, en utilisant les actions disponibles qui affectent l’emprise. \n\nExemples :\n Ayez un [concept_article|l] #v Transfert d’argent#! (#g 0,1-2K @money!#!) avec les deux camps ou aucun des deux\n Ayez des [concept_relations|l] #v amicales#! ou #v cordiales#! avec les deux camps ou aucun des deux\n Ayez une [concept_obligation|l] envers les deux camps ou aucun des deux\n Annulez ou signez les traités susmentionnés quand l’un des deux camps prend l’ascendant ou se retrouve en position de faiblesse"
