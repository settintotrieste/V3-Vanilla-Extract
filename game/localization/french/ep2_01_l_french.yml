 japan_events.2.t: "Des calendriers inégaux"
 japan_events.2.d: "Le calendrier luni-solaire japonais, vieux de plusieurs siècles, est de plus en plus en décalage avec le monde occidental. Les marchands se plaignent des difficultés à se coordonner avec leurs partenaires étrangers, tandis qu’une certaine confusion règne au sein de la population en raison du décalage entre les fêtes, les loyers et les échéances fiscales."
 japan_events.2.f: "Les employés de bureau se penchaient sur leurs registres pour recopier minutieusement chaque ligne. Les documents s’empilaient, et leurs yeux piquaient à force de suivre des mois qui n’existaient plus. L’ancien calendrier disparaissait peu à peu."
 japan_events.2.f_telegraph: "Les coursiers s’affairaient dans les rues, transmettant message après message. Les citoyens s’arrêtaient pour lire les affiches, désorientés par ces dates qui changeaient si vite qu’ils n’arrivaient plus à suivre. Les nouvelles se répandaient comme une traînée de poudre, et l’ancien calendrier disparut quasiment en l’espace d’une nuit."
 japan_events.2.a: "Appliquez immédiatement la réforme du calendrier."
 japan_events.2.b: "Utilisez le [GetTechnology('electric_telegraph').GetName|l] pour accélérer le processus."
 japan_events.2.c: "Conservez l’ancien système pour le moment."
