 japan_events.1.t: "Lettres à tous"
 japan_events.1.d: "Alors que la pensée moderniste gagne du terrain [ROOT.GetCountry.GetAltNameNoFormatting('En')][ROOT.GetCountry.GetName], les limites de l’ancien système de courrier sont de plus en plus manifestes. En passant par le démantèlement de l’ordre féodal ou par la généralisation de l’alphabétisation au sein de la population, les conditions sont maintenant réunies pour la mise en place d’un service postal centralisé capable de soutenir un État moderne."
 japan_events.1.f: "Des messagers portant le sceau du gouvernement couraient dans les rues, les sacoches remplies d’une quantité inhabituelle de lettres. Dans la capitale, des fonctionnaires passaient des nuits à étudier les cartes, ajuster les itinéraires et compter les timbres. Les marchands se plaignaient de la perturbation des anciens réseaux de messagerie, tandis que les enfants glissaient avec curiosité leurs premières lettres dans les nouvelles boîtes aux lettres. Le pays, autrefois divisé par les coutumes, commençait à s’exprimer d’une même voix."
 japan_events.1.a: "Financez intégralement un déploiement national."
 japan_events.1.b: "Concentrez-vous sur les principaux centres urbains."
 japan_events.1.c: "Donnez la priorité aux zones rurales."
 japan_events.1.e: "Confiez la réforme à [SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')]."
 japan_events.1.g: "Conservez l’ancien système de courrier."
