 japan_events.3.t: "Une année à recompter"
 japan_events.3.d: "Sans faire de bruit, l’adoption du nouveau calendrier a raccourci l’année. Avec moins de jours, les salaires, les loyers et les impôts ne sont plus conformes aux attentes constituées sous l’ancien système. Les travailleurs découvrent que leur salaire a diminué, et les responsables ont bien du mal à expliquer la différence."
 japan_events.3.f: "Les travailleurs comptaient et recomptaient leurs pièces, incrédules. Leurs mains étaient abîmées par le travail, mais ils n’en récoltaient pas les fruits. L’année avait été raccourcie, et chaque jour perdu se voyait sur leurs traits fatigués et leurs poches vides."
 japan_events.3.a: "L’année est plus courte. Ils s’y feront."
 japan_events.3.b: "Répartissez le fardeau parmi la population."
 japan_events.3.c: "Absorbez les pertes au nom de la stabilité."
