 japan_events.4.t: "L’occidentalisation des noms"
 japan_events.4.d: "Alors que [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetName] mène des activités diplomatiques et commerciales avec des puissances étrangères, des questions se posent quant à la façon dont les noms [GetCulture('japanese').GetName|l] doivent être retranscrits dans les traités, la correspondance, et les documents officiels. De plus en plus, les représentants occidentaux s’attendent à ce que les noms suivent leurs propres conventions, en plaçant le prénom devant le nom de famille."
 japan_events.4.f: "Assis à leur bureau, les employés rédigeaient des lettres à l’intention des représentants étrangers. Ils chuchotaient entre eux, débattant pour savoir si la clarté à l’étranger justifiait réellement de changer une tradition de si longue date. Une main tenant un sceau s’arrêta au-dessus d’un document, s’attardant un instant afin de laisser sécher l’encre."
 japan_events.4.a: "Adoptez les conventions occidentales dans la correspondance avec l’étranger."
 japan_events.4.b: "Conservez l’ordre traditionnel des noms."
 japan_events.4.c: "C’est une nouvelle ère : adoptez les conventions occidentales dans tous les cas."
 japan_single_fire_events_name_order_westernized_mod: "Occidentalisation des noms dans les conventions"
 japan_single_fire_events_name_order_traditional_mod: "Conservation de l’ordre traditionnel des noms"
 japan_single_fire_events_name_order_resistance_mod: "Différend culturel à propos des noms"
 japan_single_fire_events_name_order_approval_mod: "Clarification administrative"
 japan_events.5.t: "La question du kanbun"
 japan_events.5.d: "Les décrets, les réglementations, et les archives ont longtemps reposé sur une langue classique réservée aux érudits. Les réformateurs ont avancé qu’une administration en japonais vernaculaire serait plus claire et efficace, tandis que d’autres ont insisté sur le fait que la tradition conférait une certaine autorité à l’écrit."
 japan_events.5.f: "Les bureaucrates travaillèrent jusqu’au milieu de la nuit, reformulant inlassablement des directives avec une détermination sans faille. L’un d’entre eux s’arrêta pour se frotter les yeux, avant de reprendre avec le plus grand soin. Chaque coup de crayon était semblable à une petite bataille menée contre la confusion et le chaos."
 japan_events.5.a: "Encouragez le japonais vernaculaire dans l’administration officielle."
 japan_events.5.b: "Autorisez une réforme limitée aux correspondances internes."
 japan_events.5.c: "Conservez le kanbun classique dans tous les documents de l’État."
 japan_language_partial_language_reform_mod: "Réforme limitée de la langue de l’administration"
 japan_single_fire_events_language_reform_support_mod: "Acceptation de l’administration vernaculaire"
 japan_single_fire_events_language_traditionalist_opposition_mod: "Opposition à l’administration vernaculaire"
