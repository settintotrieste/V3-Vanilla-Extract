l_french:
 edo_system: "Système hiérarchique à l’époque d’Edo"
 # Edo Social Classes
 strata_samurai_high: "Samouraï de niveau supérieur" # High-Class Samurai
 strata_samurai_high_desc: "Les élites guerrières de haut rang, telles que les daimyō et les vassaux de rang supérieur, qui constituent les échelons supérieurs de la classe des samouraïs, monopolisent la plupart des postes importants et jouissent d’un certain prestige héréditaire."
 strata_samurai_low: "Samouraï de niveau inférieur" # Low-Class Samurai
 strata_samurai_low_desc: "Les vassaux et les guerriers de rang inférieur, tels que les gokenin et les ashigaru qui servent comme main-d’œuvre administrative et militaire pour le compte des samouraïs de niveau supérieur."
 strata_religious: "Jisha" # Priests
 strata_religious_desc: "Le clergé des sanctuaires axé autour des temples et réglementé par les autorités. Bien qu’il ait une influence sur la vie locale, l’apprentissage et les rituels religieux, il existe en marge des catégories sociales définies par la loi."
 strata_commoners_peasants: "Hyakushō" # Peasants
 strata_commoners_peasants_desc: "Sous-division de la classe des roturiers, les paysans sont de loin la classe sociale la plus nombreuse du Japon. Les membres de cette classe figurent dans les registres des villages et sont soumis aux obligations et à l’imposition locales. Ils sont définis par leur identité et non par leur profession, et sont aussi bien artisans que commerçants, ou encore agriculteurs."
 strata_commoners_townspeople: "Chōnin" # Townspeople
 strata_commoners_townspeople_desc: "Sous-division de la classe des roturiers, les citadins sont les principaux habitants des villes du Japon. Les membres de cette classe figurent dans les registres des institutions urbaines, et sont traditionnellement associés aux métiers de l’artisanat et du commerce. S’ils peuvent accumuler une grande richesse et une certaine influence, leur mobilité sociale est retardée par le fait qu’ils ne soient pas des guerriers."
 strata_outcastes: "Eta-hinin" # Outcastes Eta, Hinin, etc.
 strata_outcastes_desc: "Les eta et les hinin constituent le groupe social le plus bas du système hiérarchique japonais. Fortement discriminés, ils sont associés à des occupations « de bas étage » telles que le fossoyage, la mendicité, et les spectacles de rue."
 # Edo Social System Laws
 lawgroup_edo_social_system: "Système hiérarchique à l’époque d’Edo"
 lawgroup_edo_social_system_desc: "Application du système hiérarchique à l’époque d’Edo"
 law_strict_edo_system: "Système hiérarchique strict"
 law_strict_edo_system_desc: "Tout, des opportunités légales et professionnelles propres à un statut au nombre de portes des résidences, est strictement réglementé et contrôlé par l’État. Toute violation de ce protocole est lourdement sanctionnée, et les citadins comme les paysans n’ont aucun moyen d’accéder officiellement au rang de samouraï."
 law_intermediate_edo_system: "Système hiérarchique assoupli"
 law_intermediate_edo_system_desc: "La législation et les lois somptuaires ont été assouplies, et les roturiers peuvent avoir une influence grandissante et évoluer au sein de la société. De riches citadins ou paysans peuvent devenir des gokenin, des samouraïs de rang inférieur, moyennant finance."
 law_lax_edo_system: "Système hiérarchique laxiste"
 law_lax_edo_system_desc: "Les postes et les rôles qui étaient autrefois réservés aux samouraïs sont accessibles à tous les roturiers, et l’application des restrictions professionnelles et somptuaires restantes n’est exercée que de façon sélective, se limitant généralement aux infractions les plus graves."
 # Tenpo Crisis
 je_tenpo_crisis: "Famine Tenpō"
 je_tenpo_crisis_reason: "Déclarée en 1830, l’ère Tenpō, qui signifie « protection céleste », fut tout d’abord à la hauteur de son nom. Cependant, des conditions météorologiques désastreuses sur l’île de [GetGeographicRegion('geographic_region_honshu').GetName] entraînèrent bientôt une flambée des prix du riz et une famine nationale, tandis que l’augmentation des richesses et de l’influence de la [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName|l] menaçait l’ordre établi par les [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName|l].\n\nPendant ce temps, les [Concept('concept_great_power','$concept_great_powers$')|l] occidentales se montraient de plus en plus menaçantes, à mesure que leurs navires de commerce et autres canonnières se rapprochaient de nos côtes.\n\nAfin de remédier à cela, des personnalités réformistes ont présenté leur point de vue au bakufu.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b Programme des réformistes#!#! :\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] [ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetNameNoFlag] a promulgué un [GetLawType('law_lax_edo_system').GetName|l]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] [ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetNameNoFlag] n’a #b pas#! autorisé de [GetLawType('law_hereditary_bureaucrats').GetName|l]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] [ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetNameNoFlag] a #v 3#! [Concept('concept_state', '$concept_states$')] avec un [GetBuildingType('building_urban_center').GetName|l] de niveau #v 3#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')] Le [concept_clout|l] du [concept_interest_group|l] [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] est de #v 10#! ou plus\n#tooltippable;tooltip:tenpo_hardliner_tt #b Programme des traditionalistes radicaux#!#! :\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] [ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetNameNoFlag] a promulgué un [GetLawType('law_strict_edo_system').GetName|l]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] [ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetNameNoFlag] a autorisé le [GetLawType('law_shinsengumi').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] [ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetNameNoFlag] a #v 40#! niveaux de [GetBuildingType('building_rice_farm').GetName|l]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')] Le [concept_interest_group|l] [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] est [concept_marginalized|l]\n#tooltippable;tooltip:tenpo_shared_tt #b Programme partagé#!#! :\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] #b Aucun#! [concept_state] appartenant à la [concept_homeland|l] [GetCulture('japanese').GetName|l]e ne souffre de la [concept_famine|l]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetNameNoFlag] a un [Concept('concept_gdp', '$concept_gdp_short$')] de #v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! @gdp! ou plus\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] La [concept_power_projection|l] de l’armée [ROOT.GetCountry.GetAltAdjectiveNoFlag('FS')|l] est supérieure à #v 500#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] Nous avons au moins #v 10#! niveaux de [GetBuildingType('building_naval_fortification').GetName|l] dans les [Concept('concept_state', '$concept_states$')] en notre possession"
 je_tenpo_crisis_complete_header: "Se terminera par le succès des réformes Tenpō si :\n"
 je_tenpo_crisis_failure_header: "Se terminera par l’échec des réformes Tenpō si :\n"
 je_tenpo_crisis_success_tt: "Nous avons atteint au moins #v 8#! objectifs du programme"
 je_tenpo_crisis_success_2_tt: "La récompense changera selon le nombre d’objectifs #tooltippable;tooltip:tenpo_shared_tt #b partagés#!#!, #tooltippable;tooltip:tenpo_reformer_tt #b réformistes#!#!, ou #tooltippable;tooltip:tenpo_hardliner_tt #b traditionalistes radicaux#!#! atteints."
 je_tenpo_crisis_success_outcome_tt: "La récompense changera selon le nombre d’objectifs #b partagés#!, #b réformistes#!, ou #b traditionalistes radicaux#! atteints."
 je_tenpo_crisis_success_outcome_1_tt: "Si nous avons atteint une majorité d’objectifs #b traditionalistes radicaux#! :"
 je_tenpo_crisis_success_outcome_2_tt: "Si nous avons atteint une majorité d’objectifs #b réformistes#! :"
 je_tenpo_crisis_success_outcome_3_tt: "Si nous avons atteint autant d’objectifs #b traditionalistes radicaux#! que #b réformistes#! :"
 modifier_tenpo_crisis_reward_hardliner: "Retour à l’ordre"
 modifier_tenpo_crisis_reward_reformer: "Changements bienvenus"
 modifier_tenpo_crisis_reward_balanced: "Réformes modérées"
 modifier_rice_hoarding: "Accapareurs de riz"
 tenpo_hardliner_tt: "La #b faction des traditionalistes radicaux#! pense que la société japonaise est en pleine décadence morale, et que ce déclin ne peut être stoppé que par un retour aux traditions.\n\nElle préconise la promulgation de lois somptuaires plus strictes, et estime que les samouraïs devraient renoncer au luxe des villes pour reprendre leur rôle idéalisé d’administrateurs ruraux austères."
 tenpo_reformer_tt: "La #b faction des réformistes#! pense que la société japonaise a changé de manière irrévocable, et que les lois nationales devraient se baser sur l’état actuel du pays plutôt que sur les idéaux d’un passé glorifié.\n\nElle préconise l’ascension politique des roturiers japonais et la promotion du commerce."
 tenpo_shared_tt: "Les factions des #b traditionalistes radicaux#! et des #b réformistes#! pensent qu’il est impératif de protéger le Japon des menaces extérieures et de régler au plus vite les problèmes liés à la sécurité alimentaire et à l’économie."
 button_je_tenpo_combat_rice_hoarding: "Lutter contre les accapareurs de riz"
 button_je_tenpo_combat_rice_hoarding_desc: "L’instabilité politique et économique [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetNameNoFlag] a poussé des personnes sans scrupule à acheter du riz en quantités phénoménales, entraînant ainsi une flambée des prix. Par conséquent, de nombreuses familles japonaises se retrouvent désormais dans l’incapacité de s’acheter du riz pour se nourrir."
 button_je_tenpo_frugal_ordinance: "Promulguer le décret sur la frugalité"
 button_je_tenpo_frugal_ordinance_desc: "La décadence grandissante de la [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName|l] urbaine menace la stabilité de notre gouvernement. Ils se sont mis à avoir la folie des grandeurs, affichant leurs richesses aux yeux de tous.\n\nNous devons leur rappeler leur rôle au sein de la société en imposant de nouvelles restrictions légales sur les produits de luxe, le divertissement, et la littérature."
 button_je_tenpo_confiscate_land: "Promulguer le décret de confiscation Edo-Osaka"
 button_je_tenpo_confiscate_land_desc: "La zone située dans un rayon de 10 #italic #tooltippable;tooltip:glossary_ri ri#!#! autour d’Edo et d’Osaka représente un mélange complexe de terres détenues par les tenryo, les daimyo, et les hatamoto. Puisque l’absence d’une structure administrative unifiée a de graves répercussions sur la défense nationale et notre capacité à exploiter pleinement le potentiel de ces terres, un rōjū a proposé leur confiscation et leur regroupement.\n\nLes propriétaires déplacés se verront accorder des terres de compensation ailleurs au Japon."
 modifier_consolidation_payments: "Indemnités de regroupement des terres"
 modifier_consolidated_state_land: "Décret de regroupement sur 10 ri"
 glossary_ri: "Le #b #italic ri#!#! est une unité de mesure traditionnelle provenant du #italic li#! chinois.\n\nLa longueur d’un ri a varié avec le temps, mais à la fin de l’époque d’Edo, elle correspondait environ à 36 #italic chō#!, soit 3,9 km."
 modifier_tenpo_crisis_ongoing: "Révoltes de l’ère Tenpō"
 tenpo_events.1.t: "Ère de la protection céleste"
 tenpo_events.1.d: "Après des années de conditions climatiques difficiles, la [concept_famine|l] s’abat sur [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetNameNoFlag]. Les pauvres et les indigents ayant du mal à joindre les deux bouts, le bakufu fait face au mécontentement croissant de celles et ceux qui estiment que le gouvernement aurait pu mieux faire."
 tenpo_events.1.f: "Les tissus de sa femme s’étaient toujours vendus à un bon prix sur le marché ; les bons jours, ils leur permettaient même de s’offrir quelques confiseries. Aujourd’hui, ils leur rapportaient quatre ou cinq gō de riz, tout au plus. À peine suffisant pour les nourrir une journée, pensa-t-il, même en complétant leur ration avec des feuilles et des mauvaises herbes cueillies dans la nature.\n\nAlors qu’il rentrait chez lui, il s’arrêta un instant devant la maison du vieux Tora. La variole avait déjà emporté deux de ses enfants, et elle risquait d’en emporter d’autres dans les semaines à venir. Tenant fermement son sac de riz contre lui, il pria en silence et reprit son chemin."
 tenpo_events.1.a: "Que le Ciel nous protège !"
 tenpo_events.1.tt_1: "Des [GetHarvestConditionType('torrential_rains').GetName|l] se sont abattues sur [GetGeographicRegion('geographic_region_honshu').GetName], #r dévastant#! d’importantes #b récoltes de riz#! et mettant en péril la [concept_food_security|l] [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetNameNoFlag]."
 tenpo_events.1.tt_2: "Partout à [GetGeographicRegion('geographic_region_honshu').GetName], les domiciles des usuriers et des accapareurs de riz sont visés par des foules en colère au cours d’émeutes appelées #italic #tooltippable;tooltip:glossary_uchikowashi uchikowashi#!#!, entraînant ainsi une [concept_devastation|l] #r à l’échelle du pays#!."
 glossary_uchikowashi: "Le terme d’#b #italic uchikowashi#!#! désigne le fait de saccager la propriété de personnes ayant un comportement perçu par le peuple comme immoral, telles que les usuriers, les accapareurs de riz et les profiteurs.\n\nSi ces actes étaient souvent associés à des pillages, dans de nombreux cas, les auteurs d’uchikowashi s’en abstenaient volontairement, afin de souligner la légitimité de leurs actions."
 tenpo_events.2.t: "Révolte du samouraï philosophe"
 tenpo_events.2.d: "Devant l’ordre établi et leur incapacité à contrer la [concept_famine|l] qui sévissait à [SCOPE.sState('osaka_scope').GetName], le magistrat et érudit [SCOPE.sCharacter('oshio_scope').GetFullName] s’est révolté[SCOPE.sCharacter('oshio_scope').GetCustom('FR_E')] contre les autorités locales. [SCOPE.sState('osaka_scope').GetCityHubName] est déjà en proie aux flammes, ses partisans incendiant les bureaux de l’administration locale."
 tenpo_events.2.f: "« Même si nous n’avons pas la puissance des Tang et des Wu, ni la vertu de Confucius et de Mencius, nous n’avons pas le choix : pour le bien du royaume, nous avons décidé d’agir, et ce malgré la malédiction que cela pourrait faire peser sur notre propre lignée.\n\nNous punirons et exécuterons les représentants qui tourmentent et oppriment le peuple, tout comme nous punirons et exécuterons les riches citadins d’Osaka qui se complaisent dans l’opulence.\n\nAlors, l’or et l’argent qu’ils ont mis en sécurité dans leurs coffres-forts, tout comme les ballots de riz cachés dans leurs entrepôts et leurs domaines, seront redistribués. »\n\n– Ōshio Heihachirō, #italic Extraits du manifeste#!"
 tenpo_events.2.a: "Rassemblez la milice et crucifiez ce traître."
 tenpo_events.2.b: "C’est un acte désespéré, mais vertueux."
 tenpo_events.2.c: "Que les rebelles prennent d’assaut la garnison locale et s’emparent d’[SCOPE.sState('osaka_scope').GetCityHubName]."
 tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName] échappe à la capture et se suicide en s’immolant par le feu."
 tenpo_events.2.tt_2: "[SCOPE.sCharacter('oshio_scope').GetFullName] est torturé[SCOPE.sCharacter('oshio_scope').GetCustom('FR_E')], et son corps est recouvert de sel avant d’être crucifié par les autorités."
 tenpo_events.2.tt_3: "Demandez aux milices locales de #b réprimer cette révolte#! avant qu’elle ne s’ébruite."
 tenpo_events.2.tt_4: "Le [concept_agitator|l] [SCOPE.sCharacter('oshio_scope').GetFullName] reçoit une légère sentence symbolique, mais est autorisé à reprendre son activité."
 modifier_osaka_burning: "Critique signée dans le sang"
 modifier_controversial_pardon: "Grâce controversée"
 tenpo_events.3.t: "Réformes obligatoires"
 tenpo_events.3.d: "Satisfait[ROOT.GetCountry.GetRuler.GetCustom('FR_E')] par le rythme des réformes, [ROOT.GetCountry.GetRuler.GetCustom('FR_LeLa')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] a félicité ses conseillers pour leur progression, estimant la nation [ROOT.GetCountry.GetAltAdjective('FS')|l] capable de relever tous les défis à venir, qu’ils soient nationaux ou non."
 tenpo_events.3.f: "« Douze », répondit le conseiller en chef, tandis qu’il posait le pinceau sur la table. « Et les rapports du Kinai confirment ces chiffres. Nos réformes semblent prendre racine. »\n\nSur l’estrade, [ROOT.GetCountry.GetRuler.GetCustom('FR_LeLa')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] hocha la tête. « Très bien. Je veux que la cour soit informée en temps voulu. Et maintenant, en ce qui concerne le rapport du magistrat de Nagasaki... »"
 tenpo_events.3.a: "Que cela marque la fin du déclin moral et politique [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName]."
 tenpo_events.3.b: "Des paysans aux samouraïs, ne sommes-nous pas tous des sujets de l’empereur ?"
 tenpo_events.3.c: "La stabilité du pays est essentielle."
 tenpo_outcome_hardliner_tt: "Nous avons atteint plus d’objectifs #b traditionalistes radicaux#! que d’objectifs #b réformistes#!"
 tenpo_outcome_reformer_tt: "Nous avons atteint plus d’objectifs #b réformistes#! que d’objectifs #b traditionalistes radicaux#!"
 tenpo_outcome_balanced_tt: "Nous avons atteint autant d’objectifs #b traditionalistes radicaux#! que d’objectifs #b réformistes#!"
 tenpo_events.4.t: "Action et inaction"
 tenpo_events.4.d: "Peu impressionné[ROOT.GetCountry.GetRuler.GetCustom('FR_E')] par les résultats du programme de réforme, et face au mécontentement croissant de la population envers les conseillers, [ROOT.GetCountry.GetRuler.GetCustom('FR_LeLa')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] a démis [SCOPE.sCharacter('roju_scope').GetFullName] de ses fonctions."
 tenpo_events.4.f: "L’exil. L’ancien conseiller ne goûtait que très peu à cette idée, mais peut-être était-elle préférable à celle de rester à Edo, compte tenu des événements de la veille. Ses domestiques étaient encore occupés à retirer les pavés et les pierres qui avaient été jetés dans la mare et la cour. Jamais il n’oublierait certaines des menaces qu’il avait entendues ce jour-là.\n\nLa perspective d’un exil lui revint, et il la trouva tout à coup beaucoup moins repoussante. Et puis, il avait toujours voulu voir le mont Gassan de ses propres yeux."
 tenpo_events.4.a: "Je ne veux plus jamais voir cette andouille de ma vie."
 tenpo_events.4.b: "Contredisez toutes ses décisions, et assurez-vous que le peuple l’apprenne."
 tenpo_events.4.tt_1: "[SCOPE.sCharacter('roju_scope').GetFullName] est #r rétrogradé[SCOPE.sCharacter('roju_scope').GetCustom('FR_E')]#! et exilé[SCOPE.sCharacter('roju_scope').GetCustom('FR_E')] dans la province de #b Dewa#!"
 modifier_tenpo_fail: "Réformes Tenpō avortées"
 tenpo_events_4_demotion_tt: "Le [concept_leader|l] d’un [concept_interest_group|l] [concept_in_government|l] est rétrogradé et condamné à l’exil intérieur" # tooltip for event_outcome_failed_effect_desc in je_tenpo_crisis
 tenpo_events.5.t: "Résistance des propriétaires face à la centralisation"
 tenpo_events.5.d: "Notre décision de confisquer des terres à [SCOPE.sState('kanto_scope').GetName] et à [SCOPE.sState('kansai_scope').GetName] s’est heurtée à une opposition massive de la part des propriétaires locaux. Les plaintes les plus virulentes proviennent de ceux qui ont obtenu leurs terres en récompense pour leur service militaire."
 tenpo_events.5.f: "« C’est grâce au mérite militaire que mon ancêtre a acquis les terres que je détiens aujourd’hui. Depuis Sekigahara, chaque génération a labouré cette terre pour en augmenter le rendement et rendre à ses maîtres ce qui leur revient, sans jamais se plaindre.\n\nUn tel service mérite-t-il le traitement qui nous est accordé aujourd’hui ? Une délocalisation sans rétribution serait-elle notre récompense ? »"
 tenpo_events.5.a: "Annulez la centralisation avant que cela n’échappe à tout contrôle."
 tenpo_events.5.b: "Proposez-leur des terres supplémentaires en guise de compensation."
 tenpo_events.5.c: "Rappelez-leur que telle est la volonté [ROOT.GetCountry.GetRuler.GetCustom('FR_DuDela')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] !"
 modifier_heavy_handed_land_confiscations: "Confiscations de terres abusives"
 modifier_promotions_and_koku_redistribution: "Promotions et redistribution de koku"
 modifier_reckless_roju: "Rōjū intrépide"
 modifier_will_of_the_shogun: "Au nom du shogun"
 tenpo_events.6.t: "Un lion dans la tanière du dragon"
 tenpo_events.6.d: "La victoire [SCOPE.sCountry('britain_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('britain_scope').GetName] contre les [SCOPE.sCountry('china_scope').GetAltAdjective('MP')] a ébranlé notre nation. Les jonques et les armées de Chine ont été facilement écrasées par les forces [SCOPE.sCountry('britain_scope').GetAltAdjectiveNoFormatting('FP')|l] qui leur étaient supérieures, et beaucoup remettent en doute à présent la capacité [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName] à résister face à un assaut similaire."
 tenpo_events.6.f: "« Du temple Ganlu à l’ouest au temple Jinshan à l’est, les terres qui entouraient Zhenjiang étaient envahies de barbares noirs et blancs, comme les pierres d’un jeu de go, et les habitants se demandaient s’ils partiraient un jour. »\n\n– Mineta Fūkō, #italic Nouvelles d’outre-mer#!"
 tenpo_events.6.a: "Que le Ciel nous protège, car nos samouraïs ne pourront peut-être pas."
 tenpo_events.6.b: "Censurez tous les rapports négatifs en provenance de Chine."
 tenpo_events.6.c: "Nous sommes la falaise sur laquelle les vagues de barbares viendront s’écraser."
 modifier_opium_war_aftermath: "Des barbares à notre porte"
 modifier_defenses_strengthened: "Garnisons côtières renforcées"
 tenpo_events.7.t: "L’école Takashima"
 tenpo_events.7.d: "Craignant pour l’avenir du Japon suite à la guerre de l’opium, le magistrat [SCOPE.sCharacter('takashima_scope').GetFullName] de Nagasaki a créé une unité militaire moderne inspirée du modèle néerlandais, et encourage le reste du pays à en faire autant."
 tenpo_events.7.f: "« Les chapeaux de ses hommes ressemblent à d’étranges couronnes, et leurs ordres sont aboyés dans le langage fleuri caractéristique des Hollandais. Et pourtant, leurs formations sont bien formées et organisées, capables d’envoyer des salves deux fois plus rapides que mes propres serviteurs, même si elles sont un peu moins précises. »\n\n« Et l’artillerie ? »\n\n« Inégalée. Je crains que plus nous tarderons à l’adopter, moins nous aurons de chances de repousser une attaque barbare. »"
 tenpo_events.7.a: "Autorisez l’adoption de techniques et d’armes barbares."
 tenpo_events.7.b: "Favorisez plutôt les méthodes de tir traditionnelles."
 modifier_inoue_tatsuke_primacy: "Inoue-Tatsuke au premier rang"
 modifier_favouring_traditional_musketry_houses: "Promotion des méthodes de tir traditionnelles"
 modifier_favouring_takashima: "Méthodes de tir traditionnelles écartées"
 modifier_takashima_school: "Promotion de l’école Takashima"
 tenpo_events.8.t: "Pour un bol de riz"
 tenpo_events.8.d: "Les accusations proférées à l’encontre des accapareurs de riz et des profiteurs ont exacerbé les tensions entre agriculteurs et commerçants à [SCOPE.sState('tenpo_unrest_state_scope').GetName]. Les brigands et les mendiants ayant rejoint les rangs des paysans, les autorités locales font maintenant face à une révolte à l’échelle de toute la province."
 tenpo_events.8.f: "Il avait été l’un des premiers à attaquer la maison du commerçant sans scrupule pour redistribuer ses produits mal acquis au peuple. Mais en balayant le feu de camp du regard, il s’aperçut qu’ils n’étaient plus très nombreux. Eikichi et Matsuzō étaient encore là, même s’ils ne ressemblaient plus aux hommes qu’il avait connus autrefois, animés d’une colère légitime. Fukumatsu avait perdu la vie dès le deuxième jour, suivi par Takeshichi au septième jour. Les autres s’étaient dispersés comme des feuilles au vent, poursuivis par les hommes du magistrat.\n\nLa nature des hommes qui les avaient remplacés le remplissait de honte et de désespoir, mais il ne voyait pas d’autre solution. Car même une compagnie aussi indigne que la leur semblait divine comparée à la lame du bourreau."
 tenpo_events.8.a: "Envoyez des hommes pour réprimer ces vauriens."
 tenpo_events.8.b: "Toute cette agitation finira bien par retomber."
 tenpo_events.8.c: "Demandez aux chefs des villages de nous aider à apaiser la situation."
 modifier_consulted_headsmen: "Concessions des villages"
 modifier_lingering_brigandry: "Banditisme persistant"
 modifier_brutal_anti_bandit_campaigns: "Violentes campagnes de lutte contre le banditisme"
 je_taming_the_north: "Apprivoiser le nord"
 je_taming_the_north_reason: "Avec la création du #b bureau de colonisation de [SCOPE.sState('hokkaido_state_scope').GetName]#!, également connu sous le nom de #b Kaitakushi#!, cette ancienne région frontalière grouille d’activité. Chaque jour, de nouveaux arrivants débarquent du sud, à la recherche de nouvelles terres et de nouvelles opportunités.\n\nToutefois, il ne s’agit pas là d’un afflux de population comme les autres. En effet, parmi les colons se trouvent des bureaucrates, des intellectuels, et des visionnaires modernisateurs désireux de façonner le territoire et de voir leur vision [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName] projetée dans le [SCOPE.sState('hokkaido_state_scope').GetName] d’aujourd’hui."
 taming_the_north_agriculture_potentials_goal_tt: "Nous avons utilisé #v 3#! fois l’action #b $button_je_taming_the_north_agriculture_potentials$#!"
 taming_the_north_agriculture_arable_goal_tt: "Nous avons utilisé #v 3#! fois l’action #b $button_je_taming_the_north_agriculture_arable_land$#!"
 taming_the_north_colonies_goal_tt: "Nous avons utilisé l’action #b $button_je_taming_the_north_establish_colonies$#!"
 je_taming_the_north_additional_goal_pre: "Si nous possédons tout #b $STATE_SAKHALIN$#!, le [concept_timed_modifier|l] #b $modifier_tamed_north$#! s’appliquera aussi à la [concept_state_region|l] de $STATE_SAKHALIN$ :"
 je_taming_the_north_additional_goal: "Si nous possédons toute la région de [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName], le [concept_timed_modifier|l] #b $modifier_tamed_north$#! s’appliquera aussi à la région de [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName] :"
 je_taming_the_north_additional_goal_completed: "Puisque nous possédons toute la région de [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName], le [concept_timed_modifier|l] #b $modifier_tamed_north$#! s’appliquera aussi à la région de [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName] :"
 modifier_tamed_north: "Colonie modèle"
 modifier_northern_learnings: "Enseignements du Kaitakushi"
 button_je_taming_the_north_establish_colonies: "Établir des colonies soutenues par l’État"
 button_je_taming_the_north_establish_colonies_desc: "Une colonie qui n’a pas assez de colons est vouée à disparaître. Nous devrions envisager des mesures incitatives pour attirer les familles [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName] à venir s’installer au nord."
 button_je_taming_the_north_integrate_ainu: "Instaurer des protections juridiques pour les Aïnous"
 button_je_taming_the_north_integrate_ainu_desc: "Jusqu’à présent, la position du bureau de colonisation à l’égard des [GetCulture('ainu').GetCustom('getPluralDemonym')] était marquée par une intégration forcée et un effacement culturel. Toutefois, nos mesures progressives en vue d’établir une relation plus équitable avec les [GetCulture('ainu').GetCustom('getPluralDemonym')] du nord ont entraîné un réchauffement des relations entre nos deux peuples.\n\nUne proposition a été transmise [ROOT.GetCountry.GetRuler.GetCustom('FR_AuAla')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] pour reconnaître légalement les [GetCulture('ainu').GetCustom('getPluralDemonym')] comme un peuple frère protégé par la loi [ROOT.GetCountry.GetAltAdjective('FS')|l], et jouissant des mêmes droits et devoirs que les [GetCulture('japanese').GetName]."
 ainu_frenship_tt: "Nous avons toujours défendu les intérêts des [GetCulture('ainu').GetCustom('getPluralDemonym')] lors des #b événements#!"
 button_je_taming_the_north_sapporo_agricultural_college: "Fonder le collège d’agriculture de Sapporo"
 button_je_taming_the_north_sapporo_agricultural_college_desc: "Le nord est l’endroit idéal pour essayer les dernières théories dans les domaines de l’agriculture et de la gestion des terres. Nous allons fonder un collège d’agriculture dernier cri dont le personnel sera composé d’étrangers qualifiés, et qui servira de base à la transformation scientifique de notre territoire."
 sapporo_partner_positive_catalyst_tt: "Un [concept_diplomatic_catalyst|l] #g positif#! sera déclenché quand un pays quelconque répondra aux critères"
 button_je_taming_the_north_agriculture_potentials: "Introduire de nouvelles cultures"
 button_je_taming_the_north_agriculture_potentials_desc: "La superficie disponible sur l’île a beau être d’une importance capitale, le véritable développement économique n’aura lieu que si nous développons les bonnes cultures.\n\nLes dernières avancées dans le domaine de l’agriculture, incarnées par le #b collège d’agriculture de Sapporo#!, nous permettent d’introduire de nouvelles cultures sur ces terres glaciales que nous pensions impossibles à cultiver.\n\nOptions disponibles :\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#! (évolutif)\n• [GetBuildingType('building_rice_farm').GetName]\n• [GetBuildingType('building_dye_plantation').GetName]\n• [GetBuildingType('building_opium_plantation').GetName]\n• [GetBuildingType('building_vineyard').GetName]"
 established_sapporo_college_tt: "Nous avons fondé le #b collège d’agriculture de Sapporo#!"
 hokkaido_agriculture_potentials_tt: "Cette décision peut être prise #v 3#! fois au total. (actuellement [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0])"
 modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]"
 button_je_taming_the_north_agriculture_arable_land: "Poursuivre la récupération du sol"
 button_je_taming_the_north_agriculture_arable_land_desc: "Bien que ces vastes terres soient sous-exploitées d’un point de vue agricole, leur potentiel reste immense. Les grandes chaînes de montagnes, d’où jaillissent d’importantes sources d’eau, offrent de nombreuses possibilités d’extension vers le nord.\n\nNous devrons assécher les marécages, irriguer les champs et apprivoiser la terre, afin de témoigner de l’esprit inébranlable des [GetCulture('japanese').GetName]."
 hokkaido_agriculture_arable_tt: "Cette décision peut être prise #v 3#! fois au total. (actuellement [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0])"
 hokkaido_events.1.t: "Le huitième chemin"
 hokkaido_events.1.d: "Avec l’intégration de [SCOPE.sState('hokkaido_scope').GetName], ou des terres aïnoues, au Japon, il nous faut définir un nom qui reflétera le nouveau statut de ces terres. Le bureau de colonisation nouvellement créé a présenté un certain nombre de propositions qui devront être examinées par [ROOT.GetCountry.GetRuler.GetCustom('FR_LeLa')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l]."
 hokkaido_events.1.f: "« C’est une terre de sauvages, voilà tout. Une terre de marécages et de boue. De pauvres pêcheurs et de cannibales. Qu’espères-tu trouver en ce triste lieu que [ROOT.GetCountry.GetCapital.GetCityHubName] ne peut pas déjà t’offrir ? »\n\n« Un but, mère. Et quelque chose qui m’appartient. »"
 hokkaido_events.1.a: "Son nom sera #tooltippable;tooltip:hokkaido_events.1_tt_3 #b Hokkai-dō#!#!, le chemin de la Mer du Nord." # 北加伊道
 hokkaido_events.1.b: "#tooltippable;tooltip:hokkaido_events.1_tt_2 #b Hokkai-dō#!#!, en hommage aux habitants de cette terre." # 北海道
 hokkaido_events.1.c: "#tooltippable;tooltip:hokkaido_events.1_tt_4 #b Kaitō-dō#!#!, le chemin des îles de la mer, est de toute évidence la meilleure option."
 hokkaido_events.1.e: "#tooltippable;tooltip:hokkaido_events.1_tt_5 #b Hitakami-dō#!#! a un certain charme."
 hokkaido_events.1.tt_1: "La ville de #b Sapporo#! est fondée et devient la nouvelle capitale administrative de l’île, remplaçant ainsi #b Hakodate#!"
 modifier_ainu_heritage_aknowleged: "Pays des Kai"
 modifier_breaking_new_ground: "De nouvelles perspectives"
 modifier_hokkaido_naval_connections: "Circuit maritime"
 modifier_call_of_the_frontier: "Appel de la frontière"
 the_ainu_will_appreciate_this_tt: "@information! Les [GetCulture('ainu').GetCustom('getPluralDemonym')] s’en souviendront"
 hokkaido_events.1_tt_2: "#b Le chemin des Kai du nord#!\nD’après les propos du membre du bureau de colonisation Matsuura Takeshirō, #italic kai#! (加伊) est un ancien endonyme aïnou pour désigner leur peuple."
 hokkaido_events.1_tt_3: "#b Le chemin de la Mer du Nord#!\nUne contre-proposition du gouvernement à la proposition initiale de Matsuura Takeshirō. Ici, les caractères pour #italic kai#! (加伊) sont remplacés par le caractère #italic kai#! (海) à la prononciation identique, signifiant « mer ».\n\n@information! C’est cette proposition qui a été retenue."
 hokkaido_events.1_tt_4: "#b Le chemin des îles de la mer#!\nPar-dessus tout, l’île se définit par son rapport à la mer, chose qui devrait se refléter dans son nouveau nom."
 hokkaido_events.1_tt_5: "#b Le chemin du pays du soleil levant#!\nUn nom archaïque datant de la période Yamato pour les terres frontalières du nord-est. Cette option ancre fermement la nouvelle colonie dans le passé lointain du Japon."
 hokkaido_events.2.t: "La nouvelle frontière"
 hokkaido_events.2.d: "La question de savoir comment coloniser au mieux la région occupe l’esprit des membres du bureau de colonisation de [SCOPE.sState('hokkaido_state_scope').GetName] depuis quelque temps. Impatients, les administrateurs réclament une décision définitive."
 hokkaido_events.2.f: "En grandissant, son père lui parlait souvent de leurs ancêtres. Des nobles et fiers guerriers de la période des Royaumes combattants. De leur froide dignité et de leurs faits d’armes. Ces histoires le captivaient jadis, mais avec l’âge, elles le plongeaient dans une certaine mélancolie. Il ne supportait pas de voir son ivrogne de père, un bureaucrate de la ville qui ne portait une épée que pour la dignité qu’elle lui conférait, vanter les mérites du passé.\n\nAlors quand son père lui demanda de l’aider dans la gestion de ses affaires, il le considéra avec mépris et partit aussitôt vers le nord. Peut-être y trouverait-il le salut pour sa lignée ?"
 hokkaido_events.2.a: "Donnez la priorité à la colonisation par des colons soldats."
 hokkaido_events.2.b: "Les paysans sont la colonne vertébrale [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName]."
 hokkaido_events.2.c: "Limitez la plupart des colonies [GetCulture('japanese').GetName|l]es à des territoires inhabités par les [GetCulture('ainu').GetCustom('getPluralDemonym')]."
 modifier_tondenhei_settlements: "Colonies des tondenhei"
 modifier_peasant_settlements: "Colonies des paysans"
 modifier_restricted_settlements: "Territoires aïnous préservés"
 hokkaido_events.2.tt_1: "#v 1,5 %#! de tous les [Concept('concept_pop', '$concept_pops$')|l] [GetCulture('japanese').GetName|l] provenant de l’[concept_capital_state] migrera vers [SCOPE.sState('hokkaido_state_scope').GetName]"
 hokkaido_events.2.tt_2: "#v 3 %#! de tous les [Concept('concept_pop', '$concept_pops$')|l] [GetCulture('japanese').GetName|l] à [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (un des [Concept('concept_state', '$concept_states$')] avec le plus petit [Concept('concept_gdp','$concept_gdp_short$')] de l’[GetGeographicRegion('geographic_region_home_islands').GetName|l]) migreront vers [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_old_swords_in_new_lands: "Anciennes épées sur nouveaux territoires"
 modifier_go_north_young_man: "La conquête du Nord"
 hokkaido_events.3.t: "Graines du progrès"
 hokkaido_events.3.d: "Les récents progrès du collège d’agriculture de Sapporo ont donné lieu à des propositions visant à introduire de nouvelles cultures dans les champs de [SCOPE.sState('hokkaido_state_scope').GetName]."
 hokkaido_events.3.f: "#b Journal de laboratoire personnel, 154#!\nSuite aux résultats des derniers tests, les greffons de variétés occidentales ont été abandonnés au profit de variétés méridionales. Les garçons affirment que la limite de culture devrait être fortement repoussée au nord, peut-être même au-delà de Kamikawa. D’autres études devraient être menées pour évaluer le potentiel de rendement, mais je suis optimiste. J’ai demandé un entretien avec le directeur de la faculté demain. Il faut que je m’achète une nouvelle cravate."
 hokkaido_events.3.a: "Concentrons nos efforts sur l’amélioration des cultures déjà existantes."
 hokkaido_events.3.b: "Développez des variétés résistantes au froid pour permettre des [GetBuildingType('building_rice_farm').GetName|l] locales."
 hokkaido_events.3.c: "Les terres basses sont adaptées aux [GetBuildingType('building_dye_plantation').GetName|l] indigo."
 hokkaido_events.3.e: "L’opium prend bien ici, nous devrions miser sur les [GetBuildingType('building_opium_plantation').GetName|l]."
 hokkaido_events.3.g: "Installez des [GetBuildingType('building_vineyard').GetName|l] utilisant des cépages spécialisés."
 button_je_taming_the_north_complete: "Nous avons exploité ces terres autant que notre technologie nous le permet."
 modifier_introducing_new_crops: "Introduction de nouvelles cultures"
 modifier_opimizing_existing_variants: "Variétés de cultures adaptées au froid"
 hokkaido_events.4.t: "Croissance du sol" # Markens Grøde really does sound better in Norwegian
 hokkaido_events.4.d: "Le bureau de colonisation de [SCOPE.sState('hokkaido_state_scope').GetName] a franchi une nouvelle étape majeure, avec la transformation de vastes étendues d’anciens marécages en terres agricoles de grande valeur."
 hokkaido_events.4.f: "C’était vraiment impressionnant. Il y a dix ans, le plus grand bateau qui pouvait naviguer en toute sécurité sur la rivière qui coulait devant lui aurait été une simple barque. Aujourd’hui, il se tenait devant un groupe d’ouvriers occupés à décharger des caisses et des sacs en toile de jute d’une immense prame à vapeur dont la fumée s’élevait dans l’air frais des montagnes. Du matériel pour la prochaine écluse, peut-être ? Ou pour le projet de drainage un peu plus haut ? Ou peut-être simplement des provisions en provenance du nouveau village situé dans la vallée ? Il ne pouvait dire, et à vrai dire, cela n’avait aucune importance car s’il savait une chose, c’était que ce bateau transportait l’avenir."
 hokkaido_events.4.a: "Chacune de nos houes façonnera cette terre."
 hokkaido_events.4.b: "Et chacune de nos maisons la fera grandir."
 hokkaido_events.4.tt_1: "#v 2 %#! de tous les [Concept('concept_pop', '$concept_pops$')|l] [GetCulture('japanese').GetName|l] à [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (un des [Concept('concept_state', '$concept_states$')] avec le plus petit [Concept('concept_gdp','$concept_gdp_short$')] de l’[GetGeographicRegion('geographic_region_home_islands').GetName|l]) migreront vers [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_immigration_burst: "Vague d’immigration"
 modifier_open_to_business: "Ouvert au commerce"
 hokkaido_events.5.t: "Garçons, soyez ambitieux..."
 hokkaido_events.5.d: "Suite à la remise des diplômes de la première promotion du collège d’agriculture de Sapporo, dont le personnel est [SCOPE.sCountry('sapporo_partner_country_scope').GetAltAdjective('MS')|l], les anciens étudiants sont impatients de mettre en pratique leurs nouvelles compétences. Pendant ce temps, le conseil d’administration du collège réfléchit à l’orientation et aux priorités de l’institut."
 hokkaido_events.5.f: "« ... Soyez ambitieux, pas pour l’argent ou pour l’ambition personnelle, pas pour cette chose évanescente que les hommes appellent la gloire. Soyez ambitieux pour la réalisation de tout ce qu’un homme doit être. »\n\n– William Smith Clark, #italic Discours d’adieu du président du collège d’agriculture de Sapporo#!"
 hokkaido_events.5.a: "Un collège agricole devrait principalement se concentrer sur l’agriculture."
 hokkaido_events.5.b: "Nous devrions donner la priorité au développement de la faculté d’ingénierie."
 hokkaido_events.5.c: "Fondez une faculté des sciences humaines et mettez en place des études culturelles locales."
 hokkaido_events.5.tt_1: "L’influence du personnel [SCOPE.sCountry('sapporo_partner_country_scope').GetAltAdjective('MS')|l] de #b Sapporo#! entraîne la création d’une communauté [SCOPE.sReligion('sapporo_partner_religion_scope').GetName|l] [GetCulture('japanese').GetName|l]e locale"
 hokkaido_events.5.tt_2: "Débloque #b $button_je_taming_the_north_agriculture_potentials$#! et #b $button_je_taming_the_north_agriculture_arable_land$#! dans l’[concept_journal_entry|l] #b $je_taming_the_north$#!"
 modifier_sapporo_expanded_agricultural_faculty: "Pratiques agricoles innovantes"
 modifier_sapporo_expanded_engineering_faculty: "Faculté d’ingénierie avant-gardiste"
 modifier_sapporo_humanities_faculty: "Groupe d’études culturelles de Sapporo"
 hokkaido_events.6.t: "Ainu Mosir, Sisam Mosir"
 hokkaido_events.6.d: "Au cœur d’une controverse nationale, [ROOT.GetCountry.GetCapital.GetCityHubName] a publié un nouveau décret sur le statut juridique de [SCOPE.sState('hokkaido_state_scope').GetName], délimitant officiellement le territoire des Aïnous et mettant en place des institutions limitées coexistant avec l’appareil bureaucratique [ROOT.GetCountry.GetAltAdjective('MS')|l] officiel."
 hokkaido_events.6.f: "« Hinna ! Hinna ! » Dans un sourire presque édenté, la vieille femme aïnoue lui tendit son bol de soupe. Il regarda l’assortiment de gibier, et remercia le ciel que ses parents ne soient pas là pour le juger.\n\n« Qu’est-ce que je ne ferais pas pour la paix... », marmonna-t-il dans sa barbe en acceptant le bol avec un sourire crispé."
 hokkaido_events.6.a: "« Ce territoire est assez grand pour les colons et les indigènes. »"
 modifier_opposes_ainu_rights: "Concessions barbares"
 modifier_supports_ainu_rights: "Droits des Aïnous entérinés"
 hokkaido_events.7.t: "La dernière décision du bureau"
 hokkaido_events.7.d: "Annonçant officiellement le succès de sa mission mandatée par le gouvernement, le bureau de colonisation de [SCOPE.sState('hokkaido_state_scope').GetName] a choisi de transférer les responsabilités qui lui restent à l’État."
 hokkaido_events.7.f: "#b Proclamation n° 8#!\nPar la présente, le bureau de colonisation de [SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting] est aboli, et les trois préfectures suivantes sont créées : Hakodate, Sapporo et Nemuro. Les limites de leurs juridictions respectives seront définies ultérieurement."
 hokkaido_events.7.a: "Un bel exemple pour les futures entreprises de colonisation..."
 hokkaido_events.7.b: "... et pour l’[GetGeographicRegion('geographic_region_home_islands').GetName|l], qui plus est."
 modifier_external_applications: "Kaitakushi : candidatures extérieures"
 modifier_domestic_applications: "Kaitakushi : candidatures nationales"
 hokkaido_events.8.t: "Un bureau sans but"
 hokkaido_events.8.d: "La perte de [SCOPE.sStateRegion('hokkaido_state_region_scope').GetName] a entraîné la dissolution du bureau de colonisation avant même la fin de sa mission. En réponse, les citoyens indignés sont descendus dans les rues [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName] pour protester contre la perte du prestige national et de leurs intérêts personnels."
 hokkaido_events.8.f: "Épuisé, l’administrateur émérite se laissa tomber sur son siège de bureau et se servit un grand verre de saké qu’il vida d’un trait. Son regard se posa sur les cartes dépliées sur la table devant lui. Elles étaient couvertes de gribouillis et d’annotations sur les différents projets dans lesquels il avait investi tant d’énergie. Aujourd’hui, les projets et l’énergie avaient disparu, et l’optimisme qui se cachait derrière chacune de ces annotations prenait désormais un ton moqueur.\n\nAu diable tout cela, pensa-t-il avant de se servir un autre verre."
 hokkaido_events.8.a: "Malheureusement, cette décision ne dépend pas du gouvernement."
 modifier_lost_northern_investments: "Investissements perdus au nord"
