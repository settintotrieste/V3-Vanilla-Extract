 #Japan Single-Fire Events
 japan_events.31.t: "Théâtre en flammes à [SCOPE.sState('kabuki_theatre_state').GetCityHubName]"
 japan_events.31.d: "Un incendie s’est déclaré dans un célèbre théâtre de kabuki situé à [SCOPE.sState('kabuki_theatre_state').GetName]. Alors que la troupe envisage sa reconstruction, les membres du groupe [SCOPE.gsInterestGroup('relevant_ig').GetName], et notamment [SCOPE.sCharacter('relevant_leader').GetFullName], y voient une occasion en or pour réglementer les divertissements à [SCOPE.sState('kabuki_theatre_state').GetCityHubName] et contraindre les artistes de reconstruire leur théâtre en dehors de la ville."
 japan_events.31.f: "Au sommet de la plateforme d’une tour de guet se trouve une personne chargée de garder un œil attentif sur [SCOPE.sState('kabuki_theatre_state').GetCityHubName]. Tard dans la soirée, il repère les signes révélateurs d’un incendie depuis son poste d’observation. Tandis que la fumée s’élève dans le ciel et que l’odeur âcre du feu commence à emplir l’air, il se précipite pour sonner l’alerte.\n\nLes habitants, qui ne se doutaient de rien, sont avertis du danger, tandis que des brigades de pompiers se pressent sur les toits pour maîtriser les flammes. Une fois l’incendie contenu, il est évident que le mal est déjà fait. Du célèbre théâtre de kabuki, il ne reste que des braises et des cendres."
 japan_events.31.a: "Ils devront le reconstruire en dehors de la ville."
 japan_events.31.b: "Autorisez la troupe de théâtre à le reconstruire."
 modifier_kabuki_regulated: "Mesures répressives contre le théâtre de kabuki"
 modifier_theatre_affronted_official: "Fonctionnaire offensé"
 modifier_shogunate_opposition_ig_approval: "Opposition opportuniste"
 japan_events.32.t: "Images du monde flottant"
 japan_events.32.d: "L’œuvre d’un prolifique artiste d’ukiyo-e à [SCOPE.sState('ukiyo_e_state').GetCityHubName] a inspiré bon nombre d’artistes [ROOT.GetCountry.GetAltNameNoFormatting('En')][ROOT.GetCountry.GetName] comme à l’étranger."
 japan_events.32.f: "Une célèbre impression à partir de blocs de bois représente le quartier animé des théâtres en périphérie de [SCOPE.sState('ukiyo_e_state').GetCityHubName]. Le clair de lune argenté éclaire la rue principale où sont projetées les ombres de nombreux passants. Sur le trottoir de droite se trouvent des salons de thé et des théâtres de marionnettes. Sur celui de gauche, trois théâtres de kabuki sont alignés, chacun doté d’une tour du tambour.\n\n« Seule une main de maître pourrait tracer des traits aussi fermes et précis, aux ombres et aux nuances si délicates. Et seul un esprit de maître pourrait concevoir une silhouette aussi harmonieusement structurée, à la fois si forte et si fragile. »\n— F.W.G., #italic Bulletin de l’Art Institute of Chicago#!"
 japan_events.32.a: "Il ne fait aucun doute que l’art [ROOT.GetCountry.GetAltAdjectiveNoFormatting('MS')|l] continuera d’acquérir une renommée mondiale."
 japan_events.32.b: "Excellent. Encouragez la production de ces œuvres."
 modifier_ukiyo_e_prestige: "Impressions prolifiques au bloc de bois"
 modifier_ukiyo_e_production: "Production d’impressions au bloc de bois"
 japan_events.33.t: "Aux prises avec la tradition"
 japan_events.33.d: "Les effets de l’occidentalisation sur la culture [ROOT.GetCountry.GetAltAdjectiveNoFormatting('FS')|l] sont considérables. Tandis que les traditions évoluent rapidement, [SCOPE.sCharacter('relevant_character').GetCustom('FR_LeLa')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle|l] [SCOPE.sCharacter('relevant_character').GetFullName] finance un tournoi de sumo à [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], afin de lutter contre l’hostilité publique à l’égard de cette tradition."
 japan_events.33.f: "Les spectateurs commencent à affluer dans la nouvelle salle de sumo construite dans l’enceinte du temple, curieux de découvrir cet événement qui a tout le soutien [SCOPE.sCharacter('relevant_character').GetCustom('FR_DuDela')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle|l]. Parmi eux se trouvent des aristocrates et des hommes d’État qui, obsédés par la culture occidentale, ne voient pas d’un bon œil le maintien de cette tradition. Bien que l’âge d’or du sumo soit révolu depuis longtemps, la présence [SCOPE.sCharacter('relevant_character').GetCustom('FR_DuDela')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle|l] [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] pourra peut-être rétablir l’importance culturelle de ce sport aux yeux du peuple."
 japan_events.33.a: "Les efforts [SCOPE.sCharacter('relevant_character').GetCustom('FR_DuDela')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle|l] redoreront l’image publique de ce sport."
 japan_events.33.b: "La tradition de ce sport [ROOT.GetCountry.GetAltAdjectiveNoFormatting('MS')|l] connaîtra une grande longévité."
 modifier_restored_sumo_popularity: "Popularité du sumo restaurée"
 modifier_traditional_sports_movement_support: "Sport national"
 japan_events.34.t: "Catastrophe lors d’une chasse à la baleine à [SCOPE.sState('whaling_state').GetPortHubName]"
 japan_events.34.d: "Au large de [SCOPE.sState('whaling_state').GetName], un bateau a repéré deux baleines, une mère et son baleineau. Animé par le désespoir après une saison de disette, un groupe spécialisé dans la chasse à la baleine s’est aventuré en mer malgré des conditions météorologiques défavorables. Plus de 100 personnes sont portées disparues."
 japan_events.34.f: "Le feu de joie sur le bateau avait disparu depuis longtemps, et la flotte n’était plus visible depuis la terre, ce qui provoquait une grande agitation à [SCOPE.sState('whaling_state').GetPortHubName].\n\n« Même en des temps particulièrement difficiles, nous avons toujours évité de chasser une mère et un baleineau », affirme un homme. « Nous aurions dû laisser partir ces baleines. »\n\n« N’importe quoi », répondit son cousin. « Les baleines sont une bénédiction. Je suis sûr que l’expédition reviendra bientôt avec un magnifique butin. »"
 japan_events.34.a: "La chasse à la baleine est une industrie essentielle à [SCOPE.sState('whaling_state').GetNameNoFormatting]."
 japan_events.34.b: "À l’avenir, nous devrons plutôt concentrer nos efforts sur la pêche à [SCOPE.sState('whaling_state').GetNameNoFormatting]."
 modifier_whaling_deaths: "Victimes de la chasse à la baleine"
 modifier_redouble_on_whaling: "Bel avenir pour la chasse à la baleine"
 modifier_fishing_not_whaling: "Bel avenir pour la pêche"
 japan_events.35.t: "Mesures contre les incendies criminels"
 japan_events.35.d: "Les membres du groupe [SCOPE.gsInterestGroup('relevant_ig').GetName] sont inquiets, car la fréquence élevée des incendies criminels à [SCOPE.sState('relevant_state').GetCityHubName] a entraîné une flambée des prix des [SCOPE.sGoods('expensive_good').GetName|l] [ROOT.GetCountry.GetAltNameNoFormatting('En')][ROOT.GetCountry.GetName]. Ils affirment qu’il est nécessaire de prendre des mesures radicales pour lutter contre les incendies criminels."
 japan_events.35.f: "Le signal d’alarme retentit depuis la tour de guet pour avertir les habitants qu’un nouvel incendie s’est déclaré à [SCOPE.sState('relevant_state').GetCityHubName], ravageant commerces et habitations. Alors que les brigades de pompiers arrivent pour éteindre les flammes, les chōnin se rassemblent en masse dans la rue. Certains regardent leurs voisins avec méfiance, tandis que d’autres se mettent à débattre sur l’origine criminelle ou accidentelle de l’incendie. Une chose est sûre : le prix des [SCOPE.sGoods('expensive_good').GetNameNoFormatting|l] montera bientôt en flèche."
 japan_events.35.a: "Des mesures strictes sont nécessaires. Exécutez les pyromanes présumés."
 japan_events.35.b: "Graciez ceux dont le crime n’a pas encore été jugé et qui participeront aux arrestations."
 modifier_arson_measure_strict_ig: "Mesures strictes contre les incendies criminels"
 modifier_arson_measure_strict_pop: "Exécutions de pyromanes"
 modifier_arson_measure_lenient_ig: "Mesures clémentes contre les incendies criminels"
 # Colonization of Korea Content
 je_colonize_korea: "Le gouvernement de Chōsen"
 je_colonize_korea_reason: "#italic « L’industrie et le commerce connaîtront une croissance fulgurante grâce à une bonne gouvernance et à la paix. Nous sommes absolument convaincus que la paix en Asie de l’Est reposera sur des bases plus solides que jamais. »\n— Journal de l’empereur Meiji, Volume 12#!\n\nLe moment est venu de maintenir une présence permanente dans la péninsule coréenne. C’est notre seul moyen de garantir la prospérité future et la sécurité [JournalEntry.GetCountry.GetAltNameNoFormatting('Du')][JournalEntry.GetCountry.GetName] et de toute la région d’[GetGeographicRegion('geographic_region_east_asia').GetName]. Afin d’en assurer le contrôle, nous devons superviser le développement de la [GetGeographicRegion('geographic_region_korea').GetName] et ne pas renoncer à nos ambitions."
 je_colonize_korea_is_owned_by_tt: "Est en possession [JournalEntry.GetCountry.GetAltNameNoFormatting('Du')][JournalEntry.GetCountry.GetName]"
 je_colonize_korea_culture_percent_seoul_tt: "La [Concept('concept_pop','$concept_population$')|l] [GetCulture('japanese').GetCustom('getSingularDemonymFemale')|l] de $STATE_SEOUL$ est supérieure ou égale à #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_busan_tt: "La [Concept('concept_pop','$concept_population$')|l] [GetCulture('japanese').GetCustom('getSingularDemonymFemale')|l] de $STATE_BUSAN$ est supérieure ou égale à #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_yangho_tt: "La [Concept('concept_pop','$concept_population$')|l] [GetCulture('japanese').GetCustom('getSingularDemonymFemale')|l] de $STATE_YANGHO$ est supérieure ou égale à #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_sariwon_tt: "La [Concept('concept_pop','$concept_population$')|l] [GetCulture('japanese').GetCustom('getSingularDemonymFemale')|l] de $STATE_SARIWON$ est supérieure ou égale à #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_pyongyang_tt: "La [Concept('concept_pop','$concept_population$')|l] [GetCulture('japanese').GetCustom('getSingularDemonymFemale')|l] de $STATE_PYONGYANG$ est supérieure ou égale à #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_fail_tt: "La #bold [GetGeographicRegion('geographic_region_korea').GetName]#! n’est plus sous contrôle [ROOT.GetCountry.GetAltAdjective('MS')|l]"
 korea_colinzation_2b_executive_tt: "Un [concept_executive|l] obtient #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_tt $modifier_peninsula_control_loyal_prominence$#! pendant #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! ans"
 korea_colinzation_2b_company_tt: "Une [concept_company|l] obtient #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_company_bonus_tt $modifier_peninsula_control_company_bonus$#! pendant #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! ans"
 modifier_peninsula_control_loyal_prominence_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetName|v][GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetDesc]"
 modifier_peninsula_control_company_bonus_tt: "[GetStaticModifier('modifier_peninsula_control_company_bonus').GetName|v][GetStaticModifier('modifier_peninsula_control_company_bonus').GetDesc]"
 korea_colinzation_3b_tt: "Quelqu’un doit assumer la responsabilité de cet échec."
 korea_colinzation_3b_ig_leader_tt: "Un [concept_leader|l] obtient #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_loss_tt $modifier_peninsula_control_loyal_prominence$#! pendant #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! ans"
 korea_colinzation_3b_ig_tt: "Un [concept_interest_group|l] obtient #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_approval_pol_str_loss_tt $modifier_peninsula_control_approval_pol_str_loss$#! pendant #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! ans"
 modifier_peninsula_control_loyal_prominence_loss_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence_loss').GetName|v][GetStaticModifier('modifier_peninsula_control_loyal_prominence_loss').GetDesc]"
 modifier_peninsula_control_approval_pol_str_loss_tt: "[GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetName|v][GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetDesc]"
 korea_colonization.2.t: "Un avenir prometteur"
 korea_colonization.2.d: "Le monde entier sait désormais que la [GetGeographicRegion('geographic_region_korea').GetName] appartient [ROOT.GetCountry.GetAltNameNoFormatting('Au')][ROOT.GetCountry.GetName] et se trouve sous le contrôle total de notre pays. En maintenant notre présence dans la péninsule, nous confirmons la place de premier plan que nous occupons sur la scène internationale."
 korea_colonization.2.f: "Maintenant que la vision d’une unification entre les nations est devenue réalité, [ROOT.GetCountry.GetRuler.GetCustom('FR_LeLa')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] affiche de nouvelles ambitions. Depuis [ROOT.GetCountry.GetCapital.GetCityHubName], [ROOT.GetCountry.GetRuler.GetCustom('FR_IlElle')] compose des poèmes de tanka en repensant au succès de cette démarche et du développement dans la péninsule.\n\nAu même moment, à $STATE_SEOUL$, un bureaucrate [GetCulture('korean').GetNameNoFormatting|l] étouffe la révolte populaire menée par les civils qui s’opposent au nouvel ordre social. En s’adressant à eux avec un calme olympien, il insiste sur le fait que cette union garantira la prospérité de tous."
 korea_colonization.2.a: "La prospérité future et la sécurité de la péninsule sont assurées."
 korea_colonization.2.b: "L’entreprise a toujours fait partie intégrante de notre programme."
 modifier_peninsula_control_prestige_authority: "Prestige de la péninsule"
 modifier_peninsula_control_assimilation_migration: "Assimilation accélérée"
 modifier_peninsula_control_loyal_prominence: "Supervision exemplaire"
 modifier_peninsula_control_company_bonus: "Éloge de la compagnie"
 korea_colonization.3.t: "Une opportunité perdue"
 korea_colonization.3.d: "La [GetGeographicRegion('geographic_region_korea').GetName] n’est plus sous notre autorité. L’impact économique et diplomatique se fera sentir [ROOT.GetCountry.GetAltNameNoFormatting('En')][ROOT.GetCountry.GetName] pendant des années."
 korea_colonization.3.f: "Frustrés et mécontents, les responsables [ROOT.GetCountry.GetAltAdjectiveNoFormatting('MP')|l] se réunissent pour discuter de l’échec du gouvernement dans le maintien de l’ordre dans la péninsule. Beaucoup refusent tout compromis après ce revers à la puissance considérable acquise par [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetNameNoFormatting] ces dernières années.\n\nUn homme se lève pour prendre la parole au milieu du brouhaha des conversations : « Le groupe d’intérêt [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] pourra certainement assumer la responsabilité de cet échec. »"
 korea_colonization.3.a: "Nous devons tous porter la responsabilité de notre échec."
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName] et le groupe d’intérêt [SCOPE.gsInterestGroup('relevant_ig').GetName] devront endosser la responsabilité de cet échec."
 modifier_peninsula_control_prestige_loss: "Perte de contrôle"
 modifier_peninsula_control_loyal_prominence_loss: "Chute de la notoriété"
 modifier_peninsula_control_approval_pol_str_loss: "Influence en berne"
