 special_character_japanese_emperor_desc: "Ce personnage est actuellement l’empereur du Japon, au cœur des institutions religieuses et politiques japonaises."
 japan_monarchy.1.t1: "L’ère Kaei"
 japan_monarchy.1.t2: "L’ère Tenkyū"
 japan_monarchy.1.d1: "Le prince [SCOPE.sCharacter('emperor_scope').GetFirstName] est monté sur le trône du chrysanthème en tant qu’empereur du Japon. Son avènement marque le début de l’ère Kaei, qui signifie « félicité éternelle »."
 japan_monarchy.1.d2: "Le prince [SCOPE.sCharacter('emperor_scope').GetFirstName] est monté sur le trône du chrysanthème en tant qu’empereur du Japon. Son avènement marque le début de l’ère Tenkyū, qui signifie « éternité divine »."
 japan_monarchy.1.f: "Placé à l’abri des regards, un musicien donna le signal. Deux femmes de la cour ouvrirent les rideaux du trône. L’empereur était là, vêtu d’une robe écarlate ornée de dragons blancs et verts. Son siège semblait englouti par leur volume, lui donnant l’impression de flotter dans les airs. De sa couronne tombait un rideau de perles, dont les ombres lui masquaient les yeux.\n\nLes vêtements bruissaient tout autour de [SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting], qui baissa la tête tandis que les autres personnes présentes se prosternaient telle une grande vague. [SCOPE.sCharacter('name_scope').GetSheHe|U] les suivit et bientôt, le visage de l’empereur ne fut plus visible.\n\nDes jours plus tard, sur le chemin du retour vers Edo, [SCOPE.sCharacter('name_scope').GetCustom('FR_IlElle')] essaya de se remémorer ce qu’[SCOPE.sCharacter('name_scope').GetCustom('FR_IlElle')] avait vu, en vain. [SCOPE.sCharacter('name_scope').GetSheHe|U] se souvenait de la couronne, des rideaux, des boîtes posées à côté de l’empereur. Mais de l’homme en tant que tel, [SCOPE.sCharacter('name_scope').GetCustom('FR_IlElle')] n’avait aucun souvenir."
 japan_monarchy.1.a: "Vos années de règne seront aussi nombreuses que les grains de sable sur le rivage."
 japan_monarchy.2.t: "L’ère Meiji"
 japan_monarchy.2.d: "Le prince [SCOPE.sCharacter('emperor_scope').GetFirstName] est monté sur le trône du chrysanthème en tant qu’empereur du Japon. Son avènement marque le début de l’ère [SCOPE.sCharacter('emperor_scope').GetFirstName], qui tire son nom de la promesse d’un gouvernement éclairé."
 japan_monarchy.2.f: "Un gong retentit, et le rideau se leva. L’espace d’une seconde, le public aperçut l’empereur, richement vêtu de soie jaune, le visage à moitié masqué par l’obscurité. Une boîte laquée verte posée à sa gauche masquait l’épée et le joyau sacrés. Le maître d’armes parla alors, et toutes les personnes présentes baissèrent les yeux. Le messager prit la parole, d’une voix forte et claire.\n\n« Il y a des millénaires, à l’époque des dieux, les fondements du royaume furent posés, puis, à Kashihara, l’empereur divin entreprit de fonder la dynastie impériale. La lignée impériale s’est ainsi perpétuée sans interruption. Conformément aux anciennes coutumes et aux précédents règnes, nous recevons aujourd’hui la Succession divine et occupons le Grand trône impérial. »" # Very heavily pared down excerpt of the rites at Meiji's enthronement
 japan_monarchy.2.a: "Vos années de règne seront aussi nombreuses que les grains de sable sur le rivage."
 japan_monarchy.3.t: "L’ère Taishō"
 japan_monarchy.3.d: "Le prince [SCOPE.sCharacter('emperor_scope').GetFirstName] est monté sur le trône du chrysanthème en tant qu’empereur du Japon. Son avènement marque le début de l’ère [SCOPE.sCharacter('emperor_scope').GetFirstName], qui signifie « période de grande justice »."
 japan_monarchy.3.f: "La charnière grinça lorsqu’un homme passa le long de l’échafaudage, que Yatarō maintenait aussi fermement que possible. Quand il entendit les pas s’éloigner, il entreprit de le fixer à l’aide de son maillet.\n\nToutes sortes de bruits similaires résonnaient autour de lui. Du coin de l’œil, il pouvait voir une autre équipe assembler les planches de bois noir du bâtiment voisin. Un contremaître criait ses instructions à un homme qui portait un tas de chaume.\n\nDans six jours, l’empereur emprunterait le passage qu’il construisait, au cours d’une cérémonie unique qui aboutirait à sa destruction. Il ne pourrait pas y assister. Le mieux qu’il puisse espérer, c’était de voir son éclat se refléter dans les nuages."
 japan_monarchy.3.a: "Vos années de règne seront aussi nombreuses que les grains de sable sur le rivage."
 japan_monarchy.4.t: "L’ère Shōwa"
 japan_monarchy.4.d: "Le prince [SCOPE.sCharacter('emperor_scope').GetFirstName] est monté sur le trône du chrysanthème en tant qu’empereur du Japon. Son avènement marque le début de l’ère [SCOPE.sCharacter('emperor_scope').GetFirstName], qui tire son nom de la promesse d’une paix éclairée."
 japan_monarchy.4.f: "Quatre générations de la famille Takaishi étaient rassemblées autour du poste de radio. La voix qui en émanait, teintée de parasites, semblait provenir du fond d’un puits. Giyō tourna le bouton dans un sens, puis dans l’autre. Tout à coup, la même voix était devenue forte et claire.\n\n« ... Le secrétaire général du Cabinet a publié une autre version annonçant la nouvelle ère. À compter de ce jour, l’ère sera modifiée en première année de [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]... »\n\nSa mère jeta un coup d’œil au journal posé sur la table de la cuisine. « Pas Kobun ? Est-ce qu’il dit la vérité ? »\n\nDes murmures désapprobateurs s’élevèrent dans la pièce, et Giyō monta le volume du poste de radio. En vain. S’il y avait autre chose, il devrait l’apprendre demain dans le journal."
 japan_monarchy.4.a: "Vos années de règne seront aussi nombreuses que les grains de sable sur le rivage."
 japan_monarchy.5.t: "Un empereur, une ère"
 japan_monarchy.5.d: "Maintenant que la primauté politique de la cour impériale a été restaurée, l’empereur a promulgué un édit pour réformer le système des ères. Une nouvelle ère sera désormais déclarée pour l’accession d’un nouvel empereur, et durera tout au long de son règne."
 japan_monarchy.5.f: "#bold Édit impérial#!\n\nL’avènement d’une nouvelle ère, marquée par le mandat céleste reçu par le souverain sacré, constitue le modèle exemplaire d’une époque éclairée, et la norme pour dix mille générations. Ayant hérité d’une grande lignée et m’étant personnellement occupé de nombreuses affaires d’État, je change à présent le nom de l’ère afin de marquer un nouveau départ avec les innombrables sujets du royaume. La [ROOT.GetCountry.GetCustom('JAP_era_year_name')|l] sera désormais connue comme la première année de [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]. À compter de ce jour, l’ancien système sera réformé, établissant ainsi le principe d’un nom d’ère par règne comme pratique permanente." # Shortened 'One Emperor, One Era' edict - 今後年號ハ御一代一號ニ定メ慶應四年ヲ改テ明治元年ト爲ス及詔書
 japan_monarchy.5.a: "Les autorités compétentes mettront cela en œuvre."
 japan_monarchy.6.t: "La mort du Daijō Tennō"
 japan_monarchy.6.d: "L’empereur retiré, père déchu de l’empereur actuel, est mort. [SCOPE.sCharacter('retired_emperor_scope').GetSheHe|U] restera célèbre pour avoir restauré le prestige impérial, et a reçu le nom posthume de [SCOPE.sCharacter('retired_emperor_scope').GetFirstName]."
 japan_monarchy.6.f: "Tōhō trempa son pinceau dans l’encre et, de la pointe, écrivit sur la page les caractères correspondant au jour, à l’année, et à la météo. Il passa à la colonne suivante, puis s’interrompit.\n\nQuelle formulation serait la plus appropriée ? Comment exprimer au mieux le sens de ce qui s’était passé ? Il avait entendu des rumeurs sur les efforts considérables consentis par l’empereur retiré pour restaurer la cour. Il se souvenait de son règne et des récits des cérémonies qu’il avait remises au goût du jour. Puis il avait reçu l’émissaire de la cour et avait appris la vérité à ce sujet.\n\nLe pinceau entra en contact avec le papier. « Reçu une demande concernant le titre d’empereur. Consulté la généalogie impériale, et conseillé... »"
 japan_monarchy.6.a: "Ses descendants réaliseront-ils ses souhaits ?"
