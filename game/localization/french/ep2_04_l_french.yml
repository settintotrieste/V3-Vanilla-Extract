 ig_in_pro_country_lobby_tt: "Le [concept_interest_group|l] appartient à un [concept_political_lobby|l] allié"
 iwakura_mission.1.t: "La mission vers l’Occident"
 iwakura_mission.1.d: "Le gouvernement a dressé une liste de plusieurs ministres et responsables en mesure d’endosser le rôle d’ambassadeur extraordinaire et plénipotentiaire. La personne choisie devra diriger une expédition vers l’Occident pendant une période de dix mois."
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting] se tenait devant le miroir et rajustait sa cravate pour la troisième fois. La pratique était apparue depuis quelque temps au Japon, d’abord sous la forme d’une mode, puis par décret de l’État, mais ce n’est pas encore un geste qui lui était naturel. [SCOPE.sCharacter('expedition_leader_1').GetSheHe|U] allait pourtant devoir faire avec. Si l’accord aboutissait et que le gouvernement validait sa proposition, et [SCOPE.sCharacter('expedition_leader_1').GetCustom('FR_SilSielle')] devait se rendre à Londres, Boston et Paris, [SCOPE.sCharacter('expedition_leader_1').GetCustom('FR_IlElle')] n’aurait plus de répit."
 iwakura_mission.1.a: "Cette question mérite toute l’attention de [SCOPE.sCharacter('expedition_leader_1').GetFullName]."
 iwakura_mission.1.b: "Nommez [SCOPE.sCharacter('expedition_leader_2').GetFullName] à ce poste."
 iwakura_mission.1.c: "Pour cela, nous pouvons compter sur [SCOPE.sCharacter('expedition_leader_3').GetFullName]."
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName] serait très bien dans ce rôle."
 iwakura_mission.2.t: "Le rapport de [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]"
 iwakura_mission.2.d: "Suite au retour de la mission [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] au $JAP$, [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] et ses ambassadeurs ont présenté leur rapport devant [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')|l]. Ils y font notamment part de leurs observations de la société industrielle et de leurs recommandations pour les nouvelles politiques nationales."
 iwakura_mission.2.f: "« En y réfléchissant, il est évident que le succès des nations européennes et américaines vient de leur application des principes. Ceux qui parcourent le monde observent que, si les structures de gouvernance dans la dizaine de nations étudiées peuvent varier, toutes consacrent leurs efforts à l’éducation, ce qui les rassemble sous une même bannière. Par conséquent, vous ne trouverez sur ces terres aucun endroit dépourvu d’écoles, et aucune personne dépourvue de l’esprit des Lumières. »\n\n— Tanaka Fujimaro"
 iwakura_mission.2.a: "L’Occident nous a ouvert une fenêtre sur la modernité."
 iwakura_mission.2.b: "Les industries de style [SCOPE.sCountry('iwakura_good_economy_country').GetAltAdjective('MS')|l] seront l’avenir du Japon."
 iwakura_mission.2.c: "Nous avons beaucoup à apprendre de la politique [SCOPE.sCountry('iwakura_desired_law_country').GetAltAdjective('FS')|l]."
 iwakura_mission.2.e: "Une réforme agraire basée sur le modèle [SCOPE.sCountry('iwakura_land_reform_law_country').GetAltAdjective('MS')|l] redynamiserait nos campagnes."
 iwakura_mission.4.t: "Le Golden Gate"
 iwakura_mission.4.d: "Après un long voyage en mer, la mission [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] est enfin arrivée [SCOPE.sCountry('iwakura_mission_host').GetAltNameNoFormatting('En')][SCOPE.sCountry('iwakura_mission_host').GetName]. La mission prévoit d’emprunter les lignes ferroviaires jusqu’à [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName] et d’inspecter les institutions et les installations industrielles [SCOPE.sCountry('iwakura_mission_host').GetAltAdjectiveNoFormatting('FP')|l] en chemin."
 iwakura_mission.4.f: "« À l’aube, le brouillard marin était si épais que l’on pouvait à peine voir quelques mètres devant nous. Le navire s’arrêta, attendant le lever du jour. Quand la lumière se fit, le brouillard se dissipa peu à peu, révélant devant nous la côte californienne. En temps voulu, nous atteignîmes le centre de deux caps rocheux, où les montagnes se dressaient de part et d’autre. De là-haut, on pouvait voir la fumée des navires à vapeur qui allaient et venaient en mer. C’était ce magnifique paysage que l’on appelait le Golden Gate.\n\nAprès vingt-deux jours passés à traverser l’océan, nous aperçûmes enfin les montagnes et les eaux d’Orient. À cet instant, on n’entendit que des cris de joie à bord. »\n\n— Kume Kunitake, #italic L’ambassade Iwakura, 1871-1873#!"
 iwakura_mission.4.a: "À nous de faire découvrir ce continent."
 iwakura_mission.4.b: "L’Amérique n’est rien de plus que la porte menant vers l’Europe."
 iwakura_mission.5.t: "Le ventre de la baleine"
 iwakura_mission.5.d: "Après avoir traversé de l’océan Pacifique à l’océan Atlantique, la mission [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] est enfin arrivée [SCOPE.sCountry('iwakura_mission_host').GetAltNameNoFormatting('En')][SCOPE.sCountry('iwakura_mission_host').GetName]. La mission cherche à établir des relations diplomatiques avec le gouvernement [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetCustom('FR_DuDela')] [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle|l], et visiter les lieux fondateurs de la révolution industrielle."
 iwakura_mission.5.f: "« Tandis que l’Amérique prospérait, le port de Liverpool ne cessait de se développer. À l’entrée du port, des quais avaient été construits sur près de dix kilomètres le long de la rive nord. Face à la mer, une digue en pierre avait été érigée à l’image des remparts d’un château, où des quais avaient été creusés dans toutes les directions. Tous les navires, qu’ils arrivent ou qu’ils partent, passent par ces quais pour y jeter l’ancre. Leurs mâts ressemblent à une forêt d’arbres majestueux, et le gréement à des filets suspendus pour sécher dans un village de pêcheurs. On nous a dit qu’il s’agissait des plus grands quais du monde. »\n\n— Kume Kunitake, #italic L’ambassade Iwakura, 1871-1873#!"
 iwakura_mission.5.a: "Suivez chaque piste qui nous est proposée."
 iwakura_mission.5.b: "Deux mois suffisent pour visiter [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName]."
 iwakura_mission.6.t: "De l’autre côté du continent"
 iwakura_mission.6.d: "La mission [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] est arrivée en Europe continentale, en commençant par [SCOPE.sCountry('iwakura_mission_host').GetAltNameNoFormatting('Le')][SCOPE.sCountry('iwakura_mission_host').GetName]. Au cours des prochains mois, la mission aura pour but d’observer, évaluer, et établir des relations avec les nombreuses nations du continent."
 iwakura_mission.6.f: "« Cet après-midi, nous avons visité un cimetière dont nous avons oublié de demander le nom. Il se trouve dans la banlieue est de Paris et s’étend sur plus de seize hectares. À part une grande allée, il n’y a quasiment pas d’espace libre.\n\nAujourd’hui, nous avons assisté à des funérailles organisées pour une famille apparemment modeste. Un petit cortège suivait un cercueil en bois, avant que celui-ci ne soit placé dans une tombe. Après la prière du prêtre, les personnes présentes ont toutes jeté une poignée de terre. Tout le monde était en larmes, mais personne ne s’est répandu en lamentations. »\n\n— Kume Kunitake, #italic L’ambassade Iwakura, 1871-1873#!"
 iwakura_mission.6.a: "Nous prendrons le temps de comparer nos coutumes."
 iwakura_mission.6.b: "Notre emploi du temps exige une visite accélérée."
 iwakura_mission.8.t: "L’autre moitié"
 iwakura_mission.8.d: "En chemin vers [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetName], la mission [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] a fait escale dans la colonie [SCOPE.sCountry('iwakura_mission_host').GetAltAdjective('FS')|l] de [SCOPE.sState('iwakura_mission_location').GetName]. La mission a passé plusieurs jours à observer la société coloniale européenne et les pratiques [GetReligion('theravada').GetNameNoIcon|l]."
 iwakura_mission.8.f: "« Au cours de notre visite, un moine nous a appelés #italic danna#! et a désigné un temple sous le nom de #italic garan#!. Nous avons été impressionnés de constater que l’origine sanskrite de ces mots avait été préservée jusqu’à aujourd’hui. Ceylan est une terre sacrée du bouddhisme, auquel les habitants sont encore très attachés. Si la vie des gens d’ici est déjà simple, celle des moines l’est encore plus. Leurs repas sont frugaux, leurs ermitages sont envahis par les mauvaises herbes, et tout ici est d’une extrême simplicité.\n\nComparé aux lieux sacrés du christianisme ou de l’islam, le contraste est saisissant. Est-ce parce que cette religion a renoncé au confort matériel ? Peut-être. Ou peut-être est-ce parce qu’il lui manque la force de s’épanouir. »\n\n— Kume Kunitake, #italic L’ambassade Iwakura, 1871-1873#!"
 iwakura_mission.8.a: "Cela aurait-il pu nous arriver ?"
 iwakura_mission.9.t: "Port de Yokohama"
 iwakura_mission.9.d: "Après avoir passé des mois à l’étranger et aux quatre coins du globe, la mission [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] est de retour [ROOT.GetCountry.GetAltNameNoFormatting('En')][ROOT.GetCountry.GetName]. Ses membres ont rapporté avec eux des compilations de données, des produits étrangers, et des témoignages directs sur les technologies et les institutions politiques occidentales."
 iwakura_mission.9.f: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] se tenait sur le pont du bateau à vapeur, le regard perdu vers l’ouest. Au loin, [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetCustom('FR_IlElle')] pouvait admirer l’immensité du mont Fuji, enveloppé d’une brume matinale qui ne s’était levée qu’à moitié. Un petit groupe d’Occidentaux, des marchands peut-être, ou des voyageurs en herbe comme [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetCustom('FR_LuiElle')|l], s’était formé près de la rambarde. Un Allemand était assis près de la porte de la cabine et dessinait le panorama dans un carnet. [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe|U] se demandait s’il s’agissait de leur première fois, ou si comme [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetCustom('FR_LuiElle')|l], ils avaient le souffle coupé à chaque fois qu’ils contemplaient ce paysage.\n\nCombien de personnes pouvaient se targuer d’avoir voyagé autant ? Combien de personnes avaient traversé trois océans, visité quatre continents ? Ce n’était qu’un début, pensa-t-[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetCustom('FR_IlElle')]. Le chemin de fer et le navire à vapeur rendraient les voyages plus faciles, mais [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetCustom('FR_IlElle')] ferait à tout jamais partie des premiers."
 iwakura_mission.9.a: "Il n’y a rien de mieux que de rentrer chez soi."
 je_iwakura_mission: "Restauration : la mission [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]"
 je_iwakura_mission_reason: "Dans le cadre de ses mesures de modernisation, le nouveau gouvernement [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName] a envoyé [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] et un certain nombre de ministres et de spécialistes en mission diplomatique dans le monde occidental. La mission [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] cherche à renégocier des traités inéquitables avec l’Occident et à étudier les fondations politiques et technologiques des grandes puissances.\n\nPour chaque #b mois#! passé dans un pays, la mission aura une chance de recueillir des informations sur la législation ou les technologies de ce pays. Ces découvertes affecteront le rapport que la mission remettra à son retour, ainsi que l’[concept_ideology|l] du chef de l’expédition."
