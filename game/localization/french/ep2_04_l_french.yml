 ep2_meiji.1.t: "Sonnō jōi"
 ep2_meiji.1.d: "La fin du sakoku a entraîné un sentiment d’impuissance face à l’ingérence étrangère, compromettant ainsi l’autorité du clan [ROOT.GetCountry.GetRuler.GetLastName]. Les ennemis du shogunat se sont rassemblés autour du slogan du #italic Sonnō jōi#! : « Révérer l’empereur, expulser les barbares »."
 ep2_meiji.1.f: "Au deuxième étage d’une auberge de Kyōto, une dizaine de rōnin vêtus de noir étaient rassemblés autour d’une table loin des fenêtres. Dehors, la pluie tombait à flots, couvrant les bruits de la rue. Les hommes s’échangeaient des murmures désapprobateurs : des plaintes, des accusations, suivies d’un serment solennel et de la mise à mort d’un intrus.\n\nAu loin, dans une maison surplombant Iso, un homme en kimono vert regardait une colonne de fumée monter dans le ciel. L’ombre des collines se projetait sur les constructions situées sur le rivage. Alors que le soleil approchait lentement de la ligne d’horizon, la lueur des fours en contrebas brillait de plus en plus. Derrière, il pouvait voir les feux des navires qui se reflétaient sur l’eau. Un jour, espérait-il, son canon les renverrait d’où ils venaient."
 ep2_meiji.1.a: "Nous devons nous adapter à notre nouvelle situation."
 ep2_meiji.2.t: "L’organisation du shogunat"
 ep2_meiji.2.d: "Les réformistes du shogunat sont divisés entre deux idées de la gouvernance. La théorie du #italic kōbu gattai#! cherche à renouveler la légitimité du [GetLawType('law_bakufu').GetName|l] en fusionnant avec la cour impériale, tandis que la théorie de la délibération publique cherche à établir un système parlementaire dirigé par le clan [SCOPE.sCharacter('shogun_scope').GetLastName]."
 ep2_meiji.2.f: "L’hôte posa un plateau d’higashi sur la table et versa un bol de thé à ses invités. Les trois hommes prirent place autour de la table, l’hôte et le premier invité portant un chonmage, tandis que le deuxième arborait une coupe courte. De la vapeur s’échappait des bols posés devant eux.\n\nL’hôte se tourna vers l’homme aux cheveux courts.\n\n« Je vous félicite pour votre retour, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]-#italic kun#!. Chacune de vos lettres était plus intéressante que la précédente. Accepteriez-vous de m’en dire plus sur votre séjour chez les barbares ? »"
 ep2_meiji.2.a: "Le bakufu doit être renouvelé."
 ep2_meiji.2.b: "La délibération publique est la voie de la sagesse."
 traditionalist_shogun_warning_tt: "@warning! Un[ROOT.GetCountry.GetRuler.GetCustom('FR_E')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [GetIdeology('ideology_traditionalist').GetName|l] refusera un #b gouvernement parlementaire#!"
 traditionalist_shogun_warning_present_tt: "Le [concept_ruler|l] n’a pas l’[concept_ideology|l] [GetIdeology('ideology_traditionalist').GetName|l]"
 ep2_meiji.3.t: "Le mariage impérial"
 ep2_meiji.3.d: "L’empereur a accepté un mariage arrangé entre [SCOPE.sCharacter('shogun_scope').GetFullName] et la princesse [SCOPE.sCharacter('imperial_princess_scope').GetFullName]. Ce mariage est conditionné par le rejet du traité [SCOPE.sTreaty('relevant_treaty_scope').GetName] par le shogun et un retour à une politique isolationniste."
 ep2_meiji.3.d2: "L’empereur a accepté un mariage arrangé entre [SCOPE.sCharacter('shogun_scope').GetFullName] et la princesse [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. Ce mariage est conditionné par l’expulsion des étrangers par le shogun et un retour à une politique isolationniste."
 ep2_meiji.3.f: "La procession recouvrait tout le Nakasendō. Trente mille ouvriers, serviteurs, et membres de la maison de la princesse, gardés par un périmètre de soldats du domaine d’Owari, s’étiraient de la ville d’Iijima à la gare de Shiojiri. Au cœur de ce cortège, la princesse trônait sur un palanquin d’or et de soie rouge. À ses côtés se tenaient des samouraïs de plusieurs domaines : [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] et [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')] et [SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')] et [SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')].\n\nÀ l’intérieur de son palanquin, la princesse jetait un coup d’œil entre les rideaux. Les villes défilaient, silencieuses. Elle avait encore les 30 #italic ri#! suivants pour réfléchir à son avenir."
 ep2_meiji.3.a: "C’est pour le bien du pays."
 has_broken_relevant_treaty_tt: "A rompu le traité [SCOPE.sTreaty('relevant_treaty_scope').GetName]"
 ruler_does_not_have_imperial_marriage_tt: "[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] est mort[SCOPE.sCharacter('imperial_marriage_ruler').GetCustom('FR_E')] ou à la retraite"
 je_meiji_imperial_marriage: "Le mariage impérial"
 je_meiji_imperial_marriage_reason: "Dans le but d’unifier la cour impériale et le shogunat, le shogun [SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] a organisé un mariage politique avec la princesse impériale [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. Le consentement de l’empereur à ce mariage est conditionné par l’expulsion des étrangers de l’[GetGeographicRegion('geographic_region_home_islands').GetName|l], et un retour à une politique isolationniste.\n\nSi le shogun tient ses promesses, ce mariage contribuera grandement à combler le fossé entre les dirigeants de jure et de facto du Japon."
 je_will_fail_tt: "L’[concept_journal_entry|l] #b échouera#!"
 je_has_timed_out_tt: "L’[concept_journal_entry|l] a #b expiré#!"
 ep2_meiji.4.t: "La guerre de [ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')]"
 ep2_meiji.4.d: "Privé[SCOPE.sCharacter('shogun_scope').GetCustom('FR_E')] de ses terres et de ses titres, [SCOPE.sCharacter('shogun_scope').GetCustom('FR_LeLa')] [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle|l] [SCOPE.sCharacter('shogun_scope').GetFullName] et ses fidèles serviteurs se sont révoltés contre la cour impériale. [SCOPE.sCharacter('shogun_scope').GetSheHe|U] cherche à annuler la restauration de la puissance impériale et à restaurer le bakufu."
 ep2_meiji.4.f: "« Votre domestique [SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting], après avoir minutieusement examiné la situation depuis le 9 du mois dernier, remarque qu’aucun de ces événements ne découle des véritables intentions de la cour impériale, mais plutôt des complots des vils ministres du Seigneur [SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting]. Cette histoire est de notoriété publique dans tout le pays, notamment à Edo, à Nagasaki, et dans les provinces de Yashu et Sōshū, où des troubles ont éclaté.\n\nLe ciel et les hommes ayant en horreur ce genre d’attitude, nous supplions Votre Majesté de publier un décret ordonnant la reddition des ministres concernés. Si cette demande n’était pas acceptée, nous n’aurions pas d’autre choix que de procéder à leur exécution. »" # Edited petition by Yoshinobu
 ep2_meiji.4.a: "Voici notre souhait : éliminer le traître et restaurer la paix." # Emperor Meiji's plausibly fraudulent imperial decree of 1867
 ep2_meiji.4.b: "L’empereur est tombé sous l’emprise de brigands."
 ep2_meiji.41.d: "Exaspérés par les efforts du clan [SCOPE.sCharacter('shogun_scope').GetLastName] pour garder le pouvoir, des domaines restaurationnistes se sont révoltés contre [SCOPE.sCharacter('shogun_scope').GetFullName]. Ils cherchent à restaurer la primauté politique de l’empereur, loin de l’influence des Tokugawa."
 ep2_meiji.41.d_1: "Exaspérés par le refus du gouvernement de [ROOT.GetCountry.GetCapital.GetCityHubName] d’expulser les étrangers, des domaines en faveur du Sonnō Jōi se sont révoltés. Leur objectif est de destituer les conseillers occidentaux de l’empereur, et de chasser toute influence étrangère du Japon."
 ep2_meiji.41.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] se tenait debout sur les remparts du château. En contrebas, des rangées de soldats de [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] se tenaient devant les portes. Certains portaient de nouveaux uniformes bleu marine et des casques coniques. D’autres avaient conservé les tenues traditionnelles rouges, vertes et bleues. Les soldats avec les nouveaux uniformes se trouvaient aux premiers rangs, devant le regard approbateur des observateurs étrangers qui s’étaient placés à quelques mètres à gauche de [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]. Derrière eux arrivèrent les samouraïs à cheval avec leurs mousquets, suivis par l’artillerie.\n\nLe lieu de rassemblement, où ils devaient rejoindre les forces de leurs domaines alliés pour protester contre l’armée du shogun, se trouvait dans les alentours de [SCOPE.sState('revolter_state').GetCityHubName]. Au loin, bien au-delà de ce mur d’épées et de baïonnettes, l’empereur attendait, captif."
 ep2_meiji.41.f_1: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] se tenait debout sur les remparts du château. En contrebas, des rangées de soldats de [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] se tenaient devant les portes. Certains portaient de nouveaux uniformes bleu marine et des casques coniques. D’autres avaient conservé les tenues traditionnelles rouges, vertes et bleues. Les soldats avec les nouveaux uniformes se trouvaient aux premiers rangs, suivis par un arc-en-ciel de sansaibaori. Derrière eux arrivèrent les samouraïs à cheval avec leurs mousquets, suivis par l’artillerie.\n\nLe lieu de rassemblement, où ils devaient rejoindre les forces de leurs domaines alliés pour protester contre l’armée loyaliste, se trouvait dans les alentours de [SCOPE.sState('revolter_state').GetCityHubName]. Au loin, bien au-delà de ce mur d’épées et de baïonnettes, l’empereur attendait, captif."
 ep2_meiji.41.a: "Nous devons repousser ces fanatiques."
 ep2_meiji.41.b: "Sonnō jōi !"
 kinmon_civil_war_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] basculera dans une #r guerre civile#! entre le #b shogunat#! et la #b cour impériale#!"
 ep2_meiji.5.t: "Taisei Hōkan"
 ep2_meiji.5.d: "Face à la pression croissante des opposants au [GetLawType('law_bakufu').GetName|l], [SCOPE.sCharacter('shogun_scope').GetFullName] a demandé à l’empereur de restituer son autorité à la cour impériale."
 ep2_meiji.5.f: "« À moins que le pouvoir ne soit à nouveau réuni au sein de la cour impériale, les fondements mêmes de notre nation ne pourront être maintenus. Par conséquent, nous devons à ce stade réformer les anciennes pratiques et remettre les clés de l’administration à la cour impériale.\n\nAprès avoir épuisé tous les conseils publics du pays et demandé l’avis définitif de Votre Majesté, je pense sincèrement que si tous les cœurs s’unissaient au service de la nation, nous pourrions protéger notre pays impérial tous ensemble et nous mesurer aux autres nations du monde. »\n\n— Tokugawa Yoshinobu, 1867"
 ep2_meiji.5.a: "Il n’y a que du vide sous ses pieds."
 ep2_meiji.51.t: "L’autorisation impériale"
 ep2_meiji.51.d: "L’empereur a répondu à la demande émise par [SCOPE.sCharacter('shogun_scope').GetFullName] visant à restituer son autorité à la cour impériale. La requête du shogun a été acceptée, et la suprématie politique de l’empereur restaurée."
 ep2_meiji.51.f: "« L’empereur du Japon annonce aux souverains de tous les pays étrangers que le shogun [SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] a obtenu la permission de restituer son autorité, conformément à sa propre demande. Nous exercerons désormais l’autorité suprême sur toutes les affaires internes et externes au pays. Par conséquent, le titre d’empereur devra être remplacé par celui de taïkun, conformément aux traités conclus. Nous désignerons les fonctionnaires chargés de conduire les affaires étrangères. Il est souhaitable que les représentants des puissances liées par le traité prennent connaissance de cette annonce. »"
 ep2_meiji.51.a: "Quel frisson indescriptible."
 ep2_meiji.52.t: "L’autorisation impériale"
 ep2_meiji.52.d: "L’empereur a répondu à la demande émise par [SCOPE.sCharacter('shogun_scope').GetFullName] visant à restituer son autorité à la cour impériale. Il stipule que le shogun conserve la confiance de la cour, et que l’autorité peut rester entre les mains du shogunat."
 ep2_meiji.52.f: "Des bruits de bottes résonnaient dans le château de [ROOT.GetCountry.GetCustom('japan_choshu_castle_name')], où messagers et serviteurs n’avaient cessé d’aller et venir toute la journée, rapportant des récits de plus en plus détaillés des événements de la semaine passée. [SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting] les avait reçus personnellement, gardant résolument le silence durant chaque entretien. Son visage s’était fermé de plus en plus à mesure qu’il découvrait le déroulement des événements : la procession triomphale du shogun, les troupes d’Aizu chargées de garder le palais impérial.\n\nÀ l’extérieur, le soleil s’était couché. Depuis l’estrade, [SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting] regarda les vingt serviteurs rassemblés devant lui. « Le domaine de Chōshū ne se soumettra pas », affirma-t-[SCOPE.sCharacter('choshu_daimyo_scope').GetCustom('FR_IlElle')]. « Mettez-vous ça dans le crâne. »\n\nÀ ces mots, il se leva et quitta la pièce."
 ep2_meiji.52.a: "Les branches l’enveloppent."
 ep2_meiji.6.t: "Le décret de restauration"
 ep2_meiji.6.d: "Les opposants au clan [SCOPE.sCharacter('shogun_scope').GetLastName] au sein de la cour ont convaincu l’empereur de publier un décret afin de restaurer officiellement sa propre autorité. Le décret en question abolit le shogunat et établit un gouvernement qui exclut [SCOPE.sCharacter('shogun_scope').GetFullName] de toute fonction officielle."
 ep2_meiji.6.f: "« [SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] a demandé que l’autorité administrative qui lui avait été confiée il y a longtemps lui soit restituée, et souhaite désormais démissionner de ses fonctions de shogun. Sa proposition a été acceptée. Le pays est menacé par des dangers exceptionnels dont, comme chacun sait, le défunt empereur s’était sérieusement occupé. Par conséquent, Sa Majesté a pris la décision, après mûre réflexion, de poser les bases de la restauration de l’autorité impériale et du renouveau de la dignité nationale.\n\nDorénavant, les titres de sesshō, kanpaku et shogun seront abolis, et les trois fonctions de conseiller en chef, conseiller d’État, et conseiller du palais seront créées. Toutes les décisions seront prises après délibération raisonnable du peuple, sans distinction entre les fonctionnaires civils et militaires, ni entre les nobles et les gens du peuple. »" #- Modifier text of the Great Proclamation of the Restoration of Imperial Rule
 ep2_meiji.6.a: "Seuls dans le noir."
 ep2_meiji.7.t: "Le taïkounat"
 ep2_meiji.7.d: "La cour impériale ne disposant pas des compétences pratiques pour gouverner, les alliés du clan [SCOPE.sCharacter('shogun_scope').GetLastName] au sein de la cour ont convaincu l’empereur d’accorder le titre de taïkun à [SCOPE.sCharacter('shogun_scope').GetFullName], [SCOPE.sCharacter('shogun_scope').GetCustom('FR_LeLa')] plaçant responsable des fonctions impériales."
 ep2_meiji.7.f: "« Maintenant que les différents daimyō s’étaient rassemblés, les délibérations allaient pouvoir commencer. L’époque étant ouverte à la délibération publique, une expression qui fait d’ailleurs l’objet de nombreux débats, il était inévitable de suivre l’opinion publique. Par conséquent, je demande solennellement que, dans la mesure du possible, ces discussions aboutissent à un accord, et que des mesures soient prises afin que le but de cette assemblée soit clairement défini.\n\nSi des différends devaient surgir au cours des délibérations et qu’un conflit devait éclater, même si cela devait aboutir à votre victoire, cela reviendrait à une dispute interne entre frères, tandis que les nations étrangères nous assailliraient de toutes parts. »\n\n— Nishi Shūsuke, « Ordre du jour provisoire »"
 ep2_meiji.7.a: "De retour en terrain sûr."
 ep2_meiji.8.t: "La cour et le shogunat"
 ep2_meiji.8.d: "Grâce à son mariage avec un membre de la famille impériale et au respect de ses vœux envers l’empereur, [SCOPE.sCharacter('shogun_scope').GetFullName] a apaisé les tensions entre la cour et le shogunat. L’empereur pourra continuer à vivre en réclusion, certain que le shogun assurera une paix durable."
 ep2_meiji.8.f: "Même si des vents violents\nDevaient balayer le pays,\nJ’attendrais qu’ils rendent\nAu soleil dans le ciel\nSa lumière radieuse.\n\n— Empereur Kōmei"
 ep2_meiji.8.a: "La tempête est passée."
 ep2_meiji.9.t: "Premiers parmi leurs pairs"
 ep2_meiji.9.d: "Grâce à sa confiance et son habileté, [SCOPE.sCharacter('taikun_scope').GetFullName] est parvenu[SCOPE.sCharacter('taikun_scope').GetCustom('FR_E')] à la restauration de l’empereur et à la préservation de son clan. Les taïkuns [SCOPE.sCharacter('taikun_scope').GetLastName] seront les premiers à régner parmi la noblesse du $JAP$ moderne."
 ep2_meiji.9.f: "L’empereur n’était plus assis derrière un paravent. Ses ministres se tenaient le long de la table devant lui, le taïkun prenant place sur sa gauche. Tous portaient un nouvel uniforme de la cour, dont les manches et le buste étaient ornés de motifs complexes en feuilles d’or. Leurs médailles cliquetèrent lorsqu’ils s’installèrent sur leurs nouveaux sièges.\n\nLe taïkun animait la discussion depuis une heure, l’empereur se contentant d’écouter tour à tour chaque intervenant sans parler. À l’autre bout de la pièce, un ancien adepte du #italic Sonnō jōi#! évoqua la nécessité d’une mission en Amérique."
 ep2_meiji.9.a: "Le shogunat disparaît au profit du taïkounat."
 ep2_meiji.9.b: "L’empereur est le Souverain du ciel, et les Tokugawa sont ses instruments."
