 kobu_gattai_no_longer_viable_tt: "L’unification du #b shogunat#! et de la #b cour impériale#! ne sera plus possible"
 kogi_yoron_forced_tt: "Pour que la réforme soit possible, le #b shogunat#! doit poursuivre la restauration contrôlée de l’#b empereur#! et l’établissement d’un #b gouvernement parlementaire#!"
 shogunate_strategy_title_decide_loc: "Décider de la stratégie de réforme"
 shogunate_strategy_title_revise_loc: "Revoir la stratégie de réforme"
 shogunate_strategy_title_decide_desc_loc: "Pour que le pouvoir des Tokugawa perdure, le shogunat doit se réformer. Une telle réforme peut prendre l’une des deux directions suivantes : soit le shogun cherche à renouveler la légitimité du bakufu via l’unification avec la cour impériale, soit il entreprend la restauration contrôlée de l’empereur, afin de se placer à la tête d’un gouvernement parlementaire."
 shogunate_strategy_title_revise_desc_loc: "La stratégie de réforme actuelle du shogun n’a pas porté ses fruits. Même si changer d’approche a un coût, il est préférable de ne pas s’obstiner à suivre la voie d’un échec annoncé."
 je_meiji_restoration_proclaim_imperial_restoration: "Demande de restauration impériale"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "L’empereur reste le souverain du Japon. Sans autorisation impériale, le shogun n’est rien de plus que le daimyō le plus puissant parmi des centaines d’autres. La survie du shogunat, ou sa chute, dépendra du bon vouloir de la cour impériale."
 imperial_restoration_kobu_gattai_loc: "Pour mettre un terme à cette crise, le shogunat et la cour doivent s’unir. Le daimyō doit être convaincu que les ordres du shogun proviennent de l’empereur, et que le shogun a toute la confiance de la cour. Pour cela, le shogun doit se montrer vulnérable et compter sur l’empereur pour restaurer son autorité.\n\nCette stratégie équivaut à un saut dans le vide : si la cour impériale refuse de coopérer, les Tokugawa se retrouveront seuls face à des adversaires qui auront soif de vengeance."
 imperial_restoration_kogi_yoron_loc: "Pour mettre un terme à cette crise, l’empereur doit gouverner. Si le pouvoir des Tokugawa doit survivre à la restauration, le shogun doit mener cette opération à son terme. La dernière étape des réformes du shogun doit consister à restituer les pouvoirs administratifs à l’empereur, et à définir un nouveau rôle pour son clan au sein d’un gouvernement impérial réformé.\n\nCette stratégie équivaut à un saut dans le vide : si la cour impériale refuse de coopérer, les Tokugawa se retrouveront seuls face à des adversaires qui auront soif de vengeance."
 je_meiji_restoration_imperial_marriage: "Mariage impérial arrangé"
 je_meiji_restoration_imperial_marriage_desc: "Le projet du #b kōbu gattai#! nécessite une union au sens propre : un mariage politique entre le shogun en place et une princesse impériale. Pour y parvenir, le shogun doit être prêt à remplir les conditions définies par la cour impériale."
 je_meiji_restoration_imperial_marriage_conditions_tt: "Pour terminer l’[concept_journal_entry|l] #v $je_meiji_imperial_marriage$#! :\n• $im_closed_borders_tt$\n• $im_free_trade_tt$\n• $im_treaty_port_tt$\n• Le cas échéant : #indent_newline:3 \n• $im_broken_applicable_treaty_tt$"
