 shogunate.1.t: "La nomination du shogun [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Ieyoshi
 shogunate.1.d: "Nouvellement à la tête du clan [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] a reçu le titre de shogun au nom de l’empereur. N’ayant pas encore imposé son autorité, le nouveau shogun est tourné en dérision par les [SCOPE.gsInterestGroup('daimyo_scope').GetName|l]."
 shogunate.1.f: "Un arc-en-ciel de daimyō serpentait à travers l’Ō-hiroma. Sur l’estrade la plus surélevée se tenait le shogun, vêtu de noir et de rouge, le décret impérial placé dans une boîte sur sa droite.\n\nUn par un, les nobles en rouge, en bleu et en violet, le saluaient et lui présentaient des épées et de l’or en guise de cadeaux. Le shogun ne pipait mot, tout comme ceux qui se prosternaient devant lui. Les personnes de rang inférieur, qui n’avaient pas le droit de le voir, se massaient à l’extérieur. Un chant s’éleva du jardin."
 shogunate.1.a: "Goshōshin, goshōshin !"
 shogunate.2.t: "La question de la succession"
 shogunate.2.d: "Les problèmes de santé du fils aîné [SCOPE.sCharacter('ruler_scope').GetCustom('FR_DuDela')] [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle|l], [SCOPE.sCharacter('iesada_scope').GetFirstName], ont suscité l’inquiétude sur sa capacité à occuper la fonction de [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle|l]. Les daimyō extérieurs, dirigés par [SCOPE.sCharacter('armed_forces_leader').GetFullName], se sont rassemblés derrière [SCOPE.sCharacter('yoshinobu_scope').GetFullName] pour être son éventuel successeur."
 shogunate.2.f: "Dans sa chambre vide aux volets fermés, [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] se tenait près de son lit, assis[SCOPE.sCharacter('armed_forces_leader').GetCustom('FR_E')] devant une feuille blanche, les yeux clos. Si un chat venait à passer dans le couloir adjacent, [SCOPE.sCharacter('armed_forces_leader').GetCustom('FR_IlElle')] était certain[SCOPE.sCharacter('armed_forces_leader').GetCustom('FR_E')] de l’entendre, même [SCOPE.sCharacter('armed_forces_leader').GetCustom('FR_SilSielle')] ne pouvait être certain[SCOPE.sCharacter('armed_forces_leader').GetCustom('FR_E')] que personne n’écoutait. À un stade aussi précoce, il était préférable de garder ses ambitions pour [SCOPE.sCharacter('armed_forces_leader').GetCustom('FR_LuiElle')].\n\nLa cour impériale verrait-elle les choses de la même manière ? [SCOPE.sCharacter('armed_forces_leader').GetSheHe|U] avait des raisons de le croire, mais c’était de loin la question la plus évidente. Son esprit s’emballa. Quelle était la meilleure façon de se procurer un décret ? Et comment s’assurer au mieux qu’il ne disparaisse pas ?"
 shogunate.2.a: "Le [GetLawType('law_bakufu').GetName|l] interne fera comme bon lui semble."
 shogunate.2.b: "La situation nécessite une main de fer."
 shogunate.3.t: "La nomination du shogun [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iesada
 shogunate.3.d: "Nouvellement à la tête du clan [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] a reçu le titre de shogun au nom de l’empereur. Toutefois, le shogun étant malade depuis son enfance, son état de santé n’a pas manqué de déclencher une course à sa succession."
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "Goshōshin, goshōshin !"
 shogunate.4.t: "La nomination du shogun [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Yoshinobu
 shogunate.4.d: "Nouvellement à la tête du clan [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] a reçu le titre de shogun au nom de l’empereur. Les partisans du nouveau shogun dans les domaines réformistes ont des attentes élevées quant à son règne."
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "Goshōshin, goshōshin !"
 shogunate.5.t: "Hitotsubashi et Nanki"
 shogunate.5.d: "Les factions qui se sont formées autour de la succession du shogun Ieyoshi se sont encore affrontées pour déterminer qui succéderait à [SCOPE.sCharacter('shogun_scope').GetFullName], dans la mesure où [SCOPE.sCharacter('shogun_scope').GetCustom('FR_IlElle')] n’avait pas d’enfant. La faction Hitotsubashi, composée de daimyō extérieurs et de [SCOPE.gsInterestGroup('armed_forces_ig').GetName|l] inférieures, soutiennent [SCOPE.sCharacter('yoshinobu_scope').GetFullName], tandis que la faction Nanki, composée de [SCOPE.gsInterestGroup('daimyo_ig').GetName|l] considérés comme héréditaires, soutiennent [SCOPE.sCharacter('iemochi_scope').GetFullName]."
 shogunate.5.f: "Le visage impassible, le messager regardait le sol devant l’homme sur l’estrade. Il tenait son pinceau au-dessus du papier.\n\n« Un message pour Yoshikatsu-sama », déclara le magistrat. « Certains membres de la cour ne cessent de faire des spéculations inconvenantes au sujet de la santé du shogun. Ils se demandent même s’il n’est pas muet. Informez-moi si quoi que ce soit confirme cette hypothèse. »"
 shogunate.5.a: "[SCOPE.sCharacter('iemochi_scope').GetFirstName] régnera, car telle est la volonté du shogun."
 shogunate.5.b: "La cour impériale requiert un successeur expérimenté."
 shogunate.6.t: "La nomination du shogun [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iemochi
 shogunate.6.d: "Nouvellement à la tête du clan [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] a reçu le titre de shogun au nom de l’empereur. Bien qu’il soit jeune, le shogun a déjà acquis une réputation de juge stoïque et méticuleux."
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "Goshōshin, goshōshin !"
 shogunate.6.a_regency: "[SCOPE.sCharacter('shogun_scope').GetSheHe|U] régnera sous l’autorité d’un tuteur loyal."
 shogunate.6.b_regency: "Trouvez un compromis avec les Hitotsubashi en faisant de [SCOPE.sCharacter('yoshinobu_scope').GetFirstName] son tuteur."
 shogunate.7.t: "La nomination du shogun [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iesato
 shogunate.7.d: "Nouvellement à la tête du clan [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] a reçu le titre de shogun au nom de l’empereur. Avisé et ouvert d’esprit, le shogun devrait soutenir les factions réformistes du [GetLawType('law_bakufu').GetName|l]."
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "Goshōshin, goshōshin !"
 shogunate.8.t: "Été brûlant"
 shogunate.8.d: "La chaleur estivale a mis en danger la santé fragile du vieux shogun [SCOPE.sCharacter('shogun_scope').GetFullName]. Désormais alité[SCOPE.sCharacter('shogun_scope').GetCustom('FR_E')], [SCOPE.sCharacter('shogun_scope').GetCustom('FR_LeLa')] [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle|l] doit livrer un ultime combat contre son cœur défaillant."
 shogunate.8.f: "Le lit du shogun avait été déplacé face à la fenêtre, ses domestiques espérant que l’air frais en provenance de la mer accompagnerait parfaitement leurs éventails. Une caisse de glace était ouverte au pied du lit, et un linge humide était posé sur son front.\n\nIl n’y avait pas de vent, aujourd’hui. L’air était chaud sous le soleil couchant. Implacable, enveloppant. Il n’arrivait plus à distinguer la forme des vagues en contrebas."
 shogunate.8.a: "C’est la fin."
 shogunate.8.b: "Demandez des traitements néerlandais."
