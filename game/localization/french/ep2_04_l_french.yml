 ep2_meiji_pulse.3.t: "La bataille de Shimonoseki"
 ep2_meiji_pulse.3.d: "[SCOPE.sCharacter('choshu_daimyo_scope').GetFullName], daimyō du domaine de Chōshū, a fait savoir qu’[SCOPE.sCharacter('choshu_daimyo_scope').GetCustom('FR_IlElle')] se pliait aux ordres de l’empereur d’expulser les étrangers. [SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe|U] a ordonné à sa flotte de tirer sans sommation sur tous les navires étrangers traversant le détroit de Shimonoseki, provoquant des échanges de tirs avec un navire de guerre [SCOPE.sCountry('relevant_gp').GetAltAdjective('MS')|l]."
 ep2_meiji_pulse.3.f: "En pleine journée, le tonnerre éclata sur les pentes douces de Hinoyama, et Masatake tourna la tête vers le ciel où flottait un gros nuage blanc.\n\n« Regarde ! », s’écria Jiro. Une main pénétra dans son champ de vision, le doigt tendu vers le bas. Un navire avançait à toute vapeur vers le détroit, ses canons tirant sur une cible que Masatake ne pouvait distinguer. Des éclats jaillissaient de sa coque, mais il continuait d’avancer. Au-dessus de leur tête, les nuages s’amoncelaient."
 ep2_meiji_pulse.3.a: "Les étrangers font ce que nous ne pouvons pas."
 ep2_meiji_pulse.3.b: "Aidez le domaine à trouver un accord."
 ep2_meiji_pulse.3.c: "Offrez un port aux Occidentaux en échange d’un accord."
 treaty_name_shimonoseki_war_indemnity: "Indemnité de guerre de Shimonoseki"
 modifier_defeated_westerners: "Expédition occidentale vaincue"
 modifier_bombardment_of_domain: "Siège du domaine bombardé"
 ep2_meiji_pulse.4.t: "L’incendie de la légation [SCOPE.sCountry('relevant_gp').GetAltAdjective('FS')|l]"
 ep2_meiji_pulse.4.d: "Les samouraïs du #italic Sonnō jōi#! du domaine de [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] ont lancé une attaque sur un bâtiment de la légation [SCOPE.sCountry('relevant_gp').GetAltAdjective('FS')|l] en construction à [SCOPE.sState('edo_state').GetCityHubName]. Ce qui aurait dû être le premier bâtiment de style occidental de la ville a été détruit dans un incendie dont les auteurs restent inconnus."
 ep2_meiji_pulse.4.f: "Deux hommes cagoulés et masqués s’étaient postés au sommet de la colline surplombant ce qui aurait dû être la légation. Une lueur orange émanait encore du bâtiment noirci par l’incendie. Maintenant que tout le combustible avait été utilisé, les flammes s’éteignaient progressivement sur les poutres imposantes.\n\nLes deux hommes attendirent que les dernières lueurs s’estompent définitivement. L’un d’entre eux parla d’une voix calme, le regard perdu vers la fumée qui s’élevait dans le ciel.\n\n« Est-ce que ce ne serait pas magnifique si les cendres tombaient sur nous comme de la neige ? »"
 ep2_meiji_pulse.4.a: "[SCOPE.sState('edo_state').GetCityHubName] est ingouvernable."
 ep2_meiji_pulse.4.b: "Interdisez le daimyō de [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] de porter des armes en ville."
 shimonoseki_indemnity_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] paiera une indemnité de #v 3 millions#!@money! sur #v 10 ans#! [SCOPE.sCountry('relevant_gp').GetAltNameNoFormatting('Au')][SCOPE.sCountry('relevant_gp').GetName]"
 shimonoseki_indemnity_port_tt: "La ville de $HUB_NAME_STATE_KANSAI_port_japanese$ à [GetStateRegion('STATE_KANSAI').GetName] ouvrira en tant que [concept_treaty_port|l] [SCOPE.sCountry('relevant_gp').GetAltAdjective('MS')|l]"
 modifier_ungovernable_capital: "Ingouvernabilité reconnue"
 ep2_meiji_pulse.5.t: "Une vengeance dans le sang"
 ep2_meiji_pulse.5.d: "Le ministre en chef du shogunat, [SCOPE.sCharacter('tairo_scope').GetFullName], a été assassiné devant la porte du château d’Edo par les rōnin des domaines [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] et [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]. Le manifeste laissé par les assassins mentionne les principes du #italic Sonnō jōi#! et condamne les concessions accordées aux étrangers par le ministre en chef."
 ep2_meiji_pulse.5.f: "Chuzaburo regarda Gorokuro se placer en tête du cortège, avant que l’un des gardes de [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] ne s’avance pour l’arrêter. Gorokuro ne lui laissa pas le temps de réagir. Il dégaina aussitôt son épée et se jeta brusquement sur lui. Du sang jaillit du visage meurtri de l’homme de [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')], dont les compagnons d’armes se précipitèrent pour le venger.\n\nChuzaburo fit tomber son manteau et sortit son pistolet. Il visa le flanc découvert du palanquin et appuya sur la détente. Le bruit assourdissant du coup de feu interrompit aussitôt les cris et l’entrechoquement des épées, avant qu’un autre coup retentisse. L’un des gardes se tourna vers lui, et Jizaemon, le rōnin de [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], abattit son épée sur son torse. Derrière eux, Chuzaburo aperçut une mare de sang s’écouler du palanquin et se répandre sur la rue recouverte de neige. Il dégaina son wakizashi et se précipita dans cette direction."
 ep2_meiji_pulse.5.a: "Les samouraïs croisent à nouveau le fer."
 modifier_tairo_assassinated: "Tairō assassiné"
 ep2_meiji_pulse.6.t: "L’affaire Ikedaya"
 ep2_meiji_pulse.6.d: "Grâce aux informations obtenues par la torture d’un militant du [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName|l], le [GetLawType('law_shinsengumi').GetName] a lancé un assaut contre des conspirateurs présumés réunis à l’auberge Ikedaya de [SCOPE.sState('kyoto_state').GetName]. L’assaut s’est transformé en un combat acharné à l’épée à l’intérieur de l’auberge et aux alentours."
 ep2_meiji_pulse.6.f: "Otaka s’agrippa à la rambarde quand le Shinsen gumi fit irruption dans la pièce. Il pouvait voir les taches de sang sur les manches de leur #italic haori#! bleu pâle. Il brandit son épée pour se mettre en garde.\n\nDeux hommes se précipitèrent dans la cage d’escalier qu’il occupait. Il donna un coup d’épée qu’un des hommes contra. Des étincelles jaillirent à l’impact. Le deuxième homme attaqua à son tour. Il fit un pas en arrière, tourna son poignet et...\n\nIl sentit quelque chose de froid lui transpercer la poitrine."
 ep2_meiji_pulse.6.a: "Récompensez le Shinsen gumi pour son initiative."
 ep2_meiji_pulse.6.b: "Cette violence entraînera des représailles."
 modifier_shinsengumi_meddling: "Shinsen gumi envahissant"
 modifier_shinsengumi_crackdown: "Répression du Shinsen gumi"
 modifier_refrained_from_crackdowns: "Shinsen gumi contenu"
 sufficient_pressure_from_sonno_joi_tt: "Le [concept_activism|l] du [SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')|l] est supérieur au niveau @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!)"
 ep2_meiji_pulse.7.t: "La porte interdite"
 ep2_meiji_pulse.7.d: "Des soldats du domaine de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] affilié au [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName|l] ont essayé de prendre d’assaut le palais impérial de [SCOPE.sState('kyoto_state').GetName] et de restaurer l’empereur par la force. Ils se sont heurtés à des soldats des domaines de [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] et d’Aizu."
 ep2_meiji_pulse.7.f: "Les portes Hamaguri avaient disparu derrière la fumée des coups de canon. Tout autour, Kyoto s’embrasait.\n\nLes soldats d’Aizu étaient agglutinés le long du mur, tirant des salves de mousquets en direction de la route et des canons de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]. Régulièrement, l’une des balles touchait quelqu’un, entraînant des cris qui recouvraient brièvement le bruit des coups de feu. Kōzō se cacha derrière la roue d’un canon pour essayer de dégripper son mousquet. Un #italic ken#! plus loin, le chef de son escouade gisait par terre, les jambes et les bras arrachés, ce qui ne l’empêchait pas de continuer à se tordre de douleur."
 ep2_meiji_pulse.7.a: "Les soldats des domaines de [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] et d’Aizu ont réussi à repousser les assaillants."
 ep2_meiji_pulse.7.b: "Le palais impérial est désormais entre les mains du domaine de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]."
 coup_resistance_below_daimyo_coup_strength_tt: "La [concept_coup_resistance|l] [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName] ([SCOPE.ScriptValue('country_coup_resistance')|v2]) est inférieure à la [concept_coup_strength|l] de [SCOPE.sCharacter('daimyo_1_scope').GetFullName] ([SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2])"
 ep2_meiji_pulse.8.t: "L’expédition de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]"
 ep2_meiji_pulse.8.d: "À titre de représailles suite à l’assaut du domaine de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] contre le palais impérial, le shogun a dépêché une expédition punitive afin d’expulser la faction du #italic Sonnō jōi#! du domaine. Des conseillers pro-[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] ont proposé un plan visant à garantir la paix en échange du seppuku des coupables."
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting], daimyō de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], se tenait sur le balcon du château. Au loin, des colonnes de fumée provenant des feux de camp de l’armée en approche s’élevaient dans le ciel.\n\n« Le shogun exige le seppuku des trois vassaux de rang supérieur », déclara le serviteur. « La décapitation des quatre officiers. Et l’exil des cinq ministres. »\n\n[SCOPE.sCharacter('daimyo_1_scope').GetFirstNameNoFormatting] regarda en direction des feux de camp. Ils étaient plusieurs centaines, au bas mot. L’horizon, autrefois d’un bleu azur, lui donnait la nausée. Après un long moment, il répondit.\n\n« ... Le domaine de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] se soumettra. »"
 ep2_meiji_pulse.8.a: "S’ils peuvent être vaincus sans combattre, c’est très bien."
 ep2_meiji_pulse.8.b: "Le domaine doit être nettoyé de fond en comble."
 modifier_daimyo_house_arrest: "Daimyō derrière les barreaux"
 modifier_daimyo_executed: "Daimyō dépossédés de leurs biens"
 ep2_meiji_pulse.9.t: "L’ordre d’expulser les barbares"
 ep2_meiji_pulse.9.d: "Irrité par les traités imposés [ROOT.GetCountry.GetAltNameNoFormatting('Au')][ROOT.GetCountry.GetName] par les puissances occidentales, l’empereur est passé outre l’avis du shogun pour promulguer un édit visant à expulser les étrangers du sol [ROOT.GetCountry.GetAltAdjectiveNoFormatting('MS')|l]. Des militants du [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName|l] se sont ralliés à la cause de l’empereur."
 ep2_meiji_pulse.9.f: "Le serviteur se tenait à côté de l’un des canons, le regard tourné vers le détroit. À cette heure de la journée, les navires qui passaient à toute vapeur se dessinaient sous le soleil couchant. Sur le côté, les samouraïs de niveau inférieur du domaine de Chōshū étaient occupés avec leurs refouloirs et leurs sacs de poudre noire.\n\nTandis qu’il leva les yeux vers Hinoyama et la ville de Shimonoseki en contrebas, un passage de l’édit lui vint à l’esprit : « Même si le pays était réduit en cendres, nous n’autoriserions pas l’ouverture des ports au commerce. »\n\nÉtait-ce justifié ? Accepterait-il que ses douces pentes verdoyantes soient un jour réduites en cendres, que ses champs de fleurs soient brûlés, et que sa maison soit rasée ? Oui, pensa-t-il. Sans aucune hésitation."
 ep2_meiji_pulse.9.a: "Le shogun doit se rendre à Kyoto pour en discuter."
 ep2_meiji_pulse.9.b: "Cet édit est malhonnête, ordonnez sa suppression."
