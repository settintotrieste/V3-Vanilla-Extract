 zaibatsu.1.t: "L’empire des grandes entreprises"
 zaibatsu.1.d: "Le partenariat durable entre l’État [ROOT.GetCountry.GetAltAdjective('MS')|l] et les [SCOPE.gsInterestGroup('zaibatsu_ig').GetName|l] a consolidé le pouvoir des conglomérats dans [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')|l]. Certes, ce sont les politiciens qui gouverneront, mais les généraux et les cadres qui feront la loi."
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting] regardait le combat depuis sa loge. L’adversaire de son lutteur préféré avait réussi à repousser son champion tout au bord du ring recouvert de paille de riz, et [SCOPE.sCharacter('pm_scope').GetCustom('FR_IlElle')] avait bien du mal à garder son calme. Aux côtés du Premier ministre se tenait [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting], calme et serein[SCOPE.sCharacter('relevant_zaibatsu_exec').GetCustom('FR_E')].\n\nL’arbitre brandit son éventail, provoquant un tonnerre d’acclamations dans les gradins du bas d’où des coussins se mirent à voler dans les airs, avant de retomber sur le ring. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting] tourna la tête vers [SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting] et lui sourit. Là, à l’autre bout du ring, gravé sur l’un des murs, se trouvait le #italic mon#! de [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]."
 zaibatsu.1.a: "[ROOT.GetCountry.GetCapital.GetCityHubName] s’ouvrira comme un océan de lumière."
 zaibatsu.1.b: "Notre chaîne d’approvisionnement pourrait toujours être plus sûre."
 zaibatsu.2.t: "Verrouillage"
 zaibatsu.2.t_1: "Le nivellement"
 zaibatsu.2.d: "Les efforts consentis par le gouvernement [SCOPE.sCharacter('pm_scope').GetLastName] ont limité la capacité des [SCOPE.gsInterestGroup('zaibatsu_ig').GetName|l] à exercer leur emprise sur [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')|l]. Les politiciens gouverneront, et les cadres se concentreront sur leurs profits."
 zaibatsu.2.d_1: "La politique de libre-échange du gouvernement [SCOPE.sCharacter('pm_scope').GetLastName] a mis à mal le réseau de contrats militaro-industriels essentiels aux [SCOPE.gsInterestGroup('zaibatsu_ig').GetName|l] pour exercer leur emprise sur [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')|l]. Les politiciens gouverneront, et les cadres se concentreront sur leurs profits."
 zaibatsu.2.f: "Les cadres s’étaient rassemblés dans la salle de réunion située au dernier étage du siège social de [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] entra en troisième, juste après les secrétaires. [SCOPE.sCharacter('name_a_scope').GetSheHe|U] s’installa près de la porte et regarda ses supérieurs passer devant [SCOPE.sCharacter('name_a_scope').GetCustom('FR_LuiElle')]. De légères volutes de vapeur s’échappaient de la tasse de thé posée devant [SCOPE.sCharacter('name_a_scope').GetCustom('FR_LuiElle')].\n\n[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting] entra en dernier et regarda chacun de ses employés tour à tour. Son regard avait quelque chose de nouveau, remarqua [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting], une expression que le Baron n’avait jamais laissée transparaître : l’épuisement. Les traits qui se dessinaient sur son visage semblaient plus creusés qu’auparavant, et ses cheveux grisonnants plus clairsemés que jamais."
 zaibatsu.2.a: "L’autorité souveraine revient à nous et à nous seuls."
 zaibatsu.2.b: "Prévenez le peuple : [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')|l] ne s’achète pas."
