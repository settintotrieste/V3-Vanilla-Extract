l_french:
 japan_politics.1.t: "Apprentissage pratique"
 japan_politics.1.d: "L’ouverture [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName] a rendu désuète une grande partie de l’apprentissage du néerlandais. De nouvelles idées ont commencé à émerger au sein de la communauté intellectuelle [ROOT.GetCountry.GetAltAdjectiveNoFormatting('FS')|l], parmi lesquelles l’école de « l’apprentissage pratique »."
 japan_politics.1.f: "« Il lui suffit de se fixer comme objectif d’agir toujours en accord avec les sentiments les plus humains, de se vouer avec ardeur à l’étude, d’élargir le champ de ses connaissances et, enfin, d’acquérir les savoirs et les vertus que réclame sa position sociale. Alors, le gouvernement appliquant une bonne politique et le peuple acceptant ses décisions sans avoir à en souffrir, les deux partis s’acquitteront mutuellement de leur devoir et garantiront ensemble la paix du pays. C’est là la seule chose qui importe vraiment. »\n\n— Fukuzawa Yūkichi, « L’appel à l’étude »" # Translated by Eiichi Kiyooka
 japan_politics.1.a: "La richesse grâce à l’apprentissage."
 japan_politics.2.t: "Les grandes maisons"
 japan_politics.2.d: "Avec l’industrialisation [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName], les [SCOPE.gsInterestGroup('industrialists_ig').GetName|l] se sont diversifiés dans l’industrie manufacturière. En s’appuyant sur leur richesse et leurs relations avec l’État, ils ont réussi à concentrer une grande partie de la base industrielle sous leur contrôle."
 japan_politics.2.f: "Depuis le balcon, le ministre des Finances observait les courtiers qui s’affairaient. À l’époque du commerce de riz, quelqu’un jetait un seau d’eau sur la foule pour signaler la fin d’un jour de bourse.\n\nAujourd’hui, c’était un homme qui brandissait un marteau, les yeux rivés sur l’horloge. Près de son bureau, au milieu d’une marée de courtiers désireux d’acheter des actions à 7 % d’intérêt, il aperçut quelqu’un signer un contrat en tenant fermement un titre entre les dents. Il régnait une véritable cacophonie, les achats et les ventes se confondant en un bruit semblable à celui des vagues déferlant sur les rochers.\n\nL’horloge sonna, et l’homme assis à son bureau donna un coup de marteau sur un disque en bronze. Des cris d’indignation résonnèrent dans la salle, et le bruit des négociations de dernière minute ne fit que s’intensifier. En pestant, il se pencha sous son bureau pour y récupérer le seau."
 japan_politics.2.a: "Les banquiers régneront, à présent."
 japan_politics.3.t: "Le citoyen lambda"
 japan_politics.3.d: "L’érosion du système hiérarchique à l’époque d’Edo a donné naissance à une société civile fondée sur une nationalité commune. Ceux qui étaient autrefois désignés comme les [SCOPE.gsInterestGroup('pb_ig').GetName|l] en sont venus à se considérer avant tout comme des citoyens patriotes."
 japan_politics.3.f: "Shizo inspectait minutieusement sa nouvelle coupe de cheveux devant le miroir en bronze. Jamais ils n’avaient été aussi courts, dépourvus du nœud qu’il portait depuis tout petit. Les pointes fraîchement coupées étaient épaisses et rêches, et il ne pouvait s’empêcher de les toucher.\n\nIl secoua brusquement la tête et sentit ses cheveux bouger comme jamais auparavant. C’était comme sa nouvelle tenue, dont le col montant lui grattait le cou. C’était inconfortable, mais ça avait ses avantages. Les styles innovants faisaient forte impression et attiraient de nouveaux clients dans son commerce. C’était une boutique chic, et lui était un contribuable, un garde, un citoyen... Bref, un homme civilisé."
 japan_politics.3.a: "La force de la nation est la paix de ses citoyens."
