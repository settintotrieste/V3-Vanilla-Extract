 ep2_meiji_pulse.1.t: "Le droit de frapper"
 ep2_meiji_pulse.1.d: "De passage à [SCOPE.sState('relevant_treaty_port_state').GetName], un marchand [SCOPE.sCountry('relevant_gp').GetAltAdjective('MS')|l] a été tué par le cortège de [SCOPE.sCharacter('daimyo_scope').GetFullName] pour avoir refusé de descendre de cheval. Le daimyō de [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] a justifié ce meurtre en affirmant avoir le droit de frapper tout roturier qui viendrait à lui manquer de respect."
 ep2_meiji_pulse.1.f: "Les étrangers rompirent les rangs de la compagnie des mousquetaires, et des cris se firent entendre de toutes parts. Remarquant les hommes armés qui l’encerclaient, l’étranger qui menait le groupe donna un coup de fouet à son cheval pour qu’il effectue un virage rapide qui faillit faire tomber l’un des mousquetaires de sa monture. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] tira son épée, bientôt rejoint par ses compagnons d’armes.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] porta le premier coup et fit une entaille sur le flanc de l’ennemi. Il cria et donna un nouveau coup de fouet. En vain. Le mousquetaire qui se tenait à côté de lui dégaina son épée à son tour et bientôt, un arc rouge vif se dessina dans les airs comme un nuage."
 ep2_meiji_pulse.1.a: "Le daimyō de [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] ne cherche qu’à nous causer des ennuis."
 ep2_meiji_pulse.11.t: "L’affaire [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]"
 ep2_meiji_pulse.11.d: "Alors qu’il faisait affaire [SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('Au')][SCOPE.sCountry('japan_scope').GetName], un marchand [ROOT.GetCountry.GetAltAdjectiveNoFlag('MS')|l] du nom de [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] a été assassiné par le seigneur local [SCOPE.sCharacter('daimyo_scope').GetFullName], qui a invoqué la loi de son domaine pour justifier son geste. [SCOPE.sCharacter('daimyo_scope').GetCustom('FR_IlElle')|U] a ensuite refusé de payer quoi que ce soit pour son crime."
 ep2_meiji_pulse.11.f: "#b Éditorial#!\n\nDans les circonstances actuelles, nous insistons sur le fait que [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetNameNoFormatting] n’[ROOT.GetCountry.GetAltNameNoFormatting('AOnt')] pas d’autre choix que de se préparer à une grande guerre, ou de dire adieu au Japon. Puisqu’il est hors de question de délaisser sa présence là-bas, nous devons donc nous attendre à un conflit entre les deux empires. Si de nombreux [SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')] rejettent cette idée, le journal [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] de [ROOT.GetCountry.GetCapital.GetCityHubName] semble la juger non seulement inévitable, mais justifiable, simplement parce que les Japonais ont refusé de punir les assassins de [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]... (#italic suite page 2#!)" #largely copied from The Anglo-Japanese War, New York Times, 1863
 ep2_meiji_pulse.11.a: "#italic Quelqu’un#! doit payer. Abordez la question avec le taïkun."
 ep2_meiji_pulse.11.b: "Voulons-vous vraiment nous impliquer davantage en Orient ?"
 modifier_namamugi_incident_prestige_loss: "Meurtre d’un marchand toléré"
 castle_yamaguchi: "Yamaguchi"
 castle_hagi: "Hagi"
 ep2_meiji_pulse.2.t: "Le bombardement de [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]"
 ep2_meiji_pulse.2.d: "À titre de représailles suite au refus du domaine de [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] de payer une indemnité pour la mort de [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting], des navires militaires [SCOPE.sCountry('relevant_gp').GetAltAdjective('MP')|l] ont affronté les défenses côtières de [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] au cours d’un duel d’artillerie de plusieurs jours."
 ep2_meiji_pulse.2.f: "Les tirs de canon avaient recouvert la baie de brume, où [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] était en flammes. De l’autre côté du rivage, un navire étranger tirait des missiles sur les fonderies situées au nord de la ville. Chaque coup s’accompagnait d’une lueur d’un rouge éclatant qui éclipsait la douce lumière du soleil couchant.\n\nLe dernier canon opérationnel de la batterie de [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] retentit. Un pari aussi risqué que désespéré. Le boulet de canon toucha le troisième navire de la colonne ennemie, propulsant un immense jet d’eau dans les airs. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] prit son éponge et se précipita pour s’occuper du canon. Derrière la paroi arrière, les hommes blessés par la dernière salve hurlaient encore de douleur. Malgré le sifflement dans ses oreilles, [SCOPE.sCharacter('name_a_scope').GetCustom('FR_IlElle')] parvenait encore à les entendre."
 ep2_meiji_pulse.2.a: "Ils paient le prix fort pour leur imprudence."
