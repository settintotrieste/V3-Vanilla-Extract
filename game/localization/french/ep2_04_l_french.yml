 # Zaibatsu
 je_zaibatsu: "L’empire des grandes entreprises"
 je_zaibatsu_reason: "L’industrialisation rapide [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName] a placé une grande partie de l’économie sous l’égide des [concept_zaibatsu|l]. Profitant largement de leurs liens étroits avec les institutions de l’État, ces entreprises sont devenues des éléments essentiels du complexe militaro-industriel du #v $JAP$#!.\n\nLa concentration du capital [ROOT.GetCountry.GetAltAdjectiveNoFormatting('MS')|l] a fait de ce pays un concurrent sérieux sur le plan international, au prix d’un pouvoir politique toujours plus important entre les mains des zaibatsu et de leurs soutiens militaires.[SCOPE.GetRootScope.GetCountry.GetCustom('zaibatsu_democracy_snippet')]\n$ZAIBATSU_LIST_HEADER$$ZAIBATSU_LIST_CONTENT$"
 je_zaibatsu_complete_header: "Pour #b implanter#! les zaibatsu :\n"
 je_zaibatsu_on_complete_header: "Lors de #b l’implantation#! des zaibatsu :\n$EFFECT$"
 je_zaibatsu_fail_header: "Pour #b limiter#! les zaibatsu :\n"
 je_zaibatsu_on_fail_header: "Lors de la #b limitation#! des zaibatsu :\n$EFFECT$"
 zaibatsu_democracy_info: "\n\nTant que cette [concept_journal_entry|l] sera active, la [concept_electoral_confidence|l] diminuera de #v 0,5 %#! par mois"
 two_more_more_company_slots_tt: "Peut fonder plus de [SCOPE.ScriptValue('je_zaibatsu_company_slots_threshold')|v0] [Concept('concept_company','$concept_companies$')|l]"
 glossary_zaibatsu: "Un #b #italic zaibatsu#!#! est un conglomérat financier et industriel familial verticalement intégré.\n\nUn zaibatsu classique s’organise autour d’une holding et d’une banque qui détiennent des parts dans plusieurs filiales, généralement industrielles. Les zaibatsu proviennent de conglomérats commerciaux familiaux de la fin de l’époque d’Edo, qui ont mis à profit leur richesse et leurs liens avec l’État pour renforcer leur contrôle sur une grande partie de la base industrielle du Japon."
