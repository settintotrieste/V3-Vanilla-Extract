l_french:
 japan_earthquakes.1.t: "Les grands séismes de l’ère [ROOT.GetCountry.GetCustom('JAP_era_name')]"
 japan_earthquakes.1.d: "En l’espace de quatre jours, trois séismes au large des côtes ont provoqué de lourds dégâts sur une vaste zone, sans parler des tsunamis qui se sont abattus sur les régions côtières."
 japan_earthquakes.1.f: "« En très peu de temps, tout le village avait remarqué le phénomène. Apparemment, personne n’avait senti le mouvement précédent du sol, mais tous étaient visiblement stupéfaits par le mouvement de l’eau. Ils coururent vers la plage, et même au-delà, pour l’observer. De mémoire d’homme, aucun reflux pareil n’avait été observé sur cette côte. Des choses jamais vues auparavant faisaient leur apparition ; des étendues inconnues de sable strié et des étendues de rochers couverts d’algues restaient nues sous le regard d’Hamaguchi. Et personne en contrebas ne semblait deviner la signification de ce reflux monstrueux. »\n\n— Lafcadio Hearn, #italic Un Dieu vivant#!"
 japan_earthquakes.1.a: "Demandez l’assistance des daimyō voisins."
 japan_earthquakes.1.b: "Laissez les dirigeants locaux s’occuper des opérations de secours."
 earthquake_assisting_daimyo: "Assistance des daimyō voisins"
 earthquake_affected_daimyo: "Conséquences du tremblement de terre"
 japan_earthquakes.2.t: "Séisme à [SCOPE.sState('japan_earthquake_state').GetCityHubName] au cours de l’ère [ROOT.GetCountry.GetCustom('JAP_era_name')]"
 japan_earthquakes.2.d: "Un violent séisme s’est produit au large des côtes de [SCOPE.sState('japan_earthquake_state').GetName], provoquant d’importants dégâts dans la ville de [SCOPE.sState('japan_earthquake_state').GetCityHubName] et son château."
 japan_earthquakes.2.f: "Quand les impressions du grand poisson-chat Namazu ont commencé à gagner en popularité après le tremblement de terre, elles semblaient dans la lignée des histoires traditionnelles. La créature y était maîtrisée par les dieux, afin de l’empêcher de provoquer d’autres séismes.\n\nPourtant, les portraits ont évolué avec le temps. Sur l’un d’eux, on pouvait voir Namazu s’ouvrir le ventre, laissant apparaître des pièces. Une autre impression le représentait en train de boire un verre avec des ouvriers. On pouvait y déceler une touche satirique qui laissait supposer que, malgré la catastrophe provoquée par la créature, c’était peut-être elle qui remettait les choses en ordre."
 japan_earthquakes.2.a: "Nos vassaux ont besoin d’aide à [SCOPE.sState('japan_earthquake_state').GetCityHubName] !"
 japan_earthquakes.2.b: "Les richesses doivent aller à ceux qui peuvent reconstruire."
 earthquake_vassal_support: "Soutien aux vassaux"
 earthquake_rebuilding_focus: "Reconstruction après un séisme"
 earthquake_rebuilding_redistribution: "Rectification mondiale"
 japan_earthquakes.3.t: "Séisme de Mino-Owari"
 japan_earthquakes.3.d: "Un violent séisme a frappé [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetName] en plein cœur, faisant des milliers de victimes et créant des failles d’une taille inhabituelle dans le pays."
 japan_earthquakes.3.f: "« L’homme a toujours eu tendance à voir les catastrophes comme des crimes, se demandant souvent \"qui\" en est responsable, d’où l’apparition de toute une série de monstres et de démons mythologiques qui seraient à l’origine des tremblements de terre.\n\nAujourd’hui, le sismologue moderne doit rejeter toute superstition mais, ironie de l’histoire, il se retrouve parfois dans la peau d’un détective chargé d’enquêter sur une scène de crime. Quels objets sont tombés ? Comment sont-ils tombés ? Toutes ces questions non pas pour déterminer \"qui\", mais \"comment\" et \"pourquoi\". »"
 japan_earthquakes.3.a: "Invitez des spécialistes étrangers à étudier ces failles."
 japan_earthquakes.3.b: "Servez-vous de ces connaissances pour installer d’autres observatoires météorologiques."
 japan_earthquakes.3.c: "Préparez-vous à d’éventuelles répliques."
 meteorological_observatories: "Observatoires météorologiques"
 meteorological_observatories_cost: "$meteorological_observatories$"
 earthquake_bracing_for_aftershocks: "Face aux répliques"
 japan_earthquakes.4.t: "Séisme de Sanriku"
 japan_earthquakes.4.d: "Un énorme tsunami a frappé [SCOPE.sState('japan_earthquake_state').GetName], provoqué par un tremblement de terre au large des côtes de Sanriku. Suite à son passage, il a été proposé d’ériger des monuments pour prévenir des futurs tsunamis."
 japan_earthquakes.4.f: "« Ériger des monuments aux morts ne suffit pas. Les vivants n’ont pas besoin qu’on leur rappelle les catastrophes qui se sont abattues sur eux. Quiconque découvrira un message gravé dans la pierre saura que ses ancêtres lui ont transmis quelque chose qui ne doit pas être oublié. Ces monuments sont dédiés à ceux qui ne sont pas encore nés. »"
 japan_earthquakes.4.a: "[SCOPE.sState('japan_earthquake_state').GetName] a besoin de ces monuments."
 japan_earthquakes.4.b: "Érigez ces pierres là où le tsunami a frappé !"
 japan_earthquakes.4.c: "Nous devons concentrer nos efforts sur le présent."
 tsunami_stones: "Pierres de tsunami"
 tsunami_relief_efforts: "Opérations de secours liées au tsunami"
 japan_earthquakes.5.t: "Séisme du Kantō"
 japan_earthquakes.5.d: "Un énorme tremblement de terre sans précédent a frappé [SCOPE.sState('japan_earthquake_state').GetCityHubName], détruisant une grande partie de la ville et faisant des centaines de milliers de victimes en l’espace de quelques minutes."
 japan_earthquakes.5.f: "Si le mur d’eau qui avait suivi le tremblement de terre semblait constituer la plus grande menace, ce n’était rien comparé aux incendies. Bientôt, non seulement toute la ville fut en proie aux flammes, mais la terre et le vent semblaient brûler, eux aussi.\n\nLes personnes qui avaient réussi à échapper aux bâtiments en feu se retrouvaient coincées au milieu d’un tourbillon de flammes, comme si l’incendie était déterminé à ne laisser aucun survivant. [SCOPE.sState('japan_earthquake_state').GetCityHubName] avait des allures d’enfer."
 japan_earthquakes.5.a: "Le peuple japonais doit rester uni face à cette catastrophe !"
 japan_earthquakes.5.b: "Ce coup porté à nos richesses matérielles est un avertissement contre la décadence."
 japan_earthquakes.5.c: "Nous devons saisir cette occasion pour reconstruire [SCOPE.sState('japan_earthquake_state').GetCityHubName] de façon plus moderne."
 earthquake_national_tragedy: "Tragédie nationale"
 earthquake_divine_punishment: "Châtiment divin"
 earthquake_modernization: "Reconstruction modernisée"
 earthquake_modernization_land_confiscation: "Réaffectation des terres"
 shinbutsu_bunri_decision: "$je_shinbutsu_bunri$"
 shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$"
 elevate_buddhism_decision: "$je_elevate_buddhism$"
 elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$"
 je_shinbutsu_bunri: "Shinbutsu bunri"
 je_shinbutsu_bunri_reason: "Maintenant que l’autorité de l’empereur a été restaurée, nous devons mettre en avant et encourager les anciennes traditions religieuses qui considèrent la ligne impériale comme sacrée. Pour cela, il faut les dissocier de l’influence étrangère du bouddhisme, qui est inextricablement lié au culte des kamis depuis des siècles par le biais des traditions syncrétiques. En tirant parti du mécontentement engendré par les institutions bouddhistes en raison de leurs liens avec le shogunat, nous pourrons ouvrir la voie au shintoïsme comme principe suprême."
 je_taikyo_proclamation_button: "Proclamation Taikyō"
 je_taikyo_proclamation_button_desc: "Faites du shintoïsme, du culte des kamis et de la vénération de l’empereur, le principe de l’État."
 je_taikyo_proclamation_conversion_tt: "Chaque chef de [concept_interest_group|l] a #v 75 %#! de chances de se convertir au [GetReligion('shinto').GetName|l]."
 je_elevate_buddhism: "Élever le bouddhisme"
 je_elevate_buddhism_reason: "Les institutions religieuses bouddhistes au $JAP$ entretiennent des liens historiques étroits avec la branche administrative du shogunat. Après avoir évité une fois la fin du shogunat, la stabilisation de ces institutions pourrait nous aider à maintenir son pouvoir et à renforcer les traditions religieuses au $JAP$ qui ne sont pas centrées sur le culte de l’empereur."
 je_elevate_buddhism_goal: "$je_communism_2_goal$"
 arahitogami: "Arahitogami"
 extended_danka_system: "Système danka élargi"
 japan_religion.1.t: "Jingū-ji"
 japan_religion.1.d: "Dans les temples sanctuaires, il n’est pas rare de voir des moines bouddhistes effectuer des rituels parallèlement aux pratiques shintoïstes. Avec la séparation du bouddhisme et du shintoïsme, le rôle de ces moines est remis en question."
 japan_religion.1.f: "« Quel est le but de ces rituels ? De guider les kamis vers l’éveil spirituel ? D’améliorer leur karma ? Cela implique très clairement qu’au lieu d’être dignes d’être vénérés, ce sont en réalité des êtres perdus qui ont besoin d’un guide. Nous ne tolérerons plus de telles insinuations ! »"
 japan_religion.1.a: "Demandez aux moines de se convertir pour devenir des prêtres shintoïstes."
 japan_religion.1.b: "Retirez leurs titres aux moines."
 japan_religion.1.c: "Laissez les moines tranquilles."
 forced_monk_conversions: "Conversion forcée des moines"
 monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$"
 monks_stripped_of_titles: "Moines privés de leurs titres"
 monks_left_to_duties: "Moines laissés tranquilles"
 japan_religion.1.a.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] des [GetPopType('clergymen').GetName|l] se convertiront au [GetReligion('shinto').GetName|l]"
 japan_religion.2.t: "Honji suijaku"
 japan_religion.2.d: "L’idée est bien établie que les bouddhas se sont révélés au Japon sous la forme de kamis, comme en témoigne le terme « [concept_gongen|l] », qui les considère comme les deux parties de la même entité. Cette terminologie renforce l’influence du bouddhisme."
 japan_religion.2.f: "« Cela pouvait sembler logique autrefois. Amaterasu est le Soleil. Dainichi Nyorai, Vairocana, est aussi le Soleil. Toutefois, le Soleil ne s’en trouve pas divisé, et ce n’est pas non plus le reflet ou la manifestation de la lumière d’un autre. Il rayonne seul et se suffit à lui-même. Et aujourd’hui, il n’y a de la place [ROOT.GetCountry.GetAltNameNoFormatting('En')][ROOT.GetCountry.GetNameNoFormatting] que pour un seul Soleil. »"
 japan_religion.2.a: "Interdisez le concept de [concept_gongen|l]."
 japan_religion.2.b: "Il est interdit de désigner Hachiman sous le nom de [concept_boddhisattva|l]."
 japan_religion.2.c: "Abstenez-vous de réglementer la terminologie."
 banned_syncretic_terminology: "Terminologie syncrétique interdite"
 retained_syncretic_terminology: "Terminologie syncrétique maintenue"
 japan_religion.2.a.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] des [GetPopType('farmers').GetName|l] se convertiront au [GetReligion('shinto').GetName|l]"
 japan_religion.2.b.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] des [GetPopType('soldiers').GetName|l] se convertiront au [GetReligion('shinto').GetName|l]"
 japan_religion.3.t: "Pour vous sonne le glas"
 japan_religion.3.d: "La tentative visant à minimiser l’influence du bouddhisme a engendré un sentiment général d’hostilité envers les bouddhistes. Des temples ont vu leurs biens saisis et endommagés, voire totalement détruits dans certains cas, tandis que d’autres ont été dépouillés de leurs iconographies bouddhistes."
 japan_religion.3.f: "Tandis qu’il s’approchait du sanctuaire, il s’arrêta tout à coup. Les deux niō, imposantes statues de bouddhas qui gardaient autrefois l’entrée du lieu, avaient été retirées. Il ne restait à leur place qu’un grand vide.\n\nQuand il entra, il lui apparut que le sanctuaire tout entier avait perdu de sa pureté."
 japan_religion.3.a: "Faites fondre les cloches des temples pour en faire des canons !"
 japan_religion.3.b: "Détruisez ou retirez les statues de bouddhas de tous les temples."
 japan_religion.3.c: "Ne touchez pas aux temples."
 smelted_temple_bells: "Cloches des temples fondues"
 smelted_temple_bells_opinion: "$smelted_temple_bells$"
 removed_buddha_statues: "Statues de bouddhas retirées"
 removed_buddha_statues_opinion: "$removed_buddha_statues$"
 retained_buddhist_iconography: "Iconographie bouddhiste conservée"
 japan_religion.4.t: "Le département des Affaires shinto"
 japan_religion.4.d: "Les efforts visant à standardiser les pratiques shintoïstes et à garantir que les kamis d’État fassent partie intégrante des rituels locaux ont été accueillis par un refus des moines et des prêtres des sanctuaires locaux, qui considèrent que ces enseignements vont à l’encontre des traditions."
 japan_religion.4.f: "« Le shintoïsme ne consiste pas simplement à perpétuer les pratiques et les rituels existants tels qu’ils existent dans les sanctuaires de la nation, complexifiés et altérés par les influences étrangères. Les traditions de la maison impériale, les descendants du ciel, doivent être enseignées partout [ROOT.GetCountry.GetAltNameNoFormatting('En')][ROOT.GetCountry.GetNameNoFormatting] afin de rendre au shintoïsme sa forme la plus pure. »"
 japan_religion.4.a: "Appliquez les interprétations de l’État."
 japan_religion.4.b: "Les prêtres locaux sont les mieux placés pour savoir ce qui convient aux rituels locaux."
 standardized_priest_training: "Formation des prêtres standardisée"
 standardized_priest_training_opinion: "$standardized_priest_training$"
 deferred_to_local_priests: "Entre les mains des prêtres locaux"
 deferred_to_local_priests_opinion: "$deferred_to_local_priests$"
 japan_religion.5.t: "Confucianisme et shintoïsme"
 japan_religion.5.d: "Dans le processus de séparation du bouddhisme et du shintoïsme, le rôle du confucianisme a été mis en cause. De nombreux spécialistes estiment que cette philosophie est parfaitement compatible avec le shintoïsme, tandis que d’autres la rejettent comme n’importe quelle autre influence étrangère."
 japan_religion.5.f: "« Le confucianisme reprend des voies similaires à celles du bouddhisme, mais il n’existe aucune contradiction entre cette philosophie et le culte des kamis. Au contraire, les deux se renforcent mutuellement, englobant les mêmes principes que ceux du ciel et de la terre, ou du souverain et du sujet. »"
 japan_religion.5.a: "Le confucianisme est complémentaire au shintoïsme."
 japan_religion.5.b: "Nous devons restaurer les anciennes traditions du shintoïsme."
 fukko_shinto: "Fukko shintō"
 japan_religion.6.t: "Le christianisme en pays ouvert"
 japan_religion.6.d: "Bien que [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetName] se soit ouvert au monde, la religion continue d’être réglementée. Les pays chrétiens pourraient considérer la libre importation de leur foi comme aussi importante que l’importation de leurs biens."
 japan_religion.6.f: "« C’est dans la mort que le christianisme aime le plus ses fidèles. Une mort pour la foi avant tout. Chaque missionnaire crucifié ou envoyé au bûcher devient le nouveau chapitre d’une histoire qui a commencé avec un homme sur une croix. Peut-être est-il temps d’arrêter de les qualifier de martyrs ? »"
 japan_religion.6.a: "Les missionnaires doivent être autorisés à prêcher leur foi."
 japan_religion.6.b: "Ils peuvent pratiquer leur foi, mais pas la répandre."
 japan_religion.6.c: "Le christianisme était et reste encore aujourd’hui une menace."
 permitted_christianity: "Christianisme autorisé"
 christianity_disallowed: "Christianisme interdit"
 japan_religion.7.t: "Courants de pensée"
 japan_religion.7.d: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] [ROOT.GetCountry.GetAltNameNoFormatting('AOnt')] une longue tradition de différentes écoles de bouddhisme, dont beaucoup sont encore influentes aujourd’hui. Maintenant que les [SCOPE.gsInterestGroup('devout_ig').GetName|l] gagnent en pouvoir politique, une école se distingue en particulier."
 japan_religion.7.f: "« Au fil des siècles, de nouvelles écoles du bouddhisme sont apparues [ROOT.GetCountry.GetAltNameNoFormatting('En')][ROOT.GetCountry.GetNameNoFormatting]. Il n’y a aucune raison de croire que l’une d’elles va se distinguer des autres. Cependant, la situation actuelle exige autorité et direction politique, et il est probable que certaines sauront mieux en profiter que d’autres. »"
 japan_religion.7.a: "L’école de la Terre pure."
 japan_religion.7.b: "L’école Zen."
 japan_religion.7.c: "L’école de Nichiren."
 japan_religion.7.e: "L’école Shingon."
 pure_land_buddhism: "École de la Terre pure"
 zen_buddhism: "École Zen"
 shingon_buddhism: "École Shingon"
 japan_religion.8.t: "Les paroles du Bouddha"
 japan_religion.8.d: "Maintenant que [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetName] s’est ouvert au monde, les érudits bouddhistes souhaitent traduire davantage de textes étrangers, afin d’intégrer leurs idées dans le bouddhisme moderne."
 japan_religion.8.f: "« Nous ne devrions pas laisser les orthodoxies nées de l’isolement nous retenir, ni craindre de trouver la vérité là où nous ne l’attendons pas. Les enseignements du Bouddha nous sont enfin parvenus. Étudier leur cheminement jusqu’à nous, ainsi que le cheminement qu’ils pourraient prendre, ne peut que nous apporter une meilleure compréhension. »"
 japan_religion.8.a: "Les textes en pali et en sanskrit sont les racines du bouddhisme."
 japan_religion.8.b: "Les textes en chinois se rapprochent le plus de nos écoles de pensée."
 japan_religion.8.c: "Procédez à une étude comparative à partir des œuvres de philosophie européenne."
 japan_religion.9.t: "Moines-soldats"
 japan_religion.9.d: "L’effort de guerre continu a conduit à des débats parmi les [SCOPE.gsInterestGroup('devout_ig').GetName|l] au sujet du rôle du bouddhisme dans le soutien apporté au pays au cours d’un conflit violent."
 japan_religion.9.f: "« Les anciens moines n’hésitaient pas à défendre leurs temples. Devons-nous hésiter à défendre notre nation ? Il ne faut pas prendre la vie à la légère, mais l’État [ROOT.GetCountry.GetAltAdjective('MS')|l] se lancerait-il dans une guerre qui n’aboutirait pas à une paix durable, et qui ne sauverait pas plus de vies qu’elle n’en coûterait ? »"
 japan_religion.9.a: "La force est nécessaire si nous voulons instaurer une paix durable."
 japan_religion.9.b: "Nous prônons la non-violence avant tout."
 war_buddhism: "Bouddhisme en guerre"
 peaceful_buddhism: "Bouddhisme pacifique"
 japan_religion.10.t: "Yōshoku"
 japan_religion.10.d: "Depuis la fin du sakoku, de plus en plus de restaurants de viande sont apparus dans les villes portuaires pour répondre à la demande des étrangers. Cela a remis en question l’interdiction de consommer de la viande en vigueur [ROOT.GetCountry.GetAltNameNoFormatting('En')][ROOT.GetCountry.GetName]."
 japan_religion.10.f: "« Excusez-moi, mais le bœuf est vraiment un mets délicieux, vous ne trouvez pas ? Dès lors que l’on s’habitue au goût, on ne peut plus revenir au cerf ou au sanglier. Je me demande pourquoi personne au Japon n’en avait jamais mangé auparavant. »\n\n— Kanagaki Robun, #italic Conversations autour d’un pot-au-feu#!"
 japan_religion.10.a: "Nous devons lever cette interdiction, aussi bien pour la nutrition que pour l’expérience culinaire !"
 japan_religion.10.b: "Nous ne laisserons pas ces pratiques barbares se répandre !"
 maintained_meat_ban: "Interdiction de consommer de la viande maintenue"
 maintained_meat_ban_opinion: "$maintained_meat_ban$"
 japan_religion.11.t: "La voie des kamis"
 japan_religion.11.d: "La séparation des pratiques shintoïstes et bouddhistes est un franc succès. L’influence des anciennes institutions religieuses faiblit, ouvrant la voie à une nouvelle ère de dévotion envers les dieux, l’empereur et [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetName]."
 japan_religion.11.f: "« [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetNameNoFormatting] possède de nombreuses religions, de nombreux rituels, certains anciens, d’autres récents. Notre objectif n’a jamais été d’en éliminer certains au profit de certains autres, mais plutôt de faire la distinction entre des croyances profondément ancrées et des vérités incontestables. »"
 japan_religion.11.a: "La divinité est absolue."
 japan_religion.12.t: "La voie du milieu"
 japan_religion.12.d: "Après une période de bouleversements [ROOT.GetCountry.GetAltNameNoFormatting('Au')][ROOT.GetCountry.GetName], les [SCOPE.gsInterestGroup('devout_ig').GetName|l] sont parvenus à réaffirmer leur autorité religieuse dans le pays et à renforcer leurs liens avec le [ROOT.GetCountry.GetGovernment.GetName]."
 japan_religion.12.f: "« Les hommes parlent de la Voie des dieux. Si elle existe,\nCe n’est pas aux hommes de l’emprunter, car seuls les dieux\nPeuvent emprunter la voie divine. »\n— Hagura Toman" # Arthur Lloyd, Poems by Buddhist Priests of Japan
 japan_religion.12.a: "La voie est libre."
 japan_religion.13.t: "$je_taikyo_proclamation_button$"
 japan_religion.13.d: "La Proclamation de la Grande Doctrine instaure le culte des kamis et la vénération de l’empereur divin comme principes de l’État [ROOT.GetCountry.GetAltAdjective('MS')|l] et devoir de ses citoyens."
 japan_religion.13.f: "« Le respect des kamis et l’amour de notre pays sont inextricablement liés : tel est le premier enseignement.\n\nLes principes divins et la voie de l’homme sont inextricablement liés : tel est le deuxième enseignement.\n\nLa vénération de l’empereur et le respect de la volonté de la cour sont inextricablement liés : tel est le troisième enseignement. »"
 japan_religion.13.a: "Ces enseignements doivent être inculqués à travers tout le pays !"
 concept_gongen: "Gongen"
 concept_gongen_desc: "Manifestation d’un Bouddha sous la forme d’un kami, association d’une divinité indigène à un messager de l’enseignement bouddhiste."
 concept_boddhisattva: "Bodhisattva"
 concept_boddhisattva_desc: "Dans le bouddhisme, il désigne un maître et un être éclairé qui aide les autres à atteindre le nirvana."
