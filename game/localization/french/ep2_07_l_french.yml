l_french:
 je_sakoku: "Le pays enfermé"
 je_sakoku_reason: "Depuis l’ère Kan’ei et les premiers jours du shogunat Tokugawa, le $JAP$ est un pays fermé aux étrangers, qui n’a jamais autorisé plus qu’un commerce limité avec quelques nations triées sur le volet et dans certains ports désignés. Bien que ce système ait perduré pendant plus de deux siècles, le monde évolue à tel point qu’il est de plus en plus difficile de garder un pays clos, même si certains intérêts au $JAP$ souhaiteraient que les choses restent ainsi éternellement. Si nous ne pouvons pas empêcher les puissances étrangères de s’immiscer sur notre territoire, alors nous devons importer leurs idées autant que leurs marchandises."
 je_sakoku_meiji_restoration: "L’#b empereur#! a été rétabli dans ses fonctions, et le #b shogun#! renversé"
 je_sakoku_stop_being_closed_button: "Révoquer le [GetLawType('law_sakoku').GetName|l]"
 je_sakoku_stop_being_closed_button_desc: "L’évolution de la situation et les pressions croissantes provenant de l’étranger ont fait de la fin du [GetLawType('law_sakoku').GetName|l] une priorité absolue. Dans ces circonstances, nous pourrons mettre un terme de force à l’ancien système isolationniste, même si cela ne manquera pas d’irriter ceux qui soutiennent encore les anciennes lois."
 notification_morrison_incident_has_incidented_name: "Marchand pris pour cible par le $JAP$"
 notification_morrison_incident_has_incidented_desc: "Un de nos navires marchands s’est aventuré au large du Japon et a tenté de contourner les restrictions japonaises sur les navires de commerce étrangers. Il a été pris pour cible par l’artillerie côtière, dégradant ainsi les relations entre nos deux nations."
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners: "Indulgence envers les étrangers"
 caved_to_foreign_pressure_opposition: "Cédé sous la pression étrangère"
 caved_to_foreign_pressure_government: "Cédé sous la pression étrangère"
 overdue_break_with_tradition: "Rupture avec les traditions"
 forced_transition_from_tradition: "Transition forcée loin des traditions"
 the_picked_lock_modifier: "La serrure crochetée"
 sakoku_entrenched_modifier: "Sakoku établi"
 meiji_failure_modifier: "Échec des réformes de restauration"
 ep2_sakoku.1.t: "La défaite gênante [SCOPE.sCountry('opium_wars_loser').GetAltNameNoFormatting('Du')][SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting]"
 ep2_sakoku.1.d: "Notre grand et vénérable voisin, [SCOPE.sCountry('opium_wars_loser').GetAltNameNoFormatting('Le')][SCOPE.sCountry('opium_wars_loser').GetName], a perdu une guerre de l’opium contre une nation arriviste d’outre-mer. Si [SCOPE.sCountry('opium_wars_loser').GetAltNameNoFormatting('Le')][SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] n’est pas capable de contrôler son propre marché et de tenir les étrangers à distance, comment pourrions-nous maintenir le [GetLawType('law_sakoku').GetName|l] sur nos terres ?"
 ep2_sakoku.1.f: "« Toutes les terres, toutes les richesses, tout le pouvoir qu’ils détenaient... n’étaient rien comparé à la force qui se dressait devant eux. Les étrangers nous supplient déjà de les laisser entrer dans notre pays. Devons-nous suivre l’exemple [SCOPE.sCountry('opium_wars_loser').GetAltNameNoFormatting('Du')][SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] et, comme [SCOPE.sCountry('opium_wars_loser').GetAltNameNoFormatting('Le')][SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting], essayer de les réprimer jusqu’à ce que leurs canons ne s’abattent sur nos villes ? Ou devons-nous suivre notre propre voie ? Nous devons nous décider avant que ces forces armées ne pénètrent dans nos eaux et ne décident à notre place. »"
 ep2_sakoku.1.a: "Nous devons envisager l’impensable."
 ep2_sakoku.1.b: "Nous devons accepter l’impensable."
 end_sakoku_button_now_available: "L’option de mettre un terme de force au [GetLawType('law_sakoku').GetName|l] sera désormais visible dans $je_sakoku$."
 ep2_sakoku.2.t: "Crochetage de serrure"
 ep2_sakoku.2.d: "Face au tumulte à l’intérieur et à l’extérieur du pays, le [GetLawType('law_bakufu').GetName|l] a décidé de faire pression pour mettre immédiatement un terme au [GetLawType('law_sakoku').GetName|l]."
 ep2_sakoku.2.f: "Une foule de marchands a déferlé sur le poste de douane. Face à eux se trouvait un seul fonctionnaire débordé. « Bien sûr, cela signifie que le pays ne sera plus clos. »\n\nUne dizaine de questions s’abattirent sur lui tout à coup. « Ce qu’il va se passer ? Je... Je ne sais pas. Peut-être que... Non, attendez, ce n’est ni à moi ni à vous de prendre cette décision, vous ne pouvez pas... »\n\nChacune de ses réponses engendrait une nouvelle avalanche de questions. #italic Le travail était tellement plus facile avant#!, pensa-t-il."
 ep2_sakoku.2.a: "L’avenir [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetNameNoFormatting] réside dans le [GetLawType('law_mercantilism').GetName|l]."
 ep2_sakoku.2.b: "Le [GetLawType('law_free_trade').GetName|l] libérera [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetNameNoFormatting]."
 ep2_sakoku.2.c: "Le [GetLawType('law_protectionism').GetName|l] nous poussera à commercer prudemment avec les intérêts étrangers."
 ep2_sakoku.3.t: "L’incident du [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]"
 ep2_sakoku.3.d: "Un navire marchand [SCOPE.sCountry('morrison_incident_country').GetAltNameNoFormatting('Du')][SCOPE.sCountry('morrison_incident_country').GetName] a tenté d’ignorer les protocoles stricts du [GetLawType('law_sakoku').GetName|l] en commerçant dans un port non autorisé. Le navire en question, le #italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#!, a dû faire demi-tour face au tir de barrage de l’artillerie côtière. Les relations avec [SCOPE.sCountry('morrison_incident_country').GetAltNameNoFormatting('Le')][SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] se sont détériorées."
 ep2_sakoku.3.f: "Le commandant sourit en voyant un boulet de canon heurter le navire. La loi était très claire : ce navire n’avait pas le droit d’être là. Il se fichait bien de ce que pouvait penser le capitaine à bord. Tout ce qu’il voulait, c’était que ce navire fasse demi-tour. "
 ep2_sakoku.3.a: "La garnison locale a fait ce qu’elle avait à faire."
 ep2_sakoku.3.b: "Nous devrions nous excuser auprès [SCOPE.sCountry('morrison_incident_country').GetAltNameNoFormatting('Du')][SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] et indemniser le navire marchand pour arranger les choses."
 ep2_sakoku.3.c: "C’est l’occasion dont nous avions besoin pour revoir la nécessité du [GetLawType('law_sakoku').GetName|l]."
 ep2_sakoku.4.t: "La serrure crochetée"
 ep2_sakoku.4.d: "Suite aux pressions exercées à l’intérieur et à l’extérieur du pays, le [GetLawType('law_sakoku').GetName|l] a été rompu. [ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetNameNoFormatting] se forge un nouvel avenir."
 ep2_sakoku.4.f: "Le fonctionnaire regarda la baie. De nouveaux navires étaient amarrés. Des navires inconnus, avec des pavillons qu’il n’avait jamais vus. Qu’avaient-ils proposé [ROOT.GetCountry.GetAltNameNoFormatting('Au')][ROOT.GetCountry.GetNameNoFormatting] ? Et que cherchaient-ils à obtenir [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetNameNoFormatting] ?\n\nIl s’attarda longuement sur les navires amarrés, avant de détourner le regard. Les observer de la sorte ne lui donnerait pas la réponse qu’il attendait, pas aujourd’hui. Seul le temps pourrait lui dire ce que cette nouvelle ère apporterait à sa patrie."
 ep2_sakoku.4.a: "Aujourd’hui, le Japon s’ouvre au monde !"
 ep2_sakoku.5.t: "Serrure grippée"
 ep2_sakoku.5.d: "Le respect continu du [GetLawType('law_sakoku').GetName|l] [ROOT.GetCountry.GetAltNameNoFormatting('En')][ROOT.GetCountry.GetNameNoFormatting], alors même que le pays est en proie à des bouleversements politiques, ne présage rien de bon pour faire sortir le pays de l’isolement qu’il s’est lui-même imposé. Il semble que le [GetLawType('law_sakoku').GetNameNoFormatting|l] soit loin d’être terminé."
 ep2_sakoku.5.f: "Le fonctionnaire regarda la baie. D’anciens navires étaient amarrés, les mêmes que son père, son grand-père, et même ses ancêtres depuis des générations avaient vus. Ses enfants verraient-ils les mêmes navires ? Ses petits-enfants ? Cette vue changerait-elle un jour ?\n\nIl s’attarda longuement sur les navires amarrés, avant de détourner le regard. Les observer de la sorte ne lui donnerait pas la réponse qu’il attendait, pas aujourd’hui. Seul le temps pourrait lui dire si sa patrie resterait la même pour toujours."
 ep2_sakoku.5.a: "La serrure reste fermée."
 meiji.14.t: "La futile restauration"
 meiji.14.d: "Malgré les promesses de réformes alléchantes défendues par le nouveau gouvernement [ROOT.GetCountry.GetCustom('JAP_era_name')], [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetNameNoFlag] n’a connu aucun changement majeur. Les détracteurs se lamentent que l’État d’aujourd’hui n’est pas bien différent de celui d’avant la restauration."
 meiji.14.f: "Un énorme moteur grondait et toussotait sur le sol de l’usine, faisant tourner un immense volant d’inertie et actionnant tours et perceuses. Ces machines fabriquaient de nouveaux canons, de nouveaux verrous, de nouvelles gâchettes pour un vaste arsenal. Une nation se servirait bientôt de cette vapeur et de ce fer pour imposer sa marque au monde... et cette nation ne serait pas [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetNameNoFormatting]."
 meiji.14.a: "Aujourd’hui, le soleil repose sur un rêve."
 je_end_edo_system_button_name: "Mettre fin au système hiérarchique de l’époque d’Edo"
 je_end_edo_system_button_desc: "En cette période de réforme et de renouveau, l’ancien système des castes nous empêche d’avancer. Chaque citoyen peut contribuer à la nation, quelle que soit sa situation sociale."
 edo_system_not_support_enforcement_tt: "Ne soutient pas la promulgation du [GetLawType('law_intermediate_edo_system').GetName|l] ou du [GetLawType('law_strict_edo_system').GetName|l]"
 edo_system_ends_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetNameNoFlag] abolit entièrement le [Concept('concept_social_hierarchy','$edo_system$')|l]"
 notification_edo_system_disappears_name: "Le système hiérarchique à l’époque d’Edo s’effondre"
 notification_edo_system_disappears_desc: "En raison des récents changements sociétaux et culturels, le système hiérarchique à l’époque d’Edo n’est plus une [concept_social_hierarchy|l] reconnue [SCOPE.sCountry('relevant_country_scope').GetAltNameNoFormatting('En')][SCOPE.sCountry('relevant_country_scope').GetName]."
 notification_edo_system_disappears_tooltip: "#header $notification_edo_system_disappears_name$#!\n$TOOLTIP_DELIMITER$\n$notification_edo_system_disappears_desc$"
 je_meiji_army_barracks_condition: "Toutes les [GetBuildingType('building_barrack').GetName|l]s [ROOT.GetCountry.GetAltAdjectiveNoFlag('FP')|l] :\n$EFFECT_LIST_BULLET$ N’ont pas activé #yellow $pm_no_organization$#! ni #yellow $pm_samurai_training$#!"
