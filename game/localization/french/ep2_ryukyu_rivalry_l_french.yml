 # Progress Bars
 je_ryukyu_rivalry_score_bar: "#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b Emprise#!#! sur [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('ryukyu_scope').GetName]"
 je_ryukyu_rivalry_score_bar_desc: "[SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('Le')|U][SCOPE.sCountry('japan_scope').GetNameNoFormatting]"
 je_ryukyu_rivalry_score_bar_second_desc: "[SCOPE.sCountry('china_scope').GetAltNameNoFormatting('Le')|U][SCOPE.sCountry('china_scope').GetNameNoFormatting]"
 je_ryukyu_rivalry_progress_bar: "#tooltippable;tooltip:ryukyu_rivalry_assertiveness_tt #b Assurance#!#! de Ryūkyū"
 je_ryukyu_rivalry_progress_bar_desc: "Ryūkyū affirme sa neutralité #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!"
 # # Scripted Buttons
 je_ryukyu_rivalry_reaffirm_suzerainty_button: "[SCOPE.GetRootScope.GetCountry.GetCustom('ryukyu_rivalry_reaffirm_suzerainty')]"
 je_ryukyu_rivalry_reaffirm_suzerainty_japan: "Réaffirmer la suzeraineté"
 je_ryukyu_rivalry_reaffirm_suzerainty_china: "Réaffirmer les liens tributaires"
 je_ryukyu_rivalry_reaffirm_suzerainty_button_desc: "La cour de Ryūkyū est favorable à notre adversaire. Nous devons lui rappeler ses obligations envers notre domaine, et le ramener sous notre influence."
 ryukyu_rivalry_reaffirm_suzerainty_button_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] a moins d’#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b emprise#!#! sur son adversaire que [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('ryukyu_scope').GetName]"
 ryukyu_rivalry_small_influence_gain_self_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] gagne #green 2#! points d’#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b emprise#!#!"
 ryukyu_rivalry_medium_influence_gain_self_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] gagne #green 3#! points d’#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b emprise#!#! par mois pendant #v 5 ans#!"
 ryukyu_rivalry_large_influence_gain_self_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] gagne #green 3#! points d’#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b emprise#!#! par mois jusqu’à la fin de l’[concept_journal_entry|l]"
 ryukyu_rivalry_small_influence_loss_self_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] a perdu #red 1#! point d’#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b emprise#!#!"
 ryukyu_rivalry_medium_influence_loss_self_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] a perdu #red 2#! points d’#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b emprise#!#!"
 ryukyu_rivalry_large_influence_loss_self_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] a perdu #red 10#! points d’#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b emprise#!#!"
 ryukyu_rivalry_large_influence_loss_japan_tt: "[SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('Le')|U][SCOPE.sCountry('japan_scope').GetName] perd #red 10#! points d’#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b emprise#!#!"
 ryukyu_rivalry_large_influence_loss_china_tt: "[SCOPE.sCountry('china_scope').GetAltNameNoFormatting('Le')|U][SCOPE.sCountry('china_scope').GetName] perd #red 10#! points d’#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b emprise#!#!"
 ryukyu_rivalry_send_general_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] affecte un [concept_general|l] de façon permanente [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Au')][SCOPE.sCountry('ryukyu_scope').GetName]"
 je_ryukyu_rivalry_sway_merchants_button: "Envoyer des responsables commerciaux"
 je_ryukyu_rivalry_sway_merchants_button_desc: "En supervisant le port de Naha, nous pouvons envoyer des émissaires à la cour afin d’influencer le choix des puissances étrangères qui auront accès au commerce et au tribut."
 ryukyu_rivalry_sway_merchants_button_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] possède un [GetBuildingType('building_port').GetName|l] de niveau #v 2#! ou plus dans l’[concept_capital_state] [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('ryukyu_scope').GetName]"
 je_ryukyu_rivalry_inspect_defenses_button: "Inspecter les défenses côtières"
 je_ryukyu_rivalry_inspect_defenses_button_desc: "Maintenant que l’accès militaire a été sécurisé, nous pouvons envoyer un général de confiance inspecter les fortifications de Ryūkyū, afin de nous assurer que les remparts et les tours de guet reflètent notre supervision et notre objectif stratégique."
 ryukyu_rivalry_inspect_defenses_button_tt: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] a un [concept_treaty|l] d’#v accès militaire#! avec [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('ryukyu_scope').GetName]"
 je_ryukyu_rivalry_honor_kikoeogimi_button: "Honorer Kikoe-ōgimi"
 je_ryukyu_rivalry_honor_kikoeogimi_button_desc: "Rendez hommage à Kikoe-ōgimi, dont l’autorité en matière de rituels de cour et de rites sacrés peut renforcer notre influence dans les conseils de Ryūkyū."
 # Modifiers
 modifier_ryukyu_rivalry_overreach: "Suzeraineté étendue"
 modifier_ryukyu_rivalry_landowner_discontent: "Inquiétudes liées à la rivalité à Ryūkyū"
 modifier_ryukyu_rivalry_merchant_influence_strain: "Poids de l’influence portuaire"
 modifier_ryukyu_strained_diplomatic_corps: "Présence diplomatique intensifiée"
 modifier_ryukyu_rivalry_failed_ryukyu: "Ryūkyū perdu"
 modifier_ryukyu_rivalry_succeeded_ryukyu: "Ryūkyū gagné"
 modifier_ryukyu_rivalry_officer_training: "Inspection des défenses de Ryūkyū"
 modifier_ryukyu_rivalry_secured_neutrality: "Neutralité sécurisée"
 modifier_ryukyu_rivalry_southern_secured: "Approches sécurisées par le sud"
 modifier_ryukyu_rivalry_scholars_pleased: "Ordre des tributaires maintenu"
 modifier_ryukyu_rivalry_honor_kikoeogimi: "Implication cérémoniale"
 modifier_ryukyu_rivalry_diplomatic_appeasement: "Apaisement diplomatique"
 modifier_ryukyu_rivalry_armed_forces_discontent: "Inaction préoccupante"
 # Events
 ryukyu_rivalry.1.t: "Délibérations tributaires"
 ryukyu_rivalry.1.d: "[SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')|U][SCOPE.sCountry('ryukyu_scope').GetName] soutient de plus en plus [ROOT.GetCountry.GetAltNameNoFormatting('Le')][ROOT.GetCountry.GetName]. En réponse, [SCOPE.sCountry('rival_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('rival_scope').GetName] a intensifié ses propres efforts diplomatiques, témoignant ainsi son respect tout en renforçant discrètement les obligations de la relation tributaire avec [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]."
 ryukyu_rivalry.1.f: "Des boîtes scellées avaient été disposées avec soin dans la salle de Ryūkyū. Des courtisans chuchotaient derrière des paravents, tandis que des lettres étaient lues à voix haute : l’une marquée du tampon rouge et des caractères chinois, l’autre arborant la calligraphie soignée du Japon. Chaque phrase énonçait leurs devoirs et leurs promesses, tandis que deux puissances tentaient d’attirer le royaume de leur côté."
 ryukyu_rivalry.1.a: "Adressez une plainte formelle [SCOPE.sCountry('rival_scope').GetAltNameNoFormatting('Au')][SCOPE.sCountry('rival_scope').GetName]."
 ryukyu_rivalry.1.b: "Profitez des liens que nous avons établis [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Au')][SCOPE.sCountry('ryukyu_scope').GetName]."
 ryukyu_rivalry.1.c: "Rappelez à la cour notre fidélité de longue date."
 ryukyu_rivalry.1.e: "Cette affaire ne mérite pas notre intervention."
 ryukyu_rivalry.1.tt1: "[SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')|U][SCOPE.sCountry('ryukyu_scope').GetName] est un sujet [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName] avec un [concept_liberty_desire|l] inférieur à #v 25#!"
 ryukyu_rivalry.1.tt2: "[SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')|U][SCOPE.sCountry('ryukyu_scope').GetName] n’est pas un sujet [ROOT.GetCountry.GetAltNameNoFormatting('Du')][ROOT.GetCountry.GetName] avec au moins des [concept_relations|l] #v amicales#!"
 ryukyu_rivalry.1.tt3: "[ROOT.GetCountry.GetAltNameNoFormatting('Le')|U][ROOT.GetCountry.GetName] possède au moins 3 [Concept('concept_building','$concept_buildings$')|l] à [SCOPE.sCountry('ryukyu_scope').GetCapital.GetName]"
 ryukyu_rivalry.2.t: "Rivalité à notre porte"
 ryukyu_rivalry.2.d: "La présence d’émissaires [SCOPE.sCountry('rival_scope').GetAltAdjectiveNoFlag('MP')|l] dans les ports [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('ryukyu_scope').GetName] a attiré l’attention et la coopération de nombreux marchands [GetCulture('ryukyuan').GetCustom('getPluralDemonym')|l], renforçant ainsi leur position aux yeux de la cour. En retour, notre emprise s’est affaiblie."
 ryukyu_rivalry.2.f: "Les registres des marchands étaient fermés puis rouverts sous des sceaux différents. Ceux qui sollicitaient autrefois nos garanties occupaient désormais d’autres salles de réception, où ils parlaient des nouveaux droits de douane et d’un passage plus sûr. L’argent avait semble-t-il trouvé un défenseur plus convaincant."
 ryukyu_rivalry.2.a: "Manigances."
 ryukyu_rivalry.3.t: "Général en visite [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Au')][SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]"
 ryukyu_rivalry.3.d: "Un général, [SCOPE.sCharacter('ryukyu_general_scope').GetFullName], est arrivé [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Au')][SCOPE.sCountry('ryukyu_scope').GetName] avec son cortège d’officiers, manifestement dans le but d’inspecter les défenses côtières. Leur présence a été saluée avec respect, renforçant ainsi l’influence [SCOPE.sCountry('rival_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('rival_scope').GetName] devant la cour tout en affaiblissant la nôtre."
 ryukyu_rivalry.3.f: "Le général marchait le long des remparts, tandis que ses officiers inspectaient chaque canon et chaque tour de guet. Les forces ryukyuanes se mettaient en rang, bien conscientes d’être évaluées. Chaque geste, chaque salut, renforçait les liens invisibles tissés entre les deux puissances."
 ryukyu_rivalry.3.a: "Une escalade dangereuse."
 ryukyu_rivalry_risk_of_confrontation: "@warning! Si les forces [SCOPE.sCountry('china_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('china_scope').GetName] et [SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('japan_scope').GetName] inspectent les défenses côtières, une #r confrontation#! pourra éclater"
 ryukyu_rivalry.4.t: "Général en visite"
 ryukyu_rivalry.4.d: "Un général, [SCOPE.sCharacter('ryukyu_general_scope').GetFullName], est arrivé [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Au')][SCOPE.sCountry('ryukyu_scope').GetName] en provenance [SCOPE.sCountry('from_scope').GetAltNameNoFormatting('De')][SCOPE.sCountry('from_scope').GetName] avec son cortège d’officiers, afin d’inspecter les défenses côtières. Leur présence a été saluée avec respect."
 ryukyu_rivalry.4.f: "$ryukyu_rivalry.3.f$"
 ryukyu_rivalry.4.a: "Gardez-les à l’œil."
 ryukyu_rivalry_officer_arrives: "Un [concept_general|l] [SCOPE.sCountry('from_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('from_scope').GetName] est maintenant disponible"
 ryukyu_rivalry.5.t: "Le destin [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]"
 ryukyu_rivalry.5.d_victor: "Notre travail a porté ses fruits [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Au')][SCOPE.sCountry('ryukyu_scope').GetName]. Grâce à nos efforts diplomatiques, économiques et politiques, leur cour se tourne désormais vers nous pour obtenir des conseils, et la question de leur souveraineté a été résolue en notre faveur."
 ryukyu_rivalry.5.d_loser: "Malgré tous nos efforts, [SCOPE.sCountry('victor_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('victor_scope').GetName] exerce désormais une forte emprise sur [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('ryukyu_scope').GetName]. Leur cour a accepté une nouvelle réalité politique, les îles étant maintenant placées sous l’égide [SCOPE.sCountry('victor_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('victor_scope').GetNameNoFormatting]."
 ryukyu_rivalry.5.d_ryu: "L’équilibre que nous cherchons à maintenir n’est plus durable. Sous la pression croissante [SCOPE.sCountry('victor_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('victor_scope').GetName], notre cour a accepté un nouvel arrangement politique. L’avenir [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('ryukyu_scope').GetName] s’écrira désormais sous leur égide."
 ryukyu_rivalry.5.f_annexed: "On lisait des proclamations sur la place du marché de Naha, l’encre encore fraîche sur les sceaux délivrés à [SCOPE.sCountry('victor_scope').GetCapital.GetName]. Les bannières [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting] avaient été retirées et remplacées par l’étendard des dirigeants. À la tombée de la nuit, le bureau administratif était en place, et les nouveaux édits affichés."
 ryukyu_rivalry.5.f_subject: "On lisait des proclamations sur la place du marché de Naha, l’encre encore fraîche sur les sceaux délivrés à [SCOPE.sCountry('victor_scope').GetCapital.GetNameNoFormatting]. Chaque décret définissait la nouvelle place [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('ryukyu_scope').GetName] au sein du pays. Longtemps tributaire de cours lointaines, le royaume voyait désormais ses magistrats liés à une puissance supérieure par des obligations formelles. À la tombée de la nuit, son destin était scellé."
 ryukyu_rivalry_ryukyu_vassalise_tt: "[SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')|U][SCOPE.sCountry('ryukyu_scope').GetName] devient un État [concept_puppet|l] [SCOPE.sCountry('victor_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('victor_scope').GetName]"
 ryukyu_rivalry_ryukyu_transfer_subject_tt: "[SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')|U][SCOPE.sCountry('ryukyu_scope').GetName] est transféré en tant que [concept_subject|l] [SCOPE.sCountry('victor_scope').GetAltNameNoFormatting('Au')][SCOPE.sCountry('victor_scope').GetName]"
 ryukyu_rivalry_ryukyu_annex_tt: "[SCOPE.sCountry('victor_scope').GetAltNameNoFormatting('Le')|U][SCOPE.sCountry('victor_scope').GetName] annexera [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('ryukyu_scope').GetName]"
 ryukyu_rivalry.5.a: "C’est donc décidé."
 ryukyu_rivalry.6.t: "Affrontements à [SCOPE.sCountry('ryukyu_scope').GetCapital.GetNameNoFormatting]"
 ryukyu_rivalry.6.d_brawl: "Les officiers envoyés par [SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('japan_scope').GetName] et [SCOPE.sCountry('china_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('china_scope').GetName] en sont venus aux mains lors de l’inspection des défenses côtières [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('ryukyu_scope').GetName]. Le conflit a causé un mort, devant le regard inquiet des membres de la cour ryukyuane."
 ryukyu_rivalry.6.d_accident: "Les forces envoyées par [SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('japan_scope').GetName] et [SCOPE.sCountry('china_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('china_scope').GetName] pour inspecter les défenses côtières sont arrivées dans les mêmes fortifications [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('ryukyu_scope').GetName], provoquant la confusion au sein de la garnison, ainsi qu’un bref échange de tirs."
 ryukyu_rivalry.6.d_fire: "Un incendie s’est déclaré dans les logements affectés aux missions d’inspection étrangères qui ont lieu [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Au')][SCOPE.sCountry('ryukyu_scope').GetName], réduisant ainsi les quartiers des contingents [SCOPE.sCountry('japan_scope').GetAltAdjective('MP')|l] et [SCOPE.sCountry('china_scope').GetAltAdjective('MP')|l] en cendres. L’origine de l’incendie reste incertaine, même si les autorités locales affirment qu’il s’agirait d’un mauvais placement des lanternes."
 ryukyu_rivalry.6.f: "L’officier Kaimon parcourait les tours de guet et les entrepôts en lançant ses ordres aux gardes, contradictoires et répétés à un rythme effréné. Malgré le retour au calme, Kaimon avait vu à quel point la rivalité entre les puissances étrangères pouvait mettre en péril le fragile équilibre de Ryūkyū."
 ryukyu_rivalry.6.a: "Les tensions s’intensifient."
 ryukyu_rivalry_ryukyu_confrontation_tt1: "L’[concept_infamy|l] [SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('japan_scope').GetName] et [SCOPE.sCountry('china_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('china_scope').GetName] a augmenté de #v 6#!"
 ryukyu_rivalry.7.t: "Le décret ryukyuan"
 ryukyu_rivalry.7.d_ryukyu: "Après des années d’observation et de subtile diplomatie, notre conseil a fait part de son intention à diriger ses affaires sans ingérence étrangère. La cour a posé des limites strictes concernant l’influence étrangère et entériné la primauté de ses propres rites, ministres, et conseils traditionnels. Le royaume trace désormais sa propre voie."
 ryukyu_rivalry.7.d: "Après des années d’observation et de subtile diplomatie, [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('ryukyu_scope').GetName] a rejeté notre influence et fait part de son intention à diriger ses affaires sans ingérence étrangère. La cour a posé des limites strictes concernant notre présence, conservant ainsi ses rites, ses ministres, et ses conseils traditionnels tandis que le royaume tourne le dos à notre autorité."
 ryukyu_rivalry.7.f: "Des sceaux et des registres avaient été déchirés et éparpillés sur le sol brillant du château de Shuri. Dans les salles d’audience, l’influence des puissances étrangères se faisait encore sentir, même si elle ne dictait plus l’action à mettre en œuvre. La voie de Ryūkyū se dévoilerait peu à peu, sous la forme d’une neutralité fragile acquise grâce à une diplomatie patiente."
 ryukyu_rivalry.7.a: "La question de l’allégeance est réglée."
 ryukyu_rivalry.7.b: "Nous pouvons encore faire usage de la force."
 ryukyu_rivalry.8.t: "Le domaine caché"
 ryukyu_rivalry.8.d: "Maintenant que [SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('Le')][SCOPE.sCountry('japan_scope').GetName] a ouvert ses ports, la question de l’allégeance [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('ryukyu_scope').GetName], longtemps restée en suspens, a refait surface. Le royaume marche sur des œufs depuis des générations. En apparence, il est tributaire [SCOPE.sCountry('china_scope').GetAltNameNoFormatting('Du')][SCOPE.sCountry('china_scope').GetName], bien qu’il ait prêté allégeance [SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('Au')][SCOPE.sCountry('japan_scope').GetNameNoFormatting]. Les deux puissances doivent désormais réfléchir à la façon d’exercer leur influence."
 ryukyu_rivalry.8.f: "Les lanternes scintillaient le long des couloirs du château de Shuri, illuminant les poutres vermillon que les rois de Chūzan avaient fait ériger. Sous les plafonds peints, les employés de bureau déposaient des registres à côté des décrets de Satsuma. La cour était depuis longtemps tiraillée entre l’investiture de l’empire du Milieu et l’ombre de Kagoshima. Le calme régnait pour le moment, mais la question de l’allégeance occuperait bientôt toute la place."
 ryukyu_rivalry.8.a: "La question reste en suspens."
