l_french:
 ## Interest Tier Types
 interest_tier_none: "Aucun"
 interest_tier_none_desc: "À ce niveau, un [concept_country|l] est totalement ou légèrement impliqué dans une [concept_strategic_region|l], ce qui n’a aucun effet sur le pays ou la région stratégique."
 interest_tier_observant: "Concerné"
 interest_tier_observant_desc: "À ce niveau, les premières mesures ont été prises pour établir une présence diplomatique dans la [concept_strategic_region|l]. Il est possible que des navires patrouillent au large des côtes et que des émissaires soient envoyés dans les [Concept('concept_local_country', '$concept_local_countries$')|l]."
 interest_tier_engaged: "Investi"
 interest_tier_engaged_desc: "À ce niveau, un [concept_country|l] commence à s’engager dans les affaires locales en signant des [Concept('concept_treaty', '$concept_treaties$')|l] et en assurant sa présence permanente."
 interest_tier_influential: "Influent"
 interest_tier_influential_desc: "À ce niveau, un [concept_country|l] est constamment présent dans la [concept_strategic_region|l], où il conclut des accords sur le long terme et y revendique ses droits.\n\n@information! L’intérêt des pays dont la [Concept('concept_capital_state', '$concept_capital_state_short$')|l] se trouve dans cette région stratégique ne sera jamais inférieur à ce niveau."
 interest_tier_pervasive: "Omniprésent"
 interest_tier_pervasive_desc: "À ce niveau, un [concept_country|l] exerce un contrôle renforcé sur une [concept_strategic_region|l]. Les [Concept('concept_great_power', '$concept_great_powers$')|l] et les puissances [Concept('concept_local_country', '$concept_local_country_short$es')|l] luttent pour la domination à mesure que le pouvoir se renforce."
 interest_tier_hegemonic: "Hégémonique"
 interest_tier_hegemonic_desc: "À ce niveau, un [concept_country|l] s’est définitivement imposé comme la puissance incontestée dans la [concept_strategic_region|l]. Les autres nations, #italic si elles existent#!, devront se soumettre ou traiter avec le pays hégémonique pour obtenir la garantie qu’il ne s’immiscera pas dans les affaires locales."
 ## Interface
 INTEREST_TIER_TYPE_BOUNDS_DESC: "S’applique entre une [concept_involvement|l] de niveau [InterestTierType.GetLowerBound|v] et [InterestTierType.GetUpperBound|v]"
 INTEREST_TIER_TYPE_NO_EFFECT: "#italic Aucun effet#!"
 INTEREST_TIER_ACTIVE: "#i #b Niveau actuel#!#! pour [Country.GetAltNameNoFormatting('Le')][Country.GetName][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'YOU'))]"
 INTEREST_TIER_ACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#! $INTEREST_TIER_ACTIVE$\n$INTEREST_TIER_BOUNDS_DESC$\n[SelectLocalization(EqualTo_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_CURRENT_INVOLVEMENT_DESC', 'INTEREST_TIER_TARGET_INVOLVEMENT_DESC')]\n$TOOLTIP_DELIMITER$\n$INTEREST_TIER_EFFECTS_AND_BREAKDOWN$"
 INTEREST_TIER_INACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#!\n$INTEREST_TIER_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n#title Effets :#!#indent_newline:3 \n[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)]#!"
 INTEREST_TIER_EFFECTS_AND_BREAKDOWN: "#title Effets :#!#indent_newline:3 [ConcatIfNeitherEmpty('\n', InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', AddLocalizationIf(And(And3(StringIsEmpty(InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetStateModifier.GetDesc)), StringIsEmpty(InterestTierType.GetTradeAdvantageDesc)), 'INTEREST_TIER_NO_EFFECT'))]#!\n\n#title L’[concept_involvement|l] de niveau #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! s’explique par :#!#indent_newline:3 \n[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]#!\n $INTEREST_TIER_ACTIVE$ : #i #b (en cours)#!#!"
 INTEREST_TIER_PREDICTED: "#i #b (Prévu)#!#!"
 INTEREST_TIER_BOUNDS_DESC: "S’applique entre une [concept_involvement|l] de niveau [InterestTierType.GetLowerBound|v0] et [InterestTierType.GetUpperBound|v0]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC: "[concept_involvement] de niveau #v [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! pour [Country.GetAltNameNoFormatting('Le')][Country.GetName]"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC: "[concept_involvement] de niveau [AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetTargetInvolvementIn(StrategicRegion.Self), Country.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP')][AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN')] pour [Country.GetAltNameNoFormatting('Le')][Country.GetName]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Nous avons actuellement une [concept_involvement|l] de niveau [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] #v [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#!"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Nous avons actuellement une [concept_involvement|l] de niveau [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] [AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self), GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT')][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self), GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT')]"
 INTEREST_TIER_TARGET_UP: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/semaine)"
 INTEREST_TIER_TARGET_DOWN: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/semaine)"
 INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/semaine)"
 INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/semaine)"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN_TITLE: "#title L’objectif d’implication de niveau #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! s’explique par :#!"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN: "[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]"
 INTEREST_TIER_EFFECTS_TITLE: "#title Effets :#!"
 INTEREST_TIER_EFFECTS: "[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetDescription)]"
 INTEREST_TIER_NO_EFFECT: "#italic Aucun effet#!"
 INTEREST_TIER_TRADE_ADVANTAGE_EXPORTS_DESC: "$VAL|0=+v$ d’[concept_trade_advantage|l] pour les [Concept('concept_trade','$concept_exports$')|l] dans les marchés locaux"
 INTEREST_TIER_TRADE_ADVANTAGE_IMPORTS_DESC: "$VAL|0=+v$ d’[concept_trade_advantage|l] pour les [Concept('concept_trade','$concept_imports$')|l] dans les marchés locaux"
 INTEREST_TIER_ON_ACTIVATE_EFFECT: "#title En cas d’augmentation :#!"
 INTEREST_TIER_ON_DEACTIVATE_EFFECT: "#title En cas de réduction :#!"
 STRATEGIC_REGION_AI_STANCE_TT_HEADER: "[Country.GetAltNameNoFormatting('Le')|U][Country.GetNameNoFormatting] [Country.GetAltNameNoFormatting('AOnt')] adopté la [Concept('concept_strategic_region_stance', '$concept_strategic_region_stance_short$')|l] #b [Country.GetAIStrategicRegionStanceTypeIn(StrategicRegion.Self).GetNameNoFormatting]#! en [StrategicRegion.GetName] pour les raisons suivantes :\n$TOOLTIP_DELIMITER$"
 ## Effects
 interest_tier_effect_establish_missions_decree: "@checkmark! Autorise le [concept_decree|l] [GetDecreeType('decree_establish_missions').GetName] dans les [Concept('concept_unincorporated_state','$concept_unincorporated_states$')]"
 interest_tier_effect_colonization: "@checkmark! Autorise l’action régionale #yellow;tooltip:[GetPlayer.GetTooltipTag],establish_colony_tooltip $establish_colony$#!"
 interest_tier_effect_stake_colonial_claim: "@checkmark! Autorise l’[concept_diplomatic_action|l] [GetDiplomaticActionType('da_stake_colonial_claim').GetName] sur les [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')|l]"
 interest_tier_effect_colonial_claim_generation: "@checkmark! Générera une [concept_claim|l] quand la colonisation d’une [concept_state_region|l] atteindra [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_colonial_claim_generation_threshold')|v%0]"
 interest_tier_effect_infamy_cost_increase_high: "Coût d’[concept_infamy|l] de [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_high_value')|=n%0] pour les [Concept('concept_war_goal', '$concept_war_goals$')|l] dans cette [concept_strategic_region|l]"
 interest_tier_effect_infamy_cost_increase_medium: "Coût d’[concept_infamy|l] de [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_medium_value')|=n%0] pour les [Concept('concept_war_goal', '$concept_war_goals$')|l] dans cette [concept_strategic_region|l]"
 interest_tier_effect_infamy_cost_decrease_medium: "Coût d’[concept_infamy|l] de [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_decrease_medium_value')|=p%0] pour les [Concept('concept_war_goal', '$concept_war_goals$')|l] dans cette [concept_strategic_region|l]"
 interest_tier_effect_can_start_diplomatic_plays: "@checkmark! Permet d’initier des [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')|l] dans cette [concept_strategic_region|l]"
 interest_tier_effect_can_join_diplomatic_plays: "@checkmark! Permet de choisir un camp lors des [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')|l] dans cette [concept_strategic_region|l]"
 interest_tier_effect_can_sign_alliance: "@checkmark! Permet de signer des [Concept('concept_article', '$concept_treaties$')|l] d’[GetArticleType('alliance').GetName|l]"
 interest_tier_effect_can_sign_defensive_pact: "@checkmark! Permet de signer des [Concept('concept_article', '$concept_treaties$')|l] de [GetArticleType('defensive_pact').GetName|l]"
 interest_tier_effect_can_sign_support_independence: "@checkmark! Permet de signer des [Concept('concept_article', '$concept_treaties$')|l] de [GetArticleType('support_independence').GetName|l]"
 interest_tier_effect_can_sign_guarantee_independence: "@checkmark! Permet de signer des [Concept('concept_article', '$concept_treaties$')|l] de [concept_guarantee_of_independence|l]"
 interest_tier_effect_stake_colonial_claim_unrecognized: "@checkmark! Autorise l’[concept_diplomatic_action|l] [GetDiplomaticActionType('da_stake_colonial_claim').GetName] sur les [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')|l] et les [Concept('concept_unrecognized_power', '$concept_unrecognized_powers$')|l]"
 interest_tier_effect_can_sign_foreign_investment_rights: "@checkmark! Permet de signer des [Concept('concept_article', '$concept_treaties$')|l] de [GetArticleType('foreign_investment_rights').GetName|l]"
 ## Diplomatic Actions
 da_stake_colonial_claim: "Exprimer une revendication coloniale"
 da_stake_colonial_claim_desc: "Exprime une [concept_claim|l] sur une [concept_state_region|l] à l’étranger."
 da_stake_colonial_claim_action_notification_name: "[INITIATOR_COUNTRY.GetAltNameNoFormatting('Le')|U][INITIATOR_COUNTRY.GetName] exprim[INITIATOR_COUNTRY.GetAltNameNoFormatting('EEnt')] une [concept_claim|l] coloniale sur [TARGET_STATE.GetStateRegion.GetName]"
 da_stake_colonial_claim_action_notification_desc: "[INITIATOR_COUNTRY.GetAltNameNoFormatting('Le')|U][INITIATOR_COUNTRY.GetName] a revendiqué [TARGET_STATE.GetStateRegion.GetName] pour nourrir ses ambitions coloniales !"
 DA_STAKE_COLONIAL_CLAIM_COOLDOWN: "Impossible d’entreprendre cette action avant #v [TimeKeeper.GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'da_stake_colonial_claim_cooldown') )]#!"
 DA_STAKE_COLONIAL_CLAIM_EMPTY_EFFECT: "Choisissez une [concept_state_region|l] à [Concept('concept_claim', 'revendiquer')] sur un autre continent que celui de votre [concept_capital_state]"
 ## Notifications
 notification_colonial_claim_generated_name: "[SCOPE.sState('colony_notification_state').GetName] est désormais une #bold colonie majeure#!"
 notification_colonial_claim_generated_desc: "[SCOPE.sState('colony_notification_state').GetName] a suffisamment grandi pour nous accorder une [concept_claim|l] sur l’ensemble de [SCOPE.sState('colony_notification_state').GetStateRegion.GetName]."
 notification_colonial_claim_generated_tooltip: "#header $notification_colonial_claim_generated_name$#!\n$TOOLTIP_DELIMITER$\n$notification_colonial_claim_generated_desc$"
