 SUPPLY_SHIPS_TOOLTIP_NO_FLEETS_REQUIRE: "Aucune flotte ne nécessite de navires de ravitaillement"
 SUPPLY_SHIPS_TOOLTIP_NO_ARMIES_REQUIRE: "Aucune armée ne nécessite de navires de ravitaillement"
 ship_type_frigate: "Frégate"
 ship_type_frigate_desc: "Voilier faiblement armé utilisé pour la reconnaissance, la patrouille et l’escorte."
 ship_type_iron_frigate: "Frégate en fer"
 ship_type_iron_frigate_desc: "Évolution de la frégate avec une coque en fer, ce navire combine les rôles traditionnels d’une frégate avec une résistance et une puissance de feu accrues."
 ship_type_ship_of_the_line: "Navire de ligne"
 ship_type_ship_of_the_line_desc: "Grand navire de guerre conçu pour opérer dans la ligne de bataille. Le navire de ligne possède de nombreux canons répartis sur plusieurs ponts."
 ship_type_monitor: "Monitor"
 ship_type_monitor_desc: "Petit navire blindé conçu pour une utilisation au large des côtes."
 ship_type_coastal_defense_ship: "Navire de défense côtière"
 ship_type_coastal_defense_ship_desc: "Navire lourdement armé et blindé conçu pour une utilisation dans les ports et au large des côtes."
 ship_type_destroyer: "Destroyer"
 ship_type_destroyer_desc: "Navire rapide mais lourdement armé conçu pour les opérations de flotte et d’escorte."
 ship_type_aircraft_carrier: "Porte-avions"
 ship_type_aircraft_carrier_desc: "Navire permettant aux avions de décoller et d’atterrir, le porte-avions est utilisé pour les missions de reconnaissance, ainsi que certaines opérations offensives."
 ship_type_torpedo_boat: "Torpilleur"
 ship_type_torpedo_boat_desc: "Petit navire maniable conçu pour lancer des attaques dévastatrices contre des navires de guerre plus imposants et plus lents."
 ship_type_torpedo_boat_destroyer: "Destructeur de torpilleurs"
 ship_type_torpedo_boat_destroyer_desc: "Navire conçu pour contrer les torpilleurs de plus petite taille, tout en étant capable de lancer des opérations de torpillage."
 ship_type_light_cruiser: "Croiseur léger"
 ship_type_light_cruiser_desc: "Croiseur légèrement blindé conçu pour les patrouilles à longue distance, la protection du commerce et la projection de puissance."
 ship_type_armored_cruiser: "Croiseur cuirassé"
 ship_type_armored_cruiser_desc: "Grand croiseur doté d’une épaisse ceinture blindée, capable de faire face à tous les navires, à l’exception des navires de guerre."
 ship_type_protected_cruiser: "Croiseur protégé"
 ship_type_protected_cruiser_desc: "Croiseur rapide à longue portée, doté d’un pont blindé pour protéger ses parties vitales."
 ship_type_seaplane_tender: "Navire de transport d’hydravions"
 ship_type_seaplane_tender_desc: "Navire conçu pour transporter et lancer des hydravions pour des missions de reconnaissance et des opérations offensives limitées."
 ship_type_early_ironclad: "Premier cuirassé"
 ship_type_early_ironclad_desc: "Puissant navire de haute mer à vapeur, doté d’un blindage en fer."
 ship_type_modern_ironclad: "Cuirassé moderne"
 ship_type_modern_ironclad_desc: "Évolution du cuirassé traditionnel, le cuirassé moderne intègre également"
 ship_type_pre_dreadnought: "Pré-dreadnought"
 ship_type_pre_dreadnought_desc: "Puissant navire de guerre équipé d’une batterie mixte d’artillerie lourde."
 ship_type_dreadnought: "Dreadnought"
 ship_type_dreadnought_desc: "Navire de guerre révolutionnaire conçu à partir d’une batterie uniforme d’artillerie lourde."
 ship_type_super_dreadnought: "Super-dreadnought"
 ship_type_super_dreadnought_desc: "Grand dreadnought doté de canons plus puissants et d’un blindage plus épais."
 ship_type_submarine: "Sous-marin"
 ship_type_submarine_desc: "Navire capable de plonger et principalement utilisé pour lutter contre la marine marchande ennemie."
 ship_type_troop_ship: "Navire de transport de troupes"
 ship_type_troop_ship_desc: "Navire de ravitaillement conçu pour transporter des hommes et du matériel aux quatre coins du globe."
 ship_type_supply_ship: "Navire de ravitaillement"
 ship_type_supply_ship_desc: "Navire transportant des biens militaires d’un endroit à un autre."
 ship_graphics_type_borodino: "Borodino"
 ship_graphics_type_borodino_desc: "Les pré-dreadnoughts de la classe Borodino étaient les nouveaux navires de guerre de la Marine impériale russe au moment de la guerre russo-japonaise. Constituant le noyau de la deuxième escadre du Pacifique de l’amiral Rojestvenski, quatre navires de cette classe furent coulés ou capturés lors de la bataille de Tsushima."
 ship_graphics_type_mikasa: "Mikasa"
 ship_graphics_type_mikasa_desc: "Navire amiral de l’amiral Tōgō lors de la guerre russo-japonaise, le cuirassé pré-dreadnought Mikasa a participé à toutes les grandes batailles navales de la guerre, devenant ainsi un symbole de la suprématie navale du Japon."
 ship_graphics_type_dingyuan: "Dingyuan"
 ship_graphics_type_dingyuan_desc: "Fierté de la flotte de Beiyang, les navires de guerre cuirassés Dingyuan et Zhenyuan étaient les symboles les plus marquants de la modernisation militaire opérée à la fin de la dynastie Qing. Après avoir combattu courageusement lors de la bataille du fleuve Yalu, leurs performances ont été entravées par le manque de financement chronique de la Marine impériale chinoise."
 ship_group_capital_ships: "Navires capitaux"
 ship_group_capital_ships_desc: "Les navires capitaux sont les navires les plus grands et les plus puissants, conçus pour servir sur la ligne de bataille."
 ship_group_cruisers: "Croiseurs"
 ship_group_cruisers_desc: "Les croiseurs sont des navires plus petits et plus légèrement armés, conçus pour les opérations de croisière longue distance."
 ship_group_torpedo_craft: "Repêcheurs de torpilles"
 ship_group_torpedo_craft_desc: "Les repêcheurs de torpilles sont de petits navires maniables dont le principal armement est la torpille autopropulsée."
 ship_group_supply_ships: "Navires de ravitaillement"
 ship_group_supply_ships_desc: "Les navires de ravitaillement sont des navires civils spécialement conçus pour le soutien et le réapprovisionnement des flottes militaires."
