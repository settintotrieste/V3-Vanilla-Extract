l_french:
 DATA_STRAIT_NAME_FORMAT: "#tooltippable_name #tooltip:$TAG$,EMPTY_STRING,StraitTooltip $NAME$#!#!"
 strait_gibraltar: "Détroit de Gibraltar"
 strait_bosporus: "Bosphore"
 strait_oresund: "Öresund"
 strait_malacca: "Détroit de Malacca"
 strait_hormuz: "Détroit d’Ormuz"
 strait_bab_el_mandeb: "Bab-el-Mandeb"
 strait_tsugaru: "Détroit de Tsugaru"
 strait_sunda: "Détroit de la Sonde"
 strait_lombok: "Détroit de Lombok"
 strait_ombai: "Détroit d’Ombai"
 TOOLTIP_TYPE_STRAIT: "[concept_strait]"
 ALLOWED_COUNTRIES_SHORT_CONCEPT: "[Concept('concept_strait_allowed_countries','$concept_strait_allowed_countries_short$')]"
 building_fortification: "Fortifications navales"
 pmg_base_building_fortification: "Exercices de l’équipage"
 pm_fortification: "Exercices habituels de l’équipage"
 TOLL_BUDGET_ENTRY: "#variable $VALUE|D$#!@money! : [STATE.GetName] importe #variable $QTY$#! (#variable $GOODS_PRICE|D$#!@money!, #variable $GOODS_VALUE|D$#!@money! au total) le bien [GOODS.GetName] via le [COUNTRY.GetFlagTextIcon][STRAIT.GetName] avec un droit de douane de #variable $TOLL_RATE|%0$#!"
 TAX_INCOME_TOLLS: "$TAB$#tooltippable #tooltip:[GetPlayer.GetTooltipTag],TOLLS_BREAKDOWN,TariffsTooltip [GetPlayer.PredictTolls|D+=]@money!#!#! de [concept_tolls|l]"
 TOLLS_BREAKDOWN: "#tooltip_header [concept_tolls]#!\nTotal : #v [GetPlayer.PredictTolls|K+=]@money!#!\n$TOOLTIP_DELIMITER$\n[GetPlayer.PredictTollsDesc]"
 STRAIT_ACCESS_PLAYER: "[concept_strait_access] #b [Strait.GetAccessStatusFor(GetPlayer.Self)]#! pour [GetPlayer.GetAltNameNoFormatting('Le')][GetPlayer.GetName] $YOU$"
 STRAIT_TOLLS_PLAYER: "#v [Strait.GetTollsFor(GetPlayer.Self)|D+]#! @money! de [concept_tolls|l] par semaine"
 #Tolls
 TOLL_RATE_REDUNDANT: "Droits de douane actuels"
 TOLL_RATE_HEADER_no_tolls: "Aucune"
 TOLL_RATE_HEADER_low_tolls: "Mineur"
 TOLL_RATE_HEADER_medium_tolls: "Intermédiaire"
 TOLL_RATE_HEADER_high_tolls: "Élevée"
 STRAIT_NO_TOLLS_TOOLTIP: "#header Aucun [Concept('concept_tolls', 'droit de douane')|l]#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasNoTolls(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetControllerTollRateNoTolls( Country.Self )))]\n[SelectLocalization(Strait.StateHasNoTolls(State.Self), 'STRAIT_CURRENT_REVENUE', 'STRAIT_PREDICTED_REVENUE_NO_TOLLS')]"
 STRAIT_LOW_TOLLS_TOOLTIP: "#header [concept_tolls] faibles#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasLowTolls(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetControllerTollRateLowTolls( Country.Self )))]\n[SelectLocalization(Strait.StateHasLowTolls(State.Self), 'STRAIT_CURRENT_REVENUE', 'STRAIT_PREDICTED_REVENUE_LOW')]"
 STRAIT_MEDIUM_TOLLS_TOOLTIP: "#header [concept_tolls] modérés#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasMediumTolls(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetControllerTollRateMediumTolls( Country.Self )))]\n[SelectLocalization(Strait.StateHasMediumTolls(State.Self), 'STRAIT_CURRENT_REVENUE', 'STRAIT_PREDICTED_REVENUE_MEDIUM')]"
 STRAIT_HIGH_TOLLS_TOOLTIP: "#header [concept_tolls] élevés#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasHighTolls(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetControllerTollRateHighTolls( Country.Self )))]\n[SelectLocalization(Strait.StateHasHighTolls(State.Self), 'STRAIT_CURRENT_REVENUE', 'STRAIT_PREDICTED_REVENUE_HIGH')]"
 STRAIT_PREDICTED_REVENUE_NO_TOLLS: "#v [Strait.GetStateTollProfitChangeNoTolls(State.Self)|D+]#! @money! de variation des recettes provenant des droits de douane actuels"
 STRAIT_PREDICTED_REVENUE_LOW: "#v [Strait.GetStatePredictedTollProfitLow(State.Self)|D+]#! @money! de recettes prévues provenant des [Concept('concept_ship', '$concept_ships$')|l] qui traversent le [Strait.GetName|l]\n#v [Strait.GetStateTollProfitChangeLow(State.Self)|D+]#! @money! de variation des recettes provenant des droits de douane actuels"
 STRAIT_PREDICTED_REVENUE_MEDIUM: "#v [Strait.GetStatePredictedTollProfitMedium(State.Self)|D+]#! @money! de recettes prévues provenant des [Concept('concept_ship', '$concept_ships$')|l] qui traversent le [Strait.GetName|l]\n#v [Strait.GetStateTollProfitChangeMedium(State.Self)|D+]#! @money! de variation des recettes provenant des droits de douane actuels"
 STRAIT_PREDICTED_REVENUE_HIGH: "#v [Strait.GetStatePredictedTollProfitHigh(State.Self)|D+]#! @money! de recettes prévues provenant des [Concept('concept_ship', '$concept_ships$')|l] qui traversent le [Strait.GetName|l]\n#v [Strait.GetStateTollProfitChangeHigh(State.Self)|D+]#! @money! de variation des recettes provenant des droits de douane actuels"
 STRAIT_CURRENT_REVENUE: "#v [Strait.GetStateTollRevenue(State.Self)|D+]#! @money! de recettes actuelles"
 STRAIT_TOLL_TOOLTIP: "#header [concept_tolls] du [Strait.GetName|l]#!\n[SelectLocalization(And( State.GetBuilding('building_naval_fortification').IsValid, Country.IsValid ), 'STRAIT_TOLL_TOOLTIP_ACTIVE', 'STRAIT_TOLL_TOOLTIP_INACTIVE')]"
 STRAIT_TOLL_TOOLTIP_ACTIVE: "#b [Strait.GetStateTollStatus(State.Self)]#! [Strait.GetStateTollTextIcon(State.Self)] ([SelectLocalization(Country.IsLocalPlayer, 'POSITIVE_TOLL', 'NEGATIVE_TOLL')]) de droits de douane collectés par [Country.GetAltNameNoFormatting('Le')][Country.GetName]"
 STRAIT_TOLL_TOOLTIP_INACTIVE: "Aucun droit de douane n’est collecté par [Country.GetAltNameNoFormatting('Le')][Country.GetName] qui ne possède pas de [GetBuildingType('building_naval_fortification').GetName|l]"
 POSITIVE_TOLL: "#v [Strait.GetStateTollProfit(State.Self)|D=+]#!@money! "
 NEGATIVE_TOLL: "#v [Strait.GetStateTollProfit(State.Self)|D=-]#!@money! "
 #Strait Access
 STRAIT_ACCESS_STATUS_open: "Ouvert"
 STRAIT_ACCESS_STATUS_no_military: "Interdit à l’armée"
 STRAIT_ACCESS_STATUS_closed: "Fermé"
 STRAIT_ALLOWED_COUNTRIES_STATUS_all: "Tous"
 STRAIT_ALLOWED_COUNTRIES_STATUS_no_enemies: "Interdit aux ennemis"
 STRAIT_ALLOWED_COUNTRIES_STATUS_only_allies: "Uniquement les alliés"
 STRAIT_ALLOWED_COUNTRIES_STATUS_only_controller: "Uniquement le responsable"
 STRAIT_ACCESS_TOOLTIP: "#header [Concept('concept_strait_access', 'Accès')] au [Strait.GetName|l]#!\n[SelectLocalization( And( State.GetBuilding('building_naval_fortification').IsValid, Country.IsValid ), 'STRAIT_ACCESS_TOOLTIP_ACTIVE', 'STRAIT_ACCESS_TOOLTIP_INACTIVE')]"
 STRAIT_ACCESS_TOOLTIP_ACTIVE: "Accès au détroit #b [Strait.GetStateStraitAccessStatus(State.Self)]#! [Strait.GetStateStraitAccessTextIcon(State.Self)] défini par [Country.GetAltNameNoFormatting('Le')][Country.GetName]\n$TOOLTIP_DELIMITER$\n#title Effets :#! #indent_newline:3 \n[Strait.GetStateStraitAccessStatusDesc(State.Self)]#![ConcatIfNeitherEmpty('\n\n', AddLocalizationIf(Strait.StateStraitAccessIsOverruled(State.Self), 'STRAIT_ACCESS_OVERRIDDEN'))]"
 STRAIT_ACCESS_OVERRIDDEN: "@warning! Ces conditions d’accès au détroit sont annulées par le statut #b [Strait.GetActiveStraitAccessStatus]#! défini par [Strait.GetOtherController(State.Self).GetAltNameNoFormatting('Le')][Strait.GetOtherController(State.Self).GetName]"
 STRAIT_ACCESS_TOOLTIP_INACTIVE: "Aucune restriction d’accès au détroit n’est appliquée par [Country.GetAltNameNoFormatting('Le')][Country.GetName] qui ne possède pas de [GetBuildingType('building_naval_fortification').GetName|l]"
 STRAIT_ACCESS_OPEN_TOOLTIP: "#header Ouvert#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAccessOpen(State.Self), 'CURRENT_ACCESS'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAccessOpen( State.Self )))]\nTous les [Concept('concept_ship', '$concept_ships$')|l] peuvent traverser le [Strait.GetName|l]"
 STRAIT_ACCESS_NO_MILITARY_TOOLTIP: "#header Interdit à l’armée#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAccessNoMilitary(State.Self), 'CURRENT_ACCESS'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAccessNoMilitary( State.Self )))]\nAucun [concept_ship|l] militaire ne peut traverser le [Strait.GetName|l], à l’exception des navires appartenant aux [concept_strait_allowed_countries|l]"
 STRAIT_ACCESS_CLOSED_TOOLTIP: "#header Fermé#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAccessClosed(State.Self), 'CURRENT_ACCESS'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAccessClosed( State.Self )))]\nAucun [concept_ship|l] ne peut traverser le [Strait.GetName|l], à l’exception des navires appartenant aux [concept_strait_allowed_countries|l]"
 CURRENT_ACCESS: "#i #b ($concept_strait_access_short$ actuel)#!#!"
 #Strait Allowed Countries
 STRAIT_ALLOWED_COUNTRIES_TOOLTIP: "#header [concept_strait_allowed_countries] dans le [Strait.GetName|l]#!\n[SelectLocalization( And( State.GetBuilding('building_naval_fortification').IsValid, Country.IsValid ), 'STRAIT_ALLOWED_COUNTRIES_ACTIVE', 'STRAIT_ALLOWED_COUNTRIES_INACTIVE')]"
 STRAIT_ALLOWED_COUNTRIES_ACTIVE: "#b [Strait.GetStateAllowedCountriesStatus(State.Self)]#! [Strait.GetStateAllowedCountriesTextIcon(State.Self)] autorisés par [Country.GetAltNameNoFormatting('Le')][Country.GetName]\n$TOOLTIP_DELIMITER$\n#title Effets :#! #indent_newline:3 \n[Strait.GetStateAllowedCountriesStatusDesc(State.Self)]#!"
 STRAIT_ALLOWED_COUNTRIES_INACTIVE: "Aucune restriction n’est appliquée par [Country.GetAltNameNoFormatting('Le')][Country.GetName] qui ne possède pas de [GetBuildingType('building_naval_fortification').GetName|l]"
 STRAIT_NO_ENEMIES_TOOLTIP: "#header Interdit aux ennemis#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAllowedCountriesNoEnemies(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAllowedCountriesNoEnemies( State.Self )))]\nL’[concept_strait_access|l] actuel (#b [Strait.GetStateStraitAccessStatus(State.Self)]#!) ne s’appliquera qu’aux [Concept('concept_ship', '$concept_ships$')|l] des ennemis [Country.GetAltNameNoFormatting('Du')][Country.GetName]"
 STRAIT_ONLY_ALLIES_TOOLTIP: "#header Uniquement les alliés#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAllowedCountriesOnlyAllies(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAllowedCountriesOnlyAllies( State.Self )))]\nSeuls les alliés [Country.GetAltNameNoFormatting('Du')][Country.GetName] ne sont pas concernés par les restrictions actuelles d’[concept_strait_access|l] (#b [Strait.GetStateStraitAccessStatus(State.Self)]#!), le cas échéant"
 STRAIT_ONLY_CONTROLLER_TOOLTIP: "#header Uniquement le [Concept('concept_strait_control', '$concept_strait_controller$')|l]#![ConcatIfNeitherEmpty(' ', AddLocalizationIf(Strait.StateHasAllowedCountriesOnlyController(State.Self), 'TAX_OR_EXPENSE_LEVEL_CURRENT'))][ConcatIfNeitherEmpty('\n', GetDesc( Strait.SetStateAllowedCountriesOnlyController( State.Self )))]\nSeuls [Country.GetAltNameNoFormatting('Le')][Country.GetName] et ses [Concept('concept_subject', '$concept_subjects$')|l] ne sont pas concernés par les restrictions actuelles d’[concept_strait_access|l] (#b [Strait.GetStateStraitAccessStatus(State.Self)]#!), le cas échéant"
 STRAIT_NO_CONTROL: "Ayez au moins #v 1#! [Concept('concept_building_level', '$concept_building_level_short$')|l] de [GetBuildingType('building_naval_fortification').GetName|l]"
 STRAIT_TOTAL_BLOCK_REQUIRES_FULL_CONTROL: "Nécessite de [Concept('concept_strait_control', 'contrôler')] le [concept_strait|l] de part et d’autre"
 STRAIT_MILITARY_BLOCK_REQUIRES_FULL_CONTROL: "$STRAIT_TOTAL_BLOCK_REQUIRES_FULL_CONTROL$"
 STRAIT_ACCESS_SETTING_REDUNDANT: "Conditions d’[concept_strait_access|l] actuelles"
 STRAIT_ACCESS_SETTING_NOT_ALLOWED: "Ces conditions d’accès ne sont pas autorisées"
 TOLL_RATE_NOT_ALLOWED: "Ces droits de douane ne sont pas autorisés"
 STRAIT_STATES_HEADER: "$concept_states$ reliés par ce détroit"
 NO_NAVAL_FORTIFICATION_TOOLTIP: "[Country.GetAltNameNoFormatting('Le')|U][Country.GetName] n’[Country.GetAltNameNoFormatting('AOnt')] pas encore construit de [GetBuildingType('building_naval_fortification').GetName|l] en [State.GetName] et n’exerc[Country.GetAltNameNoFormatting('EEnt')] aucun contrôle sur le [Strait.GetName|l]"
 #Effects
 STRAIT_ACCESS_OPEN: "Tous les [Concept('concept_ship', '$concept_ships$')|l] peuvent traverser le [Strait.GetName|l]"
 STRAIT_ACCESS_NO_MILITARY_NO_ENEMIES: "Aucun [concept_ship|l] militaire appartenant aux #r ennemis#! [Country.GetAltNameNoFormatting('Du')][Country.GetName] ne peut traverser le [Strait.GetName|l]"
 STRAIT_ACCESS_NO_MILITARY_ALLIES: "Seuls les [Concept('concept_ship', '$concept_ships$')|l] militaires appartenant aux #g alliés#! [Country.GetAltNameNoFormatting('Du')][Country.GetName] peuvent traverser le [Strait.GetName|l]"
 STRAIT_ACCESS_NO_MILITARY_ONLY_CONTROLLER: "Seuls les [Concept('concept_ship', '$concept_ships$')|l] militaires [Country.GetAltNameNoFormatting('Du')][Country.GetName] et de ses [Concept('concept_subject', '$concept_subjects$')|l] peuvent traverser le [Strait.GetName|l]"
 STRAIT_ACCESS_CLOSED_NO_ENEMIES: "Aucun [concept_ship|l] appartenant aux #r ennemis#! [Country.GetAltNameNoFormatting('Du')][Country.GetName] ne peut traverser le [Strait.GetName|l]"
 STRAIT_ACCESS_CLOSED_ALLIES: "Seuls les [Concept('concept_ship', '$concept_ships$')|l] appartenant aux #g alliés#! [Country.GetAltNameNoFormatting('Du')][Country.GetName] peuvent traverser le [Strait.GetName|l]"
 STRAIT_ACCESS_CLOSED_ONLY_CONTROLLER: "Seuls les [Concept('concept_ship', '$concept_ships$')|l] [Country.GetAltNameNoFormatting('Du')][Country.GetName] et de ses [Concept('concept_subject','$concept_subjects$')|l] peuvent traverser le [Strait.GetName|l]"
 #Trade
 STRAIT_TRADE_HEADER: "[concept_trade] via ce [concept_strait|l]"
 STRAIT_NO_TRADE: "Aucun [concept_trade|l]"
 STRAIT_TRADE_TOOLTIP: "[StraitPanel.GetTradeBreakdown(Goods.Self)]"
 STRAIT_TRADE_BREAKDOWN: "#header [concept_trade] [GOODS.GetCustom('FR_Goods_De')][GOODS.GetName|l] via le $STRAIT_NAME$#!\nCommerce total : $TOTAL|v0D$\n$DETAILS$"
 STRAIT_TRADE_BREAKDOWN_ENTRY: "$AMOUNT|v0D$ échangés avec [STATE.GetName] [STATE.GetOwner.GetFlagTextIcon]"
