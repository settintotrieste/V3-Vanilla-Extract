l_german:
 japan_events.1.t: "Briefe für alle"
 japan_events.1.d: "Mit dem wachsenden Einfluss moderner Denker [ROOT.GetCountry.GetAltName('IN')] wurden die Grenzen des alten Kuriersystems zunehmend offenkundiger. Sei es nun durch die Abschaffung der Feudalordnung oder die immer höhere Alphabetisierungsrate innerhalb der Bevölkerung: Inzwischen existieren die Bedingungen für ein zentralisiertes Postwesen, das in der Lage ist, einen modernen Staat zu unterstützen."
 japan_events.1.f: "Boten, die das Siegel der Regierung zierte, rannten durch die Straßen, ihre Taschen schwer von ungewöhnlich vielen Briefen. Im Hauptsitz beugten sich Beamte über Karten, passten Routen an und zählten die ganze Nacht unzählige Briefmarken. Kaufleute murrten ob der Störungen alter Kuriernetze, während neugierige Kinder ihre ersten Briefe in einen Briefkasten steckten. Das Land, das einst durch alte Gepflogenheiten gespalten war, begann, mit einer Stimme zu sprechen."
 japan_events.1.a: "Finanziert eine volle Umsetzung für die gesamte Nation."
 japan_events.1.b: "Konzentrieren wir uns auf die größeren Stadtzentren."
 japan_events.1.c: "Ländliche Gebiete haben Vorrang."
 japan_events.1.e: "Betraut [SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')] mit der Reform."
 japan_events.1.g: "Bewahren wir das alte Kuriersystem."
