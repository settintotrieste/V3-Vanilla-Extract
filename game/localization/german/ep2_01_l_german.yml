 japan_events.3.t: "Ein neu gezähltes Jahr"
 japan_events.3.d: "Die Einführung des neuen Kalenders hat das Jahr stillschweigend verkürzt. Durch die geringere Anzahl an Tagen entsprechen Löhne, Mieten und Steuern nicht mehr den Erwartungen, die unter dem alten System entstanden. Arbeitnehmer stellen fest, dass ihr Gehalt gesunken ist, und Beamte haben Mühe, die Diskrepanz zu erklären."
 japan_events.3.f: "Die Arbeiter zählten immer wieder ihre Münzen und schüttelten missgelaunt den Kopf. Ihre Hände waren von der Arbeit rau, und doch wurden sie kaum entlohnt. Das Jahr war kürzer geworden, und jeder verlorene Tag hinterließ seine Spuren in Form müder Arme und leerer Taschen."
 japan_events.3.a: "Das Jahr ist kürzer. So sei es."
 japan_events.3.b: "Verteilen wir die Last über die Bevölkerung."
 japan_events.3.c: "Schlucken wir um der Stabilität willen den Verlust."
