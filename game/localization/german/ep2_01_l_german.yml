 ## The Hidden Domain JE
 je_ryukyu_rivalry: "Die verborgene Domäne"
 je_ryukyu_rivalry_reason: "Seit der #b Invasion im Jahr 1609#! durch Truppen der #b Satsuma-Domäne#! besteht das Königreich [SCOPE.sCountry('ryukyu_scope').GetAltName('NOM')] als Domäne von [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetAltName('DAT'), 'JAP')] nur noch dem Namen nach. Trotz der Unterwerfung durch die Satsuma empfängt der Hof in Shuri weiterhin eine Belehnung aus [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetAltName('DAT'), 'CHI')] und entsendet Tributmissionen nach Beijing, wodurch man den Anschein von Unabhängigkeit aufrechterhält.\n\nDieses Arrangement hat seit Generationen Bestand: Doch mit der Öffnung Japans verschiebt sich das Machtgleichgewicht in Ostasien. Beide Kaiserreiche streben nun danach, ihre Beziehung zu Ryukyu zu klären, was einen offenen Wettstreit um die südlichen Inseln lostritt.\n$TOOLTIP_DELIMITER$\n@warning! #r Scheitern:#!\n: Erreicht die Durchsetzungskraft [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFlag('VON')] #variable 100 %#!\n[SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetAltNameNoFlag('NOM'), 'JAP')|U] oder [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetAltNameNoFlag('NOM'), 'CHI')|U] werden [Concept('concept_subject','unterworfen')] oder #b annektiert#!\n[SCOPE.sCountry('ryukyu_scope').GetAltNameNoFlag('NOM')|U] wird durch nicht beteiligtes Land [Concept('concept_subject','unterworfen')] oder #b annektiert#!\n\n@information! Zum Beeinflussen:\n Hat einen #v Geldübereignungs#!-[concept_article] (#g @money!0,1-2K#!) mit [SCOPE.sCountry('ryukyu_scope').GetAltName('DAT')]\n Hat #v freundliche#! oder #v einvernehmliche#! [concept_relations] zu [SCOPE.sCountry('ryukyu_scope').GetAltName('DAT')]\n Hat die größte [concept_naval_power_projection]\n [SCOPE.sCountry('ryukyu_scope').GetAltName('NOM')] schuldet eine [concept_obligation]\n Nutzung der [Concept('concept_journal_entry', 'Journaleintrags')]-Aktionen"
 #je_ryukyu_rivalry_goal:1 "You are asserting more influence over [SCOPE.sCountry('ryukyu_scope').GetName] than your rival."
 je_ryukyu_rivalry_victory_japan: "Um einen #b japanischen#! Sieg zu erzielen:\n"
 je_ryukyu_rivalry_victory_china: "Um einen #b chinesischen#! Sieg zu erzielen:\n"
 je_ryukyu_rivalry_victory_ryukyu: "Um einen #b ryukyischen#! Sieg zu erzielen:\n"
 ryukyu_rivalry_sway_tt: "Die vollständige Beeinflussung von Ryukyu für eine Seite beseitigt den möglichen Einfluss aller Gegner, sodass eine [Concept('concept_subject','Unterwerfung')] wieder möglich wird.\n\nZum Beeinflussen:\n Einen #v Geldübereignungs#!-[concept_article] (#g @money!0,1-2K#!) mit Ryukyu haben\n #v Freundliche#! oder #v einvernehmliche#! [concept_relations] zu Ryukyu haben\n Die höchste [concept_naval_power_projection] haben\n Ryukyu schuldet eine [concept_obligation]\n Nutzung der [Concept('concept_journal_entry', 'Journaleintrags')]-Aktionen"
 ryukyu_rivalry_assertiveness_tt: "Ryukyu setzt die eigene Neutralität durch, wenn die Leiste #v 100 %#! erreicht. Sobald sie durchgesetzt wurde, kann es für #v 50#! Jahre durch eine [concept_diplomatic_action] zum [concept_subject] gemacht werden.\n\nDie Durchsetzungskraft-Leiste erhöht sich um monatlich um #g 0,5#!, wenn die Beeinflussungsleiste zwischen #v -20#! und #v +20#! liegt.\n\nRyukyu kann die eigene Neutralität durchsetzen, indem es Japan und China gegeneinander ausspielt und verfügbare Aktionen einsetzt, die die Beeinflussung verändern.\n\nBeispiel:\n Einen #v Geldübereignungs#!-[concept_article] (#g @money!0,1-2K#!) mit beiden oder keiner Seite\n #v Freundliche#! oder #v einvernehmliche#! [concept_relations] zu beiden oder keiner Seite\n Beider oder keiner Seite eine [concept_obligation] schulden\n Das Unterzeichnen der zuvor genannten Verträge mit einer Seite bzw. deren Bruch, falls eine Seite die Oberhand hat bzw. unterlegen ist"
 ryukyu_rivalry_completion_japan_victory_tt: "[SCOPE.sCountry('ryukyu_scope').GetAltName('NOM')|U] wird mit [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetAltName('DAT'), 'JAP')] [Concept('concept_unification', 'vereinigt')]"
