 japan_events.2.t: "Die abweichenden Kalender"
 japan_events.2.d: "Japans jahrhundertealter Lunisolarkalender weicht mehr und mehr vom Kalender der westlichen Welt ab. Kaufleute beschweren sich über Schwierigkeiten bei der Abstimmung mit ihren fremdländischen Partnern, während die Bevölkerung sich über verschobene Feste, Mietzahlungen und Steuertermine verwirrt zeigt."
 japan_events.2.f: "Die Schreiber hingen über ihren Büchern und kopierten akribisch jede Zeile. Die Papierstapel wuchsen mit jeder Wiederholung höher, und die Augen der Schreiber schmerzten, weil Monate nachverfolgt werden mussten, die es nicht mehr gab. Der alte Kalender verschwand allmählich."
 japan_events.2.f_telegraph: "Boten eilten durch die Straßen und überbrachten eine Nachricht nach der anderen. Die Menschen blieben stehen, um jede einzelne Nachricht zu lesen. Ihnen schwirrte der Kopf, als sich die Daten so schnell änderten, dass sie kaum noch folgen konnten. Neuigkeiten verbreiteten sich blitzschnell, und der alte Kalender verschwand fast über Nacht."
 japan_events.2.a: "Fahrt unverzüglich mit einer Kalenderreform fort."
 japan_events.2.b: "Nutzen wir die Erfindung namens [GetTechnology('electric_telegraph').GetName], um den Wandel zu beschleunigen."
 japan_events.2.c: "Bewahren wir vorerst das alte System."
