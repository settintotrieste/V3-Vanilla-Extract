 japan_events.4.t: "Verwestlichung der Namen"
 japan_events.4.d: "Während [ROOT.GetCountry.GetAltName('NOM')] Diplomatie und Handel mit fremden Mächten betreibt, stellt sich die Frage, wie [GetCulture('japanese').GetName|l]e Namen in Verträgen, im Schriftverkehr und in offiziellen Dokumenten geschrieben werden sollen. Vertreter des Westens erwarten, dass Namen ihren eigenen Gepflogenheiten entsprechen und vor allem, dass der Vorname vor dem Nachnamen steht."
 japan_events.4.f: "Die Schreiber beugten sich über ihre Tische, und ihre Federn schrieben kratzend Briefe an fremdländische Beamte. Sie tuschelten untereinander und diskutierten, ob die Verständlichkeit im Ausland eine Änderung der althergebrachten Tradition rechtfertigte. Eine Hand mit einem Siegel verweilte einen Augenblick über einer Unterschrift, bevor die Tinte trocken war."
 japan_events.4.a: "Nehmen wir westliche Gepflogenheiten im Schriftverkehr mit dem Ausland an."
 japan_events.4.b: "Erhalten wir die traditionelle Namensreihenfolge."
 japan_events.4.c: "Dies ist eine neue Ära: Übernehmt in allen Fällen westliche Konventionen."
 japan_single_fire_events_name_order_westernized_mod: "Verwestlichte Namensreihenfolge"
 japan_single_fire_events_name_order_traditional_mod: "Erhaltene traditionelle Namensreihenfolge"
 japan_single_fire_events_name_order_resistance_mod: "Streit um Namenskultur"
 japan_single_fire_events_name_order_approval_mod: "Verwaltungsklärung"
 japan_events.5.t: "Die Frage des Kanbun"
 japan_events.5.d: "Erlasse, Regulierungen und Register beruhen schon lange auf der klassischen Sprache, die nur wenige Gebildete verstehen. Reformer setzen sich nun dafür ein, dass die Verwaltung auch umgangssprachliches Japanisch verwenden solte, um klarer und effizienter zu werden. Andere hingegen bestehen darauf, dass die Tradition selbst dem geschriebenen Wort bereits Autorität verleiht."
 japan_events.5.f: "Die Bürokraten arbeiteten bis spät in die Nacht, um unermüdlich und in stiller Entschlossenheit Direktiven umzuschreiben. Einer rieb sich die Augen, fuhr dann jedoch fort, darauf bedacht, keine einzige Markierung zu vergessen. Jedes Kratzen seiner Feder fühlte sich wie eine Schlacht gegen Verwirrung und Unordnung an."
 japan_events.5.a: "Fördern wir umgangssprachliches Japanisch in der offiziellen Verwaltung."
 japan_events.5.b: "Erlauben wir begrenzte Reformen bei der internen Korrespondenz."
 japan_events.5.c: "Erhalten wir klassisches Kanbun in allen staatlichen Dokumenten."
 japan_language_partial_language_reform_mod: "Begrenzte Verwaltungssprachreformen"
 japan_single_fire_events_language_reform_support_mod: "Festhalten an umgangssprachlicher Verwaltung"
