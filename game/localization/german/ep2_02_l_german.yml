l_german:
 edo_system: "Edo-Statussystem"
 # Edo Social Classes
 strata_samurai_high: "Hoch-Samurai" # High-Class Samurai
 strata_samurai_high_desc: "Die hochrangige Kriegerelite wie Daimyō und ihre höheren Gefolgsleute bilden die Oberschicht der Samurai-Klasse, die ein Monopol auf die meisten wichtigen Ämter sowie beträchtliches ererbtes Prestige besitzt."
 strata_samurai_low: "Nieder-Samurai" # Low-Class Samurai
 strata_samurai_low_desc: "Niederrangige Krieger und Gefolgsleute wie Gokenin und Ashigaru, die als Verwaltungs- und Militärbeschäftigte unter der höheren Samurai-Elite dienen."
 strata_religious: "Jisha" # Priests
 strata_religious_desc: "Der Schreinklerus ist durch Tempelinstitutionen organisiert und durch die Obrigkeit reguliert. Obwohl er einflussreich im örtlichen Leben, in der Bildung und bei religiösen Ritualen ist, steht er dennoch in gewisser Weise außerhalb der gesetzlich festgelegten Statusklassen."
 strata_commoners_peasants: "Hyakushō" # Peasants
 strata_commoners_peasants_desc: "Als Unterteilung der Gemeinenklasse sind die Bauern die zahlenstärkste Gesellschaftsschicht Japans. Mitglieder der Bauernklasse werden in den Dörfern registiert und an örtliche Verpflichtungen und Steuern gebunden. Ihre Registrierung – und nicht ihr Beruf – bestimmen über die Zugehörigkeit, sodass auch man ländliche Handwerker und Händler zu den Bauern zählt."
 strata_commoners_townspeople: "Chōnin" # Townspeople
 strata_commoners_townspeople_desc: "Als Unterteilung der Gemeinenklasse sind die Stadtbewohner die Hauptbewohner der urbanen Zentren Japans. Mitglieder der Stadtbewohnerklasse werden durch städtische Institutionen registriert und üblicherweise Handwerk und Handel zugeordnet. Sie können zwar beträchtlichen Reichtum und Einfluss anhäufen, doch da sie keinen Status als Krieger besitzen, ist ihr gesellschaftlicher Aufstieg stark eingeschränkt."
 strata_outcastes: "Eta-Hinin" # Outcastes Eta, Hinin, etc.
 strata_outcastes_desc: "Die Eta und Hinin bilden die niedrigste Schicht der japanischen Gesellschaft. Sie werden stark diskriminiert und mit „unreinen“ Berufen wie Totengräber, Bettler und Straßenkünstler in Verbindung gebracht."
 # Edo Social System Laws
 lawgroup_edo_social_system: "Edo-Statussystem"
 lawgroup_edo_social_system_desc: "Durchsetzung des $lawgroup_edo_social_system$s"
 law_strict_edo_system: "Rigide Rangordnung"
 law_strict_edo_system_desc: "Angefangen bei rechtlichen und beruflichen Möglichkeiten bis hin zur Zahl der Tore zum eigenen Wohnsitz, die einem der eigene Rang und Status erlauben, wird alles vom Staat geregelt und durchgesetzt. Jeder Verstoß gegen dieses Protokoll wird schwer sanktioniert. Stadtbewohner und Bauern haben zudem keine Möglichkeit, formell den Reihen der Samurai beizutreten."
 law_intermediate_edo_system: "Gelockerte Rangordnung"
 law_intermediate_edo_system_desc: "Gelockerte Gesetze in Sachen Rechte und Luxus erlauben Gemeinen den Besitz von mehr Einfluss und Status innerhalb der Gesellschaft. Reiche Stadtbewohner und Bauern können zu Gokenin – niederrangigen Samurai – werden, indem sie sich den Rang erkaufen."
 law_lax_edo_system: "Lockere Rangordnung"
 law_lax_edo_system_desc: "Ämter und Rollen, die zuvor den Samurai vorbehalten waren, werden nun für Gemeine geöffnet. Die verbleibenden Luxus- und Berufsbeschränkungen werden nur noch teilweise umgesetzt, meist wenn es um schwerste Verstöße geht."
 # Tenpo Crisis
 je_tenpo_crisis: "Tenpō-Krise"
 je_tenpo_crisis_reason: "Die 1830 ausgerufene Tenpō-Ära („Himmlischer Schutz“) machte ihrem glücksverheißenden Namen anfangs alle Ehre. Doch schlechtes Wetter auf [GetGeographicRegion('geographic_region_honshu').GetName] führte bald zu rasant steigenden Reispreisen und einer landesweiten Hungersnot, während der wachsende Reichtum und Einfluss der IG „[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]“ drohte, die herrschende [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]-Ordnung zu destabilisieren.\n\nUnterdies wurden die westlichen [Concept('concept_great_power','$concept_great_powers$')] zunehmend übermütiger und schickten ihre Handelsschiffe und Kanonenboote immer dichter an unsere Küsten.\n\nIm Bemühen, diese Probleme zu bewältigen, stellten reformorientierte Würdenträger dem Bakufu ihre Visionen vor.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b Reformer-Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] – [ROOT.GetCountry.GetAltNameNoFlag('NOM')|U] hat [GetLawType('law_lax_edo_system').GetName] verabschiedet\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] – [ROOT.GetCountry.GetNameAltNoFlag('NOM')|U] hat #b nicht#! [GetLawType('law_hereditary_bureaucrats').GetName] verabschiedet\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] – [ROOT.GetCountry.GetAltNameNoFlag('NOM')|U] hat #v 3#! [Concept('concept_state', '$concept_states$')] mit [GetBuildingType('building_urban_center').GetName] der Stufe #v 3#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')] – Der [Concept('concept_clout', 'Politische Druck')] der [concept_interest_group] „[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]“ ist #v 10#! oder mehr\n#tooltippable;tooltip:tenpo_hardliner_tt #b Hardliner-Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] – [ROOT.GetCountry.GetAltNameNoFlag('NOM')|U] hat [GetLawType('law_strict_edo_system').GetName] beschlossen\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] – [ROOT.GetCountry.GetAltNameNoFlag('NOM')|U] hat [GetLawType('law_shinsengumi').GetName] beschlossen\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] – [ROOT.GetCountry.GetAltNameNoFlag('NOM')|U] hat #v 40#! Stufen [GetBuildingType('building_rice_farm').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')] – Die [concept_interest_group] „[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]“ ist [concept_marginalized|l]\n#tooltippable;tooltip:tenpo_shared_tt #b Gemeinsame Agenda#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] – #b Kein#! [GetCulture('japanese').GetName|l]er [concept_homeland]-[concept_state] im Besitz leidet unter einer [concept_famine]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] – [ROOT.GetCountry.GetAltNameNoFlag('NOM')|U] hat ein [Concept('concept_gdp', '$concept_gdp_short$')] von @gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! oder mehr\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] – [ROOT.GetCountry.GetAdjectiveNoFlag|U]e Armee-[concept_power_projection] von mehr als #v 500#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] – Wir haben #v 10#! oder mehr Stufen [GetBuildingType('building_naval_fortification').GetName] in [Concept('concept_state', '$concept_states$')] in Besitz"
 je_tenpo_crisis_complete_header: "Wird mit einer erfolgreichen Tenpō-Reform enden, falls:\n"
 je_tenpo_crisis_failure_header: "Wird mit einer gescheiterten Tenpō-Reform enden, falls:\n"
 je_tenpo_crisis_success_tt: "Wir haben mindestens #v 8#! Agenda-Ziele abgeschlossen"
 je_tenpo_crisis_success_2_tt: "Abhängig von der Zahl der abgeschlossenen #tooltippable;tooltip:tenpo_shared_tt #b Geteilten#!#!, #tooltippable;tooltip:tenpo_reformer_tt #b Reformer-#!#! oder #tooltippable;tooltip:tenpo_hardliner_tt #b Hardliner-#!#!Ziele ändert sich die Belohnung."
 je_tenpo_crisis_success_outcome_tt: "Abhängig von der Zahl der abgeschlossenen #b Geteilten#!, #b Reformer-#! oder #b Hardliner-#!Ziele ändert sich die Belohnung."
 je_tenpo_crisis_success_outcome_1_tt: "Falls wir mehr #b Hardliner#!-Agenden abschließen:"
 je_tenpo_crisis_success_outcome_2_tt: "Falls wir mehr #b Reformer#!-Agenden abschließen:"
 je_tenpo_crisis_success_outcome_3_tt: "Falls wir gleich viele #b Hardliner#!- und #b Reformer#!-Agenden abschließen:"
 modifier_tenpo_crisis_reward_hardliner: "Rückkehr zur Ordnung"
 modifier_tenpo_crisis_reward_reformer: "Bewahrung des Neuen"
 modifier_tenpo_crisis_reward_balanced: "Maßvolle Reformen"
 modifier_rice_hoarding: "Verbreitetes Reishorten"
 tenpo_hardliner_tt: "Die #b Hardliner-Fraktion#! glaubt, dass die japanische Gesellschaft moralisch verfällt und dass dies nur durch eine Rückkehr zur Tradition aufzuhalten ist.\n\nSie glaubt an die Einführung strengerer Luxussteuern und daran, dass die Samurai den Überfluss der Städte meiden und zu ihrer idealisierten Rolle als ländliche Verwalter mit einem kargen Leben zurückkehren sollten."
 tenpo_reformer_tt: "Die #b Reformer-Fraktion#! glaubt, dass die japanische Gesellschaft sich unumkehrbar verändert hat und daher die Gesetze des Landes auf dessen tatsächlichem Zustand und nicht den Idealen einer romantisierten Vergangenheit beruhen sollten.\n\nSie glaubt zudem daran, die japanischen Gemeinen politisch zu ermächtigen und die Wirtschaft zu fördern."
 tenpo_shared_tt: "Sowohl die #b Hardliner-#! als auch die #b Reformer-#!Fraktionen glauben, dass es entscheidend ist, Japan vor äußeren Bedrohungen zu schützen und dass die sichere Nahrungsversorgung und die Wirtschaftsförderung gewährleistet sein müssen."
 button_je_tenpo_combat_rice_hoarding: "Reishorten bekämpfen"
 button_je_tenpo_combat_rice_hoarding_desc: "Die politische und wirtschaftliche Instabilität [ROOT.GetCountry.GetAltNameNoFlag('VON')] führte dazu, dass skrupellose Akteure große Mengen Reis aufkaufen, wodurch die Preise steigen. Daher können viele japanische Familien nicht mehr genug Reis kaufen, um sich zu ernähren."
 button_je_tenpo_frugal_ordinance: "Kargheitsverfügung erlassen"
 button_je_tenpo_frugal_ordinance_desc: "Die wachsende Dekadenz der städtischen [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] bedroht die Stabilität unserer Herrschaft. Sie verhalten sich ihres Standes unangemessen und prahlen frei heraus mit ihrem Reichtum.\n\nWir müssen sie an ihre Rolle in der Gesellschaft erinnern, indem wir ihnen weitere gesetzliche Beschränkungen bezüglich Luxusgütern, Unterhaltung und Literatur auferlegen."
 button_je_tenpo_confiscate_land: "Edo-Osaka-Verstaatlichungsbefehl erlassen"
 button_je_tenpo_confiscate_land_desc: "Das Gebiet innerhalb von 10 #italic #tooltippable;tooltip:glossary_ri Ri#!#! von Edo und Osaka besteht aus einem wahren Flickenteppich aus Tenryo-, Daimio- und Hatamoto-Land. Das Fehlen einer geeinten Verwaltungsstruktur zeigt schwere Folgen für die nationale Verteidigung und unsere Fähigkeit, das volle Potenzial unseres Landes auszuschöpfen. Ein führender Rōjū schlug eine Verstaatlichung samt Konsolidierung vor.\n\nVerdrängte Landbesitzer erhalten Land als Entschädigung, das anderswo in Japan liegt."
 modifier_consolidation_payments: "Landkonsolidierungszahlungen"
 modifier_consolidated_state_land: "10-Ri-Konsolidierungsgesetz"
 glossary_ri: "#b #italic Ri#!#! ist ein traditionelles Längenmaß, das sich vom chinesischen #italic Li#! ableitet.\n\nDie beschriebene Länge eines Ri verschob sich im Lauf der Zeit, aber in der späten Edo-Zeit entspricht sie etwa 36 #italic Chō#! oder 3,9 km."
 modifier_tenpo_crisis_ongoing: "Umwälzungen der Tenpō-Ära"
 tenpo_events.1.t: "Ära des Himmlischen Schutzes"
 tenpo_events.1.d: "Im Anschluss an Jahre des schlechten Wetters griff eine [concept_famine] in den Landen [ROOT.GetCountry.GetAltNameNoFlag('VON')] um sich. Während die Armen und Mittellosen kaum über die Runden kamen, musste sich das Bakufu mit der wachsenden Unzufriedenheit jener herumschlagen, die meinten, die Regierung könne mehr tun."
 tenpo_events.1.f: "Die gewebten Tuche seiner Frau hatten auf dem Markt stets einen guten Preis erzielt und ihnen in besseren Zeiten sogar ab und zu ein Stück Konfekt ermöglicht. Nun brachten sie ihnen nur noch vier oder fünf Gō Reis ein … wenn überhaupt. Kaum genug, um sie einen Tag lang zu ernähren, dachte er, geschweige denn die ganze Woche, die nötig war – selbst wenn sie zusätzlich Laub und Unkraut sammelten.\n\nEr ging den Weg nach Hause und blieb kurz vor dem Haus des alten Tora stehen. Die Pocken hatten bereits zwei seiner Kinder dahingerafft – und wenn die Gerüchte über die Regenmäntel stimmten, würden in den kommenden Wochen wohl noch weitere sterben. Er umklammerte seinen Reissack fester, sprach stumm ein Gebet und ging weiter."
 tenpo_events.1.a: "O Himmel, schütze uns!"
 tenpo_events.1.tt_1: "#r Schwerer#! [GetHarvestConditionType('torrential_rains').GetName] sucht [GetGeographicRegion('geographic_region_honshu').GetName] heim, #r ruiniert#! die #b Reisernten#!, die von entscheidender Bedeutung für das Land sind, und schädigt die [ROOT.GetCountry.GetAdjectiveNoFlag|l]e [concept_food_security] schwer."
 tenpo_events.1.tt_2: "Überall in [GetGeographicRegion('geographic_region_honshu').GetName] werden die Unterkünfte von Geldverleihern und angeblichen Reishortern zum Ziel von Mobs, die sich sogenanntem #italic #tooltippable;tooltip:glossary_uchikowashi Uchikowashi#!#! hingeben, was zu #r landesweiter#! [concept_devastation] führt."
 glossary_uchikowashi: "#b #italic Uchikowashi#!#! bezeichnet die Zerstörung des Eigentums von als unmoralisch wahrgenommenen Menschen wie Geldverleihern, Reishortern und halbsabschneiderischen Verkäufern.\n\nOft gingen solche Taten auch mit Plünderungen einher, doch in vielen Fällen vermieden die Täter dies absichtlich, um die Legitimität ihres Handelns zu betonen."
 tenpo_events.2.t: "Aufstand des Philosophen-Samurai"
 tenpo_events.2.d: "Ernüchtert von der herrschenden Ordnung und ihrem Versagen im Rahmen der [concept_famine], die [SCOPE.sState('osaka_scope').GetName] heimsucht, begehrte der Magistrat und Gelehrte [SCOPE.sCharacter('oshio_scope').GetFullName] gegen die örtliche Obrigkeit auf. Große Teile von [SCOPE.sState('osaka_scope').GetCityHubName] stehen bereits in Flammen, da [SCOPE.sCharacter('oshio_scope').GetCustom('DE_PRO_POS_S_3P')]e Unterstützer Amtsstuben der Regierung niederbrennen."
 tenpo_events.2.f: "„Obgleich wir weder die Macht von Tang und Wu noch die Tugend von Konfuzius und Mencius besitzen, lässt es sich nicht ändern: Zum Wohl des Reichs entschlossen wir uns zum Handeln – trotz des Fluchs, den dies über unsere Blutlinie bringen könnte.\n\nWir werden die verschiedenen Beamten, die die einfachen Menschen quälen und zur Verzweiflung treiben, bestrafen und hinrichten. Im Anschluss daran werden wir auch jene reichen Städter Osakas bestrafen und hinrichten, die ob ihrer Prunksucht Fett ansetzten.\n\nDanach werden das Gold, das Silber und die Münzen, die sie in verbogenen Gewölben einlagerten, sowie die Reisbündel in ihren Kontoren und Anwesen verteilt und neu zugewiesen.“\n\n– Ōshio Heihachirō, #italic Auszüge aus seinem Manifest#!"
 tenpo_events.2.a: "Trommelt die Miliz zusammen und schlagt diesen Verräter ans Kreuz."
 tenpo_events.2.b: "Ein Akt der Verzweiflung, aber auch einer der Rechtschaffenheit."
 tenpo_events.2.c: "Die Rebellen überwältigen die örtliche Garnison und erobern [SCOPE.sState('osaka_scope').GetCityHubName]."
 tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName|U] entgeht einer Gefangennahme und wählt den Freitod durch die Flammen."
 tenpo_events.2.tt_2: "[SCOPE.sCharacter('oshio_scope').GetFullName|U] wird von der Obrigkeit gefoltert, mit Salz eingerieben und ans Kreuz geschlagen."
 tenpo_events.2.tt_3: "Örtliche Milizen #b schlagen den Aufstand nieder#!, bevor er sich weiter ausbreiten kann."
 tenpo_events.2.tt_4: "Der [concept_agitator] [SCOPE.sCharacter('oshio_scope').GetFullName] erhält eine leichte, symbolische Strafe und darf seine Arbeit fortsetzen."
 modifier_osaka_burning: "In Blut geschriebene Kritik"
 modifier_controversial_pardon: "Kontroverse Begnadigung"
 tenpo_events.3.t: "Verpflichtende Reformen"
 tenpo_events.3.d: "Zufrieden mit dem Tempo der Reformen beglückwünschte [ROOT.GetCountry.GetRuler.GetCustom('DE_ART_DEF_S_N')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] die vorsitzenden Ratsmitglieder zu ihrem Fortschritt – in dem festen Glauben, dass die [ROOT.GetCountry.GetAdjective|l]e Nation in der Lage ist, jede Herausforderung zu bewältigen, ob sie nun von außen oder von innen kommen mag."
 tenpo_events.3.f: "„Zwölf, mein Herr“, sagte der Ratsherr und legte den Pinsel auf dem Tisch ab. „Und die Berichte aus Kinai zeigen in weiten Teilen das Gleiche: Unsere Reformen scheinen Fuß zu fassen.“\n\nVon seinem Podest aus nickte [ROOT.GetCountry.GetRuler.GetCustom('DE_ART_DEF_S_N')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] knapp. „Ausgezeichnet. Ich möchte, dass der Hof zu gegebener Zeit in Kenntnis gesetzt wird. Was nun den Bericht des Magistrats aus Nagasaki anbelangt …“"
 tenpo_events.3.a: "Möge dies das Ende des Verfalls der [ROOT.GetCountry.GetAdjective|l]en Moral und [ROOT.GetCountry.GetAdjective|l]en Politik markieren."
 tenpo_events.3.b: "Vom Bauer bis zum Samurai: Sind wir nicht alle Untertanen des Kaisers?"
 tenpo_events.3.c: "Die Stabilität des Reiches hat Vorrang vor allem."
 tenpo_outcome_hardliner_tt: "Wir haben mehr #b Hardliner#!- als #b Reformer#!-Agenden abgeschlossen"
 tenpo_outcome_reformer_tt: "Wir haben mehr #b Reformer#!- als #b Hardliner#!-Agenden abgeschlossen"
 tenpo_outcome_balanced_tt: "Wir haben die gleiche Anzahl an #b Hardliner#!- und #b Reformer#!-Agenden abgeschlossen"
 tenpo_events.4.t: "Tat und Untätigkeit"
 tenpo_events.4.d: "Unbeeindruckt von den Ergebnissen des Reformprogramms und angesichts wachsender öffentlicher Unzufriedenheit mit den höchstgestellten Würdenträgern entließ [ROOT.GetCountry.GetRuler.GetCustom('DE_ART_DEF_S_N')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('roju_scope').GetFullName] aus seinem Amt."
 tenpo_events.4.f: "Exil. Dem ehemaligen Berater schmeckte dieses Wort so gar nicht, als er es leise aussprach. Obwohl es angesichts der gestrigen Ereignisse womöglich besser war, als in Edo zu bleiben. Seine verbliebenen Bediensteten reinigten noch immer den Teich und den Hof von den Ziegeln und Steinen, die man in sie hineingeworfen hatte, und manche der Drohungen, die an diesem Tag ausgestoßen worden waren, würde er nie wieder vergessen können.\n\nEr sprach das Wort noch einmal aus und fand es etwas weniger abstoßend. Zudem, so dachte er sich, hatte er den Berg Gassan schon immer mit eigenen Augen sehen wollen."
 tenpo_events.4.a: "Ich will diesen Narren mein Lebtag nicht wiedersehen."
 tenpo_events.4.b: "Macht jede einzelne seiner Entscheidungen rückgängig und sorgt dafür, dass die Öffentlichkeit es bemerkt."
 tenpo_events.4.tt_1: "[SCOPE.sCharacter('roju_scope').GetFullName|U] wird #r degradiert#! und ins innere Exil in die Provinz #b Dewa#! geschickt"
 modifier_tenpo_fail: "Vorzeitig abgebrochene Tenpō-Reformen"
 tenpo_events_4_demotion_tt: "Der [concept_leader] einer [concept_interest_group] [concept_in_government|l] wird degradiert und intern ins Exil geschickt" # tooltip for event_outcome_failed_effect_desc in je_tenpo_crisis
 tenpo_events.5.t: "Grundbesitzer widersetzen sich Zentralisierung"
 tenpo_events.5.d: "Unser Schritt, Land in [SCOPE.sState('kanto_scope').GetName] und [SCOPE.sState('kansai_scope').GetName] zu beschlagnahmen, trifft auf großflächigen Widerstand der Grundbesitzer. Die lautesten Beschwerden kommen von jenen, die ihr Land als Belohnung für einen geleisteten Militärdienst erhielten."
 tenpo_events.5.f: "„Militärische Verdienste brachten meinem Vorfahren das Land ein, das ich nun in meinem Namen halte. Seit Sekigahara bestellte jede Generation das Land – und steigerte seine Erträge und ließ unserem Meister zukommen, was ihm zustand, ohne sich je darüber zu beschweren.\n\nVerdient ein solcher Dienst die Behandlung, die man uns nun angedeihen lässt? Soll eine Umsiedlung ohne entsprechende Vergütung unser Lohn sein?“"
 tenpo_events.5.a: "Brecht die Zentralisierung ab, bevor die Sache aus dem Ruder läuft."
 tenpo_events.5.b: "Bietet den Umgesiedelten zusätzliches Land als Vergütung an."
 tenpo_events.5.c: "Erinnert sie daran, dass [ROOT.GetCountry.GetRuler.GetCustom('DE_ART_DEF_S_N')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] dies so will!"
 modifier_heavy_handed_land_confiscations: "Plumpe Landbeschlagnahmungen"
 modifier_promotions_and_koku_redistribution: "Beförderungen und Koku-Umverteilungen"
 modifier_reckless_roju: "Rücksichtsloser Rōjū"
 modifier_will_of_the_shogun: "Im Namen des Schoguns"
 tenpo_events.6.t: "Löwe im Drachenhort"
 tenpo_events.6.d: "Der Sieg [SCOPE.sCountry('britain_scope').GetAltName('VON')] über die [SCOPE.sCountry('china_scope').GetAdjective|l]en Truppen erschütterte unsere Nation schwer. Chinesische Dschunken und Armeen wurden von überlegenen [SCOPE.sCountry('britain_scope').GetAdjectiveNoFormatting|l]en Streitkräften mühelos ausgelöscht, und viele zweifeln nun an der Fähigkeit [ROOT.GetCountry.GetAltName('VON')], einem ähnlichen Ansturm zu trotzen."
 tenpo_events.6.f: "„Vom Ganlu-Tempel im Westen bis zum Jinshan-Tempel im Osten waren die Landstriche um Zhenjiang voller schwarzer und weißer Barbaren – wie Spielsteine, die über ein Go-Brett verstreut waren –, und die Einheimischen fragten sich, ob sie jemals wieder verschwinden würden.“\n\n– Mineta Fūkō, #italic Neue Geschichten aus Übersee#!"
 tenpo_events.6.a: "Möge uns der Himmel behüten, denn unsere Samurai werden es nicht tun."
 tenpo_events.6.b: "Zensiert alle negativen Berichte aus China."
 tenpo_events.6.c: "Wir sind die Klippe, an der die Wellen von Barbaren brechen werden."
 modifier_opium_war_aftermath: "Barbaren vor den Toren"
 modifier_defenses_strengthened: "Gestärkte Küstengarnisonen"
 tenpo_events.7.t: "Die Takashima-Schule"
 tenpo_events.7.d: "Aus Furcht um die Zukunft Japans im Nachgang des Opiumkriegs organisierte der Magistrat [SCOPE.sCharacter('takashima_scope').GetFullName] aus Nagasaki eine Militäreinheit nach niederländischem Vorbild und drängt den Rest des Landes, es ihm gleichzutun."
 tenpo_events.7.f: "„Die Schützenhüte seiner Männer ähneln sonderbaren Kronen, und ihre Befehle werden in der barschen Sprache der Holländer geblafft. Und dennoch sind ihre Formationen gut gedrillt und organisiert. Sie schaffen es, Salven fast doppelt so schnell abzufeuern wie meine eigenen Gefolgsleute, auch wenn sie nicht ganz so treffsicher sein mögen.“\n\n„Und was ist mit der Artillerie?“\n\n„Ohnegleichen. Ich fürchte, je länger wir damit warten, das zu übernehmen, desto geringen fallen unsere Chancen aus, einen Sturmangriff der Barbaren abzuwehren.“"
 tenpo_events.7.a: "Autorisiert die Nutzung der Waffen und Techniken der Barbaren."
 tenpo_events.7.b: "Zieht stattdessen die traditionellen Musketenhäuser vor."
 modifier_inoue_tatsuke_primacy: "Inoue-Tatsuke-Primat"
 modifier_favouring_traditional_musketry_houses: "Vorzug für traditionelle Musketenhäuser"
 modifier_favouring_takashima: "Ins Abseits gestellte Musketenhäuser"
 modifier_takashima_school: "Förderung der Takashima-Schule"
 tenpo_events.8.t: "Für eine Schüssel Reis"
 tenpo_events.8.d: "Vorwürfe des Reishortens und der Preistreiberei sorgten dafür, dass die Spannungen zwischen Bauern und Kaufleuten in [SCOPE.sState('tenpo_unrest_state_scope').GetName] überkochten. Da die Reihen der Bauern nun vor Briganten und Bettlern anschwellen, sieht sich die örtliche Obrigkeit einem provinzweiten Aufstand gegenüber."
 tenpo_events.8.f: "Er war einer der Ersten gewesen. Einer aus jener fröhlichen kleinen Bande, die das Haus des ruchlosen Kaufmanns überfallen und seine unrechtmäßig erworbenen Güter unter den Massen verteilt hatten. Doch als sein Blick um das Lagerfeuer schweifte, erkannte er, wie wenige von ihnen noch übrig waren. Eikichi und Matsuzō blieben reglos und ähnelten kaum noch jenen Männern, die er einst gekannt hatte und die vor gerechtem Zorn regelrecht erstrahlt waren. Fukumatsu hatte am zweiten Tag das Leben verloren, gefolgt von Takeshichi am siebten. Der Rest war wie Laub im Wind auseinandergestoben, verfolgt von den Truppen des Magistrats.\n\nDer Charakter der Menschen, die an ihre Stelle getreten waren, erfüllte ihn mit Scham und Verzweiflung, doch er sah keinen anderen Ausweg. Denn selbst eine derart armselige Gesellschaft wie die ihre erschien ihm göttlich im Vergleich zur Säge des Scharfrichters."
 tenpo_events.8.a: "Entsendet Männer, um diese Schurken zu zermalmen."
 tenpo_events.8.b: "Lasst die Unruhen von allein abklingen."
 tenpo_events.8.c: "Bearbeitet örtliche Dorfvorsteher, dabei zu helfen, die Unruhen zu besänftigen."
 modifier_consulted_headsmen: "Dorfzugeständnisse"
 modifier_lingering_brigandry: "Bleibendes Brigantentum"
 modifier_brutal_anti_bandit_campaigns: "Brutale Feldzüge gegen Banditen"
 je_taming_the_north: "Die Zähmung des Nordens"
 je_taming_the_north_reason: "Durch die Bildung der #b [SCOPE.sState('hokkaido_state_scope').GetName]-Entwicklungskommission#!, die allgemein als #b Kaitakushi#! bekannt ist, herrscht in dieser ehemaligen Grenzregion reges Treiben. Täglich treffen auf der Suche nach neuem Land und neuen Möglichkeiten neue Menschen aus dem Süden ein.\n\nDoch dies ist kein gewöhnlicher Zustrom an Bevölkerung. Denn mit den Siedlern kommen Bürokraten, Intellektuelle und visionäre Modernisierer, die das Land gestalten wollen. Sie alle sind begierig darauf, erleben zu dürfen, wie ihre Vision von der Zukunft [ROOT.GetCountry.GetAltName('GEN')]noch zu ihren Lebzeiten Wirklichkeit wird."
 taming_the_north_agriculture_potentials_goal_tt: "Wir haben die Aktion #b $button_je_taming_the_north_agriculture_potentials$#! #v 3#!-mal verwendet"
 taming_the_north_agriculture_arable_goal_tt: "Wir haben die Aktion #b $button_je_taming_the_north_agriculture_arable_land$#! #v 3#!-mal verwendet"
 taming_the_north_colonies_goal_tt: "Wir haben die Aktion #b $button_je_taming_the_north_establish_colonies$#! verwendet"
 je_taming_the_north_additional_goal_pre: "Wenn wir ganz #b $STATE_SAKHALIN$#! besitzen, gilt der [Concept('concept_timed_modifier', 'zeitliche Modifikator')] #b $modifier_tamed_north$#! auch für die [concept_state_region] „$STATE_SAKHALIN$“:"
 je_taming_the_north_additional_goal: "Wenn wir [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName] ganz besitzen, gilt der [Concept('concept_timed_modifier', 'zeitliche Modifikator')] #b $modifier_tamed_north$#! auch für [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]"
 je_taming_the_north_additional_goal_completed: "Da wir [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName] ganz besitzen, gilt der [Concept('concept_timed_modifier', 'zeitliche Modifikator')] #b $modifier_tamed_north$#! auch für [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]"
 modifier_tamed_north: "Die Modellkolonie"
 modifier_northern_learnings: "Kaitakushi-Lehren"
 button_je_taming_the_north_establish_colonies: "Staatlich finanzierte Kolonien einrichten"
 button_je_taming_the_north_establish_colonies_desc: "Eine Kolonie ohne genügend Siedler ist zum Scheitern verurteilt. Wir sollten Anreize schaffen, um Familien von überall her [ROOT.GetCountry.GetAltName('IN')] für eine Ansiedlung im Norden zu gewinnen."
 button_je_taming_the_north_integrate_ainu: "Rechtsschutz der Ainu einführen"
 button_je_taming_the_north_integrate_ainu_desc: "Bislang verfolgte die Kommission gegenüber der [GetCulture('ainu').GetName|l]en Kultur eine Haltung der erzwungenen Eingliederung und kulturellen Auslöschung. Unsere schrittweisen Bemühungen um ein gleichberechtigteres Verhältnis zu den [GetCulture('ainu').GetNameNoFormatting|l]en Bewohnern des Nordens führten allerdings zu einer Verbesserung der Beziehungen zwischen unseren beiden Völkern geführt.\n\nDaher wurde [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'der', 'dem')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] ein Vorschlag unterbreitet, die [GetCulture('ainu').GetNameNoFormatting|l]en Menschen als geschütztes Brudervolk gemäß [ROOT.GetCountry.GetAdjective|l]em Recht anzuerkennen, gleichberechtigt mit der [GetCulture('japanese').GetName|l]en Bevölkerung."
 ainu_frenship_tt: "Wir haben bei #b Ereignissen#! beständig die Interessen der [GetCulture('ainu').GetName|l]en Menschen durchgesetzt"
 button_je_taming_the_north_sapporo_agricultural_college: "Landwirtschaftsschule Sapporo"
 button_je_taming_the_north_sapporo_agricultural_college_desc: "Der Norden bietet ideale Bedingungen, um neueste Theorien in den Bereichen Landwirtschaft und Landverwaltung zu erproben. Wir werden eine hochmoderne Landwirtschaftshochschule gründen, die mit qualifizierten ausländischen Fachkräften besetzt ist und als Ausgangspunkt für die wissenschaftliche Transformation des Landes dienen soll."
 sapporo_partner_positive_catalyst_tt: "Ein #g positiver#! [concept_diplomatic_catalyst] gilt bei einem zufälligen Land, das die Anforderungen erfüllt"
 button_je_taming_the_north_agriculture_potentials: "Einführung neuer Feldfrüchte"
 button_je_taming_the_north_agriculture_potentials_desc: "Das verfügbare Ackerland auf der Insel mag von größter Bedeutung sein, doch echte wirtschaftliche Entwicklung findet nur dann statt, wenn wir auch die richtigen Nutzpflanzen anbauen.\n\nNeue Entwicklungen in der Landwirtschaft vorangetrieben von der #b Landwirtschaftsschule Sapporo#! ermöglichen es uns, Nutzpflanzen in dieser kalten Region einzuführen, deren Anbau bisher als unmöglich galt.\n\nVerfügbare Auswahlen:\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#! (skalierend)\n• [GetBuildingType('building_rice_farm').GetName]\n• [GetBuildingType('building_dye_plantation').GetName]\n• [GetBuildingType('building_opium_plantation').GetName]\n• [GetBuildingType('building_vineyard').GetName]"
 established_sapporo_college_tt: "Wir haben die #b Landwirtschaftsschule Sapporo#! eingerichtet"
 hokkaido_agriculture_potentials_tt: "Diese Entscheidung kann insgesamt #v 3#!-mal getroffen werden. (Derzeit: [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0])"
 modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]"
 button_je_taming_the_north_agriculture_arable_land: "Landrückgewinnung fortsetzen"
 button_je_taming_the_north_agriculture_arable_land_desc: "Obwohl diese weitläufigen Lande landwirtschaftlich unterentwickelt sind, besitzen sie großes Potenzial. Die gewaltigen Gebirgsketten, aus denen reichlich Wasser fließt, bieten vielfältige Möglichkeiten, die Anbauflächen nach Norden auszudehnen.\n\nWir werden die Feuchtgebiete trockenlegen, die Felder bewässern und das Land urbar machen – als Zeugnis des unbezwingbaren japanischen Willens."
 hokkaido_agriculture_arable_tt: "Diese Entscheidung kann insgesamt #v 3#!-mal getroffen werden. (Derzeit: [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0])"
 hokkaido_events.1.t: "Der Achte Kreis"
 hokkaido_events.1.d: "Mit der Eingliederung von [SCOPE.sState('hokkaido_scope').GetName] – den Landen der Ainu – in Japan muss ein neuer Name gewählt werden, der den neuen Status dieses Gebiets widerspiegelt. Die neu gegründete Entwicklungskommission legte mehrere Vorschläge vor, die es als [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] zu prüfen gilt."
 hokkaido_events.1.f: "„Ein Land der Wilden, das ist es. Ein Land voller Sümpfe und Schlamm. Voller verarmter Fischer und Fleischfresser. Was erhoffst du dir von diesem gottverlassenen Land, was dir [ROOT.GetCountry.GetCapital.GetCityHubName] nicht schon längst geben kann?“\n\n„Einen Sinn, Mutter. Und etwas, was ich mir zu eigen machen kann.“"
 hokkaido_events.1.a: "Es soll #tooltippable;tooltip:hokkaido_events.1_tt_3 #b Hokkai-dō#!genannt werden#!: der Nordseekreis." # 北加伊道
 hokkaido_events.1.b: "#tooltippable;tooltip:hokkaido_events.1_tt_2 #b Hokkai-dō#!#!, zu Ehren der Bewohner dieses Landes." # 北海道
 hokkaido_events.1.c: "#tooltippable;tooltip:hokkaido_events.1_tt_4 #b Kaitō-dō#!#!, der Meerinselkreis, ist eindeutig die bessere Wahl."
 hokkaido_events.1.e: "#tooltippable;tooltip:hokkaido_events.1_tt_5 #b Hitakami-dō#!#! hat einen gewissen literarischen Klang."
 hokkaido_events.1.tt_1: "Die Stadt #b Sapporo#! wird gegründet und zum Hauptsitz der Inselverwaltung, wobei sie #b Hakodate#! ersetzt"
 modifier_ainu_heritage_aknowleged: "Land der Kai"
 modifier_breaking_new_ground: "Spatenstich in neuem Boden"
 modifier_hokkaido_naval_connections: "Der meerumschlossene Kreis"
 modifier_call_of_the_frontier: "Ruf der Grenzregion"
 the_ainu_will_appreciate_this_tt: "@information! Die [GetCulture('ainu').GetName|l]en Menschen werden sich daran erinnern"
 hokkaido_events.1_tt_2: "#b Der nördliche Kai-Kreis#!\nLaut den Worten des Kommissionsmitglieds Matsuura Takeshirō gilt #italic Kai#! (加伊) als altes Ainu-Endonym für ihr Volk."
 hokkaido_events.1_tt_3: "#b Der Nordmeerkreis#!\nEin Gegenvorschlag der Regierung zu Matsuura Takeshirōs ursprünglicher Idee. Hierbei wird das Zeichen für #italic kai#! (加伊) durch das gleichklingende #italic kai#! (海)-Zeichen ersetzt, das aber „Meer“ bedeutet.\n\n@information! Dieser Vorschlag wurde historisch ausgewählt."
 hokkaido_events.1_tt_4: "#b Der Meerinselkreis#!\nNoch vor allem anderen wird diese Insel von ihrer Beziehung zum Meer geprägt, was sich auch in ihrem neuen Namen widerspiegeln sollte."
 hokkaido_events.1_tt_5: "#b Der Morgendämmerlandkreis#!\nEin archaischer Name aus der Yamato-Zeit für die nordöstlichen Grenzlande. Diese Auswahl verwurzelt die neue Kolonie tief in der uralten Vergangenheit Japans."
 hokkaido_events.2.t: "Die neue Grenze"
 hokkaido_events.2.d: "Die Frage, wie man die Region am besten besiedelt, beschäftigt die [SCOPE.sState('hokkaido_state_scope').GetName]-Entwicklungskommission schon einige Zeit. Ungeduldige Verwalter verlangen nun, dass eine endgültige Entscheidung getroffen wird."
 hokkaido_events.2.f: "In seiner Kindheit hatte sein Vater oft von ihren Vorfahren erzählt. Von den stolzen und edlen Kriegern der Sengoku-Zeit. Von ihrer strengen Würde und ihren großen Heldentaten im Krieg. Als Kind hatten ihn diese Geschichten gefesselt, doch nun, da er älter war, erfüllten sie ihn nur noch mit Schwermut. Die Ironie, dass sein Vater – ein bürokratischer, verstädterter Trunkenbold, der das Schwert nur wegen der damit verbundenen Würde getragen hatte – nun die Tugenden der Vergangenheit pries, war unerträglich.\n\nAls sein Vater ihn also bat, ihm bei der Geschäftsführung zu helfen, lehnte er verächtlich ab und machte sich sogleich auf den Weg nach Norden. Würde er dort vielleicht Rettung für seine Blutlinie finden?"
 hokkaido_events.2.a: "Geben wir der Besiedlung durch Soldaten-Kolonisten Vorrang."
 hokkaido_events.2.b: "Die einfachen Bauern sind das Rückgrat [ROOT.GetCountry.GetAltName('VON')]."
 hokkaido_events.2.c: "Beschränken wir die meisten [GetCulture('japanese').GetName|l]en Siedlungen auf Gebiete, die nicht von den [GetCulture('ainu').GetName|l]en Menschen genutzt werden."
 modifier_tondenhei_settlements: "Tondenhei-Siedlungen"
 modifier_peasant_settlements: "Bauern-Siedlungen"
 modifier_restricted_settlements: "Ainu-Kernland bewahrt"
 hokkaido_events.2.tt_1: "#v 1,5 %#! aller [GetCulture('japanese').GetName|l]en [Concept('concept_pop', '$concept_pops$')] aus dem [concept_capital_state] ziehen nach [SCOPE.sState('hokkaido_state_scope').GetName]"
 hokkaido_events.2.tt_2: "#v 3 %#! aller [GetCulture('japanese').GetName|l]en [Concept('concept_pop', '$concept_pops$')] in [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (einer der [Concept('concept_state', '$concept_states$')] mit dem niedrigsten [Concept('concept_gdp','$concept_gdp_short$')] auf den [GetGeographicRegion('geographic_region_home_islands').GetName]) ziehen nach [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_old_swords_in_new_lands: "Alte Schwerte in neuen Landen"
 modifier_go_north_young_man: "Auf nach Norden, Jüngling"
 hokkaido_events.3.t: "Saat des Fortschritts"
 hokkaido_events.3.d: "Aufgrund der jüngsten Durchbrüche an der Landwirtschaftsschule Sapporo gibt es Vorschläge zur Einführung neuer Feldfrüchte auf den Agraflächen von [SCOPE.sState('hokkaido_state_scope').GetName]."
 hokkaido_events.3.f: "#b Persönliches Labortagebuch, 154#!\nDie Veredelung westlicher Sorten wird aufgrund neuester Testergebnisse zugunsten südlicher Sorten aufgegeben. Die Forscher gehen davon aus, dass die Anbaugrenze deutlich nach Norden, möglicherweise sogar über Kamikawa hinaus, verschoben werden kann. Weitere Studien zur Ertragspotenzialbewertung sind nötig, doch man ist optimistisch. Morgen habe ich ein Treffen mit dem Dekan vereinbart. Ich muss mir eine neue Krawatte kaufen."
 hokkaido_events.3.a: "Konzentrieren wir unsere Bemühung darauf, die vorhandenen Feldfrüchte zu verbessern."
 hokkaido_events.3.b: "Entwickeln wir kältebeständige Varianten, um [GetBuildingType('building_rice_farm').GetName] vor Ort anlegen zu können."
 hokkaido_events.3.c: "Die Tieflande sollten sich für Indigo-[GetBuildingType('building_dye_plantation').GetName] eignen."
 hokkaido_events.3.e: "Mohn scheint hier gut Fuß zu fassen – [GetBuildingType('building_opium_plantation').GetName] sind die Zukunft."
 hokkaido_events.3.g: "Richten wir [GetBuildingType('building_vineyard').GetName] mit spezialisierten Traubenarten ein."
 button_je_taming_the_north_complete: "Wir haben das Land so weit entwickelt, wie es unsere Technik uns erlaubt"
 modifier_introducing_new_crops: "Einführung neuer Feldfrüchte"
 modifier_opimizing_existing_variants: "Kältebeständige Feldfruchtvarianten"
 hokkaido_events.4.t: "Wachstum des Bodens" # Markens Grøde really does sound better in Norwegian
 hokkaido_events.4.d: "Die [SCOPE.sState('hokkaido_state_scope').GetName]-Entwicklungskommission hat einen weiteren wichtigen Meilenstein erreicht: Ausgedehnte Bereiche der ehemaligen Feuchtgebiete wurden in wertvolles Ackerland verwandelt."
 hokkaido_events.4.f: "Es war wirklich beeindruckend. Vor zehn Jahren wäre das größte Schiff, das den Fluss vor ihm sicher hätte befahren können, ein kleines Ruderboot gewesen. Jetzt beobachtete er, wie Arbeiter Kisten und Jutesäcke von einem riesigen Dampfer entluden, dessen Rauchwolken in die klare Bergluft stiegen. Material für die nächste Schleuse vielleicht? Oder für das Entwässerungsvorhaben weiter flussaufwärts? Oder einfach nur Vorräte für das neue Dorf im Tal dahinter? Er konnte es nicht sagen, und offen gestanden spielte es auch keine Rolle, denn was auch immer das Schiff beförderte: Es war Teil der Zukunft."
 hokkaido_events.4.a: "Mit jedem Schwung der Hacke formen wir dieses Land."
 hokkaido_events.4.b: "Und mit jedem neuen Heim wächst es weiter."
 hokkaido_events.4.tt_1: "#v 2 %#! aller [GetCulture('japanese').GetName|l]en [Concept('concept_pop', '$concept_pops$')] in [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (einer der [Concept('concept_state', '$concept_states$')] mit dem niedrigsten [Concept('concept_gdp','$concept_gdp_short$')] auf den [GetGeographicRegion('geographic_region_home_islands').GetName]) ziehen nach [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_immigration_burst: "Einwanderungswelle"
 modifier_open_to_business: "Offen für Geschäfte"
 hokkaido_events.5.t: "Jungs, zeigt Ehrgeiz …"
 hokkaido_events.5.d: "Nach dem Abgang des ersten Jahrgangs der [SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective|l]-geleiteten Landwirtschaftsschule Sapporo wollen die Abgänger ihre neu entdeckten Fähigkeiten auch in die Tat umsetzen. Währenddessen berät der Schulvorstand über die weitere Ausrichtung und den Schwerpunkt der Schule."
 hokkaido_events.5.f: "„… strebt nicht nach Geld, nicht nach selbstsüchtiger Bereicherung, nicht nach jenem vergänglichen Gut, das die Menschen Ruhm nennen. Strebt nach der Verwirklichung all dessen, was ein Mensch sein kann.“\n\n– William Smith Clark, #italic Abschiedsrede des Präsidenten der Landwirtschaftsschule Sapporo#!"
 hokkaido_events.5.a: "Eine Landwirtschaftsschule sollte ihren Schwerpunkt auf die Landwirtschaft legen."
 hokkaido_events.5.b: "Unsere Priorität sollte auf der Erweiterung der technischen Fakultät liegen."
 hokkaido_events.5.c: "Richten wir eine Fakultät für Geisteswissenschaften ein und beginnen wir, die örtliche Kultur zu erforschen."
 hokkaido_events.5.tt_1: "Der Einfluss der [SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective|l]en Lehrkräfte in #b Sapporo#! führt zur Schaffung einer [GetCulture('japanese').GetName|l]en [SCOPE.sReligion('sapporo_partner_religion_scope').GetName|l]en Gemeinde vor Ort"
 hokkaido_events.5.tt_2: "Schaltet #b $button_je_taming_the_north_agriculture_potentials$#! und #b $button_je_taming_the_north_agriculture_arable_land$#! im [concept_journal_entry] #b $je_taming_the_north$#! frei"
 modifier_sapporo_expanded_agricultural_faculty: "Innovative Landwirtschaftsmethoden"
 modifier_sapporo_expanded_engineering_faculty: "Hochmoderne technische Fakultät"
 modifier_sapporo_humanities_faculty: "Sapporo-Kulturstudiengruppe"
 hokkaido_events.6.t: "Ainu Mosir, Sisam Mosir"
 hokkaido_events.6.d: "In einer Atmosphäre inländischer Kontroversen gab [ROOT.GetCountry.GetCapital.GetCityHubName] einen neuen Erlass zum rechtlichen Status von [SCOPE.sState('hokkaido_state_scope').GetName] aus: Es wird formell ein Ainu-Heimatland festgelegt, das eigene beschränkte Institutionen hat, die parallel zum offiziellen [ROOT.GetCountry.GetAdjective|l]en Verwaltungsapparat existieren."
 hokkaido_events.6.f: "„Hinna! Hinna!“ Mit einem fast zahnlosen Grinsen reichte ihm die alte Ainu-Frau die Suppenschüssel. Er betrachtete das gemischte Wildfleisch darin und dankte dem Himmel, dass seine Eltern nicht zugegen waren, um das mitzuerleben.\n\n„Was man nicht alles für den Frieden tut“, murmelte er vor sich hin und nahm die Suppe mit einem gezwungenen Lächeln entgegen."
 hokkaido_events.6.a: "„Dieses Land ist groß genug für uns beide.“"
 modifier_opposes_ainu_rights: "Barbarenzugeständnisse"
 modifier_supports_ainu_rights: "Festgeschriebene Ainu-Rechte"
 hokkaido_events.7.t: "Letzter Akt der Kommission"
 hokkaido_events.7.d: "Die [SCOPE.sState('hokkaido_state_scope').GetName]-Entwicklungskommission gab offiziell bekannt, dass die ihr von der Regierung übertragene Mission erfolgreich war. Daher beschloss sie, ihre verbleibenden Zuständigkeiten an den Staat abzugeben."
 hokkaido_events.7.f: "#b Proklamation Nr. 8#!\nDie [SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting]-Entwicklungskommission wird hiermit aufgelöst und die drei Präfekturen Hakodate, Sapporo und Nemuro werden eingerichtet. Die Grenzen ihrer jeweiligen Zuständigkeitsbereiche werden zu einem späteren Zeitpunkt bekannt gegeben."
 hokkaido_events.7.a: "Ein strahlendes Beispiel für zukünftige Kolonialunternehmungen …"
 hokkaido_events.7.b: "… und auch für die [GetGeographicRegion('geographic_region_home_islands').GetName]."
 modifier_external_applications: "Kaitakushi: Äußere Anwendungen"
 modifier_domestic_applications: "Kaitakushi: Inländische Anwendungen"
 hokkaido_events.8.t: "Kommission ohne Aufgaben"
 hokkaido_events.8.d: "Der Verlust von [SCOPE.sStateRegion('hokkaido_state_region_scope').GetName] zwang die Entwicklungskommission, sich aufzulösen, ohne ihre Mission erfüllt zu haben. Als Antwort gehen die Bürger [ROOT.GetCountry.GetAltName('VON')] auf die Straße und protestieren gegen den Verlust von nationalem Prestige und ihrer persönlichen Investitionen."
 hokkaido_events.8.f: "Erschöpft ließ sich der emeritierte Verwaltungsdirektor in seinen Bürostuhl sinken und schenkte sich einen großzügigen Becher Sake ein. Er leerte ihn in einem Zug und richete den Blick auf die vor ihm auf dem Tisch ausgebreiteten Landkarten. Sie waren übersät mit Kritzeleien, Notizen und Markierungen, die jeweils ein anderes Vorhaben darstellten, in das er seine gesamte Lebensenergie gesteckt hatte. Jetzt gab es weder Vorhaben noch Energie, und der Optimismus, der aus jeder der Notizen sprach, war nur noch Hohn.\n\n„Zum Teufel damit“, dachte er und schenkte sich noch einen Becher ein."
 hokkaido_events.8.a: "Bedauerlicherweise entzieht sich dieser Ausgang der Kontrolle der Regierung."
 modifier_lost_northern_investments: "Verlorene Nordinvestitionen"
