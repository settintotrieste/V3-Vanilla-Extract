 korea_colonization.2.t: "Eine verheißungsvolle Zukunft"
 korea_colonization.2.d: "Die Welt weiß nun, dass [GetGeographicRegion('geographic_region_korea').GetName] Teil [ROOT.GetCountry.GetAltName('VON')] ist und fest unter Kontrolle unseres Landes steht. Indem wir eine Präsenz auf der Halbinsel einrichteten, beweist unser Erfolg umso mehr, wie herausstechend unser Platz in der Welt ist."
 korea_colonization.2.f: "Nachdem die Vision einer Vereinigung ganzer Nationen umgesetzt wurde, wächst der Ehrgeiz von [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]. Von [ROOT.GetCountry.GetRuler.GetCustom('DE_PRO_POS_S_3P')]em Sitz in [ROOT.GetCountry.GetCapital.GetCityHubName] aus verfasst [ROOT.GetCountry.GetRuler.GetCustom('DE_PRO_PER_S_3P_N')] Tanka-Poesie, in der [ROOT.GetCountry.GetRuler.GetCustom('DE_PRO_PER_S_3P_N')] über den Erfolg dieses Unterfangens und die Entwicklung der Halbinsel sinniert.\n\nZur gleichen Zeit widerspricht im fernen $STATE_SEOUL$ ein [GetCulture('korean').GetNameNoFormatting|l]er Bürokrat der öffentlichen Empörung von Zivilisten, die sich der neuen Gesellschaftordnung widersetzen: Mit großem Gleichmut beharrt er darauf, dass diese Union Wohlstand für alle sichern wird."
 korea_colonization.2.a: "Der Wohlstand und die Sicherheit der Halbinsel haben eine strahlende Zukunft."
 korea_colonization.2.b: "Das Geschäftliche war zentral für unsere Agenda."
 modifier_peninsula_control_prestige_authority: "Prestigereiche Halbinsel"
 modifier_peninsula_control_assimilation_migration: "Beschleunigte Assimilierung"
 modifier_peninsula_control_loyal_prominence: "Herausragende Aufsicht"
 modifier_peninsula_control_company_bonus: "Kompaniebelobigung"
 korea_colonization.3.t: "Eine verschenkte Gelegenheit"
 korea_colonization.3.d: "[GetGeographicRegion('geographic_region_korea').GetName] steht nicht mehr unter unserer Kontrolle. Die wirtschaftlichen und die diplomatischen Auswirkungen wird [ROOT.GetCountry.GetAltName('NOM')] noch jahrelang spüren."
 korea_colonization.3.f: "[ROOT.GetCountry.GetAdjectiveNoFormatting|U]e Beamte versammeln sich, viele waren verdrossen und verärgert darüber, dass die Regierung die Ordnung auf der Halbinsel nicht wahren konnte. Viele wollen diesen heftigen Schlag für die in den letzten Jahren angesammelte Macht [ROOT.GetCountry.GetAltNameNoFormatting('VON')] nicht einfach übergehen.\n\nEin Edelmann erhebt sich, um das Gegrummel der Diskussion zu übertönen: „Sicher kann die IG ‚[SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting]‘ die Verwantwortung für diesen Rückschlag übernehmen.“"
 korea_colonization.3.a: "Wir müssen alle die Last des Scheiterns unseres Unterfangens schultern."
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName|U] und die IG „[SCOPE.gsInterestGroup('relevant_ig').GetName]“ müssen die Verantwortung für dieses Scheitern übernehmen."
