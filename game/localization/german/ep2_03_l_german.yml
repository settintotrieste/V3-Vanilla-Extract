 #Japan Single-Fire Events
 japan_events.31.t: "Theater in [SCOPE.sState('kabuki_theatre_state').GetCityHubName] brennt ab"
 japan_events.31.d: "Ein beliebtes Kabuki-Theater in [SCOPE.sState('kabuki_theatre_state').GetName] brannte ab. Wo die Schauspieltruppe schon Pläne für einen Wiederaufbau schmiedet, sehen Mitglieder der IG „[SCOPE.gsInterestGroup('relevant_ig').GetName]“ – und ganz besonders [SCOPE.sCharacter('relevant_leader').GetFullName] – dies als eine Gelegenheit, die Unterhaltungsmöglichkeiten in [SCOPE.sState('kabuki_theatre_state').GetCityHubName] vollkommen anders zu regeln und die Darsteller zu zwingen, ihr Theater jenseits der Stadtgrenze neu zu errichten."
 japan_events.31.f: "Auf der Plattform eines Feuerwachturms hält ein ruheloser Wachmann unermüdlich Ausschau über [SCOPE.sState('kabuki_theatre_state').GetCityHubName]. Spät am Abend entdeckt er von seinem Aussichtspunkt aus die verräterischen Anzeichen eines Feuers. Als Rauch aufsteigt und stechender Brandgeruch die Luft erfüllt, eilt er los, um die Alarmglocke zu läuten.\n\nDie nichts ahnenden Bewohner der Stadt werden vor der Gefahr gewarnt, und die Feuerwehr rückt aus und klettert emsig über Dächer, um die Flammen zu bekämpfen. Als der Brand gelöscht ist, wird deutlich, dass bereits großer Schaden entstanden ist. Von einem bekannten Kabuki-Theater sind nach diesem verheerenden Brand nur noch Asche und Schlacke übrig."
 japan_events.31.a: "Sie müssen alles jenseits der Stadtgrenze wiederaufbauen."
 japan_events.31.b: "Erlaubt der Schauspieltruppe den Wiederaufbau."
 modifier_kabuki_regulated: "Hartes Durchgreifen gegen Kabuki-Theater"
 modifier_theatre_affronted_official: "Vor den Kopf gestoßener Beamter"
 modifier_shogunate_opposition_ig_approval: "Opportunistische Opposition"
 japan_events.32.t: "Bilder der schwebenden Welt"
 japan_events.32.d: "Die Arbeit eines umtriebigen Ukiyo-e-Künstlers aus [SCOPE.sState('ukiyo_e_state').GetCityHubName] beflügelte die Fantasie anderer Kunstschaffender sowohl [ROOT.GetCountry.GetAltName('IN')] als auch in der Fremde."
 japan_events.32.f: "Ein beliebter Holztafeldruck zeigt das emsige Treiben im Theaterviertel in den Außenbezirken von [SCOPE.sState('ukiyo_e_state').GetCityHubName]. Silbernes Mondlicht scheint auf die gut besuchte Hauptstraße, auf der die als Silhouetten dargestellten Menschen ihre Schatten werfen. Die Ostseite der Straße ist von Teehäusern und Marionettentheatern gesäumt. Gegenüber im Westen gibt es drei Kabuki-Theater, und über jedem von ihnen ragt ein Trommelturm auf.\n\n„Nur die Hand eines Meisters kann derart feste, sichere und so fein schattierte Striche setzen. Und nur der klare Verstand eines Meisters kann eine Gestalt ersinnen, die so durch und durch rhythmisch aufgebaut ist und so stark und zugleich doch herrlich zierlich.“\n– F.W.G., #italic Bulletin des Art Institute of Chicago#!"
 japan_events.32.a: "Zweifelsohne wird [ROOT.GetCountry.GetAdjectiveNoFormatting|l]e Kunst weiter an Bekanntheit in der Welt gewinnen."
 japan_events.32.b: "Hervorragend. Regt die Herstellung weiterer solcher Werke an."
 modifier_ukiyo_e_prestige: "Erfolgreiche Holztafeldrucke"
 modifier_ukiyo_e_production: "Holztafeldruck-Produktion"
 japan_events.33.t: "Ringen mit der Tradition"
 japan_events.33.d: "Die Auswirkungen der Verwestlichung auf die [ROOT.GetCountry.GetAdjectiveNoFormatting|l]e Kultur sind ganz erheblich. Während sich die Sitten rasant wandeln, unterstützt [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullName] ein Sumo-Turnier in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], um der öffentlichen Ablehnung dieser Tradition entgegenzuwirken."
 japan_events.33.f: "Eine Menschenmenge beginnt, sich in der neu gebauten Sumo-Halle auf dem Tempelgelände einzufinden, voller Neugier über dieses Ereignis, das [SCOPE.sCharacter('relevant_character').GetCustom('DE_ART_DEF_S_N')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] so sehr gutheißt. Unter den Anwesenden sind auch einige Aristokraten und Staatsmänner, deren Fixierung auf die westliche Kultur dazu führte, dass sie der Idee, Bande zu einer solchen Tradition wie Sumo zu pflegen, eher skeptisch gegenüberstehen. Obschon das Goldene Zeitalter des Sumo vorbei sein mag, könnte das Zugegensein von [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] die kulturelle Bedeutung dieses Sports für die Öffentlichkeit neu verankern."
 japan_events.33.a: "Die Bemühungen, die [SCOPE.sCharacter('relevant_character').GetCustom('DE_ART_DEF_S_N')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] zeigt, werden das alte öffentliche Bild dieses Sports wiederherstellen."
 japan_events.33.b: "Die Tradition dieses [ROOT.GetCountry.GetAdjectiveNoFormatting|l]en Sports wird sehr langlebig sein."
 modifier_restored_sumo_popularity: "Wiederhergestellte Sumo-Beliebtheit"
 modifier_traditional_sports_movement_support: "Nationalsport"
 japan_events.34.t: "Walfang-Katastrophe in [SCOPE.sState('whaling_state').GetPortHubName]"
 japan_events.34.d: "Ein Boot, das vor der Küste von [SCOPE.sState('whaling_state').GetName] segelte, sichtete zwei Nordkaper-Glattwale, eine Mutter und ein Kalb. Getrieben von der Verzweiflung nach einer Saison mit magerer Beute wagte sich eine Gruppe von Walfängern trotz schlechter Wetterbedingungen aufs Meer hinaus. Über 100 Menschen wurden als vermisst gemeldet."
 japan_events.34.f: "Sowohl das Feuer auf den Booten als auch die Flotte selbst sind schon lange nicht mehr zu sehen, was großen Trubel in [SCOPE.sState('whaling_state').GetPortHubName] auslöst.\n\n„Ganz gleich, wie schlecht die Zeiten auch waren: Wir vermieden es stets, Jagd auf eine Mutter und ihr Kalb zu machen“, argumentiert ein Mann. „Wir hätten die Wale in Ruhe lassen sollen.“\n\n„Unfug“, erwidert sein Vetter. „Die Wale sind ein Segen. Ich bin sicher, die Expedition kehrt bald mit einem üppigen Fang zurück.“"
 japan_events.34.a: "$bg_whaling$ sind eine entscheidende Industrie in [SCOPE.sState('whaling_state').GetNameNoFormatting]."
 japan_events.34.b: "Richten wir unsere zukünftigen Bemühungen in [SCOPE.sState('whaling_state').GetNameNoFormatting] stattdessen auf $bg_fishing$ aus."
 modifier_whaling_deaths: "Walfangverluste"
 modifier_redouble_on_whaling: "Zukunft im Walfang"
 modifier_fishing_not_whaling: "Zukunft im Fischfang"
 japan_events.35.t: "Maßnahmen gegen Brandstiftung"
 japan_events.35.d: "Die IG „[SCOPE.gsInterestGroup('relevant_ig').GetName]“ zeigt sich besorgt darüber, dass die Häufigkeit von Brandstiftungen innerhalb der Stadtgrenzen in [SCOPE.sState('relevant_state').GetCityHubName] den Preis in Sachen [SCOPE.sGoods('expensive_good').GetName] [ROOT.GetCountry.GetAltName('IN')] in die Höhe trieben. Man argumentiert, es sei nötig, noch strengere Maßnahmen gegen Brandstiftung zu ergreifen."
 japan_events.35.f: "Die Alarmglocke auf dem Feuerwachturm macht alle auf die drohende Gefahr aufmerksam: In [SCOPE.sState('relevant_state').GetCityHubName] hat ein weiteres Feuer Wohnhäuser und Geschäfte gleichermaßen in Brand gesteckt. Als die Feuerwehr eintrifft, um die Flammen zu löschen, versammeln sich $strata_commoners_townspeople$ in einer großen Menge auf der Straße. Manche beäugen ihre Nachbarn misstrauisch, andere beginnen, darüber zu mutmaßen, ob dies ein Unfall war oder ob ein Brandstifter sein Unwesen treibt. Eines ist sicher: Die Preise in Sachen [SCOPE.sGoods('expensive_good').GetName] werden sich bald vervielfachen."
 japan_events.35.a: "Strenge Maßnahmen sind gerechtfertigt. Richtet mutmaßliche Brandstifter hin."
 japan_events.35.b: "Verfolgt begangene Verbrechen für jene nicht weiter, die bei Festnahmen helfen."
 modifier_arson_measure_strict_ig: "Strenge Brandstiftungsmaßnahmen"
 modifier_arson_measure_strict_pop: "Brandstifter-Hinrichtungen"
 modifier_arson_measure_lenient_ig: "Milde Brandstiftungsmaßnahmen"
 # Colonization of Korea Content
 je_colonize_korea: "Die Regierung der Chōsen"
 je_colonize_korea_reason: "#italic „Industrie und Handel werden unter guter Regierungsführung und Frieden eine deutliche Entwicklung erfahren. Wir sind absolut sicher, dass der Frieden in Ostasien dadurch ein stärkeres Fundament als je zuvor haben wird.“\n– Aufzeichnungen des Kaisers Meiji, Band 12#!\n\nEs ist an der Zeit, eine dauerhafte Präsenz auf der koreanischen Halbinsel zu etablieren. Nur so können wir den zukünftigen Wohlstand und die Sicherheit [JournalEntry.GetCountry.GetAltName('VON')] und ganz [GetGeographicRegion('geographic_region_east_asia').GetName] gewährleisten. Um die Kontrolle angemessen zu sichern, müssen wir die Entwicklung von [GetGeographicRegion('geographic_region_korea').GetName] überwachen und in unserem Ehrgeiz nicht nachlassen."
 je_colonize_korea_is_owned_by_tt: "Ist im Besitz [JournalEntry.GetCountry.GetAltName('VON')]"
 je_colonize_korea_culture_percent_seoul_tt: "Die [GetCulture('japanese').GetName|l]e [Concept('concept_pop','$concept_population$')] von $STATE_SEOUL$ ist größer oder gleich #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
