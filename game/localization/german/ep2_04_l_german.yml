 shogunate.1.t: "Die Ernennung von [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Ieyoshi
 shogunate.1.d: "Als neues Oberhaupt des [SCOPE.sCharacter('shogun_scope').GetLastName]-Clans wurde [SCOPE.sCharacter('shogun_scope').GetFullName] vom Kaiser das Amt des Shōgun verliehen. Der neue Shōgun wird von vielen in der IG „[SCOPE.gsInterestGroup('daimyo_scope').GetName]“ mit Ablehnung betrachtet und muss erst noch persönliche Autorität aufbauen."
 shogunate.1.f: "Ein Regenbogen aus Daimyō schlängelte sich durch die Ō-hiroma. Auf der obersten Plattform saß der Shōgun, gehüllt in Schwarz und Rot, zu seiner Rechten der Kasten mit den kaiserlichen Erlassen.\n\nEiner nach dem anderen verbeugten sich Adlige in Rot, Blau und Violett vor ihm, präsentierten ihre Schwerter und Goldgeschenke. Der Shōgun schwieg, ebenso wie jene, die sich ihm unterwarfen. Jene von niederem Rang, denen es verboten war, ihn zu sehen, drängten sich vor der Halle. Aus dem Garten erhob sich ein Sprechgesang."
 shogunate.1.a: "Goshōshin, goshōshin!"
 shogunate.2.t: "Die Nachfolgefrage"
 shogunate.2.d: "Die schlechte gesundheitliche Verfassung von [SCOPE.sCharacter('iesada_scope').GetFirstName], dem ältesten Sohn des [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle], verursacht große Sorge, ob er seinen Pflichten als [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] nachkommen kann. Außenstehende Daimyō unter der Führung von [SCOPE.sCharacter('armed_forces_leader').GetFullName] haben sich hinter [SCOPE.sCharacter('yoshinobu_scope').GetFullName] als möglicher Alternative versammelt."
 shogunate.2.f: "Das Schlafzimmer von [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] war leer. Die Läden waren geschlossen, die Veranda freigeräumt. [SCOPE.sCharacter('armed_forces_leader').GetCustom('DE_PRO_PER_S_3P_N')|U] saß neben dem eigenen Bett und starrte auf ein leeres Blatt Papier. [SCOPE.sCharacter('armed_forces_leader').GetCustom('DE_PRO_POS_S_3P')|U]e Augen waren geschlossen. Wäre eine Katze über den angrenzenden Flur gelaufen, hätte [SCOPE.sCharacter('armed_forces_leader').GetCustom('DE_PRO_PER_S_3P_N')] sie gewiss gehört – und doch konnte [SCOPE.sCharacter('armed_forces_leader').GetCustom('DE_PRO_PER_S_3P_N')] nicht sicher sein, dass niemand lauschte. In so einem frühen Stadium war es besser, den eigenen Ehrgeiz für sich zu behalten.\n\nWürde der Kaiserhof dies genauso sehen wie [SCOPE.sCharacter('armed_forces_leader').GetCustom('DE_PRO_PER_S_3P_N')]? [SCOPE.sCharacter('armed_forces_leader').GetCustom('DE_PRO_POS_S_3P')|U] besaß Grund zu der Annahme, doch dies war bei Weitem die einfachste Frage. [SCOPE.sCharacter('armed_forces_leader').GetCustom('DE_PRO_POS_S_3P')|U]e Gedanken kreisten weiter. Wie sollte man am besten einen Erlass erwirken? Wie am besten dafür sorgen, dass er nicht verschwand?"
 shogunate.2.a: "Das Innere [GetLawType('law_bakufu').GetName] soll seinen Willen bekommen."
 shogunate.2.b: "Die Lage erfordert eine entschlossene Führung."
 shogunate.3.t: "Die Ernennung von [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iesada
 shogunate.3.d: "Als neues Oberhaupt des [SCOPE.sCharacter('shogun_scope').GetLastName]-Clans wurde [SCOPE.sCharacter('shogun_scope').GetFullName] vom Kaiser das Amt des Shōgun verliehen. Schon seit seiner Kindheit zeigte der Shōgun eine angeschlagene Gesundheit, sodass schon jetzt um seine Nachfolge gebuhlt wird."
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "Goshōshin, goshōshin!"
 shogunate.4.t: "Die Ernennung von [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Yoshinobu
 shogunate.4.d: "Als neues Oberhaupt des [SCOPE.sCharacter('shogun_scope').GetLastName]-Clans wurde [SCOPE.sCharacter('shogun_scope').GetFullName] vom Kaiser das Amt des Shōgun verliehen. Die Unterstützer des neuen Shōgun in den Reformer-Domänen haben große Erwartungen an seine Herrschaft."
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "Goshōshin, goshōshin!"
 shogunate.5.t: "Hitotsubashi und Nanki"
 shogunate.5.d: "Die Fraktionen, die sich im Zuge der Nachfolge von Shōgun Ieyoshi bildeten, sind darüber aneinander geraten, wer die Nachfolge des kinderlosen [SCOPE.sCharacter('shogun_scope').GetFullName] antreten soll. Die Hitotsubashi-Fraktion der Außenseiter-Daimyō und niederen [SCOPE.gsInterestGroup('armed_forces_ig').GetName] unterstützen [SCOPE.sCharacter('yoshinobu_scope').GetFullName], wohingegen die Nanki-Fraktion der [SCOPE.gsInterestGroup('daimyo_ig').GetName] aus dem inneren Zirkel [SCOPE.sCharacter('iemochi_scope').GetFullName] unterstützt."
 shogunate.5.f: "Der Bote blickte mit ausdrucksloser Miene vor dem Mann auf dem Podest zu Boden. Sein Pinsel hing über dem Papier.\n\n„Eine Nachricht für Yoshikatsu-sama“, sagte der Magistrat. „Manche am Hof ​​haben sich an ungebührlichen Mutmaßungen über den Gesundheitszustand des Shōgun gewöhnt. Sie debattieren, als hätte er nichts zu sagen. Setzen Sie mich in Kenntnis, falls Entwürfe auftauchen, die unter dieser Annahme verfasst wurden.“"
 shogunate.5.a: "Der Shōgun wünscht, dass [SCOPE.sCharacter('iemochi_scope').GetFirstName] herrscht."
 shogunate.5.b: "Der kaiserliche Hof braucht einen erfahrenen Nachfolger."
 shogunate.6.t: "Die Ernennung von [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iemochi
 shogunate.6.d: "Als neues Oberhaupt des [SCOPE.sCharacter('shogun_scope').GetLastName]-Clans wurde [SCOPE.sCharacter('shogun_scope').GetFullName] vom Kaiser das Amt des Shōgun verliehen. Trotz seiner jungen Jahre hat sich der Shōgun bereits einen Ruf für stoische, sorgfältige Urteile verdient."
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "Goshōshin, goshōshin!"
 shogunate.6.a_regency: "[SCOPE.sCharacter('shogun_scope').GetCustom('DE_PRO_PER_S_3P_N')|U] wird in treuer Obhut regieren."
 shogunate.6.b_regency: "Schließen wir einen Kompromiss mit den Hitotsubashi: Ernennen wir [SCOPE.sCharacter('yoshinobu_scope').GetFirstName] als [SCOPE.sCharacter('shogun_scope').GetCustom('DE_PRO_POS_S_3P')]en Vormund."
 shogunate.7.t: "Die Ernennung von [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iesato
 shogunate.7.d: "Als neues Oberhaupt des [SCOPE.sCharacter('shogun_scope').GetLastName]-Clans wurde [SCOPE.sCharacter('shogun_scope').GetFullName] vom Kaiser das Amt des Shōgun verliehen. Der Shōgun gilt als weltlich und aufgeschlossen, sodass er vermutlich der Reformerfraktion des [GetLawType('law_bakufu').GetName] zugetan sein wird."
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "Goshōshin, goshōshin!"
 shogunate.8.t: "Heißer Sommer"
 shogunate.8.d: "Durch die Sommerhitze nahm die Gesundheit von [SCOPE.sCharacter('shogun_scope').GetFullName] Schaden. Der [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] ist nun bettlägerig und muss eine letzte Schlacht gegen sein versagendes Herz schlagen."
 shogunate.8.f: "Das Bett des Shōgun war zum Fenster hin ausgerichtet. Seine Diener hofften, die kühle Meeresbrise würde ihr Fächern unterstützen. Eine offene Eiskiste stand am Fußende des Bettes, und ein feuchtes Tuch lag auf der Stirn des Shōgun.\n\nHeute herrschte Windstille. Die Luft kräuselte sich im Schein der untergehenden Sonne. Erbarmungslos, alles einhüllend. Er konnte die Form der Wellen tief dort drunten kaum noch erkennen."
 shogunate.8.a: "Das ist das Ende."
 shogunate.8.b: "Lasst holländische Ärzte kommen."
