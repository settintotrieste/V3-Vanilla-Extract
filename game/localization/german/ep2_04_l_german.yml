 ep2_meiji_pulse.1.t: "Das Recht zum Zuschlagen"
 ep2_meiji_pulse.1.d: "Auf einer Reise in [SCOPE.sState('relevant_treaty_port_state').GetName] wurde ein [SCOPE.sCountry('relevant_gp').GetAdjective|l]er Händler vom Gefolge von [SCOPE.sCharacter('daimyo_scope').GetFullName] erschlagen, da er sich weigerte, abzusitzen, als der Daimyō von [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] an ihm vorüberging. Letzterer beteuerte die Rechtmäßigkeit dieses Tötungsakts unter Verweis auf sein Privileg, gegen jeden Gemeinen zuschlagen zu dürfen, der ihm nicht den gebührenden Respekt zollt."
 ep2_meiji_pulse.1.f: "Die Fremden durchbrachen die Reihen der Musketiere, und ringsum ertönten Schreie. Als der Fremde an der Spitze die bewaffneten Männer bemerkte, die ihn umzingelten, riss er die Zügel zur Seite und trieb sein Pferd in eine rasante Wendung, die beinahe einen der Musketiere vom Pferd warf. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting|U] zog das Schwert, und seine Gefährten im inneren Kreis folgten ihm.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting|U] führte den ersten Hieb und schlug eine tiefe Wunde in die Seite des Eindringlings. Dieser schrie auf und riss die Zügel erneut zur Seite. Vergeblich. Der Musketier, der am dichtesten bei ihm war, zog nun ebenfalls das Schwert und schlug zu. Ein roter Bogen hing wie eine Wolke in der Luft."
 ep2_meiji_pulse.1.a: "Als [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] wünscht man sich nichts, außer uns Ärger zu machen."
 ep2_meiji_pulse.11.t: "Die [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]-Affäre"
 ep2_meiji_pulse.11.d: "Beim Geschäftemachen [SCOPE.sCountry('japan_scope').GetAltName('IN')] wurde ein [ROOT.GetCountry.GetAdjectiveNoFlag|l]er Händler namens [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] [Select_CString(SCOPE.sCharacter('daimyo_scope').IsFemale, 'von der örtlichen Fürstin', 'vom örtlichen Fürsten')] [SCOPE.sCharacter('daimyo_scope').GetFullName] ermordet. [Select_CString(SCOPE.sCharacter('daimyo_scope').IsFemale, 'Die Fürstin', 'Der Fürst')] rechtfertigte sich mit einem Verweis auf die Gesetze [Select_CString(SCOPE.sCharacter('daimyo_scope').IsFemale, 'ihres', 'seines')] Landes und wigerte sich, irgendeine Form von Wiedergutmachung für [Select_CString(SCOPE.sCharacter('daimyo_scope').IsFemale, 'ihr', 'sein')] Verbrechen zu leisten."
 ep2_meiji_pulse.11.f: "#b Kommentar#!\n\nUnter den gegebenen Umständen wiederholen wir, dass [ROOT.GetCountry.GetAltNameNoFormatting('NOM')] keine andere Wahl hat, als sich auf einen großen Krieg vorzubereiten oder sich von Japan zu verabschieden. Eine Aufgabe des dortigen Stützpunkts ist undenkbar, weswegen mit einem Streit zwischen den beiden Kaiserreichen zu rechnen ist. Viele [SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')] lehnen diese Vorstellung ab, doch wir als Redaktion ([ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]) halten sie nicht nur für unvermeidlich, sondern auch für gerechtfertigt, allein aufgrund der Weigerung der Japaner, die Attentäter von [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting] zu bestrafen … (#italic Fortsetzung auf S. 2#!)" #largely copied from The Anglo-Japanese War, New York Times, 1863
 ep2_meiji_pulse.11.a: "#italic Irgendjemand#! muss bezahlen. Bringt die Sache beim Tycoon vor."
 ep2_meiji_pulse.11.b: "Wollen wir uns im Osten wirklich noch stärker einbringen?"
