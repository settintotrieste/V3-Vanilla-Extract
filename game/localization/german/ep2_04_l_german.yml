 special_character_japanese_emperor_desc: "Dieser Charakter ist der amtierende Kaiser von Japan, was ihm eine zentrale Stellung in der religiösen wie politischen Ordnung einräumt."
 japan_monarchy.1.t1: "Die Kaei-Ära"
 japan_monarchy.1.t2: "Die Tenkyū-Ära"
 japan_monarchy.1.d1: "Prinz [SCOPE.sCharacter('emperor_scope').GetFirstName] hat den Chrysanthementhron als Kaiser von Japan bestiegen. [SCOPE.sCharacter('emperor_scope').GetCustom('DE_PRO_POS_S_3P')|U]e Besteigung stellt den Beginn der Kaei-Ära dar, die nach immerwährendem Glück benannt wurde."
 japan_monarchy.1.d2: "Prinz [SCOPE.sCharacter('emperor_scope').GetFirstName] hat den Chrysanthementhron als Kaiser von Japan bestiegen. [SCOPE.sCharacter('emperor_scope').GetCustom('DE_PRO_POS_S_3P')|U]e Besteigung stellt den Beginn der Tenkyū-Ära dar, die nach himmlischer Dauerhaftigkeit benannt wurde."
 japan_monarchy.1.f: "Aus dem Verborgenen gab ein Musiker das Zeichen. Zwei Hofdamen zogen die Vorhänge des Throns auf. Da stand der Kaiser, gekleidet in scharlachrote Gewänder, verziert mit weißen und grünen Drachen. Sie ließen seinen Sitz fast verschwinden, sodass er zu schweben schien. Ein Perlenvorhang hing von seiner Krone herab. Die Schatten, die sie warfen, verbargen seine Augen.\n\nDie Kleidung umraschelte [SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting], als [SCOPE.sCharacter('name_scope').GetCustom('DE_PRO_PER_S_3P_N')] sich verneigte. Die anderen Anwesenden warfen sich in einer großen Welle der Ehrfurcht nieder. [SCOPE.sCharacter('name_scope').GetCustom('DE_PRO_PER_S_3P_N')|U] tat es ihnen gleich, und das überschattete Gesicht des Kaisers war nun gar nicht mehr zu erkennen.\n\nTage später, auf dem Rückweg nach Edo, versuchte [SCOPE.sCharacter('name_scope').GetCustom('DE_PRO_PER_S_3P_N')], das Gesehene im Geiste nachzustellen, doch es gelang [SCOPE.sCharacter('name_scope').GetCustom('DE_PRO_PER_S_3P_D')] nicht. Er konnte sich an die Krone, die Vorhänge und die Kästchen neben dem Kaiser erinnern. Von dem Mann selbst blieb jedoch nichts mehr."
 japan_monarchy.1.a: "Die Zahl Eurer Jahre wird sein wie die der Sandkörner am Strand."
 japan_monarchy.2.t: "Die Meiji-Ära"
 japan_monarchy.2.d: "Prinz [SCOPE.sCharacter('emperor_scope').GetFirstName] hat den Chrysanthementhron als Kaiser von Japan bestiegen. [SCOPE.sCharacter('emperor_scope').GetCustom('DE_PRO_POS_S_3P')|U]e Besteigung stellt den Beginn der [SCOPE.sCharacter('emperor_scope').GetFirstName]-Ära dar, die nach dem Versprechen aufgeklärter Herrschaft benannt wurde."
 japan_monarchy.2.f: "Ein Gong ertönte, und der Vorhang hob sich. Für einen kurzen Augenblick erblickte das Publikum den Kaiser, gehüllt in reich verzierte gelbe Seide, das Gesicht halb verborgen. Zu seiner Linken ruhte auf einem Ständer eine grün lackierte Schatulle, die das heilige Schwert und das Juwel barg. Dann rief der Waffenmeister, und die Anwesenden senkten den Blick. Der Herold sprach mit fester, ruhiger Stimme:\n\n„Vor Urzeiten, im Zeitalter der Götter, wurden die Grundsteine des Reiches gelegt, und danach gründete der göttliche Kaiser in Kashihara die Kaiserdynastie. Die Kaiserlinie wird seither ununterbrochen fortgeführt. In Übereinstimmung mit den alten Bräuchen und dem Vorbild früherer Herrschaften treten Wir nun die Himmlische Thronfolge an und besteigen den Großen Kaiserthron.“" # Very heavily pared down excerpt of the rites at Meiji's enthronement
 japan_monarchy.2.a: "Die Zahl Eurer Jahre wird sein wie die der Sandkörner am Strand."
 japan_monarchy.3.t: "Die Taishō-Ära"
 japan_monarchy.3.d: "Prinz [SCOPE.sCharacter('emperor_scope').GetFirstName] hat den Chrysanthementhron als Kaiser von Japan bestiegen. [SCOPE.sCharacter('emperor_scope').GetCustom('DE_PRO_POS_S_3P')|U]e Besteigung stellt den Beginn der [SCOPE.sCharacter('emperor_scope').GetFirstName]-Ära dar, die nach dem Versprechen aufgeklärter Herrschaft benannt wurde."
 japan_monarchy.3.f: "Das Gelenk ächzte, als ein Mann am Gerüst vorbeiging. Yatarō hielt es so fest zusammen wie möglich. Kaum dass die Schritte verklungen waren, verriegelte er das Gelenk wieder mit seinem Hammer.\n\nUm ihn herum hörte er ähnliche Geräusche. Aus dem Augenwinkel sah er, wie eine andere Gruppe die Wände des Nachbargebäudes aus schwarzen Holzplanken errichtete. Ein Vorarbeiter rief einem Mann, der eine wackelige Last aus Stroh trug, Anweisungen zu.\n\nIn sechs Tagen würde der Kaiser den von Yatarō erbauten Gang durchschreiten: Teil einer einmaligen Zeremonie, die mit der Zerstörung eben jenes Gangs enden würde. Yatarō würde nicht dabei sein können. Bestenfalls konnte er darauf hoffen, den Glanz des Ganges in den Wolken widergespiegelt zu sehen."
 japan_monarchy.3.a: "Die Zahl Eurer Jahre wird sein wie die der Sandkörner am Strand."
 japan_monarchy.4.t: "Die Shōwa-Ära"
 japan_monarchy.4.d: "Prinz [SCOPE.sCharacter('emperor_scope').GetFirstName] hat den Chrysanthementhron als Kaiser von Japan bestiegen. [SCOPE.sCharacter('emperor_scope').GetCustom('DE_PRO_POS_S_3P')|U]e Besteigung stellt den Beginn der [SCOPE.sCharacter('emperor_scope').GetFirstName]-Ära dar, die nach dem Versprechen von Frieden und Eintracht benannt wurde."
 japan_monarchy.4.f: "Vier Generationen der Familie Takaishi drängten sich um das Radio. Die Stimme daraus erklang wie aus einem tiefen Brunnen und war von einem Rauschen durchzogen. Giyō drehte den Regler erst in die eine Richtung, dann in die andere. Als das Signal wieder zu hören war, war es stark und gleichmäßig.\n\n„… der Kabinettschef erließ ein Dekret, das die neue Ära verkündet. Von heute an beginnt die Ära des ersten Jahres von [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting] …“\n\nSeine Mutter warf einen Blick auf die Zeitung auf dem Küchentisch. „Nicht Kobun? Sagt er die Wahrheit?“\n\nGemurmel erfüllte den Raum, und Giyō drehte den Lautstärkeregler des Radios auf. Vergebens. Falls es noch etwas gab, musste er es morgen nachlesen."
 japan_monarchy.4.a: "Die Zahl Eurer Jahre wird sein wie die der Sandkörner am Strand."
 japan_monarchy.5.t: "Ein Kaiser, eine Ära"
 japan_monarchy.5.d: "Nach der Wiederherstellung der politischen Vorherrschaft des Kaiserhofs verkündete der Kaiser ein Edikt zur Reformierung des Ära-Systems. Eine neue Ära wird bei der Thronbesteigung eines neuen Kaisers ausgerufen und hat anschließend so lange Bestand, wie dieser Kaiser herrscht."
 japan_monarchy.5.f: "#bold Kaiserliches Edikt:#!\n\nDie Ausrufung einer neuen Ära nach dem Empfang des himmlischen Mandats durch den heiligen Herrscher stellt das beispielhafte Modell eines aufgeklärten Zeitalters und den Maßstab für zehntausend Generationen dar. Nachdem ich die große Dynastie geerbt und mich persönlich um die unzähligen Staatsgeschäfte gekümmert habe, ändere ich nun den Namen der Ära, um einen Neubeginn für die unzähligen Untertanen im Reich zu markieren. Dieses Jahr ([ROOT.GetCountry.GetCustom('JAP_era_year_name')]) soll fortan als das erste Jahr von [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting] bekannt sein. Von diesem Tag an wird das alte System reformiert, wobei der Grundsatz eines Äranamens pro Herrschaft als dauerhafte Praxis festgelegt wird." # Shortened 'One Emperor, One Era' edict - 今後年號ハ御一代一號ニ定メ慶應四年ヲ改テ明治元年ト爲ス及詔書
 japan_monarchy.5.a: "Jene an der Macht sollen es umsetzen."
 japan_monarchy.6.t: "Der Tod des Daijō Tennō"
 japan_monarchy.6.d: "Der Kaiser im Ruhestand, der zurückgetretene Vater des amtierenden Kaisers, ist verstorben. Man wird sich [SCOPE.sCharacter('retired_emperor_scope').GetCustom('DE_PRO_POS_S_3P')]er für die Bemühungen erinnern, das kaiserliche Ansehen wiederherzustellen, sodass [SCOPE.sCharacter('retired_emperor_scope').GetCustom('DE_PRO_PER_S_3P_D')] posthum der Name [SCOPE.sCharacter('retired_emperor_scope').GetFirstName] verliehen wurde."
 japan_monarchy.6.f: "Tōhō tauchte seinen Pinsel in die Tinte. Die Spitze glitt über das Papier und formte die Zeichen für Tag, Jahr und Wetter. Er wechselte zur nächsten Spalte und hielt inne.\n\nWelche Formulierung wäre angemessen? Wie ließ sich die Bedeutung des Geschehenen am besten ausdrücken? Er hatte Gerüchte über die großen Bemühungen des abgedankten Kaisers gehört, den Hof wiederherzustellen – Tōhō erinnerte sich an diese Regierungszeit und an die Berichte über die Zeremonien, die dieser Kaiser wiederbelebt hatte. Und dann hatte Tōhō den Gesandten des Hofes empfangen und die Wahrheit erfahren.\n\nDer Pinsel berührte das Papier. „Erhielt eine Anfrage nach einem Präzedenzfall bezüglich des Kaisertitels. Konsultierte den Kaiserlichen Stammbaum und erteilte Rat …“"
 japan_monarchy.6.a: "Werden seine Nachkommen seine Wünsche umsetzen können?"
