l_german:
 japan_politics.1.t: "Praktisches Lernen"
 japan_politics.1.d: "Die Öffnung [ROOT.GetCountry.GetAltName('VON')] löste die Schule der „Hollandkunde“ in weiten Teilen ab. Neuere Ideen verbreiten sich rasend schnell in der [ROOT.GetCountry.GetAdjectiveNoFormatting|l]en Gemeinde von Intellektuellen, darunter vor allem das sogenannte „praktische Lernen“."
 japan_politics.1.f: "„Das Wichtigste ist, dass jeder sein Verhalten nach den Grundsätzen der Menschlichkeit ausrichtet, eifrig studiert, um sich umfassendes Wissen anzueignen, und Fähigkeiten entwickelt, die zu seiner Nation passen. So wird die Regierung leichter regieren können und das Volk ihre Herrschaft bereitwillig annehmen, jeder seinen Platz finden und dazu beitragen, den Frieden des Landes zu bewahren. Dies sollte das einzige Ziel sein.“\n\n– Fukuzawa Yūkichi, „Eine Ermutigung zum Lernen“" # Translated by Eiichi Kiyooka
 japan_politics.1.a: "Reichtum durch Bildung."
 japan_politics.2.t: "Die großen Häuser"
 japan_politics.2.d: "Durch die Industrialisierung [ROOT.GetCountry.GetAltName('VON')] ist die IG „[SCOPE.gsInterestGroup('industrialists_ig').GetName]“ zu einer diversifizierten verarbeitenden Industrie geworden. Durch ihren Reichtum und ihre Bande zum Staat konnten sie weite Teile der grundlegenden Industrie unter ihrer Kontrolle vereinen."
 japan_politics.2.f: "Der Finanzminister beobachtete vom Balkon aus die Gebote der Börsenmakler. Zu Zeiten der Reisbörsen hätte man das Handelsschlusssignal gegeben, indem man einen Eimer Wasser in die Menge spritzte.\n\nNun war es ein Mann mit einem Hammer in der Hand, der auf die Uhr blickte. Unweit von seinem Schreibtisch, halb begraben von einem Meer von Maklern, die Anleihen mit sieben Prozent Zinsen erwarben, konnte er jemanden sehen, der einen Vertrag unterzeichnete – während er eine Anleihe im Mund hatte. Der Lärm war ohrenbetäubend, Käufe und Verkäufe verschmolzen zum Geräusch von Wellen, die an Felsen brachen.\n\nDie Uhr schlug, und der Mann am Schreibtisch drosch mit dem Hammer auf eine Bronzescheibe. Empörte Rufe erhoben sich aus der Menge, und das Getöse der Last-Minute-Geschäfte wurde nur noch lauter. Grummelnd beugte er sich unter seinen Schreibtisch und holte den Eimer."
 japan_politics.2.a: "Jetzt sollen die Bankiers herrschen."
 japan_politics.3.t: "Der gemeine Bürger"
 japan_politics.3.d: "Die Erosion des Edo-Klassensystems führte zum Aufstieg einer Zivilgesellschaft, die sich auf eine gemeinsame Nationalität gründet. Jene, die man einst als „[SCOPE.gsInterestGroup('pb_ig').GetName]“ bezeichnete, sehen sich nun vor allem als patriotische Bürger."
 japan_politics.3.f: "Shizo drehte langsam den Kopf hin und her und betrachtete seinen neuen Haarschnitt im Bronzespiegel. Er war kürzer als je zuvor, und der Dutt, den er schon immer getragen hatte, fehlte. Die Spitzen der frisch geschnittenen Haare fühlten sich dick und rau an, und er konnte nicht aufhören, sie zu berühren.\n\nEr schüttelte abrupt den Kopf und spürte, wie sich die Strähnen auf eine Weise bewegten, wie sie es noch nie zuvor getan hatten. Es war wie mit der neuen Kleidung mit den hohen Kragen, die am Hals kratzten. Unbequem, aber von Vorteil. Die neue Frisur setzte ein Zeichen und lockte Kunden in seinen Laden. Sein Geschäft war zivilisiert, und er war Steuerzahler, Wachmann, Staatsangehöriger – ein zivilisierter Mensch."
 japan_politics.3.a: "Der Stärke der Nation ist der Frieden ihrer Bürger."
