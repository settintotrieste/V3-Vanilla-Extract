 shogunate_strategy_title_decide_loc: "Reformstrategie beschließen"
 shogunate_strategy_title_revise_loc: "Reformstrategie überarbeiten"
 shogunate_strategy_title_decide_desc_loc: "Damit die Macht der Tokugawa erhalten bleibt, muss das Shogunat reformiert werden. Diese Reform kann zwei Wege einschlagen: Entweder versucht der Shōgun, die Legitimität des Bakufu durch eine Vereinigung mit dem Kaiserhof zu erneuern, oder er strebt eine kontrollierte Wiedereinsetzung des Kaisers an, um so selbst an die Spitze einer parlamentarischen Regierung zu gelangen."
 shogunate_strategy_title_revise_desc_loc: "Die gegenwärtige Reformstrategie des Shōgun erwies sich nicht unbedingt als vorteilhaft. Obwohl ein Kurswechsel Kosten verursachen wird, empfiehlt es sich, nicht an einem gescheiterten Kurs festzuhalten."
 je_meiji_restoration_proclaim_imperial_restoration: "Petition für eine Restauration des Kaisers"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "Der Kaiser bleibt der Souverän Japans. Ohne kaiserliche Legitimation ist der Shōgun lediglich der mächtigste Daimyō unter Hunderten. Das Überleben – oder der Untergang – des Schogunats hängt vom Willen des Kaiserhofs ab."
 imperial_restoration_kobu_gattai_loc: "Damit die Krise endet, muss ein Bund zwischen Shogunat und Hof geschaffen werden. Der Daimyō muss zu der Überzeugung gelangen, dass die Befehle des Shōgun kaiserliche Autorität besitzen und dass der Shōgun das volle Vertrauen des Hofes genießt. Um dieses Ziel zu erreichen, muss sich der Shōgun angreifbar machen und sich darauf verlassen, dass der Kaiser seine Autorität wiederherstellt.\n\nEin solches Vorhaben ist ein riskantes und schicksalhaftes Unterfangen: Sollte der Kaiserhof sich einer Mitarbeit verweigern, stünden die Tokugawa inmitten all ihrer rachsüchtigen Gegner vollkommen allein."
 imperial_restoration_kogi_yoron_loc: "Damit die Krise endet, muss der Kaiser herrschen. Soll die Macht der Tokugawa die Restauration überstehen, muss der Shōgun selbige nach seinen eigenen Vorstellungen durchsetzen. Der letzte Schritt der Reformen des Shōgun muss darin bestehen, dem Kaiser die Verwaltungsmacht zurückzugeben und seinem Clan eine neue Rolle innerhalb einer reformierten Regierung des Kaiserreichs zuzuweisen.\n\nEin solches Vorhaben ist ein riskantes und schicksalhaftes Unterfangen: Sollte der Kaiserhof sich einer Mitarbeit verweigern, stünden die Tokugawa inmitten all ihrer rachsüchtigen Gegner vollkommen allein."
 je_meiji_restoration_imperial_marriage: "Kaiserliche Heirat arrangieren"
 je_meiji_restoration_imperial_marriage_desc: "Das Projekt #b Kōbu Gattai#! erfordert eine Vereinigung im wortwörtlichen Sinne: eine politische Ehe zwischen dem amtierenden $RULER_TITLE_SHOGUN$ und einer kaiserlichen Prinzessin. Um diese Vereinigung umzusetzen, muss der $RULER_TITLE_SHOGUN$ beträchtliche Zugeständnisse machen, die der Kaiserhof einforderte."
