 ep2_meiji.1.t: "Sonnō Jōi"
 ep2_meiji.1.d: "Das Ende des Sakoku sorgt für ein Gefühl der Machtlosigkeit gegenüber fremdländischem Vordringen und untergräbt die Autorität des [ROOT.GetCountry.GetRuler.GetLastName]-Clans. Die Feinde des Schogunats haben sich unter dem Leitspruch #italic Sonnō Jōi#! versammelt: „Verehrt den Kaiser, vertreibt die Barbaren.“"
 ep2_meiji.1.f: "Im zweiten Stock eines Gasthauses in Kyōto, fernab jeglicher Fenster, saß ein Dutzend schwarz gekleideter Rōnin um einen Tisch. Draußen prasselte der Regen derart heftig herab, dass er den Straßenlärm übertönte. Die Versammelten tuschelten zornig untereinander: erst Beschwerden, dann Anklagen, dann ein Schwur und das Todesurteil gegen einen Eindringling.\n\nWeit entfernt, in einem Haus mit Blick auf Iso, beobachtete ein Mann in einem grünen Kimono eine Rauchsäule, die in den Himmel aufstieg. Die Hügel warfen lange Schatten auf die Gebäude am Ufer. Als die Sonne sich dem Horizont näherte, glühten die Öfen darunter immer kräftiger. Dahinter spiegelten sich im Wasser die Lichter von Schiffen. Eines Tages, so hoffte er, würde seine Kanone sie wieder hinter den Horizont verbannen."
 ep2_meiji.1.a: "Wir müssen uns an unsere neuen Umstände anpassen."
 ep2_meiji.2.t: "Die Form des Schogunats"
 ep2_meiji.2.d: "Die Schogunats-Reformer teilen sich in zwei regierungstheoretische Lager. Die Theorie des #italic Kōbu Gattai#! strebt nach einer Erneuerung der Legitimität des [GetLawType('law_bakufu').GetName] durch eine Verschmelzung mit dem Kaiserhof, während die Theorie der Öffentlichen Deliberation nach der Einrichtung eines Parlamentssystems strebt, dem der [SCOPE.sCharacter('shogun_scope').GetLastName]-Clan vorstehen soll."
 ep2_meiji.2.f: "Der Gastgeber stellte ein Tablett mit Higashi auf den Tisch und schenkte jedem Gast eine Schale dünnen Tee ein. Drei Männer saßen um den Tisch: der Gastgeber und der erste Gast mit zum Chonmage gebundenem Haar, der zweite mit kurzem Haar. Dampf stieg aus den Schalen vor ihnen auf.\n\nDer Gastgeber wandte seinen Blick dem Mann mit dem kurzen Haar zu und sprach:\n\n„Ich gratuliere Ihnen zu Ihrer Rückkehr, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]-#italic kun#!. Ich fand jeden neuen Ihrer Briefe noch interessanter als den vorherigen. Möchten Sie uns mehr über Ihre Zeit bei den Barbaren erzählen?“"
 ep2_meiji.2.a: "Das Bakufu muss erneuert werden."
 ep2_meiji.2.b: "Öffentliche Erklärungen sind das aufgeklärte Vorgehen."
 traditionalist_shogun_warning_tt: "@warning! [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'Eine', 'Ein')] [GetIdeology('ideology_traditionalist').GetName|l][Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'e', 'er')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] wird nicht gewillt sein, nach einer #b parlamentarischen Regierung#! zu streben"
 traditionalist_shogun_warning_present_tt: "[concept_ruler] hat #b keine#! [GetIdeology('ideology_traditionalist').GetName|l]e [concept_ideology]"
 ep2_meiji.3.t: "Die kaiserliche Heirat"
 ep2_meiji.3.d: "Der Kaiser willigte ein, eine Heirat zwischen [SCOPE.sCharacter('shogun_scope').GetFullName] und Prinzessin [SCOPE.sCharacter('imperial_princess_scope').GetFullName] zu arrangieren. Die Ehe verlangt vom Shōgun eine Ablehnung in Sachen [SCOPE.sTreaty('relevant_treaty_scope').GetName] und die Rückkehr zu einer isolationistischen Politik."
 ep2_meiji.3.d2: "Der Kaiser willigte ein, eine Heirat zwischen [SCOPE.sCharacter('shogun_scope').GetFullName] und Prinzessin [SCOPE.sCharacter('imperial_princess_scope').GetFirstName] zu arrangieren. Die Ehe verlangt vom Shōgun die Vertreibung der Fremden und die Rückkehr zu einer isolationistischen Politik."
 ep2_meiji.3.f: "Der Festzug umschloss ganz Nakasendō. Eine Prozession von dreißigtausend Arbeitern, Gefolgsleuten und Mitgliedern des Hofstaats der Prinzessin, bewacht von einer Soldatenkette der Domäne Owari, reichte von Iijima bis zum Bahnhof Shiojiri. Im Zentrum des Festzugs wurde die Prinzessin in einer Sänfte mit goldener und roter Seide getragen. Neben ihr ritten Samurai aus einem Dutzend Domänen: [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] und [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')] und [SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')] und [SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')].\n\nAus ihrer Sänfte blickte die Prinzessin durch den schmalen Spalt zwischen den Vorhängen. Stadt um Stadt zog still vorbei, die Fensterläden geschlossen. Sie würde die nächsten dreißig #italic Ri#! Zeit haben, über ihr Schicksal nachzudenken."
 ep2_meiji.3.a: "Zum Wohl des Landes"
 has_broken_relevant_treaty_tt: "Hat „[SCOPE.sTreaty('relevant_treaty_scope').GetName]“ gebrochen"
 ruler_does_not_have_imperial_marriage_tt: "[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName|U] ist gestorben oder in den Ruhestand gegangen"
 je_meiji_imperial_marriage: "Die kaiserliche Heirat"
 je_meiji_imperial_marriage_reason: "In [SCOPE.sCharacter('imperial_marriage_ruler').GetCustom('DE_PRO_POS_S_3P')]em Streben, Kaiserhof und Schogunat zu vereinen, sicherte sich Shōgun [SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] eine politische Ehe mit der kaiserlichen Prinzessin [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. Die Zustimmung des Kaisers zu dieser Ehe hängt von der Vertreibung aller Fremden von den [GetGeographicRegion('geographic_region_home_islands').GetName] sowie einer Rückkehr zu einer isolationistischen Politik ab.\n\nWenn der Shōgun seine Eide achtet, wird diese Ehe stark dazu beitragen, die Kluft zwischen Japans De-jure- und De-facto-Herrscher wieder zu schließen."
 je_will_fail_tt: "Der [concept_journal_entry] wird #b scheitern#!"
 je_has_timed_out_tt: "Der [concept_journal_entry] ist #b ausgelaufen#!"
 ep2_meiji.4.t: "Der [ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')]-Krieg"
 ep2_meiji.4.d: "Befremdet über den Raub [SCOPE.sCharacter('shogun_scope').GetCustom('DE_PRO_POS_S_3P')]er Ländereien und Titel erhoben sich [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('shogun_scope').GetFullName] und [SCOPE.sCharacter('shogun_scope').Custom('DE_PRO_POS_S_3P')]e treuen Gefolgsleute in einem Aufstand gegen den Kaiserhof. Sie trachten danach, der Wiederherstellung der kaiserlichen Macht ein Ende zu setzen und stattdessen das Bakufu wieder einzuführen."
 ep2_meiji.4.f: "„Euer Diener [SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting] prüfte die Lage seit dem neunten Tag des letzten Monats eingehend und stellte fest, dass keines dieser Ereignisse den wahren Absichten des Kaiserhofes entspringt, sondern einzig und allein den Verschwörungen der treulosen Minister von Fürst [SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting]. Dies ist im gesamten Reich bekannt, insbesondere in Edo, Nagasaki sowie den Provinzen Yashu und Sōshū, wo es zu Unruhen kam.\n\nDa diese Taten sowohl vom Himmel als auch vom Menschen nur mit Abscheu betrachtet werden, bitten wir Eure Majestät inständig, ein Dekret zur Auslieferung der genannten treulosen Minister zu erlassen. Sollte diesem Ersuchen nicht stattgegeben werden, bleibt uns keine andere Wahl, als mit ihrer Hinrichtung fortzufahren.“" # Edited petition by Yoshinobu
 ep2_meiji.4.a: "Dies ist unser Wunsch: Erschlagt den Verräter und stellt den Frieden wieder her." # Emperor Meiji's plausibly fraudulent imperial decree of 1867
 ep2_meiji.4.b: "Der Kaiser ist unter den Einfluss von Räubern geraten."
 ep2_meiji.41.d: "Erzürnt ob der Bemühungen des [SCOPE.sCharacter('shogun_scope').GetLastName]-Clans, an der Macht festzuhalten, erhob sich eine Koalition aus restaurativen Domänen in einem Aufstand gegen [SCOPE.sCharacter('shogun_scope').GetFullName]. Man trachtet danach, den politischen Primat des Kaisers wiedereinzuführen, frei vom Einfluss der Tokugawa."
 ep2_meiji.41.d_1: "Empört über die Weigerung der Regierung in [ROOT.GetCountry.GetCapital.GetCityHubName], die Ausländer auszuweisen, erhob sich eine Koalition sonnō-jōi-unterstützender Domänen in einem Aufstand. Sie wollen die verwestlichenden Berater des Kaisers absetzen und für die Vertreibung fremder Einflüsse aus Japan sorgen."
 ep2_meiji.41.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting|U] stand auf den Burgmauern und blickte hinab. Vor ihm marschierte Reihe um Reihe von [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')]-Soldaten durch die Tore. Manche waren modern gewandet und trugen die neuen Uniformen, dunkelblau mit spitzen Helmen. Andere trugen noch ihre traditionelle Tracht in Rot, Grün und Blau. Jene in den neuen Uniformen standen an der Spitze der Kolonne und ernteten anerkennende Blicke von der Gruppe ausländischer Beobachter, die einige Meter links von [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] Aufstellung bezogen hatte. Diesen Infanteristen folgten die berittenen Samurai mit ihren Gewehren und nach ihnen die Artillerie.\n\nAm Stadtrand von [SCOPE.sState('revolter_state').GetCityHubName] wartete der Sammelpunkt, wo sie sich mit den Streitkräften ihrer verbündeten Domänen treffen und gegen die Armee des Shōgun marschieren würden. In weiter Ferne, jenseits dieser Mauer aus Schwertern und Bajonetten, erwartete sie der gefangene Kaiser."
 ep2_meiji.41.f_1: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting|U] stand auf den Burgmauern und blickte hinab. Vor ihm marschierte Reihe um Reihe von [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')]-Soldaten durch die Tore. Manche waren modern gewandet und trugen die neuen Uniformen, dunkelblau mit spitzen Helmen. Andere trugen noch ihre traditionelle Tracht in Rot, Grün und Blau. Jene in den neuen Uniformen standen an der Spitze der Kolonne mit einem Regenbogen von Sansaibaori hinter ihnen. Danach kamen die berittenen Samurai mit ihren Musketen-Gewehren – und nach ihnen die Artillerie.\n\nAm Stadtrand von [SCOPE.sState('revolter_state').GetCityHubName] wartete der Sammelpunkt, wo sie sich mit den Streitkräften ihrer verbündeten Domänen treffen und gegen die Armee der Loyalisten marschieren würden. In weiter Ferne, jenseits dieser Mauer aus Schwertern und Bajonetten, erwartete sie der gefangene Kaiser."
 ep2_meiji.41.a: "Diese Fanatiker müssen zurückgeschlagen werden."
 ep2_meiji.41.b: "Sonnō jōi!"
 kinmon_civil_war_tt: "[ROOT.GetCountry.GetAltName('NOM')|U] wird in einen #r $concept_civil_war$#! zwischen #b Schogunat#! und #b Kaiserhof#! geraten"
 ep2_meiji.5.t: "Taisei Hōkan"
 ep2_meiji.5.d: "Angesichts wachsenden Drucks seitens der Gegner des [GetLawType('law_bakufu').GetName] ersuchte [SCOPE.sCharacter('shogun_scope').GetFullName] den Kaiser, [SCOPE.sCharacter('shogun_scope').GetCustom('DE_PRO_POS_S_3P')]e Regierungsautorität zurück an den Kaiserhof zu übergeben."
 ep2_meiji.5.f: "„Solange die Macht nicht wieder im Kaiserhof gebündelt ist, sind die Fundamente unserer Nation nicht zu erhalten. Daher müssen wir an diesem Scheideweg die alten Gepflogenheiten reformieren und die Verwaltung zurück an den Kaiserhof übertragen.\n\nNachdem ich sämtlichen öffentlichen Rat des Reiches einholte und Eure Majestät um Ihr endgültiges Urteil bat, bin ich der festen Überzeugung, dass wir unser Kaiserreich gemeinsam schützen und gleichberechtigt neben den Nationen der Welt bestehen können, wenn unser aller Herzen im Dienst der Nation im Gleichtakt schlagen.“\n\n– Tokugawa Yoshinobu, 1867"
 ep2_meiji.5.a: "Nichts als Luft unter seinen Füßen."
 ep2_meiji.51.t: "Die kaiserliche Sanktion"
 ep2_meiji.51.d: "Der Kaiser gab seine Antwort auf die Petition von [SCOPE.sCharacter('shogun_scope').GetFullName], die Regierungsautorität zurück an den Kaiserhof zu übertragen. Die Petition des Shōgun wurde akzeptiert und der politische Primat des Kaisers wiederhergestellt."
 ep2_meiji.51.f: "„Der Kaiser von Japan verkündet den Herrschern aller ausländischen Staaten und deren Untertanen, dass der Shōgun [SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] die Erlaubnis erhielt, die Regierungsgewalt auf eigenen Wunsch hin wieder zurückzugeben. Fortan werden wir die oberste Autorität in allen inneren wie äußeren Angelegenheiten des Landes ausüben. Folglich muss der Titel #italic Taikun#!, unter dem die bisherigen Verträge geschlossen wurden, durch den Titel des Kaisers ersetzt werden. Wir ernennen Beamte zur Führung unserer auswärtigen Angelegenheiten. Es ist wünschenswert, dass die Vertreter der Vertragsmächte diese Verkündung anerkennen.“"
 ep2_meiji.51.a: "Ein schrecklicher Nervenkitzel."
 ep2_meiji.52.t: "Die kaiserliche Sanktion"
 ep2_meiji.52.d: "Der Kaiser gab seine Antwort auf die Petition von [SCOPE.sCharacter('shogun_scope').GetFullName], die Regierungsautorität zurück an den Kaiserhof zu übertragen. Die Antwort besagt, dass der Shōgun nach wie vor das Vertrauen des Hofs besitzt und die Regierungsautorität beim Schogunat verbleiben kann."
 ep2_meiji.52.f: "Schwere Stiefelschritte hallten durch Schloss [ROOT.GetCountry.GetCustom('japan_choshu_castle_name')]. Den ganzen Tag waren Boten und Gefolgsleute in ihm ein und aus gegangen, um zunehmend genauere Nacherzählungen der Neuigkeiten der vergangenen Woche vorzutragen. [SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting|U] hatte sie höchstselbst empfangen, doch bei keinem der Treffen auch nur ein Wort verloren. Seine Stirn hatte sich in immer tiefere Falten gelegt, als er von den Entwicklungen hörte: vom Triumphzug des Shōgun und von den Aizu, die man als Wache für den Kaiserpalast zurückgelassen hatte.\n\nVor dem Palast war die Sonne bereits untergegangen. Von seiner Bühne aus blickte [SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting] auf die zwanzig versammelten Gefolgsleute hinab. „Die Domäne Chōshū wird sich nicht unterwerfen“, sagte [SCOPE.sCharacter('choshu_daimyo_scope').GetCustom('DE_PRO_PER_S_3P_N')]. „Begreift dies gut.“\n\nEr erhob sich und verließ den Raum."
 ep2_meiji.52.a: "Die Zweige umarmen ihn."
 ep2_meiji.6.t: "Das Dekret der Restauration"
 ep2_meiji.6.d: "Gegner des [SCOPE.sCharacter('shogun_scope').GetLastName]-Clans bei Hofe überredeten den Kaiser, einen Erlass herauszugeben, der seine eigene Macht formal wiederherstellt. Der Erlass schafft das Schogunat ab und richtet eine Regierung ein, die [SCOPE.sCharacter('shogun_scope').GetFullName] von jedem offiziellen Amt ausschließt."
 ep2_meiji.6.f: "„[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting|U] erbat die Wiederherstellung der seit Langem kommissarisch abgegebenen Verwaltungsgewalt und möchte nun vom Amt des Shōgun zurücktreten. Seinem Vorschlag wurde entsprochen. Das Land ist von unvergleichlichen Gefahren bedroht, mit denen sich der verstorbene Kaiser wie bekannt eingehend befasst hatte. Daher beschloss Seine Majestät in weiser Überlegung, den Grundstein für die Wiederherstellung der kaiserlichen Herrschaft und die Wiederbelebung der nationalen Würde zu legen.\n\nFortan gelten die Ämter des Sessho, des Kanpaku und des Shōgun als abgeschafft und die drei Ämter des Obersten Ratsherrn, des Staatsrats und des Palastrats werden eingerichtet. Alle Entscheidungen sollen durch eine vernünftige Beratung des Volkes getroffen werden, ohne Unterschied zwischen zivilen und militärischen Beamten oder Adeligen und Bürgern.“" #- Modifier text of the Great Proclamation of the Restoration of Imperial Rule
 ep2_meiji.6.a: "Allein in der Finsternis."
 ep2_meiji.7.t: "Das Taikunat"
 ep2_meiji.7.d: "Da dem Kaiserhof die praktische Erfahrung für das Regieren fehlt, überredeten Verbündete des [SCOPE.sCharacter('shogun_scope').GetLastName]-Clans am Hof den Kaiser, [SCOPE.sCharacter('shogun_scope').GetFullName] den Titel Taikun zu verleihen und [SCOPE.sCharacter('shogun_scope').GetCustom('DE_PRO_PER_S_3P_A')] somit zum Höchsten der kaiserlich eingesetzten Würdenträger zu machen."
 ep2_meiji.7.f: "„Wenn sich die verschiedenen Daimyō nach und nach versammeln, werden Beratungen stattfinden. Der Zeitgeist legt Wert auf öffentliche Deliberation – dieser Begriff ist in aller Munde –, und es war unumgänglich, der öffentlichen Meinung zu genügen. Daher bitte ich eindringlich darum, dass diese Diskussionen so weit wie möglich zu einer Einigung geführt und Maßnahmen ergriffen werden, um den Zweck der Versammlung ordnungsgemäß festzulegen.\n\nSollte es im Verlauf der Beratungen zu Zwietracht und Zwisten kommen, selbst wenn diese zu einem Sieg für das eigene Haus führen, wäre dies so, als würden Brüder innerhalb der Mauern streiten, während fremde Nationen uns von außen bedrängen.“\n\n– Nishi Shūsuke, „Entwurf der Tagesordnung“"
 ep2_meiji.7.a: "Wieder auf sicherem Boden."
 ep2_meiji.8.t: "Hof und Schogunat"
 ep2_meiji.8.d: "Durch die Heirat in die Kaiserfamilie und die Erfüllung der Eide gegenüber dem Kaiser linderte [SCOPE.sCharacter('shogun_scope').GetFullName] die Spannungen zwischen Hof und Schogunat. Der Kaiser kann sein zurückgezogenes Leben fortsetzen, im sicheren Wissen, dass der Shōgun für dauerhaften Frieden sorgen wird."
 ep2_meiji.8.f: "Selbst wenn stürmische Winde\nquer durch das Land fegen,\nwerde ich warten,\nbis die Sonne hoch am Himmel\nihren Glanz zurückerhält.\n\n– Kaiser Kōmei"
 ep2_meiji.8.a: "Der Sturm ist zu Ende gegangen."
 ep2_meiji.9.t: "Erster unter Gleichen"
 ep2_meiji.9.d: "Durch Selbstbewusstsein und geschickte Manöver führte [SCOPE.sCharacter('taikun_scope').GetFullName] die Wiedereinsetzung des Kaisers herbei und bewahrte auch noch den eigenen Clan. Die [SCOPE.sCharacter('taikun_scope').GetLastName]-Taikuns werden als Erste unter Gleichen in einem modernen $JAP$ regieren."
 ep2_meiji.9.f: "Der Kaiser saß nicht länger hinter einem Paravent. Seine Minister saßen vor ihm am Tisch, der Taikun zu seiner Linken. Jeder trug eine neue Hofuniform, Ärmel und Brust mit kunstvollen Goldblattornamenten verziert. Medaillen klirrten und raschelten, als die Würdenträger sich auf ihren ungewohnten Sitzen zurechtrückten.\n\nDer Taikun hatte die Diskussion die gesamte letzte Stunde über geleitet, ohne dass der Kaiser auch nur ein einziges Wort gesprochen hatte. Er hatte sich damit begnügt, zuzuhören und jedem Redner nacheinander seine Aufmerksamkeit zu schenken. Am anderen Ende des Raumes sprach ein ehemaliger #italic Sonnō-Jōi#!-Schüler über die Notwendigkeit einer Mission nach Amerika."
 ep2_meiji.9.a: "Der Schogun fällt, der Taikun erhebt sich."
 ep2_meiji.9.b: "Der Kaiser ist der Himmelssohn, und die Tokugawa sind seine Werkzeuge."
