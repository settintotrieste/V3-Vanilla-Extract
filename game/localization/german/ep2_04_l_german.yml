 ep2_meiji_pulse.2.t: "Das Bombardement von [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]"
 ep2_meiji_pulse.2.d: "Als Vergeltung für die Weigerung der Domäne [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')], eine Entschädigung für den Tod von [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] zu zahlen, lieferten sich [SCOPE.sCountry('relevant_gp').GetAdjective|l]e Marineschiffe ein mehrtägiges Artillerieduell mit der Küstenbefestigung von [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]."
 ep2_meiji_pulse.2.f: "Die Bucht lag im Dunst des Kanonenfeuers, und [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] brannte. Jenseits des Wassers feuerte eines der ausländischen Schiffe Raketen auf die Gießereien im Norden der Stadt. Mit jedem Abschuss überstrahlte ein höllisches rotes Leuchten das schwache Licht der untergehenden Sonne.\n\nDie letzte funktionstüchtige Kanone der Batterie von [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] donnerte – schon unter guten Bedingungen ein Schuss aus großer Entfernung und nun völlig hoffnungslos. Die Kugel schlug mehrere Schiffslängen vom dritten Schiff der ausländischen Kolonne entfernt ein und schleuderte eine gewaltige Wasserfontäne in die Luft. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting|U] schnappte sich den Schwamm und eilte herbei, um sich um die Kanone zu kümmern. Irgendwo hinter der Rückwand schrien die vom letzten Beschuss Verwundeten noch immer. Trotz des Klingelns in den Ohren konnte man sie dennoch noch hören."
 ep2_meiji_pulse.2.a: "Ein harscher Preis für ihren Leichtsinn."
