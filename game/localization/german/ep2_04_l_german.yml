 ig_in_pro_country_lobby_tt: "[concept_interest_group] ist in einer freundlichen [concept_political_lobby]"
 iwakura_mission.1.t: "Mission nach Westen"
 iwakura_mission.1.d: "Die Regierung stellte eine Liste aus mehreren Ministern und Beamten zusammen, die sich für die Rolle als Sonderbotschafter und Bevollmächtigter eignen würden. Der ausgewählte Kandidat wird eine Expedition nach Westen anführen, die vermutlich 10 Monate dauert."
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting|U] stand vor dem Spiegel und überprüfte den Sitz [SCOPE.sCharacter('expedition_leader_1').GetCustom('DE_PRO_POS_S_3P')]er Krawatte. Es war schon einige Zeit her, dass sie nach Japan gekommen war, anfangs nur als Mode, dann als staatliche Anordnung, doch natürlich fühlte sie sich noch nicht an. [SCOPE.sCharacter('expedition_leader_1').GetCustom('DE_PRO_PER_S_3P_N')|U] würde damit zurechtkommen müssen. Sollte es bei diesem Handel einen Durchbruch geben, falls die Regierung [SCOPE.sCharacter('expedition_leader_1').GetCustom('DE_PRO_POS_P_2P_N')]e Bewerbung annahm und er irgendwann in London und Boston und Paris aufwachte, würde selbst das Ende eines Tages ihm keine Ruhe mehr bringen."
 iwakura_mission.1.a: "Diese Angelegenheit erfordert die Aufmerksamkeit von [SCOPE.sCharacter('expedition_leader_1').GetFullName]."
 iwakura_mission.1.b: "Ernennen wir [SCOPE.sCharacter('expedition_leader_2').GetFullName] für dieses Amt."
 iwakura_mission.1.c: "Auf [SCOPE.sCharacter('expedition_leader_3').GetFullName] können wir uns verlassen."
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName|U] könnte diese Gelegenheit zuträglich sein."
 iwakura_mission.2.t: "Der [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]-Bericht"
 iwakura_mission.2.d: "Nach der Rückkehr der [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]-Mission nach $JAP$ legten [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] und [ROOT.Var('expedition_leader_storage_var').GetCustom('DE_PRO_POS_P_2P_N')]e Mit-Botschafter der gesetzgebenden Instanz ([SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]) ihre Berichte vor. Sie enthalten Beobachtungen in Bezug auf eine Industriegesellschaft sowie Empfehlungen für neue staatliche Politlinien."
 iwakura_mission.2.f: "„Bei genauerer Betrachtung wird deutlich, dass der Erfolg europäischer und amerikanischer Nationen auf der korrekten Anwendung ihrer Prinzipien beruht. Wer die Welt bereist, stellt fest, dass sich die Regierungsstrukturen der untersuchten Länder zwar unterscheiden mögen, doch all ihre Kräfte sind auf die Bildung ausgerichtet, was sie unter einem gemeinsamen Banner vereint. So findet man in keinem dieser Länder einen Ort ohne Schulen und keinen Menschen ohne den Geist der Aufklärung.“\n\n– Tanaka Fujimaro"
 iwakura_mission.2.a: "Der Westen bietet uns ein Fenster in die Moderne."
 iwakura_mission.2.b: "Industrie nach [SCOPE.sCountry('iwakura_good_economy_country').GetAdjective|l]em Vorbild wird die Zukunft von Japan sein."
 iwakura_mission.2.c: "Wir können viel von der [SCOPE.sCountry('iwakura_desired_law_country').GetAdjective|l]en Politik lernen."
 iwakura_mission.2.e: "Eine Landreform nach [SCOPE.sCountry('iwakura_land_reform_law_country').GetAdjective|l]em Muster wird dem Land neues Leben einhauchen."
 iwakura_mission.4.t: "Das Goldene Tor"
 iwakura_mission.4.d: "Nach einer langen Seereise ist die [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]-Mission [SCOPE.sCountry('iwakura_mission_host').GetAltName('IN')] eingetroffen. Die Mission plant, per Zug nach [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName] zu reisen und auf dem Weg [SCOPE.sCountry('iwakura_mission_host').GetAdjectiveNoFormatting|l]e Einrichtungen und Industrieanlagen zu besichtigen."
 iwakura_mission.4.f: "„Im Morgengrauen war der Seenebel so dicht, dass wir kaum ein paar Meter weit sehen konnten, und das Schiff hielt an, um den Tagesanbruch abzuwarten. Als es hell wurde, lichtete sich der Nebel allmählich, und vor uns erschien die Küste Kaliforniens. Nach einiger Zeit erreichten wir die Mitte zweier felsiger Landzungen, wo sich die Berge zu beiden Seiten hoch erhoben. Sie reichten bis zum Meer, und man konnte den Rauch von Dampfschiffen hin und her ziehen sehen. Diese wunderschöne Szenerie wird das Goldene Tor genannt.\n\nZweiundzwanzig Tage lang hatten wir den Ozean überquert, und endlich erblickten wir hier im Osten zum ersten Mal Berge und Wasser. Als wir dies sahen, war da nichts als Freude.“\n\n– Kume Kunitake, #italic Die Iwakura-Botschaft, 1871-73#!"
 iwakura_mission.4.a: "Das Wissen eines ganzen Kontinents liegt vor uns."
 iwakura_mission.4.b: "Amerika ist nur das Tor nach Europa."
 iwakura_mission.5.t: "Der Bauch des Wals"
 iwakura_mission.5.d: "Nachdem sie vom Pazifik zum Atlantik gereist ist, traf die [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]-Mission nun [SCOPE.sCountry('iwakura_mission_host').GetAltName('IN')] ein. Sie will diplomatische Beziehungen zur [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle]-Regierung aufnehmen und die Ausgangpunkte der industriellen Revolution besuchen."
 iwakura_mission.5.f: "„Mit dem wirtschaftlichen Aufschwung Amerikas blühte auch der Hafen von Liverpool immer mehr auf. Am Hafeneingang errichtete man eine Reihe von Anlegern, die sich über sechs Meilen entlang des Nordufers erstreckte. Seeseitig schüttete man Steinwälle wie Burgmauern auf, und innerhalb von ihnen hob man auf allen Seiten Docks aus. Alle ein- und auslaufenden Schiffe ankern dort. Ihre Masten gleichen einem dichten Wald, und die Takelage ähnelt Netzen, die in einem Fischerdorf zum Trocknen aufgehängt sind. Dies, so wurde uns berichtet, seien die größten Docks der Welt.“\n\n– Kume Kunitake, #italic Die Iwakura-Botschaft, 1871-73#!"
 iwakura_mission.5.a: "Folgt jeder Spur, die sich uns bietet."
 iwakura_mission.5.b: "Zwei Monate reichen, um ganz [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName] zu sehen."
 iwakura_mission.6.t: "Quer über den Kontinent"
 iwakura_mission.6.d: "Die [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]-Mission ist in Kontinentaleuropa eingetroffen, wobei man [SCOPE.sCountry('iwakura_mission_host').GetAltName('IN')] beginnt. Über die nächsten Monate wird man beobachten, begutachten und Beziehungen zu zahlreichen Nationen des Kontinents aufbauen."
 iwakura_mission.6.f: "„Heute Nachmittag besuchten wir einen Friedhof, dessen Namen wir leider nicht erfragten. Er liegt am östlichen Stadtrand von Paris und erstreckt sich über ein Gebiet von 40 Morgen. Abgesehen von einer einzigen breiten Zufahrtsstraße ist kaum Platz.\n\nHeute fand die Beerdigung einer Familie statt, die offenbar aus einfachen Verhältnissen stammte. Ein kleiner Trauerzug begleitete einen Holzsarg, der in ein Grab hinabgelassen wurde. Als der Priester das Gebet beendet hatte, streuten die Anwesenden unter Tränen jeweils eine Handvoll Erde in das Grab. Obwohl alle im Trauerzug Tränen in den Augen hatten, erhob niemand laut die Stimme zur Klage.“\n\n– Kume Kunitake, #italic Die Iwakura-Botschaft, 1871-73#!"
 iwakura_mission.6.a: "Wir werden uns die Zeit nehmen, um zu vergleichen und zu kontrastieren."
 iwakura_mission.6.b: "Der Zeitplan erfordert eine beschleunigte Begehung."
 iwakura_mission.8.t: "Die andere Hälfte"
 iwakura_mission.8.d: "Auf dem Weg [ROOT.GetCountry.GetAltName('NACH')] legte die [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]-Mission einen Halt in der [SCOPE.sCountry('iwakura_mission_host').GetAdjective|l]en Kolonie [SCOPE.sState('iwakura_mission_location').GetName] ein. Die Mission verbrachte mehrere Tage damit, die europäische Kolonialgesellschaft sowie die einheimischen [GetReligion('theravada').GetNameNoIcon|l]en Praktiken in Augenschein zu nehmen."
 iwakura_mission.8.f: "„Bei unserem Besuch hier wurden wir von einem Mönch herumgeführt, der uns #italic danna#! und den Tempel #italic garan#! nannte. Wir waren beeindruckt, dass der Sanskrit-Ursprung dieser Wörter bis heute erhalten geblieben ist. Ceylon ist ein heiliges Land der buddhistischen Praxis, und die einheimische Bevölkerung ist dem Buddhismus nach wie vor treu ergeben. Wenn das Leben der Menschen ohnehin schon einfach ist, ist das Leben der Mönche noch einfacher. Ihre Mahlzeiten sind karg, ihre Einsiedeleien von Unkraut überwuchert, und alles ist von äußerster Schlichtheit geprägt.\n\nVerglichen mit den heiligen Stätten des Christentums oder des Islam ist der Kontrast frappierend. Liegt es daran, dass diese Religion weltliche Ausschmückungen abgelegt hat? Vielleicht. Doch es mag auch daran liegen, dass ihr die Kraft zum Gedeihen fehlt.“\n\n– Kume Kunitake, #italic Die Iwakura-Botschaft, 1871-73#!"
 iwakura_mission.8.a: "Könnte uns dieses Schicksal auch widerfahren sein?"
 iwakura_mission.9.t: "Hafen von Yokohama"
 iwakura_mission.9.d: "Nach Monaten in der Fremde und einer vollständigen Umschiffung des Globus ist die [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]-Mission [ROOT.GetCountry.GetAltName('NACH')] zurückgekehrt. Sie bringt zusammengetragene Daten, fremdländische Waren und Berichte aus erster Hand über westliche Techniken und politische Institutionen mit."
 iwakura_mission.9.f: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting|U] stand auf dem Deck des Dampfers und schaute nach Westen. In der Ferne sah [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetCustom('DE_PRO_PER_S_3P_N')] die ungeheure Weite des Fuji, eingehüllt in morgentlichen Nebel, der gerade erst aufgestiegen war. Ein Klüngel Westler – Händler oder vielleicht auch taufrische Weltreisende wie [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetCustom('DE_PRO_PER_S_3P_N')] selbst – drängten sich an der Reling. Ein Deutscher saß auf einer Bank an der Kabinentür und zeichnete auf einem Skizzenblock. [ROOT.Var('expedition_leader_storage_var').GetCustom('DE_PRO_PER_S_3P_N')|U] fragte sich, ob es sein erstes Mal hier war und ob auch ihm der Atem stockte bei diesem Ausblick.\n\nWie viele konnten wirklich für sich in Anspruch nehmen, das getan zu haben, was er getan hatte? Wie viele hatten drei Ozeane überquerten? Vier Kontinente besucht? Es würden mehr und mehr werden, dachte [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetCustom('DE_PRO_PER_S_3P_N')]. Eisenbahnen und Dampfer würden immer mehr Menschen wie [ROOT.Var('expedition_leader_storage_var').GetCustom('DE_PRO_PER_S_3P_A')] schaffen, doch die Geschichte würde sich an [Select_CString(ROOT.Var('expedition_leader_storage_var').GetCharacter.IsFemale, 'an sie als die Erste', 'an ihn als den Ersten')] erinnern."
 iwakura_mission.9.a: "Die Heimat ist doch der schönste Anblick von allen."
 je_iwakura_mission: "Restauration: Der [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]-Bericht"
 je_iwakura_mission_reason: "Im Zuge ihrer Modernisierungsmaßnahmen entsandte die neue Regierung [ROOT.GetCountry.GetAltName('VON')] [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] und eine große Delegation von Ministern und Gelehrten auf eine diplomatische Mission in die westliche Welt. Die [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]-Mission hat zum Ziel, ungleiche Verträge mit dem Westen neu zu verhandeln und die politischen und technischen Grundlagen der Großmächte zu untersuchen.\n\nFür jeden #b Monat#!, den die Mission in einem Land verweilt, besteht die Möglichkeit, dass sie Erkenntnisse über die Gesetze oder Technologien dieses Landes sammelt. Diese Erkenntnisse fließen in den Bericht der Mission nach ihrer Rückkehr sowie in die [concept_ideology] der Expeditionsleitung ein."
