 two_more_more_company_slots_tt: "Kann mehr als [SCOPE.ScriptValue('je_zaibatsu_company_slots_threshold')|v0] [Concept('concept_company','$concept_companies$')] gründen"
 glossary_zaibatsu: "Ein #b #italic Zaibatsu#!#! ist ein vertikal integriertes Industrie- und Finanzkonglomerat.\n\nEin üblicher Zaibatsu organisiert sich um eine Holdinggesellschaft und eine Bank, die Anteile an mehreren Tochterfirmen halten, die üblicherweise aus dem Industriesektor stammen. Zaibatsu entstanden aus den Konglomeraten der Händlerfamilien in der Edo-Zeit, die ihren vorhandenen Reichtum und ihre Verbindungen zum Staat nutzten, um ihre Kontrolle über weite Teile der japanischen Industrie zu festigen."
