 ep2_meiji_pulse.3.t: "Der Shimonoseki-Krieg"
 ep2_meiji_pulse.3.d: "[SCOPE.sCharacter('choshu_daimyo_scope').GetFullName|U], Daimyō der Domäne Chōshū, signalisierte Bereitschaft, sich dem Befehl des Kaisers zur Ausweisung von Fremden zu fügen. [SCOPE.sCharacter('choshu_daimyo_scope').GetCustom('DE_PRO_PER_S_3P_N')|U] trug [SCOPE.sCharacter('choshu_daimyo_scope').GetCustom('DE_PRO_POS_S_3P')]er Flotte auf, alle fremden Schiffe unter Beschuss zu nehmen, die die Straße von Shimonoseki passieren. Dies löste einen Schusswechsel mit einem [SCOPE.sCountry('relevant_gp').GetAdjective|l]en Kriegsschiff aus."
 ep2_meiji_pulse.3.f: "Donner grollte am helllichten Tag am sanften Hang des Hinoyama, und Masatake blickte zum Himmel. Er sah eine bauschige, weiße Wolke.\n\n„Schau!“, rief Jiro. Eine Hand tauchte in seinem Blickfeld auf und deutete nach unten. Ein Schiff raste mit voller Kraft durch die Meerenge unter ihm, die Kanonen auf etwas gerichtet, was Masatake nicht sehen konnte. Splitter flogen vom Rumpf, doch das Schiff fuhr weiter. Über allem wuchs eine weitere Wolke."
 ep2_meiji_pulse.3.a: "Die Fremden tun, was wir nicht können."
 ep2_meiji_pulse.3.b: "Unterstützt die Domäne dabei, eine Klärung zu erreichen."
 ep2_meiji_pulse.3.c: "Bietet den Westlern einen Hafen im Austausch für eine Übereinkunft an."
 treaty_name_shimonoseki_war_indemnity: "Entschädigung für den Shimonoseki-Krieg"
 modifier_defeated_westerners: "Besiegte westliche Expedition"
 modifier_bombardment_of_domain: "Bombardierter Domänensitz"
 ep2_meiji_pulse.4.t: "Der Brand bei der [SCOPE.sCountry('relevant_gp').GetAdjective|l]en Gesandtschaft"
 ep2_meiji_pulse.4.d: "#italic Sonnō-Jōi#!-Samurai aus der Domäne [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] unternahmen einen Angriff auf das im Bau befindliche [SCOPE.sCountry('relevant_gp').GetAdjective|l]e Gesandtschaftsgebäude in [SCOPE.sState('edo_state').GetCityHubName]. Was das erste Gebäude der Stadt im westlichen Stil gewesen wäre, ist vollständig abgebrannt, und die Schuldigen sind nirgendwo zu sehen."
 ep2_meiji_pulse.4.f: "Zwei Männer, vermummt und maskiert, hatten sich auf dem Hügel niedergelassen, der den ehemaligen Gesandtschaftsrat überblickte. Ein gelbroter Schein stieg noch immer von der nun geschwärzten Ruine auf. Nachdem alles leicht Brennbare erloschen war, mühten sich die Flammen an den dicken inneren Balken.\n\nAls der Schein verglomm, blieben die beiden Männer an Ort und Stelle. Einer sprach leise und starrte auf die Rauchsäule, die noch immer aufstieg:\n\n„Wäre es nicht wunderschön, wenn die Asche wie Schnee auf uns herabfiele?“"
 ep2_meiji_pulse.4.a: "[SCOPE.sState('edo_state').GetCityHubName|U] ist unregierbar geworden."
 ep2_meiji_pulse.4.b: "Verbietet den [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')], in der Stadt Waffen zu tragen."
 shimonoseki_indemnity_tt: "[ROOT.GetCountry.GetAltName('NOM')|U] zahlt eine Entschädigung von @money!#v 3M#! über #v 10 Jahre#! an [SCOPE.sCountry('relevant_gp').GetAltName('AKK')]"
 shimonoseki_indemnity_port_tt: "Die Stadt $HUB_NAME_STATE_KANSAI_port_japanese$ in [GetStateRegion('STATE_KANSAI').GetName] wird als [SCOPE.sCountry('relevant_gp').GetAdjective|l]er [concept_treaty_port] geöffnet"
 modifier_ungovernable_capital: "Eingestandene Unregierbarkeit"
 ep2_meiji_pulse.5.t: "Eine blutige Rache"
 ep2_meiji_pulse.5.d: "Der oberste Minister des Schogunats [SCOPE.sCharacter('tairo_scope').GetFullName] wurde am Tor von Burg Edo von Rōnin der Domänen [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] und [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] ermordet. Das von den Meuchlern hinterlassene Manifest bringt Prinzipien der #italic Sonnō Jōi#! zum Ausdruck und verurteilt die Zugeständnisse, die der Minister Fremden machte."
 ep2_meiji_pulse.5.f: "Chuzaburo sah, wie Gorokuro vor die Prozession trat und eine der [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')]-Wachen ihn abfangen wollte. Gorokuro ließ ihm keine Zeit, um zu reagieren: Er zog das Schwert und stieß zu. Blut spritzte in hohem Bogen aus dem entzweigeschlitzten Gesicht des Mannes, und seine Gefährten stürmten vor, um ihn zu rächen.\n\nChuzaburo schüttelte den Regenmantel ab und zückte die Pistole. Er zielte auf die ungeschützte Seite der Sänfte und drückte ab. Der Knall eines Schusses übertönte das Klirren der Klingen und das Geschrei, dann folgte ein weiterer. Eine der Wachen wirbelte herum, um sich ihm entgegenzustellen, und Jizaemon, der Rōnin aus [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], schwang das Schwert auf den Oberkörper des Mannes herab. Hinter dem streitenden Paar sah Chuzaburo, wie etwas Rotes durch die Türen der Sänfte auf die verschneite Straße floss. Er zog das Wakizashi und rannte darauf auf die Sänfte zu."
 ep2_meiji_pulse.5.a: "Die Samurai kreuzen wieder einmal die Klingen."
 modifier_tairo_assassinated: "Attentat auf den Tairō"
 ep2_meiji_pulse.6.t: "Der Ikedaya-Vorfall"
 ep2_meiji_pulse.6.d: "Geleitet von Informationen, die man durch die Folter eines militanten Mitglieds der [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] gewonnen hatte, führte die [GetLawType('law_shinsengumi').GetName] eine Razzia bei einer Versammlung angeblicher Verschwörer im Gasthaus Ikedaya in [SCOPE.sState('kyoto_state').GetName] durch. Die Razzia verwandelte sich in ein wildes Hauen und Stechen mit Schwertern im Gasthaus und dessen näherer Umgebung."
 ep2_meiji_pulse.6.f: "Otaka stemmte sich gegen das Geländer, als die Shinsengumi durch die Tür stürmten. Im schwachen Lampenlicht sahen die Blutflecken auf den Ärmeln ihrer hellblauen #italic Haori#! wie Schwarz auf Weiß aus. Er hob das Schwert in einer Abwehrhaltung.\n\nZwei der Männer lösten sich von den anderen und stürmten nebeneinander das Treppenhaus hinauf, das er bewachte. Er stieß mit der Klinge zu, spürte, wie der Schlag pariert und ausgeglichen wurde. Funken sprühten ob des Aufpralls. Der zweite Mann holte zum Schlag aus. Er wich einen Schritt zurück, drehte das Handgelenk –\n\nDa war ein Blitzen von feurigem Stahl, und dann durchfuhr ihn ein kalter Schauer in der Brust."
 ep2_meiji_pulse.6.a: "Belohnt die Shinsengumi für ihre Initiative."
 ep2_meiji_pulse.6.b: "Diese Brutalität lädt nur zur Vergeltung ein."
 modifier_shinsengumi_meddling: "Grassierende Shinsengumi"
 modifier_shinsengumi_crackdown: "Shinsengumi-Razzia"
 modifier_refrained_from_crackdowns: "Gezügelte Shinsengumi"
 sufficient_pressure_from_sonno_joi_tt: "[concept_activism] der [SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')] liegt über @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!)"
 ep2_meiji_pulse.7.t: "Das verbotene Tor"
 ep2_meiji_pulse.7.d: "Soldaten der Domäne [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], die auf einer Linie mit der [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] liegen, versuchen, den Kaiserpalast in [SCOPE.sState('kyoto_state').GetName] zu stürmen und den Kaiser mit Gewalt wieder einzusetzen. Ihnen stehen Soldaten der Domänen [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] und Aizu gegenüber."
 ep2_meiji_pulse.7.f: "Das Hamaguri-Tor erstickte in Pulverdampf. Ringsum fing Kyōto Feuer.\n\nDie Aizu-Soldaten hatten sich entlang der Mauer konzentriert und feuerten Salven aus Musketen ab, deren Kugeln von der Straße und den Geschützen der [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]-Kanonen abprallten. Alle paar Sekunden traf eine Kugel Fleisch und sorgte für Schreie, die kurz das Knattern der Schüsse übertönten. Kōzō kauerte am Rad einer Kanone und mühte sich, seine Muskete von einer Ladehemmung zu befreien. Kaum einen #italic Ken#! entfernt lag der Anführer seiner Einheit mit dem Gesicht nach unten, ohne Beine und Arme. Irgendwie wand er sich noch immer."
 ep2_meiji_pulse.7.a: "Den [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] und Aizu gelingt es, die Angreifer abzuwehren."
 ep2_meiji_pulse.7.b: "Der Kaiserpalast gerät unter die Kontrolle von [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]."
 coup_resistance_below_daimyo_coup_strength_tt: "Der [concept_coup_resistance] [ROOT.GetCountry.GetAltName('VON')] ([SCOPE.ScriptValue('country_coup_resistance')|v2]) liegt unter der [concept_coup_strength] von [SCOPE.sCharacter('daimyo_1_scope').GetFullName] ([SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2])"
 ep2_meiji_pulse.8.t: "Die [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]-Expedition"
 ep2_meiji_pulse.8.d: "Als Vergeltung für den Sturm der [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] auf den Kaiserpalast befahl der Shōgun eine Strafexpedition, um die #italic Sonnō-Jōi#!-Fraktion aus der Domäne zu vertreiben. Berater, die den [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] mitfühlender gegenüberstehen, stellten einen Plan vor, um den Frieden zu sichern, wenn die Schuldigen Seppuku begehen."
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting|U], Daimyō von [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], stand auf dem Balkon der Burg und blickte in die Ferne, wo der Himmel von Rauchschwaden verhangen war – den Lagerfeuern der herannahenden Armee.\n\n„Der Shōgun fordert Seppuku für die drei ranghöchsten Gefolgsleute“, sagte der Gefolgsmann. „Die Enthauptung der vier Stabsoffiziere. Die Verbannung der fünf Minister.“\n\nEr schaute zu den Lagerfeuern. Es waren Hunderte … wenn nicht gar Tausende. Der einst blaue Horizont hatte sich in etwas Unheilvolles verwandelt. Schließlich sprach er.\n\n„… die Domäne [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] wird sich unterwerfen.“"
 ep2_meiji_pulse.8.a: "Wenn man sie ohne Kampf besiegen kann, dann sei dem so."
 ep2_meiji_pulse.8.b: "Die Domäne muss gründlichst gesäubert werden."
 modifier_daimyo_house_arrest: "Beschränkter Daimyō"
 modifier_daimyo_executed: "Enteigneter Daimyō"
 ep2_meiji_pulse.9.t: "Der Befehl der Barbarenausweisung"
 ep2_meiji_pulse.9.d: "Erzürnt über die Verträge, die [ROOT.GetCountry.GetAltName('DAT')] von den westlichen Mächten aufgezwungen wurden, setzte sich der Kaiser über den Shōgun hinweg und gab ein Edikt heraus, um Fremde von [ROOT.GetCountry.GetAdjectiveNoFormatting|l]em Grund und Boden auszuweisen. Militante Mitglieder der [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] scharen sich um die Sache des Kaisers."
 ep2_meiji_pulse.9.f: "Der Gefolgsmann stand neben einer der Kanonen und blickte hinaus auf die Meerenge. Um diese Stunde zeichneten sich die vorbeifahrenden Schiffe als Silhouetten vor der untergehenden Sonne ab. Etwas abseits waren die niederen Samurai des Chōshū-Lehens mit Ladestöcken und Beuteln mit Schwarzpulver beschäftigt.\n\nAls er zu den Umrissen der Burg Hinoyama und der Stadt Shimonoseki unter ihr aufblickte, kam ihm eine Passage aus dem Edikt in den Sinn: „Selbst wenn das Land zu Asche verbrannt würde“, hatte da gestanden, „werden wir die Öffnung der Häfen für den Handel nicht zulassen.“\n\nWar das gerechtfertigt? Würde er zulassen, dass man den sanften, grünen Hang schwarz versengte, die Blumenfelder verbrannte und sein Zuhause dem Erdboden gleichmachte? Ja, dachte er. Ohne jedes Zögern."
 ep2_meiji_pulse.9.a: "Der Shōgun muss nach Kyoto reisen, um das zu besprechen."
 ep2_meiji_pulse.9.b: "Dieser Befehl ist betrügerisch – lasst ihn unterdrückt."
 sonno_joi_more_events_tt: "Untreue Domänen könnten beginnen, #r radikale Maßnahmen#! zur Ausweisung Fremder zu ergreifen"
 modifier_shogun_trip_to_kyoto: "Nach Kyoto gerufener Shōgun"
 modifier_shogun_snubbed_emperor: "Missachteter kaiserlicher Befehl"
