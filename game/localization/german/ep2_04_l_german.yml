 zaibatsu.1.t: "Das Konzernreich"
 zaibatsu.1.d: "Die andauernde Partnerschaft zwischen [ROOT.GetCountry.GetAdjective|l]em Staat und den [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] zementierte die Macht der Konglomerate über die Legislative ([SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]). Die Politiker mögen regieren, doch die Generäle und Geschäftsführer werden herrschen."
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting] schaute aus [SCOPE.sCharacter('pm_scope').GetCustom('DE_PRO_POS_S_3P')]er verhangenen Loge hinunter: [SCOPE.sCharacter('pm_scope').GetCustom('DE_PRO_POS_S_3P')|U] bevorzugter Ringer war von seinem Gegner ganz bis an den Rand des Reisstrohrings gedrängt worden. [Select_CString(SCOPE.sCharacter('pm_scope').IsFemale, 'Die Premierministerin', 'Der Premierminister')] musste sich alle Mühe geben, dass [SCOPE.sCharacter('pm_scope').GetCustom('DE_PRO_POS_S_3P')]e Knöchel nicht weiß vor Anspannung wurden. An [SCOPE.sCharacter('pm_scope').GetCustom('DE_PRO_POS_S_3P')]er Seite stand vollkommen ruhig [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting].\n\nDer Schiedsrichter zeigte mit dem Fächer, und in den unteren Rängen wurde gejubelt. Ein Regen von Sitzkissen flog, um im Ring landen. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting|U] wandte sich [SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting] zu und lächelte. Auf der gegenüberliegenden Seite des Rings war das #italic Mon#! von [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting] in die Wand geprägt worden."
 zaibatsu.1.a: "Möge [ROOT.GetCountry.GetCapital.GetCityHubName] in einem Meer von Lichtern erstrahlen."
 zaibatsu.1.b: "Unsere Versorgungskette könnte immer sicherer sein."
 zaibatsu.2.t: "Abgeriegelt"
 zaibatsu.2.t_1: "Die ausgeleichende Hand"
 zaibatsu.2.d: "Die Bemühungen des [SCOPE.sCharacter('pm_scope').GetLastName]-Kabinetts schränken die Möglichkeiten der [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] ein, Einfluss auf die Legislative ([SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]) zu nehmen. Die Politiker werden regieren, und die Geschäftsführer konzentrieren sich auf die Profite."
 zaibatsu.2.d_1: "Die Freihandelspolitiklinien des [SCOPE.sCharacter('pm_scope').GetLastName]-Kabinetts entflochten jenes Netzwerk militärisch-industrieller Verträge, durch die die [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] die Legislative ([SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]) kontrollierten. Die Politiker werden herrschen, und die Geschäftsführer sollen sich auf Profite konzentrieren."
 zaibatsu.2.f: "Ein Schwarm von Führungskräften traf nach und nach im obersten Tagungsraum des [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]-Hauptquartiers ein. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting|U] kam als Drittes herein, nach den Sekretären. [SCOPE.sCharacter('name_a_scope').GetCustom('DE_PRO_PER_S_3P_N')|U] nahm an der Tür Platz und schaute zu, wie [SCOPE.sCharacter('name_a_scope').GetCustom('DE_PRO_POS_S_3P')|U]e erfahrenen Leute vorübergingen. Aus der Teetasse vor [SCOPE.sCharacter('name_a_scope').GetCustom('DE_PRO_PER_S_3P_D')] stieg ein Hauch von Dampf auf.\n\n[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting|U] trat als Letztes ein. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetCustom('DE_PRO_POS_S_3P')|U] Blick schweifte über einen Beschäftigten nach dem anderen. In [SCOPE.sCharacter('relevant_zaibatsu_exec').GetCustom('DE_PRO_POS_S_3P')]en Augen lag etwas, was [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] noch nie zuvor bemerkt hatte. Etwas, was dieser Mensch noch nie gezeigt hatte: Erschöpfung. Die Schatten auf [SCOPE.sCharacter('relevant_zaibatsu_exec').GetCustom('DE_PRO_POS_S_3P')]em Gesicht schienen tiefer als zuvor und [SCOPE.sCharacter('relevant_zaibatsu_exec').GetCustom('DE_PRO_POS_S_3P')] silbernes Haar dünner."
 zaibatsu.2.a: "Die Macht des Souveräns gehört uns allein."
 zaibatsu.2.b: "Lasst das Volk wissen: Unsere Legislative ([SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]) lässt sich nicht kaufen."
