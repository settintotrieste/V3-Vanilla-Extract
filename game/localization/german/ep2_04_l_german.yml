 # Zaibatsu
 je_zaibatsu: "Das Konzernreich"
 je_zaibatsu_reason: "Die rasend schnelle Industrialisierung [ROOT.GetCountry.GetAltName('VON')] brachte große Teile der Wirtschaft unter die Ägide der [concept_zaibatsu]. Diese Unternehmungen profitieren beträchtlich durch ihre Verstrickung mit staatlichen Institutionen und wurden so zu wichtigen Organen in der militärisch-industriellen Struktur von #v $JAP$#!.\n\nDas konzentrierte Wesen des [ROOT.GetCountry.GetAdjectiveNoFormatting|l]en Hauptsitzes machte das Land zu einem ernstzunehmenden Teilnehmer auf dem Weltmarkt, was jedoch den Preis hatte, dass immer mehr politische Macht in den Händen der Zaibatsu und ihrer militärischen Gönner liegt.[SCOPE.GetRootScope.GetCountry.GetCustom('zaibatsu_democracy_snippet')]\n$ZAIBATSU_LIST_HEADER$$ZAIBATSU_LIST_CONTENT$"
