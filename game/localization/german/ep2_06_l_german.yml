l_german:
 japan_earthquakes.1.t: "Große [SCOPE.sState('mega_earthquake_state').GetName]-Erdbeben"
 japan_earthquakes.1.d: "Über vier Tage hinweg verursachten drei Erdbeben vor der Küste in einem riesigen Gebiet Schäden, wobei die darauf folgenden Flutwellen die Auswirkungen in den Küstengebieten noch verschlimmerten."
 japan_earthquakes.1.f: "In wenigen Minuten hatten auch die Dorfbewohner das Phänomen bemerkt – offenbar hatte niemand die vorangegangene Erschütterung beachtet, aber alle waren sichtlich bestürzt über die Bewegung des Wassers. Alles lief zum Strande und noch darüber hinaus, um sie zu beobachten. Kein Lebender wusste sich an eine solche Ebbe an dieser Küste zu erinnen. Vorher nie gesehene Dinge erschienen auf der Bildfläche, unbekannte Strecken zerwühlter Sandfelder und nackte algenbedeckte Felsen boten sich dem Blick Hamaguchis dar. Und keiner der Leute unten schien zu ahnen, was diese ungeheure Ebbe zu bedeuten habe.\n\n– Lafcadio Hearn, #italic Ein lebender Gott#!"
 japan_earthquakes.1.a: "Unterstützung benachbarter Daimyō anfragen."
 japan_earthquakes.1.b: "Sollen die örtlichen Herrscher sich um die Hilfsmaßnahmen kümmern."
 earthquake_assisting_daimyo: "Unterstützt benachbarten Daimyō"
 earthquake_affected_daimyo: "Nachgang des Erdbebens"
 japan_earthquakes.2.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')]-[SCOPE.sState('japan_earthquake_state').GetCityHubName]-Erdbeben"
 japan_earthquakes.2.d: "Ein großes Erdbeben ereignte sich unweit der Küste in [SCOPE.sState('japan_earthquake_state').GetName]. Es richtet in der Stadt [SCOPE.sState('japan_earthquake_state').GetCityHubName] und an deren Burg großflächigen Schaden an."
 japan_earthquakes.2.f: "Als nach dem Erdbeben Drucke des riesigen Welses Namazu immer beliebter wurden, schienen sie den traditionellen Erzählungen zu entsprechen. Die Götter bändigten das Ungeheuer, um zu verhindern, dass es weitere Erdbeben auslöste.\n\nDoch mit der Zeit wandelten sich die Darstellungen: Ein Druck zeigte Namazu, wie er sich den Bauch aufschlitzte und Münzen blutete. Ein anderer zeigte Bauarbeiter, die mit ihm gemeinsam tranken. Eine satirische Note hatte sich in die Kunstwerke eingeschlichen, die andeutete, dass das Ungeheuer trotz der von ihm verursachten Katastrophe vielleicht auch etwas wieder in Ordnung brachte."
 japan_earthquakes.2.a: "Unsere Vasallen in [SCOPE.sState('japan_earthquake_state').GetCityHubName] brauchen Hilfe!"
 japan_earthquakes.2.b: "Gelder müssen an jene fließen, die die Dinge wieder aufbauen können."
 earthquake_vassal_support: "Vasallenunterstützung"
 earthquake_rebuilding_focus: "Wiederaufbau nach Erdbeben"
 earthquake_rebuilding_redistribution: "Weltberichtigung"
 japan_earthquakes.3.t: "Mino-Owari-Erdbeben"
 japan_earthquakes.3.d: "Ein großes Erdbeben ereignete sich im Herzen [ROOT.GetCountry.GetAltName('VON')], tötete Tausende und schuf ungewöhnlich breite Erdspalten überall im Land."
 japan_earthquakes.3.f: "Die menschliche Antwort auf Katastrophen war seit jeher, sie als Verbrechen wahrzunehmen und oft mit der Frage nach einem Täter zu verknüpfen. So entstand die ganze Heerschar an Monstern und Dämonen aus der Mythologie, die angeblich hinter einem Erdbeben stecken.\n\nDer moderne Seismologe muss diesen Aberglauben ablehnen, findet sich aber ironischerweise dennoch manchmal in der Rolle eines Kriminalbeamten wieder, der einen Tatort untersucht. Welche Gegenstände fielen herunter? Auf welche Weise fielen sie herunter? All diese Fragen dienen indes letztlich nicht der Suche nach einem Wer, sondern der nach dem Wie und dem Warum.“"
 japan_earthquakes.3.a: "Ladet fremde Gelehrte ein, um diese Erdspalten zu studieren."
 japan_earthquakes.3.b: "Nutzen wir dieses Wissen, um mehr metereologische Beobachtungsstationen einzurichten."
 japan_earthquakes.3.c: "Wappnen wir uns gegen mögliche Nachbeben."
 meteorological_observatories: "Metereologische Beobachtungsstationen"
 meteorological_observatories_cost: "$meteorological_observatories$"
 earthquake_bracing_for_aftershocks: "Wappnen gegen Nachbeben"
 japan_earthquakes.4.t: "Sanriku-Erdbeben"
 japan_earthquakes.4.d: "Eine große Flutwelle traf [SCOPE.sState('japan_earthquake_state').GetName], ausgelöst durch ein Erdbeben vor der Küste von Sanriku. Im Nachgang seiner verheerenden Auswirkungen wurde als Warnung vor zukünftigen Tsunami die Errichtung von Denkmälern vorgeschlagen."
 japan_earthquakes.4.f: "„Denkmäler für die Toten zu errichten, reicht nicht aus. Noch brauchen die Lebenden derlei Erinnerungen an das über sie hereingebrochene Unglück. Jeder, der eine Botschaft in Stein findet, wird wissen, dass seine Vorfahren ihm etwas mitteilen, was nicht in Vergessenheit geraten darf. Dies sind Denkmäler für jene, die noch nicht geboren sind.“"
 japan_earthquakes.4.a: "[SCOPE.sState('japan_earthquake_state').GetName|U] braucht solche Denkmäler."
 japan_earthquakes.4.b: "Errichtet diese Steine überall, wo der Tsunami zuschlug!"
 japan_earthquakes.4.c: "Wir müssen unsere Bemühungen auf das Hier und Jetzt konzentrieren."
 tsunami_stones: "Tsunami-Steine"
 tsunami_relief_efforts: "Tsunamihilfsbemühungen"
 japan_earthquakes.5.t: "Großes Kantō-Erdbeben"
 japan_earthquakes.5.d: "Ein gewaltiges, seit Menschengedenken beispielloses Erdbeben ereignete sich dicht bei [SCOPE.sState('japan_earthquake_state').GetCityHubName]. Binnen Minunten machte die Katastrophe einen Großteil der Stadt dem Erdboden gleich und tötete Hunderttausende."
 japan_earthquakes.5.f: "Wenn die Flutwelle, die den Erschütterungen gefolgt war, die größte Bedrohung dargestellt hatte, so war sie doch nichts im Vergleich zu den Bränden. Schon bald stand nicht nur die gesamte Stadt in Flammen, sondern Erde und Wind selbst schienen zu brennen.\n\nMenschen, die den brennenden Gebäuden entkommen konnten, wurden von einem Flammenwirbel eingeschlossen, als ob die Feuersbrunst entschlossen war, niemanden am Leben zu lassen. [SCOPE.sState('japan_earthquake_state').GetCityHubName|U] war zu einer Vision der Hölle geworden."
 japan_earthquakes.5.a: "Das japanische Volk muss geeint gegen eine solche Verwüstung zusammenstehen!"
 japan_earthquakes.5.b: "Dieser Schlag gegen unseren materiellen Wohlstand ist eine Warnung vor Dekadenz."
 japan_earthquakes.5.c: "Wir müssen diese Gelegenheit nutzen, um ein moderneres [SCOPE.sState('japan_earthquake_state').GetCityHubName] wiederaufzubauen."
 earthquake_national_tragedy: "Nationale Tragödie"
 earthquake_divine_punishment: "Göttliche Strafe"
 earthquake_modernization: "Modernisierter Wiederaufbau"
 earthquake_modernization_land_confiscation: "Landneuanpassung"
 shinbutsu_bunri_decision: "$je_shinbutsu_bunri$"
 shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$"
 elevate_buddhism_decision: "$je_elevate_buddhism$"
 elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$"
 je_shinbutsu_bunri: "Shinbutsu-Bunri"
 je_shinbutsu_bunri_reason: "Nachdem die Macht des Kaisers wiederhergestellt wurde, müssen wir die einheimischen religiösen Traditionen, die die kaiserliche Linie verehren, stärken und fördern. Dazu müssen sie vom fremden Einfluss des Buddhismus abgeschnitten werden, der durch synkretistische Traditionen seit Jahrhunderten untrennbar mit dem Kami-Kult verflochten scheint. Wenn wir die Unzufriedenheit mit den buddhistischen Institutionen aufgrund ihrer Verbindungen zum Schogunat nutzen, ebnen wir den Weg für den Schintoismus als übergeordnetes Leitprinzip."
 je_taikyo_proclamation_button: "Taikyō-Proklamation"
 je_taikyo_proclamation_button_desc: "Machen wir den Schintoismus, die Verehrung von Kami und Kaiser, zu einem Prinzip des Staats."
 je_taikyo_proclamation_conversion_tt: "Alle [Concept('concept_interest_group', 'Interessengruppen')]-Anführer haben eine Wahrscheinlichkeit von #v 75 %#!, per Bekehrung [GetReligion('shinto').GetName|l] zu werden."
 je_elevate_buddhism: "Buddhismus erheben"
 je_elevate_buddhism_reason: "Die buddhistischen religiösen Institutionen in $JAP$ sind historisch eng mit dem Verwaltungsapparat des Schogunats verbunden. Nachdem sie das Ende des Schogunats schon einmal abwenden konnten, könnte die Stärkung dieser Institutionen uns helfen, seine Macht zu erhalten und religiöse Traditionen in $JAP$ zu festigen, die nicht auf die Verehrung des Kaisers ausgerichtet sind."
 je_elevate_buddhism_goal: "$je_communism_2_goal$"
 arahitogami: "Arahitogami"
 extended_danka_system: "Erweitertertes Danka-System"
 japan_religion.1.t: "Jingū-ji"
 japan_religion.1.d: "In Tempelschreinen ist es üblich, dass buddhistische Mönche neben ihren Ritualen auch Schinto-Praktiken pflegen. Mit der Trennung von Buddhismus und Schintoismus wird die Rolle dieser Mönche zunehmend infrage gestellt."
 japan_religion.1.f: "„Welchen Zweck haben solche Rituale? Sollen die Kami zur Erleuchtung geführt werden? Ihr Karma verbessert? Das würde doch bedeuten, dass sie keine Verehrung verdienen, sondern verlorene Wesen sind, die Anleitung brauchen. Solche Unterstellungen werden wir nicht mehr dulden!“"
 japan_religion.1.a: "Verlangen wir, dass die Mönche konvertieren und Schinto-Priester werden."
 japan_religion.1.b: "Nehmen wir den Mönchen ihre Titel."
 japan_religion.1.c: "Überlassen wir die Mönche ihren Pflichten."
 forced_monk_conversions: "Mönche zum Konvertieren gezwungen"
 monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$"
 monks_stripped_of_titles: "Mönche ihrer Titel beraubt"
 monks_left_to_duties: "Mönche ihren Pflichten überlassen"
 japan_religion.1.a.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] der [GetPopType('clergymen').GetName] werden per Bekehrung [GetReligion('shinto').GetName|l]"
 japan_religion.2.t: "Honji-Suijaku"
 japan_religion.2.d: "Es ist eine weit verbreitete Vorstellung, dass sich Buddhas in Japan als Kami offenbarten, was sich in Begriffen wie [concept_gongen] widerspiegelt, die Buddhas und Kami als zwei Teile desselben Wesens betrachten. Solche Begriffe stärken den Einfluss des Buddhismus."
 japan_religion.2.f: "„Es muss einst Sinn ergeben haben. Amaterasu ist die Sonne. Dainichi Nyorai, Vairocana, ist die Sonne. Doch die Sonne ist nicht geteilt, und sie ist auch kein Abbild und keine Manifestation des Lichts einer anderen. Sie leuchtet allein und aus eigener Kraft. Und heute bietet [ROOT.GetCountry.GetAltNameNoFormatting('NOM')] nur Platz für eine Sonne.“"
 japan_religion.2.a: "Verbieten wir das Konzept des [concept_gongen]."
 japan_religion.2.b: "Verbieten wir, dass Hachiman als [concept_boddhisattva] bezeichnet wird."
 japan_religion.2.c: "Halten wir uns davon fern, die Begrifflichkeiten zu regeln."
 banned_syncretic_terminology: "Verbotene synkretische Terminologie"
 retained_syncretic_terminology: "Beibehaltene synkretische Terminologie"
 japan_religion.2.a.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] der [GetPopType('farmers').GetName] werden per Bekehrung [GetReligion('shinto').GetName|l]"
 japan_religion.2.b.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] der [GetPopType('soldiers').GetName] werden per Bekehrung [GetReligion('shinto').GetName|l]"
 japan_religion.3.t: "Sie läutet für Euch"
 japan_religion.3.d: "Der Versuch, den Einfluss des Buddhismus zu verdrängen, ließ allgemeine antibuddhistische Ressentiments auf den Plan treten. Tempelgebäude werden beschlagnahmt und beschädigt, manche gar vollständig zerstört und andere ihrer buddhistischen Ikonografie beraubt."
 japan_religion.3.f: "Als er sich dem Schrein näherte, blieb er wie angewurzelt stehen. Die beiden Niō – jene mächtigen Buddha-Statuen, die den Eingang bewacht hatten – waren verschwunden. An ihrer Stelle war nichts.\n\nBeim Betreten des Schreins beschlich ihn das Gefühl, dass er trotz all seiner Reinheit nicht mehr so sicher war wie einst. Ein unbewachtes Tor."
 japan_religion.3.a: "Schmelzen wir die Tempelglocken zu Kanonen ein!"
 japan_religion.3.b: "Zerstören wir die Buddha-Statuen oder entfernen wir sie aus den Tempeln."
 japan_religion.3.c: "Lassen wir die Tempel unberührt."
 smelted_temple_bells: "Geschmolzene Tempelglocken"
 smelted_temple_bells_opinion: "$smelted_temple_bells$"
 removed_buddha_statues: "Entfernte Buddha-Statuen"
 removed_buddha_statues_opinion: "$removed_buddha_statues$"
 retained_buddhist_iconography: "Bewahrte buddhistische Ikonografie"
 japan_religion.4.t: "Amt für Schinto-Angelegenheiten"
 japan_religion.4.d: "Die Bemühungen zur Standardisierung der Schinto-Praktiken und der Bewahrung örtlicher Rituale stießen bei örtlichen Mönchen und Schreinpriestern auf Widerstand, da sie solche Lehren als Bruch mit der Tradition betrachten."
 japan_religion.4.f: "„Beim Schintoismus geht es nicht einfach darum, bestehende Rituale und Praktiken fortzuführen, wie es sie in den Schreinen des Landes gibt: verdreht und durch äußere Einflüsse besudelt. Die Traditionen des Kaiserhauses, der Nachkommen des Himmels, müssen in jedem Winkel [ROOT.GetCountry.GetAltNameNoFormatting('VON')] gelehrt werden, um den Schintoismus zu seiner reinen Form zurückzuführen.“"
 japan_religion.4.a: "Setzen wir die staatlichen Auslegungen durch."
 japan_religion.4.b: "Örtliche Priester wissen am besten, welche örtlichen Rituale passen."
 standardized_priest_training: "Standardisierte Priesterausbildung"
 standardized_priest_training_opinion: "$standardized_priest_training$"
 deferred_to_local_priests: "Abtritt an örtliche Priester"
 deferred_to_local_priests_opinion: "$deferred_to_local_priests$"
 japan_religion.5.t: "Konfuzianismus und Schintoismus"
 japan_religion.5.d: "Im Zuge der Trennung von Buddhismus und Shintoismus wurde die Rolle des Konfuzianismus hinterfragt. Viele Gelehrte halten die Philosophie für gut mit dem Shintoismus vereinbar, wohingegen andere sie als einen weiteren fremden Einfluss ablehnen."
 japan_religion.5.f: "„Der Konfuzianismus mag auf ähnlichen Wegen wie der Buddhismus hierhergekommen sein, doch es besteht kein Widerspruch zwischen dieser Philosophie und der Verehrung der Kami. Vielmehr verstärken sich beide gegenseitig, da sie dieselben Prinzipien von Himmel und Erde sowie Herrscher und Untertan umfassen.“"
 japan_religion.5.a: "Der Konfuzianismus ist eine wichtige Ergänzung des Schintoismus."
 japan_religion.5.b: "Wir müssen die uralten Traditionen des Schintoismus wiederherstellen."
 fukko_shinto: "Fukko-Shintō"
 japan_religion.6.t: "Christentum auf dem freien Land"
 japan_religion.6.d: "Auch wenn [ROOT.GetCountry.GetAltName('NOM')] sich Fremden öffnete, bleibt die Religion dennoch reguliert. Christliche Länder mögen die Ausfuhr ihres Glaubens für ebenso wichtig wie die Ausfuhr ihrer Waren halten."
 japan_religion.6.f: "„Das Christentum liebt seine Anhänger am meisten im Tod, insbesondere im Tod für den Glauben. Jeder Missionar, der ans Kreuz oder ins Feuer geht, wird zum nächsten Kapitel einer Geschichte, die mit einem Mann am Kreuz begann. Vielleicht ist es an der Zeit, dass wir ihnen keine Märtyrer mehr geben?“"
 japan_religion.6.a: "Missionare dürfen ihren Glauben nicht predigen."
 japan_religion.6.b: "Der Glaube darf praktiziert, aber nicht verbreitet werden."
 japan_religion.6.c: "Das Christentum war und bleibt eine fremde Bedrohung."
 permitted_christianity: "Erlaubtes Christentum"
 christianity_disallowed: "Verbotenes Christentum"
 japan_religion.7.t: "Denklinien"
 japan_religion.7.d: "[ROOT.GetCountry.GetAltName('NOM')|U] blickt auf eine lange Tradition verschiedener buddhistischer Schulen zurück, von denen viele bis heute Einfluss besitzen. Angesichts der wachsenden politischen Macht der IG „[SCOPE.gsInterestGroup('devout_ig').GetName]“ sticht eine Schule besonders hervor."
 japan_religion.7.f: "„Im Lauf der Jahrhunderte entstanden [ROOT.GetCountry.GetAltNameNoFormatting('IN')] neue Schulen des Buddhismus. Es gibt keinen Grund zur Annahme, dass eine die anderen verdrängen würde. Die gegenwärtige Lage erfordert jedoch Führung und politische Orientierung, und es ist wahrscheinlich, dass manche diese Chance entschlossener nutzen werden als andere.“"
 japan_religion.7.a: "Die Reine-Land-Schule."
 japan_religion.7.b: "Die Zen-Schule."
 japan_religion.7.c: "Die Nichiren-Schule."
 japan_religion.7.e: "Die Shingon-Schule."
 pure_land_buddhism: "Reine-Land-Schule"
 zen_buddhism: "Zen-Schule"
 shingon_buddhism: "Shingon-Schule"
 japan_religion.8.t: "Worte des Buddha"
 japan_religion.8.d: "Da [ROOT.GetCountry.GetAltName('NOM')] sich der Welt öffnete, zeigten buddhistische Gelehrte Interesse daran, weitere fremdländische Texte zu übersetzen, um ihre Ideen in einen modernen Buddhismus einzufügen."
 japan_religion.8.f: "„Wir sollten uns nicht von Orthodoxien zurückhalten lassen, die durch die Isolation entstanden, und auch nicht davor zurückscheuen, die Wahrheit an unerwarteten Orten zu finden. Die Lehren Buddhas nahmen einen langen Weg, um uns zu erreichen. Zu erforschen, wohin sie sich entwickelt haben und wohin sie sich noch entwickeln könnten, kann uns nur zu tieferen Einblicken führen.“"
 japan_religion.8.a: "Sanskrit- und Pali-Texte, die Wurzeln des Buddhismus."
 japan_religion.8.b: "Chinesische Texte, die unseren Denkschulen am nächsten sind."
 japan_religion.8.c: "Werke der europäischen Philosophie zwecks vergleichender Studien."
 japan_religion.9.t: "Kriegermönche"
 japan_religion.9.d: "Die laufenden Kriegsbemühungen führten zu Debatten in der IG „[SCOPE.gsInterestGroup('devout_ig').GetName]“ zur Rolle des Buddhismus bei der Unterstützung des Landes bei gewaltsamen Auseinandersetzungen."
 japan_religion.9.f: "„Die Mönche vergangener Zeiten zögerten nicht, ihre Tempel zu verteidigen. Sollen wir denn zögern, unsere Nation zu verteidigen? Ein Leben sollte nicht leichtfertig genommen werden – doch würde der [ROOT.GetCountry.GetAdjective|l]e Staat einen Krieg führen, der nicht zu einem längeren Frieden führt, der nicht mehr Leben rettet, als er kostet?“"
 japan_religion.9.a: "Gewalt ist nötig, um dauerhaften Frieden zu schaffen."
 japan_religion.9.b: "Gewaltlosigkeit steht über allem."
 war_buddhism: "Buddhismus im Krieg"
 peaceful_buddhism: "Friedlicher Buddhismus"
 japan_religion.10.t: "Yōshoku"
 japan_religion.10.d: "Seit dem Ende des Sakoku sind fleischlastige Restaurants in Hafenstädten immer häufiger geworden, um den Bedürfnissen ausländischer Gäste gerecht zu werden. Dies stellt das bestehende Verbot des Verzehrs von Fleisch [ROOT.GetCountry.GetAltName('IN')] infrage."
 japan_religion.10.f: "„Entschuldigen Sie, aber Rindfleisch ist doch wirklich etwas Köstliches, nicht wahr? Hat man sich erst einmal an den Geschmack gewöhnt, will man nie wieder Hirsch oder Wildschwein essen. Ich frage mich, warum wir in Japan nicht schon früher so etwas Reines gegessen haben?“\n\n– Kanagaki Robun, #italic Der Rindfleischesser#!"
 japan_religion.10.a: "Wir müssen dieses Verbot aufheben, für bessere Ernährung und kulinarischen Zugewinn!"
 japan_religion.10.b: "Wir werden diese barbarische Praktik nicht Fuß fassen lassen!"
 maintained_meat_ban: "Beibehaltenes Fleischverbot"
 maintained_meat_ban_opinion: "$maintained_meat_ban$"
 japan_religion.11.t: "Der Weg der Kami"
 japan_religion.11.d: "Die Trennung von Schintoismus und Buddhismus hat sich bewährt. Der Einfluss alter religiösen Institutionen schwindet, und eine neue Ära der Verehrung der Götter, des Kaisers und [ROOT.GetCountry.GetAltName('VON')] bricht an."
 japan_religion.11.f: "„[ROOT.GetCountry.GetAltNameNoFormatting('NOM')|U] ist die Heimat vieler Glaubensrichtungen und Rituale. Manche sind alt, manche neu. Unser Ziel war es nicht, einige zugunsten anderer auszulöschen. Es bestand vielmehr darin, eine Grenze zwischen tief verwurzelten Überzeugungen und unbestreitbaren Wahrheiten zu ziehen.“"
 japan_religion.11.a: "Göttlichkeit ist absolut."
 japan_religion.12.t: "Der mittlere Weg"
 japan_religion.12.d: "Nach einer turbulenten Zeit des Umbruchs für [ROOT.GetCountry.GetAltName('AKK')] gelang es der IG „[SCOPE.gsInterestGroup('devout_ig').GetName]“, sich als religiöse Autorität des Landes neu in Stellung zu bringen und ihre Verbindungen in Sachen [ROOT.GetCountry.GetGovernment.GetName] zu stärken."
 japan_religion.12.f: "„Die Menschen sprechen vom Weg der Götter.\nWenn es ihn gibt, so ist er nicht für Menschen bestimmt;\nniemand außer Göttern kann den heiligen Pfad der Götter beschreiten.“\n– Hagura Toman" # Arthur Lloyd, Poems by Buddhist Priests of Japan
 japan_religion.12.a: "Der Weg ist klar."
 japan_religion.13.t: "$je_taikyo_proclamation_button$"
 japan_religion.13.d: "Die Verkündung der Großen Doktrin, die die Verehrung der Kami und die Ehrfurcht vor dem göttlichen Kaiser zu Grundsätzen des [ROOT.GetCountry.GetAdjective|l]en Staates und zur Pflicht seiner Bürger erklärt."
 japan_religion.13.f: "„Respekt vor den Kami und Liebe zum Vaterland sind untrennbar miteinander verknüpft; sie sind die erste Lehre.\n\nDie Prinzipien des Himmels und der Weg des Menschen sind untrennbar miteinander verknüpft; sie sind die zweite Lehre.\n\nEhrfurcht vor dem Kaiser und Gehorsam gegenüber dem Willen des Hofes sind untrennbar miteinander verknüpft; sie sind die dritte Lehre.“"
 japan_religion.13.a: "Sie müssen im ganzen Land gehört werden!"
 concept_gongen: "Gongen"
 concept_gongen_desc: "Ein Buddha, der sich als Kami manifestiert, wodurch eine einheimische Gottheit mit einem Bringer buddhistischer Erleuchtung verbunden wird."
 concept_boddhisattva: "Bodhisattwa"
 concept_boddhisattva_desc: "Ein erleuchtetes Wesen und Lehrer im Buddhismus, der anderen hilft, das Nirwana zu erreichen."
