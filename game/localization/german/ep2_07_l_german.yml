l_german:
 je_sakoku: "Das verschlossene Land"
 je_sakoku_reason: "Seit der Kan’ei-Ära und den Anfangstagen der Tokugawa-Herrschaft war $JAP$ein Land, das sich gegenüber der Außenwelt verschlossen hielt. Lediglich ein Rinnsal an Handel mit einigen wenigen ausgewählten Nationen über wenige festgelegte Häfen war je erlaubt. Obwohl dieses System über mehr als zwei Jahrhunderte lang Bestand hatte, verändert sich die Welt auf Arten und Weisen, die es immer schwieriger machen, das Land abzuschotten, selbst wenn gewisse Interessenvertreter in $JAP$ sich wünschen, dass die Dinge immer so blieben. Wenn sich ausländische Versuche, unser Land zu öffnen, nicht verhindern lassen, müssen wir neben den Waren von dort auch eben die Ideen einführen."
 je_sakoku_meiji_restoration: "Der #b Kaiser#! wurde wieder an die Macht gebracht und der #b Schogun#! gestürzt"
 je_sakoku_stop_being_closed_button: "[GetLawType('law_sakoku').GetName] beenden"
 je_sakoku_stop_being_closed_button_desc: "Die eskalierende Lage und der wachsende Druck aus dem Ausland machen die Aufhebung des [GetLawType('law_sakoku').GetName] zu einem regelrechten Notfall. Unter diesen Umständen ließe sich das alte Abschottungssystem womöglich gewaltsam beenden, doch dies wird all jene erzürnen, die die alten Gesetze noch immer unterstützen."
 notification_morrison_incident_has_incidented_name: "Händler unter Beschuss durch $JAP$"
 notification_morrison_incident_has_incidented_desc: "Ein abenteuerlustiger Kaufmann aus unseren Landen versuchte, die japanischen Beschränkungen für fremdländische Handelsschiffe zu verletzen und wurde daraufhin von einer Küstenbatterie beschossen, was die Beziehungen zwischen unseren Nationen trübte."
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners: "Lockere Hand mit Fremden"
 caved_to_foreign_pressure_opposition: "Fremdem Druck nachgegeben"
 caved_to_foreign_pressure_government: "Fremdem Druck nachgegeben"
 overdue_break_with_tradition: "Überfälliger Bruch mit der Tradition"
 forced_transition_from_tradition: "Erzwungene Abkehr von der Tradition"
 the_picked_lock_modifier: "Das geknackte Schloss"
 sakoku_entrenched_modifier: "Verschanztes Sakoku"
 meiji_failure_modifier: "Gescheiterte Restaurationsreformen"
 ep2_sakoku.1.t: "Die verstörende [SCOPE.sCountry('opium_wars_loser').GetAdjectiveNoFormatting|l]e Niederlage"
 ep2_sakoku.1.d: "Unser weites und ehrwürdiges Nachbarland [SCOPE.sCountry('opium_wars_loser').GetAltName('NOM')] verlor gerade einen Krieg um Opium und Handel gegen eine aufstrebende Nation in Übersee. Wenn [SCOPE.sCountry('opium_wars_loser').GetAltNameNoFormatting('NOM')] nicht einmal seinen eigenen Markt kontrollieren und die Fremden fernhalten kann, wie können wir dann das [GetLawType('law_sakoku').GetName] in unseren eigenen Landen wahren?"
 ep2_sakoku.1.f: "„All ihr Land, all ihr Reichtum, all ihre Macht – sie waren nichts im Vergleich zu der Macht, die ihnen gegenüberstand. Die Fremden betteln bereits darum, in unser Land gelassen zu werden. Folgen wir dem Beispiel [SCOPE.sCountry('opium_wars_loser').GetAltNameNoFormatting('VON')] und versuchen wir, sie wie [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting('NOM')] zurückzuhalten, bis ihre Kanonen Feuer auf unsere Städte herabregnen lassen? Oder schlagen wir unseren eigenen Weg ein? Wir müssen uns jetzt entscheiden, bevor diese Heerscharen aus Eisen und Kanonen in unsere Gewässer eindringen und uns die Entscheidung abnehmen.“"
 ep2_sakoku.1.a: "Das Undenkbare muss nun in Betracht gezogen werden."
 ep2_sakoku.1.b: "Das Undenkbare muss nun freundlich begrüßt werden."
 end_sakoku_button_now_available: "Die Auswahl, das [GetLawType('law_sakoku').GetName] gewaltsam frühzeitig zu beenden, wird nun in „$je_sakoku$“ sichtbar."
 ep2_sakoku.2.t: "Das Schloss knacken"
 ep2_sakoku.2.d: "Angesichts der wachsenden inneren wie äußeren Unruhen entschied das [GetLawType('law_bakufu').GetName], auf ein sofortiges Ende in Sachen [GetLawType('law_sakoku').GetName] zu drängen."
 ep2_sakoku.2.f: "Eine Schar von Händlern strömte ins Zollhaus. Ihnen gegenüber stand ein einzelner, gehetzter Beamter. „Ja, natürlich bedeutet das, dass das Land nicht länger abgeriegelt wird.“ Ein Dutzend lauter Fragen aus der Menge prasselten auf den Beamten ein. „Was stattdessen geschehen wird? Ich bin … Ich bin mir nicht sicher. Vielleicht wird es – nein, Augenlick, nur weil … Diese Entscheidung liegt nicht bei mir oder Ihnen. Sie können nicht einfach …“ Jede Antwort, die er gab, warf ein Dutzend weitere Fragen auf. #italic Die Arbeit war so viel einfacher gewesen, als man das Land in Ruhe ließ#!, dachte er bei sich."
 ep2_sakoku.2.a: "Die Zukunft [ROOT.GetCountry.GetAltNameNoFormatting('VON')] liegt im [GetLawType('law_mercantilism').GetName]."
 ep2_sakoku.2.b: "[GetLawType('law_free_trade').GetName] wird [ROOT.GetCountry.GetAltNameNoFormatting('AKK')] befreien."
 ep2_sakoku.2.c: "[GetLawType('law_protectionism').GetName] wird uns vorsichtig Handel mit fremden Interessensvertretern treiben lassen."
 ep2_sakoku.3.t: "Der [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]-Zwischenfall"
 ep2_sakoku.3.d: "Ein Händler aus [SCOPE.sCountry('morrison_incident_country').GetAltName('DAT')] versuchte, die strengen [GetLawType('law_sakoku').GetName]-Protokolle zu missachten und in einem unzulässigen Hafen Handel zu treiben. Sein Schiff, die #italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#!, wurde durch einen Beschuss durch Batterien an der Küste vertrieben. Die Beziehungen mit [SCOPE.sCountry('morrison_incident_country').GetAltNameNoFormatting('DAT')] sind schwer belastet."
 ep2_sakoku.3.f: "Der Kommandant grinste, als endlich eine Kanonenkugel das Schiff traf. Das Gesetz war sehr unmissverständlich: Das Schiff hatte kein Recht, diese Gewässer zu befahren. Was der Kapitän an Bord des anderen Schiffes dachte, scherte ihn nicht. Er wollte nur, dass dieses Schiff umkehrte und verschwand."
 ep2_sakoku.3.a: "Die örtliche Garnison tat nur, was sie tun sollte."
 ep2_sakoku.3.b: "Wir sollten uns bei [SCOPE.sCountry('morrison_incident_country').GetAltNameNoFormatting('DAT')] entschuldigen und den Händler entschädigen, um die Wogen zu glätten."
 ep2_sakoku.3.c: "Das ist die Gelegenheit, die wir brauchen, um die Notwendigkeit für unser [GetLawType('law_sakoku').GetName] zu überprüfen."
 ep2_sakoku.4.t: "Das geknackte Schloss"
 ep2_sakoku.4.d: "Angesichts des Drucks von innen wie außen wurde das [GetLawType('law_sakoku').GetName] abgeschafft. [ROOT.GetCountry.GetAltNameNoFormatting('NOM')|U] hat sich eine neue Zukunft eröffnet."
 ep2_sakoku.4.f: "Der Beamte blickte über die Bucht. Neue Schiffe lagen im Hafen. Unbekannte Schiffe, die Flaggen trugen, die er noch nie zuvor gesehen hatte. Was boten sie [ROOT.GetCountry.GetAltNameNoFormatting('DAT')]? Was wollten sie [ROOT.GetCountry.GetAltNameNoFormatting('DAT')] nehmen?\n\nSein Blick verweilte eine lange, lange Zeit auf den Schiffen im Hafen, ehe er sich schließlich abwandte. Seine Augen würden ihm die ersehnte Antwort nicht geben. Nicht heute. Nur die Zeit würde ihm weisen, was diese neue Ära seinem Heimatland bringen würde."
 ep2_sakoku.4.a: "Heute öffnet sich Japan!"
 ep2_sakoku.5.t: "Zugerostet"
 ep2_sakoku.5.d: "Das Festhalten am [GetLawType('law_sakoku').GetName] [ROOT.GetCountry.GetAltNameNoFormatting('IN')] selbst angesichts der politischen Erschütterungen im Land lässt kaum Hoffnung auf einen Ausbruch aus der selbstgewählten Abschottung aufkommen. Es scheint, als würde das [GetLawType('law_sakoku').GetNameNoFormatting] dauerhaft bestehen bleiben."
 ep2_sakoku.5.f: "Der Beamte blickte über die Bucht. Alte Schiffe lagen im Hafen, dieselben, die schon sein Vater, sein Großvater und seine Vorfahren seit Generationen gesehen hatten. Würden seine Kinder dieselben Schiffe sehen? Seine Enkel? Würde sich dieser Anblick je verändern?\n\nSein Blick verweilte eine lange, lange Zeit auf den Schiffen im Hafen, ehe er sich schließlich abwandte. Seine Augen würden ihm die ersehnte Antwort nicht geben. Nicht heute. Nur die Zeit würde weisen, ob seine Heimat wirklich für immer dieselbe bleiben würde."
 ep2_sakoku.5.a: "Das Schloss bleibt verriegelt."
 meiji.14.t: "Die leere Restauration"
 meiji.14.d: "Trotz der vollmundigen Reformversprechungen, die die neue [ROOT.GetCountry.GetCustom('JAP_era_name')|l]e Regierung machte, gab es keine großen Veränderungen [ROOT.GetCountry.GetAltNameNoFlag('IN')]. Kritiker beklagen, dass der Zustand heutzutage sich kaum von dem vor der Restauration unterscheidet."
 meiji.14.f: "Eine gewaltige Maschine schnaufte und ratterte in der Fabrikhalle, um ein riesiges Schwungrad und gewaltige Dreh- und Bohrmaschinen anzutreiben. Diese Maschinen fertigten neue Läufe, neue Verschlüsse, neue Abzüge für ein riesiges neues Waffenarsenal an. Eine Nation würde diesen Dampf und dieses Eisen bald nutzen, um der Welt ihren Stempel aufzudrücken – und diese Nation würde nicht [ROOT.GetCountry.GetAltNameNoFormatting('NOM')] sein."
 meiji.14.a: "Heute ruht die Sonne auf einem Traum."
 je_end_edo_system_button_name: "Das Edo-Statussystem beenden"
 je_end_edo_system_button_desc: "In einem Zeitalter der Reformen und der Erneuerung behindert uns das alte Kastensystem: Jeder Bürger kann ein wertvoller Teil des Staates sein, unabhängig von seiner gesellschaftlichen Stellung."
