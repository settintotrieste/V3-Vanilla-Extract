 # Events
 ryukyu_rivalry.1.t: "Tributland-Beratungen"
 ryukyu_rivalry.1.d: "[SCOPE.sCountry('ryukyu_scope').GetAltName('NOM')|U] gibt zunehmend [ROOT.GetCountry.GetAltName('DAT')] den Vorzug. Als Antwort beschleunigte [SCOPE.sCountry('rival_scope').GetAltName('NOM')] die diplomatischen Bemühungen und lieferte Zeichen des Respekts, während man gleichzeitig die Verpflichtungen der Tributland-Beziehung mit [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('DAT')] betont."
 ryukyu_rivalry.1.f: "Verschlossene Schachteln waren mit großer Vorsicht in der ryukyischen Halle aufgestellt werden. Höflinge tuschelten hinter Paravents, während man Briefe verlas: einer mit dem roten Siegel Chinas, ein anderer mit dem gefalteten Amulett und der sorgfältigen Kalligrafie Japans. Jede Formulierung barg Verpflichtungen und Versprechen, während die beiden fernen Mächte ihr Tauziehen um die Entscheidung des Königreichs austrugen."
 ryukyu_rivalry.1.a: "Legt formelle Beschwerde bei [SCOPE.sCountry('rival_scope').GetAltName('DAT')] ein."
 ryukyu_rivalry.1.b: "Nutzt unsere bestehenden Verbindungen [SCOPE.sCountry('ryukyu_scope').GetAltName('IN')]."
 ryukyu_rivalry.1.c: "Erinnert den Hof an unser altbewährtes Gönnertum."
 ryukyu_rivalry.1.e: "Diese Angelegenheit rechtfertigt kein Eingreifen."
 ryukyu_rivalry.1.tt1: "[SCOPE.sCountry('ryukyu_scope').GetAltName('NOM')] ist ein Klientelland [ROOT.GetCountry.GetAltName('VON')] mit einem [concept_liberty_desire] kleiner als #v 25#!"
 ryukyu_rivalry.1.tt2: "[SCOPE.sCountry('ryukyu_scope').GetAltName('NOM')|U] ist kein Klientelland [ROOT.GetCountry.GetAltName('VON')] mit mindestens #v einvernehmlichen#! [concept_relations]"
 ryukyu_rivalry.1.tt3: "[ROOT.GetCountry.GetAltName('NOM')|U] besitzt mindestens 3 [Concept('concept_building','$concept_buildings$')] in [SCOPE.sCountry('ryukyu_scope').GetCapital.GetName]"
 ryukyu_rivalry.2.t: "Rivalität in den Häfen"
 ryukyu_rivalry.2.d: "Die Anwesenheit von [SCOPE.sCountry('rival_scope').GetAdjective|l]en Gesandten in den Häfen [SCOPE.sCountry('ryukyu_scope').GetAltName('VON')] zog die Aufmerksamkeit und die Mithilfe vieler [GetCulture('ryukyuan').GetName|l]er Händler auf sich und stärkte deren Stellung in den Augen des Hofs. Unser eigener Einfluss wiederum nahm dadurch ab."
 ryukyu_rivalry.2.f: "Hauptbücher der Händler wurden geschlossen und mit neuen Siegeln wieder geöffnet. Wer einst unsere Zusicherungen suchte, hielt sich nun in anderen Empfangshallen auf und sprach von geänderten Zöllen und sichererem Geleit. Das Geld, so schien es, hatte einen überzeugenderen Verwalter gefunden."
 ryukyu_rivalry.2.a: "Ein übles Spiel."
 ryukyu_rivalry.3.t: "[Select_CString(SCOPE.sCountry('ryukyu_scope').IsFemale, 'Generalin', 'General')] zu Besuch [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('IN')]"
 ryukyu_rivalry.3.d: "[Select_CString(SCOPE.sCountry('ryukyu_general_scope').IsFemale, 'Eine Generalin', 'Ein General')] namens [SCOPE.sCharacter('ryukyu_general_scope').GetFullName] traf mit einem Gefolge aus Offizieren [SCOPE.sCountry('ryukyu_scope').GetAltName('IN')] ein, offenbar für eine Inspektion der Küstenverteidigung. Auf ihre Präsenz wurde mit respektvoller Unterwerfung geantwortet, was den Einfluss [SCOPE.sCountry('rival_scope').GetAltName('VON')] bei Hofe stärkt und zugleich unterschwellig an unserem eigenen nagt."
 ryukyu_rivalry.3.f: "[Select_CString(SCOPE.sCountry('ryukyu_general_scope').IsFemale, 'Die Generalin', 'Der General')] schritt mit [SCOPE.sCharacter('ryukyu_general_scope').GetCustom('DE_PRO_POS_S_3P')]en Offizieren die Wälle entlang, musterte jede Kanone und jeden Wachturm. Die Truppen der Ryukyu-Inseln formierten sich, wohl wissend, dass sie beobachtet wurden. Jede Geste und jeder Gruß sollte die unsichtbaren Bande zwischen den beiden Mächten festigen."
 ryukyu_rivalry.3.a: "Eine gefährliche Eskalation."
 ryukyu_rivalry_risk_of_confrontation: "@warning! Wenn Streitkräfte aus [SCOPE.sCountry('china_scope').GetAltName('DAT')] und [SCOPE.sCountry('japan_scope').GetAltName('DAT')] die Küstenverteidigung inspizieren, könnte es zu einer #r Konfrontation#! kommen"
 ryukyu_rivalry.4.t: "[Select_CString(SCOPE.sCountry('ryukyu_scope').IsFemale, 'Generalin', 'General')] zu Besuch"
 ryukyu_rivalry.4.d: "[Select_CString(SCOPE.sCountry('ryukyu_general_scope').IsFemale, 'Eine Generalin', 'Ein General')] namens [SCOPE.sCountry('ryukyu_general_scope').GetName] aus [SCOPE.sCountry('from_scope').GetAltName('DAT')] traf mit einem Gefolge aus Offizieren [SCOPE.sCountry('ryukyu_scope').GetAltName('IN')] ein, ganz begierig darauf, unsere Küstenverteidigung zu inspizieren. Auf ihre Präsenz wurde mit der respektvoller Unterwerfung geantwortet."
 ryukyu_rivalry.4.f: "$ryukyu_rivalry.3.f$"
 ryukyu_rivalry.4.a: "Behaltet sie genau im Auge."
 ryukyu_rivalry_officer_arrives: "Ein [concept_general] aus [SCOPE.sCountry('from_scope').GetAltName('DAT')] wird verfügbar"
 ryukyu_rivalry.5.t: "Das Schicksal [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('VON')]"
 ryukyu_rivalry.5.d_victor: "Unsere Bemühungen [SCOPE.sCountry('ryukyu_scope').GetAltName('IN')] tragen Früchte. Dank anhaltenden diplomatischen, wirtschaftlichen und politischen Drucks sucht der Hof nun Anleitung bei uns, und die Frage der Souveränität wurde zu unseren Gunsten entschieden."
 ryukyu_rivalry.5.d_loser: "Trotz unserer Bemühungen erlangte [SCOPE.sCountry('victor_scope').GetAltName('NOM')] entscheidenden Einfluss über [SCOPE.sCountry('ryukyu_scope').GetAltName('AKK')]. Der Hof hat eine neue politische Wirklichkeit akzeptiert und die Inseln damit fest in der Sphäre [SCOPE.sCountry('victor_scope').GetAltNameNoFormatting('VON')] verankert."
 ryukyu_rivalry.5.d_ryu: "Das von uns angestrebte Gleichgewicht ist nicht länger haltbar. Unter dem wachsenden Druck durch [SCOPE.sCountry('victor_scope').GetAltName('AKK')] akzeptierte unser Hof eine neue politische Vereinbarung. Die Zukunft [SCOPE.sCountry('ryukyu_scope').GetAltName('VON')] wird sich nun unter der Herrschaft der genannten Nation entfalten."
 ryukyu_rivalry.5.f_annexed: "Auf dem Marktplatz von Naha verlas man offizielle Verlautbarungen. Die Tinte auf den in [SCOPE.sCountry('victor_scope').GetCapital.GetName] ausgestellten Siegeln war noch frisch. [SCOPE.sCountry('ryukyu_scope').GetAdjectiveNoFormatting|U]e Banner wurden abgenommen und durch die Standarte des Herrschers ersetzt. Bei Einbruch der Dunkelheit waren das Verwaltungsbüro eingerichtet und neue Edikte bereits verkündet."
 ryukyu_rivalry.5.f_subject: "Auf dem Marktplatz von Naha verlas man offizielle Verlautbarungen. Die Tinte auf den in [SCOPE.sCountry('victor_scope').GetCapital.GetName] ausgestellten Siegeln war noch frisch. Jeder Erlass würde über den neuen Platz [SCOPE.sCountry('ryukyu_scope').GetAltName('VON')] im Reich bestimmen. Lange Zeit tributpflichtig gegenüber fernen Höfen sah sich das Königreich nun durch formale Verpflichtungen an eine Großmacht gebunden. Bei Einbruch der Dunkelheit lag sein Kurs fest."
 ryukyu_rivalry_ryukyu_vassalise_tt: "[SCOPE.sCountry('ryukyu_scope').GetAltName('NOM')|U] wird eine [SCOPE.sCountry('victor_scope').GetAdjective|l]e [concept_puppet]"
 ryukyu_rivalry_ryukyu_transfer_subject_tt: "[SCOPE.sCountry('ryukyu_scope').GetAltName('NOM')|U] wird als [concept_subject] an [SCOPE.sCountry('victor_scope').GetAltName('AKK')] übertragen"
 ryukyu_rivalry_ryukyu_annex_tt: "[SCOPE.sCountry('victor_scope').GetAltName('NOM')|U] annektiert [SCOPE.sCountry('ryukyu_scope').GetAltName('AKK')]"
 ryukyu_rivalry.5.a: "Dann ist es beschlossene Sache."
 ryukyu_rivalry.6.t: "Konfrontation in [SCOPE.sCountry('ryukyu_scope').GetCapital.GetNameNoFormatting]"
 ryukyu_rivalry.6.d_brawl: "Es kam zwischen Offizieren, die man aus [SCOPE.sCountry('japan_scope').GetAltName('DAT')] und [SCOPE.sCountry('china_scope').GetAltName('DAT')] entsandt hatte, bei der Inspektion der Küstenverteidigungsanlagen [SCOPE.sCountry('ryukyu_scope').GetAltName('VON')] zu Handgreiflichkeiten. Der Streit forderte ein Todesopfer und führte zu besorgten Blicken am Hof [SCOPE.sCountry('ryukyu_scope').GetAltName('VON')]."
 ryukyu_rivalry.6.d_accident: "Die Besichtung durch Truppen [SCOPE.sCountry('japan_scope').GetAltName('VON')] und [SCOPE.sCountry('china_scope').GetAltName('DAT')] überschnitten sich an denselben Küstenbefestigungsanlagen [SCOPE.sCountry('ryukyu_scope').GetAltName('IN')], was zu Verwirrung bei der Garnison und einem kurzen Feuergefecht führte."
 ryukyu_rivalry.6.d_fire: "In den Unterkünften der fremden Inspektionsmissionen [SCOPE.sCountry('ryukyu_scope').GetAltName('IN')] brach ein Feuer aus, das die Quartiere der [SCOPE.sCountry('japan_scope').GetAdjective|l]en und [SCOPE.sCountry('china_scope').GetAdjective|l]en Kontingente zerstörte. Die Brandursache ist noch unklar, aber örtliche Beamte munkeln von falsch aufgestellten Laternen."
 ryukyu_rivalry.6.f: "Offizier Kaimon eilte zwischen Wachtürmen und Lagerhäusern hin und her, um den Wachen Befehle zu erteilen. Kommandos wurden gerufen, widersprochen und in rascher Folge wiederholt. Obwohl schließlich wieder Ruhe einkehrte, wurde Kaimon daran erinnert, wie konkurrierende Missionen fremder Mächte die heikle Lage Ryukyus offenbaren konnten."
 ryukyu_rivalry.6.a: "Die Spannungen eskalieren."
 ryukyu_rivalry_ryukyu_confrontation_tt1: "[SCOPE.sCountry('japan_scope').GetAdjective|U]e und [SCOPE.sCountry('china_scope').GetAdjective|l]e [concept_infamy] wird um #v 6#! erhöht"
 ryukyu_rivalry.7.t: "Der Erlass von Ryukyu"
 ryukyu_rivalry.7.d_ryukyu: "Nach Jahren sorgfältiger Beobachtung und subtiler Diplomatie erklärte unser Rat seine Absicht, die eigenen Angelegenheiten ohne Einmischung von außen zu regeln. Der Hof setzte dem Einfluss von außen klare Grenzen: Die eigenen Rituale, Minister und traditionellen Räte haben absoluten Vorrang. Das Königreich legt nun seinen eigenen Kurs fest."
 ryukyu_rivalry.7.d: "Nach Jahren sorgfältiger Beobachtung und subtiler Diplomatie streifte [SCOPE.sCountry('ryukyu_scope').GetAltName('NOM')] unseren Einfluss ab und erklärte, dass man die eigenen Angelegenheiten ohne Einmischung von außen bestimmen will. Der Hof setzte unserem Einfluss klare Grenzen und bewahrt seine Rituale, Minister und traditionellen Räte, während das Königreich sich von unserer Autorität abwendet."
 ryukyu_rivalry.7.f: "Zerrissene Siegel und Tributregister liegen verstreut auf den polierten Böden von Burg Shuri. In den Audienzsälen ist der Druck ferner Mächte zwar nach wie vor spürbar, doch er bestimmt nicht länger das Handeln. Ryukyus Weg würde sich in einer zerbrechlichen Neutralität entfalten, die man durch geduldige Diplomatie erlangt hatte."
 ryukyu_rivalry.7.a: "Die Frage der Zugehörigkeit ist geklärt."
 ryukyu_rivalry.7.b: "Wir können immer noch zur Gewalt greifen."
 ryukyu_rivalry.8.t: "Die verborgene Domäne"
 ryukyu_rivalry.8.d: "Da [SCOPE.sCountry('japan_scope').GetAltName('NOM')] seine Häfen öffnete, kam die lange im Hintergrund gebliebene Frage nach der Zugehörigkeit [SCOPE.sCountry('ryukyu_scope').GetAltName('VON')] wieder auf. Seit Generationen wandelt das Königreich auf einem schmalen Grat. Nach außen hin ist man ein Tributland [SCOPE.sCountry('china_scope').GetAltName('VON')], doch insgeheim pflegt man Ergebenheit gegenüber [SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('DAT')]. Beide Mächte müssen nun überlegen, wie sie ihren Einfluss geltend machen wollen."
 ryukyu_rivalry.8.f: "Laternen erhellten die Korridore von Burg Shuri und warfen Licht auf die zinnoberroten Balken, die die Könige von Chūzan in ihrer Blütezeit hatten verbauen lassen. Unter den bemalten Decken legten Schreiber Tribut neben Satsuma-Erlasse. Der Hof schwankte seit Langem zwischen den Bemühungen des Reiches der Mitte und dem Schatten Kagoshimas. Noch herrschte Ruhe, doch die Frage der Treue würde bald seine Aufmerksamkeit einfordern."
 ryukyu_rivalry.8.a: "Die Sache bleibt ungeklärt."
