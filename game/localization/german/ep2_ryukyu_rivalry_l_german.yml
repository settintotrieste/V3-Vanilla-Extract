 je_ryukyu_rivalry_reaffirm_suzerainty_button_desc: "Der Hof von Ryukyu zieht unseren Gegner vor: Wir müssen ihn an seine Verpflichtungen gegenüber unserer Domäne erinnern und ihn zurück unter unseren Einfluss holen."
