 je_ryukyu_rivalry_sway_merchants_button: "Handelsaufseher entsenden"
 je_ryukyu_rivalry_sway_merchants_button_desc: "Durch die Überwachung des Hafens von Naha können wir Gesandte an den Hof entsenden, um zu beeinflussen, welche fremdländischen Mächte Zugang zu Handel und Tribut erhalten."
 ryukyu_rivalry_sway_merchants_button_tt: "[ROOT.GetCountry.GetAltName('NOM')|U] besitzt einen [GetBuildingType('building_port').GetName] der Stufe #v 2#! oder höher im [SCOPE.sCountry('ryukyu_scope').GetAdjective|l]en [concept_capital_state]"
 je_ryukyu_rivalry_inspect_defenses_button: "Küstenverteidigung inspizieren"
 je_ryukyu_rivalry_inspect_defenses_button_desc: "Da der Militärzugang nun gesichert ist, können wir einen vertrauenswürdigen General entsenden, um die Befestigungsanlagen von Ryukyu zu untersuchen und sicherzustellen, dass Mauern und Wachtürme unsere Aufsicht und unsere strategischen Absichten widerspiegeln."
 ryukyu_rivalry_inspect_defenses_button_tt: "[ROOT.GetCountry.GetAltName('NOM')|U] hat einen [concept_treaty] bezüglich #v Militärzugang#! mit [SCOPE.sCountry('ryukyu_scope').GetAltName('DAT')]"
 je_ryukyu_rivalry_honor_kikoeogimi_button: "Die Kikoe-ōgimi ehren"
 je_ryukyu_rivalry_honor_kikoeogimi_button_desc: "Den Kikoe-ōgimi Tribut zahlen, deren Autorität über Hofrituale und heilige Zeremonien unserem Einfluss in den Räten von Ryukyu Gewicht verleihen kann."
