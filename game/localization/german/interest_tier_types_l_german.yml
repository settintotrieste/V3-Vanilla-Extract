l_german:
 ## Interest Tier Types
 interest_tier_none: "Keine"
 interest_tier_none_desc: "Auf diesem $concept_interest_tier_short$ ist ein [concept_country] entweder gar nicht oder nur sehr marginal an einer [concept_strategic_region] beteiligt, was keine Auswirkungen auf das $concept_country$ oder die $concept_strategic_region$ hat."
 interest_tier_observant: "Aufmerksam"
 interest_tier_observant_desc: "Auf diesem $concept_interest_tier_short$ wurden erste Schritte unternommen, um eine diplomatische Präsenz in der [concept_strategic_region] zu etablieren, Marineflotten könnten vor der Küste patroullieren oder Gesandte werden mit [Concept('concept_local_country', 'heimischen Ländern')] ausgetauscht."
 interest_tier_engaged: "Beteiligt"
 interest_tier_engaged_desc: "Auf diesem $concept_interest_tier_short$ beginnt ein [concept_country], sich im eigentlichen Sinne an örtlichen Angelegenheiten zu beteiligen, [Concept('concept_treaty', '$concept_treaties$')] zu unterschreiben und eine dauerhafte Präsenz aufzubauen."
 interest_tier_influential: "Einflussreich"
 interest_tier_influential_desc: "Auf diesem $concept_interest_tier_short$ wurde in einer [concept_strategic_region] eine Präsenz vollständig etabliert: [Concept('concept_country', '$concept_countries$')] gehen langfristige Verträge ein und stecken ihre Ansprüche ab.\n\n@information! $concept_countries$ mit ihrem [Concept('concept_capital_state', '$concept_capital_state_short$')] in dieser $concept_strategic_region$ können nicht unter diesen $concept_interest_tier_short$ fallen."
 interest_tier_pervasive: "Allgegenwärtig"
 interest_tier_pervasive_desc: "Auf diesem $concept_interest_tier_short$ hat ein [concept_country] eine beträchtliche Kontrolle über eine [concept_strategic_region] aufgebaut. [Concept('concept_great_power', '$concept_great_powers$')] und [Concept('concept_local_country', '$concept_local_country_short$e')|l] Mächte ringen um die Vorherrschaft, während die Macht konsolidiert wird."
 interest_tier_hegemonic: "Hegemonial"
 interest_tier_hegemonic_desc: "Auf diesem $concept_interest_tier_short$ hat ein [concept_country] klar eine unbestrittene Vorherrschaft in der [concept_strategic_region] etabliert. Andere Nationen (#italic sofern es sie überhaupt gibt#!) müssen sich unterordnen oder einen Handel mit dem Hegemonen eingehen, damit er sich nicht in ihre örtlichen Angelegenheiten einmischt."
 ## Interface
 INTEREST_TIER_TYPE_BOUNDS_DESC: "Gilt bei einer [concept_involvement] zwischen [InterestTierType.GetLowerBound|v] und [InterestTierType.GetUpperBound|v]"
 INTEREST_TIER_TYPE_NO_EFFECT: "#italic Keine Auswirkungen#!"
 INTEREST_TIER_ACTIVE: "#i #b Derzeitiger Rang#!#! für [Country.GetAltName('AKK')][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'YOU'))]"
 INTEREST_TIER_ACTIVE_TOOLTIP: "#header [InterestTierType.GetName|U]#! $INTEREST_TIER_ACTIVE$\n$INTEREST_TIER_BOUNDS_DESC$\n[SelectLocalization(EqualTo_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_CURRENT_INVOLVEMENT_DESC', 'INTEREST_TIER_TARGET_INVOLVEMENT_DESC')]\n$TOOLTIP_DELIMITER$\n$INTEREST_TIER_EFFECTS_AND_BREAKDOWN$"
 INTEREST_TIER_INACTIVE_TOOLTIP: "#header [InterestTierType.GetName|U]#!\n$INTEREST_TIER_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n#title Auswirkungen:#!#indent_newline:3 \n[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)]#!"
 INTEREST_TIER_EFFECTS_AND_BREAKDOWN: "#title Auswirkungen:#!#indent_newline:3 [ConcatIfNeitherEmpty('\n', InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', AddLocalizationIf(And(And3(StringIsEmpty(InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetStateModifier.GetDesc)), StringIsEmpty(InterestTierType.GetTradeAdvantageDesc)), 'INTEREST_TIER_NO_EFFECT'))]#!\n\n#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! [concept_involvement] aufgrund von:#!#indent_newline:3 \n[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]#!\n $INTEREST_TIER_ACTIVE$: #i #b (derzeit aktiv)#!#!"
 INTEREST_TIER_PREDICTED: "#i #b (Voraussichtlich)#!#!"
 INTEREST_TIER_BOUNDS_DESC: "Gilt bei einer [concept_involvement] zwischen [InterestTierType.GetLowerBound|v0] und [InterestTierType.GetUpperBound|v0]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC: "#v [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! [concept_involvement] für [Country.GetAltName('AKK')]"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC: "[AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetTargetInvolvementIn(StrategicRegion.Self), Country.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP')][AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN')] [concept_involvement] für [Country.GetAltName('AKK')]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Wir haben [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] #v [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! [concept_involvement] derzeit"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Wir haben [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] [AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self), GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT')][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self), GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT')] [concept_involvement] derzeit"
 INTEREST_TIER_TARGET_UP: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/Woche)"
 INTEREST_TIER_TARGET_DOWN: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/Woche)"
 INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/Woche)"
 INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/Woche)"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN_TITLE: "#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! Ziel-$concept_involvement$ aufgrund von:#!"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN: "[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]"
 INTEREST_TIER_EFFECTS_TITLE: "#title Auswirkungen:#!"
 INTEREST_TIER_EFFECTS: "[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetDescription)]"
 INTEREST_TIER_NO_EFFECT: "#italic Keine Auswirkungen#!"
 INTEREST_TIER_TRADE_ADVANTAGE_EXPORTS_DESC: "$VAL|0=+v$ [concept_trade_advantage] für [Concept('concept_trade','$concept_exports$')] auf örtlichem $concept_market$"
 INTEREST_TIER_TRADE_ADVANTAGE_IMPORTS_DESC: "$VAL|0=+v$ [concept_trade_advantage] für [Concept('concept_trade','$concept_imports$')] auf örtlichem $concept_market$"
 INTEREST_TIER_ON_ACTIVATE_EFFECT: "#title Bei Erreichen:#!"
 INTEREST_TIER_ON_DEACTIVATE_EFFECT: "#title Bei Verlust:#!"
 STRATEGIC_REGION_AI_STANCE_TT_HEADER: "[Country.GetAltNameNoFormatting('NOM')|U] nahm die [Concept('concept_strategic_region_stance', '$concept_strategic_region_stance_short$')] #b [Country.GetAIStrategicRegionStanceTypeIn(StrategicRegion.Self).GetNameNoFormatting|U]#! in „[StrategicRegion.GetName]“ aus folgendem Grund an:\n$TOOLTIP_DELIMITER$"
 ## Effects
 interest_tier_effect_establish_missions_decree: "@checkmark! Erlaubt den „[GetDecreeType('decree_establish_missions').GetName]“-[concept_decree] in [Concept('concept_unincorporated_state','nicht inkorporierten Staaten')]"
 interest_tier_effect_colonization: "@checkmark! Erlaubt die #yellow;tooltip:[GetPlayer.GetTooltipTag],establish_colony_tooltip $establish_colony$#!-Regionalaktion"
 interest_tier_effect_stake_colonial_claim: "@checkmark! Erlaubt die „[GetDiplomaticActionType('da_stake_colonial_claim').GetName]“-[concept_diplomatic_action] bei [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')]"
 interest_tier_effect_colonial_claim_generation: "@checkmark! Erzeugt einen [concept_claim], wenn die Kolonisierung einer [concept_state_region] [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_colonial_claim_generation_threshold')|v%0] erreicht"
 interest_tier_effect_infamy_cost_increase_high: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_high_value')|=n%0] [Concept('concept_infamy', 'Verrufenheitskosten')], wenn [Concept('concept_war_goal', '$concept_war_goals$')] aus dieser [concept_strategic_region] stammen"
 interest_tier_effect_infamy_cost_increase_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_medium_value')|=n%0] [Concept('concept_infamy', 'Verrufenheitskosten')], wenn [Concept('concept_war_goal', '$concept_war_goals$')] aus dieser [concept_strategic_region] stammen"
 interest_tier_effect_infamy_cost_decrease_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_decrease_medium_value')|=p%0] [Concept('concept_infamy', 'Verrufenheitskosten')], wenn [Concept('concept_war_goal', '$concept_war_goals$')] aus dieser [concept_strategic_region] stammen"
 interest_tier_effect_can_start_diplomatic_plays: "@checkmark! Erlaubt den Beginn von [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$n')] in dieser [concept_strategic_region]"
 interest_tier_effect_can_join_diplomatic_plays: "@checkmark! Erlaubt es, sich bei [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$n')] in dieser [concept_strategic_region] auf eine Seite zu schlagen"
 interest_tier_effect_can_sign_alliance: "@checkmark! Erlaubt die Unterzeichnung von [GetArticleType('alliance').GetName]-[Concept('concept_article', '$concept_treaties$n')]"
 interest_tier_effect_can_sign_defensive_pact: "@checkmark! Erlaubt die Unterzeichnung von [GetArticleType('defensive_pact').GetName]-[Concept('concept_article', '$concept_treaties$n')]"
 interest_tier_effect_can_sign_support_independence: "@checkmark! Erlaubt die Unterzeichnung von [Concept('concept_article', '$concept_treaties$n')], die die [GetArticleType('support_independence').GetName]"
 interest_tier_effect_can_sign_guarantee_independence: "@checkmark! Erlaubt die Unterzeichnung von [Concept('concept_article', '$concept_treaties$n')], die die [GetArticleType('guarantee_independence').GetName]"
 interest_tier_effect_stake_colonial_claim_unrecognized: "@checkmark! Erlaubt die „[GetDiplomaticActionType('da_stake_colonial_claim').GetName]“-[concept_diplomatic_action] bei [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')] und [Concept('concept_unrecognized_power', '$concept_unrecognized_powers$n')]"
 interest_tier_effect_can_sign_foreign_investment_rights: "@checkmark! Erlaubt die Unterzeichnung von [GetArticleType('foreign_investment_rights').GetName]-[Concept('concept_article', '$concept_treaties$n')]"
 ## Diplomatic Actions
 da_stake_colonial_claim: "Kolonialanspruch abstecken"
 da_stake_colonial_claim_desc: "Steckt einen [concept_claim] in einer Übersee-[concept_state_region] ab."
 da_stake_colonial_claim_action_notification_name: "[INITIATOR_COUNTRY.GetAltName('NOM')|U] steckt einen Kolonial-[concept_claim] auf „[TARGET_STATE.GetStateRegion.GetName]“ ab"
 da_stake_colonial_claim_action_notification_desc: "[INITIATOR_COUNTRY.GetAltName('NOM')|U] hat einen Kolonial-[concept_claim] auf „[TARGET_STATE.GetStateRegion.GetName]“ abgesteckt"
 DA_STAKE_COLONIAL_CLAIM_COOLDOWN: "Kann diese Aktion nicht mehr bis #v [TimeKeeper.GetCurrentDateWithDiff(GetVarTimeRemaining(GetPlayer.MakeScope, 'da_stake_colonial_claim_cooldown'))]#! ergreifen"
 DA_STAKE_COLONIAL_CLAIM_EMPTY_EFFECT: "[concept_state_region] auf einem anderen Kontinent als unser [concept_capital_state] als [concept_claim] auswählen"
 ## Notifications
 notification_colonial_claim_generated_name: "[SCOPE.sState('colony_notification_state').GetName|U] ist eine #bold Hauptkolonie#! geworden"
 notification_colonial_claim_generated_desc: "[SCOPE.sState('colony_notification_state').GetName|U] ist groß genug geworden, um einen [concept_claim] auf ganz „[SCOPE.sState('colony_notification_state').GetStateRegion.GetName]“ zu erheben."
 notification_colonial_claim_generated_tooltip: "#header $notification_colonial_claim_generated_name$#!\n$TOOLTIP_DELIMITER$\n$notification_colonial_claim_generated_desc$"
