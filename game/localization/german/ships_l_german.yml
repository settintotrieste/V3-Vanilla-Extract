 ship_type_frigate: "Fregatte"
 ship_type_frigate_desc: "Leicht bewaffnete Segelschiffe, die vor allem für Aufklärung, Patrouillen und Eskorten eingesetzt werden."
 ship_type_iron_frigate: "Panzerfregatte"
 ship_type_iron_frigate_desc: "Segelfregatten mit Eisenrumpf, die die traditionelle Rolle der Fregatte mit größerer Haltbarkeit und Feuerkraft verbinden."
 ship_type_ship_of_the_line: "Linienschiff"
 ship_type_ship_of_the_line_desc: "Große Kriegsschiffe, die entworfen wurden, um als Teil der Schlachtlinie zu agieren. Linienschiffe haben zahlreiche Kanonen auf mehreren Decks."
 ship_type_monitor: "Turmschiff"
 ship_type_monitor_desc: "Panzerschiffe mit niedrigem Profil, die für Küstengewässer entworfen wurden. Ihr Name leitet sich vom auffälligen Kanonenturm ab."
 ship_type_coastal_defense_ship: "Küstenschutzschiff"
 ship_type_coastal_defense_ship_desc: "Schwer bewaffnete und gepanzerte Schiffe, die für Küstengewässer entworfen wurden."
 ship_type_destroyer: "Zerstörer"
 ship_type_destroyer_desc: "Schnelle, aber schwer bewaffnete Schiffe, die für den Einsatz in Flotten und als Eskorte entworfen wurden."
 ship_type_aircraft_carrier: "Flugzeugträger"
 ship_type_aircraft_carrier_desc: "Schiffe, von denen Flugzeuge abheben und wieder landen können. Flugzeugträger dienen vor allem der Aufklärung, spielen aber auch bei gewissen Offensiven eine Rolle."
 ship_type_torpedo_boat: "Torpedoboot"
 ship_type_torpedo_boat_desc: "Kleine, schnelle Schiffe, die vernichtende Schläge gegen größere, langsamere Kriegsschiffe durchführen können."
 ship_type_torpedo_boat_destroyer: "Torpedobootzerstörer"
 ship_type_torpedo_boat_destroyer_desc: "Schiffe, die die kleineren Torpedoboote kontern sollen, aber auch selbst Torpedoangriffe durchführen können."
 ship_type_light_cruiser: "Leichter Kreuzer"
 ship_type_light_cruiser_desc: "Leichte Panzerkreuzer, die für Langstreckenpatroullien, Handelsschutz und Machtprojektion gebaut wurden."
 ship_type_armored_cruiser: "Panzerkreuzer"
 ship_type_armored_cruiser_desc: "Große Kreuzer mit schwerem Panzergürtel, die alle Ziele außer Schlachtschiffen bekämpfen können."
 ship_type_protected_cruiser: "Schutzkreuzer"
 ship_type_protected_cruiser_desc: "Schnelle Kreuzer mit großer Reichweite, deren Panzerdecks wichtige Komponenten schützen."
 ship_type_seaplane_tender: "Flugzeugmutterschiff"
 ship_type_seaplane_tender_desc: "Schiffe, die Wasserflugzeuge starten lassen und befördern können. Sie dienen der Aufklärung und haben begrenztes Offensivpotenzial."
 ship_type_early_ironclad: "Frühes Panzerschiff"
 ship_type_early_ironclad_desc: "Mächtige hochseetaugliche Schiffe mit Eisenpanzerung und Dampfmaschinenantrieb."
 ship_type_modern_ironclad: "Modernes Panzerschiff"
 ship_type_modern_ironclad_desc: "Als Weiterentwicklung des traditionellen Panzerschiffs beinhalten moderne Panzerschiffe viele technische Weiterentwicklungen."
 ship_type_pre_dreadnought: "Großlinienschiff-Vorläufer"
 ship_type_pre_dreadnought_desc: "Ein mächtiges Schlachtschiff, auf dem gemischte Batterien von schweren Kanonen angebracht sind."
 ship_type_dreadnought: "Großlinienschiffe"
 ship_type_dreadnought_desc: "Revolutionäre Schlachtschiffe, die auf einheitlichen Batterien aus schweren Kanonen beruhen."
 ship_type_super_dreadnought: "Supergroßlinienschiff"
 ship_type_super_dreadnought_desc: "Vergrößerte Großlinienschiffe mit schwereren Kanonen und noch dickerer Panzerung."
 ship_type_submarine: "U-Boot"
 ship_type_submarine_desc: "Tauchfähige Schiffe, die vor allem dafür gedacht sind, gegen feindliche Handelsschiffe eingesetzt zu werden."
 ship_type_troop_ship: "Truppentransporter"
 ship_type_troop_ship_desc: "Speziell gebaute Versorgungsschiffe, die Truppen und Material um den ganzen Globus befördern können."
 ship_type_supply_ship: "Versorgungsschiff"
 ship_type_supply_ship_desc: "Ein Schiff, das Militärwaren von einem Platz zum anderen transportiert."
 ship_graphics_type_borodino: "Borodino"
 ship_graphics_type_borodino_desc: "Großlinienschiff-Vorläufer der Borodino-Klasse waren die neuesten Schlachtschiffe der Kaiserlich Russischen Marine zu Zeiten des Russisch-Japanischen Kriegs. Sie bildeten den Kern des 2. Pazifischen Geschwaders von Admiral Roschestwenski, dem ein schreckliches Schicksal blühte: Vier Vertreter dieser Klasse wurden bei der Schlacht von Tsushima versenkt oder gekapert."
 ship_graphics_type_mikasa: "Mikasa"
 ship_graphics_type_mikasa_desc: "Das Flaggschiff von Admiral Tōgō während des Russisch-Japanischen Kriegs: Auf diesem Schlachtschiff und Großlinienschiff-Vorläufer schlug sich Mikasa in allen wichtigen Flotteneinsätzen des Krieges, sodass es zu einem andauernden Symbol für den Aufstieg Japans auf See wurde."
 ship_graphics_type_dingyuan: "Dingyuan"
 ship_graphics_type_dingyuan_desc: "Als Stolz der Beiyang-Flotte waren die Panzerschiff-Schlachtschiffe Dingyuan und Zhenyuan die hervorstechendsten Symbole militärischer Modernisierung in der späten Qing-Zeit. Sie kämpften tapfer in der Seeschlacht am Yalu, doch die chronische Unterfinanzierung der kaiserlichen Marine Chinas machte es ihnen schwer."
 ship_group_capital_ships: "Großkampfschiffe"
 ship_group_capital_ships_desc: "Großkampfschiffe sind die größten und kampffähigsten Schiffe auf See. Sie wurden für den Einsatz in der Schlachtlinie entworfen."
 ship_group_cruisers: "Kreuzer"
 ship_group_cruisers_desc: "Kreuzer sind kleine, leichter gepanzerte Schiffe, die für Kreuzeinsätze auf lange Entfernung eingesetzt werden."
 ship_group_torpedo_craft: "Torpedoschiffe"
 ship_group_torpedo_craft_desc: "Torpedoschiffe sind kleine, bewegliche Schiffe, die sich auf Torpedos mit eigenem Antrieb als Hauptbewaffnung verlassen."
 ship_group_supply_ships: "Versorgungsschiffe"
 ship_group_supply_ships_desc: "Versorgungsschiffe sind Zivilisten und speziell gebaute Schiffe, die Einsätze von militärischen Flotten unterstützen."
