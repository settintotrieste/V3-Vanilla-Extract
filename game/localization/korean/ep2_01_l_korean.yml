 # Journal Entries
 ## The Hidden Domain JE
 je_ryukyu_rivalry: "숨겨진 번"
 je_ryukyu_rivalry_reason: "#b 사쓰마 번#!의 #b 1609년 침공#! 이래로 [SCOPE.sCountry('ryukyu_scope').GetName] 왕국은 이름만 유지할 뿐, 실질적으로는 [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')]의 영토가 되었습니다. 슈리 궁정은 사쓰마 번에 의해 복속하게 되었으나, 계속해서 [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')]의 책봉을 받고 북경에 조공 사절단을 보내며 독립 국가와 같은 모습을 유지했습니다.\n\n이 합의는 여러 세대에 걸쳐 유지되어 왔습니다. 그러나 서구 열강의 존재감이 커지고, 일본이 개방되며 동아시아 힘의 균형이 움직이기 시작했습니다. 두 세력은 류큐와의 관계를 명확히 해야 하는 상황이 되었고, 이에 남부 열도가 공개적인 경쟁의 장으로 변하고 있습니다.\n$TOOLTIP_DELIMITER$\n@warning! #r 실패:#! \n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag]의 적극성이 #variable 100%#!에 도달함\n [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')] 또는 [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')](이)가 [Concept('concept_subject','종속')] 또는 #b 합병#!됨\n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag](이)가 연루되지 않은 국가에게 [Concept('concept_subject','종속')] 또는 #b 합병#!됨\n\n@information! 환심을 살 방법:\n [SCOPE.sCountry('ryukyu_scope').GetName](와)과 #v 자금 양도#! [concept_article] (#g @money!0.1-2K#!) 체결\n [SCOPE.sCountry('ryukyu_scope').GetName](와)과 #v 우호#! 또는 #v 친밀함#! [concept_relations] 보유\n 최대 [concept_naval_power_projection] 보유\n [SCOPE.sCountry('ryukyu_scope').GetName](이)가 [concept_obligation]을 제공하게 함 \n [concept_journal_entry] 행동 사용"
 #je_ryukyu_rivalry_goal:1 "You are asserting more influence over [SCOPE.sCountry('ryukyu_scope').GetName] than your rival."
 je_ryukyu_rivalry_victory_japan: "#b 일본#! 승리 달성 조건:\n"
 je_ryukyu_rivalry_victory_china: "#b 중국#! 승리 달성 조건:\n"
 je_ryukyu_rivalry_victory_ryukyu: "#b 류큐#! 승리 달성 조건:\n"
 ryukyu_rivalry_sway_tt: "한쪽이 류큐의 환심을 완전히 사게 되면 상대방이 류큐에 행사하던 지배력이 사라지며 [Concept('concept_subject','종속')]이 다시 가능해집니다.\n\n환심을 살 방법:\n 류큐와 #v 자금 양도#! [concept_article] (#g @money!0.1-2K#!) 체결\n 류큐와 #v 우호#! 또는 #v 친밀함#! [concept_relations] 보유\n 최대 [concept_naval_power_projection] 보유\n 류큐가 [concept_obligation]을 제공하게 함\n [concept_journal_entry] 행동 사용"
 ryukyu_rivalry_assertiveness_tt: "막대가 #v 100%#!에 도달하면 류큐가 중립을 주장하게 됩니다. 류큐가 중립을 주장하면 #v 50#!년 동안 [concept_diplomatic_action]을 통해 [concept_subject]으로 만들 수 없습니다.\n\n환심이 #v -20#!에서 #v +20#! 사이로 유지되는 경우, 적극성이 매달 #g 0.5#!만큼 증가합니다.\n\n류큐는 환심에 영향을 미치는 행동을 사용해 일본과 중국이 서로 경쟁하게 만들며 중립을 주장할 수 있습니다. \n\n예시:\n 양측과 #v 자금 양도#! [concept_article] (#g @money!0.1-2K#!)을 체결하거나 양측 모두와 체결하지 않음\n 양측과 #v 우호#! 또는 #v 친밀함#! [concept_relations]를 보유하거나 양측 모두와 해당 관계를 보유하지 않음\n 양측에 [concept_obligation]을 제공하거나 양측 모두에 제공하지 않음\n 한쪽이 우세를 보이거나 열세를 보이는 경우 앞서 언급된 조약을 취소하거나 체결함"
 ryukyu_rivalry_completion_japan_victory_tt: "[SCOPE.sCountry('ryukyu_scope').GetName](이)가 [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')](와)과 [Concept('concept_unification', '통일')]될 것임"
 ryukyu_rivalry_completion_japan_victory_subject_tt: "[SCOPE.sCountry('ryukyu_scope').GetName](이)가 [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')]의 [concept_subject]이 됨"
 ryukyu_influence_victory_china_tt: "[SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')](이)가 [SCOPE.sCountry('ryukyu_scope').GetName](을)를 상대로 최대 #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 환심#!#! 획득"
