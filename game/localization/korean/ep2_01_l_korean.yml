l_korean:
 japan_events.1.t: "전 국민 우편 제도"
 japan_events.1.d: "근대주의 사상가들이 [ROOT.GetCountry.GetName] 내에서 영향력을 키워 가면서, 기존의 전령 체계의 한계가 점점 더 분명해지고 있다. 봉건 질서의 해체이든, 인구 전반에 걸친 문해력의 확산이든, 이제는 근대 국가를 지탱할 수 있는 중앙집중식 우편 제도를 마련할 여건이 갖추어졌다."
 japan_events.1.f: "정부 인장을 지닌 전령들이 평소와는 다르게 편지로 가득 찬 주머니를 매고 거리를 달렸다. 수도에서는 관리들이 밤새 지도 위로 몸을 숙여 노선을 조정하고 우표를 세었다. 상인들은 재래식 전령 제도가 흔들리는 데 불만을 터뜨렸고, 호기심 가득한 아이들이 생애 첫 편지를 새 우체통에 넣었다. 관습에 의해 나뉘어 있던 이 나라는 이제 하나의 목소리로 말하기 시작했다."
 japan_events.1.a: "전국적 확대를 전액 지원한다."
 japan_events.1.b: "주요 도심지에 집중한다."
 japan_events.1.c: "농촌 지역을 우선한다."
 japan_events.1.e: "[SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')]에게 개혁을 맡긴다."
 japan_events.1.g: "기존 전령 제도를 유지한다."
