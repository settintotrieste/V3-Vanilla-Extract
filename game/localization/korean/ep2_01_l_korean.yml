 japan_events.4.t: "이름의 서구화"
 japan_events.4.d: "[ROOT.GetCountry.GetName](이)가 외국 열강과 외교 및 무역을 수행하는 과정에서, [GetCulture('japanese').GetName]식 이름을 조약, 서신, 공문서에 어떻게 표기할 것인가를 둘러싼 문제가 제기되고 있다. 서구 대표들은 점점 더 자신들의 관례에 따라 성이 아닌 이름을 먼저 두는 방식을 요구하고 있다."
 japan_events.4.f: "서기들은 책상 위에 몸을 숙인 채 외국 관리를 위한 서신에 펜을 달그락거리며 글을 옮겨 적었다. 오랜 전통을 바꾸는 것이 해외에서의 명확성을 위해 정당화될 수 있는지 서로 속삭이며 논쟁했다. 인장을 들고 종이 위에 멈춘 손은 잠시 망설이다가, 마침내 잉크를 내려놓았다."
 japan_events.4.a: "대외 서신에서 서구식 관례를 채택한다."
 japan_events.4.b: "전통적인 이름 순서를 유지한다."
 japan_events.4.c: "새로운 시대다. 모든 분야에서 서양의 관습을 받아들여야 한다."
 japan_single_fire_events_name_order_westernized_mod: "서구식 이름 표기 관례"
 japan_single_fire_events_name_order_traditional_mod: "전통적 이름 순서 유지"
 japan_single_fire_events_name_order_resistance_mod: "문화적 명명법 논쟁"
 japan_single_fire_events_name_order_approval_mod: "행정적 명료화"
 japan_events.5.t: "일본식 한문의 문제"
 japan_events.5.d: "칙령과 규정, 기록은 소수의 교육받은 이들만이 이해할 수 있는 고전 문자만을 오랫동안 사용했다. 개혁론자들은 공무를 구어체 일본어로 집행하면 명확성과 효율이 높아질 것이라 주장한 반면, 다른 이들은 전통 그 자체가 문서에 권위를 부여해 왔다고 맞섰다."
 japan_events.5.f: "관료들은 밤늦도록 조용히 지침 문구를 고치고 또 고쳐 나갔다. 한 서기는 눈을 비비고는 다시 고개를 숙여, 단 하나의 획도 놓치지 않으려 애쓰며 계속 써 내려갔다. 획을 그을 때마다 혼란과 무질서와 맞서 싸우는 작은 전투가 벌어지는 듯했다."
 japan_events.5.a: "공식 행정에 구어체 일본어를 장려한다."
 japan_events.5.b: "내부 서신에 한해 제한적 개혁을 허용한다."
 japan_events.5.c: "모든 국가 문서에서 고전 일본식 한문을 유지한다."
 japan_language_partial_language_reform_mod: "제한적 행정 언어 개혁"
 japan_single_fire_events_language_reform_support_mod: "구어 행정 준수"
