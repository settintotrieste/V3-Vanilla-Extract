 japan_events.2.t: "엇갈린 달력"
 japan_events.2.d: "수백 년 동안 일본의 상식이었던 태음태양력은 서구 세계와 점점 어긋나고 있다. 상인들은 해외 거래처와 일정을 맞추는 데 어려움을 호소했고, 백성들은 어긋난 명절과 지대, 세금 기한 때문에 혼란을 겪고 있다고 전했다."
 japan_events.2.f: "서기들이 책 위로 몸을 구부리고 한 줄 한 줄 조심스럽게 옮겨 적었다. 작업이 반복될수록 종이 더미는 점점 높아졌고, 더 이상 존재하지 않는 달을 따라가느라 눈은 따갑게 아려 왔다. 오래된 달력이 조용히 사라지고 있었다."
 japan_events.2.f_telegraph: "전령들이 서둘러 거리를 누비며 연달아 소식을 전했다. 사람들은 잠시 멈춰 각 공고를 읽었다. 날짜가 도저히 따라갈 수 없을 만큼 빠르게 변하며 사람들의 머리도 함께 돌았다. 소식은 즉시 퍼져나갔고, 오래된 달력은 거의 하룻밤 사이에 사라져 버렸다."
 japan_events.2.a: "역법 개혁을 즉시 추진한다."
 japan_events.2.b: "[GetTechnology('electric_telegraph').GetName]를 활용해 변경을 신속히 진행한다."
 japan_events.2.c: "당분간 기존 체계를 유지한다."
