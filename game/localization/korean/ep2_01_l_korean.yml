 japan_events.3.t: "재정립된 한 해"
 japan_events.3.d: "새 달력의 도입은 한 해를 조용히 단축시켰다. 계산되는 날짜가 줄어들면서 임금과 지대, 세금은 기존 제도에 따른 숫자와 더 이상 맞지 않게 되었다. 노동자들은 줄어든 급여를 확인했고, 관리들은 그 차이를 설명하느라 애를 먹었다."
 japan_events.3.f: "노동자들은 동전을 몇 번이고 다시 세며 고개를 저었다. 손은 노동으로 거칠어졌지만, 그에 비해 거둔 보상은 적었다. 한 해는 짧아졌고, 사라진 날짜는 지친 팔과 빈 주머니에 흔적을 남겼다."
 japan_events.3.a: "한 해가 짧아졌다. 그렇게 받아들여라."
 japan_events.3.b: "부담을 인구 전반에 재분배한다."
 japan_events.3.c: "안정을 위해 손실을 흡수한다."
 japan_single_fire_events_lost_income_mod: "단축된 연도에 따른 임금 충격"
