l_korean:
 edo_system: "에도 지위 체계"
 # Edo Social Classes
 strata_samurai_high: "상위 사무라이" # High-Class Samurai
 strata_samurai_high_desc: "다이묘와 고위 가신 등 상류층 계급의 전사입니다. 사무라이 계층의 최상위 계급은 주요 관직의 대부분을 독점하며, 세습제를 통해 큰 위신을 누립니다."
 strata_samurai_low: "하위 사무라이" # Low-Class Samurai
 strata_samurai_low_desc: "고케닌과 아시가루와 같은 하위 계급의 전사 및 가신은 상류층 사무라이 밑에서 일하는 행정 및 군사 노동 종사자입니다."
 strata_religious: "지샤" # Priests
 strata_religious_desc: "사찰 기관에서 조직되어 당국의 규제를 받는 신사의 성직자입니다. 지역의 생활과 학문, 종교의식에 영향력을 미치지만 법으로 규정되어 있는 계급 체계에서는 다소 벗어나 있는 계층입니다."
 strata_commoners_peasants: "햐쿠쇼" # Peasants
 strata_commoners_peasants_desc: "평민 계층의 일부인 농민은 일본 사회 계층에서도 가장 수가 많습니다. 농민 계층의 구성원들은 마을에 등록되어 지역의 의무를 수행하고 조세를 부담해야 합니다. 이들은 직업이 아니라 등록에 따라 구분되며, 농부는 물론 농촌의 장인 및 상인도 포함합니다."
 strata_commoners_townspeople: "조닌" # Townspeople
 strata_commoners_townspeople_desc: "평민 계층의 일부인 도시민은 일본 도심지의 주요 거주민들입니다. 도시민 계층의 구성원들은 도시 기관에 등록되며 전통적으로 제작 및 상업 분야와 연관되어 있습니다. 이들은 상당한 양의 부와 영향력을 소유할 수 있으나, 전사가 아닌 지위 계층이므로 사회적 이동에 제약이 있습니다."
 strata_outcastes: "에타히닌" # Outcastes Eta, Hinin, etc.
 strata_outcastes_desc: "에타와 히닌은 일본 사회의 최하위 계급입니다. 이들은 큰 차별을 받으며, 무덤을 파거나 구걸하고 거리에서 공연을 하는 등 '더러운' 직업과 연관됩니다."
 # Edo Social System Laws
 lawgroup_edo_social_system: "에도 지위 체계"
 lawgroup_edo_social_system_desc: "$lawgroup_edo_social_system$ 이행"
 law_strict_edo_system: "엄격한 지위 질서"
 law_strict_edo_system_desc: "법적 및 직종 기회부터 개인의 지위가 허용하는 주거지 출입문 수에 이르기까지, 모든 사항이 국가의 엄격한 규제를 따라 이행됩니다. 규율을 위반하면 큰 처벌이 뒤따르며, 도시민과 농민은 공식적으로 사무라이 계급에 진입할 방도가 없습니다."
 law_intermediate_edo_system: "느슨한 지위 질서"
 law_intermediate_edo_system_desc: "법과 규제가 완화되었으며 평민들도 사회에서 영향력과 지위가 높아집니다. 부유한 도시민 또는 농민은 돈으로 신분을 사서 하위 사무라이인 고케닌이 될 수 있습니다."
 law_lax_edo_system: "해이한 지위 질서"
 law_lax_edo_system_desc: "예전에는 오직 사무라이에게 허용되던 직위와 역할이 평민에게도 열렸습니다. 남아 있는 사치 규제 및 직종 제한 법령도 선택적으로 이행되며, 보통은 가장 중대한 위반 행위에만 적용됩니다."
 # Tenpo Crisis
 je_tenpo_crisis: "덴포 위기"
 je_tenpo_crisis_reason: "1830년 선포된 덴포, 즉 '하늘의 보호'를 뜻하는 이 시대는 초기에는 그 이름대로 상서롭게 흘러갔습니다. 하지만 [GetGeographicRegion('geographic_region_honshu').GetName]의 악천후로 인해 쌀값이 치솟으며 기근이 전국으로 번졌습니다. 또한 [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]의 부와 영향력이 증가하며 기존의 [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] 질서가 위협받고 있습니다.\n\n한편 수평선 너머에서는 서양 [Concept('concept_great_power','$concept_great_powers$')]이 더 대담하게 움직이며, 이들의 상인과 포함도 우리의 해안에 더 가까워지고 있습니다.\n\n개혁을 지향하는 유명인들이 이러한 문제를 해결할 방도를 모색하며 막부에 자신들의 전망을 제시했습니다.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b 개혁론자 의제#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] [ROOT.GetCountry.GetNameNoFlag](이)가 [GetLawType('law_lax_edo_system').GetName] 제정\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] [ROOT.GetCountry.GetNameNoFlag](이)가 [GetLawType('law_hereditary_bureaucrats').GetName] 법률을 제정하지 #b 않음#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] [ROOT.GetCountry.GetNameNoFlag](이)가 #v 3#!단계 [GetBuildingType('building_urban_center').GetName]가 있는 [Concept('concept_state', '$concept_states$')] #v 3#!개 보유\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')] [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] [concept_interest_group]의 [concept_clout]이 #v 10#! 이상임\n#tooltippable;tooltip:tenpo_hardliner_tt #b 강경론자 의제#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] [ROOT.GetCountry.GetNameNoFlag](이)가 [GetLawType('law_strict_edo_system').GetName] 제정\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] [ROOT.GetCountry.GetNameNoFlag](이)가 [GetLawType('law_shinsengumi').GetName] 제정\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] [ROOT.GetCountry.GetNameNoFlag](이)가 #v 40#!단계 [GetBuildingType('building_rice_farm').GetName] 보유\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')] [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] [concept_interest_group]이 [concept_marginalized]됨\n#tooltippable;tooltip:tenpo_shared_tt #b 공통 의제#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] 보유한 [GetCulture('japanese').GetName] [concept_homeland] [concept_state] 중 [concept_famine]에 시달리는 곳이 #b 없음#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [ROOT.GetCountry.GetNameNoFlag]의 [Concept('concept_gdp', '$concept_gdp_short$')]이 @gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! 이상임\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] [ROOT.GetCountry.GetAdjectiveNoFlag] 육군 [concept_power_projection]가 #v 500#! 초과\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] 자국이 보유한 [Concept('concept_state', '$concept_states$')] 내 [GetBuildingType('building_naval_fortification').GetName] 단계가 #v 10#! 이상임"
 je_tenpo_crisis_complete_header: "다음의 경우 덴포 개혁이 성공할 것임:\n"
 je_tenpo_crisis_failure_header: "다음의 경우 덴포 개혁이 실패할 것임:\n"
 je_tenpo_crisis_success_tt: "최소 #v 8#!개의 의제 목표를 완료함"
 je_tenpo_crisis_success_2_tt: "[SelectLocalization(MilitaryFormation.IsArmy, 'MILITARY_FORMATION_BATTALIONS_TOOLTIP', 'MILITARY_FORMATION_SHIPS_TOOLTIP')][AddLocalizationIf(MilitaryFormation.IsArmy,'MILITARY_FORMATION_TOTAL_NUMBER_OF_UNITS_TOOLTIP_BUILDINGS')]"
 je_tenpo_crisis_success_outcome_tt: "완료한 #b 공통#!, #b 개혁론자#!, #b 강경론자#! 목표 수에 따라 보상이 변경될 것임."
 je_tenpo_crisis_success_outcome_1_tt: "#b 강경론자#! 의제를 더 많이 완료한 경우:"
 je_tenpo_crisis_success_outcome_2_tt: "#b 개혁론자#! 의제를 더 많이 완료한 경우:"
 je_tenpo_crisis_success_outcome_3_tt: "동일한 수의 #b 강경론자#! 및 #b 개혁론자#! 의제를 완료한 경우:"
 modifier_tenpo_crisis_reward_hardliner: "질서로의 복귀"
 modifier_tenpo_crisis_reward_reformer: "새것 모시기"
 modifier_tenpo_crisis_reward_balanced: "신중한 개혁"
 modifier_rice_hoarding: "널리 퍼진 쌀 사재기"
 tenpo_hardliner_tt: "#b 강경론자 파벌#!은 일본 사회가 도덕적으로 부패하고 있으며, 전통으로 회귀해야 이 부패를 막을 수 있다고 봄.\n\n따라서 더 엄격한 사치 규제 법률을 도입해야 하며, 사무라이가 도심의 호화로운 생활을 포기하고, 이들의 이상적인 역할인 소박한 전원 행정가로 돌아가야 한다고 주장함."
 tenpo_reformer_tt: "#b 개혁론자 파벌#!은 일본 사회가 돌이킬 수 없이 바뀌었으며, 이에 따라 국가의 법도 낭만화된 과거의 이상이 아니라 국가의 실제 상태를 기반으로 적용되어야 한다고 봄.\n\n이들은 일본 평민의 지위가 정치적으로 상승해야 하며, 상업 또한 장려되어야 한다고 주장함."
 tenpo_shared_tt: "#b 강경론자#! 및 #b 개혁론자#! 파벌 모두 일본을 외세의 위협에서 지켜야 한다고 생각하며, 식량 안보 및 경제 문제를 해결해야 한다고 주장함."
 button_je_tenpo_combat_rice_hoarding: "전투적인 쌀 사재기"
 button_je_tenpo_combat_rice_hoarding_desc: "[ROOT.GetCountry.GetNameNoFlag]의 불안정한 정치 및 경제 상황을 틈타 부도덕한 이들이 쌀을 대규모로 사재기하며 쌀값을 올리고 있다. 그 결과 많은 일본인 가정이 당장 먹을 쌀을 구매할 수도 없게 되었다."
 button_je_tenpo_frugal_ordinance: "절약 법령 공표"
 button_je_tenpo_frugal_ordinance_desc: "도시 [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]들의 퇴폐가 증가하며 우리 통치의 안정성이 위협받고 있다. 이들은 이제 자신들의 신분을 넘어서는 행동을 보이며 모두에게 부를 과시한다.\n\n사치품, 유흥, 문학에 더 강한 법적인 제재를 부과해, 사회에서 이들의 역할이 무엇인지를 상기시켜야 한다."
 button_je_tenpo_confiscate_land: "에도-오사카 몰수 명령 공표"
 button_je_tenpo_confiscate_land_desc: "에도와 오사카의 10#italic #tooltippable;tooltip:glossary_ri 리#!#! 내 지역에는 덴료, 다이묘, 하타모토 소유의 영지가 복잡하게 뒤엉켜 있다. 통합된 행정 구조의 부재가 국가 방위는 물론 토지의 온전한 잠재력 활용 능력에 심각한 영향을 미치고 있으므로, 주요 노중이 이 영지들의 몰수 및 통합을 제안해 왔다.\n\n이주 대상 토지 소유자는 일본 내 다른 지역의 토지를 보상으로 받게 될 것이다."
 modifier_consolidation_payments: "토지 통합 대금"
 modifier_consolidated_state_land: "10리 통합법"
 glossary_ri: "#b #italic 리#!#!는 중국의 #italic 리#!에서 유래된 전통적인 측정 단위입니다.\n\n1리의 길이는 시대에 따라 다르게 규정되지만, 후기 에도 시대에는 대략 36#italic 정#! 또는 3.9km로 환산됩니다."
 modifier_tenpo_crisis_ongoing: "덴포 시대 대변동"
 tenpo_events.1.t: "하늘의 보호를 받는 시대"
 tenpo_events.1.d: "몇 년간 좋지 못한 기후가 계속되며 [concept_famine]이 [ROOT.GetCountry.GetNameNoFlag]의 땅에 찾아들었다. 가난한 극빈층은 먹고 살기 위해 필사적으로 노력하고 있다. 사람들은 정부가 더 조치해야 한다고 생각하며, 점점 커지는 불만이 막부를 향하고 있다."
 tenpo_events.1.f: "아내가 짠 직물은 시장에서 항상 좋은 값을 받고 팔 수 있었다. 더 좋은 시절이었다면 직물을 팔아 가끔 제과를 사 먹을 수도 있었을 것이다. 그러나 지금은 쌀 4~5합밖에 살 수 없다. 그는 생각했다. 하루를 겨우 먹고 살겠군. 일주일 치는 필요한데, 채집한 잎이나 잡초 따위로 보충해도 한참 부족했다.\n\n그는 집으로 향하다 잠깐 멈춰서 나이 든 토라의 집을 살폈다. 두 아이는 이미 천연두로 목숨을 잃었고, 우비에 관한 소문이 사실이라면 앞으로 몇 주간 더 많은 이가 목숨을 잃을 것이다. 그는 쌀자루를 꽉 쥐며 조용히 기도한 뒤 자리를 떴다."
 tenpo_events.1.a: "하늘이시여, 보우하소서!"
 tenpo_events.1.tt_1: "#r 심한#! [GetHarvestConditionType('torrential_rains').GetName]가 [GetGeographicRegion('geographic_region_honshu').GetName]에 들이쳐 국가의 중요한 #b 벼 수확#!을 #r 망치고#! [ROOT.GetCountry.GetAdjectiveNoFlag]의 [concept_food_security]를 극심하게 저해함."
 tenpo_events.1.tt_2: "[GetGeographicRegion('geographic_region_honshu').GetName] 전역에서 대금업자 및 쌀 사재기꾼으로 의심되는 이들의 거주지가 #italic #tooltippable;tooltip:glossary_uchikowashi 우치코와시#!#!에 가담한 폭도들의 목표가 되며, #r 전국적인#! [concept_devastation]가 발생함."
 glossary_uchikowashi: "#b #italic 우치코와시#!#!는 대중이 고리대금업자, 쌀 사재기꾼 및 폭리를 취하는 업자처럼 부도덕하게 여겨지는 사람의 재산을 파괴하는 행위입니다.\n\n이러한 행위에는 보통 약탈이 수반되지만, 많은 경우 우치코와시를 행하는 이들은 자신들의 정당성을 강조하고자 의도적으로 약탈을 삼갑니다."
 tenpo_events.2.t: "철학가 사무라이의 난"
 tenpo_events.2.d: "기존의 질서와 [SCOPE.sState('osaka_scope').GetName]에 만연한 [concept_famine]을 해결하지 못하는 그 무능력함에 환멸을 느낀 관료이자 학자 [SCOPE.sCharacter('oshio_scope').GetFullName](이)가 현지 당국에 맞서 난을 일으켰다. [SCOPE.sCharacter('oshio_scope').GetHerHis] 지지자들이 현지의 정부 집무실에 불을 놓으며, [SCOPE.sState('osaka_scope').GetCityHubName]의 대부분이 이미 불꽃에 휩싸였다."
 tenpo_events.2.f: "\"우리는 당나라와 오나라의 힘도, 공자와 맹자의 미덕도 갖추지 못했으나 이제는 어쩔 수 없다. 그리하여 우리 혈통이 저주받게 되더라도, 이 나라를 위해 행동해야만 한다.\n\n평민에게 고통을 안기며 괴롭히던 여러 관료를 처벌하고 처형할 것이며, 다음으로는 사치를 즐기며 살이 찐 오사카의 부유한 도시민도 마찬가지로 처벌하고 처형할 것이다.\n\n그런 다음 저들이 비밀 금고에 보관했던 금은과 동전은 물론, 창고며 장원에 숨겨 두었던 쌀더미까지 고루 나눌 것이다.\"\n\n–오시오 헤이하치로, #italic 선언문에서 발췌#!"
 tenpo_events.2.a: "민병대를 결집해 이 반역자를 십자가에 못 박아라."
 tenpo_events.2.b: "절박하지만 정당한 행동이로군."
 tenpo_events.2.c: "반란군이 현지 주둔군을 압도하고 [SCOPE.sState('osaka_scope').GetCityHubName](을)를 장악한다."
 tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName](이)가 체포되지 않고 달아나 분신자살함."
 tenpo_events.2.tt_2: "[SCOPE.sCharacter('oshio_scope').GetFullName](이)가 당국에 의해 고문당하고 소금이 뿌려진 뒤 십자가형을 받음."
 tenpo_events.2.tt_3: "현지 민병대가 #b 반란이 더 커지기 전에 진압#!함."
 tenpo_events.2.tt_4: "[concept_agitator] [SCOPE.sCharacter('oshio_scope').GetFullName](이)가 가벼운 상징적 선고를 받고 계속 과업을 이어갈 수 있게 됨."
 modifier_osaka_burning: "피로 서명한 평론"
 modifier_controversial_pardon: "논란의 여지가 있는 사면"
 tenpo_events.3.t: "의무 개혁"
 tenpo_events.3.d: "개혁의 속도에 만족한 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle](이)가 주재 의원들의 진전을 축하하며, [ROOT.GetCountry.GetAdjective](을)를 이제 외세든 내부든 그 어떤 시련도 극복할 수 있는 국가라고 여긴다."
 tenpo_events.3.f: "\"열둘입니다.\" 수석 의원이 붓을 탁자에 내려놓으며 말했다. \"키나이에서 온 보고도 같은 내용을 전하고 있습니다. 개혁이 뿌리를 내린 듯합니다.\"\n\n연단에서 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle](이)가 무뚝뚝하게 고개를 끄덕였다. \"좋군. 적절한 때에 황실에도 알리도록 하게. 이제 나가사키 관료가 보낸 보고서 말인데...\""
 tenpo_events.3.a: "[ROOT.GetCountry.GetAdjective]의 도덕적, 정치적 부패는 이날로 끝날 것이다."
 tenpo_events.3.b: "농민부터 사무라이까지, 모두가 천황의 신하 아니던가?"
 tenpo_events.3.c: "나라의 안정이 그 무엇보다도 중요하다."
 tenpo_outcome_hardliner_tt: "#b 강경론자#! 의제를 #b 개혁론자#! 의제보다 더 많이 완료했음"
 tenpo_outcome_reformer_tt: "#b 개혁론자#! 의제를 #b 강경론자#! 의제보다 더 많이 완료했음"
 tenpo_outcome_balanced_tt: "동일한 수의 #b 강경론자#! 및 #b 개혁론자#! 의제를 완료했음"
 tenpo_events.4.t: "행동과 방관"
 tenpo_events.4.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle](은)는 개혁 계획의 결과에 큰 감명을 받지 못했으며, 수석 의원들을 향한 군중의 불만이 점점 더 커지자 [SCOPE.sCharacter('roju_scope').GetFullName](을)를 직위에서 해임했다."
 tenpo_events.4.f: "유배. 전 의원은 그 단어를 곱씹어 보았지만 마음에 들지 않았다. 하지만 어제의 사건을 생각하면 에도에 머무는 것보다는 나을지도 몰랐다. 남아 있는 수행원들은 아직 연못과 뜰에 던져졌던 기왓장과 돌을 치우는 중이었고, 그날 들었던 위협 중 몇 가지는 도저히 잊을 수 없는 말들이었다.\n\n의원은 다시 단어를 곱씹어 보았다. 그랬더니 예전보다는 덜 거북하게 느껴졌다. 게다가 이런 생각도 들었다. 어차피 갓산산을 이 두 눈으로 직접 보고 싶어 하지 않았던가."
 tenpo_events.4.a: "내 평생 다시는 이 멍청이를 보고 싶지 않다."
 tenpo_events.4.b: "그의 모든 결정을 뒤집고, 대중에도 이 사실을 똑똑히 알려라."
 tenpo_events.4.tt_1: "[SCOPE.sCharacter('roju_scope').GetFullName](이)가 #r 강등#!당했으며 #b 데와#! 지방으로 유배당함"
 modifier_tenpo_fail: "덴포 개혁 중단"
 tenpo_events_4_demotion_tt: "[concept_in_government] [concept_interest_group]의 [concept_leader]가 강등당했으며 국내로 유배당함" # tooltip for event_outcome_failed_effect_desc in je_tenpo_crisis
 tenpo_events.5.t: "중앙집권화에 저항하는 지주들"
 tenpo_events.5.d: "[SCOPE.sState('kanto_scope').GetName](와)과 [SCOPE.sState('kansai_scope').GetName]의 토지를 몰수하려 했으나, 현지 지주들이 사방에서 반대하기 시작했다. 그중에서도 군사 복무의 보상으로 토지를 받은 자들의 불만이 가장 크다."
 tenpo_events.5.f: "\"조상님이 무공을 세워 받으신 땅을 지금 내 이름으로 소유하고 있다. 세키가하라 전투 이래로 모든 세대가 땅을 일구고 수확량을 늘리며, 한 번도 불평하는 일 없이 주인에게 의무를 다했다.\n\n그렇게 봉사했건만 지금 우리가 받는 대우가 타당한가? 보상도 없이 이주하는 것을 보상이라 할 수 있는가?\""
 tenpo_events.5.a: "일이 걷잡을 수 없이 커지기 전에 중앙집권화를 취소한다."
 tenpo_events.5.b: "이주자들에게 보상으로 추가 토지를 제공한다."
 tenpo_events.5.c: "저들에게 이것이 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]의 의지임을 똑똑히 알려 주어라!"
 modifier_heavy_handed_land_confiscations: "혹독한 토지 몰수"
 modifier_promotions_and_koku_redistribution: "장려 및 곡식 재분배"
 modifier_reckless_roju: "무모한 노중"
 modifier_will_of_the_shogun: "쇼군의 이름으로"
 tenpo_events.6.t: "용의 소굴 속 사자"
 tenpo_events.6.d: "[SCOPE.sCountry('britain_scope').GetName](이)가 [SCOPE.sCountry('china_scope').GetAdjective](을)를 상대로 승리를 거두었다는 소식에 온 나라가 충격을 받았다. 중국의 정크선과 군대는 우월한 [SCOPE.sCountry('britain_scope').GetAdjectiveNoFormatting] 병력에 손쉽게 궤멸당했으며, 이제 많은 이가 [ROOT.GetCountry.GetName](은)는 과연 이와 같은 공격에 저항할 수 있을지 의심하고 있다."
 tenpo_events.6.f: "\"서쪽의 감로사에서 동쪽의 금산사에 이르기까지, 진강 주변의 땅은 바둑판 위에 알들이 흩뿌려지듯 검고 하얀 야만인들로 가득했다. 현지 주민들은 이들이 언젠가 사라지기는 할지 의문을 품었다.\"\n\n–미네타 후코, #italic 해외신화#!"
 tenpo_events.6.a: "하늘이시여, 지켜 주소서. 사무라이는 그럴 능력이 없을지도 모릅니다."
 tenpo_events.6.b: "중국에서 들어오는 부정적 보고는 모두 검열한다."
 tenpo_events.6.c: "야만인의 파도는 우리의 절벽에 부딪혀 부서지리라."
 modifier_opium_war_aftermath: "관문의 야만인"
 modifier_defenses_strengthened: "연안 주둔군 강화"
 tenpo_events.7.t: "타카시마 학교"
 tenpo_events.7.d: "아편 전쟁의 여파를 지켜보며 일본의 앞날을 걱정하게 된 나가사키 관료 [SCOPE.sCharacter('takashima_scope').GetFullName](이)가 현대 네덜란드의 사례를 기준으로 삼고 군사 부대를 조직했으며, 전국이 이를 따르도록 촉구해 왔다."
 tenpo_events.7.f: "\"그 부하들의 군모는 이상한 왕관처럼 생겼고, 네덜란드인의 이상한 언어로 명령을 외칩니다. 하지만 대형은 조직과 훈련이 잘 되어 있고, 제 부하들보다 거의 두 배는 더 빠르게 일제 사격을 하더군요. 물론 정확도는 조금 더 떨어질지 몰라도 말입니다.\"\n\n\"화포는 어떻습니까?\"\n\n\"견줄 데 없이 뛰어납니다. 우리가 이를 받아들이는 데 오래 걸릴수록 야만인의 공격을 물리칠 확률도 줄어들 것으로 보입니다.\""
 tenpo_events.7.a: "야만인의 무기와 기술의 채택을 승인한다."
 tenpo_events.7.b: "대신 전통 사격장을 옹호한다."
 modifier_inoue_tatsuke_primacy: "이노우에 타츠케 우선권"
 modifier_favouring_traditional_musketry_houses: "전통 사격장 옹호"
 modifier_favouring_takashima: "밀려난 사격장"
 modifier_takashima_school: "타카시마 학교 장려"
 tenpo_events.8.t: "밥 한 그릇을 위해"
 tenpo_events.8.d: "쌀 사재기와 폭리를 취하는 이들을 향한 비난으로 인해 [SCOPE.sState('tenpo_unrest_state_scope').GetName]의 농부 및 상인 사이에 긴장이 고조되고 있다. 농민 계급에 도적과 거지들이 늘어나며 현지 당국은 이제 지방 전역에서 일어나는 반란을 마주하게 되었다."
 tenpo_events.8.f: "그는 최초의 인원 중 하나였다. 사악한 상인의 집을 공격하고, 부정하게 모은 그 재산을 기꺼이 대중에 나눠주었던 이들 중 하나였다. 그러나 모닥불 주변을 둘러보던 그는 남은 사람이 얼마 없다는 사실을 깨달았다. 에이키치와 마츠조는 여전히 남아 있으나, 정의로운 분노로 타오르던 예전의 그 모습은 거의 사라지고 없었다. 후쿠마츠는 둘째 날 목숨을 잃었고, 뒤이어 일곱째 날에는 타케시치가 죽었다. 나머지는 관료의 부하들에게 쫓겨 낙엽처럼 흩어져 버렸다.\n\n이들을 대신하게 된 사람들을 보며 그는 수치와 절망을 느꼈다. 하지만 다른 방도가 없었다. 이렇게 형편없는 동료조차도 사형 집행인의 칼날과 비교하자면 신성해 보일 지경이었으니."
 tenpo_events.8.a: "사람들을 파견해 이 악당들을 짓밟아 버린다."
 tenpo_events.8.b: "소요가 알아서 잦아들게 둔다."
 tenpo_events.8.c: "현지 마을 촌장들에게 소요를 가라앉히게 도와달라고 한다."
 modifier_consulted_headsmen: "마을의 양보"
 modifier_lingering_brigandry: "남아 있는 도적"
 modifier_brutal_anti_bandit_campaigns: "잔혹한 반도적 운동"
 je_taming_the_north: "북부 길들이기"
 je_taming_the_north_reason: "#b 카이타쿠시#!로 알려진 #b [SCOPE.sState('hokkaido_state_scope').GetName] 개척사#!가 형성되며, 전에는 개척지였던 이곳에서 활동이 활발히 일어나고 있습니다. 매일 남쪽에서 온 사람들이 새로운 땅과 기회를 찾아 이곳으로 모여듭니다.\n\n하지만 이는 평범한 군중과는 다릅니다. 정착민과 함께 관료, 지성인, 이 땅을 바꾸고자 하는 임무를 지닌 현대적인 공상가까지 몰려들며 오늘날의 [SCOPE.sState('hokkaido_state_scope').GetName]에 [ROOT.GetCountry.GetName]의 미래를 구현하려 하고 있습니다."
 taming_the_north_agriculture_potentials_goal_tt: "#b $button_je_taming_the_north_agriculture_potentials$#! 액션을 #v 3#!번 사용했음"
 taming_the_north_agriculture_arable_goal_tt: "#b $button_je_taming_the_north_agriculture_arable_land$#! 액션을 #v 3#!번 사용했음"
