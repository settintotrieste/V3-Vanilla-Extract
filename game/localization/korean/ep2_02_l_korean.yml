 je_taming_the_north_additional_goal_pre: "#b $STATE_SAKHALIN$#! 전체를 보유한 경우 #b $modifier_tamed_north$#! [concept_timed_modifier]이 $STATE_SAKHALIN$ [concept_state_region]에도 적용될 것임:"
 je_taming_the_north_additional_goal: "[SCOPE.sStateRegion('sakhalin_state_region_scope').GetName] 전체를 보유한 경우 #b $modifier_tamed_north$#! [concept_timed_modifier]이 [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]에도 적용될 것임:"
 je_taming_the_north_additional_goal_completed: "[SCOPE.sStateRegion('sakhalin_state_region_scope').GetName] 전체를 보유하고 있으므로 #b $modifier_tamed_north$#! [concept_timed_modifier]이 [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]에도 적용될 것임:"
 modifier_tamed_north: "모범 식민지"
 modifier_northern_learnings: "카이타쿠시 교육"
 button_je_taming_the_north_establish_colonies: "국가 지원 식민지 수립"
 button_je_taming_the_north_establish_colonies_desc: "식민지 정착민이 충분하지 않은 식민지는 실패하기 마련이다. [ROOT.GetCountry.GetName] 전역의 가족이 북쪽에 정착할 수 있도록 도울 보상안을 고려해야 한다."
 button_je_taming_the_north_integrate_ainu: "아이누 법적 보호 시행"
 button_je_taming_the_north_integrate_ainu_desc: "지금까지 개척사의 [GetCulture('ainu').GetName]에 대한 관점은 강제 통합과 문화 말살 시행이었다. 그러나 우리의 움직임이 점점 북쪽의 [GetCulture('ainu').GetNameNoFormatting] 거주민과 공평한 관계를 수립하는 쪽으로 변하면서, 나라의 두 민족 사이의 관계도 좋아지고 있다.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]에게 [GetCulture('ainu').GetNameNoFormatting]를 [ROOT.GetCountry.GetAdjective] 법에 따라 보호받는 형제로서 받아들이고, [GetCulture('japanese').GetName]에 대한 권리와 의무를 평등하게 부여해 달라는 제안이 전달되었다."
 ainu_frenship_tt: "#b 이벤트#!에서 [GetCulture('ainu').GetName]의 이해를 계속 추구했음"
 button_je_taming_the_north_sapporo_agricultural_college: "삿포로 농학교 설립"
 button_je_taming_the_north_sapporo_agricultural_college_desc: "북부는 농업과 토지 관리 분야에서 우리의 최신 이론을 시험하기에 적합한 곳이다. 노련한 외국인들을 교직원으로 채용하고, 진보된 농업 대학을 세워 이 땅을 과학적으로 변화시키는 과정의 중심지로 삼아야 한다."
 sapporo_partner_positive_catalyst_tt: "요구 조건을 충족하는 무작위 국가와의 #g 긍정적인#! [concept_diplomatic_catalyst]가 발생하게 됨"
 button_je_taming_the_north_agriculture_potentials: "새로운 작물 도입"
 button_je_taming_the_north_agriculture_potentials_desc: "가장 중요한 점은 물론 섬에서 이용할 수 있는 면적의 양이겠지만, 적합한 작물을 길러야만 진정한 경제 발전을 이룩할 수 있다.\n\n#b 삿포로 농학교#!가 이끄는 농업 분야에서 새로운 개발이 진행되고 있다. 이를 통해 이 차디찬 개척지에 지금까지 불가능할 것으로 여겨져 왔던 작물이 도입되었다.\n\n이용 가능 옵션:\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#! (조정)\n• [GetBuildingType('building_rice_farm').GetName]\n• [GetBuildingType('building_dye_plantation').GetName]\n• [GetBuildingType('building_opium_plantation').GetName]\n• [GetBuildingType('building_vineyard').GetName]"
 established_sapporo_college_tt: "#b 삿포로 농학교#!를 설립했음"
 hokkaido_agriculture_potentials_tt: "이 결단은 총 #v 3#!번 내릴 수 있음. (현재 [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0]번)"
 modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]"
 button_je_taming_the_north_agriculture_arable_land: "간척 사업 지속"
 button_je_taming_the_north_agriculture_arable_land_desc: "이 방대한 토지는 농업적으로 개발이 되어 있지 않으나, 큰 잠재력을 보유하고 있다. 풍부한 수원이 흐르는 거대한 산맥은 북쪽으로 재배 면적을 넓힐 기회를 제공한다.\n\n습지대의 물을 빼고, 밭을 관개하며 땅을 길들여 굴복하지 않는 [GetCulture('japanese').GetName]의 정신을 보여주어야 한다."
 hokkaido_agriculture_arable_tt: "이 결단은 총 #v 3#!번 내릴 수 있음. (현재 [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0]번)"
 hokkaido_events.1.t: "여덟 번째 도"
 hokkaido_events.1.d: "[SCOPE.sState('hokkaido_scope').GetName], 또는 아이누의 땅이 일본에 포함되며 이 땅의 새로운 입지를 반영하는 이름이 필요하게 되었다. 새로 수립된 개척사가 제안한 여러 이름이 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]의 검토를 기다리고 있다."
 hokkaido_events.1.f: "\"야만의 땅이다. 늪지며 진흙밖에 없는 땅이란 말이다. 빈곤한 어부에 사냥해서 먹고사는 사람들의 땅인데. 대체 뭐 때문에 그 황량한 곳으로 간다는 것이냐? [ROOT.GetCountry.GetCapital.GetCityHubName]에도 없는 것이 그 땅에 있을 리가 있느냐?\"\n\n\"제 목적을 찾을 겁니다, 어머니. 저만의 것을 만들러 갈 거예요.\""
 hokkaido_events.1.a: "이 땅의 이름은 #tooltippable;tooltip:hokkaido_events.1_tt_3 #b 홋카이도#!#!, 즉 북해도가 될 것이다." # 北加伊道
 hokkaido_events.1.b: "이 땅의 거주민들을 기리며 #tooltippable;tooltip:hokkaido_events.1_tt_2 #b 홋카이도#!#!라 부르겠다." # 北海道
 hokkaido_events.1.c: "바다의 섬이라는 뜻의 #tooltippable;tooltip:hokkaido_events.1_tt_4 #b 카이토도#!#!가 더 낫다."
 hokkaido_events.1.e: "문학적인 울림이 있는 #tooltippable;tooltip:hokkaido_events.1_tt_5 #b 히타카미도#!#!가 마음에 드는군."
 hokkaido_events.1.tt_1: "#b 삿포로#! 도시가 설립되어, #b 하코다테#!를 대신해 이 섬의 새로운 행정 수도가 되었음"
 modifier_ainu_heritage_aknowleged: "카이의 땅"
 modifier_breaking_new_ground: "새로운 지평 개척"
 modifier_hokkaido_naval_connections: "바다에 묶인 도"
 modifier_call_of_the_frontier: "개척지의 부름"
 the_ainu_will_appreciate_this_tt: "@information! [GetCulture('ainu').GetName](이)가 이 일을 잊지 않을 것임"
 hokkaido_events.1_tt_2: "#b 북쪽의 카이족 도#!\n개척사의 일원인 마츠우라 타케시로의 말에 따르면 #italic 카이#!(加伊)는 아이누 민족이 자신들을 이르는 옛말임."
 hokkaido_events.1_tt_3: "#b 북해도#!\n마츠우라 타케시로의 기존 제안에 대한 정부의 대안. 이 제안에서는 #italic 카이#!(加伊)의 글자가 동일한 소리를 지녔으나 '바다'를 뜻하는 #italic 카이#!(海)로 대체되었음.\n\n@information! 실제로 역사에서 채택된 제안임."
 hokkaido_events.1_tt_4: "#b 바다의 섬#!\n섬은 그 무엇보다도 바다의 관계를 통해 정의되어야 함. 이 사실이 땅의 새로운 이름에도 반영되어야 할 것임."
 hokkaido_events.1_tt_5: "#b 태양이 떠오르는 땅#!\n고대 야마토 시대에 북동쪽 개척지를 이르던 말. 이 선택지를 고르면 새로운 식민지의 기원이 일본의 태고 시대에 있다는 점을 확실히 하게 됨."
 hokkaido_events.2.t: "새로운 개척지"
 hokkaido_events.2.d: "[SCOPE.sState('hokkaido_state_scope').GetName] 개척사는 한동안 지역을 정착시키는 최적의 방법에 관한 문제를 고민해 왔다. 조급해하는 행정가들이 이제는 최종 결단을 내릴 때임을 알려 왔다."
 hokkaido_events.2.f: "자라면서 그의 아버지는 조상의 이야기를 들려주곤 했다. 나라가 전쟁 중일 때 나섰던 자랑스럽고 고귀한 전사들의 이야기. 이들의 근엄한 품위와 전쟁에서 이룬 위업에 관한 이야기였다. 어릴 적에는 그를 사로잡았던 이야기였지만, 나이를 먹고 보니 이런 이야기를 들어도 우울한 기분이 느껴질 뿐이었다. 그의 아버지는 사무직에 종사하는 도시인이었으며, 단지 본인의 자존감을 위해 검을 지니고 다니는 술고래였다. 그러면서 과거의 미덕을 극찬하는 모순적인 모습은 보고 있기가 힘들었다.\n\n그렇기에 아버지가 사업 운영을 도와 달라고 했을 때, 그는 멸시를 담아 거절한 뒤 곧장 북쪽으로 출발했다. 그곳에서는 자신의 혈통을 구제할 길이 열릴 수도 있지 않겠는가?"
 hokkaido_events.2.a: "병사-정착민의 식민지 정착을 우선한다."
 hokkaido_events.2.b: "단순한 농민이야말로 [ROOT.GetCountry.GetName]의 중추다."
 hokkaido_events.2.c: "대부분의 [GetCulture('japanese').GetName] 정착을 [GetCulture('ainu').GetName]에서 사용하지 않는 지역으로 제한한다."
 modifier_tondenhei_settlements: "둔전병 정착"
 modifier_peasant_settlements: "농민 정착"
 modifier_restricted_settlements: "아이누 중심지 보존"
 hokkaido_events.2.tt_1: "[concept_capital_state] 내 모든 [GetCulture('japanese').GetName] [Concept('concept_pop', '$concept_pops$')]의 #v 1.5%#!가 [SCOPE.sState('hokkaido_state_scope').GetName](으)로 이전하게 됨"
 hokkaido_events.2.tt_2: "[SCOPE.sState('hokkaido_migration_origin_scope').GetName]([GetGeographicRegion('geographic_region_home_islands').GetName]에서 [Concept('concept_gdp','$concept_gdp_short$')]이 가장 낮은 [Concept('concept_state', '$concept_states$')] 중 하나) 내 모든 [GetCulture('japanese').GetName] [Concept('concept_pop', '$concept_pops$')]의 #v 3%#!가 [SCOPE.sState('hokkaido_state_scope').GetName](으)로 이전하게 됨"
 modifier_old_swords_in_new_lands: "새로운 땅의 오래된 검"
 modifier_go_north_young_man: "젊은이여, 북쪽으로 가라"
 hokkaido_events.3.t: "진보의 씨앗"
 hokkaido_events.3.d: "삿포로 농학교에서 이루어낸 발전에 힘입어, [SCOPE.sState('hokkaido_state_scope').GetName]의 밭에 새로운 작물을 도입하자는 제안이 제시되었다."
 hokkaido_events.3.f: "#b 개인 연구 일지, 154#!\n최근 실험 결과에 따라 서양 품종의 접목을 포기하기로 했으며, 대신 남부 품종을 이용하게 되었다. 학생들은 북쪽까지 재배 한계를 크게 늘릴 수 있으며, 가미카와를 지나서까지도 가능할 것이라 보고 있다. 생산 가능성을 평가하려면 추가 연구가 필요하겠지만, 지금으로서는 전망이 좋아 보인다. 내일은 학부 책임자와 회의가 잡혀 있다. 새 넥타이를 사야겠다."
 hokkaido_events.3.a: "이미 심은 작물을 향상하는 데 집중한다."
 hokkaido_events.3.b: "현지 [GetBuildingType('building_rice_farm').GetName]에 심을 수 있도록 추위에 강한 품종을 개발한다."
 hokkaido_events.3.c: "저지대는 남색 [GetBuildingType('building_dye_plantation').GetName]에 적합하다."
 hokkaido_events.3.e: "여기서는 양귀비가 잘 자라니, [GetBuildingType('building_opium_plantation').GetName]이 곧 미래다."
 hokkaido_events.3.g: "특화된 포도를 활용해 [GetBuildingType('building_vineyard').GetName]을 세운다."
 button_je_taming_the_north_complete: "우리 기술로 가능한 범위 내에서 토지를 최대한 개발했음"
 modifier_introducing_new_crops: "새로운 작물 도입 중"
 modifier_opimizing_existing_variants: "추위에 강한 작물 품종"
 hokkaido_events.4.t: "토양의 성장" # Markens Grøde really does sound better in Norwegian
 hokkaido_events.4.d: "[SCOPE.sState('hokkaido_state_scope').GetName] 개척사가 또 다른 주요 목표를 달성했다. 전에는 습지대였던 넓은 지역을 귀중한 농지로 탈바꿈시킨 것이다."
 hokkaido_events.4.f: "정말이지 대단했다. 10년 전이었다면 그의 앞에서 안전하게 강을 항해할 만한 선박은 아무리 커 봤자 나룻배 정도였으리라. 하지만 그는 이제 시원한 산의 공기 속으로 연기를 내뿜는 거대한 증기 평저선에서 노동자 한 무리가 상자와 마대를 내리는 모습을 보고 있었다. 다음을 위한 자재일까? 아니면 저 상류 쪽의 배수 계획 때문일까? 혹시 저 너머 계곡에 새로 지어진 마을에서 쓸 물자일까? 정확히 알 수는 없었지만, 무엇이든 상관없었다. 뭐가 되었든 저 물자에 미래가 달려 있었으니까."
 hokkaido_events.4.a: "괭이를 휘두를 때마다 이 땅을 가꿔 나간다."
 hokkaido_events.4.b: "새로운 집이 생길 때마다 키워 나가리라."
 hokkaido_events.4.tt_1: "[SCOPE.sState('hokkaido_migration_origin_scope').GetName]([GetGeographicRegion('geographic_region_home_islands').GetName]에서 [Concept('concept_gdp','$concept_gdp_short$')]이 가장 낮은 [Concept('concept_state', '$concept_states$')] 중 하나) 내 모든 [GetCulture('japanese').GetName] [Concept('concept_pop', '$concept_pops$')]의 #v 2%#!가 [SCOPE.sState('hokkaido_state_scope').GetName](으)로 이전하게 됨"
 modifier_immigration_burst: "이민의 물결"
 modifier_open_to_business: "사업 문호 개방"
 hokkaido_events.5.t: "소년이여, 야망을 품어라..."
 hokkaido_events.5.d: "[SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective] 교직원이 가르치는 삿포로 농학교의 첫 학급이 졸업하며, 졸업생들이 새로 습득한 능력을 실전에 활용하려는 열의를 보인다. 한편 위원회에서는 교육 기관의 미래 방향과 초점을 숙고하고 있다."
 hokkaido_events.5.f: "\"...돈이나 권력, 명성 같은 덧없는 가치를 위한 야망이어서는 안 된다. 한 인간이 이룰 수 있는 모든 성취에 대한 야망을 품어야 한다.\"\n\n–윌리엄 스미스 클라크, #italic 삿포로 농학교 교장 작별 연설#!"
 hokkaido_events.5.a: "농학교는 주로 농업에 집중해야 한다."
 hokkaido_events.5.b: "공학 교수진 확장을 최우선으로 한다."
 hokkaido_events.5.c: "인문학 교수진을 수립하고 현지 문화 연구를 시작한다."
 hokkaido_events.5.tt_1: "#b 삿포로#! 내 [SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective] 교직원의 영향력으로 현지에 [GetCulture('japanese').GetName] [SCOPE.sReligion('sapporo_partner_religion_scope').GetName] 공동체가 생성됨"
 hokkaido_events.5.tt_2: "#b $je_taming_the_north$#! [concept_journal_entry]에서 #b $button_je_taming_the_north_agriculture_potentials$#! 및 #b $button_je_taming_the_north_agriculture_arable_land$#! 잠금 해제"
 modifier_sapporo_expanded_agricultural_faculty: "혁신적인 농업 방식"
 modifier_sapporo_expanded_engineering_faculty: "최첨단 공학 교수진"
 modifier_sapporo_humanities_faculty: "삿포로 문화 연구 모임"
 hokkaido_events.6.t: "아이누 모시르, 시삼 모시르"
 hokkaido_events.6.d: "국내 일부에서 논란이 이는 가운데, [ROOT.GetCountry.GetCapital.GetCityHubName](이)가 [SCOPE.sState('hokkaido_state_scope').GetName]의 법적 지위에 관한 새로운 칙령을 발표했다. 아이누의 본토를 정식으로 정의하고, 공식적인 [ROOT.GetCountry.GetAdjective] 행정 조직과 공존할 수 있는 제한적인 기관을 설립한다는 내용이다."
 hokkaido_events.6.f: "\"힌나! 힌나!\" 아이누족 노파가 치아도 거의 보이지 않는 웃음을 지으며 국물 한 그릇을 내밀었다. 그는 그릇에 담긴 여러 종류의 고기를 바라보았고, 자신의 태도를 질책할 부모가 여기 없다는 사실에 진심으로 감사했다.\n\n\"그놈의 평화 때문에 별짓을 다 하네.\" 그는 혼잣말로 읊조리고는 억지웃음을 지으며 그릇을 받았다."
 hokkaido_events.6.a: "\"이 땅은 두 민족이 살아도 충분할 만큼 넓다.\""
 modifier_opposes_ainu_rights: "야만인 인정"
 modifier_supports_ainu_rights: "아이누 권리 명시"
 hokkaido_events.7.t: "개척사의 종막"
 hokkaido_events.7.d: "[SCOPE.sState('hokkaido_state_scope').GetName] 개척사는 정부가 위임한 임무를 성공적으로 완수했음을 공식 발표했으며, 남은 책무를 국가에 이전하기로 했다."
 hokkaido_events.7.f: "#b 제8호 공고#!\n이로써 [SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting] 개척사가 폐지되었으며, 하코다테, 삿포로, 네무로의 3개 구역이 수립되었다. 각 구역의 관할 경계는 추후 공고될 예정이다."
 hokkaido_events.7.a: "미래의 식민 노력이 귀감으로 삼을 만한 모범이군..."
 hokkaido_events.7.b: "...이 일은 [GetGeographicRegion('geographic_region_home_islands').GetName]를 위해서다."
 modifier_external_applications: "카이타쿠시: 외부 적용"
 modifier_domestic_applications: "카이타쿠시: 국내 적용"
 hokkaido_events.8.t: "대의를 잃은 개척사"
 hokkaido_events.8.d: "[SCOPE.sStateRegion('hokkaido_state_region_scope').GetName]의 손실로 인해 개척사는 임무를 완수하지 못한 채 종료되고 말았다. 이에 따라 분노한 시민들이 [ROOT.GetCountry.GetName]의 거리로 나서서 국가적인 위신 하락과 개인의 투자 손실에 항의하고 있다."
 hokkaido_events.8.f: "진이 빠진 명예 행정관이 사무실 의자에 털썩 앉아 사케를 가득 따랐다. 행정관은 잔을 한 번에 비우며 탁자 앞에 펼쳐진 지도를 바라보았다. 지도에는 글자와 기록, 표시가 가득했다. 기록마다 행정관이 평생에 걸쳐 노력해 온 여러 계획이 담겨 있었다. 이제는 계획도, 기운도 남아 있지 않았으며 각 기록에 묻어 있는 낙관주의도 조롱처럼 들렸다.\n\n다 망해 버리라지. 행정관은 그렇게 생각하며 잔을 다시 채웠다."
 hokkaido_events.8.a: "유감스럽지만 이 결과는 정부의 통제를 벗어난 사안이다."
 modifier_lost_northern_investments: "북부 투자 상실"
