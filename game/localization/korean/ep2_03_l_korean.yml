l_korean:
 #Japan Single-Fire Events
 japan_events.31.t: "[SCOPE.sState('kabuki_theatre_state').GetCityHubName]의 극장이 불타다"
 japan_events.31.d: "화재로 인해 [SCOPE.sState('kabuki_theatre_state').GetName]의 유명한 가부키 극장이 불타버렸다. 극단은 극장을 재건할 계획을 짜기 시작했지만 [SCOPE.gsInterestGroup('relevant_ig').GetName] 구성원들, 그중에서도 특히 [SCOPE.sCharacter('relevant_leader').GetFullName](이)가 이 사건을 기회로 삼아 [SCOPE.sState('kabuki_theatre_state').GetCityHubName]의 유흥을 규제하고 공연가들이 도시 경계 밖에 극장을 다시 짓도록 강제하려 한다."
 japan_events.31.f: "화재 감시탑에서는 한 감시자가 쉼 없이 [SCOPE.sState('kabuki_theatre_state').GetCityHubName](을)를 지켜보고 있다. 늦은 저녁, 자신의 위치에서 지켜보던 감시자가 화재의 징조를 발견했다. 연기가 피어오르며 매캐한 불 냄새가 공기를 채우자, 감시자는 경보의 종을 울리러 달려갔다.\n\n아무것도 모르던 주민들이 위험을 알리는 소리를 들었으며, 소방대가 움직여 지붕을 타며 불꽃을 잡으러 나섰다. 불은 꺼졌지만 이미 큰 피해를 보았다. 한때 유명한 가부키 극장이었던 곳은 이 파괴적인 불길 속에 잉걸불과 잿더미로만 남게 되었다."
 japan_events.31.a: "저들은 건물을 도시 경계 밖에 다시 지어야 한다."
 japan_events.31.b: "극단이 건물을 다시 짓게 허용한다."
 modifier_kabuki_regulated: "가부키 극장 단속"
 modifier_theatre_affronted_official: "모욕당한 관료"
 modifier_shogunate_opposition_ig_approval: "기회주의적 반대"
 japan_events.32.t: "덧없는 세상의 그림"
 japan_events.32.d: "[SCOPE.sState('ukiyo_e_state').GetCityHubName]에서 다작을 이어 나가는 어느 우키요에 미술가의 작품이 [ROOT.GetCountry.GetName](와)과 전 세계에 있는 예술가들의 상상력을 자극했다."
 japan_events.32.f: "유명한 목판화 속에 [SCOPE.sState('ukiyo_e_state').GetCityHubName] 교외의 생동감 넘치는 극장 지구가 담겨 있다. 은색 달빛이 사람으로 가득한 대로를 비추자 사람들의 윤곽이 그림자를 드리운다. 거리 동쪽에는 다방과 꼭두각시 인형 극장이 늘어서 있다. 반대편인 서쪽에는 각각 북탑을 세운 가부키 극장 세 곳이 있었다.\n\n\"달인의 손만이 이토록 단호하고 진실한 선을 긋고, 그늘이 있어야 할 곳에 이토록 우아한 그늘을 드리울 수 있다. 또한 달인의 머리만이 이토록 강렬하면서도 동시에 정교하고 섬세하며 리듬감 있게 조작된 형태를 구상해 낼 수 있다.\"\n— F.W.G., #italic 시카고 미술관 회보#!"
 japan_events.32.a: "[ROOT.GetCountry.GetAdjectiveNoFormatting] 예술은 분명 계속해서 전 세계적인 주목을 받을 것이다."
 japan_events.32.b: "훌륭하군. 이런 작품을 더 많이 생산하도록 장려하라."
 modifier_ukiyo_e_prestige: "다작 목판화"
 modifier_ukiyo_e_production: "목판화 생산"
 japan_events.33.t: "전통과의 싸움"
 japan_events.33.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting] 문화의 서구화가 상당한 효과를 거두고 있다. 관습이 빠르게 변하자 [SCOPE.sCharacter('relevant_character').GetFullName] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle](이)가 대중의 전통을 향한 적대감과 맞서기 위해 [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]에서 스모 경기를 후원하기로 했다."
 japan_events.33.f: "군중이 사찰에 새로 지어진 스모 전당으로 모이기 시작했다. 사람들은 [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]의 지지를 받는 이 행사에 대해 궁금해했다. 참석한 이들 중에는 서양 문화에 대한 집착으로 인해 이러한 전통 유지에 회의적인 시각을 가지게 된 귀족과 정치인도 포함되어 있었다. 스모의 황금기는 이미 오래전에 지나갔으나, [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]의 참석으로 이 운동 경기의 문화적 중요성을 대중의 눈에 다시 각인시킬 수 있을지도 모른다."
 japan_events.33.a: "[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]의 노력이 이 운동의 평판을 되돌릴 것이다."
 japan_events.33.b: "이 [ROOT.GetCountry.GetAdjectiveNoFormatting] 운동의 전통은 오래 지속될 것이다."
 modifier_restored_sumo_popularity: "회복된 스모 인기"
 modifier_traditional_sports_movement_support: "국민운동"
 japan_events.34.t: "[SCOPE.sState('whaling_state').GetPortHubName]의 포경 참사"
 japan_events.34.d: "[SCOPE.sState('whaling_state').GetName]의 해안에서 출항한 선박이 긴수염고래 두 마리를 목격했다. 어미와 새끼였다. 지난 계절에는 어획량이 좋지 못했기에 절박해진 한 포경 무리가 악천후를 뚫고 바다로 나아갔다. 지금까지 100명 이상의 실종이 보고되었다."
 japan_events.34.f: "선박의 불은 시야에서 사라진 지 오래였으며, 육지에서 더 이상 함대를 볼 수 없게 되자 [SCOPE.sState('whaling_state').GetPortHubName]에서 큰 소란이 일어났다.\n\n\"아무리 힘든 시기여도 우린 절대 어미와 새끼 고래는 잡지 않아.\" 한 남자가 주장했다. \"고래들을 놔두어야 해.\"\n\n\"헛소리.\" 그 사촌이 대꾸했다. \"고래는 축복이나 마찬가지야. 원정대는 금방 돌아올 거라고. 풍성한 수확을 가져오겠지.\""
 japan_events.34.a: "$bg_whaling$은 [SCOPE.sState('whaling_state').GetNameNoFormatting]의 중요 산업이다."
 japan_events.34.b: "앞으로는 대신 [SCOPE.sState('whaling_state').GetNameNoFormatting]의 $bg_fishing$에 집중한다."
 modifier_whaling_deaths: "포경 사상자"
 modifier_redouble_on_whaling: "포경의 미래"
 modifier_fishing_not_whaling: "어업의 미래"
 japan_events.35.t: "방화 방지 조치"
 japan_events.35.d: "[SCOPE.gsInterestGroup('relevant_ig').GetName](이)가 [SCOPE.sState('relevant_state').GetCityHubName]의 도시 경계 내에서 발생하는 방화 사건의 빈도로 인해 [ROOT.GetCountry.GetName]의 [SCOPE.sGoods('expensive_good').GetName] 값이 치솟고 있다며 우려를 표했다. 이들은 엄격한 방화 방지 조치를 추진해야만 한다고 주장했다."
 japan_events.35.f: "화재 감시탑에서 경보를 알리는 종소리가 울려 퍼지며 위험이 임박했음을 알렸다. [SCOPE.sState('relevant_state').GetCityHubName]에서 또 다른 화재가 일어나 주거지와 상가를 불태웠다. 불길을 잡으러 온 소방대가 도착하자 많은 $strata_commoners_townspeople$들이 거리로 몰려들었다. 일부는 의심스러운 눈길로 이웃을 흘끔거렸고, 다른 이들은 이 화재가 사고인지, 아니면 혹시 방화범이 있는 게 아닌지 추측하기 시작했다. 그래도 한 가지는 확실했다. [SCOPE.sGoods('expensive_good').GetNameNoFormatting]의 값이 곧 배로 뛸 것이다."
 japan_events.35.a: "엄격한 조치를 해야 한다. 방화범 용의자를 처형하라."
 japan_events.35.b: "체포를 돕는 자의 미결 범죄를 사면한다."
 modifier_arson_measure_strict_ig: "엄격한 방화 조치"
 modifier_arson_measure_strict_pop: "방화범 처형"
 modifier_arson_measure_lenient_ig: "관대한 방화 조치"
 # Colonization of Korea Content
 je_colonize_korea: "조센의 정부"
 je_colonize_korea_reason: "#italic \"산업 및 상업은 훌륭한 통치와 평화 아래 크게 발전될 것이다. 동아시아의 평화로 인해 그 어느 때보다도 더 강한 토대가 세워질 것임을 의심치 않는다.\"\n— 메이지 천황기, 12권#!\n\n한반도에서 영구적으로 주도권을 수립할 때가 왔습니다. 이 목표에 성공해야만 향후 [JournalEntry.GetCountry.GetName](와)과 [GetGeographicRegion('geographic_region_east_asia').GetName] 전역에 번영과 안전을 불러올 수 있습니다. 통제력을 제대로 확보하려면 [GetGeographicRegion('geographic_region_korea').GetName]의 개발을 감독하며, 우리의 야망을 펼치는 데 흔들림이 없어야 합니다."
 je_colonize_korea_is_owned_by_tt: "[JournalEntry.GetCountry.GetName]의 소유임"
 je_colonize_korea_culture_percent_seoul_tt: "$STATE_SEOUL$의 [GetCulture('japanese').GetName] [Concept('concept_pop','$concept_population$')|l]가 #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#! 이상"
 je_colonize_korea_culture_percent_busan_tt: "$STATE_BUSAN$의 [GetCulture('japanese').GetName] [Concept('concept_pop','$concept_population$')|l]가 #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#! 이상"
 je_colonize_korea_culture_percent_yangho_tt: "$STATE_YANGHO$의 [GetCulture('japanese').GetName] [Concept('concept_pop','$concept_population$')|l]가 #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#! 이상"
 je_colonize_korea_culture_percent_sariwon_tt: "$STATE_SARIWON$의 [GetCulture('japanese').GetName] [Concept('concept_pop','$concept_population$')|l]가 #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#! 이상"
 je_colonize_korea_culture_percent_pyongyang_tt: "$STATE_PYONGYANG$의 [GetCulture('japanese').GetName] [Concept('concept_pop','$concept_population$')|l]가 #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#! 이상"
 je_colonize_korea_fail_tt: "#bold [GetGeographicRegion('geographic_region_korea').GetName]#!(이)가 더 이상 [ROOT.GetCountry.GetAdjective]의 통제를 받지 않음"
 korea_colinzation_2b_executive_tt: "[concept_executive]가 #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!년 동안 #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_tt $modifier_peninsula_control_loyal_prominence$#! 획득"
 korea_colinzation_2b_company_tt: "[concept_company]이 #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!년 동안 #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_company_bonus_tt $modifier_peninsula_control_company_bonus$#! 획득"
 modifier_peninsula_control_loyal_prominence_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetDesc]"
 modifier_peninsula_control_company_bonus_tt: "[GetStaticModifier('modifier_peninsula_control_company_bonus').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_company_bonus').GetDesc]"
 korea_colinzation_3b_tt: "누군가는 이 실패에 대한 책임을 져야 한다."
 korea_colinzation_3b_ig_leader_tt: "[concept_leader]가 #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!년 동안 #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_loss_tt $modifier_peninsula_control_loyal_prominence$#! 획득"
 korea_colinzation_3b_ig_tt: "[concept_interest_group]이 #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!년 동안 #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_approval_pol_str_loss_tt $modifier_peninsula_control_approval_pol_str_loss$#! 획득"
 modifier_peninsula_control_loyal_prominence_loss_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence_loss').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_loyal_prominence_loss').GetDesc]"
 modifier_peninsula_control_approval_pol_str_loss_tt: "[GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetDesc]"
 korea_colonization.2.t: "유망한 미래"
 korea_colonization.2.d: "세계는 이제 [GetGeographicRegion('geographic_region_korea').GetName](이)가 [ROOT.GetCountry.GetName]의 일부이며, 완전히 우리 국가의 통제를 받고 있다는 사실을 알고 있다. 반도에 우리의 주도권을 굳건히 수립한다면, 우리의 성공이 곧 세계 무대에서 우리의 입지와 명망을 대변할 것이다."
 korea_colonization.2.f: "국가 간 통일의 미래가 현실이 되면서, [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]의 야망 또한 자라나고 있다. [ROOT.GetCountry.GetRuler.GetSheHe]는 [ROOT.GetCountry.GetCapital.GetCityHubName]에 있는 자신의 자리에서 이 노력이 거둔 성공을 돌아보는 단카를 지으며, 반도의 개발 상황에 흡족해하고 있다.\n\n동시에 $STATE_SEOUL$에서는 어느 [GetCulture('korean').GetNameNoFormatting] 관료가 새로운 사회 질서에 반발하는 시민들의 공공 항의를 억압하고 있다. 이 관료는 차분하게 시민들을 대하며, 이 통합으로 모두가 번영할 것임을 주장하고 있다."
 korea_colonization.2.a: "미래의 번영과 반도의 안전 모두 전망이 밝아 보이는군."
 korea_colonization.2.b: "사업은 우리 의제에 필수적이었다."
 modifier_peninsula_control_prestige_authority: "반도 위신"
 modifier_peninsula_control_assimilation_migration: "가속된 융화"
 modifier_peninsula_control_loyal_prominence: "뛰어난 감독"
 modifier_peninsula_control_company_bonus: "기업 표창"
 korea_colonization.3.t: "사라진 기회"
 korea_colonization.3.d: "[GetGeographicRegion('geographic_region_korea').GetName](이)가 이제 우리 통제를 벗어났다. 앞으로 [ROOT.GetCountry.GetName]의 경제 및 외교가 영향을 받을 것이다."
 korea_colonization.3.f: "[ROOT.GetCountry.GetAdjectiveNoFormatting] 관료들이 좌절과 불만 속에 모여들었다. 반도에서 질서를 유지하려던 정부의 실패를 논의하기 위해서였다. 최근 [ROOT.GetCountry.GetNameNoFormatting](이)가 쌓아 왔던 상당한 권력이 타격을 입었으나, 이 상황을 헤쳐 나갈 방법을 두고 많은 이가 그 어떠한 타협도 거부하는 모습을 보였다.\n\n어느 신사가 일어나 논쟁의 소란을 뚫고 말했다. \"이 차질의 책임은 물론 [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting]에서 져야 할 겁니다.\""
 korea_colonization.3.a: "우리 노력의 실패로 인한 짐은 모두가 짊어져야 한다."
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName](와)과 [SCOPE.gsInterestGroup('relevant_ig').GetName](이)가 이 실패에 대한 책임을 져야 한다."
 modifier_peninsula_control_prestige_loss: "줄어드는 통제"
 modifier_peninsula_control_loyal_prominence_loss: "명망 감소"
 modifier_peninsula_control_approval_pol_str_loss: "빠져나가는 영향력"
