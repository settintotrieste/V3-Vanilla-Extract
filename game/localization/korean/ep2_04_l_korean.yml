 ep2_meiji.1.t: "존왕양이"
 ep2_meiji.1.d: "쇄국이 종료되며 외세의 침해에 대한 무력감이 솟아올랐고, [ROOT.GetCountry.GetRuler.GetLastName] 막부의 권위가 약해졌다. 한편 막부의 적은 #italic 존왕양이#!, 즉 \"천황을 받들고 외세를 배척하자\"라는 구호 아래 결집했다."
 ep2_meiji.1.f: "교토 여관의 2층, 창문에서 멀리 떨어진 곳에는 검은색 옷을 입은 십여 명의 로닌이 탁자 주위에 모여 있었다. 밖에서는 거센 빗줄기가 거리의 소음을 모두 지워 버렸다. 로닌들 사이로 화난 속삭임이 오갔다. 불평과 비난, 맹세에 이어 침입자의 사형 선고까지.\n\n저 멀리, 이소가 내다보이는 집 안에서는 초록색 기모노를 입은 남자가 하늘을 향해 뻗어나가는 연기 기둥을 바라보고 있었다. 해안의 건설 현장을 따라 언덕이 긴 그림자를 드리웠다. 태양이 수평선으로 다가가는 동안, 그 밑의 용광로에서 나오는 불빛이 더더욱 강해졌다. 그 너머의 수면 위로 선박의 불빛이 반사되는 모습이 보였다. 그는 바랐다. 언젠가는 자신의 대포가 저 선박을 수평선 너머로 쫓아낼 수 있기를."
 ep2_meiji.1.a: "바뀐 상황에 적응해야 한다."
 ep2_meiji.2.t: "막부의 형태"
 ep2_meiji.2.d: "막부 개혁론자들이 두 가지 국정 이론으로 갈라졌다. #italic 공무합체#! 이론은 황실과의 융합으로 [GetLawType('law_bakufu').GetName]의 정통성을 새롭게 이어 나가고자 하며, 반면 공공 토론 이론은 [SCOPE.sCharacter('shogun_scope').GetLastName] 막부가 이끄는 의회 체계의 수립을 주장한다."
 ep2_meiji.2.f: "주최자가 탁자에 화과자 쟁반을 올려놓고, 손님마다 맑은 차를 한 잔 따라 주었다. 세 남자가 탁자에 둘러앉았다. 주최자와 첫 손님은 촌마게를 했으며, 두 번째 손님은 머리를 짧게 다듬었다. 앞에 놓인 그릇에서 김이 나왔다.\n\n주최자는 짧은 머리의 남자를 보고 말했다.\n\n\"돌아온 것을 축하하네, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] #italic 군#!. 보낸 편지도 잘 받아 보았는데, 내용이 점점 흥미로워지더군. 그 야만인들과 보낸 시간에 대해 더 얘기해 줄 수 있겠나?\""
 ep2_meiji.2.a: "막부 체제를 새롭게 세워야 한다."
 ep2_meiji.2.b: "공공 토론이야말로 계몽의 길이다."
 traditionalist_shogun_warning_tt: "@warning! [GetIdeology('ideology_traditionalist').GetName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle](이)가 #b 의회 정부#!를 추구하지 않으려 할 것임"
 traditionalist_shogun_warning_present_tt: "[concept_ruler]가 [GetIdeology('ideology_traditionalist').GetName] [concept_ideology]을 보유하지 #b 않음#!"
 ep2_meiji.3.t: "황실 결혼"
 ep2_meiji.3.d: "천황이 [SCOPE.sCharacter('shogun_scope').GetFullName](와)과 [SCOPE.sCharacter('imperial_princess_scope').GetFullName] 공주의 결혼에 동의했다. 이 혼인은 쇼군이 [SCOPE.sTreaty('relevant_treaty_scope').GetName](을)를 거절하고, 고립주의 정책을 다시 도입하는 조건으로 성사되었다."
 ep2_meiji.3.d2: "천황이 [SCOPE.sCharacter('shogun_scope').GetFullName](와)과 [SCOPE.sCharacter('imperial_princess_scope').GetFirstName] 공주의 결혼에 동의했다. 이 혼인은 쇼군이 외국인을 추방하고, 고립주의 정책을 다시 도입하는 조건으로 성사되었다."
 ep2_meiji.3.f: "행렬이 나카센도 전체를 둘러쌌다. 삼만 명의 노무자, 수행원, 공주의 집안 식구들이 오와리 번 병사들의 호위를 받으며 이이지마 마을에서 시오지리 역까지 길게 이어졌다. 행렬의 중심에는 황금과 붉은 비단으로 만들어진 가마를 탄 공주가 있었다. 그 옆에는 여러 번에서 온 사무라이들이 말을 탔다. [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')]까지 있었다.\n\n공주는 가마 안에서 차양 사이의 가는 틈으로 밖을 내다보았다. 지나가는 마을마다 문이 굳게 닫힌 채 조용했다. 자신의 운명에 대해 깊이 생각해 볼 시간이 앞으로 30#italic 리#!만큼 더 남아 있었다."
 ep2_meiji.3.a: "이 나라를 위해."
 has_broken_relevant_treaty_tt: "[SCOPE.sTreaty('relevant_treaty_scope').GetName](을)를 파기함"
 ruler_does_not_have_imperial_marriage_tt: "[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName](이)가 사망하거나 은퇴함"
 je_meiji_imperial_marriage: "황실 결혼"
 je_meiji_imperial_marriage_reason: "[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] 쇼군은 황실과 막부의 통합을 추구하며 황실의 공주 [SCOPE.sCharacter('imperial_princess_scope').GetFirstName](와)과의 정치적 혼인을 확보했습니다. 천황은 [GetGeographicRegion('geographic_region_home_islands').GetName]에서 외국인들을 추방하며, 고립주의 정책으로 회귀하는 것을 조건으로 이 혼인에 동의했습니다.\n\n쇼군이 [SCOPE.sCharacter('imperial_marriage_ruler').GetHerHis] 약속을 지킨다면, 이 결혼은 일본의 명목상 통치자와 실질적인 통치자 사이의 균열 회복에 크게 공헌하게 됩니다."
 je_will_fail_tt: "[concept_journal_entry]이 #b 실패#!할 것임"
 je_has_timed_out_tt: "[concept_journal_entry]이 #b 시간 초과#!됨"
 ep2_meiji.4.t: "[ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')] 전쟁"
 ep2_meiji.4.d: "토지와 작위를 몰수당하며 배척당한 [SCOPE.sCharacter('shogun_scope').GetFullName] [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle](와)과 [SCOPE.sCharacter('shogun_scope').GetHerHis] 충성스러운 신하들이 황실에 맞서 난을 일으켰다. [SCOPE.sCharacter('shogun_scope').GetSheHe|U]는 황실 권력의 복원을 뒤집고 막부 체제를 다시 수립하고자 한다."
 ep2_meiji.4.f: "\"폐하를 섬기는 이 [SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting](은)는 지난달 9일부터 상황을 진지하게 고려했으며, 이 모든 사건은 황실의 진정한 의도가 아니라 오직 [SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting]의 신뢰할 수 없는 신하들의 의도에서 비롯되었음을 알게 되었습니다. 이는 나라 전체에 알려진 사실이며, 특히 에도, 나가사키, 야슈와 소슈 지방에서 소란이 일고 있습니다.\n\n이는 하늘과 백성 모두가 증오하는 행위인즉, 폐하께 앞서 언급한 신뢰할 수 없는 신하들의 굴복을 명하는 칙령을 내려 주십사 간청드립니다. 이를 허하지 않으신다면 저희도 저들을 처형하는 수밖에 없습니다.\"" # Edited petition by Yoshinobu
 ep2_meiji.4.a: "이는 우리의 소망이니, 배신자를 처단하고 평화를 되찾는다." # Emperor Meiji's plausibly fraudulent imperial decree of 1867
 ep2_meiji.4.b: "천황이 도적의 손아귀에 놓였구나."
 ep2_meiji.41.d: "권력을 유지하려는 [SCOPE.sCharacter('shogun_scope').GetLastName] 막부의 모습에 격분한 유신파 연합이 [SCOPE.sCharacter('shogun_scope').GetFullName]에 맞서 난을 일으켰다. 이들은 도쿠가와의 영향력에서 벗어나 천황의 정치적 우위를 되찾고자 한다."
 ep2_meiji.41.d_1: "[ROOT.GetCountry.GetCapital.GetCityHubName] 정부가 외국인 추방을 거부한 것에 격분한 존왕양이 연합 번들이 반란을 일으켰다. 그들은 천황의 서구화 고문들을 퇴위시키고 일본에서 외세의 영향력을 몰아내고자 한다."
 ep2_meiji.41.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting](이)가 성벽에서 아래를 내려다보았다. 앞에서는 수많은 [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] 병사들이 연이어 관문을 빠져나오고 있었다. 일부는 어두운 파란색과 원뿔형 투구를 갖춘 새 제복을 입고 현대화된 모습이었다. 다른 이들은 붉은색, 초록색, 푸른색으로 이루어진 전통적인 복식 차림이었다. 새 제복을 입은 병사들이 가장 첫 번째 열에 섰으며, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]의 왼쪽에서 몇 미터쯤 떨어진 곳에 서 있는 외국인 참관자들이 긍정적인 눈빛으로 그들을 바라보았다. 뒤쪽에는 강선식 활강총으로 무장하고 말에 탄 사무라이가 있었으며, 그 뒤에는 포병대가 있었다.\n\n[SCOPE.sState('revolter_state').GetCityHubName] 외곽에서 집결지가 기다리고 있었다. 동맹 번의 병력과 만나, 쇼군의 군대에 맞서러 행진할 곳이었다. 저 멀리, 총검의 벽 너머에서 붙잡힌 천황이 기다리고 있다."
 ep2_meiji.41.f_1: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting](이)가 성벽에서 아래를 내려다보았다. 앞에서는 수많은 [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] 병사들이 연이어 관문을 빠져나오고 있었다. 일부는 어두운 파란색과 원뿔형 투구를 갖춘 새 제복을 입고 현대화된 모습이었다. 다른 이들은 붉은색, 초록색, 푸른색으로 이루어진 전통적인 복식 차림이었다. 새 군복을 입은 병사들이 가장 첫 번째 열에 섰으며, 오색찬란한 산사이바오리가 그 뒤를 따랐다. 강선식 활강총을 든 기마 사무라이들이 이어졌고, 그 뒤에는 포병대가 있었다.\n\n[SCOPE.sState('revolter_state').GetCityHubName] 외곽에서 집결지가 기다리고 있었다. 동맹 번의 병력과 만나, 쇼군의 군대에 맞서러 행진할 곳이었다. 저 멀리, 총검의 벽 너머에서 붙잡힌 천황이 기다리고 있다."
 ep2_meiji.41.a: "이 광신도들을 물리쳐야만 한다."
 ep2_meiji.41.b: "존왕양이!"
 kinmon_civil_war_tt: "[ROOT.GetCountry.GetName]에서 #b 막부#!와 #b 황실#! 사이에 #r $concept_civil_war$#!이 일어나게 됨"
 ep2_meiji.5.t: "대정봉환"
 ep2_meiji.5.d: "[GetLawType('law_bakufu').GetName]에 반대하는 세력의 압박이 강해지는 상황에서, [SCOPE.sCharacter('shogun_scope').GetFullName](이)가 천황에게 자신의 통치 권위를 황실에 반납하겠다는 탄원을 올렸다."
 ep2_meiji.5.f: "\"황실 내 권력이 다시 통합되지 않는다면 우리나라의 기반도 유지될 수 없습니다. 그러므로 지금 시점에서는 옛 방식을 개혁해 황실의 행정으로 돌아가야 합니다.\n\n대중의 조언을 낱낱이 확인한 뒤, 폐하의 최종 판단을 기다리며 저는 이렇게 믿고 있습니다. 모든 이의 마음이 하나로 모여 나라를 섬긴다면 다 함께 이 제국을 지켜낼 수 있으며, 전 세계의 국가와 동등하게 자리할 수 있을 것입니다.\"\n\n—도쿠가와 요시노부, 1867"
 ep2_meiji.5.a: "그의 발밑에는 공기뿐이다."
 ep2_meiji.51.t: "황실 인가"
 ep2_meiji.51.d: "천황이 통치 권위를 황실에 반납하겠다는 [SCOPE.sCharacter('shogun_scope').GetFullName]의 탄원에 응답했다. 쇼군의 탄원이 받아들여졌으며, 천황의 정치적 우위가 복권되었다."
 ep2_meiji.51.f: "\"일본의 천황이 모든 외국 국가와 그 종속국에 알린다. [SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] 쇼군 본인의 통치권 반환 요청이 승인되었다. 앞으로는 황실이 국가의 모든 외부 및 내부 사안에 대해 최고 권한을 행사할 것이다. 따라서 조약 체결 시에 사용되었던 대군의 칭호를 천황으로 대체해야 한다. 황실이 외국 관련 사안을 담당할 관료를 지명 중이다. 그러므로 조약을 체결한 국가의 대표 역시 이 소식을 인지하길 바란다.\""
 ep2_meiji.51.a: "끔찍한 전율이로군."
 ep2_meiji.52.t: "황실 인가"
 ep2_meiji.52.d: "천황이 통치 권위를 황실에 반납하겠다는 [SCOPE.sCharacter('shogun_scope').GetFullName]의 탄원에 응답했다. 답변에 따르면 쇼군은 여전히 궁정의 신뢰를 받고 있으며, 따라서 막부는 통치 권위를 계속 유지하게 되었다."
 ep2_meiji.52.f: "[ROOT.GetCountry.GetCustom('japan_choshu_castle_name')] 성에 발걸음 소리가 울려 퍼졌다. 전령과 신하들이 하루 종일 오가며 지난주의 소식을 훨씬 더 상세하게 전달하고 있었다. [SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting](은)는 개인적으로 그 소식을 받아보았으며, 회담이 열릴 때마다 단호한 침묵을 지키고 있었다. 쇼군의 개선 행렬, 황성을 지키던 아이즈 번의 소식을 들을 때마다 그의 머릿속은 점점 더 무거워져만 갔다.\n\n성 앞에서 태양이 지고 있었다. 자신의 자리에 있던 [SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting](은)는 모여 있는 스무 명의 신하를 바라보았다. \"조슈 번은 항복하지 않을 것이다.\" [SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe]가 말했다. \"명심하도록.\"\n\n그는 일어나서 방을 떠났다."
 ep2_meiji.52.a: "가지들이 그를 끌어안는다."
 ep2_meiji.6.t: "유신 칙령"
 ep2_meiji.6.d: "궁정 내 [SCOPE.sCharacter('shogun_scope').GetLastName] 막부의 반대파가 천황을 설득해 공식적으로 권력을 수복하겠다는 칙령을 반포하게 했다. 이 칙령은 막부를 폐지하며, [SCOPE.sCharacter('shogun_scope').GetFullName](을)를 모든 공무에서 배제하는 정부를 수립한다."
 ep2_meiji.6.f: "\"[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting](이)가 오랫동안 위임받았던 행정 권위를 복권할 것을 요청했으며, 이제는 쇼군의 집무실에서 은퇴하고자 함을 알려 왔다. 그의 제안이 승인되었다. 우리나라는 비교할 수도 없는 위험의 위협을 받고 있으며, 잘 알려진 바와 같이 전 천황께서도 이 상황을 심각하게 고민하셨다. 따라서 폐하의 현명하신 숙고에 따라, 황실의 질서를 복원하고 국가의 존엄을 되살릴 토대가 마련되어야만 한다.\n\n이에 따라 섭정, 관백, 쇼군을 모두 폐지하며 총재, 의정, 참여의 세 집무실이 수립될 것이다. 모든 사항은 관료와 장교, 귀족과 평민 사이의 구분 없이 모든 이의 합리적인 심의를 통해 결정될 것이다.\"" #- Modifier text of the Great Proclamation of the Restoration of Imperial Rule
 ep2_meiji.6.a: "어둠 속에 홀로 남았군."
 ep2_meiji.7.t: "대군정"
 ep2_meiji.7.d: "황실은 통치에 필요한 실질적인 능력을 보유하지 못한 상황이다. 궁정 내 [SCOPE.sCharacter('shogun_scope').GetLastName] 막부의 동맹들이 천황을 설득해 [SCOPE.sCharacter('shogun_scope').GetFullName]에게 대군의 칭호를 수여하며, [SCOPE.sCharacter('shogun_scope').GetHerHim]를 황실 조정의 수장으로 올렸다."
 ep2_meiji.7.f: "\"수많은 다이묘가 점차 모여들면 토론이 진행됩니다. 시대의 정신은 공공 토론을 향하고 있습니다. 이 단어가 널리 논의되고 있으며, 공공 여론을 따를 수밖에 없게 되었습니다. 그러므로 이러한 논의가 최대한 합의를 이룰 수 있도록 해야 하며, 의회의 목적이 올바르게 수립될 수 있도록 조치해 주실 것을 진심으로 요청합니다.\n\n논의 과정에서 불화가 생기고 갈등이 터진다면, 그로 인해 자기 집안이 승리하게 된다고 해도, 이는 외적이 우리를 압박하는 가운데 성벽 안에서 형제끼리 다투는 상황이나 다름없습니다.\"\n\n—니시 슈스케, \"의제초안\""
 ep2_meiji.7.a: "다시 안전한 기반 위에 올라섰군."
 ep2_meiji.8.t: "궁정과 막부"
 ep2_meiji.8.d: "황실과 혼인하며, 천황에게 한 약조를 지킨 [SCOPE.sCharacter('shogun_scope').GetFullName](이)가 궁정과 막부 사이의 긴장을 완화했다. 천황은 계속 고립된 상태로 지낼 것이며, 쇼군이 오래도록 평화를 유지해 낼 것임을 확언했다."
 ep2_meiji.8.f: "나라를 휩쓰는 바람\n거세게 불어닥쳐도\n나는 기다리리라\n하늘에 태양이 돌아와\n본래의 빛을 드리우기를.\n\n—고메이 천황"
 ep2_meiji.8.a: "폭풍이 드디어 끝난다."
 ep2_meiji.9.t: "동류 중 으뜸"
 ep2_meiji.9.d: "[SCOPE.sCharacter('taikun_scope').GetFullName](이)가 자신감과 능란한 계책을 통해 천황의 복권과 자신의 막부 보존이라는 두 가지 결과를 만들어냈다. [SCOPE.sCharacter('taikun_scope').GetLastName] 대군이 현대 $JAP$ 귀족 중 가장 으뜸 가는 자로서 통치하게 되었다."
 ep2_meiji.9.f: "천황이 더는 가림막 뒤에 앉지 않았다. 신하들이 천황 앞에 놓인 탁자를 따라 자리했으며, 천황의 왼편에는 대군이 있었다. 모두가 새로운 궁정 의복을 입었으며, 소매와 가슴에는 섬세한 황금색 잎이 장식되어 있었다. 이들이 낯선 좌석에 앉는 동안 훈장이 흔들리며 소리를 냈다.\n\n대군이 한 시간 동안 논의를 이끌었으며, 천황은 한 마디도 하지 않았다. 천황은 그저 귀를 기울이는 데 만족하며, 신하들이 차례대로 입을 열 때마다 시선을 주었다. 방의 먼 곳에서 #italic 존왕양이#! 지지자였던 인물이 미국으로 사절단을 보내야 한다고 주장했다."
 ep2_meiji.9.a: "쇼군이 스러지고 대군이 떠오른다."
 ep2_meiji.9.b: "천황은 하늘의 자손이며, 도쿠가와는 천황의 도구다."
