 ep2_meiji_pulse.1.t: "처단할 권리"
 ep2_meiji_pulse.1.d: "[SCOPE.sState('relevant_treaty_port_state').GetName]에서 여행하던 [SCOPE.sCountry('relevant_gp').GetAdjective] 상인이 말에서 내리기를 거부했다는 이유로 [SCOPE.sCharacter('daimyo_scope').GetFullName] 수행단의 손에 살해당했다. [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]의 다이묘는 자신에게 존중을 표하지 않는 평민이라면 누구든 처단할 권리가 있으므로, 자기 행동이 정당했다는 주장을 펼쳤다."
 ep2_meiji_pulse.1.f: "외국인들이 총병 부대의 열을 무너뜨렸고, 사방에서 외침이 터져 나왔다. 주변에 가득한 무장병을 본 선두의 외국인이 고삐를 옆으로 세게 당겼고, 말이 급선회하며 총병 하나를 말에서 떨어뜨릴 뻔했다. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting](이)가 검을 뽑자 안쪽에 모여 있던 동료들이 함께했다.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting](이)가 첫 일격을 날리며 침입자의 옆구리에 깊은 상처를 남겼다. 침입자가 소리를 지르며 고삐를 다시 세게 당겼다. 하지만 소용없었다. 가까이 있던 총병이 자신의 검을 뽑아 후려쳤다. 붉은 피가 곡선을 그리며 구름처럼 허공에 흩뿌려졌다."
 ep2_meiji_pulse.1.a: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')](이)가 문제를 일으키고 싶어 안달이 났군."
 ep2_meiji_pulse.11.t: "[SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting] 사건"
 ep2_meiji_pulse.11.d: "[SCOPE.sCountry('japan_scope').GetName]에서 사업을 벌이던 [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting](이)라는 [ROOT.GetCountry.GetAdjectiveNoFlag] 상인이 현지 영주인 [SCOPE.sCharacter('daimyo_scope').GetFullName]에게 살해당했다. 이 영주는 자신의 영토 법에서 정당한 행위였다고 주장하며, 자신이 저지른 범죄에 그 어떤 보상도 치르지 않겠다고 단언했다."
 ep2_meiji_pulse.11.f: "#b 사설#!\n\n다시 말하지만 현재 상황에서는 [ROOT.GetCountry.GetNameNoFormatting](이)가 대전쟁을 일으킬 준비를 하든지, 아니면 일본에 작별을 고하는 수밖에 없다. 그곳에서 마련한 발판을 포기한다는 계획은 전혀 고려되지 않을 것이므로, 두 제국 사이에 충돌이 발생할 가능성이 있다. 많은 [SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')] 분이 좋아하지는 않을 관점이겠지만, [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]에서는 이 상황을 피할 수 없을 뿐만 아니라 타당한 것으로 본다. 단지 일본이 [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]의 살인자 처벌을 거부했다는 이유만으로도... (#italic 2면에서 계속#!)" #largely copied from The Anglo-Japanese War, New York Times, 1863
 ep2_meiji_pulse.11.a: "#italic 누군가는#! 보상해야 한다. 재벌과 상의해 본다."
 ep2_meiji_pulse.11.b: "정말 동쪽에 더 깊이 개입해야 할까?"
 modifier_namamugi_incident_prestige_loss: "상인 살해 용인"
 castle_yamaguchi: "야마구치"
 castle_hagi: "하기"
 ep2_meiji_pulse.2.t: "[SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] 포격"
 ep2_meiji_pulse.2.d: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] 번이 [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting]의 죽음에 대한 배상금 지급을 거부하자, [SCOPE.sCountry('relevant_gp').GetAdjective] 해군 함선이 여러 날에 걸쳐 [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]의 연안 수비대와 화포 공격을 주고받으며 교전했다."
 ep2_meiji_pulse.2.f: "만이 대포 연기로 가득 차 흐려졌다. [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')](이)가 불타고 있었다. 바다 건너편에서 외국의 선박 중 하나가 도시 북쪽의 주조 공장을 포격했다. 대포가 발사될 때마다 지옥에서 나온 듯 붉은 불빛이 저무는 태양의 희미한 빛을 삼켜 버렸다.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]의 포대에서 최후까지 작동하던 대포가 포효했다. 사정거리도 길고 상태도 좋았으나, 지금은 거의 희망이 없었다. 포탄은 외국 함대의 세 번째 함선에서 조금 떨어진 곳에 부딪혔고, 물이 공중으로 크게 치솟아 올랐다. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting](이)가 해면을 집어 들고 달려가 총을 살폈다. 뒤쪽 벽 어딘가에서 지난 사격으로 다친 사람들이 아직도 비명을 지르고 있었다. [SCOPE.sCharacter('name_a_scope').GetSheHe]의 귀가 마구 울리고 있었지만, 여전히 그 소리가 들리는 듯했다."
 ep2_meiji_pulse.2.a: "무모하게 행동했으니 가혹한 대가를 치르는군."
