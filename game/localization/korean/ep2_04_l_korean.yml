 glossary_zaibatsu: "#b #italic 자이바츠#!#!는 집안이 소유하며, 수직통합적 산업 및 금융 복합기업입니다.\n\n자이바츠는 일반적으로 지주회사와 은행을 중심으로 조직되며, 주로 산업 분야에 속하는 여러 자회사에 소유권 지분을 보유하고 있습니다. 자이바츠는 에도 시대 후기의 상인 집안 복합체에서 탄생했습니다. 이들은 소유하고 있던 재산과 국가와의 연줄을 활용해 일본의 산업 기반 대부분에 걸쳐 있던 통제력을 확고히 했습니다."
