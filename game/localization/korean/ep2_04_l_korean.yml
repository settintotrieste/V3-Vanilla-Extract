 ep2_meiji_pulse.3.t: "시모노세키 전쟁"
 ep2_meiji_pulse.3.d: "조슈 번의 다이묘 [SCOPE.sCharacter('choshu_daimyo_scope').GetFullName](이)가 외국인을 추방하라는 천황의 명령을 따르겠다고 알려 왔다. [SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe|U]는 해군에 시모노세키 해협을 지나가는 모든 외국 선박에 발포하라는 명령을 내렸으며, [SCOPE.sCountry('relevant_gp').GetAdjective] 군함과의 교전을 가열시켰다."
 ep2_meiji_pulse.3.f: "대낮에 번갯불이 히노야마의 완만한 경사를 타고 굴러갔다. 마사타케의 고개가 하늘을 향했다. 두둥실 떠오른 하얀 구름이 마사타케를 맞이했다.\n\n\"저기!\" 지로가 외쳤다. 시야에 손이 쑥 들어오더니 아래쪽을 가리켰다. 아래쪽 해협에서 선박 하나가 전속력으로 돌진하고 있었다. 대포는 마사타케의 눈에 보이지 않는 무언가를 향해 불을 뿜어댔다. 선체에서 파편이 튀고 있었으나, 선박은 계속 움직였다. 그 위로 또 다른 구름이 생겨나고 있었다."
 ep2_meiji_pulse.3.a: "외국인은 우리가 할 수 없는 것을 해낸다."
 ep2_meiji_pulse.3.b: "번이 상황을 가라앉힐 수 있게 돕는다."
 ep2_meiji_pulse.3.c: "합의를 대가로 서양인들에게 항구를 제공한다."
 treaty_name_shimonoseki_war_indemnity: "시모노세키 전쟁 배상금"
 modifier_defeated_westerners: "서부 원정 타도"
 modifier_bombardment_of_domain: "번 자리 폭격"
 ep2_meiji_pulse.4.t: "[SCOPE.sCountry('relevant_gp').GetAdjective] 공사관 전소"
 ep2_meiji_pulse.4.d: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] 번의 #italic 존왕양이#!파 사무라이가 [SCOPE.sState('edo_state').GetCityHubName]에 건설 중인 [SCOPE.sCountry('relevant_gp').GetAdjective] 공사관 건물을 습격했다. 도시에 최초로 세워진 서구식 건물이 될 예정이었던 공사관은 완전히 불타버렸으며, 범인들은 흔적도 찾아볼 수 없었다."
 ep2_meiji_pulse.4.f: "두건과 가면을 착용한 두 남자가 언덕 위에 자리를 잡고 공사관이었던 건물을 바라보았다. 이제 까맣게 그을린 그 표면에서는 아직도 주황빛이 솟아오르고 있었다. 불길을 키울 만한 것들은 모두 사라졌으나, 서로 밀집해 있는 안쪽 기둥에서 불꽃이 살아남아 타고 있었다.\n\n빛이 점차 꺼져갔지만 두 남자는 자리를 지켰다. 한 명이 뒤에 남은 연기 기둥을 바라보며 조용히 말했다.\n\n\"저 재가 눈처럼 우리 위로 내려앉는다면 참 아름답지 않겠나?\""
 ep2_meiji_pulse.4.a: "[SCOPE.sState('edo_state').GetCityHubName](은)는 통치가 불가능한 상황이다."
 ep2_meiji_pulse.4.b: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')](이)가 도시 내에서 무기를 소지하는 것을 금지한다."
 shimonoseki_indemnity_tt: "[ROOT.GetCountry.GetName](이)가 #v 10년#! 동안 [SCOPE.sCountry('relevant_gp').GetName]에 @money!#v 3백만#!의 배상금을 지급하게 됨"
 shimonoseki_indemnity_port_tt: "[GetStateRegion('STATE_KANSAI').GetName]의 $HUB_NAME_STATE_KANSAI_port_japanese$ 도시가 [SCOPE.sCountry('relevant_gp').GetAdjective] [concept_treaty_port]으로 개방될 것임"
 modifier_ungovernable_capital: "통치 불가능 인정"
 ep2_meiji_pulse.5.t: "피투성이 복수"
 ep2_meiji_pulse.5.d: "막부의 수장 [SCOPE.sCharacter('tairo_scope').GetFullName](이)가 에도 성 앞에서 [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] 및 [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] 번의 로닌에게 암살당했다. 암살자들이 남긴 선언문에는 #italic 존왕양이#! 원칙이 적혀 있었으며, 외국인들을 승인한 수장의 행보를 비난하고 있었다."
 ep2_meiji_pulse.5.f: "추자부로는 고로쿠로가 행렬의 앞으로 나서는 모습을 지켜보았다. [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] 경비 한 명이 움직여 막았다. 고로쿠로는 대응할 시간도 주지 않았다. 칼을 뽑아 들어 돌진했다. [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] 사람의 잘린 얼굴에서 피가 크게 치솟자, 그 동료들이 복수하러 달려들었다.\n\n추자부로는 우의를 떨어뜨리며 권총을 빼 들었다. 가마의 노출된 곳을 겨냥한 뒤 방아쇠를 당겼다. 총성이 검이 부딪히는 소리와 외침을 뚫고 울려 퍼졌으며, 또 다른 총성이 일었다. 경비병이 달려 나와 그와 맞섰으며, [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]에서 온 로닌 지자에몬이 그 몸통을 향해 검을 아래로 휘둘렀다. 격돌하는 두 명을 지나친 추자부로는 가마의 문에서 붉은 피가 흘러내려 눈 덮인 거리를 적시는 모습을 보았다. 추자부로는 와지카시를 꺼내 들고 곧장 그쪽으로 달렸다."
 ep2_meiji_pulse.5.a: "사무라이의 검이 다시 한번 부딪히는구나."
 modifier_tairo_assassinated: "대로 암살"
 ep2_meiji_pulse.6.t: "이케다야 사건"
 ep2_meiji_pulse.6.d: "[GetLawType('law_shinsengumi').GetName] 법률은 [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]의 전투원을 고문해 얻어낸 정보를 따라, [SCOPE.sState('kyoto_state').GetName]의 이케다야 여관에서 모이는 공모 혐의자들을 습격했다. 습격이 시작되자 여관 안팎으로 검이 부딪히며 격렬한 전투가 벌어졌다."
 ep2_meiji_pulse.6.f: "신선조가 문을 뚫고 들어오자 난간의 오타카는 마음을 단단히 먹었다. 신선조의 창백한 푸른빛 #italic 하오리#! 소매에 묻은 핏자국이 어두운 등불에 비쳐 흑백으로 보였다. 오타카는 검을 올려 방어 자세를 취했다.\n\n두 명이 무리에서 나오더니, 오타카가 지키던 계단을 향해 나란히 돌진해 올라왔다. 오타카는 검을 휘둘렀고, 칼날이 막히는 것을 느끼며 자세를 바로잡았다. 충격에 불꽃이 튀었다. 두 번째 인물이 공격해 왔다. 오타카는 한 걸음 물러나 손목을 비틀었다...\n\n불빛에 비친 강철이 번쩍이더니, 가슴에 차가운 무언가가 꽂혔다."
 ep2_meiji_pulse.6.a: "신선조의 추진력에 보상을 내린다."
 ep2_meiji_pulse.6.b: "이런 잔혹함은 보복을 부를 뿐이다."
 modifier_shinsengumi_meddling: "날뛰는 신선조"
 modifier_shinsengumi_crackdown: "신선조 탄압"
 modifier_refrained_from_crackdowns: "제지된 신선조"
 sufficient_pressure_from_sonno_joi_tt: "[SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')]의 [concept_activism]이 @activism_red! $RADICALISM_PROTESTING$ 이상임 (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!)"
 ep2_meiji_pulse.7.t: "금문"
 ep2_meiji_pulse.7.d: "[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] 번과 연합한 [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]의 병사들이 [SCOPE.sState('kyoto_state').GetName]의 황성을 습격해 무력으로 천황을 복위시키려 시도했다. 이들은 [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] 및 아이즈 번의 병사들에게 저지당했다."
 ep2_meiji_pulse.7.f: "하마구리 문이 포연으로 자욱해졌다. 사방에서 교토가 불길에 휩싸여 있었다.\n\n벽을 따라 몰려선 아이즈 번의 병사들이 활강총을 연달아 쏘아댔고, 탄환이 거리와 [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] 대포의 몸통에 쏟아졌다. 몇 초마다 대포 중 하나가 불을 뿜으면 총성을 뚫고 외침이 짧게 울려 퍼졌다. 고조는 대포 바퀴에 웅크린 채 활강총에 걸린 탄을 빼내려 애를 썼다. 불과 몇 #italic 간#! 멀리서 부대장이 다리도, 팔도 잃은 채 얼굴을 땅에 대고 누워 있었다. 그의 몸이 여전히 꿈틀거리고 있었다."
 ep2_meiji_pulse.7.a: "[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')](와)과 아이즈 번이 습격자들을 물리쳤다."
 ep2_meiji_pulse.7.b: "황성이 [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]의 손아귀에 넘어갔다."
 coup_resistance_below_daimyo_coup_strength_tt: "[ROOT.GetCountry.GetName]의 [concept_coup_resistance]([SCOPE.ScriptValue('country_coup_resistance')|v2])이 [SCOPE.sCharacter('daimyo_1_scope').GetFullName]의 [concept_coup_strength]([SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2])보다 낮음"
 ep2_meiji_pulse.8.t: "[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] 원정대"
 ep2_meiji_pulse.8.d: "쇼군이 [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]의 황성 습격에 대한 보복으로 징벌 원정대의 파견 명령을 내려, 번에서 #italic 존왕양이#! 파벌을 몰아내려고 한다. [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]에 동조하는 고문들은 죄를 지은 세력이 할복하는 조건으로 평화를 지키자는 계획을 제시했다."
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]의 다이묘 [SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting](이)가 성의 노대에서 먼 곳을 바라보았다. 저 멀리서 다가오는 군대가 피운 모닥불의 연기로 하늘이 물들고 있었다.\n\n\"쇼군께서 고위 가신 세 명이 할복할 것을 명하셨습니다.\" 가신이 전했다. \"장교 넷은 참수하라고 하셨습니다. 또한 관료 다섯 명을 유배형에 처해야 합니다.\"\n\n[SCOPE.sCharacter('daimyo_1_scope').GetFirstNameNoFormatting](은)는 모닥불을 바라보았다. 최소한 수백 명은 되어 보였다. 한때는 푸르던 지평선이 이제는 메스껍게 보였다. 마침내 다이묘가 입을 열었다.\n\n\"...[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] 번은 복종할 것이다.\""
 ep2_meiji_pulse.8.a: "전투 없이 저들을 물리칠 수 있다면 그렇게 하라."
 ep2_meiji_pulse.8.b: "번을 구석구석 정화해야 한다."
 modifier_daimyo_house_arrest: "얽매인 다이묘"
 modifier_daimyo_executed: "몰수당한 다이묘"
 ep2_meiji_pulse.9.t: "야만인 추방 명령"
 ep2_meiji_pulse.9.d: "서구 열강이 [ROOT.GetCountry.GetName]에 강요한 조약에 분노한 천황이 쇼군을 거치지 않고 [ROOT.GetCountry.GetAdjectiveNoFormatting]의 땅에서 외국인을 추방한다는 칙령을 선포했다. [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]의 무장 세력이 천황의 뜻을 따라 집결했다."
 ep2_meiji_pulse.9.f: "신하 한 명이 대포와 나란히 서서 해협 쪽을 바라보았다. 이 시각에는 항해하는 선박들이 저무는 태양의 빛을 받아 검은 윤곽을 드러냈다. 옆에서는 조슈 번의 하급 사무라이가 꽂을대와 화약 자루를 가지고 바쁘게 움직이고 있었다.\n\n히노야마의 모습과 그 아래의 시모노세키 마을을 보고 있자니, 칙령의 구절이 떠올랐다. \"이 땅이 잿더미가 된다고 할지라도.\" 칙령에는 그렇게 적혀 있었다. \"무역을 위한 항구 개방을 허락하지 않을 것이다.\"\n\n옳은 행동이었나? 저 완만하고 푸른 언덕이 검게 그을리고, 꽃밭이 불타고, 자기 집이 무너지는 것을 허락했을까? 신하는 망설임 없이 생각했다. 그랬을 것이라고."
 ep2_meiji_pulse.9.a: "쇼군이 교토로 이동해 이 사안을 논의해야만 한다."
 ep2_meiji_pulse.9.b: "이 명령은 사기나 다름없다. 금지하라."
