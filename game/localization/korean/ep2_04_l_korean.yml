 special_character_japanese_emperor: "일본 천황"
 special_character_japanese_emperor_desc: "해당 인물은 현재 재위 중인 일본 천황으로, 일본의 종교적 및 정치적 체제의 중심에 있는 존재입니다."
 japan_monarchy.1.t1: "가에이 시대"
 japan_monarchy.1.t2: "덴큐 시대"
 japan_monarchy.1.d1: "[SCOPE.sCharacter('emperor_scope').GetFirstName] 친왕이 일본 천황으로서 국화좌에 올랐다. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] 즉위는 영원한 행복을 뜻하는 가에이 연호의 시작을 알렸다."
 japan_monarchy.1.d2: "[SCOPE.sCharacter('emperor_scope').GetFirstName] 친왕이 일본 천황으로서 국화좌에 올랐다. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] 즉위는 천상의 영속을 뜻하는 덴큐 연호의 시작을 알렸다."
 japan_monarchy.1.f: "보이지 않는 어디선가 악사가 신호를 보냈다. 궁중 여인 두 명이 옥좌의 휘장을 열었다. 그곳에는 흰색과 초록색 용 문양으로 장식된 붉은 예복을 입은 천황이 앉아 있었다. 넉넉히 부풀어 오른 옷자락은 좌석을 삼켜 버린 듯해, 그가 공중에 떠 있는 것처럼 보였다. 관 위에서는 구슬 장막이 내려왔고, 그 그림자가 눈을 가려 표정을 읽을 수 없었다.\n\n[SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting] 주변에서 옷자락 스치는 소리가 일었다. [SCOPE.sCharacter('name_scope').GetHerHis] 고개가 아래로 숙여졌다. 참석자들은 거대한 파도처럼 일제히 엎드렸다. [SCOPE.sCharacter('name_scope').GetSheHe|U] 또한 함께 몸을 낮췄고, 그림자에 잠긴 천황의 얼굴이 시야에서 사라졌다.\n\n[SCOPE.sCharacter('name_scope').GetSheHe]는 며칠 뒤 에도로 돌아가는 길에서 자신이 본 것을 되짚어 보려 했지만, 아무것도 구체적으로 떠오르는 것이 없었다. 관과 휘장, 그리고 천황 곁에 놓여 있던 상자들은 떠올릴 수 있었다. 그러나 정작 천황이라는 사람 자체에 대해서는 아무런 기억도 남아 있지 않았다."
 japan_monarchy.1.a: "바닷가의 모래알만큼 만수무강하시길."
 japan_monarchy.2.t: "메이지 시대"
 japan_monarchy.2.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName] 친왕이 일본 천황으로서 국화좌에 올랐다. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] 즉위는 계몽된 통치의 약속을 담은 [SCOPE.sCharacter('emperor_scope').GetFirstName] 연호의 시작을 알렸다."
 japan_monarchy.2.f: "징이 울리고 휘장이 걷혔다. 찰나의 순간, 청중은 화려하게 장식된 황색 비단을 입고 얼굴이 반쯤 가려진 천황의 모습을 보았다. 그의 왼편에는 신성한 검과 옥을 감춘 녹색 옻칠 상자가 받침 위에 놓여 있었다. 이윽고 무장장이 호령하자, 사람들은 일제히 눈을 바닥으로 떨구었다. 전령이 힘 있고 또렷한 목소리로 고했다.\n\n\"옛적 신대로부터 나라의 기틀이 세워졌고, 그 뒤 진무 천황께서 가시하라에서 황가를 창건하셨도다. 황실은 한 번도 단절되지 않고 이어져 왔으니, 옛 법도와 선황의 선례를 받들어 이제 황통을 이어받아 천황위를 계승하노라.\"" # Very heavily pared down excerpt of the rites at Meiji's enthronement
 japan_monarchy.2.a: "바닷가의 모래알만큼 만수무강하시길."
 japan_monarchy.3.t: "다이쇼 시대"
 japan_monarchy.3.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName] 친왕이 일본 천황으로서 국화좌에 올랐다. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] 즉위는 위대한 올바름의 덕을 기리는 [SCOPE.sCharacter('emperor_scope').GetFirstName] 연호의 시작을 알렸다."
 japan_monarchy.3.f: "한 사내가 비계 위를 지나가자 이음부가 끼익 소리를 냈다. 야타로는 온 힘을 다해 비계를 꽉 붙들었다. 발소리가 멀어지자 그는 망치를 들어 고정 작업을 마무리했다.\n\n사방에서 비슷한 소리가 들려왔다. 곁눈질로 보니 옆 건물에서는 다른 인부들이 검은 목재 널판으로 벽을 세우고 있었다. 반장은 초가지붕 재료를 위태롭게 짊어진 사내에게 고함을 치며 지시를 내렸다.\n\n엿새 뒤면 한창 짓고 있는 이 통로를 천황이 지나게 된다. 일생에 단 한 번뿐인 의식으로서, 그 의식은 이 구조물의 파괴로 끝을 맺을 예정이었다. 야타로는 그 자리에 참석할 수 없다. 그저 그 자리에서 뿜어져 나오는 빛이 구름에 비쳐 반사되는 모습을 먼발치에서나마 바라볼 수 있기만을 바랄 뿐이었다."
 japan_monarchy.3.a: "바닷가의 모래알만큼 만수무강하시길."
 japan_monarchy.4.t: "쇼와 시대"
 japan_monarchy.4.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName] 친왕이 일본 천황으로서 국화좌에 올랐다. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] 즉위는 계몽된 평화와 화합의 약속을 소망하는 [SCOPE.sCharacter('emperor_scope').GetFirstName] 연호의 시작을 알렸다."
 japan_monarchy.4.f: "다카이시 가문의 네 세대가 라디오 수신기 주위에 옹기종기 모여 앉았다. 그 안에서 흘러나오는 목소리는 마치 우물 바닥에서 들려오는 듯했고, 잡음이 섞여 있었다. 기요는 다이얼을 이리저리 돌렸다. 다시 신호가 잡히자 이번에는 또렷하고 안정된 음성이 들려왔다.\n\n\"...내각관방장관이 새 연호를 선포하는 조서를 발표했습니다. 금일부터 연호는 [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting] 원년으로 개정됩니다...\"\n\n기요의 어머니가 부엌 식탁 위 신문으로 시선을 돌렸다. \"고분이 아니라고? 방금 잘못 들은 거 아니지?\"\n\n갈등 어린 속삭임이 방 안을 가득 메웠고, 기요는 라디오의 음량을 더 올렸다. 그러나 소용없었다. 다른 소식이 있다면 내일 신문을 통해서야 알 수 있을 터였다."
 japan_monarchy.4.a: "바닷가의 모래알만큼 만수무강하시길."
 japan_monarchy.5.t: "하나의 천황, 하나의 연호"
 japan_monarchy.5.d: "황실이 정치적 정통성을 회복함에 따라, 천황은 연호 제도를 개혁하는 칙령을 반포하였다. 이제부터는 새 천황이 즉위할 때마다 새로운 연호가 선포되며, 그 연호는 그가 통치하는 동안 지속된다."
 japan_monarchy.5.f: "#bold 황실 칙령#!\n\n신의 혈통을 이은 군주가 하늘의 명을 받들어 즉위함에 따라, 새로운 연호를 세우는 것은 계몽된 시대의 본보기이자 만세에 걸친 표준이 되리라. 나는 위대한 황통을 계승하고 친히 국정을 돌본 바, 이제 온 나라 신민들과 더불어 새출발을 기리고자 연호를 고친다. [ROOT.GetCountry.GetCustom('JAP_era_year_name')](은)는 이제부터 [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting] 원년으로 칭한다. 금일부로 구제도를 개혁하여, 재위마다 하나의 연호만을 사용하는 원칙을 영구한 관례로 삼는다." # Shortened 'One Emperor, One Era' edict - 今後年號ハ御一代一號ニ定メ慶應四年ヲ改テ明治元年ト爲ス及詔書
 japan_monarchy.5.a: "관원들은 이를 시행할 것이다."
 japan_monarchy.6.t: "상황천황의 서거"
 japan_monarchy.6.d: "현 천황의 선황이자 퇴위한 천황이 서거하였다. [SCOPE.sCharacter('retired_emperor_scope').GetSheHe|U]는 황실의 위엄을 회복하고자 힘쓴 공적으로 기억되며, [SCOPE.sCharacter('retired_emperor_scope').GetFirstName] 시호를 받았다."
 japan_monarchy.6.f: "도호는 붓을 먹물에 적셨다. 붓끝이 종이 위를 스치며 날짜와 연도, 날씨를 적어 내려갔다. 그리고 다음 줄로 옮겨가다 이내 멈추었다.\n\n어떤 문구가 합당할까? 이 중대한 사건의 의미를 어떻게 표현해야 할까? 그는 선황이 조정을 다시 일으키기 위해 기울였다는 각고의 노력을 풍문으로 들어 알고 있었다. 그 융성하는 치세를 떠올렸고, 직접 지시해 부활시켰다는 여러 의식에 대한 보고도 기억하고 있었다. 그리고 마침내 조정의 사자를 맞이하여 그 실상을 직접 전해 들었다.\n\n붓끝이 종이에 닿았다. \"천황 존호에 관한 전례를 묻는 요청을 받음. 황실 계보를 상고하여 자문을 올림...\""
 japan_monarchy.6.a: "그의 후손들은 과연 그의 뜻을 깨닫게 될까?"
