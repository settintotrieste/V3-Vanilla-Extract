 je_meiji_restoration_imperial_marriage_desc: "#b 공무합체#! 계획을 성공시키려면 말 그대로 결합이 필요하다. 바로 현 $RULER_TITLE_SHOGUN$과 황실 공주와의 정치적 결혼이다. 이 결합을 실현하려면 $RULER_TITLE_SHOGUN$이 황실에서 제시한 상당한 양의 조건을 충족해야만 한다."
