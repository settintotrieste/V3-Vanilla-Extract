 shogunate_strategy_title_decide_loc: "개혁 전략 결정"
 shogunate_strategy_title_revise_loc: "개혁 전략 수정"
 shogunate_strategy_title_decide_desc_loc: "도쿠가와의 권력이 살아남으려면 막부의 개혁이 필수입니다. 이러한 개혁은 두 방향 중 하나로 진행될 수 있습니다. 쇼군이 황실과의 통합으로 막부 체제의 정통성을 새롭게 세우거나, 천황을 제한적으로 복권시키고 자신이 의회 정부의 수장으로 오를 수도 있습니다."
 shogunate_strategy_title_revise_desc_loc: "쇼군이 현재 선택한 개혁 전략이 크게 이로운 효과를 내지 못하고 있습니다. 접근 방식을 바꾸면 비용이 들겠지만, 실패한 길은 따라가지 않는 편이 좋습니다."
 je_meiji_restoration_proclaim_imperial_restoration: "황실 복원을 위한 탄원"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "천황은 여전히 일본의 군주입니다. 황실의 인가 없이는 쇼군도 그저 수백의 다이묘 중 가장 강력한 다이묘일 뿐입니다. 막부의 생존, 또는 추락은 황실의 의지에 달려 있습니다."
 imperial_restoration_kobu_gattai_loc: "위기를 끝내려면 쇼군과 황실이 하나가 되어야 합니다. 다이묘는 쇼군의 명령이 곧 황실의 명임을 납득하고, 쇼군이 황실의 온전한 신임을 받고 있음을 인지해야 합니다. 이 목표를 달성하려면 쇼군은 자신의 약점을 드러내며 천황에 의지해 자신의 권위를 다시 수립해야 합니다.\n\n이는 무대에서 뛰어내리듯 운명에 치명적인 영향을 미칠 계획입니다. 황실이 협력할 의지를 보이지 않는다면, 도쿠가와 막부는 복수심에 불타는 반대파와 홀로 맞서야만 합니다."
 imperial_restoration_kogi_yoron_loc: "위기를 끝내려면 천황이 통치해야만 합니다. 복원 과정에서 도쿠가와의 권력이 살아남으려면 쇼군은 자신의 방식을 끝까지 밀고 나가야 합니다. 쇼군의 개혁에서 마지막 단계는 행정 권력을 천황에게 반납하고, 개혁을 거친 황실 정부 내에서 자신의 일족이 차지할 새로운 역할을 수립하는 것입니다.\n\n이는 무대에서 뛰어내리듯 운명에 치명적인 영향을 미칠 계획입니다. 황실이 협력할 의지를 보이지 않는다면, 도쿠가와 막부는 복수심에 불타는 반대파와 홀로 맞서야만 합니다."
