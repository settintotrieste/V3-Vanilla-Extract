 zaibatsu.1.t: "기업 제국"
 zaibatsu.1.d: "[ROOT.GetCountry.GetAdjective](와)과 [SCOPE.gsInterestGroup('zaibatsu_ig').GetName]의 사이의 오래된 협력 관계를 통해 [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] 내 복합기업의 권력이 확고해졌다. 통치는 정치인의 몫이지만, 이제는 장군과 중역 또한 다스리게 되었다."
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting](은)는 가려진 박스석에서 시합을 내려다보았다. 상대 레슬러가 [SCOPE.sCharacter('pm_scope').GetHerHis] 전사를 볏짚 경기장의 거의 끝까지 밀어붙인 상황이었고, [SCOPE.sCharacter('pm_scope').GetSheHe]는 손마디가 하얗게 변할 만큼 주먹을 쥐지 않으려고 필사적으로 참고 있었다. 내각총리의 옆에는 완벽하게 평온한 모습의 [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting](이)가 서 있었다.\n\n심판이 부채로 가리키자 아래쪽 좌석에서 환호가 터져 나왔다. 자리 방석이 빗발치며 날아올라 경기장으로 떨어졌다. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting](은)는 [SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting](을)를 향해 고개를 돌리고 미소를 지었다. 경기장 건너편 벽 한쪽에 [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]의 #italic 문장#!이 찍혀 있었다."
 zaibatsu.1.a: "[ROOT.GetCountry.GetCapital.GetCityHubName](이)가 빛의 바다처럼 펼쳐지게 하라."
 zaibatsu.1.b: "우리 공급망은 안전할수록 좋은 법이다."
 zaibatsu.2.t: "통제 확립"
 zaibatsu.2.t_1: "균형을 맞추는 손"
 zaibatsu.2.d: "[SCOPE.sCharacter('pm_scope').GetLastName] 내각의 노력으로 [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]에 지배력을 행사하는 [SCOPE.gsInterestGroup('zaibatsu_ig').GetName]의 능력이 제한되었다. 이제 정치인이 다스리고, 중역은 자신의 이득에만 집중하게 되었다."
 zaibatsu.2.d_1: "[SCOPE.sCharacter('pm_scope').GetLastName] 내각의 자유무역 정책이 [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]에 지배력을 행사하는 [SCOPE.gsInterestGroup('zaibatsu_ig').GetName]의 권한에 필수적인 군산복합 계약망을 약화했다. 이제 정치인이 다스리고, 중역은 자신의 이득에만 집중하게 되었다."
 zaibatsu.2.f: "여러 중역이 [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting] 본사의 상층 회의실로 들어왔다. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting](은)는 서기들의 뒤를 이어 세 번째로 들어왔다. [SCOPE.sCharacter('name_a_scope').GetSheHe|U]는 문 옆에 자리를 잡고 선임들이 지나가는 모습을 지켜보았다. [SCOPE.sCharacter('name_a_scope').GetHerHim]의 앞에 놓인 찻잔에서 희미한 김이 피어올랐다.\n\n[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting](이)가 마지막으로 들어왔다. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis|U] 시선이 직원들을 차례로 훑어보았다. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting](은)는 [SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis] 눈에 어린 빛을 알아차렸다. 피로감. 남작이 지금까지 한 번도 보여준 적 없던 감정이었다. 얼굴에 드리운 그림자는 그 어느 때보다 더 짙어 보였고, 하얗게 센 머리카락은 더 가늘어져 있었다."
 zaibatsu.2.a: "주권은 우리만의 것이다."
 zaibatsu.2.b: "백성들에게 알려라. [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')](은)는 돈으로 살 수 없다."
