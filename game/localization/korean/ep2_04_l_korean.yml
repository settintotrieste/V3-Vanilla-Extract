 ig_in_pro_country_lobby_tt: "[concept_interest_group]이 우호적인 [concept_political_lobby] 중임"
 iwakura_mission.1.t: "서양으로 가는 사절단"
 iwakura_mission.1.d: "정부가 특명전권대사 직무를 맡기에 적합한 여러 각료와 관료의 목록을 작성했다. 선택된 후보는 서양으로 떠나는 원정대를 이끌게 되며, 예상 기간은 약 10개월이다."
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting](은)는 거울 앞에 서서 자신의 넥타이를 확인하고 또 확인했다. 일본에 들어온 지는 좀 된 물건이었다. 처음에는 유행이었고, 이후에는 국가의 명령으로 착용하게 되었지만 아직 자연스럽게 느껴지지는 않았다. [SCOPE.sCharacter('expedition_leader_1').GetSheHe|U]는 그래도 해내야만 했다. 자신의 거래가 타결되고, 정부가 [SCOPE.sCharacter('expedition_leader_1').GetHerHis] 제안을 지지하며, 이제 런던과 보스턴과 파리에서 눈을 뜨게 된다면 하루의 끝은 더 이상 휴식이라 할 수 없게 될 것이다."
 iwakura_mission.1.a: "이 사안은 [SCOPE.sCharacter('expedition_leader_1').GetFullName](이)가 살펴야 한다."
 iwakura_mission.1.b: "직무에 [SCOPE.sCharacter('expedition_leader_2').GetFullName](을)를 지명한다."
 iwakura_mission.1.c: "[SCOPE.sCharacter('expedition_leader_3').GetFullName](을)를 믿어야 한다."
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName](이)가 이 기회로 득을 볼 수 있겠군."
 iwakura_mission.2.t: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] 보고서"
 iwakura_mission.2.d: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] 사절단이 $JAP$으로 돌아왔으며, [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName](와)과 [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHis] 동료 대사들이 [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]에 보고서를 제출했다. 이들의 보고에는 산업 사회를 관찰한 내용과 더불어 새로운 국가 정책의 추천을 담고 있었다."
 iwakura_mission.2.f: "\"깊이 생각해 보니, 유럽 국가와 미국은 분명 원칙을 적절하게 적용해 성공할 수 있었습니다. 세계를 가로지르는 이들은 수십 개의 나라를 조사한 결과, 통치의 구조는 나라마다 다를 수 있으나, 모두가 교육을 향해 노력을 집중한다는 사실 아래 하나가 된다는 사실을 깨달았습니다. 그렇기에 이 나라 중 어느 곳에 가더라도 학교 없는 곳은 없으며, 모두가 계몽의 정신을 지니고 있습니다.\"\n\n—다나카 후지마로"
 iwakura_mission.2.a: "서양이 현대화로 가는 창을 열어주었군."
 iwakura_mission.2.b: "[SCOPE.sCountry('iwakura_good_economy_country').GetAdjective]식 산업이 일본의 미래가 될 것이다."
 iwakura_mission.2.c: "[SCOPE.sCountry('iwakura_desired_law_country').GetAdjective]의 정치에서 배울 것이 많다."
 iwakura_mission.2.e: "[SCOPE.sCountry('iwakura_land_reform_law_country').GetAdjective]의 영향을 받은 토지 개혁이 교외를 부활시킬 것이다."
 iwakura_mission.4.t: "황금의 문"
 iwakura_mission.4.d: "바다를 가로지르는 오랜 항해 끝에 [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] 사절단이 [SCOPE.sCountry('iwakura_mission_host').GetName]에 도착했다. 사절단은 철도를 따라 [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName](을)를 향해 여정을 이어가며, 도중에 [SCOPE.sCountry('iwakura_mission_host').GetAdjectiveNoFormatting]의 기관과 산업 시설을 조사할 계획이다."
 iwakura_mission.4.f: "\"새벽에는 해무가 너무 짙어 몇 발짝 앞도 보이지 않았다. 배는 멈추어 서서 해가 뜨기를 기다렸다. 안개가 가벼워지더니 점차 걷혔고, 캘리포니아의 해안이 우리 앞으로 펼쳐졌다. 머지않아 두 개의 바위투성이 곶 가운데에 도달했으며, 양옆으로 산맥이 높이 솟아 있었다. 그 표면이 바다와 만났고, 증기선의 연기가 앞뒤로 지나가는 모습이 보였다. 이 아름다운 광경은 황금의 문이라 불리고 있었다.\n\n22일 동안 바다를 가로질렀으며, 마침내 여기 동쪽에서 산과 물을 처음으로 마주했다. 우리는 침묵과 기쁨 속에서 그 광경을 바라보았다.\"\n\n—쿠메 쿠니타케, #italic 이와쿠라 사절단, 1871~73년#!"
 iwakura_mission.4.a: "대륙의 지식이 우리 앞에 놓여 있다."
 iwakura_mission.4.b: "미국은 유럽으로 가는 관문일 뿐이다."
 iwakura_mission.5.t: "고래의 뱃속"
 iwakura_mission.5.d: "태평양에서 대서양까지 이동해 온 [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] 사절단이 [SCOPE.sCountry('iwakura_mission_host').GetName]에 도착했다. 사절단은 [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle]의 정부와 외교 관계를 수립하고, 산업 혁명이 시작된 곳을 둘러보고자 한다."
 iwakura_mission.5.f: "\"미국이 번성하며 리버풀 항구는 그 어느 때보다도 번영하고 있다. 항만의 입구에는 선창이 늘어서 있으며, 북쪽 해안을 따라 6마일까지 뻗어 있다. 바다 쪽에는 돌로 만든 둑이 성벽처럼 쌓여 있으며, 그 안에서 선창이 사방으로 건설되어 있었다. 떠나고 돌아오는 모든 선박이 이 선창으로 들어와 정박한다. 선박의 돛대는 두껍게 자라난 나무들로 이루어진 숲을 닮았으며, 삭구는 어촌에서 널어놓고 말리는 그물 같았다. 듣기로는 이곳이 세상에서 가장 큰 선창이라고 한다.\"\n\n—쿠메 쿠니타케, #italic 이와쿠라 사절단, 1871~73년#!"
 iwakura_mission.5.a: "우리 앞에 놓인 모든 단서를 따라가 본다."
 iwakura_mission.5.b: "2달이면 [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName]의 전부를 충분히 볼 수 있다."
 iwakura_mission.6.t: "대륙 너머"
 iwakura_mission.6.d: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] 사절단이 유럽 대륙에 도착해, [SCOPE.sCountry('iwakura_mission_host').GetName]에서 여정을 시작했다. 이제 사절단은 몇 달간 대륙의 수많은 국가를 관찰하고, 평가하며 그들과의 관계를 수립하려고 한다."
 iwakura_mission.6.f: "\"오늘 오후에는 공동묘지를 방문했는데, 묘지의 이름은 물어보지 못했다. 이 묘지는 파리 동쪽 외곽에서 40에이커에 걸친 지역에 세워져 있었다. 하나뿐인 넓은 차로 바깥에는 공간이 거의 없었다.\n\n오늘은 지위가 낮아 보이는 가족의 장례식이 있었다. 작은 행렬이 나무 관을 들고 와서 무덤 안으로 내렸다. 목사가 기도 낭송을 마치자 참석한 이들은 흐느끼며 흙을 한 줌씩 뿌렸다. 행렬에 있던 모든 사람의 눈에는 눈물이 가득했으나, 크게 소리 내어 애도하는 이는 없었다.\"\n\n—쿠메 쿠니타케, #italic 이와쿠라 사절단, 1871~73년#!"
 iwakura_mission.6.a: "시간을 들여 비교하고 대조해 보자."
 iwakura_mission.6.b: "일정에 따라 순방을 서둘러야 한다."
 iwakura_mission.8.t: "다른 반쪽"
 iwakura_mission.8.d: "[ROOT.GetCountry.GetName](으)로 향하던 [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] 사절단은 [SCOPE.sCountry('iwakura_mission_host').GetAdjective] 식민지인 [SCOPE.sState('iwakura_mission_location').GetName]에 들렀다. 사절단은 이곳에서 며칠간 유럽 식민 사회와 원주민인 [GetReligion('theravada').GetNameNoIcon]의 관습을 관찰했다."
 iwakura_mission.8.f: "\"이곳을 방문하는 동안 우리를 #italic 단나#!라 부르고, 사원을 #italic 가란#!이라 부르는 승려의 안내를 받았다. 이 단어의 산스크리트 기원이 아직 보존되고 있다는 점이 놀라웠다. 실론은 부처의 수행이 있던 성스러운 땅이며, 이곳의 원주민은 아직도 불교를 믿고 있었다. 주민들의 삶이 단순하므로 승려들의 삶 또한 몹시 단순하다. 이들의 식사는 빈약하며, 기거하는 곳에는 잡초가 잔뜩 자라 있고, 모든 것이 극단적으로 검소하다.\n\n기독교나 이슬람의 성지에 비교하면 이곳은 충격적이다. 세속적인 치장을 버린 종교이기 때문일까? 그럴 수도 있다. 하지만 어쩌면, 그저 번성할 만한 힘이 없어서 그럴지도 모른다.\"\n\n—쿠메 쿠니타케, #italic 이와쿠라 사절단, 1871~73년#!"
 iwakura_mission.8.a: "우리도 이런 운명을 맞이할 뻔한 걸까?"
 iwakura_mission.9.t: "요코하마 항구"
 iwakura_mission.9.d: "몇 달을 해외에서 지내며 세계를 완전히 일주한 [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] 사절단이 [ROOT.GetCountry.GetName](으)로 돌아왔다. 사절단은 수많은 정보와 외국의 상품은 물론, 서양의 기술과 정치 기관을 직접 보고 경험한 목격담을 가지고 왔다."
 iwakura_mission.9.f: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting](이)가 증기선 갑판에서 서쪽을 바라보았다. 멀리서 거대한 후지산이 반쯤 걷힌 아침 안개를 머리에 얹은 모습이 보였다. 상인, 또는 그 자신처럼 이제 막 세계 여행을 시작한 여행자일지도 모르는 서양인 무리가 난간 주변에 몰려 있었다. 독일 남자가 선실 문 옆의 벤치에 앉아서 스케치북에 풍경을 그리고 있었다. 이번이 저들의 첫 방문일지 궁금했다. 저들도 자신처럼 이 광경을 볼 때마다 숨이 멎을 듯한 기분을 느끼는지도 알고 싶었다.\n\n자신이 해낸 일을 진정으로 해냈다고 말할 수 있는 사람이 몇 명이나 될까? 얼마나 많은 이가 세 바다를 건너고, 네 개의 대륙을 방문해 봤을까? [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe]는 생각했다. 더 많은 것이 기다리고 있다고. 철도와 증기선 덕분에 [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHim]와 같은 사람도 늘어날 테지만, 역사는 [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHim]를 그러한 이들 중 최초의 인물로 기억할 것이다."
 iwakura_mission.9.a: "고향이야말로 가장 아름다운 풍경이다."
 je_iwakura_mission: "유신: [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] 사절단"
 je_iwakura_mission_reason: "[ROOT.GetCountry.GetName]의 새로운 정부는 현대화 수단의 일부로서 [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName](와)과 상당한 수의 각료 및 학자들을 서양 세계를 향한 외교 사절단으로 보냈습니다. [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] 사절단은 서양과의 불평등 조약의 재협상을 시도하며, 열강의 정치 및 기술적 토대에 대한 조사를 시행할 예정입니다.\n\n사절단이 한 국가에 머무는 #b 달#!마다, 일정 확률로 해당 국가의 법 또는 기술에 대한 조사 결과를 획득합니다. 이러한 조사 결과는 사절단이 귀환 시 제출할 보고와 더불어 사절단 지도자의 [concept_ideology]에도 영향을 미치게 됩니다."
