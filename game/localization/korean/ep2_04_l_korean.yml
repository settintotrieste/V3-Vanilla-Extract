l_korean:
 japan_politics.1.t: "실용적 학문"
 japan_politics.1.d: "[ROOT.GetCountry.GetName]의 시대가 열리며 네덜란드식 교육 학파의 상당 부분이 구식으로 치부되었다. 새로운 사상이 [ROOT.GetCountry.GetAdjectiveNoFormatting] 지성인들의 사회를 휩쓸기 시작했으며, 그중에서도 \"실용적 학문\" 학파가 가장 먼저 나타났다."
 japan_politics.1.f: "\"중요한 것은, 모든 사람이 인간성의 원칙에 따라 자기 행동을 조절하고, 폭넓은 지식을 얻기 위해 성실히 공부하며, 자신의 국가에 적합한 실력을 키워나가야 한다는 점이다. 그리하면 정부가 나라를 더 쉽게 다스릴 수 있으며, 백성도 정부의 통치를 기꺼이 받아들이고, 모든 이가 각자의 자리를 찾아 나라의 평화를 지킬 수 있도록 도울 것이다. 이것이야말로 단 하나의 목표다.\"\n\n—후쿠자와 유키치, \"학문의 권장\"" # Translated by Eiichi Kiyooka
 japan_politics.1.a: "배움을 통해 부를 얻는다."
 japan_politics.2.t: "위대한 가문"
 japan_politics.2.d: "[ROOT.GetCountry.GetName]의 산업화가 이루어지며 [SCOPE.gsInterestGroup('industrialists_ig').GetName]들은 제조업 경제를 다각화했다. 이들은 자신의 부는 물론 주와의 연결을 활용해 산업 기반의 대부분을 통제할 수 있게 되었다."
 japan_politics.2.f: "중개자들이 제안하는 동안 재무부 장관은 발코니에서 밖을 내다보았다. 쌀로 거래하던 시절에는 군중에 물 한 양동이를 뿌려서 거래가 끝났음을 알렸다.\n\n이제는 의사봉을 든 채 시계를 뚫어져라 쳐다보는 남자의 손에 그 순간이 달려 있었다. 7퍼센트 금리의 채권을 사려고 책상 근처로 몰려든 중개인들 사이에서 입에 채권 한 장을 문 채 계약서에 서명하는 사람이 보였다. 귀청이 터질 듯한 불협화음이었다. 매수와 매도가 뒤섞이며 바위에 부딪히는 파도와 같은 소란을 일으켰다.\n\n시계가 울리자, 책상의 남자가 의사봉을 청동 판에 내리쳤다. 군중 속에서 분노의 외침이 터져 나왔다. 최후의 순간까지 거래가 이어지며 소란은 더 심해질 뿐이었다. 남자는 투덜거리며 책상 밑으로 몸을 숙이고 양동이를 집어 들었다."
 japan_politics.2.a: "이제 은행가들이 지배하리라."
 japan_politics.3.t: "평범한 시민"
 japan_politics.3.d: "에도 신분 제도가 대두되며 공통의 민족성을 기반으로 한 시민의 사회가 나타났다. 한때 [SCOPE.gsInterestGroup('pb_ig').GetName](으)로 간주되던 이들은 이제 자신들을 애국적인 시민으로 인식하게 되었다."
 japan_politics.3.f: "시조는 고개를 천천히 이리저리 움직이며 청동 거울 속에 비친 새로운 머리 모양을 살펴보았다. 길이가 이렇게 짧아졌던 적은 없었다. 기억이 시작되는 순간부터 유지해 왔던 묶은 머리도 사라졌다. 방금 잘린 머리카락의 끝은 두껍고 거칠었으며, 자신도 모르게 계속 만질 수밖에 없었다.\n\n그는 갑작스럽게 고개를 저었다. 머리카락이 이전과는 전혀 다른 방식으로 움직이는 게 느껴졌다. 높은 옷깃이 목을 간지럽히는 새 옷과 비슷한 느낌이었다. 불편하지만, 이로운 변화다. 그의 새로운 모습은 눈에 띄는 인상을 남겼고, 다른 사람들을 가게로 끌어들였다. 그의 사업은 문명화되어 있었으며, 그는 성실한 납세자였다. 또한 그는 근위대였으며 민족적이고 개화된 사람이다."
 japan_politics.3.a: "국가의 힘은 곧 국민의 평화다."
