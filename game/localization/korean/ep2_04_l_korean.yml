 shogunate.1.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] 임명" # Ieyoshi
 shogunate.1.d: "[SCOPE.sCharacter('shogun_scope').GetLastName] 막부의 새로운 수장으로서, [SCOPE.sCharacter('shogun_scope').GetFullName](은)는 천황으로부터 쇼군직을 하사받았다. 그러나 많은 [SCOPE.gsInterestGroup('daimyo_scope').GetName]들은 신임 쇼군이 아직 권위를 확립하지 못했다고 판단해 냉소적인 시선을 보내고 있다."
 shogunate.1.f: "형형색색의 다이묘들이 오히로마, 즉 전각을 따라 길게 늘어서 이동했다. 가장 높은 단 위에는 검은색과 붉은색 의복을 걸친 쇼군이 앉아 있었고, 오른편에는 천황의 칙령이 상자에 담겨 놓여 있었다.\n\n붉은색과 푸른색, 자주색 의복을 입은 귀족들이 차례로 엎드려 칼과 황금 예물을 바쳤다. 쇼군은 아무 말도 하지 않았고, 머리를 조아린 이들 또한 침묵을 지켰다. 신분이 낮아 알현이 금지된 이들은 전각 밖에 모여 있었고, 정원에서는 구호가 울려 퍼졌다."
 shogunate.1.a: "고쇼신, 고쇼신!"
 shogunate.2.t: "승계 문제"
 shogunate.2.d: "[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle]의 장남 [SCOPE.sCharacter('iesada_scope').GetFirstName]의 건강이 좋지 않다는 소식이 전해지면서, 그가 과연 [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] 직무를 수행할 수 있을지 우려가 커지고 있다. [SCOPE.sCharacter('armed_forces_leader').GetFullName](이)가 이끄는 외번 다이묘들은 [SCOPE.sCharacter('yoshinobu_scope').GetFullName](을)를 후보로 내세우며 결집했다."
 shogunate.2.f: "[SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting]의 침실은 비어 있었다. 병풍은 닫혀 있었고, 툇마루는 깨끗이 정리되어 있었다. [SCOPE.sCharacter('armed_forces_leader').GetSheHe|U]는 백지 한 장을 마주한 채 침상 곁에 앉아 있었다. [SCOPE.sCharacter('armed_forces_leader').GetHerHis|U] 눈은 감겨 있었다. 그러나 인접한 복도를 고양이 한 마리가 스친다 해도 분명히 알아챘을 것이다. 그러나 동시에, 누군가가 엿듣고 있지 않다는 확신 또한 가질 수 없었다. 아직은 시기상조였다. [SCOPE.sCharacter('armed_forces_leader').GetHerHis] 야망은 철저히 마음속에만 두는 편이 최선이었다.\n\n조정 또한 이 문제를 [SCOPE.sCharacter('armed_forces_leader').GetHerHim]와 같은 시각으로 볼 것인가? [SCOPE.sCharacter('armed_forces_leader').GetSheHe|U]는 그렇게 믿을 만한 이유가 있었다. 그러나 그것은 가장 쉬운 문제에 불과했다. [SCOPE.sCharacter('armed_forces_leader').GetHerHis|U] 생각은 쉼 없이 돌아갔다. 칙령을 어떻게 확보할 것인가? 그리고 그것이 사라지지 않도록 어떻게 보장할 것인가?"
 shogunate.2.a: "내부 [GetLawType('law_bakufu').GetName] 세력이 뜻을 관철하게 둔다."
 shogunate.2.b: "지금은 단호한 지도력이 필요하다."
 shogunate.3.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] 임명" # Iesada
 shogunate.3.d: "[SCOPE.sCharacter('shogun_scope').GetLastName] 막부의 새로운 수장으로서, [SCOPE.sCharacter('shogun_scope').GetFullName](은)는 천황으로부터 쇼군직을 하사받았다. 그러나 어린 시절부터 병약했던 탓에, 쇼군의 건강 상태는 이미 후계를 둘러싼 경쟁을 촉발하고 있다."
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "고쇼신, 고쇼신!"
 shogunate.4.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] 임명" # Yoshinobu
 shogunate.4.d: "[SCOPE.sCharacter('shogun_scope').GetLastName] 막부의 새로운 수장으로서, [SCOPE.sCharacter('shogun_scope').GetFullName](은)는 천황으로부터 쇼군직을 하사받았다. 개혁 성향 번의 지지자들은 새 쇼군의 통치에 큰 기대를 걸고 있다."
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "고쇼신, 고쇼신!"
 shogunate.5.t: "히토쓰바시와 난키"
 shogunate.5.d: "쇼군 이에요시의 후계를 둘러싸고 형성되었던 파벌들이, 후사가 없는 [SCOPE.sCharacter('shogun_scope').GetFullName]의 후계 구도를 두고 다시 한번 충돌했다. 외번 다이묘와 하급 [SCOPE.gsInterestGroup('armed_forces_ig').GetName]가 속한 히토쓰바시 일파는 [SCOPE.sCharacter('yoshinobu_scope').GetFullName]를 지지하고, 내번 [SCOPE.gsInterestGroup('daimyo_ig').GetName] 중심의 난키 일파는 [SCOPE.sCharacter('iemochi_scope').GetFullName]를 밀고 있다."
 shogunate.5.f: "무표정한 전령은 단 위에 앉은 인물 앞에서 바닥을 바라보며 서 있었다. 앉은 이의 붓은 종이 위에서 좀처럼 움직이지 않았다.\n\n\"요시카쓰 님께 전할 서신이다.\" 관료가 말했다. \"조정 일각에서 쇼군의 건강을 두고 볼썽사나운 억측에 익숙해진 이들이 있다. 마치 쇼군께서 목소리를 낼 수 없다는 듯 굴고 있지. 그러한 전제를 바탕으로 작성된 글이 돌기 시작하면 즉시 보고하라.\""
 shogunate.5.a: "쇼군은 [SCOPE.sCharacter('iemochi_scope').GetFirstName]에게 통치를 맡기고자 하신다."
 shogunate.5.b: "조정은 경험 있는 후계자를 요구하고 있다."
 shogunate.6.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] 임명" # Iemochi
 shogunate.6.d: "[SCOPE.sCharacter('shogun_scope').GetLastName] 막부의 새로운 수장으로서, [SCOPE.sCharacter('shogun_scope').GetFullName](은)는 천황으로부터 쇼군직을 하사받았다. 비록 젊긴 하지만, 신임 쇼군은 이미 과묵하고 치밀한 판단으로 명성을 쌓고 있다."
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "고쇼신, 고쇼신!"
 shogunate.6.a_regency: "[SCOPE.sCharacter('shogun_scope').GetSheHe|U]는 충성스러운 후견인의 보좌 아래 통치하게 될 것이다."
 shogunate.6.b_regency: "히토쓰바시 일파와 타협하여, [SCOPE.sCharacter('yoshinobu_scope').GetFirstName]를 [SCOPE.sCharacter('shogun_scope').GetHerHis] 후견인으로 임명한다."
 shogunate.7.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] 임명" # Iesato
 shogunate.7.d: "[SCOPE.sCharacter('shogun_scope').GetLastName] 막부의 새로운 수장으로서, [SCOPE.sCharacter('shogun_scope').GetFullName](은)는 천황으로부터 쇼군직을 하사받았다. 세상 물정에 밝고 개방적인 인물인 신임 쇼군은 [GetLawType('law_bakufu').GetName] 내 개혁파를 후원할 것으로 기대되고 있다."
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "고쇼신, 고쇼신!"
 shogunate.8.t: "무더운 여름"
 shogunate.8.d: "여름의 열기가 노쇠한 [SCOPE.sCharacter('shogun_scope').GetFullName]의 건강을 급격히 악화시켰다. 이제 병상에 누운 [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle](은)는 쇠약해진 심장과 마지막 싸움을 벌여야 한다."
 shogunate.8.f: "쇼군의 침상은 창을 향하도록 옮겨져 있었다. 시종들은 바다에서 불어오는 서늘한 바람이 부채질을 조금이나마 도와주기를 바랐다. 침상 발치에는 얼음 상자가 열려 있었고, 이마 위에는 젖은 천이 올려져 있었다.\n\n오늘은 바람 한 점 없었다. 저무는 해 아래 공기가 일렁였다. 무자비하고 숨 막히게 감싸는 열기였다. 그는 더 이상 아래에서 일렁이는 파도의 형체조차 분간할 수 없었다."
 shogunate.8.a: "이것으로 끝이다."
 shogunate.8.b: "서양식 치료를 시도하라."
 house_yamato_tt: "황실의 구성원임"
 house_yamato_not_tt: "황실의 구성원이 #b 아님#!"
