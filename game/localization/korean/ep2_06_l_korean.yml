l_korean:
 japan_earthquakes.1.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')] 대지진"
 japan_earthquakes.1.d: "나흘 동안 해안 바깥에서 세 번의 지진이 일어나며 드넓은 지역에 걸쳐 피해를 입혔다. 지진을 뒤따른 해일이 해안 지역에 들이닥치며 더 큰 충격을 안겼다."
 japan_earthquakes.1.f: "마을 전체가 순식간에 상황을 알아차렸다. 아무도 땅의 움직임은 느끼지 못했으나, 모두가 물이 움직이는 모습을 보고 큰 충격을 받았다. 주민들은 상황을 지켜보려 해변으로 달려갔으며, 심지어는 해변을 넘어가는 이도 있었다. 지금까지 살아 있는 사람 중 누구도 이 해안에서 이런 썰물을 본 적은 없었다. 사상 처음 나타나는 현상이 목격되고 있었다. 하마구치가 바라보는 동안에도 골이 진 낯선 모래사장, 해초에 뒤덮인 바위가 그대로 드러나고 있었다. 아래에 있던 사람 중에서 이 무시무시한 썰물이 무엇을 뜻하는지 아는 이는 아무도 없는 듯했다.\n\n—라프카디오 헌, #italic 살아있는 신#!"
 japan_earthquakes.1.a: "인근 다이묘에게 지원을 요청한다."
 japan_earthquakes.1.b: "지방 통치자들에게 구호 활동을 맡긴다."
 earthquake_assisting_daimyo: "인근 다이묘 지원 중"
 earthquake_affected_daimyo: "지진의 여파"
 japan_earthquakes.2.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')] [SCOPE.sState('japan_earthquake_state').GetCityHubName] 지진"
 japan_earthquakes.2.d: "[SCOPE.sState('japan_earthquake_state').GetName]의 해안 근처에서 대지진이 발생해 [SCOPE.sState('japan_earthquake_state').GetCityHubName]의 도시와 성에 광범위한 피해를 입혔다."
 japan_earthquakes.2.f: "지진 이후 나마즈, 즉 거대한 메기 그림이 인기를 얻기 시작했을 때는 그림이 전통 민담과 비슷한 느낌이었다. 신들이 이 생물을 막아 지진을 더 일으키지 못하게 제압하는 모습이었다.\n\n하지만 시간이 지나며 묘사는 발전했다. 한 그림에서는 나마즈가 배를 열어 피 대신 동전을 흘리고 있었다. 또 다른 그림에서는 건축가들이 나마즈와 함께 술을 마시고 있었다. 예술에 풍자적인 면이 스며들고 있었다. 이 짐승이 재앙을 불러올지라도, 무언가를 바로잡는 것이었을지도 모른다는 생각이 담기기 시작한 것이다."
 japan_earthquakes.2.a: "[SCOPE.sState('japan_earthquake_state').GetCityHubName]의 속국을 도와야 한다!"
 japan_earthquakes.2.b: "재건할 능력이 있는 자들에게 부가 흘러가야 한다."
 earthquake_vassal_support: "속국 지지"
 earthquake_rebuilding_focus: "지진 후 재건 중"
 earthquake_rebuilding_redistribution: "천하 개벽"
 japan_earthquakes.3.t: "미노오와리 지진"
 japan_earthquakes.3.d: "대지진이 [ROOT.GetCountry.GetName]의 심장부를 강타해, 수천 명의 사람이 죽고 땅 전역에 몹시 큰 단층 균열이 생겼다."
 japan_earthquakes.3.f: "\"인간은 언제나 재해를 범죄로 인식하고 반응하기 마련이다. '누가' 저질렀는지를 묻곤 하며, 이 때문에 신화 속 괴물과 요괴들이 지진의 배후라는 믿음이 생겨난다.\n\n현대의 지진학자라면 미신을 배척해야 한다. 그러나 가끔은 모순되게도 범죄 현장을 조사하는 경찰 형사가 된 것 같은 느낌이 들 때도 있다. 뭐가 떨어졌으며, 어떻게 떨어진 걸까? 이 모든 의문은 결국 '누구'보다는 '어떻게'와 '왜'의 문제로 귀결된다.\""
 japan_earthquakes.3.a: "외국 학자들을 초청해 이 단층을 연구하게 한다."
 japan_earthquakes.3.b: "이 지식을 활용해 더 기상학적인 관측소를 설립한다."
 japan_earthquakes.3.c: "여진이 발생할 수 있으니 대비한다."
 meteorological_observatories: "기상학적 관측소"
 meteorological_observatories_cost: "$meteorological_observatories$"
 earthquake_bracing_for_aftershocks: "여진 대비 중"
 japan_earthquakes.4.t: "산리쿠 지진"
 japan_earthquakes.4.d: "산리쿠 해안 밖에서 지진이 발생해, 그 여파로 거대한 해일이 [SCOPE.sState('japan_earthquake_state').GetName](을)를 덮쳤다. 해일이 끼친 파괴적인 영향 속에서 지진 해일의 발생을 경고하는 기념비를 세우자는 의견이 나왔다."
 japan_earthquakes.4.f: "\"사망자를 위한 기념비를 세우는 것만으로는 부족합니다. 생존자도 자신이 겪었던 재앙을 다시 상기시키는 기념비를 원하지는 않을 겁니다. 누군가 이 비석에 담긴 내용을 읽으면, 조상이 잊혀서는 안 되는 무언가에 대해 이야기하고 있다는 것을 알 수 있어야 합니다. 이건 아직 태어나지 않은 자들을 위한 기념비입니다.\""
 japan_earthquakes.4.a: "[SCOPE.sState('japan_earthquake_state').GetName]에는 그런 기념비가 필요하지."
 japan_earthquakes.4.b: "지진 해일이 닥치면 그 기념비를 지어라!"
 japan_earthquakes.4.c: "지금 여기에 노력을 집중해야 한다."
 tsunami_stones: "지진 해일 기념석"
 tsunami_relief_efforts: "지진 해일 구호 활동"
 japan_earthquakes.5.t: "간토 대지진"
 japan_earthquakes.5.d: "생전 유례없는 대지진이 [SCOPE.sState('japan_earthquake_state').GetCityHubName] 근방을 강타했다. 이 참사는 불과 몇 분 만에 도시의 대부분을 휩쓸고 수십만 명의 목숨을 앗아갔다."
 japan_earthquakes.5.f: "지진을 따라 몰려왔던 물의 벽도 크나큰 위협이었으나, 화재에 비하면 아무것도 아니었다. 곧 도시 전체가 불타기 시작했을 뿐 아니라, 땅과 바람에도 불이 붙은 듯했다.\n\n불타는 건물에서 겨우 빠져나온 사람들은 불꽃의 격류에 갇혀 버렸다. 아무도 살아 나가지 못하게 하겠다는 화재의 의지가 느껴지는 듯했다. [SCOPE.sState('japan_earthquake_state').GetCityHubName](은)는 지옥 그 자체가 되었다."
 japan_earthquakes.5.a: "이 참사에 맞서려면 일본 국민이 단결해야만 한다!"
 japan_earthquakes.5.b: "물질적인 부를 무너뜨린 이번 일격은 퇴폐에 대한 경고이다."
 japan_earthquakes.5.c: "이를 기회로 삼아 [SCOPE.sState('japan_earthquake_state').GetCityHubName](을)를 더 현대적으로 재건해야 한다."
 earthquake_national_tragedy: "국가적 비극"
 earthquake_divine_punishment: "신성한 벌"
 earthquake_modernization: "현대화된 재건"
 earthquake_modernization_land_confiscation: "토지 재조정"
 shinbutsu_bunri_decision: "$je_shinbutsu_bunri$"
 shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$"
 elevate_buddhism_decision: "$je_elevate_buddhism$"
 elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$"
 je_shinbutsu_bunri: "신불분리"
 je_shinbutsu_bunri_reason: "천황이 권력을 되찾았으니, 황실의 혈통을 신성하게 여기는 토착 종교 전통을 분명히 하고 치켜세워야 합니다. 이를 위해서는 불교라는 외국의 영향과 분리해야 하는데, 불교는 수백 년 동안 혼합된 전통 속에서 토착 신에 대한 숭상과 떼어낼 수 없는 사이로 연결되어 있었습니다. 불교 기관은 막부와의 유착으로 불만을 얻고 있으니, 이 점을 활용한다면 신토를 더 높은 원칙으로 채택할 수 있을지도 모릅니다."
 je_taikyo_proclamation_button: "대교선포"
 je_taikyo_proclamation_button_desc: "신토와 토착 신 숭상, 천황 숭배를 국가의 원칙으로 삼는다"
 je_taikyo_proclamation_conversion_tt: "각 [concept_interest_group] 지도자는 #v 75%#! 확률로 [GetReligion('shinto').GetName](으)로 개종함"
 je_elevate_buddhism: "불교 승격"
 je_elevate_buddhism_reason: "$JAP$의 불교 기관은 막부의 행정 기관과 역사적으로 강력한 유대로 맺어져 있습니다. 막부의 종말을 막아낼 수 있었으니, 이러한 기관을 강화한다면 그 권력의 유지에 도움이 되며, 천황 숭배에 집중하지 않는 $JAP$의 종교적 전통을 확고히 할 수 있게 됩니다."
 je_elevate_buddhism_goal: "$je_communism_2_goal$"
 arahitogami: "아라히토가미"
 extended_danka_system: "확장된 단카 제도"
 japan_religion.1.t: "진구지"
 japan_religion.1.d: "신사의 사찰에서는 불교 승려가 신토의 의례와 함께 의식을 수행하곤 했다. 불교가 신토와 분리되며 이러한 승려들의 역할에 대한 의문이 제기되기 시작했다."
 japan_religion.1.f: "\"이 의식의 목적이 무엇인가? 신을 깨우침으로 이끌기 위함인가? 저들의 업보를 청산하기 위함인가? 이 말인즉슨, 신들은 숭배받는 존재가 아니라 인도가 필요한 길 잃은 존재라는 뜻 아닌가. 이러한 암시가 담긴 의식을 더는 용납해서는 안 된다!\""
 japan_religion.1.a: "승려를 개종해 신토 신관이 되게 한다."
 japan_religion.1.b: "승려의 지위를 박탈한다."
 japan_religion.1.c: "승려의 책무를 건드리지 않는다."
 forced_monk_conversions: "승려를 강제로 개종함"
 monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$"
 monks_stripped_of_titles: "승려가 작위를 박탈당함"
 monks_left_to_duties: "승려가 책무를 계속 수행함"
 japan_religion.1.a.tt: "[GetPopType('clergymen').GetName]의 [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%]가 [GetReligion('shinto').GetName](으)로 개종하게 됨"
 japan_religion.2.t: "본지수적"
 japan_religion.2.d: "일본에서 부처가 토착 신을 뜻하는 카미의 모습으로 구현되었다는 사실은 널리 알려져 있다. 이는 부처와 토착 신을 동일한 존재의 두 부분으로 간주하는 단어인 [concept_gongen]에도 반영되어 있다. 이러한 용어는 불교의 영향력을 더 강화하고 있다."
 japan_religion.2.f: "\"한때는 분명 말이 되는 얘기였을 것이다. 아마테라스는 태양이다. 대일여래, 즉 비로자나불도 태양이다. 하지만 태양은 나뉘지 않으며, 다른 빛의 반영이나 현신도 아니다. 태양은 홀로 빛나며 자신만의 힘을 지니고 있다. 그리고 오늘날의 [ROOT.GetCountry.GetNameNoFormatting]에는 단 하나의 태양만 떠오를 수 있다.\""
 japan_religion.2.a: "[concept_gongen] 개념을 금지한다."
 japan_religion.2.b: "하치만을 [concept_boddhisattva]로 여기는 것을 금지한다."
 japan_religion.2.c: "용어 규제를 삼가도록 한다."
 banned_syncretic_terminology: "금지된 혼합 용어"
 retained_syncretic_terminology: "유지된 혼합 용어"
 japan_religion.2.a.tt: "[GetPopType('farmers').GetName]의 [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%]가 [GetReligion('shinto').GetName](으)로 개종하게 됨"
 japan_religion.2.b.tt: "[GetPopType('soldiers').GetName]의 [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%]가 [GetReligion('shinto').GetName](으)로 개종하게 됨"
 japan_religion.3.t: "그대를 위해 울리네"
 japan_religion.3.d: "불교의 영향력을 축출하려는 시도로 인해 전반적인 반불교 정서가 형성되었다. 사찰의 재산은 압류되고 훼손되었으며, 일부는 완전히 파괴되었다. 또한 불교를 나타내는 상징이 제거되기도 했다."
 japan_religion.3.f: "신사에 다가가던 그는 걸음을 멈추었다. 출입구 밖을 지키던 강력한 불교 조각상인 인왕 두 개가 사라졌다. 그 자리에는 아무것도 남아 있지 않았다.\n\n안으로 들어가면서 이런 느낌이 들었다. 신사가 아무리 순수한 곳이더라도, 이제 다시는 예전처럼 안전하게 느껴지지 않을 것 같았다. 아무도 지키지 않는 문이라니."
 japan_religion.3.a: "사찰의 종을 녹여 대포를 만들어라!"
 japan_religion.3.b: "사찰에서 불상을 파괴하거나 제거해라."
 japan_religion.3.c: "사찰은 건드리지 않는다."
 smelted_temple_bells: "녹인 사찰 종"
 smelted_temple_bells_opinion: "$smelted_temple_bells$"
 removed_buddha_statues: "제거된 불상"
 removed_buddha_statues_opinion: "$removed_buddha_statues$"
 retained_buddhist_iconography: "유지된 불교 상징"
 japan_religion.4.t: "신토사무국"
 japan_religion.4.d: "신토 의례를 표준화하고, 국가의 신을 지역 의식에 포함하려는 노력에 지역 승려와 신사의 신관들이 반발했다. 이들은 이러한 가르침이 전통을 무너뜨린다고 여기고 있다."
 japan_religion.4.f: "\"신토는 단순히 국가 전역의 신사에서 외부의 영향으로 혼란스럽게 오염된 기존의 의례와 관습을 지속하는 것에 그치지 않는다. [ROOT.GetCountry.GetNameNoFormatting] 전역에서 황실의 전통과 천상의 후손에 관한 내용을 가르쳐, 신토를 순수한 형태로 되돌려야 한다.\""
 japan_religion.4.a: "국가의 해석을 적용한다."
 japan_religion.4.b: "현지 의식에 무엇이 적합한지는 현지 신관이 가장 잘 알 것이다."
 standardized_priest_training: "표준화된 신관 훈련"
 standardized_priest_training_opinion: "$standardized_priest_training$"
 deferred_to_local_priests: "현지 신관에 위임됨"
 deferred_to_local_priests_opinion: "$deferred_to_local_priests$"
 japan_religion.5.t: "유교와 신토"
 japan_religion.5.d: "불교와 신토를 분리하는 과정에서 유교 사상의 역할에도 의문이 제기되었다. 많은 학자가 철학을 신토와 양립시킬 수 있다고 생각하는 한편, 유교 역시 또 다른 외국의 영향일 뿐이라고 일축하는 의견도 있다."
 japan_religion.5.f: "\"유교는 불교와 비슷한 경로를 통해 유입되었을지 모르나, 이 철학과 토착 신에 대한 숭상 사이에는 모순이랄 것이 없다. 둘은 오히려 서로를 강화하며 천상과 지상, 통치자와 신하에 관해서도 같은 원칙을 아우르고 있다.\""
 japan_religion.5.a: "유교는 신토를 보완하는 중요한 요소다."
 japan_religion.5.b: "신토를 고대의 전통으로 되돌려야 한다."
 fukko_shinto: "복고신토"
 japan_religion.6.t: "개방된 국가의 기독교"
 japan_religion.6.d: "[ROOT.GetCountry.GetName](이)가 외국인에게 개방되었으나, 종교는 아직 규제되고 있다. 기독교 국가는 자신의 신앙을 자유롭게 받아들이는 것이야말로 상품 수입만큼 중요한 일이라 여길지도 모른다."
 japan_religion.6.f: "\"기독교는 신자들의 죽음을 사랑하며, 무엇보다도 신앙을 위한 죽음을 사랑한다. 십자가형에 처하거나 화형당한 모든 선교사는 십자가에 매달린 남자로 시작하는 이야기의 다음 장을 만들어낸다. 이제 이들을 순교자로 만드는 일도 그만둬야 할 때가 온 것 아닐까?\""
 japan_religion.6.a: "선교사들의 신앙 설교를 허용해야 한다."
 japan_religion.6.b: "교리를 실천할 수는 있으나, 널리 전파해서는 안 된다."
 japan_religion.6.c: "기독교는 외국의 위협이었으며, 앞으로도 그러할 것이다."
 permitted_christianity: "기독교 허용"
 christianity_disallowed: "기독교 불허"
 japan_religion.7.t: "사상의 계보"
 japan_religion.7.d: "[ROOT.GetCountry.GetName]에는 오랫동안 전통적으로 여러 불교 종파가 존재해 왔으며, 많은 종파가 오늘날까지도 영향력을 발휘한다. [SCOPE.gsInterestGroup('devout_ig').GetName]이 정치적 권력을 획득하기 시작하면서, 그중 한 학파가 두각을 드러내고 있다."
 japan_religion.7.f: "\"[ROOT.GetCountry.GetNameNoFormatting]에서는 수 세기에 걸쳐 새로운 불교 종파가 나타나고 있다. 한 종파가 다른 종파를 근절해야 할 이유는 없다. 그러나 지금은 지도력과 정치적 방향이 필요한 시점이므로, 다른 종파보다 이러한 권력을 더 많이 보유하는 종파가 생길 수도 있다.\""
 japan_religion.7.a: "정토종이다."
 japan_religion.7.b: "선종이다."
 japan_religion.7.c: "일련정종이다."
 japan_religion.7.e: "진언종이다."
 pure_land_buddhism: "정토종"
 zen_buddhism: "선종"
 shingon_buddhism: "진언종"
 japan_religion.8.t: "부처의 말"
 japan_religion.8.d: "[ROOT.GetCountry.GetName](이)가 전 세계에 개방되면서, 불교학자들이 외국의 문헌을 더 많이 번역해 외국의 사상을 현대 불교에 접목하는 데 관심을 보인다."
 japan_religion.8.f: "\"고립을 통해 발전한 정설에 저지되어서는 안 되며, 뜻밖의 곳에서 진리를 발견하는 일을 두려워해서는 안 된다. 부처의 가르침은 기나긴 여정 끝에 우리를 찾아왔다. 이 가르침이 어디를 지나갔으며, 어디로 가게 될 것인지를 탐구한다면 더 큰 통찰을 얻을 수 있다.\""
 japan_religion.8.a: "산스크리트와 팔리 문헌이 불교의 뿌리다."
 japan_religion.8.b: "중국 문헌이 우리 사상과 종파에 가장 가깝다."
 japan_religion.8.c: "비교 연구를 위해 유럽 철학을 공부한다."
 japan_religion.9.t: "승병"
 japan_religion.9.d: "현재 진행 중인 전쟁으로 인해 [SCOPE.gsInterestGroup('devout_ig').GetName] 사이에서 논쟁이 벌어졌다. 폭력을 수반하는 갈등이 생겼을 때, 불교에서는 어떤 역할로 국가를 뒷받침할 수 있는지에 대해서였다."
 japan_religion.9.f: "\"옛 승려들은 망설임 없이 나서서 사찰을 지켰다. 우리가 나라를 지키는 데 망설여야만 하는가? 생명을 가볍게 여겨서는 안 된다. 그렇다면 [ROOT.GetCountry.GetAdjective] 또한 구하는 생명보다 앗아가는 생명이 더 많고, 더 오랜 평화를 가져다주지도 못하는 전쟁을 감행하는 것이 옳은가?\""
 japan_religion.9.a: "무력은 평화의 지속을 위해 꼭 필요한 수단이다."
 japan_religion.9.b: "비폭력이 가장 중요하다."
 war_buddhism: "전시 불교"
 peaceful_buddhism: "평화로운 불교"
 japan_religion.10.t: "요쇼쿠"
 japan_religion.10.d: "쇄국이 끝난 이후, 외국인을 맞이하기 위해 항구 도시에서 육류 중심의 식당이 점점 늘어나고 있다. 이는 [ROOT.GetCountry.GetName]에서 유지되어 온 육식 금지 풍조에 의문을 일으켰다."
 japan_religion.10.f: "\"실례합니다만, 소고기라는 건 정말로 아주 맛있는 음식이지 않습니까? 그 맛에 익숙해지고 나면 사슴이나 멧돼지고기로는 다시 돌아갈 수가 없습니다. 어째서 우리 일본에서는 이런 깨끗한 음식을 지금껏 먹지 않았던 걸까요?\"\n\n—가나가키 로분, #italic 아구라나베 #!"
 japan_religion.10.a: "영양과 식문화 발전을 위해 이 풍조를 없애야 한다!"
 japan_religion.10.b: "이 야만적인 관습이 자리 잡도록 두지는 않겠다!"
 maintained_meat_ban: "육식 금지 유지"
 maintained_meat_ban_opinion: "$maintained_meat_ban$"
 japan_religion.11.t: "카미의 길"
 japan_religion.11.d: "신토와 불교 의식의 분리는 성공을 거두었다. 구 종교 기관의 영향력이 쇠퇴하고, 신들과 천황, 그리고 [ROOT.GetCountry.GetName]에 대한 헌신의 새 시대가 열리고 있다."
 japan_religion.11.f: "\"[ROOT.GetCountry.GetNameNoFormatting]에는 많은 신앙과 의식이 공존합니다. 오래된 것도 있고, 새로운 것도 있습니다. 우리의 목표는 어떤 것을 억압하고 다른 것을 선호하는 것이 아니었습니다. 소중히 간직된 믿음과 부정할 수 없는 진실 사이에 선을 긋는 것이었습니다.\""
 japan_religion.11.a: "신성은 절대적이다."
 japan_religion.12.t: "중도"
 japan_religion.12.d: "[ROOT.GetCountry.GetName]에서 격동적인 변혁의 시기를 헤쳐 나온 후, [SCOPE.gsInterestGroup('devout_ig').GetName](은)는 국가의 종교적 권위로서 위치를 재확립하고 [ROOT.GetCountry.GetGovernment.GetName](와)과의 유대를 강화하는 데 성공했다."
 japan_religion.12.f: "\"사람들은 신들의 길, 즉 신토에 대해 이야기한다.\n그런 길이 있다면, 그것은 사람이 걸을 길이 아니다.\n오직 신들만이 신들의 거룩한 길을 걸을 수 있다.\"\n—하구라 도만" # Arthur Lloyd, Poems by Buddhist Priests of Japan
 japan_religion.12.a: "길은 명확하다."
 japan_religion.13.t: "$je_taikyo_proclamation_button$"
 japan_religion.13.d: "대교선포를 통해 카미에 대한 숭배와 신성한 천황에 대한 경외를 [ROOT.GetCountry.GetAdjective] 국가의 원칙과 시민의 의무로 선언했다."
 japan_religion.13.f: "\"카미를 공경하고 나라를 사랑하는 것은 불가분의 관계다. 그것이 첫 번째 조칙, '경신애국'이다.\n\n천리와 인도는 불가분의 관계다. 그것이 두 번째 조칙, '천리인도'다.\n\n천황을 공경하고 조정의 뜻에 복종하는 것은 불가분의 관계다. 그것이 세 번째 조칙, '봉대황상 준수조지'다.\""
 japan_religion.13.a: "이 가르침이 전국에 널리 퍼져야 한다!"
 concept_gongen: "곤겐"
 concept_gongen_desc: "카미로 현현한 부처로, 토착 신과 불교적 깨달음을 가져다주는 존재를 하나로 연결한 개념입니다."
 concept_boddhisattva: "보살"
 concept_boddhisattva_desc: "불교에서 다른 이들이 열반에 이를 수 있도록 돕는, 깨달은 존재이자 스승입니다."
