l_korean:
 je_sakoku: "쇄국"
 je_sakoku_reason: "간에이 시대와 도쿠가와 정권의 초기 시절부터 $JAP$은 외세에 굳게 닫힌 나라였습니다. 허용된 교류라고는 지정된 항구 몇 곳에서 선택받은 몇 나라와 진행하는 약간의 무역이 전부였습니다. 이러한 체계는 2백 년 넘게 지속되어 왔으나, 세계가 변하기 시작하며 나라의 문을 계속 닫아걸 수만은 없는 상황이 왔습니다. 비록 $JAP$ 내의 이해관계는 상황이 앞으로도 계속 그대로 유지되기를 바라고 있다고 해도 말입니다. 우리의 땅으로 향하는 문을 열려고 시도하는 외세를 막을 수 없다면, 저들의 사상은 물론 상품 또한 수입해야만 합니다."
 je_sakoku_meiji_restoration: "#b 천황#!이 권력을 되찾았으며 #b 쇼군#!이 전복당함"
 je_sakoku_stop_being_closed_button: "[GetLawType('law_sakoku').GetName] 철회"
 je_sakoku_stop_being_closed_button_desc: "상황이 빠르게 치닫고 있으며, 해외의 압력 또한 증가하여 [GetLawType('law_sakoku').GetName]의 끝이 명백하게 코앞으로 다가왔다. 이런 시국에서 강제로 옛 고립 체계를 끝낼 수도 있지만, 그러면 아직도 옛 법을 지지하고 있는 모든 이가 격분할 것이다."
 notification_morrison_incident_has_incidented_name: "$JAP$의 포격을 받은 상인"
 notification_morrison_incident_has_incidented_desc: "우리 땅의 어느 모험심 넘치는 상인이 $JAP_ADJ$의 외국 무역선 규제를 위반하려고 시도하다 해안에서 포격받았으며, 두 나라 사이의 관계가 악화했다."
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners: "유연한 외국인 대처"
 caved_to_foreign_pressure_opposition: "외국 압력에 굴복함"
 caved_to_foreign_pressure_government: "외국 압력에 굴복함"
 overdue_break_with_tradition: "늦은 전통 탈피"
 forced_transition_from_tradition: "전통을 벗어난 강제 전환"
 the_picked_lock_modifier: "열린 자물쇠"
 sakoku_entrenched_modifier: "견고한 쇄국"
 meiji_failure_modifier: "실패한 유신 개혁"
 ep2_sakoku.1.t: "충격적인 [SCOPE.sCountry('opium_wars_loser').GetAdjectiveNoFormatting] 패배"
 ep2_sakoku.1.d: "방대하며 덕망 있는 이웃이었던 [SCOPE.sCountry('opium_wars_loser').GetName](이)가 해외의 신흥 국가를 상대로 한 아편 및 무역 전쟁에서 패배했다. [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting](이)가 자기 시장을 장악하지 못하며 외국인들도 내쫓지 못한다면, 우리도 대체 어떻게 우리 땅의 [GetLawType('law_sakoku').GetName]을 이어갈 수 있겠는가?"
 ep2_sakoku.1.f: "\"그들이 가진 모든 땅과 부, 권력 중 어떤 것도 그들에게 맞선 힘에는 비교할 수가 없었습니다. 외국인들이 이미 우리나라에 들어오게 해 달라고 간청하고 있습니다. 우리도 [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting]의 선례를 따르고, [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting]처럼 저들의 대포가 우리의 도시를 향해 불을 뿜을 때까지 그저 막아내기만 해야 합니까? 아니면 우리의 길을 스스로 찾아야 할까요? 당장 결정해야 합니다. 그러지 않으면 저들의 철과 대포로 무장한 병력이 우리의 바다로 들어와 대신 결정을 내릴 겁니다.\""
 ep2_sakoku.1.a: "이제 상상조차 할 수 없던 방안을 고려해야 한다."
 ep2_sakoku.1.b: "이제 상상조차 할 수 없던 방안을 수용해야 한다."
 end_sakoku_button_now_available: "이제 $je_sakoku$에서 [GetLawType('law_sakoku').GetName]을 강제로 일찍 종료하는 선택지가 표시됩니다."
 ep2_sakoku.2.t: "자물쇠 따기"
 ep2_sakoku.2.d: "안팎으로 소란이 치솟는 상황에서, [GetLawType('law_bakufu').GetName]는 [GetLawType('law_sakoku').GetName]의 즉각적인 종료를 밀어붙이기로 했다."
 ep2_sakoku.2.f: "상인들이 몰려들어 세관을 가득 채웠다. 곤란해하는 관료가 홀로 이들을 맞이하고 있었다. \"네, 당연히 국가는 더 이상 쇄국을 유지하지 않겠다는 소립니다.\"\n\n관리자를 향해 군중의 수많은 질문이 포효하듯 밀려들었다. \"그러면 뭐가 되냐고요? 저... 저도 잘 모르겠습니다. 아마 이제... 아니, 잠깐만요. 그러니까 이건... 이번 결정은 저나 여러분이 내릴 수 있는 게 아닙니다, 이렇게 그냥 막 하시면...\"\n\n대답할 때마다 더 많은 질문이 생겨났다. 관료는 생각했다. #italic 나라가 그냥 외톨이였을 때는 일이 훨씬 더 쉬웠는데 말이지.#!"
 ep2_sakoku.2.a: "[ROOT.GetCountry.GetNameNoFormatting]의 미래는 [GetLawType('law_mercantilism').GetName]에 있다."
 ep2_sakoku.2.b: "[GetLawType('law_free_trade').GetName]이 [ROOT.GetCountry.GetNameNoFormatting](을)를 자유롭게 하리라."
 ep2_sakoku.2.c: "[GetLawType('law_protectionism').GetName]가 있다면 외국의 이해를 살피며 신중하게 거래할 수 있다."
 ep2_sakoku.3.t: "[SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting] 사건"
 ep2_sakoku.3.d: "[SCOPE.sCountry('morrison_incident_country').GetName]에서 온 상인이 엄격한 [GetLawType('law_sakoku').GetName] 규정을 위반하고, 허가받지 않은 항구에서 무역을 시도했다. 이 상인의 선박인 #italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#!(은)는 해안 포대의 포격을 받고 쫓겨났다. 덕분에 [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting](와)과의 관계도 악화했다."
 ep2_sakoku.3.f: "대포알이 마침내 배를 맞히자 지휘관은 미소를 지었다. 법은 엄격했다. 저 선박은 이 바다에서 항해할 권리가 없었다. 지휘관은 배의 선장이 무어라 생각하고 있는지는 관심 없었다. 그저 이 선박이 뱃머리를 돌려 떠나기만을 바랄 뿐이었다."
 ep2_sakoku.3.a: "현지 주둔군은 해야 할 일을 한 거다."
 ep2_sakoku.3.b: "[SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting]에 사과하고 상인에게 보상해 상황을 원만하게 수습한다."
 ep2_sakoku.3.c: "이는 [GetLawType('law_sakoku').GetName]의 필요성을 검토해 볼 기회다."
 ep2_sakoku.4.t: "열린 자물쇠"
 ep2_sakoku.4.d: "안팎으로 가해지는 압력을 살피던 끝에, [GetLawType('law_sakoku').GetName]이 번복되었다. [ROOT.GetCountry.GetNameNoFormatting]의 앞에 새로운 미래가 열리게 되었다."
 ep2_sakoku.4.f: "관료는 만 너머를 바라보았다. 선창에 새로운 배들이 정박해 있었다. 한 번도 본 적 없는 깃발을 휘날리는 낯선 선박이었다. 저들은 [ROOT.GetCountry.GetNameNoFormatting]에 무얼 주었을까? 또 [ROOT.GetCountry.GetNameNoFormatting]에서 무엇을 가져가려고 할까?\n\n관료는 정박한 선박을 한참 동안 바라보다 마침내 몸을 돌렸다. 아무리 바라봐도 질문에 대한 답은 나오지 않을 것이다. 적어도 오늘은 그랬다. 이 새로운 시대가 그의 본토에 무엇을 가져다줄지는 오직 시간만이 알 일이었다."
 ep2_sakoku.4.a: "오늘 일본을 개방한다!"
 ep2_sakoku.5.t: "녹슨 빗장"
 ep2_sakoku.5.d: "국가가 큰 정치적 변동에 흔들리는 와중에도 [ROOT.GetCountry.GetNameNoFormatting]에서는 [GetLawType('law_sakoku').GetName]을 계속 준수하고 있다. 이는 국가가 자진 고립 상태를 벗어날 희망을 꺼뜨리는 좋지 못한 상황이다. 아무래도 [GetLawType('law_sakoku').GetNameNoFormatting]이 계속 유지될 모양이다."
 ep2_sakoku.5.f: "관료는 만 너머를 바라보았다. 선창에 오래된 배들이 정박해 있었다. 그의 아버지, 할아버지, 몇 세대 전의 조상들이 보던 것과 같은 선박이었다. 그의 자식들, 손자들도 똑같은 선박을 보게 될까? 이 풍경이 바뀔 날은 올 것인가?\n\n관료는 정박한 선박을 한참 동안 바라보다 마침내 몸을 돌렸다. 아무리 바라봐도 질문에 대한 답은 나오지 않을 것이다. 적어도 오늘은 그랬다. 그의 본토가 정말 영원히 그대로 남게 될지는 오직 시간만이 알 일이었다."
 ep2_sakoku.5.a: "자물쇠는 계속 잠겨 있을 것이다."
 meiji.14.t: "공허한 유신"
 meiji.14.d: "새로운 [ROOT.GetCountry.GetCustom('JAP_era_name')] 정부가 개혁을 옹호하며 의기양양하게 약속했지만, [ROOT.GetCountry.GetNameNoFlag](은)는 큰 변화를 겪지 않았다. 비평가들은 오늘날의 국가가 유신 전의 상태와 거의 다르지 않다며 한탄했다."
 meiji.14.f: "공장에서 거대한 엔진이 성을 내며 칙칙 소리와 함께 돌아갔다. 커다란 플라이휠이 돌아가고, 엄청난 크기의 선반과 드릴에 동력이 공급되었다. 이 기계들이 새로운 무기고를 위한 새 총열과 잠금쇠, 방아쇠를 만들어내고 있었다. 국가라면 이 증기와 철을 활용해 세계에 자신의 족적을 남겨야 하는 법. 다만 그 국가는 [ROOT.GetCountry.GetNameNoFormatting](이)가 아닐 것이다."
 meiji.14.a: "오늘, 태양은 꿈에 머무른다."
 je_end_edo_system_button_name: "에도 지위 체계 종료"
 je_end_edo_system_button_desc: "이 개혁과 쇄신의 시대에서 옛 계급 제도는 우리의 발목을 잡을 뿐이다. 모든 시민은 삶에서 차지하던 지위에 상관없이 국가의 귀중한 일원이 될 것이다."
 edo_system_not_support_enforcement_tt: "[GetLawType('law_intermediate_edo_system').GetName] 또는 [GetLawType('law_strict_edo_system').GetName] 제정을 지지하지 않음"
 edo_system_ends_tt: "[ROOT.GetCountry.GetNameNoFlag](이)가 [Concept('concept_social_hierarchy','$edo_system$')]를 완전히 철폐함"
 notification_edo_system_disappears_name: "에도 체계 붕괴"
 notification_edo_system_disappears_desc: "최근의 문화적 및 사회적 변화로 인해, 에도 체계는 더 이상 [SCOPE.sCountry('relevant_country_scope').GetName]에서 [concept_social_hierarchy]으로 인정받지 못하고 있다."
 notification_edo_system_disappears_tooltip: "#header $notification_edo_system_disappears_name$#!\n$TOOLTIP_DELIMITER$\n$notification_edo_system_disappears_desc$"
 je_meiji_army_barracks_condition: "모든 [ROOT.GetCountry.GetAdjectiveNoFlag] [GetBuildingType('building_barrack').GetName]:\n$EFFECT_LIST_BULLET$ #yellow $pm_no_organization$#! 또는 #yellow $pm_samurai_training$#!을 활성화하지 #bold 않음#!"
