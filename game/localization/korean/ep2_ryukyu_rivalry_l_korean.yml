 ryukyu_rivalry_medium_influence_gain_self_tt: "[ROOT.GetCountry.GetName](이)가 #v 5년#! 동안 #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 환심#!#!을 매달 #green 3#!만큼 획득함"
