 modifier_ryukyu_rivalry_secured_neutrality: "확보된 중립"
 modifier_ryukyu_rivalry_southern_secured: "남부 접근 확보"
 modifier_ryukyu_rivalry_scholars_pleased: "조공국 명령 옹호"
 modifier_ryukyu_rivalry_honor_kikoeogimi: "의식으로 얽힌 관계"
 modifier_ryukyu_rivalry_diplomatic_appeasement: "외교 유화"
 modifier_ryukyu_rivalry_armed_forces_discontent: "방관에 대한 우려"
 # Events
 ryukyu_rivalry.1.t: "조공국 논의"
 ryukyu_rivalry.1.d: "[SCOPE.sCountry('ryukyu_scope').GetName](이)가 특히 [ROOT.GetCountry.GetName]에 호의를 보인다. 이에 [SCOPE.sCountry('rival_scope').GetName](은)는 외교 노력에 박차를 가해 존중의 징표를 보내며, 한편으로는 조용히 [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]의 조공국 관계가 지닌 의무를 강화하고 있다."
 ryukyu_rivalry.1.f: "잠긴 상자들이 류큐의 전당에 조심스럽게 놓였다. 서신이 큰 소리로 읽어지는 동안, 병풍 뒤에서 궁정 신하들이 소곤거렸다. 한 서신은 중국의 붉은 인장이 찍혀 있었고, 다른 서신에는 일본의 섬세한 글씨가 있었다. 두 강대국이 왕국을 자신 쪽으로 끌어들이려 하는 가운데, 모든 문장에 의무와 약속이 담겨 있었다."
 ryukyu_rivalry.1.a: "[SCOPE.sCountry('rival_scope').GetName]에 정식으로 항의한다."
 ryukyu_rivalry.1.b: "[SCOPE.sCountry('ryukyu_scope').GetName]에서 우리가 이미 수립한 유대를 이용한다."
 ryukyu_rivalry.1.c: "궁정에 우리의 유서 깊은 후원을 상기시킨다."
 ryukyu_rivalry.1.e: "개입할 만한 사안이 아니다."
 ryukyu_rivalry.1.tt1: "[SCOPE.sCountry('ryukyu_scope').GetName](이)가 [ROOT.GetCountry.GetName]의 종속국이며 [concept_liberty_desire]이 #v 25#!보다 낮음"
 ryukyu_rivalry.1.tt2: "[SCOPE.sCountry('ryukyu_scope').GetName](이)가 [ROOT.GetCountry.GetName]의 종속국이 아니며 #v 친밀함#! 이상의 [concept_relations]를 보유함"
 ryukyu_rivalry.1.tt3: "[ROOT.GetCountry.GetName](이)가 [SCOPE.sCountry('ryukyu_scope').GetCapital.GetName]에 [Concept('concept_building','$concept_buildings$')]을 3개 이상 보유함"
 ryukyu_rivalry.2.t: "항구의 경쟁 구도"
 ryukyu_rivalry.2.d: "[SCOPE.sCountry('ryukyu_scope').GetName]의 항구에 있는 [SCOPE.sCountry('rival_scope').GetAdjective] 특사의 존재로 인해 수많은 [GetCulture('ryukyuan').GetName] 상인의 관심과 협력이 몰렸다. 궁정에서도 이들 특사의 굳건해진 입지를 주목하고 있다. 반면 우리가 사 두었던 환심은 줄어들고 있다."
 ryukyu_rivalry.2.f: "상인의 장부가 닫혔다가 다른 인장 아래에서 다시 열렸다. 한때 우리의 확언을 구하던 자들은 이제 다른 접견실로 가서 머물며 변경된 관세와 더 안전한 길을 이야기하고 있다. 돈이 더 설득력 있는 다른 관리인을 찾아낸 모양이었다."
 ryukyu_rivalry.2.a: "비열한 행위다."
 ryukyu_rivalry.3.t: "[SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]의 장군 방문"
 ryukyu_rivalry.3.d: "[SCOPE.sCharacter('ryukyu_general_scope').GetFullName] 장군이 장교 수행단과 함께 [SCOPE.sCountry('ryukyu_scope').GetName]에 도착했다. 연안 방위를 사찰하러 온 듯했다. 존중과 복종이 이들을 환영했으며, 궁정에 미치는 [SCOPE.sCountry('rival_scope').GetName]의 영향력이 강화되는 한편 우리의 영향력은 미묘하게 약해졌다."
 ryukyu_rivalry.3.f: "장군이 [SCOPE.sCharacter('ryukyu_general_scope').GetHerHis] 장교들과 함께 성벽을 걸으며 모든 대포와 망루를 확인했다. 류큐 병사들은 이쪽을 평가하는 시선을 느끼며 대형을 이루었다. 모든 동작과 경례가 두 나라 사이에 이어진 보이지 않는 실을 단단히 이어줄 것이다."
 ryukyu_rivalry.3.a: "상황이 위험하게 치닫고 있군."
 ryukyu_rivalry_risk_of_confrontation: "@warning! [SCOPE.sCountry('china_scope').GetName](와)과 [SCOPE.sCountry('japan_scope').GetName]의 병력이 모두 연안 방위를 사찰한다면 #r 대립#!이 발발할 수 있음"
 ryukyu_rivalry.4.t: "장군 방문"
 ryukyu_rivalry.4.d: "[SCOPE.sCountry('from_scope').GetName]에서 온 [SCOPE.sCharacter('ryukyu_general_scope').GetFullName] 장군이 장교 수행단과 함께 [SCOPE.sCountry('ryukyu_scope').GetName]에 도착해, 우리의 연안 방위를 사찰하러 왔다. 존중과 복종이 이들을 환영했다."
 ryukyu_rivalry.4.f: "$ryukyu_rivalry.3.f$"
 ryukyu_rivalry.4.a: "이들을 유심히 주시한다."
 ryukyu_rivalry_officer_arrives: "[SCOPE.sCountry('from_scope').GetName]에서 온 [concept_general]을 이용할 수 있음"
 ryukyu_rivalry.5.t: "[SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]의 운명"
 ryukyu_rivalry.5.d_victor: "[SCOPE.sCountry('ryukyu_scope').GetName]에서 우리의 노력이 결실을 보았다. 한결같은 외교와 경제, 정치적 압박을 통해 이들의 궁정은 이제 우리의 인도를 따르며, 이들의 주권 또한 우리를 향해 굳어졌다."
 ryukyu_rivalry.5.d_loser: "우리의 노력에도 불구하고 [SCOPE.sCountry('victor_scope').GetName](이)가 [SCOPE.sCountry('ryukyu_scope').GetName]에서 결정적인 환심을 사고 말았다. 저들의 궁정은 새로운 정치적 현실을 받아들였으며, 열도는 [SCOPE.sCountry('victor_scope').GetNameNoFormatting]의 영역 안에 확고히 들어가게 되었다."
 ryukyu_rivalry.5.d_ryu: "우리가 유지하려 애쓴 균형을 이제 더는 유지할 수 없게 되었다. [SCOPE.sCountry('victor_scope').GetName]의 압박이 증가하는 가운데, 우리 궁정은 새로운 정치적 합의를 받아들였다. [SCOPE.sCountry('ryukyu_scope').GetName]의 미래는 이제 저들의 밑에서 풀려나갈 것이다."
 ryukyu_rivalry.5.f_annexed: "나하의 시장 광장에 선언문이 붙었다. 선언문에 찍힌 [SCOPE.sCountry('victor_scope').GetCapital.GetName]의 인장이 아직 마르기도 전이었다. [SCOPE.sCountry('ryukyu_scope').GetAdjectiveNoFormatting] 깃발들이 내려가고 대신 통치자의 군기가 올라갔다. 해가 질 때가 되자 행정 부처가 수립되며 새로운 포고령이 게시되었다."
 ryukyu_rivalry.5.f_subject: "나하의 시장 광장에 선언문이 붙었다. 선언문에 찍힌 [SCOPE.sCountry('victor_scope').GetCapital.GetNameNoFormatting]의 인장이 아직 마르기도 전이었다. 모든 칙령은 [SCOPE.sCountry('ryukyu_scope').GetName](이)가 나라에서 차지할 새로운 위치를 정의하게 된다. 오래도록 머나먼 궁정의 조공국이었던 이 왕국은 이제 정식으로 열강에 속해 그 의무를 따르게 되었다. 해가 질 때가 되자 나라의 행로가 정해졌다."
 ryukyu_rivalry_ryukyu_vassalise_tt: "[SCOPE.sCountry('ryukyu_scope').GetName](이)가 [SCOPE.sCountry('victor_scope').GetName]의 [concept_puppet]이 됨"
 ryukyu_rivalry_ryukyu_transfer_subject_tt: "[SCOPE.sCountry('ryukyu_scope').GetName](이)가 [concept_subject]으로서 [SCOPE.sCountry('victor_scope').GetName]에 이전됨"
 ryukyu_rivalry_ryukyu_annex_tt: "[SCOPE.sCountry('victor_scope').GetName](이)가 [SCOPE.sCountry('ryukyu_scope').GetName](을)를 합병하게 됨"
 ryukyu_rivalry.5.a: "그렇게 됐군."
 ryukyu_rivalry.6.t: "[SCOPE.sCountry('ryukyu_scope').GetCapital.GetNameNoFormatting] 내 대립"
 ryukyu_rivalry.6.d_brawl: "[SCOPE.sCountry('japan_scope').GetName](와)과 [SCOPE.sCountry('china_scope').GetName]에서 파견된 장교들이 [SCOPE.sCountry('ryukyu_scope').GetName]의 연안 방위를 사찰하다 주먹다짐을 벌였다. 다툼은 결국 사망자를 낳았으며, 류큐 궁정이 이 사건을 걱정스러운 눈길로 주시하고 있다."
 ryukyu_rivalry.6.d_accident: "연안 방위를 사찰하고자 보내진 [SCOPE.sCountry('japan_scope').GetName](와)과 [SCOPE.sCountry('china_scope').GetName]의 병력이 [SCOPE.sCountry('ryukyu_scope').GetName] 내의 같은 방어 시설에서 마주쳤다. 결국 주둔군 사이에 혼란이 발생하며 짧은 교전이 벌어졌다."
 ryukyu_rivalry.6.d_fire: "[SCOPE.sCountry('ryukyu_scope').GetName] 내 외국 사찰 임무를 위해 배정했던 숙소에서 화재가 발생해, [SCOPE.sCountry('japan_scope').GetAdjective](와)과 [SCOPE.sCountry('china_scope').GetAdjective]의 대표단이 머무는 구역을 집어삼켰다. 화재의 원인은 밝혀지지 않았으나, 현지 관료들은 등불을 잘못 둔 게 아니냐고 수군대고 있다."
 ryukyu_rivalry.6.f: "카이몬 장교가 망루와 창고 사이를 달리며 경비들에게 명령을 전달했다. 모든 명령은 빠르게 외쳐졌으며, 반박 속에 반복되었다. 마침내 고요한 순간이 돌아왔으나, 카이몬은 외국 세력 사이의 경쟁으로 드러난 류큐의 취약한 상황을 다시 상기할 수밖에 없었다."
 ryukyu_rivalry.6.a: "긴장이 치솟고 있다."
 ryukyu_rivalry_ryukyu_confrontation_tt1: "[SCOPE.sCountry('japan_scope').GetAdjective] 및 [SCOPE.sCountry('china_scope').GetAdjective]의 [concept_infamy]이 #v 6#!만큼 증가"
 ryukyu_rivalry.7.t: "류큐 칙령"
 ryukyu_rivalry.7.d_ryukyu: "수년간의 신중한 관찰과 미묘한 외교 끝에, 우리 의회는 외부의 간섭 없이 국정을 처리해 나가겠다는 의도를 공표했다. 궁정은 외세의 영향력에 확고한 제한을 두었고, 나라의 의례와 각료, 전통 의회가 우선이 됨을 명시했다. 왕국은 이제 자신만의 길을 나아가기로 했다."
 ryukyu_rivalry.7.d: "수년간의 신중한 관찰과 미묘한 외교 끝에 [SCOPE.sCountry('ryukyu_scope').GetName](이)가 우리의 영향력을 벗어나, 외부의 간섭 없이 국정을 처리해 나가겠다는 의도를 공표했다. 궁정은 우리의 주도권에 확고한 제한을 두었고, 왕국은 궁정의 의식과 관료들 및 전통 의회를 유지하며 우리의 권위를 벗어나 나아가기로 했다."
 ryukyu_rivalry.7.f: "슈리 성의 반짝이는 바닥에 인장과 조공 서류들이 찢긴 채 흩어져 있었다. 알현실에서는 외국 세력의 영향력을 여전히 느낄 수 있었으나, 이들은 더 이상 명령을 내리지 못했다. 류큐의 길은 인내심을 발휘하는 외교를 통해 쟁취한 섬세한 중립의 형태로 펼쳐져 나갈 것이다."
 ryukyu_rivalry.7.a: "충성의 문제가 일단락되었다."
 ryukyu_rivalry.7.b: "우리 쪽에서는 무력 사용이 가능하다."
 ryukyu_rivalry.8.t: "숨겨진 번"
 ryukyu_rivalry.8.d: "[SCOPE.sCountry('japan_scope').GetName](이)가 항구를 개방하며, 오래 잠들어 있던 [SCOPE.sCountry('ryukyu_scope').GetName]의 충성 문제가 다시 대두되었다. 왕국은 수 세기에 걸쳐 신중한 줄타기를 해 왔다. 겉으로는 [SCOPE.sCountry('china_scope').GetName]의 조공국이면서도, [SCOPE.sCountry('japan_scope').GetNameNoFormatting]에 대한 충성 또한 유지했다. 두 국가는 이제 왕국에 어떻게 영향력을 미쳐야 할지 고민해야만 한다."
 ryukyu_rivalry.8.f: "슈리 성의 복도를 따라 등불이 빛났다. 전성기의 중산국 왕들이 세웠던 주홍색 기둥에 빛이 드리웠다. 채색된 천장 아래, 서기들이 사쓰마 칙령 곁에 조공 서류를 놓았다. 궁정은 오랫동안 중국의 책봉과 가고시마의 그림자 사이에서 균형을 맞춰 왔다. 당분간은 평온이 이어지겠지만, 곧 충성에 대한 문제가 불거질 것이다."
 ryukyu_rivalry.8.a: "사안이 아직 해결되지 않았다."
