 je_ryukyu_rivalry_reaffirm_suzerainty_button_desc: "류큐 궁정이 우리의 경쟁 상대에게 호의를 보인다. 저들에게 우리 영토에 대한 의무를 상기시키고, 다시 우리의 영향력 아래로 끌어들여야 한다."
 ryukyu_rivalry_reaffirm_suzerainty_button_tt: "[ROOT.GetCountry.GetName](이)가 [SCOPE.sCountry('ryukyu_scope').GetName]에서 경쟁 상대보다 더 적은 #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 환심#!#!을 삼"
