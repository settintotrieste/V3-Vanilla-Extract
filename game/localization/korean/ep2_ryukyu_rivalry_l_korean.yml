 ryukyu_rivalry_large_influence_loss_japan_tt: "[SCOPE.sCountry('japan_scope').GetName](이)가 #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 환심#!#!을 #red 10#!만큼 상실함"
 ryukyu_rivalry_large_influence_loss_china_tt: "[SCOPE.sCountry('china_scope').GetName](이)가 #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 환심#!#!을 #red 10#!만큼 상실함"
 ryukyu_rivalry_send_general_tt: "[ROOT.GetCountry.GetName](이)가 [SCOPE.sCountry('ryukyu_scope').GetName]에 [concept_general]을 영구적으로 배치함"
 je_ryukyu_rivalry_sway_merchants_button: "무역 감독관 보내기"
 je_ryukyu_rivalry_sway_merchants_button_desc: "나하 항만을 감독하면 조정에 특사를 배치해 환심을 사며 외세의 무역과 조공을 좌우할 수 있다."
 ryukyu_rivalry_sway_merchants_button_tt: "[ROOT.GetCountry.GetName](이)가 [SCOPE.sCountry('ryukyu_scope').GetAdjective] [concept_capital_state]에 #v 2#!단계 이상의 [GetBuildingType('building_port').GetName] 보유"
 je_ryukyu_rivalry_inspect_defenses_button: "연안 방위 사찰"
 je_ryukyu_rivalry_inspect_defenses_button_desc: "군사 이용을 확보했으니 신뢰받는 장군을 보내 류큐의 방위 시설을 점검하고, 성벽과 망루가 우리의 관리를 따라 전략적 의도를 잘 반영하고 있는지 확인한다."
 ryukyu_rivalry_inspect_defenses_button_tt: "[ROOT.GetCountry.GetName](이)가 [SCOPE.sCountry('ryukyu_scope').GetName](와)과 #v 군사 이용#! [concept_treaty] 체결"
 je_ryukyu_rivalry_honor_kikoeogimi_button: "키코에오기미 공경"
 je_ryukyu_rivalry_honor_kikoeogimi_button_desc: "키코에오기미가 궁중 의식과 신성한 규율에서 지닌 권위는 류큐 의회에서 우리의 영향력에 힘을 실어줄 수 있으므로, 키코에오기미에게 경의를 표한다."
 # Modifiers
 modifier_ryukyu_rivalry_overreach: "과도한 종주권"
 modifier_ryukyu_rivalry_landowner_discontent: "류큐 경쟁 구도 우려"
 modifier_ryukyu_rivalry_merchant_influence_strain: "항구 영향력 부담"
 modifier_ryukyu_strained_diplomatic_corps: "강화된 외교 주도권"
