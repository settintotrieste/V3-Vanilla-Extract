l_korean:
 ## Interest Tier Types
 interest_tier_none: "없음"
 interest_tier_none_desc: "이 $concept_interest_tier_short$에서는 [concept_country]가 [concept_strategic_region]에 전혀 관여할 수 없거나 미미하게 관여할 수 있으며, 해당 $concept_country$나 $concept_strategic_region$에 아무런 효과를 발휘하지 않습니다."
 interest_tier_observant: "주시"
 interest_tier_observant_desc: "이 $concept_interest_tier_short$에서는 [concept_strategic_region]에 외교적인 존재감을 수립하기 위한 첫 단계가 이루어졌습니다. 해군 선박이 해안을 순찰하거나, [Concept('concept_local_country', '$concept_local_countries$')] 사이에 특사가 오갈 수 있습니다."
 interest_tier_engaged: "참여"
 interest_tier_engaged_desc: "이 $concept_interest_tier_short$에서는 [concept_country]가 현지 사안에 관여하기 시작하며, [Concept('concept_treaty', '$concept_treaties$')]을 체결하고 입지를 더 단단히 다져 나갑니다."
 interest_tier_influential: "유력"
 interest_tier_influential_desc: "이 $concept_interest_tier_short$에서는 [concept_strategic_region] 내 존재감이 완전히 수립되었으며, [Concept('concept_country', '$concept_countries$')]가 장기 거래를 체결하고 자신의 명분을 주장합니다.\n\n@information! 해당 $concept_strategic_region$ 내 [Concept('concept_capital_state', '$concept_capital_state_short$')]를 보유한 $concept_countries$는 절대 이 $concept_interest_tier_short$ 밑으로 내려가지 않습니다."
 interest_tier_pervasive: "확산"
 interest_tier_pervasive_desc: "이 $concept_interest_tier_short$에서는 [concept_country]가 [concept_strategic_region] 내에서 상당한 통제권을 지니고 있습니다. 힘이 통합되며 [Concept('concept_great_power', '$concept_great_powers$')] 및 [Concept('concept_local_country', '$concept_local_country_short$')]의 세력이 우위를 두고 싸웁니다."
 interest_tier_hegemonic: "패권"
 interest_tier_hegemonic_desc: "이 $concept_interest_tier_short$에서는 [concept_country]가 [concept_strategic_region]의 반박할 여지 없는 세력자로 확고히 자리매김합니다. 다른 국가가 #italic 존재한다면#! 해당 국가는 종속을 자처하거나, 패권국과 거래해 현지 사안에 간섭하지 않을 것임을 보장해야 합니다."
 ## Interface
 INTEREST_TIER_TYPE_BOUNDS_DESC: "[InterestTierType.GetLowerBound|v] - [InterestTierType.GetUpperBound|v] [concept_involvement] 구간에 적용"
 INTEREST_TIER_TYPE_NO_EFFECT: "#italic 효과 없음#!"
 INTEREST_TIER_ACTIVE: "[Country.GetName][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'YOU'))]의 #i #b 현재 등급#!#!"
 INTEREST_TIER_ACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#! $INTEREST_TIER_ACTIVE$\n$INTEREST_TIER_BOUNDS_DESC$\n[SelectLocalization(EqualTo_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_CURRENT_INVOLVEMENT_DESC', 'INTEREST_TIER_TARGET_INVOLVEMENT_DESC')]\n$TOOLTIP_DELIMITER$\n$INTEREST_TIER_EFFECTS_AND_BREAKDOWN$"
 INTEREST_TIER_INACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#!\n$INTEREST_TIER_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n#title 효과:#!#indent_newline:3 \n[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)]#!"
 INTEREST_TIER_EFFECTS_AND_BREAKDOWN: "#title 효과:#!#indent_newline:3 [ConcatIfNeitherEmpty('\n', InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', AddLocalizationIf(And(And3(StringIsEmpty(InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetStateModifier.GetDesc)), StringIsEmpty(InterestTierType.GetTradeAdvantageDesc)), 'INTEREST_TIER_NO_EFFECT'))]#!\n\n#title [concept_involvement]: #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!. 원인:#!#indent_newline:3 \n[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]#!\n $INTEREST_TIER_ACTIVE$: #i #b (현재 활성화)#!#!"
 INTEREST_TIER_PREDICTED: "#i #b (예상)#!#!"
 INTEREST_TIER_BOUNDS_DESC: "[InterestTierType.GetLowerBound|v0] - [InterestTierType.GetUpperBound|v0] [concept_involvement] 구간에 적용"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC: "[Country.GetName]에 대한 [concept_involvement] #v [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#!"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC: "[Country.GetName]에 대한 [concept_involvement] [AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetTargetInvolvementIn(StrategicRegion.Self), Country.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP')][AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN')]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC_PLAYER_CONTEXT: "우리가 현재 [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] #v [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! [concept_involvement]를 보유함"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC_PLAYER_CONTEXT: "우리가 현재 [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] [AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self), GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT')][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self), GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT')] [concept_involvement]를 보유함"
 INTEREST_TIER_TARGET_UP: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/주)"
 INTEREST_TIER_TARGET_DOWN: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/주)"
 INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/주)"
 INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/주)"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN_TITLE: "#title 대상 $concept_involvement$: #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!. 원인:#!"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN: "[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]"
 INTEREST_TIER_EFFECTS_TITLE: "#title 효과:#!"
 INTEREST_TIER_EFFECTS: "[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetDescription)]"
 INTEREST_TIER_NO_EFFECT: "#italic 효과 없음#!"
 INTEREST_TIER_TRADE_ADVANTAGE_EXPORTS_DESC: "현지 $concept_markets$에서 [Concept('concept_trade','$concept_exports$')] [concept_trade_advantage]: $VAL|0=+v$"
 INTEREST_TIER_TRADE_ADVANTAGE_IMPORTS_DESC: "현지 $concept_markets$에서 [Concept('concept_trade','$concept_imports$')] [concept_trade_advantage]: $VAL|0=+v$"
 INTEREST_TIER_ON_ACTIVATE_EFFECT: "#title 획득 시:#!"
 INTEREST_TIER_ON_DEACTIVATE_EFFECT: "#title 상실 시:#!"
 STRATEGIC_REGION_AI_STANCE_TT_HEADER: "[Country.GetNameNoFormatting](이)가 [StrategicRegion.GetName] 내에서 #b [Country.GetAIStrategicRegionStanceTypeIn(StrategicRegion.Self).GetNameNoFormatting]#! [Concept('concept_strategic_region_stance', '$concept_strategic_region_stance_short$')]을 취함. 사유:\n$TOOLTIP_DELIMITER$"
 ## Effects
 interest_tier_effect_establish_missions_decree: "@checkmark! [Concept('concept_unincorporated_state','$concept_unincorporated_states$')] 내 [GetDecreeType('decree_establish_missions').GetName] [concept_decree] 활성화"
 interest_tier_effect_colonization: "@checkmark! #yellow;tooltip:[GetPlayer.GetTooltipTag],establish_colony_tooltip $establish_colony$#! 지역 행동 활성화"
 interest_tier_effect_stake_colonial_claim: "@checkmark! [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')]에 대한 [GetDiplomaticActionType('da_stake_colonial_claim').GetName] [concept_diplomatic_action] 활성화"
 interest_tier_effect_colonial_claim_generation: "@checkmark! [concept_state_region]의 식민화가 [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_colonial_claim_generation_threshold')|v%0]에 도달하면 [concept_claim]을 생성하게 됨"
 interest_tier_effect_infamy_cost_increase_high: "이 [concept_strategic_region]의 [Concept('concept_war_goal', '$concept_war_goals$')]를 대상으로 [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_high_value')|=n%0] [concept_infamy] 소모"
 interest_tier_effect_infamy_cost_increase_medium: "이 [concept_strategic_region]의 [Concept('concept_war_goal', '$concept_war_goals$')]를 대상으로 [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_medium_value')|=n%0] [concept_infamy] 소모"
 interest_tier_effect_infamy_cost_decrease_medium: "이 [concept_strategic_region]의 [Concept('concept_war_goal', '$concept_war_goals$')]를 대상으로 [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_decrease_medium_value')|=p%0] [concept_infamy] 소모"
 interest_tier_effect_can_start_diplomatic_plays: "@checkmark! 이 [concept_strategic_region] 내 [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] 시작 허용"
 interest_tier_effect_can_join_diplomatic_plays: "@checkmark! 이 [concept_strategic_region] 내 [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')] 편들기 허용"
 interest_tier_effect_can_sign_alliance: "@checkmark! [GetArticleType('alliance').GetName] [Concept('concept_article', '$concept_treaties$')] 체결 허용"
 interest_tier_effect_can_sign_defensive_pact: "@checkmark! [GetArticleType('defensive_pact').GetName] [Concept('concept_article', '$concept_treaties$')] 체결 허용"
 interest_tier_effect_can_sign_support_independence: "@checkmark! [GetArticleType('support_independence').GetName] [Concept('concept_article', '$concept_treaties$')] 체결 허용"
 interest_tier_effect_can_sign_guarantee_independence: "@checkmark! [GetArticleType('guarantee_independence').GetName] [Concept('concept_article', '$concept_treaties$')] 체결 허용"
 interest_tier_effect_stake_colonial_claim_unrecognized: "@checkmark! [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')] 및 [Concept('concept_unrecognized_power', '$concept_unrecognized_powers$')]에 대한 [GetDiplomaticActionType('da_stake_colonial_claim').GetName] [concept_diplomatic_action] 활성화"
 interest_tier_effect_can_sign_foreign_investment_rights: "@checkmark! [GetArticleType('foreign_investment_rights').GetName] [Concept('concept_article', '$concept_treaties$')] 체결 허용"
 ## Diplomatic Actions
 da_stake_colonial_claim: "식민지 명분 주장"
 da_stake_colonial_claim_desc: "해외 [concept_state_region]에 대한 [concept_claim]을 주장합니다."
 da_stake_colonial_claim_action_notification_name: "[INITIATOR_COUNTRY.GetName](이)가 [TARGET_STATE.GetStateRegion.GetName]에 대한 식민지 [concept_claim|l]을 주장함"
 da_stake_colonial_claim_action_notification_desc: "[INITIATOR_COUNTRY.GetName](이)가 식민지 야망을 키워 나가며 [TARGET_STATE.GetStateRegion.GetName]에 대한 명분을 주장합니다!"
 DA_STAKE_COLONIAL_CLAIM_COOLDOWN: "#v [TimeKeeper.GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'da_stake_colonial_claim_cooldown') )]#!까지는 이 행동을 다시 이용할 수 없음"
 DA_STAKE_COLONIAL_CLAIM_EMPTY_EFFECT: "당신의 [concept_capital_state]가 있지 않은 대륙에 있는 [concept_state_region]을 선택하여 [concept_claim|l]을 주장하십시오"
 ## Notifications
 notification_colonial_claim_generated_name: "[SCOPE.sState('colony_notification_state').GetName](이)가 #bold 대규모 식민지#!가 됨"
 notification_colonial_claim_generated_desc: "[SCOPE.sState('colony_notification_state').GetName](이)가 충분히 큰 성장을 이루며, 우리는 [SCOPE.sState('colony_notification_state').GetStateRegion.GetName] 전체에 대한 [concept_claim]을 주장할 수 있게 되었다."
 notification_colonial_claim_generated_tooltip: "#header $notification_colonial_claim_generated_name$#!\n$TOOLTIP_DELIMITER$\n$notification_colonial_claim_generated_desc$"
