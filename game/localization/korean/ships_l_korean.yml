 ship_type_frigate: "호위함"
 ship_type_frigate_desc: "무장이 비교적 빈약한 범선입니다. 정찰, 순찰, 호위 임무에 투입됩니다."
 ship_type_iron_frigate: "철제 호위함"
 ship_type_iron_frigate_desc: "범선 호위함의 철갑 진화형입니다. 전통적인 호위함 역할에 강화된 내구성과 화력을 겸비했습니다."
 ship_type_ship_of_the_line: "전열함"
 ship_type_ship_of_the_line_desc: "전열에서 운용하도록 설계된 대형 전함입니다. 이 계통의 선박은 복수의 갑판에 다수의 포를 탑재합니다."
 ship_type_monitor: "모니터함"
 ship_type_monitor_desc: "저피탐 장갑 함선입니다. 연안 해역에서 운용하도록 설계되었습니다."
 ship_type_coastal_defense_ship: "해안 방어선"
 ship_type_coastal_defense_ship_desc: "중무장 장갑 함선입니다. 항만과 연안 해역에서 운용하도록 설계되었습니다."
 ship_type_destroyer: "구축함"
 ship_type_destroyer_desc: "함대 및 호위 작전을 위해 설계된 빠르면서도 강력하게 무장된 함선입니다."
 ship_type_aircraft_carrier: "항공모함"
 ship_type_aircraft_carrier_desc: "비행기가 이착함할 수 있는 선박입니다. 항공모함의 임무에는 정찰과 일부 공격 작전이 포함됩니다."
 ship_type_torpedo_boat: "어뢰정"
 ship_type_torpedo_boat_desc: "소형 기동 함선입니다. 더 크고 느린 전함에 치명적인 공격을 가하도록 설계되었습니다."
 ship_type_torpedo_boat_destroyer: "어뢰정 구축함"
 ship_type_torpedo_boat_destroyer_desc: "소형 어뢰선을 격퇴하도록 설계된 함선입니다. 동시에 자체적인 어뢰 공격 능력을 갖추었습니다."
 ship_type_light_cruiser: "경순양함"
 ship_type_light_cruiser_desc: "경장갑 순양함입니다. 장거리 초계, 무역로 보호, 세력 투사를 위해 건조되었습니다."
 ship_type_armored_cruiser: "장갑 순양함"
 ship_type_armored_cruiser_desc: "중장갑 벨트를 갖춘 대형 순양함입니다. 전함을 제외한 대부분의 상대와 교전할 수 있습니다."
 ship_type_protected_cruiser: "방호 순양함"
 ship_type_protected_cruiser_desc: "고속 장거리 순양함입니다. 중요 부품을 보호하는 장갑 갑판을 갖추었습니다."
 ship_type_seaplane_tender: "함재기 부속함"
 ship_type_seaplane_tender_desc: "수상기를 탑재하고 발진시키도록 설계된 함선입니다. 정찰 및 제한적 공격 작전에 주로 사용됩니다."
 ship_type_early_ironclad: "초기 철갑함"
 ship_type_early_ironclad_desc: "강력한 원양 항해용 증기 추진 철갑 함선입니다."
 ship_type_modern_ironclad: "현대 철갑함"
 ship_type_modern_ironclad_desc: "전통적인 철갑함의 진화형입니다. 많은 개량이 도입된 현대적인 철갑을 갖추었습니다."
 ship_type_pre_dreadnought: "전노급함"
 ship_type_pre_dreadnought_desc: "혼합 구경 대포를 탑재한 강력한 전함입니다."
 ship_type_dreadnought: "노급함"
 ship_type_dreadnought_desc: "균일한 대구경포 포대를 중심으로 건조된 혁명적인 전함입니다."
 ship_type_super_dreadnought: "초노급함"
 ship_type_super_dreadnought_desc: "더 무거운 함포와 강화된 장갑을 갖춘 대형 노급함입니다."
 ship_type_submarine: "잠수함"
 ship_type_submarine_desc: "잠수가 가능한 함선입니다. 적 상선 공격에 주로 활용됩니다."
 ship_type_troop_ship: "병력 수송선"
 ship_type_troop_ship_desc: "병력과 물자를 전 세계로 수송하기 위해 전용으로 설계된 보급선입니다."
 ship_type_supply_ship: "보급선"
 ship_type_supply_ship_desc: "군용품을 한 장소에서 다른 장소로 운송하는 함선입니다."
 ship_graphics_type_borodino: "보로디노"
 ship_graphics_type_borodino_desc: "보로디노급 전노급함은 러일전쟁 당시 러시아 제국 해군의 최신예 전함이었습니다. 로제스트벤스키 제독이 지휘한 비운의 제2태평양함대의 주축이었습니다. 쓰시마 해전에서 보로디노급 전노급함 4척이 격침 또는 나포되었습니다."
 ship_graphics_type_mikasa: "미카사"
 ship_graphics_type_mikasa_desc: "러일전쟁 내내 도고 제독의 기함이었던 전노급함입니다. 미카사는 당시 전쟁의 모든 주요 해전에 참전하며 일본 해군의 우위를 상징하는 불멸의 존재가 되었습니다."
 ship_graphics_type_dingyuan: "정원"
 ship_graphics_type_dingyuan_desc: "북양함대의 자랑이었던 철갑함 정원과 진원은 청말 군사 근대화를 상징하는 결실이었습니다. 황해 해전에서 용감히 싸웠으나, 청나라 해군의 만성적인 예산 부족으로 인해 기대한 성과를 내지는 못했습니다."
 ship_group_capital_ships: "주력함"
 ship_group_capital_ships_desc: "주력함은 현존하는 함선 중 가장 크고 전투력이 뛰어나며, 전열에서의 교전을 위해 운용됩니다."
 ship_group_cruisers: "순양함"
 ship_group_cruisers_desc: "순양함은 비교적 작고 가볍게 무장한 함선으로, 장거리 항행 작전을 위해 운용됩니다."
 ship_group_torpedo_craft: "어뢰함"
 ship_group_torpedo_craft_desc: "어뢰함은 기동성이 뛰어난 소형 함선으로, 자력 추진 어뢰를 주 무장으로 탑재합니다."
 ship_group_supply_ships: "보급선"
 ship_group_supply_ships_desc: "보급선은 군사 함대 작전을 지원하고 보급하는 전용 민간 함선입니다."
