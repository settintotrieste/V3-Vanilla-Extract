 japan_events.2.t: "Niezgodne kalendarze"
 japan_events.2.d: "W japońskim kalendarzu księżycowo-słonecznym o wielowiekowej już tradycji coraz wyraźniej widać rozbieżność z kalendarzem świata zachodniego. Kupcy skarżą się na utrudnione kontakty zagraniczne, a ludność utyskuje na niezgodności terminów świąt oraz regulowania czynszów i podatków."
 japan_events.2.f: "Urzędnicy siedzieli zgarbieni nad księgami, starannie przepisując każdą linijkę. Stosy papieru rosły z każdym skopiowanym dokumentem, a oczy skupionych na pracy bolały od śledzenia miesięcy, które już nie istniały. Stary kalendarz powoli odchodził w przeszłość."
 japan_events.2.f_telegraph: "Kurierzy pędzili ulicami, dostarczając jedną wiadomość za drugą. Ludzie zatrzymywali się, by przeczytać otrzymane ogłoszenia. W głowach im się kręciło od tempa, w jakim zmieniały się daty. Nie mogli za tym nadążyć. Wieści rozchodziły się błyskawicznie, a stary kalendarz zniknął niemal z dnia na dzień."
 japan_events.2.a: "Natychmiast przeprowadzić reformę kalendarzową."
 japan_events.2.b: "[GetTechnology('electric_telegraph').GetName] – wykorzystać tę technologię do usprawnienia wprowadzania zmian."
 japan_events.2.c: "Na razie zachowajmy dawny system."
 japan_calendar_clockwork_administration_mod: "Sprawna administracja"
 japan_calendar_western_timekeeping_mod: "Przyjęcie kalendarza zachodniego"
 japan_single_fire_events_enlightened_timekeeping_mod: "Światły pomiar czasu"
 japan_single_fire_events_tangled_seasons_mod: "Pomieszanie z poplątaniem"
 japan_single_fire_events_calendar_clinging_to_the_past_mod: "Trzymając się przeszłości"
 japan_single_fire_events_intellectual_grumble_mod: "Szemranie inteligencji"
 japan_single_fire_events_seasonal_familiarity_mod: "Znajome sezony"
 japan_events.3.t: "Bilans roczny"
 japan_events.3.d: "Wprowadzenie nowego kalendarza poskutkowało półoficjalnym skróceniem roku. Przy mniejszej liczbie dni płace, czynsze i podatki przestały odpowiadać ustaleniom sformułowanym w dawnym systemie. Robotnicy odkrywają, że wysokość ich wynagrodzenia spadła, a urzędnicy trudzą się, by jakoś wyjaśnić przyczynę rozbieżności."
 japan_events.3.f: "Robotnicy raz po raz przeliczali swoje monety, kręcąc głowami z dezaprobatą. Dłonie mieli spracowane, lecz ich wysiłek nie został należycie wynagrodzony. Rok był teraz krótszy, a każdy stracony dzień odcisnął ślad na ich zmęczonych ramionach i w pustych kieszeniach."
 japan_events.3.a: "Rok jest teraz krótszy. Trudno."
 japan_events.3.b: "Rozłóżcie ciężar zmian na ogół populacji."
 japan_events.3.c: "Straty weźmy na siebie. Stabilność państwa jest najważniejsza."
 japan_single_fire_events_lost_income_mod: "Szok z powodu niższych płac za krótszy rok"
 japan_shortened_year_redistribute_burden_mod: "Rozłożenie niedogodności fiskalnych"
 japan_shortened_year_accept_shortfall_mod: "Rekompensata strat kalendarzowych"
 japan_shortened_year_unfair_practices_mod: "Rzekome niesprawiedliwe praktyki podatkowe"
 japan_shortened_year_fair_tax_burden_mod: "Sprawiedliwe obciążenia podatkowe"
 japan_single_fire_events_shortfall_discontent_mod: "Niezadowolenie wskutek reform"
 japan_single_fire_events_missing_tax_law_tt: "Nie jest stosowane [concept_law|l] o nazwie [GetLawType('law_per_capita_based_taxation').GetName|l] lub [GetLawType('law_proportional_taxation').GetName|l]"
 japan_events.4.t: "Imiona i nazwiska na zachodnią modłę"
 japan_events.4.d: "Państwo o nazwie [ROOT.GetCountry.GetName] prowadzi stosunki dyplomatyczne i wymianę handlową z obcymi mocarstwami. Rodzi to pewne wątpliwości – jak zapisywać lokalne imiona i nazwiska w traktatach, listach i oficjalnych dokumentach? Przedstawiciele Zachodu coraz częściej oczekują, że imię będzie stawiane przed nazwiskiem, zgodnie z ich zwyczajami."
 japan_events.4.f: "Urzędnicy pochylali się nad biurkami, kreśląc pisma do zagranicznych oficjeli. Szeptali między sobą, rozważając, czy ukłon w stronę zachodniego odbiorcy usprawiedliwiał zmianę dawno utrwalonych norm. Ręka trzymająca pieczęć zawisła krótko nad kartką papieru, zanim atrament zaschnął, utrwalając znaki."
 japan_events.4.a: "Korespondencja zagraniczna ma podlegać zachodnim konwencjom."
 japan_events.4.b: "Zachowajmy tradycyjny zapis imion i nazwisk."
 japan_events.4.c: "Nastaje nowa epoka – przyjmij konwencję zachodnią we wszystkich przypadkach."
 japan_single_fire_events_name_order_westernized_mod: "Przyjęto zachodnie konwencje zapisu imion i nazwisk"
 japan_single_fire_events_name_order_traditional_mod: "Zachowano tradycyjny zapis imion i nazwisk"
 japan_single_fire_events_name_order_resistance_mod: "Kulturowy spór w kwestii zapisu imion i nazwisk"
 japan_single_fire_events_name_order_approval_mod: "Przejrzystość w administracji"
 japan_events.5.t: "Dylemat w sprawie kanbunu"
 japan_events.5.d: "Rozporządzenia, przepisy i rozmaite rejestry od wieków spisywano w klasycznym języku, zrozumiałym jedynie dla garstki uczonych. Reformatorzy przekonywali, że administracja prowadzona w narodowym języku japońskim zwiększy przejrzystość i sprawność rządów, podczas gdy tradycjonaliści twierdzili, iż wierność obyczajom nadaje słowu pisanemu prawdziwy autorytet."
 japan_events.5.f: "Urzędnicy pracowali do późnej nocy w przesiąkniętej determinacją ciszy, bez wytchnienia przeredagowując dyrektywy. Jeden z nich przerwał na moment, by przetrzeć oczy, po czym wrócił do pracy, starając się nie pominąć ani jednego znaku. Każdy ruch piórem zdawał się niewielką bitwą z bałaganem i zmieszaniem."
 japan_events.5.a: "Trzeba propagować stosowanie japońskiego języka narodowego w oficjalnej administracji."
 japan_events.5.b: "Należy zezwolić na reformę, ale tylko w korespondencji wewnętrznej."
 japan_events.5.c: "Wszystkie pisma urzędowe mają być sporządzane w klasycznym kanbunie."
 japan_language_partial_language_reform_mod: "Ograniczona reforma języka administracyjnego"
 japan_single_fire_events_language_reform_support_mod: "Aprobata wobec administracji w języku narodowym"
 japan_single_fire_events_language_traditionalist_opposition_mod: "Opozycja wobec administracji w języku narodowym"
