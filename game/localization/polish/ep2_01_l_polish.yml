l_polish:
 japan_events.1.t: "Poczta dla wszystkich"
 japan_events.1.d: "W miarę jak modernistyczni myśliciele zyskują wpływy w państwie o nazwie [ROOT.GetCountry.GetName], coraz wyraźniej ujawniają się ograniczenia dawnego systemu kolportażu poczty. Czy to dzięki rozwiązaniu porządku feudalnego, czy upowszechnieniu piśmienności wśród ludzi, zaistniały warunki do ustanowienia scentralizowanej poczty, zdolnej do wspierania nowoczesnego państwa."
 japan_events.1.f: "Posłańcy oznaczeni rządową pieczęcią biegali ulicami, nosząc w torbach nadspodziewanie dużą liczbę listów. W stolicy oficjele ślęczeli nad mapami, korygując trasy i licząc znaczki w bladym świetle lamp. Kupcy uskarżali się na zmiany w dawnych sieciach kurierskich, a ciekawskie dzieci wrzucały do nowiutkich skrzynek swoje pierwsze listy. Państwo, niegdyś podzielone obyczajami, zaczynało przemawiać jednym głosem."
 japan_events.1.a: "W pełni sfinansujmy wdrożenie systemu w całym państwie."
 japan_events.1.b: "Skupmy się na większych centrach miejskich."
 japan_events.1.c: "Priorytetem należy objąć tereny wiejskie."
 japan_events.1.e: "Reformę ma przeprowadzić [SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')]."
 japan_events.1.g: "Zachowajmy dawny system kurierski."
