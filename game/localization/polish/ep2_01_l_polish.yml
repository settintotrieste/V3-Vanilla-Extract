 ## The Hidden Domain JE
 je_ryukyu_rivalry: "Ukryta domena"
 je_ryukyu_rivalry_reason: "Od czasu #b inwazji w roku 1609#! przeprowadzonej przez siły #b domeny Satsuma#! królestwo znane jako [SCOPE.sCountry('ryukyu_scope').GetName] istniało jako domena państwa o nazwie [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')] we wszystkim poza nazwą właśnie. Pomimo podporządkowania Satsumie dwór w Shuri nadal otrzymuje inwestyturę od państwa znanego jako [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')] oraz wysyła misje trybutarne do Pekinu, podtrzymując pozory niezależności.\n\nTen układ trwa od pokoleń, jednak równowaga sił w Azji Wschodniej uległa zmianie wraz z rosnącą obecnością mocarstw zachodnich i liberalizacją Japonii. Obie strony muszą teraz określić swoje relacje z Riukiu, co zapoczątkuje otwartą walkę o wyspy południowe.\n$TOOLTIP_DELIMITER$\n@warning! #r Niepowodzenie:#! \n asertywność państwa o nazwie [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] osiągnie #variable 100%#!\n państwo o nazwie [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')] lub [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')] stanie się [Concept('concept_subject', 'państwem poddańczym')] lub zostanie #b zaanektowane#!\n państwo o nazwie [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] stanie się [Concept('concept_subject', 'państwem poddańczym')] państwa trzeciego lub zostanie przez nie #b zaanektowane#!\n\n@information! Aby przekonać do swoich racji:\n Należy przyjąć [concept_article|l] dotyczący #v przekazu pieniężnego#! (#g 0,1–2 tys. @money!#!) podpisany z państwem o nazwie [SCOPE.sCountry('ryukyu_scope').GetName]\n [concept_relations] między tobą a państwem znanym jako [SCOPE.sCountry('ryukyu_scope').GetName] muszą być #v przyjazne#! lub #v pokojowe#!\n Należy mieć największą [Concept('concept_naval_power_projection', 'projekcję siły marynarki wojennej')]\n Państwo o nazwie [SCOPE.sCountry('ryukyu_scope').GetName] musi mieć wobec ciebie [concept_obligation|l] \n Użyj działań dotyczących [Concept('concept_journal_entry', 'wpisu w dzienniku')]"
 #je_ryukyu_rivalry_goal:1 "You are asserting more influence over [SCOPE.sCountry('ryukyu_scope').GetName] than your rival."
 je_ryukyu_rivalry_victory_japan: "Aby zatriumfowała #b Japonia#!:\n"
 je_ryukyu_rivalry_victory_china: "Aby zatriumfowały #b Chiny#!:\n"
 je_ryukyu_rivalry_victory_ryukyu: "Aby zatriumfowało #b Riukiu#!:\n"
 ryukyu_rivalry_sway_tt: "Pełne przekonanie Riukiu do swoich racji uniemożliwia jakikolwiek wpływ na nią ze strony wroga, ponownie umożliwiając jej [Concept('concept_subject', 'podbój')].\n\nAby przekonać do swoich racji:\n Należy przyjąć [concept_article|l] dotyczący #v przekazu pieniężnego#! (#g 0,1–2 tys. @money!#!) podpisany z Riukiu\n [concept_relations] między tobą a Riukiu muszą być #v przyjazne#! lub #v pokojowe#!\n Należy mieć największą [Concept('concept_naval_power_projection', 'projekcję siły marynarki wojennej')]\n Riukiu musi mieć wobec ciebie [concept_obligation|l]\n Użyj działań dotyczących [Concept('concept_journal_entry', 'wpisu w dzienniku')]"
 ryukyu_rivalry_assertiveness_tt: "Riukiu zachowa swoją neutralność, gdy pasek osiągnie wartość #v 100%#!. W przypadku zachowania neutralności Riukiu nie może stać się [Concept('concept_subject', 'państwem poddańczym')] w ramach [Concept('concept_diplomatic_action', 'działania dyplomatycznego')] przez następne #v 50#! lat.\n\nPasek asertywności będzie zapełniał się o #g 0,5#! pkt każdego miesiąca, jeśli pasek przekonywania do swoich racji pozostanie na poziomie od #v -20#! do #v +20#!.\n\nRiukiu może zachować neutralność, skłaniając Japonię i Chiny do rywalizacji między sobą poprzez wykorzystanie dostępnych działań wpływających na możliwość przekonania do swoich racji. \n\nPrzykłady:\n Należy przyjąć [concept_article|l] dotyczący #v przekazu pieniężnego#! (#g 0,1–2 tys. @money!#!) podpisany z obiema stronami lub nie przyjmować go wcale\n [concept_relations] z obiema stronami muszą być #v przyjazne#! lub #v pokojowe#! bądź nie należy utrzymywać ich z żadną ze stron\n Należy mieć zaciągnięte [concept_obligation|l] wobec obu stron lub żadnej z nich\n Anuluj lub podpisz wyżej wymienione traktaty, gdy jedna ze stron uzyska lub straci przewagę"
 ryukyu_rivalry_completion_japan_victory_tt: "Państwo znane jako [SCOPE.sCountry('ryukyu_scope').GetName] [Concept('concept_unification', 'zjednoczy')] się z państwem o nazwie [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')]"
