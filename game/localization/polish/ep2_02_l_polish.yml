l_polish:
 edo_system: "System klasowy Edo"
 # Edo Social Classes
 strata_samurai_high: "Samurajowie wyższej kasty" # High-Class Samurai
 strata_samurai_high_desc: "Wysoko postawione elity wojowników, takich jak daimyō i starsi służący, czyli najwyższe warstwy klasy samurajskiej, zmonopolizowały większość ważnych urzędów i cieszą się znacznym dziedzicznym prestiżem."
 strata_samurai_low: "Samurajowie niższej kasty" # Low-Class Samurai
 strata_samurai_low_desc: "Wojownicy i służący niższej rangi, tacy jak gokenin i ashigaru, pełniący funkcję administracyjnej i wojskowej siły roboczej pod elitą samurajską."
 strata_religious: "Jisha" # Priests
 strata_religious_desc: "Duchowieństwo świątynne zorganizowane jest wokół instytucji świątynnych i podlega regulacji władz. Choć odgrywa istotną rolę w lokalnym życiu, edukacji i obrzędach religijnych, funkcjonuje w pewnym stopniu poza formalnie określonymi klasami społecznymi."
 strata_commoners_peasants: "Hyakushō" # Peasants
 strata_commoners_peasants_desc: "Będący podgrupą klasy pospólstwa chłopi stanowią zdecydowanie najliczniejszą z japońskich klas społecznych. Członkowie tej warstwy są wpisani do wiejskich wspólnot, co wiąże się z lokalnymi obowiązkami i podatkami. O przynależności do tej klasy decyduje sama rejestracja, a nie wykonywany zawód, dlatego zaliczają się do niej nie tylko rolnicy, lecz także wiejscy rzemieślnicy i kupcy."
 strata_commoners_townspeople: "Chōnin" # Townspeople
 strata_commoners_townspeople_desc: "Mieszczanie, będący podgrupą klasy pospólstwa, stanowią główną ludność japońskich ośrodków miejskich. Członkowie tej warstwy są rejestrowani przez instytucje miejskie i tradycyjnie związani z rzemiosłem oraz handlem. Choć mogą gromadzić znaczny majątek i wpływy, ich możliwości awansu społecznego pozostają ograniczone ze względu na brak statusu wojownika."
 strata_outcastes: "Eta-hinin" # Outcastes Eta, Hinin, etc.
 strata_outcastes_desc: "Eta i hinin stanowią najniższe warstwy japońskiego społeczeństwa. Silnie dyskryminowani, kojarzeni są z „nieczystymi” zajęciami, takimi jak kopanie grobów, żebractwo czy uliczne występy."
 # Edo Social System Laws
 lawgroup_edo_social_system: "System klasowy Edo"
 lawgroup_edo_social_system_desc: "Egzekwowanie systemu klasowego Edo"
 law_strict_edo_system: "Sztywny system stanowy"
 law_strict_edo_system_desc: "Wszystko, od możliwości prawnych i zawodowych po liczbę bram przy rezydencji, do których uprawnia status, jest ściśle regulowane i skrupulatnie egzekwowane przez państwo. Każde naruszenie tych zasad jest surowo karane, a dla mieszczan i chłopów nie istnieje formalna droga, by wstąpić w szeregi samurajów."
 law_intermediate_edo_system: "Złagodzony system stanowy"
 law_intermediate_edo_system_desc: "Prawo oraz przepisy dotyczące wydatków i zachowania zostały złagodzone, a pospólstwo zyskuje coraz większe wpływy i znaczenie w społeczeństwie. Wykupując tytuł, zamożni mieszczanie lub chłopi mogą awansować do rangi gokenin – samurajów niższego szczebla."
 law_lax_edo_system: "Swobodny system stanowy"
 law_lax_edo_system_desc: "Stanowiska i funkcje dotąd zarezerwowane wyłącznie dla samurajów są teraz dostępne dla pospólstwa, a egzekwowanie pozostałych ograniczeń dotyczących wydatków, zachowania czy wykonywanych zawodów ma charakter wybiórczy i zazwyczaj obejmuje jedynie najpoważniejsze naruszenia."
 # Tenpo Crisis
 je_tenpo_crisis: "Kryzys w Tenpō"
 je_tenpo_crisis_reason: "Ogłoszona w 1830 roku era Tenpō, czyli „Niebiańskiej Ochrony”, początkowo rzeczywiście zdawała się zasługiwać na swoją pomyślną nazwę. Jednak niekorzystne warunki pogodowe w regionie geograficznym [GetGeographicRegion('geographic_region_honshu').GetName] wkrótce doprowadziły do gwałtownego wzrostu cen ryżu i ogólnokrajowego głodu, podczas gdy rosnące bogactwo i wpływy grupy interesu o nazwie [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] zaczęły zagrażać porządkowi ustalonemu przez grupę interesu znaną jako [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName].\n\nTymczasem na horyzoncie zachodnie [Concept('concept_great_power', '$concept_great_powers$')|l] stają się coraz śmielsze, a ich statki handlowe i kanonierki zbliżają się coraz bardziej do naszych wybrzeży.\n\nPragnąc stawić czoła tym problemom, zwolennicy reform przedstawili swoje wizje zwolennikom szogunatu.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b Program reformatorów#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] Państwo o nazwie [ROOT.GetCountry.GetNameNoFlag] ustanowiło prawo: [GetLawType('law_lax_edo_system').GetName|l]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] Państwo o nazwie [ROOT.GetCountry.GetNameNoFlag] #b nie#! ustanowiło prawa: [GetLawType('law_hereditary_bureaucrats').GetName|l]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] Państwo o nazwie [ROOT.GetCountry.GetNameNoFlag] posiada #v 3#! [Concept('concept_state', '$concept_states$')|l], w których następujący budynek: [GetBuildingType('building_urban_center').GetName] osiągnął poziom #v 3#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')] [concept_clout] [Concept('concept_interest_group', 'grupy interesu')] o nazwie [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] wynosi co najmniej #v 10#!\n#tooltippable;tooltip:tenpo_hardliner_tt #b Program twardogłowych#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] Państwo o nazwie [ROOT.GetCountry.GetNameNoFlag] ustanowiło prawo: [GetLawType('law_strict_edo_system').GetName|l]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] Państwo o nazwie [ROOT.GetCountry.GetNameNoFlag] ustanowiło prawo: [GetLawType('law_shinsengumi').GetName|l]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] Państwo o nazwie [ROOT.GetCountry.GetNameNoFlag] posiada #v 40#! poziomów następującego budynku: [GetBuildingType('building_rice_farm').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')] [concept_interest_group] o nazwie [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] jest [Concept('concept_marginalized', 'grupą marginalizowaną')]\n#tooltippable;tooltip:tenpo_shared_tt #b Wspólny program#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] #b Żaden#! z posiadanych [Concept('concept_homeland', 'ojczystych')] [Concept('concept_state', 'obszarów administracyjnych')], w których kulturą jest kultura [GetCulture('japanese').GetName|l], nie cierpi [Concept('concept_famine', 'klęski głodu')]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [Concept('concept_gdp', '$concept_gdp_short$')] państwa o nazwie [ROOT.GetCountry.GetNameNoFlag] wynosi co najmniej #v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! @gdp!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] [concept_power_projection] armii państwa o nazwie [ROOT.GetCountry.GetNameNoFlag] jest wyższa niż #v 500#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] Mamy co najmniej #v 10#! poziomów następującego budynku: [GetBuildingType('building_naval_fortification').GetName] w posiadanych [Concept('concept_state', 'obszarach administracyjnych')]"
 je_tenpo_crisis_complete_header: "Zakończy się powodzeniem i reformą Tenpō, jeśli:\n"
 je_tenpo_crisis_failure_header: "Zakończy się niepowodzeniem reformy Tenpō, jeśli:\n"
 je_tenpo_crisis_success_tt: "Ukończyliśmy co najmniej #v 8#! celów zawartych w programie"
 je_tenpo_crisis_success_2_tt: "Nagroda będzie się różnić w zależności od liczby ukończonych celów #tooltippable;tooltip:tenpo_shared_tt #b wspólnych#!#!, #tooltippable;tooltip:tenpo_reformer_tt #b reformatorskich#!#! lub #tooltippable;tooltip:tenpo_hardliner_tt #b twardogłowych#!#!."
 je_tenpo_crisis_success_outcome_tt: "Nagroda będzie się różnić w zależności od liczby ukończonych celów #b wspólnych#!, #b reformatorskich#! lub #b twardogłowych#!."
 je_tenpo_crisis_success_outcome_1_tt: "Jeśli ukończyliśmy więcej celów z programu #b twardogłowych#!:"
 je_tenpo_crisis_success_outcome_2_tt: "Jeśli ukończyliśmy więcej celów z programu #b reformatorów#!:"
 je_tenpo_crisis_success_outcome_3_tt: "Jeśli ukończyliśmy równą liczbę celów z programów #b twardogłowych#! i #b reformatorów#!:"
 modifier_tenpo_crisis_reward_hardliner: "Przywróć porządek"
 modifier_tenpo_crisis_reward_reformer: "Uświęcanie nowinek"
 modifier_tenpo_crisis_reward_balanced: "Umiarkowane reformy"
 modifier_rice_hoarding: "Powszechne gromadzenie ryżu"
 tenpo_hardliner_tt: "#b Frakcja twardogłowych#! uważa, że japońskie społeczeństwo pogrąża się w moralnym upadku, który można powstrzymać jedynie poprzez powrót do tradycji.\n\nOpowiada się za wprowadzeniem surowszych przepisów dotyczących wydatków i zachowania oraz za tym, by samurajowie porzucili miejskie luksusy i powrócili do swojej wyidealizowanej roli surowych, wiejskich administratorów."
 tenpo_reformer_tt: "#b Frakcja reformatorów#! uważa, że japońskie społeczeństwo uległo nieodwracalnym przemianom i że prawo powinno opierać się na rzeczywistym stanie kraju, a nie na ideałach romantyzowanej przeszłości.\n\nOpowiada się za politycznym awansem pospólstwa i wspieraniem handlu."
 tenpo_shared_tt: "Zarówno frakcja #b twardogłowych#!, jak i #b reformatorów#! uważają za konieczne zabezpieczenie Japonii przed zagrożeniami z zewnątrz oraz zajęcie się kwestiami bezpieczeństwa żywnościowego i gospodarki."
 button_je_tenpo_combat_rice_hoarding: "Walcz z gromadzeniem ryżu"
 button_je_tenpo_combat_rice_hoarding_desc: "Polityczna i gospodarcza niestabilność państwa o nazwie [ROOT.GetCountry.GetNameNoFlag] spowodowała, że nieuczciwi handlarze wykupują i gromadzą duże ilości ryżu, podbijając jego ceny. W efekcie wiele japońskich rodzin nie ma obecnie środków, by kupić wystarczającą jego ilość do wyżywienia siebie i swoich bliskich."
 button_je_tenpo_frugal_ordinance: "Wydaj rozporządzenie w sprawie oszczędzania"
 button_je_tenpo_frugal_ordinance_desc: "Narastająca dekadencja miejskiej grupy interesu o nazwie [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] zagraża stabilności naszego panowania. Zaczęli już przekraczać swoje przywileje, ostentacyjnie okazując bogactwo.\n\nMusimy przypomnieć im o ich miejscu w społeczeństwie, wprowadzając dalsze ograniczenia prawne dotyczące luksusowych dóbr, rozrywki i literatury."
 button_je_tenpo_confiscate_land: "Wydaj rozkaz konfiskaty na terenach Edo-Osaka"
 button_je_tenpo_confiscate_land_desc: "Obszar w promieniu 10 #italic #tooltippable;tooltip:glossary_ri ri#!#! od Edo i Osaki stanowi skomplikowaną mieszaninę ziem należących do tenryo, daimyō i hatamoto. Brak jednolitej struktury administracyjnej ma poważne skutki dla obrony kraju oraz wykorzystania pełnego potencjału tych terenów, dlatego jeden z czołowych Rōjū zaproponował ich konfiskatę i konsolidację.\n\nWysiedleni właściciele ziemscy otrzymają w zamian rekompensatę w postaci innych terenów w Japonii."
 modifier_consolidation_payments: "Zapłata za konsolidację ziem"
 modifier_consolidated_state_land: "Ustawa konsolidacyjna 10 ri"
 glossary_ri: "#b #italic Ri#!#! jest tradycyjną jednostką miary pochodzącą od chińskiego #italic li#!.\n\nJej dokładna długość zmieniała się w czasie, ale w późnym okresie Edo odpowiadała w przybliżeniu 36 #italic chō#!, czyli około 3,9 km."
 modifier_tenpo_crisis_ongoing: "Wstrząsy epoki Tenpō"
 tenpo_events.1.t: "Epoka niebiańskiej ochrony"
 tenpo_events.1.d: "Po latach niekorzystnej pogody [concept_famine|l] ogarnęła ziemie państwa znanego jako [ROOT.GetCountry.GetNameNoFlag]. Podczas gdy ubodzy z trudem wiążą koniec z końcem, zwolennicy szogunatu zmagają się z rosnącym niezadowoleniem tych, którzy uważają, że rząd mógłby zrobić więcej."
 tenpo_events.1.f: "Wyplatane przez jego żonę tkaniny zawsze osiągały dobrą cenę na targu, a w lepszych czasach pozwalały im nawet na okazjonalny zakup słodyczy. Teraz sprzedawały się za cztery lub pięć gō ryżu, jeśli w ogóle. Ledwo wystarczało, by wyżywić ich przez jeden dzień – pomyślał – a co dopiero przez tydzień, nawet jeśli doda się do niego dzikie liście i chwasty.\n\nSzedł drogą do domu, na moment zatrzymując się, widząc dom starego Tory. Ospa już zabrała dwoje jego dzieci, a jeśli pogłoski o płaszczach przeciwdeszczowych były prawdziwe, w nadchodzących tygodniach prawdopodobnie zabierze kolejne. Mocno ściskając worek z ryżem, pomodlił się w duchu i odszedł."
 tenpo_events.1.a: "O niebiosa, chrońcie nas!"
 tenpo_events.1.tt_1: "#r Nawalne#!, [GetHarvestConditionType('torrential_rains').GetName|l] nawiedziły region geograficzny o nazwie [GetGeographicRegion('geographic_region_honshu').GetName], #r rujnując#! najważniejsze w kraju #b zbiory ryżu#! i znacząco zmniejszając [concept_food_security|l] państwa o nazwie [ROOT.GetCountry.GetNameNoFlag]."
 tenpo_events.1.tt_2: "W regionie geograficznym znanym jako [GetGeographicRegion('geographic_region_honshu').GetName] domy lichwiarzy i podejrzewanych o gromadzenie zapasów ryżu są celem tłumów dokonujących tzw. #italic #tooltippable;tooltip:glossary_uchikowashi uchikowashi#!#!, co prowadzi do #r ogólnokrajowego#! [Concept('concept_devastation', 'zniszczenia')]."
 glossary_uchikowashi: "#b #italic Uchikowashi#!#! oznacza niszczenie mienia osób postrzeganych jako niemoralne – takich jak lichwiarze, osoby gromadzące zapasy ryżu czy zawyżające ceny – przez członków społeczności.\n\nChoć działania te często wiązały się z grabieżą, w wielu przypadkach sprawcy uchikowashi celowo powstrzymywali się od plądrowania, aby podkreślić słuszność swojego czynu."
 tenpo_events.2.t: "Bunt samuraja-filozofa"
 tenpo_events.2.d: "[SCOPE.sCharacter('oshio_scope').GetFullName], osoba uczona zajmująca stanowisko komisarza, czując rozgoryczenie istniejącym porządkiem i brakiem możliwości poradzenia sobie z [Concept('concept_famine', 'klęską głodu')], która trawi obszar administracyjny o nazwie [SCOPE.sState('osaka_scope').GetName], buntuje się przeciwko lokalnym władzom. Duże obszary miasta znanego jako [SCOPE.sState('osaka_scope').GetCityHubName] już stoją w płomieniach, gdy [SCOPE.sCharacter('oshio_scope').GetCustom('PL_jego_jej')] zwolennicy podpalają lokalne urzędy administracji."
 tenpo_events.2.f: "„Choć nie posiadamy potęgi Tang i Wu ani cnoty Konfucjusza i Mencjusza, nie ma innego wyjścia: dla dobra kraju postanowiliśmy działać – nawet jeśli sprowadzi to przekleństwo na nasz własny ród.\n\nUkarzemy i zgładzimy rozmaitych urzędników, którzy gnębią i uciskają zwykłych ludzi, a następnie w ten sam sposób ukarzemy i zgładzimy zamożnych mieszczan z Osaki, którzy utuczyli się na zbytku.\n\nWówczas złoto, srebro i monety, które ukryli w tajnych skarbcach, oraz bele ryżu, które zgromadzili w swoich spichlerzach i posiadłościach, zostaną rozdzielone i rozdane”.\n\nŌshio Heihachirō, #italic fragmenty Manifestu#!"
 tenpo_events.2.a: "Zwołajcie milicję i przybijcie zdrajcę do krzyża."
 tenpo_events.2.b: "Desperackie, jednakże słuszne działanie."
 tenpo_events.2.c: "Buntownicy przejęli lokalny garnizon i miasto znane jako [SCOPE.sState('osaka_scope').GetCityHubName]."
 tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName] unika schwytania i podpala się w akcie samobójczym."
 tenpo_events.2.tt_2: "Osoba znana jako [SCOPE.sCharacter('oshio_scope').GetFullName] jest torturowana, posypywana solą, a potem zostaje ukrzyżowana przez władze."
 tenpo_events.2.tt_3: "Miejscowe oddziały milicji #b gaszą bunt w zarodku#!, zanim zdąży się rozprzestrzenić."
 tenpo_events.2.tt_4: "[concept_agitator] znany jako [SCOPE.sCharacter('oshio_scope').GetFullName] otrzymuje łagodny, wręcz symboliczny wyrok i może kontynuować swoją pracę."
 modifier_osaka_burning: "Krytyka podpisana krwią"
 modifier_controversial_pardon: "Kontrowersyjne ułaskawienie"
 tenpo_events.3.t: "Obowiązkowe reformy"
 tenpo_events.3.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], osoba zadowolona z tempa reform, pogratulowała urzędującym radcom ich postępów, wierząc, że naród zamieszkujący państwo znane jako [ROOT.GetCountry.GetName] będzie w stanie przezwyciężyć każde nadchodzące wyzwanie, zarówno zewnętrzne, jak i wewnętrzne."
 tenpo_events.3.f: "– Dwanaście, wasza wysokość – powiedział główny radca, odkładając pędzel na stół. – A raporty z Kinai wskazują na to samo – nasze reformy zdają się zapuszczać korzenie.\n\nZ podwyższenia [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] kiwa nieznacznie głową.\n\n– Dobrze. W odpowiednim czasie trzeba o tym poinformować dwór. A teraz omówmy raport od komisarza z Nagasaki…"
 tenpo_events.3.a: "Niech to wydarzenie naznaczy koniec moralnego i politycznego rozkładu państwa o nazwie [ROOT.GetCountry.GetName]."
 tenpo_events.3.b: "Od chłopa po samuraja – czyż nie jesteśmy wszyscy poddanymi cesarza?"
 tenpo_events.3.c: "Stabilność kraju jest najważniejsza."
 tenpo_outcome_hardliner_tt: "Ukończyliśmy więcej celów z programu #b twardogłowych#! niż z programu #b reformatorów#!"
 tenpo_outcome_reformer_tt: "Ukończyliśmy więcej celów z programu #b reformatorów#! niż z programu #b twardogłowych#!"
 tenpo_outcome_balanced_tt: "Ukończyliśmy równą liczbę celów z programu #b twardogłowych#! i z programu #b reformatorów#!"
 tenpo_events.4.t: "Działanie i bezczynność"
 tenpo_events.4.d: "Niezadowolenie z efektów programu reform i rosnące publiczne niezadowolenie z prac głównych radców sprawia, że [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] odwołuje osobę znaną jako [SCOPE.sCharacter('roju_scope').GetFullName] z jej stanowiska."
 tenpo_events.4.f: "Wygnanie. Były radca smakował to słowo i niezbyt mu się ono podobało. Może jednak było lepsze niż pozostanie w Edo po wczorajszych wydarzeniach. Pozostali przy nim słudzy wciąż sprzątali ze stawu i dziedzińca dachówki oraz kamienie, którymi w niego rzucano, a niektórych gróźb, które tamtego dnia usłyszał, nie sposób było już zapomnieć.\n\nPonownie rozważył to słowo i wydało mu się nieco mniej odpychające. „Zresztą zawsze pragnąłem zobaczyć górę Gassan na własne oczy”, pomyślał."
 tenpo_events.4.a: "Nie chcę już nigdy więcej widzieć tego głupca."
 tenpo_events.4.b: "Odwołaj wszystkie podjęte przez niego decyzje i upewnij się, że wszyscy się o tym dowiedzą."
 tenpo_events.4.tt_1: "Osoba znana jako [SCOPE.sCharacter('roju_scope').GetFullName] zostaje #r zdegradowana#! i wewnętrznie wygnana do prowincji #b Dewa#!"
 modifier_tenpo_fail: "Przerwane reformy Tenpō"
 tenpo_events_4_demotion_tt: "[concept_leader] [Concept('concept_interest_group', 'grupy interesu')] [concept_in_government|l] zostaje zdegradowany i wygnany wewnętrznie" # tooltip for event_outcome_failed_effect_desc in je_tenpo_crisis
 tenpo_events.5.t: "Właściciele ziemscy opierają się centralizacji"
 tenpo_events.5.d: "Nasza decyzja o konfiskacie ziem w obszarach administracyjnych znanych jako [SCOPE.sState('kanto_scope').GetName] i [SCOPE.sState('kansai_scope').GetName] spotkała się z powszechnym sprzeciwem miejscowych właścicieli ziemskich. Najgłośniej protestują ci, którym ziemie te przyznano niegdyś jako nagrodę za służbę wojskową."
 tenpo_events.5.f: "– Za zasługi wojenne mój przodek otrzymał ziemię, którą dziś dzierżę w swoim imieniu. Od czasów Sekigahary każde pokolenie uprawiało tę ziemię, zwiększając jej plony i oddając naszym panom należną daninę. Nigdy nikt się nie skarżył.\n\nCzy taka służba zasługuje na traktowanie, jakiego teraz doświadczamy? Czy przesiedlenie bez należytej rekompensaty ma być naszą nagrodą?"
 tenpo_events.5.a: "Odwołaj centralizację, zanim sytuacja wymknie się spod kontroli."
 tenpo_events.5.b: "Zaoferuj relokowanym dodatkową ziemię jako rekompensatę."
 tenpo_events.5.c: "Przypomnij im, że taką wolę wykazuje [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 modifier_heavy_handed_land_confiscations: "Trudne konfiskaty ziemi"
 modifier_promotions_and_koku_redistribution: "Awansy i redystrybucja koku"
 modifier_reckless_roju: "Nierozważni Rōjū"
 modifier_will_of_the_shogun: "W imieniu szoguna"
 tenpo_events.6.t: "Lew w leżu smoka"
 tenpo_events.6.d: "Zwycięstwo państwa o nazwie [SCOPE.sCountry('britain_scope').GetName] przeciwko krajowi znanemu jako [SCOPE.sCountry('china_scope').GetName] wstrząsnęło naszym narodem. Chińskie dżonki i armie zostały bez problemu rozgromione przez przeważające siły państwa znanego jako [SCOPE.sCountry('britain_scope').GetNameNoFormatting], a wielu zaczyna teraz wątpić, czy kraj o nazwie [ROOT.GetCountry.GetName] zdołałby odeprzeć podobny atak."
 tenpo_events.6.f: "„Od świątyni Ganlu na zachodzie po świątynię Jinshan na wschodzie ziemie wokół Zhenjiangu pełne były czarnych i białych barbarzyńców. Byli niczym kamienie rozrzucone na planszy do go, a miejscowi zastanawiali się, czy kiedykolwiek odejdą”.\n\nMineta Fūkō, #italic Nowe opowieści zza mórz#!"
 tenpo_events.6.a: "Niebiosa, chrońcie nas, bo nasi samurajowie już nie mogą."
 tenpo_events.6.b: "Ocenzuruj negatywne raporty z Chin."
 tenpo_events.6.c: "Jesteśmy klifem, o który rozbiją się fale barbarzyńców."
 modifier_opium_war_aftermath: "Barbarzyńcy u bram"
 modifier_defenses_strengthened: "Wzmocnione garnizony przybrzeżne"
 tenpo_events.7.t: "Szkoła Takashima"
 tenpo_events.7.d: "Obawiając się o przyszłość Japonii po następstwach wojny opiumowej, komisarz z Nagasaki – [SCOPE.sCharacter('takashima_scope').GetFullName] – zorganizował nowoczesną jednostkę wojskową wzorowaną na modelu holenderskim i wzywa resztę kraju, by poszła w jego ślady."
 tenpo_events.7.f: "– Nakrycia głowy jego żołnierzy przypominają dziwaczne korony, a rozkazy wydawane są w szorstkim języku Holendrów. Jednak ich oddziały są dobrze wyćwiczone i zorganizowane, a salwy potrafią oddawać niemal dwa razy szybciej niż moi wasale, choć ich celność jest nieco gorsza.\n\n– A artyleria?\n\n– Niezrównana. Obawiam się, że im dłużej będziemy zwlekać z jej przyjęciem, tym mniejsze będą nasze szanse na odparcie barbarzyńskiego ataku."
 tenpo_events.7.a: "Zatwierdź przyjęcie barbarzyńskiej broni i technik walki."
 tenpo_events.7.b: "Zamiast tego wybierz tradycyjne rody muszkieterskie."
 modifier_inoue_tatsuke_primacy: "Pierwszeństwo Inoue-Tatsuke"
 modifier_favouring_traditional_musketry_houses: "Wspieranie tradycyjnych rodów muszkieterskich"
 modifier_favouring_takashima: "Zepchnięte na margines rody muszkieterskie"
 modifier_takashima_school: "Promowanie szkoły Takashima"
 tenpo_events.8.t: "Za miskę ryżu"
 tenpo_events.8.d: "Oskarżenia o gromadzenie zapasów ryżu i zawyżanie cen doprowadziły do eskalacji napięć między rolnikami a kupcami w obszarze administracyjnym znanym jako [SCOPE.sState('tenpo_unrest_state_scope').GetName]. Wsparci przez bandytów i żebraków chłopi podnieśli bunt, a lokalne władze muszą teraz stawić czoła powstaniu obejmującemu całą prowincję."
 tenpo_events.8.f: "Był jednym z pierwszych. Tych wesołych nielicznych, którzy zaatakowali dom nikczemnego kupca i rozdali jego nieuczciwie zdobyte dobra ludowi. Lecz gdy jego wzrok przesunął się po ognisku, zdał sobie sprawę, jak niewielu z nich pozostało. Eikichi i Matsuzō wciąż tu byli, choć nie przypominali już ludzi, których znał, tych promieniujących sprawiedliwym gniewem. Fukumatsu stracił życie drugiego dnia, a Takeshichi siódmego. Reszta rozproszyła się niczym liście, gdy goniły ich oddziały komisarza.\n\nCharakter ludzi, którzy ich zastąpili, napełniał go wstydem i rozpaczą, ale nie widział innej drogi. Bo nawet tak biedne towarzystwo jak ich wydawało się boskie w porównaniu z piłą kata."
 tenpo_events.8.a: "Wyślij ludzi, aby zmiażdżyli złoczyńców."
 tenpo_events.8.b: "Niech niepokoje wygasną samoistnie."
 tenpo_events.8.c: "Poproś lokalnych przywódców wsi o pomoc w stłumieniu niepokojów."
 modifier_consulted_headsmen: "Wiejskie koncesje"
 modifier_lingering_brigandry: "Utrzymujący się bandytyzm"
 modifier_brutal_anti_bandit_campaigns: "Brutalne kampanie przeciwko bandytom"
 je_taming_the_north: "Okiełznywanie północy"
 je_taming_the_north_reason: "Wraz z utworzeniem #b Komisji Rozwoju obszaru administracyjnego o nazwie [SCOPE.sState('hokkaido_state_scope').GetName]#!, powszechnie znanej jako #b Kaitakushi#!, to dawne pogranicze tętni życiem. Każdego dnia z południa napływają mężczyźni i kobiety poszukujący ziemi i nowych możliwości.\n\nNie jest to jednak zwyczajna fala migracji. Wraz z osadnikami przybywają urzędnicy, intelektualiści i wizjonerzy modernizacji, mający misję ukształtowania tych ziem, pragnący urzeczywistnić swoją wizję przyszłości państwa o nazwie [ROOT.GetCountry.GetName] w obecnym obszarze administracyjnym o nazwie [SCOPE.sState('hokkaido_state_scope').GetName]."
 taming_the_north_agriculture_potentials_goal_tt: "Akcja #b $button_je_taming_the_north_agriculture_potentials$#! została już użyta #v 3#! razy"
 taming_the_north_agriculture_arable_goal_tt: "Akcja #b $button_je_taming_the_north_agriculture_potentials$#! została już użyta #v 3#! razy"
 taming_the_north_colonies_goal_tt: "Akcja #b $button_je_taming_the_north_agriculture_potentials$#! została już użyta"
 je_taming_the_north_additional_goal_pre: "Jeśli będziemy kontrolować teren o nazwie #b $STATE_SAKHALIN$#! w całości, [concept_timed_modifier|l] #b $modifier_tamed_north$#! będzie obowiązywać także w [Concept('concept_state_region', 'regionie administracyjnym')] znanym jako $STATE_SAKHALIN$:"
 je_taming_the_north_additional_goal: "Jeśli będziemy posiadać region administracyjny o nazwie [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName] w całości, [concept_timed_modifier|l] #b $modifier_tamed_north$#! będzie obowiązywać także w regionie administracyjnym znanym jako [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]:"
 je_taming_the_north_additional_goal_completed: "Jako że posiadamy region administracyjny o nazwie [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName] w całości, [concept_timed_modifier|l] #b $modifier_tamed_north$#! będzie obowiązywać także w regionie administracyjnym znanym jako [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]:"
 modifier_tamed_north: "Przykładna kolonia"
 modifier_northern_learnings: "Nauki Kaitakushi"
 button_je_taming_the_north_establish_colonies: "Załóż kolonie sponsorowane przez obszary administracyjne"
 button_je_taming_the_north_establish_colonies_desc: "Kolonia, w której nie ma wystarczająco kolonistów, skazana jest na porażkę. Należy rozważyć zachętę dla rodzin z państwa o nazwie [ROOT.GetCountry.GetName], aby chętniej osiedlały się na północy."
 button_je_taming_the_north_integrate_ainu: "Wprowadź środki ochrony prawnej dla Ajnów"
 button_je_taming_the_north_integrate_ainu_desc: "Dotychczas stanowisko komisji wobec kultury, którą jest kultura [GetCulture('ainu').GetName|l], opierało się na przymusowej integracji i wymazaniu kulturowym. Jednakże podjęte przez nas stopniowe działania na rzecz bardziej sprawiedliwych relacji z zamieszkującym północ społecznością, którą stanowi ludność [GetCulture('ainu').GetNameNoFormatting|l], doprowadziły do ocieplenia stosunków między naszymi narodami.\n\nW związku z tym osobie, którą jest [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], przedłożono propozycję, aby prawnie uznać, że ludność [GetCulture('ainu').GetNameNoFormatting|l] jest nam bliska i będzie chroniona w ramach prawa obowiązującego w państwie o nazwie [ROOT.GetCountry.GetName] jako równa mieszkańcom kraju znanego jako [GetCulture('japanese').GetName], zarówno pod względem praw, jak i obowiązków."
 ainu_frenship_tt: "Konsekwentnie zwiększaliśmy zainteresowanie społeczności, którą stanowi ludność [GetCulture('ainu').GetName|l], organizowanymi #b wydarzeniami#!"
 button_je_taming_the_north_sapporo_agricultural_college: "Ufunduj Wyższą Szkołę Rolniczą w Sapporo"
 button_je_taming_the_north_sapporo_agricultural_college_desc: "Północ to idealne miejsce do przetestowania najnowszych teorii w dziedzinie rolnictwa i gospodarowania gruntami. Założymy nowoczesną uczelnię rolniczą, w której zatrudnieni zostaną wykwalifikowani obcokrajowcy, aby stała się ona zalążkiem naszej naukowej transformacji ziemi."
 sapporo_partner_positive_catalyst_tt: "#g Pozytywny#! [concept_diplomatic_catalyst|l] zostanie uruchomiony, kiedy losowe państwo spełni wymagania"
 button_je_taming_the_north_agriculture_potentials: "Wprowadź nowy rodzaj upraw"
 button_je_taming_the_north_agriculture_potentials_desc: "Dostępna powierzchnia upraw na wyspie może mieć kluczowe znaczenie, lecz prawdziwy rozwój gospodarczy nastąpi tylko wtedy, gdy zaczniemy uprawiać odpowiednie rośliny.\n\nNowe osiągnięcia w dziedzinie rolnictwa – zapoczątkowane przez #b Wyższą Szkołę Rolniczą w Sapporo#! – pozwalają nam wprowadzić na to mroźne pogranicze uprawy, które wcześniej uznawano za niemożliwe.\n\nDostępne opcje:\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#! (skalowanie)\n• [GetBuildingType('building_rice_farm').GetName]\n• [GetBuildingType('building_dye_plantation').GetName]\n• [GetBuildingType('building_opium_plantation').GetName]\n• [GetBuildingType('building_vineyard').GetName]"
 established_sapporo_college_tt: "Założono #b Wyższą Szkołę Rolniczą w Sapporo#!"
 hokkaido_agriculture_potentials_tt: "Tę decyzję można podjąć maksymalnie #v 3#! razy. (Obecnie: [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0])"
 modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]"
 button_je_taming_the_north_agriculture_arable_land: "Kontynuuj odzyskiwanie terenów"
 button_je_taming_the_north_agriculture_arable_land_desc: "Choć te rozległe ziemie są słabo rozwinięte pod względem rolniczym, kryją w sobie ogromny potencjał. Potężne pasma górskie, z których spływają obfite wody, stwarzają szerokie możliwości rozszerzenia areału upraw na północ.\n\nOsuszymy mokradła, nawodnimy pola i ujarzmimy tę ziemię, dając świadectwo niezłomnego ducha tlącego się w kulturze, którą jest kultura [GetCulture('japanese').GetName|l]."
 hokkaido_agriculture_arable_tt: "Tę decyzję można podjąć maksymalnie #v 3#! razy. (Obecnie: [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0])"
 hokkaido_events.1.t: "Ósmy okręg"
 hokkaido_events.1.d: "Wraz z włączeniem obszaru administracyjnego o nazwie [SCOPE.sState('hokkaido_scope').GetName] – czyli ziem ajnuskich – do właściwej Japonii, należy nadać mu nazwę, która odzwierciedli nowy status tego terenu. Nowo powołana Komisja Rozwoju przedstawiła szereg propozycji do rozpatrzenia przez osobę, którą jest [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 hokkaido_events.1.f: "– To kraina dzikusów. Bagien i błota. Zubożałych rybaków i mięsożerców. Co chcesz osiągnąć w tej zapomnianej przez Boga krainie, czego nie może ci zapewnić miejsce znane jako [ROOT.GetCountry.GetCapital.GetCityHubName]?\n\n– Chcę mieć jakiś cel, matko. I coś, co będzie moje."
 hokkaido_events.1.a: "Nowe tereny przyjmą nazwę #tooltippable;tooltip:hokkaido_events.1_tt_3 #b Hokkaido#!#!: Okręg Morza Północnego." # 北加伊道
 hokkaido_events.1.b: "#tooltippable;tooltip:hokkaido_events.1_tt_2 #b Hokkaido#!#!, na cześć mieszkańców tych ziem." # 北海道
 hokkaido_events.1.c: "#tooltippable;tooltip:hokkaido_events.1_tt_4 #b Kaitō-dō#!#!, Morski Okręg Wyspiarski, to zdecydowanie lepsza opcja."
 hokkaido_events.1.e: "#tooltippable;tooltip:hokkaido_events.1_tt_5 #b Hitakami-dō#!#! ma w sobie coś poetyckiego."
 hokkaido_events.1.tt_1: "Miasto #b Sapporo#! zostało założone i stało się nową stolicą administracyjną wyspy, zastępując poprzednią stolicę – #b Hakodate#!"
 modifier_ainu_heritage_aknowleged: "Kraina ludu Kai"
 modifier_breaking_new_ground: "Pierwsze uprawy na nowych ziemiach"
 modifier_hokkaido_naval_connections: "Okręg morski"
 modifier_call_of_the_frontier: "Zew pogranicza"
 the_ainu_will_appreciate_this_tt: "@information! Ludność [GetCulture('ainu').GetName|l] będzie o tym pamiętać"
 hokkaido_events.1_tt_2: "#b Północny Okręg Kai#!\nWedług słów członka komisji Matsuury Takeshirō, termin #italic kai#! (加伊) jest rozumiany jako dawny ajnuski endonim, określający ich własny lud."
 hokkaido_events.1_tt_3: "#b Okręg Morza Północnego#!\nKontrpropozycja rządu do tej, którą przedstawił początkowo Matsuura Takeshirō. W tym wariancie znaki #italic kai#! (加伊) zostały zastąpione identycznie brzmiącym znakiem #italic kai#! (海), oznaczającym „morze”.\n\n@information! To właśnie ta propozycja została ostatecznie przyjęta w historii."
 hokkaido_events.1_tt_4: "#b Morski Okręg Wyspiarski#!\nPonad wszystko wyspa ta definiowana jest przez swoją relację z morzem – fakt ten powinien znaleźć odzwierciedlenie w jej nowej nazwie."
 hokkaido_events.1_tt_5: "#b Okręg Wschodzącego Słońca#!\nArchaiczna nazwa z okresu Yamato dla północno-wschodnich ziem pogranicznych. Wybór tej opcji silnie osadza nową kolonię w starożytnej przeszłości Japonii."
 hokkaido_events.2.t: "Nowa granica"
 hokkaido_events.2.d: "Pytanie o to, jak najlepiej zasiedlić ten region, od pewnego czasu zaprząta uwagę Komisji Rozwoju obszaru administracyjnego o nazwie [SCOPE.sState('hokkaido_state_scope').GetName]. Niecierpliwi urzędnicy zaczęli się domagać podjęcia ostatecznej decyzji."
 hokkaido_events.2.f: "Gdy dorastał, ojciec często opowiadał mu o ich przodkach. O dumnych i szlachetnych wojownikach z czasów wojny. O ich surowej godności i wielkich czynach wojennych. Historie te urzekały go w dzieciństwie, ale teraz, gdy był starszy, napełniały go jedynie melancholią. Ironia losu jego ojca, pracownika biurowego, miejskiego pijaka noszącego miecz tylko ze względu na związaną z tym dostojność, wychwalającego cnoty przeszłości, była nie do zniesienia.\n\nKiedy więc ojciec poprosił go o pomoc w zarządzaniu firmą, odrzucił propozycję z pogardą i natychmiast wyruszył na północ. Może tam znajdzie ratunek dla swojej linii?"
 hokkaido_events.2.a: "Nadaj priorytet zasiedlania żołnierzom-kolonistom."
 hokkaido_events.2.b: "Kręgosłup państwa o nazwie [ROOT.GetCountry.GetName] tworzą zwykli chłopi."
 hokkaido_events.2.c: "Ogranicz osady najgorliwiej wyznające kulturę, którą jest kultura [GetCulture('japanese').GetName|l], do terenów, gdzie nie występuje kultura [GetCulture('ainu').GetName|l]."
 modifier_tondenhei_settlements: "Osady Tondenhei"
 modifier_peasant_settlements: "Osady chłopskie"
 modifier_restricted_settlements: "Zachowane tereny ojczyste Ajnów"
 hokkaido_events.2.tt_1: "Kultura [GetCulture('japanese').GetName|l] – #v 1,5%#! przedstawicieli [Concept('concept_pop', '$concept_pops$')|l] reprezentujących tę kulturę w [Concept('concept_capital_state', 'stołecznym obszarze administracyjnym')] przeniesie się do obszaru administracyjnego o nazwie [SCOPE.sState('hokkaido_state_scope').GetName]"
 hokkaido_events.2.tt_2: "Kultura [GetCulture('japanese').GetName|l] – #v 3%#! przedstawicieli [Concept('concept_pop', '$concept_pops$')|l] reprezentujących tę kulturę w miejscu o nazwie [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (jeden z [Concept('concept_state', 'obszarów administracyjnych')] posiadających najniższe [Concept('concept_gdp', '$concept_gdp_short$')] w regionie geograficznym znanym jako [GetGeographicRegion('geographic_region_home_islands').GetName]) przeniesie się do obszaru administracyjnego o nazwie [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_old_swords_in_new_lands: "Stare miecze na nowych ziemiach"
 modifier_go_north_young_man: "Idź na północ, młodzieńcze"
 hokkaido_events.3.t: "Zalążki postępu"
 hokkaido_events.3.d: "Ostatnie przełomy dokonane w Wyższej Szkole Rolniczej w Sapporo skłoniły do przedstawienia propozycji wprowadzenia nowych upraw na pola w obszarze administracyjnym o nazwie [SCOPE.sState('hokkaido_state_scope').GetName]."
 hokkaido_events.3.f: "#b Osobisty dziennik laboratoryjny, wpis 154#!\nSzczepy odmian zachodnich porzucono na rzecz południowych ze względu na najnowsze wyniki badań. Chłopcy twierdzą, że spodziewane jest przesunięcie granicy upraw znacznie na północ, być może nawet za Kamikawę. Ocena potencjalnych plonów wymaga dalszych badań, ale czuję optymizm. Mam jutro spotkanie z kierownikiem wydziału. Muszę kupić nowy krawat."
 hokkaido_events.3.a: "Skup swoje wysiłki na ulepszaniu już istniejących upraw."
 hokkaido_events.3.b: "Rozwiń gatunki odporne na zimno, sprawiając, że w tym miejscu powstanie budynek znany jako [GetBuildingType('building_rice_farm').GetName]."
 hokkaido_events.3.c: "Niziny są odpowiednie, aby wybudować budynek znany jako [GetBuildingType('building_dye_plantation').GetName] indygo."
 hokkaido_events.3.e: "[GetBuildingType('building_opium_plantation').GetName] to przyszłość tego miejsca, bowiem maki rosną tutaj dość dobrze."
 hokkaido_events.3.g: "Przygotuj budynek znany jako [GetBuildingType('building_vineyard').GetName], używając specjalnych szczepów winogron."
 button_je_taming_the_north_complete: "Rozwinęliśmy te ziemie na tyle, na ile pozwala nam nasza technologia"
 modifier_introducing_new_crops: "Wprowadzenie nowego rodzaju upraw"
 modifier_opimizing_existing_variants: "Rodzaje upraw przystosowanych do chłodnego klimatu"
 hokkaido_events.4.t: "Rozwój gleby" # Markens Grøde really does sound better in Norwegian
 hokkaido_events.4.d: "Komisja Rozwoju obszaru administracyjnego o nazwie [SCOPE.sState('hokkaido_state_scope').GetName] osiągnęła kolejny ważny kamień milowy, przekształcając rozległe obszary dawnych podmokłych terenów w żyzne i wartościowe ziemie rolne."
 hokkaido_events.4.f: "To było naprawdę imponujące. Dziesięć lat temu największą jednostką zdolną bezpiecznie przepłynąć rzekę byłaby mała łódź wiosłowa. Teraz obserwował grupę robotników wyładowujących skrzynie i płócienne worki z ogromnego pramu parowego, który buchał dymem w rześkie górskie powietrze. Materiał na kolejną śluzę? A może na meliorację dalej w górę rzeki? A może po prostu zapasy z nowej wioski w dolinie? Nie potrafił powiedzieć i, prawdę mówiąc, nie miało to znaczenia, bo każdy towar zwiastował w tym przypadku przyszłość."
 hokkaido_events.4.a: "Każdym ruchem motyki kształtujemy tę ziemię."
 hokkaido_events.4.b: "A z każdym nowym domem sprawiamy, że się rozwija."
 hokkaido_events.4.tt_1: "Kultura [GetCulture('japanese').GetName|l] – #v 2%#! przedstawicieli [Concept('concept_pop', '$concept_pops$')|l] reprezentujących tę kulturę w miejscu o nazwie [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (jeden z [Concept('concept_state', 'obszarów administracyjnych')] posiadających najniższe [Concept('concept_gdp', '$concept_gdp_short$')] w regionie geograficznym znanym jako [GetGeographicRegion('geographic_region_home_islands').GetName]) przeniesie się do obszaru administracyjnego o nazwie [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_immigration_burst: "Fala imigracji"
 modifier_open_to_business: "Otwartość na interesy"
 hokkaido_events.5.t: "Chłopcy, trochę ambicji…"
 hokkaido_events.5.d: "Wraz z ukończeniem nauki przez pierwszą klasę obsadzonej przez kadrę z państwa o nazwie [SCOPE.sCountry('sapporo_partner_country_scope').GetName] Wyższej Szkoły Rolniczej w Sapporo absolwenci są gotowi wykorzystać zdobyte umiejętności w praktyce. Tymczasem rada uczelni rozważa dalszy kierunek rozwoju i profil instytutu."
 hokkaido_events.5.f: "„…niech wasza ambicja nie wynika z chęci zdobycia pieniędzy, niech nie służy egoistycznemu wywyższeniu się ani ulotnej rzeczy, którą ludzie nazywają sławą. Niech waszą ambicją będzie osiągnięcie wszystkiego, czym człowiek może się stać”.\n\nWilliam Smith Clark, #italic przemówienie pożegnalne rektora Wyższej Szkoły Rolniczej w Sapporo#!"
 hokkaido_events.5.a: "Szkoła rolnicza powinna skupiać się przede wszystkim na rolnictwie."
 hokkaido_events.5.b: "Priorytetem powinna być rozbudowa wydziału inżynierii."
 hokkaido_events.5.c: "Załóż wydział humanistyczny i rozpocznij studia nad miejscową kulturą."
 hokkaido_events.5.tt_1: "Wpływ kadry z państwa o nazwie [SCOPE.sCountry('sapporo_partner_country_scope').GetName] zatrudnionej w #b Sapporo#! prowadzi do utworzenia społeczności, którą jest społeczność [GetCulture('japanese').GetName|l] wyznająca następującą wiarę: [SCOPE.sReligion('sapporo_partner_religion_scope').GetName|l]"
 hokkaido_events.5.tt_2: "Odblokowuje akcje #b $button_je_taming_the_north_agriculture_potentials$#! i #b $button_je_taming_the_north_agriculture_arable_land$#! we [Concept('concept_journal_entry', 'wpisie w dzienniku')] #b $je_taming_the_north$#!"
 modifier_sapporo_expanded_agricultural_faculty: "Innowacyjne metody rolnicze"
 modifier_sapporo_expanded_engineering_faculty: "Nowoczesny wydział inżynierii"
 modifier_sapporo_humanities_faculty: "Grupa studiów nad kulturą w Sapporo"
 hokkaido_events.6.t: "Ainu Mosir, Sisam Mosir"
 hokkaido_events.6.d: "W atmosferze wewnętrznych kontrowersji w mieście o nazwie [ROOT.GetCountry.GetCapital.GetCityHubName] wydany został nowy dekret dotyczący statusu prawnego obszaru administracyjnego znanego jako [SCOPE.sState('hokkaido_state_scope').GetName], formalnie wyznaczając ojczyznę Ajnów oraz ustanawiając ograniczone instytucje funkcjonujące równolegle do oficjalnego aparatu biurokratycznego w państwie znanym jako [ROOT.GetCountry.GetName]."
 hokkaido_events.6.f: "– Hinna! Hinna! – ajnoska starowina z niemal bezzębnym uśmiechem podała mu miskę zupy. Spojrzał na pływającą w niej dziczyznę i podziękował niebiosom, że nie ma tu jego rodziców.\n\n– Niełatwo jest osiągnąć pokój – mruknął do siebie, przyjmując danie z wymuszonym uśmiechem."
 hokkaido_events.6.a: "– Te ziemie są dostatecznie rozległe, aby pomieścić obie strony."
 modifier_opposes_ainu_rights: "Barbarzyńskie koncesje"
 modifier_supports_ainu_rights: "Chronione prawa Ajnów"
 hokkaido_events.7.t: "Ostatnie działanie komisji"
 hokkaido_events.7.d: "Ogłaszając oficjalnie pomyślne zakończenie misji powierzonej jej przez rząd, Komisja Rozwoju obszaru administracyjnego o nazwie [SCOPE.sState('hokkaido_state_scope').GetName] postanowiła przekazać pozostałe obowiązki w ręce jego władz."
 hokkaido_events.7.f: "#b Obwieszczenie nr 8#!\nKomisja Rozwoju obszaru administracyjnego o nazwie [SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting] zostaje niniejszym rozwiązana i ustanawia się trzy prefektury: Hakodate, Sapporo i Nemuro. Granice ich jurysdykcji zostaną ogłoszone w późniejszym terminie."
 hokkaido_events.7.a: "Wzór do naśladowania dla przyszłych przedsięwzięć kolonialnych…"
 hokkaido_events.7.b: "…a przy okazji także dla regionu geograficznego o nazwie [GetGeographicRegion('geographic_region_home_islands').GetName]."
 modifier_external_applications: "Kaitakushi: wnioski zewnętrzne"
 modifier_domestic_applications: "Kaitakushi: wnioski rodzime"
 hokkaido_events.8.t: "Komisja bez powodu"
 hokkaido_events.8.d: "Utrata regionu administracyjnego o nazwie [SCOPE.sStateRegion('hokkaido_state_region_scope').GetName] zmusiła Komisję Rozwoju do rozwiązania się przed zakończeniem powierzonej jej misji. W odpowiedzi na tę sytuację oburzeni obywatele wyszli na ulice państwa znanego jako [ROOT.GetCountry.GetName], protestując zarówno przeciwko utracie narodowego prestiżu, jak i własnych inwestycji."
 hokkaido_events.8.f: "Wyczerpany emerytowany administrator opadł na fotel w biurze i nalał sobie hojny kubek sake. Opróżniając go jednym haustem, przeniósł wzrok na mapy rozłożone przed nim na stole. Pełne bazgrołów, notatek i znaków – każdy z nich oznaczał osobny plan, w który mężczyzna włożył całą swoją energię życiową. Teraz nie już żadnego planu ani energii, a dający się odczuć w każdej notatce optymizm niósł drwiący ton.\n\n– Do diabła z tym wszystkim – pomyślał, po czym ponownie napełnił kubek."
 hokkaido_events.8.a: "Niestety rząd nie ma na to wpływu."
 modifier_lost_northern_investments: "Utracone północne inwestycje"
