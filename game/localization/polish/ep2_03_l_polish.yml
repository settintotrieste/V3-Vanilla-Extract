l_polish:
 #Japan Single-Fire Events
 japan_events.31.t: "Spłonął teatr w mieście znanym jako [SCOPE.sState('kabuki_theatre_state').GetCityHubName]"
 japan_events.31.d: "Pożar strawił popularny teatr kabuki w obszarze administracyjnym znanym jako [SCOPE.sState('kabuki_theatre_state').GetName]. Podczas gdy trupa teatralna planuje odbudowę, członkowie grupy interesu o nazwie [SCOPE.gsInterestGroup('relevant_ig').GetName] – a zwłaszcza [SCOPE.sCharacter('relevant_leader').GetFullName] – dostrzegają w tym okazję, by uregulować rozrywkę w mieście o nazwie [SCOPE.sState('kabuki_theatre_state').GetCityHubName] i zmusić artystów do odbudowy teatru poza jego granicami."
 japan_events.31.f: "Na platformie przeciwpożarowej wieży obserwacyjnej czuwa niespokojny strażnik, który pilnie wypatruje zagrożeń nad miastem znanym jako [SCOPE.sState('kabuki_theatre_state').GetCityHubName]. Późnym wieczorem z wysokości dostrzega charakterystyczne oznaki pożaru. Gdy w powietrzu zaczyna kłębić się dym, a ostry zapach ognia wypełnia okolicę, rzuca się, by uderzyć w dzwon alarmowy.\n\nNieświadomi mieszkańcy dowiadują się o niebezpieczeństwie. Brygady przeciwpożarowe ruszają do działania wspinają się na dachy, by powstrzymać płomienie. Gdy ogień w końcu zostaje ugaszony, staje się jasne, że zniszczenia są już ogromne. Po tym niszczycielskim pożarze z jednego ze znanych teatrów kabuki pozostały jedynie zgliszcza."
 japan_events.31.a: "Trzeba odbudować teatr poza granicami miasta."
 japan_events.31.b: "Pozwól trupie teatralnej na odbudowę."
 modifier_kabuki_regulated: "Rozprawienie się z teatrem kabuki"
 modifier_theatre_affronted_official: "Obrażony oficjel"
 modifier_shogunate_opposition_ig_approval: "Oportunistyczna opozycja"
 japan_events.32.t: "Obrazy przepływającego świata"
 japan_events.32.d: "Prace płodnego artysty nurtu ukiyo-e w mieście znanym jako [SCOPE.sState('ukiyo_e_state').GetCityHubName] zainspirowały artystów rezydujących zarówno w państwie o nazwie [ROOT.GetCountry.GetName], jak i poza jego granicami."
 japan_events.32.f: "Popularny drzeworyt przedstawia tętniącą życiem dzielnicę teatralną na obrzeżach miasta znanego jako [SCOPE.sState('ukiyo_e_state').GetCityHubName]. Srebrzyste światło księżyca pada na główną ulicę pełną ludzi, których sylwetki rzucają długie cienie. Po wschodniej stronie ulicy ciągną się herbaciarnie i teatry lalek. Naprzeciw, po stronie zachodniej, stoją trzy teatry kabuki, nad każdym z nich wznosi się wieża z bębnem.\n\n„Tylko mistrzowska ręka potrafi prowadzić kreskę tak pewnie i dokładnie, cieniując pracę z subtelnością dokładnie tam, gdzie cień powinien się pojawić. I tylko mistrzowski umysł mógł stworzyć postać o tak rytmicznie uporządkowanej formie – tak silną, a jednocześnie tak niezwykle delikatną”.\nF.W.G., #italic Biuletyn Instytutu Sztuki w Chicago#!"
 japan_events.32.a: "Bez wątpienia sztuka, która powstaje w państwie znanym jako [ROOT.GetCountry.GetNameNoFormatting], będzie zyskiwać coraz większe uznanie na świecie."
 japan_events.32.b: "Świetnie. Zachęcajcie do tworzenia kolejnych dzieł."
 modifier_ukiyo_e_prestige: "Bogata kolekcja drzeworytów"
 modifier_ukiyo_e_production: "Produkcja drzeworytów"
 japan_events.33.t: "Zmagania z tradycją"
 japan_events.33.d: "Efekt przyjmowania kultury zachodu w państwie znanym jako [ROOT.GetCountry.GetNameNoFormatting] jest widoczny gołym okiem. Podczas gdy zwyczaje szybko ulegają zmianą, [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullName] sponsoruje zawody sumo w mieście o nazwie [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] w imię walki z publicznym przeciwstawianiem się tradycji."
 japan_events.33.f: "Tłumy zaciekawione wydarzeniem, które popiera [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle], zaczynają gromadzić się w nowej hali sumo wybudowanej na terenie świątyni. Wśród obecnych znajdują się również arystokraci i mężowie stanu, których fascynacja kulturą Zachodu sprawia, że z pewnym sceptycyzmem podchodzą do podtrzymywania tej tradycji. Choć złoty wiek sumo dawno już przeminął, obecność osoby znanej jako [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] może ponownie umocnić znaczenie tego sportu w oczach społeczeństwa."
 japan_events.33.a: "Starania osoby, którą jest [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle], przywrócą publiczny wizerunek tego sportu."
 japan_events.33.b: "Tradycja związana z tym sportem w państwie o nazwie [ROOT.GetCountry.GetNameNoFormatting] przetrwa długie lata."
 modifier_restored_sumo_popularity: "Przywrócona popularność sumo"
 modifier_traditional_sports_movement_support: "Sport narodowy"
 japan_events.34.t: "Wielorybnicza katastrofa w mieście znanym jako [SCOPE.sState('whaling_state').GetPortHubName]"
 japan_events.34.d: "Załoga łodzi płynącej wzdłuż wybrzeży obszaru administracyjnego znanego jako [SCOPE.sState('whaling_state').GetName] dostrzegła dwa wieloryby biskajskie – matkę i młode. Zdesperowana po sezonie słabych połowów grupa wielorybników wypłynęła w morze mimo złych warunków pogodowych. Zgłoszono zaginięcie ponad 100 osób."
 japan_events.34.f: "Ognisko na łodzi już dawno zniknęło z pola widzenia, a floty nie można dostrzec z brzegu, co wywołuje wielkie poruszenie w mieście o nazwie [SCOPE.sState('whaling_state').GetPortHubName].\n\n– Niezależnie od tego, jak ciężkie były czasy, zawsze unikaliśmy polowania na wielorybią matkę z młodym – argumentuje jeden z mężczyzn. – Powinniśmy byli pozwolić im odpłynąć.\n\n– Nonsens – odpowiada jego kuzyn. – Wieloryby są błogosławieństwem. Jestem pewien, że załoga wkrótce wróci z obfitym połowem."
 japan_events.34.a: "$bg_whaling$ to najważniejsza gałąź przemysłu w obszarze administracyjnym znanym jako [SCOPE.sState('whaling_state').GetNameNoFormatting]."
 japan_events.34.b: "Zamiast tego w przyszłości skupmy swoje wysiłki w obszarze administracyjnym znanym jako [SCOPE.sState('whaling_state').GetNameNoFormatting] na przemyśle, jakim jest rybołówstwo."
 modifier_whaling_deaths: "Ofiary wielorybnictwa"
 modifier_redouble_on_whaling: "Przyszłość w wielorybnictwie"
 modifier_fishing_not_whaling: "Przyszłość w rybołówstwie"
 japan_events.35.t: "Środki zapobiegające podpaleniom"
 japan_events.35.d: "Grupa interesu o nazwie [SCOPE.gsInterestGroup('relevant_ig').GetName] jest zaniepokojona faktem, że przypadki podpaleń w granicach miasta znanego jako [SCOPE.sState('relevant_state').GetCityHubName] sprawiły, że towar o nazwie [SCOPE.sGoods('expensive_good').GetName|l] w państwie znanym jako [ROOT.GetCountry.GetName] osiąga wysokie ceny. Twierdzą oni, że konieczne jest rygorystyczne zwiększenie stosowania środków zapobiegających podpaleniom."
 japan_events.35.f: "Z wieży obserwacyjnej rozbrzmiewa dzwon alarmowy, ostrzegając wszystkich o nadchodzącym niebezpieczeństwie – kolejny pożar w mieście znanym jako [SCOPE.sState('relevant_state').GetCityHubName] zajął domy i zakłady. Brygady przeciwpożarowe przybywają, by ugasić ogień, a w międzyczasie chōnin tłumnie gromadzą się na ulicy. Niektórzy patrzą na sąsiadów z podejrzliwością, inni zaczynają spekulować, czy był to nieszczęśliwy wypadek, czy też za pożarem stoi podpalacz. Jedno jest pewne ceny towaru o nazwie [SCOPE.sGoods('expensive_good').GetNameNoFormatting|l] wkrótce gwałtownie wzrosną."
 japan_events.35.a: "Należy podjąć zdecydowane działania. Stracić podejrzanych o podpalenia."
 japan_events.35.b: "Ułaskaw przestępców, którzy pomogli w aresztowaniach."
 modifier_arson_measure_strict_ig: "Rygorystyczne działania przeciw podpaleniom"
 modifier_arson_measure_strict_pop: "Egzekucje podpalaczy"
 modifier_arson_measure_lenient_ig: "Łagodne działania przeciw podpaleniom"
 # Colonization of Korea Content
 je_colonize_korea: "Rząd Chōsen"
 je_colonize_korea_reason: "#italic „Przemysł i handel odnotują znaczny rozwój pod warunkiem dobrych rządów i pokoju. Mamy absolutną pewność, że pokój w Azji Wschodniej będzie miał dzięki temu silniejsze podstawy niż kiedykolwiek wcześniej”.\n– Zapiski Cesarza Meiji, tom 12#!\n\nNadszedł czas, abyśmy ugruntowali swoją obecność na Półwyspie Koreańskim. Tylko wtedy możemy zapewnić przyszły dobrobyt i bezpieczeństwo państwa o nazwie [JournalEntry.GetCountry.GetName] i całego regionu znanego jako [GetGeographicRegion('geographic_region_east_asia').GetName]. Aby zapewnić sobie należytą kontrolę, będziemy musieli nadzorować rozwój regionu o nazwie [GetGeographicRegion('geographic_region_korea').GetName] i być konsekwentni w naszych ambicjach."
 je_colonize_korea_is_owned_by_tt: "Należy do państwa o nazwie [JournalEntry.GetCountry.GetName]"
 je_colonize_korea_culture_percent_seoul_tt: "[Concept('concept_pop', '$concept_population$')] [GetCulture('japanese').GetName|l] w miejscu o nazwie $STATE_SEOUL$ stanowi co najmniej #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_busan_tt: "[Concept('concept_pop', '$concept_population$')] [GetCulture('japanese').GetName|l] w miejscu o nazwie $STATE_BUSAN$ stanowi co najmniej #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_yangho_tt: "[Concept('concept_pop', '$concept_population$')] [GetCulture('japanese').GetName|l] w miejscu o nazwie $STATE_YANGHO$ stanowi co najmniej #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_sariwon_tt: "[Concept('concept_pop', '$concept_population$')] [GetCulture('japanese').GetName|l] w miejscu o nazwie $STATE_SARIWON$ stanowi co najmniej #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_pyongyang_tt: "[Concept('concept_pop', '$concept_population$')] [GetCulture('japanese').GetName|l] w miejscu o nazwie $STATE_PYONGYANG$ stanowi co najmniej #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_fail_tt: "#bold [GetGeographicRegion('geographic_region_korea').GetName]#! – ten region nie jest już pod kontrolą państwa o nazwie [ROOT.GetCountry.GetName]"
 korea_colinzation_2b_executive_tt: "[concept_executive] otrzymuje modyfikator #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_tt $modifier_peninsula_control_loyal_prominence$#! na następującą liczbę lat: #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!"
 korea_colinzation_2b_company_tt: "[concept_company] otrzymuje modyfikator #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_company_bonus_tt $modifier_peninsula_control_company_bonus$#! na następującą liczbę lat: #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!"
 modifier_peninsula_control_loyal_prominence_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetDesc]"
 modifier_peninsula_control_company_bonus_tt: "[GetStaticModifier('modifier_peninsula_control_company_bonus').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_company_bonus').GetDesc]"
 korea_colinzation_3b_tt: "Ktoś musi odpowiedzieć za to niepowodzenie."
