 korea_colonization.2.t: "Obiecująca przyszłość"
 korea_colonization.2.d: "Świat już wie, że region znany jako [GetGeographicRegion('geographic_region_korea').GetName] stanowi część państwa o nazwie [ROOT.GetCountry.GetName] i jest pod całkowitą kontrolą naszego kraju. Ugruntowując naszą obecność na półwyspie, odnieśliśmy sukces, który dodatkowo potwierdził naszą istotną pozycję na arenie międzynarodowej."
 korea_colonization.2.f: "Wizja zjednoczenia narodów ziściła się, a [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] ma teraz jeszcze większe ambicje. Komponuje poezję tanka w swojej siedzibie w miejscu znanym jako [ROOT.GetCountry.GetCapital.GetCityHubName], wspominając sukces tego przedsięwzięcia, i wyraża zadowolenie z rozwoju sytuacji na półwyspie.\n\nW tym samym czasie, w regionie o nazwie $STATE_SEOUL$, pewna [GetCulture('korean').GetNameNoFormatting|l] urzędniczyna tłumi publiczne oburzenie obywateli sprzeciwiających się nowemu porządkowi społecznemu. Przemawiając do nich z wielkim spokojem, podkreśla, że unia zapewni dobrobyt wszystkim."
 korea_colonization.2.a: "Przyszła pomyślność i bezpieczeństwo półwyspu wyglądają obiecująco."
 korea_colonization.2.b: "Przedsiębiorstwo stanowi integralną część naszych planów."
 modifier_peninsula_control_prestige_authority: "Prestiż półwyspu"
 modifier_peninsula_control_assimilation_migration: "Przyspieszona asymilacja"
 modifier_peninsula_control_loyal_prominence: "Wyjątkowy nadzór"
 modifier_peninsula_control_company_bonus: "Wyróżnienie firmy"
 korea_colonization.3.t: "Stracona szansa"
 korea_colonization.3.d: "Region znany jako [GetGeographicRegion('geographic_region_korea').GetName] nie jest już pod naszą kontrolą. Państwo o nazwie [ROOT.GetCountry.GetName] będzie odczuwać konsekwencje gospodarcze i dyplomatyczne przez wiele lat."
 korea_colonization.3.f: "Urzędnicy państwa o nazwie [ROOT.GetCountry.GetNameNoFormatting], pełni frustracji i niezadowolenia, zbierają się, aby omówić niepowodzenia rządu w utrzymaniu porządku na półwyspie. Wielu odrzuca jakiekolwiek kompromisy co do sposobu poradzenia sobie z tym ciosem dla znacznej potęgi zgromadzonej w ostatnich latach przez państwo znane jako [ROOT.GetCountry.GetNameNoFormatting].\n\nPewien dżentelmen podniósł się, próbując przekrzyczeć uczestników.\n\n– [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] to grupa, która z pewnością może wziąć na siebie odpowiedzialność za tę komplikację."
 korea_colonization.3.a: "Wszyscy musimy dźwigać ciężar porażki tego przedsięwzięcia."
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName] i [SCOPE.gsInterestGroup('relevant_ig').GetName] muszą wziąć na siebie odpowiedzialność za tę porażkę."
 modifier_peninsula_control_prestige_loss: "Zanikająca kontrola"
 modifier_peninsula_control_loyal_prominence_loss: "Kurczące się znaczenie"
 modifier_peninsula_control_approval_pol_str_loss: "Malejący wpływ"
