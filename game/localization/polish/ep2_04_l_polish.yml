 add_western_mission_je_2_tt: "[ROOT.GetCountry.GetNameNoFlag|V] – do dziennika tego państwa zostaje dodany następujący wpis: #v [SCOPE.sCharacter('expedition_leader_2').GetLastName] i [SCOPE.sCharacter('expedition_leader_2').GetCustom('PL_jego_jej')] misja#!"
