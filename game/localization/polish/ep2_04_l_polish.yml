l_polish:
 japan_politics.1.t: "Wiedza praktyczna"
 japan_politics.1.d: "[ROOT.GetCountry.GetName] – otwarcie tego państwa na wpływy zewnętrzne sprawiło, że znaczna część nauk holenderskich utraciła aktualność. [ROOT.GetCountry.GetAdjectiveNoFormatting] społeczność intelektualna podjęła nowe idee – a pierwszą z nich była szkoła „wiedzy praktycznej”."
 japan_politics.1.f: "„Najważniejsze jest, aby każdy kierował swoim postępowaniem wedle zasad humanitaryzmu, pilnie się uczył, zdobywając jak najszerszy zakres wiedzy, oraz rozwijał zdolności odpowiadające potrzebom swojej ojczyzny. W ten sposób rząd będzie mógł łatwiej sprawować władzę, a lud chętniej przyjmie jej autorytet. Każdy pojmie, na czym polega jego rola, przyczyniając się do utrzymania w państwie pokoju. Niech to będzie jedyny nasz cel”.\n\nFukuzawa Yūkichi, „Wezwanie do nauki”" # Translated by Eiichi Kiyooka
 japan_politics.1.a: "Nauka to bogactwo."
 japan_politics.2.t: "Wielkie rody"
 japan_politics.2.d: "W wyniku uprzemysłowienia państwa o nazwie [ROOT.GetCountry.GetName] grupa interesu znana jako [SCOPE.gsInterestGroup('industrialists_ig').GetName] rozszerzyła swoją działalność, wchodząc w sektor produkcyjny. Wykorzystując bogactwo i powiązania z państwem, grupa zdołała skupić pod swoją kontrolą znaczną część bazy przemysłowej."
 japan_politics.2.f: "Minister finansów obserwował z balkonu, jak maklerzy składają oferty. W czasach giełd ryżowych koniec transakcji sygnalizowało wiadro wody wylane prosto na rozgorączkowany tłum.\n\nTeraz rolę tę pełnił człowiek z młotkiem wpatrzony w zegar. Obok jego biurka, w morzu maklerów wyciągających ręce, by kupić siedmioprocentowe obligacje, dostrzegł, jak ktoś podpisuje umowę, ściskając cenny papier w ustach. Panujący hałas ogłuszał – deklaracje kupna i sprzedaży zlewały się w odgłos, który przypominał huk fal rozbijających się o skały wybrzeża.\n\nZegar wybił, a człowiek przy biurku uderzył młotkiem w mosiężny dysk. Z tłumu podniosły się krzyki oburzenia, a gwar ostatnich transakcji tylko przybrał na sile. Pan młotka, mrucząc coś niezadowolony pod nosem, schylił się pod biurko i sięgnął po wiadro."
 japan_politics.2.a: "Odtąd rządzić będą bankierzy."
 japan_politics.3.t: "Zwykli obywatele"
 japan_politics.3.d: "Erozja systemu klasowego Edo doprowadziła do powstania społeczeństwa obywatelskiego opartego na wspólnej tożsamości narodowej. Ci, którzy niegdyś należeli do grupy znanej jako [SCOPE.gsInterestGroup('pb_ig').GetName], zaczęli postrzegać siebie przede wszystkim jako patriotycznych obywateli."
 japan_politics.3.f: "Shizo powoli obracał głowę, przyglądając się nowej fryzurze w mosiężnym lustrze. Była krótsza niż kiedykolwiek wcześniej i pozbawiona koka, który nosił, odkąd tylko pamiętał. Końcówki świeżo przyciętych włosów sprawiały wrażenie grubych i szorstkich, a on nie mógł powstrzymać się od ciągłego dotykania ich ręką.\n\nNagle potrząsnął głową i poczuł, jak pasma falują w sposób, którego wcześniej nie znał. Czuł się tak, jak po włożeniu tego nowego ubrania z wysokim, drażniącym kołnierzykiem – niewygodnego, ale pożytecznego. Odmieniony styl Shizo robił wrażenie i przyciągał mu klientów. W końcu prowadził cywilizowaną działalność. Był podatnikiem, członkiem straży, obywatelem… słowem, człowiekiem cywilizowanym."
 japan_politics.3.a: "Siła narodu jest pokojem jego obywateli."
