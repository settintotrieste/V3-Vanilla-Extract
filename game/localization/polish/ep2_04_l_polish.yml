 iwakura_mission.1.t: "Misja na Zachodzie"
 iwakura_mission.1.d: "Rząd sporządził listę ministrów i urzędników odpowiednich do objęcia funkcji ambasadora nadzwyczajnego i pełnomocnego. Wybrany kandydat poprowadzi ekspedycję na Zachód, która ma potrwać dziesięć miesięcy."
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting] stoi przed lustrem, nerwowo poprawiając krawat; w Japonii zaczęto nosić go jakiś czas temu i choć początkowo uchodził za nieszkodliwą modę, teraz wymagają go przepisy. [SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting] pod krawatem wciąż czuje się dziwnie, ale musi przywyknąć. Jeśli jednak [SCOPE.sCharacter('expedition_leader_1').GetCustom('PL_jego_jej')] inicjatywa wypali, jeśli rząd poprze [SCOPE.sCharacter('expedition_leader_1').GetCustom('PL_jego_jej')] propozycję, wkrótce zawita w Londynie, Bostonie i w Paryżu, gdzie wreszcie pozbędzie się wstrętnego uwiązu."
 iwakura_mission.1.a: "Tym przedsięwzięciem musi zająć się nie kto inny, jak [SCOPE.sCharacter('expedition_leader_1').GetFullName]."
 iwakura_mission.1.b: "Tę rolę ma objąć [SCOPE.sCharacter('expedition_leader_2').GetFullName]."
 iwakura_mission.1.c: "[SCOPE.sCharacter('expedition_leader_3').GetFullName] to osoba, której można powierzyć tę rolę."
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName] może skorzystać z takiej szansy."
 iwakura_mission.2.t: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] i [ROOT.Var('expedition_leader_storage_var').GetCustom('PL_jego_jej')] raport"
 iwakura_mission.2.d: "Misja pod przewodnictwem osoby, którą jest [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName], wróciła do państwa znanego jako $JAP$. [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] wraz z innymi ambasadorami składają raporty organowi władzy o nazwie [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Sprawozdania obejmują obserwacje dotyczące społeczeństwa przemysłowego oraz rekomendacje nowych polityk państwowych."
 iwakura_mission.2.f: "„Głębsza refleksja jasno ukazuje, że sukces narodów europejskich i amerykańskich wynika z właściwego stosowania zasad. Ci, którzy poznali trochę świata, dostrzegają, że choć te kilkanaście zbadanych nacji może różnić się strukturą rządów, pod wspólnym sztandarem jednoczy je skupianie zasobów na edukacji. Tak więc, wkraczając na jedno z tych terytoriów, nie znajdziesz ani jednej mieściny pozbawionej szkoły, ani człowieka, w którym nie płonąłby duch oświecenia”.\n\n– Tanaka Fujimaro"
 iwakura_mission.2.a: "Zachód pokazał nam, czym jest współczesność."
 iwakura_mission.2.b: "[SCOPE.sCountry('iwakura_good_economy_country').GetAdjective] myśl przemysłowa będzie przyszłością Japonii."
 iwakura_mission.2.c: "Polityka [SCOPE.sCountry('iwakura_desired_law_country').GetAdjective|l] może nas sporo nauczyć."
 iwakura_mission.2.e: "[SCOPE.sCountry('iwakura_land_reform_law_country').GetAdjective] reforma rolna ożywi obszary wiejskie."
 iwakura_mission.4.t: "Złota Brama"
 iwakura_mission.4.d: "Po długiej żegludze misja, której przewodzi [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName], dotarła do państwa o nazwie [SCOPE.sCountry('iwakura_mission_host').GetName]. Delegacja zamierza wyruszyć koleją do miasta znanego jako [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName], a po drodze przyjrzeć się miejscowym instytucjom oraz różnym obiektom przemysłowym."
 iwakura_mission.4.f: "„O świcie mgła morska zgęstniała tak bardzo, że widoczność spadła do zaledwie kilku stóp, dlatego załoga statku rzuciła kotwicę i wstrzymała żeglugę do brzasku. Gdy pojaśniało, mgła zaczęła się rozwiewać, a przed nami ukazało się wybrzeże Kalifornii; wkrótce wpłynęliśmy między skaliste cyple, gdzie po obu stronach wznosiły się wysokie góry. Ich zbocza schodziły do cieśniny, którą co rusz przemierzały buchające dymem parowce. Ten piękny widok nosi nazwę „Golden Gate”, czyli „Złota Brama”.\n\nPrzez dwadzieścia dwa dni przemierzaliśmy ocean i dopiero tutaj, na Zachodzie, po raz pierwszy ujrzeliśmy i góry, i wody. Patrzyliśmy na nie w milczeniu, przepełnieni radością”.\n\n– Kume Kunitake, #italic Misja Iwakury 1871–1873#!"
 iwakura_mission.4.a: "Wiedzę tego kontynentu mamy na wyciągnięcie ręki."
 iwakura_mission.4.b: "Ameryka to zaledwie wrota do Europy."
 iwakura_mission.5.t: "W brzuchu giganta"
 iwakura_mission.5.d: "Misja, której przewodzi [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName], pokonała Pacyfik i wpłynęła na wody Atlantyku, by ostatecznie dotrzeć do państwa o nazwie [SCOPE.sCountry('iwakura_mission_host').GetName]. Jej celem jest nawiązanie stosunków dyplomatycznych z rządem, na czele którego stoi [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle], oraz odwiedzenia miejsc narodzin rewolucji przemysłowej."
 iwakura_mission.5.f: "„Wraz z rozwojem Ameryki port w Liverpoolu coraz bardziej rozkwitał. Przy wejściu do niego wzniesiono szereg doków, ciągnących się sześć mil wzdłuż północnego wybrzeża. Od strony morza usypano kamienne nabrzeża niczym mury zamku, a w nich wykuto doki we wszystkich kierunkach; kotwiczy tam każdy wpływający lub wypływający statek. Maszty jednostek przypominają pnie w gęstym lesie, a takielunek wygląda jak sieci rozwieszone do wysuszenia w rybackiej wiosce. Powiedziano nam, że są to największe doki na świecie”.\n\n– Kume Kunitake, #italic Misja Iwakury 1871–1873#!"
 iwakura_mission.5.a: "Chwytajmy wszystko, co może nas tu zainspirować."
 iwakura_mission.5.b: "[SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName] to miasto, które można dobrze poznać w przeciągu dwóch miesięcy."
 iwakura_mission.6.t: "Wyprawa za kontynent"
 iwakura_mission.6.d: "Misja, której przewodzi [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName], przybyła do Europy i zeszła na ląd w państwie o nazwie [SCOPE.sCountry('iwakura_mission_host').GetName]. Jej celem na najbliższe miesiące jest obserwowanie i analizowanie licznych nacji kontynentu oraz nawiązywanie z nimi przyjaznych stosunków."
 iwakura_mission.6.f: "„Tego popołudnia odwiedziliśmy cmentarz, którego nazwy nie zdołaliśmy ustalić. Leży na wschodnich obrzeżach Paryża i zajmuje obszar czterdziestu akrów. Poza jedną szeroką aleją dla powozów omal nie ma tam żadnej wolnej przestrzeni.\n\nTego dnia na cmentarzu odbywał się pogrzeb nieszczęśnika, chyba z niezamożnej rodziny. Drewnianą trumnę odprowadził do grobu niewielki orszak. Gdy kapłan zakończył modlitwę, zebrani – płacząc – rzucali na mogiłę garście ziemi, i choć oczy wszystkich były pełne łez, nikt nie podniósł głośnego lamentu”.\n\n– Kume Kunitake, #italic Misja Iwakury 1871–1873#!"
 iwakura_mission.6.a: "Wszystko poddamy drobiazgowym analizom i porównaniom."
 iwakura_mission.6.b: "Harmonogram wymusza przyspieszone tempo zwiedzania."
 iwakura_mission.8.t: "Druga połowa"
 iwakura_mission.8.d: "W drodze do państwa o nazwie [ROOT.GetCountry.GetName] misja, której przewodzi [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName], zatrzymała się na postój. [SCOPE.sCountry('iwakura_mission_host').GetAdjective] kolonia obszaru znanego jako [SCOPE.sState('iwakura_mission_location').GetName] przez kilka dni była miejscem ich obserwacji – misja badała tam zwyczaje europejskiego społeczeństwa kolonialnego oraz rdzennych wyznawców religii znanej jako [GetReligion('theravada').GetNameNoIcon|l]."
 iwakura_mission.8.f: "„Po okolicach oprowadzał nas mnich, który zwracał się do nas per #italic danna#!, a świątynię nazywał #italic garan#!. Uderzyło nas, że sanskryckie korzenie tych słów wybrzmiewają w nich aż do dziś. Cejlon to święta ziemia buddyjskiej praktyki, gdzie rdzenna ludność wciąż pozostaje wierna buddyzmowi. Żyje się tu prosto, a mnisi w tym przodują. Ich posiłki są skromne, pustelnie porastają chwasty, a wszystko zakrawa o ascetyzm.\n\nW porównaniu z miejscami świętymi chrześcijaństwa czy islamu kontrast jest uderzający. Czy to dlatego, że religia ta odrzuciła światowy splendor? Być może. Ale równie dobrze może jej brakować siły, by rozkwitnąć”.\n\n– Kume Kunitake, #italic Misja Iwakury, 1871–1873#!"
 iwakura_mission.8.a: "Czy taki los mógł spotkać i nas?"
 iwakura_mission.9.t: "Port w Yokohamie"
 iwakura_mission.9.d: "Po wielu miesiącach spędzonych za granicą i opłynięciu całego globu misja, której przewodzi [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName], wróciła do państwa o nazwie [ROOT.GetCountry.GetName]. Przywiozła ze sobą zbiory danych, zagraniczne towary oraz relacje z pierwszej ręki dotyczące zachodnich technologii i instytucji politycznych."
 iwakura_mission.9.f: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] stoi na pokładzie parowca, patrząc na zachód. W oddali majaczy potężna góra Fudżi, spowita poranną mgłą, która dopiero zaczyna się podnosić. Przy relingu tłoczy się grupka cudzoziemców – może kupców, a może świeżo upieczonych obieżyświatów. Na ławce przy drzwiach kabiny siedzi jakiś Niemiec, szkicując w notesie widok rozciągający się przed statkiem. [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] spogląda na tych ludzi i rozmyśla – czy to ich pierwszy raz? A może, tak jak [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetCustom('PL_jemu_jej')], widok ten odbiera im dech, ilekroć go widzą?\n\nIle osób może szczerze przyznać, że zrobiło to, co [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe]? Kto przepłynął trzy oceany, zobaczył cztery kontynenty? [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] dochodzi do wniosku, że takich ludzi będzie coraz więcej. Kolej i parowce otwierają świat coraz większym kręgom, ale to [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe] należy do grona tych, którzy przecierali szlaki."
 iwakura_mission.9.a: "Dom raduje oczy jak żaden inny widok."
 je_iwakura_mission: "Restauracja Meiji: [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] i [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHis] misja"
 je_iwakura_mission_reason: "W ramach działań modernizacyjnych nowy rząd państwa o nazwie [ROOT.GetCountry.GetName] wysłał osobę znaną jako [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] wraz z licznym gronem ministrów i uczonych w dyplomatyczną misję po krajach Zachodu. Celem misji jest negocjowanie niekorzystnych traktatów z państwami zachodnimi oraz prowadzenie badań nad politycznymi i technologicznymi podwalinami wielkich mocarstw.\n\nKażdego #b miesiąca#! pobytu misji w danym państwie istnieje szansa, że zbierze ona informacje dotyczące jego praw lub technologii. Ustalenia te wpłyną na raport, jaki misja sporządzi po powrocie, a także na [Concept('concept_ideology', 'ideologię')] przywódcy ekspedycji."
 iwakura_mission_leader_change_ideology_tt: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] dostosuje swoją [Concept('concept_ideology', 'ideologię')] do [Concept('concept_law', 'praw')] odwiedzonych [Concept('concept_country', 'państw')]"
 iwakura_mission_leader_traits_tt: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] otrzyma [Concept('concept_character_trait', '$concept_character_traits_short$')|l] [GetCharacterTrait('masterful_diplomat').GetName|l] i [GetCharacterTrait('explorer').GetName|l]"
 effects_depend_on_visited_countries_tt: "Dodatkowe efekty będą zależeć od [Concept('concept_law', 'praw')] i [Concept('concept_technology', 'technologii')] odwiedzonych [Concept('concept_country', 'państw')]"
