 ep2_meiji_pulse.1.t: "Prawo do ukarania"
 ep2_meiji_pulse.1.d: "Podczas podróży przez obszar administracyjny o nazwie [SCOPE.sState('relevant_treaty_port_state').GetName] kupiec, w którego żyłach płynie [SCOPE.sCountry('relevant_gp').GetAdjective|l] krew, zostaje zabity przez świtę osoby znanej jako [SCOPE.sCharacter('daimyo_scope').GetFullName] za odmowę zejścia z konia, kiedy ją mijał. Daimyō z domeny [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] uznał to zabójstwo za zgodne z prawem, powołując się na prawo do ukarania każdego, kto go znieważy."
 ep2_meiji_pulse.1.f: "Cudzoziemcy przerwali szyk oddziału muszkieterów i ze wszystkich stron rozległy się krzyki. Dostrzegłszy otaczających go uzbrojonych ludzi, prowadzący formację obcokrajowiec szarpnął wodze w bok, zmuszając konia do ostrego zwrotu, który omal nie wyrzucił jednego z muszkieterów z siodła. Osoba znana jako [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] dobyła miecza; to samo poczynili [SCOPE.sCharacter('name_a_scope').GetHerHis] towarzysze z wewnętrznego kręgu.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] zadaje pierwszy cios i rozcina bok intruza. Ten krzyknął straszliwie i ponownie szarpnął wodze. Na próżno. Najbliższy mu muszkieter dobył własnej broni i uderzył. Czerwona łuna zawisła w powietrzu niczym chmura."
 ep2_meiji_pulse.1.a: "Domena [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] chce jedynie sprawić nam więcej kłopotów."
 ep2_meiji_pulse.11.t: "Sprawa osoby znanej jako [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]"
 ep2_meiji_pulse.11.d: "[SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting], kupiec z kraju o nazwie [ROOT.GetCountry.GetNameNoFlag], zostaje zamordowany podczas prowadzenia interesów w państwie znanym jako [SCOPE.sCountry('japan_scope').GetName]. Sprawcą jest [SCOPE.sCharacter('daimyo_scope').GetFullName], osoba posiadająca liczne ziemie w okolicy. Utrzymuje [SCOPE.sCharacter('daimyo_scope').GetSheHe], że czyn ten był zgodny z prawem obowiązującym na [SCOPE.sCharacter('daimyo_scope').GetCustom('PL_jego_jej')] ziemiach i odmawia wypłaty jakiegokolwiek odszkodowania za swoją zbrodnię."
 ep2_meiji_pulse.11.f: "#b Artykuł#!\n\nPragniemy podkreślić, że w obecnych okolicznościach państwo o nazwie [ROOT.GetCountry.GetNameNoFormatting] nie ma innego wyjścia, jak tylko przygotować się do wojny albo pożegnać się z Japonią raz na zawsze. Porzucenie zdobytej tam pozycji nie wchodzi w rachubę, dlatego możemy spodziewać się konfliktu między dwoma cesarstwami. [SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')] w przeważającej mierze postrzegają tę perspektywę negatywnie, jednak redakcja gazety [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]: [ROOT.GetCountry.GetCapital.GetCityHubName] uważa ją nie tylko za nieuniknioną, lecz także uzasadnioną – choćby z powodu odmowy ukarania przez Japończyków zabójców osoby znanej jako [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]… (#italic ciąg dalszy na stronie 02#!)" #largely copied from The Anglo-Japanese War, New York Times, 1863
 ep2_meiji_pulse.11.a: "#italic Ktoś#! musi za to zapłacić. Porusz tę kwestię w rozmowie z magnatami."
 ep2_meiji_pulse.11.b: "Czy naprawdę chcemy jeszcze bardziej zaangażować się w sprawy Wschodu?"
