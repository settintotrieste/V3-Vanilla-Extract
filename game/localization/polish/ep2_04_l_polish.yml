 iwakura_mission_good_economy_tt: "Odwiedzono wysoko rozwinięte [concept_country|l] przemysłowe"
 iwakura_mission_decision: "Wyślij misję na Zachód"
 iwakura_mission_decision_desc: "Cesarz odzyskał należny mu status, dlatego nasze państwo, #v $JAP$#!, nie może być już biernym obserwatorem. Wyślemy misję dyplomatyczną do wielkich mocarstw świata, by poprawić nasze stosunki z Zachodem i opracować plan modernizacji państwa."
