 # Zaibatsu
 je_zaibatsu: "Cesarstwo korporacyjne"
 je_zaibatsu_reason: "Gwałtowna industrializacja państwa o nazwie [ROOT.GetCountry.GetName] sprawiła, że znacząca część gospodarki znalazła się pod wpływem [concept_zaibatsu|l]. Czerpiąc ogromne zyski z powiązań z instytucjami administracyjnymi, przedsiębiorstwa te stały się kluczowym elementem militarno-przemysłowej struktury państwa znanego jako #v $JAP$#!.\n\nPonieważ [ROOT.GetCountry.GetAdjectiveNoFormatting|l] rezerwa kapitałowa ma skoncentrowany charakter, uczyniła władające nią państwo poważnym konkurentem na międzynarodowej arenie biznesowej – kosztem przekazania coraz większej władzy politycznej zaibatsu i jego wojskowym patronom.[SCOPE.GetRootScope.GetCountry.GetCustom('zaibatsu_democracy_snippet')]\n$ZAIBATSU_LIST_HEADER$$ZAIBATSU_LIST_CONTENT$"
 je_zaibatsu_complete_header: "Aby #b ugruntować#! pozycję zaibatsu:\n"
 je_zaibatsu_on_complete_header: "Po #b ugruntowaniu#! pozycji zaibatsu:\n$EFFECT$"
 je_zaibatsu_fail_header: "Aby #b ograniczyć#! wpływy zaibatsu:\n"
 je_zaibatsu_on_fail_header: "Po #b ograniczeniu#! wpływów zaibatsu:\n$EFFECT$"
 zaibatsu_democracy_info: "\n\nGdy ten [concept_journal_entry|l] jest aktywny, [concept_electoral_confidence|l] będzie spadać o #v 0,5%#! miesięcznie"
 two_more_more_company_slots_tt: "Można założyć więcej [Concept('concept_company', 'firm')]. Minimalna liczba: [SCOPE.ScriptValue('je_zaibatsu_company_slots_threshold')|v0]"
 glossary_zaibatsu: "#b #italic Zaibatsu#!#! to rodzinny i zintegrowany pionowo konglomerat przemysłowo-finansowy.\n\nTypowe zaibatsu jest zorganizowane wokół spółki holdingowej i banku, które posiadają udziały w kilku, zazwyczaj przemysłowych, spółkach zależnych. Zaibatsu wyłoniło się z rodzinnych konglomeratów kupieckich z późnego okresu Edo, które wykorzystały swoje bogactwo i powiązania z państwem w celu skonsolidowania kontroli nad znaczną częścią japońskiej bazy przemysłowej."
 country_levels_owned_by_zaibatsu_100_tt: "Liczba [Concept('concept_building_level', 'poziomów budynku')] w posiadaniu [concept_zaibatsu|l] wynosi więcej niż [SCOPE.ScriptValue('je_zaibatsu_possible_levels_threshold')|v0] (obecnie: [SCOPE.ScriptValue('country_levels_owned_by_zaibatsu')|v0])"
 country_levels_owned_by_zaibatsu_250_tt: "Liczba [Concept('concept_building_level', 'poziomów budynku')] w posiadaniu [concept_zaibatsu|l] wynosi więcej niż [SCOPE.ScriptValue('je_zaibatsu_complete_levels_threshold')|v0] (obecnie: [SCOPE.ScriptValue('country_levels_owned_by_zaibatsu')|v0])"
 fraction_of_country_levels_owned_by_zaibatsu_ge_to_10_tt: "Udział [concept_zaibatsu|l] w posiadaniu [Concept('concept_building_level', 'poziomów budynku')] wynosi co najmniej [SCOPE.ScriptValue('je_zaibatsu_possible_fraction_threshold')|v%0] wszystkich poziomów budynku państwa o nazwie [ROOT.GetCountry.GetName] (obecnie: [SCOPE.ScriptValue('fraction_of_country_levels_owned_by_zaibatsu')|v%])"
 fraction_of_country_levels_owned_by_zaibatsu_ge_to_25_tt: "Udział [concept_zaibatsu|l] w posiadaniu [Concept('concept_building_level', 'poziomów budynku')] wynosi co najmniej [SCOPE.ScriptValue('je_zaibatsu_complete_fraction_threshold')|v%0] wszystkich poziomów budynku państwa o nazwie [ROOT.GetCountry.GetName] (obecnie: [SCOPE.ScriptValue('fraction_of_country_levels_owned_by_zaibatsu')|v%])"
 fraction_of_country_levels_owned_by_zaibatsu_less_than_10_tt: "Udział [concept_zaibatsu|l] w posiadaniu [Concept('concept_building_level', 'poziomów budynku')] wynosi mniej niż [SCOPE.ScriptValue('je_zaibatsu_possible_fraction_threshold')|v%0] wszystkich poziomów budynku państwa o nazwie [ROOT.GetCountry.GetName] (obecnie: [SCOPE.ScriptValue('fraction_of_country_levels_owned_by_zaibatsu')|v%])"
