 shogunate.1.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] obejmuje urząd" # Ieyoshi
 shogunate.1.d: "[SCOPE.sCharacter('shogun_scope').GetFullName], nowa głowa klanu [SCOPE.sCharacter('shogun_scope').GetLastName], otrzymuje z rąk cesarza urząd szoguna. [SCOPE.gsInterestGroup('daimyo_scope').GetName] w większości drwią z nowego władcy, który nie zdołał jeszcze zdobyć autorytetu."
 shogunate.1.f: "Przez wielką salę ō-hiroma płynął barwny orszak daimyō. Na najwyższym podium zasiadał szogun, odziany w czerń i czerwień, a po jego prawej stronie spoczywała szkatuła z cesarskim rozporządzeniem.\n\nWysoko postawione osobistości w czerwonych, niebieskich i fioletowych szatach kłaniały się przed władcą, ofiarując mu miecze i dary ze szczerego złota. Szogun nie przemówił, podobnie jak ci, którzy padali przed nim na twarz. Osoby niższego stanu, którym nie wolno było oglądać ich zwierzchnika, tłoczyły się przed salą. Z ogrodu niósł się chóralny okrzyk."
 shogunate.1.a: "Goshōshin, goshōshin!"
 shogunate.2.t: "Problem z sukcesją"
 shogunate.2.d: "Wątłe zdrowie najstarszego syna osoby, którą jest [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle], wzbudza powszechne obawy – nie wiadomo, czy [SCOPE.sCharacter('iesada_scope').GetFirstName] będzie w stanie wypełniać obowiązki, które obejmie jako spadkobierca roli swojego rodzica. Zewnętrzni daimyō, którym przewodzi [SCOPE.sCharacter('armed_forces_leader').GetFullName], zaczęli popierać alternatywnego kandydata – jest nim [SCOPE.sCharacter('yoshinobu_scope').GetFullName]."
 shogunate.2.f: "[SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] siedzi z zamkniętymi oczami w sypialni, przy łóżku, mając przed sobą pustą kartkę papieru. W pomieszczeniu nie ma nikogo innego. Okiennice zamknięto, a werandę opróżniono. Gdyby korytarzem obok przemknął kot, z pewnością dałby [SCOPE.sCharacter('armed_forces_leader').GetCustom('PL_mu_jej')] się usłyszeć. Mimo to [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] nie ma pewności, czy ktoś [SCOPE.sCharacter('armed_forces_leader').GetCustom('PL_go_jej')] nie podsłuchuje. Na tak wczesnym etapie ambicje najlepiej było trzymać ukryte we własnym umyśle.\n\nCzy dwór cesarski spojrzy na tę sprawę tak samo, jak [SCOPE.sCharacter('armed_forces_leader').GetSheHe]? [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] ma powody, by w to wierzyć, ale jak dotąd wątpliwość ta doskwierała [SCOPE.sCharacter('armed_forces_leader').GetCustom('PL_mu_jej')] w najmniejszym stopniu. [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] błądzi myślami dalej. Jak doprowadzić do ustanowienia dekretu? Jak sprawić, by nie przepadł?"
 shogunate.2.a: "Zwolennicy prawa o nazwie [GetLawType('law_bakufu').GetName|l] dopną swego."
 shogunate.2.b: "Sytuacja wymaga zdecydowanego przywództwa."
 shogunate.3.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] obejmuje urząd" # Iesada
 shogunate.3.d: "[SCOPE.sCharacter('shogun_scope').GetFullName], nowa głowa klanu [SCOPE.sCharacter('shogun_scope').GetLastName], otrzymuje z rąk cesarza urząd szoguna. Wokół świeżo mianowanego władcy, chorowitego już od dzieciństwa, ustawia się już kolejka zastępców."
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "Goshōshin, goshōshin!"
 shogunate.4.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] obejmuje urząd" # Yoshinobu
 shogunate.4.d: "[SCOPE.sCharacter('shogun_scope').GetFullName], nowa głowa klanu [SCOPE.sCharacter('shogun_scope').GetLastName], otrzymuje z rąk cesarza urząd szoguna. Zwolennicy nowego władcy z domen reformatorskich wiążą z nim duże oczekiwania."
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "Goshōshin, goshōshin!"
 shogunate.5.t: "Hitotsubashi i Nanki"
 shogunate.5.d: "Frakcje, które wyłoniły się w związku z sukcesją szoguna Ieyoshiego, znów starły się w sporze o to, kto obejmie tron po bezdzietnym szogunie znanym jako [SCOPE.sCharacter('shogun_scope').GetFullName]. Frakcja Hitotsubashich, skupiająca zewnętrznych daimyō i grupę interesu niższego szczebla, którą są [SCOPE.gsInterestGroup('armed_forces_ig').GetName], popiera osobę znaną jako [SCOPE.sCharacter('yoshinobu_scope').GetFullName], podczas gdy frakcja Nankich, obejmująca wewnętrzną grupę interesu o nazwie [SCOPE.gsInterestGroup('daimyo_ig').GetName], wspiera osobę, którą jest [SCOPE.sCharacter('iemochi_scope').GetFullName]."
 shogunate.5.f: "Posłaniec o kamiennej twarzy spuścił wzrok na podłogę przed mężczyzną na podium. Jego pędzel zawisł nad papierem.\n\n– Wiadomość dla Yoshikatsu-sama – oznajmił urzędnik. – Niektóre skupione wokół dworu osoby zdążyły przywyknąć do niedopuszczalnych spekulacji na temat zdrowia szoguna. Debatują, jakby był niemy. Proszę dać mi znać, jeśli pojawią się jakiekolwiek pisma sporządzone w świetle tego założenia."
 shogunate.5.a: "Zgodnie z wolą szoguna rządy ma sprawować [SCOPE.sCharacter('iemochi_scope').GetFirstName]."
 shogunate.5.b: "Dwór cesarski potrzebuje doświadczonego następcy."
 shogunate.6.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] obejmuje urząd" # Iemochi
 shogunate.6.d: "[SCOPE.sCharacter('shogun_scope').GetFullName], nowa głowa klanu [SCOPE.sCharacter('shogun_scope').GetLastName], otrzymuje z rąk cesarza urząd szoguna. Mimo młodego wieku osoba ta zasłynęła już stoicyzmem i skrupulatnością osądów."
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "Goshōshin, goshōshin!"
 shogunate.6.a_regency: "Będzie sprawować rządy pod okiem lojalnego opiekuna."
 shogunate.6.b_regency: "Idź na kompromis z rodem Hitotsubashich – niech [SCOPE.sCharacter('shogun_scope').GetCustom('PL_jego_jej')] opiekunem zostanie [SCOPE.sCharacter('yoshinobu_scope').GetFirstName]."
 shogunate.7.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] obejmuje urząd" # Iesato
 shogunate.7.d: "[SCOPE.sCharacter('shogun_scope').GetFullName], nowa głowa klanu [SCOPE.sCharacter('shogun_scope').GetLastName], otrzymuje z rąk cesarza urząd szoguna. Jako osoba obyta w świecie i otwarta na nowe idee ma wspierać reformatorskie frakcje opowiadające się za prawem o nazwie [GetLawType('law_bakufu').GetName|l]."
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "Goshōshin, goshōshin!"
 shogunate.8.t: "Upalne lato"
 shogunate.8.d: "[SCOPE.sCharacter('shogun_scope').GetFullName] w podeszłym wieku bardzo źle znosi upały. Skwarne lato nadszarpnęło [SCOPE.sCharacter('shogun_scope').GetCustom('PL_jego_jej')] zdrowie i przykuło [SCOPE.sCharacter('shogun_scope').GetCustom('PL_go_ja')] do łoża. Teraz [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] musi stoczyć ostatnią walkę – z własnym słabnącym sercem."
 shogunate.8.f: "Łoże szoguna zwrócono w stronę okna – służący mieli bowiem nadzieję, że rześka bryza morska wzmocni powiew ich wachlarzy. U stóp łoża postawiono otwartą skrzynię pełną lodu, a na czole chorego położono mokry ręcznik.\n\nTego dnia pogoda była jednak bezwietrzna. Rozgrzane powietrze falowało w blasku zachodzącego słońca, ciężkie i duszące niczym kołdra. Szogun patrzył na kołyszące się za oknem fale, z trudem rozpoznając ich zarysy."
 shogunate.8.a: "To już koniec."
 shogunate.8.b: "Wyślijmy szoguna na terapię holenderską."
