 shogunate_strategy_title_decide_loc: "Podejmij decyzję o strategii reform"
 shogunate_strategy_title_revise_loc: "Popraw strategię reform"
 shogunate_strategy_title_decide_desc_loc: "Aby potęga rodu Tokugawa mogła przetrwać, szogunat musi zostać zreformowany. Zmiany mogą obrać jeden z dwóch kierunków – szogun może dążyć do odnowienia legitymacji szogunatu poprzez zjednoczenie z dworem cesarskim albo spróbować w kontrolowany sposób przywrócić władzę cesarza, by stanąć na czele rządu parlamentarnego."
 shogunate_strategy_title_revise_desc_loc: "Obecna strategia reform szoguna nie przyniosła oczekiwanych rezultatów. Choć zmiana podejścia wiąże się z pewnymi kosztami, najlepiej będzie zboczyć z nieskutecznego kursu."
 je_meiji_restoration_proclaim_imperial_restoration: "Petycja dotycząca cesarskiej restauracji"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "Cesarz pozostaje suwerenem Japonii. Bez sankcji cesarskiej szogun jest jedynie najpotężniejszym z setek daimyō. Przetrwanie lub upadek szogunatu zależeć będzie od woli dworu cesarskiego."
 imperial_restoration_kobu_gattai_loc: "Aby zakończyć kryzys, konieczne jest zjednoczenie szogunatu z dworem cesarskim. Daimyō muszą mieć pewność, że rozkazy szoguna mają wsparcie cesarza oraz że cieszy się on pełnym zaufaniem dworu. Aby to osiągnąć, szogun musi się odsłonić i zdać na cesarza, by ten przywrócił jego autorytet.\n\nTaki plan jest ryzykownym krokiem w nieznane – jeśli dwór cesarski odmówi współpracy, ród Tokugawa pozostanie osamotniony w obliczu żądnych zemsty przeciwników."
 imperial_restoration_kogi_yoron_loc: "Aby zakończyć kryzys, władzę musi objąć cesarz. Jeśli potęga rodu Tokugawa ma przetrwać restaurację, szogun musi przeprowadzić ją na własnych warunkach. Ostatecznym etapem jego reform powinno być przekazanie władzy administracyjnej cesarzowi oraz wyznaczenie nowej roli dla swojego rodu w zreformowanym rządzie cesarskim.\n\nTaki plan jest ryzykownym krokiem w nieznane – jeśli dwór cesarski odmówi współpracy, ród Tokugawa pozostanie osamotniony w obliczu żądnych zemsty przeciwników."
 je_meiji_restoration_imperial_marriage: "Zaaranżuj małżeństwo cesarskie"
 je_meiji_restoration_imperial_marriage_desc: "Projekt #b kōbu gattai#! wymaga ustanowienia najbardziej dosłownej formy unii – politycznego małżeństwa, którego częścią będzie obecny $RULER_TITLE_SHOGUN$ i cesarska księżna. Aby zapewnić powstanie tej unii, $RULER_TITLE_SHOGUN$ musi się przygotować na spełnienie istotnych warunków postawionych przez dwór cesarski."
 je_meiji_restoration_imperial_marriage_conditions_tt: "Aby ukończyć [concept_journal_entry|l] #v $je_meiji_imperial_marriage$#!:\n• $im_closed_borders_tt$\n• $im_free_trade_tt$\n• $im_treaty_port_tt$\n• Jeśli ma zastosowanie: #indent_newline:3 \n• $im_broken_applicable_treaty_tt$"
