 special_character_japanese_emperor: "Cesarz Japonii"
 special_character_japanese_emperor_desc: "Ta postać jest panującym cesarzem Japonii – postacią centralną dla japońskich spraw religijnych i politycznych."
 japan_monarchy.1.t1: "Epoka Kaei"
 japan_monarchy.1.t2: "Epoka Tenkyū"
 japan_monarchy.1.d1: "[SCOPE.sCharacter('emperor_scope').GetFirstName] wstępuje na chryzantemowy tron jako cesarz Japonii. [SCOPE.sCharacter('emperor_scope').GetCustom('PL_jego_jej')|U] intronizacja wyznaczyła początek epoki Kaei, której nazwa oznacza wieczne szczęście."
 japan_monarchy.1.d2: "[SCOPE.sCharacter('emperor_scope').GetFirstName] wstępuje na chryzantemowy tron jako cesarz Japonii. [SCOPE.sCharacter('emperor_scope').GetCustom('PL_jego_jej')|U] intronizacja wyznaczyła początek epoki Tenkyū, której nazwa oznacza niebiańską niezmienność."
 japan_monarchy.1.f: "Z ukrycia muzyk dał znak. Dwie damy dworu odsłoniły zasłony tronu; cesarz siedział za nimi w szkarłatnych szatach zdobionych białymi i zielonymi smokami. Ich przepych i objętość pochłaniały tron, przez co władca zdawał się wręcz unosić w powietrzu. Z korony opadła koralikowa kurtyna, a cień, który rzucała, przysłonił oczy władcy przed spojrzeniami.\n\nSzaty zaszeleściły, kiedy osoba o imieniu [SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting] skłoniła głowę, a potem poszła w ślady innych przybyłych, padających na kolana w wielkiej fali pokłonów. Chwilę później okryta cieniem twarz cesarza zniknęła z oczu zgromadzonych.\n\nOd tego wydarzenia minęło kilka dni. [SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting] zmierza z powrotem do Edo i próbuje odtworzyć w głowie dworskie sceny, lecz wspomnienia ma niekompletne. Oczami wyobraźni widzi koronę, zasłony i szkatuły u boku cesarza… jednak o nim samym w pamięci nie pozostał żaden ślad."
 japan_monarchy.1.a: "Niechaj życie twe liczy tyle lat, ile ziaren piasku spoczywa na brzegu morza."
 japan_monarchy.2.t: "Epoka Meiji"
 japan_monarchy.2.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName] wstępuje na chryzantemowy tron jako cesarz Japonii. [SCOPE.sCharacter('emperor_scope').GetCustom('PL_jego_jej')|U] intronizacja wyznaczyła początek epoki, której nazwa wzięła się od imienia [SCOPE.sCharacter('emperor_scope').GetFirstName] i oznacza obietnicę światłych rządów."
 japan_monarchy.2.f: "W pomieszczeniu zabrzmiał gong, a zasłona uniosła się i przez chwilę widownia ujrzała cesarza odzianego w bogato zdobioną szatę z żółtego jedwabiu, z częściowo przysłoniętą twarzą. Po lewej stronie mężczyzny, na podstawce, spoczywała zielona, lakierowana szkatuła, skrywająca święty miecz i klejnot. Potem mistrz ceremonii wydał znak, a wszyscy spuścili wzrok ku podłodze. Herold przemówił głosem mocnym i równym:\n\n– W pradawnych czasach epoki bogów ustanowiono fundamenty naszego państwa, a następnie, w Kashiharze, boski cesarz zapoczątkował dynastię władców. Jego linia cesarska trwa nieprzerwanie aż po dziś dzień. Zgodnie z pradawnymi zwyczajami i precedensem poprzednich panowań przyjmujemy teraz niebiańską sukcesję i obejmujemy wielki tron cesarski." # Very heavily pared down excerpt of the rites at Meiji's enthronement
 japan_monarchy.2.a: "Niechaj życie twe liczy tyle lat, ile ziaren piasku spoczywa na brzegu morza."
 japan_monarchy.3.t: "Epoka Taishō"
 japan_monarchy.3.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName] wstępuje na chryzantemowy tron jako cesarz Japonii. [SCOPE.sCharacter('emperor_scope').GetCustom('PL_jego_jej')|U] intronizacja wyznaczyła początek epoki, której nazwa wzięła się od imienia [SCOPE.sCharacter('emperor_scope').GetFirstName] i oznacza cnotę wielkiej prawości."
 japan_monarchy.3.f: "Stawiana konstrukcja jęknęła pod ciężarem mężczyzny kroczącego po rusztowaniu. Yatarō trzymał ją jak najmocniej. Kiedy kroki się oddaliły, przystąpił do mocowania jej pobijakiem.\n\nPodobne dźwięki docierały z każdej strony. Yatarō kątem oka dostrzegł kolejny zespół, wznoszący ściany z czarnego drewna w miejscu, w którym miał stanąć sąsiedni budynek. Brygadzista wykrzykiwał jakieś polecenia do robotnika dźwigającego chwiejny pęk strzechy.\n\nZa sześć dni przejściem, które budował, przejdzie sam cesarz – będzie to część ceremonii, która zdarza się tylko raz i kończy zniszczeniem całej konstrukcji. Yatarō nie będzie mógł w niej uczestniczyć. Jedyne, na co mógł liczyć, to ujrzenie w chmurach odbicia jej blasku."
 japan_monarchy.3.a: "Niechaj życie twe liczy tyle lat, ile ziaren piasku spoczywa na brzegu morza."
 japan_monarchy.4.t: "Epoka Shōwa"
 japan_monarchy.4.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName] wstępuje na chryzantemowy tron jako cesarz Japonii. [SCOPE.sCharacter('emperor_scope').GetCustom('PL_jego_jej')|U] intronizacja wyznaczyła początek epoki, której nazwa wzięła się od imienia [SCOPE.sCharacter('emperor_scope').GetFirstName] i oznacza obietnicę oświeconego pokoju i harmonii."
 japan_monarchy.4.f: "Wokół odbiornika radiowego zgromadziły się cztery pokolenia rodziny Takaishich. Głos, który dobiegał z głośnika, brzmiał jakby z dna studni, a co rusz przerywały go trzaski. Giyō kręcił pokrętłem to w jedną, to w drugą stronę. Kiedy sygnał powrócił, dźwięk był wyraźny i równy.\n\n– Główny sekretarz gabinetu wydał reskrypt ogłaszający nową epokę. Oto rozpoczynamy pierwszy rok epoki, której nazwa to [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]…\n\nMatka Giyōego rzuciła szybkie spojrzenie w stronę leżącej na kuchennym stole gazety.\n\n– A nie Kobun? Mówią prawdę?\n\nW pomieszczeniu podniosły się zdezorientowane szepty, a Giyō maksymalnie podkręcił głośność odbiornika. To na nic. Jeśli przekazano jakieś inne ważne informacje, dowie się o nich dopiero jutro, z gazety."
 japan_monarchy.4.a: "Niechaj życie twe liczy tyle lat, ile ziaren piasku spoczywa na brzegu morza."
 japan_monarchy.5.t: "Jeden cesarz, jedna epoka"
 japan_monarchy.5.d: "Przywrócono polityczną dominację dworu cesarskiego, a cesarz ogłosił dekret reformujący system epok. Od tej pory nową epokę ogłaszać się będzie wraz z objęciem tronu przez kolejnego cesarza i będzie ona trwała przez cały okres jego panowania."
 japan_monarchy.5.f: "#bold Dekret imperialny#!\n\nUstanowienie nowej epoki wraz z otrzymaniem przez władcę mandatu niebios stanowi wzór oświeconego panowania i normę na dziesięć tysięcy pokoleń. Będąc spadkobiercą wybitnej linii i osobiście doglądając niezliczonych spraw państwa, zmieniam niniejszym nazwę epoki, wyznaczając nowy początek wszystkim państwom poddańczym. Epoka [ROOT.GetCountry.GetCustom('JAP_era_year_name')] będzie odtąd znana jako pierwszy rok epoki [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]. Od dziś stary system ulega reformie, a zasada jednej nazwy epoki dla jednego władcy stanowić będzie trwałą praktykę." # Shortened 'One Emperor, One Era' edict - 今後年號ハ御一代一號ニ定メ慶應四年ヲ改テ明治元年ト爲ス及詔書
 japan_monarchy.5.a: "Zobowiązuję władców do wdrożenia tego dekretu."
 japan_monarchy.6.t: "Śmierć Daijō Tennō"
 japan_monarchy.6.d: "Emerytowany cesarz, abdykowany ojciec obecnego cesarza Japonii, zmarł. Lud zapamięta [SCOPE.sCharacter('retired_emperor_scope').GetCustom('PL_jego_jej')] wysiłki na rzecz przywrócenia cesarskiego prestiżu. Pośmiertne imię, jakie nadano Daijō Tennō, to [SCOPE.sCharacter('retired_emperor_scope').GetFirstName]."
 japan_monarchy.6.f: "Tōhō zanurzył pędzel w atramencie. Włosie sunęło po papierze, kreśląc znaki oznaczające dzień, rok i pogodę. Wtem mężczyzna przesunął się do kolejnej kolumny tekstu i zawahał.\n\nJak ubrać w słowa to, co zaszło? Jak należycie wyrazić znaczenie tego wydarzenia? Tōhō słyszał pogłoski o staraniach abdykującego cesarza, by odnowić tradycje dworu – przypominał sobie jego panowanie, doniesienia o przywracanych przez niego ceremoniach. A potem przyjął wysłannika dworu i poznał stojącą za wszystkim prawdę.\n\nPędzel dotknął papieru. „Otrzymano prośbę o ustanowienie precedensu dotyczącego tytułu cesarza. Po zapoznaniu się z cesarską dokumentacją genealogiczną wydano następujące zalecenie…”."
 japan_monarchy.6.a: "Czy jego potomkowie spełnią te życzenia?"
