 zaibatsu.1.t: "Cesarstwo korporacyjne"
 zaibatsu.1.d: "Trwałe partnerstwo łączące państwo o nazwie [ROOT.GetCountry.GetName] i grupę interesu znaną jako [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] ugruntowało wpływy konglomeratów w instytucji znanej jako [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Oficjalnie władzę sprawują politycy, lecz realne decyzje podejmują prezesi i dyrektorzy wykonawczy przedsiębiorstw."
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting] spogląda z loży na pojedynek, ledwo powstrzymując się od zaciskania pięści – [SCOPE.sCharacter('pm_scope').GetHerHis] faworyt został zepchnięty na sam skraj ringu wyłożonego ryżową słomą. U boku premiera z niewzruszoną miną stał nie kto inny, jak [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting].\n\nSędzia wskazał wachlarzem. Z dolnych miejsc rozległ się wiwat, a poduszki posypały się na ring niczym deszcz. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting] odwraca głowę w stronę osoby znanej jako [SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting] i uśmiecha się. Po drugiej stronie ringu w ścianę wtopiony był #italic mon#! firmy [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]."
 zaibatsu.1.a: "Niech miasto znane jako [ROOT.GetCountry.GetCapital.GetCityHubName] rozkwita niczym świetlisty kwiat."
 zaibatsu.1.b: "Nie zaszkodzi umocnić naszego łańcucha dostaw."
 zaibatsu.2.t: "Objecie kontrolą"
 zaibatsu.2.t_1: "Zaprowadzenie równości"
 zaibatsu.2.d: "Rząd pod kierownictwem osoby znanej jako [SCOPE.sCharacter('pm_scope').GetLastName] ograniczył grupie interesu o nazwie [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] możliwość sprawowania kontroli nad instytucją znaną jako [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Rządzić będą politycy – dyrektorzy niech skupią się na generowaniu zysków."
 zaibatsu.2.d_1: "Polityka wolnego handlu, którą prowadzi rząd pod kierownictwem osoby znanej jako [SCOPE.sCharacter('pm_scope').GetLastName], niekorzystnie wpłynęła na sieć kontraktów militarno-przemysłowych stanowiących podstawę kontroli grupy interesu o nazwie [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] nad instytucją znaną jako [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Rządzić będą politycy – dyrektorzy niech skupią się na generowaniu zysków."
 zaibatsu.2.f: "Do położonej na najwyższym piętrze sali konferencyjnej w siedzibie firmy [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting] napływa grupa dyrektorów. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] wchodzi jako trzecia osoba, zaraz po sekretarzach. Zajmuje miejsce przy drzwiach i obserwuje, jak obok przechodzą [SCOPE.sCharacter('name_a_scope').GetCustom('PL_jego_jej')] przełożeni. Ze stojącej naprzeciw filiżanki herbaty unosiła się smużka pary.\n\n[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting] wchodzi na sam koniec i po kolei taksuje spojrzeniem każdego pracownika. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] dostrzega w [SCOPE.sCharacter('relevant_zaibatsu_exec').GetCustom('PL_jego_jej')] oczach coś nowego, coś, czego dotąd nie można było dostrzec. Zmęczenie. Cienie na [SCOPE.sCharacter('relevant_zaibatsu_exec').GetCustom('PL_jego_jej')] twarzy wydawały się głębsze niż wcześniej, a srebrne włosy – jeszcze rzadsze."
 zaibatsu.2.a: "Suwerenna władza należy wyłącznie do nas."
 zaibatsu.2.b: "Niech ludzie wiedzą, że instytucji takiej jak [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] nie można kupić."
