 ep2_meiji_pulse.3.t: "Wojna w cieśninie Shimonoseki"
 ep2_meiji_pulse.3.d: "[SCOPE.sCharacter('choshu_daimyo_scope').GetFullName], daimyō domeny Chōshū, sygnalizuje, że wypełni rozkaz cesarza i wygna cudzoziemców. Rozkazuje swojej marynarce wojennej ostrzał wszystkich obcych jednostek przepływających przez cieśninę Shimonoseki, rozpoczynając wymianę ognia z okrętem wojennym płynącym z państwa znanego jako [SCOPE.sCountry('relevant_gp').GetName]."
 ep2_meiji_pulse.3.f: "Nad łagodnym zboczem Hinoyamy przetoczył się grzmot. Masatake podniósł wzrok i ujrzał puszystą, białą chmurę.\n\n– Patrz! – zawołał Jiro. W polu widzenia Masatake pojawiła się dłoń, wskazująca w dół. Okręt pędził pełną parą przez cieśninę w dole, ostrzeliwując z dział coś, czego Masatake nie mógł dostrzec. Z kadłuba sypały się drzazgi, a mimo to jednostka parła naprzód. Ponad tym wszystkim kłębiła się kolejna chmura."
 ep2_meiji_pulse.3.a: "Cudzoziemcy robią to, czego my nie możemy."
 ep2_meiji_pulse.3.b: "Wspomóż domenę w osiągnięciu porozumienia."
 ep2_meiji_pulse.3.c: "Zaoferuj ludziom z zachodu port w zamian za porozumienie."
 treaty_name_shimonoseki_war_indemnity: "Odszkodowania za wojnę w Shimonoseki"
 modifier_defeated_westerners: "Pokonana zachodnia ekspedycja"
 modifier_bombardment_of_domain: "Siedziba domeny pod ostrzałem"
 ep2_meiji_pulse.4.t: "Spalenie przedstawicielstwa państwa o nazwie [SCOPE.sCountry('relevant_gp').GetName]"
 ep2_meiji_pulse.4.d: "Samurajowie #italic sonnō jōi#! z domeny [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] przeprowadzili atak na będący w budowie budynek przedstawicielstwa państwa znanego jako [SCOPE.sCountry('relevant_gp').GetName] w obszarze administracyjnym o nazwie [SCOPE.sState('edo_state').GetCityHubName]. To, co miało być pierwszym budynkiem w stylu zachodnim w mieście, zostało spalone do gołej ziemi, a sprawców do tej pory nie odnaleziono."
 ep2_meiji_pulse.4.f: "Dwaj zamaskowani mężczyźni w kapturach usadowili się na szczycie wzgórza, z którego roztaczał się widok na miejsce, gdzie niegdyś stała placówka legacji. Z jej sczerniałej skorupy wciąż bił pomarańczowy blask. Najbardziej palne materiały zdążyły już się zwęglić, a ogień ledwo pełgał na rozstawionych gęsto belkach.\n\nGdy blask zupełnie przygasł, mężczyźni nie poruszyli się z miejsca. Jeden z nich odezwał się cicho, patrząc na unoszący się słup dymu:\n\n– Byłoby pięknie, gdyby jej popioły spadły na nas niczym śnieg."
 ep2_meiji_pulse.4.a: "Miasto o nazwie [SCOPE.sState('edo_state').GetCityHubName] stało się miejscem, w którym nie da się sprawować rządów."
 ep2_meiji_pulse.4.b: "Zakaż osobom w domenie [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] noszenia broni w mieście."
 shimonoseki_indemnity_tt: "Państwo znane jako [ROOT.GetCountry.GetName] zapłaci odszkodowanie w wysokości #v 3 milionów#! @money! w ciągu #v 10 lat#! państwu o nazwie [SCOPE.sCountry('relevant_gp').GetName]"
 shimonoseki_indemnity_port_tt: "Miasto o nazwie $HUB_NAME_STATE_KANSAI_port_japanese$ w regionie administracyjnym znanym jako [GetStateRegion('STATE_KANSAI').GetName] zostanie otwarte jako [concept_treaty_port|l] państwa o nazwie [SCOPE.sCountry('relevant_gp').GetName]"
 modifier_ungovernable_capital: "Uznana niemożność sprawowania rządów"
 ep2_meiji_pulse.5.t: "Krwawa zemsta"
 ep2_meiji_pulse.5.d: "Główny minister szogunatu, [SCOPE.sCharacter('tairo_scope').GetFullName], zostaje zamordowany przy bramie zamku Edo przez roninów z domen [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] i [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]. Manifest pozostawiony przez zamachowców odzwierciedla zasady #italic sonnō jōi#! i potępia ustępstwa ministra wobec cudzoziemców."
 ep2_meiji_pulse.5.f: "Chuzaburo patrzył, jak Gorokuro występuje przed procesję, a jeden ze strażników z domeny [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] rusza, by go powstrzymać. Gorokuro nie dał mu czasu na reakcję – dobył miecza i rzucił się do ataku. Z rozciętej twarzy nieprzyjaciela trysnęła krew, a jego kompani ruszyli naprzód, by go pomścić.\n\nChuzaburo pozwolił, by jego płaszcz opadł na ziemię, a potem wyciągnął pistolet. Wycelował w odsłonięty bok palankinu i pociągnął za spust. Huk wystrzału przerwał na moment zgrzyt stali i krzyki walczących – chwilę potem rozległ się kolejny. Jeden ze strażników obrócił się gwałtownie w jego stronę, lecz Jizaemon, rōnin z domeny [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], zamachnął się mieczem i wyprowadził cios przez jego tors. Ponad walczącymi Chuzaburo dostrzegł strumień czerwieni sączący się przez drzwi palankinu na ośnieżoną ulicę. Dobył wakizashi i pobiegł w tamtym kierunku."
 ep2_meiji_pulse.5.a: "Samurajowie raz jeszcze krzyżują ostrza."
 modifier_tairo_assassinated: "Morderstwo tairō"
 ep2_meiji_pulse.6.t: "Incydent w gospodzie Ikedaya"
 ep2_meiji_pulse.6.d: "Kierując się informacjami uzyskanymi podczas tortur członka ruchu o nazwie [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName], [GetLawType('law_shinsengumi').GetName|l] przeprowadzają nalot na zgromadzenie domniemanych spiskowców w gospodzie Ikedaya w obszarze administracyjnym znanym jako [SCOPE.sState('kyoto_state').GetName]. Akcja szybko przeradza się w zaciekłą walkę na miecze wewnątrz zajazdu i wokół niego."
 ep2_meiji_pulse.6.f: "Otaka oparł się o balustradę, gdy shinsengumi wyważyli drzwi i wdarli się do środka. W przygaszonym świetle lamp plamy krwi na rękawach ich bladoniebieskich #italic haori#! rzucały się w oczy złowrogim kontrastem. Otaka uniósł miecz, gotów się bronić.\n\nDwóch napastników odłączyło się od reszty i jeden obok drugiego ruszyło w górę schodami, których strzegł. Otaka uderzył, a czując opór stali, skompensował ruch. W powietrzu zatańczyły iskry. Drugi przeciwnik już wyprowadzał cios. Cofnął się o krok, skręcił nieco nadgarstek, a potem…\n\nOtaka zobaczył błysk rozgrzanej stali i poczuł nagle coś zimnego w piersi."
 ep2_meiji_pulse.6.a: "Nagrodź shinsengumi za podjęcie inicjatywy."
 ep2_meiji_pulse.6.b: "Ta brutalność jedynie zachęca do odwetu."
 modifier_shinsengumi_meddling: "Rozzuchwaleni shinsengumi"
 modifier_shinsengumi_crackdown: "Rozbicie shinsengumi"
 modifier_refrained_from_crackdowns: "Okiełznani shinsengumi"
 sufficient_pressure_from_sonno_joi_tt: "[concept_activism] o nazwie [SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')] jest większy niż @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!)"
 ep2_meiji_pulse.7.t: "Zakazana brama"
 ep2_meiji_pulse.7.d: "Wojskowi z domeny [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], która wspiera ruch polityczny o nazwie [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName], próbowali szturmować pałac cesarski w obszarze administracyjnym znanym jako [SCOPE.sState('kyoto_state').GetName] i siłą przywrócić władzę cesarza. Musieli się zmierzyć z przeciwnikami, którymi byli wojskowi z domen [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] i Aizu."
 ep2_meiji_pulse.7.f: "Brama Hamaguri tonęła w dymie wystrzałów, a Kioto stawało powoli w ogniu.\n\nŻołnierze z Aizu skupili się wzdłuż murów i oddawali salwy z muszkietów, a ich kule odbijały się od drogi i łóż dział domeny [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]. Co kilka sekund któraś z nich przeszywała ciało jakiegoś obrońcy, a podnoszące się wówczas krzyki na chwilę przecinały jednostajny huk strzałów. Kōzō kulił się przy kole działa, rozpaczliwie próbując odblokować swój muszkiet. Zaledwie #italic ken#! dalej dowódca jego oddziału leżał twarzą do ziemi – bez nóg, bez rąk, a mimo to nie przestawał się wić."
 ep2_meiji_pulse.7.a: "Wojskowi z domen [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] i Aizu skutecznie odparli atak napastników."
 ep2_meiji_pulse.7.b: "Pałac cesarski jest teraz pod kontrolą domeny [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]."
 coup_resistance_below_daimyo_coup_strength_tt: "[concept_coup_resistance] państwa o nazwie [ROOT.GetCountry.GetName] ([SCOPE.ScriptValue('country_coup_resistance')|v2]) jest mniejszy niż [concept_coup_strength|l] osoby znanej jako [SCOPE.sCharacter('daimyo_1_scope').GetFullName] ([SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2])"
 ep2_meiji_pulse.8.t: "Ekspedycja z domeny [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]"
 ep2_meiji_pulse.8.d: "W odwecie za atak domeny [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] na pałac cesarski szogun nakazał rozpoczęcie ekspedycji mającej na celu wygnanie frakcji #italic sonnō jōi#! z domeny. Doradcy sprzyjający domenie [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] przedstawili plan zapewnienia pokoju w zamian za seppuku winowajców niepożądanej sytuacji."
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting], daimyō domeny [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], stoi na zamkowym balkonie i patrzy w dal. Daleko na horyzoncie niebo plamią smugi dymu unoszące się z ognisk nadciągającej armii.\n\n– Szogun żąda seppuku trzech najwyżej postawionych wasali – mówi sługa. – Ścięcia czterech oficerów sztabowych. Wygnania pięciu ministrów.\n\n[SCOPE.sCharacter('daimyo_1_scope').GetFirstNameNoFormatting] wciąż patrzy na ogniska. Były ich setki, jak nie więcej. Błękitny niegdyś horyzont wyglądał, jakby toczyła go jakaś choroba. I wtedy daimyō odzywa się tymi słowami:\n\n– Domena [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] skapituluje."
 ep2_meiji_pulse.8.a: "Jeśli można ich pokonać bez walki, niech tak będzie."
 ep2_meiji_pulse.8.b: "Domena musi zostać całkowicie oczyszczona."
 modifier_daimyo_house_arrest: "Uwięzieni daimyō"
 modifier_daimyo_executed: "Wywłaszczeni daimyō"
 ep2_meiji_pulse.9.t: "Rozkaz wygnania barbarzyńców"
 ep2_meiji_pulse.9.d: "Rozgniewany traktatami narzuconymi państwu o nazwie [ROOT.GetCountry.GetName] przez zachodnie mocarstwa cesarz pomija szoguna i wydaje edykt nakazujący wypędzenie cudzoziemców z terenów, które stanowi [ROOT.GetCountry.GetAdjectiveNoFormatting|l] ziemia. Bojownicy z ruchu politycznego o nazwie [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] jednoczą się wokół sprawy cesarza."
 ep2_meiji_pulse.9.f: "Wasal stał przy jednym z dział, spoglądając ku cieśninie. O tej porze sunące przez nią parowce malowniczo odcinały się na tle zachodzącego słońca. Z boku niżsi rangą samurajowie domeny Chōshū krzątali się przy wyciorach i workach z czarnym prochem.\n\nGdy wasal spojrzał ku masywie Hinoyamy i miastu Shimonoseki gdzieś w dole, przypomniał sobie fragment dekretu: „Choćby kraj miał obrócić się w popiół, nie dopuścimy do otwarcia portów dla handlu”. Czy było to jakkolwiek uzasadnione? Czy pozwoliłby na to, by łagodne, zielone zbocza sczerniały od ognia, by ukwiecone pola spłonęły, by jego dom legł w ruinie? „Tak”, pomyślał. „Bez chwili wahania”."
 ep2_meiji_pulse.9.a: "Szogun musi udać się do Kioto, by omówić tę sprawę."
 ep2_meiji_pulse.9.b: "Ten rozkaz jest bezprawny i musi zostać uchylony."
