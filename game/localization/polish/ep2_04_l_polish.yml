 modifier_meiji_interregnum: "Bakumatsu"
 modifier_retreat_to_osaka: "Odwrót do Osaki"
 modifier_taikun_proposal: "Taikunat"
 modifier_emperor_decieved: "Zwiedziony cesarz"
 at_least_six_months_tt: "Następujący stan rzeczy utrzymuje się od co najmniej #v 6#! miesięcy (obecnie [ROOT.GetCountry.MakeScope.Var('restoration_timer_var').GetValue|v0]) #indent_newline:3 "
 ep2_meiji.1.t: "Sonnō jōi"
 ep2_meiji.1.d: "Koniec sakoku wzbudził poczucie bezsilności wobec zagranicznej ingerencji, podważając autorytet klanu [ROOT.GetCountry.GetRuler.GetLastName]. Przeciwnicy szogunatu skupili się wokół hasła #italic sonnō jōi#!: „Czcijcie cesarza, wypędźcie barbarzyńców”."
 ep2_meiji.1.f: "Na drugim piętrze gospody w Kioto, z dala od jakichkolwiek okien, tuzin odzianych na czarno rōninów zgromadził się wokół stołu. Na zewnątrz deszcz lał jak z cebra, zagłuszając odgłosy ulicy. Między zgromadzonymi krążyły gniewne szepty – najpierw skargi, potem oskarżenia, aż w końcu przysięga i wyrok śmierci dla intruza.\n\nDaleko stamtąd, w domu górującym nad Iso, mężczyzna w zielonym kimonie obserwował słup dymu wznoszący się ku niebu. Wzgórza rzucały długie cienie na stojące na nabrzeżu konstrukcje. Gdy słońce zbliżało się ku horyzontowi, blask pieców poniżej stawał się coraz bardziej wyraźny. Za nimi dostrzegał odbite w wodzie światła statków. Miał nadzieję, że pewnego dnia jego działa przepędzą je poza horyzont."
 ep2_meiji.1.a: "Musimy dostosować się do nowych okoliczności."
 ep2_meiji.2.t: "Kondycja szogunatu"
 ep2_meiji.2.d: "Reformatorzy szogunatu są podzieleni między dwie koncepcje rządzenia. Według teorii #italic kōbu gattai#! należy dążyć do odnowienia legitymacji prawa [GetLawType('law_bakufu').GetName|l] poprzez zjednoczenie z dworem cesarskim, podczas gdy teoria publicznej debaty popiera dążenie do ustanowienia systemu parlamentarnego kierowanego przez klan [SCOPE.sCharacter('shogun_scope').GetLastName]."
 ep2_meiji.2.f: "Gospodarz postawił na stole tacę z higashi i nalał każdemu z gości miseczkę słabej herbaty. Przy stole siedziało trzech mężczyzn – gospodarz i pierwszy gość mieli włosy związane w chonmage, drugi gość zaś nosił krótką fryzurę. Znad stojących przed nimi miseczek unosiła się para.\n\nGospodarz skierował wzrok na krótko ostrzyżonego mężczyznę i przemówił.\n\n– Gratuluję powrotu, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]-#italic kun#!. Każdy z twoich listów był dla mnie ciekawszy od poprzedniego. Czy opowiesz nam więcej o swoim pobycie wśród barbarzyńców?"
 ep2_meiji.2.a: "Należy przywrócić pozycję szogunatu."
 ep2_meiji.2.b: "Publiczne wyzwolenie jest drogą oświecenia."
 traditionalist_shogun_warning_tt: "@warning! [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] wyznający ideologię, którą kieruje się każdy [GetIdeology('ideology_traditionalist').GetName|l], nie będzie chętnie dążyć do ustanowienia #b rządów parlamentarnych#!"
 traditionalist_shogun_warning_present_tt: "[concept_ruler] #b nie#! wyznaje [Concept('concept_ideology', 'ideologii')], którą kieruje się każdy [GetIdeology('ideology_traditionalist').GetName|l]"
 ep2_meiji.3.t: "Małżeństwo cesarskie"
 ep2_meiji.3.d: "Cesarz zgodził się zaaranżować małżeństwo pomiędzy osobami, którymi są [SCOPE.sCharacter('shogun_scope').GetFullName] i księżna królewskiej krwi, [SCOPE.sCharacter('imperial_princess_scope').GetFullName]. Warunkiem zawarcia małżeństwa jest odrzucenie przez szoguna traktatu znanego jako [SCOPE.sTreaty('relevant_treaty_scope').GetName|l] i powrót do polityki izolacjonistycznej."
 ep2_meiji.3.d2: "Cesarz zgodził się zaaranżować małżeństwo pomiędzy osobami, którymi są [SCOPE.sCharacter('shogun_scope').GetFullName] i księżna królewskiej krwi, [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. Warunkiem zawarcia małżeństwa jest wydalenie cudzoziemców przez szoguna i powrót do polityki izolacjonistycznej."
 ep2_meiji.3.f: "Procesja objęła cały szlak Nakasendō. Pochód trzydziestu tysięcy robotników, wasali i członków dworu księżnej królewskiej krwi, strzeżony przez żołnierzy domeny Owari, ciągnął się od miasta Iijima do stacji Shiojiri. W samym sercu orszaku księżna królewskiej krwi podróżowała w palankinie ze złota i czerwonego jedwabiu. Z boku pochodu jechali samuraje z wielu domen: z [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] i [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], z [SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')] i [SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')], a także z [SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')] i [SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')].\n\nZ wnętrza palankinu księżna spoglądała przez wąską szczelinę między zasłonami. Każde mijane miasto witało zamkniętymi okiennicami i całkowitą ciszą. Miała jeszcze trzydzieści #italic ri#!, by rozmyślać nad swoim losem."
 ep2_meiji.3.a: "Dla dobra państwa."
 has_broken_relevant_treaty_tt: "Złamano następujący traktat: [SCOPE.sTreaty('relevant_treaty_scope').GetName|l]"
 ruler_does_not_have_imperial_marriage_tt: "Osoba znana jako [SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] zmarła bądź ustąpiła ze stanowiska"
 je_meiji_imperial_marriage: "Małżeństwo cesarskie"
 je_meiji_imperial_marriage_reason: "W swojej pogoni z zjednoczeniem dworu cesarskiego i szogunatu szogun [SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] zapewnia sobie polityczne małżeństwo z cesarską księżną znaną jako [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. Zgoda cesarza na to małżeństwo opiera się na wydaleniu cudzoziemców z regionu geograficznego o nazwie [GetGeographicRegion('geographic_region_home_islands').GetName] i powrocie do polityki izolacjonistycznej.\n\nJeśli szogun dotrzyma słowa, małżeństwo to znacząco przyczyni się do zaleczenia rozłamu między władcami de iure i de facto w Japonii."
 je_will_fail_tt: "[concept_journal_entry] zakończy się #b porażką#!"
 je_has_timed_out_tt: "Czas na ukończenie [Concept('concept_journal_entry', 'wpisu w dzienniku')] #b dobiegł końca#!"
 ep2_meiji.4.t: "Wojna roku [ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')]"
 ep2_meiji.4.d: "Wyalienowana przez zajęcie jej ziem i tytułów osoba, którą jest [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('shogun_scope').GetFullName], wraz ze swoimi podwładnymi rozpoczęła przewrót wymierzony w dwór cesarski. Chce odwrócić zmiany, które przywróciły władzę cesarstwu i oddać ją w ręce zwolenników szogunatu."
 ep2_meiji.4.f: "– Wasz sługa, [SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting], po starannym rozważeniu wydarzeń od dziewiątego dnia ubiegłego miesiąca, dochodzi do wniosku, że żadne z tych zdarzeń nie wynika z prawdziwych intencji dworu cesarskiego, lecz w całości z knowań zdradzieckich ministrów pana [SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting]. Wie o tym cały kraj, a zwłaszcza Edo, Nagasaki oraz prowincje Yashū i Sōshū, gdzie doszło do niepokojów.\n\nPonieważ czyny te są pogardzane zarówno przez niebo, jak i przez ludzi, błagamy Waszą Cesarską Mość o wydanie dekretu nakazującego poddanie się wspomnianych zdradzieckich ministrów. Jeśli jednak prośba ta nie zostanie spełniona, nie pozostanie nam nic innego, jak przystąpić do ich egzekucji." # Edited petition by Yoshinobu
 ep2_meiji.4.a: "Oto nasze życzenie: zabić zdrajcę i przywrócić pokój." # Emperor Meiji's plausibly fraudulent imperial decree of 1867
 ep2_meiji.4.b: "Cesarz znalazł się pod wpływem bandytów."
 ep2_meiji.41.d: "Rozwścieczona wysiłkami klanu [SCOPE.sCharacter('shogun_scope').GetLastName] mającymi na celu zachowanie władzy koalicja domen restauracjonistów zbuntowała się przeciwko osobie znanej jako [SCOPE.sCharacter('shogun_scope').GetFullName]. Chcą oni przywrócić polityczną wyższość cesarza i uwolnić go spod wpływów klanu Tokugawa."
 ep2_meiji.41.d_1: "Koalicja domen zjednoczonych pod hasłem „sonnō jōi”, rozwścieczona odmową wydalenia cudzoziemców przez rząd w mieście o nazwie [ROOT.GetCountry.GetCapital.GetCityHubName], podniosła bunt. Jej członkowie dążą do obalenia doradców cesarza opowiadających się za westernizacją i wypędzenia obcych wpływów z Japonii."
 ep2_meiji.41.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] stoi na murach zamku, spoglądając w dół. Przed nim, rząd za rzędem, armia domeny [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] opuszczała właśnie bramy – część wojskowych nosiła nowe, ciemnoniebieskie umundurowanie ze stożkowatymi hełmami, inni zaś prezentowali tradycyjne stroje w kolorze czerwonym, zielonym i niebieskim. Tych w nowych mundurach umieszczono na czele kolumny; zagraniczni obserwatorzy, który również zajęli miejsce na szczycie twierdzy, spoglądali na nich z uznaniem. Za piechurami podążali konni samurajowie z muszkietami, a po nich artyleria.\n\nNa obrzeżach miasta znanego jako [SCOPE.sState('revolter_state').GetCityHubName] znajdował się punkt zborny, gdzie żołnierze mieli połączyć sił z oddziałami sprzymierzonych domen, by wspólnie ruszyć na armię szoguna. Gdzieś daleko od tego miejsca, za ścianą mieczy i bagnetów, na pomoc oczekiwał uwięziony cesarz."
 ep2_meiji.41.f_1: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] stoi na murach zamku, spoglądając w dół. Przed nim, rząd za rzędem, armia domeny [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] opuszczała właśnie bramy – część wojskowych nosiła nowe, ciemnoniebieskie umundurowanie ze stożkowatymi hełmami, inni zaś prezentowali tradycyjne stroje w kolorze czerwonym, zielonym i niebieskim. Tych w nowych mundurach umieszczono na czele kolumny, a wielobarwne morze sansaibaori sunęło za nimi. Dalej podążali konni samurajowie z muszkietami, a po nich artyleria.\n\nNa obrzeżach miasta znanego jako [SCOPE.sState('revolter_state').GetCityHubName] znajdował się punkt zborny, gdzie żołnierze mieli połączyć sił z oddziałami sprzymierzonych domen, by wspólnie ruszyć na armię lojalistów. Gdzieś daleko od tego miejsca, za ścianą mieczy i bagnetów, na pomoc oczekiwał uwięziony cesarz."
 ep2_meiji.41.a: "Trzeba powstrzymać tych fanatyków."
 ep2_meiji.41.b: "Sonnō jōi!"
 kinmon_civil_war_tt: "Państwo o nazwie [ROOT.GetCountry.GetName] opanuje #r wojna domowa#! toczona między #b szogunatem#! a #b dworem cesarskim#!"
 ep2_meiji.5.t: "Taisei Hōkan"
 ep2_meiji.5.d: "W obliczu rosnącej presji przeciwników prawa znanego jako [GetLawType('law_bakufu').GetName|l], [SCOPE.sCharacter('shogun_scope').GetFullName] wysuwa petycję do cesarza, by przywrócić zwierzchnictwo w rządzie dworowi cesarskiemu."
 ep2_meiji.5.f: "„Jeśli władza nie zostanie ponownie skupiona w rękach dworu cesarskiego, nawet fundamenty naszego państwa się nie ostaną. Dlatego w tej chwili musimy zreformować dawne zwyczaje i oddać władzę administracyjną w ręce dworu cesarskiego.\n\nPo otrzymaniu wszystkich możliwych porad całego kraju i uzyskaniu ostatecznego osądu Waszej Cesarskiej Mości szczerze wierzę, że jeśli wszystkie serca zjednoczą się w służbie dla państwa, będziemy mogli wspólnie chronić nasz cesarski kraj i stanąć jako równi wśród narodów świata”.\n\nYoshinobu Tokugawa, 1867"
 ep2_meiji.5.a: "Pod jego stopami nie było nic, prócz powietrza."
 ep2_meiji.51.t: "Sankcja cesarska"
 ep2_meiji.51.d: "Cesarz wystosował odpowiedź na petycję osoby znanej jako [SCOPE.sCharacter('shogun_scope').GetFullName], która chciała przywrócenia władzy zwierzchniej cesarskiemu dworowi. Petycja szoguna została zaakceptowana, a dominacja polityczna cesarza przywrócona."
 ep2_meiji.51.f: "„Cesarz Japonii ogłasza władcom wszystkich obcych państw i ich poddanym, że szogun [SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] otrzymuje pozwolenie na przekazanie władzy zgodnie z własnym żądaniem. Odtąd będziemy sprawować najwyższą władzę we wszystkich sprawach wewnętrznych i zewnętrznych kraju. W związku z tym tytuł cesarza należy zastąpić tytułem taikun, w odniesieniu do którego zawarto traktaty. Mianujemy obecnie urzędników do spraw zagranicznych. Zwracamy się do przedstawicieli mocarstw traktatowych o uznanie niniejszego oświadczenia”."
 ep2_meiji.51.a: "Niesamowite emocje."
 ep2_meiji.52.t: "Sankcja cesarska"
 ep2_meiji.52.d: "Cesarz wystosował odpowiedź na petycję osoby znanej jako [SCOPE.sCharacter('shogun_scope').GetFullName], która chciała przywrócenia władzy zwierzchniej cesarskiemu dworowi. Zgodnie z otrzymaną odpowiedzią szogun nadal ma zaufanie dworu, a zwierzchnictwo nad rządem pozostanie w rękach szogunatu."
 ep2_meiji.52.f: "W zamku o nazwie [ROOT.GetCountry.GetCustom('japan_choshu_castle_name')] rozbrzmiewało echo kroków. Posłańcy i poddani przez cały dzień krążyli w tę i z powrotem, nosząc coraz bardziej szczegółowe opisy wydarzeń z ubiegłego tygodnia. Osoba znana jako [SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting] osobiście odbierała wieści, nie wypowiadając ani słowa na żadnym ze spotkań. Z każdą kolejna informacją na jego czole pojawiało się więcej zmarszczek – triumfalny pochód szoguna, oddziały Aizu strzegące pałacu cesarskiego.\n\nPrzed pałacem słońce już zaszło. [SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting] spogląda ze sceny na dwudziestu zebranych służących.\n\n– Domena Chōshū nie ulegnie – mówi. – Musicie to dobrze zrozumieć.\n\nWstaje i opuszcza komnatę."
 ep2_meiji.52.a: "Otaczają go gałęzie."
 ep2_meiji.6.t: "Rozporządzenie dotyczące restauracji"
 ep2_meiji.6.d: "Zasiadający na dworze przeciwnicy klanu [SCOPE.sCharacter('shogun_scope').GetLastName] przekonali cesarza, aby wydał rozporządzenie formalnie przywracające mu władzę. Dekret ten znosi władzę szogunatu i tworzy rząd, który wyklucza osobę, którą jest [SCOPE.sCharacter('shogun_scope').GetFullName], z pełnienia jakiejkolwiek funkcji politycznej."
 ep2_meiji.6.f: "„[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] prosi o przywrócenie powierzonej mu dawno temu władzy administracyjnej i pragnie obecnie zrezygnować z funkcji szoguna. Jego propozycja została przyjęta. Kraj stoi w obliczu bezprecedensowych zagrożeń, którymi – jak powszechnie wiadomo – zmarły cesarz zajmował się z najwyższą uwagą. W związku z tym, na mocy mądrej decyzji Jego Cesarskiej Mości, postanowiono położyć fundamenty pod przywrócenie władzy cesarskiej i odnowienie godności państwa.\n\nOdtąd urzędy sessho, kanpaku i szoguna zostają zniesione, a w ich miejsce ustanawia się trzy nowe urzędy: wielkiego radcy, radcy stanu oraz radcy dworu. Wszystkie decyzje będą podejmowane w drodze rozsądnych narad, bez rozróżnienia między urzędnikami cywilnymi i wojskowymi oraz między szlachtą a pospólstwem”." #- Modifier text of the Great Proclamation of the Restoration of Imperial Rule
 ep2_meiji.6.a: "Samotność w ciemności."
 ep2_meiji.7.t: "Taikunat"
 ep2_meiji.7.d: "Ponieważ dwór cesarski nie ma w zanadrzu osoby zdolnej sprawować rzeczywistą władzę, sojusznicy klanu [SCOPE.sCharacter('shogun_scope').GetLastName] przekonali cesarza, aby przyznał osobie, którą jest [SCOPE.sCharacter('shogun_scope').GetFullName], tytuł taikuna i przydzielił jej władzę nad urzędem cesarskim."
 ep2_meiji.7.f: "„Obrady rozpoczną się, gdy zbiorą się wszyscy daimyō. Duch czasu wymaga skupienia się na obradach publicznych – to sformułowanie jest szeroko komentowane – i nieuniknione jest podążanie za opinią publiczną. Dlatego też usilnie proszę, aby w miarę możliwości dyskusje te zakończyły się porozumieniem i by podjęte zostały kroki do właściwego określenia celu zgromadzenia.\n\nJeśli w trakcie obrad dojdzie do sporu i wybuchnie konflikt, nawet jeśli zakończy się to zwycięstwem waszego rodu, będzie to równoznaczne z kłótnią braci, podczas gdy obce narody nacierają na nas z zewnątrz”.\n\nNishi Shūsuke, „Projekt porządku obrad”"
 ep2_meiji.7.a: "Znów na bezpiecznym gruncie."
 ep2_meiji.8.t: "Dwór i szogunat"
 ep2_meiji.8.d: "[SCOPE.sCharacter('shogun_scope').GetFullName] zawiera związek małżeński i tym samym wchodzi do rodziny cesarskiej. Składając cesarzowi śluby, łagodzi napięcia między dworem a szogunatem. Dzięki temu cesarz może dalej wieść życie w odosobnieniu, ufając, że szogun zapewni krajowi trwały pokój."
 ep2_meiji.8.f: "Nawet jeśli w kraju\nBędą szaleć burzliwe wiatry\nZaczekam na nie\nAby przywrócić słońcu na niebie\nJego dziewiczy blask\n\nCesarz Kōmei"
 ep2_meiji.8.a: "Burza ustała."
 ep2_meiji.9.t: "Pierwsi wśród równych sobie"
 ep2_meiji.9.d: "Dzięki pewnym i zręcznym posunięciom [SCOPE.sCharacter('taikun_scope').GetFullName] skutecznie przywraca cesarzowi jego status, a przy tym ratuje swój klan przed utratą wpływów. W rezultacie państwo znane jako $JAP$ przechodzi pod pieczę taikunów z rodu [SCOPE.sCharacter('taikun_scope').GetLastName], którzy obejmą rządy jako pierwsi wśród równych sobie."
 ep2_meiji.9.f: "Cesarz nie siedział już za parawanem. Ministrowie zajęli miejsca przy stojącym przed nim stole – taikun usiadł po lewej stronie od zwierzchnika – a każdy miał na sobie nowy dworski uniform z misternymi aplikacjami ze złota na rękawach i piersiach. Medale pobrzękiwały i szeleściły, kiedy urzędnicy poprawiali się na nieznanych im jeszcze siedzeniach.\n\nPrzez ostatnią godzinę taikun prowadził obrady, podczas gdy cesarz nie odezwał się ani słowem. Zadowalał się słuchaniem, przenosząc uwagę kolejno na każdego z mówców. Po drugiej stronie sali dawny zwolennik idei #italic sonnō jōi#! mówił o konieczności wysłania misji do Ameryki."
 ep2_meiji.9.a: "Kiedy szogun upada, taikun rozwija skrzydła."
 ep2_meiji.9.b: "Cesarz jest synem niebios, a Tokugawowie to narzędzia w jego rękach."
