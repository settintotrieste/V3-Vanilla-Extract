 castle_hagi: "Hagi"
 ep2_meiji_pulse.2.t: "Bombardowanie miasta znanego jako [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]"
 ep2_meiji_pulse.2.d: "W odwecie za to, że domena [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] odmówiła zapłaty odszkodowania za śmierć osoby znanej jako [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting], okręty z państwa o nazwie [SCOPE.sCountry('relevant_gp').GetName] wdały się w wielodniowe walki artyleryjskie ze strażą przybrzeżną miasta znanego jako [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]."
 ep2_meiji_pulse.2.f: "Zatokę zasnuwa dym armatniej kanonady, a miasto o nazwie [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] stoi w płomieniach. Na horyzoncie jeden z okrętów najeźdźców kieruje ogień w stronę odlewni na północy miasta. Przy każdym wystrzale nikłe światło zachodzącego słońca ginie w upiornej, czerwonej łunie.\n\nOstatnia sprawna armata na baterii osoby znanej jako [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] ryknęła – choć warunki sprzyjały i strzał był daleki, nie mógł już poprawić fatalnego położenia obrońców. Kula przecięła fale niedaleko trzeciego okrętu w kolumnie wroga, wyrzucając w powietrze potężny słup wody. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] chwyta za wycior i dopada do działa. Gdzieś na tyłach rozlegają się krzyki mężczyzn ranionych poprzednią salwą. Nie zagłusza ich nawet drażniące dzwonienie w uszach."
 ep2_meiji_pulse.2.a: "Wysoka cena za lekkomyślność."
