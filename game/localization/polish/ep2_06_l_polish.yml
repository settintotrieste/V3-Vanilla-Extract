l_polish:
 japan_earthquakes.1.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')] – wielkie trzęsienia ziemi"
 japan_earthquakes.1.d: "W ciągu czterech dni trzy trzęsienia ziemi na wybrzeżu wyrządziły szkody na dużym obszarze, a powstałe fale pływowe jeszcze nasiliły skutki tych zniszczeń w rejonach przybrzeżnych."
 japan_earthquakes.1.f: "W mgnieniu oka cała wioska dostrzegła to zjawisko. Najwyraźniej nikt nie poczuł wcześniejszych drgań gruntu, ale wszyscy byli najwyraźniej zdumieni ruchami wody. Biegli na plażę, a nawet dalej, aby je obserwować. Po raz pierwszy na tym wybrzeżu zaobserwowany taki odpływ. Pojawiły się rzeczy nigdy wcześniej nie widziane; odsłonięte zostały nieznane przestrzenie pofałdowanego piasku i fragmenty porośniętych wodorostami skał, czego świadkiem był Hamaguchi. I nikt z ludzi tam obecnych zdawał się nie domyślać, co oznacza ten monstrualny odpływ.\n\nLafcadio Hearn, #italic Żywy Bóg #!"
 japan_earthquakes.1.a: "Poproś o wsparcie sąsiednich daimyō."
 japan_earthquakes.1.b: "Niech lokalni władcy zajmą się akcją pomocy."
 earthquake_assisting_daimyo: "Wspieranie sąsiednich daimyō"
 earthquake_affected_daimyo: "Pokłosie trzęsienia ziemi"
 japan_earthquakes.2.t: "[SCOPE.sState('japan_earthquake_state').GetCityHubName] [ROOT.GetCountry.GetCustom('JAP_era_name')] – trzęsienie ziemi"
 japan_earthquakes.2.d: "U wybrzeży obszaru administracyjnego znanego jako [SCOPE.sState('japan_earthquake_state').GetName] doszło do wielkiego trzęsienia ziemi, które spowodowało ogromne szkody w mieście o nazwie [SCOPE.sState('japan_earthquake_state').GetCityHubName] i położonym w nim zamku."
 japan_earthquakes.2.f: "Kiedy ryciny przedstawiające wielkiego suma Namazu po raz pierwszy zyskały na popularności po trzęsieniu ziemi, wydawały się zgodne z tradycyjnymi opowieściami. Stworzenie przedstawiano jako ujarzmione przez bogów, aby zapobiec kolejnym trzęsieniom ziemi.\n\nZ czasem jednak jego wizerunki ewoluowały. Na jednej rycinie Namazu rozcinał sobie brzuch i krwawił monetami. Na innej budowlańcy dzielili z nim napitki. Do dzieła sztuki wkradł się satyryczny akcent sugerujący, że pomimo katastrofy, jaką sprowadziła ta bestia, być może przynosiła również coś dobrego."
 japan_earthquakes.2.a: "Nasi wasale w mieście znanym jako [SCOPE.sState('japan_earthquake_state').GetCityHubName] potrzebują pomocy!"
 japan_earthquakes.2.b: "Bogactwo musi płynąć do tych, którzy mogą odbudować zniszczenia."
 earthquake_vassal_support: "Wsparcie wasali"
 earthquake_rebuilding_focus: "Odbudowa po trzęsieniu ziemi"
 earthquake_rebuilding_redistribution: "Naprawianie świata"
 japan_earthquakes.3.t: "Trzęsienie ziemi w Mino-Owari"
 japan_earthquakes.3.d: "W samym sercu państwa znanego jako [ROOT.GetCountry.GetName] doszło do wielkiego trzęsienia ziemi, które zabiło tysiące ludzi i spowodowało duże pęknięcia skalne w całym regionie."
 japan_earthquakes.3.f: "– Reakcją ludzi zawsze było postrzeganie katastrof jako przestępstw. Często pytali o sprawcę i w ten sposób powstawały mityczne stworzenia i demony, które rzekomo odpowiadały za trzęsienia ziemi.\n\nWspółczesny sejsmolog musi odrzucić przesądy, ale ironicznie rzecz biorąc, niekiedy wciela się w rolę detektywa badającego miejsce zbrodni. Jakie budowle zostały zniszczone? Jak zostały zniszczone? Wszystkie te pytania ostatecznie nie prowadzą do sprawcy, a do przebiegu zdarzenia i jego przyczyny."
 japan_earthquakes.3.a: "Zaproś zagranicznych uczonych, aby zbadali te uskoki."
 japan_earthquakes.3.b: "Wykorzystaj tę wiedzę do stworzenia większej liczby obserwatoriów meteorologicznych."
 japan_earthquakes.3.c: "Przygotuj się na ewentualne wstrząsy wtórne."
 meteorological_observatories: "Obserwatoria meteorologiczne"
 meteorological_observatories_cost: "$meteorological_observatories$"
 earthquake_bracing_for_aftershocks: "Przygotowanie się na wstrząsy wtórne"
 japan_earthquakes.4.t: "Trzęsienie ziemie u wybrzeży Sanriku"
 japan_earthquakes.4.d: "Potężna fala tsunami, wywołana trzęsieniem ziemi u wybrzeży Sanriku, uderzyła w obszar administracyjny znany jako [SCOPE.sState('japan_earthquake_state').GetName]. W obliczu jej niszczycielskiego wpływu zasugerowano wzniesienie pomników ostrzegających przed kolejnymi falami."
 japan_earthquakes.4.f: "– Wznoszenie pomników zmarłym to za mało. Żywi również nie potrzebują symboli przypominających im o nieszczęściu, które ich spotkało. Każdy, kto znajdzie wiadomość wyrytą w kamieniu, będzie wiedział, że jego przodkowie mówili mu coś, o czym należy pamiętać. To pomniki dla tych, którzy jeszcze się nie narodzili."
 japan_earthquakes.4.a: "Obszar administracyjny znany jako [SCOPE.sState('japan_earthquake_state').GetName] potrzebuje takich pomników."
 japan_earthquakes.4.b: "Wzniesiemy pomniki w miejscach uderzenia fali tsunami!"
 japan_earthquakes.4.c: "Musimy skoncentrować nasze wysiłki na chwili obecnej."
 tsunami_stones: "Pomniki pamięci o fali tsunami"
 tsunami_relief_efforts: "Działania pomocowe w związku z falą tsunami"
 japan_earthquakes.5.t: "Wielkie trzęsienie ziemi w Kantō"
 japan_earthquakes.5.d: "W pobliżu miasta znanego jako [SCOPE.sState('japan_earthquake_state').GetCityHubName] doszło do potężnego trzęsienia ziemi, niespotykanego dotąd w historii. W ciągu kilku minut katastrofa zrównała z ziemią znaczną część miasta i zabiła setki tysięcy ludzi."
 japan_earthquakes.5.f: "Jeśli ściana wody, która nastąpiła po wstrząsach, wydawała się największym zagrożeniem, to nic nie znaczyła w porównaniu z pożarami. Wkrótce w płomieniach stanęło nie tylko całe miasto, ale ziemia i wiatr również zdawały się płonąć.\n\nLudzie, którym udało się uciec z płonących budynków, zostali uwięzieni w cyklonie płomieni, jakby celem ognia było pochłonięcie każdego żywego stworzenia. Miasto znane jako [SCOPE.sState('japan_earthquake_state').GetCityHubName] stało się urzeczywistnieniem piekieł."
 japan_earthquakes.5.a: "Naród japoński musi się zjednoczyć, aby stawić czoła temu zniszczeniu!"
 japan_earthquakes.5.b: "Ten cios wymierzony w nasze bogactwo materialne to przestroga przed zepsuciem."
 japan_earthquakes.5.c: "Musimy skorzystać z tej okazji, aby miasto znane jako [SCOPE.sState('japan_earthquake_state').GetCityHubName] stało się bardziej nowoczesne."
 earthquake_national_tragedy: "Tragedia narodowa"
 earthquake_divine_punishment: "Kara boska"
 earthquake_modernization: "Zmodernizowana rekonstrukcja"
 earthquake_modernization_land_confiscation: "Przekształcenie gruntów"
 shinbutsu_bunri_decision: "$je_shinbutsu_bunri$"
 shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$"
 elevate_buddhism_decision: "$je_elevate_buddhism$"
 elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$"
 je_shinbutsu_bunri: "Shinbutsu bunri"
 je_shinbutsu_bunri_reason: "Po przywróceniu władzy cesarza musimy wyodrębnić i umocnić rodzime tradycje religijne, które uznają świętość linii cesarskiej. Aby to osiągnąć, konieczne jest oddzielenie ich od obcego wpływu buddyzmu, który przez stulecia splatał się z kultem kami w synkretycznych praktykach. Wykorzystując niezadowolenie z powiązań buddyjskich instytucji z szogunatem, możemy utorować drogę shintō jako nadrzędnej zasadzie państwa."
 je_taikyo_proclamation_button: "Proklamacja Taikyō"
 je_taikyo_proclamation_button_desc: "Uczyńmy shintō – kult kami i oddawanie czci cesarzowi – nadrzędną zasadą państwa."
 je_taikyo_proclamation_conversion_tt: "Każdy przywódca [Concept('concept_interest_group', 'grupy interesu')] ma #v 75%#! szansy na przejście na religię o nazwie [GetReligion('shinto').GetName|l]."
 je_elevate_buddhism: "Podniesienie statusu buddyzmu"
 je_elevate_buddhism_reason: "Instytucje buddyjskie w państwie znanym jako $JAP$ mają silne historyczne powiązania z administracyjnym ramieniem szogunatu. Skoro raz udało się zapobiec jego upadkowi, ich wzmocnienie może pomóc utrzymać jego władzę i umocnić tradycje religijne niezwiązane z kultem cesarza."
 je_elevate_buddhism_goal: "$je_communism_2_goal$"
 arahitogami: "Arahitogami"
 extended_danka_system: "Rozbudowany system danka"
 japan_religion.1.t: "Jingū-ji"
 japan_religion.1.d: "W świątyniach często zdarza się, że mnisi buddyjscy odprawiają rytuały jednocześnie z praktykami shintō. Wraz z rozdzieleniem tych religii rola mnichów staje pod znakiem zapytania."
 japan_religion.1.f: "– Jakiż jest cel tych rytuałów? Mają prowadzić kami ku oświeceniu? Poprawiać ich karmę? To jasno sugerowałoby, że kami nie są istotami godnymi czci, lecz zagubionymi bytami, które potrzebują przewodnictwa. Nie będziemy dłużej tolerować takich insynuacji!"
 japan_religion.1.a: "Zażądaj, aby mnisi zmienili wiarę i zostali kapłanami shintō."
 japan_religion.1.b: "Odbierz mnichom ich tytuły."
 japan_religion.1.c: "Zostaw mnichów w spokoju."
 forced_monk_conversions: "Zmuszono mnichów do zmiany wiary"
 monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$"
 monks_stripped_of_titles: "Mnisi odarci z tytułów"
 monks_left_to_duties: "Zostawiono mnichów w spokoju"
 japan_religion.1.a.tt: "[GetPopType('clergymen').GetName] – [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] tej zbiorowości przejdzie na religię o nazwie [GetReligion('shinto').GetName|l]"
 japan_religion.2.t: "Honji suijaku"
 japan_religion.2.d: "Powszechnie przyjmuje się, że buddowie objawili się w Japonii jako kami, co odzwierciedla się w terminach takich jak [concept_gongen|l], traktujących je jako dwa aspekty tej samej istoty. Taka terminologia wzmacnia wpływy buddyzmu w społeczeństwie."
 japan_religion.2.f: "– Dawniej miało to sens. Amaterasu jest uosobieniem słońca. Tę samą rolę pełnią Dainichi Nyorai i Wajroczana. Jednak słońce jest tylko jedno, nie stanowi też odbicia innego światła – świeci samodzielnie, tylko i wyłącznie dzięki własnej mocy. A dziś w państwie o nazwie [ROOT.GetCountry.GetNameNoFormatting] jest miejsce tylko dla jednego słońca."
 japan_religion.2.a: "Zakaż koncepcji [concept_gongen|l]."
 japan_religion.2.b: "Zakaż określania Hachimana mianem [Concept('concept_boddhisattva', 'bodhisattwy')]."
 japan_religion.2.c: "Powstrzymaj się od ingerowania w terminologię."
 banned_syncretic_terminology: "Zakazano terminologii synkretycznej"
 retained_syncretic_terminology: "Zachowano terminologię synkretyczną"
 japan_religion.2.a.tt: "[GetPopType('farmers').GetName] – [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] tej zbiorowości przejdzie na religię o nazwie [GetReligion('shinto').GetName|l]"
 japan_religion.2.b.tt: "[GetPopType('soldiers').GetName] – [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] tej zbiorowości przejdzie na religię o nazwie [GetReligion('shinto').GetName|l]"
 japan_religion.3.t: "To dla ciebie bije dzwon"
 japan_religion.3.d: "Próba usunięcia wpływów buddyzmu sprawiła, że w państwie narosły silne nastroje antybuddyjskie. Majątki świątyń są przejmowane i niszczone – jedne burzone, inne pozbawiane religijnej ikonografii."
 japan_religion.3.f: "Zbliżając się do świątyni, nagle przystanął. Dwa niō – potężne posągi Buddy strzegące wejścia – zniknęły. Na ich miejscu ziała pusta przestrzeń.\n\nWchodząc do środka, nie potrafił pozbyć się wrażenia, że mimo całej swojej czystości świątynia nie jest już tak bezpieczna jak dawniej. Przypominała teraz bramę pozbawioną straży."
 japan_religion.3.a: "Przetopić świątynne dzwony na działa!"
 japan_religion.3.b: "Posągi Buddy ze świątyń mają zostać zniszczone albo usunięte."
 japan_religion.3.c: "Zostawcie świątynie nietknięte."
 smelted_temple_bells: "Przetopiono świątynne dzwony"
 smelted_temple_bells_opinion: "$smelted_temple_bells$"
 removed_buddha_statues: "Usunięto posągi Buddy"
 removed_buddha_statues_opinion: "$removed_buddha_statues$"
 retained_buddhist_iconography: "Zachowano ikonografię buddyjską"
 japan_religion.4.t: "Biuro ds. spraw shintō"
 japan_religion.4.d: "Dążenia do ujednolicenia praktyk shintō i włączenia państwowych kami do lokalnych rytuałów spotykają się z oporem mnichów i kapłanów, którzy uznają to za zerwanie z tradycją."
 japan_religion.4.f: "– Shintō nie polega na bezrefleksyjnym powielaniu lokalnych praktyk, zniekształconych i skażonych obcymi wpływami. Tradycje domu cesarskiego, prawdziwych potomków niebios, muszą być nauczane w całym państwie o nazwie [ROOT.GetCountry.GetNameNoFormatting]. Tylko to przywróci shintō jego czystą formę."
 japan_religion.4.a: "Egzekwuj wykładnię państwową."
 japan_religion.4.b: "Miejscowi kapłani wiedzą, co będzie pasować do lokalnych rytuałów."
 standardized_priest_training: "Standaryzacja szkolenia kapłanów"
 standardized_priest_training_opinion: "$standardized_priest_training$"
 deferred_to_local_priests: "Przekazano decyzyjność miejscowym kapłanom"
 deferred_to_local_priests_opinion: "$deferred_to_local_priests$"
 japan_religion.5.t: "Konfucjanizm i shintō"
 japan_religion.5.d: "W procesie rozdzielania buddyzmu i shintō pod znakiem zapytania stanęła rola konfucjanizmu. Wielu uczonych uważa go za zgodny z shintō, inni zaś odrzucają go jako kolejny przejaw zewnętrznych wpływów."
 japan_religion.5.f: "– Konfucjanizm mógł przybyć tymi samymi drogami co buddyzm, lecz nie ma sprzeczności między nim a kultem kami. Przeciwnie – wierzenia te wzajemnie się uzupełniają i obejmują jednakowe zasady relacji między niebem a ziemią, władcą a poddanym."
 japan_religion.5.a: "Konfucjanizm stanowi istotne uzupełnienie shintō."
 japan_religion.5.b: "Musimy przywrócić shintō do jego dawnej formy."
 fukko_shinto: "Fukko shintō"
 japan_religion.6.t: "Chrześcijaństwo w otwartym kraju"
 japan_religion.6.d: "Choć państwo o nazwie [ROOT.GetCountry.GetName] otworzyło się na cudzoziemców, kwestie religijne wciąż podlegają państwowym regulacjom. Dla krajów chrześcijańskich swoboda napływu misjonarzy może być równie istotna jak kwestie handlowe."
 japan_religion.6.f: "– Chrześcijaństwo najbardziej umiłowało swoich wyznawców w śmierci – śmierci za wiarę ponad wszystko. Każdy spalony czy też ukrzyżowany misjonarz staje się kolejnym rozdziałem opowieści, którą zapoczątkował człowiek na krzyżu. Może pora przestać dostarczać im męczenników?"
 japan_religion.6.a: "Misjonarze muszą mieć swobodę głoszenia swojej wiary."
 japan_religion.6.b: "Wiarę tę można praktykować, ale nie szerzyć."
 japan_religion.6.c: "Chrześcijaństwo było i pozostaje obcym zagrożeniem."
 permitted_christianity: "Zezwolono na praktykowanie chrześcijaństwa"
 christianity_disallowed: "Zabroniono praktykowania chrześcijaństwa"
 japan_religion.7.t: "Intelektualne spuścizny"
 japan_religion.7.d: "Państwo o nazwie [ROOT.GetCountry.GetName] ma długą tradycję rozmaitych szkół buddyzmu, z których wiele wciąż cieszy się pewnymi wpływami. Wraz ze wzrostem znaczenia politycznego grupy interesu znanej jako [SCOPE.gsInterestGroup('devout_ig').GetName] jedna z nich zaczyna się jednak wyróżniać."
 japan_religion.7.f: "– Na przestrzeni wieków w państwie znanym jako [ROOT.GetCountry.GetNameNoFormatting] powstawały nowe szkoły buddyzmu. Nie ma powodu, by sądzić, że jedna wyprze pozostałe. Obecna sytuacja wymaga jednak pewnego przywództwa i obrania konkretnego kierunku politycznego. Zapewne niektóre szkoły wykorzystają to bardziej niż inne."
 japan_religion.7.a: "Szkoła Czystej Krainy."
 japan_religion.7.b: "Szkoła zen."
 japan_religion.7.c: "Szkoła nichiren."
 japan_religion.7.e: "Szkoła shingon."
 pure_land_buddhism: "Szkoła Czystej Krainy"
 zen_buddhism: "Szkoła zen"
 shingon_buddhism: "Szkoła shingon"
 japan_religion.8.t: "Słowa Buddy"
 japan_religion.8.d: "Wraz z otwarciem państwa o nazwie [ROOT.GetCountry.GetName] na świat uczeni buddyjscy wykazują zainteresowanie tłumaczeniem zagranicznych tekstów, pragnąc włączyć ich idee do współczesnego buddyzmu."
 japan_religion.8.f: "– Nie powinniśmy pozwolić, by ograniczały nas wykształcone wskutek izolacji ortodoksje. Nie możemy obawiać się odkrywania prawdy w nieoczekiwanych miejscach. Nauki Buddy przebyły długą drogę, by do nas dotrzeć. Badanie ich korzeni i potencjału do rozwoju może nas tylko wzbogacić."
 japan_religion.8.a: "Teksty sanskryckie i palijskie, korzenie buddyzmu."
 japan_religion.8.b: "Teksty chińskie, najbliższe naszym szkołom rozumowania."
 japan_religion.8.c: "Dzieła filozofów europejskich do badań porównawczych."
 japan_religion.9.t: "Wojowniczy mnisi"
 japan_religion.9.d: "Trwające działania wojenne zapoczątkowały w grupie interesu znanej jako [SCOPE.gsInterestGroup('devout_ig').GetName] debatę na temat roli buddyzmu we wspieraniu kraju podczas zbrojnego konfliktu."
 japan_religion.9.f: "– W przeszłości mnisi nie wahali się bronić swoich świątyń. Czy my powinniśmy się wahać, gdy chodzi o obronę naszego narodu? Życia nie należy odbierać lekkomyślnie, ale czy państwo znane jako [ROOT.GetCountry.GetName] zdecydowałoby się na wojnę, która nie prowadziłaby do trwałego pokoju i nie ocaliłaby więcej istnień, niż ich pochłonie?"
 japan_religion.9.a: "Siła jest konieczna, aby zapewnić trwały pokój."
 japan_religion.9.b: "Brak przemocy ponad wszystko."
 war_buddhism: "Buddyzm w czasie wojny"
 peaceful_buddhism: "Buddyzm w czasie pokoju"
 japan_religion.10.t: "Yōshoku"
 japan_religion.10.d: "Od końca sakoku w miastach portowych coraz popularniejsze stają się restauracje mięsne, które obsługują obcokrajowców. Stawia to pod znakiem zapytania zakaz jedzenia obowiązujący mięsa w państwie znanym jako [ROOT.GetCountry.GetName]."
 japan_religion.10.f: "„Przepraszam, ale wołowina z pewnością jest najsmaczniejsza, prawda? Kiedy już się człowiek przyzwyczai do jej smaku, nie będzie w stanie wrócić do jelenia czy dzika. Zastanawiam się, dlaczego w Japonii nie jedliśmy wcześniej tak czystej rzeczy?”\n\n– Kanagaki Robun, #italic Aguranabe#!"
 japan_religion.10.a: "Musimy znieść ten zakaz w imię lepszego odżywiania i kulinarnej ekspansji!"
 japan_religion.10.b: "Nie pozwolimy, aby ta barbarzyńska praktyka się przyjęła!"
 maintained_meat_ban: "Utrzymano zakaz spożywania mięsa"
 maintained_meat_ban_opinion: "$maintained_meat_ban$"
 japan_religion.11.t: "Ład świata kami"
 japan_religion.11.d: "Oddzielenie praktyk shintoistycznych i buddyjskich okazało się sukcesem. Wpływ starych instytucji religijnych słabnie i nadchodzi nowa era oddania bogom, cesarzowi i państwu o nazwie [ROOT.GetCountry.GetName]."
 japan_religion.11.f: "– [ROOT.GetCountry.GetNameNoFormatting] to dom dla wielu wyznań i wielu rytuałów. I starych, i nowych. Naszym celem nie było wyeliminowanie jednych na rzecz innych. Chodziło o wytyczenie granicy między głęboko wyznawanymi przekonaniami a niekwestionowanymi prawdami."
 japan_religion.11.a: "Boskość jest absolutna."
 japan_religion.12.t: "Równowaga"
 japan_religion.12.d: "Po burzliwym dla państwa o nazwie [ROOT.GetCountry.GetName] okresie przewrotów grupa interesu znana jako [SCOPE.gsInterestGroup('devout_ig').GetName] zdołała umocnić swoją pozycję autorytetu religijnego w kraju i wzmocniła swoje więzi z państwem o nazwie [ROOT.GetCountry.GetGovernment.GetName]."
 japan_religion.12.f: "„Ludzie mówią o Drodze Bogów. Jeśli takowa istnieje,\nnie ludziom nią stąpać; jeno bogowie\nstąpać mogą świętą ścieżką bogów”.\nHagura Toman" # Arthur Lloyd, Poems by Buddhist Priests of Japan
 japan_religion.12.a: "Ścieżka jest jasna."
 japan_religion.13.t: "$je_taikyo_proclamation_button$"
 japan_religion.13.d: "Proklamacja Wielkiej Doktryny, uznającej kult kami i cześć dla boskiego cesarza za zasady państwa o nazwie [ROOT.GetCountry.GetName] i obowiązek jego obywateli."
 japan_religion.13.f: "– Szacunek dla kami i miłość do naszego kraju są ze sobą nierozerwalnie związane; to pierwszy filar.\n\nZasady Nieba i Droga Człowieka są ze sobą nierozerwalnie powiązane; to drugi filar.\n\nCześć dla cesarza i posłuszeństwo woli dworu są ze sobą nierozerwalnie związane; to trzeci filar."
 japan_religion.13.a: "Muszą być one usłyszane w całym kraju!"
 concept_gongen: "Gongen"
 concept_gongen_desc: "Budda manifestujący się jako kami, łączący miejscowe bóstwo ze zwiastunem buddyjskiego oświecenia."
 concept_boddhisattva: "Bodhisattwa"
 concept_boddhisattva_desc: "W buddyzmie oświecona istota i nauczyciel, który pomaga innym osiągnąć nirwanę."
