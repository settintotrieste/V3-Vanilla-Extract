l_polish:
 je_sakoku: "Kraj w izolacji"
 je_sakoku_reason: "Od czasów Kan’ei i początków potęgi Tokugawy państwo znane jako $JAP$ było krajem zamkniętym dla obcych. Dozwolony był jedynie niewielki handel z kilkoma wybranymi państwami w wyznaczonych portach. Choć ten system przetrwał ponad dwa stulecia, świat zaczyna się zmieniać w sposób, który utrudnia utrzymanie kraju w izolacji, nawet jeśli $JAP$ i ośrodki interesów tego państwa chciałyby, aby wszystko już na zawsze pozostało bez zmian. Jeśli nie uda się powstrzymać zagranicznych prób otwarcia naszych ziem, będziemy musieli importować ich idee, a także ich towary."
 je_sakoku_meiji_restoration: "#b Szogun#! został obalony i do władzy powraca #b cesarz#!"
 je_sakoku_stop_being_closed_button: "[GetLawType('law_sakoku').GetName] – uchylenie prawa"
 je_sakoku_stop_being_closed_button_desc: "Eskalacja sytuacji i rosnąca presja z zagranicy sprawiły, że zniesienie prawa [GetLawType('law_sakoku').GetName|l] wywołało stan wyjątkowy. W tych okolicznościach możemy być w stanie siłą zakończyć stary system izolacji, ale rozwścieczy to wszystkich, którzy nadal popierają stare prawo."
 notification_morrison_incident_has_incidented_name: "Państwo znane jako $JAP$ atakuje kupca"
 notification_morrison_incident_has_incidented_desc: "Przedsiębiorczy kupiec z naszych ziem próbował złamać ograniczenia, które państwo o nazwie $JAP$ nałożyło na zagraniczne statki handlowe, i został ostrzelany przez baterię artylerii lądowej, co popsuło stosunki między naszymi narodami."
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners: "Lekka ręka do obcokrajowców"
 caved_to_foreign_pressure_opposition: "Ustąpienie pod naciskiem zagranicznym"
 caved_to_foreign_pressure_government: "Ustąpienie pod naciskiem zagranicznym"
 overdue_break_with_tradition: "Spóźnione zerwanie z tradycją"
 forced_transition_from_tradition: "Przymusowe odejście od tradycji"
 the_picked_lock_modifier: "Drzwi otwarte wytrychem"
 sakoku_entrenched_modifier: "Okopany sakoku"
 meiji_failure_modifier: "Nieudane reformy restauracji Meiji"
 ep2_sakoku.1.t: "Niepokojąca porażka [SCOPE.sCountry('opium_wars_loser').GetAdjectiveNoFormatting|l]"
 ep2_sakoku.1.d: "Nasz ogromny i czcigodny sąsiad, którym jest państwo znane jako [SCOPE.sCountry('opium_wars_loser').GetName], właśnie przegrał wojnę o opium i handel z jakimś ambitnym, zamorskim krajem. Jeśli nawet państwo o nazwie [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] nie jest w stanie kontrolować własnego rynku i nie wpuszczać obcokrajowców to jak chcemy utrzymać prawo [GetLawType('law_sakoku').GetName|l] na swoich ziemiach?"
 ep2_sakoku.1.f: "– Cała ziemia, wszystkie bogactwa, cała potęga, jaką posiadali – nic nie mogło się równać z potęgą, którą wystawiono przeciwko nim. Obcokrajowcy już teraz błagają, żeby ich wpuścić do naszego kraju. Czy pójdziemy za przykładem państwa znanego jako [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] i, podobnie jak ono, spróbujemy ich powstrzymać, dopóki ich działa nie zasypią naszych miast ogniem? Czy też poszukamy własnej drogi? Musimy podjąć decyzję teraz, zanim te żelazne siły i działa wkroczą na nasze wody i podejmą decyzję za nas."
 ep2_sakoku.1.a: "Należy teraz rozważyć to, co wydaje się nie do pomyślenia."
 ep2_sakoku.1.b: "Należy teraz zaakceptować to, co wydaje się nie do pomyślenia."
 end_sakoku_button_now_available: "Opcja przymusowego wczesnego zniesienia prawa [GetLawType('law_sakoku').GetName|l] będzie teraz widoczna we wpisie w dzienniku $je_sakoku$."
 ep2_sakoku.2.t: "Otwarcie drzwi wytrychem"
 ep2_sakoku.2.d: "W obliczu narastającego zamieszania wywołanego przez siły wewnętrzne i zewnętrzne, [GetLawType('law_bakufu').GetName|l] postanawia naciskać na natychmiastowe zniesienie prawa [GetLawType('law_sakoku').GetName|l]."
 ep2_sakoku.2.f: "Tłum kupców wdarł się do urzędu celnego. Naprzeciw nich stał samotny, zapracowany urzędnik.\n\n– Tak, to oczywiście oznacza, że ​​kraj nie będzie już odizolowany.\n\nTłum zalał go dziesiątkami pytań, których brzmienie przypominało dziki ryk.\n\n– Co będzie zamiast tego? Nie jestem… Nie jestem pewien. Może będzie… nie, czekajcie… Ta decyzja nie należy ani do mnie, ani do was, nie możecie po prostu…\n\nKażda jego odpowiedź prowokowała kolejne pytania. „Praca była o wiele prostsza, gdy kraj był pozostawiony samemu sobie”, pomyślał."
 ep2_sakoku.2.a: "Przyszłością państwa o nazwie [ROOT.GetCountry.GetNameNoFormatting] jest prawo [GetLawType('law_mercantilism').GetName|l]."
 ep2_sakoku.2.b: "Prawo [GetLawType('law_free_trade').GetName|l] wyzwoli państwo o nazwie [ROOT.GetCountry.GetNameNoFormatting]."
 ep2_sakoku.2.c: "Prawo [GetLawType('law_protectionism').GetName|l] pozwoli nam na ostrożny handel z obcokrajowcami"
 ep2_sakoku.3.t: "[SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting] – incydent"
 ep2_sakoku.3.d: "Kupiec z państwa o nazwie [SCOPE.sCountry('morrison_incident_country').GetName] podjął próbę zignorowania ścisłych protokołów prawa [GetLawType('law_sakoku').GetName|l] i prowadzenia handlu w nieusankcjonowanym porcie. Jego statek o nazwie #italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#! został zmuszony od odpłynięcia przez ostrzał baterii nadbrzeżnych. Relacje z państwem znanym jako [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting], o ile w ogóle istnieją, uległy pogorszeniu."
 ep2_sakoku.3.f: "Dowódca uśmiechnął się szeroko, gdy kula armatnia w końcu trafiła w statek. Prawo stanowiło wyraźnie: statek nie może żeglować po tych wodach. Nie obchodziło go, co myśli jego kapitan. Chciał tylko, żeby statek zawrócił i odpłynął. "
 ep2_sakoku.3.a: "Miejscowy garnizon zrobił to, co do niego należało."
 ep2_sakoku.3.b: "Powinniśmy wysłać państwu o nazwie [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] oficjalne przeprosiny i wypłacić kupcowi odszkodowanie, aby załagodzić sytuację."
 ep2_sakoku.3.c: "Jest to doskonała okazja, aby zastanowić się nad koniecznością obowiązywania prawa [GetLawType('law_sakoku').GetName|l]"
 ep2_sakoku.4.t: "Drzwi otwarte wytrychem"
 ep2_sakoku.4.d: "Pod wpływem nacisków wewnętrznych i zewnętrznych prawo [GetLawType('law_sakoku').GetName|l] zostało zniesione. Państwo znane jako [ROOT.GetCountry.GetNameNoFormatting] otworzyło się na nową przyszłość."
 ep2_sakoku.4.f: "Urzędnik spojrzał na zatokę. Przy nabrzeżu stały nowe statki. Nieznane mu, powiewające flagami, których nigdy wcześniej nie widział. Co mają one do zaoferowania państwu o nazwie [ROOT.GetCountry.GetNameNoFormatting]? Co chcą mu odebrać?\n\nJego wzrok na długo zatrzymał się na zacumowanych statkach, zanim w końcu się odwrócił. Oczy nie dadzą mu odpowiedzi, której pragnął. Tylko czas pokaże, co ta nowa epoka przyniesie jego ojczyźnie."
 ep2_sakoku.4.a: "Dziś Japonia otwiera się!"
 ep2_sakoku.5.t: "Zamknięci na cztery spusty"
 ep2_sakoku.5.d: "Ciągłe obowiązywanie prawa [GetLawType('law_sakoku').GetName|l] w państwie o nazwie [ROOT.GetCountry.GetNameNoFormatting], pomimo zmian politycznych wstrząsających krajem, nie wróży dobrze jakiejkolwiek nadziei na wyrwanie się z narzuconej sobie izolacji. Wygląda na to, że prawo [GetLawType('law_sakoku').GetNameNoFormatting|l] pozostanie w mocy."
 ep2_sakoku.5.f: "Urzędnik spojrzał na zatokę. Stare statki stały przy nabrzeżu, te same, które widział jego ojciec, dziadek czy przodkowie przez kilka pokoleń wstecz. Czy te same statki zobaczą też jego dzieci? Jego wnuki? Czy ten widok kiedykolwiek ulegnie zmianie?\n\nJego wzrok na długo zatrzymał się na zacumowanych statkach, zanim w końcu się odwrócił. Oczy nie dadzą mu odpowiedzi, której pragnął. Tylko czas pokaże, czy jego ojczyzna już na zawsze pozostanie niezmieniona."
 ep2_sakoku.5.a: "Drzwi pozostają zamknięte."
 meiji.14.t: "Powierzchowna restauracja Meiji"
 meiji.14.d: "Pomimo wielkich obietnic reform promowanych przez nowy rząd epoki [ROOT.GetCountry.GetCustom('JAP_era_name')], państwo o nazwie [ROOT.GetCountry.GetNameNoFlag] nie przeszło żadnych istotnych zmian. Krytycy ubolewają, że ciężko im dostrzec różnice po restauracji Meiji."
 meiji.14.f: "Po hali fabrycznej niosły się sapanie i stukot ogromnego silnika parowego, który swoją pracą wprawiał w ruch potężne koło zamachowe i napędzał wielkie tokarki oraz wiertarki. Maszyny te produkowały nowe lufy, zamki i spusty dla sporego nowego arsenału broni. Wkrótce jakiś naród miał wykorzystać tę parę i żelazo, by odcisnąć swoje piętno na świecie, ale nie będzie to naród państwa znanego jako [ROOT.GetCountry.GetNameNoFormatting]."
 meiji.14.a: "Dzisiejsze promienie słońca padają na marzenie."
 je_end_edo_system_button_name: "Zakończ system klasowy Edo"
 je_end_edo_system_button_desc: "System kastowy w obecnej epoce reformy i odrodzenia jest niczym innym jak kulą u nogi. Każdy obywatel może być ważną częścią państwa, niezależnie od swojej pozycji w społeczeństwie."
 edo_system_not_support_enforcement_tt: "Nie popiera ustanowienia prawa o nazwie [GetLawType('law_intermediate_edo_system').GetName|l] lub [GetLawType('law_strict_edo_system').GetName|l]"
 edo_system_ends_tt: "[ROOT.GetCountry.GetNameNoFlag] – to państwo całkowicie znosi [Concept('concept_social_hierarchy', '$edo_system$')|l]"
 notification_edo_system_disappears_name: "Upadek systemu Edo"
 notification_edo_system_disappears_desc: "W związku z ostatnimi zmianami kulturowymi i społecznymi system Edo nie jest już uznawany za [Concept('concept_social_hierarchy', 'hierarchię społeczną')] w następującym państwie: [SCOPE.sCountry('relevant_country_scope').GetName]."
 notification_edo_system_disappears_tooltip: "#header $notification_edo_system_disappears_name$#!\n$TOOLTIP_DELIMITER$\n$notification_edo_system_disappears_desc$"
 je_meiji_army_barracks_condition: "[GetBuildingType('building_barrack').GetName] – w żadnym budynku tego typu w państwie o nazwie [ROOT.GetCountry.GetNameNoFlag]:\n$EFFECT_LIST_BULLET$ #bold Nie#! aktywowano następujących metod produkcji: #yellow brak zorganizowanych szkoleń#! ani #yellow szkolenia samurajów#!"
