 # Events
 ryukyu_rivalry.1.t: "Obrady trybutariuszy"
 ryukyu_rivalry.1.d: "Państwo znane jako [SCOPE.sCountry('ryukyu_scope').GetName] coraz bardziej faworyzuje kraj o nazwie [ROOT.GetCountry.GetName]. W odpowiedzi na to państwo znane jako [SCOPE.sCountry('rival_scope').GetName] ponagliło swoje własne wysiłki dyplomatyczne, dostarczając dowody szacunku i jednocześnie po cichu rozszerzając zobowiązania kraju o nazwie [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting] będącego jego trybutariuszem."
 ryukyu_rivalry.1.f: "Zapieczętowane skrzynie ustawiono z wielką troską w sali riukiuańskiej. Dworzanie szeptali za parawanami, gdy na głos odczytywano listy: jeden zamknięty czerwoną pieczęcią z Chin, drugi z pieczołowitą kaligrafią Japonii. W każdym zdaniu nakreślano obowiązki i obietnice, jako że dwa mocarstwa próbowały przeciągnąć królestwo na swoją stronę."
 ryukyu_rivalry.1.a: "Wystosuj formalny protest do państwa o nazwie [SCOPE.sCountry('rival_scope').GetName]."
 ryukyu_rivalry.1.b: "Wykorzystaj ugruntowane więzi z państwem o nazwie [SCOPE.sCountry('ryukyu_scope').GetName]."
 ryukyu_rivalry.1.c: "Przypomnij dworzanom o naszym długoletnim patronacie."
 ryukyu_rivalry.1.e: "Ta sprawa nie wymaga interwencji."
 ryukyu_rivalry.1.tt1: "[SCOPE.sCountry('ryukyu_scope').GetName] to państwo poddańcze kraju o nazwie [ROOT.GetCountry.GetName]; wartość [Concept('concept_liberty_desire', 'pragnienia wolności')] tego państwa wynosi co najwyżej #v 25#!"
 ryukyu_rivalry.1.tt2: "[SCOPE.sCountry('ryukyu_scope').GetName] to nie państwo poddańcze kraju o nazwie [ROOT.GetCountry.GetName], a ich [concept_relations|l] są co najmniej #v pokojowe#!"
 ryukyu_rivalry.1.tt3: "Państwo znane jako [ROOT.GetCountry.GetName] posiada co najmniej 3 [Concept('concept_building', 'budynki')] w mieście o nazwie [SCOPE.sCountry('ryukyu_scope').GetCapital.GetName]"
 ryukyu_rivalry.2.t: "Rywalizacja w portach"
 ryukyu_rivalry.2.d: "Obecność wysłanników państwa o nazwie [SCOPE.sCountry('rival_scope').GetName] w portach kraju znanego jako [SCOPE.sCountry('ryukyu_scope').GetName] przykuła uwagę i współpracę ze strony kupców, w których żyłach płynie [GetCulture('ryukyuan').GetAdjective|l] krew, wzmacniając ich pozycję w oczach dworu. Nasze możliwości przekonywania z kolei osłabły."
 ryukyu_rivalry.2.f: "Księgi kupców zamykano i otwierano ponownie, opatrując je innymi pieczęciami. Ci, którzy kiedyś szukali naszego wsparcia, teraz kręcili się po innych salach przyjęć, rozmawiając o zmianach taryf i bezpieczniejszym transporcie. Wydawało się, że pieniądze trafiły w ręce bardziej przekonującego zarządcy."
 ryukyu_rivalry.2.a: "Nieczysta gra."
 ryukyu_rivalry.3.t: "Generał wizytujący w państwie znanym jako [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]"
 ryukyu_rivalry.3.d: "Do państwa o nazwie [SCOPE.sCountry('ryukyu_scope').GetName] przybywa generał [SCOPE.sCharacter('ryukyu_general_scope').GetFullName] wraz ze świtą oficerów. Ich celem ma być inspekcja umocnień wybrzeża. Ich obecność spotkała się z pełnym szacunku poddaniem, co wzmocniło wpływy państwa znanego jako [SCOPE.sCountry('rival_scope').GetName] na dworze i osłabiło nasze własne."
 ryukyu_rivalry.3.f: "Generał szedł wzdłuż murów obronnych wraz ze swoimi oficerami, uważnie obserwując każdą armatę i wieżę strażniczą. Siły riukiuańskie ustawiły się w szyku, w pełni świadome skierowanych na nie spojrzeń. Każdy gest i salut miały zacieśnić więź łączącą oba mocarstwa."
 ryukyu_rivalry.3.a: "Groźna eskalacja."
 ryukyu_rivalry_risk_of_confrontation: "@warning! Prowadzenie inspekcji umocnień wybrzeży jednocześnie przez państwa znane jako [SCOPE.sCountry('china_scope').GetName] i [SCOPE.sCountry('japan_scope').GetName] może doprowadzić do #r konfrontacji#!"
 ryukyu_rivalry.4.t: "Wizytujący generał"
 ryukyu_rivalry.4.d: "Do państwa o nazwie [SCOPE.sCountry('ryukyu_scope').GetName] przybywa generał [SCOPE.sCharacter('ryukyu_general_scope').GetFullName] wraz ze świtą oficerów z państwa znanego jako [SCOPE.sCountry('from_scope').GetName]. Chcą przeprowadzić inspekcję umocnień wybrzeża. Ich obecność została przyjęta z pełnym szacunku poddaniem."
 ryukyu_rivalry.4.f: "$ryukyu_rivalry.3.f$"
 ryukyu_rivalry.4.a: "Musimy ich uważnie obserwować."
 ryukyu_rivalry_officer_arrives: "Dostępny staje się [concept_general|l] z państwa o nazwie [SCOPE.sCountry('from_scope').GetName]"
 ryukyu_rivalry.5.t: "Los państwa o nazwie [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]"
 ryukyu_rivalry.5.d_victor: "Wysiłki poczynione przez nas w państwie o nazwie [SCOPE.sCountry('ryukyu_scope').GetName] przyniosły owoce. Dzięki nieustającej presji dyplomatycznej, ekonomicznej i politycznej tamtejszy dwór zwraca się teraz do nas po wskazówki, a kwestia suwerenności ich państwa została rozstrzygnięta na naszą korzyść."
 ryukyu_rivalry.5.d_loser: "Pomimo naszych wysiłków państwo znane jako [SCOPE.sCountry('victor_scope').GetName] zapewniło sobie decydującą pozycję w kraju o nazwie [SCOPE.sCountry('ryukyu_scope').GetName]. Tamtejszy dwór zaakceptował nową rzeczywistość polityczną, akceptując swoje miejsce w strefie wpływów państwa znanego jako [SCOPE.sCountry('victor_scope').GetNameNoFormatting]."
 ryukyu_rivalry.5.d_ryu: "Nie da się już utrzymać tak upragnionej przez nas równowagi. Nasz dwór zaakceptował nową rzeczywistość polityczną pod narastającym naciskiem ze strony państwa o nazwie [SCOPE.sCountry('victor_scope').GetName]. Przyszłość kraju znanego jako [SCOPE.sCountry('ryukyu_scope').GetName] będzie teraz stała pod znakiem zewnętrznej dominacji."
 ryukyu_rivalry.5.f_annexed: "Na rynku w Naha odczytywano świeżo zapisane obwieszczenia z pieczęciami wystawionymi w mieście znanym jako [SCOPE.sCountry('victor_scope').GetCapital.GetName]. Sztandary państwa o nazwie [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting] ściągnięto i zastąpiono barwami nowego władcy. Przed zapadnięciem zmroku utworzono biuro administracyjne i wydano nowe rozporządzenia."
 ryukyu_rivalry.5.f_subject: "Na rynku w Naha odczytywano świeżo zapisane obwieszczenia z pieczęciami wystawionymi w mieście znanym jako [SCOPE.sCountry('victor_scope').GetCapital.GetNameNoFormatting]. Każdy dekret określał nową pozycję państwa o nazwie [SCOPE.sCountry('ryukyu_scope').GetName] w imperium. Komisarze królestwa od dawna będącego trybutariuszem odległych dworów zostali teraz związani formalnymi zobowiązaniami wobec większego mocarstwa. Przed zapadnięciem zmroku los królestwa został przesądzony."
 ryukyu_rivalry_ryukyu_vassalise_tt: "[SCOPE.sCountry('ryukyu_scope').GetName] – to państwo staje się [Concept('concept_puppet', 'państwem marionetkowym')] kraju o nazwie [SCOPE.sCountry('victor_scope').GetName]"
 ryukyu_rivalry_ryukyu_transfer_subject_tt: "[SCOPE.sCountry('ryukyu_scope').GetName] – to państwo zostaje przekazane jako [concept_subject|l] krajowi o nazwie [SCOPE.sCountry('victor_scope').GetName]"
 ryukyu_rivalry_ryukyu_annex_tt: "[SCOPE.sCountry('victor_scope').GetName] – to państwo dokona aneksji kraju o nazwie [SCOPE.sCountry('ryukyu_scope').GetName]"
 ryukyu_rivalry.5.a: "Decyzja zapadła."
 ryukyu_rivalry.6.t: "Konfrontacja w mieście znanym jako [SCOPE.sCountry('ryukyu_scope').GetCapital.GetNameNoFormatting]"
 ryukyu_rivalry.6.d_brawl: "Oficerowie wysłani przez państwa znane jako [SCOPE.sCountry('japan_scope').GetName] i [SCOPE.sCountry('china_scope').GetName] wdali się w bójkę podczas inspekcji umocnień wybrzeży kraju o nazwie [SCOPE.sCountry('ryukyu_scope').GetName]. Spór zakończył się śmiercią jednego z uczestników, co wywołało konsternację wśród członków riukiuańskiego dworu."
 ryukyu_rivalry.6.d_accident: "Siły państw znanych jako [SCOPE.sCountry('japan_scope').GetName] i [SCOPE.sCountry('china_scope').GetName], wysłane do skontrolowania umocnień wybrzeża, spotkały się na fortyfikacjach w kraju o nazwie [SCOPE.sCountry('ryukyu_scope').GetName], wywołując zamieszanie wśród garnizonu i krótką wymianę ognia."
 ryukyu_rivalry.6.d_fire: "W bazach noclegowych przydzielonych zagranicznym misjom inspekcyjnym w kraju znanym jako [SCOPE.sCountry('ryukyu_scope').GetName] wybuchł pożar, który strawił kwatery kontyngentów z państw znanych jako [SCOPE.sCountry('japan_scope').GetName] i [SCOPE.sCountry('china_scope').GetName]. Przyczyna pozostaje niejasna, choć miejscowi urzędnicy donoszą o zagubionych latarniach."
 ryukyu_rivalry.6.f: "Oficer Kaimon przebiegł między wieżami strażniczymi i magazynami, wydając rozkazy strażnikom. Rozkazy głośno wykrzykiwano jeden po drugim, a każdy kolejny był sprzeczny z poprzednim. Choć po pewnym czasie przywrócono spokój, Kaimon uświadomił sobie, że rywalizacja między obcymi mocarstwami może zagrozić kruchej stabilności Riukiu."
 ryukyu_rivalry.6.a: "Napięcia rosną."
 ryukyu_rivalry_ryukyu_confrontation_tt1: "[concept_infamy] państw znanych jako [SCOPE.sCountry('japan_scope').GetName] i [SCOPE.sCountry('china_scope').GetName] rośnie o #v 6#! pkt"
 ryukyu_rivalry.7.t: "Dekret riukiuański"
 ryukyu_rivalry.7.d_ryukyu: "Po latach uważnej obserwacji i subtelnej dyplomacji nasza rada zadeklarowała, że ​​zamierza rządzić swoimi sprawami bez ingerencji z zewnątrz. Dwór nałożył surowe ograniczenia na wpływy zewnętrzne i ustanowił prymat własnych rytuałów, ministrów i tradycyjnych rad. Królestwo wytycza teraz własny kurs."
 ryukyu_rivalry.7.d: "Po latach uważnej obserwacji i subtelnej dyplomacji państwo znane jako [SCOPE.sCountry('ryukyu_scope').GetName] odrzuciło nasze wpływy i zadeklarowało, że ​​zamierza rządzić swoimi sprawami bez ingerencji z zewnątrz. Dwór określił ścisłe granice naszej obecności, zachowując swoje rytuały, ministrów i tradycyjne rady. Królestwo nie chce dłużej podporządkowywać się naszej władzy."
 ryukyu_rivalry.7.f: "Pieczęcie i rejestry danin leżały podarte i porozrzucane na wypolerowanych podłogach zamku Shuri. W salach audiencyjnych nadal odczuwalne były wpływy obcych mocarstw, które jednak nie dyktowały już żadnych działań. Riukiu miało podążać drogą kruchej neutralności osiągniętej dzięki cierpliwej dyplomacji."
 ryukyu_rivalry.7.a: "Kwestia lojalności została rozwiązana."
 ryukyu_rivalry.7.b: "Nadal możemy użyć siły."
 ryukyu_rivalry.8.t: "Ukryta domena"
 ryukyu_rivalry.8.d: "Po tym, jak strona [SCOPE.sCountry('japan_scope').GetAdjective|l] otworzyła swoje porty, długo zapomniana kwestia lojalności państwa znanego jako [SCOPE.sCountry('ryukyu_scope').GetName] znów stała się przedmiotem sporu. Przez wiele pokoleń królestwo to ostrożnie podchodziło do swojej roli, oficjalnie będąc trybutariuszem kraju znanego jako [SCOPE.sCountry('china_scope').GetName], lecz skrycie pozostając lojalnym wobec państwa o nazwie [SCOPE.sCountry('japan_scope').GetNameNoFormatting]. Oba mocarstwa muszą teraz zastanowić się, w jaki sposób zwiększyć swój wpływ na królestwo."
 ryukyu_rivalry.8.f: "Na korytarzach zamku Shuri lśniły latarnie, rzucając światło na szkarłatne belki wniesione przez królów Chūzanu w czasach swojej świetności. Pod malowanymi sufitami urzędnicy składali rejestry danin obok dekretów Satsumy. Dwór od dawna balansował między inwestyturą z Państwa Środka a cieniem Kagoshimy. Do tej pory panował spokój, lecz kwestia lojalności wkrótce będzie wymagała pełnej uwagi."
 ryukyu_rivalry.8.a: "Sprawa pozostaje nierozstrzygnięta."
