 je_ryukyu_rivalry_reaffirm_suzerainty_china: "Potwierdź więzi lenne"
 je_ryukyu_rivalry_reaffirm_suzerainty_button_desc: "Dwór Riukiu sprzyja naszemu przeciwnikowi. Musimy przypomnieć mu o jego zobowiązaniach wobec naszej domeny i ponownie wywrzeć na nim nasze wpływy."
 ryukyu_rivalry_reaffirm_suzerainty_button_tt: "Państwo znane jako [ROOT.GetCountry.GetName] ma mniejsze możliwości #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b przekonywania#!#! względem kraju o nazwie [SCOPE.sCountry('ryukyu_scope').GetName] niż jego przeciwnik"
