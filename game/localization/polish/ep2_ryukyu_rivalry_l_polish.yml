 ryukyu_rivalry_large_influence_loss_china_tt: "Państwo znane jako [SCOPE.sCountry('china_scope').GetName] traci #red 10#! możliwości #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b przekonania#!#! innego kraju do swoich racji"
 ryukyu_rivalry_send_general_tt: "Państwo znane jako [ROOT.GetCountry.GetName] przypisuje na stałe [Concept('concept_general', 'generała')] do państwa o nazwie [SCOPE.sCountry('ryukyu_scope').GetName]"
 je_ryukyu_rivalry_sway_merchants_button: "Wyślij nadzorców handlowych"
 je_ryukyu_rivalry_sway_merchants_button_desc: "Nadzorując port Naha, możemy posłać na dwór wysłanników, aby przekonali dwór do swoich racji w kwestii tego, które mocarstwa zagraniczne uzyskają dostęp do handlu i danin."
 ryukyu_rivalry_sway_merchants_button_tt: "Państwo znane jako [ROOT.GetCountry.GetName] posiada [GetBuildingType('building_port').GetName] co najmniej poziomu #v 2#! w [Concept('concept_capital_state', 'stołecznym obszarze administracyjnym')] państwa o nazwie [SCOPE.sCountry('ryukyu_scope').GetName]"
 je_ryukyu_rivalry_inspect_defenses_button: "Przeprowadź inspekcję umocnień wybrzeża"
 je_ryukyu_rivalry_inspect_defenses_button_desc: "Mając zapewniony dostęp wojskowy, możemy wysłać zaufanego generała, aby przeprowadził inspekcję fortyfikacji Riukiu i upewnił się, że mury i wieże strażnicze odzwierciedlają nasze zamiary strategiczne i nadzorcze."
 ryukyu_rivalry_inspect_defenses_button_tt: "Państwo znane jako [ROOT.GetCountry.GetName] ma zawarty [concept_treaty|l] o #v dostępie wojskowym#! z państwem o nazwie [SCOPE.sCountry('ryukyu_scope').GetName]"
 je_ryukyu_rivalry_honor_kikoeogimi_button: "Oddaj hołd Kikoe-ōgimi"
 je_ryukyu_rivalry_honor_kikoeogimi_button_desc: "Oddajmy hołd Kikoe-ōgimi, których zwierzchnictwo nad dworskimi rytuałami i świętymi obrzędami może dodać wagi naszym wpływom w radach Riukiu."
 # Modifiers
 modifier_ryukyu_rivalry_overreach: "Forsowane zwierzchnictwo"
 modifier_ryukyu_rivalry_landowner_discontent: "Obawy związane z rywalizacją w Riukiu"
 modifier_ryukyu_rivalry_merchant_influence_strain: "Ciężar wpływów w portach"
