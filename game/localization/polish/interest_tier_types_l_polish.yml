l_polish:
 ## Interest Tier Types
 interest_tier_none: "Obojętność"
 interest_tier_none_desc: "Na tym szczeblu [concept_country|l] jest zaangażowane w sprawy [Concept('concept_strategic_region', 'regionu strategicznego')] w stopniu zerowym lub marginalnym. Nie wywiera to wpływu ani na państwo, ani na region strategiczny."
 interest_tier_observant: "Obserwacja"
 interest_tier_observant_desc: "Na tym szczeblu podjęto pierwsze kroki w celu ustanowienia obecności dyplomatycznej w [Concept('concept_strategic_region', 'regionie strategicznym')]. Okręty marynarki wojennej mogą patrolować wybrzeża, a z [Concept('concept_local_country', 'państwami lokalnymi')] może być prowadzona wymiana emisariuszy."
 interest_tier_engaged: "Zaangażowanie"
 interest_tier_engaged_desc: "Na tym szczeblu [concept_country|l] zaczyna angażować się w lokalne sprawy regionu. Podpisuje tam [Concept('concept_treaty', '$concept_treaties$')|l] i wzmacnia swoją obecność."
 interest_tier_influential: "Wpływ"
 interest_tier_influential_desc: "Na tym szczeblu obecność w [Concept('concept_strategic_region', 'regionie strategicznym')] została już ugruntowana. [Concept('concept_country', '$concept_countries$')] zawierają długoterminowe umowy i realizują wzajemne roszczenia.\n\n@information! W przypadku państw, których obszar [Concept('concept_capital_state', '$concept_capital_state_short$')|l] znajduje się w tym [Concept('concept_strategic_region', 'regionie strategicznym')], szczebel nigdy nie będzie niższy od tego."
 interest_tier_pervasive: "Dominacja"
 interest_tier_pervasive_desc: "Na tym szczeblu [concept_country|l] kontroluje [concept_strategic_region|l] w znacznym stopniu. Ponieważ władza wciąż się konsoliduje, [Concept('concept_great_power', '$concept_great_powers$')|l] oraz państwa [Concept('concept_local_country', '$concept_local_country_short$')|l] rywalizują o dominację."
 interest_tier_hegemonic: "Hegemonia"
 interest_tier_hegemonic_desc: "Na tym szczeblu [concept_country|l] stanowi w [Concept('concept_strategic_region', 'regionie strategicznym')] niekwestionowaną szarą eminencję. Inne państwa, #italic o ile istnieją#!, będą musiały podporządkować się hegemonowi lub uzyskać od niego gwarancję braku ingerencji w sprawy lokalne."
 ## Interface
 INTEREST_TIER_TYPE_BOUNDS_DESC: "Ma zastosowanie, gdy wartość [Concept('concept_involvement', 'zaangażowania')] mieści się w przedziale [InterestTierType.GetLowerBound|v]–[InterestTierType.GetUpperBound|v]"
 INTEREST_TIER_TYPE_NO_EFFECT: "#italic Brak wpływu#!"
 INTEREST_TIER_ACTIVE: "#i #b Bieżący szczebel#!#! dla państwa o nazwie [Country.GetName][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'YOU'))]"
 INTEREST_TIER_ACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#! $INTEREST_TIER_ACTIVE$\n$INTEREST_TIER_BOUNDS_DESC$\n[SelectLocalization(EqualTo_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_CURRENT_INVOLVEMENT_DESC', 'INTEREST_TIER_TARGET_INVOLVEMENT_DESC')]\n$TOOLTIP_DELIMITER$\n$INTEREST_TIER_EFFECTS_AND_BREAKDOWN$"
 INTEREST_TIER_INACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#!\n$INTEREST_TIER_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n#title Efekty:#!#indent_newline:3 \n[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)]#!"
 INTEREST_TIER_EFFECTS_AND_BREAKDOWN: "#title Efekty:#!#indent_newline:3 [ConcatIfNeitherEmpty('\n', InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', AddLocalizationIf(And(And3(StringIsEmpty(InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetStateModifier.GetDesc)), StringIsEmpty(InterestTierType.GetTradeAdvantageDesc)), 'INTEREST_TIER_NO_EFFECT'))]#!\n\n#title [concept_involvement] na poziomie #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! ze względu na:#!#indent_newline:3 \n[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]#!\n $INTEREST_TIER_ACTIVE$: #i #b (aktualnie aktywne)#!#!"
 INTEREST_TIER_PREDICTED: "#i #b (Przewidywany)#!#!"
 INTEREST_TIER_BOUNDS_DESC: "Ma zastosowanie, gdy wartość [Concept('concept_involvement', 'zaangażowania')] mieści się w przedziale [InterestTierType.GetLowerBound|v0]–[InterestTierType.GetUpperBound|v0]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC: "[concept_involvement] na poziomie #v [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! wobec państwa o nazwie [Country.GetName]"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC: "[AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetTargetInvolvementIn(StrategicRegion.Self), Country.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP')][AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN')] – [concept_involvement|l] wobec państwa o nazwie [Country.GetName]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Bieżące [concept_involvement|l]: #v [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon]"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Bieżące [concept_involvement|l]: [AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self), GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT')][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self), GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT')] [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon]"
 INTEREST_TIER_TARGET_UP: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! (#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#! @arrow_up_up! na tydzień)"
 INTEREST_TIER_TARGET_DOWN: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! (#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#! @arrow_down_down! na tydzień)"
 INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! (#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#! @arrow_up_up! na tydzień)"
 INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! (#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#! @arrow_down_down! na tydzień)"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN_TITLE: "#title Docelowe zaangażowanie na poziomie #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! ze względu na:#!"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN: "[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]"
 INTEREST_TIER_EFFECTS_TITLE: "#title Efekty:#!"
 INTEREST_TIER_EFFECTS: "[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetDescription)]"
 INTEREST_TIER_NO_EFFECT: "#italic Brak efektu#!"
 INTEREST_TIER_TRADE_ADVANTAGE_EXPORTS_DESC: "[Concept('concept_trade', '$concept_exports$')] mają [Concept('concept_trade_advantage', 'przewagę handlową')] ($VAL|0=+v$) na lokalnych rynkach"
 INTEREST_TIER_TRADE_ADVANTAGE_IMPORTS_DESC: "[Concept('concept_trade', '$concept_imports$')] mają [Concept('concept_trade_advantage', 'przewagę handlową')] ($VAL|0=+v$) na lokalnych rynkach"
 INTEREST_TIER_ON_ACTIVATE_EFFECT: "#title Po osiągnięciu:#!"
 INTEREST_TIER_ON_DEACTIVATE_EFFECT: "#title Po utracie:#!"
 STRATEGIC_REGION_AI_STANCE_TT_HEADER: "[Country.GetNameNoFormatting] – to państwo przyjmuje [Concept('concept_strategic_region_stance', '$concept_strategic_region_stance_short$')|l] #b [Country.GetAIStrategicRegionStanceTypeIn(StrategicRegion.Self).GetNameNoFormatting|l]#! w regionie strategicznym o nazwie [StrategicRegion.GetName] z następujących powodów:\n$TOOLTIP_DELIMITER$"
 ## Effects
 interest_tier_effect_establish_missions_decree: "@checkmark! Umożliwia wydanie [Concept('concept_decree', 'rozporządzenia')] [GetDecreeType('decree_establish_missions').GetName] w [Concept('concept_unincorporated_state', 'obszarach niewcielonych')]"
 interest_tier_effect_colonization: "@checkmark! Umożliwia podjęcie działania regionalnego #yellow;tooltip:[GetPlayer.GetTooltipTag],establish_colony_tooltip $establish_colony$#!"
 interest_tier_effect_stake_colonial_claim: "@checkmark! Umożliwia podjęcie [Concept('concept_diplomatic_action', 'działania dyplomatycznego')] [GetDiplomaticActionType('da_stake_colonial_claim').GetName] w [Concept('concept_decentralized_nation', 'państwach zdecentralizowanych')]"
 interest_tier_effect_colonial_claim_generation: "@checkmark! Utworzy [concept_claim|l], kiedy stopień kolonizacji [Concept('concept_state_region', 'regionu administracyjnego')] wyniesie [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_colonial_claim_generation_threshold')|v%0]"
 interest_tier_effect_infamy_cost_increase_high: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_high_value')|=n%0] – koszt [Concept('concept_infamy', 'niesławy')] za obranie [Concept('concept_war_goal', 'celów wojennych')] w tym [Concept('concept_strategic_region', 'regionie strategicznym')]"
 interest_tier_effect_infamy_cost_increase_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_medium_value')|=n%0] – koszt [Concept('concept_infamy', 'niesławy')] za obranie [Concept('concept_war_goal', 'celów wojennych')] w tym [Concept('concept_strategic_region', 'regionie strategicznym')]"
 interest_tier_effect_infamy_cost_decrease_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_decrease_medium_value')|=p%0] – koszt [Concept('concept_infamy', 'niesławy')] za obranie [Concept('concept_war_goal', 'celów wojennych')] w tym [Concept('concept_strategic_region', 'regionie strategicznym')]"
 interest_tier_effect_can_start_diplomatic_plays: "@checkmark! Umożliwia rozpoczęcie [Concept('concept_diplomatic_play', 'posunięć dyplomatycznych')] w tym [Concept('concept_strategic_region', 'regionie strategicznym')]"
 interest_tier_effect_can_join_diplomatic_plays: "@checkmark! Umożliwia opowiedzenie się za [Concept('concept_diplomatic_play', 'posunięciami dyplomatycznymi')] w tym [Concept('concept_strategic_region', 'regionie strategicznym')]"
 interest_tier_effect_can_sign_alliance: "@checkmark! Umożliwia podpisanie [Concept('concept_article', 'traktatów')] typu [GetArticleType('alliance').GetName|l]"
 interest_tier_effect_can_sign_defensive_pact: "@checkmark! Umożliwia podpisanie [Concept('concept_article', 'traktatów')] typu [GetArticleType('defensive_pact').GetName|l]"
 interest_tier_effect_can_sign_support_independence: "@checkmark! Umożliwia podpisanie [Concept('concept_article', 'traktatów')] typu [GetArticleType('support_independence').GetName|l]"
 interest_tier_effect_can_sign_guarantee_independence: "@checkmark! Umożliwia podpisanie [Concept('concept_article', 'traktatów')] typu [GetArticleType('guarantee_independence').GetName|l]"
 interest_tier_effect_stake_colonial_claim_unrecognized: "@checkmark! Umożliwia podjęcie [Concept('concept_diplomatic_action', 'działania dyplomatycznego')] [GetDiplomaticActionType('da_stake_colonial_claim').GetName] w [Concept('concept_decentralized_nation', 'państwach zdecentralizowanych')] i [Concept('concept_unrecognized_power', 'nieuznawanych mocarstwach')]"
 interest_tier_effect_can_sign_foreign_investment_rights: "@checkmark! Umożliwia podpisanie [Concept('concept_article', 'traktatów')] typu [GetArticleType('foreign_investment_rights').GetName|l]"
 ## Diplomatic Actions
 da_stake_colonial_claim: "Zgłoś roszczenie kolonialne"
 da_stake_colonial_claim_desc: "Zgłasza [concept_claim|l] wobec zamorskiego [Concept('concept_state_region', 'regionu administracyjnego')]"
 da_stake_colonial_claim_action_notification_name: "[INITIATOR_COUNTRY.GetName] – państwo zgłasza [concept_claim|l] kolonialne wobec regionu administracyjnego o nazwie [TARGET_STATE.GetStateRegion.GetName]"
 da_stake_colonial_claim_action_notification_desc: "W wyniku rosnących ambicji kolonialnych państwo o nazwie [INITIATOR_COUNTRY.GetName] zgłasza roszczenie wobec regionu administracyjnego o nazwie [TARGET_STATE.GetStateRegion.GetName]!"
 DA_STAKE_COLONIAL_CLAIM_COOLDOWN: "Ponowne podjęcie tego działania będzie możliwe w następującym terminie: #v [TimeKeeper.GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'da_stake_colonial_claim_cooldown') )]#!"
 DA_STAKE_COLONIAL_CLAIM_EMPTY_EFFECT: "Wybierz [concept_state_region|l] znajdujący się na innym kontynencie niż twój [concept_capital_state|l], aby wysunąć [concept_claim|l]"
 ## Notifications
 notification_colonial_claim_generated_name: "Obszar administracyjny znany jako [SCOPE.sState('colony_notification_state').GetName] został #bold wielką kolonią#!"
 notification_colonial_claim_generated_desc: "Obszar administracyjny znany jako [SCOPE.sState('colony_notification_state').GetName] rozrósł się na tyle, by przyznać nam [concept_claim|l] do całego regionu administracyjnego o nazwie [SCOPE.sState('colony_notification_state').GetStateRegion.GetName]."
 notification_colonial_claim_generated_tooltip: "#header $notification_colonial_claim_generated_name$#!\n$TOOLTIP_DELIMITER$\n$notification_colonial_claim_generated_desc$"
