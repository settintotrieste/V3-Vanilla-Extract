 ship_type_frigate: "Fregata"
 ship_type_frigate_desc: "Lekko uzbrojony żaglowiec wykorzystywany jako jednostka zwiadowcza, patrolowa i eskortowa."
 ship_type_iron_frigate: "Żelazna fregata"
 ship_type_iron_frigate_desc: "Fregata z żelaznym kadłubem to inna wersja fregaty żaglowej. Okręt ten łączy tradycyjne role fregaty ze zwiększoną wytrzymałością i siłą ognia."
 ship_type_ship_of_the_line: "Okręt liniowy"
 ship_type_ship_of_the_line_desc: "Duży okręt wojenny stworzony do walki w szyku liniowym. Okręt liniowy przewozi liczne działa rozmieszczone na wielu pokładach."
 ship_type_monitor: "Monitor"
 ship_type_monitor_desc: "Dyskretny opancerzony okręt przeznaczony do działań na wodach przybrzeżnych."
 ship_type_coastal_defense_ship: "Okręt obrony wybrzeża"
 ship_type_coastal_defense_ship_desc: "Ciężko uzbrojony i opancerzony okręt przeznaczony do działań w portach i na wodach przybrzeżnych."
 ship_type_destroyer: "Niszczyciel"
 ship_type_destroyer_desc: "Szybki, ale ciężko uzbrojony okręt stworzony z myślą o flocie i eskortowaniu."
 ship_type_aircraft_carrier: "Lotniskowiec"
 ship_type_aircraft_carrier_desc: "Okręt, z którego mogą startować samoloty i na którym mogą lądować. Do zadań lotniskowca zaliczają się zwiad i działania ofensywne."
 ship_type_torpedo_boat: "Torpedowiec"
 ship_type_torpedo_boat_desc: "Mały zwrotny okręt przeznaczony do powodowania druzgocących uszkodzeń w większych i wolniejszych okrętach bojowych."
 ship_type_torpedo_boat_destroyer: "Niszczyciel torpedowców"
 ship_type_torpedo_boat_destroyer_desc: "Okręt stworzony do odpierania ataków mniejszych torpedowców, a jednocześnie zdolny do wystrzeliwania własnych torped."
 ship_type_light_cruiser: "Krążownik lekki"
 ship_type_light_cruiser_desc: "Lekko uzbrojone krążowniki przeznaczone do dalekosiężnych patroli, ochrony handlu i projekcji siły."
 ship_type_armored_cruiser: "Krążownik pancerny"
 ship_type_armored_cruiser_desc: "Większy krążownik z ciężkim pasem pancernym zdolny do walki z większością celów poza pancernikami."
 ship_type_protected_cruiser: "Krążownik chroniony"
 ship_type_protected_cruiser_desc: "Szybki krążownik dalekosiężny z opancerzonym pokładem chroniącym jego najważniejsze elementy."
 ship_type_seaplane_tender: "Okręt obsługujący wodnopłaty"
 ship_type_seaplane_tender_desc: "Okręt zaprojektowany do przewożenia i umożliwiania startu wodnopłatów w celu prowadzenia zwiadu i wykonywania ograniczonych działań ofensywnych."
 ship_type_early_ironclad: "Wczesny okręt pancerny"
 ship_type_early_ironclad_desc: "Potężny okręt oceaniczny z napędem parowym wyposażony w żelazny pancerz."
 ship_type_modern_ironclad: "Współczesny okręt pancerny"
 ship_type_modern_ironclad_desc: "Nowoczesny okręt pancerny będący ewolucją tradycyjnego okrętu pancernego wyposażony w wiele"
 ship_type_pre_dreadnought: "Przeddrednot"
 ship_type_pre_dreadnought_desc: "Potężny pancernik uzbrojony w zróżnicowaną baterię dział ciężkiego kalibru."
 ship_type_dreadnought: "Drednot"
 ship_type_dreadnought_desc: "Rewolucyjny pancernik stworzony z myślą o jednolitej baterii dział ciężkiego kalibru."
 ship_type_super_dreadnought: "Superdrednot"
 ship_type_super_dreadnought_desc: "Powiększony drednot z działami cięższego kalibru i grubszym pancerzem."
 ship_type_submarine: "Okręt podwodny"
 ship_type_submarine_desc: "Okręt zdolny do zanurzenia przeznaczony głównie do działań przeciwko wrogim okrętom handlowym."
 ship_type_troop_ship: "Okręt transportowy"
 ship_type_troop_ship_desc: "Specjalnie zaprojektowany okręt zaopatrzeniowy przeznaczony do przewozu ludzi i materiałów po całym świecie."
 ship_type_supply_ship: "Okręt zaopatrzeniowy"
 ship_type_supply_ship_desc: "Okręt, który przewozi towary wojskowe z jednego miejsca do drugiego."
 ship_graphics_type_borodino: "Borodino"
 ship_graphics_type_borodino_desc: "Przeddrednoty klasy Borodino były najnowszą generacją pancerników Rosyjskiej Cesarskiej Marynarki Wojennej z okresu wojny rosyjsko-japońskiej. Podczas bitwy pod Cuszimą zatopiono lub przejęto cztery takie jednostki, które stanowiły rdzeń skazanej na zagładę Drugiej Eskadry Pacyfiku admirała Rożestwienskiego."
 ship_graphics_type_mikasa: "Mikasa"
 ship_graphics_type_mikasa_desc: "Okręt flagowy admirała Tōgō, którym dowodził podczas wojny rosyjsko-japońskiej. Przeddrednot Mikasa brał udział we wszystkich głównych starciach flot tej wojny, stając się nieprzemijającym symbolem wzrostu potęgi morskiej Japonii."
 ship_graphics_type_dingyuan: "Dingyuan"
 ship_graphics_type_dingyuan_desc: "Duma Floty Beiyang, okręty pancerne Dingyuan i Zhenyuan, to najbardziej charakterystyczne symbole modernizacji wojska późnej dynastii Qing. Pancerniki walczyły dzielnie w bitwie nad rzeką Yalu, jednak ich skuteczność była ograniczana przez chroniczne niedofinansowanie Chińskiej Cesarskiej Marynarki Wojennej."
 ship_group_capital_ships: "Okręty główne"
 ship_group_capital_ships_desc: "Okręty główne to największe i najlepiej uzbrojone jednostki pływające przeznaczone do operacji w szyku liniowym."
 ship_group_cruisers: "Krążowniki"
 ship_group_cruisers_desc: "Krążowniki to mniejsze słabiej uzbrojone okręty, które przeznaczone są do działań podczas operacji dalekiego zasięgu."
 ship_group_torpedo_craft: "Poławiacze torped"
 ship_group_torpedo_craft_desc: "Poławiacze torped to niewielkie, zwrotne jednostki, które jako główną broń wykorzystują torpedy samobieżne."
 ship_group_supply_ships: "Okręty zaopatrzeniowe"
 ship_group_supply_ships_desc: "Okręty zaopatrzeniowe to specjalnie zaprojektowane jednostki cywilne, które zapewniają wsparcie i zaopatrzenie podczas operacji floty wojskowej."
