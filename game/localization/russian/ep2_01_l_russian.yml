 japan_events.4.t: "Вестернизация имён"
 japan_events.4.d: "[ROOT.GetCountry.GetName] установила прочные дипломатические и торговые отношения с другими странами, и возник вопрос: как записывать #tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')|l]ие#!#! имена в письмах, соглашениях и прочих официальных документах. Представители западных стран ожидают, что имена будут записаны по их правилам: сначала имя, потом фамилия."
 japan_events.4.f: "Конторские служащие склонились над столами, набрасывая письма заморским должностным лицам. Они перешёптывались о том, стоит ли ради понимания за рубежом изменять устоявшиеся формы. Рука с печатью на мгновение замерла над документом, где ещё не успела засохнуть тушь…"
 japan_events.4.a: "Принять западные традиции для внешней переписки."
 japan_events.4.b: "Сохранить традиционный порядок записи имён."
 japan_events.4.c: "Пришли новые времена. Будем использовать западные традиции в любых ситуациях!"
 japan_single_fire_events_name_order_westernized_mod: "Вестернизация записи имён"
 japan_single_fire_events_name_order_traditional_mod: "Сохранён традиционный порядок имён"
 japan_single_fire_events_name_order_resistance_mod: "Культурный спор об именах"
 japan_single_fire_events_name_order_approval_mod: "Ясность делопроизводства"
 japan_events.5.t: "Вопрос камбуна"
 japan_events.5.d: "Указы, акты, служебные документы издавна составлялись на старописьменном языке, которым владела лишь образованная элита. Сторонники реформ утверждали, что делопроизводство на разговорном языке станет эффективнее и понятнее; противники реформ считали, что вес официальным бумагам придаёт именно традиция."
 japan_events.5.f: "До поздней ночи чиновники терпеливо переписывали формулировки указов, стараясь сделать их понятнее. Один из служащих протёр усталые глаза и вернулся к работе, стараясь не упустить ни чёрточки. Каждый росчерк пера устранял путаницу и немного приближал торжество ясности и порядка в официальных документах."
 japan_events.5.a: "Перевести делопроизводство на разговорный японский."
 japan_events.5.b: "Разрешить ограниченные реформы во внутренней переписке."
 japan_events.5.c: "Сохранить классический язык, камбун, во всех официальных бумагах."
