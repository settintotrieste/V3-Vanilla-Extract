 japan_events.3.t: "Год на пересчёт"
 japan_events.3.d: "С принятием нового календаря год неожиданно стал короче. Дней стало меньше, а значит, изменились суммы налогов, жалования, арендной платы. Служащие обнаружили, что получили меньше денег, а чиновникам пришлось объяснять расхождение."
 japan_events.3.f: "Рабочие снова и снова пересчитывали полученную зарплату, недовольно качая головами при виде скромной кучки монет. Их натруженные руки не узнали приятной тяжести награды. Год стал короче, и каждый потерянный день ударил по карману простых тружеников."
 japan_events.3.a: "Год стал короче. Да будет так."
 japan_events.3.b: "Покрыть дефицит за счёт населения."
 japan_events.3.c: "Восполнить потери самостоятельно ради сохранения стабильности."
