 japan_events.2.t: "Календарное несоответствие"
 japan_events.2.d: "Много веков Япония жила по солнечно-лунному календарю — тогда как западный мир жил по собственному. Купцы всё громче жаловались на сложности согласования сроков с заморскими партнёрами; жители сетовали, что праздники и сборы податей происходят в неурочное время."
 japan_events.2.f: "Конторские служащие склонились над книгами, тщательно переписывая строку за строкой. Стопки скопированных страниц росли, а глаза служащих уставали от сверки месяцев, которых больше не существовало. Старый календарь уходил в прошлое — страна привыкала жить в новом ритме."
 japan_events.2.f_telegraph: "Посыльные непрерывно носились по улицам, доставляя одно письмо за другим. Адресаты в смятении разглядывали свои посылки и пытались разобраться в непонятных датах, которые сменялись необыкновенно быстро. Вести о введении нового календаря стремительно распространились по всей стране, и старая система за считаные сутки прекратила своё существование."
 japan_events.2.a: "Немедленно провести реформу календаря."
 japan_events.2.b: "[GetTechnology('electric_telegraph').GetName] — технология, которая значительно облегчит проведение реформы."
 japan_events.2.c: "На время сохранить старую систему."
