l_russian:
 japan_events.1.t: "Грамотность для всех"
 japan_events.1.d: "Прогрессивное мышление в [ROOT.GetCountry.GetAltName('RU_CL_PP')] набирало обороты, и старая система доставки посланий себя изжила. Падение феодального строя, а может быть, повышение уровня грамотности населения дало предпосылки для создания централизованной почтовой службы, удовлетворяющей нуждам современного государства."
 japan_events.1.f: "Почтари с официальной эмблемой спешили по улицам с тяжёлыми сумками, полными писем. В столице чиновники всю ночь изучали карты, корректировали маршруты и пересчитывали марки в свете ламп. Купцы сетовали на то, что прежняя система доставки перестала работать, а детишки с замиранием сердца опускали свои первые письма в новенькие почтовые ящики. Некогда разделённая обычаями страна наконец начинала говорить на одном языке."
 japan_events.1.a: "Выделить средства на внедрение по всей стране."
 japan_events.1.b: "Сосредоточиться на главных городских центрах."
 japan_events.1.c: "Развивать почту в сельской местности."
 japan_events.1.e: "Пусть реформой занимается [SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')]."
 japan_events.1.g: "Сохранить старую систему доставки почты."
