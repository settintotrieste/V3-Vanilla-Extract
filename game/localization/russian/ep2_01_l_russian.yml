 # Journal Entries
 ## The Hidden Domain JE
 je_ryukyu_rivalry: "Тайное владение"
 je_ryukyu_rivalry_reason: "После #b вторжения#! княжества #b Сацума#! в 1609 году королевство [SCOPE.sCountry('ryukyu_scope').GetName] фактически стало вассалом [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetAltName('RU_CL_RP'), 'Японии')]. Тем не менее двор в Сюри продолжал платить дань Пекину и формально признавать господство [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetAltName('RU_CL_RP'), 'Китая')], сохраняя видимость самостоятельности.\n\nЭтот хрупкий компромисс поддерживался на протяжении многих поколений, однако усиление влияния западных держав и открытие Японии навсегда изменили баланс сил в Восточной Азии. Теперь обе страны стремятся закрепить свои сферы влияния, и неопределённое положение Рюкю грозит вылиться в открытую борьбу за право контролировать южные острова.\n$TOOLTIP_DELIMITER$\n@warning! #r Провал:#! \n Непреклонность [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFlag('RU_CL_RP')] достигает #variable 100%#!\n [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')] или [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')] [Concept( 'concept_subject', 'подчинены' )] либо #b аннексированы#!\n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] [Concept( 'concept_subject', 'подчинено' )] либо #b аннексировано#! сторонней державой\n\n@information! Как склонить островное королевство на свою сторону:\n Заключить с [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_TP')] соглашение с [Concept('concept_article', 'пунктом')] о #v передаче денег#! (#g @money!0,1–2K#!)\n Иметь #v дружеские#! или #v приязненные#! [Concept('concept_relations', 'отношения')] с [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_TP')]\n Превосходить соперника в [Concept('concept_naval_power_projection', 'демонстрации силы от флота')]\n Добиться того, чтобы у [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_RP')] было перед вами [Concept('concept_obligation', 'обязательство')]\n Использовать действия в [Concept('concept_journal_entry', 'записях в дневнике')]"
 #je_ryukyu_rivalry_goal:1 "You are asserting more influence over [SCOPE.sCountry('ryukyu_scope').GetName] than your rival."
 je_ryukyu_rivalry_victory_japan: "Чтобы добиться победы #b Японии#!:\n"
 je_ryukyu_rivalry_victory_china: "Чтобы добиться победы #b Китая#!:\n"
 je_ryukyu_rivalry_victory_ryukyu: "Чтобы добиться победы #b Рюкю#!:\n"
 ryukyu_rivalry_sway_tt: "Склонив Рюкю на свою сторону, вы лишите соперников всякого влияния на архипелаге и сможете [Concept('concept_subject', 'подчинить')] его себе.\n\nКак склонить Рюкю на свою сторону:\n Заключить с Рюкю соглашение с [Concept('concept_article', 'пунктом')] о #v передаче денег#! (#g @money!0,1–2K#!)\n Иметь #v дружеские#! или #v приязненные#! [Concept('concept_relations', 'отношения')] с Рюкю\n Превосходить соперника в [Concept('concept_naval_power_projection', 'демонстрации силы от флота')]\n Добиться того, чтобы у Рюкю было перед вами [Concept('concept_obligation', 'обязательство')]\n Использовать действия в [Concept('concept_journal_entry', 'записях в дневнике')]"
 ryukyu_rivalry_assertiveness_tt: "Когда шкала достигнет #v 100%#!, Рюкю объявит о своём нейтралитете. После этого архипелаг в течение #v 50#! лет нельзя будет сделать [Concept('concept_subject', 'субъектом')] с помощью [Concept('concept_diplomatic_action','дипломатического действия')].\n\nШкала непреклонности ежемесячно пополняется на #g 0,5#!, пока показатель влияния остаётся между #v −20#! и #v +20#!.\n\nРюкю может укрепиться в нейтральном статусе, стравливая Японию и Китай с помощью доступных действий, которые меняют уровень влияния. \n\nПримеры:\n Заключить [Concept('concept_article', 'соглашение')] о #v передаче денег#! в размере #g @money!100–2000#! с обеими сторонами или не заключать его вовсе\n Иметь #v дружеские#! или #v приязненные#! [Concept('concept_relations', 'отношения')] с обеими сторонами или ни с одной из сторон\n Взять на себя [Concept('concept_obligation', 'обязательство')] по отношению к обеим сторонам или не брать его вовсе\n Подписать или отказаться подписывать вышеупомянутые документы, когда одна из сторон получает преимущество над другой"
