l_russian:
 edo_system: "Сословная система Эдо"
 # Edo Social Classes
 strata_samurai_high: "Высшие самураи" # High-Class Samurai
 strata_samurai_high_desc: "Верхушку самурайского сословия составляют представители высшей воинской знати, такие как даймё и крупные вассалы. Они занимают большинство значимых постов в стране и пользуются немалыми наследственными привилегиями."
 strata_samurai_low: "Низшие самураи" # Low-Class Samurai
 strata_samurai_low_desc: "Воины и вассалы более низкого ранга, такие как гокэнин и асигару, занимают различные административные и военные должности на службе у высшей знати."
 strata_religious: "Дзися" # Priests
 strata_religious_desc: "Духовенство, организованное в храмовые учреждения под контролем государственных властей. Дзися играют заметную роль в жизни местных жителей, им вверено образование и отправление религиозных обрядов, однако в целом они находятся в стороне от юридически закреплённых сословных категорий."
 strata_commoners_peasants: "Хякусё" # Peasants
 strata_commoners_peasants_desc: "Крестьяне, входящие в сословие простолюдинов, являются наиболее многочисленным социальным слоем Японии. Они приписаны к своим деревням и связаны местными повинностями и налогами. Принадлежность к хякусё определяется регистрацией, а не родом занятий, поэтому среди них можно найти не только земледельцев, но и сельских ремесленников и торговцев."
 strata_commoners_townspeople: "Тёнин" # Townspeople
 strata_commoners_townspeople_desc: "Горожане, входящие в сословие простолюдинов, составляют основную массу городского населения Японии. Представители этого сословия регистрируются через городские учреждения, большинство из них традиционно занимается торговлей и ремёслами. Некоторые горожане обладают значительным богатством и влиянием, однако они не принадлежат к воинскому сословию, поэтому их социальная мобильность ограничена."
 strata_outcastes: "Эта-хинин" # Outcastes Eta, Hinin, etc.
 strata_outcastes_desc: "Эта и хинин считаются самыми низшими слоями японского общества, они подвергаются сильной дискриминации. По традиции к этому сословию относят тех, кто зарабатывает на жизнь «нечистыми» занятиями: могильщиков, попрошаек, уличных артистов."
 # Edo Social System Laws
 lawgroup_edo_social_system: "Сословная система Эдо"
 lawgroup_edo_social_system_desc: "Строгое соблюдение сословной системы Эдо"
 law_strict_edo_system: "Строгая сословная иерархия"
 law_strict_edo_system_desc: "Государство строго регулирует все сословные привилегии, от профессиональных возможностей и юридических прав до числа ворот, положенных жилищу в соответствии с социальным статусом владельца. Любое нарушение этого порядка строго наказывается. У горожан и крестьян нет законного способа перейти в сословие самураев."
 law_intermediate_edo_system: "Смягчённая сословная иерархия"
 law_intermediate_edo_system_desc: "Правовые и сумптуарные ограничения ослаблены, простолюдины нередко пользуются немалым влиянием и высоким общественным статусом. Богатые горожане и крестьяне могут за плату перейти в сословие гокэнин — самурая низшего ранга."
 law_lax_edo_system: "Гибкая сословная иерархия"
 law_lax_edo_system_desc: "Должности и обязанности, прежде закреплённые исключительно за самураями, теперь доступны и простолюдинам. Немногие сохранившиеся профессиональные и сумптуарные ограничения почти не соблюдаются, за исключением лишь самых серьёзных нарушений."
 # Tenpo Crisis
 je_tenpo_crisis: "Кризис годов Тэмпо"
 je_tenpo_crisis_reason: "Эпоха Тэмпо («Небесная защита»), провозглашённая в 1830 году, поначалу соответствовала своему названию. К несчастью, неблагоприятная погода, установившаяся вскоре на [GetGeographicRegion('geographic_region_honshu').GetName], привела к резкому повышению цен на рис, а затем и к полномасштабному голоду. Меж тем растущее благосостояние и влияние #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetCustom('RU_IG_RP')]#!#! всё сильнее беспокоят #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_VP')]#!#!, которые видят в них угрозу традиционному порядку.\n\nЗападные [Concept('concept_great_power','великие державы')] тоже не сидят сложа руки — их торговые суда и канонерки подходят всё ближе к нашим берегам.\n\nКрупные государственные деятели, желающие реформ, представили свои предложения по выходу из кризиса перед бакуфу.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b Цели реформаторов#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] действует закон «[GetLawType('law_lax_edo_system').GetName]»\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] #b не#! действует закон «[GetLawType('law_hereditary_bureaucrats').GetName]»\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] есть как минимум #v 3#! [Concept('concept_state', 'области')] с #tooltippable_name #tooltip:[GetBuildingType('building_urban_center').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [GetBuildingType('building_urban_center').GetCustom('RU_BL_TP')|l]#!#! уровня #v 3#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')] [concept_clout] [Concept('concept_interest_group','заинтересованной группы')] «[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]» — #v 10#! и выше\n#tooltippable;tooltip:tenpo_hardliner_tt #b Цели традиционалистов#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] действует закон «[GetLawType('law_strict_edo_system').GetName]»\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] действует закон «[GetLawType('law_shinsengumi').GetName]»\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] есть как минимум #v 40#! уровней #tooltippable_name #tooltip:[GetBuildingType('building_rice_farm').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [GetBuildingType('building_rice_farm').GetCustom('RU_BL_RP')|l]#!#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')] [concept_interest_group] «[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]» — [Concept('concept_marginalized','отчуждённая')]\n#tooltippable;tooltip:tenpo_shared_tt #b Общие цели#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] #b Ни одна#! принадлежащая стране [Concept('concept_homeland','родная')] #tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')|l]ая#!#! [Concept('concept_state', 'область')] не испытывает [Concept('concept_famine','голод')]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [Concept('concept_gdp','ВВП')] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] — @gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! или выше\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] [concept_power_projection] #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag|l]ой#! армии выше #v 500#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] У нас есть не менее #v 10#! уровней #tooltippable_name #tooltip:[GetBuildingType('building_naval_fortification').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [GetBuildingType('building_naval_fortification').GetCustom('RU_BL_RP')|l]#!#! в принадлежащих стране [Concept('concept_state', 'областях')]"
 je_tenpo_crisis_complete_header: "Реформы Тэмпо закончатся успехом, если:\n"
 je_tenpo_crisis_failure_header: "Реформы Тэмпо провалятся, если:\n"
 je_tenpo_crisis_success_tt: "Мы добьёмся выполнения хотя бы #v 8#! целей"
 je_tenpo_crisis_success_2_tt: "Награда меняется в зависимости от соотношения количества #tooltippable;tooltip:tenpo_shared_tt #b общих#!#! целей, целей #tooltippable;tooltip:tenpo_reformer_tt #b реформаторов#!#! и целей #tooltippable;tooltip:tenpo_hardliner_tt #b традиционалистов#!#!, которых мы сумеем достичь."
 je_tenpo_crisis_success_outcome_tt: "Награда меняется в зависимости от соотношения количества #b общих#! целей, целей #b реформаторов#! и целей #b традиционалистов#!, которых мы сумеем достичь."
 je_tenpo_crisis_success_outcome_1_tt: "Если достигнуто больше целей #b традиционалистов#!:"
 je_tenpo_crisis_success_outcome_2_tt: "Если достигнуто больше целей #b реформаторов#!:"
 je_tenpo_crisis_success_outcome_3_tt: "Если достигнуто равное количество целей #b традиционалистов#! и #b реформаторов#!:"
 modifier_tenpo_crisis_reward_hardliner: "Возврат к порядку"
 modifier_tenpo_crisis_reward_reformer: "Стремление к прогрессу"
 modifier_tenpo_crisis_reward_balanced: "Умеренные реформы"
 modifier_rice_hoarding: "Накопительство риса"
 tenpo_hardliner_tt: "#b Традиционалисты#! считают, что японское общество охвачено моральным разложением, остановить которое можно лишь через возвращение к традиционным устоям.\n\nОни поддерживают ужесточение сумптуарных законов и призывают самураев отказаться от роскоши городской жизни и вернуться к идеализированному образу аскетичных сельских администраторов."
 tenpo_reformer_tt: "#b Реформаторы#! верят, что японское общество необратимо изменилось, а законодательство должно исходить из существующего положения вещей, а не из идеализированных представлений о прошлом.\n\nОни выступают за развитие торговли и расширение роли простолюдинов в политической жизни страны."
 tenpo_shared_tt: "И #b традиционалисты#!, и #b реформаторы#! убеждены, что Япония должна быть надёжно защищена от внешних угроз. Экономические проблемы и вопросы продовольственной безопасности также требуют немедленного решения."
 button_je_tenpo_combat_rice_hoarding: "Начать борьбу с накопительством риса"
 button_je_tenpo_combat_rice_hoarding_desc: "Из-за политической и экономической нестабильности в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] некоторые недобросовестные торговцы принялись скупать про запас большие объёмы риса, что привело к резкому скачку цен. Как следствие, многим японским семьям теперь не хватает средств, чтобы купить достаточно риса для собственного пропитания."
 button_je_tenpo_frugal_ordinance: "Издать указ о бережливости"
 button_je_tenpo_frugal_ordinance_desc: "Города превратились в рассадники порока. Распущенность #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetCustom('RU_IG_RP')]#!#! уже напрямую угрожает стабильности нашей власти. Они открыто хвалятся своим богатством и ведут себя не по статусу.\n\nПора поставить их на место, наложив ограничения на предметы роскоши, развлечения и литературу."
 button_je_tenpo_confiscate_land: "Издать закон о конфискации наделов в Эдо и Осаке"
 button_je_tenpo_confiscate_land_desc: "Земли в радиусе 10 #italic #tooltippable;tooltip:glossary_ri ри#!#! от Эдо и Осаки представляют собой настоящее лоскутное одеяло наделов, принадлежащих сёгуну и многочисленным даймё и хатамото. Отсутствие единой административной системы серьёзно подрывает обороноспособность страны и мешает полноценно использовать потенциал этих владений, поэтому один из ведущих родзю предлагает конфисковать и объединить земли в ближайшей округе от обоих замков.\n\nЗемлевладельцам, лишившимся своих наделов, в качестве компенсации будут выделены земли в других областях Японии."
 modifier_consolidation_payments: "Выплаты за конфискованные земли"
 modifier_consolidated_state_land: "Акт об объединении в радиусе 10 ри"
 glossary_ri: "#b #italic Ри#!#! — традиционная японская мера длины, аналог китайского #italic ли#!.\n\nТочное значение ри со временем менялось; в поздний период Эдо один ри примерно соответствовал 36 #italic тё#! или 3,9 км."
 modifier_tenpo_crisis_ongoing: "Потрясения эпохи Тэмпо"
 tenpo_events.1.t: "Эпоха Небесной защиты"
 tenpo_events.1.d: "После нескольких лет неблагоприятной погоды [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] охватил [Concept('concept_famine', 'голод')]. Бедные и обездоленные едва сводят концы с концами, а в стране растёт недовольство бакуфу — население верит, что власти должны были сделать больше."
 tenpo_events.1.f: "Ткани, сотканные руками его жены, всегда неплохо продавались на рынке — в хорошие дни они даже могли себе позволить немного сладостей. Теперь же за них предлагали не больше четырёх-пяти го риса — и это в лучшем случае. «Этой еды едва хватает на день», — подумал он, а им нужно продержаться целую неделю. Даже если добавлять в рис траву и листья, им всё равно придётся голодать.\n\nСвернув в сторону дома, он на мгновение остановился там, откуда был виден дом старого Торы. Двоих его детей уже унесла оспа — а если слухи о накидках от дождя не врут, вскоре, наверное, умрут и другие. Стиснув в руках мешок риса, он беззвучно помолился и побрёл домой."
 tenpo_events.1.a: "О Небеса, защитите нас!"
 tenpo_events.1.tt_1: "#r Сильные#! [GetHarvestConditionType('torrential_rains').GetName|l] обрушились на [GetGeographicRegion('geographic_region_honshu').GetName], #r погубив#! #b урожаи риса#! и подорвав [Concept('concept_food_security', 'продовольственную безопасность')] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 tenpo_events.1.tt_2: "По всему [GetGeographicRegion('geographic_region_honshu').GetName] разъярённые толпы громят жилища ростовщиков и лиц, подозреваемых в спекуляции рисом. Так называемые #italic #tooltippable;tooltip:glossary_uchikowashi утиковаси#!#! [Concept('concept_devastation', 'опустошают')] #r всю страну#!."
 glossary_uchikowashi: "#b #italic Утиковаси#!#! (разрушение домов) — это массовые стихийные бунты, направленные против лиц, обвиняемых в предосудительной деятельности, и сопровождающиеся уничтожением их имущества. Жертвами утиковаси нередко становятся ростовщики, спекулянты и купцы, скупавшие рис про запас.\n\nОбычно подобные выступления сопровождаются грабежами, однако организаторы утиковаси нередко демонстративно воздерживаются от хищения имущества, чтобы подчеркнуть моральную правоту своих действий."
 tenpo_events.2.t: "Мятеж философа-самурая"
 tenpo_events.2.d: "Магистрат и учёный по имени [SCOPE.sCharacter('oshio_scope').GetFullName], [SelectLocalization(SCOPE.sCharacter('oshio_scope').IsFemale, 'возмущённая', 'возмущённый' )] существующими порядками и неспособностью правительства справиться с охватившим #tooltippable_name #tooltip:[SCOPE.sState('osaka_scope').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('osaka_scope').GetCustom('RU_SL_VP')]#!#! [Concept('concept_famine','голодом')], [SelectLocalization(SCOPE.sCharacter('oshio_scope').IsFemale, 'подняла', 'поднял' )] мятеж против местных властей. Город [SCOPE.sState('osaka_scope').GetCityHubName] охвачен огнём: [SCOPE.sCharacter('oshio_scope').GetHerHis] сторонники повсюду поджигают правительственные здания."
 tenpo_events.2.f: "«И пусть у нас нет могущества Тан или У, пусть мы не обладаем добродетелями Конфуция и Менция, иного пути у нас нет. Ради блага державы мы обязаны действовать, даже если это навлечёт проклятие на весь наш род.\n\nМы подвергнем наказаниям и справедливой казни всех чиновников, терзающих простой народ. Вслед за ними кара постигнет и прозябающих в роскоши богачей Осаки.\n\nЗолото, серебро и монеты, припрятанные в их тайниках, а также мешки риса, которыми забиты их кладовые и поместья, должны быть розданы нуждающимся».\n\nОсио Хэйхатиро, #italic Отрывки из воззваний#!"
 tenpo_events.2.a: "Собрать ополчение! Прибейте изменника к кресту!"
 tenpo_events.2.b: "Поступок отчаянный, но достойный."
 tenpo_events.2.c: "Одолев сопротивление местного гарнизона, восставшие захватывают город [SCOPE.sState('osaka_scope').GetCityHubName]."
 tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName] избегает ареста и совершает ритуальное самосожжение."
 tenpo_events.2.tt_2: "[SelectLocalization(SCOPE.sCharacter('oshio_scope').IsFemale, 'Схваченная', 'Схваченный' )] властями, [SCOPE.sCharacter('oshio_scope').GetFullName] после долгих истязаний умирает на кресте."
 tenpo_events.2.tt_3: "Местное ополчение #b подавляет восстание#!, не позволив ему распространиться."
 tenpo_events.2.tt_4: "Получив чисто символический приговор, [Concept('concept_agitator', 'агитатор')] [SCOPE.sCharacter('oshio_scope').GetFullName] вскоре возвращается к своей деятельности."
 modifier_osaka_burning: "Критика, написанная кровью"
 modifier_controversial_pardon: "Скандальное помилование"
 tenpo_events.3.t: "Необходимые реформы"
 tenpo_events.3.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|U], [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'довольная', 'довольный' )] ходом реформ, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'поблагодарила', 'поблагодарил' )] членов совета за достигнутые успехи. [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Она уверена', 'Он уверен' )], что #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ая#! держава способна справиться с любыми трудностями — как извне страны, так и изнутри."
 tenpo_events.3.f: "«Двенадцать, господин, — ответил главный советник, отложив кисть. — Отчёты из Кинаи свидетельствуют о том же. Наши реформы уже приносят плоды».\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|U] коротко [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'кивнула', 'кивнул' )] со своего возвышения: «Хорошо. Проследите за тем, чтобы двор обо всём узнал. Что же касается отчёта от магистрата Нагасаки…»"
 tenpo_events.3.a: "Пусть этот день станет концом морального и политического разложения [ROOT.GetCountry.GetAltName('RU_CL_RP')]."
 tenpo_events.3.b: "Крестьяне, самураи — разве все мы не подданные императора?"
 tenpo_events.3.c: "Стабильность державы превыше всего."
 tenpo_outcome_hardliner_tt: "У #b традиционалистов#! достигнуто больше целей, нежели у #b реформаторов#!"
 tenpo_outcome_reformer_tt: "У #b реформаторов#! достигнуто больше целей, нежели у #b традиционалистов#!"
 tenpo_outcome_balanced_tt: "Достигнуто равное количество целей у #b традиционалистов#! и #b реформаторов#!"
 tenpo_events.4.t: "Действие и бездействие"
 tenpo_events.4.d: "Разочаровавшись в итогах реформ и видя нарастающее недовольство общества, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'решила', 'решил' )], что [SCOPE.sCharacter('roju_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('roju_scope').IsFemale, 'должна', 'должен' )] оставить свой пост."
 tenpo_events.4.f: "«Ссылка», — бывший советник мысленно произнёс это слово и почувствовал во рту неприятное послевкусие. Впрочем, после вчерашних событий лучше отправиться в изгнание, чем оставаться в Эдо. Немногие оставшиеся слуги до сих пор очищали пруд от камней и кусков черепицы, которыми недовольные закидали его внутренний двор. Угрозы возмущённой толпы до сих пор звенели у него в ушах…\n\n«Ссылка», — вновь повторил он. Теперь это слово казалось уже не таким неприятным. Да и вообще он давно хотел увидеть гору Гассан…"
 tenpo_events.4.a: "Надеюсь никогда больше не увидеть [SelectLocalization(SCOPE.sCharacter('roju_scope').IsFemale, 'эту дурёху', 'этого глупца' )]."
 tenpo_events.4.b: "Все [SelectLocalization(SCOPE.sCharacter('roju_scope').IsFemale, 'её', 'его' )] решения будут отменены. И проследите, чтобы люди об этом узнали."
 tenpo_events.4.tt_1: "[SCOPE.sCharacter('roju_scope').GetFullName] #r теряет должность#! и отправляется в ссылку в провинцию #b Дэва#!"
 modifier_tenpo_fail: "Реформы Тэмпо прерваны"
 tenpo_events_4_demotion_tt: "[Concept('concept_leader', 'Лидер')] [Concept('concept_interest_group', 'заинтересованной группы')] в [Concept('concept_in_government', 'в правительстве')] теряет должность и отправляется в ссылку" # tooltip for event_outcome_failed_effect_desc in je_tenpo_crisis
 tenpo_events.5.t: "Землевладельцы протестуют против изъятия наделов"
 tenpo_events.5.d: "Наши попытки конфисковать наделы в #tooltippable_name #tooltip:[SCOPE.sState('kanto_scope').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('kanto_scope').GetCustom('RU_SL_PP')]#!#! и #tooltippable_name #tooltip:[SCOPE.sState('kansai_scope').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('kansai_scope').GetCustom('RU_SL_PP')]#!#! столкнулись с отчаянным сопротивлением местных землевладельцев. Громче всех протестуют те, кто получил свои наделы в награду за военную службу."
 tenpo_events.5.f: "«Мой славный предок получил эти земли за военные заслуги. Со времён Сэкигахары многие поколения нашей семьи обрабатывали этот надел, повышая урожайность и исправно отдавая господину положенную ему долю.\n\nИ так вы собираетесь вознаградить нас за службу? Неужели вы заставите нас переселиться без справедливой компенсации?»"
 tenpo_events.5.a: "Народ волнуется. Придётся остановить конфискацию."
 tenpo_events.5.b: "Предложим им больше земли в качестве компенсации за переселение."
 tenpo_events.5.c: "Напомните им, что так [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'распорядилась', 'распорядился' )] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 modifier_heavy_handed_land_confiscations: "Суровые меры по конфискации земель"
 modifier_promotions_and_koku_redistribution: "Повышение и раздача коку"
 modifier_reckless_roju: "Безрассудство родзю"
 modifier_will_of_the_shogun: "Воля сёгуна"
 tenpo_events.6.t: "Лев в логове дракона"
 tenpo_events.6.d: "Победа [SCOPE.sCountry('britain_scope').GetAltName('RU_CL_RP')] над [SCOPE.sCountry('china_scope').GetAltName('RU_CL_TP')] потрясла нашу страну. Китайские джонки и армии потерпели сокрушительное поражение от превосходящих [SCOPE.sCountry('britain_scope').GetAdjectiveNoFormatting|l]их сил, и теперь многие сомневаются в способности [ROOT.GetCountry.GetAltName('RU_CL_RP')] выстоять под натиском западных держав."
 tenpo_events.6.f: "«От храма Ганьлу на западе и до храма Цзиньшань на востоке земли в окрестностях Чжэньцзяна заполонили чёрно-белые варвары, подобно камням на доске для игры в го. Местным жителям оставалось лишь гадать, уйдут ли они когда-нибудь».\n\nМинэта Фуко, #italic Новые заграничные рассказы#!"
 tenpo_events.6.a: "Да защитят нас Небеса, ибо нашим самураям это не под силу."
 tenpo_events.6.b: "Тревожные вести из Китая следует подвергнуть строжайшей цензуре."
 tenpo_events.6.c: "Мы станем утёсом, о который разобьются волны варваров."
 modifier_opium_war_aftermath: "Варвары у ворот"
 modifier_defenses_strengthened: "Усиление береговых гарнизонов"
 tenpo_events.7.t: "Школа Такасимы"
 tenpo_events.7.d: "Опасаясь за судьбу Японии после Опиумной войны, [SCOPE.sCharacter('takashima_scope').GetFullName], магистрат города Нагасаки, [SelectLocalization(SCOPE.sCharacter('takashima_scope').IsFemale, 'сформировала', 'сформировал' )] новое военное подразделение, организованное по современному голландскому образцу. [SelectLocalization(SCOPE.sCharacter('takashima_scope').IsFemale, 'Она', 'Он' )] призывает другие города страны последовать [SelectLocalization(SCOPE.sCharacter('takashima_scope').IsFemale, 'её', 'его' )] примеру."
 tenpo_events.7.f: "«Головные уборы его солдат напоминают диковинные короны, приказы им отдают на грубом языке голландцев. Но следует признать, они прекрасно вымуштрованы, отлично держат строй и могут давать залпы вдвое чаще, чем мои вассалы — хоть и уступают им в меткости».\n\n«А что насчёт артиллерии?»\n\n«Ей нет равных. Чем дольше мы тянем с её внедрением, тем меньше у нас будет шансов отразить нападение варваров»."
 tenpo_events.7.a: "Одобрить использование варварского оружия и тактики."
 tenpo_events.7.b: "Отдать предпочтение традиционным мушкетёрским домам."
 modifier_inoue_tatsuke_primacy: "Господство Иноуэ и Тацукэ"
 modifier_favouring_traditional_musketry_houses: "Предпочтение традиционных мушкетёрских домов"
 modifier_favouring_takashima: "Отстранение мушкетёрских домов"
 modifier_takashima_school: "Поддержка школы Такасимы"
 tenpo_events.8.t: "За чашку риса"
 tenpo_events.8.d: "Напряжённость между крестьянами и торговцами #tooltippable_name #tooltip:[SCOPE.sState('tenpo_unrest_state_scope').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('tenpo_unrest_state_scope').GetCustom('RU_SL_RP')]#!#! достигла предела из-за обвинений в утаивании риса и взвинчивании цен. К недовольным крестьянам присоединились разбойники и попрошайки, и теперь перед местными властями стоит угроза полномасштабного восстания."
 tenpo_events.8.f: "Он был одним из первых. Это его лихая компания разграбила жилище гнусного торгаша, чтобы раздать людям его неправедно нажитые богатства. Сидя у костра, он оглядывал своих спутников и размышлял о том, как мало их осталось. Экити и Мацудзо всё ещё были рядом, но они уже мало чем напоминали тех исполненных праведного гнева людей, которых он знал прежде. Фукумацу погиб на второй день, Такэсити — на седьмой. Остальные рассеялись, словно листья на ветру, когда люди магистрата пустились за ними в погоню.\n\nГлядя на тех, кто занял их место, он испытывал стыд и отчаяние, но иного выхода не было. Уж лучше оставаться в сомнительной компании, чем закончить свои дни под пилой палача."
 tenpo_events.8.a: "Послать солдат на подавление бунта."
 tenpo_events.8.b: "Беспорядки утихнут сами по себе."
 tenpo_events.8.c: "Нужно убедить сельских старост помочь утихомирить восставших."
 modifier_consulted_headsmen: "Уступки деревням"
 modifier_lingering_brigandry: "Уцелевшие банды"
 modifier_brutal_anti_bandit_campaigns: "Жестокие расправы над разбойниками"
 je_taming_the_north: "Усмирение Севера"
 je_taming_the_north_reason: "С учреждением #b Комиссии по колонизации [SCOPE.sState('hokkaido_state_scope').GetAltName('RU_CL_RP')]#!, также известной как #b Кайтакуси#!, этот удалённый регион начал активно развиваться. Каждый день с юга прибывает всё больше поселенцев, которые надеются открыть здесь для себя новые возможности.\n\nОднако это не просто миграция населения: вместе с колонистами сюда также приезжают выдающиеся чиновники и мыслители, которые мечтают преобразить [SCOPE.sState('hokkaido_state_scope').GetAltName('RU_CL_VP')] и воплотить в жизнь то идеальное будущее, которое они представляют для [ROOT.GetCountry.GetAltName('RU_CL_RP')]."
 taming_the_north_agriculture_potentials_goal_tt: "Мы использовали действие #b «$button_je_taming_the_north_agriculture_potentials$»#! #v 3#! раза"
 taming_the_north_agriculture_arable_goal_tt: "Мы использовали действие #b «$button_je_taming_the_north_agriculture_arable_land$»#! #v 3#! раза"
 taming_the_north_colonies_goal_tt: "Мы использовали действие #b «$button_je_taming_the_north_establish_colonies$»#!"
 je_taming_the_north_additional_goal_pre: "Если мы возьмём под контроль весь #b Сахалин#!, то [Concept('concept_timed_modifier', 'временный модификатор')] #b «$modifier_tamed_north$»#! будет также применяться к этому [Concept('concept_state_region', 'региону')]:"
 je_taming_the_north_additional_goal: "Если мы возьмём под контроль весь регион [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName], то [Concept('concept_timed_modifier', 'временный модификатор')] #b «$modifier_tamed_north$»#! будет также применяться к этому региону:"
 je_taming_the_north_additional_goal_completed: "Поскольку мы полностью контролируем регион [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName], [Concept('concept_timed_modifier', 'временный модификатор')] #b «$modifier_tamed_north$»#! также применяется к этому региону:"
 modifier_tamed_north: "Образцовая колония"
 modifier_northern_learnings: "Опыт Кайтакуси"
 button_je_taming_the_north_establish_colonies: "Основать поддерживаемые государством колонии"
 button_je_taming_the_north_establish_colonies_desc: "Без постоянного притока поселенцев любая колония обречена на гибель. Нам стоит задуматься о принятии дополнительных мер, которые будут побуждать семьи со всех уголков [ROOT.GetCountry.GetAltName('RU_CL_RP')] переезжать на север."
 button_je_taming_the_north_integrate_ainu: "Обеспечить правовую защиту айнов"
 button_je_taming_the_north_integrate_ainu_desc: "До недавних пор позиция Комиссии касательно #tooltippable_name #tooltip:[GetCulture('ainu').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('ainu').GetCustom('RU_CUL_ADJ')|l]их#!#! аборигенов заключалась в искоренении их культурных обычаев и их принудительной интеграции в #tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')|l]ое#!#! общество. Однако мы отказались от этой политики и начали постепенно выстраивать более равные и справедливые отношения с северными айнами, что привело к сближению наших народов.\n\nВ связи с этим некоторые предлагают, чтобы [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] официально [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'закрепила', 'закрепил' )] статус айнов как коренного народа и [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'предоставила', 'предоставил' )] им те же права и обязанности, которыми довольствуются все остальные граждане нашей страны."
 ainu_frenship_tt: "Мы последовательно отстаивали интересы #tooltippable_name #tooltip:[GetCulture('ainu').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('ainu').GetCustom('RU_CUL_ADJ')|l]ого#!#! населения во время #b событий#!"
 button_je_taming_the_north_sapporo_agricultural_college: "Основать Аграрный колледж Саппоро"
 button_je_taming_the_north_sapporo_agricultural_college_desc: "Север — это отличная площадка для испытания новейших идей в области землепользования и сельского хозяйства. Мы учредим передовой аграрный колледж и пригласим туда лучших иностранных специалистов. Их научные знания станут движущей силой в преобразовании наших территорий."
 sapporo_partner_positive_catalyst_tt: "В отношении случайной страны, которая подходит по требованиям, произойдёт #g положительный#! [Concept('concept_diplomatic_catalyst', 'дипломатический катализатор')]"
 button_je_taming_the_north_agriculture_potentials: "Внедрить новые культуры"
 button_je_taming_the_north_agriculture_potentials_desc: "Хотя обширные территории острова имеют огромное значение для сельского хозяйства, полноценное экономическое развитие этого региона возможно лишь при грамотном выборе культур для посева.\n\nК счастью, благодаря новым разработкам #b Аграрного колледжа Саппоро#! мы можем выращивать на острове даже те культуры, которые ранее бы непременно погибли в таком морозном климате.\n\nДоступные варианты:\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#! (с поправками)\n• [GetBuildingType('building_rice_farm').GetName]\n• [GetBuildingType('building_dye_plantation').GetName]\n• [GetBuildingType('building_opium_plantation').GetName]\n• [GetBuildingType('building_vineyard').GetName]"
 established_sapporo_college_tt: "Мы основали #b Аграрный колледж Саппоро#!"
 hokkaido_agriculture_potentials_tt: "Это решение можно принять не более #v 3#! раз (сейчас: [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0])"
 modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]"
 button_je_taming_the_north_agriculture_arable_land: "Продолжить мелиорацию земель"
 button_je_taming_the_north_agriculture_arable_land_desc: "Эти необъятные земли ещё совсем не развиты, но у них есть огромный потенциал. За счёт большого количества гор на острове есть значительные запасы пресной воды, которые дают нам возможность расширить посевные площади ещё дальше на север.\n\nМы осушим местные болота, обработаем и оросим поля и наконец-то покорим эти территории, тем самым в очередной раз доказав стойкость и упорство #tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')|l]ого#!#! народа."
 hokkaido_agriculture_arable_tt: "Это решение можно принять не более #v 3#! раз (сейчас: [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0])"
 hokkaido_events.1.t: "Восьмой путь"
 hokkaido_events.1.d: "В связи с включением [SCOPE.sState('hokkaido_scope').GetName] — «острова айнов» — в состав Японии у нас возникла необходимость подобрать этой области иное название, которое бы более точно отражало её новый статус. Недавно учреждённая комиссия по колонизации области уже предложила несколько вариантов — [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] лишь [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должна' )] выбрать один из них."
 hokkaido_events.1.f: "«Это земля дикарей. Здесь нет ничего, кроме грязи, болот, нищих рыбаков и плотоядных тварей. Что ты хочешь обрести в этом проклятом месте, чего не может дать тебе [ROOT.GetCountry.GetCapital.GetCityHubName]?»\n\n«Предназначение, мама. И независимость»."
 hokkaido_events.1.a: "Регион будет называться #tooltippable;tooltip:hokkaido_events.1_tt_3 #b Хоккайдо#!#! — «путь северного моря»." # 北加伊道
 hokkaido_events.1.b: "Назовём его #tooltippable;tooltip:hokkaido_events.1_tt_2 #b Хоккайдо#!#! в честь коренных обитателей этих земель." # 北海道
 hokkaido_events.1.c: "#tooltippable;tooltip:hokkaido_events.1_tt_4 #b Кайтодо#!#!, «путь к востоку от моря», — наиболее удачный вариант."
 hokkaido_events.1.e: "#tooltippable;tooltip:hokkaido_events.1_tt_5 #b Хитакамидо#!#! звучит неплохо."
 hokkaido_events.1.tt_1: "Будет основан город #b Саппоро#!, который станет административным центром острова вместо #b Хакодате#!"
 modifier_ainu_heritage_aknowleged: "Земля кай"
 modifier_breaking_new_ground: "Освоение новых земель"
 modifier_hokkaido_naval_connections: "Дорога к морю"
 modifier_call_of_the_frontier: "Зов северного края"
 the_ainu_will_appreciate_this_tt: "@information! #tooltippable_name #tooltip:[GetCulture('ainu').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('ainu').GetCustom('RU_CUL_ADJ')|l]ое#!#! население запомнит этот поступок"
 hokkaido_events.1_tt_2: "#b Северный путь кай#!\nПо словам члена комиссии Мацуура Такэсиро, #italic «кай»#! (加伊) — это старое самоназвание народа айну."
 hokkaido_events.1_tt_3: "#b Путь северного моря#!\nАльтернативный вариант, отличный от изначальной идеи Мацуура Такэсиро. Правительство предложило заменить слово #italic «кай»#! (加伊, «коренной житель») на созвучное ему #italic «кай»#! (海, «море»).\n\n@information! Это исторический вариант"
 hokkaido_events.1_tt_4: "#b Путь к востоку от моря#!\nЦенность этого острова тесно связана с морем, которое его омывает, поэтому логично отразить эту связь в его названии."
 hokkaido_events.1_tt_5: "#b Путь Страны восходящего солнца#!\nСтаринное название северо-восточных рубежей Японии, относящееся к периоду Ямато. Этот вариант связывает новую колонию с древней историей Японии."
 hokkaido_events.2.t: "Новый рубеж"
 hokkaido_events.2.d: "Комиссия по колонизации [SCOPE.sState('hokkaido_state_scope').GetName] уже долгое время пытается решить, как лучше подойти к освоению этого региона. Чиновники с нетерпением требуют, чтобы мы как можно скорее утвердили наши дальнейшие планы в отношении острова."
 hokkaido_events.2.f: "Когда он был ребёнком, отец часто рассказывал ему о предках, гордых и благородных воинах эпохи внутреннего раздора, об их суровом достоинстве и великих деяниях. В то время такие истории захватывали его, но со временем восторг сменился тоской. Слушать о подвигах прошлого из уст горожанина, да ещё и пьяницы, который только и умел, что возиться с бумажками, а меч носил лишь для того, чтобы казаться солиднее, было попросту невыносимо.\n\nПоэтому, когда отец попросил у сына помощи с его делом, тот с презрением отказался и незамедлительно отправился на север. Быть может, там он отыщет спасение для своего рода?"
 hokkaido_events.2.a: "В первую очередь там должны селиться наши военные."
 hokkaido_events.2.b: "Простые крестьяне — главная опора #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ой#! экономики."
 hokkaido_events.2.c: "Разрешить строить #tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')|l]ие#!#! поселения только там, где не живут #tooltippable_name #tooltip:[GetCulture('ainu').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('ainu').GetCustom('RU_CUL_ADJ')|l]ие#!#! аборигены."
