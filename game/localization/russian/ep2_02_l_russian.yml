 hokkaido_events.2.tt_2: "#v 3%#! всех #tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')|l]их#!#! [Concept('concept_pop', 'групп населения')] в области [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (одна из [Concept('concept_state','областей')] с наименьшим [Concept('concept_gdp', 'ВВП')] в регионе [GetGeographicRegion('geographic_region_home_islands').GetName]) переселится в область [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_old_swords_in_new_lands: "Старые клинки на новых землях"
 modifier_go_north_young_man: "На Север, молодой человек"
 hokkaido_events.3.t: "Ростки прогресса"
 hokkaido_events.3.d: "Благодаря недавним открытиям Аграрного колледжа Саппоро у нас появилась возможность выращивать на полях [SCOPE.sState('hokkaido_state_scope').GetName] новые культуры, которые прежде там не приживались."
 hokkaido_events.3.f: "#b Журнал личных наблюдений, 154#!\nПолучив последние результаты испытаний, мы перестали прививать западные сорта и сосредоточились на южных. Ребята уверены, что полученные культуры можно будет высаживать значительно севернее, возможно, даже севернее Камикавы. Для оценки потенциального урожая требуются дополнительные исследования, но у меня хорошее предчувствие. Завтра мне предстоит встреча с главой факультета. Надо купить новый галстук."
 hokkaido_events.3.a: "Сосредоточиться на повышении качества тех культур, которые мы уже выращиваем."
 hokkaido_events.3.b: "Вывести морозостойкие сорта риса для местных #tooltippable_name #tooltip:[GetBuildingType('building_rice_farm').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [GetBuildingType('building_rice_farm').GetCustom('RU_BL_RP')|l]#!#!."
 hokkaido_events.3.c: "На низменностях можно создать #tooltippable_name #tooltip:[GetBuildingType('building_dye_plantation').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [GetBuildingType('building_dye_plantation').GetCustom('RU_BL_VP')|l]#!#! для выращивания индиго."
 hokkaido_events.3.e: "Здесь отлично приживается мак, а значит, мы можем неплохо заработать на #tooltippable_name #tooltip:[GetBuildingType('building_opium_plantation').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [GetBuildingType('building_opium_plantation').GetCustom('RU_BL_PP')|l]#!#!."
 hokkaido_events.3.g: "Разобьём здесь #tooltippable_name #tooltip:[GetBuildingType('building_vineyard').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [GetBuildingType('building_vineyard').GetCustom('RU_BL_VP')|l]#!#! с особыми сортами винограда."
 button_je_taming_the_north_complete: "Мы уже освоили эти земли в той мере, в какой это позволяют сделать наши технологии"
 modifier_introducing_new_crops: "Внедрение новых культур"
 modifier_opimizing_existing_variants: "Хладостойкие культуры"
 hokkaido_events.4.t: "Расширение пахотных земель" # Markens Grøde really does sound better in Norwegian
 hokkaido_events.4.d: "Комиссия по колонизации [SCOPE.sState('hokkaido_state_scope').GetName] достигла ещё одного значительного успеха, превратив обширные участки бывших болот в ценные сельскохозяйственные угодья."
 hokkaido_events.4.f: "Это было поистине впечатляющее зрелище. Ещё десятилетие назад лишь скромная гребная лодка могла безопасно пройти по этой реке. Теперь же он наблюдал, как рабочие выгружали ящики и холщовые мешки с внушительного парового судна, выпускавшего клубы дыма в холодный горный воздух. Может, это материалы для очередного шлюза или дренажных работ выше по течению? Или товары из новой деревни, раскинувшейся в долине? Он не знал, да это и не имело значения. Что бы ни перевозило это судно, оно перевозило будущее."
 hokkaido_events.4.a: "С каждым ударом мотыги мы постепенно преображаем эти земли."
 hokkaido_events.4.b: "И с каждым новым домом они становятся всё более пригодными для жизни."
 hokkaido_events.4.tt_1: "#v 2%#! всех #tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')|l]их#!#! [Concept('concept_pop', 'групп населения')] в области [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (одна из [Concept('concept_state','областей')] с наименьшим [Concept('concept_gdp', 'ВВП')] в регионе [GetGeographicRegion('geographic_region_home_islands').GetName]) переселится в область [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_immigration_burst: "Волна иммиграции"
 modifier_open_to_business: "Готовы вести дела"
 hokkaido_events.5.t: "Ребята, будьте амбициозны…"
 hokkaido_events.5.d: "#tooltippable_name [SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective]ие#! сотрудники Аграрного колледжа Саппоро завершили подготовку первых специалистов, и выпускникам уже не терпится применить свои знания на практике. Тем временем руководство колледжа обдумывает дальнейшие планы и направления работы."
 hokkaido_events.5.f: "«…Будьте амбициозны не ради денег или амбиций и не ради той мимолётной вещи, которую люди называют славой. Будьте амбициозны ради достижения всего, чем должен быть человек».\n\nУильям Смит Кларк, #italic прощальная речь при уходе с поста главы Аграрного колледжа Саппоро#!"
 hokkaido_events.5.a: "Аграрный колледж должен прежде всего заниматься вопросами сельского хозяйства."
 hokkaido_events.5.b: "Необходимо учредить в колледже инженерный факультет."
 hokkaido_events.5.c: "Стоит открыть гуманитарный факультет и начать изучение местной культуры."
 hokkaido_events.5.tt_1: "Под влиянием работающих в #b Саппоро#! #tooltippable_name [SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective|l]их#! специалистов будет создана местная #tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')|l]ая#!#! #tooltippable_name #tooltip:[SCOPE.sReligion('sapporo_partner_religion_scope').GetTooltipTag],DATA_RELIGION_NAME_TOOLTIP,ReligionTooltip [SCOPE.sReligion('sapporo_partner_religion_scope').GetCustom('RU_RL_ADJ_YA')|l]#!#! община"
 hokkaido_events.5.tt_2: "Открывает действия #b «$button_je_taming_the_north_agriculture_potentials$»#! и #b «$button_je_taming_the_north_agriculture_arable_land$»#! в [Concept('concept_journal_entry', 'записи в дневнике')] #b «$je_taming_the_north$»#!"
 modifier_sapporo_expanded_agricultural_faculty: "Новаторская агротехника"
 modifier_sapporo_expanded_engineering_faculty: "Передовой инженерный факультет"
 modifier_sapporo_humanities_faculty: "Культуроведение в Саппоро"
 hokkaido_events.6.t: "Айну мосир, сисам мосир"
 hokkaido_events.6.d: "На фоне внутриполитических споров власти города [ROOT.GetCountry.GetCapital.GetCityHubName] издали новый указ, определяющий юридический статус [SCOPE.sState('hokkaido_state_scope').GetName]. Среди прочего документ официально устанавливает границы родных земель айну и учреждает ряд институтов, которые будут действовать параллельно с официальным #tooltippable_name [ROOT.GetCountry.GetAdjective|l]им#! бюрократическим аппаратом."
 hokkaido_events.6.f: "«Хинна! Хинна!» Улыбаясь почти беззубым ртом, старуха-айну протянула ему миску с супом. Увидев, сколько в нём мяса, он поблагодарил богов, что с ним нет родителей. Они бы непременно его осудили.\n\n«Чего только не сделаешь ради мира», — пробормотал он под нос, с показной благосклонностью принимая угощение."
 hokkaido_events.6.a: "На этих землях хватит места обоим народам."
 modifier_opposes_ainu_rights: "Уступки варваров"
 modifier_supports_ainu_rights: "Закрепление прав айну"
 hokkaido_events.7.t: "Триумф Комиссии"
 hokkaido_events.7.d: "Комиссия по колонизации [SCOPE.sState('hokkaido_state_scope').GetName] официально сообщила об успешном выполнении задач, возложенных на неё государством, и решила передать все свои оставшиеся обязательства и полномочия правительству."
 hokkaido_events.7.f: "#b Постановление 8#!\nКомиссия по колонизации [SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting] упраздняется, и создаются три префектуры: Хакодате, Немуро и Саппоро. Границы этих новообразованных объектов будут определены позднее."
 hokkaido_events.7.a: "Разработанные Комиссией методы можно применить в будущих колониях."
 hokkaido_events.7.b: "[GetGeographicRegion('geographic_region_home_islands').GetName] тоже могут извлечь выгоду из полученного опыта."
 modifier_external_applications: "Кайтакуси: внешнее развитие"
 modifier_domestic_applications: "Кайтакуси: внутреннее развитие"
 hokkaido_events.8.t: "Провал Комиссии"
 hokkaido_events.8.d: "В связи с потерей острова [SCOPE.sStateRegion('hokkaido_state_region_scope').GetName] правительство решило распустить Комиссию по колонизации, которая так и не справилась с поставленной задачей. В результате возмущённые граждане [ROOT.GetCountry.GetAltName('RU_CL_RP')] вышли на улицы и начали открыто выражать своё недовольство тем, что государство не оправдало их вложений и утратило былой престиж."
 hokkaido_events.8.f: "Управляющий-эмерит устало плюхнулся в рабочее кресло, налил себе полную чашку саке и осушил её одним глотком, поглядывая на карты, разложенные перед ним на столе. Каждая из них, испещрённая неразборчивыми пометками и замечаниями, представляла собой отдельный план, в работу над которым он вложил немало сил. Теперь ни сил, ни планов у него не осталось, и эти излучающие оптимизм записи казались ему насмешкой.\n\n«Да пропади оно всё пропадом!» — подумал он и налил себе ещё саке."
 hokkaido_events.8.a: "К сожалению, в этой ситуации правительство бессильно."
 modifier_lost_northern_investments: "Провал в освоении Севера"
