l_russian:
 #Japan Single-Fire Events
 japan_events.31.t: "Пожар в театре города [SCOPE.sState('kabuki_theatre_state').GetCityHubName]"
 japan_events.31.d: "Популярный театр кабуки в #tooltippable_name #tooltip:[SCOPE.sState('kabuki_theatre_state').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('kabuki_theatre_state').GetCustom('RU_SL_PP')]#!#! полностью уничтожен пожаром. Пока труппа ищет возможности восстановить здание, [SCOPE.gsInterestGroup('relevant_ig').GetName] — и в первую очередь [SCOPE.sCharacter('relevant_leader').GetFullName] — намерены воспользоваться этим поводом, чтобы ужесточить контроль над индустрией развлечений в городе [SCOPE.sState('kabuki_theatre_state').GetCityHubName] и принудить актёров перенести театр за пределы городской черты."
 japan_events.31.f: "Наблюдатель на вершине каланчи дежурит днём и ночью, оберегая покой жителей города [SCOPE.sState('kabuki_theatre_state').GetCityHubName]. Поздним вечером он замечает признаки пожара: над зданием театра поднимаются клубы дыма, воздух наполняется резким запахом гари. Наблюдатель бросается к пожарному колоколу.\n\nНичего не подозревающие горожане тут же узнают о беде. Пожарные бригады ловко карабкаются по крышам, спеша остановить распространение пламени. Им удаётся потушить пожар, однако ущерб уже нанесён — от одного из виднейших театров кабуки остались лишь угли да пепел."
 japan_events.31.a: "Пусть строят свой театр за пределами города."
 japan_events.31.b: "Им будет дозволено восстановить театр на прежнем месте."
 modifier_kabuki_regulated: "Нападки на театр кабуки"
 modifier_theatre_affronted_official: "Оскорблённый чиновник"
 modifier_shogunate_opposition_ig_approval: "Оппортунисты в оппозиции"
 japan_events.32.t: "Образы изменчивого мира"
 japan_events.32.d: "Творчество известного мастера техники укиё-э из города [SCOPE.sState('ukiyo_e_state').GetCityHubName] вдохновляет множество художников как в [ROOT.GetCountry.GetAltName('RU_CL_PP')], так и за рубежом."
 japan_events.32.f: "На популярной гравюре изображён оживлённый театральный квартал на окраине города [SCOPE.sState('ukiyo_e_state').GetCityHubName]. Освещённая серебристым лунным светом центральная улица полна людей, их фигуры отбрасывают тени. Вдоль восточной стороны вытянулись чайные дома и кукольные театры, а с западной стороны стоят три театра кабуки, и над каждым возвышается барабанная башня.\n\n«В уверенных и чётких линиях видна рука искусного мастера, который превосходно обращается со светом и тенью. Только такой мастер мог бы составить настолько ритмичную и организованную композицию — мощную, но в то же время утончённую».\nF.W.G., #italic Бюллетень Чикагского института искусств#!"
 japan_events.32.a: "Несомненно, [ROOT.GetCountry.GetAdjectiveNoFormatting|l]ое искусство скоро прославится по всему миру."
 japan_events.32.b: "Превосходно. Нужно поддержать выпуск таких гравюр."
 modifier_ukiyo_e_prestige: "Прославленные гравюры"
 modifier_ukiyo_e_production: "Производство гравюр"
 japan_events.33.t: "Борьба и традиции"
 japan_events.33.d: "Вестернизация оказала заметное воздействие на [ROOT.GetCountry.GetAdjectiveNoFormatting|l]ую культуру. Повседневные обычаи меняются, прежние традиции выходят из моды. [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle|U] [SCOPE.sCharacter('relevant_character').GetFullName] хочет провести в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] турнир по борьбе сумо, чтобы вернуть этому виду спорта былую популярность."
 japan_events.33.f: "Зал сумо, недавно построенный на храмовых землях, переполнен зрителями. Людям не терпится посмотреть, что же за состязание [SelectLocalization(SCOPE.sCharacter('relevant_character').IsFemale, 'задумала', 'задумал' )] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]. Среди публики присутствует знать и государственные мужи, помешанные на западной культуре. При всём своём пренебрежении к традициям, даже они не могли пропустить это событие. И пусть золотой век сумо давно миновал, [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] твёрдо [SelectLocalization(SCOPE.sCharacter('relevant_character').IsFemale, 'намерена', 'намерен' )] возродить культурную значимость этой борьбы."
 japan_events.33.a: "[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle|U] сумеет восстановить репутацию сумо в глазах публики."
 japan_events.33.b: "Традиции [ROOT.GetCountry.GetAdjectiveNoFormatting|l]ого спорта переживут нас всех."
 modifier_restored_sumo_popularity: "Популярность сумо восстановлена"
 modifier_traditional_sports_movement_support: "Национальный вид спорта"
 japan_events.34.t: "Трагедия китобоев из гавани [SCOPE.sState('whaling_state').GetPortHubName]"
 japan_events.34.d: "У берегов #tooltippable_name #tooltip:[SCOPE.sState('whaling_state').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('whaling_state').GetCustom('RU_SL_RP')]#!#! рыбаки заметили пару японских китов — самку с детёнышем. Промысловый сезон в этом году выдался крайне неудачным, поэтому несколько китобойных судов, невзирая на ненастную погоду, немедленно вышли в море. Назад они не вернулись. Более ста человек пропали без вести."
 japan_events.34.f: "Судовые огни давно пропали из вида, флот больше нельзя было разглядеть с берега. В портовом городе [SCOPE.sState('whaling_state').GetPortHubName] царила тревога.\n\n«Даже в самые трудные времена мы никогда не осмеливались пойти на мать с детёнышем, — говорит кто-то из жителей. — Лучше бы мы позволили китам уйти».\n\n«Глупости, — возражает его кузен. — Киты — наше благословение. Скоро экспедиция вернётся с богатой добычей»."
 japan_events.34.a: "Китобойный промысел — важнейшая индустрия [SCOPE.sState('whaling_state').GetCustom('RU_SL_RP')]."
 japan_events.34.b: "Жителям [SCOPE.sState('whaling_state').GetCustom('RU_SL_RP')] лучше заняться рыболовством."
 modifier_whaling_deaths: "Потери среди китобоев"
 modifier_redouble_on_whaling: "Будущее за китобойным промыслом"
 modifier_fishing_not_whaling: "Будущее за рыболовством"
 japan_events.35.t: "Меры против поджигателей"
 japan_events.35.d: "[SCOPE.gsInterestGroup('relevant_ig').GetName|U] всерьёз обеспокоены: из-за частых поджогов в городе [SCOPE.sState('relevant_state').GetCityHubName] цены на #tooltippable_name #tooltip:[SCOPE.sGoods('expensive_good').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('expensive_good').GetCustom('RU_GL_VP')|l]#!#! в [ROOT.GetCountry.GetAltName('RU_CL_PP')] пошли вверх. Они требуют, чтобы власти удвоили усилия по поимке поджигателей."
 japan_events.35.f: "С каланчи города [SCOPE.sState('relevant_state').GetCityHubName] разносится звон колокола, предупреждая жителей об очередном пожаре. Пока пожарные команды спешат потушить огонь, охвативший дома и лавки, на улице собирается недовольная толпа. Горожане с подозрением поглядывают на соседей, у всех на устах один вопрос — это несчастный случай или дело рук поджигателя? Ясно одно: цены на [SCOPE.sGoods('expensive_good').GetCustom('RU_GL_VP')|l] скоро вырастут в несколько раз."
 japan_events.35.a: "Нужно принять самые строгие меры. Казнить подозреваемых в поджогах!"
 japan_events.35.b: "Мы помилуем тех, кто поможет ловить других поджигателей."
 modifier_arson_measure_strict_ig: "Суровые меры против поджигателей"
 modifier_arson_measure_strict_pop: "Казни поджигателей"
 modifier_arson_measure_lenient_ig: "Снисхождение к поджигателям"
 # Colonization of Korea Content
 je_colonize_korea: "Власть над Кореей"
 je_colonize_korea_reason: "#italic «В отсутствие войны и при надлежащем контроле можно добиться значительного развития промышленности и торговли. Мы совершенно уверены, что это приведёт к установлению в Восточной Азии мира, прочнее которого наша история ещё не знала».\n(Записки императора Мэйдзи, том 12)#!\n\nНастало время упрочить влияние на Корейском полуострове. Только после этого [JournalEntry.GetCountry.GetName] и [GetGeographicRegion('geographic_region_east_asia').GetName] смогут процветать в безопасности. Если [GetGeographicRegion('geographic_region_korea').GetName] будет находиться под нашим пристальным наблюдением и мы не станем отступать от своих амбиций, мы сумеем удержать власть."
 je_colonize_korea_is_owned_by_tt: "Находится во владении [JournalEntry.GetCountry.GetAltName('RU_CL_RP')]"
 je_colonize_korea_culture_percent_seoul_tt: "#tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')]ое#!#! [Concept('concept_pop', 'население')] Сеула составляет не менее #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_busan_tt: "#tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')]ое#!#! [Concept('concept_pop', 'население')] Пусана составляет не менее #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_yangho_tt: "#tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')]ое#!#! [Concept('concept_pop', 'население')] Янхо составляет не менее #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_sariwon_tt: "#tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')]ое#!#! [Concept('concept_pop', 'население')] Саривона составляет не менее #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_pyongyang_tt: "#tooltippable_name #tooltip:[GetCulture('japanese').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('japanese').GetCustom('RU_CUL_ADJ')]ое#!#! [Concept('concept_pop', 'население')] Пхеньяна составляет не менее #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_fail_tt: "#bold [GetGeographicRegion('geographic_region_korea').GetName]#! больше не находится под #tooltippable_name [ROOT.GetCountry.GetAdjective|l]им#! контролем"
 korea_colinzation_2b_executive_tt: "[Concept('concept_executive', 'Должностное лицо')] получает модификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_tt «$modifier_peninsula_control_loyal_prominence$»#! на срок #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! (в годах)"
