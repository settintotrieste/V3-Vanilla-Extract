 korea_colinzation_3b_tt: "Кто-то должен взять ответственность за эту ошибку."
 korea_colinzation_3b_ig_leader_tt: "[Concept('concept_leader', 'Лидер')] получает модификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_loss_tt «$modifier_peninsula_control_loyal_prominence$»#! на срок #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! (в годах)"
 korea_colinzation_3b_ig_tt: "[Concept('concept_interest_group', 'Заинтересованная группа')] получает модификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_approval_pol_str_loss_tt «$modifier_peninsula_control_approval_pol_str_loss$»#! на срок #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! (в годах)"
