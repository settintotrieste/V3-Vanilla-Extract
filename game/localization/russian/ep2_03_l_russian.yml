 korea_colonization.2.t: "Многообещающее будущее"
 korea_colonization.2.d: "Теперь весь мир убедился, что [GetGeographicRegion('geographic_region_korea').GetName] находится под полным контролем [ROOT.GetCountry.GetAltName('RU_CL_RP')] и является неотъемлемой частью нашей страны. Успехи в установлении власти над полуостровом в очередной раз подтверждают, что мы не зря занимаем лидирующие позиции на международной политической арене."
 korea_colonization.2.f: "Когда два народа наконец объединяются, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] испытывает невероятный душевный подъём. Сидя в столице [ROOT.GetCountry.GetCapital.GetCityHubName], [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'она', 'он' )] сочиняет танка, прославляющие это достижение и успехи в развитии полуострова.\n\nВ это самое время в Сеуле [GetCulture('korean').GetNameNoFormatting|l]ий чиновник подавляет протест граждан, недовольных новыми порядками. С завидной невозмутимостью он обращается к толпе и объясняет, что этот союз выгоден обеим сторонам."
 korea_colonization.2.a: "Полуостров ждёт благополучное и безопасное будущее."
 korea_colonization.2.b: "Бизнес играет важную роль в нашей политике."
 modifier_peninsula_control_prestige_authority: "Престиж полуострова"
 modifier_peninsula_control_assimilation_migration: "Ускоренная ассимиляция"
 modifier_peninsula_control_loyal_prominence: "Невероятный надзор"
 modifier_peninsula_control_company_bonus: "Похвала компании"
 korea_colonization.3.t: "Упущенная возможность"
 korea_colonization.3.d: "[GetGeographicRegion('geographic_region_korea').GetName] больше не находится под нашим контролем. Это событие окажет долгосрочное влияние на экономику и дипломатию [ROOT.GetCountry.GetAltName('RU_CL_RP')]."
 korea_colonization.3.f: "[ROOT.GetCountry.GetAdjectiveNoFormatting]ие чиновники собираются, чтобы обсудить провальную попытку правительства поддержать порядок на полуострове. В воздухе витают напряжение и недовольство. Когда встаёт вопрос о том, как стране оправиться после сокрушительного удара по её с таким трудом завоёванному авторитету, многие отказываются идти на компромиссы.\n\nВ разгар обсуждения один мужчина встаёт и громко, стараясь, чтобы его услышали, заявляет: «Безусловно, [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting|l] могут взять на себя ответственность за эту неудачу»."
 korea_colonization.3.a: "Мы должны разделить бремя нашей ошибки."
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName] и [SCOPE.gsInterestGroup('relevant_ig').GetName|l] должны понести ответственность за этот провал."
 modifier_peninsula_control_prestige_loss: "Ослабление контроля"
 modifier_peninsula_control_loyal_prominence_loss: "Падение авторитета"
 modifier_peninsula_control_approval_pol_str_loss: "Увядающее влияние"
