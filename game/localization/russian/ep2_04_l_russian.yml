 ep2_meiji_pulse.2.t: "Обстрел города [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]"
 ep2_meiji_pulse.2.d: "В ответ на отказ княжества [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] выплатить компенсацию за убийство #tooltippable_name [SCOPE.sCountry('relevant_gp').GetAdjective|l]ого#! купца по имени [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] военные корабли этой страны вступили в многодневную артиллерийскую дуэль против батарей на береговых укреплениях города [SCOPE.sState('namamugi_daimyo_state').GetPortHubName]."
 ep2_meiji_pulse.2.f: "Бухту окутало дымом от непрерывного огня пушек, и город [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] охватило пламя. Один из иностранных кораблей столь упорно отстреливался по литейным в северной части города, что яркие взрывы от прилетающих снарядов перекрывали свет от заходящего солнца.\n\nВ этот момент последняя исправная пушка в батарее, где [SelectLocalization(SCOPE.sCharacter('name_a_scope').IsFemale, 'служила', 'служил' )] [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting], вопреки шансам всё же произвела ответный выстрел, но безуспешно. Ядро пролетело мимо третьего корабля во вражеском строю и с мощным всплеском ушло под воду. Тогда [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('name_a_scope').IsFemale, 'схватила свой банник и ринулась', 'схватил свой банник и ринулся' )] чистить ствол пушки. Где-то позади до сих пор кричали солдаты, раненые в ходе последнего залпа, но несмотря на звон в ушах, [SelectLocalization(SCOPE.sCharacter('name_a_scope').IsFemale, 'она всё равно их отчётливо слышала', 'он всё равно их отчётливо слышал' )]."
 ep2_meiji_pulse.2.a: "Жестокая расплата за безрассудство."
