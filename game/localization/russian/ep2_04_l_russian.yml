 fraction_of_country_levels_owned_by_zaibatsu_ge_to_10_tt: "[Concept('concept_zaibatsu', 'Дзайбацу')] принадлежит не менее [SCOPE.ScriptValue('je_zaibatsu_possible_fraction_threshold')|v%0] [Concept('concept_building_level', 'уровней')] всех #tooltippable_name [ROOT.GetCountry.GetAdjective|l]их#! сооружений (сейчас [SCOPE.ScriptValue('fraction_of_country_levels_owned_by_zaibatsu')|v%])"
 fraction_of_country_levels_owned_by_zaibatsu_ge_to_25_tt: "[Concept('concept_zaibatsu', 'Дзайбацу')] принадлежит не менее [SCOPE.ScriptValue('je_zaibatsu_complete_fraction_threshold')|v%0] [Concept('concept_building_level', 'уровней')] всех #tooltippable_name [ROOT.GetCountry.GetAdjective|l]их#! сооружений (сейчас [SCOPE.ScriptValue('fraction_of_country_levels_owned_by_zaibatsu')|v%])"
