 daimyo_tt: "Является даймё"
 daimyo_not_tt: "#b Не#! является даймё"
 modifier_power_behind_the_shogun: "Пользуется поддержкой сёгуната"
 modifier_japan_selected_shogun_candidate: "Усиливающаяся фракция"
 modifier_japan_lineage_disregarded: "Происхождение не важно"
