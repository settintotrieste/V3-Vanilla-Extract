 shogunate.1.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] назначается сёгуном" # Ieyoshi
 shogunate.1.d: "Встав во главе клана [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'получила', 'получил' )] от императора и должность сёгуна. Однако многие [SCOPE.gsInterestGroup('daimyo_scope').GetName|l] не испытывают к новому сёгуну особого почтения — [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'ей', 'ему' )] ещё предстоит утвердить свой авторитет."
 shogunate.1.f: "Процессия даймё пёстрой лентой вилась через зал Охирома. На возвышении сидел сёгун в чёрно-красных одеждах; в ларце по правую руку лежал императорский указ.\n\nОдин за другим представители знатных домов в красных, синих и лиловых одеяниях склонялись перед даймё и вручали ему золотые дары. Уста сёгуна оставались сомкнуты, как и тех, кто шёл на поклон. За дверью зала собралась низшая знать, которой видеть сёгуна не полагалось. В саду начали повторять:"
 shogunate.1.a: "«Госёсин, госёсин!»"
 shogunate.2.t: "Вопрос престолонаследия"
 shogunate.2.d: "[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] и [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'её', 'его' )] окружение глубоко встревожены: [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'её', 'его' )] старший сын, [SCOPE.sCharacter('iesada_scope').GetFirstName], слаб здоровьем и едва ли справится с обязанностями главы государства. [SCOPE.sCharacter('armed_forces_leader').GetFullName] и верные [SelectLocalization(SCOPE.sCharacter('armed_forces_leader').IsFemale, 'ей', 'ему' )] даймё считают, что наилучшим кандидатом на роль следующего сёгуна станет [SCOPE.sCharacter('yoshinobu_scope').GetFullName]."
 shogunate.2.f: "Спальня стояла пустой — ширмы были закрыты, на веранде прибрано. [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('armed_forces_leader').IsFemale, 'сидела', 'сидел' )] возле постели, перед [SelectLocalization(SCOPE.sCharacter('armed_forces_leader').IsFemale, 'ней', 'ним' )] лежал чистый лист бумаги. Глаза [SCOPE.sCharacter('armed_forces_leader').GetHerHis] были закрыты. Даже если бы снаружи кралась кошка, [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('armed_forces_leader').IsFemale, 'услышала', 'услышал' )] бы её шаги — и всё же [SCOPE.sCharacter('armed_forces_leader').GetSheHe] [SelectLocalization(SCOPE.sCharacter('armed_forces_leader').IsFemale, 'боялась', 'боялся' )], что [SCOPE.sCharacter('armed_forces_leader').GetHerHis] могут подслушивать. Ещё слишком рано, лучше держать амбиции при себе...\n\nПримет ли императорский двор [SCOPE.sCharacter('armed_forces_leader').GetHerHis] точку зрения? [SCOPE.sCharacter('armed_forces_leader').GetSheHe|U] [SelectLocalization(SCOPE.sCharacter('armed_forces_leader').IsFemale, 'полагала', 'полагал' )], что да, но это был самый простой из мучивших [SCOPE.sCharacter('armed_forces_leader').GetHerHis] вопросов. [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('armed_forces_leader').IsFemale, 'продолжала', 'продолжал' )] напряжённо размышлять. Как добиться нужного указа? И что нужно сделать, чтобы он не затерялся?"
 shogunate.2.a: "[GetLawType('law_bakufu').GetName] всё равно добьётся своего."
 shogunate.2.b: "В сложившихся обстоятельствах нужно сильное руководство."
 shogunate.3.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] назначается сёгуном" # Iesada
 shogunate.3.d: "Встав во главе клана [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'получила', 'получил' )] от императора и должность сёгуна. [SCOPE.sCharacter('shogun_scope').GetSheHe|U] с детства [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'отличалась', 'отличался' )] слабым здоровьем, и потенциальные преемники уже вступили в борьбу за право унаследовать этот пост."
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "«Госёсин, госёсин!»"
 shogunate.4.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] назначается сёгуном" # Yoshinobu
 shogunate.4.d: "Встав во главе клана [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'получила', 'получил' )] от императора и должность сёгуна. Сторонники реформ, поддержавшие нового сёгуна, с нетерпением ожидают перемен."
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "«Госёсин, госёсин!»"
 shogunate.5.t: "Хитоцубаси и Нанки"
 shogunate.5.d: "[SCOPE.sCharacter('shogun_scope').GetFullName] так и не [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'смогла', 'смог' )] обзавестись наследником, и группировки, сформировавшиеся вокруг претендентов на роль преемника сёгуна Иэёси, вновь вступили в конфликт. Периферийные даймё и [SCOPE.gsInterestGroup('armed_forces_ig').GetName|l], входящие во фракцию Хитоцубаси, считают, что следующим сёгуном [SelectLocalization(SCOPE.sCharacter('yoshinobu_scope').IsFemale, 'должна', 'должен' )] стать [SCOPE.sCharacter('yoshinobu_scope').GetFullName], тогда как фракция Нанки — [SCOPE.gsInterestGroup('daimyo_ig').GetName|l], наиболее приближённые к сёгуну, — желает, чтобы эту должность [SelectLocalization(SCOPE.sCharacter('iemochi_scope').IsFemale, 'заняла', 'занял' )] [SCOPE.sCharacter('iemochi_scope').GetFullName]."
 shogunate.5.f: "Смертельно бледный посыльный смотрел в пол перед возвышением, на котором сидел чиновник. Кисть дрогнула над бумагой.\n\n«Послание для господина Ёсикацу, — произнёс чиновник. — При попустительстве придворных распространяются некрасивые слухи о смерти сёгуна. О правителе рассуждают так, будто у него нет права голоса. Прошу уведомить меня о любых законопроектах, созданных исходя из этой предпосылки»."
 shogunate.5.a: "Править будет [SCOPE.sCharacter('iemochi_scope').GetFirstName]. Такова воля сёгуна."
 shogunate.5.b: "Императорскому двору нужен опытный преемник."
 shogunate.6.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] назначается сёгуном" # Iemochi
 shogunate.6.d: "Встав во главе клана [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'получила', 'получил' )] от императора и должность сёгуна. Несмотря на юный возраст, [SCOPE.sCharacter('shogun_scope').GetSheHe] уже [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'проявила', 'проявил' )] себя вдумчивым и здравомыслящим ребёнком."
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "«Госёсин, госёсин!»"
 shogunate.6.a_regency: "У [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'неё', 'него' )] будет верный опекун."
 shogunate.6.b_regency: "Нам нужен компромисс с Хитоцубаси. Пусть [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'её', 'его' )] опекуном будет [SCOPE.sCharacter('yoshinobu_scope').GetFirstName]."
 shogunate.7.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] назначается сёгуном" # Iesato
 shogunate.7.d: "Встав во главе клана [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'получила', 'получил' )] от императора и должность сёгуна. [SCOPE.sCharacter('shogun_scope').GetSheHe|U] [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'известна', 'известен' )] широтой своих взглядов, и многие ожидают, что [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'новая', 'новый' )] сёгун поддержит реформаторов в составе [GetLawType('law_bakufu').GetName|l]."
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "«Госёсин, госёсин!»"
 shogunate.8.t: "Жаркое лето"
 shogunate.8.d: "[SCOPE.sCharacter('shogun_scope').GetFullName] быстро угасает, [SCOPE.sCharacter('shogun_scope').GetHerHis] состояние резко ухудшилось из-за летнего зноя. [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'Старая', 'Старый' )] [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle|l] уже не встаёт с постели — [SCOPE.sCharacter('shogun_scope').GetSheHe] ведёт свою последнюю битву с собственным сердцем, готовым вот-вот отказать."
 shogunate.8.f: "Постель сёгуна развернули так, чтобы он мог смотреть в окно. Слуги уповали на то, что прохладный морской бриз в сочетании с их веерами принесёт облегчение. У подножья кровати стоял открытый ларь со льдом; на лоб правителя положили холодный компресс.\n\nНо сегодня ветра не было. В воздухе дрожало закатное марево — беспощадное, липкое. Силуэты волн сёгун уже не различал."
 shogunate.8.a: "Это был конец."
 shogunate.8.b: "Послать за голландскими лекарствами."
