 ep2_meiji_pulse.1.t: "Право на убийство"
 ep2_meiji_pulse.1.d: "#tooltippable_name [SCOPE.sCountry('relevant_gp').GetAdjective]ий#! купец, посетивший #tooltippable_name #tooltip:[SCOPE.sState('relevant_treaty_port_state').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('relevant_treaty_port_state').GetCustom('RU_SL_VP')]#!#!, погиб от рук вассалов даймё княжества [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]. [SCOPE.sCharacter('daimyo_scope').GetFullName] утверждает, что несчастный отказался спешиться при виде даймё, тем самым проявив неуважение. Как известно, знатный человек вправе убить любого простолюдина, совершившего подобный проступок."
 ep2_meiji_pulse.1.f: "Чужеземцы разбили строй мушкетёров, и со всех сторон послышались крики. Заметив, что его окружают вооружённые люди, лидер нападающих резко натянул поводья, развернув коня и почти выбив из седла одного из противников. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] достал свой меч, и соратники, оказавшиеся вместе с ним в плотном кольце, последовали его примеру.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] нанёс первый удар и попал чужаку прямо в бок. Тот закричал и снова дёрнул поводья, но на этот раз манёвр не удался. Ближайший к нему мушкетёр среагировал быстро: он взмахнул клинком, и алая дуга на мгновение повисла в воздухе."
 ep2_meiji_pulse.1.a: "[SCOPE.sCharacter('daimyo_scope').GetFullName] просто мечтает навлечь на нас неприятности…"
 ep2_meiji_pulse.11.t: "[SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('richardson_scope').IsFemale, 'убита', 'убит' )] в Японии"
 ep2_meiji_pulse.11.d: "В [SCOPE.sCountry('japan_scope').GetAltName('RU_CL_PP')] во время деловой поездки [SelectLocalization(SCOPE.sCharacter('richardson_scope').IsFemale, 'погибла', 'погиб' )] #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag|l]ий#! купец по имени [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting]. [SelectLocalization(SCOPE.sCharacter('richardson_scope').IsFemale, 'Её', 'Его' )] [SelectLocalization(SCOPE.sCharacter('daimyo_scope').IsFemale, 'убила', 'убил' )] местный феодал, [SCOPE.sCharacter('daimyo_scope').GetFullName]. [SelectLocalization(SCOPE.sCharacter('daimyo_scope').IsFemale, 'Она', 'Он' )] утверждает, что [SelectLocalization(SCOPE.sCharacter('daimyo_scope').IsFemale, 'действовала', 'действовал' )] в рамках правового поля своей страны, и отказывается платить компенсацию за это гнусное преступление."
 ep2_meiji_pulse.11.f: "#b Передовица#!\n\nМы повторяем, что в текущих условиях [ROOT.GetCountry.GetNameNoFormatting] может лишь готовиться к большой войне, иначе с Японией придётся распрощаться навсегда. Поскольку о последнем не может быть и речи, нас наверняка ожидает конфликт двух держав. Многие [SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')|l] не одобряют идею войны, однако редакция газеты «[SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]» города [ROOT.GetCountry.GetCapital.GetCityHubName] считает конфликт не только неизбежным, но и совершенно оправданным: хотя бы потому, что японцы отказываются наказывать убийц, от рук которых пал [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]… (#italic продолжение на стр. 2#!)" #largely copied from The Anglo-Japanese War, New York Times, 1863
 ep2_meiji_pulse.11.a: "#italic Кому-то#! придётся заплатить. Мы обратимся к тайкуну."
 ep2_meiji_pulse.11.b: "Восток — дело тонкое. Может, не стоит с ними связываться?"
