 modifier_nanki_faction_victory: "Фракция Хитоцубаси отчуждается"
 modifier_hitotsubashi_faction_victory: "Фракция Нанки отчуждается"
 special_character_japanese_emperor: "Император Японии"
 special_character_japanese_emperor_desc: "Этот персонаж в настоящий момент правит Японией как император. Он играет ключевую роль в религии и политике."
 japan_monarchy.1.t1: "Период Каэй"
 japan_monarchy.1.t2: "Период Тэнкю"
 japan_monarchy.1.d1: "Принц [SCOPE.sCharacter('emperor_scope').GetFirstName] [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'взошла', 'взошёл' )] на Хризантемовый трон, став [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'новой императрицей', 'новым императором' )] Японии. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] воцарение знаменует начало периода Каэй, названного в честь вечного блаженства."
 japan_monarchy.1.d2: "Принц [SCOPE.sCharacter('emperor_scope').GetFirstName] [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'взошла', 'взошёл' )] на Хризантемовый трон, став [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'новой императрицей', 'новым императором' )] Японии. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] воцарение знаменует начало периода Тэнкю, названного в честь небесной долговечности."
 japan_monarchy.1.f: "Невидимый музыкант подал условный знак, и две придворные дамы распахнули занавес перед троном. На нём восседал тэнно, одетый в алую мантию, расшитую белыми и зелёными драконами. Старинное кресло было скрыто под пышной тканью, и казалось, будто монарх парит над землёй. С венца ниспадала завеса из бусин, скрывавшая глаза императора.\n\nСо всех сторон послышался шелест одеяний — гости коронации целыми рядами простирались ниц. Склонив голову, [SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting] также [SelectLocalization(SCOPE.sCharacter('name_scope').IsFemale, 'распростёрлась', 'распростёрся' )] на полу, и лицо императора пропало из виду.\n\nНесколько дней спустя, возвращаясь в Эдо, [SelectLocalization(SCOPE.sCharacter('name_scope').IsFemale, 'она попыталась', 'он попытался' )] восстановить в памяти образ монарха — но ничего не вышло. [SelectLocalization(SCOPE.sCharacter('name_scope').IsFemale, 'Она помнила', 'Он помнил' )] корону, занавес, ларцы, стоявшие подле трона… но только не человека, который на нём восседал."
 japan_monarchy.1.a: "Ваши годы будут многочисленны, как песчинки на морском берегу."
 japan_monarchy.2.t: "Период Мэйдзи"
 japan_monarchy.2.d: "Принц [SCOPE.sCharacter('emperor_scope').GetFirstName] [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'взошла', 'взошёл' )] на Хризантемовый трон, став [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'новой императрицей', 'новым императором' )] Японии. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] воцарение знаменует начало периода [SCOPE.sCharacter('emperor_scope').GetFirstName], названного в честь просвещённого правления."
 japan_monarchy.2.f: "Прозвучал гонг, и поднялся занавес. На миг собравшимся было дозволено увидеть императора в богато расшитом жёлтом шёлковом одеянии. Его лицо было наполовину скрыто. В лаковом ларце на подставке по левую руку от императора лежали священные предметы: меч и драгоценность. Тогда командир охраны дал команду, и все опустили глаза. Сильным, ровным голосом заговорил глашатай.\n\n«Основы нашего государства были заложены в стародавние времена, и боги были тому свидетелями. Тогда, в Касихаре, божественный император основал свою династию, и с тех пор его род не пресекался. В согласии с древними традициями, примерами прошлых императоров и правилами небесного престолонаследия мы восходим на великий престол»." # Very heavily pared down excerpt of the rites at Meiji's enthronement
 japan_monarchy.2.a: "Ваши годы будут многочисленны, как песчинки на морском берегу."
 japan_monarchy.3.t: "Период Тайсё"
 japan_monarchy.3.d: "Принц [SCOPE.sCharacter('emperor_scope').GetFirstName] [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'взошла', 'взошёл' )] на Хризантемовый трон, став [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'новой императрицей', 'новым императором' )] Японии. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] воцарение знаменует начало периода [SCOPE.sCharacter('emperor_scope').GetFirstName], названного в честь великой справедливости."
 japan_monarchy.3.f: "Кто-то прошёл мимо по строительным лесам, и доски на стыке заскрипели. Ятаро придержал их, как мог. Как только шаги стихли, он вооружился киянкой и скрепил их уже намертво.\n\nСтук доносился со всех сторон. Краем глаза он видел, как другая бригада возводит из чёрного дерева сооружение по соседству. Прораб что-то крикнул рабочему, который нёс огромный, чудом не рассыпающийся ворох тростника.\n\nЧерез шесть дней император проследует по возводящейся сейчас анфиладе, которую затем сожгут: такова церемония, что проводится лишь однажды за всё правление. Самого Ятаро и близко не пустят — он сможет разве что увидеть, как зарево окрашивает облака."
 japan_monarchy.3.a: "Ваши годы будут многочисленны, как песчинки на морском берегу."
 japan_monarchy.4.t: "Период Сёва"
 japan_monarchy.4.d: "Принц [SCOPE.sCharacter('emperor_scope').GetFirstName] [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'взошла', 'взошёл' )] на Хризантемовый трон, став [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'новой императрицей', 'новым императором' )] Японии. [SCOPE.sCharacter('emperor_scope').GetHerHis|U] воцарение знаменует начало периода [SCOPE.sCharacter('emperor_scope').GetFirstName], названного в честь просвещённого мира."
 japan_monarchy.4.f: "Вокруг радиоприёмника сгрудились четыре поколения семьи Такаиси. Голос из динамика, искажённый треском помех, звучал словно со дна колодца. Гиё покрутил ручку настройки — сначала в одну сторону, потом в другую. Теперь голос слышался чётко и ясно.\n\n«…Генеральный секретарь кабинета министров издал указ о смене летоисчисления. С сегодняшнего дня наступил первый год [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]…»\n\nЕго мать бросила взгляд на газету, развёрнутую на столе: «Не Кобун? Правда, что ли?»\n\nРодственники растерянно перешёптывались. Гиё сделал радио погромче, но всё было без толку. Если там и было что-то ещё, узнать об этом он сможет только из завтрашних газет."
 japan_monarchy.4.a: "Ваши годы будут многочисленны, как песчинки на морском берегу."
 japan_monarchy.5.t: "Один император, один период"
 japan_monarchy.5.d: "Политическая власть императора возродилась; император издал указ, меняющий систему периодов. Теперь новая эра начиналась с восхождением нового императора на престол и заканчивалась вместе с его правлением."
 japan_monarchy.5.f: "#bold Указ императора#!\n\nНастоящим объявляется начало исчисления новой эры с момента обретения священным государем Небесного мандата. Указанная традиция, сохраняемая на протяжении десяти тысяч поколений, рассматривается как совершенный образец просвещённого правления. Приняв преемство великой династии и собственноручно рассмотрев вопросы государственного управления, постановляю изменить название эры в ознаменование нового начала для всех подданных державы. Отныне [ROOT.GetCountry.GetCustom('JAP_era_year_name')] объявляется первым годом [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]. С этого дня прежняя система будет преобразована в соответствии с незыблемым принципом: один монарх — один девиз правления." # Shortened 'One Emperor, One Era' edict - 今後年號ハ御一代一號ニ定メ慶應四年ヲ改テ明治元年ト爲ス及詔書
 japan_monarchy.5.a: "Те, у кого есть власть, будут ею пользоваться."
 japan_monarchy.6.t: "Смерть дайдзё тэнно"
 japan_monarchy.6.d: "Император на покое — отрёкшийся от престола отец нашего правящего монарха — скончался. [SCOPE.sCharacter('retired_emperor_scope').GetSheHe|U] приложил немало усилий, чтобы восстановить авторитет императорской власти, и теперь войдёт в историю под посмертным именем [SCOPE.sCharacter('retired_emperor_scope').GetFirstName]."
 japan_monarchy.6.f: "Тохо окунул кисть в тушь. Кончик коснулся страницы, выводя символы, обозначающие день, год и стоящую на дворе погоду. Затем он сдвинулся к следующему столбцу и замер.\n\nКакие подобрать слова? Как передать важность случившегося? До него дошли слухи о том, какие усилия отрёкшийся император приложил для того, чтобы вернуть себе власть. Он снова взошёл на трон, восстановил церемонии. А затем к Тохо явился его представитель и сообщил, как всё обстояло в действительности.\n\nКисть коснулась бумаги. «Поступил запрос на поиск прецедентов, касающихся титула императора. Я поднял родословную правящего дома и дал ответ…»"
 japan_monarchy.6.a: "Смогут ли преемники воплотить его замысел?"
