 ep2_meiji_pulse.3.t: "Бои за Симоносэки"
 ep2_meiji_pulse.3.d: "[SCOPE.sCharacter('choshu_daimyo_scope').GetFullName], даймё княжества Тёсю, [SelectLocalization(SCOPE.sCharacter('choshu_daimyo_scope').IsFemale, 'заявила', 'заявил' )] о своей готовности выполнить приказ императора и изгнать из страны чужеземцев. [SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe|U] [SelectLocalization(SCOPE.sCharacter('choshu_daimyo_scope').IsFemale, 'приказала', 'приказал' )] своему флоту обстреливать любые иностранные корабли, вошедшие в пролив Симоносэки. Это привело к перестрелке с #tooltippable_name [SCOPE.sCountry('relevant_gp').GetAdjective|l]им#! военным кораблём."
 ep2_meiji_pulse.3.f: "Стоял погожий день, но над пологим склоном Хиноямы внезапно раздался гром. Масатакэ обратил взор к небу, по которому медленно плыло пушистое облако.\n\n«Гляди!» — крикнул Дзиро и указал пальцем вниз. Корабль на полном ходу нёсся по проливу, изо всех пушек паля по невидимой цели. Его деревянный корпус сильно пострадал, но он всё равно продолжал движение. Над водами поднималось ещё одно облако: из пороха и дыма."
 ep2_meiji_pulse.3.a: "Иностранцы делают то, что нам не по силам."
 ep2_meiji_pulse.3.b: "Нужно помочь княжеству урегулировать конфликт."
 ep2_meiji_pulse.3.c: "Предложим западным державам порт в обмен на соглашение."
