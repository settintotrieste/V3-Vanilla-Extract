 ep2_meiji.1.t: "Сонно Дзёи"
 ep2_meiji.1.d: "С крахом политики сакоку [ROOT.GetCountry.GetAltName('RU_CL_VP')] охватило чувство бессилия перед иностранным влиянием. Авторитет клана [ROOT.GetCountry.GetRuler.GetLastName] был окончательно подорван. Противники сёгуната сплотились под лозунгом #italic Сонно Дзёи#!: «Да здравствует Император, долой варваров!»"
 ep2_meiji.1.f: "На втором этаже киотской гостиницы дюжина одетых в чёрное ронинов собралась вокруг стола, заведомо укрывшись подальше от окон. Снаружи шёл проливной дождь, шум которого заглушал звуки улицы. Воины возмущённо перешёптывались, выражая свою злобу и негодование, а затем все вместе поклялись расправиться с чужаками.\n\nГде-то далеко мужчина в зелёном кимоно наблюдал за столпом дыма, поднимающимся над побережьем рядом с его домом. Холмы бросали длинные тени на промышленные сооружения, расположенные на берегу. Солнце постепенно приближалось к горизонту, отчего свет их печей становился ещё более заметным. Чуть дальше в воде отражались огни множества иностранных кораблей. При виде всего этого мужчина таил надежду, что однажды огонь его пушек наконец отправит чужеземцев восвояси."
 ep2_meiji.1.a: "Мы должны приспосабливаться к новым обстоятельствам."
 ep2_meiji.2.t: "Сёгунат будущего"
 ep2_meiji.2.d: "Сторонники реформы сёгуната разделились на два лагеря. Приверженцы политической теории #italic Кобу гаттай#! желают укрепить легитимность [GetLawType('law_bakufu').GetName|l] посредством объединения правительства с императорским двором, в то время как их оппоненты, поддерживающие идею Коги ёрон, предлагают сформировать парламентскую систему под главенством клана [SCOPE.sCharacter('shogun_scope').GetLastName]."
 ep2_meiji.2.f: "Хозяин поставил на стол поднос с хигаси и налил своим гостям по чашке усутя. Трое мужчин сели у стола. У хозяина и одного из гостей волосы были убраны в тёнмагэ, второй же гость был коротко пострижен. Над стоящими перед ними чашками неторопливо поднимался пар.\n\nХозяин внимательно посмотрел на стриженого мужчину и обратился к нему:\n\n«С возвращением, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]-#italic кун#!. Честно сказать, каждое твоё письмо было для меня удивительнее предыдущего. Прошу, поведай нам о своих приключениях с варварами»."
 ep2_meiji.2.a: "Авторитет бакуфу будет восстановлен."
 ep2_meiji.2.b: "Общественные обсуждения — вот воистину просвещённый путь."
 traditionalist_shogun_warning_tt: "@warning! [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|U], [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'придерживающаяся', 'придерживающийся' )] идеологии #tooltippable_name #tooltip:[ideology_traditionalist.GetTooltipTag],DATA_IDEOLOGY_NAME_TOOLTIP,IdeologyTooltip традиционализма#!#!, не захочет переходить к #b парламентской#! форме правления"
 traditionalist_shogun_warning_present_tt: "[concept_ruler] #b не#! придерживается [Concept('concept_ideology', 'идеологии')] #tooltippable_name #tooltip:[ideology_traditionalist.GetTooltipTag],DATA_IDEOLOGY_NAME_TOOLTIP,IdeologyTooltip традиционализма#!#!"
 ep2_meiji.3.t: "Императорский брак"
 ep2_meiji.3.d: "Император согласился с тем, что [SCOPE.sCharacter('shogun_scope').GetFullName] и принцесса [SCOPE.sCharacter('imperial_princess_scope').GetFullName] должны вступить в брак. В свою очередь, сёгун обязуется денонсировать договор «[SCOPE.sTreaty('relevant_treaty_scope').GetName]» и вернуться к политике изоляционизма."
 ep2_meiji.3.d2: "Император согласился с тем, что [SCOPE.sCharacter('shogun_scope').GetFullName] и принцесса [SCOPE.sCharacter('imperial_princess_scope').GetFirstName] должны вступить в брак. В свою очередь, сёгун обязуется изгнать чужеземцев из страны и вернуться к политике изоляционизма."
 ep2_meiji.3.f: "Торжественная процессия заняла всю дорогу Насакэндо. Бесконечная вереница из тридцати тысяч рабочих, вассалов и членов княжеской семьи, охраняемая оварийскими солдатами, тянулась от Иидзимы до станции Сиодзири. В самом центре процессии слуги несли украшенный золотом и красным шёлком паланкин, в котором сидела принцесса. Рядом с ней ехали самураи из самых разных уголков страны. В частности, были представлены княжества [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')] и [SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')].\n\nМинуя погрузившиеся в церемониальную в тишину города, принцесса лишь задумчиво смотрела сквозь небольшой просвет между занавесками паланкина. До конца пути оставалось ещё тридцать #italic ри#!, поэтому у неё было предостаточно времени, чтобы осмыслить свою непростую судьбу…"
 ep2_meiji.3.a: "Во благо страны."
 has_broken_relevant_treaty_tt: "Договор «[SCOPE.sTreaty('relevant_treaty_scope').GetName]» нарушен"
 ruler_does_not_have_imperial_marriage_tt: "[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] [SelectLocalization(SCOPE.sCharacter('imperial_marriage_ruler').IsFemale, 'мертва или ушла', 'мёртв или ушёл' )] в отставку"
 je_meiji_imperial_marriage: "Императорский брак"
 je_meiji_imperial_marriage_reason: "Желая объединить сёгунат с императорским двором, сёгун [SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] решил устроить политический брак с принцессой императорской крови. Император дал согласие на этот союз — при условии, что из региона [GetGeographicRegion('geographic_region_home_islands').GetName] будут изгнаны все иностранцы, а страна вернётся к политике изоляционизма.\n\nЕсли сёгун исполнит своё обещание, принцесса [SCOPE.sCharacter('imperial_princess_scope').GetFirstName] станет его женой. Их брак поможет преодолеть раскол между церемониальным и фактическим правителями Японии."
 je_will_fail_tt: "[concept_journal_entry] будет #b провалена#!"
 je_has_timed_out_tt: "[concept_journal_entry] #b закончилась по времени#!"
 ep2_meiji.4.t: "Война [ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')]"
 ep2_meiji.4.d: "Лишившись своих земель и титулов, [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('shogun_scope').GetFullName] и преданные [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'ей', 'ему' )] вассалы подняли восстание против императорского двора. [SCOPE.sCharacter('shogun_scope').GetSheHe|U] стремится вновь лишить императора власти и восстановить правление бакуфу."
 ep2_meiji.4.f: "«Обдумав положение дел, установившееся начиная с девятого дня минувшего месяца, ваш преданный слуга [SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'пришла', 'пришёл' )] к выводу, что происходящее в стране не отражает подлинную волю императорского двора, но является результатом интриг вероломных министров, коих возглавляет господин [SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting]. Об этом известно по всей стране, и особенно в Эдо, Нагасаки и провинциях Ясю и Сосю, где уже начались волнения.\n\nЭти деяния отвратительны в глазах Небес и народа. Мы умоляем Ваше Величество издать указ об аресте вышеупомянутых министров. Если же эта просьба не будет удовлетворена, нам не останется иного выбора, кроме как привести приговор в исполнение собственными руками»." # Edited petition by Yoshinobu
 ep2_meiji.4.a: "Вот наша воля: сразите [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'изменницу', 'изменника' )] и верните в страну мир." # Emperor Meiji's plausibly fraudulent imperial decree of 1867
 ep2_meiji.4.b: "Император стал марионеткой воров и грабителей."
 ep2_meiji.41.d: "Сторонники реставрации, возмущённые попытками клана [SCOPE.sCharacter('shogun_scope').GetLastName] удержаться у власти, объединились в коалицию и подняли мятеж. Восставшие стремятся свергнуть сёгунат Токугава и вернуть всю полноту власти императору."
 ep2_meiji.41.d_1: "Возмущённая нежеланием правительства в городе [ROOT.GetCountry.GetCapital.GetCityHubName] изгнать чужеземцев, коалиция доменов, поддерживающих движение «Сонно Дзёи», подняла восстание. Они стремятся избавиться от про-западных советников императора и очистить Японию от иноземного влияния."
 ep2_meiji.41.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] стоял на стенах замка, наблюдая, как из ворот одна за другой выходят шеренги солдат княжества [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')]. Некоторые из них носили новые тёмно-синие мундиры и шлемы конической формы, другие же были одеты в традиционные наряды красного, зелёного и синего цветов. Солдаты в современных униформах встали впереди остальных, под одобрительными взглядами толпы иностранных наблюдателей. За ними расположились вооружённые мушкетами самураи верхом на лошадях, а ещё дальше — артиллеристы.\n\nНа окраинах города [SCOPE.sState('revolter_state').GetCityHubName] находился плацдарм, где солдаты должны были встретиться с войсками союзных княжеств, прежде чем выступить против армии сёгуна. Тем временем где-то далеко, за этой огромной стеной мечей и штыков, пленный император ждал своего спасения…"
 ep2_meiji.41.f_1: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] стоял на стенах замка, наблюдая, как из ворот одна за другой выходят шеренги солдат княжества [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')]. Некоторые из них носили новые тёмно-синие мундиры и шлемы конической формы, другие же были одеты в традиционные наряды красного, зелёного и синего цветов. Солдаты в современных униформах встали впереди остальных, дальше следовала пёстрая радуга сансайбаори. За ними расположились вооружённые мушкетами самураи верхом на лошадях, а ещё дальше — артиллеристы.\n\nНа окраинах города [SCOPE.sState('revolter_state').GetCityHubName] находился плацдарм, где солдаты должны были встретиться с войсками союзных княжеств, прежде чем выступить против армии лоялистов. Тем временем где-то далеко, за этой огромной стеной мечей и штыков, пленный император ждал своего спасения…"
 ep2_meiji.41.a: "Мы должны остановить этих фанатиков."
 ep2_meiji.41.b: "Сонно дзёи!"
 kinmon_civil_war_tt: "В [ROOT.GetCountry.GetAltName('RU_CL_PP')] начнётся #r гражданская война#! между #b сёгунатом#! и #b императорским двором#!"
 ep2_meiji.5.t: "Тайсэй хокан"
 ep2_meiji.5.d: "Столкнувшись с нарастающим давлением противников [GetLawType('law_bakufu').GetName|l], [SCOPE.sCharacter('shogun_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'обратилась', 'обратился' )] к императору с прошением передать властные полномочия двору."
 ep2_meiji.5.f: "«Пока власть не перейдёт к императорскому двору, само основание нашего государства остаётся под угрозой. В этот решающий момент мы обязаны отказаться от прежних порядков и вернуть двору управление страной.\n\nВыслушав мнение подданных нашей державы, я прошу Ваше Величество вынести окончательное решение. Лишь объединившись во имя служения стране, мы сможем защитить империю и оказаться на равных с другими мировыми державами. Я верю в это всей душой».\n\nТокугава Ёсинобу, 1867"
 ep2_meiji.5.a: "Он цепляется за соломинку."
 ep2_meiji.51.t: "Высочайшее согласие"
 ep2_meiji.51.d: "Император ответил на прошение сёгуна. Он согласился передать властные полномочия двору и принять политическое руководство страной, как и [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'просила', 'просил' )] [SCOPE.sCharacter('shogun_scope').GetFullName]."
 ep2_meiji.51.f: "«Император Японии сообщает всем правителям и подданным иностранных государств, что сёгун [SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] восстанавливается во власти по его собственной просьбе. Отныне мы будем контролировать все внутренние и внешние дела страны. В связи с этим титул императора следует заменить на титул тайкуна, который и указан в соответствующих соглашениях. На данный момент идёт набор должностных лиц для осуществления внешней политики. Мы выражаем надежду, что представители сторон отнесутся к этому объявлению с должным вниманием»."
 ep2_meiji.51.a: "Это так волнительно!"
 ep2_meiji.52.t: "Высочайшее согласие"
 ep2_meiji.52.d: "Император ответил на прошение сёгуна. Он объявил, что [SCOPE.sCharacter('shogun_scope').GetFullName] пользуется полным доверием двора и может сохранить за собой властные полномочия."
 ep2_meiji.52.f: "По коридорам замка [ROOT.GetCountry.GetCustom('japan_choshu_castle_name')] гулко разносился стук сапог. Гонцы и вассалы весь день сновали туда и обратно, принося всё новые вести о событиях, случившихся за последнюю неделю. [SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting] молча [SelectLocalization(SCOPE.sCharacter('choshu_daimyo_scope').IsFemale, 'принимала', 'принимал' )] их у себя, и с каждой весточкой лицо его мрачнело всё сильнее. Триумфальная процессия сёгуна, императорский дворец под охраной самураев Айдзу…\n\nСнаружи уже стемнело. Поднявшись с места, [SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('choshu_daimyo_scope').IsFemale, 'обратилась', 'обратился' )] к двум десяткам собравшихся вассалов. «Княжество Тёсю не склонится, — [SelectLocalization(SCOPE.sCharacter('choshu_daimyo_scope').IsFemale, 'объявила', 'объявил' )] [SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe]. — Имейте это в виду».\n\nС этими словами он развернулся и вышел из комнаты."
 ep2_meiji.52.a: "Да примут его ветви."
 ep2_meiji.6.t: "Указ о реставрации"
 ep2_meiji.6.d: "Противники клана [SCOPE.sCharacter('shogun_scope').GetLastName] при дворе убедили императора издать указ о формальном восстановлении его прямого правления. В соответствии с этим указом сёгунат прекращает существование, а [SCOPE.sCharacter('shogun_scope').GetFullName] не получит никаких должностей в новом правительстве."
 ep2_meiji.6.f: "«[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] обратился к нам с просьбой вновь принять государственную власть, которая была ему поручена раньше, и пожелал сложить с себя полномочия сёгуна. Его прошение было удовлетворено. Народу известно, что в стране продолжается небывалый ранее кризис и что предыдущий Император из года в год болезненно переживал из-за этого.\n\nПосему мы решили взять курс на реставрацию прямого императорского правления и возобновление престижа государства, для чего упраздняем должность регента-канцлера и сёгунат и в первую очередь устанавливаем временно три должности — главу правительства, старших и младших советников. Мы планируем советоваться как можно справедливее, независимо от происхождения советника из аристократов, самураев, знати или простых людей»." #- Modifier text of the Great Proclamation of the Restoration of Imperial Rule
 ep2_meiji.6.a: "Одиночество во тьме."
 ep2_meiji.7.t: "Тайкунат"
 ep2_meiji.7.d: "Союзники клана [SCOPE.sCharacter('shogun_scope').GetLastName] при дворе убедили императора, что [SCOPE.sCharacter('shogun_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'должна', 'должен' )] занять место во главе императорского кабинета в должности тайкуна. Они аргументировали свою позицию тем, что членам императорского двора явно недостаёт опыта управления."
 ep2_meiji.7.f: "«Дискуссии будут происходить по мере прибытия даймё. Согласно широко обсуждаемому высказыванию, необходимость в публичных дискуссиях назрела сама собой, и нам остаётся лишь подчиниться общественному запросу. Поэтому я убедительно прошу позаботиться о том, чтобы цель таких собраний была чётко определена, а в конце участники по возможности приходили к соглашению.\n\nВ ходе дискуссии важно избегать разногласий и конфликтов, даже если это обещает победу вашему дому. Подобное поведение будет напоминать ссору братьев под одной крышей, пока иностранные государства давят на нас извне».\n\n(Ниси Сюсуке, «Повестка дня»)"
 ep2_meiji.7.a: "Опасность миновала."
 ep2_meiji.8.t: "Двор и сёгунат"
 ep2_meiji.8.d: "Заключив брак с членом императорской семьи и исполнив данные [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'императрице', 'императору' )] обещания, [SCOPE.sCharacter('shogun_scope').GetFullName] наконец-то [SelectLocalization(SCOPE.sCharacter('shogun_scope').IsFemale, 'положила', 'положил' )] конец раздору между двором и сёгунатом. Теперь [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'императрица', 'император' )], [SelectLocalization(SCOPE.sCharacter('emperor_scope').IsFemale, 'уверенная', 'уверенный' )] в способности и желании сёгуна обеспечить долгосрочный мир, может со спокойной душой вернуться к своей жизни в затворничестве."
 ep2_meiji.8.f: "Даже если на нашу страну\nОбрушатся ураганные ветры,\nЯ смиренно дождусь,\nКогда снова воссияет\nСолнце на небесах.\n\n(император Комэй)"
 ep2_meiji.8.a: "Мы успешно преодолели эту бурю."
 ep2_meiji.9.t: "Первые среди равных"
 ep2_meiji.9.d: "Благодаря своему упорству и находчивости [SCOPE.sCharacter('taikun_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('taikun_scope').IsFemale, 'смогла', 'смог' )] не только вернуть власть императору, но и сохранить при этом собственный клан. Отныне тайкуны рода [SCOPE.sCharacter('taikun_scope').GetLastName] будут править страной как первые среди аристократов современной Японии."
 ep2_meiji.9.f: "Император больше не прятался за ширмой. Теперь он находился за одним столом со своими министрами, а тайкун сидел слева от него. Все министры облачились в новую форму с замысловатыми узорами из сусального золота на груди и рукавах. Медали тихонько позвякивали, когда сановники устраивались на непривычных местах.\n\nВ последний час дискуссию вёл тайкун, а сам император не проронил ни слова. Он лишь внимательно слушал и разглядывал каждого выступающего. В дальнем конце комнаты бывший последователь #italic Сонно Дзёи#! настаивал на необходимости организации миссии в Америку."
 ep2_meiji.9.a: "Сёгун ушёл в прошлое. Теперь будет властвовать тайкун."
 ep2_meiji.9.b: "Император — сын Небес, а члены клана Токугава — орудия его воли."
