 zaibatsu.1.t: "Корпоративная империя"
 zaibatsu.1.d: "В результате долгосрочного сотрудничества #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ого#! государства с #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('zaibatsu_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('zaibatsu_ig').GetCustom('RU_IG_TP')]#!#! [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] теперь фактически находится в руках конгломератов. Пусть политики управляют, а генералы и предприниматели — правят."
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('pm_scope').IsFemale, 'наблюдала', 'наблюдал')] за поединком из своей крытой ложи. Соперник оттеснил [SelectLocalization(SCOPE.sCharacter('pm_scope').IsFemale, 'её', 'его')] любимого бойца к самому краю ринга, устланного рисовой соломой, и [SelectLocalization(SCOPE.sCharacter('pm_scope').IsFemale, 'она сжала', 'он сжал')] кулаки с такой силой, что побелели костяшки. Рядом с премьер-министром с невозмутимым видом стоял [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting].\n\nСудья указал на победителя веером, и нижние трибуны охватило ликование. Люди схватили подушки со зрительских кресел и принялись забрасывать ими ринг. [SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('pm_scope').IsFemale, 'заметила', 'заметил')], как [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting] улыбнулся [SelectLocalization(SCOPE.sCharacter('pm_scope').IsFemale, 'ей', 'ему')]. На одной из стен в дальнем конце ринга красовался #italic мон#! компании «[SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]»."
 zaibatsu.1.a: "Пусть [ROOT.GetCountry.GetCapital.GetCityHubName] засияет всеми огнями."
 zaibatsu.1.b: "Стоит всегда заботиться о надёжности нашей цепочки поставок."
 zaibatsu.2.t: "Ограничение"
 zaibatsu.2.t_1: "Справедливый баланс"
 zaibatsu.2.d: "Благодаря усилиям кабинета министров, который возглавляет [SCOPE.sCharacter('pm_scope').GetLastName], [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] вырывается из железных тисков #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('zaibatsu_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('zaibatsu_ig').GetCustom('RU_IG_RP')]#!#!. Пусть политики правят, а предприниматели зарабатывают."
 zaibatsu.2.d_1: "Кабинет министров, который возглавляет [SCOPE.sCharacter('pm_scope').GetLastName], проводит политику свободной торговли, и [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] теперь не так зависит от сети военно-промышленных поставок #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('zaibatsu_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('zaibatsu_ig').GetCustom('RU_IG_RP')]#!#!. Пусть политики правят, а предприниматели зарабатывают."
 zaibatsu.2.f: "Конференц-зал головного офиса компании «[SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]» начал постепенно заполняться. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('name_a_scope').IsFemale, 'вошла третьей', 'вошёл третьим' )], пропустив перед собой секретарей. Заняв место у двери, [SelectLocalization(SCOPE.sCharacter('name_a_scope').IsFemale, 'она смотрела', 'он смотрел' )], как мимо проходит [SelectLocalization(SCOPE.sCharacter('name_a_scope').IsFemale, 'её', 'его' )] начальство. От стоявшей перед [SelectLocalization(SCOPE.sCharacter('name_a_scope').IsFemale, 'ней', 'ним' )] чашки чая тонкой струйкой поднимался пар.\n\n[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('relevant_zaibatsu_exec').IsFemale, 'появилась последней и окинула', 'появился последним и окинул' )] взглядом каждого сотрудника по очереди. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] ещё никогда не [SelectLocalization(SCOPE.sCharacter('name_a_scope').IsFemale, 'видела', 'видел' )] [SelectLocalization(SCOPE.sCharacter('relevant_zaibatsu_exec').IsFemale, 'её такой уставшей', 'его таким уставшим' )]. Тени на [SelectLocalization(SCOPE.sCharacter('relevant_zaibatsu_exec').IsFemale, 'её', 'его' )] лице как будто стали глубже, а серебристые волосы — тоньше."
 zaibatsu.2.a: "Верховная власть принадлежит только нам."
 zaibatsu.2.b: "Пусть люди знают: [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] не продаётся."
