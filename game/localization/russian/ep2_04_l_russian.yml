 iwakura_mission.1.t: "Миссия на Запад"
 iwakura_mission.1.d: "Правительство составило список министров и чиновников, которые наиболее подходят на должность чрезвычайного и полномочного посла. Выбранный кандидат возглавит экспедицию на Запад, которая, предположительно, займёт около десяти месяцев."
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting] [SelectLocalization(SCOPE.sCharacter('expedition_leader_1').IsFemale, 'стояла', 'стояла' )] у зеркала, снова и снова проверяя, правильно ли [SelectLocalization(SCOPE.sCharacter('expedition_leader_1').IsFemale, 'она завязала', 'он завязал' )] свой галстук. К тому времени этот аксессуар уже не был для японцев чем-то новым. Сначала он просто был очередным веянием моды, а затем служащие стали массово носить его по распоряжению правительства, однако [SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting] так и не [SelectLocalization(SCOPE.sCharacter('expedition_leader_1').IsFemale, 'привыкла', 'привык' )] к этому предмету одежды. Впрочем, [SelectLocalization(SCOPE.sCharacter('expedition_leader_1').IsFemale, 'она понимала', 'он понимал' )], что если правительство всё-таки поддержит [SelectLocalization(SCOPE.sCharacter('expedition_leader_1').IsFemale, 'её', 'его' )] идею и отправит [SelectLocalization(SCOPE.sCharacter('expedition_leader_1').IsFemale, 'её', 'его' )] с дипломатической миссией на Запад, то этот галстук будет наименьшей из [SelectLocalization(SCOPE.sCharacter('expedition_leader_1').IsFemale, 'её', 'его' )] забот."
 iwakura_mission.1.a: "[SCOPE.sCharacter('expedition_leader_1').GetFullName] больше всего подходит для этого дела."
 iwakura_mission.1.b: "[SCOPE.sCharacter('expedition_leader_2').GetFullName] заслуживает эту должность."
 iwakura_mission.1.c: "[SCOPE.sCharacter('expedition_leader_3').GetFullName] доказал, что на него можно положиться."
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName] мог бы извлечь немалую выгоду из этой поездки."
 iwakura_mission.2.t: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] и [SelectLocalization(SCOPE.sCharacter('expedition_leader_storage_var').IsFemale, 'её', 'его' )] доклад"
 iwakura_mission.2.d: "По возвращении миссии в Японию [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] и [SelectLocalization(SCOPE.sCharacter('expedition_leader_storage_var').IsFemale, 'её', 'его' )] коллеги представили правительству свои доклады. В них содержатся различные наблюдения об индустриальном обществе западных держав, а также рекомендации относительно мер по развитию нашей страны."
 iwakura_mission.2.f: "«После долгих размышлений я пришёл к выводу, что успех европейцев и американцев заключается в их правильной расстановке приоритетов. Те, кому довелось побывать в других странах, непременно замечают, что наиболее развитые государства зачастую имеют разное политическое и административное устройство, однако все они так или иначе ставят образование на первый план. Именно поэтому там повсюду можно встретить школы и каждый человек там несёт в себе дух просвещения».\n\nТанака Фудзимаро"
 iwakura_mission.2.a: "Запад открыл для нас окно в современность."
 iwakura_mission.2.b: "Промышленность #tooltippable_name [SCOPE.sCountry('iwakura_good_economy_country').GetAdjective|l]ого#! типа — это будущее японской экономики."
 iwakura_mission.2.c: "Мы можем многое почерпнуть из #tooltippable_name [SCOPE.sCountry('iwakura_desired_law_country').GetAdjective|l]ой#! политики."
 iwakura_mission.2.e: "Мы можем возродить наши деревни, проведя земельную реформу по образцу американской системы."
 iwakura_mission.4.t: "Золотые ворота"
 iwakura_mission.4.d: "После долгого путешествия на корабле [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] и остальные члены миссии наконец-то достигли берегов [SCOPE.sCountry('iwakura_mission_host').GetAltName('RU_CL_RP')]. Делегаты планируют отправиться на поезде в город [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName], попутно изучая [SCOPE.sCountry('iwakura_mission_host').GetAdjectiveNoFormatting|l]ие общественные институты и промышленные предприятия."
 iwakura_mission.4.f: "«Утренний туман над морем был настолько густым, что уже в нескольких шагах нельзя было чего-либо увидеть. Корабль остановился: было решено дождаться рассвета. Когда взошло солнце, туман постепенно рассеялся, и мы увидели побережье Калифорнии. Через какое-то время мы оказались между двумя каменистыми мысами. С обеих сторон вздымались горы, вдающиеся в море, а вокруг во всех направлениях сновали пароходы. Это прекрасное зрелище называется здесь Золотыми Воротами.\n\nДвадцать два дня мы были в пути на восток, и вот наконец нас встретили горы и пролив между ними. Всех нас обуяла радость».\n\n— Камэ Кунитакэ, #italic «Посольство Ивакура. 1871–1873 гг.»#!"
 iwakura_mission.4.a: "Мы готовы познать целый континент."
 iwakura_mission.4.b: "Америка — не более чем ворота в Европу."
 iwakura_mission.5.t: "В брюхе кита"
 iwakura_mission.5.d: "Миссия [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] преодолела долгий путь — из Тихого океана в Атлантический — и прибыла в [SCOPE.sCountry('iwakura_mission_host').GetAltName('RU_CL_VP')]. Задача миссии — установить дипломатические отношения с правительством, которое возглавляет [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle|l], и осмотреть места, где ковалась промышленная революция."
 iwakura_mission.5.f: "«Америка процветала, и вместе с ней процветал порт Ливерпуля. У входа в гавань на шесть километров вдоль северного берега вытянулась череда доков. Со стороны моря возвышались каменные набережные, напоминавшие замковые стены; внутри во всех направлениях рабочие рыли каналы для новых доков. Здесь встают на якорь все корабли, входящие в доки или выходящие из них. Мачты их подобны густому лесу, а такелаж — рыболовным сетям, вывешенным рыбаками на просушку. Нам сказали, что эти доки — самые большие в мире».\n\n— Кумэ Кунитакэ, #italic «Посольство Ивакура. 1871–1873 гг.»#!"
 iwakura_mission.5.a: "Мы не упустим ни одной возможности из тех, что нам представятся."
 iwakura_mission.5.b: "[SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName] — большой город, но нам должно хватить двух месяцев на осмотр."
 iwakura_mission.6.t: "Через континент"
 iwakura_mission.6.d: "Миссия [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] прибыла в континентальную Европу. Первая остановка на пути посольства — [SCOPE.sCountry('iwakura_mission_host').GetName]. На протяжении полугода гости будут наблюдать за происходящим, оценивать обстановку и устанавливать отношения с многочисленными народами, населяющими континент."
 iwakura_mission.6.f: "«После полудня мы посетили кладбище — увы, никто из нас не спросил, как оно называется. Оно располагается на восточной окраине Парижа и охватывает более сорока гектар. Здесь весьма тесно: свободно пройти можно только по единственной широкой проезжей части.\n\nСегодня проходили похороны небогатой семьи. Похоронная процессия прошла с гробом на плечах до могилы и опустила покойника в землю. Когда священник закончил читать молитву, присутствующие со слезами на глазах бросили в могилу горсть земли. Рыдал каждый без исключения, однако ни от кого мы не услышали громких причитаний».\n\n— Кумэ Кунитакэ, #italic «Посольство Ивакура. 1871–1873 гг.»#!"
 iwakura_mission.6.a: "Мы будем внимательно всё сравнивать и сопоставлять."
 iwakura_mission.6.b: "Времени не так много — нужно поторопиться."
 iwakura_mission.8.t: "Другая половина"
 iwakura_mission.8.d: "На пути в [ROOT.GetCountry.GetAltName('RU_CL_VP')] миссия [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] остановилась в #tooltippable_name [SCOPE.sCountry('iwakura_mission_host').GetAdjective|l]ой#! колонии под названием [SCOPE.sState('iwakura_mission_location').GetName]. Здесь посольство несколько дней наблюдало за бытом европейского колониального общества и религиозными обрядами коренных последователей религии, что называется [GetReligion('theravada').GetNameNoIcon|l]."
 iwakura_mission.8.f: "«Быть нашим проводником вызвался один из местных монахов. Нас он называл #italic «данна»#!, а храм — #italic «гаран»#!. Удивительно, что здесь и поныне сохранились слова, произошедшие из санскрита. Цейлон — священная земля для последователей Будды, и местные обитатели до сих пор исповедуют буддизм. Быт их прост и незамысловат; жизнь монахов же ещё проще. Питаются они скромно, за жилищами почти не ухаживают — те заросли дикими побегами, и во всём они соблюдают умеренность и не дозволяют себе излишеств.\n\nРазница в сравнении со святыми местами для христиан или мусульман поистине поражает. Возможно, это из-за того, что буддисты отказались от мирского убранства? Впрочем, вероятна и другая причина: буддизм не способен к процветанию».\n\n— Кумэ Кунитакэ, #italic «Посольство Ивакура. 1871–1873 гг.»#!"
 iwakura_mission.8.a: "Возможно ли, что и нас постигнет эта судьба?"
 iwakura_mission.9.t: "Порт Иокогамы"
 iwakura_mission.9.d: "Проведя несколько месяцев вдали от дома и обогнув земной шар, миссия [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] вернулась на родину — в [ROOT.GetCountry.GetAltName('RU_CL_VP')]. С собой посольство привезло целое множество различных заметок, заморских товаров и отчётов о западных технологиях и политических институтах."
 iwakura_mission.9.f: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] [SelectLocalization(ROOT.Var('expedition_leader_storage_var').GetCharacter.IsFemale, 'стояла', 'стоял' )] на палубе парохода, устремив взгляд на запад, где из утреннего тумана, не успевшего ещё окончательно рассеяться, проступала величественная гора Фудзи. У ограждения собралась пёстрая толпа западных гостей — то ли торговцев, то ли таких же стремящихся повидать мир путешественников, как и [SelectLocalization(ROOT.Var('expedition_leader_storage_var').GetCharacter.IsFemale, 'она сама', 'он сам' )]. Присевший на скамеечку у двери кабины немец старательно рисовал в альбоме, стремясь запечатлеть открывшееся ему зрелище. «Интересно», — [SelectLocalization(ROOT.Var('expedition_leader_storage_var').GetCharacter.IsFemale, 'задумалась', 'задумался' )] [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting], — «они здесь впервые — или же от этой красоты у каждого непременно захватывает дух, словно в первый раз?». [SelectLocalization(ROOT.Var('expedition_leader_storage_var').GetCharacter.IsFemale, 'Ей', 'Ему' )] было хорошо знакомо это чувство.\n\nМногие ли могли похвастать тем же, что удалось совершить [SelectLocalization(ROOT.Var('expedition_leader_storage_var').GetCharacter.IsFemale, 'ей', 'ему' )], — пересечь три океана и побывать на четырёх континентах? А ведь это ещё далеко не конец… Чем больше в мире будет пароходов и поездов, тем больше будет и таких людей, как [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting], но в числе первых навсегда останется именно [SelectLocalization(ROOT.Var('expedition_leader_storage_var').GetCharacter.IsFemale, 'она', 'он' )]."
 iwakura_mission.9.a: "Нет ничего красивее родного дома."
 je_iwakura_mission: "Реставрация: миссия [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]"
 je_iwakura_mission_reason: "Перед новым правительством [ROOT.GetCountry.GetAltName('RU_CL_RP')] стоит непростая задача: превратить страну в современное государство. С этой целью оно снарядило дипломатическую экспедицию в страны Западного мира. Посольство, куда входит значительная часть государственных министров и учёных, возглавляет [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName]. Цель миссии [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] — пересмотреть неравноправные договоры с Западом, а заодно ознакомиться с политическими и технологическими достижениями, на которых зиждутся великие державы.\n\nЗа каждый #b месяц#! нахождения миссии в стране с некоторой вероятностью можно узнать о местных законах или технологиях. Эти сведения повлияют на отчёт, который посольство представит по возвращении, а также на [Concept('concept_ideology', 'идеологию')] руководителя экспедиции."
