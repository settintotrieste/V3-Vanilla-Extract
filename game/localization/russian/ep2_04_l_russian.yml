 # Zaibatsu
 je_zaibatsu: "Корпоративная империя"
 je_zaibatsu_reason: "В ходе стремительной индустриализации [Concept('concept_zaibatsu', 'дзайбацу')] поглотили львиную долю экономики [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Эти конгломераты, получающие огромную прибыль благодаря связи с государственными институтами, стали неотъемлемой частью #v японской#! военной промышленности.\n\nПоскольку финансы теперь были сосредоточены в руках всего нескольких крупных игроков, страна быстро вышла на международный рынок, однако из-за этого политическое влияние дзайбацу и их покровителей из военной верхушки возросло ещё больше.[SCOPE.GetRootScope.GetCountry.GetCustom('zaibatsu_democracy_snippet')]\n$ZAIBATSU_LIST_HEADER$$ZAIBATSU_LIST_CONTENT$"
 je_zaibatsu_complete_header: "Для #b усиления#! позиций дзайбацу:\n"
 je_zaibatsu_on_complete_header: "При #b усилении#! позиций дзайбацу:\n$EFFECT$"
 je_zaibatsu_fail_header: "Для #b ослабления#! позиций дзайбацу:\n"
 je_zaibatsu_on_fail_header: "При #b ослаблении#! позиций дзайбацу:\n$EFFECT$"
 zaibatsu_democracy_info: "\n\nПока действует эта [Concept('concept_journal_entry', 'запись в дневнике')], [Concept('concept_electoral_confidence', 'доверие к избирательной системе')] будет снижаться на #v 0,5%#! в месяц"
 two_more_more_company_slots_tt: "Можно основать больше [SCOPE.ScriptValue('je_zaibatsu_company_slots_threshold')|v0] [Concept('concept_company','компаний')]"
 glossary_zaibatsu: "#b #italic Дзайбацу —#!#! это финансовое и промышленное объединение, для которого характерны семейная собственность и высокая степень вертикальной интеграции.\n\nОбычно дзайбацу представляют собой концерны, объединяющие несколько, как правило, промышленных компаний под контролем головной компании и банка. Дзайбацу произошли от влиятельных купеческих семей позднего периода Эдо, которые использовали свои деньги и связи для получения контроля над японской промышленностью."
 country_levels_owned_by_zaibatsu_100_tt: "[Concept('concept_building_level', 'Уровней сооружений')], принадлежащих [Concept('concept_zaibatsu', 'дзайбацу')]: больше [SCOPE.ScriptValue('je_zaibatsu_possible_levels_threshold')|v0] (сейчас [SCOPE.ScriptValue('country_levels_owned_by_zaibatsu')|v0])"
