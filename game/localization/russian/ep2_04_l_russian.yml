 shogunate_strategy_title_decide_loc: "Определиться со стратегией реформ"
 shogunate_strategy_title_revise_loc: "Пересмотреть стратегию реформ"
 shogunate_strategy_title_decide_desc_loc: "Сёгунат Токугава нуждается в реформах, иначе режиму не устоять. У сёгуна остаются лишь два варианта действий: либо укрепить легитимность бакуфу путём объединения с императорским двором, либо восстановить ограниченную власть императора, а самому занять место во главе парламентского правительства."
 shogunate_strategy_title_revise_desc_loc: "Избранная сёгуном стратегия не принесла ожидаемых результатов. Будет разумным сменить ошибочный курс, невзирая на издержки."
 je_meiji_restoration_proclaim_imperial_restoration: "Петиция о реставрации императора"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "Император остаётся самодержцем Японии. Без его одобрения сёгун станет всего лишь одним из множества даймё, пусть и самым могущественным. Выживет ли сёгунат или падёт — на то воля императорского двора."
 imperial_restoration_kobu_gattai_loc: "Страна нуждается в единстве сёгуната и двора — лишь так можно положить конец кризису. Необходимо убедить даймё, что сёгун пользуется полным доверием двора, а его приказы исходят от самого императора. Ради восстановления своего авторитета сёгун должен опереться на императора, тем самым поставив себя в уязвимое положение.\n\nЭто весьма рискованный шаг. Если императорский двор не поддержит сёгуна, Токугава окажутся одни в окружении врагов."
 imperial_restoration_kogi_yoron_loc: "Император должен вновь править страной — лишь так можно положить конец кризису. Чтобы сохранить власть после реставрации, сёгун должен провести её на своих условиях. Последним этапом реформ станет передача исполнительной власти императору, при этом клан Токугава займет положенное место в обновленном правительстве империи.\n\nЭто весьма рискованный шаг. Если императорский двор не поддержит сёгуна, Токугава окажутся одни в окружении врагов."
 je_meiji_restoration_imperial_marriage: "Устроить императорский брак"
 je_meiji_restoration_imperial_marriage_desc: "Проект #b Кобу гаттай#! подразумевает союз в самом буквальном смысле слова: бракосочетание действующего сёгуна с принцессой императорской фамилии. Для осуществления этого плана сёгуну придётся пойти на серьёзные уступки и выполнить условия императорского двора."
 je_meiji_restoration_imperial_marriage_conditions_tt: "Условия завершения [Concept('concept_journal_entry', 'записи в дневнике')] #v $je_meiji_imperial_marriage$#!:\n• $im_closed_borders_tt$\n• $im_free_trade_tt$\n• $im_treaty_port_tt$\n• Если применимо: #indent_newline:3 \n• $im_broken_applicable_treaty_tt$"
