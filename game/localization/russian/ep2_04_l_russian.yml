 ep2_meiji_pulse.4.t: "Сожжение #tooltippable_name [SCOPE.sCountry('relevant_gp').GetAdjective|l]ой#! миссии"
 ep2_meiji_pulse.4.d: "Самураи движения #italic Сонно Дзёи#! из княжества [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] напали на строящееся здание #tooltippable_name [SCOPE.sCountry('relevant_gp').GetAdjective|l]ой#! дипломатической миссии в городе [SCOPE.sState('edo_state').GetCityHubName]. Первая городская постройка в западном стиле была сожжена дотла, а виновники как сквозь землю провалились."
 ep2_meiji_pulse.4.f: "Двое мужчин в масках и капюшонах расположились на вершине холма, откуда открывался вид на посольство. Тут и там среди обугленных руин ещё мелькали оранжевые всполохи. Здание уже основательно прогорело, и теперь огненные языки лениво лизали толстые внутренние балки.\n\nДаже когда всё было кончено, товарищи не сдвинулись с места. Глядя на зависший в воздухе столб дыма, один из них тихо произнёс:\n\n«Правда, это было бы прекрасно, если бы пепел посыпался на нас, словно снег?»"
 ep2_meiji_pulse.4.a: "[SCOPE.sState('edo_state').GetCityHubName] выходит из-под контроля."
 ep2_meiji_pulse.4.b: "Самураям княжества [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] запрещено носить оружие в пределах города."
 shimonoseki_indemnity_tt: "В течение #v 10 лет#! [ROOT.GetCountry.GetName] буд[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_UT')] выплачивать [SCOPE.sCountry('relevant_gp').GetAltName('RU_CL_DP')] контрибуцию в размере @money!#v 3 миллионов#!"
 shimonoseki_indemnity_port_tt: "Город $HUB_NAME_STATE_KANSAI_port_japanese$ в регионе [GetStateRegion('STATE_KANSAI').GetName] станет #tooltippable_name [SCOPE.sCountry('relevant_gp').GetAdjective|l]им#! [Concept('concept_treaty_port', 'договорным портом')]"
 modifier_ungovernable_capital: "Признание бессилия"
 ep2_meiji_pulse.5.t: "Кровавое возмездие"
 ep2_meiji_pulse.5.d: "[SCOPE.sCharacter('tairo_scope').GetFullName], первый министр сёгуната, [SelectLocalization(SCOPE.sCharacter('tairo_scope').IsFemale, 'пала', 'пал' )] от рук убийц. Ронины из княжеств [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] и [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] зарубили [SelectLocalization(SCOPE.sCharacter('tairo_scope').IsFemale, 'её', 'его' )] прямо на пороге замка Эдо. Заговорщики оставили манифест, выражающий поддержку идеям #italic Сонно Дзёи#! и осуждающий первого министра за уступки чужеземцам."
 ep2_meiji_pulse.5.f: "Тудзабуро наблюдал, как Горокуро выскочил перед процессией. Член патруля княжества [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] попытался его схватить, но Горокуро оказался проворнее: он резко достал клинок и первым нанёс удар. Кровь хлынула из рассечённого лица воина, а его товарищи ринулись вперёд, чтобы отомстить обидчику.\n\nТудзабуро сбросил плащ, вытащил пистолет, прицелился в то место, где в паланкине имелся зазор, и нажал на курок. Раздался выстрел, заглушивший крики и звон металла, а за ним — второй. Когда один из патрульных повернулся к нему, Дзиндзаэмон, ронин из княжества [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], взмахнул мечом и всадил его себе в живот. За двумя сражающимися фигурами Тудзабуро разглядел, как кровь вытекает из дверей паланкина, окрашивая снег в алый цвет. Он вытащил из ножен свой вакидзаси и устремился к брошенным носилкам."
 ep2_meiji_pulse.5.a: "Самураи вновь скрестили клинки."
 modifier_tairo_assassinated: "Убийство тайро"
 ep2_meiji_pulse.6.t: "Инцидент в Икэдая"
 ep2_meiji_pulse.6.d: "Руководствуясь сведениями, добытыми под пыткой у арестованного боевика движения «[SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]», отряд [GetLawType('law_shinsengumi').GetName|l] организовал рейд на собрание предполагаемых заговорщиков в гостинице Икэдая в #tooltippable_name #tooltip:[SCOPE.sState('kyoto_state').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('kyoto_state').GetCustom('RU_SL_PP')]#!#!. Операция закончилась ожесточённой схваткой на мечах в гостинице и вокруг неё."
 ep2_meiji_pulse.6.f: "Отака вцепился в перила, когда Синсэнгуми ворвались внутрь. Он мог разглядеть кровь на рукавах их голубых #italic хаори#!: при свете ламп одежда казалась белой, а пятна — чёрными. Мужчина поднял меч и принял защитную стойку.\n\nДвое врагов отделились от остальных и стали стремительно, плечом к плечу, подниматься по лестнице, которую он охранял. Противник парировал первый удар Отаки, и тот ударил снова. От скрещенных клинков посыпались искры. Теперь пришёл черёд второго нападающего. Он отступил на шаг и повернул запястье, чтобы…\n\nСверкнула сталь, и Отака почувствовал, как что-то холодное вонзается ему в грудь."
 ep2_meiji_pulse.6.a: "Синсэнгуми заслуживают награды за свою инициативу."
 ep2_meiji_pulse.6.b: "Их жестокость вызовет лишь ответную вспышку насилия."
 modifier_shinsengumi_meddling: "Бесчинство Синсэнгуми"
 modifier_shinsengumi_crackdown: "Разгром Синсэнгуми"
 modifier_refrained_from_crackdowns: "Ограничение деятельности Синсэнгуми"
 sufficient_pressure_from_sonno_joi_tt: "[Concept('concept_activism', 'Активизм')] движения «[SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'Сонно Дзёи')]» выше уровня @activism_red! $RADICALISM_PROTESTING$ (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!)"
 ep2_meiji_pulse.7.t: "Инцидент возле Императорских ворот"
 ep2_meiji_pulse.7.d: "Солдаты княжества [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], поддерживающего движение «[SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]», попытались взять штурмом императорский дворец в #tooltippable_name #tooltip:[SCOPE.sState('kyoto_state').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('kyoto_state').GetCustom('RU_SL_PP')]#!#!, надеясь восстановить власть императора насильственным путём. Против них выступили воины княжеств [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] и Айдзу."
 ep2_meiji_pulse.7.f: "Киото нежился в лучах солнца, но ворота Хамагури тонули в пороховом дыме.\n\nСолдаты Айдзу выстроились вдоль стены, ведя мушкетный огонь по дороге и артиллерии княжества [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]. Раз в несколько секунд пули попадали в плоть, и крик раненого на мгновение заглушал треск и грохот выстрелов. Кодзо прятался за пушечным колесом, пытаясь сладить с заклинившим мушкетом. Всего в паре #italic кэнов#! от него, безрукий и безногий, лежал ничком начальник отряда. Удивительно, но он всё ещё подавал признаки жизни."
 ep2_meiji_pulse.7.a: "[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] и Айдзу успешно отражают штурм."
 ep2_meiji_pulse.7.b: "Войска княжества [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] занимают императорский дворец."
 coup_resistance_below_daimyo_coup_strength_tt: "[Concept('concept_coup_resistance', 'Устойчивость')] [ROOT.GetCountry.GetAltName('RU_CL_RP')] к переворотам ([SCOPE.ScriptValue('country_coup_resistance')|v2]) ниже, чем [Concept('concept_coup_strength', 'сила переворота')] персонажа [SCOPE.sCharacter('daimyo_1_scope').GetFullName] ([SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2])"
 ep2_meiji_pulse.8.t: "Карательный поход в княжество [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]"
 ep2_meiji_pulse.8.d: "В отместку за нападение воинов княжества [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] на императорский дворец сёгун отправил войска в карательный поход против сторонников движения #italic Сонно Дзёи#!. Советники, симпатизирующие княжеству [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], предлагают заключить мир, если виновные в инциденте возле Императорских ворот совершат сэппуку."
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting], даймё княжества [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], обозревал владения с балкона своего замка. Где-то вдали в небо поднимался дым от костров: там расположилась на привал наступающая армия.\n\n«Сёгун требует, чтобы трое крупнейших вассалов совершили сэппуку, — сообщил ему вассал, — чтобы четверо штабных офицеров были обезглавлены, а пятеро министров — изгнаны».\n\n[SCOPE.sCharacter('daimyo_1_scope').GetFirstNameNoFormatting] глядел на костры: их было несколько сотен, а то и больше. Грозные сизые клубы заслонили горизонт. Наконец даймё произнёс:\n\n«[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] исполнит это требование»."
 ep2_meiji_pulse.8.a: "Если мы можем победить без боя, так тому и быть."
 ep2_meiji_pulse.8.b: "Княжество должно быть полностью очищено от скверны."
 modifier_daimyo_house_arrest: "Даймё под домашним арестом"
 modifier_daimyo_executed: "Даймё лишён владений"
 ep2_meiji_pulse.9.t: "Указ об изгнании варваров"
 ep2_meiji_pulse.9.d: "Неравные договоры, навязанные [ROOT.GetCountry.GetAltName('RU_CL_DP')] западными державами, вызвали возмущение императора. Действуя в обход сёгуна, он издал указ об изгнании чужеземцев с [ROOT.GetCountry.GetAdjectiveNoFormatting|l]ой земли. Боевики движения «[SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]» немедленно поддержали действия императора."
 ep2_meiji_pulse.9.f: "Вассал стоял рядом с одной из пушек и смотрел на пролив. В этот час проплывающие мимо суда казались чёрными силуэтами на фоне заходящего солнца. Немного поодаль низшие самураи княжества Тёсю возились с шомполами и мешками чёрного пороха.\n\nВсматриваясь в очертания холма Хинояма и города Симоносеки, раскинувшегося у его подножия, он вдруг вспомнил отрывок из Указа. В нём говорилось: «Нельзя открывать порты для торговли, даже если наши земли обратятся в пепел».\n\nНо стоит ли оно того? Разве может он допустить, чтобы эти зелёные склоны и цветочные луга истлели в огне, а его дом сравнялся с землёй? «Да, — подумал он — без колебаний»."
 ep2_meiji_pulse.9.a: "Сёгун должен отправиться в Киото и найти выход из положения."
 ep2_meiji_pulse.9.b: "Этот указ поддельный, мы должны пресечь его распространение."
