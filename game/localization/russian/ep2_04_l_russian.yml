l_russian:
 japan_politics.1.t: "Практическая наука"
 japan_politics.1.d: "После открытия [ROOT.GetCountry.GetAltName('RU_CL_RP')] большая часть «голландских наук» оказалась безнадёжно устаревшей. В [ROOT.GetCountry.GetAdjectiveNoFormatting|l] интеллектуальное сообщество стали проникать новые идеи, ведущее место среди них занимала школа «практической науки»."
 japan_politics.1.f: "«Таким образом, подобные люди будут ставить себе следующие важные цели: исправлять свои действия, основываясь на природе человека; прилежно заниматься учением и иметь широкие знания о вещах; располагать навыками и добродетельностью, необходимыми для занимаемого ими положения. Правительство должно давать широкой общественности участвовать в управлении, чтобы избегать несчастий; и правительство, и народ должны сотрудничать, работая для обеспечения мира в стране. Единственно в этом заключается цель учения, к которому мы призываем».\n\nФукудзава Юкити, «Призыв к учению»" # Translated by Eiichi Kiyooka
 japan_politics.1.a: "В знании — сила."
 japan_politics.2.t: "Великие Дома"
 japan_politics.2.d: "По мере индустриализации [ROOT.GetCountry.GetAltName('RU_CL_RP')] [SCOPE.gsInterestGroup('industrialists_ig').GetName|l] стали уделять всё больше внимания производству. Используя свои богатства и связи с чиновниками, они сосредоточили в своих руках значительную часть промышленной базы страны."
 japan_politics.2.f: "Выйдя на балкон, министр финансов наблюдал за тем, как брокеры делают ставки. Во времена рисовой биржи об окончании торгов возвещал специальный человек, выплёскивая в толпу ведро воды.\n\nТеперь эту роль выполнял клерк с молотком, не сводивший глаз с часов. Его стол окружало скопище брокеров, тянувших руки за облигациями с семипроцентной доходностью. Кто-то подписывал контракт, зажав облигацию в зубах. Царил оглушительный шум, выкрики «покупаю» и «продаю» сливались в гул, подобный бьющемуся о прибрежные скалы прибою.\n\nЧас пробил, и клерк звонко ударил молотком о бронзовый диск. Из толпы раздались возмущённые крики, шум сделок стал лишь громче. Проворчав себе под нос, клерк нагнулся под стол и достал ведро."
 japan_politics.2.a: "Отныне страной будут править банкиры."
 japan_politics.3.t: "Обычные граждане"
 japan_politics.3.d: "С распадом сословной системы Эдо в стране зарождается гражданское общество, основанное на национальном единстве. Бывшие [SCOPE.gsInterestGroup('pb_ig').GetName|l] ныне воспринимают себя как граждан и патриотов."
 japan_politics.3.f: "Сидзо медленно повёл головой туда и обратно, разглядывая новую стрижку в бронзовом зеркале. Она была короче, чем прежде, — без узла на макушке, который он носил столько, сколько помнил себя. Кончики только что остриженных волос ощущались плотными и жёсткими, и он никак не мог удержаться, чтобы их не потрогать.\n\nСидзо резко встряхнул головой. Движение прядей было ужасно непривычным — он словно надел новую одежду с высоким воротом, натиравшим шею. Неудобно, зато полезно. Новая причёска должна была произвести нужное впечатление и привлечь в его лавку новых покупателей. У него был законный бизнес. Он платил налоги, служил в городской страже, имел все права гражданина — в общем, был цивилизованным человеком."
 japan_politics.3.a: "Сила нации — в благополучии её граждан."
