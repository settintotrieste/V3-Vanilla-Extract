l_russian:
 japan_earthquakes.1.t: "Великое землетрясение эпохи [ROOT.GetCountry.GetCustom('JAP_era_name')]"
 japan_earthquakes.1.d: "За четыре дня в прибрежных районах случилось три землетрясения. Они нанесли стране серьёзный ущерб, а вызванные ими огромные волны довершили начатое, причинив ещё больше разрушений."
 japan_earthquakes.1.f: "Прошло совсем немного времени, и уже вся деревня заметила это явление. Похоже было, что никто не почувствовал движения земли, но все явно были поражены движением воды. Все от мала до велика устремились к самому краю моря и ещё дальше, чтобы посмотреть происходящее на нём. Никогда ещё подобного отлива не видели на этом побережье на памяти живущего поколения людей. Начало появляться то, что всегда было скрыто; и пока Хамагути смотрел, его взору открылись прежде покрытые водой участки волнистого песчаного дна и увешанные водорослями скалы. И никто из людей внизу, судя по всему, даже и не догадывался, что означал этот чудовищный отлив.\n\nЛафкадио Херн, #italic Живой бог#!"
 japan_earthquakes.1.a: "Попросить соседнего даймё о помощи."
 japan_earthquakes.1.b: "Пусть местные правители занимаются помощью пострадавшим."
 earthquake_assisting_daimyo: "Помощь соседнего даймё"
 earthquake_affected_daimyo: "Последствия землетрясения"
 japan_earthquakes.2.t: "Землетрясение эпохи [ROOT.GetCountry.GetCustom('JAP_era_name')] в городе [SCOPE.sState('japan_earthquake_state').GetCityHubName]"
 japan_earthquakes.2.d: "У берегов #tooltippable_name #tooltip:[SCOPE.sState('japan_earthquake_state').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('japan_earthquake_state').GetCustom('RU_SL_RP')]#!#! случилось мощное землетрясение. Бедствие вызвало огромные разрушения в городе [SCOPE.sState('japan_earthquake_state').GetCityHubName] и его замке."
 japan_earthquakes.2.f: "После трагедии в стране стали популярны гравюры с изображением огромного сома Намадзу. Поначалу их сюжет повторял традиционные предания: боги усмиряли гигантскую рыбу, не давая ей вызвать новые землетрясения.\n\nОднако со временем появились и другие изображения. На одной гравюре Намадзу разрезает свой живот, и оттуда высыпаются монеты. На другой строители распивают с ним напитки. В этих работах заметна нотка сатиры — Намадзу хоть и является причиной великих бедствий, но в то же время приносит некую пользу."
 japan_earthquakes.2.a: "Наши вассалы в городе [SCOPE.sState('japan_earthquake_state').GetCityHubName] нуждаются в помощи!"
 japan_earthquakes.2.b: "Для восстановления города требуются немалые средства."
 earthquake_vassal_support: "Поддержка вассалов"
 earthquake_rebuilding_focus: "Восстановление после землетрясения"
 earthquake_rebuilding_redistribution: "Очищение мира"
 japan_earthquakes.3.t: "Землетрясение Мино-Овари"
 japan_earthquakes.3.d: "В центре [ROOT.GetCountry.GetAltName('RU_CL_RP')] случилось мощное землетрясение. После толчков, погубивших тысячи людей, в земле остались глубокие трещины."
 japan_earthquakes.3.f: "«Люди обычно склонны воспринимать природные бедствия как преступления. Они всегда задаются вопросом: кто виноват в случившейся трагедии? Так родились сонмы демонов и чудовищ, якобы ответственных за землетрясения.\n\nСовременный сейсмолог должен отбросить эти суеверия. Ирония заключается в том, что порой он действительно ощущает себя полицейским, изучающим место преступления. Что упало? Каким именно образом? Разница в том, что сейсмолога интересует не кто виноват, а как и почему случилась трагедия»."
 japan_earthquakes.3.a: "Пригласим иностранных учёных изучить эти расселины."
 japan_earthquakes.3.b: "Эта информация поможет построить новые метеорологические обсерватории."
 japan_earthquakes.3.c: "Нужно приготовиться к новым толчкам."
 meteorological_observatories: "Метеорологические обсерватории"
 meteorological_observatories_cost: "$meteorological_observatories$"
 earthquake_bracing_for_aftershocks: "Готовность к новым толчкам"
 japan_earthquakes.4.t: "Землетрясение Санрику"
 japan_earthquakes.4.d: "Огромная волна, вызванная землетрясением у берегов Санрику, обрушилась на #tooltippable_name #tooltip:[SCOPE.sState('japan_earthquake_state').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('japan_earthquake_state').GetCustom('RU_SL_VP')]#!#!. Во время разбора завалов кто-то предложил поставить памятник, который послужит предупреждением о будущем цунами."
 japan_earthquakes.4.f: "«Мёртвым памятники ни к чему, а выжившие не нуждаются в лишних напоминаниях о пережитой трагедии. Но каждый, кто прочтёт запечатлённые в камне слова, получит послание от предков — предупреждение о том, что ни в коем случае нельзя забывать. Эти памятники предназначены тем, кто ещё не родился»."
 japan_earthquakes.4.a: "Жителям #tooltippable_name #tooltip:[SCOPE.sState('japan_earthquake_state').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('japan_earthquake_state').GetCustom('RU_SL_RP')]#!#! нужен этот мемориал."
 japan_earthquakes.4.b: "Надо поставить такие камни везде, где случается цунами!"
 japan_earthquakes.4.c: "Лучше думать о сегодняшнем дне."
 tsunami_stones: "Камни цунами"
 tsunami_relief_efforts: "Борьба с последствиями цунами"
 japan_earthquakes.5.t: "Великое землетрясение Канто"
 japan_earthquakes.5.d: "Неподалёку от города [SCOPE.sState('japan_earthquake_state').GetCityHubName] произошло землетрясение небывалой силы. Количество жертв исчисляется сотнями тысяч, большая часть города лежит в руинах."
 japan_earthquakes.5.f: "Казалось, ничто не могло сравниться с разрушительной силой чудовищного цунами, которое последовало за толчками, — но даже его мощь померкла на фоне охвативших город пожаров. Всё вокруг пылало — казалось, что огнём охвачены даже земля и небо.\n\nТе, кому посчастливилось выбраться из горящих зданий, оказались в сердце огненной бури. Пожарище не желало выпускать своих жертв. Город [SCOPE.sState('japan_earthquake_state').GetCityHubName] превратился в видение ада на земле."
 japan_earthquakes.5.a: "Народ Японии должен объединиться перед лицом катастрофы!"
 japan_earthquakes.5.b: "Подобный удар по нашему благосостоянию — это предупреждение против праздности и роскоши."
 japan_earthquakes.5.c: "Это повод отстроить город [SCOPE.sState('japan_earthquake_state').GetCityHubName] как образцовое современное поселение."
 earthquake_national_tragedy: "Национальная трагедия"
 earthquake_divine_punishment: "Кара небесная"
 earthquake_modernization: "Современное строительство"
 earthquake_modernization_land_confiscation: "Перераспределение земель"
 shinbutsu_bunri_decision: "$je_shinbutsu_bunri$"
 shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$"
 elevate_buddhism_decision: "$je_elevate_buddhism$"
 elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$"
 je_shinbutsu_bunri: "Симбуцу бунри"
 je_shinbutsu_bunri_reason: "Власть императора восстановлена. Настала пора укрепить наши исконные верования, подчёркивающие священную природу правящей династии. Для этого их следует избавить от всяческих примесей буддизма: за столетия эта чуждая религия глубоко проникла в обряды поклонения ками, что привело к образованию синкретических традиций. Сыграв на недовольстве буддийскими институтами из-за их связей с сёгунатом, мы можем вывести синтоизм на ведущие позиции."
 je_taikyo_proclamation_button: "Оглашение великих доктрин"
 je_taikyo_proclamation_button_desc: "Сделайте синтоизм, подразумевающий поклонение ками и императору, главной религией государства"
 je_taikyo_proclamation_conversion_tt: "Лидеры всех [Concept('concept_interest_group','заинтересованных групп')] с вероятностью #v 75%#! обратятся в [GetReligion('shinto').GetName|l]."
 je_elevate_buddhism: "Усиление буддизма"
 je_elevate_buddhism_reason: "В Японии буддийские институты исторически тесно связаны с управленческим крылом сёгуната. Однажды они уже спасли сёгунат от краха. Возможно, укрепление религиозных традиций, не сосредоточенных на поклонении императору, поможет сёгунату удержать власть и на этот раз."
 je_elevate_buddhism_goal: "$je_communism_2_goal$"
 arahitogami: "Арахитогами"
 extended_danka_system: "Развитие системы данка"
 japan_religion.1.t: "Дзингудзи"
 japan_religion.1.d: "При синтоистских святилищах часто имеются храмы, где проводят обряды буддийские монахи. С разделением буддизма и синтоизма необходимость в этом, кажется, отпала."
 japan_religion.1.f: "«Зачем нужны эти ритуалы? Чтобы привести ками к свету? Чтобы улучшить их карму? Ясно одно: к ним относятся как к заблудшим овцам, недостойным поклонения. Такое мы больше терпеть не станем!»"
 japan_religion.1.a: "Потребуем, чтобы монахи перешли в синтоизм."
 japan_religion.1.b: "Лишим монахов их духовных санов."
 japan_religion.1.c: "Пусть монахи продолжают свою работу."
 forced_monk_conversions: "Монахов заставили сменить веру"
 monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$"
 monks_stripped_of_titles: "Монахов лишили духовных санов"
 monks_left_to_duties: "Монахам позволили продолжить работу"
 japan_religion.1.a.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] населения, которое включают в себя [GetPopType('clergymen').GetName|l], обратится в [GetReligion('shinto').GetName|l]"
 japan_religion.2.t: "Хондзи суйдзяку"
 japan_religion.2.d: "В Японии устоялась концепция, что будды являют себя в облике ками. Термин «[concept_gongen]» объединяет синтоистских и буддийских божеств, преподнося их как одну силу в разных ипостасях. Такая идеология упрочивает влияние буддизма."
 japan_religion.2.f: "«Когда-то в этом был смысл. Аматэрасу — это солнце. И Дайнити Нёрай — солнце. И Вайрочана. Однако солнце неделимо. Оно не отражает и не олицетворяет сияние другого светила. Оно единолично властвует на небе во всём своём блеске. Сегодня в [ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_PP')] осталось место лишь для одного солнца»."
 japan_religion.2.a: "Запретим концепцию [Concept('concept_gongen','гонгэнов')]."
 japan_religion.2.b: "Запретим называть Хатимана [Concept('concept_boddhisattva','бодхисаттвой')]."
 japan_religion.2.c: "Мы не станем запрещать идеи."
 banned_syncretic_terminology: "Синкретическая терминология запрещена"
 retained_syncretic_terminology: "Синкретическая терминология сохранена"
 japan_religion.2.a.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] населения, которое включают в себя [GetPopType('farmers').GetName|l], обратится в [GetReligion('shinto').GetName|l]"
 japan_religion.2.b.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] населения, которое включают в себя [GetPopType('soldiers').GetName|l], обратится в [GetReligion('shinto').GetName|l]"
 japan_religion.3.t: "По ком звонит колокол"
 japan_religion.3.d: "Попытка вытеснить буддизм привела к всплеску антибуддийских настроений. У храмов изымают и повреждают имущество, из одних выносят священные реликвии, а иные и вовсе уничтожают."
 japan_religion.3.f: "Внезапно он остановился как вкопанный. Статуй двоих Нио — могучих стражников Будды, охранявших вход в святилище, — больше не было. Их заменила пустота.\n\nОказавшись внутри, он не мог отделаться от чувства, что врата теперь никто не сторожит, и в этом сакральном месте небезопасно."
 japan_religion.3.a: "Переплавим колокола в пушки!"
 japan_religion.3.b: "Конфискуем или уничтожим статуи Будды в храмах."
 japan_religion.3.c: "Оставим храмы нетронутыми."
 smelted_temple_bells: "Колокола переплавлены"
 smelted_temple_bells_opinion: "$smelted_temple_bells$"
 removed_buddha_statues: "Статуи Будды конфискованы"
 removed_buddha_statues_opinion: "$removed_buddha_statues$"
 retained_buddhist_iconography: "Буддийские реликвии сохранены"
 japan_religion.4.t: "Отдел по вопросам синтоизма"
 japan_religion.4.d: "Попытки унифицировать синтоистские практики и включить в обряды поклонение избранным ками встретили сопротивление со стороны монахов и священников. Они считают, что подобные нововведения идут вразрез с традицией."
 japan_religion.4.f: "«Наша задача — не просто поддерживать уже существующие синтоистские обряды и практики, которые проводят в наших святилищах, ибо они искажены и опорочены внешними влияниями. Чтобы вернуть синтоизм в чистом и первозданном виде, мы должны возродить в [ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_PP')] традицию почитания императорской династии как потомков богов»."
 japan_religion.4.a: "Навяжем своё видение государства."
 japan_religion.4.b: "Священники больше смыслят в местных обрядах."
 standardized_priest_training: "Обучение священников стандартизировано"
 standardized_priest_training_opinion: "$standardized_priest_training$"
 deferred_to_local_priests: "Решение предоставлено священникам"
 deferred_to_local_priests_opinion: "$deferred_to_local_priests$"
 japan_religion.5.t: "Конфуцианство и синтоизм"
 japan_religion.5.d: "При разделении буддизма и синтоизма встал вопрос о том, какое место в системе должно занимать конфуцианство. Многие считают, что это учение хорошо уживается с синтоизмом, но есть и те, кто относятся к нему как к чужеродному."
 japan_religion.5.f: "«Конфуцианство пришло к нам тем же путём, что и буддизм, однако эта философия никоим образом не противоречит поклонению ками. Напротив, эти две системы отлично сочетаются, ведь они одинаково трактуют отношения небесного и земного, правителя и его подданных»."
 japan_religion.5.a: "Конфуцианство прекрасно дополняет синтоизм."
 japan_religion.5.b: "Мы должны возродить древние синтоистские традиции."
 fukko_shinto: "Фукко Синто"
 japan_religion.6.t: "Христианство в открытом государстве"
 japan_religion.6.d: "Хотя мы открыли [ROOT.GetCountry.GetAltName('RU_CL_VP')] для чужестранцев, свобода вероисповедания у нас по-прежнему ограничена. Если христианские государства возят к нам товары, что мешает им ввезти религию?"
 japan_religion.6.f: "«Христианское учение культивирует смерть, в особенности смерть за веру. Истории о сожжённых и распятых миссионерах вызывают в памяти сюжет о сыне Господнем, принёсшем себя в жертву человечеству. Быть может, пора перестать поставлять им мучеников?»"
 japan_religion.6.a: "Разрешим миссионерам проповедовать свою религию."
 japan_religion.6.b: "Разрешим исповедовать, но не распространять христианство."
 japan_religion.6.c: "Христианство было и остаётся внешней угрозой."
 permitted_christianity: "Христианство разрешено"
 christianity_disallowed: "Христианство запрещено"
 japan_religion.7.t: "Преемственность идей"
 japan_religion.7.d: "Веками в [ROOT.GetCountry.GetAltName('RU_CL_PP')] развивались разнообразные школы буддизма, многие из которых сохраняют влияние и по сей день. С ростом политического веса [SCOPE.gsInterestGroup('devout_ig').GetCustom('RU_IG_RP')|l] одна из этих школ выбивается в лидеры."
 japan_religion.7.f: "«За столетия в [ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_PP')] возникло целое множество школ буддизма. Нет повода думать, что одна школа способна искоренить другие. Однако сейчас стране требуются сильные лидеры, которые поведут её к светлому будущему, и некоторые школы наверняка справятся с этой задачей лучше, чем другие»."
 japan_religion.7.a: "Школа Чистой земли."
 japan_religion.7.b: "Школа Дзен."
 japan_religion.7.c: "Школа Нитирэн."
 japan_religion.7.e: "Школа Сингон."
 pure_land_buddhism: "Школа Чистой земли"
 zen_buddhism: "Школа Дзен"
 shingon_buddhism: "Школа Сингон"
 japan_religion.8.t: "Слова Будды"
 japan_religion.8.d: "Когда [ROOT.GetCountry.GetName] открывает границы, исследователи выражают желание перевести иностранные буддийские тексты, чтобы позаимствовать оттуда свежие идеи."
 japan_religion.8.f: "«Мы не должны позволить себе утонуть в консерватизме, укоренившемся в результате изоляции, и не должны бояться искать истину в неожиданных местах. Чтобы добраться до нас, учение Будды проделало долгий путь. Исследуя развилки и места привала на этом пути, мы глубже поймём природу буддизма»."
 japan_religion.8.a: "Буддизм начинался с текстов на санскрите и пали."
 japan_religion.8.b: "Китайские тексты ближе нам по духу."
 japan_religion.8.c: "Лучше для сравнения изучить труды европейских философов."
 japan_religion.9.t: "Монахи-воины"
 japan_religion.9.d: "Страна продолжает вести войну, и [SCOPE.gsInterestGroup('devout_ig').GetName|l] обсуждают, как буддизм может помочь государству в этом ожесточённом конфликте."
 japan_religion.9.f: "«В старину монахи без раздумий бросались на защиту своих храмов. Так и мы без колебаний откликнемся на зов родины. Жизнь — великая ценность, но разве #tooltippable_name [ROOT.GetCountry.GetAdjective]ое#! государство стало бы вести войну, которая не приведёт к долгосрочному миру и не спасёт больше жизней, чем погубит?»"
 japan_religion.9.a: "Долгого мира можно добиться лишь силой."
 japan_religion.9.b: "Насилие ничем не оправдать."
 war_buddhism: "Воинствующий буддизм"
 peaceful_buddhism: "Мирный буддизм"
 japan_religion.10.t: "Ёсёку"
 japan_religion.10.d: "С окончанием Сакоку в портовых городах всё чаще стали появляться мясные рестораны, ориентированные на иностранцев. Это поставило под сомнения действующий в [ROOT.GetCountry.GetAltName('RU_CL_PP')] запрет на употребление мяса."
 japan_religion.10.f: "«Вы меня, конечно, извините, но нет ничего вкуснее говядины. Стоит привыкнуть к её вкусу, и ты никогда не захочешь вновь отведать мяса оленя или дикого кабана. Не понимаю, почему мы в Японии раньше не употребляли столь идеальное мясо?»\n\n— Канагаки Робун, #italic «Любитель говядины» #!"
 japan_religion.10.a: "Мы должны отменить этот запрет в интересах здорового питания и развития национальной кухни!"
 japan_religion.10.b: "Мы не позволим укорениться этой варварской привычке!"
 maintained_meat_ban: "Сохранение запрета на мясо"
 maintained_meat_ban_opinion: "$maintained_meat_ban$"
 japan_religion.11.t: "Путь ками"
 japan_religion.11.d: "Мы успешно отделили синтоистские практики от буддистских. Влияние старых религиозных институтов слабеет, наступает новая эпоха почитания богов, императора и [ROOT.GetCountry.GetAltName('RU_CL_RP')]."
 japan_religion.11.f: "«[ROOT.GetCountry.GetNameNoFormatting] — родина множества верований и ритуалов, как старых, так и новых. Нашей целью не было искоренить какие-то из них в угоду прочим. Мы хотели провести черту между дорогими сердцу верованиями и неоспоримой истиной»."
 japan_religion.11.a: "Божественность неоспорима."
 japan_religion.12.t: "Срединный путь"
 japan_religion.12.d: "Пройдя непростую для [ROOT.GetCountry.GetAltName('RU_CL_RP')] эпоху потрясений, [SCOPE.gsInterestGroup('devout_ig').GetName|l] сумели подтвердить свой религиозный авторитет. Как и прежде, [ROOT.GetCountry.GetGovernment.GetName|l] полагается на них."
 japan_religion.12.f: "«Речут о путях богов. Будь они,\nне людям ступать по ним. Лишь богам\nдано пройти святой тропой богов».\n—Хагура Томан" # Arthur Lloyd, Poems by Buddhist Priests of Japan
 japan_religion.12.a: "Путь ясен."
 japan_religion.13.t: "$je_taikyo_proclamation_button$"
 japan_religion.13.d: "Провозглашение великой доктрины, объявляющей поклонение ками и почитание божественного императора принципами #tooltippable_name [ROOT.GetCountry.GetAdjective]ого#! государства и обязанностью его граждан."
 japan_religion.13.f: "«Почитание ками и любовь к стране неотделимы друг от друга. Таково первое учение.\n\nПринципы Небес и пути людские неотделимы друг от друга. Таково второе учение.\n\nПочитание императора и послушание воле двора неотделимы друг от друга. Таково третье учение»."
 japan_religion.13.a: "Нужно распространить их по стране!"
 concept_gongen: "Гонгэн"
 concept_gongen_desc: "Будда проявившийся как ками, объединение местного божества с истоком буддистского просветления."
 concept_boddhisattva: "Бодхисаттва"
 concept_boddhisattva_desc: "Буддистское понятие просветлённого существа и учителя, помогающего другим достичь нирваны."
