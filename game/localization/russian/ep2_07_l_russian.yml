l_russian:
 je_sakoku: "Закрытая страна"
 je_sakoku_reason: "Начиная с эпохи Канъэй, с первых дней сёгуната Токугава, Япония оставалась закрытой для иностранцев. Разрешалась лишь ограниченная торговля с немногими избранными державами в специально выделенных для этой цели портах. Эта система существовала более двух столетий, однако мир необратимо меняется, и удерживать страну в изоляции становится всё труднее, пусть даже многие в Японии хотели бы оставить всё как есть. Если не удастся помешать чужеземцам нарушить нашу изоляцию, мы будем вынуждены не только покупать их товары, но и перенимать их идеи."
 je_sakoku_meiji_restoration: "#b Император#! вернулся к власти, правлению #b сёгуна#! пришёл конец"
 je_sakoku_stop_being_closed_button: "Отмена политики [GetLawType('law_sakoku').GetName|l]"
 je_sakoku_stop_being_closed_button_desc: "Из-за обострения кризиса и растущего давления извне отмена системы [GetLawType('law_sakoku').GetName|l] становится делом чрезвычайной необходимости. В сложившихся условиях мы обязаны упразднить политику изоляции, однако этот шаг приведёт в ярость тех, кто по-прежнему поддерживает старые порядки."
 notification_morrison_incident_has_incidented_name: "$JAP$ обстреляла торговое судно"
 notification_morrison_incident_has_incidented_desc: "Один предприимчивый купец из нашей страны попытался нарушить японский запрет на внешнюю торговлю и попал под обстрел береговой батареи. Этот инцидент ухудшил отношения между нашими державами."
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners: "Снисходительное отношение к чужеземцам"
 caved_to_foreign_pressure_opposition: "Поддались иностранному давлению"
 caved_to_foreign_pressure_government: "Поддались иностранному давлению"
 overdue_break_with_tradition: "Долгожданный отказ от традиций"
 forced_transition_from_tradition: "Насильственная отмена традиций"
 the_picked_lock_modifier: "Взломанный замок"
 sakoku_entrenched_modifier: "Усиление политики сакоку"
 meiji_failure_modifier: "Реставрация провалилась"
 ep2_sakoku.1.t: "[SCOPE.sCountry('opium_wars_loser').GetAdjectiveNoFormatting]ое поражение вызывает беспокойство"
 ep2_sakoku.1.d: "[SCOPE.sCountry('opium_wars_loser').GetName], наш могучий и древний сосед, недавно потерпел поражение в опиумной войне против некой заморской державы, навязавшей #tooltippable_name [SCOPE.sCountry('opium_wars_loser').GetAdjective|l]им#! властям несправедливые торговые соглашения. Если даже такая мощная держава, как [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting], не в силах уберечь собственные рынки от иноземцев, как же нам сохранить политику [GetLawType('law_sakoku').GetName|l]?"
 ep2_sakoku.1.f: "«Обширные земли, баснословные богатства, могущество — перед мощью тех, кто выступил против [SCOPE.sCountry('opium_wars_loser').GetAltNameNoFormatting('RU_CL_RP')], всё это оказалось бессильным. Чужеземцы уже просят, чтобы их пустили в нашу страну. Так стоит ли повторять ошибку [SCOPE.sCountry('opium_wars_loser').GetAltNameNoFormatting('RU_CL_RP')] и отказывать, пока их пушки не начнут обстреливать наши города? Может, лучше избрать свой собственный путь? Решение должно быть принято прямо сейчас, пока их железные корабли не вошли в наши воды и не решили всё за нас»."
 ep2_sakoku.1.a: "Мы должны обдумать немыслимое."
 ep2_sakoku.1.b: "Мы должны принять немыслимое."
 end_sakoku_button_now_available: "В записи «$je_sakoku$» появится возможность преждевременно покончить с политикой [GetLawType('law_sakoku').GetName|l]."
 ep2_sakoku.2.t: "Взлом замка"
 ep2_sakoku.2.d: "На фоне нарастающей нестабильности внутри страны и за её пределами [GetLawType('law_bakufu').GetName|l] хочет пойти на немедленную отмену политики [GetLawType('law_sakoku').GetName|l]."
 ep2_sakoku.2.f: "Здание таможни заполонили купцы. Встречал их один-единственный измученный чиновник. «Да, конечно, это значит, что с изоляцией страны покончено».\n\nИз толпы полетели вопросы, сливаясь в неразборчивый гул. «Что будет дальше? Я… я не знаю. Наверное, мы… Нет, подождите, такие решения принимаю не я. И не вы. Вы не можете так просто…»\n\nЗа каждым ответом следовали десятки новых вопросов. #italic «Работать было куда легче, пока страна оставалась в изоляции»#!, — подумал он."
 ep2_sakoku.2.a: "[GetLawType('law_mercantilism').GetName] — вот будущее [ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_RP')]."
 ep2_sakoku.2.b: "[GetLawType('law_free_trade').GetName] принесёт [ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_DP')] свободу."
 ep2_sakoku.2.c: "[GetLawType('law_protectionism').GetName] позволит нам вести дела с иностранцами, не жертвуя интересами страны."
 ep2_sakoku.3.t: "[SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting] вызывает международный скандал"
 ep2_sakoku.3.d: "Некий купец из [SCOPE.sCountry('morrison_incident_country').GetAltName('RU_CL_RP')] попытался обойти ограничения [GetLawType('law_sakoku').GetName|l] и войти в запретный порт на корабле #italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#!. Береговым батареям пришлось открыть огонь, чтобы отогнать судно нарушителя в нейтральные воды. Этот инцидент заметно ухудшил наши отношения с [SCOPE.sCountry('morrison_incident_country').GetAltNameNoFormatting('RU_CL_TP')]."
 ep2_sakoku.3.f: "Следующее ядро наконец-то поразило цель, и командир батареи довольно ухмыльнулся. В законе всё сказано предельно ясно: чужеземным судам не дозволено находиться в этих водах. Что бы там ни думал капитан корабля, ему придётся развернуться и уплыть восвояси."
 ep2_sakoku.3.a: "Гарнизон с честью выполнил свою задачу."
 ep2_sakoku.3.b: "Нужно извиниться перед [SCOPE.sCountry('morrison_incident_country').GetAltNameNoFormatting('RU_CL_TP')] и выплатить купцу компенсацию, чтобы сгладить конфликт."
 ep2_sakoku.3.c: "Этот инцидент послужит поводом для пересмотра политики [GetLawType('law_sakoku').GetName|l]."
 ep2_sakoku.4.t: "Взломанный замок"
 ep2_sakoku.4.d: "Преодолев внутренние и внешние вызовы, правительство упразднило политику [GetLawType('law_sakoku').GetName|l]. В истории [ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_RP')] открывается новая страница."
 ep2_sakoku.4.f: "Чиновник окинул бухту взглядом. У причалов стояли незнакомые суда, над ними реяли флаги, которых он никогда прежде не видел. Что они могут предложить [ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_DP')]? И чего потребуют взамен?\n\nОн долго не отводил взгляда от пришвартованных кораблей, но в конце концов отвернулся. Глядя на них, он всё равно не получит ответа — во всяком случае, сейчас. Лишь время покажет, что принесёт его родной стране новая эра."
 ep2_sakoku.4.a: "Сегодня Япония откроется для мира!"
 ep2_sakoku.5.t: "Заржавевший замок"
 ep2_sakoku.5.d: "Даже перед лицом серьёзных политических потрясений власти [ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_RP')] упорно цепляются за сохранение политики [GetLawType('law_sakoku').GetName|l]. Похоже, что выхода из добровольной изоляции не предвидится. [GetLawType('law_sakoku').GetNameNoFormatting] останется с нами надолго."
 ep2_sakoku.5.f: "Чиновник окинул бухту взглядом. У причалов стояли знакомые до боли суда — такие же, какие прежде видел его отец, а до него дед и все его предки в течение нескольких поколений. Увидят ли эти корабли его дети? А внуки? Неужели этот вид никогда не изменится?\n\nОн долго не отводил взгляда от пришвартованных кораблей, но в конце концов отвернулся. Глядя на них, он всё равно не получит ответа — во всяком случае, сейчас. Лишь время покажет, как долго его родная страна будет пребывать в неизменности."
 ep2_sakoku.5.a: "Замок останется закрытым."
 meiji.14.t: "Пустые обещания реставрации"
 meiji.14.d: "Правительство эпохи [ROOT.GetCountry.GetCustom('JAP_era_name')] завалило нас громкими обещаниями, однако на деле в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] мало что поменялось. Критики жалуются, что страна до и после реставрации — это по сути одно и то же."
 meiji.14.f: "В цехе, тяжело пыхтя, работал огромный двигатель, медленно вращая внушительных размеров маховик, который питал токарные и сверлильные станки. Эти машины производили стволы, затворы и спусковые механизмы для колоссальной партии нового оружия. Скоро одна страна попытается оставить в истории след из пара и железа, и этой страной будет не [ROOT.GetCountry.GetNameNoFormatting]."
 meiji.14.a: "Сегодня мы засыпаем с надеждой."
 je_end_edo_system_button_name: "Упразднение сословной системы Эдо"
 je_end_edo_system_button_desc: "В эпоху изменений и реформ сословная система только мешает нашему развитию. Любой гражданин, независимо от его положения, может быть полезен государству."
 edo_system_not_support_enforcement_tt: "Не поддерживает введение закона «[GetLawType('law_intermediate_edo_system').GetName]» или «[GetLawType('law_strict_edo_system').GetName]»"
 edo_system_ends_tt: "[ROOT.GetCountry.GetNameNoFlag] полностью отказывается от [Concept('concept_social_hierarchy', 'системы Эдо')]"
 notification_edo_system_disappears_name: "Обрушение системы Эдо"
 notification_edo_system_disappears_desc: "В силу недавних культурных и социальных изменений система Эдо перестала быть признанной [Concept('concept_social_hierarchy', 'социальной иерархией')] в [SCOPE.sCountry('relevant_country_scope').GetAltName('RU_CL_PP')]."
 notification_edo_system_disappears_tooltip: "#header $notification_edo_system_disappears_name$#!\n$TOOLTIP_DELIMITER$\n$notification_edo_system_disappears_desc$"
 je_meiji_army_barracks_condition: "Все #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag|l]ие#! #tooltippable_name #tooltip:[GetBuildingType('building_barrack').GetTooltipTag],DATA_BUILDING_TYPE_NAME_TOOLTIP,BuildingTypeTooltip казармы#!#!:\n$EFFECT_LIST_BULLET$ #bold Не#! задействованы эффекты #yellow «Отсутствие организованной подготовки»#! и #yellow «Самурайские учения»#!"
