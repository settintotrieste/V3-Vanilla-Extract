 # Events
 ryukyu_rivalry.1.t: "Данник размышляет о будущем"
 ryukyu_rivalry.1.d: "[SCOPE.sCountry('ryukyu_scope').GetName] всё больше склоня[SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('RU_CL_END_T')]ся на сторону [ROOT.GetCountry.GetAltName('RU_CL_RP')]. В свою очередь, [SCOPE.sCountry('rival_scope').GetName] удваива[SCOPE.sCountry('rival_scope').GetAltNameNoFormatting('RU_CL_END_T')] собственные дипломатические усилия, выказывая [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('RU_CL_DP')] всяческое уважение и в то же время аккуратно подчёркивая необходимость соблюдения даннических обязательств."
 ryukyu_rivalry.1.f: "На полу дворцовых палат Рюкю стояли аккуратно выстроенные в ряд запечатанные шкатулки. Пока в зале зачитывали письма, придворные, укрывшись за ширмами, негромко обсуждали новости. На первом письме была алая печать Китая, на втором — изящная каллиграфия из Японии. В каждом предложении — клятвы и обещания: борьба двух держав за возможность склонить королевство на свою сторону."
 ryukyu_rivalry.1.a: "Направить [SCOPE.sCountry('rival_scope').GetAltName('RU_CL_DP')] официальный протест."
 ryukyu_rivalry.1.b: "Воспользуемся нашими связями в [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_PP')]."
 ryukyu_rivalry.1.c: "Пора напомнить двору о нашем покровительстве."
 ryukyu_rivalry.1.e: "Этот вопрос не стоит нашего вмешательства."
 ryukyu_rivalry.1.tt1: "[SCOPE.sCountry('ryukyu_scope').GetName] — субъект [ROOT.GetCountry.GetAltName('RU_CL_RP')], при этом [Concept('concept_liberty_desire','желание свободы')] у этой державы менее #v 25#!"
 ryukyu_rivalry.1.tt2: "[SCOPE.sCountry('ryukyu_scope').GetName] — не субъект [ROOT.GetCountry.GetAltName('RU_CL_RP')], при этом их [Concept('concept_relations', 'отношения')] не менее чем #v приязненные#!"
 ryukyu_rivalry.1.tt3: "[ROOT.GetCountry.GetName] владе[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] как минимум 3 [Concept('concept_building', 'сооружениями')] в городе [SCOPE.sCountry('ryukyu_scope').GetCapital.GetName]"
 ryukyu_rivalry.2.t: "Борьба за порты"
 ryukyu_rivalry.2.d: "#tooltippable_name [SCOPE.sCountry('rival_scope').GetAdjective]ие#! представители, появившиеся в портах [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_RP')], довольно быстро наладили сотрудничество с #tooltippable_name #tooltip:[GetCulture('ryukyuan').GetTooltipTag],EMPTY_STRING,CultureTooltip [GetCulture('ryukyuan').GetCustom('RU_CUL_ADJ')|l]ими#!#! купцами. Это усилило их позиции в глазах местного двора, в то время как наше влияние пошло на спад."
 ryukyu_rivalry.2.f: "На страницах счётных книг появились новые печати. Купцы, ещё недавно искавшие нашей поддержки, теперь стояли в очереди в другие кабинеты, желая обсудить безопасность маршрутов или пересмотр пошлин. Похоже, что деньги сумели найти самый удобный путь…"
 ryukyu_rivalry.2.a: "Какой подлый трюк!"
 ryukyu_rivalry.3.t: "Генеральский визит в [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('RU_CL_VP')]"
 ryukyu_rivalry.3.d: "Генерал [SCOPE.sCharacter('ryukyu_general_scope').GetFullName] в сопровождении группы офицеров [SelectLocalization(SCOPE.sCharacter('ryukyu_general_scope').IsFemale, 'прибыла', 'прибыл' )] в [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_VP')] под предлогом инспекции береговых укреплений. Делегацию приняли с почтительной покорностью, что укрепило авторитет [SCOPE.sCountry('rival_scope').GetAltName('RU_CL_RP')] и плохо сказалось на нашем собственном влиянии при местном дворе."
 ryukyu_rivalry.3.f: "Генерал в сопровождении офицеров [SelectLocalization(SCOPE.sCharacter('ryukyu_general_scope').IsFemale, 'шла', 'шёл' )] вдоль стены размашистым шагом, внимательно изучая каждую пушку, каждую дозорную башню. Рюкюские солдаты вытянулись по струнке, не желая подводить уважаемых гостей. Каждый их жест укреплял невидимые нити, сплетавшие две страны воедино."
 ryukyu_rivalry.3.a: "Опасное обострение."
 ryukyu_rivalry_risk_of_confrontation: "@warning! Если посланники [SCOPE.sCountry('china_scope').GetAltName('RU_CL_RP')] и [SCOPE.sCountry('japan_scope').GetAltName('RU_CL_RP')] одновременно устроят инспекцию береговых укреплений, между ними может произойти #r конфликт#!"
 ryukyu_rivalry.4.t: "Генеральский визит"
 ryukyu_rivalry.4.d: "Генерал [SCOPE.sCharacter('ryukyu_general_scope').GetFullName] в сопровождении офицеров из [SCOPE.sCountry('from_scope').GetAltName('RU_CL_RP')] [SelectLocalization(SCOPE.sCharacter('ryukyu_general_scope').IsFemale, 'прибыла', 'прибыл' )] в [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_VP')] для инспекции наших береговых укреплений. Мы приняли делегацию с надлежащей почтительной покорностью."
 ryukyu_rivalry.4.f: "$ryukyu_rivalry.3.f$"
 ryukyu_rivalry.4.a: "Не спускайте с них глаз."
 ryukyu_rivalry_officer_arrives: "Доступен #tooltippable_name [SCOPE.sCountry('from_scope').GetAdjective|l]ий#! [Concept('concept_general', 'генерал')]"
 ryukyu_rivalry.5.t: "Судьба [SCOPE.sCountry('ryukyu_scope').GetAltNameNoFormatting('RU_CL_RP')]"
 ryukyu_rivalry.5.d_victor: "Наши усилия в [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_PP')] увенчались успехом. Последовательное дипломатическое, экономическое и политическое давление привело к тому, что теперь их двор ориентируется исключительно на нас. Вопрос суверенитета островного государства решился в нашу пользу."
 ryukyu_rivalry.5.d_loser: "Несмотря на все наши усилия, власти [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_RP')] оказались под полным влиянием [SCOPE.sCountry('victor_scope').GetAltName('RU_CL_RP')]. Смирившись с новой политической реальностью, их двор признал острова частью [SCOPE.sCountry('victor_scope').GetAdjectiveNoFormatting|l]ой сферы влияния."
 ryukyu_rivalry.5.d_ryu: "Мы долго балансировали между двумя державами, но удерживать это равновесие и далее теперь невозможно. Под давлением [SCOPE.sCountry('victor_scope').GetAltName('RU_CL_RP')] двор смирился с новой политической реальностью. Отныне будущее [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_RP')] в [SCOPE.sCountry('victor_scope').GetAdjectiveNoFormatting|l]их руках."
 ryukyu_rivalry.5.f_annexed: "Составленные в городе [SCOPE.sCountry('victor_scope').GetCapital.GetName] и ещё пахнущие чернилами прокламации зачитали на рыночной площади Нахи. #tooltippable_name [SCOPE.sCountry('ryukyu_scope').GetAdjectiveNoFormatting]ие#! знамёна сняли, и на их месте взвился штандарт сюзерена. К вечеру было назначено местное правление и появились новые указы."
 ryukyu_rivalry.5.f_subject: "Составленные в городе [SCOPE.sCountry('victor_scope').GetCapital.GetNameNoFormatting] и ещё пахнущие чернилами прокламации зачитали на рыночной площади Нахи. Каждый указ определял, какое теперь место в державе отводится [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_DP')]. Королевство, долгое время бывшее данником далёких стран, отныне связано обязательствами с великой державой. К вечеру новые порядки вступили в силу."
 ryukyu_rivalry_ryukyu_vassalise_tt: "[SCOPE.sCountry('ryukyu_scope').GetName] становится [Concept('concept_puppet', 'марионеткой')] [SCOPE.sCountry('victor_scope').GetAltName('RU_CL_RP')]"
 ryukyu_rivalry_ryukyu_transfer_subject_tt: "[SCOPE.sCountry('ryukyu_scope').GetName] переходит [SCOPE.sCountry('victor_scope').GetAltName('RU_CL_DP')] в качестве [Concept('concept_subject', 'субъекта')]"
 ryukyu_rivalry_ryukyu_annex_tt: "[SCOPE.sCountry('victor_scope').GetName] аннексиру[SCOPE.sCountry('victor_scope').GetAltNameNoFormatting('RU_CL_END_T')] [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_VP')]"
 ryukyu_rivalry.5.a: "Да будет так."
 ryukyu_rivalry.6.t: "Стычка в городе [SCOPE.sCountry('ryukyu_scope').GetCapital.GetNameNoFormatting]"
 ryukyu_rivalry.6.d_brawl: "Между офицерами, присланными из [SCOPE.sCountry('japan_scope').GetAltName('RU_CL_RP')] и [SCOPE.sCountry('china_scope').GetAltName('RU_CL_RP')] для инспекции береговых укреплений [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_RP')], случилась драка. В результате стычки один из них погиб — к немалой тревоге рюкюского двора."
 ryukyu_rivalry.6.d_accident: "Представители вооружённых сил [SCOPE.sCountry('japan_scope').GetAltName('RU_CL_RP')] и [SCOPE.sCountry('china_scope').GetAltName('RU_CL_RP')], осматривавшие береговые укрепления, одновременно явились в одну и ту же крепость в [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_PP')]. Случайная встреча вызвала переполох среди местного гарнизона и привела к непродолжительной перестрелке."
 ryukyu_rivalry.6.d_fire: "В жилищах, предназначенных для иностранных инспекторов в [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_PP')], случился пожар. Покои #tooltippable_name [SCOPE.sCountry('japan_scope').GetAdjective|l]ого#! и #tooltippable_name [SCOPE.sCountry('china_scope').GetAdjective|l]ого#! контингентов оказались полностью уничтожены огнём. Причины инцидента остаются неизвестными, однако среди местных чиновников ходят слухи, что кто-то неудачно поставил одну-две лампы…"
 ryukyu_rivalry.6.f: "Офицер Каймон бегал между сторожевыми башнями и складами, передавая приказы охране. Отовсюду непрерывно звучали команды, зачастую противоречившие друг другу. И хотя в конце концов порядок удалось восстановить, в тот день Каймон получил хороший урок: появление миссий двух соперничавших мировых держав легко могло бы вскрыть всю шаткость положения Рюкю."
 ryukyu_rivalry.6.a: "Напряжённость нарастает."
 ryukyu_rivalry_ryukyu_confrontation_tt1: "[Concept('concept_infamy','Уровень дурной славы')] #tooltippable_name [SCOPE.sCountry('japan_scope').GetAdjective|l]ой#! и #tooltippable_name [SCOPE.sCountry('china_scope').GetAdjective|l]ой#! сторон увеличивается на #v 6#!"
 ryukyu_rivalry.7.t: "Вердикт Рюкю"
 ryukyu_rivalry.7.d_ryukyu: "После многих лет наблюдений и деликатной дипломатии наш совет объявил о своём решении впредь управлять страной самостоятельно, без оглядки на интересы других держав. Двор резко ограничил иностранное влияние и закрепил преимущественную роль местных обрядов, министров и традиционных советов в деле управления королевством, которое отныне идёт собственным путём."
 ryukyu_rivalry.7.d: "После многих лет наблюдений и деликатной дипломатии власти [SCOPE.sCountry('ryukyu_scope').GetName] полностью вышли из-под нашего влияния и объявили о своём решении впредь управлять страной самостоятельно, без оглядки на интересы других держав. Двор резко ограничил наше присутствие и возвысил роль местных обрядов, министров и традиционных советов в деле управления королевством. Наш авторитет тает на глазах."
 ryukyu_rivalry.7.f: "По отполированному до блеска полу замка Сюри были разбросаны печати и разорванные книги учёта дани. В залах для аудиенций всё ещё ощущались остатки влияния иностранных держав, но они больше не могли диктовать стране курс. Терпеливые и осторожные дипломаты обеспечили Рюкю новый путь — путь хрупкого нейтралитета."
 ryukyu_rivalry.7.a: "Вопрос принадлежности решён."
 ryukyu_rivalry.7.b: "Мы ещё можем применить силу."
 ryukyu_rivalry.8.t: "Тайное владение"
 ryukyu_rivalry.8.d: "После открытия портов [SCOPE.sCountry('japan_scope').GetAltName('RU_CL_RP')] вопрос о сюзеренитете над [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_TP')], до времени отложенный, снова стал актуальным. На протяжении целых поколений королевство действовало исключительно осторожно: являясь по факту данником [SCOPE.sCountry('china_scope').GetAltName('RU_CL_RP')], оно тем не менее втайне сохраняло преданность [SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('RU_CL_DP')]. Теперь обеим державам предстоит подумать над тем, как укрепить своё влияние."
 ryukyu_rivalry.8.f: "Коридоры замка Сюри ярко освещены. Свет фонарей играет на багровых балках, поставленных королями Тюдзана в давние времена. Под расписным потолком сидят многочисленные писцы, раскладывающие дань около распоряжений из Сацумы. Двор уже давно балансирует между интересами Срединного Государства и тенью Кагосимы. До поры кризиса удавалось избежать, но рано или поздно вопрос сюзеренитета над Рюкю потребует окончательного ответа."
 ryukyu_rivalry.8.a: "Вопрос остаётся нерешённым."
