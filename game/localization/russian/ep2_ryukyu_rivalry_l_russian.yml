 je_ryukyu_rivalry_reaffirm_suzerainty_button_desc: "Двор Рюкю склоняется на сторону наших соперников. Пора напомнить им об обязательствах перед нашим княжеством и вернуть их в сферу влияния."
 ryukyu_rivalry_reaffirm_suzerainty_button_tt: "[ROOT.GetCountry.GetName] име[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] меньше #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b влияния#!#! на [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_VP')], чем соперничающая держава"
 ryukyu_rivalry_small_influence_gain_self_tt: "[ROOT.GetCountry.GetName] получа[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] #green 2#! ед. #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b влияния#!#!"
 ryukyu_rivalry_medium_influence_gain_self_tt: "[ROOT.GetCountry.GetName] получа[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] #green 3#! ед. #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b влияния#!#! в месяц на #v 5 лет#!"
 ryukyu_rivalry_large_influence_gain_self_tt: "[ROOT.GetCountry.GetName] получа[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] #green 3#! ед. #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b влияния#!#! в месяц до окончания [Concept('concept_journal_entry', 'записи в дневнике')]"
 ryukyu_rivalry_small_influence_loss_self_tt: "[ROOT.GetCountry.GetName] потерял[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] #red 1#! ед. #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b влияния#!#!"
 ryukyu_rivalry_medium_influence_loss_self_tt: "[ROOT.GetCountry.GetName] потерял[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] #red 2#! ед. #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b влияния#!#!"
