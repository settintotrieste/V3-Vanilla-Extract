 ryukyu_rivalry_large_influence_loss_japan_tt: "[SCOPE.sCountry('japan_scope').GetName] теря[SCOPE.sCountry('japan_scope').GetAltNameNoFormatting('RU_CL_END_T')] #red 10#! ед. #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b влияния#!#!"
 ryukyu_rivalry_large_influence_loss_china_tt: "[SCOPE.sCountry('china_scope').GetName] теря[SCOPE.sCountry('china_scope').GetAltNameNoFormatting('RU_CL_END_T')] #red 10#! ед. #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b влияния#!#!"
 ryukyu_rivalry_send_general_tt: "[ROOT.GetCountry.GetName] назнача[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] [Concept('concept_general','генерала')] в [SCOPE.sCountry('ryukyu_scope').GetAltName('RU_CL_VP')] на постоянной основе"
 je_ryukyu_rivalry_sway_merchants_button: "Прислать торговых инспекторов"
 je_ryukyu_rivalry_sway_merchants_button_desc: "Взяв гавань Нахи под контроль, мы получим прямой доступ ко двору и сможем влиять на то, какие иностранные державы будут получать дань и вести здесь торговлю."
 ryukyu_rivalry_sway_merchants_button_tt: "[ROOT.GetCountry.GetName] владе[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] #tooltippable_name #tooltip:[GetBuildingType('building_port').GetTooltipTag],DATA_BUILDING_TYPE_NAME_TOOLTIP,BuildingTypeTooltip портами#!#! уровня #v 2#! и выше в #tooltippable_name [SCOPE.sCountry('ryukyu_scope').GetAdjective|l]ой#! [Concept('concept_capital_state', 'столице')]"
 je_ryukyu_rivalry_inspect_defenses_button: "Проинспектировать защитные сооружения"
 je_ryukyu_rivalry_inspect_defenses_button_desc: "Получив военный доступ, мы сможем отправить генерала для инспекции укреплений Рюкю. Пусть убедится, что их стены и башни готовы послужить нашим стратегическим интересам."
 ryukyu_rivalry_inspect_defenses_button_tt: "[ROOT.GetCountry.GetName] и [SCOPE.sCountry('ryukyu_scope').GetName] заключили [Concept('concept_treaty', 'договор')] о праве #v военного доступа#!"
 je_ryukyu_rivalry_honor_kikoeogimi_button: "Почтение кикоэ-оогими"
 je_ryukyu_rivalry_honor_kikoeogimi_button_desc: "Кикоэ-оогими отвечает за придворный церемониал и священные обряды. Сделав ей подношение, мы повысим своё влияние в совете Рюкю."
 # Modifiers
 modifier_ryukyu_rivalry_overreach: "Непосильный сюзеренитет"
 modifier_ryukyu_rivalry_landowner_discontent: "Недовольство соперничеством за Рюкю"
 modifier_ryukyu_rivalry_merchant_influence_strain: "Бремя влияния на порт"
 modifier_ryukyu_strained_diplomatic_corps: "Усиление дипломатического присутствия"
