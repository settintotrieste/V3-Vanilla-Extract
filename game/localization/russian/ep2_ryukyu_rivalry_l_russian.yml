 modifier_ryukyu_rivalry_succeeded_ryukyu: "Обретение Рюкю"
 modifier_ryukyu_rivalry_officer_training: "Инспекция оборонительных сооружений Рюкю"
 modifier_ryukyu_rivalry_secured_neutrality: "Гарантия нейтралитета"
 modifier_ryukyu_rivalry_southern_secured: "Безопасность южных подходов"
 modifier_ryukyu_rivalry_scholars_pleased: "Традиции дани сохраняются"
 modifier_ryukyu_rivalry_honor_kikoeogimi: "Церемониальные отношения"
 modifier_ryukyu_rivalry_diplomatic_appeasement: "Дипломатическое умиротворение"
