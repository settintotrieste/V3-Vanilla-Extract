l_russian:
 ## Interest Tier Types
 interest_tier_none: "Отсутствует"
 interest_tier_none_desc: "На этом уровне [Concept('concept_country', 'страна')] практически никак не вмешивается в дела [Concept('concept_strategic_region', 'стратегического региона')]. Ни на страну, ни на регион не действуют никакие эффекты."
 interest_tier_observant: "Наблюдение"
 interest_tier_observant_desc: "На этом уровне страна делает первые шаги, чтобы обозначить своё дипломатическое присутствие в [Concept('concept_strategic_region', 'стратегическом регионе')] — например, отправляет флот патрулировать берега или обменивается послами с [Concept('concept_local_country', 'локальными державами')]."
 interest_tier_engaged: "Участие"
 interest_tier_engaged_desc: "На этом уровне [Concept('concept_country', 'страна')] начинает вмешиваться в местные дела, заключает [Concept('concept_treaty', 'договоры')] и устанавливает постоянное присутствие в регионе."
 interest_tier_influential: "Влияние"
 interest_tier_influential_desc: "На этом уровне [Concept('concept_country', 'страна')] играет активную роль в жизни [Concept('concept_strategic_region', 'стратегического региона')], заключает долгосрочные соглашения и претендует на территории.\n\n@information! Страны, [Concept('concept_capital_state', 'столицы')] которых расположены в данном регионе, никогда не опускаются ниже этого уровня."
 interest_tier_pervasive: "Господство"
 interest_tier_pervasive_desc: "На этом уровне [Concept('concept_country', 'страна')] плотно контролирует [Concept('concept_strategic_region', 'стратегический регион')]. [Concept('concept_great_power', 'Великие')] и [Concept('concept_local_country', 'локальные')] державы соперничают за господство и консолидируют власть."
 interest_tier_hegemonic: "Гегемония"
 interest_tier_hegemonic_desc: "На этом уровне [Concept('concept_country', 'страна')] полностью доминирует над [Concept('concept_strategic_region', 'стратегическим регионом')]. Другие державы, #italic если таковые есть#!, вынуждены подчиняться гегемону или договариваться с ним, чтобы обеспечить его невмешательство в местные дела."
 ## Interface
 INTEREST_TIER_TYPE_BOUNDS_DESC: "Применимо между [Concept('concept_involvement', 'вовлечённостью')] [InterestTierType.GetLowerBound|v] и [InterestTierType.GetUpperBound|v]"
 INTEREST_TIER_TYPE_NO_EFFECT: "#italic Нет эффекта#!"
 INTEREST_TIER_ACTIVE: "#i #b Текущий уровень#!#! для [Country.GetAltName('RU_CL_RP')][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'YOU'))]"
 INTEREST_TIER_ACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#! $INTEREST_TIER_ACTIVE$\n$INTEREST_TIER_BOUNDS_DESC$\n[SelectLocalization(EqualTo_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_CURRENT_INVOLVEMENT_DESC', 'INTEREST_TIER_TARGET_INVOLVEMENT_DESC')]\n$TOOLTIP_DELIMITER$\n$INTEREST_TIER_EFFECTS_AND_BREAKDOWN$"
 INTEREST_TIER_INACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#!\n$INTEREST_TIER_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n#title Эффекты:#!#indent_newline:3 \n[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)]#!"
 INTEREST_TIER_EFFECTS_AND_BREAKDOWN: "#title Эффекты:#!#indent_newline:3 [ConcatIfNeitherEmpty('\n', InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', AddLocalizationIf(And(And3(StringIsEmpty(InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetStateModifier.GetDesc)), StringIsEmpty(InterestTierType.GetTradeAdvantageDesc)), 'INTEREST_TIER_NO_EFFECT'))]#!\n\n#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! [Concept('concept_involvement', 'вовлечённости')] по причине:#!#indent_newline:3 \n[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]#!\n $INTEREST_TIER_ACTIVE$: #i #b (текущий уровень)#!#!"
 INTEREST_TIER_PREDICTED: "#i #b (Ожидаемый уровень)#!#!"
 INTEREST_TIER_BOUNDS_DESC: "Применимо между [Concept('concept_involvement', 'вовлечённостью')] [InterestTierType.GetLowerBound|v0] и [InterestTierType.GetUpperBound|v0]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC: "[concept_involvement] [Country.GetAltName('RU_CL_RP')]: #v [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#!"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC: "[concept_involvement] [Country.GetAltName('RU_CL_RP')]: [AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetTargetInvolvementIn(StrategicRegion.Self), Country.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP')][AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN')]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Наша нынешняя [Concept('concept_involvement', 'вовлечённость')] — [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] #v [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#!"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Наша нынешняя [Concept('concept_involvement', 'вовлечённость')] — [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] [AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self), GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT')][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self), GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT')]"
 INTEREST_TIER_TARGET_UP: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/нед.)"
 INTEREST_TIER_TARGET_DOWN: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/нед.)"
 INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/нед.)"
 INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/нед.)"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN_TITLE: "#title Целевая вовлечённость составляет #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!, причины:#!"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN: "[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]"
 INTEREST_TIER_EFFECTS_TITLE: "#title Эффекты:#!"
 INTEREST_TIER_EFFECTS: "[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetDescription)]"
 INTEREST_TIER_NO_EFFECT: "#italic Нет эффекта#!"
 INTEREST_TIER_TRADE_ADVANTAGE_EXPORTS_DESC: "[Concept('concept_trade_advantage', 'Торговое преимущество')] для [Concept('concept_trade', 'экспорта')] на местных рынках: $VAL|0=+v$"
 INTEREST_TIER_TRADE_ADVANTAGE_IMPORTS_DESC: "[Concept('concept_trade_advantage', 'Торговое преимущество')] для [Concept('concept_trade', 'импорта')] на местных рынках: $VAL|0=+v$"
 INTEREST_TIER_ON_ACTIVATE_EFFECT: "#title При получении:#!"
 INTEREST_TIER_ON_DEACTIVATE_EFFECT: "#title При потере:#!"
 STRATEGIC_REGION_AI_STANCE_TT_HEADER: "[Country.GetNameNoFormatting] занима[Country.GetAltNameNoFormatting('RU_CL_END_T')] [Concept('concept_strategic_region_stance', 'позицию')] #b «[Country.GetAIStrategicRegionStanceTypeIn(StrategicRegion.Self).GetNameNoFormatting]»#! в стратегическом регионе [StrategicRegion.GetName] по следующим причинам:\n$TOOLTIP_DELIMITER$"
 ## Effects
 interest_tier_effect_establish_missions_decree: "@checkmark! Открывает доступ к [Concept('concept_decree', 'указу')] «[GetDecreeType('decree_establish_missions').GetName]» в [Concept('concept_unincorporated_state', 'невключённых областях')]"
 interest_tier_effect_colonization: "@checkmark! Открывает доступ к региональному действию #yellow;tooltip:[GetPlayer.GetTooltipTag],establish_colony_tooltip «$establish_colony$»#!"
 interest_tier_effect_stake_colonial_claim: "@checkmark! Открывает доступ к [Concept('concept_diplomatic_action', 'дипломатическому действию')] «[GetDiplomaticActionType('da_stake_colonial_claim').GetName]» в отношении [Concept('concept_decentralized_nation', 'децентрализованных государств')]"
 interest_tier_effect_colonial_claim_generation: "@checkmark! Создаёт [Concept('concept_claim', 'претензию')], когда колонизация [Concept('concept_state_region', 'региона')] достигает [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_colonial_claim_generation_threshold')|v%0]"
 interest_tier_effect_infamy_cost_increase_high: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_high_value')|=n%0] к [Concept('concept_infamy', 'дурной славе')] при выборе [Concept('concept_war_goal', 'целей войны')] в данном [Concept('concept_strategic_region', 'стратегическом регионе')]"
 interest_tier_effect_infamy_cost_increase_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_medium_value')|=n%0] к [Concept('concept_infamy', 'дурной славе')] при выборе [Concept('concept_war_goal', 'целей войны')] в данном [Concept('concept_strategic_region', 'стратегическом регионе')]"
 interest_tier_effect_infamy_cost_decrease_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_decrease_medium_value')|=p%0] к [Concept('concept_infamy', 'дурной славе')] при выборе [Concept('concept_war_goal', 'целей войны')] в данном [Concept('concept_strategic_region', 'стратегическом регионе')]"
 interest_tier_effect_can_start_diplomatic_plays: "@checkmark! Позволяет начинать [Concept('concept_diplomatic_play', 'дипломатические игры')] в данном [Concept('concept_strategic_region', 'стратегическом регионе')]"
 interest_tier_effect_can_join_diplomatic_plays: "@checkmark! Позволяет занимать чью-либо сторону в [Concept('concept_diplomatic_play', 'дипломатических играх')] в данном [Concept('concept_strategic_region', 'стратегическом регионе')]"
 interest_tier_effect_can_sign_alliance: "@checkmark! Позволяет заключать #tooltippable_name #tooltip:[alliance.GetTooltipTag],EMPTY_STRING,ArticleTypeTooltip [alliance.GetIconString][Nbsp]союзные#!#! [Concept('concept_article', 'договоры')]"
 interest_tier_effect_can_sign_defensive_pact: "@checkmark! Позволяет заключать [Concept('concept_article', 'соглашения')] об #tooltippable_name #tooltip:[defensive_pact.GetTooltipTag],EMPTY_STRING,ArticleTypeTooltip [defensive_pact.GetIconString][Nbsp]оборонительном пакте#!#!"
 interest_tier_effect_can_sign_support_independence: "@checkmark! Позволяет заключать [Concept('concept_article', 'соглашения')] о #tooltippable_name #tooltip:[GetArticleType('support_independence').GetTooltipTag],EMPTY_STRING,ArticleTypeTooltip $ICON$[Nbsp]поддержке независимости#!#!"
 interest_tier_effect_can_sign_guarantee_independence: "@checkmark! Позволяет заключать [Concept('concept_article', 'соглашения')] о #tooltippable_name #tooltip:[guarantee_independence.GetTooltipTag],EMPTY_STRING,ArticleTypeTooltip [guarantee_independence.GetIconString][Nbsp]гарантиях независимости#!#!"
 interest_tier_effect_stake_colonial_claim_unrecognized: "@checkmark! Открывает доступ к [Concept('concept_diplomatic_action', 'дипломатическому действию')] «[GetDiplomaticActionType('da_stake_colonial_claim').GetName]» в отношении [Concept('concept_decentralized_nation', 'децентрализованных государств')] и [Concept('concept_unrecognized_power', 'непризнанных держав')]"
 interest_tier_effect_can_sign_foreign_investment_rights: "@checkmark! Позволяет заключать [Concept('concept_article', 'договоры')] #tooltippable_name #tooltip:[foreign_investment_rights.GetTooltipTag],EMPTY_STRING,ArticleTypeTooltip [foreign_investment_rights.GetIconString][Nbsp]о правах на инвестиции#!#!"
 ## Diplomatic Actions
 da_stake_colonial_claim: "Заявить о колониальных претензиях"
 da_stake_colonial_claim_desc: "Заявляет [Concept('concept_claim', 'претензии')] на заморский [Concept('concept_state_region', 'регион')]."
 da_stake_colonial_claim_action_notification_name: "[INITIATOR_COUNTRY.GetName] заявля[INITIATOR_COUNTRY.GetAltNameNoFormatting('RU_CL_END_T')] колониальные [Concept('concept_claim', 'претензии')] на регион [TARGET_STATE.GetStateRegion.GetName]"
 da_stake_colonial_claim_action_notification_desc: "[INITIATOR_COUNTRY.GetName] объявил[INITIATOR_COUNTRY.GetAltNameNoFormatting('RU_CL_END_FEM')] регион [TARGET_STATE.GetStateRegion.GetName] частью своей растущей колониальной империи!"
 DA_STAKE_COLONIAL_CLAIM_COOLDOWN: "Это действие можно повторить не ранее #v [TimeKeeper.GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'da_stake_colonial_claim_cooldown') )]#!"
 DA_STAKE_COLONIAL_CLAIM_EMPTY_EFFECT: "Выберите [Concept('concept_state_region', 'регион')] не на одном континенте с вашей [Concept('concept_capital_state', 'столицей')], чтобы заявить о своих [Concept('concept_claim', 'претензиях')]"
 ## Notifications
 notification_colonial_claim_generated_name: "[SCOPE.sState('colony_notification_state').GetName] становится #bold крупной колонией#!"
 notification_colonial_claim_generated_desc: "Наша колония в #tooltippable_name #tooltip:[SCOPE.sState('colony_notification_state').GetTooltipTag],DATA_STATE_NAME_TOOLTIP,StateTooltip [SCOPE.sState('colony_notification_state').GetCustom('RU_SL_PP')]#!#! стала настолько велика, что теперь мы вправе [Concept('concept_claim', 'претендовать')] на весь регион [SCOPE.sState('colony_notification_state').GetStateRegion.GetName]."
 notification_colonial_claim_generated_tooltip: "#header $notification_colonial_claim_generated_name$#!\n$TOOLTIP_DELIMITER$\n$notification_colonial_claim_generated_desc$"
