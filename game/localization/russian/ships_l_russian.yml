 ship_type_frigate: "Фрегат"
 ship_type_frigate_desc: "Парусные корабли с минимальным бронированием, используемые для разведки, патрулей и сопровождения."
 ship_type_iron_frigate: "Железный фрегат"
 ship_type_iron_frigate_desc: "Улучшенная версия парусного фрегата с железным корпусом. Выполняет те же функции, но отличается повышенной прочностью и огневой мощью."
 ship_type_ship_of_the_line: "Линейный корабль"
 ship_type_ship_of_the_line_desc: "Крупный военный корабль, предназначенный для уничтожения вражеских судов в эскадренном бою. На его палубах установлено множество орудий."
 ship_type_monitor: "Монитор"
 ship_type_monitor_desc: "Низкобортный броненосный корабль преимущественно прибрежного действия."
 ship_type_coastal_defense_ship: "Корабль береговой обороны"
 ship_type_coastal_defense_ship_desc: "Вооружённый артиллерий броненосный корабль, предназначенный для действий в гаванях и прибрежных водах."
 ship_type_destroyer: "Эсминец"
 ship_type_destroyer_desc: "Быстроходный хорошо вооружённый корабль, предназначенный для борьбы с противником, а также охраны и конвоя судов."
 ship_type_aircraft_carrier: "Авианосец"
 ship_type_aircraft_carrier_desc: "Военный корабль, представляющий собой плавучую базу для авиации. Используется для разведки и в некоторых наступательных операциях."
 ship_type_torpedo_boat: "Торпедная лодка"
 ship_type_torpedo_boat_desc: "Небольшой манёвренный корабль с торпедным вооружением, предназначенный для нападений на крупные и медленные военные корабли."
 ship_type_torpedo_boat_destroyer: "Истребитель миноносцев"
 ship_type_torpedo_boat_destroyer_desc: "Корабль с торпедным вооружением, предназначенный для борьбы с небольшими миноносцами."
 ship_type_light_cruiser: "Лёгкий крейсер"
 ship_type_light_cruiser_desc: "Легко бронированные крейсеры, предназначенные для длительного патрулирования, защиты торговых путей и демонстрации силы."
 ship_type_armored_cruiser: "Бронированный крейсер"
 ship_type_armored_cruiser_desc: "Относительно крупные крейсеры с броневым поясом по ватерлинии, предназначенные для борьбы с любыми целями, кроме линкоров."
 ship_type_protected_cruiser: "Бронепалубный крейсер"
 ship_type_protected_cruiser_desc: "Быстроходный крейсер с большой дальностью плавания, механизмы и орудийные погреба которого защищены броневой палубой."
 ship_type_seaplane_tender: "Гидроавианосец"
 ship_type_seaplane_tender_desc: "Корабль, представляющий собой плавучую базу для гидросамолётов. Предназначен для разведки и некоторых наступательных операций."
 ship_type_early_ironclad: "Ранний броненосец"
 ship_type_early_ironclad_desc: "Мощный военный корабль для плавания в открытом море с паровым двигателем и железной бронёй."
 ship_type_modern_ironclad: "Современный броненосец"
 ship_type_modern_ironclad_desc: "Современный броненосный корабль, значительно превосходящий по своей мощи более ранние варианты."
 ship_type_pre_dreadnought: "Додредноут"
 ship_type_pre_dreadnought_desc: "Мощный линкор, оснащённый артиллерией промежуточного калибра."
 ship_type_dreadnought: "Дредноут"
 ship_type_dreadnought_desc: "Мощный современный линкор, оснащённый множеством однородных орудий главного калибра."
 ship_type_super_dreadnought: "Супердредноут"
 ship_type_super_dreadnought_desc: "Укрупнённый дредноут с более мощными орудиями и бронёй."
 ship_type_submarine: "Подводная лодка"
 ship_type_submarine_desc: "Корабль, способный погружаться под воду. В первую очередь предназначен для уничтожения вражеских торговых судов."
 ship_type_troop_ship: "Войсковой транспорт"
 ship_type_troop_ship_desc: "Особый тип судна, предназначенный для перевозки воинских частей и снаряжения."
 ship_type_supply_ship: "Корабль снабжения"
 ship_type_supply_ship_desc: "Корабль, который перевозит военные товары из одного места в другое."
 ship_graphics_type_borodino: "Бородино"
 ship_graphics_type_borodino_desc: "Додредноуты «Бородино» были новейшими кораблями российского императорского флота во время русско-японской войны. Четыре корабля, составлявшие ядро печально известной 2-ой Тихоокеанской эскадры под командованием адмирала Рождественского, были потоплены или захвачены противником в ходе Цусимского сражения."
 ship_graphics_type_mikasa: "Микаса"
 ship_graphics_type_mikasa_desc: "Додредноутный броненосец и флагман адмирала Того на протяжении всей русско-японской войны. Был задействован во всех крупных сражениях и стал символом японского морского превосходства."
 ship_graphics_type_dingyuan: "Динъюань"
 ship_graphics_type_dingyuan_desc: "Броненосцы «Динъюань» и «Чжэньюань», гордость Бэйянского флота, были яркими символами военной модернизации в заключительный период правления династии Цин. Эти корабли отлично показали себя в Ялуцзянском сражении, однако хронический дефицит финансирования императорского флота Китая сослужил им дурную службу."
 ship_group_capital_ships: "Крупные корабли"
 ship_group_capital_ships_desc: "Самые большие военные корабли, предназначенные для боевых действий в океане или в открытом море."
 ship_group_cruisers: "Крейсеры"
 ship_group_cruisers_desc: "Небольшие суда со скромным вооружением, предназначенные для дальних крейсерских операций."
 ship_group_torpedo_craft: "Торпедные суда"
 ship_group_torpedo_craft_desc: "Маломерные манёвренные суда, главным оружием которых являются самоходные торпеды."
 ship_group_supply_ships: "Корабли снабжения"
 ship_group_supply_ships_desc: "Гражданские или военно-морские суда особого назначения, обеспечивающие деятельность сил флота."
