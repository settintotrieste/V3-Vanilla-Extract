l_simp_chinese:
 japan_events.1.t: "全民通邮"
 japan_events.1.d: "随着现代主义思想在[ROOT.GetCountry.GetName]内部影响力不断增强，旧有的邮驿制度的局限性愈发明显。封建秩序的瓦解，以及民众识字率的提高，让建立一套支撑现代国家运作的集中式邮政体系成为可能。"
 japan_events.1.f: "戴有政府徽章的邮差穿梭在街道上，邮袋里塞满异常多的信件。在首都，官员们伏在地图前，调整线路；职员在灯下清点邮票。商人们抱怨旧有的邮驿网络被打乱，而孩子们则将自己人生中的第一封信投入新的邮筒。这个曾被习俗割裂的国家，正开始以同一种声音交流。"
 japan_events.1.a: "为全面设立邮政体系提供充足资金。"
 japan_events.1.b: "优先覆盖主要城市中心。"
 japan_events.1.c: "优先发展农村地区。"
 japan_events.1.e: "将这项改革交由[SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')]负责。"
 japan_events.1.g: "保留旧有的邮驿制度。"
