 japan_events.2.t: "历法错位"
 japan_events.2.d: "日本沿用数世纪的阴阳历与西方世界日益不同步。商人抱怨难以与外国伙伴协调时间，民众则对节日、租金与纳税期限的错位感到困惑。"
 japan_events.2.f: "职员们伏案誊写文件，小心地抄录每一行。随着一遍遍重复，纸堆越叠越高，墨迹也渐渐晕开，他们的眼睛因追踪那些已不再存在的月份而酸痛。旧历悄无声息地消失了。"
 japan_events.2.f_telegraph: "信使匆匆穿过街道，递送文书。人们驻足阅看告示，日期变化的速度超出他们理解，让他们一阵天旋地转。消息传得很快，旧历几乎在一夜之间消失了。"
 japan_events.2.a: "立即推行历法改革。"
 japan_events.2.b: "利用[GetTechnology('electric_telegraph').GetName]加快改革进程。"
 japan_events.2.c: "暂时保留旧制。"
