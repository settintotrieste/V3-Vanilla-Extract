 ryukyu_rivalry_sway_tt: "在琉球建立完全影响力，打破对手对其的控制，重建[Concept('concept_subject','附属关系')]。\n\n要获得影响力：\n与琉球拥有#v 资金转让#![concept_article]（#g @money!0.1‑2K#!）\n与琉球拥有#v 亲密#!或#v 友善#![concept_relations]\n拥有最高[concept_naval_power_projection]\n让琉球欠下[concept_obligation]\n使用[concept_journal_entry]行动"
 ryukyu_rivalry_assertiveness_tt: "进度条达到#v 100%#!后，琉球将宣告中立。中立地位一经确立，#v 50#!年内他国不得通过[concept_diplomatic_action]将其纳为[concept_subject]。\n\n如果影响力条维持在#v ‑20#!和#v +20#!之间，强硬态度条会每月增长#g 0.5#!。\n\n琉球可以利用可用行动操纵影响力，使日本和中国互相对抗，来维护其中立。\n\n例如：\n与双方都拥有或都没有#v 资金转让#![concept_article]（#g @money!0.1-2K#!）\n与双方都拥有或都没有#v 亲密#!或#v 友善#![concept_relations]\n欠双方或都不欠[concept_obligation]\n当一方处于优势或劣势时，取消或签署上述条约。"
