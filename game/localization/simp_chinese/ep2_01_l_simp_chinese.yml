 japan_events.4.t: "姓名西化"
 japan_events.4.d: "随着[ROOT.GetCountry.GetName]与外国势力展开外交和贸易活动，关于在条约、信函和官方文件中应如何书写[GetCulture('japanese').GetName]姓名的问题也浮出水面。西方代表越来越希望遵循他们的习惯，即名前姓后。"
 japan_events.4.f: "职员们伏在案前，为外国官员起草信函，笔尖沙沙作响。他们低声讨论，权衡在对外交流中追求语言表达的清晰，是否值得改变沿袭已久的书写顺序。一只持印的手在纸上停顿片刻，最终落下印迹。"
 japan_events.4.a: "在对外通讯中采用西方惯例。"
 japan_events.4.b: "维持传统的姓名排列方式。"
 japan_events.4.c: "新时代已经来临，在所有场合推行西式姓名惯例。"
 japan_single_fire_events_name_order_westernized_mod: "西式姓名惯例"
 japan_single_fire_events_name_order_traditional_mod: "保留传统姓名顺序"
 japan_single_fire_events_name_order_resistance_mod: "姓名文化争议"
 japan_single_fire_events_name_order_approval_mod: "行政澄清"
 japan_events.5.t: "汉文问题"
 japan_events.5.d: "长期以来，诏令、规章与记录依赖只有受过相应教育的少数人才能理解的古典文体。改革者主张在行政中使用日语白话文，以提升语言表达的清晰与效率；而反对者则坚持，正是传统自身赋予了这些文字权威。"
 japan_events.5.f: "官僚们工作到深夜，不知疲倦地一遍遍修改指令措辞，以求表达清楚。其中一人停下来揉了揉眼睛，又继续埋头书写，生怕漏掉任何一个字。每一次笔尖划过纸面的沙沙声，都仿佛是一场对抗混乱与无序的小型战役。"
 japan_events.5.a: "在官方行政中推广日语白话文。"
 japan_events.5.b: "在内部通信中有限度地改革语言。"
 japan_events.5.c: "在所有国家文件中保留古典汉文。"
 japan_language_partial_language_reform_mod: "有限的行政语言改革"
 japan_single_fire_events_language_reform_support_mod: "采纳白话文行政"
 japan_single_fire_events_language_traditionalist_opposition_mod: "反对白话文行政"
