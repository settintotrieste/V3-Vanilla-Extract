 je_ryukyu_rivalry: "隐秘的王国"
 je_ryukyu_rivalry_reason: "自#b 1609年萨摩藩#!军队#b 入侵#!以来，[SCOPE.sCountry('ryukyu_scope').GetName]王国在事实上已成为[SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')]藩国。尽管被萨摩藩征服，但首里朝廷仍继续接受[SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')]的册封，并向北京派遣贡使，维持其独立的表象。\n\n这一安排已经持续了几代人——然而，随着日本开国以及西方列强势力的增强，东亚的权力平衡发生了变化，双方现在必须明确与琉球的关系，引发了对南部岛屿的公开争夺。\n$TOOLTIP_DELIMITER$\n@warning!#r 失败条件：#!\n[SCOPE.sCountry('ryukyu_scope').GetNameNoFlag]的强硬态度达到#variable 100%#!\n[SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')]或[SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')]被[Concept('concept_subject','附属')]或#b 吞并#!\n[SCOPE.sCountry('ryukyu_scope').GetNameNoFlag]被非参与国家[Concept('concept_subject','附属')]或#b 吞并#!\n@information!如何建立影响力：\n与[SCOPE.sCountry('ryukyu_scope').GetName]拥有#v 资金转让#![concept_article]（#g @money!0.1‑2K#!）\n与[SCOPE.sCountry('ryukyu_scope').GetName]拥有#v 亲密#!或#v 友善#![concept_relations]\n拥有最高的[concept_naval_power_projection]\n让[SCOPE.sCountry('ryukyu_scope').GetName]欠下[concept_obligation]\n使用[concept_journal_entry]行动"
 #je_ryukyu_rivalry_goal:1 "You are asserting more influence over [SCOPE.sCountry('ryukyu_scope').GetName] than your rival."
