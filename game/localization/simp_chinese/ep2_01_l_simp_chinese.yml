 japan_single_fire_events_seasonal_familiarity_mod: "熟悉的节令"
 japan_events.3.t: "历法重算"
 japan_events.3.d: "新历法的采用悄然缩短了这一年。由于计入的天数减少，工资、租金和税收与旧制度下形成的预期不再一致。工人发现收入减少，官员们则难以解释其中差异。"
 japan_events.3.f: "工人们一遍遍数着手中的硬币，不满地摇着头。双手因劳作而粗糙，却只看到微薄的回报。年份变短了，每失去的一天，都在疲惫的手臂与空空的钱袋上留下痕迹。"
 japan_events.3.a: "这一年变短了，就这样吧。"
 japan_events.3.b: "将这份负担在全民之间重新分摊。"
 japan_events.3.c: "为稳定局势亲自承担损失。"
