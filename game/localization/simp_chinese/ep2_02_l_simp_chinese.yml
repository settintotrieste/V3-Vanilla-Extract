l_simp_chinese:
 edo_system: "江户等级制度"
 # Edo Social Classes
 strata_samurai_high: "上士" # High-Class Samurai
 strata_samurai_high_desc: "武士阶级的上层，如大名和高级家臣等高层精英，垄断了大多数重要职位，并享有显赫的家族声望。"
 strata_samurai_low: "下士" # Low-Class Samurai
 strata_samurai_low_desc: "武士和家臣的下层，例如御家人和足轻，作为行政和军事劳动力服务于上层。"
 strata_religious: "寺社" # Priests
 strata_religious_desc: "神社的神职人员通过寺庙机构组织起来，并受到当局监管。尽管他们在地方生活、学习和宗教仪式中颇具影响力，但在法律定义的社会阶层中，他们的地位却略显边缘。"
 strata_commoners_peasants: "百姓" # Peasants
 strata_commoners_peasants_desc: "平民阶层中的一个细分群体，是日本社会中人数最多的阶层。百姓在村庄纳入编户，并承担当地的徭役和赋税。他们以户籍而非职业来界定，包括农村工匠、商人和农民。"
 strata_commoners_townspeople: "町人" # Townspeople
 strata_commoners_townspeople_desc: "平民阶层中的一个细分群体，是日本城镇中心的主要居民。町人通过城镇机构纳入编户，传统上与手工业和商业相关。虽然他们可以积累大量财富和影响力，但因其非武士身份，社会流动性受到限制。"
 strata_outcastes: "秽多‑非人" # Outcastes Eta, Hinin, etc.
 strata_outcastes_desc: "秽多和非人是日本社会中的最底层，他们受到严重歧视，从事着如挖墓、乞讨和街头表演等“不洁”的职业。"
 # Edo Social System Laws
 lawgroup_edo_social_system: "江户等级制度"
 lawgroup_edo_social_system_desc: "$lawgroup_edo_social_system$的执行"
 law_strict_edo_system: "严格等级秩序"
 law_strict_edo_system_desc: "从合法的职业机会，到个人所能享有的住宅大门数量，一切都受到国家的严格管制与执行。任何违反规定的行为都会受到严厉制裁，而市民和农民无法正式跻身武士之列。"
 law_intermediate_edo_system: "松动等级秩序"
 law_intermediate_edo_system_desc: "各项法律已经放宽，平民在社会中的影响力和地位日益提高。富有的市民或农民可以花钱成为下级武士——御家人。"
 law_lax_edo_system: "宽松等级秩序"
 law_lax_edo_system_desc: "原本仅武士能担任的职位现在向平民开放，而剩余的奢侈限制和职业限制也仅选择性地执行，通常只针对最严重的违法行为。"
 # Tenpo Crisis
 je_tenpo_crisis: "天保危机"
 je_tenpo_crisis_reason: "1830年改元的天保时代，起初确实名副其实。然而，[GetGeographicRegion('geographic_region_honshu').GetName]恶劣的气候条件很快导致米价飙升，全国陷入饥荒，而[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]日益增长的财富和影响力则威胁到了现有的[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]秩序。\n\n与此同时，在地平线上，西方[Concept('concept_great_power','$concept_great_powers$')]愈发肆无忌惮，他们的商船和炮舰正日益逼近我们的海岸。\n\n为了解决这些问题，具有改革思想的重要人物向幕府阐述了他们的愿景。\n\n#tooltippable;tooltip:tenpo_reformer_tt #b 改革派议程#!#!：\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')][ROOT.GetCountry.GetNameNoFlag]制定了[GetLawType('law_lax_edo_system').GetName]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')][ROOT.GetCountry.GetNameNoFlag]#b 未#!制定[GetLawType('law_hereditary_bureaucrats').GetName]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')][ROOT.GetCountry.GetNameNoFlag]拥有#v 3#!个有#v 3#!级[GetBuildingType('building_urban_center').GetName]的[Concept('concept_state', '$concept_states$')]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')][GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName][concept_interest_group]的[concept_clout]至少为#v 10#!\n#tooltippable;tooltip:tenpo_hardliner_tt #b 强硬派议程#!#!：\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')][ROOT.GetCountry.GetNameNoFlag]制定了[GetLawType('law_strict_edo_system').GetName]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')][ROOT.GetCountry.GetNameNoFlag]制定了[GetLawType('law_shinsengumi').GetName]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')][ROOT.GetCountry.GetNameNoFlag]拥有#v 40#!级[GetBuildingType('building_rice_farm').GetName]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')][GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]是[concept_marginalized][concept_interest_group]\n#tooltippable;tooltip:tenpo_shared_tt #b 共有议程#!#!：\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')]治下#b 没有#![GetCulture('japanese').GetName][concept_homeland][concept_state]正遭受[concept_famine]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')][ROOT.GetCountry.GetNameNoFlag]拥有至少@gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#![Concept('concept_gdp', '$concept_gdp_short$')]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')][ROOT.GetCountry.GetAdjectiveNoFlag]陆军[concept_power_projection]大于#v 500#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')]我们在治下[Concept('concept_state', '$concept_states$')]拥有至少#v 10#!级[GetBuildingType('building_naval_fortification').GetName]"
 je_tenpo_crisis_complete_header: "天保改革成功条件：\n"
 je_tenpo_crisis_failure_header: "天保改革失败条件：\n"
 je_tenpo_crisis_success_tt: "我们完成了至少#v 8#!项议程目标"
 je_tenpo_crisis_success_2_tt: "[concept_screening] / [concept_vulnerability]"
 je_tenpo_crisis_success_outcome_tt: "根据完成的#b 共有#!、#b 改革派#!或#b 强硬派#!目标数量，奖励会有所不同。"
 je_tenpo_crisis_success_outcome_1_tt: "如果我们完成的#b 强硬派#!议程更多："
 je_tenpo_crisis_success_outcome_2_tt: "如果我们完成的#b 改革派#!议程更多："
 je_tenpo_crisis_success_outcome_3_tt: "如果我们完成的#b 强硬派#!和#b 改革派#!议程数量相同："
 modifier_tenpo_crisis_reward_hardliner: "回归秩序"
 modifier_tenpo_crisis_reward_reformer: "树立新风"
 modifier_tenpo_crisis_reward_balanced: "渐进式改革"
 modifier_rice_hoarding: "大范围囤米"
 tenpo_hardliner_tt: "#b 强硬派#!认为日本社会正道德沦丧，必须通过回归传统来遏制这种衰败。\n\n该派系主张实施更严格的禁奢令，并要求武士放弃城市中的奢侈生活，回归其作为简朴的乡村行政官的理想角色。"
 tenpo_reformer_tt: "#b 改革派#!认为日本社会已发生不可逆转的改变，国家的法律应基于国家的实际状况，而非浪漫化的过去。\n\n该派系主张提高日本平民的地位，并促进商业。"
 tenpo_shared_tt: "#b 强硬派#!和#b 改革派#!都认为必须保护日本免受外部威胁，同时必须解决粮食安全和经济问题。"
 button_je_tenpo_combat_rice_hoarding: "打击囤积大米"
 button_je_tenpo_combat_rice_hoarding_desc: "[ROOT.GetCountry.GetNameNoFlag]的政治经济动荡，导致不法之徒大量收购并囤积稻米，抬高了米价。结果是，如今许多日本家庭无力购买足够维持生计的稻米。"
 button_je_tenpo_frugal_ordinance: "出台俭约令"
 button_je_tenpo_frugal_ordinance_desc: "城镇中[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]日益滋长的颓废风气正威胁着我们统治的稳定。他们如今开始僭越自身地位，公然炫耀财富。\n\n我们必须通过进一步立法限制奢侈品、娱乐活动和文学作品，来提醒他们其在社会中的位置。"
 button_je_tenpo_confiscate_land: "下达上知令"
 button_je_tenpo_confiscate_land_desc: "江户与大阪周边10#italic #tooltippable;tooltip:glossary_ri 里#!#!范围内的区域，是天领、大名领地和旗本领地混杂的复杂地区。由于缺乏统一的行政结构，已对国家防务及土地潜力的充分开发造成严重影响，首席老中提议没收并整合这些土地。\n\n被征用土地的持有者将在日本其他地方获得补偿性土地。"
 modifier_consolidation_payments: "土地征收赔偿"
 modifier_consolidated_state_land: "10里整合法案"
 glossary_ri: "#b #italic 里#!#!是一种源自中国#italic 里#!的传统度量单位。\n\n里的定义长度随时代有所变化，但在江户时代晚期，它大致相当于36#italic 町#!，约3.9km。"
 modifier_tenpo_crisis_ongoing: "天保动荡"
 tenpo_events.1.t: "天保时代"
 tenpo_events.1.d: "历经多年恶劣天气，[concept_famine]笼罩着[ROOT.GetCountry.GetNameNoFlag]的土地。穷人和赤贫者挣扎度日，人们认为政府本可以做得更多，对幕府的不满与日俱增。"
 tenpo_events.1.f: "他妻子织的布过去在集市上总能卖个好价钱，日子好过的时候，甚至还能偶尔买些甜食。如今，它们却只能换回四五合的米，有时还更少。他想，就算加上采摘的野菜和树叶，这些米也只勉强够吃一天，离一周口粮所需还差得远。\n\n他沿着小路回家，路过老虎家附近时稍作停留。天花已经夺走了老虎的两个孩子——如果关于雨衣的传言属实，未来几周内恐怕还会有更多孩子遭殃。他紧紧攥着那袋米，默默祈祷后便离开了。"
 tenpo_events.1.a: "老天啊，保佑我们吧！"
 tenpo_events.1.tt_1: "#r 极端#![GetHarvestConditionType('torrential_rains').GetName]袭击[GetGeographicRegion('geographic_region_honshu').GetName]，#r 破坏#!了国家至关重要的#b 稻米收成#!，严重影响了[ROOT.GetCountry.GetAdjectiveNoFlag]的[concept_food_security]。"
 tenpo_events.1.tt_2: "在[GetGeographicRegion('geographic_region_honshu').GetName]各地，放贷者和疑似囤积稻米者的住所成为暴民袭击的目标，他们进行着所谓#italic #tooltippable;tooltip:glossary_uchikowashi 打毁#!#!的活动，导致#r 全国范围#!产生[concept_devastation]。"
 glossary_uchikowashi: "#b #italic 打毁#!#!指的是公众对放贷者、囤积稻米者以及哄抬物价者等被视为不道德者的财产进行破坏的行为。\n\n尽管这些行为常常伴随着抢劫，但在许多情况下，打毁的肇事者会刻意避免抢劫，以此强调他们行为的正当性。"
 tenpo_events.2.t: "哲人武士起义"
 tenpo_events.2.d: "对既有秩序及其无力应对肆虐[SCOPE.sState('osaka_scope').GetName]的[concept_famine]感到失望，官员兼学者[SCOPE.sCharacter('oshio_scope').GetFullName]发动了反抗地方当局的起义。[SCOPE.sCharacter('oshio_scope').GetHerHis]的支持者放火烧毁了当地官署，[SCOPE.sState('osaka_scope').GetCityHubName]的大部分地区已陷入火海。"
 tenpo_events.2.f: "“蛰居之我等，最早堪忍难成，虽无汤、武之势，孔、孟之德：为存天下，不得不侵血族之祸。\n\n此度与有志之者协同，共诛戮恼苦下民诸役人；又可诛戮长居骄奢之大阪持金町人。\n\n右之者，贮置于穴蔵中之金银钱、并诸隐置蔵屋内之俵米，均遣发分散配当。”\n\n——大盐平八郎，#italic 《檄文节选》#!"
 tenpo_events.2.a: "召集民兵，把这叛徒钉死在十字架上。"
 tenpo_events.2.b: "孤注一掷的正义之举。"
 tenpo_events.2.c: "叛军击溃当地守军，并占领了[SCOPE.sState('osaka_scope').GetCityHubName]。"
 tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName]逃脱追捕，自焚身亡。"
 tenpo_events.2.tt_2: "[SCOPE.sCharacter('oshio_scope').GetFullName]遭当局施以酷刑、撒盐并钉上十字架。"
 tenpo_events.2.tt_3: "当地民兵在叛乱进一步蔓延前#b 将其镇压#!。"
 tenpo_events.2.tt_4: "[concept_agitator][SCOPE.sCharacter('oshio_scope').GetFullName]被从轻发落，仅施以象征性惩罚，并被允许继续其活动。"
 modifier_osaka_burning: "以血写下的批判"
 modifier_controversial_pardon: "争议性赦免"
 tenpo_events.3.t: "必须的改革"
 tenpo_events.3.d: "对改革进程感到满意，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]嘉奖了主政大臣们的进展，认为[ROOT.GetCountry.GetAdjective]民族能克服任何即将到来的挑战，无论是来自国外还是国内。"
 tenpo_events.3.f: "“十二起，主上。”首席老中说着，将毛笔搁在桌上。“畿内地区呈报的情况也大体相同，改革似乎已初见成效。”\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]在高位上略一点头。“很好。着令适时通报朝廷。现在，谈谈长崎奉行所的报告……”"
 tenpo_events.3.a: "祈愿[ROOT.GetCountry.GetAdjective]道德与政治的衰败在此结束。"
 tenpo_events.3.b: "农民与武士，不都是天皇的臣民吗？"
 tenpo_events.3.c: "国家的安稳至关重要。"
 tenpo_outcome_hardliner_tt: "我们完成的#b 强硬派#!议程多于#b 改革派#!议程"
 tenpo_outcome_reformer_tt: "我们完成的#b 改革派#!议程多于#b 强硬派#!议程"
 tenpo_outcome_balanced_tt: "我们完成了相同的#b 强硬派#!和#b 改革派#!议程"
 tenpo_events.4.t: "作为与不作为"
 tenpo_events.4.d: "对改革成效感到失望，加之民众对首席老中日益增长的不满，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]已将[SCOPE.sCharacter('roju_scope').GetFullName]从职位上罢免。"
 tenpo_events.4.f: "流放。这位前老中品味着这个词，并不太喜欢。但考虑到昨日发生的事，或许这比留在江户要好些。他剩下的随从仍在清理池塘和庭院里被抛入的瓦砾石块，而那天他听到的某些威胁，恐怕永远也无法从心头抹去。\n\n他又一次咀嚼这个词，觉得似乎不那么令人厌恶了。况且，他想，自己一直都想亲眼去看看月山。"
 tenpo_events.4.a: "我一生都不想再见到这蠢货了。"
 tenpo_events.4.b: "推翻他做过的所有决定，并确保让民众知晓。"
 tenpo_events.4.tt_1: "[SCOPE.sCharacter('roju_scope').GetFullName]被#r 降职#!并流放到#b 出羽#!"
 modifier_tenpo_fail: "天保改革夭折"
 tenpo_events_4_demotion_tt: "一个[concept_in_government][concept_interest_group]的[concept_leader]被降职并内部流放" # tooltip for event_outcome_failed_effect_desc in je_tenpo_crisis
 tenpo_events.5.t: "地主抵制中央集权"
 tenpo_events.5.d: "我们没收[SCOPE.sState('kanto_scope').GetName]和[SCOPE.sState('kansai_scope').GetName]地区土地的举措，遭到了当地土地所有者的广泛反对。其中，反对声最强烈的是那些因军功而获赐土地的人。"
 tenpo_events.5.f: "“我名下的土地，是我的祖先因军功获赐的。自关原之战以来，我们世代在此耕作——努力提高收成，按时缴纳年贡，从未有过怨言。\n\n这样的功绩，换来的应是如今这般的对待？不给予应得的补偿就让我们迁离，这就是我们应得的赏报吗？”"
 tenpo_events.5.a: "趁局势还没失控，取消中央集权。"
 tenpo_events.5.b: "为迁移者另行拨地，以作补偿。"
 tenpo_events.5.c: "提醒他们，这是[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的旨意！"
 modifier_heavy_handed_land_confiscations: "粗暴没收土地"
 modifier_promotions_and_koku_redistribution: "晋升及石高调整"
 modifier_reckless_roju: "鲁莽的老中"
 modifier_will_of_the_shogun: "以将军的名义"
 tenpo_events.6.t: "龙潭中的狮子"
 tenpo_events.6.d: "[SCOPE.sCountry('britain_scope').GetName]战胜[SCOPE.sCountry('china_scope').GetAdjective]一事，令我国大为震动。中国帆船与军队在强大的[SCOPE.sCountry('britain_scope').GetAdjectiveNoFormatting]舰队面前不堪一击，如今许多人开始质疑[ROOT.GetCountry.GetName]是否具备抵御类似进攻的能力。"
 tenpo_events.6.f: "“西自甘露寺，东至金山寺之边，镇江一带土地充满黑白夷人，如棋子散落，不见何时退去。”\n\n——岭田枫江，#italic 《海外新话》#!"
 tenpo_events.6.a: "愿上天保佑，因为我们的武士或许无能为力。"
 tenpo_events.6.b: "查禁来自中国的任何负面报告。"
 tenpo_events.6.c: "我们是蛮夷的海浪拍击不倒的礁岸。"
 modifier_opium_war_aftermath: "蛮夷叩关"
 modifier_defenses_strengthened: "加强海岸驻防"
 tenpo_events.7.t: "高岛流"
 tenpo_events.7.d: "鸦片战争后，因担忧日本的未来，长崎官员[SCOPE.sCharacter('takashima_scope').GetFullName]组建了一支仿照荷兰模式的现代化军事部队，并敦促全国效仿。"
 tenpo_events.7.f: "“他手下兵士戴的筒形军帽形似奇特的冠冕，他们用荷兰人那刺耳的语言发号施令。不过，他们的队形训练有素、井然有序，齐射速度几乎是我家臣的两倍，尽管准度稍逊一筹。”\n\n“火炮如何？”\n\n“无可匹敌。我只怕我们采用得越晚，击退蛮夷的机会就越渺茫。”"
 tenpo_events.7.a: "授权采用蛮夷的武器与技术。"
 tenpo_events.7.b: "转而支持传统的铁炮锻冶屋。"
 modifier_inoue_tatsuke_primacy: "井上‑田付优先"
 modifier_favouring_traditional_musketry_houses: "推崇传统铁炮锻冶屋"
 modifier_favouring_takashima: "铁炮锻冶屋被边缘化"
 modifier_takashima_school: "推广高岛流"
 tenpo_events.8.t: "米骚动"
 tenpo_events.8.d: "囤积大米与哄抬物价的指控致使[SCOPE.sState('tenpo_unrest_state_scope').GetName]的农民与商人之间矛盾激化。如今，农民队伍中混入了不少强盗和乞丐，当地政府正面临一场全省范围的叛乱。"
 tenpo_events.8.f: "他曾是最早的一批人。就是那些为数不多的、袭击了奸商住宅并将其不义之财分发给民众的欢欣鼓舞者。但当他环视篝火四周时，才意识到，当初那批人如今已所剩无几。英吉和松藏还坐着，尽管他们已几乎全然不像他认识的那些满腔正义怒火的人。福松在第二天就丢了性命，七天后，武七也死了。其余人在官兵的追捕下如落叶般四散奔逃。\n\n接替他们的新来者的品性让他感到羞耻和绝望，但他看不到别的出路。因为与刽子手的刀斧相比，这样糟糕的同伴也像天赐的礼物。"
 tenpo_events.8.a: "派遣人手去镇压这些恶徒。"
 tenpo_events.8.b: "让动荡自行平息吧。"
 tenpo_events.8.c: "动用当地村长以协助平息骚乱。"
 modifier_consulted_headsmen: "村庄特许"
 modifier_lingering_brigandry: "匪患萦绕不去"
 modifier_brutal_anti_bandit_campaigns: "残酷的剿匪行动"
 je_taming_the_north: "驯服北方"
 je_taming_the_north_reason: "随着#b [SCOPE.sState('hokkaido_state_scope').GetName]#!#b 开拓使#!的设立——这片昔日的边疆已充满生机。每天都有来自南方的男男女女到此寻求新的土地与机遇。\n\n然而，这并非寻常的人口迁徙。随定居者而来的，还有官僚、知识分子以及怀抱现代化理想的远见之士，他们肩负着塑造这片土地的使命——渴望将他们心中[ROOT.GetCountry.GetName]未来的蓝图，实现在如今的[SCOPE.sState('hokkaido_state_scope').GetName]之上。"
 taming_the_north_agriculture_potentials_goal_tt: "我们已使用#b $button_je_taming_the_north_agriculture_potentials$#!行动#v 3#!次"
 taming_the_north_agriculture_arable_goal_tt: "我们已使用#b $button_je_taming_the_north_agriculture_arable_land$#!行动#v 3#!次"
 taming_the_north_colonies_goal_tt: "我们已使用#b $button_je_taming_the_north_establish_colonies$#!行动"
 je_taming_the_north_additional_goal_pre: "如果我们拥有整个#b $STATE_SAKHALIN$#!，#b $modifier_tamed_north$#![concept_timed_modifier]也会作用于$STATE_SAKHALIN$[concept_state_region]："
 je_taming_the_north_additional_goal: "如果我们拥有整个[SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]，#b $modifier_tamed_north$#![concept_timed_modifier]也会作用于[SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]："
 je_taming_the_north_additional_goal_completed: "由于我们拥有整个[SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]，#b $modifier_tamed_north$#![concept_timed_modifier]也会作用于[SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]："
 modifier_tamed_north: "模范殖民地"
 modifier_northern_learnings: "开拓使经验"
 button_je_taming_the_north_establish_colonies: "建立国家资助的殖民地"
 button_je_taming_the_north_establish_colonies_desc: "缺乏足够移民的殖民地注定失败。我们应考虑提供激励措施，以吸引来自[ROOT.GetCountry.GetName]各地的家庭前往北方定居。"
 button_je_taming_the_north_integrate_ainu: "实施阿伊努法律保护"
 button_je_taming_the_north_integrate_ainu_desc: "迄今为止，开拓使对[GetCulture('ainu').GetName]人的立场一直是强制同化与文化抹除。然而，我们逐步迈向与北方[GetCulture('ainu').GetNameNoFormatting]居民建立更为公平关系的努力，已促成双方关系的改善。\n\n因此，一项提案已提交给[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，拟在[ROOT.GetCountry.GetAdjective]法律框架内确立[GetCulture('ainu').GetNameNoFormatting]人为受保护的兄弟民族，让他们在权利与义务上与[GetCulture('japanese').GetName]人完全平等。"
 ainu_frenship_tt: "我们在#b 事件#!中持续推进[GetCulture('ainu').GetName]的利益"
 button_je_taming_the_north_sapporo_agricultural_college: "创立札幌农学校"
 button_je_taming_the_north_sapporo_agricultural_college_desc: "北方是检验农业与土地管理领域最新理论的理想之地。我们将创办一所前沿的农学院，聘请经验丰富的外国专家来担任教职，以此为核心，科学地改造这片土地。"
 sapporo_partner_positive_catalyst_tt: "将触发一次#g 正面#!的[concept_diplomatic_catalyst]，对象为一个满足条件的随机国家"
 button_je_taming_the_north_agriculture_potentials: "引进新作物"
 button_je_taming_the_north_agriculture_potentials_desc: "岛上的可耕土地固然重要，但唯有种植合适的作物才能实现真正的经济发展。\n\n农业领域的新进展——由#b 札幌农学校#!引领——使我们能够在这片寒冷的边疆引进此前被认为不可能种植的作物。\n\n可选方案：\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#!（规模递增）\n•[GetBuildingType('building_rice_farm').GetName]\n•[GetBuildingType('building_dye_plantation').GetName]\n•[GetBuildingType('building_opium_plantation').GetName]\n•[GetBuildingType('building_vineyard').GetName]"
 established_sapporo_college_tt: "我们已建立#b 札幌农学校#!"
 hokkaido_agriculture_potentials_tt: "此决议最多可执行#v 3#!次。（当前为[ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0]）"
 modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]"
 button_je_taming_the_north_agriculture_arable_land: "继续开垦土地"
 button_je_taming_the_north_agriculture_arable_land_desc: "尽管这些广袤土地在农业上尚未开发，但其潜力巨大。连绵山脉中水源充沛，为向北扩展耕地提供了充足条件。\n\n我们将排干湿地，灌溉田野，驯服这片土地，以此彰显不屈的[GetCulture('japanese').GetName]魂。"
 hokkaido_agriculture_arable_tt: "此决议最多可执行#v 3#!次。（当前为[ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0]）"
 hokkaido_events.1.t: "第八道"
 hokkaido_events.1.d: "随着[SCOPE.sState('hokkaido_scope').GetName]——也即阿伊努之地——被纳入日本本土，这片土地需赋予新的名称以体现其新地位。新成立的开拓使已提出若干方案，供[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]审议。"
 hokkaido_events.1.f: "“那不过是一片蛮荒之地。尽是沼泽与烂泥，住着贫穷的渔民和食人族。在那片被神遗弃的土地上，你究竟想从那里得到什么？难道[ROOT.GetCountry.GetCapital.GetCityHubName]给不了你吗？”\n\n“意义，母亲。还有，一些能由我自己创造出来的东西。”"
 hokkaido_events.1.a: "其名应为#tooltippable;tooltip:hokkaido_events.1_tt_3 #b 北海道#!#!。" # 北加伊道
 hokkaido_events.1.b: "#tooltippable;tooltip:hokkaido_events.1_tt_2 #b 北加伊道#!#!，以彰显此地居民。" # 北海道
 hokkaido_events.1.c: "#tooltippable;tooltip:hokkaido_events.1_tt_4 #b 海岛道#!#!显然更为合适。"
 hokkaido_events.1.e: "#tooltippable;tooltip:hokkaido_events.1_tt_5 #b 日高见道#!#!则颇具文学韵味。"
 hokkaido_events.1.tt_1: "#b 札幌#!城建立，并取代#b 函馆#!成为这座岛屿的新行政首府"
 modifier_ainu_heritage_aknowleged: "加伊人之地"
 modifier_breaking_new_ground: "开拓新国境"
 modifier_hokkaido_naval_connections: "海疆道"
 modifier_call_of_the_frontier: "边疆的召唤"
 the_ainu_will_appreciate_this_tt: "@information![GetCulture('ainu').GetName]人将铭记此事"
 hokkaido_events.1_tt_2: "#b 北加伊道#!\n据虾夷开拓御用挂松浦武四郎所言，#italic 加伊#!是阿伊努人古老的自称。"
 hokkaido_events.1_tt_3: "#b 北海道#!\n这是政府对松浦武四郎原案的修订方案。将#italic 加伊#!替换为同音字#italic 海#!。\n\n@information!这是历史上最终采纳的方案。"
 hokkaido_events.1_tt_4: "#b 海岛道#!\n无论如何，这座岛屿由其与海洋的关系所定义——这一点应在其新名称中体现。"
 hokkaido_events.1_tt_5: "#b 日高见道#!\n大和时代对东北边疆的古称。选择此名，将使新殖民地扎根于日本古老传统。"
 hokkaido_events.2.t: "新边疆"
 hokkaido_events.2.d: "如何最佳地开发该地区的问题，长期困扰着[SCOPE.sState('hokkaido_state_scope').GetName]开拓使。焦躁的官员如今要求我们作出最终决断。"
 hokkaido_events.2.f: "在他成长的日子里，父亲常常谈及他们的祖先。谈及战国时期那些骄傲且尊贵的武士，谈及他们端庄威严的气质和非凡的功绩。儿时这些故事令他着迷，如今长大成人，却只给他带来忧郁。父亲——一个终日与公文为伴、沉溺于酒乡的城里人，佩剑都不过是为了体面，却大肆宣扬过去的荣耀，这让他实在无法忍受。\n\n所以，当父亲让他帮忙打理家业时，他轻蔑地拒绝了，并即刻动身前往北方。也许在那里，他能为自己的家族找到救赎？"
 hokkaido_events.2.a: "优先实施屯田兵定居制度。"
 hokkaido_events.2.b: "朴实的农民是[ROOT.GetCountry.GetName]的基石。"
 hokkaido_events.2.c: "将大多数[GetCulture('japanese').GetName]定居范围限制在未被[GetCulture('ainu').GetName]人开发的地区。"
 modifier_tondenhei_settlements: "屯田兵聚落"
 modifier_peasant_settlements: "农民聚落"
 modifier_restricted_settlements: "阿伊努核心地区得以保留"
 hokkaido_events.2.tt_1: "[concept_capital_state]所有[GetCulture('japanese').GetName][Concept('concept_pop', '$concept_pops$')]的#v 1.5%#!会迁往[SCOPE.sState('hokkaido_state_scope').GetName]"
 hokkaido_events.2.tt_2: "来自[SCOPE.sState('hokkaido_migration_origin_scope').GetName]（[GetGeographicRegion('geographic_region_home_islands').GetName]中[Concept('concept_gdp','$concept_gdp_short$')]最低的[Concept('concept_state', '$concept_states$')]之一）的#v 3%#![GetCulture('japanese').GetName][Concept('concept_pop', '$concept_pops$')]将迁移至[SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_old_swords_in_new_lands: "旧剑新土"
 modifier_go_north_young_man: "去北方吧，年轻人"
 hokkaido_events.3.t: "进步之种"
 hokkaido_events.3.d: "札幌农学校的最新突破促使人们提出将新作物引入[SCOPE.sState('hokkaido_state_scope').GetName]农田的方案。"
 hokkaido_events.3.f: "#b 个人实验日志，154#!\n根据最新的测试结果，我们已放弃嫁接西方品种，转用南方品种。团队声称种植边界有望大幅北推，甚至可能推过上川地区。需要进一步研究来评估其产量潜力，不过我保持乐观态度。已申请明日与系主任会面，需要买条新的领带了。"
 hokkaido_events.3.a: "专注改良现有作物。"
 hokkaido_events.3.b: "培育耐寒品种，以支持本地[GetBuildingType('building_rice_farm').GetName]。"
 hokkaido_events.3.c: "低地适合种植蓝染[GetBuildingType('building_dye_plantation').GetName]。"
 hokkaido_events.3.e: "罂粟在此生长良好，[GetBuildingType('building_opium_plantation').GetName]将是未来。"
 hokkaido_events.3.g: "使用特选葡萄品种打造[GetBuildingType('building_vineyard').GetName]。"
 button_je_taming_the_north_complete: "我们已在技术所及范围内充分开发土地"
 modifier_introducing_new_crops: "引进新作物"
 modifier_opimizing_existing_variants: "耐寒优化作物品种"
 hokkaido_events.4.t: "土地的成长" # Markens Grøde really does sound better in Norwegian
 hokkaido_events.4.d: "[SCOPE.sState('hokkaido_state_scope').GetName]开拓使达成又一重要里程碑，大量湿地被开垦为宝贵的农业用地。"
 hokkaido_events.4.f: "实在令人惊叹。如果放在十年前，眼前这条河上能安全通航的最大船只，最多是一条小划船。而现在，他却正看着一群工人从一艘庞大的蒸汽船上卸下板条箱和粗麻袋，那船则将滚滚浓烟喷入清冽的山间空气里。或许是下一座船闸的材料？还是更上游排水工程的物资？也可能只是河谷那头新村庄的补给？他说不清，而且说实话，这并不重要——无论船上载着什么，它都是载着未来。"
 hokkaido_events.4.a: "每一次挥锄，我们都在塑造这片土地。"
 hokkaido_events.4.b: "每一处新家园，我们都在拓展它。"
 hokkaido_events.4.tt_1: "来自[SCOPE.sState('hokkaido_migration_origin_scope').GetName]（[GetGeographicRegion('geographic_region_home_islands').GetName]中[Concept('concept_gdp','$concept_gdp_short$')]最低的[Concept('concept_state', '$concept_states$')]之一）的#v 2%#![GetCulture('japanese').GetName][Concept('concept_pop', '$concept_pops$')]将迁移至[SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_immigration_burst: "移民浪潮"
 modifier_open_to_business: "开门营业"
 hokkaido_events.5.t: "青年，当立志……"
 hokkaido_events.5.d: "随着由[SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective]教学人员任教的札幌农学校首届毕业生毕业，校友们迫不及待地希望施展所学。同时，校董会正在讨论学院未来的发展方向与重点。"
 hokkaido_events.5.f: "“……立志吧，但不是为金钱，不是为自我膨胀，不是为那转瞬即逝的所谓名声。立志去成就一个人所能成就的一切。”\n\n——威廉·史密斯·克拉克，#italic 札幌农学校校长告别演说#!"
 hokkaido_events.5.a: "农学校应以农业为首要重点。"
 hokkaido_events.5.b: "我们应优先扩展工程学部。"
 hokkaido_events.5.c: "设立人文学部并开展本土文化研究。"
 hokkaido_events.5.tt_1: "[SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective]教学人员在#b 札幌#!的影响促成了本地[GetCulture('japanese').GetName][SCOPE.sReligion('sapporo_partner_religion_scope').GetName]社群的形成"
 hokkaido_events.5.tt_2: "在#b $je_taming_the_north$#![concept_journal_entry]中解锁#b $button_je_taming_the_north_agriculture_potentials$#!与#b $button_je_taming_the_north_agriculture_arable_land$#!"
 modifier_sapporo_expanded_agricultural_faculty: "创新农业方法"
 modifier_sapporo_expanded_engineering_faculty: "尖端工程学部"
 modifier_sapporo_humanities_faculty: "札幌文化研究团体"
 hokkaido_events.6.t: "阿伊努之地，和人之地"
 hokkaido_events.6.d: "在国内争议的背景下，[ROOT.GetCountry.GetCapital.GetCityHubName]颁布新法令，明确[SCOPE.sState('hokkaido_state_scope').GetName]的法律地位，正式划定阿伊努文化本土，并建立与官方[ROOT.GetCountry.GetAdjective]官僚体系并行的有限机构。"
 hokkaido_events.6.f: "“谢谢！谢谢！”那位几乎没牙的阿伊努老妇人咧嘴笑着，将一碗汤递给他。他看着汤里混杂的各种野味，心里庆幸父母不在场，不会对他说三道四。\n\n“我为和平做的努力。”他暗自咕哝，挤出一个勉强的笑容，接过了碗。"
 hokkaido_events.6.a: "“这片土地足以容纳双方。”"
 modifier_opposes_ainu_rights: "对蛮夷让步"
 modifier_supports_ainu_rights: "确立阿伊努人权利"
 hokkaido_events.7.t: "开拓使的最终法案"
 hokkaido_events.7.d: "在正式宣布政府委任的任务取得成功后，[SCOPE.sState('hokkaido_state_scope').GetName]开拓使决定将其剩余职责移交国家。"
 hokkaido_events.7.f: "#b 布告第八号#!\n废[SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting]开拓使，置函馆、札幌、根室三县。其各自管辖区域有待追加布告。"
 hokkaido_events.7.a: "这是未来殖民事业的光辉典范……"
 hokkaido_events.7.b: "……亦是[GetGeographicRegion('geographic_region_home_islands').GetName]的典范。"
 modifier_external_applications: "开拓使：对外应用"
 modifier_domestic_applications: "开拓使：对内应用"
 hokkaido_events.8.t: "无所作为的开拓使"
 hokkaido_events.8.d: "由于失去[SCOPE.sStateRegion('hokkaido_state_region_scope').GetName]，开拓使在未完成使命的情况下被迫解散。对此，愤怒的民众走上[ROOT.GetCountry.GetName]街头，抗议国家威望与个人投资的双重损失。"
 hokkaido_events.8.f: "精疲力竭的名誉管理员瘫坐在办公椅上，斟了满满一杯清酒，一饮而尽。他抬眼望向桌上展开的地图，上面涂满笔记、标记与潦草字迹，各自对应他曾经耗尽心血的某项计划。如今计划与心力都已经耗尽，每则注释中隐含的乐观，现在看来都像是讥讽。\n\n都见鬼去吧。他想着，又为自己斟了一杯。"
 hokkaido_events.8.a: "遗憾的是，这一结果超出政府控制。"
 modifier_lost_northern_investments: "北方投资损失"
