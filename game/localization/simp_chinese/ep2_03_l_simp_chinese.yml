l_simp_chinese:
 #Japan Single-Fire Events
 japan_events.31.t: "[SCOPE.sState('kabuki_theatre_state').GetCityHubName]剧院被火烧毁"
 japan_events.31.d: "一场大火烧毁了位于[SCOPE.sState('kabuki_theatre_state').GetName]的一家颇受欢迎的歌舞伎剧院。在剧团计划重建的同时，[SCOPE.gsInterestGroup('relevant_ig').GetName]成员——尤其是[SCOPE.sCharacter('relevant_leader').GetFullName]——认为这是一个机会，可以借此规范[SCOPE.sState('kabuki_theatre_state').GetCityHubName]的娱乐行业，并强迫表演者在城外重建剧院。"
 japan_events.31.f: "防火瞭望塔的平台顶上，警觉的守望者正勤恳地监视着[SCOPE.sState('kabuki_theatre_state').GetCityHubName]。傍晚时分，他从有利位置发现了火灾的迹象。随着浓烟滚滚，空气中弥漫着刺鼻的焦味，他急忙跑去敲响警报钟。\n\n毫无防备的镇民们被警报声提醒，得知危险后，火消迅速行动起来，攀上屋顶以控制火势。火最终被扑灭，但显然已造成了严重的破坏。在这场毁灭性的大火过后，一座著名的歌舞伎剧场只剩下了余烬与灰屑。"
 japan_events.31.a: "他们必须在城外重建。"
 japan_events.31.b: "允许剧团重建。"
 modifier_kabuki_regulated: "打压歌舞伎剧院"
 modifier_theatre_affronted_official: "官员受辱"
 modifier_shogunate_opposition_ig_approval: "机会主义反对派"
 japan_events.32.t: "浮世绘"
 japan_events.32.d: "[SCOPE.sState('ukiyo_e_state').GetCityHubName]的一位多产的浮世绘艺术家的作品激发了[ROOT.GetCountry.GetName]国内外艺术家的想象力。"
 japan_events.32.f: "一幅描绘[SCOPE.sState('ukiyo_e_state').GetCityHubName]郊外热闹的剧院区的流行木版画。银色的月光洒在熙熙攘攘的主街上，人们的身影投下长长的影子。街道东侧排列着茶馆和木偶戏院。与之相对，西侧则矗立着三座歌舞伎剧院，每座剧院上方都有一座鼓楼。\n\n“如此坚定、精准又恰到好处的细腻明暗笔触，无疑出自大师之手。也无疑只有大师的心灵，才能构思出如此通篇井然、既雄浑有力又极致纤巧的形象。”\n——F.W.G.，#italic 《芝加哥艺术学院公报》#!"
 japan_events.32.a: "毫无疑问[ROOT.GetCountry.GetAdjectiveNoFormatting]艺术将继续获得全球关注。"
 japan_events.32.b: "很好。鼓励创作更多这类作品。"
 modifier_ukiyo_e_prestige: "丰富木版画"
 modifier_ukiyo_e_production: "木版画生产"
 japan_events.33.t: "与传统摔跤"
 japan_events.33.d: "西化对[ROOT.GetCountry.GetAdjectiveNoFormatting]文化的影响是显著的。随着习俗迅速改变，[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle][SCOPE.sCharacter('relevant_character').GetFullName]正在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]赞助一场相扑比赛，以减轻公众对这一传统的抵触情绪。"
 japan_events.33.f: "人群开始聚集在寺庙新修建的相扑馆外，都对这场得到[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]支持的活动充满好奇。到场的人中包括一些贵族和政要，他们痴迷于西方文化，对维系与这一传统的联系持怀疑态度。尽管相扑的黄金时代早已远去，但[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle][SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting]的出席或许能让民众重新认识到这项运动的文化重要性。"
 japan_events.33.a: "[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle]的努力将恢复这项运动的公众形象。"
 japan_events.33.b: "这项传统的[ROOT.GetCountry.GetAdjectiveNoFormatting]运动将具有长久的生命力。"
 modifier_restored_sumo_popularity: "恢复相扑人气"
 modifier_traditional_sports_movement_support: "国民体育"
 japan_events.34.t: "[SCOPE.sState('whaling_state').GetPortHubName]的捕鲸灾难"
 japan_events.34.d: "一艘在[SCOPE.sState('whaling_state').GetName]外海航行的船只发现了两头露脊鲸——一头母鲸和一头幼鲸。由于捕鲸季收获惨淡，一支捕鲸队在恶劣天气下冒险出海。据报道，目前已有超过100人失踪。"
 japan_events.34.f: "船上的篝火早已消失在视野外，从岸上也已看不到船队踪影，这在[SCOPE.sState('whaling_state').GetPortHubName]引发了极大的骚动。\n\n“无论多么艰难的时候，我们都从来不捕杀母鲸和它的幼崽。”一人争论道。“我们本该放走那些鲸鱼。”\n\n“胡说，”他的堂兄反驳道。“鲸鱼是上天的恩赐。我敢肯定，船队很快就会满载而归。”"
 japan_events.34.a: "$bg_whaling$是[SCOPE.sState('whaling_state').GetNameNoFormatting]的关键产业。"
 japan_events.34.b: "我们未来的精力应转而投入到[SCOPE.sState('whaling_state').GetNameNoFormatting]的$bg_fishing$上。"
 modifier_whaling_deaths: "捕鲸伤亡"
 modifier_redouble_on_whaling: "捕鲸业前景"
 modifier_fishing_not_whaling: "渔业前景"
 japan_events.35.t: "反纵火措施"
 japan_events.35.d: "[SCOPE.sState('relevant_state').GetCityHubName]城区内的纵火案频发，已导致[ROOT.GetCountry.GetName]国内[SCOPE.sGoods('expensive_good').GetName]的价格上涨，[SCOPE.gsInterestGroup('relevant_ig').GetName]对此感到担忧。他们认为，有必要进一步加大力度，采取更严格的反纵火措施。"
 japan_events.35.f: "瞭望塔的警钟响起，警示着[SCOPE.sState('relevant_state').GetCityHubName]发生的又一场火灾，住宅与商铺已陷入火海。当火消赶到灭火时，有一大群$strata_commoners_townspeople$聚集在街头。一些人怀疑地打量着邻居，另一些人则开始推测这究竟是意外还是纵火犯所为。有一点是肯定的，[SCOPE.sGoods('expensive_good').GetNameNoFormatting]的价格很快将会成倍增长。"
 japan_events.35.a: "必须采取严厉措施。处决纵火嫌疑犯。"
 japan_events.35.b: "赦免协助抓捕者的未决罪行。"
 modifier_arson_measure_strict_ig: "严厉纵火管控措施"
 modifier_arson_measure_strict_pop: "处决纵火犯"
 modifier_arson_measure_lenient_ig: "纵火处置从宽措施"
 # Colonization of Korea Content
 je_colonize_korea: "朝鲜的政府"
 je_colonize_korea_reason: "#italic “产业及贸易，于治平之下，必可见显著之发达。而东洋之和平，依之愈巩固其基础，朕所信而不疑也。”\n——《明治天皇纪》，第十二卷#!\n\n是时候在朝鲜半岛设立永久存在了。唯有如此我们才能确保[JournalEntry.GetCountry.GetName]和整个[GetGeographicRegion('geographic_region_east_asia').GetName]未来的繁荣与安全。出于妥善保证控制力的目的，我们必须监管[GetGeographicRegion('geographic_region_korea').GetName]的发展并且毫不动摇我们的决心。"
 je_colonize_korea_is_owned_by_tt: "属于[JournalEntry.GetCountry.GetName]"
 je_colonize_korea_culture_percent_seoul_tt: "$STATE_SEOUL$的[GetCulture('japanese').GetName][Concept('concept_pop','$concept_population$')|l]大于等于#bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_busan_tt: "$STATE_BUSAN$的[GetCulture('japanese').GetName][Concept('concept_pop','$concept_population$')|l]大于等于#bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_yangho_tt: "$STATE_YANGHO$的[GetCulture('japanese').GetName][Concept('concept_pop','$concept_population$')|l]大于等于#bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_sariwon_tt: "$STATE_SARIWON$的[GetCulture('japanese').GetName][Concept('concept_pop','$concept_population$')|l]大于等于#bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_pyongyang_tt: "$STATE_PYONGYANG$的[GetCulture('japanese').GetName][Concept('concept_pop','$concept_population$')|l]大于等于#bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_fail_tt: "#bold [GetGeographicRegion('geographic_region_korea').GetName]#!不再处于[ROOT.GetCountry.GetAdjective]控制"
 korea_colinzation_2b_executive_tt: "一名[concept_executive]获得#tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_tt $modifier_peninsula_control_loyal_prominence$#!，持续#v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!年"
 korea_colinzation_2b_company_tt: "一家[concept_company]获得#tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_company_bonus_tt $modifier_peninsula_control_company_bonus$#!，持续#v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!年"
 modifier_peninsula_control_loyal_prominence_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetDesc]"
 modifier_peninsula_control_company_bonus_tt: "[GetStaticModifier('modifier_peninsula_control_company_bonus').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_company_bonus').GetDesc]"
 korea_colinzation_3b_tt: "必须有人为这次失败负责。"
 korea_colinzation_3b_ig_leader_tt: "一位[concept_leader]获得#tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_loss_tt $modifier_peninsula_control_loyal_prominence$#!，持续#v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!年"
 korea_colinzation_3b_ig_tt: "一个[concept_interest_group]获得#tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_approval_pol_str_loss_tt $modifier_peninsula_control_approval_pol_str_loss$#!，持续#v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#!年"
 modifier_peninsula_control_loyal_prominence_loss_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence_loss').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_loyal_prominence_loss').GetDesc]"
 modifier_peninsula_control_approval_pol_str_loss_tt: "[GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetDesc]"
 korea_colonization.2.t: "光明的未来"
 korea_colonization.2.d: "如今全世界都已清楚，[GetGeographicRegion('geographic_region_korea').GetName]是[ROOT.GetCountry.GetName]的一部分，且完全处于我国的绝对控制之下。我国在半岛的存在，进一步证明了我国在世界舞台上的重要地位。"
 korea_colonization.2.f: "随着国家统一的愿景如今成为现实，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]的野心也不断壮大。自[ROOT.GetCountry.GetRuler.GetHerHis]在[ROOT.GetCountry.GetCapital.GetCityHubName]的宝座上，[ROOT.GetCountry.GetRuler.GetSheHe]创作着短歌，思量这番成就，并对半岛情势的发展表示欣慰。\n\n同一时刻，在$STATE_SEOUL$，一名[GetCulture('korean').GetNameNoFormatting]官僚正努力压制公众对新社会秩序的反对呼声。他以极大的平静态度对他们说话，坚称这次联合将确保所有人的繁荣。"
 korea_colonization.2.a: "半岛未来的繁荣与安宁，前景光明。"
 korea_colonization.2.b: "商业事务一直是我们议程的核心。"
 modifier_peninsula_control_prestige_authority: "半岛威望"
 modifier_peninsula_control_assimilation_migration: "加速同化"
 modifier_peninsula_control_loyal_prominence: "重大疏忽"
 modifier_peninsula_control_company_bonus: "公司嘉奖"
 korea_colonization.3.t: "错失的良机"
 korea_colonization.3.d: "[GetGeographicRegion('geographic_region_korea').GetName]不再由我们控制。这对于[ROOT.GetCountry.GetName]的经济和外交影响将持续数年。"
 korea_colonization.3.f: "[ROOT.GetCountry.GetAdjectiveNoFormatting]的官员们集会，会上挫折与不满弥漫，共同商讨政府未能维持半岛秩序的失职。这次挫败严重打击了[ROOT.GetCountry.GetNameNoFormatting]近年积累的雄厚实力，对于该如何应对，许多人拒绝做出让步。\n\n一位绅士提高嗓音，压过讨论的喧哗声：“[SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting]显然应该为这次失败担责。”"
 korea_colonization.3.a: "我们都必须承担失败的重担。"
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName]和[SCOPE.gsInterestGroup('relevant_ig').GetName]必须为此次失败负责。"
 modifier_peninsula_control_prestige_loss: "控制力衰退"
 modifier_peninsula_control_loyal_prominence_loss: "地位下滑"
 modifier_peninsula_control_approval_pol_str_loss: "衰退的影响力"
 JE_COLONIZE_KOREA_STATES_HEADER: "剩余[Concept('concept_state', '$concept_states$')]："
 JE_COLONIZE_KOREA_STATES_TT: "$JE_COLONIZE_KOREA_STATES_HEADER$ [GetScriptedGui('je_colonize_korea_states_sgui').ExecuteTooltip(GuiScope.SetRoot(GetPlayer.MakeScope).End)]"
 JE_COLONIZE_KOREA_STATES_LIST_ENTRY_OWNED_STATE: "[THIS.GetState.GetCustom('colonize_korea_state_owned_by_japan')] $je_colonize_korea_is_owned_by_tt$"
 JE_COLONIZE_KOREA_STATES_LIST_ENTRY_INCORPORATED_STATE: "[THIS.GetState.GetCustom('colonize_korea_state_is_incorporated')] $TRIGGER_IS_INCORPORATED$"
 JE_COLONIZE_KOREA_STATES_LIST_ENTRY_TURMOIL: "[THIS.GetState.GetCustom('colonize_korea_state_turmoil')]动乱小于[THIS.ScriptValue('je_colonize_korea_state_turmoil_max')|v%1]（[THIS.GetState.CalcTurmoil|v%1]）"
 JE_COLONIZE_KOREA_STATES_LIST_ENTRY_CULTURE: "[THIS.GetState.GetCustom('colonize_korea_state_is_assimilated')] [THIS.ScriptValue('je_colonize_korea_state_japanese_culture_min')|v%1] [GetCulture('japanese').GetName] [concept_culture] （[THIS.ScriptValue('japanese_culture_fraction')|v%1]）"
