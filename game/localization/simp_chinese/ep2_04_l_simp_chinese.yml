 # Zaibatsu
 je_zaibatsu: "企业集团"
 je_zaibatsu_reason: "[ROOT.GetCountry.GetName]的工业化进程迅猛，使得大部分经济被纳入[concept_zaibatsu]掌控。这些企业通过和国家机构的深度勾连谋取暴利，从而成为了#v $JAP$#!军工体系中至关重要的组成部分。\n\n[ROOT.GetCountry.GetAdjectiveNoFormatting]资本的高度集中，使得国家成为国际市场的有力竞争者，但这也导致政治权力日益集中于财阀及其在军部的支持者手中。[SCOPE.GetRootScope.GetCountry.GetCustom('zaibatsu_democracy_snippet')]\n$ZAIBATSU_LIST_HEADER$$ZAIBATSU_LIST_CONTENT$"
