 zaibatsu_democracy_info: "\n\n只要该[concept_journal_entry]激活，[concept_electoral_confidence]会每月减少#v 0.5%#!"
 two_more_more_company_slots_tt: "可以成立[SCOPE.ScriptValue('je_zaibatsu_company_slots_threshold')|v0]个或更多[Concept('concept_company','$concept_companies$')]"
 glossary_zaibatsu: "#b #italic 财阀#!#!是家族所有的垂直一体化工业和金融集团。\n\n典型的财阀以一家控股公司和银行为核心，持有几家子公司（通常属于工业领域）的所有权股份。财阀起源于江户时代晚期的家族商人，他们利用已有的财富和与国家的关系巩固了对日本大部分工业基地的控制。"
