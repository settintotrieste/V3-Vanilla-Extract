 ep2_meiji_pulse.3.t: "下关战争"
 ep2_meiji_pulse.3.d: "长州藩大名[SCOPE.sCharacter('choshu_daimyo_scope').GetFullName]已表示[SCOPE.sCharacter('choshu_daimyo_scope').GetHerHis]将遵从天皇驱逐外国人的命令。[SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe|U]命令[SCOPE.sCharacter('choshu_daimyo_scope').GetHerHis]的海军向所有通过下关海峡的外国船只开火，并与一艘[SCOPE.sCountry('relevant_gp').GetAdjective]军舰发生交火。"
 ep2_meiji_pulse.3.f: "白昼的雷声滚过火之山缓坡，正刚抬头望天。映入眼帘的唯有蓬松白云。\n\n“看！”次郎喊道。一只手闯入视野，向下指去。一艘全速航行的战舰正穿行下方海峡，炮火轰击着正刚看不见的目标。船体木屑飞溅，却仍继续前行。这一切之上，另一朵云正在升腾。"
 ep2_meiji_pulse.3.a: "外国人做了我们做不到的事。"
 ep2_meiji_pulse.3.b: "协助该藩达成和解。"
 ep2_meiji_pulse.3.c: "向西方人提议开放一个港口以换取协议。"
 treaty_name_shimonoseki_war_indemnity: "下关战争赔偿"
 modifier_defeated_westerners: "击败西方远征军"
 modifier_bombardment_of_domain: "藩国都城遭到炮击"
 ep2_meiji_pulse.4.t: "焚毁[SCOPE.sCountry('relevant_gp').GetAdjective]使馆"
 ep2_meiji_pulse.4.d: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]藩的#italic 尊王攘夷#!武士袭击了[SCOPE.sCountry('relevant_gp').GetAdjective]在[SCOPE.sState('edo_state').GetCityHubName]尚未完工的公使馆建筑。这座本该是该市首座西洋式风格的建筑已被焚毁，而肇事者却不见踪影。"
 ep2_meiji_pulse.4.f: "两名兜帽蒙面者登上能俯瞰原公使馆的山丘。焦黑的残骸中仍升腾着橘色余烬。当所有易燃物燃尽，火焰在密实的梁柱间勉强维持。\n\n当余烬最终熄灭，两人仍静立不动。一人轻声开口，凝视着残留的烟柱。\n\n“若其灰烬如雪纷扬落于吾身，岂非至美？”"
 ep2_meiji_pulse.4.a: "[SCOPE.sState('edo_state').GetCityHubName]已经变得无法治理。"
 ep2_meiji_pulse.4.b: "禁止[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]藩在城中携带武器。"
 shimonoseki_indemnity_tt: "[ROOT.GetCountry.GetName]将在#v 10年#!内向[SCOPE.sCountry('relevant_gp').GetName]支付@money!#v 3M#!赔款"
 shimonoseki_indemnity_port_tt: "[GetStateRegion('STATE_KANSAI').GetName]的$HUB_NAME_STATE_KANSAI_port_japanese$市将被开放为[SCOPE.sCountry('relevant_gp').GetAdjective][concept_treaty_port]"
 modifier_ungovernable_capital: "承认无法治理"
 ep2_meiji_pulse.5.t: "血腥复仇"
 ep2_meiji_pulse.5.d: "幕府大老[SCOPE.sCharacter('tairo_scope').GetFullName]在江户城门前被来自[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]藩与[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]藩的浪人刺杀。刺客留下的宣言表达了#italic 尊王攘夷#!思想，谴责这位首席大臣对外国人的让步。"
 ep2_meiji_pulse.5.f: "忠三郎目睹五郎黑走到队伍前面，[SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')]藩士欲上前阻拦。五郎黑未给他反应之机，拔刀疾刺。血泉从[SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')]被劈开的面庞喷涌，同袍们怒吼着涌上前复仇。\n\n忠三郎褪下雨衣，拔出手枪。他瞄准轿厢暴露的侧面，扣动扳机。枪声轰鸣盖过刀剑交击与呐喊，继而又是第二声。一名护卫转身向他冲来，而[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]的浪人治左卫门挥刀劈向对方躯干。透过缠斗的两人，忠三郎望见鲜血如溪流般从轿门流淌至积雪的道路。他拔出胁差，朝那抹赤红奔去。"
 ep2_meiji_pulse.5.a: "武士再次拔刀相向。"
 modifier_tairo_assassinated: "大老遇刺身亡"
 ep2_meiji_pulse.6.t: "池田屋事件"
 ep2_meiji_pulse.6.d: "在拷问一名[SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]的激进分子并获得情报后，[GetLawType('law_shinsengumi').GetName]对位于[SCOPE.sState('kyoto_state').GetName]池田屋旅馆的一次疑似密谋者集会发动突袭。突袭很快演变为在旅馆内外展开的激烈刀战。"
 ep2_meiji_pulse.6.f: "大高靠在栏杆上稳住身体，这时新选组冲破了门。他能看到他们浅蓝色#italic 羽织#!袖子上的血迹——在昏暗的灯光下显得黑白分明。他举刀摆出防御架势。\n\n两人从队伍中脱离，并排沿着他守着的楼梯向上冲来，他挥刀劈砍，感到被格挡开，随即调整姿态。撞击中溅出火花。第二个人又挥刀砍来。他后退一步，扭动手腕——\n\n一道火光映照下的钢刃闪过，紧接着他感到胸口一阵冰冷。"
 ep2_meiji_pulse.6.a: "奖励新选组的主动行动。"
 ep2_meiji_pulse.6.b: "这种残酷行为只会招致报复。"
 modifier_shinsengumi_meddling: "横行的新选组"
 modifier_shinsengumi_crackdown: "新选组镇压"
 modifier_refrained_from_crackdowns: "新选组受到约束"
 sufficient_pressure_from_sonno_joi_tt: "[SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')]的[concept_activism]高于@activism_red!$RADICALISM_PROTESTING$（#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!）"
 ep2_meiji_pulse.7.t: "禁门之变"
 ep2_meiji_pulse.7.d: "支持[SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]的[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]藩士兵试图攻入位于[SCOPE.sState('kyoto_state').GetName]的皇宫，以武力恢复天皇权力。他们遭到[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]藩与会津藩的士兵的阻击。"
 ep2_meiji_pulse.7.f: "蛤御门被火枪烟雾所笼罩。他们身处被火光点亮的京都。\n\n会津藩兵沿着城墙列阵，齐射的火枪弹打在道路与[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]的火炮的炮架上四散飞溅。每隔数秒，便有弹丸击中血肉，惨叫声短暂压过枪火的爆裂。幸三蜷缩在炮轮旁，拼命想要疏通卡住的火枪。在仅一#italic 剑#!之隔处，他小队的队长脸朝下倒在地上，四肢尽失，却仍在挣扎扭动。"
 ep2_meiji_pulse.7.a: "[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]藩与会津藩成功击退进攻者。"
 ep2_meiji_pulse.7.b: "皇宫落入[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]藩控制。"
 coup_resistance_below_daimyo_coup_strength_tt: "[ROOT.GetCountry.GetName]的[concept_coup_resistance]（[SCOPE.ScriptValue('country_coup_resistance')|v2]）低于[SCOPE.sCharacter('daimyo_1_scope').GetFullName]的[concept_coup_strength]（[SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2]）"
 ep2_meiji_pulse.8.t: "[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]征讨"
 ep2_meiji_pulse.8.d: "作为对[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]藩袭击皇宫的报复，将军已下令发动惩罚性远征，以将#italic 尊王攘夷#!派逐出该藩。一些同情[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]藩的顾问提出了一项方案：若相关责任者切腹自尽，则可换取和平。"
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting]，[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]的大名，站在城堡的阳台上，向远方眺望。远处，缕缕烟雾玷污了天际——那是逼近大军的营火。\n\n“将军要求三名家老切腹，”家臣说道，“四名军官斩首，五名家臣流放。”\n\n[SCOPE.sCharacter('daimyo_1_scope').GetFirstNameNoFormatting]望向营火，那里至少有数百处。曾经湛蓝的地平线如今变得令人作呕。终于，他开口了。\n\n“……[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]藩愿降。”"
 ep2_meiji_pulse.8.a: "如果能不战而胜，那就这样吧。"
 ep2_meiji_pulse.8.b: "必须从上到下清洗该藩。"
 modifier_daimyo_house_arrest: "被软禁的大名"
 modifier_daimyo_executed: "剥夺大名领地"
 ep2_meiji_pulse.9.t: "攘夷令"
 ep2_meiji_pulse.9.d: "由于西方列强强加给[ROOT.GetCountry.GetName]的不平等条约，天皇愤怒之下绕过了将军，直接颁布敕令，命令将外国人驱逐出[ROOT.GetCountry.GetAdjectiveNoFormatting]的领土。[SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName]的激进分子已经响应天皇的号召。"
 ep2_meiji_pulse.9.f: "家臣站在炮身侧方，目光投向海峡。此时，正喷着蒸汽的船驶过落日下，成了黑色的剪影。一旁，长州藩的下级武士们正忙着摆弄推弹杆和一袋袋黑火药。\n\n当他抬头望向日之山的轮廓和下方的下关町时，脑海中浮现出那份诏书中的一段话。“国土纵成焦土，”诏书写道，“亦绝不许开港通商。”\n\n这值当么？他会任由那翠绿的山坡被烧成一片焦黑，任由那片片花田被烧光，任由自己的家园被摧毁吗？是的，他心想。毫不犹豫。"
 ep2_meiji_pulse.9.a: "将军必须前往京都商议此事。"
 ep2_meiji_pulse.9.b: "此伪诏也——把这件事压下去。"
