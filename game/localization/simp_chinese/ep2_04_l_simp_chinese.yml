 ep2_meiji_pulse.2.t: "炮击[SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]"
 ep2_meiji_pulse.2.d: "由于[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]藩拒绝为[SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting]之死支付赔款，[SCOPE.sCountry('relevant_gp').GetAdjective]海军舰艇对[SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]海防进行了持续数日的炮击。"
 ep2_meiji_pulse.2.f: "海湾笼罩在炮火的烟雾中，[SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]正熊熊燃烧。海面彼岸，一艘外国战舰正向城北的工厂开炮。每一次发射，地狱般的红光便吞没了落日微弱的余晖。\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]炮位上最后一门仍能运作的火炮轰然开火——在良好条件下本可远射，如今却已无力回天。炮弹落在外国舰队第三艘船数个船身之外，激起巨大的水柱。[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]抓起通条，[SCOPE.sCharacter('name_a_scope').GetHerHis]冲向火炮继续操作。在后方墙外，被上一轮炮击击伤的士兵仍在惨叫。尽管[SCOPE.sCharacter('name_a_scope').GetHerHis]耳中嗡鸣不断，但依然能够听见他们的哀嚎。"
 ep2_meiji_pulse.2.a: "这是他们鲁莽行径所付出的沉重代价。"
