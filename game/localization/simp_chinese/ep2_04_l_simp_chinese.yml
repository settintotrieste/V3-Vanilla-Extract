 special_character_japanese_emperor_desc: "该角色为当今在位的日本天皇，是日本宗教与政治体制的核心人物。"
 japan_monarchy.1.t1: "嘉永"
 japan_monarchy.1.t2: "天久"
 japan_monarchy.1.d1: "[SCOPE.sCharacter('emperor_scope').GetFirstName]亲王即位为日本天皇。[SCOPE.sCharacter('emperor_scope').GetHerHis|U]的登基标志着嘉永年号的开始，意为嘉乐永无央。"
 japan_monarchy.1.d2: "[SCOPE.sCharacter('emperor_scope').GetFirstName]亲王即位为日本天皇。[SCOPE.sCharacter('emperor_scope').GetHerHis|U]的登基标志着天久年号的开始，意为天长地久。"
 japan_monarchy.1.f: "暗处传来乐人奏出的仪典讯号，两名女官缓缓拉开御座的帷幔。天皇端坐其上，身着朱红御袍，袍上绣着青白相间的龙纹。宽大的衣袍几乎将御座遮掩，令他仿佛凌空而坐。冕冠垂下珠旒，层层帘影遮住了他的双眼。\n\n衣袂轻响四起，[SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting]俯首躬身，在场众人如潮水般伏倒在地。[SCOPE.sCharacter('name_scope').GetSheHe|U]随之叩拜，天皇隐在阴影中的面容，就此从视线中消失。\n\n数日之后，在返回江户的途中，[SCOPE.sCharacter('name_scope').GetSheHe]试图回想当日所见，却始终无从捕捉——冕冠、帷幔、天皇身侧的御案器物，尚能依稀记起，可那位天皇本人的模样，却半点也想不起来。"
 japan_monarchy.1.a: "天皇陛下万寿无疆。"
 japan_monarchy.2.t: "明治"
 japan_monarchy.2.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName]亲王即位为日本天皇。[SCOPE.sCharacter('emperor_scope').GetHerHis|U]的登基标志着[SCOPE.sCharacter('emperor_scope').GetFirstName]年号的开始，意为向明而治的承诺。"
 japan_monarchy.2.f: "一声锣响，御帘升起。只一瞬间，众人得以看见天皇的身姿——他身着华美黄绫御衣，面容半隐。左侧台座绿漆宝盒中供奉着神剑与神玉。随即武官高声唱令，所有人垂目视地。宣命使朗声宣告，声音沉稳庄严：\n\n“上古神代，肇立国基。继有橿原之宫，神武开皇祚基业，由是皇统连绵。朕祗承鸿绪，体太乙而膺景命，保全天佑，践万世一系之帝位。”" # Very heavily pared down excerpt of the rites at Meiji's enthronement
 japan_monarchy.2.a: "天皇陛下万寿无疆。"
 japan_monarchy.3.t: "大正"
 japan_monarchy.3.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName]亲王即位为日本天皇。[SCOPE.sCharacter('emperor_scope').GetHerHis|U]的登基标志着[SCOPE.sCharacter('emperor_scope').GetFirstName]年号的开始，意为大亨以正之美德。"
 japan_monarchy.3.f: "一名男子沿着脚手架走过，木板发出吱呀声。弥太郎尽可能用力扶稳它。待脚步声远去，他用木槌将其牢牢固定。\n\n四周不断传来类似的声响。眼角余光中，他看到另一组工人正在搭建隔壁建筑的黑木板墙。工头正高声呵斥着挑着摇摇欲坠茅草的匠人。\n\n六日后，天皇将从他亲手搭建的这条御道上经过。这场一生仅此一次的大典结束后，整条通道便会被焚毁。他无缘亲临观礼，唯一的期盼，便是能在远处望见大典火光映红天际。"
 japan_monarchy.3.a: "天皇陛下万寿无疆。"
 japan_monarchy.4.t: "昭和"
 japan_monarchy.4.d: "[SCOPE.sCharacter('emperor_scope').GetFirstName]亲王即位为日本天皇。[SCOPE.sCharacter('emperor_scope').GetHerHis|U]的登基标志着[SCOPE.sCharacter('emperor_scope').GetFirstName]年号的开始，意为对百姓昭明、协和万邦的愿景。"
 japan_monarchy.4.f: "高石家四代人围坐在收音机旁。里面传出的声音仿佛来自井底，夹杂着杂音。义男一次又一次反复转动旋钮。信号再次清晰传来时，声音已变得稳健有力。\n\n“……内阁官房长官已发布诏书，宣布新年号。自今日起，年号改为[SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]元年……”\n\n他母亲的目光投向厨房桌上的报纸。“不是弘文？他说的是真的吗？”\n\n房间里响起犹豫不决的低语声，义男把收音机音量调大，却无济于事。他想要知道更多的信息只能读明天的报纸了。"
 japan_monarchy.4.a: "天皇陛下万寿无疆。"
 japan_monarchy.5.t: "一世一元"
 japan_monarchy.5.d: "在朝廷政治地位恢复后，天皇下达了改革年号制度的诏令。从今往后，新天皇登基后采用的年号将一直持续至其统治结束，不再变更。"
 japan_monarchy.5.f: "#bold 诏：#!\n\n体太乙而登位，膺景命以改元，洵圣代之典型，而万世之标准也。朕虽否德，幸赖祖宗之灵，祗承鸿绪，躬亲万机之政。乃改元，欲与海内亿兆，更始一新，其改[ROOT.GetCountry.GetCustom('JAP_era_year_name')]为[SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]元年。自今以后，革易旧制，一世一元，以为永式。" # Shortened 'One Emperor, One Era' edict - 今後年號ハ御一代一號ニ定メ慶應四年ヲ改テ明治元年ト爲ス及詔書
 japan_monarchy.5.a: "主者施行。"
 japan_monarchy.6.t: "太上天皇之死"
 japan_monarchy.6.d: "上皇陛下、在位天皇之父驾崩。[SCOPE.sCharacter('retired_emperor_scope').GetSheHe|U]因致力于复兴皇室威望而被铭记，并被追赠谥号[SCOPE.sCharacter('retired_emperor_scope').GetFirstName]。"
 japan_monarchy.6.f: "东方将毛笔蘸入墨中。笔尖落于纸面，先写下当日的年份、日期与天气。他移至下一列，却骤然停住。\n\n该用怎样的措辞才合礼数？该如何书写，才能写出此事的分量？他曾听闻上皇为复兴朝廷倾尽心力，忆起上皇在位时，一桩桩重启古礼的奏报。直至接待朝廷使者，他才真正知晓内情。\n\n笔尖轻触纸面。“奉询天皇尊号旧例，查阅皇室系谱，具文呈复……”"
 japan_monarchy.6.a: "他的后人是否能实现他的心愿？"
