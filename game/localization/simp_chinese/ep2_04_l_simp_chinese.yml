 ig_in_pro_country_lobby_tt: "[concept_interest_group]处于亲善[concept_political_lobby]中"
 iwakura_mission.1.t: "遣西使节团"
 iwakura_mission.1.d: "政府已经拟定了一份由数名适合担任特命全权大使的官员与大臣组成的名单。最终选定的人选将被派往西方，负责为期约十个月的出访。"
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting]站在镜前，一遍又一遍检查[SCOPE.sCharacter('expedition_leader_1').GetHerHis]的领带。它传入日本已有一段时间——起初是一种风尚，随后成为国家规定——但仍未让人感到自然。[SCOPE.sCharacter('expedition_leader_1').GetSheHe|U]只能勉强适应。如果他的交易顺利，如果政府批准了[SCOPE.sCharacter('expedition_leader_1').GetHerHis]的投标，如果他醒来时身处伦敦、波士顿与巴黎，那么一天的结束也不意味着有片刻的安宁。"
 iwakura_mission.1.a: "此事需要[SCOPE.sCharacter('expedition_leader_1').GetFullName]的关注。"
 iwakura_mission.1.b: "任命[SCOPE.sCharacter('expedition_leader_2').GetFullName]担任该职务。"
 iwakura_mission.1.c: "我们可以依赖[SCOPE.sCharacter('expedition_leader_3').GetFullName]。"
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName]也能从这一机会中受益。"
 iwakura_mission.2.t: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]报告"
 iwakura_mission.2.d: "随着[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使节团返回$JAP$，[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName]及[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHis]的同僚已向[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]提交报告。报告中包含对工业社会的观察，以及对国家新政的建议。"
 iwakura_mission.2.f: "“伏惟欧米列国，特施文明之治，夙奏开化之功者，由其职与牖民之方得宜。不二麿历涉所至，殆十数国，立政之体虽各不同，至其竭力于教育，则彼此皆出一辙。是以入其境，地无不有学校之设，人无不存恬熙之风。”\n\n——田中不二麿"
 iwakura_mission.2.a: "西方为我们打开了通往现代的窗口。"
 iwakura_mission.2.b: "[SCOPE.sCountry('iwakura_good_economy_country').GetAdjective]式工业将成为日本的未来。"
 iwakura_mission.2.c: "我们可以通过学习[SCOPE.sCountry('iwakura_desired_law_country').GetAdjective]的政治而获益匪浅。"
 iwakura_mission.2.e: "借鉴[SCOPE.sCountry('iwakura_land_reform_law_country').GetAdjective]的土地改革将使乡村焕发新生。"
 iwakura_mission.4.t: "金门"
 iwakura_mission.4.d: "在横跨大洋的漫长航行之后，[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使节团已抵达[SCOPE.sCountry('iwakura_mission_host').GetName]。使节团计划沿其铁路前往[SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName]，沿途考察[SCOPE.sCountry('iwakura_mission_host').GetAdjectiveNoFormatting]的制度与工业设施。"
 iwakura_mission.4.f: "“此晓，深雾之内咫尺之程莫辨，甲板之上至成津滴，故船止于洋中，以待黎明。天明，雾亦仿佛消，前显加利福尼诸山。顿旭日升，船徐徐行进。正当东，见两峰中断，若门关之状，其里面海水满盈，蒸气船喷烟往来，景色甚丽。是名金门（英语“Golden Gate”）之处也。\n\n二十二日间，渡洋中而来，于扶桑之东始见山水，眺望之乐，不可言谓。”\n\n——久米邦武，#italic 《美欧回览实记》，1871‑1873#!"
 iwakura_mission.4.a: "一整片大陆的知识正向我们展开。"
 iwakura_mission.4.b: "美利坚不过是通往欧洲的门户。"
 iwakura_mission.5.t: "鲸腹之中"
 iwakura_mission.5.d: "自太平洋横跨至大西洋后，[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使节团已抵达[SCOPE.sCountry('iwakura_mission_host').GetName]。使节团试图与[SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle]政府建立外交关系，并参观工业革命的发源地。"
 iwakura_mission.5.f: "“从亚米利加之繁昌，当港（指利物浦港）亦益昌。港口所造船厂，连北岸长六英里。其向海之所，如城垣开塞关，石垣层叠，內掘纵横船厂，坚牢过于城濠。出入船舶，皆入此碇泊。桅樯似灌木之丛立，网条彷彿渔村之曝网。其盛，称世界第一。”\n\n——久米邦武，#italic 《美欧回览实记》，1871‑1873#!"
 iwakura_mission.5.a: "追随一切呈现于我们眼前的线索。"
 iwakura_mission.5.b: "两个月足以遍览[SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName]。"
 iwakura_mission.6.t: "横跨大陆"
 iwakura_mission.6.d: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使节团已抵达欧洲大陆，首站为[SCOPE.sCountry('iwakura_mission_host').GetName]。在接下来的数月中，使节团将观察、评估，并与大陆诸国建立关系。"
 iwakura_mission.6.f: "“午后，至某（地名失问）墓地。此处位于巴黎东方边鄙，全域广四十“艾卡”。此区域之内，除一条大路与墓间车路外，大抵并无余地。\n\n此日有一送葬，似为小家。棺车一辆，亲故皆步行送来，棺亦木柜而已。掘圹于一处墓地，深六尺许，于此窆棺。教师诵咒文了，临圹撒土一掬，即下土。送葬之人皆满眼浮泪，然一无悲号者。”\n\n——久米邦武，#italic 《美欧回览实记》，1871‑1873#!"
 iwakura_mission.6.a: "我们将从容地比较、对照。"
 iwakura_mission.6.b: "行程安排要求我们加快考察进度。"
 iwakura_mission.8.t: "另一半世界"
 iwakura_mission.8.d: "在返回[ROOT.GetCountry.GetName]途中，[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使节团在[SCOPE.sCountry('iwakura_mission_host').GetAdjective]殖民地[SCOPE.sState('iwakura_mission_location').GetName]停留。使节团花费数日观察欧洲殖民社会以及当地的[GetReligion('theravada').GetNameNoIcon]信仰活动。"
 iwakura_mission.8.f: "“巡至此，有僧，导览间云日本人为#italic “檀那”#!，云堂为#italic “伽蓝”#!，皆梵语之来源，感其至今未讹。锡兰岛乃释迦修道之灵迹，土人至今尚皆信向佛教。民之生活已淡泊，故僧之生活尤淡。教祖之灵场亦委于草芜，至于莫然。\n\n与耶苏教、回教之灵迹相比较，异于云壤。是虽可谓本教善脱落于尘表，抑其萎微而不能振，亦可为征也。”\n\n——久米邦武，#italic 《美欧回览实记》，1871‑1873#!"
 iwakura_mission.8.a: "这样的命运，是否也可能降临于我们？"
 iwakura_mission.9.t: "横滨港"
 iwakura_mission.9.d: "历经数月海外行程并完成环球航行之后，[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使节团已返回[ROOT.GetCountry.GetName]。他们带回了大量资料汇总、外国商品，以及对西方技术与政治制度的第一手见闻。"
 iwakura_mission.9.f: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting]站在蒸汽船甲板上，眺望西方。[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe]看见远方的富士山的雄姿笼罩在尚未散尽的晨雾之中。一群西方人——也许是商人，或者是像[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerselfHimself]一样刚开始游览世界的旅人——聚集在栏杆旁。一名德国男子坐在舱门旁的长椅上，将这一景象描绘在素描本中。[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe|U]不禁思索，他们是否也是初次目睹此景，抑或如同[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHim]自己一般，每次见到都会为之震撼。\n\n究竟有多少人真正完成了他所经历的一切？有多少人曾横跨三大洋，踏足四大洲？未来还会有更多，[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetSheHe]想到。铁路与蒸汽船将造就更多像[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHim]一样的人，但历史将记住[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerHim]是先行者之一。"
 iwakura_mission.9.a: "归乡之景，最为动人。"
 je_iwakura_mission: "维新：[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使节团"
 je_iwakura_mission_reason: "作为现代化举措的一部分，[ROOT.GetCountry.GetName]的新政府已派遣[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName]及一批大臣与学者，组成横跨西方世界的外交使节团。[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]使节团旨在重新谈判与西方的不平等条约，并调查列强政治与技术的基础。\n\n使节团每在一国停留#b 一个月#!，都有机会收集该国法律或技术方面的见闻。这些发现将影响使节团回国后的报告，以及使节团领导者的[concept_ideology]。"
