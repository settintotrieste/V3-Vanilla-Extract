l_simp_chinese:
 japan_politics.1.t: "实学"
 japan_politics.1.d: "[ROOT.GetCountry.GetName]国门的开放使兰学派的许多学问显得过时。新的思潮开始在[ROOT.GetCountry.GetAdjectiveNoFormatting]知识界中流传，其中最早兴起的是“实学”一派。"
 japan_politics.1.f: "“首先端正本身的品行，笃志博学，并具备适应其身分的智德，则政府施政即易，人民也不会以受其统治为苦，从而各得其所，大家同心协力来维护全国的安宁秩序。现在我们劝学的宗旨也就在于此。”\n\n——福泽谕吉，《劝学篇》" # Translated by Eiichi Kiyooka
 japan_politics.1.a: "学而富。"
 japan_politics.2.t: "豪门"
 japan_politics.2.d: "随着[ROOT.GetCountry.GetName]的工业化进程，[SCOPE.gsInterestGroup('industrialists_ig').GetName]已将其业务拓展至制造业经济。他们利用自身的财富以及与国家的联系，成功地将大量工业基础集中到了自己的控制下。"
 japan_politics.2.f: "财务大臣站在阳台上，看着仲买人们竞相出价。在大米交易所的时代，交易结束的信号是有人朝人群里泼一桶水。\n\n如今，则换成了一个紧盯着时钟、手握木槌的人。在他办公桌附近，一名男子嘴里牢牢衔着债券，正签署合约——他的身影几乎被涌上来抢购七厘息债券的仲买人潮淹没。现场嘈杂声震耳欲聋，买卖的喊声混在一起，就像海浪拍打岩石的声音。\n\n时钟敲响了，桌边的那个人把木槌狠狠砸在铜盘上。人群中立刻响起愤怒的叫嚷声，最后时刻达成交易的声音反而更加响亮。他不满地嘟囔着，蹲到办公桌下，提起了那桶水。"
 japan_politics.2.a: "现在，银行家们将统治一切。"
 japan_politics.3.t: "公民大众"
 japan_politics.3.d: "江户时代的阶级体系逐渐瓦解，催生了一个基于共同国籍的公民社会。那些曾被划定为[SCOPE.gsInterestGroup('pb_ig').GetName]的人，如今首先将自己视为爱国公民。"
 japan_politics.3.f: "志藏缓缓左右转动脑袋，对着铜镜打量自己的新发型。头发比以往任何时候都短，那个他从小留到大的发髻已经不见。新剪的发梢摸起来又厚又糙，他忍不住一次次抬手去摸。\n\n他猛地甩了甩头，感受到发丝不同于往日的晃动。这就像那套新衣服——高耸的衣领磨得脖子发痒。虽不舒服，但也有好处。新样式能引人注目，还能吸引顾客光顾他的店铺。他做的是正当生意，他是纳税人、是警备员、是国家公民——一个文明人。"
 japan_politics.3.a: "国家的强大在于公民的和平。"
