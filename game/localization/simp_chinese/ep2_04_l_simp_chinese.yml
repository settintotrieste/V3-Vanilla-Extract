 zaibatsu.1.t: "企业集团"
 zaibatsu.1.d: "[ROOT.GetCountry.GetAdjective]国家同[SCOPE.gsInterestGroup('zaibatsu_ig').GetName]的长期协作，已将企业联合体的权力固化在[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]内部。治理或由政客，但统治者将是将军与企业高管们。"
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting]从有遮帘的包厢俯瞰下方的比赛。[SCOPE.sCharacter('pm_scope').GetHerHis]所偏爱的力士的对手，已将他支持的选手逼到稻草擂台的边缘。首相努力着不让握紧的拳头透出内心的紧张。首相身边，[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting]静立着，神态自若。\n\n裁判举起扇子，下层观众席响起欢呼。坐垫如雨点般抛向空中，洒落在擂台上。[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting]微微一笑，转向[SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting]。在擂台的远端，[SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]的#italic 家纹#!赫然印在那面墙上。"
 zaibatsu.1.a: "让[ROOT.GetCountry.GetCapital.GetCityHubName]如光之海洋般展开。"
 zaibatsu.1.b: "我们的供应链将永远确保安全。"
 zaibatsu.2.t: "上锁"
 zaibatsu.2.t_1: "均平之手"
 zaibatsu.2.d: "经由[SCOPE.sCharacter('pm_scope').GetLastName]内阁的努力，[SCOPE.gsInterestGroup('zaibatsu_ig').GetName]对[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]的控制力已被削弱。今后将由政客来统治，企业高管们则应专注于他们的利润。"
 zaibatsu.2.d_1: "[SCOPE.sCharacter('pm_scope').GetLastName]内阁的自由贸易政策，逐渐侵蚀了[SCOPE.gsInterestGroup('zaibatsu_ig').GetName]对[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]施加控制所依赖的军工合同网络。今后将由政客来统治，企业高管们则应专注于他们的利润。"
 zaibatsu.2.f: "高管们陆续进入[SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]总部顶楼的会议室。[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]是继秘书之后第三位到的。[SCOPE.sCharacter('name_a_scope').GetSheHe|U]在门旁的位置坐下，看着上级们经过。[SCOPE.sCharacter('name_a_scope').GetHerHis]面前那杯茶升起一缕微弱的水汽。\n\n[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting]最后一个进来。[SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis|U]把目光依次从每位员工身上扫过。[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]发现，男爵眼里露出一种[SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis]从未见过的神色——疲惫。[SCOPE.sCharacter('relevant_zaibatsu_exec').GetHerHis]脸上的阴影似乎比往日更深，银发也更稀疏了。"
 zaibatsu.2.a: "主权只能归属我们。"
 zaibatsu.2.b: "告诉人民——[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]绝不会被收买。"
