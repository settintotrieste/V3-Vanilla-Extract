 ep2_meiji_pulse.1.t: "切舍御免"
 ep2_meiji_pulse.1.d: "在[SCOPE.sState('relevant_treaty_port_state').GetName]旅行期间，一名[SCOPE.sCountry('relevant_gp').GetAdjective]商人因在[SCOPE.sCharacter('daimyo_scope').GetFullName]经过时拒绝下马，被其随从杀死。[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]藩的大名声称，根据切舍御免特权，他有权斩杀任何不尊重自己的平民。"
 ep2_meiji_pulse.1.f: "洋人冲破了火枪队的阵列，四方杀声骤起。为首洋人察觉周遭武装武士，猛勒缰绳令坐骑急转，险些将一名火枪兵撞落马下。[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]拔刀出鞘，内圈同袍随之而动。\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]挥出第一击，在闯入者肋侧划开血口。对方惨叫着再次猛拉缰绳，却已是徒劳。最近的火枪兵抽出佩刀横扫，一道血弧如赤云悬空。"
 ep2_meiji_pulse.1.a: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')]藩只想给我们制造麻烦。"
 ep2_meiji_pulse.11.t: "[SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]事件"
 ep2_meiji_pulse.11.d: "在[SCOPE.sCountry('japan_scope').GetName]经商期间，一名名叫[SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting]的[ROOT.GetCountry.GetAdjectiveNoFlag]商人被当地领主[SCOPE.sCharacter('daimyo_scope').GetFullName]杀害。该领主声称，根据[SCOPE.sCharacter('daimyo_scope').GetHerHis]领地的法律，[SCOPE.sCharacter('daimyo_scope').GetHerselfHimself]的行为是正当的，并拒绝为[SCOPE.sCharacter('daimyo_scope').GetHerHis]的罪行支付任何赔偿。"
 ep2_meiji_pulse.11.f: "#b 社论#!\n\n值此局势，我们重申[ROOT.GetCountry.GetNameNoFormatting]别无选择，唯有积极准备大战，或与日本永别。放弃已在彼处获得的立足之地绝不可取，故两大帝国间冲突或可预见。诸多[SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')]不喜此念，然[ROOT.GetCountry.GetCapital.GetCityHubName][SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]认为此举不仅无可避免，且合情合理——仅因日方拒绝惩处[SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]遇刺案凶犯……（#italic 转第二版#!）" #largely copied from The Anglo-Japanese War, New York Times, 1863
 ep2_meiji_pulse.11.a: "必须#italic 有人#!为此付出代价。把此事提交给大君处理。"
 ep2_meiji_pulse.11.b: "我们真的想在东方越陷越深吗？"
