 shogunate_strategy_title_revise_loc: "修改改革策略"
 shogunate_strategy_title_decide_desc_loc: "德川家若想延续权力，幕府必须进行改革。这种改革可以沿两个方向推进——将军可以通过与朝廷合体来恢复幕府的合法性，或者推动在可控范围内恢复天皇权力，使自己成为议会政府的首脑。"
 shogunate_strategy_title_revise_desc_loc: "将军当前的改革策略未必有益。尽管改变方向会付出代价，但继续坚持一条失败的道路显然并非上策。"
 je_meiji_restoration_proclaim_imperial_restoration: "请求大政奉还"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "天皇仍然是日本的君主。没有皇权的认可，将军不过是数百名大名中最强的一位。幕府的存亡——或其覆灭——都将取决于朝廷的意志。"
 imperial_restoration_kobu_gattai_loc: "若要结束这场危机，幕府与朝廷必须实现联合。必须让各藩大名相信，将军的命令就是皇命，将军拥有朝廷的完全信任。为了达成这一目标，将军必须先暴露自己的软肋，并依赖天皇重新确立其权威。\n\n这样的计划如同孤注一掷——如果朝廷不愿合作，德川家将被怀恨在心的敌人包围，孤立无援。"
 imperial_restoration_kogi_yoron_loc: "若要结束这场危机，天皇必须亲政。为了保留德川家的权力，将军必须按照自己的条件，在改革的最后一步将行政权归还给天皇，并在改革后的帝国政府中为其家族确立新的地位。\n\n这样的计划如同孤注一掷——如果朝廷不愿合作，德川家将被怀恨在心的敌人包围，孤立无援。"
 je_meiji_restoration_imperial_marriage: "安排皇室婚姻"
 je_meiji_restoration_imperial_marriage_desc: "#b 公武合体#!的政治构想需要最为实质的联合形式——现任$RULER_TITLE_SHOGUN$与皇室公主缔结政治联姻。想要达成这一结合，$RULER_TITLE_SHOGUN$必须准备好接受朝廷提出的各项实质性要求。"
