 shogunate.1.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName]的任命" # Ieyoshi
 shogunate.1.d: "作为[SCOPE.sCharacter('shogun_scope').GetLastName]氏的新任家主，[SCOPE.sCharacter('shogun_scope').GetFullName]已经被天皇任命为征夷大将军。许多[SCOPE.gsInterestGroup('daimyo_scope').GetName]对这位新上任的征夷大将军颇有微词，认为他尚未确立个人权威。"
 shogunate.1.f: "服饰颜色各异的大名们穿过大广间。最高的台座上坐着征夷大将军，身着黑红相间的服饰，他的右侧摆放着装有天皇诏书的匣子。\n\n身着红、蓝、紫色服饰的贵族们依次在他面前俯首，献上刀剑与黄金礼品。将军肃穆不语，行礼的人们同样保持沉默。那些身份较低的按礼规禁止亲见将军，他们拥挤在殿外，庭院中响起齐声呼喊。"
 shogunate.1.a: "御升进，御升进！"
 shogunate.2.t: "继承问题"
 shogunate.2.d: "[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle]的长子[SCOPE.sCharacter('iesada_scope').GetFirstName]体弱多病，引发外界担忧他是否有能力履行[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle]的职责。以[SCOPE.sCharacter('armed_forces_leader').GetFullName]为首的外样大名已经联合起来，支持[SCOPE.sCharacter('yoshinobu_scope').GetFullName]作为替代人选。"
 shogunate.2.f: "[SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting]的卧室空无一人。隔扇紧闭，走廊也已清空。[SCOPE.sCharacter('armed_forces_leader').GetSheHe|U]坐在榻边，面对着一张用于草拟文书的空白和纸。[SCOPE.sCharacter('armed_forces_leader').GetHerHis|U]双眼紧闭，哪怕有猫从隔壁走廊走过，[SCOPE.sCharacter('armed_forces_leader').GetSheHe]也一定能听见——可[SCOPE.sCharacter('armed_forces_leader').GetHerHis]仍然心疑于有人在偷听的可能。在这般大权交接的早期敏感阶段，最好将自己的野心牢牢藏在心中。\n\n朝廷会和[SCOPE.sCharacter('armed_forces_leader').GetHerHim]持相同看法吗？[SCOPE.sCharacter('armed_forces_leader').GetSheHe|U]有理由相信如此，但这显然只是最简单的问题。[SCOPE.sCharacter('armed_forces_leader').GetHerHis|U]陷入沉思。如何才能顺利获取朝廷的旨意？如何才能确保这份旨意不会被暗中销毁、无从寻觅？"
 shogunate.2.a: "[GetLawType('law_bakufu').GetName]亲藩的势力将会如愿以偿。"
 shogunate.2.b: "当前局势需要善断的领袖。"
 shogunate.3.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName]的任命" # Iesada
 shogunate.3.d: "作为[SCOPE.sCharacter('shogun_scope').GetLastName]氏的新任家主，[SCOPE.sCharacter('shogun_scope').GetFullName]已被天皇任命为征夷大将军。这位自幼体弱的将军的健康状况已引发一场围绕继承权的角逐。"
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "御升进，御升进！"
 shogunate.4.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName]的任命" # Yoshinobu
 shogunate.4.d: "作为[SCOPE.sCharacter('shogun_scope').GetLastName]氏的新任家主，[SCOPE.sCharacter('shogun_scope').GetFullName]已被天皇任命为征夷大将军。改革派藩阀对新任将军寄予厚望。"
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "御升进，御升进！"
 shogunate.5.t: "一桥派与南纪派"
 shogunate.5.d: "围绕将军家庆继任问题形成的各派势力，再次因无嗣的[SCOPE.sCharacter('shogun_scope').GetFullName]的继承人选爆发冲突。由外样大名与下层[SCOPE.gsInterestGroup('armed_forces_ig').GetName]势力组成的一桥派支持[SCOPE.sCharacter('yoshinobu_scope').GetFullName]，而由谱代[SCOPE.gsInterestGroup('daimyo_ig').GetName]组成的南纪派则支持[SCOPE.sCharacter('iemochi_scope').GetFullName]。"
 shogunate.5.f: "信使面无表情，目光钉在高台之上那人身前的地面上，手中的毛笔悬于纸面，静待笔录。\n\n“这是传予庆胜大人的口信。”奉行沉声吩咐，“近来藩府之内，多有妄议将军近况者，言语失度。众人妄加揣测，形同将军口已失言。但凡有依此等流言草拟的文书传出，你即刻前来向我禀报。”"
 shogunate.5.a: "将军之意是由[SCOPE.sCharacter('iemochi_scope').GetFirstName]继位。"
 shogunate.5.b: "朝廷需要一位经验丰富的继承人。"
 shogunate.6.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName]的任命" # Iemochi
 shogunate.6.d: "作为[SCOPE.sCharacter('shogun_scope').GetLastName]氏族的新任家主，[SCOPE.sCharacter('shogun_scope').GetFullName]已被天皇任命为征夷大将军。尽管年少，这位将军早已以冷静而严谨的决断闻名。"
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "御升进，御升进！"
 shogunate.6.a_regency: "[SCOPE.sCharacter('shogun_scope').GetSheHe|U]将在忠诚的监护人的辅佐下执政。"
 shogunate.6.b_regency: "与一桥派妥协——任命[SCOPE.sCharacter('yoshinobu_scope').GetFirstName]为[SCOPE.sCharacter('shogun_scope').GetHerHis]的监护人。"
 shogunate.7.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName]的任命" # Iesato
 shogunate.7.d: "作为[SCOPE.sCharacter('shogun_scope').GetLastName]氏族的新任家主，[SCOPE.sCharacter('shogun_scope').GetFullName]已被天皇任命为征夷大将军。这位将军见多识广、思想开明，人们期待他会扶持[GetLawType('law_bakufu').GetName]中的改革派势力。"
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "御升进，御升进！"
 shogunate.8.t: "炎夏"
 shogunate.8.d: "盛夏的酷热使年迈的[SCOPE.sCharacter('shogun_scope').GetFullName]健康状况急剧恶化。[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle]如今卧病在床，必须与衰竭的心脏进行最后一场殊死搏斗。"
 shogunate.8.f: "将军的床被移到窗前。仆人们本指望从海上吹来的凉风，配合上手中的扇子，能稍微减轻暑气。床尾摆着一只打开的冰匣，他的额头上覆着湿布。\n\n今天没有风。燥热的空气在落日下翻涌。闷热而无情，笼罩一切。他已看不清下方海浪的形状。"
 shogunate.8.a: "此乃终结。"
 shogunate.8.b: "派人请荷兰医生前来诊治。"
