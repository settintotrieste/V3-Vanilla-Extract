 ep2_meiji.1.t: "尊王攘夷"
 ep2_meiji.1.d: "锁国的结束激起了人们面对外国侵入时的无力感，从而削弱了[ROOT.GetCountry.GetRuler.GetLastName]家的权威。幕府的敌人以#italic 尊王攘夷#!的口号集结。"
 ep2_meiji.1.f: "在京都一家客栈的二楼，远离窗户的位置，十几名身着黑衣的浪人围坐在一张桌子旁。屋外，大雨倾盆而下，淹没了街上的所有声响。他们之间传来愤怒的低语——先是抱怨，接着是谴责，最后是立誓和对闯入者发出的死亡判决。\n\n远处，在一座俯瞰着磯的宅邸中，一名身穿绿色和服的男子凝视着一道升向天空的烟柱。山丘在海岸边的建筑上投下长长的影子。随着太阳接近地平线，下方熔炉的火光变得越来越显眼。在那火光之外，水面上倒映的，他能看到水面上船只的灯光。他希望，有朝一日，自己的大炮能将那些船只驱离至地平线外。"
 ep2_meiji.1.a: "我们必须适应新的环境。"
 ep2_meiji.2.t: "幕府的形态"
 ep2_meiji.2.d: "幕府改革者在两种治理理论之间分裂。#italic 公武合体#!理论试图通过与朝廷融合来恢复[GetLawType('law_bakufu').GetName]的合法性，而公议舆论理论则试图建立一个以[SCOPE.sCharacter('shogun_scope').GetLastName]家为首的议会制度。"
 ep2_meiji.2.f: "主人将一盘干菓子摆在桌上，并为每位客人斟上一碗薄茶。三人围坐桌旁，主人与第一位客人束着丁髷，第二位则是短发。蒸汽从他们面前的茶碗中袅袅升起。\n\n主人将目光投向那位短发男子，开口说道。\n\n“恭喜你归来，[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]#italic 君#!。我发现你寄来的每一封信都比上一封更有意思。能否为我们多讲讲你与那些蛮夷相处的经历？”"
 ep2_meiji.2.a: "幕府必须复兴。"
 ep2_meiji.2.b: "公开议政才是开明之道。"
 traditionalist_shogun_warning_tt: "@warning![GetIdeology('ideology_traditionalist').GetName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]将不愿意推行#b 公议政体#!"
 traditionalist_shogun_warning_present_tt: "[concept_ruler]#b 没有#![GetIdeology('ideology_traditionalist').GetName][concept_ideology]"
 ep2_meiji.3.t: "皇室婚姻"
 ep2_meiji.3.d: "天皇已同意让[SCOPE.sCharacter('shogun_scope').GetFullName]与皇女[SCOPE.sCharacter('imperial_princess_scope').GetFullName]联姻，条件是将军废除[SCOPE.sTreaty('relevant_treaty_scope').GetName]并恢复锁国政策。"
 ep2_meiji.3.d2: "天皇已同意让[SCOPE.sCharacter('shogun_scope').GetFullName]与皇女[SCOPE.sCharacter('imperial_princess_scope').GetFirstName]联姻，条件是将军驱逐外国人并恢复锁国政策。"
 ep2_meiji.3.f: "队伍几乎覆盖了整个中山道。一支由三万名劳工、随从与公主侍从组成的行列，在尾张藩士兵的外围护卫下，从饭岛町一直延伸到盐尻宿。队伍中央，公主端坐在一顶由金与红色丝绸装饰的轿中。其旁随行的是来自十余个藩的武士——[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]与[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]，[SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')]与[SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')]，[SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')]与[SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')]。\n\n轿中，公主透过帘幕间的一道细缝向外张望。一座又一座城镇从眼前掠过，门窗紧闭，寂静无声。接下来的三十#italic 里#!路，将足够她反复思索自己的命运。"
 ep2_meiji.3.a: "为了国家的利益。"
 has_broken_relevant_treaty_tt: "已废除[SCOPE.sTreaty('relevant_treaty_scope').GetName]"
 ruler_does_not_have_imperial_marriage_tt: "[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName]已去世或退位"
 je_meiji_imperial_marriage: "皇室婚姻"
 je_meiji_imperial_marriage_reason: "为了实现公武合体，征夷大将军[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName]与皇女[SCOPE.sCharacter('imperial_princess_scope').GetFirstName]缔结了政治联姻。天皇同意这桩婚姻的前提，是将外国人逐出[GetGeographicRegion('geographic_region_home_islands').GetName]，并恢复锁国政策。\n\n若将军履行[SCOPE.sCharacter('imperial_marriage_ruler').GetHerHis]的承诺，这场婚姻将极大弥合日本名义统治者与实际统治者之间的裂痕。"
 je_will_fail_tt: "该[concept_journal_entry]将#b 失败#!"
 je_has_timed_out_tt: "该[concept_journal_entry]已#b 超时#!"
 ep2_meiji.4.t: "[ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')]战争"
 ep2_meiji.4.d: "因领地与头衔被剥夺而愤懑不平的[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle][SCOPE.sCharacter('shogun_scope').GetFullName]带领[SCOPE.sCharacter('shogun_scope').GetHerHis]的忠诚家臣起兵反抗朝廷。[SCOPE.sCharacter('shogun_scope').GetSheHe|U]试图逆转王政复古，并恢复幕府统治。"
 ep2_meiji.4.f: "“臣[SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting]谨自去月九日以来惶恐奉察朝廷事体，一一皆无朝廷之真意，而全然出自[SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting]大夫奸臣等人之阴谋，天下之所共知，殊以江户、长崎、野州、相州处处乱妨。\n\n此等乱行既已为天人所共憎，恳请御裁引渡前文一众奸臣，万一此请不获采用，不得不对其加以诛戮。”" # Edited petition by Yoshinobu
 ep2_meiji.4.a: "此乃吾等之愿：诛杀奸臣，恢复太平。" # Emperor Meiji's plausibly fraudulent imperial decree of 1867
 ep2_meiji.4.b: "天皇已受奸贼挟持。"
 ep2_meiji.41.d: "[SCOPE.sCharacter('shogun_scope').GetLastName]家维持权力的举措激怒了一些主张大政奉还的藩领，他们联合起来反抗[SCOPE.sCharacter('shogun_scope').GetFullName]，试图恢复天皇的政治主导地位，以摆脱德川家的影响。"
 ep2_meiji.41.d_1: "[ROOT.GetCountry.GetCapital.GetCityHubName]政府拒绝驱逐夷人的举措激怒了一些主张尊王攘夷的藩领，他们联合起来发动叛乱，试图废除天皇的西化顾问，并将外国势力驱逐出日本。"
 ep2_meiji.41.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]立于城墙之上，俯视下方。在他面前，一列列[SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')]的士兵正从城门鱼贯而出。有些士兵已完成现代化改造，身着深蓝色新式军服，戴着圆锥形头盔；另一些则仍穿着传统服饰——红、绿、蓝相间。身着新军服者被安排在队伍最前列，站在[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]左侧数米处的一群外国观察者对他们投以赞许的目光。其后是手持步枪的骑乘武士，再往后则是炮兵。\n\n他们的集结地在[SCOPE.sState('revolter_state').GetCityHubName]的郊外，他们将在那里与藩国盟友的部队会合，一同进军对抗将军的军队。远方被囚禁的天皇在那片刀剑与刺刀构成的壁垒之后正等待着。"
 ep2_meiji.41.f_1: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]立于城墙之上，俯视下方。在他面前，一列列[SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')]的士兵正从城门鱼贯而出。有些士兵已完成现代化改造，身着深蓝色新式军服，戴着圆锥形头盔；另一些则仍穿着传统服饰——红、绿、蓝相间。身着新军服者被安排在队伍最前列，之后是彩虹般的三彩羽织。其后是手持步枪的骑乘武士，再往后则是炮兵。\n\n他们的集结地在[SCOPE.sState('revolter_state').GetCityHubName]的郊外，他们将在那里与藩国盟友的部队会合，一同进军对抗将军的军队。远方被囚禁的天皇在那片刀剑与刺刀构成的壁垒之后正等待着。"
 ep2_meiji.41.a: "必须击退这些狂徒。"
 ep2_meiji.41.b: "尊王攘夷！"
 kinmon_civil_war_tt: "[ROOT.GetCountry.GetName]将陷入#b 幕府#!与#b 朝廷#!对抗的#r $concept_civil_war$#!"
 ep2_meiji.5.t: "大政奉还"
 ep2_meiji.5.d: "面对[GetLawType('law_bakufu').GetName]反对者日益增长的压力，[SCOPE.sCharacter('shogun_scope').GetFullName]已向天皇上奏，请求将[SCOPE.sCharacter('shogun_scope').GetHerHis]的统治权归还朝廷。"
 ep2_meiji.5.f: "“若朝权不申出于一途，而纲纪难立。故改从来之旧习，政权奉归于朝廷。\n\n既广尽天下之公议，一仰圣断，若能同心协力共仕保护皇国，必可与海外万国并立。”\n\n——德川庆喜，1867年"
 ep2_meiji.5.a: "他脚下已空无一物。"
 ep2_meiji.51.t: "天皇敕裁"
 ep2_meiji.51.d: "天皇已对[SCOPE.sCharacter('shogun_scope').GetFullName]请求归还统治权的奏请作出回应。将军的请求已被接受，天皇的政治至上权得以恢复。"
 ep2_meiji.51.f: "“日本国天皇告诸外国帝王及其臣人：向者将军[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting]请归政也，制允之，内外政事亲裁之。乃曰：从前条约，虽用大君名称，自今而后，当换以天皇称，而诸国交接之职，专命有司等。各国公使谅期旨。”"
 ep2_meiji.51.a: "令人激动得发抖。"
 ep2_meiji.52.t: "天皇敕裁"
 ep2_meiji.52.d: "天皇已对[SCOPE.sCharacter('shogun_scope').GetFullName]请求归还统治权的奏请作出回应。回应称将军仍受朝廷信任，因此统治权仍可继续由幕府掌握。"
 ep2_meiji.52.f: "[ROOT.GetCountry.GetCustom('japan_choshu_castle_name')]城中回荡着靴声。整日以来，信使与家臣进进出出，带来对过去一周新闻愈发详尽的叙述。[SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting]亲自接见他们，在每次会面中始终沉默。他的眉头随着消息的发展愈发沉重——将军凯旋入城的行列、会津藩守卫着皇宫。\n\n宫殿外，夕阳已落。从台上望去，[SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting]看向聚集的二十名家臣。“长州藩不会屈服，”[SCOPE.sCharacter('choshu_daimyo_scope').GetSheHe]说道。“务必牢记这一点。”\n\n他说完起身，离开了房间。"
 ep2_meiji.52.a: "枝柯相护，根本得安。"
 ep2_meiji.6.t: "王政复古大号令"
 ep2_meiji.6.d: "朝廷中的[SCOPE.sCharacter('shogun_scope').GetLastName]家反对者说服天皇发布敕令，正式恢复其自身权力。该敕令废除幕府，并建立一个将[SCOPE.sCharacter('shogun_scope').GetFullName]排除在任何官职之外的政府。"
 ep2_meiji.6.f: "“[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting]返上从前委任之大政，辞退将军职之两条，今已断然获御准。未曾有之国难，先帝频年受恼之宸襟次第，众庶之所知。依之所决睿虑，王政复古，为奠立挽回国威之基。\n\n自今，摄、关、幕府等废绝；即今，先假置总裁、议定、参与之三职。缙绅武弁堂上地下之无别，竭至当之公议，”" #- Modifier text of the Great Proclamation of the Restoration of Imperial Rule
 ep2_meiji.6.a: "茕茕孑立于黑暗之中。"
 ep2_meiji.7.t: "大君"
 ep2_meiji.7.d: "由于朝廷缺乏实际治理的手段，朝廷中[SCOPE.sCharacter('shogun_scope').GetLastName]家的盟友说服天皇授予[SCOPE.sCharacter('shogun_scope').GetFullName]“大君”称号，使[SCOPE.sCharacter('shogun_scope').GetHerHim]成为帝国机构的首脑。"
 ep2_meiji.7.f: "“若乍然召之诸侯，逐渐会合，亦可成众议。诠其所处：方今时势，人情所注，则公议之事，人口脍炙，舆论如何，无不与之，此乃不得已之势也。是以伏愿有所处置，尽力使议论一致，并会议之趣意得以成立。\n\n万一议论之间，龃龉相起，争衅相开，则纵然成就御家之胜利，当此外有外国之時，可与兄弟阋于墙之义相当也。”\n\n——西 周助《议题草案》"
 ep2_meiji.7.a: "再次站稳脚跟。"
 ep2_meiji.8.t: "朝廷与幕府"
 ep2_meiji.8.d: "通过与皇室联姻，并履行[SCOPE.sCharacter('shogun_scope').GetHerHis]对天皇的承诺，[SCOPE.sCharacter('shogun_scope').GetFullName]缓和了朝廷与幕府之间的紧张关系。天皇得以继续[SCOPE.sCharacter('emperor_scope').GetHerHis]的隐居生活，确信将军会维持长久的和平。"
 ep2_meiji.8.f: "纵有暴风起，\n肆虐横行全国中，\n我将静待之，\n还回太阳于苍穹，\n恢复其本初光明。\n\n——孝明天皇"
 ep2_meiji.8.a: "风暴已经结束。"
 ep2_meiji.9.t: "同侪之首"
 ep2_meiji.9.d: "凭借自信与高明的手腕，[SCOPE.sCharacter('taikun_scope').GetFullName]既完成了天皇权力的恢复，也保全了[SCOPE.sCharacter('taikun_scope').GetHerHis]的家族。[SCOPE.sCharacter('taikun_scope').GetLastName]家的大君将作为现代$JAP$贵族之中的第一人掌控权力。"
 ep2_meiji.9.f: "天皇不再端坐于屏风之后。群臣列坐于御前长案两侧，大君居左。众人身着新制朝服，袖襟饰以繁复金纹。勋章在众人调整不适应的坐姿时发出窸窣轻响。\n\n大君主持讨论已逾一个时辰，天皇始终未发一言。他静心倾听，逐一注视每位发言者。房间另一端，一位曾经的#italic 尊王攘夷#!拥护者正陈词阐述遣使出访美国的必要性。"
 ep2_meiji.9.a: "将军陨落，大君崛起。"
 ep2_meiji.9.b: "天皇乃天神之子，德川家则为其器。"
