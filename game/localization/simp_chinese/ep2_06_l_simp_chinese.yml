l_simp_chinese:
 japan_earthquakes.1.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')]大地震"
 japan_earthquakes.1.d: "在四天时间里，海岸线外发生了三次地震，对大片地区造成了破坏，随后发生的海啸更是加剧了地震对沿海地区的影响。"
 japan_earthquakes.1.f: "没过多久，整个村子的人都注意到这一异象。显然，之前地面的震动没人察觉到，但所有人都被海水的退去惊吓住。人们纷纷奔向海边，甚至越过海滩去围观。在活着的人的记忆中，这片海岸从未出现过如此巨大的退潮。一片片从未暴露过的、布满沙纹的海床，一道道布满海藻的岩石，赤裸裸地呈现在滨口的注视下。底下的人群似乎没有人猜出这异乎寻常的退潮意味着什么。\n\n——小泉八云，#italic 《生神》#!"
 japan_earthquakes.1.a: "要求邻近大名协助。"
 japan_earthquakes.1.b: "让当地统治者负责救灾工作。"
 earthquake_assisting_daimyo: "协助邻近大名"
 earthquake_affected_daimyo: "地震余波"
 japan_earthquakes.2.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')][SCOPE.sState('japan_earthquake_state').GetCityHubName]地震"
 japan_earthquakes.2.d: "一场大地震袭击了[SCOPE.sState('japan_earthquake_state').GetName]沿海一带，对[SCOPE.sState('japan_earthquake_state').GetCityHubName]和这里的城堡造成了大范围破坏。"
 japan_earthquakes.2.f: "地震后，鲶绘最初开始流行时，其内容似乎与传统故事相符。画中，这头巨兽被神明制服，以防它引发更多地震。\n\n然而，随着时间推移，这些版画的描绘发生了变化。有一幅版画中，大鲶剖开自己的腹部，一枚枚钱币流淌而出。另一幅则描绘建筑工人与它共饮。一种讽刺的意味悄然渗入这些作品，暗示尽管这头巨兽带来了灾难，但或许它也在纠正某些事情。"
 japan_earthquakes.2.a: "我们在[SCOPE.sState('japan_earthquake_state').GetCityHubName]的封臣需要帮助！"
 japan_earthquakes.2.b: "财富必须流向能够重建的人们。"
 earthquake_vassal_support: "支持封臣"
 earthquake_rebuilding_focus: "震后重建"
 earthquake_rebuilding_redistribution: "匡正世界"
 japan_earthquakes.3.t: "浓尾地震"
 japan_earthquakes.3.d: "一场大地震袭击了[ROOT.GetCountry.GetName]的中心地带，导致数千人死亡，整个地区出现了异常巨大的断层裂缝。"
 japan_earthquakes.3.f: "“人类的反应总是将灾难视为罪行，常常追问‘是谁干的’，由此催生了神话中众多被认为藏于地震背后的怪物与恶魔。\n\n现代地震学家必须摒弃迷信，但讽刺的是，有时其自身却成了调查犯罪现场的警探角色。哪些物体倒塌了？它们是如何倒塌的？所有这些问题最终追求的不是‘是谁’，而是‘如何’与‘为何’。”"
 japan_earthquakes.3.a: "邀请外国学者研究这些断层。"
 japan_earthquakes.3.b: "利用这些知识建立更多的气象观测站。"
 japan_earthquakes.3.c: "做好余震准备。"
 meteorological_observatories: "气象观测站"
 meteorological_observatories_cost: "$meteorological_observatories$"
 earthquake_bracing_for_aftershocks: "余震防备"
 japan_earthquakes.4.t: "三陆地震"
 japan_earthquakes.4.d: "一场由三陆外海地震引发的大海啸袭击了[SCOPE.sState('japan_earthquake_state').GetName]。在其毁灭性影响之后，人们建议竖立纪念碑以警示未来的海啸。"
 japan_earthquakes.4.f: "“为逝者建立纪念碑是不够的。生者也不需要这样的提醒来铭记降临在他们身上的灾难。任何在石碑中读到信息的人都将明白，祖先正向他们诉说一些绝不能被遗忘的事情。这些纪念碑是为那些尚未出生的人而立的。”"
 japan_earthquakes.4.a: "[SCOPE.sState('japan_earthquake_state').GetName]需要此类纪念碑。"
 japan_earthquakes.4.b: "在遭遇海啸的所有地方立起这些石碑！"
 japan_earthquakes.4.c: "我们必须将精力集中于当下。"
 tsunami_stones: "海啸石"
 tsunami_relief_efforts: "海啸救援努力"
 japan_earthquakes.5.t: "关东大地震"
 japan_earthquakes.5.d: "一场人们此生仅见的特大地震袭击了[SCOPE.sState('japan_earthquake_state').GetCityHubName]附近地区。几分钟内，这场灾难便夷平了城市的大部分区域，导致十余万人丧生。"
 japan_earthquakes.5.f: "如果说地震后袭来的水墙看似是最大的威胁，那它与随后的大火相比便不值一提。很快，不仅整座城市陷入火海，连大地和风都仿佛燃烧了起来。\n\n那些侥幸从着火建筑中逃出的人，却被火龙卷困住，好像这场大火决心不留下一个活口。[SCOPE.sState('japan_earthquake_state').GetCityHubName]已化为一幅地狱的景象。"
 japan_earthquakes.5.a: "日本人民必须团结起来，共同对抗这场灾难！"
 japan_earthquakes.5.b: "这对物质财富的重创，是对堕落腐化的警示。"
 japan_earthquakes.5.c: "我们必须利用这个机会，重建一个更加现代的[SCOPE.sState('japan_earthquake_state').GetCityHubName]。"
 earthquake_national_tragedy: "全国哀悼"
 earthquake_divine_punishment: "神罚"
 earthquake_modernization: "现代化重建"
 earthquake_modernization_land_confiscation: "土地重整"
 shinbutsu_bunri_decision: "$je_shinbutsu_bunri$"
 shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$"
 elevate_buddhism_decision: "$je_elevate_buddhism$"
 elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$"
 je_shinbutsu_bunri: "神佛分离"
 je_shinbutsu_bunri_reason: "天皇权力恢复后，我们需要辨明并弘扬那些视皇室为神圣的本土宗教传统。为了实现这一点，必须将其与外来的佛教影响分离，斩断其通过融合传统数百年来与神灵崇拜建立的千丝万缕的联系。利用对佛教机构勾连幕府的不满，我们可以为神道教开路，使其成为更高的指导原则。"
 je_taikyo_proclamation_button: "大教宣布"
 je_taikyo_proclamation_button_desc: "让神道教、对神的崇拜和对天皇的敬仰成为国家的原则。"
 je_taikyo_proclamation_conversion_tt: "所有[concept_interest_group]领袖有#v 75%#!概率皈依[GetReligion('shinto').GetName]。"
 je_elevate_buddhism: "弘扬佛教"
 je_elevate_buddhism_reason: "$JAP$的佛教机构与幕府的行政部门有着密切的历史联系。在延续了幕府之后，加强这些机构能帮助我们维持幕府权力，使$JAP$的宗教传统远离天皇崇拜。"
 je_elevate_buddhism_goal: "$je_communism_2_goal$"
 arahitogami: "现人神"
 extended_danka_system: "扩展檀家制度"
 japan_religion.1.t: "神宫寺"
 japan_religion.1.d: "在神宫寺，佛教僧侣混合佛教和神道教仪式的行为十分常见。在神佛分离之后，这些僧侣的职责受到了质疑。"
 japan_religion.1.f: "“这些仪式想干什么？引导神灵开悟？为了消除业力？很明显这是在暗指神灵不值得崇拜，他们不过是需要指引的迷失者。决不能再容许此等暗示！”"
 japan_religion.1.a: "要求僧侣皈依，成为神道教的神官。"
 japan_religion.1.b: "剥夺僧侣的头衔。"
 japan_religion.1.c: "允许僧侣继续他们的职责。"
 forced_monk_conversions: "强迫僧侣改信"
 monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$"
 monks_stripped_of_titles: "僧侣被剥夺头衔"
 monks_left_to_duties: "允许僧侣继续其职责"
 japan_religion.1.a.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%][GetPopType('clergymen').GetName]会皈依[GetReligion('shinto').GetName]"
 japan_religion.2.t: "本地垂迹"
 japan_religion.2.d: "佛陀在日本以神的身份显现，这一观点广为流传，被称为[concept_gongen]。此类术语强化了佛教的影响力。"
 japan_religion.2.f: "“它确实曾经有其意义。天照是太阳，大日如来、毗卢遮那佛是太阳。然而，太阳并未分裂，也不是其他神灵的光芒显现。她依仗自己的权能独自发光。今天，[ROOT.GetCountry.GetNameNoFormatting]只能有一个太阳。”"
 japan_religion.2.a: "禁止[concept_gongen]这一概念。"
 japan_religion.2.b: "禁止将八幡神称为[concept_boddhisattva]。"
 japan_religion.2.c: "不干预相关称谓规制。"
 banned_syncretic_terminology: "禁止综摄术语"
 retained_syncretic_terminology: "保留综摄术语"
 japan_religion.2.a.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%][GetPopType('farmers').GetName]会皈依[GetReligion('shinto').GetName]"
 japan_religion.2.b.tt: "[GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%][GetPopType('soldiers').GetName]会皈依[GetReligion('shinto').GetName]"
 japan_religion.3.t: "为你而鸣"
 japan_religion.3.d: "削弱佛教影响力的尝试已经激起了普遍的反佛教情绪。寺庙财产被没收和破坏，其中一些被彻底摧毁，而另一些则被拆除了佛像。"
 japan_religion.3.f: "走近神社时，他停住了脚步。入口处原本镇守的两尊仁王——力士般的佛像，已经被移走了。原处什么也没有留下。\n\n他走进神社内部，一种感觉始终萦绕不去：尽管此地依然洁净，但它已不再像从前那样安全。一座无人守卫的门。"
 japan_religion.3.a: "把寺钟熔炼成大炮！"
 japan_religion.3.b: "拆除寺院的佛像。"
 japan_religion.3.c: "不要动这些寺院。"
 smelted_temple_bells: "熔炼寺钟"
 smelted_temple_bells_opinion: "$smelted_temple_bells$"
 removed_buddha_statues: "移除佛像"
 removed_buddha_statues_opinion: "$removed_buddha_statues$"
 retained_buddhist_iconography: "保留佛教偶像"
 japan_religion.4.t: "神道事务局"
 japan_religion.4.d: "标准化神道教实践、并将国家神明纳入地方仪轨的尝试，遭到了地方僧侣与神社宫司的抵制，他们认为这些教义背离了传统。"
 japan_religion.4.f: "“神道并非仅仅是延续全国神社里那些受外来影响而混乱不堪、掺杂异质的的现有仪式和惯例。天皇后裔的皇室传统，必须在全[ROOT.GetCountry.GetNameNoFormatting]范围内传授，以使神道教回归其纯粹形式。”"
 japan_religion.4.a: "推行国家的阐释。"
 japan_religion.4.b: "本地宫司最了解适合当地仪式的做法。"
 standardized_priest_training: "标准化宫司训练"
 standardized_priest_training_opinion: "$standardized_priest_training$"
 deferred_to_local_priests: "本地宫司自决"
 deferred_to_local_priests_opinion: "$deferred_to_local_priests$"
 japan_religion.5.t: "儒家与神道"
 japan_religion.5.d: "在神佛分离的过程中，儒教的地位也受到了质疑。不少学者认为该思想与神道高度契合，另一些人则将其视为另一种外来影响而不予考虑。"
 japan_religion.5.f: "“儒教或许与佛教经由相似的途径传入，但这一思想与神道信仰并无矛盾。相反，二者相辅相成，共同涵盖了天地、君臣之道。”"
 japan_religion.5.a: "儒家思想是神道教的重要补充。"
 japan_religion.5.b: "我们必须回归至古老的神道传统。"
 fukko_shinto: "复古神道"
 japan_religion.6.t: "开放国门的基督教"
 japan_religion.6.d: "尽管[ROOT.GetCountry.GetName]已对外国人开放，但宗教仍然受到监管。基督教国家也许认为自由进口其信仰与进口其商品同等重要。"
 japan_religion.6.f: "“基督教最偏爱信徒的死，尤其是为信仰献身的死。每一名被钉上十字架或投入火中的传教士，都成了始于十字架上那人故事里的新一章。或许，是时候停止为他们制造殉道者？”"
 japan_religion.6.a: "必须允许传教士宣扬其信仰。"
 japan_religion.6.b: "可以信，但不能传播。"
 japan_religion.6.c: "基督教曾经是，现在仍是外来威胁。"
 permitted_christianity: "允许基督教"
 christianity_disallowed: "禁止基督教"
 japan_religion.7.t: "法脉传承"
 japan_religion.7.d: "[ROOT.GetCountry.GetName]有着悠久的佛教宗派传统，其中许多宗派至今仍具有影响力。随着[SCOPE.gsInterestGroup('devout_ig').GetName]获得政治权力，一种宗派脱颖而出。"
 japan_religion.7.f: "“几个世纪以来，[ROOT.GetCountry.GetNameNoFormatting]涌现了众多新的佛教流派。没有根据认为其中一派能压制其他派别。然而，当下时局需要领导力与政治方向，而某些宗派很可能比其它宗派更能把握住这一点。”"
 japan_religion.7.a: "净土宗。"
 japan_religion.7.b: "禅宗。"
 japan_religion.7.c: "日莲宗。"
 japan_religion.7.e: "真言宗。"
 pure_land_buddhism: "净土宗"
 zen_buddhism: "禅宗"
 shingon_buddhism: "真言宗"
 japan_religion.8.t: "佛陀之言"
 japan_religion.8.d: "随着[ROOT.GetCountry.GetName]向世界开放，佛教学者对翻译更多外国文本以将他们的思想融入现代佛教表现出兴趣。"
 japan_religion.8.f: "“我们不应让因自我封闭而形成的正统思想束缚自身，也不该畏惧在意料之外的地方发现真理。佛法的教义历经漫漫长路才传到我们这里。研究它走过的路途，以及它可能去往的方向，只会让我们领悟更深。”"
 japan_religion.8.a: "梵语和巴利语文本，佛教的根源。"
 japan_religion.8.b: "汉语文本，与我们自己的宗派思想最接近。"
 japan_religion.8.c: "翻译欧洲哲学著作用于比较研究。"
 japan_religion.9.t: "武僧"
 japan_religion.9.d: "持续的战争引发了[SCOPE.gsInterestGroup('devout_ig').GetName]就佛教在暴力冲突中是否应支持国家的辩论。"
 japan_religion.9.f: "“古代僧侣们毫不犹豫地保卫他们的寺庙。我们应该犹豫是否要保卫我们的国家吗？生命不应被轻视，但[ROOT.GetCountry.GetAdjective]会发动一场不会带来更久和平、不会拯救更多生命的战争吗？”"
 japan_religion.9.a: "建立持久的和平需要武力。"
 japan_religion.9.b: "不害高于一切。"
 war_buddhism: "金刚怒目"
 peaceful_buddhism: "菩萨低眉"
 japan_religion.10.t: "肉食与洋食"
 japan_religion.10.d: "自锁国体制终结以来，面向外国人开设的肉食料理馆在通商口岸日渐普及。[ROOT.GetCountry.GetName]延续已久的肉食禁令因此遭到了前所未有的质疑。"
 japan_religion.10.f: "“您说说看，牛肉可是绝顶好吃的东西对吧？但凡尝过这一口，平日里吃的牡丹、红叶（鹿肉、野猪肉的隐语），全都比不上了。这么干净又好吃的东西，咱们国家以前到底为啥一口都不吃呢？”\n\n——假名垣鲁文，#italic 《安愚乐锅：牛店杂谈》#!"
 japan_religion.10.a: "为营养和饮食文化，应当废除这道禁令！"
 japan_religion.10.b: "绝不允许此种蛮夷习俗蔓延生根！"
 maintained_meat_ban: "维持肉食禁令"
 maintained_meat_ban_opinion: "$maintained_meat_ban$"
 japan_religion.11.t: "神道"
 japan_religion.11.d: "神佛分离政策已取得成效。旧宗教机构的影响力日渐式微，一个虔诚信奉神明、天皇与[ROOT.GetCountry.GetName]的新时代正悄然开启。"
 japan_religion.11.f: "“[ROOT.GetCountry.GetNameNoFormatting]是众多信仰与仪式的家园，既有古老的，也有新兴的。我们的目标并非厚此薄彼、打压某些信仰而推崇另一些，而是要在根深蒂固的信念与不容置疑的真理之间划清界限。”"
 japan_religion.11.a: "神明至高无上。"
 japan_religion.12.t: "中道"
 japan_religion.12.d: "在经历了[ROOT.GetCountry.GetName]动荡的变革时期后，[SCOPE.gsInterestGroup('devout_ig').GetName]已成功重振其作为国家宗教权威的地位，并加强了与[ROOT.GetCountry.GetGovernment.GetName]的联系。"
 japan_religion.12.f: "世人竞言神道。纵其果存，\n亦非凡夫所能践履；夫神圣之途，\n唯神明方能步趋。\n——羽仓东满" # Arthur Lloyd, Poems by Buddhist Priests of Japan
 japan_religion.12.a: "前路已明。"
 japan_religion.13.t: "$je_taikyo_proclamation_button$"
 japan_religion.13.d: "颁布《大教宣布》，将崇拜神祇与尊崇神圣天皇确立为[ROOT.GetCountry.GetAdjective]国家的根本原则及国民之义务。"
 japan_religion.13.f: "“一，当体敬神爱国之旨。”\n\n“二，当明辨天理人道。”\n\n“三，当奉戴皇上，遵守朝旨。”"
 japan_religion.13.a: "必须让全国上下都听到他们的声音！"
 concept_gongen: "权现"
 concept_gongen_desc: "化身为神灵的佛陀，将本土神祇与佛教觉悟引导者相结合。"
 concept_boddhisattva: "菩萨"
 concept_boddhisattva_desc: "在佛教中，一位已证悟并教导他人达到涅槃的觉者和导师。"
