l_simp_chinese:
 je_sakoku: "锁国"
 je_sakoku_reason: "自宽永年代和德川幕府创立初期起，$JAP$便一直是一个对外封闭的国家，仅允许在少数指定港口与少数几个国家进行少量贸易。尽管这一制度已延续了两个多世纪，但世界正在发生变化，使日本难以维持其封闭状态，即使$JAP$国内利益集团希望一切能永远保持不变。如果我们无法阻止外国势力开放国门的企图，那么我们也必须引进他们的思想和商品。"
 je_sakoku_meiji_restoration: "#b 天皇#!已恢复权力，#b 征夷大将军#!下台"
 je_sakoku_stop_being_closed_button: "废除[GetLawType('law_sakoku').GetName]"
 je_sakoku_stop_being_closed_button_desc: "局势的升级与来自海外日益增长的压力，使得结束[GetLawType('law_sakoku').GetName]成为一项迫在眉睫的要务。在这种情况下，我们或许能够强行废除旧的锁国体制，但这将激怒所有仍支持旧法的人。"
 notification_morrison_incident_has_incidented_name: "商船遭$JAP$炮击"
 notification_morrison_incident_has_incidented_desc: "我国一位富有冒险精神的商人试图违反$JAP_ADJ$对外国商船的限制，并遭到了岸防炮台的炮击，这使我们两国间的关系趋于恶化。"
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners: "对外国人手软"
 caved_to_foreign_pressure_opposition: "屈服于外国压力"
 caved_to_foreign_pressure_government: "屈服于外国压力"
 overdue_break_with_tradition: "早该改改了"
 forced_transition_from_tradition: "强迫改变传统"
 the_picked_lock_modifier: "被撬开的国门之锁"
 sakoku_entrenched_modifier: "深化锁国"
 meiji_failure_modifier: "失败的维新改革"
 ep2_sakoku.1.t: "令人不安的[SCOPE.sCountry('opium_wars_loser').GetAdjectiveNoFormatting]战败"
 ep2_sakoku.1.d: "我们幅员辽阔、历史悠久的邻国[SCOPE.sCountry('opium_wars_loser').GetName]，在与某个新兴海外国家的鸦片和贸易战争中落败。如果连[SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting]都无法控制本国市场并将外国人拒之门外，我们又如何能在自己的土地上维持[GetLawType('law_sakoku').GetName]呢？"
 ep2_sakoku.1.f: "“尽管他们拥有如此的土地、如此的财富、如此的权力——但在迎面而来的强大力量面前，这些都微不足道。外国列强已在恳求进入我国。我们是效仿[SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting]的做法，像[SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting]那样试图抵挡他们，直到他们的火炮如雨点般倾泻在我们的城镇上？还是寻求我们自己的道路？我们必须现在就做出决定，赶在那些铁与火的力量进入我们的水域、替我们做出决定之前。”"
 ep2_sakoku.1.a: "现在必须考虑那些不敢相信之事。"
 ep2_sakoku.1.b: "现在必须接受那些不敢想象之事。"
 end_sakoku_button_now_available: "提前强制结束[GetLawType('law_sakoku').GetName]的选项现在出现在$je_sakoku$中。"
 ep2_sakoku.2.t: "撬开国门之锁"
 ep2_sakoku.2.d: "面对国内外日益加剧的动荡，[GetLawType('law_bakufu').GetName]选择要求立即结束[GetLawType('law_sakoku').GetName]。"
 ep2_sakoku.2.f: "一群商人涌进了海关大楼。面对他们，只有一位焦头烂额的官员孤零零地站着。“是的，这当然意味着国家将不再锁国。”\n\n人群中爆发出十几个问题，如同潮水般席卷向这位官员。“那会变成什么样？我……我不确定。也许会有——不，等等，只是因为——这个决定不是你我能做的，你们不能像这样——”\n\n他给出的每一个回答，都招来了更多的问题。#italic 当国家无人打扰时，工作要轻松得多#!，他心想。"
 ep2_sakoku.2.a: "[ROOT.GetCountry.GetNameNoFormatting]的未来在于[GetLawType('law_mercantilism').GetName]。"
 ep2_sakoku.2.b: "[GetLawType('law_free_trade').GetName]将解放[ROOT.GetCountry.GetNameNoFormatting]。"
 ep2_sakoku.2.c: "[GetLawType('law_protectionism').GetName]让我们得以谨慎地与外国势力贸易。"
 ep2_sakoku.3.t: "[SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]号事件"
 ep2_sakoku.3.d: "一名[SCOPE.sCountry('morrison_incident_country').GetName]商人试图无视[GetLawType('law_sakoku').GetName]令的严格规定，在未经许可的港口进行贸易。他们的船只#italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#!号被沿海炮台开炮驱逐。与[SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting]的关系本就不佳，如今更是恶化。"
 ep2_sakoku.3.f: "当炮弹终于击中那艘船时，指挥官咧嘴一笑。法律非常明确，这艘船无权在这片水域航行。他不在乎那艘船的船长是怎么想的。他只想让那艘船掉头离开。"
 ep2_sakoku.3.a: "当地驻军做了他们应该做的事情。"
 ep2_sakoku.3.b: "我们应该向[SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting]道歉，并补偿那位商人，以平息事态。"
 ep2_sakoku.3.c: "这是我们审视[GetLawType('law_sakoku').GetName]必要性的机会。"
 ep2_sakoku.4.t: "被撬开的国门之锁"
 ep2_sakoku.4.d: "在内外压力的夹击下，[GetLawType('law_sakoku').GetName]令已被废除。[ROOT.GetCountry.GetNameNoFormatting]为自己开启了新的未来。"
 ep2_sakoku.4.f: "官员眺望着海湾。码头上停泊着新船。陌生的船只，飘扬着他从未见过的旗帜。它们会给[ROOT.GetCountry.GetNameNoFormatting]带来什么？它们又想从[ROOT.GetCountry.GetNameNoFormatting]取走什么？\n\n他的目光在停泊的船只上停留了许久许久，才最终转身离开。他的双眼无法给他想要的答案，至少今天不行。只有时间才能告诉他，这个新时代将给予他的祖国什么。"
 ep2_sakoku.4.a: "今天，日本开国！"
 ep2_sakoku.5.t: "锈死"
 ep2_sakoku.5.d: "即便[ROOT.GetCountry.GetNameNoFormatting]正经历着翻天覆地的政治变革，但延续的[GetLawType('law_sakoku').GetName]令预示着该国打破自我封闭的希望渺茫。[GetLawType('law_sakoku').GetNameNoFormatting]似乎会一直存在下去。"
 ep2_sakoku.5.f: "官员眺望着海湾。码头上停泊着旧船，这些船他的父亲、他的祖父，乃至往上数代的祖先都会见过。他的孩子们还会看到同样的船吗？他的孙辈呢？这景象是否将永远一成不变？\n\n他的目光在停泊的船只上停留了许久许久，才最终转身离开。他的双眼无法给他想要的答案，至少今天不行。只有时间才能告诉他，他的祖国是否真的会永远保持原样。"
 ep2_sakoku.5.a: "锁依然关闭。"
 meiji.14.t: "维新一场空"
 meiji.14.d: "尽管新[ROOT.GetCountry.GetCustom('JAP_era_name')]政府所倡导的改革承诺令人振奋，但[ROOT.GetCountry.GetNameNoFlag]并未经历重大变革。批评者感叹，今日的国家与维新之前相比并无多大不同。"
 meiji.14.f: "工厂里，一台硕大无比的引擎呼呼作响、吃力运转，带动着一个巨大的飞轮，给大型车床和钻床提供动力。这些机器正切削出新的枪管、新的枪机、新的扳机，以武装一个庞大的新武器库。不久之后，某个国家很快将运用这蒸汽与钢铁，在世界上打下自己的印记——而这个国家不会是[ROOT.GetCountry.GetNameNoFormatting]。"
 meiji.14.a: "今日，太阳栖于梦中。"
 je_end_edo_system_button_name: "江户等级制度的终结"
 je_end_edo_system_button_desc: "在这个改革与复兴的时代，陈旧的制度正阻碍着我们前进。每一位公民，无论其出身地位如何，都能成为国家宝贵的一部分。"
