 je_ryukyu_rivalry_reaffirm_suzerainty_button: "[SCOPE.GetRootScope.GetCountry.GetCustom('ryukyu_rivalry_reaffirm_suzerainty')]"
 je_ryukyu_rivalry_reaffirm_suzerainty_japan: "重申宗主权"
 je_ryukyu_rivalry_reaffirm_suzerainty_china: "重申朝贡关系"
 je_ryukyu_rivalry_reaffirm_suzerainty_button_desc: "琉球朝廷更倾向于效忠我们的对手。我们必须提醒他们对我方应尽的义务，将其重新纳入我们的影响范围。"
 ryukyu_rivalry_reaffirm_suzerainty_button_tt: "[ROOT.GetCountry.GetName]对[SCOPE.sCountry('ryukyu_scope').GetName]施加的#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 影响力#!#!低于其对手"
 ryukyu_rivalry_small_influence_gain_self_tt: "[ROOT.GetCountry.GetName]获得#green 2#!#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 影响力#!#!"
 ryukyu_rivalry_medium_influence_gain_self_tt: "[ROOT.GetCountry.GetName]在#v 5年#!内每月获得#green 3#!#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 影响力#!#!"
 ryukyu_rivalry_large_influence_gain_self_tt: "[ROOT.GetCountry.GetName]每月获得#green 3#!#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 影响力#!#!，直到[concept_journal_entry]结束"
 ryukyu_rivalry_small_influence_loss_self_tt: "[ROOT.GetCountry.GetName]失去#red 1#!#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 影响力#!#!"
 ryukyu_rivalry_medium_influence_loss_self_tt: "[ROOT.GetCountry.GetName]失去#red 2#!#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 影响力#!#!"
 ryukyu_rivalry_large_influence_loss_self_tt: "[ROOT.GetCountry.GetName]失去#red 10#!#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 影响力#!#!"
 ryukyu_rivalry_large_influence_loss_japan_tt: "[SCOPE.sCountry('japan_scope').GetName]失去#red 10#!#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 影响力#!#!"
 ryukyu_rivalry_large_influence_loss_china_tt: "[SCOPE.sCountry('china_scope').GetName]失去#red 10#!#tooltippable;tooltip:ryukyu_rivalry_sway_tt #b 影响力#!#!"
 ryukyu_rivalry_send_general_tt: "[ROOT.GetCountry.GetName]向[SCOPE.sCountry('ryukyu_scope').GetName]永久派遣一名[concept_general]"
 je_ryukyu_rivalry_sway_merchants_button: "派遣贸易监督官"
 je_ryukyu_rivalry_sway_merchants_button_desc: "通过监管那霸港，我们可以在琉球朝廷中安插使者，从而影响哪些外国势力能够获得贸易和朝贡的机会。"
 ryukyu_rivalry_sway_merchants_button_tt: "[ROOT.GetCountry.GetName]在[SCOPE.sCountry('ryukyu_scope').GetAdjective][concept_capital_state]拥有等级#v 2#!或以上的[GetBuildingType('building_port').GetName]"
 je_ryukyu_rivalry_inspect_defenses_button: "检查海岸防御"
 je_ryukyu_rivalry_inspect_defenses_button_desc: "在获得军事通行权后，我们可以派遣一名可信赖的将领前去检查琉球的防御工事，确保城墙与瞭望塔都体现我们的监督与战略意图。"
 ryukyu_rivalry_inspect_defenses_button_tt: "[ROOT.GetCountry.GetName]与[SCOPE.sCountry('ryukyu_scope').GetName]拥有#v 军事通行权#![concept_treaty]"
 je_ryukyu_rivalry_honor_kikoeogimi_button: "尊崇闻得大君"
 je_ryukyu_rivalry_honor_kikoeogimi_button_desc: "向闻得大君进献贡礼。她在朝廷礼仪与神圣祭祀中的权威，能够为我们在琉球朝中的影响力增添分量。"
