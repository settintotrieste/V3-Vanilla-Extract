 modifier_ryukyu_rivalry_secured_neutrality: "确保中立"
 modifier_ryukyu_rivalry_southern_secured: "南方通道得到保障"
 modifier_ryukyu_rivalry_scholars_pleased: "维持朝贡秩序"
 modifier_ryukyu_rivalry_honor_kikoeogimi: "礼仪纠葛"
