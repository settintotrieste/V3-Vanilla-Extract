 # Events
 ryukyu_rivalry.1.t: "朝贡商榷"
 ryukyu_rivalry.1.d: "[SCOPE.sCountry('ryukyu_scope').GetName]越来越倾向于[ROOT.GetCountry.GetName]。作为回应，[SCOPE.sCountry('rival_scope').GetName]加快了自己的外交行动，一方面送上表示尊敬的礼物，另一方面悄然强化[SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]朝贡关系中的义务。"
 ryukyu_rivalry.1.f: "在琉球的议事大厅里，密封的盒子被小心摆放整齐。廷臣们在屏风后低声议论，书信被当众宣读：一封盖着中国红印，另一封则带着日本的工整书法。每一句话都提及义务与承诺，这两个强国正拉扯着王国的选择。"
 ryukyu_rivalry.1.a: "向[SCOPE.sCountry('rival_scope').GetName]提出正式抗议。"
 ryukyu_rivalry.1.b: "利用我们在[SCOPE.sCountry('ryukyu_scope').GetName]的既有关系。"
 ryukyu_rivalry.1.c: "提醒他们我们长期以来的庇护。"
 ryukyu_rivalry.1.e: "此事不值得干预。"
 ryukyu_rivalry.1.tt1: "[SCOPE.sCountry('ryukyu_scope').GetName]是[ROOT.GetCountry.GetName]的附属国，且其[concept_liberty_desire]小于#v 25#!"
 ryukyu_rivalry.1.tt2: "[SCOPE.sCountry('ryukyu_scope').GetName]不是[ROOT.GetCountry.GetName]的附属国，但双方[concept_relations]至少为#v 友善#!"
 ryukyu_rivalry.1.tt3: "[ROOT.GetCountry.GetName]在[SCOPE.sCountry('ryukyu_scope').GetCapital.GetName]拥有至少3级[Concept('concept_building','$concept_buildings$')]"
 ryukyu_rivalry.2.t: "港口的竞争"
 ryukyu_rivalry.2.d: "[SCOPE.sCountry('rival_scope').GetAdjective]使节出现在[SCOPE.sCountry('ryukyu_scope').GetName]的港口，引起了许多[GetCulture('ryukyuan').GetName]商人的注意并赢得了他们的合作，使其在朝廷心中的分量得到加强。与此同时，我们的影响力逐渐减弱。"
 ryukyu_rivalry.2.f: "账册开开合合，盖上了不同的印章。曾经向我们寻求通商机会的商人如今滞留在别人的接待厅里，谈论着新的关税和更安全的航道。看来，财源被说客引向了他处。"
 ryukyu_rivalry.2.a: "有人在暗中作祟。"
 ryukyu_rivalry.3.t: "陆军将领访问[SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]"
 ryukyu_rivalry.3.d: "一位名为[SCOPE.sCharacter('ryukyu_general_scope').GetFullName]的将军带着一队军官抵达了[SCOPE.sCountry('ryukyu_scope').GetName]，表面上是来检查海岸防御。他们的到来得到了礼节性的接待，这加强了[SCOPE.sCountry('rival_scope').GetName]在朝廷中的影响力，也在悄然削弱我们的地位。"
 ryukyu_rivalry.3.f: "这位将军沿着城墙巡视，[SCOPE.sCharacter('ryukyu_general_scope').GetHerHis]的军官记录着每一门火炮和每一座瞭望塔。琉球的守卫整齐列队，深知有审视的目光正朝着这边望来。每一个姿态、每一次敬礼，都让两个强国之间编织的无形影响更加紧密。"
 ryukyu_rivalry.3.a: "这是一次危险的升级。"
 ryukyu_rivalry_risk_of_confrontation: "@warning!如果[SCOPE.sCountry('china_scope').GetName]与[SCOPE.sCountry('japan_scope').GetName]双方的部队都在检查海岸防御，可能会爆发#r 冲突#!"
 ryukyu_rivalry.4.t: "来访的将军"
 ryukyu_rivalry.4.d: "一位名为[SCOPE.sCharacter('ryukyu_general_scope').GetFullName]的将军带着一队军官自[SCOPE.sCountry('from_scope').GetName]前来[SCOPE.sCountry('ryukyu_scope').GetName]，希望检查我们的沿海防务。他们得到了我们礼节性的接待。"
 ryukyu_rivalry.4.f: "$ryukyu_rivalry.3.f$"
 ryukyu_rivalry.4.a: "密切关注他们。"
 ryukyu_rivalry_officer_arrives: "解锁一名来自[SCOPE.sCountry('from_scope').GetName]的[concept_general]"
 ryukyu_rivalry.5.t: "[SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]的命运"
 ryukyu_rivalry.5.d_victor: "我们在[SCOPE.sCountry('ryukyu_scope').GetName]的努力已经结出成果。通过持续的外交、经济与政治压力，他们的朝廷如今开始向我们寻求指导，而其主权问题也已朝着对我们有利的方向得到解决。"
 ryukyu_rivalry.5.d_loser: "尽管我们做出了努力，[SCOPE.sCountry('victor_scope').GetName]仍然在[SCOPE.sCountry('ryukyu_scope').GetName]取得了决定性的影响力。其朝廷已经接受新的政治现实，使这些岛屿牢固地处于[SCOPE.sCountry('victor_scope').GetNameNoFormatting]的势力范围之内。"
 ryukyu_rivalry.5.d_ryu: "我们试图维持的平衡已无法继续。在[SCOPE.sCountry('victor_scope').GetName]不断施加的压力下，我们的朝廷接受了一种新的政治安排。[SCOPE.sCountry('ryukyu_scope').GetName]的未来将会在他们的主导之下展开。"
 ryukyu_rivalry.5.f_annexed: "在那霸的市场广场上，官方公告当众宣读起来，[SCOPE.sCountry('victor_scope').GetCapital.GetName]印章下的墨迹仍然新鲜。[SCOPE.sCountry('ryukyu_scope').GetAdjectiveNoFormatting]的旗帜被降下，换上了统治者的旗帜。到了夜晚，行政机构已经设立，新法令也被张贴公布。"
 ryukyu_rivalry.5.f_subject: "那霸的市场广场上，在[SCOPE.sCountry('victor_scope').GetCapital.GetNameNoFormatting]盖上印章、墨迹仍然新鲜的文书被公开宣读。每一道敕令都界定了[SCOPE.sCountry('ryukyu_scope').GetName]在这一政权中的新地位。这个长期向远方朝廷进贡的王国，如今看到自己的官员被正式义务束缚于一个更强大的政权。到夜幕降临时，它的道路已经确定。"
 ryukyu_rivalry_ryukyu_vassalise_tt: "[SCOPE.sCountry('ryukyu_scope').GetName]成为[SCOPE.sCountry('victor_scope').GetName]的[concept_puppet]"
 ryukyu_rivalry_ryukyu_transfer_subject_tt: "[SCOPE.sCountry('ryukyu_scope').GetName]作为[concept_subject]被转移给[SCOPE.sCountry('victor_scope').GetName]"
 ryukyu_rivalry_ryukyu_annex_tt: "[SCOPE.sCountry('victor_scope').GetName]将吞并[SCOPE.sCountry('ryukyu_scope').GetName]"
 ryukyu_rivalry.5.a: "那就如此决定。"
 ryukyu_rivalry.6.t: "在[SCOPE.sCountry('ryukyu_scope').GetCapital.GetNameNoFormatting]的对抗"
 ryukyu_rivalry.6.d_brawl: "[SCOPE.sCountry('japan_scope').GetName]与[SCOPE.sCountry('china_scope').GetName]派出的军官在检查[SCOPE.sCountry('ryukyu_scope').GetName]的海岸防务时发生冲突。争执导致一人死亡，令琉球朝廷忧心忡忡。"
 ryukyu_rivalry.6.d_accident: "[SCOPE.sCountry('japan_scope').GetName]与[SCOPE.sCountry('china_scope').GetName]派遣视察海岸防御的部队在[SCOPE.sCountry('ryukyu_scope').GetName]的同一段防御工事上出现重叠，引起驻军混乱，并发生了短暂的交火。"
 ryukyu_rivalry.6.d_fire: "[SCOPE.sCountry('ryukyu_scope').GetName]为外国检查团安排的住所爆发了火灾，[SCOPE.sCountry('japan_scope').GetAdjective]与[SCOPE.sCountry('china_scope').GetAdjective]人员的住处都被烧毁。起火原因尚不明确，但当地官员私下议论，可能是灯笼使用不当所致。"
 ryukyu_rivalry.6.f: "军官海门在瞭望塔与仓库之间奔走，向守卫传达命令。一道道命令接连被喊出、被反驳，又迅速重复。尽管局势最终恢复平静，海门仍无法忘记，列强之间的冲突是如何暴露出琉球那脆弱的处境。"
 ryukyu_rivalry.6.a: "紧张局势正在升级。"
 ryukyu_rivalry_ryukyu_confrontation_tt1: "[SCOPE.sCountry('japan_scope').GetAdjective]和[SCOPE.sCountry('china_scope').GetAdjective]的[concept_infamy]提高#v 6#!"
 ryukyu_rivalry.7.t: "琉球敕令"
 ryukyu_rivalry.7.d_ryukyu: "经过多年的谨慎观察与微妙外交，我国议会宣布将自行治理其事务，不受外部干涉。朝廷为外部影响设定了严格的限制，并确立了其自身仪式、大臣及传统议会的首要地位。王国如今正自行规划它的发展道路。"
 ryukyu_rivalry.7.d: "经过多年的谨慎观察与微妙外交，[SCOPE.sCountry('ryukyu_scope').GetName]已摆脱我们的影响力，宣布将自行治理其事务，不受外部干涉。朝廷对我们的存在设定了明确限制，在王国背离我们权威的同时，继续维持其仪式、官员与传统议事机构。"
 ryukyu_rivalry.7.f: "首里城光滑的地板上散落着破损的印章和朝贡簿册。在朝见大厅里，外国强权的压力依然存在，但已不再主宰局势。琉球的道路稳步展开，通过耐心外交赢得了一种脆弱的中立。"
 ryukyu_rivalry.7.a: "归属问题得到解决。"
 ryukyu_rivalry.7.b: "武力手段仍可供我们使用。"
 ryukyu_rivalry.8.t: "隐秘的王国"
 ryukyu_rivalry.8.d: "随着[SCOPE.sCountry('japan_scope').GetName]开放港口，长期沉寂的[SCOPE.sCountry('ryukyu_scope').GetName]归属问题再次浮现。数代以来，这个王国一直小心翼翼地维持着微妙的平衡：表面上是[SCOPE.sCountry('china_scope').GetName]的藩属国，暗地里却对[SCOPE.sCountry('japan_scope').GetNameNoFormatting]保持效忠。现在，两国都必须考虑如何巩固自身影响力。"
 ryukyu_rivalry.8.f: "灯笼在首里城的走廊间发出柔光，照亮了昔日中山王鼎盛时期所建的朱红梁柱。在绘饰华丽的天花板下，书吏将朝贡簿册与萨摩的命令并排摆放。朝廷长期在中华朝廷的册封与鹿儿岛的阴影之间维持平衡。表面的平静仍在持续，但归属问题很快就会迫使他们作出抉择。"
 ryukyu_rivalry.8.a: "此事仍悬而未决。"
