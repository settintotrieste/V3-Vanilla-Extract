l_simp_chinese:
 ## Interest Tier Types
 interest_tier_none: "无"
 interest_tier_none_desc: "在这一$concept_interest_tier_short$下，[concept_country]完全不涉足，或仅边缘性地涉足一个[concept_strategic_region]，该$concept_country$和$concept_strategic_region$均不受影响。"
 interest_tier_observant: "边缘存在"
 interest_tier_observant_desc: "在这一$concept_interest_tier_short$下，国家已迈出在该[concept_strategic_region]建立外交存在的第一步，可能派遣海军舰艇在沿海巡逻，或与[Concept('concept_local_country', '$concept_local_countries$')]互派使节。"
 interest_tier_engaged: "积极参与"
 interest_tier_engaged_desc: "在这一$concept_interest_tier_short$下，[concept_country]开始介入当地事务，签署[Concept('concept_treaty', '$concept_treaties$')]并建立更持久的影响力。"
 interest_tier_influential: "颇具影响"
 interest_tier_influential_desc: "在这一$concept_interest_tier_short$下，[Concept('concept_country', '$concept_countries$')]已在[concept_strategic_region]全面建立存在，正签订长期协议并确立自身权益。\n\n@information![Concept('concept_capital_state', '$concept_capital_state_short$')]位于该$concept_strategic_region$的$concept_countries$，其利益永远不会低于这一$concept_interest_tier_short$。"
 interest_tier_pervasive: "无孔不入"
 interest_tier_pervasive_desc: "在这一$concept_interest_tier_short$下，[concept_country]已对[concept_strategic_region]建立起显著控制。随着势力范围不断巩固，[Concept('concept_great_power', '$concept_great_powers$')]与[Concept('concept_local_country', '$concept_local_country_short$')]势力正为争夺主导权展开角逐。"
 interest_tier_hegemonic: "霸权支配"
 interest_tier_hegemonic_desc: "在这一$concept_interest_tier_short$下，[concept_country]已稳固确立自身为该[concept_strategic_region]内无可争议的主导者。其他国家——#italic 如果仍存在的话#!——将不得不屈从于该霸权，或与其交涉以换取其不干涉本地事务的保证。"
 ## Interface
 INTEREST_TIER_TYPE_BOUNDS_DESC: "适用于[InterestTierType.GetLowerBound|v]到[InterestTierType.GetUpperBound|v]之间的[concept_involvement]"
 INTEREST_TIER_TYPE_NO_EFFECT: "#italic 无效果#!"
 INTEREST_TIER_ACTIVE: "[Country.GetName][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'YOU'))]#i #b 当前等级#!#!"
 INTEREST_TIER_ACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#!$INTEREST_TIER_ACTIVE$\n$INTEREST_TIER_BOUNDS_DESC$\n[SelectLocalization(EqualTo_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_CURRENT_INVOLVEMENT_DESC', 'INTEREST_TIER_TARGET_INVOLVEMENT_DESC')]\n$TOOLTIP_DELIMITER$\n$INTEREST_TIER_EFFECTS_AND_BREAKDOWN$"
 INTEREST_TIER_INACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#!\n$INTEREST_TIER_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n#title 效果：#!#indent_newline:3 \n[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)]#!"
 INTEREST_TIER_EFFECTS_AND_BREAKDOWN: "#title 效果：#!#indent_newline:3 [ConcatIfNeitherEmpty('\n', InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', AddLocalizationIf(And(And3(StringIsEmpty(InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetStateModifier.GetDesc)), StringIsEmpty(InterestTierType.GetTradeAdvantageDesc)), 'INTEREST_TIER_NO_EFFECT'))]#!\n\n#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#![concept_involvement]来自于：#!#indent_newline:3 \n[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]#!\n$INTEREST_TIER_ACTIVE$：#i #b （当前生效）#!#!"
 INTEREST_TIER_PREDICTED: "#i #b （预计）#!#!"
 INTEREST_TIER_BOUNDS_DESC: "适用于[InterestTierType.GetLowerBound|v0]到[InterestTierType.GetUpperBound|v0]之间的[concept_involvement]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC: "[Country.GetName]的[concept_involvement]：#v [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#!"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC: "[Country.GetName]的[concept_involvement]：[AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetTargetInvolvementIn(StrategicRegion.Self), Country.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP')][AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN')]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC_PLAYER_CONTEXT: "我们目前拥有[GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon]#v [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#![concept_involvement]"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC_PLAYER_CONTEXT: "我们目前拥有[GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self), GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT')][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self), GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT')][concept_involvement]"
 INTEREST_TIER_TARGET_UP: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#!@arrow_right!#v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!（@arrow_up_up!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/周）"
 INTEREST_TIER_TARGET_DOWN: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#!@arrow_right!#v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!（@arrow_down_down!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/周）"
 INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#!@arrow_right!#v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!（@arrow_up_up!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/周）"
 INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#!@arrow_right!#v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!（@arrow_down_down!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/周）"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN_TITLE: "#title $concept_involvement$目标为#v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#!，来自于：#!"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN: "[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]"
 INTEREST_TIER_EFFECTS_TITLE: "#title 效果：#!"
 INTEREST_TIER_EFFECTS: "[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetDescription)]"
 INTEREST_TIER_NO_EFFECT: "#italic 无效果#!"
 INTEREST_TIER_TRADE_ADVANTAGE_EXPORTS_DESC: "在本地$concept_markets$拥有$VAL|0=+v$[Concept('concept_trade','$concept_exports$')][concept_trade_advantage]"
 INTEREST_TIER_TRADE_ADVANTAGE_IMPORTS_DESC: "在本地$concept_markets$拥有$VAL|0=+v$[Concept('concept_trade','$concept_imports$')][concept_trade_advantage]"
 INTEREST_TIER_ON_ACTIVATE_EFFECT: "#title 获得后：#!"
 INTEREST_TIER_ON_DEACTIVATE_EFFECT: "#title 失去后：#!"
 STRATEGIC_REGION_AI_STANCE_TT_HEADER: "[Country.GetNameNoFormatting]基于以下理由在[StrategicRegion.GetName]采取#b [Country.GetAIStrategicRegionStanceTypeIn(StrategicRegion.Self).GetNameNoFormatting]#![Concept('concept_strategic_region_stance', '$concept_strategic_region_stance_short$')]：\n$TOOLTIP_DELIMITER$"
 ## Effects
 interest_tier_effect_establish_missions_decree: "@checkmark!允许在[Concept('concept_unincorporated_state','$concept_unincorporated_states$')]颁布[GetDecreeType('decree_establish_missions').GetName][concept_decree]"
 interest_tier_effect_colonization: "@checkmark!启用#yellow;tooltip:[GetPlayer.GetTooltipTag],establish_colony_tooltip $establish_colony$#!区域行动"
 interest_tier_effect_stake_colonial_claim: "@checkmark!允许对[Concept('concept_decentralized_nation', '$concept_decentralized_nations$')]采取[GetDiplomaticActionType('da_stake_colonial_claim').GetName][concept_diplomatic_action]"
 interest_tier_effect_colonial_claim_generation: "@checkmark!当[concept_state_region]殖民达到[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_colonial_claim_generation_threshold')|v%0]后会生成[concept_claim]"
 interest_tier_effect_infamy_cost_increase_high: "针对该[concept_strategic_region]内的[Concept('concept_war_goal', '$concept_war_goals$')][concept_infamy]花费[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_high_value')|=n%0]"
 interest_tier_effect_infamy_cost_increase_medium: "针对该[concept_strategic_region]内的[Concept('concept_war_goal', '$concept_war_goals$')][concept_infamy]花费[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_medium_value')|=n%0]"
 interest_tier_effect_infamy_cost_decrease_medium: "针对该[concept_strategic_region]内的[Concept('concept_war_goal', '$concept_war_goals$')][concept_infamy]花费[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_decrease_medium_value')|=p%0]"
 interest_tier_effect_can_start_diplomatic_plays: "@checkmark!允许在该[concept_strategic_region]内发起[Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')]"
 interest_tier_effect_can_join_diplomatic_plays: "@checkmark!允许在该[concept_strategic_region]内的[Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')]中选择立场"
 interest_tier_effect_can_sign_alliance: "@checkmark!允许签署[GetArticleType('alliance').GetName][Concept('concept_article', '$concept_treaties$')]"
 interest_tier_effect_can_sign_defensive_pact: "@checkmark!允许签署[GetArticleType('defensive_pact').GetName][Concept('concept_article', '$concept_treaties$')]"
 interest_tier_effect_can_sign_support_independence: "@checkmark!允许签署[GetArticleType('support_independence').GetName][Concept('concept_article', '$concept_treaties$')]"
 interest_tier_effect_can_sign_guarantee_independence: "@checkmark!允许签署[GetArticleType('guarantee_independence').GetName][Concept('concept_article', '$concept_treaties$')]"
 interest_tier_effect_stake_colonial_claim_unrecognized: "@checkmark!允许对[Concept('concept_decentralized_nation', '$concept_decentralized_nations$')]和[Concept('concept_unrecognized_power', '$concept_unrecognized_powers$')]采取[GetDiplomaticActionType('da_stake_colonial_claim').GetName][concept_diplomatic_action]"
 interest_tier_effect_can_sign_foreign_investment_rights: "@checkmark!允许签署[GetArticleType('foreign_investment_rights').GetName][Concept('concept_article', '$concept_treaties$')]"
 ## Diplomatic Actions
 da_stake_colonial_claim: "提出殖民宣称"
 da_stake_colonial_claim_desc: "对境外[concept_state_region]提出[concept_claim]。"
 da_stake_colonial_claim_action_notification_name: "[INITIATOR_COUNTRY.GetName]提出对[TARGET_STATE.GetStateRegion.GetName]的殖民[concept_claim|l]"
 da_stake_colonial_claim_action_notification_desc: "[INITIATOR_COUNTRY.GetName]宣称了[TARGET_STATE.GetStateRegion.GetName]，将该地视为他们殖民野心的一部分！"
 DA_STAKE_COLONIAL_CLAIM_COOLDOWN: "无法采取该行动直至#v [TimeKeeper.GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'da_stake_colonial_claim_cooldown') )]#!后"
 DA_STAKE_COLONIAL_CLAIM_EMPTY_EFFECT: "选择与你的[concept_capital_state]处于不同大陆的[concept_state_region]进行[concept_claim|l]"
 ## Notifications
 notification_colonial_claim_generated_name: "[SCOPE.sState('colony_notification_state').GetName]已成为#bold 主要殖民地#!"
 notification_colonial_claim_generated_desc: "[SCOPE.sState('colony_notification_state').GetName]已发展到足够大，可以给予我们对整个[SCOPE.sState('colony_notification_state').GetStateRegion.GetName]的[concept_claim]。"
 notification_colonial_claim_generated_tooltip: "#header $notification_colonial_claim_generated_name$#!\n$TOOLTIP_DELIMITER$\n$notification_colonial_claim_generated_desc$"
