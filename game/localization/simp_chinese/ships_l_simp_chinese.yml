 ship_type_ship_of_the_line_desc: "设计用于战列线作战的大型战舰。战列舰在多层甲板上配备了大量火炮。"
 ship_type_monitor: "浅水重炮舰"
 ship_type_monitor_desc: "设计用于沿海水域的低轮廓装甲舰艇。"
 ship_type_coastal_defense_ship: "海防舰"
 ship_type_coastal_defense_ship_desc: "专为港口和近海水域使用而设计、配备重型武器和装甲的舰船。"
 ship_type_destroyer: "驱逐舰"
 ship_type_destroyer_desc: "为舰队及护航任务设计的高速、重武装舰艇。"
 ship_type_aircraft_carrier: "航空母舰"
 ship_type_aircraft_carrier_desc: "航空母舰是可供飞机起飞和降落的舰船，其职责涵盖侦察以及部分进攻任务。"
 ship_type_torpedo_boat: "鱼雷艇"
 ship_type_torpedo_boat_desc: "小型、敏捷的舰艇，为摧毁大型、迟缓的战舰而设计。"
 ship_type_torpedo_boat_destroyer: "鱼雷艇驱逐舰"
 ship_type_torpedo_boat_destroyer_desc: "设计用于对抗较小鱼雷艇的舰船，同时自身也能发动鱼雷攻击。"
 ship_type_light_cruiser: "轻型巡洋舰"
 ship_type_light_cruiser_desc: "为远程巡逻、贸易保护和力量投射而建造的轻型装甲巡洋舰。"
 ship_type_armored_cruiser: "装甲巡洋舰"
 ship_type_armored_cruiser_desc: "配有厚重装甲带的大型巡洋舰，能应对除战列舰外的大部分目标。"
 ship_type_protected_cruiser: "护卫巡洋舰"
 ship_type_protected_cruiser_desc: "快速、远程的巡洋舰，其装甲甲板用于保护要害部件。"
 ship_type_seaplane_tender: "水上飞机母舰"
 ship_type_seaplane_tender_desc: "设计用于搭载和放飞水上飞机的舰船，以执行侦察和有限的进攻性任务。"
 ship_type_early_ironclad: "早期铁甲舰"
 ship_type_early_ironclad_desc: "强大的远洋蒸汽动力铁甲舰。"
 ship_type_modern_ironclad: "现代铁甲舰"
 ship_type_modern_ironclad_desc: "传统铁甲舰的演进版本，现代铁甲舰融合了许多"
 ship_type_pre_dreadnought: "前无畏舰"
 ship_type_pre_dreadnought_desc: "强大的战列舰，配备了混合口径的重型舰炮。"
 ship_type_dreadnought: "无畏舰"
 ship_type_dreadnought_desc: "围绕统一配置的重型火炮打造的革命性战列舰。"
 ship_type_super_dreadnought: "超级无畏舰"
 ship_type_super_dreadnought_desc: "加大版无畏舰，配备更重型的火炮和更厚重的装甲。"
 ship_type_submarine: "潜艇"
 ship_type_submarine_desc: "主要用于攻击敌方商船的下潜式舰艇。"
 ship_type_troop_ship: "运兵船"
 ship_type_troop_ship_desc: "专为在全球运送人员和物资而设计的补给船。"
 ship_type_supply_ship: "补给船"
 ship_type_supply_ship_desc: "运输军用物资的船舰。"
 ship_graphics_type_borodino: "博罗季诺号"
 ship_graphics_type_borodino_desc: "博罗季诺级前无畏舰是日俄战争期间俄罗斯帝国海军最新的战列舰。作为罗热斯特文斯基海军上将注定失败的第二太平洋舰队的核心，四艘该级战舰将在对马海战中被击沉或俘虏。"
 ship_graphics_type_mikasa: "三笠号"
 ship_graphics_type_mikasa_desc: "前无畏舰三笠号是日俄战争中海军将领东乡平八郎的旗舰，参加了战争中的每一次重大舰队行动，成为日本海军优势的持久象征。"
 ship_graphics_type_dingyuan: "定远号"
 ship_graphics_type_dingyuan_desc: "铁甲战舰定远号和镇远号是北洋水师的骄傲，晚清军事现代化最引人注目的象征。他们在鸭绿江战役中英勇作战，但由于中国海军长期资金不足，阻碍了他们的表现。"
 ship_group_capital_ships: "主力舰"
 ship_group_capital_ships_desc: "主力舰是最庞大、作战能力最强的战舰，主要用于在战列线作战。"
 ship_group_cruisers: "巡洋舰"
 ship_group_cruisers_desc: "巡洋舰是体型较小、武装更轻的船只，用于远程巡航作战。"
 ship_group_torpedo_craft: "鱼雷舰"
 ship_group_torpedo_craft_desc: "鱼雷舰是主要使用自行鱼雷作为武器的敏捷小型船只。"
 ship_group_supply_ships: "补给船"
 ship_group_supply_ships_desc: "补给船是为军事舰队行动提高补给的民用定制船只。"
