 amendment_reformed_shinsengumi: "Linaje shinsengumi"
 amendment_reformed_shinsengumi_desc: "La policía secreta estatal tiene sus raíces en los shinsengumi, una unidad de espadachines de élite establecida por el bakufu para preservar el orden en Kioto."
