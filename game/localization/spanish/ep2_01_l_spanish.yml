 japan_events.3.t: "Un año reducido"
 japan_events.3.d: "La adopción del nuevo calendario ha hecho que el año se acorte discretamente. Al contar con menos días, los salarios, rentas e impuestos ya no corresponden con las expectativas creadas conforme al antiguo sistema. Los trabajadores descubren que su paga se ha visto reducida y a los funcionarios les cuesta explicar la situación."
 japan_events.3.f: "Los trabajadores contaban su paga una y otra vez, y negaban con la cabeza en desaprobación ante las pilas de monedas. El trabajo les había encallecido las manos, pero apenas veían recompensa alguna. El año se había acortado y cada día perdido había dejado una marca en sus brazos cansados y sus bolsillos vacíos."
 japan_events.3.a: "El año se ha acortado. Sea pues."
 japan_events.3.b: "Que la población asuma su parte de esta carga."
 japan_events.3.c: "Asumamos esta pérdida en nombre de la estabilidad."
