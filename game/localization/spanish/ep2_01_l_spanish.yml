l_spanish:
 japan_events.1.t: "Cartas para todo el mundo"
 japan_events.1.d: "A medida que los pensadores modernistas ganan peso en [ROOT.GetCountry.GetName], las limitaciones del antiguo sistema de mensajeros son cada vez más patentes. Ya sea a causa de la desmantelación del orden feudal o por la mayor alfabetización de la población, ahora se dan las condiciones para un servicio postal centralizado capaz de respaldar un Estado contemporáneo."
 japan_events.1.f: "Los mensajeros, portando el sello gubernamental, corrían por las calles con sacas inusualmente cargadas de cartas. En la capital, funcionarios se inclinaban sobre mapas para ajustar las rutas y contar sellos a la luz de las lámparas. Los comerciantes refunfuñaban por la interrupción de la antigua red de mensajería, al tiempo que los niños curiosos introducían sus primeras cartas en los nuevos buzones. El país, antaño dividido por la costumbre, comenzaba a hablar con una sola voz."
 japan_events.1.a: "Financiemos por completo la implementación a nivel nacional."
 japan_events.1.b: "Centrémonos en los principales centros urbanos."
 japan_events.1.c: "Las zonas rurales son prioritarias."
 japan_events.1.e: "Que se encargue de la reforma [SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')]."
 japan_events.1.g: "Conservemos el antiguo sistema de mensajeros."
