 japan_events.4.t: "Occidentalización de los nombres"
 japan_events.4.d: "A medida que [ROOT.GetCountry.GetName] desarrolla el comercio y acciones diplomáticas con potencias extranjeras, surge la cuestión de cómo deberían transcribirse los nombres de procedencia [GetCulture('japanese').GetName] en tratados, correspondencia y documentos oficiales. Los representantes occidentales tienen cada vez más expectativas de que la nomenclatura siga sus propias convenciones y se coloque el nombre antes que el apellido."
 japan_events.4.f: "Los oficinistas se inclinaban sobre sus escritorios y las plumas rasguñaban cartas dirigidas a funcionarios extranjeros. Hablaban entre susurros y debatían si la claridad para el extranjero justificaba un cambio de la tradición ancestral. Una mano sosteniendo un sello se detuvo sobre el papel para permanecer quieta un instante antes de que la tinta se secara."
 japan_events.4.a: "Que se adopten las convenciones occidentales en la correspondencia con el extranjero."
 japan_events.4.b: "Que se preserve el orden tradicional de los nombres."
 japan_events.4.c: "Vivimos una nueva era; adoptemos las convenciones occidentales en todos los ámbitos."
 japan_single_fire_events_name_order_westernized_mod: "Convenciones de nombres occidentalizadas"
 japan_single_fire_events_name_order_traditional_mod: "Preservado orden tradicional de los nombres"
 japan_single_fire_events_name_order_resistance_mod: "Disputa cultural por nomenclatura"
 japan_single_fire_events_name_order_approval_mod: "Aclaración administrativa"
 japan_events.5.t: "La cuestión del kanbun"
 japan_events.5.d: "Tradicionalmente, los decretos, normativas y registros han empleado el idioma clásico que solo unos pocos entienden. Los reformistas argumentan que si la administración recurriera a la lengua japonesa vernácula, se mejoraría la claridad y la eficiencia, mientras que otros insisten en que la tradición en sí misma otorga autoridad a la palabra escrita."
 japan_events.5.f: "Los burócratas trabajaban hasta bien entrada la noche para reformular directivas con calma y decisión. Uno de ellos paró para frotarse los ojos. A continuación, siguió con cuidado de no pasar por alto ni una sola marca. Cada roce de la pluma sobre el papel era como una pequeña batalla contra la confusión y el desorden."
 japan_events.5.a: "Promovamos la lengua japonesa vernácula en la administración oficial."
 japan_events.5.b: "Permitamos una reforma limitada en la correspondencia interna."
 japan_events.5.c: "Que se preserve el kanbun clásico en todos los documentos estatales."
