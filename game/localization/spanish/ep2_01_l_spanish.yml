 ## The Hidden Domain JE
 je_ryukyu_rivalry: "El dominio oculto"
 je_ryukyu_rivalry_reason: "Desde la #b invasión de 1609#! por parte de las fuerzas del #b dominio de Satsuma#!, el Reino de [SCOPE.sCountry('ryukyu_scope').GetName] ha existido como dominio de [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')] sin reconocimiento oficial. A pesar de su sometimiento a Satsuma, la corte de Shuri ha seguido recibiendo su investidura de [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')] y envía misiones tributarias a Pekín para mantener una apariencia de independencia.\n\nEste acuerdo se ha respetado durante generaciones, pero el equilibrio de poder de Asia Oriental ha cambiado debido a la creciente presencia de las potencias orientales y a la apertura de Japón al mundo. Ambas partes deben aclarar ahora su relación con Ryukyu, lo cual desencadena una reñida competición por controlar las islas del sur.\n$TOOLTIP_DELIMITER$\n@warning! #r Fracaso:#! \n La asertividad de [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] llega al #variable 100 %#!\n. [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')] o [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')] son [Concept('concept_subject','subyugados')] o #b anexionados#!.\n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] es [Concept('concept_subject','subyugado')] o #b anexionado#! por un país no involucrado.\n\n@information! Para persuadirlos, hay que:\n Tener un [concept_article|l] de #v transferencia de dinero#! (#g 0,1-2K#! @money!) con [SCOPE.sCountry('ryukyu_scope').GetName]\n Tener [concept_relations|l] #v amistosas#! o #v amables#! con [SCOPE.sCountry('ryukyu_scope').GetName]\n Alcanzar la máxima [concept_naval_power_projection|l]\n Hacer que [SCOPE.sCountry('ryukyu_scope').GetName] deba una [concept_obligation|l] \n Usar las acciones de la [concept_journal_entry|l]"
 #je_ryukyu_rivalry_goal:1 "You are asserting more influence over [SCOPE.sCountry('ryukyu_scope').GetName] than your rival."
 je_ryukyu_rivalry_victory_japan: "Para lograr una victoria #b japonesa#!:\n"
 je_ryukyu_rivalry_victory_china: "Para lograr una victoria #b china#!:\n"
 je_ryukyu_rivalry_victory_ryukyu: "Para lograr una victoria #b ryukyuense#!:\n"
 ryukyu_rivalry_sway_tt: "Al inclinarse Ryukyu por completo hacia un bando, se romperá el control que los oponentes puedan tener sobre ella y se reactivará la [Concept('concept_subject','subyugación')].\n\nPara persuadirlos, hay que:\n Tener un [concept_article|l] de #v transferencia de dinero#! con Ryukyu\n Tener unas [concept_relations|l] #v amistosas#! o #v amables#! con Ryukyu\n Tener la mayor [concept_naval_power_projection|l]\n Usar las acciones de la [concept_journal_entry|l]"
 ryukyu_rivalry_assertiveness_tt: "Ryukyu reivindicará su neutralidad cuando la barra llegue al #v 100 %#!. Una vez reivindicada, no podrá convertirse en [concept_subject|l] a través de una [concept_diplomatic_action|l] durante #v 50#! años.\n\nLa barra de asertividad aumentará en #g 0,5#! cada mes si la barra de persuasión permanece entre #v -20#! y #v +20#!.\n\nRyukyu puede afirmar su neutralidad si enfrenta a Japón y a China entre sí, usando las acciones disponibles que afectan a la persuasión. \n\nEjemplos:\n Tener un [concept_article|l] de #v transferencia de dinero#! (#g 0,1-2K#! @money!) con ambos o con ninguno de los bandos\n Tener [concept_relations|l] #v amistosas#! o #v amables#! con ambos o con ninguno de los bandos\n Deber una [concept_obligation|l] a ambos o a ninguno de los bandos\n Cancelar o firmar los tratados mencionados cuando una de las partes obtenga ventaja o desventaja"
