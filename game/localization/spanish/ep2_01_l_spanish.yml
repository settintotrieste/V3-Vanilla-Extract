 japan_events.2.t: "Calendarios desiguales"
 japan_events.2.d: "El ancestral calendario lunisolar japonés está cada vez más desincronizado del mundo occidental. Los comerciantes se quejan de dificultades a la hora de coordinarse con sus socios extranjeros, mientras que el pueblo señala las confusiones surgidas en fechas de festivales, rentas y plazos fiscales."
 japan_events.2.f: "Los oficinistas se sentaban inclinados sobre sus libros para copiar las líneas con cuidado. Las pilas de papel iban creciendo cada vez que se repetía un documento. Tenían los ojos doloridos de tanto buscar meses que ya no existían. El antiguo calendario desaparecía discretamente."
 japan_events.2.f_telegraph: "Los mensajeros se apresuraban por las calles para entregar mensaje tras mensaje. La gente se detenía para leer cada aviso y la cabeza les daba vueltas al ver las fechas cambiar más rápido de lo que podían comprender. Las noticias volaban al instante, y el viejo calendario desapareció de la noche a la mañana."
 japan_events.2.a: "Procedamos con la reforma del calendario inmediatamente."
 japan_events.2.b: "Hagamos uso del [GetTechnology('electric_telegraph').GetName|l] para acelerar el cambio."
 japan_events.2.c: "Conservemos el antiguo sistema por ahora."
