l_spanish:
 edo_system: "Sistema de estatus de Edo"
 # Edo Social Classes
 strata_samurai_high: "Samuráis superiores" # High-Class Samurai
 strata_samurai_high_desc: "Las élites de guerreros de alto rango como los daimyō y los siervos tradicionales, los escalones más elevados de la clase samurái han monopolizado la mayoría de cargos de renombre y disfrutan de un considerable prestigio hereditario."
 strata_samurai_low: "Samuráis inferiores" # Low-Class Samurai
 strata_samurai_low_desc: "Guerreros y siervos de rango inferior como los gokenin y los ashigaru que sirven como personal administrativo y militar por debajo de la élite samurái."
 strata_religious: "Jisha" # Priests
 strata_religious_desc: "Miembros del clero de un santuario, organizados a través de las instituciones del templo y regulados por las autoridades. Aunque ejercen influencia en la vida local, la enseñanza y los rituales religiosos, existen en cierto grado fuera de las clases de estatus definidas legalmente."
 strata_commoners_peasants: "Hyakushō" # Peasants
 strata_commoners_peasants_desc: "Una subdivisión de la clase plebeya, los campesinos son, con creces, la clase social japonesa más numerosa. Sus miembros se inscriben en los registros de las aldeas y están sometidos a las obligaciones y tributos locales. Se les define por su inscripción —no por su profesión— e incluyen a mercaderes, artesanos rurales y agricultores."
 strata_commoners_townspeople: "Chōnin" # Townspeople
 strata_commoners_townspeople_desc: "Una subdivisión de la clase plebeya, los ciudadanos son los principales habitantes de los centros urbanos de Japón. Sus miembros se inscriben en instituciones urbanas y suelen estar asociados a la artesanía y el comercio. Aunque pueden llegar a acumular una riqueza e influencia considerables, su movilidad social se ve frenada por su estatus de no guerreros."
 strata_outcastes: "Eta-hinin" # Outcastes Eta, Hinin, etc.
 strata_outcastes_desc: "Los eta y los hinin componen los estamentos más bajos de la sociedad japonesa. Sufren una discriminación considerable y se ven asociados a ocupaciones «impuras», como sepultureros, mendigos o artistas callejeros."
 # Edo Social System Laws
 lawgroup_edo_social_system: "Sistema de estatus de Edo"
 lawgroup_edo_social_system_desc: "Imposición de $lawgroup_edo_social_system$"
 law_strict_edo_system: "Orden de estatus rígido"
 law_strict_edo_system_desc: "Todo está estrictamente regulado y supervisado por el Estado, desde las oportunidades profesionales y asuntos legales hasta el número de puertas que el estatus de un ciudadano le permite tener en su hogar. Cualquier incumplimiento del protocolo conlleva una sanción severa, y los ciudadanos y campesinos no tienen opción alguna de pasar a formar parte formalmente de las filas de samuráis."
 law_intermediate_edo_system: "Orden de estatus suavizado"
 law_intermediate_edo_system_desc: "Las normas legales y las leyes suntuarias se han visto suavizadas, por lo que los plebeyos pueden tener mayor influencia y estatus en la sociedad. Los ciudadanos o campesinos adinerados pueden llegar a ser gokenin —samuráis de bajo rango— si adquieren dicho título."
 law_lax_edo_system: "Orden de estatus permisivo"
 law_lax_edo_system_desc: "Los plebeyos ahora pueden acceder a los puestos y cargos que antes eran exclusivos de los samuráis. Además, el cumplimiento de las restantes limitaciones profesionales y suntuarias solo se aplica de forma selectiva, limitándose normalmente a las ofensas más graves."
 # Tenpo Crisis
 je_tenpo_crisis: "Crisis de Tenpō"
 je_tenpo_crisis_reason: "Declarada en 1830, la era Tenpō, o de la ꡟ«protección celestial», en un comienzo hizo honor a su auspicioso nombre. Sin embargo, las malas condiciones meteorológicas en [GetGeographicRegion('geographic_region_honshu').GetName] pronto dieron lugar a un aumento exorbitado de los precios del arroz y a una hambruna en todo el país. Al mismo tiempo, la cada vez mayor riqueza e influencia del grupo de [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName|l] amenaza el orden establecido por el grupo de [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName|l].\n\nEn tanto, la osadía de las [Concept('concept_great_power','$concept_great_powers$')|l] occidentales ha ido en aumento y sus comerciantes y cañoneras cada vez se acercan más a nuestras costas.\n\nPara tratar de hacer frente a estos problemas, reformistas de renombre han esbozado su visión de futuro para el bakufu.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b Agenda reformista#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] [ROOT.GetCountry.GetNameNoFlag] ha promulgado la ley de [GetLawType('law_lax_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] [ROOT.GetCountry.GetNameNoFlag] #b no#! ha promulgado la ley de [GetLawType('law_hereditary_bureaucrats').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] [ROOT.GetCountry.GetNameNoFlag] tiene #v 3#! [Concept('concept_state', '$concept_states$')|l] con un [GetBuildingType('building_urban_center').GetName|l] de nivel #v 3#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')] El [concept_clout|l] del [concept_interest_group|l] de [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName|l] es #v 10#! o superior\n#tooltippable;tooltip:tenpo_hardliner_tt #b Agenda de línea dura#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] [ROOT.GetCountry.GetNameNoFlag] ha promulgado la ley de [GetLawType('law_strict_edo_system').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] [ROOT.GetCountry.GetNameNoFlag] ha promulgado la ley de [GetLawType('law_shinsengumi').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] [ROOT.GetCountry.GetNameNoFlag] tiene #v 40#! niveles de [GetBuildingType('building_rice_farm').GetName|l]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')] El [concept_interest_group|l] de [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName|l] está [concept_marginalized|l]\n#tooltippable;tooltip:tenpo_shared_tt #b Agenda compartida#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] #b Ningún#! [concept_state|l] con [concept_homeland|l] de propiedad [GetCulture('japanese').GetName] sufre [concept_famine|l]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [ROOT.GetCountry.GetNameNoFlag] tiene un [Concept('concept_gdp', '$concept_gdp_short$')] de #v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! @gdp! o superior\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] La [concept_power_projection|l] del ejército [ROOT.GetCountry.GetAdjectiveNoFlag] es mayor de #v 500#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] Tenemos #v 10#! o más niveles de [GetBuildingType('building_naval_fortification').GetName|l] en [Concept('concept_state', '$concept_states$')|l] de nuestra propiedad"
 je_tenpo_crisis_complete_header: "Concluirá con una reforma Tenpō de éxito si:\n"
 je_tenpo_crisis_failure_header: "Concluirá con una reforma Tenpō fallida si:\n"
 je_tenpo_crisis_success_tt: "Hemos completado al menos #v 8#! objetivos de la agenda"
 je_tenpo_crisis_success_2_tt: "La recompensa cambiará en función del número de objetivos completados #tooltippable;tooltip:tenpo_shared_tt #b compartidos#!#!, #tooltippable;tooltip:tenpo_reformer_tt #b reformistas#!#! o de #tooltippable;tooltip:tenpo_hardliner_tt #b línea dura#!#!."
 je_tenpo_crisis_success_outcome_tt: "La recompensa cambiará en función del número de objetivos completados #b compartidos#!, #b reformistas#! o de #b línea dura#!."
 je_tenpo_crisis_success_outcome_1_tt: "Si hemos completado más objetivos de #b línea dura#!:"
 je_tenpo_crisis_success_outcome_2_tt: "Si hemos completado más objetivos #b reformistas#!:"
 je_tenpo_crisis_success_outcome_3_tt: "Si hemos completado la misma cantidad de objetivos de #b línea dura#! y #b reformistas#!:"
 modifier_tenpo_crisis_reward_hardliner: "Vuelta al orden"
 modifier_tenpo_crisis_reward_reformer: "Consagración de lo nuevo"
 modifier_tenpo_crisis_reward_balanced: "Reformas comedidas"
 modifier_rice_hoarding: "Acumulación generalizada de arroz"
 tenpo_hardliner_tt: "La #b facción de línea dura#! siente que la sociedad japonesa ha caído en la decadencia moral y que esta solo se puede frenar si se vuelve a la tradición.\n\nSus miembros creen en la introducción de leyes suntuarias más estrictas y en que los samuráis abandonen los lujos de las ciudades y vuelvan a desempeñar su idealizada función de administradores rurales austeros."
 tenpo_reformer_tt: "La #b facción reformista#! siente que la sociedad japonesa ha cambiado irreversiblemente y que las leyes del país deberían estar basadas en el estado actual de la nación en lugar de en ideales de un pasado romántico.\n\nSus miembros creen en el ascenso político de los plebeyos japoneses y en promover el comercio."
 tenpo_shared_tt: "Tanto la facción de #b línea dura#! como la #b reformista#! sienten que es imperativo proteger a Japón frente a amenazas externas y que es preciso lidiar con el problema de la seguridad alimentaria y la economía."
 button_je_tenpo_combat_rice_hoarding: "Combatir la acumulación de arroz"
 button_je_tenpo_combat_rice_hoarding_desc: "La inestabilidad política y económica de [ROOT.GetCountry.GetNameNoFlag] ha hecho que elementos sin escrúpulos adquieran y acumulen grandes cantidades de arroz, lo que ha provocado una subida de los precios. A causa de esto, muchas familias japonesas carecen de medios para comprar arroz con el que alimentarse."
 button_je_tenpo_frugal_ordinance: "Emitir la ordenanza de frugalidad"
 button_je_tenpo_frugal_ordinance_desc: "La creciente decadencia del urbanita grupo de [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName|l] amenaza la estabilidad de nuestro gobierno. Ahora sus miembros han comenzado a comportarse por encima de su posición social y alardean de riqueza ante todo el mundo.\n\nDebemos recordarles cuál es su papel en la sociedad mediante la imposición de más restricciones legales sobre artículos de lujo, entretenimiento y literatura."
 button_je_tenpo_confiscate_land: "Emitir la orden de confiscación entre Edo y Osaka"
 button_je_tenpo_confiscate_land_desc: "El área en un radio de 10 #italic #tooltippable;tooltip:glossary_ri ri#!#! de Edo y Osaka es un complejo batiburrillo de tierras de propiedad tenryo, daimyo y hatamoto. Dado que la falta de una estructura administrativa unificada tiene graves consecuencias para la defensa nacional y para nuestra capacidad para sacar el máximo partido a estas tierras, un importante rōjū ha propuesto que sean confiscadas y consolidadas.\n\nLos terratenientes desplazados recibirán como compensación terrenos en otro lugar de Japón."
 modifier_consolidation_payments: "Pagos de consolidación de tierras"
 modifier_consolidated_state_land: "Ley de consolidación de los 10 ri"
 glossary_ri: "#b El #italic ri#!#! es una unidad de medida tradicional, derivada del #italic li#! chino.\n\nLa longitud establecida de un ri fue cambiando con el tiempo, pero a finales del periodo Edo correspondía aproximadamente a 36 #italic chō#!, o lo que es lo mismo, 3,9 km."
 modifier_tenpo_crisis_ongoing: "Agitación en la era Tenpō"
 tenpo_events.1.t: "Era de la protección celestial"
 tenpo_events.1.d: "Tras años de pésimas condiciones meteorológicas, la [concept_famine|l] se ha afianzado en las tierras de [ROOT.GetCountry.GetNameNoFlag]. Ahora que los pobres y desamparados apenas logran sobrevivir, el bakufu ha de hacer frente al creciente descontento de quienes creen que el gobierno podría hacer mucho más."
 tenpo_events.1.f: "Las telas tejidas por su mujer siempre se habían vendido a buen precio en el mercado y, en las épocas buenas, podían incluso permitirse algún que otro dulce. Ahora, daban como mucho para cuatro o cinco gō de arroz. Apenas bastaba para que comieran un día, pensó, ni que decir ya para comer una semana como precisaban, ni siquiera complementando la dieta con hierbas y hojas recogidas del campo.\n\nTomó el camino que iba a casa y paró brevemente ante la casa del viejo Tora. La sífilis ya se había llevado a dos de sus hijos, y si los rumores sobre los kabuto‑gata eran ciertos, era probable que le arrebatara alguno más en las semanas venideras. Aferrándose a su saco de arroz, rezó una plegaria silenciosa y se marchó."
 tenpo_events.1.a: "Oh, cielos, ¡protegednos!"
 tenpo_events.1.tt_1: "#r Unas intensas #! [GetHarvestConditionType('torrential_rains').GetName|l] han afectado a la región de [GetGeographicRegion('geographic_region_honshu').GetName], lo que ha #r destruido#! las muy necesarias #b cosechas de arroz#! del país y ha afectado en gran medida a la [concept_food_security|l] de [ROOT.GetCountry.GetNameNoFlag]."
 tenpo_events.1.tt_2: "En cada rincón de [GetGeographicRegion('geographic_region_honshu').GetName], la muchedumbre asalta los hogares de prestamistas o aquellos sospechosos de acaparar arroz en los denominados #italic #tooltippable;tooltip:glossary_uchikowashi uchikowashi#!#!, lo que ha provocado [concept_devastation|l] #r en todo el país#!."
 glossary_uchikowashi: "#b #italic Uchikowashi#!#! hace referencia los actos de destrucción a manos del pueblo de las propiedades de aquellos que se perciben como inmorales, véase prestamistas, acaparadores de arroz y especuladores.\n\nAunque dichas acciones solían ir acompañadas de saqueos, en muchos casos los responsables de los uchikowashi evitaban deliberadamente caer en tal práctica para recalcar la legitimidad de sus actos."
 tenpo_events.2.t: "Revuelta del filósofo samurái"
 tenpo_events.2.d: "Desilusionad[SCOPE.sCharacter('oshio_scope').GetCustom('ES_OA')] con el orden establecido y la incapacidad de este para lidiar con la [concept_famine|l] que sufre [SCOPE.sState('osaka_scope').GetName], [SCOPE.sCharacter('oshio_scope').GetCustom('ES_ElLa')] magistrad[SCOPE.sCharacter('oshio_scope').GetCustom('ES_OA')] y erudit[SCOPE.sCharacter('oshio_scope').GetCustom('ES_OA')] [SCOPE.sCharacter('oshio_scope').GetFullName] se ha sublevado contra las autoridades locales. Ya han ardido grandes áreas de [SCOPE.sState('osaka_scope').GetCityHubName], dado que sus partidarios prenden fuego a las oficinas gubernamentales."
 tenpo_events.2.f: "«A pesar de que no poseamos el poderío de Tang y Wu, ni la virtud de Confucio y Mencio, no se puede evitar: estamos decididos a actuar por el bien del reino, a pesar de la maldición que eso podría acarrear sobre nuestro linaje.\n\nCastigaremos y ejecutaremos a los diversos funcionarios que atormentan y acosan al pueblo llano, y, una vez hecho esto, castigaremos y ejecutaremos de igual modo a los ciudadanos adinerados de Osaka que se deleiten con la extravagancia.\n\nEntonces, el oro, la plata y las monedas que han almacenado en cámaras ocultas y todo el arroz que han guardado en sus almacenes y fincas será redistribuido y asignado».\n\n–Ōshio Heihachirō, #italic Fragmentos de su manifiesto#!"
 tenpo_events.2.a: "Que se reúna a la milicia y se clave al traidor en una cruz."
 tenpo_events.2.b: "Un acto desesperado, pero justificado."
 tenpo_events.2.c: "Los rebeldes arrollan a la guarnición local y se hacen con [SCOPE.sState('osaka_scope').GetCityHubName]."
 tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName] evita que lo capturen y se suicida inmolándose."
 tenpo_events.2.tt_2: "Las autoridades torturan y crucifican a [SCOPE.sCharacter('oshio_scope').GetFullName]."
 tenpo_events.2.tt_3: "Las milicias locales #b ponen fin a la rebelión#! antes de que pueda extenderse más aún."
 tenpo_events.2.tt_4: "El [concept_agitator|l] [SCOPE.sCharacter('oshio_scope').GetFullName] recibe una sentencia leve y simbólica, y se le permite seguir con su labor."
 modifier_osaka_burning: "Crítica firmada con sangre"
 modifier_controversial_pardon: "Perdón controvertido"
 tenpo_events.3.t: "Reformas obligatorias"
 tenpo_events.3.d: "Tras mostrar su satisfacción con el ritmo de las reformas, [ROOT.GetCountry.GetRuler.GetCustom('ES_ElLa')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] ha felicitado a los consejeros encargados por sus avances, puesto que cree que [ROOT.GetCountry.GetName] podrá superar cualquier reto que se presente, sea de procedencia extranjera o nacional."
 tenpo_events.3.f: "—Doce, mi señor —dice el consejero principal dejando el pincel a un lado de la mesa—. Y los informes de Kinai son más de lo mismo, parece que nuestras reformas empiezan a cuajar.\n\nDesde la tarima, [ROOT.GetCountry.GetRuler.GetCustom('ES_ElLa')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] asiente lacónicamente.\n\n—Muy bien. Quiero que esto se haga saber en la corte a su debido tiempo. Veamos, en relación al informe del magistrado de Nagasaki…"
 tenpo_events.3.a: "Que esto marque el final de la decadencia moral y política de [ROOT.GetCountry.GetName]."
 tenpo_events.3.b: "Desde el campesino hasta el samurái, ¿acaso no somos todos súbditos del emperador?"
 tenpo_events.3.c: "La estabilidad del reino es lo primero."
 tenpo_outcome_hardliner_tt: "Hemos completado más objetivos de #b línea dura#! que #b reformistas#!"
 tenpo_outcome_reformer_tt: "Hemos completado más objetivos #b reformistas#! que de #b línea dura#!"
 tenpo_outcome_balanced_tt: "Hemos completado la misma cantidad de objetivos de #b línea dura#! que #b reformistas#!"
 tenpo_events.4.t: "Acción e inacción"
 tenpo_events.4.d: "Dado que los resultados del programa de reformas no han sido impresionantes y que se enfrenta al descontento cada vez mayor del pueblo hacia los consejeros principales, [ROOT.GetCountry.GetRuler.GetCustom('ES_ElLa')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] ha cesado de su puesto a [SCOPE.sCharacter('roju_scope').GetFullName]."
 tenpo_events.4.f: "Exilio. El antiguo consejero saboreó la palabra y no le gustó mucho. Aunque, dados los acontecimientos de ayer, quizás fuera preferible a permanecer en Edo. Los ayudantes que le quedaban aún estaban quitando del estanque y del patio las tejas y las piedras lanzadas, si bien jamás podría olvidar algunas de las amenazas que había oído.\n\nVolvió a saborear la palabra y le resultó menos repulsiva. Además, pensó, siempre había tenido ganas de ver el monte Gassan en persona."
 tenpo_events.4.a: "No quiero volver a ver nunca más a semejante imbécil."
 tenpo_events.4.b: "Que se revoquen todas sus decisiones y que el público lo sepa."
 tenpo_events.4.tt_1: "Se #r degrada#! de su puesto y se exilia internamente a [SCOPE.sCharacter('roju_scope').GetFullName] a la provincia de #b Dewa#!"
 modifier_tenpo_fail: "Reformas Tenpō acortadas"
 tenpo_events_4_demotion_tt: "El [concept_leader|l] de un [concept_interest_group|l] [concept_in_government|l] ha sido degradado y exiliado internamente" # tooltip for event_outcome_failed_effect_desc in je_tenpo_crisis
 tenpo_events.5.t: "Los terratenientes se resisten a la centralización"
 tenpo_events.5.d: "Nuestra jugada para confiscar las tierras de [SCOPE.sState('kanto_scope').GetName] y [SCOPE.sState('kansai_scope').GetName] se ha topado con una oposición generalizada por parte de los terratenientes locales. Aquellos que recibieron tierras como recompensa por sus hazañas militares son quienes más se han quejado."
 tenpo_events.5.f: "«El mérito en combate fue lo que hizo que mi ancestro recibiera las tierras que ahora poseo. Desde la batalla de Sekigahara, cada generación ha trabajado la tierra, aumentando su producción y entregando a nuestros señores lo correspondiente sin queja alguna.\n\n¿Acaso tal servicio se merece el tratamiento que ahora se nos da? ¿Nuestro premio es que nos reubiquen sin la debida compensación?»."
 tenpo_events.5.a: "Cancelemos la centralización antes de que esto se salga de madre."
 tenpo_events.5.b: "Ofrezcamos tierras adicionales como compensación a los reubicados."
 tenpo_events.5.c: "¡Que no olviden que esta es la voluntad [ROOT.GetCountry.GetRuler.GetCustom('ES_DelDela')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l]!"
 modifier_heavy_handed_land_confiscations: "Tierras confiscadas con mano dura"
 modifier_promotions_and_koku_redistribution: "Ascensos y redistribución de koku"
 modifier_reckless_roju: "Rōjū imprudente"
 modifier_will_of_the_shogun: "En el nombre del shogún"
 tenpo_events.6.t: "Un león en la guarida del dragón"
 tenpo_events.6.d: "La victoria de [SCOPE.sCountry('britain_scope').GetName] contra [SCOPE.sCountry('china_scope').GetName] ha conmocionado a nuestra nación. Las fuerzas [SCOPE.sCountry('britain_scope').GetAltAdjectiveNoFormatting('PF')] pusieron en fuga fácilmente a los juncos y ejércitos chinos, por lo que ahora muchos se preguntan si [ROOT.GetCountry.GetName] sería capaz de resistir un ataque parecido."
 tenpo_events.6.f: "«Desde el templo de Ganlu al oeste hasta el templo de Jinshan al este, las tierras en torno a Zhenjiang estaban a rebosar de bárbaros blancos y negros, como piezas esparcidas por un tablero de go, y los lugareños se preguntaban si se marcharían alguna vez».\n\n–Mineta Fūkō, #italic Nuevas historias de ultramar#!"
 tenpo_events.6.a: "Que el cielo nos proteja, ya que nuestros samuráis no lo harán."
 tenpo_events.6.b: "Que se censure cualquier informe negativo procedente de China."
 tenpo_events.6.c: "Somos el acantilado contra el que chocarán los bárbaros."
 modifier_opium_war_aftermath: "Bárbaros a las puertas"
 modifier_defenses_strengthened: "Guarniciones costeras reforzadas"
 tenpo_events.7.t: "La escuela de Takashima"
 tenpo_events.7.d: "Temiendo por el futuro de Japón en las postrimerías de las guerras del Opio, [SCOPE.sCharacter('takashima_scope').GetFullName], un magistrado de Nagasaki, ha organizado una unidad militar moderna al estilo holandés e insta al resto del país a seguir su ejemplo."
 tenpo_events.7.f: "—Los sombreros de sus hombres armados parecen extrañas coronas y las órdenes se dan en el áspero idioma de los holandeses. No obstante, sus formaciones están bien entrenadas y organizadas, y son capaces de soltar una andanada el doble de rápido que mis propios sirvientes, si bien su precisión es algo inferior.\n\n—¿Y qué hay de la artillería?\n\n—No tiene parangón. Me temo que cuanto más tardemos en adoptarla, menores serán nuestras posibilidades de repeler un asalto bárbaro."
 tenpo_events.7.a: "Que se autorice la adopción de las armas y técnicas de los bárbaros."
 tenpo_events.7.b: "Hemos de favorecer a las casas de mosquetería tradicionales."
 modifier_inoue_tatsuke_primacy: "Primacía Inoue-Tatsuke"
 modifier_favouring_traditional_musketry_houses: "Casas de mosquetería tradicionales favorecidas"
 modifier_favouring_takashima: "Casas de mosquetería relegadas"
 modifier_takashima_school: "Promoción de la escuela de Takashima"
 tenpo_events.8.t: "Por un cuenco de arroz"
 tenpo_events.8.d: "Acusaciones de acumulación de arroz y de especulación con los precios han hecho que las tensiones entre campesinos y comerciantes de [SCOPE.sState('tenpo_unrest_state_scope').GetName] lleguen a un punto crítico. Ahora que las filas de los campesinos se han visto reforzadas con forajidos y mendigos, las autoridades de la zona se enfrentan a una rebelión en toda la provincia."
 tenpo_events.8.f: "Él había sido uno de los primeros. Uno de aquellos afortunados que había asaltado el hogar del malvado comerciante y distribuido entre el pueblo los bienes que este había conseguido ilícitamente. Pero conforme su mirada vagaba alrededor de la hoguera, cayó en la cuenta de los pocos que quedaban. Eikichi y Matsuzō permanecían en silencio, aunque se parecían bien poco a los hombres que había conocido a causa de la furia justificada que transmitían. Fukumatsu había perdido la vida el segundo día, seguido de Takeshichi durante el séptimo. El resto se había dispersado como hojas al viento cuando comenzó la persecución de los soldados del magistrado.\n\nSe sentía lleno de vergüenza y desesperación debido al carácter de los hombres que los habían reemplazado, pero no veía otro camino. Pues incluso una compañía tan dudosa como esa parecía una maravilla comparada con la hoja de un verdugo."
 tenpo_events.8.a: "Que nuestros hombres partan a aplastar a estos facinerosos."
 tenpo_events.8.b: "Dejemos que la agitación se extinga sola."
 tenpo_events.8.c: "Que los líderes de los pueblos de la zona ayuden a acabar con la agitación."
 modifier_consulted_headsmen: "Concesiones a los pueblos"
 modifier_lingering_brigandry: "Bandidaje persistente"
 modifier_brutal_anti_bandit_campaigns: "Campañas brutales contra bandidos"
 je_taming_the_north: "Domar el norte"
 je_taming_the_north_reason: "Con la formación de la #b Comisión de Desarrollo Colonial de [SCOPE.sState('hokkaido_state_scope').GetName]#!, comúnmente conocida como #b Kaitakushi#!, esta antigua frontera bulle de actividad. Todos los días, hombres y mujeres llegan del sur en busca de nuevas tierras y oportunidades.\n\nY, sin embargo, esta no es una avalancha de gente cualquiera. Entre los colonos llegan burócratas, intelectuales y visionarios con ideas modernas, todos ellos con la misión de dar forma a esta tierra y ansiosos por ver cómo sus ideas sobre el futuro de [ROOT.GetCountry.GetName] se manifiestan en el [SCOPE.sState('hokkaido_state_scope').GetName] del presente."
 taming_the_north_agriculture_potentials_goal_tt: "Hemos usado la acción #b $button_je_taming_the_north_agriculture_potentials$#! #v 3#! veces"
 taming_the_north_agriculture_arable_goal_tt: "Hemos usado la acción #b $button_je_taming_the_north_agriculture_arable_land$#! #v 3#! veces"
 taming_the_north_colonies_goal_tt: "Hemos usado la acción #b $button_je_taming_the_north_establish_colonies$#!"
 je_taming_the_north_additional_goal_pre: "Si todo #b $STATE_SAKHALIN$#! nos pertenece, el [concept_timed_modifier|l] #b $modifier_tamed_north$#! se aplicará también a la [concept_state_region|l] de $STATE_SAKHALIN$:"
 je_taming_the_north_additional_goal: "Si nos pertenece la totalidad de [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName], el [concept_timed_modifier|l] #b $modifier_tamed_north$#! se aplicará también a [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]:"
 je_taming_the_north_additional_goal_completed: "Como nos pertenece la totalidad de [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName], el [concept_timed_modifier|l] #b $modifier_tamed_north$#! se aplicará también a [SCOPE.sStateRegion('sakhalin_state_region_scope').GetName]:"
 modifier_tamed_north: "La colonia modelo"
 modifier_northern_learnings: "Enseñanzas del Kaitakushi"
 button_je_taming_the_north_establish_colonies: "Establecer colonias promovidas por el estado"
 button_je_taming_the_north_establish_colonies_desc: "Una colonia sin suficientes colonos está condenada a fracasar. Deberíamos plantearnos ofrecer incentivos que atraigan a las familias de todas partes de [ROOT.GetCountry.GetName] a asentarse en el norte."
 button_je_taming_the_north_integrate_ainu: "Implementar protecciones legales a los ainus"
 button_je_taming_the_north_integrate_ainu_desc: "Hasta ahora, la postura de la comisión de los [GetCulture('ainu').GetName] ha sido de integración forzada y eliminación cultural. Sin embargo, nuestros crecientes movimientos por una relación más equitativa con los habitantes [GetCulture('ainu').GetNameNoFormatting|l] del norte han resultado en una mejora de las relaciones entre nuestros dos pueblos.\n\nEn consecuencia, se ha hecho llegar una propuesta [ROOT.GetCountry.GetRuler.GetCustom('ES_AlAla')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] para que consagre legalmente a los [GetCulture('ainu').GetNameNoFormatting] como un pueblo hermano protegido bajo la ley de [ROOT.GetCountry.GetName], y que se los considere iguales a los habitantes de procedencia [GetCulture('japanese').GetName], tanto en derechos como en deberes."
 ainu_frenship_tt: "Hemos promovido de manera constante los intereses de los [GetCulture('ainu').GetName] en #b eventos#!"
 button_je_taming_the_north_sapporo_agricultural_college: "Escuela de Agricultura de Sapporo fundada"
 button_je_taming_the_north_sapporo_agricultural_college_desc: "El norte es el escenario perfecto para probar las últimas teorías en materia agrícola y de gestión de tierras. Fundaremos una escuela de agricultura a la vanguardia en la que trabajarán los extranjeros más talentosos, lo que sentará los cimientos para la transformación científica de la tierra."
 sapporo_partner_positive_catalyst_tt: "Se activará un [concept_diplomatic_catalyst|l] #g positivo#! con un país al azar que reúna los requisitos"
 button_je_taming_the_north_agriculture_potentials: "Introducir nuevos cultivos"
 button_je_taming_the_north_agriculture_potentials_desc: "La superficie cultivable de la isla es de suma importancia, pero el verdadero desarrollo económico solo tendrá lugar sin plantamos los cultivos adecuados.\n\nLos nuevos desarrollos en el campo de la agricultura, liderados por la #b Escuela de Agricultura de Sapporo#!, nos han permitido introducir cultivos en esta fría frontera, donde lo creíamos imposible.\n\nOpciones disponibles:\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#! (aumentando)\n• [GetBuildingType('building_rice_farm').GetName]\n• [GetBuildingType('building_dye_plantation').GetName]\n• [GetBuildingType('building_opium_plantation').GetName]\n• [GetBuildingType('building_vineyard').GetName]"
 established_sapporo_college_tt: "Hemos establecido la #b Escuela de Agricultura de Sapporo#!"
 hokkaido_agriculture_potentials_tt: "La decisión se puede tomar un total de #v 3#! veces (actualmente [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0])."
 modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]"
 button_je_taming_the_north_agriculture_arable_land: "Continuar la recuperación del terreno"
 button_je_taming_the_north_agriculture_arable_land_desc: "Aunque la agricultura de estas vastas tierras está subdesarrollada, tiene un gran potencial. Las grandes cordilleras montañosas, con abundantes corrientes fluviales, ofrecen muchas oportunidades para ampliar la superficie hacia el norte.\n\nDebemos drenar los humedales, regar los campos y domar la tierra para que todos sean testigos de que la cultura [GetCulture('japanese').GetName] es imparable."
 hokkaido_agriculture_arable_tt: "La decisión se puede tomar un total de #v 3#! veces (actualmente [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0])."
 hokkaido_events.1.t: "El octavo circuito"
 hokkaido_events.1.d: "Con la incorporación de [SCOPE.sState('hokkaido_scope').GetName] —las tierras ainu— a Japón, debemos elegir un nuevo nombre que refleje el nuevo estado de este territorio. La nueva Comisión de Desarrollo Colonial establecida ha presentado varias propuestas que deberá revisar [ROOT.GetCountry.GetRuler.GetCustom('ES_ElLa')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l]."
 hokkaido_events.1.f: "«Una tierra de salvajes es lo que es. De pantanos y barro. De pescadores empobrecidos y caníbales. ¿Qué esperas conseguir en esa tierra abandonada que no te ofrezca ya [ROOT.GetCountry.GetCapital.GetCityHubName]?».\n\n«Un propósito, madre. Algo que pueda hacer mío»."
 hokkaido_events.1.a: "Su nombre será #tooltippable;tooltip:hokkaido_events.1_tt_3 #b Hokkai-dō#!#!: el circuito del Mar del Norte." # 北加伊道
 hokkaido_events.1.b: "#tooltippable;tooltip:hokkaido_events.1_tt_2 #b Hokkai-dō#!#!, en honor a los habitantes de esta tierra." # 北海道
 hokkaido_events.1.c: "#tooltippable;tooltip:hokkaido_events.1_tt_4 #b Kaitō-dō#!#!, el circuito Marítimo-Isleño, es claramente la mejor opción."
 hokkaido_events.1.e: "#tooltippable;tooltip:hokkaido_events.1_tt_5 #b Hitakami-dō#!#! tiene cierto aire literario."
 hokkaido_events.1.tt_1: "Se ha fundado la ciudad de #b Sapporo#! y se ha convertido en la nueva capital administrativa de la isla, que reemplazará a #b Hakodate#!."
 modifier_ainu_heritage_aknowleged: "Tierra de los Kai"
 modifier_breaking_new_ground: "Abriendo nuevos caminos"
 modifier_hokkaido_naval_connections: "El circuito marítimo"
 modifier_call_of_the_frontier: "Llamada de la frontera"
 the_ainu_will_appreciate_this_tt: "@information! Los [GetCulture('ainu').GetName] recordarán esto"
 hokkaido_events.1_tt_2: "#b El circuito Kai del Norte#!\nEn palabras del miembro de la comisión Matsuura Takeshirō, #italic kai#! (加伊) puede interpretarse como un antiguo endónimo ainu para su gente."
 hokkaido_events.1_tt_3: "#b El circuito del Mar del Norte#!\nUna medida del gobierno a la propuesta original de Matsuura Takeshirō. Aquí, los caracteres #italic kai#! (加伊) se sustituyen por el carácter fonéticamente idéntico #italic kai#! (海), que significa «mar».\n\n@information! Esta es la propuesta que se seleccionó históricamente."
 hokkaido_events.1_tt_4: "#b El circuito Marítimo-Isleño#!\nPor encima de todo, a la isla la define su relación con el mar: un hecho que debería representar su nuevo nombre."
 hokkaido_events.1_tt_5: "#b El circuito de la Tierra del Sol Naciente#!\nUn nombre arcaico de la era Yamato para las tierras fronterizas del noreste. Elegir esta opción conectaría profundamente la nueva colonia con el antiguo pasado de Japón."
 hokkaido_events.2.t: "La nueva frontera"
 hokkaido_events.2.d: "La cuestión del asentamiento en la región, y como llevarlo a cabo de la manera más óptima, lleva preocupando a la Comisión de Desarrollo Colonial de [SCOPE.sState('hokkaido_state_scope').GetName] desde hace tiempo. Los administradores, impacientes, ahora reclaman que tomemos una decisión definitiva."
 hokkaido_events.2.f: "A medida que crecía, su padre a menudo le hablaba sobre sus antepasados. De los nobles y orgullosos guerreros del periodo de los estados en guerra. De su austera dignidad y sus grandes hazañas bélicas. Las historias lo cautivaban siendo niño, pero ahora que era mayor, solo lo llenaban de melancolía. La ironía de que su padre, un oficinista borracho de la ciudad que solo portaba la espada por la dignidad que le otorgaba ensalzar las virtudes del pasado, le resultaba insoportable.\n\nAsí que, cuando su progenitor le pidió que lo ayudara con la administración del negocio, lo rechazó con desdén, y partió inmediatamente hacia el norte. Quizá allí encontraría la salvación para su linaje."
 hokkaido_events.2.a: "Priorizar el asentamiento de colonos con formación militar."
 hokkaido_events.2.b: "El campesino humilde constituye la columna vertebral de [ROOT.GetCountry.GetName]."
 hokkaido_events.2.c: "Limitar la mayoría de los asentamientos de cultura [GetCulture('japanese').GetName|l] a zonas que estén ocupadas por los [GetCulture('ainu').GetName]."
 modifier_tondenhei_settlements: "Asentamientos de tondenhei"
 modifier_peasant_settlements: "Asentamientos de campesinos"
 modifier_restricted_settlements: "Hogar de los ainu preservado"
 hokkaido_events.2.tt_1: "El #v 1,5 %#! de todos los [Concept('concept_pop', 'colectivos')] de procedencia [GetCulture('japanese').GetName] del [concept_capital_state|l] se reubicará en [SCOPE.sState('hokkaido_state_scope').GetName]"
 hokkaido_events.2.tt_2: "El #v 3 %#! de todos los [Concept('concept_pop', 'colectivos')] de procedencia [GetCulture('japanese').GetName] en [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (uno de los [Concept('concept_state', 'estados')] con menor [Concept('concept_gdp','PIB')] de las [GetGeographicRegion('geographic_region_home_islands').GetName]) se reubicará en [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_old_swords_in_new_lands: "Espadas viejas en nuevas tierras"
 modifier_go_north_young_man: "Ve hacia el norte, joven"
 hokkaido_events.3.t: "Semillas de progreso"
 hokkaido_events.3.d: "Los recientes avances en la Escuela de Agricultura de Sapporo han hecho surgir propuestas para introducir nuevos cultivos en los campos de [SCOPE.sState('hokkaido_state_scope').GetName]."
 hokkaido_events.3.f: "#b Diario personal del laboratorio, 154#!\nSe están abandonando las cepas de las variedades occidentales en favor de las del sur debido a los resultados en las últimas pruebas. El equipo dice que cabe esperar que el límite de cultivo se desplace considerablemente hacia el norte, quizá incluso más allá de Kamikawa. Necesitamos más estudios para evaluar el potencial productivo, pero somos optimistas. Hemos agendado una reunión con la junta directiva de la facultad mañana. Necesito comprarme una corbata nueva."
 hokkaido_events.3.a: "Centrar nuestros esfuerzos en mejorar los cultivos ya existentes."
 hokkaido_events.3.b: "Desarrollar variedades resistentes al frío que permitan las [GetBuildingType('building_rice_farm').GetName|l] locales."
 hokkaido_events.3.c: "Las tierras bajas son apropiadas para las [GetBuildingType('building_dye_plantation').GetName|l] de color añil."
 hokkaido_events.3.e: "La amapola se adapta bien aquí, las [GetBuildingType('building_opium_plantation').GetName|l] son el futuro."
 hokkaido_events.3.g: "Levantar [GetBuildingType('building_vineyard').GetName|l] con cepas de uva especiales."
 button_je_taming_the_north_complete: "Hemos desarrollado estas tierras tanto como nos permite nuestra tecnología"
 modifier_introducing_new_crops: "Introducir nuevos cultivos"
 modifier_opimizing_existing_variants: "Variantes de cultivo adaptadas al frío"
 hokkaido_events.4.t: "Crecimiento de la tierra" # Markens Grøde really does sound better in Norwegian
 hokkaido_events.4.d: "La Comisión de Desarrollo Colonial [SCOPE.sState('hokkaido_state_scope').GetName] ha alcanzado otro hito importante, y grandes extensiones de los antiguos humedales se han convertido en valiosas tierras agrícolas."
 hokkaido_events.4.f: "Aquello realmente impresionaba. Hace una década, la embarcación más grande que podía recorrer de forma segura el río que tenía delante de él era un pequeño barco de remos. Ahora, observaba a un grupo de trabajadores descargar cajas y sacos de arpillera de un enorme barco de vapor que arrojaba humo al frío aire de la montaña. ¿Material para la nueva esclusa, quizás? ¿O para el proyecto de drenaje de la parte alta del río? ¿O quizás solo traía suministros de la nueva aldea del valle? No lo sabía, y en realidad no importaba, ya que, llevase lo que llevase, llevaba el futuro."
 hokkaido_events.4.a: "Con cada golpe de azada, moldeamos esta tierra."
 hokkaido_events.4.b: "Y con cada nuevo hogar, la hacemos crecer."
 hokkaido_events.4.tt_1: "El #v 2 %#! de todos los [Concept('concept_pop', 'colectivos')] de procedencia [GetCulture('japanese').GetName] en [SCOPE.sState('hokkaido_migration_origin_scope').GetName] (uno de los [Concept('concept_state', 'estados')] con menor [Concept('concept_gdp','PIB')] de las [GetGeographicRegion('geographic_region_home_islands').GetName]) se reubicará en [SCOPE.sState('hokkaido_state_scope').GetName]"
 modifier_immigration_burst: "Oleada de inmigración"
 modifier_open_to_business: "Horario de venta al público"
 hokkaido_events.5.t: "Chicos, sed ambiciosos..."
 hokkaido_events.5.d: "Tras su graduación, la primera promoción [SCOPE.sCountry('sapporo_partner_country_scope').GetAltAdjectiveNoFormatting('SF')] de la Escuela de Agricultura de Sapporo está deseando poner en práctica sus nuevos conocimientos. Mientras tanto, el claustro de profesores debate sobre los objetivos y la futura dirección de la institución."
 hokkaido_events.5.f: "«... Sed ambiciosos: no solo por dinero ni por engrandecimiento egoísta, ni por esa cosa efímera que los hombres llaman fama. Sed ambiciosos por conseguir todo a lo que puede aspirar un hombre».\n\n–William Smith Clark, #italic Discurso de despedida del presidente de la Escuela de Agricultura de Sapporo#!"
 hokkaido_events.5.a: "Una escuela de agricultura debería centrarse principalmente en la agricultura."
 hokkaido_events.5.b: "Deberíamos priorizar la expansión de la Facultad de Ingeniería."
 hokkaido_events.5.c: "Construir una Facultad de Humanidades e iniciar estudios culturales de la región."
 hokkaido_events.5.tt_1: "La influencia de los miembros [SCOPE.sCountry('sapporo_partner_country_scope').GetAltAdjectiveNoFormatting('PM')] de #b Sapporo#! ha llevado a la creación de una comunidad [SCOPE.sReligion('sapporo_partner_religion_scope').GetName] [GetCulture('japanese').GetName] local."
 hokkaido_events.5.tt_2: "Desbloquea #b $button_je_taming_the_north_agriculture_potentials$#! y #b $button_je_taming_the_north_agriculture_arable_land$#! en la [Concept('concept_journal_entry', 'anotación en el diario')] #b $je_taming_the_north$#!"
 modifier_sapporo_expanded_agricultural_faculty: "Métodos agrarios innovadores"
 modifier_sapporo_expanded_engineering_faculty: "Facultad de Ingeniería Avanzada"
 modifier_sapporo_humanities_faculty: "Grupo de Estudios Culturales de Sapporo"
 hokkaido_events.6.t: "Ainu Mosir, Sisam Mosir"
 hokkaido_events.6.d: "En un ambiente de controversia nacional, [ROOT.GetCountry.GetCapital.GetCityHubName] ha aprobado un nuevo decreto sobre el estatus legal de [SCOPE.sState('hokkaido_state_scope').GetName], delineando formalmente una patria ainu y estableciendo instituciones limitadas que existan en paralelo al aparato burocrático [ROOT.GetCountry.GetAdjective] oficial."
 hokkaido_events.6.f: "«¡Hinna! ¡Hinna!», con una sonrisa a la que prácticamente le faltaban todos los dientes, la vieja ainu le entregó un tazón de sopa. Miró la mezcla de ingredientes que contenía y dio gracias a los cielos de que sus padres no estuvieran allí para juzgarlo.\n\n«Las cosas que hago por la paz», murmuró para sí mismo, aceptando el plato con una sonrisa forzada."
 hokkaido_events.6.a: "«Esta tierra es lo bastante grande para que quepamos todos»."
 modifier_opposes_ainu_rights: "Concesiones bárbaras"
 modifier_supports_ainu_rights: "Derechos ainu consagrados"
 hokkaido_events.7.t: "El acto final de la Comisión"
 hokkaido_events.7.d: "Tras anunciar formalmente el éxito de la misión liderada por el gobierno, la Comisión de Desarrollo Colonial de [SCOPE.sState('hokkaido_state_scope').GetName] ha decidido transferir el resto de sus responsabilidades al estado."
 hokkaido_events.7.f: "#b Proclamación n.º 8#!\nPor la presente, la Comisión de Desarrollo Colonial de [SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting] es abolida y se proclaman las tres prefecturas de Hakodate, Sapporo y Nemuro. Los límites de sus respectivas jurisdicciones se promulgarán en fechas posteriores."
 hokkaido_events.7.a: "Un ejemplo brillante para futuras empresas coloniales..."
 hokkaido_events.7.b: "... y para las [GetGeographicRegion('geographic_region_home_islands').GetName], en lo que a esto respecta."
 modifier_external_applications: "Kaitakushi: aplicaciones externas"
 modifier_domestic_applications: "Kaitakushi: aplicaciones domésticas"
 hokkaido_events.8.t: "Comisión sin causa"
 hokkaido_events.8.d: "La pérdida de [SCOPE.sStateRegion('hokkaido_state_region_scope').GetName] ha obligado a la Comisión de Desarrollo Colonial a disolverse sin haber completado su misión. En respuesta, los ciudadanos indignados han tomado las calles de [ROOT.GetCountry.GetName] para protestar por la mengua tanto del prestigio nacional como de sus inversiones personales."
 hokkaido_events.8.f: "Agotado, el administrador emérito se desplomó en la silla de su oficina y se sirvió una generosa copa de sake. Tras apurarla de un trago, detuvo sus ojos en los mapas que se extendían delante de él, sobre la mesa. Llenos de garabatos, notas y marcas, cada uno de ellos denotaba un plan separado al que le había dedicado sus energías vitales. Ahora, no le quedaban planes ni energía, y el optimismo implícito de cada nota parecía cargar un tono burlón.\n\n«Al infierno», pensó, y se sirvió otra copa."
 hokkaido_events.8.a: "Por desgracia, este resultado está fuera del control del gobierno."
 modifier_lost_northern_investments: "Inversiones norteñas perdidas"
