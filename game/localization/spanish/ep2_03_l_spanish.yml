l_spanish:
 #Japan Single-Fire Events
 japan_events.31.t: "Arde un teatro en [SCOPE.sState('kabuki_theatre_state').GetCityHubName]"
 japan_events.31.d: "Un incendio ha calcinado un conocido teatro de kabuki de [SCOPE.sState('kabuki_theatre_state').GetName]. Si bien la compañía tiene planes para su reconstrucción, miembros del grupo de [SCOPE.gsInterestGroup('relevant_ig').GetName|l] —en especial [SCOPE.sCharacter('relevant_leader').GetFullName]— ven en esto la oportunidad de regular el entretenimiento en [SCOPE.sState('kabuki_theatre_state').GetCityHubName] y obligar a los artistas a reconstruir su teatro fuera de los límites de la ciudad."
 japan_events.31.f: "Subido a la plataforma de una torre contra incendios, un guardia inquieto vigila [SCOPE.sState('kabuki_theatre_state').GetCityHubName] diligentemente. A última hora de la tarde, detecta las inconfundibles señales de un incendio desde su punto de observación. Cuando el humo aumenta y el punzante olor del fuego se extiende por el aire, acude raudo a dar la alarma.\n\nLos desprevenidos vecinos son alertados del peligro y las brigadas contra incendios pasan a la acción escalando a los tejados para controlar las llamas. Cuando el fuego queda apagado, resulta obvio que hay muchos daños. Lo único que queda de un conocido teatro de kabuki son las cenizas dejadas por el fuego destructor."
 japan_events.31.a: "Que la reconstrucción sea fuera de los límites de la ciudad."
 japan_events.31.b: "Permitamos que los artistas lleven a cabo la reconstrucción."
 modifier_kabuki_regulated: "Mano dura con el teatro de kabuki"
 modifier_theatre_affronted_official: "Funcionario agraviado"
 modifier_shogunate_opposition_ig_approval: "Oposición oportunista"
 japan_events.32.t: "Imágenes del mundo flotante"
 japan_events.32.d: "La obra de un prolífico artista de ukiyo-e de [SCOPE.sState('ukiyo_e_state').GetCityHubName] ha cautivado la imaginación de artistas tanto en [ROOT.GetCountry.GetName] como en el extranjero."
 japan_events.32.f: "Un famoso grabado en madera muestra el alegre distrito teatral a las afueras de [SCOPE.sState('ukiyo_e_state').GetCityHubName]. La plateada luz de la luna ilumina la calle principal, que está llena de personas cuyas siluetas proyectan sombras. En el lado este de la calle hay una serie de casas de té y teatros de marionetas. Enfrente, en el lado oeste, hay tres teatros de kabuki, cada uno con una torre del tambor.\n\n«Solo la mano de un maestro podría dar unos trazos tan firmes y certeros y con unas sombras tan delicadas justo donde estas deberían estar. Y solo la mente de un maestro podría concebir una figura con semejante organización rítmica; tan fuerte y, a la vez, tan exquisitamente refinada».\n—F.W.G., #italic Boletín del Instituto de Arte de Chicago#!"
 japan_events.32.a: "No cabe duda de que el arte [ROOT.GetCountry.GetAdjectiveNoFormatting] seguirá alcanzando renombre a nivel mundial."
 japan_events.32.b: "Excelente. Que se fomente la creación de más obras como esta."
 modifier_ukiyo_e_prestige: "Proliferación de grabados en madera"
 modifier_ukiyo_e_production: "Producción de grabados en madera"
 japan_events.33.t: "Lucha contra la tradición"
 japan_events.33.d: "Los efectos de la occidentalización sobre la cultura [ROOT.GetCountry.GetAltAdjectiveNoFormatting('SF')] son patentes. Dado que las costumbres están cambiando rápidamente, [SCOPE.sCharacter('relevant_character').GetCustom('ES_ElLa')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle|l] [SCOPE.sCharacter('relevant_character').GetFullName] está promoviendo un torneo de sumo en [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] para combatir el antagonismo público contra la tradición."
 japan_events.33.f: "La multitud comienza a acudir al salón del sumo recién construido en los terrenos del templo, llena de curiosidad por el evento, puesto que cuenta con el respaldo [SCOPE.sCharacter('relevant_character').GetCustom('ES_DelDela')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle|l]. Entre los asistentes se encuentran aristócratas y estadistas cuya fascinación por la cultura occidental ha hecho que cuestionen si se deberían cortar los lazos con esta tradición. Aunque la época dorada del sumo quedó atrás hace mucho, puede que la asistencia [SCOPE.sCharacter('relevant_character').GetCustom('ES_DelDela')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle|l] [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] haya hecho que el pueblo vuelva a ver la importancia cultural de este deporte."
 japan_events.33.a: "Los esfuerzos [SCOPE.sCharacter('relevant_character').GetCustom('ES_DelDela')] [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle|l] restañarán la imagen pública de este deporte."
 japan_events.33.b: "La tradición de este deporte [ROOT.GetCountry.GetAdjectiveNoFormatting] gozará de una larga vida."
 modifier_restored_sumo_popularity: "Popularidad del sumo restaurada"
 modifier_traditional_sports_movement_support: "Deporte nacional"
 japan_events.34.t: "Desastre ballenero en [SCOPE.sState('whaling_state').GetPortHubName]"
 japan_events.34.d: "Un bote procedente de la costa de [SCOPE.sState('whaling_state').GetName] ha avistado dos ballenas francas: una madre y su cría. Azuzado por la desesperación tras una temporada con pocas capturas, un grupo de balleneros se ha aventurado al mar a pesar del mal tiempo. Hay más de 100 personas desaparecidas."
 japan_events.34.f: "Hacía rato que el fuego del bote había desaparecido de la vista y ya no se podía localizar la flota desde tierra, lo que había causado una gran conmoción en [SCOPE.sState('whaling_state').GetPortHubName].\n\n—Por muy mal que vengan dadas, siempre hemos evitado cazar a madres y crías —comenta un hombre—. Deberíamos dejar que las ballenas se vayan.\n\n—Qué tontería —replica su primo—. Las ballenas son una bendición. Seguro que la expedición vuelve pronto con una captura abundante."
 japan_events.34.a: "La $bg_whaling$ es un negocio primordial para [SCOPE.sState('whaling_state').GetNameNoFormatting]."
 japan_events.34.b: "En su lugar, centremos nuestros esfuerzos de cara al futuro en la $bg_fishing$ en [SCOPE.sState('whaling_state').GetNameNoFormatting]."
 modifier_whaling_deaths: "Bajas por caza de ballenas"
 modifier_redouble_on_whaling: "El futuro está en la caza de ballenas"
 modifier_fishing_not_whaling: "El futuro está en la pesca"
 japan_events.35.t: "Medidas contra incendios premeditados"
 japan_events.35.d: "El grupo de [SCOPE.gsInterestGroup('relevant_ig').GetName|l] ha señalado que la frecuencia de los casos de incendio premeditado dentro de los límites de la ciudad en [SCOPE.sState('relevant_state').GetCityHubName] ha hecho subir el precio de [SCOPE.sGoods('expensive_good').GetName|l] en [ROOT.GetCountry.GetName]. Afirman que es necesario implementar más medidas estrictas contra los causantes."
 japan_events.35.f: "La campana de alarma suena desde la torre de vigilancia para alertar a todos del inminente peligro debido a que otro incendio en [SCOPE.sState('relevant_state').GetCityHubName] ha alcanzado tanto residencias como negocios. A medida que las brigadas contra incendios llegan para extinguir las llamas, los $strata_commoners_townspeople$ se reúnen en la calle formando una gran multitud. Algunos miran a sus vecinos con sospecha, otros comienzan a preguntarse si el incendio ha sido un accidente o ha sido provocado. Una cosa es segura, muy pronto el precio de [SCOPE.sGoods('expensive_good').GetNameNoFormatting|l] subirá por las nubes."
 japan_events.35.a: "Las medidas más estrictas están justificadas. Que se ejecute a los responsables."
 japan_events.35.b: "Que se perdonen los delitos pendientes a quienes colaboren en las detenciones."
 modifier_arson_measure_strict_ig: "Medidas estrictas contra incendios provocados"
 modifier_arson_measure_strict_pop: "Ejecuciones de pirómanos"
 modifier_arson_measure_lenient_ig: "Medidas poco severas contra incendios provocados"
 # Colonization of Korea Content
 je_colonize_korea: "El gobierno de los Chōsen"
 je_colonize_korea_reason: "#italic «La industria y el comercio verán un marcado desarrollo de la mano de un buen gobierno y de la paz. Estamos convencidos de que, gracias a esto, la paz en Asia Oriental se asentará sobre unos cimientos más fuertes que nunca».\n—Registros del emperador Meiji, volumen 12#!\n\nHa llegado la hora de establecer una presencia permanente en la península coreana. Solo entonces podremos garantizar la prosperidad y la seguridad de [JournalEntry.GetCountry.GetName] y de toda [GetGeographicRegion('geographic_region_east_asia').GetName]. Para asegurarnos el control, debemos vigilar el desarrollo de [GetGeographicRegion('geographic_region_korea').GetName] y no flaquear en nuestras aspiraciones."
 je_colonize_korea_is_owned_by_tt: "Es propiedad de [JournalEntry.GetCountry.GetName]"
 je_colonize_korea_culture_percent_seoul_tt: "La [Concept('concept_pop','$concept_population$')|l] [GetCulture('japanese').GetName] de $STATE_SEOUL$ es superior o igual al #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_busan_tt: "La [Concept('concept_pop','$concept_population$')|l] [GetCulture('japanese').GetName] de $STATE_BUSAN$ es superior o igual al #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_yangho_tt: "La [Concept('concept_pop','$concept_population$')|l] [GetCulture('japanese').GetName] de $STATE_YANGHO$ es superior o igual al #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_sariwon_tt: "La [Concept('concept_pop','$concept_population$')|l] [GetCulture('japanese').GetName] de $STATE_SARIWON$ es superior o igual al #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_culture_percent_pyongyang_tt: "La [Concept('concept_pop','$concept_population$')|l] [GetCulture('japanese').GetName] de $STATE_PYONGYANG$ es superior o igual al #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|0%]#!"
 je_colonize_korea_fail_tt: "#bold [GetGeographicRegion('geographic_region_korea').GetName]#! ya no está bajo control [ROOT.GetCountry.GetAdjective]"
 korea_colinzation_2b_executive_tt: "Un [concept_executive|l] obtiene #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_tt $modifier_peninsula_control_loyal_prominence$#! durante #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! años"
 korea_colinzation_2b_company_tt: "Una [concept_company|l] obtiene #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_company_bonus_tt $modifier_peninsula_control_company_bonus$#! durante #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! años"
 modifier_peninsula_control_loyal_prominence_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_loyal_prominence').GetDesc]"
 modifier_peninsula_control_company_bonus_tt: "[GetStaticModifier('modifier_peninsula_control_company_bonus').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_company_bonus').GetDesc]"
 korea_colinzation_3b_tt: "Alguien debe asumir responsabilidades por este fracaso."
 korea_colinzation_3b_ig_leader_tt: "Un [concept_leader|l] obtiene #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_loyal_prominence_loss_tt $modifier_peninsula_control_loyal_prominence$#! durante #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! años"
 korea_colinzation_3b_ig_tt: "Un [concept_interest_group|l] obtiene #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_peninsula_control_approval_pol_str_loss_tt $modifier_peninsula_control_approval_pol_str_loss$#! durante #v [GetPlayer.MakeScope.ScriptValue('display_moderately_long_modifier_time')]#! años"
 modifier_peninsula_control_loyal_prominence_loss_tt: "[GetStaticModifier('modifier_peninsula_control_loyal_prominence_loss').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_loyal_prominence_loss').GetDesc]"
 modifier_peninsula_control_approval_pol_str_loss_tt: "[GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetName|v]\n[GetStaticModifier('modifier_peninsula_control_approval_pol_str_loss').GetDesc]"
 korea_colonization.2.t: "Un futuro prometedor"
 korea_colonization.2.d: "El mundo ahora sabe que [GetGeographicRegion('geographic_region_korea').GetName] es parte de [ROOT.GetCountry.GetName] y que está bajo el firme control de nuestro país. Al establecer nuestra presencia en la península, dejamos aún más patente nuestra prominencia en la escena mundial."
 korea_colonization.2.f: "Ahora que se ha cumplido la visión de la unificación entre nuestras dos naciones, aumentan las ambiciones [ROOT.GetCountry('korea_scope').GetCustom('ES_DelDela')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]. Desde su sede en [ROOT.GetCountry.GetCapital.GetCityHubName], compone poesía tanka en la que reflexiona sobre esta actuación y se complace con los desarrollos de la península.\n\nAl mismo tiempo, ahí fuera en $STATE_SEOUL$, un burócrata [GetCulture('korean').GetNameNoFormatting] reprime las protestas públicas de los ciudadanos que se oponen al nuevo orden social. Dirigiéndose a ellos con gran ecuanimidad, insiste en que la unión garantizará la prosperidad para todos."
 korea_colonization.2.a: "La prosperidad y seguridad futuras de la península parecen prometedoras."
 korea_colonization.2.b: "El negocio ha sido crucial en nuestros planes."
 modifier_peninsula_control_prestige_authority: "Prestigio de la península"
 modifier_peninsula_control_assimilation_migration: "Asimilación acelerada"
 modifier_peninsula_control_loyal_prominence: "Supervisión sobresaliente"
 modifier_peninsula_control_company_bonus: "Mención de la compañía"
 korea_colonization.3.t: "Una oportunidad perdida"
 korea_colonization.3.d: "[GetGeographicRegion('geographic_region_korea').GetName] ya no está bajo nuestro control. El impacto económico y diplomático se sentirá en [ROOT.GetCountry.GetName] en los próximos años."
 korea_colonization.3.f: "Los oficiales [ROOT.GetCountry.GetAltAdjectiveNoFormatting('PM')] se reúnen en una atmósfera cargada de frustración y descontento para debatir sobre el fracaso del gobierno a la hora de mantener el orden en la península. Nadie quiere asumir responsabilidades por el duro golpe asestado al considerable poder que [ROOT.GetCountry.GetNameNoFormatting] había amasado en los últimos años.\n\nUn caballero se alza para hablar por encima de las voces:\n\n—Ciertamente, el grupo de [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting|l] debe responsabilizarse por este contratiempo."
 korea_colonization.3.a: "Todos debemos soportar la carga del fracaso de nuestras acciones."
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName] y el grupo de [SCOPE.gsInterestGroup('relevant_ig').GetName|l] deben responsabilizarse por este fracaso."
 modifier_peninsula_control_prestige_loss: "Control menguante"
 modifier_peninsula_control_loyal_prominence_loss: "Agotamiento de la prominencia"
 modifier_peninsula_control_approval_pol_str_loss: "Influencia creciente"
