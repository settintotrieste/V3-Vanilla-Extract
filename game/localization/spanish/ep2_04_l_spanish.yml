 ep2_meiji_pulse.3.t: "La guerra de Shimonoseki"
 ep2_meiji_pulse.3.d: "[SCOPE.sCharacter('choshu_daimyo_scope').GetFullName], daimio del dominio de Chōshū, ha mostrado su acuerdo con la orden del emperador de expulsar a los extranjeros. Ha ordenado a su marina que dispare contra cualquier barco extranjero que pase por el estrecho de Shimonoseki, lo que ha provocado el intercambio de cañonazos con un navío de guerra [SCOPE.sCountry('relevant_gp').GetAdjective]."
 ep2_meiji_pulse.3.f: "Truenos a la luz del día retumbaban en las suaves colinas de Hinoyama cuando Masatake alzó la cabeza para mirar cielo. Una nube blanca y esponjosa lo saludó.\n\n«¡Mira!», gritó Jiro. Una mano invadió su campo de visión, apuntando hacia abajo. Un barco de vapor cargaba a toda máquina a través del estrecho que tenían debajo, con sus cañones disparando hacia algo que Masatake no alcanzaba a ver. Salían disparadas astillas del casco y, pese a ello, no cesaba su marcha. Por encima de ellos, otra nube se estaba formando."
 ep2_meiji_pulse.3.a: "Los extranjeros hacen lo que nosotros no podemos."
 ep2_meiji_pulse.3.b: "Ayudemos al dominio a alcanzar un acuerdo."
 ep2_meiji_pulse.3.c: "Ofrezcamos a los occidentales un puerto a cambio de un acuerdo."
 treaty_name_shimonoseki_war_indemnity: "Compensación por la guerra de Shimonoseki"
 modifier_defeated_westerners: "Expedición occidental derrotada"
 modifier_bombardment_of_domain: "Sede del dominio bombardeada"
 ep2_meiji_pulse.4.t: "La quema del consulado [SCOPE.sCountry('relevant_gp').GetAdjective]"
 ep2_meiji_pulse.4.d: "Unos samuráis #italic sonnō jōi#! del dominio de [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] han organizado un ataque contra el edificio en construcción del consulado [SCOPE.sCountry('relevant_gp').GetAdjective] en [SCOPE.sState('edo_state').GetCityHubName]. El que iba a ser el primer edificio de estilo occidental de la ciudad ha ardido hasta los cimientos y no hay ni rastro de los culpables."
 ep2_meiji_pulse.4.f: "Dos hombres, encapuchados y enmascarados, se hallaban en la cima de una montaña observando lo que había sido el consulado. Un brillo anaranjado aún se elevaba por encima de su estructura, ahora carbonizada. Tras extinguir todo el combustible que tenían al alcance, las llamas luchaban por mantenerse en las densas vigas interiores.\n\nA medida que el brillo se apagaba, los dos hombres continuaban observando. Uno de ellos habló, en voz baja, mientras miraba a la columna de humo.\n\n—¿No sería precioso que esas cenizas nos cayeran encima como copos de nieve?"
 ep2_meiji_pulse.4.a: "[SCOPE.sState('edo_state').GetCityHubName] se ha convertido en un lugar ingobernable."
 ep2_meiji_pulse.4.b: "Que se prohíba a los [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] portar armas en la ciudad."
 shimonoseki_indemnity_tt: "[ROOT.GetCountry.GetName] pagará una compensación de #v 3 millones#! @money! durante#v 10 años#! a [SCOPE.sCountry('relevant_gp').GetName]"
 shimonoseki_indemnity_port_tt: "La ciudad de $HUB_NAME_STATE_KANSAI_port_japanese$ en [GetStateRegion('STATE_KANSAI').GetName] se abrirá como [concept_treaty_port|l] [SCOPE.sCountry('relevant_gp').GetAdjective]"
 modifier_ungovernable_capital: "Ingobernabilidad reconocida"
 ep2_meiji_pulse.5.t: "Una venganza sangrienta"
 ep2_meiji_pulse.5.d: "El primer ministro del shogunado, [SCOPE.sCharacter('tairo_scope').GetFullName], ha sido asesinado a las puertas del castillo de Edo por varios rónins de los dominios de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] y [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')]. En el manifiesto que dejaron los asesinos se defienden los principios #italic sonnō jōi#!, que condenan las concesiones hechas por el primer ministro a los extranjeros."
 ep2_meiji_pulse.5.f: "Chuzaburo observó a Gorokuro situarse delante de la procesión, y uno de los guardias de [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] se movió para interceptarlo. Gorokuro no le dio más tiempo para reaccionar. Desenvainó su espada y se lanzó. Un gran arco de sangre saltó del rostro tajado del hombre de [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] y sus compañeros acudieron a él para vengarlo.\n\nChuzaburo dejó caer su impermeable, y sacó su pistola. Apuntó al lado expuesto del palanquín y apretó el gatillo. El rugido del disparo interrumpió el sonido del choque de espadas, y luego hubo otro. Uno de los guardias se giró para enfrentarse a él y Jizaemon, el rōnin de [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], blandió su espada para partir su torso. Lejos de este enfrentamiento, Chuzaburo podía ver un hilo rojo derramándose desde las puertas del palanquín sobre la calle nevada. Desenvainó su wakizashi y corrió hacia él."
 ep2_meiji_pulse.5.a: "Los samuráis cruzan espadas una vez más."
 modifier_tairo_assassinated: "Tairō asesinado"
 ep2_meiji_pulse.6.t: "El incidente de Ikedaya"
 ep2_meiji_pulse.6.d: "Siguiendo la pista a una información obtenida mediante tortura de un militante del [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName|l], los [GetLawType('law_shinsengumi').GetName|l] han llevado a cabo una incursión contra una reunión de supuestos conspiradores que tenía lugar en una posada de Ikedaya en [SCOPE.sState('kyoto_state').GetName]. La situación ha degenerado en un feroz combate de espadas dentro y fuera del establecimiento."
 ep2_meiji_pulse.6.f: "Otaka se abrazó a la barandilla cuando los shinsengumi irrumpieron en la estancia. Vio las manchas de sangre en las mangas de sus #italic haori#! de color azul claro: parecían blanco sobre negro a la tenue luz de los faroles. Alzó su espada en posición de guardia.\n\nDos de ellos se separaron del resto y, uno al lado del otro, cargaron contra la escalera que Otaka defendía. Otaka blandió su espada y sintió que había desviado el golpe. Saltaron chispas con el impacto. El segundo hombre iba a atacar. Dio un paso hacia atrás y giró la muñeca para…\n\nHubo un destello de acero encendido y, luego, algo frío se hundió en su pecho."
 ep2_meiji_pulse.6.a: "Que se recompense a los shinsengumi por su iniciativa."
 ep2_meiji_pulse.6.b: "Semejante brutalidad solo traerá represalias."
 modifier_shinsengumi_meddling: "Shinsengumi desenfrenados"
 modifier_shinsengumi_crackdown: "Represión del Shinsengumi"
 modifier_refrained_from_crackdowns: "Shinsengumi refrenados"
 sufficient_pressure_from_sonno_joi_tt: "El [concept_activism|l] del [SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')|l] está por encima de $RADICALISM_PROTESTING$ @activism_red! (#v [GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0]#!)"
 ep2_meiji_pulse.7.t: "La puerta prohibida"
 ep2_meiji_pulse.7.d: "Soldados del dominio de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] alineados con el [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName|l] han intentado asaltar el palacio imperial de [SCOPE.sState('kyoto_state').GetName] para restaurar al emperador por la fuerza. Se han encontrado con la oposición de guerreros de los dominios de [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] y Aizu."
 ep2_meiji_pulse.7.f: "El humo de los disparos ahogaba la puerta Hamaguri. A su alrededor, Kyōto recibía la luz.\n\nLos soldados de Aizu se concentraban a lo largo del muro, lanzando andanadas de fuego de mosquete que se dispersaban por la carretera y por el chasis de los cañones [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]. Cada pocos segundos, una de las balas impactaba contra la carne, provocando alaridos que se oían brevemente sobre el estruendo de los disparos. Kōzō se acurrucó junto a la rueda de un cañón, luchando por desatascar su mosquete. A menos de un #italic ken#! de distancia, el líder de su escuadrón yacía boca abajo, sin piernas y sin brazos. De algún modo, todavía se retorcía."
 ep2_meiji_pulse.7.a: "Los [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] y los Aizu han logrado repeler a los atacantes."
 ep2_meiji_pulse.7.b: "El palacio imperial se ve sometido al control de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]."
 coup_resistance_below_daimyo_coup_strength_tt: "La [concept_coup_resistance|l] de [ROOT.GetCountry.GetName] ([SCOPE.ScriptValue('country_coup_resistance')|v2]) está por debajo de la [concept_coup_strength|l] de [SCOPE.sCharacter('daimyo_1_scope').GetFullName] ([SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2])"
 ep2_meiji_pulse.8.t: "La expedición [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')]"
 ep2_meiji_pulse.8.d: "En represalia por el ataque de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] contra el palacio imperial, el shogún ha ordenado una expedición de castigo para expulsar a la facción #italic sonnō jōi#! del dominio. Algunos consejeros compasivos con los [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] han presentado un plan para garantizar la paz a cambio del seppuku de los culpables."
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting], daimio de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], observaba el horizonte desde el balcón del castillo. A lo lejos, columnas de humo teñían el cielo: las hogueras del ejército que se aproximaba.\n\n—El shogún exige el seppuku de los tres sirvientes más veteranos —dijo el sirviente—. La decapitación de los cuatro oficiales. Y el exilio de cinco ministros.\n\n[SCOPE.sCharacter('daimyo_1_scope').GetFirstNameNoFormatting] miró las hogueras. Eran cientos de ellas. El horizonte había perdido su color azul y se había vuelto algo desagradable de ver. Finalmente, habló.\n\n—… El dominio de [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] se rendirá."
 ep2_meiji_pulse.8.a: "Si se les puede derrotar sin combatir, que así sea."
 ep2_meiji_pulse.8.b: "Es preciso purgar el dominio en su totalidad."
 modifier_daimyo_house_arrest: "Daimio confinado"
 modifier_daimyo_executed: "Daimio desposeído"
 ep2_meiji_pulse.9.t: "La orden para expulsar a los bárbaros"
 ep2_meiji_pulse.9.d: "Enfurecido por los tratados impuestos sobre [ROOT.GetCountry.GetName] por las potencias occidentales, el emperador ha ignorado al shogún y ha emitido un edicto para expulsar a los extranjeros de suelo [ROOT.GetCountry.GetAdjectiveNoFormatting]. Militantes del [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName|l] se han adherido a la causa del emperador."
 ep2_meiji_pulse.9.f: "El sirviente permanecía junto a uno de los cañones, mirando hacia el estrecho. A esa hora, las siluetas de los barcos de vapor que lo cruzaban se recortaban contra la luz del sol poniente. A un lado, los samuráis de clase más baja del dominio de Chōshū se ocupaban de las baquetas y de las bolsas de pólvora negra.\n\nMientras observaba la forma del Hinoyama y de la ciudad de Shimonoseki a sus pies, un párrafo del edicto se le vino a la mente: «Ni aunque la tierra se reduzca a cenizas», afirmaba, «permitiremos la apertura de los puertos al comercio».\n\n¿Estaba justificado? ¿Permitiría que esta suave y verde colina quedara carbonizada, que sus campos de flores ardieran, que su hogar fuera arrasado? Sí, pensó. Sin duda."
 ep2_meiji_pulse.9.a: "El shogún debe viajar a Kioto para tratar este asunto."
 ep2_meiji_pulse.9.b: "Esta orden no es legítima; que sea eliminada."
