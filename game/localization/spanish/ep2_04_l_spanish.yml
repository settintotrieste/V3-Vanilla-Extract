 zaibatsu.1.t: "El imperio corporativo"
 zaibatsu.1.d: "La larga colaboración entre el estado [ROOT.GetCountry.GetAdjective] y los [SCOPE.gsInterestGroup('zaibatsu_ig').GetName|l] ha consolidado el poder de los conglomerados dentro de [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Puede que los políticos gobiernen, pero el poder lo tienen los generales y los ejecutivos."
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting] observaba el combate desde su palco cubierto. El rival de su combatiente favorito había empujado a su campeón hasta el borde del dohyō hecho con paja de arroz y luchaba por no apretar los puños hasta cortarse la circulación. Al lado del primer ministro, con una expresión totalmente serena, estaba [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting].\n\nEl árbitro señaló con su abanico y el público clamó desde los asientos inferiores. Una lluvia de cojines voló por los aires, cubriendo el círculo de sumo. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting] se giró hacia [SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting] y sonrió. Allí, en el extremo más alejado del círculo, estampado en una de las paredes, estaba el #italic mon#! del [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]."
 zaibatsu.1.a: "Que [ROOT.GetCountry.GetCapital.GetCityHubName] se despliegue como un mar de luz."
 zaibatsu.1.b: "Nuestra cadena de suministro siempre podría ser más segura."
 zaibatsu.2.t: "Aislamiento"
 zaibatsu.2.t_1: "La mano niveladora"
 zaibatsu.2.d: "Los esfuerzos del gabinete de [SCOPE.sCharacter('pm_scope').GetLastName] han limitado las capacidades de los [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] para ejercer su control sobre [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Los políticos gobernarán y los ejecutivos se centrarán en sus beneficios."
 zaibatsu.2.d_1: "Las políticas de libre comercio del gabinete de [SCOPE.sCharacter('pm_scope').GetLastName] han erosionado la red de contractos militares e industriales claves para que los [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] ejerzan su control sobre [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Los políticos gobernarán y los ejecutivos se centrarán en sus beneficios."
 zaibatsu.2.f: "Un grupo de ejecutivos se coló en la sala de reuniones de la planta más elevada de la sede del [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting]. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] fue [SCOPE.sCharacter('name_a_scope').GetCustom('ES_ElLa')] tercer[SCOPE.sCharacter('name_a_scope').GetCustom('ES_OA')] en entrar, después de los secretarios. Se sentó al lado de la puerta y observó a sus superiores pasar. La taza de té que tenía delante humeaba débilmente.\n\n[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting] fue la última persona en entrar. Su mirada pasó por todos sus empleados, de uno en uno. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] se percató de que había una expresión en sus ojos que el barón no había visto nunca antes. Cansancio. Las sombras que se proyectaban sobre su rostro parecían más profundas que antes, y su pelo plateado se veía más ralo."
 zaibatsu.2.a: "El poder soberano es nuestro y de nadie más."
 zaibatsu.2.b: "Que el pueblo lo sepa. [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] no se puede comprar."
