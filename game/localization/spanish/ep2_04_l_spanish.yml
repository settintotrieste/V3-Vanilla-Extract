 ep2_meiji.1.t: "Sonnō jōi"
 ep2_meiji.1.d: "El fin del sakoku ha generado una sensación de impotencia ante la intrusión extranjera, lo que ha socavado la autoridad del clan [ROOT.GetCountry.GetRuler.GetLastName]. Los enemigos del shogunado se han unido en torno al lema #italic Sonnō jōi#!: «Veneremos al emperador, expulsemos a los bárbaros»."
 ep2_meiji.1.f: "En la segunda planta de una posada de Kyōto, apartados de las ventanas, una decena de rōnin ataviados de negro se reúnen en torno a una mesa. Fuera, la lluvia cae con una fuerza que apaga los demás sonidos de la calle. Entre susurros iracundos, los hombres intercambian quejas, denuncias, luego un juramento y, finalmente, una sentencia de muerte para el invasor.\n\nLejos, en una casa desde la que se veía todo Iso, un hombre en kimono verde observa un pilar de humo ascender hacia el cielo. Las colinas proyectan largas sombras sobre las construcciones en la costa. A medida que el sol se acerca al horizonte, el brillo de los hornos de abajo aumenta y se hace más pronunciado. Más lejos, reflejándose en el agua, el hombre divisa las luces de los barcos. Espera que algún día su cañón los haga desaparecer más allá del horizonte."
 ep2_meiji.1.a: "Debemos adaptarnos a nuestras nuevas circunstancias."
 ep2_meiji.2.t: "La forma del shogunado"
 ep2_meiji.2.d: "Los reformistas del shogunado se hallan divididos entre dos teorías de gobernación. La de #italic Kōbu gattai#! desea renovar la legitimidad del [GetLawType('law_bakufu').GetName|l] a través de la fusión con la corte imperial, mientras que la teoría del «Debate público» intenta establecer un sistema parlamentario liderado por el clan [SCOPE.sCharacter('shogun_scope').GetLastName]."
 ep2_meiji.2.f: "El anfitrión coloca una bandeja de higashi en la mesa y sirve un tazón de té ligero para cada uno de sus invitados. Tres hombres se sientan en torno a la mesa. El anfitrión y el primer invitado llevan el pelo recogido en un chonmage, mientras que el segundo invitado luce el pelo corto. Observan el té evaporarse de los tazones frente a ellos.\n\nEl anfitrión dirige su mirada al hombre de pelo corto y habla.\n\n«Te felicito por tu regreso, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]-#italic kun#!. Cada una de tus cartas me ha parecido más interesante que la anterior. ¿Podrías contarnos más del tiempo que pasaste entre los bárbaros?»."
 ep2_meiji.2.a: "Es preciso renovar el bakufu."
 ep2_meiji.2.b: "El debate público es la senda ilustrada."
 traditionalist_shogun_warning_tt: "@warning! Un[ROOT.GetCountry.GetRuler.GetCustom('ES_XA')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [GetIdeology('ideology_traditionalist').GetName|l] no tendrá buena disposición hacia un #b gobierno parlamentario#!"
 traditionalist_shogun_warning_present_tt: "El [concept_ruler|l] #b no#! tiene una [concept_ideology|l] [GetIdeology('ideology_traditionalist').GetName|l]"
 ep2_meiji.3.t: "El matrimonio imperial"
 ep2_meiji.3.d: "El emperador ha accedido al matrimonio entre [SCOPE.sCharacter('shogun_scope').GetFullName] y la princesa [SCOPE.sCharacter('imperial_princess_scope').GetFullName]. Este se celebrará con la condición de que [SCOPE.sCharacter('shogun_scope').GetCustom('ES_ElLa')] shogún repudie [SCOPE.sTreaty('relevant_treaty_scope').GetName] y se retorne a una política aislacionista."
 ep2_meiji.3.d2: "El emperador ha accedido al matrimonio entre [SCOPE.sCharacter('shogun_scope').GetFullName] y la princesa [SCOPE.sCharacter('imperial_princess_scope').GetFullName]. Este se celebrará con la condición de que [SCOPE.sCharacter('shogun_scope').GetCustom('ES_ElLa')] shogún expulse a los extranjeros y se retorne a una política aislacionista."
 ep2_meiji.3.f: "La procesión abarcaba todo Nakasendō. Un convoy de unos treinta mil trabajadores, sirvientes y miembros de la corte de la princesa, protegido por un perímetro de soldados del dominio de Owari, se extendía desde la ciudad de Iijima hasta la estación de Shiojiri. En el centro de la procesión, la princesa era transportada sobre un palanquín de seda roja y oro. Junto a ella, cabalgaban samuráis de una decena de dominios: [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] y [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')] y [SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')] y [SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')].\n\nDesde su palanquín, la princesa miraba fuera por un breve resquicio entre las cortinas. Pueblo tras pueblo, las persianas se cerraban y se hacía el silencio. Tendría los treinta próximos #italic ri#! para considerar su destino."
 ep2_meiji.3.a: "Por el bien del país."
 has_broken_relevant_treaty_tt: "Ha roto [SCOPE.sTreaty('relevant_treaty_scope').GetName]"
 ruler_does_not_have_imperial_marriage_tt: "[SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] ha muerto o se ha jubilado"
 je_meiji_imperial_marriage: "El matrimonio imperial"
 je_meiji_imperial_marriage_reason: "En su búsqueda de una unificación entre la corte imperial y el shogunado, [SCOPE.sCharacter('imperial_marriage_ruler').GetCustom('ES_ElLa')] shogún [SCOPE.sCharacter('imperial_marriage_ruler').GetFullName] ha acordado un matrimonio político con la princesa [SCOPE.sCharacter('imperial_princess_scope').GetFirstName]. El consentimiento del emperador al matrimonio se basa en la premisa de expulsar a los extranjeros de [GetGeographicRegion('geographic_region_home_islands').GetName] y retornar a una política aislacionista.\n\nSi [SCOPE.sCharacter('imperial_marriage_ruler').GetCustom('ES_ElLa')] shogún cumple sus votos, el matrimonio contribuirá en gran medida a reconciliar las diferencias entre el gobernante #italic de jure#! de Japón y el #italic de facto#!."
 je_will_fail_tt: "La [concept_journal_entry|l] #b fracasará#!"
 je_has_timed_out_tt: "La [concept_journal_entry|l] ha #b expirado#!"
 ep2_meiji.4.t: "La guerra [ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')]"
 ep2_meiji.4.d: "Alienad[SCOPE.sCharacter('shogun_scope').GetCustom('ES_OA')] por la confiscación de sus tierras y títulos, [SCOPE.sCharacter('shogun_scope').GetCustom('ES_ElLa')] [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle|l] [SCOPE.sCharacter('shogun_scope').GetFullName] y sus fieles sirvientes han iniciado una revuelta contra la corte imperial. Su intención es revertir la restauración del poder imperial y recuperar el bakufu."
 ep2_meiji.4.f: "«Vuestro sirviente [SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting], tras haber valorado detenidamente la situación desde el noveno día del mes pasado, concluye que ninguno de estos acontecimientos es fruto de las verdaderas intenciones de la corte imperial, sino que son enteramente obra de las conspiraciones de los taimados ministros del señor [SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting]. Esto es bien sabido en toda la nación, especialmente en Edo, Nagasaki y las provincias de Yashu y Sōshū, donde se han producido altercados.\n\nPuesto que estos hechos son detestables tanto para el cielo como para el hombre, suplicamos a Su Majestad que emita un decreto para la entrega de dichos ministros. Si no se accediera a tal petición, no nos quedaría más remedio que proceder a la ejecución de estos." # Edited petition by Yoshinobu
 ep2_meiji.4.a: "Este es nuestro deseo: que se ejecute al traidor y se restaure la paz." # Emperor Meiji's plausibly fraudulent imperial decree of 1867
 ep2_meiji.4.b: "El emperador se ha visto persuadido por una panda de ladrones."
 ep2_meiji.41.d: "Enfurecida por los esfuerzos del clan [SCOPE.sCharacter('shogun_scope').GetLastName] por aferrarse al poder, una coalición de dominios restauracionistas se ha alzado contra [SCOPE.sCharacter('shogun_scope').GetFullName]. Su intención es recuperar la primacía política del emperador y liberarla de la influencia de los Tokugawa."
 ep2_meiji.41.d_1: "Enfurecida por la negativa del gobierno de [ROOT.GetCountry.GetCapital.GetCityHubName] a expulsar a los extranjeros, una coalición de dominios alineados con la ideología sonnō jōi ha comenzado una revuelta. Su objetivo es deponer a los asesores occidentalizadores del emperador y expulsar de Japón toda influencia foránea."
 ep2_meiji.41.f: "Desde lo alto de las murallas del castillo, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] miraba hacia abajo. Ante su vista, los soldados de [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] se agrupaban tras las puertas, hilera tras hilera. Algunos se habían modernizado y vestían los nuevos uniformes de color azul oscuro con cascos cónicos. Otros conservaban su vestimenta tradicional en colores rojo, verde y azul. Quienes vestían los nuevos uniformes se colocaron delante de la columna y recibieron miradas de aprobación por parte de los observadores extranjeros que se colocaron a varios metros a la izquierda de [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]. Tras ellos estaban los jinetes samuráis armados con sus fusiles y, luego, la artillería.\n\nA las afueras de [SCOPE.sState('revolter_state').GetCityHubName] se hallaba el punto de encuentro donde se reunirían con las fuerzas de los dominios aliados para marchar contra el ejército del shōgun. Más allá, pasado el muro de espadas y bayonetas, aguardaba el emperador cautivo."
 ep2_meiji.41.f_1: "Desde lo alto de las murallas del castillo, [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] miraba hacia abajo. Ante su vista, los soldados de [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] se agrupaban tras las puertas, hilera tras hilera. Algunos se habían modernizado y vestían los nuevos uniformes de color azul oscuro con cascos cónicos. Otros conservaban su vestimenta tradicional en colores rojo, verde y azul. Quienes vestían los nuevos uniformes se colocaron delante de la columna y los seguía un arcoíris de sansaibaori. Tras ellos estaban los jinetes samuráis armados con sus fusiles y, luego, la artillería.\n\nA las afueras de [SCOPE.sState('revolter_state').GetCityHubName] se hallaba el punto de encuentro donde se reunirían con las fuerzas de los dominios aliados para marchar contra el ejército lealista. Más allá, pasado el muro de espadas y bayonetas, aguardaba el emperador cautivo."
 ep2_meiji.41.a: "Debemos expulsar a estos fanáticos."
 ep2_meiji.41.b: "¡Sonnō jōi!"
 kinmon_civil_war_tt: "[ROOT.GetCountry.GetName] se sumirá en una #r $concept_civil_war$#! entre el #b shogunado#! y la #b corte imperial#!"
 ep2_meiji.5.t: "Taisei hōkan"
 ep2_meiji.5.d: "Debido al aumento de la presión de quienes se oponen al [GetLawType('law_bakufu').GetName|l], [SCOPE.sCharacter('shogun_scope').GetFullName] ha solicitado al emperador que se devuelva su autoridad de gobierno a la corte imperial."
 ep2_meiji.5.f: "«Si el poder no vuelve a la corte imperial, ni los mismísimos cimientos de nuestra nación podrán sostenerse. Por tanto, ante esta tesitura, debemos reformar las antiguas costumbres y devolver la administración a la corte imperial.\n\nTras agotar el consejo público del país y solicitar una opinión definitiva de Su Majestad, sinceramente creo que si todos los corazones se unen al servicio de la nación, podremos proteger juntos nuestro territorio imperial y alzarnos como iguales junto a las naciones del mundo».\n\n—Tokugawa Yoshinobu, 1867"
 ep2_meiji.5.a: "Bajo sus pies no hay nada, salvo aire."
 ep2_meiji.51.t: "La aprobación imperial"
 ep2_meiji.51.d: "El emperador ha dictado su respuesta a la petición de [SCOPE.sCharacter('shogun_scope').GetFullName] de devolver la autoridad gubernamental a la corte imperial. La petición del shogún ha sido aceptada y se ha restaurado la supremacía política del emperador."
 ep2_meiji.51.f: "«El emperador de Japón anuncia a los soberanos de todos los países extranjeros y a sus súbditos que se ha concedido permiso al shogún [SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] para devolver el poder de gobierno, de acuerdo con su propia solicitud. Por tanto, ejerceremos la máxima autoridad en todos los asuntos internos y externos del país. En consecuencia, el título de emperador se sustituirá por el de taikun, mediante el que se han firmado los tratados. Nombraremos funcionarios para que se encarguen de los asuntos exteriores. Es deseable que los representantes de las potencias firmantes reconozcan este anuncio»."
 ep2_meiji.51.a: "Una emoción terrible."
 ep2_meiji.52.t: "La aprobación imperial"
 ep2_meiji.52.d: "El emperador ha dictado su respuesta a la petición de [SCOPE.sCharacter('shogun_scope').GetFullName] de devolver la autoridad gubernamental a la corte imperial. La respuesta asegura que el shogún conserva la confianza de la corte y que el shogunado mantendrá la autoridad gubernamental."
 ep2_meiji.52.f: "El castillo de [ROOT.GetCountry.GetCustom('japan_choshu_castle_name')] resonaba con el ruido de las botas. A lo largo de todo el día había habido mucho trasiego de mensajeros y sirvientes, que llevaban relatos cada vez más detallados sobre la noticia de la semana anterior. [SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting] los había recibido personalmente, y había permanecido con determinación en silencio a lo largo de cada reunión. Se le había ido frunciendo el ceño cada vez más a medida que oía nuevos datos: la procesión triunfal del shogún, los guerreros de Aizu que habían quedado custodiando el palacio imperial…\n\nEn el exterior del palacio, el sol se había puesto. Desde su posición, [SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting] miró a los veinte siervos reunidos y dijo:\n\n—El dominio de Chōshū no se someterá. No lo olvidéis.\n\nSe puso en pie y salió de la sala."
 ep2_meiji.52.a: "Las ramas lo abrazan."
 ep2_meiji.6.t: "El decreto de restauración"
 ep2_meiji.6.d: "Rivales del clan [SCOPE.sCharacter('shogun_scope').GetLastName] en la corte han persuadido al emperador para que emita un decreto formal que restaure su propio poder. Con este documento, el shogunado queda abolido y se establece un gobierno que excluye a [SCOPE.sCharacter('shogun_scope').GetFullName] de cualquier puesto oficial."
 ep2_meiji.6.f: "«[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] ha solicitado que la autoridad administrativa que durante tanto tiempo ha estado a su cargo sea restaurada, y desea renunciar al título de shogún. Su propuesta ha sido aceptada. El país se ve amenazado por infinidad de peligros, debido a los cuales, como bien es sabido, el emperador se había preocupado seriamente. Conforme a esto, tras una sabia deliberación, Su Majestad ha decidido que se tiendan los cimientos para restaurar el gobierno imperial y se reviva la dignidad nacional.\n\nA partir de ahora, los cargos de sessho, kanpaku y shogún serán abolidos, y se establecerán los puestos de consejero principal, consejero de Estado y consejero de palacio. Todo se decidirá mediante deliberación razonable del pueblo, sin distinción entre cargos civiles y militares, nobles y plebeyos»." #- Modifier text of the Great Proclamation of the Restoration of Imperial Rule
 ep2_meiji.6.a: "A solas en la oscuridad."
 ep2_meiji.7.t: "El taikunado"
 ep2_meiji.7.d: "Al carecer la corte imperial de la experiencia práctica para gobernar, los aliados del clan [SCOPE.sCharacter('shogun_scope').GetLastName] en la corte han persuadido al emperador para que otorgue a [SCOPE.sCharacter('shogun_scope').GetFullName] el título de taikun, lo que [SCOPE.sCharacter('shogun_scope').GetCustom('ES_LoLa')] posiciona al frente del gabinete imperial."
 ep2_meiji.7.f: "«Conforme vayan llegando los daimio, tendrá lugar la deliberación. El espíritu de la época se centra en el debate público —una expresión muy debatida—, por lo que resulta inevitable acatarla. Por tanto, solicito encarecidamente que, hasta donde sea posible, se llegue a un acuerdo en estas discusiones, y que se tomen medidas para que el propósito de esta asamblea quede debidamente establecido.\n\nSi surgiera la discordia durante el transcurso de estas deliberaciones y estallara el conflicto, incluso si su resultado fuese una victoria para vosotros, sería como si unos hermanos se pelearan dentro de los muros de su propia casa mientras las naciones extranjeras nos presionan desde fuera».\n\n—Nishi Shūsuke, «Borrador del orden del día»"
 ep2_meiji.7.a: "A salvo una vez más."
 ep2_meiji.8.t: "Corte y shogunado"
 ep2_meiji.8.d: "Mediante su matrimonio con un miembro de la familia imperial y el cumplimiento de su juramento al emperador, [SCOPE.sCharacter('shogun_scope').GetFullName] ha reducido las tensiones entre la corte y el shogunado. El emperador puede seguir llevando una existencia aislada, con la seguridad de que el shogún garantizará una paz duradera."
 ep2_meiji.8.f: "Aunque vientos tormentosos\ndescarguen su ira sobre el país,\naguardaré a que vengan\npara devolver el sol al cielo\ny a su prístino resplandor.\n\n—Emperador Kōmei"
 ep2_meiji.8.a: "La tormenta ha llegado a su fin."
 ep2_meiji.9.t: "El primero entre sus iguales"
 ep2_meiji.9.d: "A través de la confianza y de su habilidad, [SCOPE.sCharacter('taikun_scope').GetFullName] ha logrado restaurar al emperador y preservar su clan. Los taikun [SCOPE.sCharacter('taikun_scope').GetLastName] serán los primeros entre los suyos en reinar en un $JAP$ moderno."
 ep2_meiji.9.f: "El emperador ya no se sentaba tras un biombo. Sus ministros se disponían a lo largo de una mesa frente a él y los taikun se situaban a la izquierda. Cada uno de ellos vestía un nuevo uniforme de la corte, con mangas y pecho decorados con intrincados adornos de pan de oro. Las medallas tintineaban y se agitaban a medida que los hombres se acomodaban en asientos a los que no estaban acostumbrados.\n\nDurante la última hora, los taikun habían moderado el debate, y el emperador no había dicho ni una sola palabra. Se había contentado con escuchar, prestando atención a cada hablante, de uno en uno. En el extremo más alejado de la sala, un antiguo discípulo de #italic sonnō jōi#! comentó la necesidad de emprender una misión a América."
 ep2_meiji.9.a: "El shogún cae, los taikun se alzan."
 ep2_meiji.9.b: "El emperador es el Hijo del Cielo, y los Tokugawa son sus instrumentos."
