 # Zaibatsu
 je_zaibatsu: "El imperio corporativo"
 je_zaibatsu_reason: "La rápida industrialización de [ROOT.GetCountry.GetName] ha puesto a buena parte de la economía bajo el paraguas de los [concept_zaibatsu|l]. Gracias a los grandes beneficios que obtienen de sus lazos con las instituciones estatales, estas empresas se han convertido en órganos vitales dentro de la estructura militar-industrial de #v $JAP$#!.\n\nLa naturaleza concentrada de la capital [ROOT.GetCountry.GetAltAdjectiveNoFormatting('SF')] ha convertido al país en un serio competidor a nivel internacional, a costa de otorgar un poder político cada vez mayor a los zaibatsu y sus patronos militares.[SCOPE.GetRootScope.GetCountry.GetCustom('zaibatsu_democracy_snippet')]\n$ZAIBATSU_LIST_HEADER$$ZAIBATSU_LIST_CONTENT$"
 je_zaibatsu_complete_header: "Para #b consolidar#! el zaibatsu:\n"
 je_zaibatsu_on_complete_header: "Al #b consolidar#! el zaibatsu:\n$EFFECT$"
 je_zaibatsu_fail_header: "Para #b limitar#! el zaibatsu:\n"
 je_zaibatsu_on_fail_header: "Al #b limitar#! el zaibatsu:\n$EFFECT$"
 zaibatsu_democracy_info: "\n\nMientras esta [concept_journal_entry|l] esté activa, la [concept_electoral_confidence|l] se reducirá un #v 0,5 %#! cada mes"
 two_more_more_company_slots_tt: "Puede fundar más de [SCOPE.ScriptValue('je_zaibatsu_company_slots_threshold')|v0] [Concept('concept_company','$concept_companies$')|l]"
 glossary_zaibatsu: "Un #b #italic zaibatsu#!#! es un conglomerado financiero e industrial integrado verticalmente y de propiedad familiar.\n\nUn zaibatsu habitualmente se organiza en torno a una empresa matriz y un banco que poseen participaciones en varias empresas subsidiarias, que suelen ser de tipo industrial. Los zaibatsu surgieron a partir de los conglomerados mercantiles familiares del periodo Edo tardío, que hicieron uso de su riqueza y lazos con el estado para consolidar gran parte de la base industrial de Japón."
 country_levels_owned_by_zaibatsu_100_tt: "Más de [SCOPE.ScriptValue('je_zaibatsu_possible_levels_threshold')|v0] [Concept('concept_building_level','$concept_building_levels$')|l] están en posesión del [concept_zaibatsu|l] (actualmente [SCOPE.ScriptValue('country_levels_owned_by_zaibatsu')|v0])"
