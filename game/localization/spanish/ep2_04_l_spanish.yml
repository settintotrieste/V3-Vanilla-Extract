 ig_in_pro_country_lobby_tt: "El [concept_interest_group|l] es un [concept_political_lobby|l] amistoso"
 iwakura_mission.1.t: "La misión al oeste"
 iwakura_mission.1.d: "El gobierno ha elaborado una lista con varios ministros y oficiales adecuados para asumir el cargo de embajador extraordinario y plenipotenciario. El candidato elegido será enviado a dirigir la expedición al oeste durante un periodo estimado de diez meses."
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting] se hallaba frente al espejo, comprobando una y otra vez su corbata. Ya hacía un tiempo que se había introducido en Japón, primero como tendencia, luego por mandato de estado y, sin embargo, seguía sin verla como algo natural. Todo dependía de [SCOPE.sCharacter('expedition_leader_1').GetSheHe|l]. Si el acuerdo salía adelante, si el gobierno respaldaba su candidatura, si se despertaba los días siguientes en Londres, en Boston o en París, dejaría de sentir ese alivio cada vez que se terminaba un día."
 iwakura_mission.1.a: "El asunto exige la atención de [SCOPE.sCharacter('expedition_leader_1').GetFullName]."
 iwakura_mission.1.b: "Nombrar a [SCOPE.sCharacter('expedition_leader_2').GetFullName] para el cargo."
 iwakura_mission.1.c: "Podemos confiar en [SCOPE.sCharacter('expedition_leader_3').GetFullName]."
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName] podría beneficiarse de esta oportunidad."
 iwakura_mission.2.t: "El informe de [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]"
 iwakura_mission.2.d: "La Misión [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] ha regresado a $JAP$, y [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] y sus compañeros embajadores han enviado sus informes a [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Dichos informes contienen observaciones sobre la sociedad industrial y recomendaciones para las nuevas políticas de estado."
 iwakura_mission.2.f: "«Tras una profunda reflexión, es evidente que el éxito de las naciones europeas y americanas se debe a la correcta aplicación de sus principios. Quienes han recorrido el mundo han observado que, en la decena de naciones estudiadas, las estructuras de gobierno varían y, sin embargo, todas dirigen sus esfuerzos hacia la educación, lo que las une bajo un mismo estandarte. Por tanto, al visitar estos países, no es raro encontrar escuelas por doquier y personas con espíritu ilustrado».\n\n—Tanaka Fujimaro"
 iwakura_mission.2.a: "Occidente nos ha ofrecido una ventana hacia la modernidad."
 iwakura_mission.2.b: "Las industrias de estilo [SCOPE.sCountry('iwakura_good_economy_country').GetAdjective] serán el futuro de Japón."
 iwakura_mission.2.c: "Tenemos mucho que aprender de las políticas de estilo [SCOPE.sCountry('iwakura_desired_law_country').GetAdjective]."
 iwakura_mission.2.e: "Una reforma agraria de estilo [SCOPE.sCountry('iwakura_land_reform_law_country').GetAdjective] revitalizaría el campo."
 iwakura_mission.4.t: "La puerta dorada"
 iwakura_mission.4.d: "Tras un largo viaje por el mar, la Misión [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] ha llegado a [SCOPE.sCountry('iwakura_mission_host').GetName]. La misión tiene previsto viajar en ferrocarril hasta [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName], inspeccionando las instalaciones industriales e instituciones [SCOPE.sCountry('iwakura_mission_host').GetAltAdjectiveNoFormatting('PF')] por el camino."
 iwakura_mission.4.f: "«Al alba, la bruma marina es tan densa que apenas alcanzábamos a ver a un palmo de distancia, y el barco se paró, esperando a que amaneciera. Con los rayos de luz, la niebla se acabó despejando, y ante nosotros se mostró la costa de California. Siguiendo nuestro rumbo, alcanzamos el centro de dos promontorios rocosos, desde donde se alzaban montañas a ambos lados. Sus superficies tocaban el mar, y podía verse el humo de los barcos de vapor que iban y venían. Este hermoso paisaje se conoce como Golden Gate.\n\nHabíamos pasado veintidós días surcando el océano, y por fin encontramos las montañas y los lagos aquí, en el este. Al contemplarlos, el único sonido que oíamos era el de la alegría».\n\n—Kume Kunitake, #italic La Embajada Iwakura, 1871-73#!"
 iwakura_mission.4.a: "El conocimiento de todo un continente se halla ante nosotros."
 iwakura_mission.4.b: "America únicamente es la puerta hacia Europa."
 iwakura_mission.5.t: "El estómago de la ballena"
 iwakura_mission.5.d: "Tras viajar desde el Pacífico hasta el Atlántico, la Misión [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] ha llegado a [SCOPE.sCountry('iwakura_mission_host').GetName]. La misión busca establecer relaciones diplomáticas con el gobierno de [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle] y recorrer los lugares fundacionales de la Revolución Industrial."
 iwakura_mission.5.f: "«A medida que América prosperaba, el puerto de Liverpool creció cada vez más. Una línea de muelles se construyó en la entrada del puerto, extendiéndose a lo largo de casi 10 kilómetros por la costa norte. En el lado del mar, se apilaron diques de piedra como murallas de un castillo y, en su interior, se excavaron muelles en todas las direcciones. Todos los barcos que entraban y salían pasaban por estos muelles y se anclaban aquí. Sus mástiles parecían un bosque de árboles de ramas densas y los aparejos, las redes tendidas al sol de un pueblo de pescadores. Este, decían, era el embarcadero más grande del mundo».\n\n—Kume Kunitake, #italic La Embajada Iwakura, 1871-73#!"
 iwakura_mission.5.a: "Seguid toda pista que se nos presente."
 iwakura_mission.5.b: "Dos meses es tiempo suficiente para ver todo lo que hay en [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName]."
 iwakura_mission.6.t: "A través del continente"
 iwakura_mission.6.d: "La Misión [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] ha llegado a Europa continental, comenzando por el país de [SCOPE.sCountry('iwakura_mission_host').GetName]. En los próximos meses, la misión tratará de observar, evaluar y establecer relaciones con las numerosas naciones del continente."
 iwakura_mission.6.f: "«Esta tarde hemos visitado un cementerio, cuyo nombre se nos ha olvidado preguntar. Se encuentra en la periferia oriental de París y se extiende a lo largo de 16 hectáreas. Salvo el ancho camino que lo recorre, apenas hay espacio libre en él.\n\nHoy había un funeral, al parecer, de una familia con pocos recursos. Una pequeña procesión acompañaba un ataúd de madera, que fue enterrado en una tumba. Cuando el sacerdote terminó de recitar la plegaria, quienes estaban presentes, entre lágrimas, arrojaron puñados de tierra uno por uno. Aunque todos tenían lágrimas en los ojos, ninguno de ellos profirió lamentos estridentes».\n\n—Kume Kunitake, #italic La Embajada Iwakura, 1871-73#!"
 iwakura_mission.6.a: "Nos tomaremos nuestro tiempo para comparar y contrastar."
 iwakura_mission.6.b: "El itinerario exige una visita acelerada."
 iwakura_mission.8.t: "La otra mitad"
 iwakura_mission.8.d: "De camino a [ROOT.GetCountry.GetName], la Misión [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] hizo una parada en el asentamiento [SCOPE.sCountry('iwakura_mission_host').GetAdjective] de [SCOPE.sState('iwakura_mission_location').GetName]. La misión había pasado varios días observando las prácticas de los nativos [GetReligion('theravada').GetNameNoIcon] y de la sociedad colonial europea."
 iwakura_mission.8.f: "«Durante nuestra visita aquí, nuestro guía fue un monje que nos llamaba #italic danna#! y al templo le decía #italic garan#!. Nos sorprendió que el origen sánscrito de estas palabras se hubiera conservado hasta nuestros días. Ceilán es una tierra sagrada para el budismo, y los nativos siguen siendo devotos de Buda. Si las vidas de estas personas ya son lo bastante humildes, las vidas de los monjes lo son más aún. Sus comidas son frugales, sus monasterios están cubiertos de vegetación descuidada y todo ha alcanzado un estado de extrema sencillez.\n\nEn comparación con los ritos sagrados de la Cristiandad o del Islam, el contraste es impactante. ¿Se debe a que esta religión rechaza todos los adornos mundanos? Quizás. O quizás se deba a que carece de la fuerza necesaria para florecer».\n\n—Kume Kunitake, #italic La Embajada Iwakura, 1871-73#!"
 iwakura_mission.8.a: "¿Podría habernos ocurrido a nosotros este destino?"
 iwakura_mission.9.t: "Puerto de Yokohama"
 iwakura_mission.9.d: "Tras haber pasado varios meses en el extranjero y haber completado la vuelta al mundo, la Misión [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] ha regresado a [ROOT.GetCountry.GetName]. Traen con ellos un montón de datos, de mercancías extranjeras y de testimonios de primera mano sobre las instituciones políticas y las tecnologías occidentales."
 iwakura_mission.9.f: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] miraba hacia el oeste desde la cubierta del barco de vapor. A lo lejos, podía ver el monte Fuji en toda su extensión, rodeado por una niebla matinal que solo se había levantado en parte. Un grupo de occidentales —comerciantes o quizás nuevos trotamundos como [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetHerselfHimself]— se amontonaban junto a la barandilla. Un alemán se sentó en un barco cerca de la puerta de la cabina y dibujó el paisaje en su cuaderno. [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] se preguntó si sería su primera vez o si estas vistas le quitarían el aliento tanto como a [ROOT.Var('expedition_leader_storage_var').GetCharacter.HeSheHe].\n\n¿Cuántos más podían decir que habían hecho lo mismo? ¿Cuántos más habrían cruzado tres océanos y visitado cuatro continentes? Pronto serán más y más, pensó [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting]. El ferrocarril y el barco de vapor propiciarían más viajeros como [ROOT.Var('expedition_leader_storage_var').GetCharacter.HeSheHe], pero la historia recordaría que [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting] fue [ROOT.Var('expedition_leader_storage_var').GetCustom('ES_ElLa')] primer[ROOT.Var('expedition_leader_storage_var').GetCustom('ES_OA')]."
 iwakura_mission.9.a: "Las mejores vistas del mundo son las de tu hogar."
 je_iwakura_mission: "Restauración: la Misión [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName]"
 je_iwakura_mission_reason: "Como parte de las medidas de modernización, el nuevo gobierno de [ROOT.GetCountry.GetName] ha enviado a [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] y a un nutrido séquito de ministros y académicos a una misión diplomática por el mundo occidental. La Misión [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] pretende renegociar con Occidente los tratados que nos resultan injustos e investigar sobre los fundamentos tecnológicos y políticos de las grandes potencias.\n\nPor cada #b mes#! que permanezca la misión en un país, habrá una posibilidad de que haga hallazgos sobre las leyes o las tecnologías de dicho país. Estos hallazgos afectarán al informe de la misión que esta entregará a su regreso, así como a la [concept_ideology|l] del líder de la expedición."
 iwakura_mission_leader_change_ideology_tt: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] cambiará su [concept_ideology|l] para adaptarse a las [Concept('concept_law','leyes')] de los [Concept('concept_country','países')] visitados."
 iwakura_mission_leader_traits_tt: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] consigue los [Concept('concept_character_trait','$concept_character_traits_short$')|l] [GetCharacterTrait('masterful_diplomat').GetName] y [GetCharacterTrait('explorer').GetName]"
 effects_depend_on_visited_countries_tt: "Los efectos posteriores se determinarán por las [Concept('concept_law','leyes')] y [Concept('concept_technology','tecnologías')] de los [Concept('concept_country','países')] visitados."
