 special_character_japanese_emperor_desc: "Este personaje es el emperador actual del trono de Japón, y es esencial para el aparato político y religioso del país."
 japan_monarchy.1.t1: "La era Kaei"
 japan_monarchy.1.t2: "La era Tenkyū"
 japan_monarchy.1.d1: "El príncipe [SCOPE.sCharacter('emperor_scope').GetFirstName] ha ascendido al Trono del Crisantemo como emperador de Japón. Su ascenso da comienzo a la era Kaei, llamada así por la felicidad sempiterna."
 japan_monarchy.1.d2: "El príncipe [SCOPE.sCharacter('emperor_scope').GetFirstName] ha ascendido al Trono del Crisantemo como emperador de Japón. Su ascenso da comienzo a la era Tenkyū, llamada así por la permanencia celestial."
 japan_monarchy.1.f: "Desde algún lugar oculto, un músico dio una señal y dos damas de la corte abrieron las cortinas del trono. Allí se hallaba el emperador, vestido con ropajes de color escarlata decorados con dragones blancos y verdes. El volumen de estos abarcaba todo el asiento y hacía que pareciera que el monarca flotaba en el aire. De su corona descendía una cortina de cuentas. La sombra de estas ocultaba sus ojos.\n\nLa ropa crujía en torno a [SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting], que inclinaba la cabeza. Los demás asistentes se postraron dando lugar a una gran ola. [SCOPE.sCharacter('name_scope').GetSheHe|U] imitó al resto y dejó de ver la cara ensombrecida del emperador.\n\nDías después, en el camino de vuelta a Edo, intentó rememorar lo que había visto, pero no tuvo éxito. Recordaba la corona, las cortinas y las cajas situadas a un lado del emperador. Pero no recordaba nada de la persona en sí."
 japan_monarchy.1.a: "Vivirás tantos años como granos de arena hay en la orilla."
 japan_monarchy.2.t: "La era Meiji"
 japan_monarchy.2.d: "El príncipe [SCOPE.sCharacter('emperor_scope').GetFirstName] ha ascendido al Trono del Crisantemo como emperador de Japón. Su ascenso da comienzo a la era [SCOPE.sCharacter('emperor_scope').GetFirstName], llamada así por la promesa de un gobierno ilustrado."
 japan_monarchy.2.f: "Se oyó el sonido de un gong y la cortina se alzó. Durante un mero instante, el público vio al emperador, vestido con ropa de seda amarilla llena de motivos decorativos. Tenía la cara semioculta. A su izquierda, había una caja lacada verde sobre una tarima, dentro se hallaban las joyas y la espada sagradas. En ese momento, el maestro de armas realizó su llamada y todos bajaron la vista hacia el suelo. El heraldo habló con voz fuerte y firme.\n\n«Los cimientos del reino fueron asentados en el pasado lejano, durante la era de los dioses. A partir de ahí, el divino emperador estableció en Kashihara su dinastía. Desde entonces, la línea imperial ha permanecido ininterrumpida. Al preservar las antiguas costumbres y seguir el precedente de reinos anteriores, ahora asistimos a la sucesión celestial y al ascenso al gran trono imperial»." # Very heavily pared down excerpt of the rites at Meiji's enthronement
 japan_monarchy.2.a: "Vivirás tantos años como granos de arena hay en la orilla."
 japan_monarchy.3.t: "La era Taishō"
 japan_monarchy.3.d: "El príncipe [SCOPE.sCharacter('emperor_scope').GetFirstName] ha ascendido al Trono del Crisantemo como emperador de Japón. Su ascenso da comienzo a la era [SCOPE.sCharacter('emperor_scope').GetFirstName], llamada así por la virtud de la gran rectitud."
 japan_monarchy.3.f: "La junta crujió cuando un hombre pasó por el andamio. Yatarō la apretó todo lo que pudo. Cuando los pasos cesaron, se puso a fijarla con un mazo.\n\nA su alrededor, oía sonidos parecidos. Por el rabillo del ojo, logró ver a otra cuadrilla que montaba las paredes del edificio de al lado con tablones de ébano. Un capataz le daba instrucciones a voces a un hombre que transportaba un inestable fardo de paja.\n\nDentro de seis días, el emperador atravesaría el pasaje que él estaba construyendo durante una ceremonia única en la vida que acabaría con la destrucción de la estructura. Él no podría asistir, pero tenía la esperanza de poder contemplar el brillo del fuego reflejado en las nubes."
 japan_monarchy.3.a: "Vivirás tantos años como granos de arena hay en la orilla."
 japan_monarchy.4.t: "La era Shōwa"
 japan_monarchy.4.d: "El príncipe [SCOPE.sCharacter('emperor_scope').GetFirstName] ha ascendido al Trono del Crisantemo como emperador de Japón. Su ascenso da comienzo a la era [SCOPE.sCharacter('emperor_scope').GetFirstName], llamada así por la promesa de la paz y la concordia ilustradas."
 japan_monarchy.4.f: "Alrededor de la radio había reunidas cuatro generaciones de la familia Takaishi. La voz que surgía del aparato estaba cargada de estática y sonaba como si saliera del fondo de un pozo. Giyō giró el dial a un lado y luego al otro. Cuando la voz volvió, sonaba fuerte y constante.\n\n«… El secretario jefe del gabinete ha emitido un decreto para anunciar una nueva era. A partir de este día, la era pasaría a ser el primer año de [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]…».\n\nSu madre miró rápidamente hacia el periódico que había sobre la mesa de la cocina y dijo:\n\n—¿No será Kobun? ¿Es eso cierto?\n\nLa habitación se llenó de susurros que se contradecían y Giyō subió el volumen de la radio. No sirvió de nada. Si iban a decir algo más sobre el tema, tendría que leer al respecto al día siguiente."
 japan_monarchy.4.a: "Vivirás tantos años como granos de arena hay en la orilla."
 japan_monarchy.5.t: "Un emperador, una era"
 japan_monarchy.5.d: "Dado que se ha restaurado la primacía política de la corte imperial, el emperador ha promulgado un edicto para reformar el sistema de eras. A partir de ahora se declarará una nueva era cuando ascienda un nuevo emperador, que durará mientras este gobierne."
 japan_monarchy.5.f: "#bold Edicto imperial#!\n\nEl establecimiento de una nueva era tras la recepción del mandato celestial por parte del sagrado emperador constituye un modelo ejemplar de época ilustrada y será la norma durante diez mil generaciones. Al haber heredado este gran linaje y al atender personalmente a infinidad de asuntos del Estado, cambiaré el nombre de la era para señalar un nuevo comienzo ante los incontables súbditos del reino. A partir de ahora, el [ROOT.GetCountry.GetCustom('JAP_era_year_name')] será conocido como el primero de [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting]. De aquí en adelante, el viejo sistema quedará reformado y se establecerá el principio de un nombre de era por reinado como práctica permanente." # Shortened 'One Emperor, One Era' edict - 今後年號ハ御一代一號ニ定メ慶應四年ヲ改テ明治元年ト爲ス及詔書
 japan_monarchy.5.a: "Quienes gozan de autoridad lo implementarán."
 japan_monarchy.6.t: "La muerte del daijō tennō"
 japan_monarchy.6.d: "El emperador emérito, que había abdicado a favor de su hijo —el actual emperador—, ha fallecido. Se le recuerda por sus esfuerzos por restituir el prestigio imperial y se le ha concedido el nombre de [SCOPE.sCharacter('retired_emperor_scope').GetFirstName] de manera póstuma."
 japan_monarchy.6.f: "Tōhō mojó el pincel en la tinta. La punta se desplazó por la página para formar los caracteres correspondientes al día, el año y el clima. El pincel pasó a la siguiente columna y se detuvo.\n\n¿Cuál sería la forma correcta de enunciarlo? ¿Cómo debería expresar la importancia de lo que había ocurrido? Había oído los rumores sobre los grandes esfuerzos del emperador emérito por restaurar la corte, y recordó su reinado y los informes sobre las ceremonias que el monarca había recuperado. Luego, Tōhō había recibido al enviado de la corte y había descubierto la verdad al respecto.\n\nEl pincel tocó el papel. «Se ha recibido una solicitud para establecer un precedente relativo al título de emperador. Se ha consultado la genealogía imperial y se ha ofrecido consejo…»."
 japan_monarchy.6.a: "¿Sus descendientes satisfarán sus deseos?"
