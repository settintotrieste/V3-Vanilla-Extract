l_spanish:
 japan_politics.1.t: "Aprendizaje práctico"
 japan_politics.1.d: "La apertura de [ROOT.GetCountry.GetName] ha hecho que muchas escuelas de aprendizaje holandés se queden anticuadas. Nuevas ideas han comenzado a permear en la comunidad intelectual [ROOT.GetCountry.GetAltAdjectiveNoFormatting('SF')], destacando la escuela del «aprendizaje práctico»."
 japan_politics.1.f: "«Lo importante es que cada individuo regule su conducta según los principios de la humanidad, estudie con ahínco para adquirir un conocimiento vasto y desarrolle habilidades adecuadas para su nación. De este modo, el gobierno podrá gobernar con mayor facilidad y el pueblo aceptará su mandato con agrado, hallando cada uno su lugar y ayudando a preservar la paz de la nación. Este debe ser el único objetivo».\n\n—Fukuzawa Yūkichi, «El estímulo del aprendizaje»" # Translated by Eiichi Kiyooka
 japan_politics.1.a: "La riqueza a través del aprendizaje."
 japan_politics.2.t: "Las grandes casas"
 japan_politics.2.d: "Con la industrialización de [ROOT.GetCountry.GetName], los [SCOPE.gsInterestGroup('industrialists_ig').GetName] se han diversificado en la economía manufacturera. Al aprovechar su riqueza y conexiones con el estado, han podido concentrar buena parte de la base industrial bajo su control."
 japan_politics.2.f: "El ministro de finanzas observaba desde el balcón mientras los corredores pujaban. En el pasado, cuando se intercambiaba arroz, un hombre arrojaba un cubo de agua a la multitud para anunciar el fin de la jornada comercial.\n\nAhora, se encarga de comunicarlo un hombre con la mirada fija en el reloj y un mazo en la mano. Junto a su mesa, medio enterrado por una avalancha de corredores que se acercaban a comprar bonos a un interés del siete por ciento, podía ver a una persona que, con su bono firmemente agarrado con los dientes, firmaba un contrato. La cacofonía era ensordecedora; compras y ventas se fundían en un murmullo parecido al de las olas chocando contras las rocas.\n\nCuando el reloj dio la hora, el hombre alzó su martillo y golpeó un disco de bronce. Gritos de indignación se elevaron sobre la muchedumbre y el griterío de las ofertas de última hora no hizo más que aumentar. Gruñendo, el hombre se agachó bajo su mesa y sacó el cubo de agua."
 japan_politics.2.a: "Ahora, gobernarán los banqueros."
 japan_politics.3.t: "El ciudadano común"
 japan_politics.3.d: "La erosión del sistema de clases del período Edo ha hecho surgir una sociedad civil basada en la nacionalidad común. Aquellos que fueron designados como [SCOPE.gsInterestGroup('pb_ig').GetName|l] ahora se consideran, ante todo, ciudadanos patriotas."
 japan_politics.3.f: "Shizo giraba lentamente la cabeza de un lado a otro, estudiando su nuevo corte de pelo en el espejo de bronce. Estaba más corto que nunca, al haber perdido la coleta que durante tanto tiempo le había acompañado. No podía dejar de palpar las puntas del cabello recién cortado, ahora gruesas y ásperas.\n\nMovió abruptamente la cabeza, y sintió que los mechones la seguían de una manera totalmente nueva para él. Como esta ropa nueva, con esos cuellos altos que le irritaban la piel. Incómodo, pero beneficioso. La nueva moda lanzaba un mensaje y atraía a otros a su tienda. El suyo era un negocio civilizado y él era un contribuyente que pagaba sus impuestos, un guardián, un hombre de su nación: un hombre civilizado."
 japan_politics.3.a: "La fuerza de la nación es la paz de sus ciudadanos."
