 kobu_gattai_no_longer_viable_tt: "La unificación del #b shogunado#! y la #b corte imperial#! ya no será posible"
 kogi_yoron_forced_tt: "Para que se pueda llevar a cabo una reforma, el #b shogunado#! debe buscar una restauración controlada del #b emperador#! y el establecimiento de un #b gobierno parlamentario#!"
 shogunate_strategy_title_decide_loc: "Decidir estrategia de reforma"
 shogunate_strategy_title_revise_loc: "Revisar estrategia de reforma"
 shogunate_strategy_title_decide_desc_loc: "Para que el poder de los Tokugawa sobreviva, es preciso reformar el shogunado. Dicha reforma podría discurrir en dos direcciones: el shogún podría tratar de renovar la legitimidad del bakufu a través de la unificación con la corte imperial, o podría buscar la restauración del emperador de manera controlada para posicionarse a sí mismo como líder del gobierno parlamentario."
 shogunate_strategy_title_revise_desc_loc: "La estrategia de reforma actual del shogún ha demostrado no ser necesariamente ventajosa. Aunque cambiar de enfoque implicará pagar un precio, es mejor no adherirse a un curso de acción fallido."
 je_meiji_restoration_proclaim_imperial_restoration: "Pedir la restauración imperial"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "El emperador sigue siendo el soberano de Japón. Sin la aprobación imperial, el shogún es simplemente el daimio más poderoso entre cientos de ellos. La supervivencia del shogunado —o su ruina— dependerá de la voluntad de la corte imperial."
 imperial_restoration_kobu_gattai_loc: "Para poner fin a la crisis, ha de haber unión entre el shogunado y la corte. El daimio ha de convencerse de que las órdenes del shogún transmiten la voluntad imperial y de que el shogún cuenta con la total confianza de la corte. Para lograr tal objetivo, el shogún debe pasar a ser vulnerable y confiar en el emperador para que restablezca su autoridad.\n\nSemejante plan supone un salto de fe: si la corte imperial no está dispuesta a cooperar, los Tokugawa se verán solos entre sus vengativos rivales."
 imperial_restoration_kogi_yoron_loc: "Para poner fin a la crisis, el emperador ha de gobernar. Si el poder de los Tokugawa pretende sobrevivir a la restauración, el shogún debe encargarse de que esta se lleve a cabo conforme a sus propios términos. El último paso de las reformas del shogún debe ser devolver los poderes administrativos al emperador y establecer una nueva función para su clan dentro del reformado gobierno imperial.\n\nSemejante plan supone un salto de fe: si la corte imperial no está dispuesta a cooperar, los Tokugawa se verán solos entre sus vengativos rivales."
 je_meiji_restoration_imperial_marriage: "Organizar matrimonio imperial"
 je_meiji_restoration_imperial_marriage_desc: "El proyecto de #b Kōbu gattai#! exige una unión, literalmente: un matrimonio político entre el $RULER_TITLE_SHOGUN$ en el cargo y una princesa imperial. Para llevar a cabo dicha unión, el $RULER_TITLE_SHOGUN$ debe estar dispuesto a cumplir con las numerosas condiciones impuestas por la corte imperial."
