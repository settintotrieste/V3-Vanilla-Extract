 shogunate.1.t: "El nombramiento de [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Ieyoshi
 shogunate.1.d: "Como nuevo líder del clan [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] ha sido nombrado shogún por el emperador. Muchos [SCOPE.gsInterestGroup('daimyo_scope').GetName|l] se burlan del nuevo shogún, que aún tiene que imponer su autoridad personal."
 shogunate.1.f: "Una plétora de daimios serpenteaba a través de la sala Ō-hiroma. En lo más alto de la tarima más elevada se hallaba sentado el shogún, vestido de negro y rojo, y con el decreto imperial situado en una caja a su derecha.\n\nUno a uno, los nobles ataviados de rojo, azul y violeta se inclinaban ante él para presentar sus espadas y entregarle oro como regalo. El shogún no hablaba, ni los otros se postraban ante él. Aquellos de rango inferior, que tenían prohibido contemplarlo, se apiñaban fuera de la sala. Del jardín llegó un cántico."
 shogunate.1.a: "¡Goshōshin, goshōshin!"
 shogunate.2.t: "La cuestión de la sucesión"
 shogunate.2.d: "La mala salud de [SCOPE.sCharacter('iesada_scope').GetFirstName], el hijo mayor [SCOPE.sCharacter('shogun_scope').GetCustom('ES_DelDela')] [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle|l], ha suscitado preocupación por si podrá llevar a cabo sus obligaciones como [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle|l]. Un daimio forastero liderado por [SCOPE.sCharacter('armed_forces_leader').GetFullName] ha propuesto a [SCOPE.sCharacter('yoshinobu_scope').GetFullName] como candidatura alternativa."
 shogunate.2.f: "El dormitorio de [SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] estaba vacío. Los paneles estaban cerrados y la galería estaba despejada. [SCOPE.sCharacter('armed_forces_leader').GetSheHe|U] se sentó junto a la cama de cara a la lámina de papel en blanco. Tenía los ojos cerrados. Si un gato hubiera pasado por la sala contigua, lo habría oído. No obstante, no podía tener la seguridad de que no hubiera nadie escuchando. En una fase tan temprana, era mejor guardarse sus ambiciones para sí.\n\n¿Vería la corte imperial el asunto igual que [SCOPE.sCharacter('armed_forces_leader').GetCustom('ES_ElElla')]? Tenía motivos para pensar tal cosa, pero, sin duda, esa era la pregunta más sencilla. Su mente comenzó a acelerarse. ¿Cuál era la mejor forma de obtener el decreto? ¿Cómo podía garantizar que este no desapareciera?"
 shogunate.2.a: "El [GetLawType('law_bakufu').GetName|l] se saldrá con la suya."
 shogunate.2.b: "La situación requiere un liderazgo con capacidad de decisión."
 shogunate.3.t: "El nombramiento de [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iesada
 shogunate.3.d: "Como nuevo líder del clan [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] ha sido nombrado shogún por el emperador. De constitución enfermiza desde la infancia, el estado de salud del shogún ya había dado pie a una carrera para ser su sucesor."
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "¡Goshōshin, goshōshin!"
 shogunate.4.t: "El nombramiento de [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Yoshinobu
 shogunate.4.d: "Como nuevo líder del clan [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] ha sido nombrado shogún por el emperador. Los partidarios del nuevo shogún procedentes de dominios reformistas tienen unas elevadas expectativas por su gobierno."
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "¡Goshōshin, goshōshin!"
 shogunate.5.t: "Hitotsubashi y Nanki"
 shogunate.5.d: "La facciones que han surgido a raíz de la sucesión del shogún Ieyoshi han vuelto a chocar a causa de quién sucederá a [SCOPE.sCharacter('shogun_scope').GetFullName], que carece de herederos. La facción Hitotsubashi de un daimio forastero y el grupo de [SCOPE.gsInterestGroup('armed_forces_ig').GetName|l] respaldan a [SCOPE.sCharacter('yoshinobu_scope').GetFullName], mientras que la facción Nanki del grupo interno de [SCOPE.gsInterestGroup('daimyo_ig').GetName|l] apoya a [SCOPE.sCharacter('iemochi_scope').GetFullName]."
 shogunate.5.f: "El perplejo mensajero miraba al suelo ante el hombre sentado en la tarima. Su pincel se detuvo sobre el papel.\n\n—Un mensaje para Yoshikatsu-sama —dijo el magistrado—. En la corte hay quienes se sienten cómodos haciendo conjeturas indecorosas sobre la salud del shogún. Debaten como si este no tuviera voz. Informadme si se redacta alguna proposición de ley conforme a dichas conjeturas."
 shogunate.5.a: "El shogún desea que gobierne [SCOPE.sCharacter('iemochi_scope').GetFirstName]."
 shogunate.5.b: "La corte imperial precisa de un sucesor con experiencia."
 shogunate.6.t: "El nombramiento de [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iemochi
 shogunate.6.d: "Como nuevo líder del clan [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] ha sido nombrado shogún por el emperador. Aunque es joven, el shogún ya posee buena reputación por sus decisiones estoicas y meticulosas."
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "¡Goshōshin, goshōshin!"
 shogunate.6.a_regency: "[SCOPE.sCharacter('shogun_scope').GetSheHe|U] gobernará con la supervisión de un tutor fiel."
 shogunate.6.b_regency: "Comprometámonos con los Hitotsubashi: que se nombre a [SCOPE.sCharacter('yoshinobu_scope').GetFirstName] como su tutor."
 shogunate.7.t: "El nombramiento de [SCOPE.sCharacter('shogun_scope').GetFirstName]" # Iesato
 shogunate.7.d: "Como nuevo líder del clan [SCOPE.sCharacter('shogun_scope').GetLastName], [SCOPE.sCharacter('shogun_scope').GetFullName] ha sido nombrado shogún por el emperador. Al ser una persona de mundo y mente abierta, se espera que el shogún promueva las facciones reformistas del [GetLawType('law_bakufu').GetName|l]."
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "¡Goshōshin, goshōshin!"
 shogunate.8.t: "Un caluroso verano"
 shogunate.8.d: "El calor del verano ha provocado un pronunciado declive de la salud de [SCOPE.sCharacter('shogun_scope').GetFullName]. Postrad[SCOPE.sCharacter('shogun_scope').GetCustom('ES_OA')] en cama, [SCOPE.sCharacter('shogun_scope').GetCustom('ES_ElLa')] [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle|l] debe librar una última batalla contra su debilitado corazón."
 shogunate.8.f: "Se ha movido la cama del shogún para que esté de cara a la ventana. Sus criados tenían la esperanza de que la brisa fresca del mar hiciera más que los abanicos. A los pies de la cama hay un cofre abierto lleno de hielo; y tiene un trapo húmedo en la frente.\n\nHoy no hay viento. El aire forma ondas bajo el sol poniente, que no tiene piedad y lo abarca todo. Él ya no puede distinguir la forma de las ondas."
 shogunate.8.a: "Es el fin."
 shogunate.8.b: "Que traigan tratamientos holandeses."
