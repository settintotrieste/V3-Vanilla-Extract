 ep2_meiji_pulse.1.t: "El derecho a golpear"
 ep2_meiji_pulse.1.d: "Mientras viajaba por [SCOPE.sState('relevant_treaty_port_state').GetName], un comerciante [SCOPE.sCountry('relevant_gp').GetAdjective] resultó muerto a manos del séquito de [SCOPE.sCharacter('daimyo_scope').GetFullName] por negarse a desmontar cuando este pasaba. El daimio de [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] ha reivindicado la legalidad de la actuación conforme al derecho a golpear a cualquier plebeyo que le falte al respeto."
 ep2_meiji_pulse.1.f: "Los extranjeros hicieron que se rompieran las filas del escuadrón de mosqueteros; a su alrededor, todo eran gritos. Al verse rodeado por hombres armados, el extranjero a la cabeza fustigó con las riendas el lomo de su caballo, lo que hizo girar rápidamente al animal con tal fuerza que casi tira a uno de los mosqueteros de su montura. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] desenvainó su espada y sus compañeros lo acompañaron formando un círculo.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] asestó el primer golpe, que abrió una herida en el costado del invasor. Gritó y agitó las riendas una vez más. Fue en vano. El mosquetero más cercano desenvainó también su arma y se lanzó al ataque. Un arco de rojo quedó suspendido en el aire como una nube."
 ep2_meiji_pulse.1.a: "Lo único que quieren los [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')|l] es causarnos problemas."
 ep2_meiji_pulse.11.t: "El asunto [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]"
 ep2_meiji_pulse.11.d: "Mientras se hallaba de negocios en [SCOPE.sCountry('japan_scope').GetName], un comerciante [ROOT.GetCountry.GetAdjectiveNoFlag] llamado [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] ha muerto por orden del señor local [SCOPE.sCharacter('daimyo_scope').GetFullName]. Este último asegura que la actuación está justificada conforme a las leyes de sus tierras, y se niega a pagar ningún tipo de compensación por el crimen."
 ep2_meiji_pulse.11.f: "#b Editorial#!\n\nEn las circunstancias actuales, insistimos en que [ROOT.GetCountry.GetNameNoFormatting] no tiene otra alternativa que prepararse para una gran guerra o despedirse de Japón. Abandonar la posición que ha conseguido no se contempla, por lo que podemos esperar un conflicto entre los dos imperios. A un buen número de [SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')] no les agrada esta idea y, sin embargo, [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] de [ROOT.GetCountry.GetCapital.GetCityHubName] considera que no solo es inevitable, sino también justificable, sencillamente por la negativa de los japoneses a castigar a los asesinos de [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting]… (#italic continúa en la pág. 2#!)" #largely copied from The Anglo-Japanese War, New York Times, 1863
 ep2_meiji_pulse.11.a: "#italic Alguien#! tiene que pagar. Que se presente el asunto ante el taikun."
 ep2_meiji_pulse.11.b: "¿De verdad queremos empantanarnos más en Oriente?"
 modifier_namamugi_incident_prestige_loss: "Muerte de comerciante tolerada"
 castle_yamaguchi: "Yamaguchi"
 castle_hagi: "Hagi"
 ep2_meiji_pulse.2.t: "El bombardeo de [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')]"
 ep2_meiji_pulse.2.d: "En venganza por la negativa del dominio de [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] a pagar una compensación por la muerte de [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting], navíos [SCOPE.sCountry('relevant_gp').GetAltAdjective('PM')] se han enfrentado en un duelo de artillería contra las defensas costeras de [SCOPE.sState('namamugi_daimyo_state').GetPortHubName] que se ha prolongado durante días."
 ep2_meiji_pulse.2.f: "El fuego envolvía la bahía, y [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] ardía. En el agua, uno de los barcos extranjeros disparaba cohetes contra las fundiciones al norte de la ciudad. Con cada disparo, un brillo rojizo infernal ahogaba el tenue brillo del sol poniente.\n\nEl último cañón operativo de la batería de [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] rugió: el disparo llegó lejos, pero ya era inútil. El proyectil impactó a varias esloras del tercer barco de la columna extranjera, levantando un imponente chorro de agua. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] cogió su esponja y corrió a atender el cañón. Tras el muro, los hombres heridos por la última salva seguían gritando. De alguna manera, pese al zumbido presente en sus oídos, aún podía oírlos."
 ep2_meiji_pulse.2.a: "Un elevado precio por su osadía."
