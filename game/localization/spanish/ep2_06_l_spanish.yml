l_spanish:
 japan_earthquakes.1.t: "Los grandes terremotos de [ROOT.GetCountry.GetCustom('JAP_era_name')]"
 japan_earthquakes.1.d: "A lo largo de cuatro días, tres terremotos originados en el mar han provocado daños en una zona inmensa. Los maremotos subsiguientes han agravado el impacto sobre las zonas costeras."
 japan_earthquakes.1.f: "En muy poco tiempo todo el pueblo se había percatado del fenómeno. Aparentemente, nadie había notado el temblor de tierra previo, pero era obvio que todos estaban asombrados por el movimiento del agua. Corrían hasta la playa, e incluso más allá, para observarlo. Que los habitantes de la zona recordaran, jamás se había visto un retroceso de las aguas semejante en aquella costa. Aparecían cosas que nunca antes se habían visto; espacios desconocidos de arena ondulada y tramos de rocas llenas de algas quedaban vacíos mientras Hamaguchi observaba. Pero ninguna de las personas que había allí abajo parecía ser consciente de qué significaba aquel monstruoso reflujo.\n\n—Lafcadio Hearn, #italic Un dios en vida#!"
 japan_earthquakes.1.a: "Solicitemos la ayuda de un daimio vecino."
 japan_earthquakes.1.b: "Que los gobernantes de la zona se encarguen de las labores de ayuda."
 earthquake_assisting_daimyo: "Ayuda de daimio vecino"
 earthquake_affected_daimyo: "Consecuencias del terremoto"
 japan_earthquakes.2.t: "Terremoto de [SCOPE.sState('japan_earthquake_state').GetCityHubName] de [ROOT.GetCountry.GetCustom('JAP_era_name')]"
 japan_earthquakes.2.d: "Un gran terremoto ha afectado a la costa de [SCOPE.sState('japan_earthquake_state').GetName] y ha provocado daños generalizados en la ciudad de [SCOPE.sState('japan_earthquake_state').GetCityHubName] y su castillo."
 japan_earthquakes.2.f: "Cuando los grabados del gran siluro Namazu comenzaron a hacerse populares tras el terremoto, parecían seguir las historias tradicionales. La criatura aparecía sometida por los dioses para evitar que provocara más terremotos.\n\nPero las imágenes evolucionaron con el tiempo. En una de ellas se veía a Namazu abriéndose la barriga y expulsando monedas. En otra, unos albañiles compartían un trago con él. Las obras artísticas habían tomado un cariz satírico, lo que sugería que, a pesar del desastre provocado por la bestia, tal vez estaba arreglando algo."
 japan_earthquakes.2.a: "¡Nuestros vasallos de [SCOPE.sState('japan_earthquake_state').GetCityHubName] necesitan ayuda!"
 japan_earthquakes.2.b: "La riqueza ha de fluir hacia quienes puedan reconstruir."
 earthquake_vassal_support: "Apoyo a los vasallos"
 earthquake_rebuilding_focus: "Reconstrucción tras el terremoto"
 earthquake_rebuilding_redistribution: "Rectificación del mundo"
 japan_earthquakes.3.t: "Terremoto de Mino-Owari"
 japan_earthquakes.3.d: "Un gran terremoto ha afectado al núcleo de [ROOT.GetCountry.GetName]. Hay miles de muertos y por todo el territorio han aparecido grietas de un tamaño inusual."
 japan_earthquakes.3.f: "«La reacción del ser humano siempre ha sido percibir los desastres como crímenes, preguntándose a menudo \"quién ha sido\", lo que ha dado lugar a la multitud de monstruos y demonios que la mitología dice que son responsables de los terremotos.\n\nLa sismología actual debe rechazar la superstición, pero irónicamente a veces se halla representando el papel de un investigador en la escena de un crimen. ¿Qué objetos han caído y cómo? En última instancia, todas estas preguntas no sirven para responder \"quién\", sino \"cómo\" y \"por qué\"»."
 japan_earthquakes.3.a: "Invitemos a eruditos extranjeros para que investiguen estas grietas."
 japan_earthquakes.3.b: "Usemos estos conocimientos para establecer más observatorios meteorológicos."
 japan_earthquakes.3.c: "Preparémonos para las posibles réplicas."
 meteorological_observatories: "Observatorios meteorológicos"
 meteorological_observatories_cost: "$meteorological_observatories$"
 earthquake_bracing_for_aftershocks: "Preparación para las réplicas"
 japan_earthquakes.4.t: "Terremoto de Sanriku"
 japan_earthquakes.4.d: "Un gran maremoto, originado a causa de un terremoto en la costa de Sanriku, ha alcanzado [SCOPE.sState('japan_earthquake_state').GetName]. Tras sus devastadoras secuelas, se ha sugerido que se construyan monumentos que adviertan sobre futuros tsunamis."
 japan_earthquakes.4.f: "«No basta con alzar monumentos en honor a los muertos. Ni es preciso recordar a los vivos la calamidad que sufrieron. Todo aquel que vea un mensaje en piedra sabrá que sus ancestros se dirigen a él para advertirle de algo que no se debe olvidar. Estos son monumentos para quienes aún han de nacer»."
 japan_earthquakes.4.a: "[SCOPE.sState('japan_earthquake_state').GetName] necesita tales monumentos."
 japan_earthquakes.4.b: "¡Que se levanten estas piedras siempre que haya un tsunami!"
 japan_earthquakes.4.c: "Debemos centrar nuestros esfuerzos aquí y ahora."
 tsunami_stones: "Piedras de tsunami"
 tsunami_relief_efforts: "Labores de ayuda ante tsunamis"
 japan_earthquakes.5.t: "Gran terremoto de Kantō"
 japan_earthquakes.5.d: "Un enorme terremoto, como nunca se había visto, ha golpeado cerca de [SCOPE.sState('japan_earthquake_state').GetCityHubName]. En cuestión de minutos, el desastre natural ha arrasado gran parte de la ciudad y ha acabado con la vida de cientos de miles de personas."
 japan_earthquakes.5.f: "Si bien el muro de agua posterior a los temblores había parecido la mayor amenaza, no fue nada comparado con los incendios. Al poco, no solo estaba toda la ciudad en llamas, sino que parecía que la propia tierra y el viento estuvieran ardiendo.\n\nLa gente que había logrado escapar de los edificios que se quemaban se veía atrapada por un tornado de llamas, como si la conflagración estuviera decidida a no dejar a nadie con vida. [SCOPE.sState('japan_earthquake_state').GetCityHubName] se había convertido en un cuadro del infierno."
 japan_earthquakes.5.a: "¡El pueblo japonés debe permanecer unido ante tal devastación!"
 japan_earthquakes.5.b: "Este golpe asestado a nuestra riqueza material es una advertencia contra la decadencia."
 japan_earthquakes.5.c: "Debemos aprovechar esta oportunidad para reconstruir una versión más moderna de [SCOPE.sState('japan_earthquake_state').GetCityHubName]."
 earthquake_national_tragedy: "Tragedia nacional"
 earthquake_divine_punishment: "Castigo divino"
 earthquake_modernization: "Reconstrucción modernizada"
 earthquake_modernization_land_confiscation: "Reajuste de tierras"
 shinbutsu_bunri_decision: "$je_shinbutsu_bunri$"
 shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$"
 elevate_buddhism_decision: "$je_elevate_buddhism$"
 elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$"
 je_shinbutsu_bunri: "Shinbutsu bunri"
 je_shinbutsu_bunri_reason: "Ahora que hemos restaurado el poder del emperador, necesitamos destacar y elevar las tradiciones religiosas nativas que sostienen el estatus sagrado del la linaje imperial. Para lograrlo, debemos separarlas de la influencia extranjera del budismo, que ha estado intrínsecamente ligado a la adoración de los kami durante cientos de años a través de tradiciones sincréticas. Aprovechando el descontento con las instituciones budistas debido a sus vínculos con el shogunado, podremos trazar un camino para el sintoísmo como principio rector superior."
 je_taikyo_proclamation_button: "Proclamación Taikyō"
 je_taikyo_proclamation_button_desc: "Que el sintoísmo, la adoración de los kami y la veneración al emperador se conviertan en los principios del estado"
 je_taikyo_proclamation_conversion_tt: "El líder de cada [concept_interest_group|l] tiene un #v 75 %#! de probabilidad de convertirse a la fe [GetReligion('shinto').GetName]."
 je_elevate_buddhism: "Elevar el budismo"
 je_elevate_buddhism_reason: "Las instituciones religiosas budistas de $JAP$ tienen fuertes lazos históricos con el brazo administrativo del shogunado. Tras haber evitado el fin del shogunado, fortalecer estas instituciones podría ayudarnos a mantener su poder y reforzar las tradiciones religiosas de $JAP$ sin centrarnos en la adoración al emperador."
 je_elevate_buddhism_goal: "$je_communism_2_goal$"
 arahitogami: "Arahitogami"
 extended_danka_system: "Sistema danka extendido"
 japan_religion.1.t: "Jingū-ji"
 japan_religion.1.d: "En los templos, es habitual que los monjes budistas realicen rituales además de las prácticas sintoístas. Al separar el budismo del sintoísmo, se ha puesto en duda la función que desempeñan estos monjes."
 japan_religion.1.f: "«¿Qué finalidad tienen estos rituales? ¿Guiar a los kami hacia la iluminación? ¿Mejorar su karma? Lo que parece implicar esto es que, en lugar de ser dignos de adoración, son seres perdidos que necesitan orientación. ¡No toleraremos más tales insinuaciones!»."
 japan_religion.1.a: "Exigir que los monjes se conviertan en sacerdotes sintoístas."
 japan_religion.1.b: "Despojar a los monjes de sus títulos."
 japan_religion.1.c: "Dejar a los monjes con sus asuntos."
 forced_monk_conversions: "Forzar a los monjes a convertirse"
 monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$"
 monks_stripped_of_titles: "Monjes despojados de sus títulos"
 monks_left_to_duties: "Se permite a los monjes seguir con sus asuntos"
 japan_religion.1.a.tt: "Un [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] de los [GetPopType('clergymen').GetName|l] se convertirá a la fe [GetReligion('shinto').GetName]"
 japan_religion.2.t: "Honji suijaku"
 japan_religion.2.d: "Existe una idea muy arraigada de que Buda se manifestó en Japón en forma de kami. Esto se refleja en términos como [concept_gongen|l], que los considera dos partes de la misma entidad. Dicha terminología refuerza la influencia del budismo."
 japan_religion.2.f: "«Alguna vez debió de tener sentido. Amaterasu es el sol. Dainichi Nyorai, Vairocana, es el sol. Sin embargo, el sol no se divide, ni es un reflejo ni una manifestación de la luz de otro. Brilla solo y con su propio poder. Y hoy, [ROOT.GetCountry.GetNameNoFormatting] solo tiene espacio para un sol»."
 japan_religion.2.a: "Prohibamos el concepto de [concept_gongen|l]."
 japan_religion.2.b: "Prohibamos referirse a Hachiman como [concept_boddhisattva|l]."
 japan_religion.2.c: "Abstenerse de regular la terminología."
 banned_syncretic_terminology: "Terminología sincrética prohibida"
 retained_syncretic_terminology: "Terminología sincrética mantenida"
 japan_religion.2.a.tt: "Un [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] de los [GetPopType('farmers').GetName|l] se convertirá a la fe [GetReligion('shinto').GetName]"
 japan_religion.2.b.tt: "Un [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] de los [GetPopType('soldiers').GetName|l] se convertirá a la fe [GetReligion('shinto').GetName]"
 japan_religion.3.t: "Por quién tañen las campanas"
 japan_religion.3.d: "Los intentos de expulsar la influencia del budismo han generalizado un sentimiento antibudista. Las propiedades de los templos están siendo confiscadas y vandalizadas. Algunas han sido destruidas por completo, mientras que a otras se las ha despojado de su iconografía budista."
 japan_religion.3.f: "Mientras se aproximaba al santuario, se detuvo en seco. Los dos Niō, las poderosas estatuas budistas que guardaban la entrada, habían desaparecido. En su lugar, solo había un hueco.\n\nAl entrar, no pudo evitar sentir que, pese a toda su pureza, el santuario ya no era el lugar seguro que había sido antaño. La puerta estaba desprotegida."
 japan_religion.3.a: "¡Fundid las campanas del templo para hacer cañones!"
 japan_religion.3.b: "Destruid o quitad las estatuas budistas de los templos."
 japan_religion.3.c: "No toquéis los templos."
 smelted_temple_bells: "Campanas del templo fundidas"
 smelted_temple_bells_opinion: "$smelted_temple_bells$"
 removed_buddha_statues: "Estatuas budistas quitadas"
 removed_buddha_statues_opinion: "$removed_buddha_statues$"
 retained_buddhist_iconography: "Iconografía budista conservada"
 japan_religion.4.t: "La oficina de asuntos sintoístas"
 japan_religion.4.d: "Los esfuerzos por estandarizar las prácticas sintoístas y garantizar que los kami del estado formen parte de los rituales locales se han encontrado con la oposición de los monjes y los sacerdotes de los santuarios, que consideran que estas enseñanzas rompen con la tradición."
 japan_religion.4.f: "«El sintoísmo no solo trata de continuar con los rituales y prácticas ya existentes en los santuarios de toda la nación, confundidos y contaminados por las influencias externas. Las tradiciones de la casa imperial, descendiente de los cielos, se deben enseñar a través de [ROOT.GetCountry.GetNameNoFormatting] para que el sintoísmo pueda regresar a su forma más pura»."
 japan_religion.4.a: "Imponer las interpretaciones del estado."
 japan_religion.4.b: "Los sacerdotes locales saben mejor que nadie qué es lo más adecuado para los rituales locales."
 standardized_priest_training: "Formación de los sacerdotes estandarizada"
 standardized_priest_training_opinion: "$standardized_priest_training$"
 deferred_to_local_priests: "Delegado a los sacerdotes locales"
 deferred_to_local_priests_opinion: "$deferred_to_local_priests$"
 japan_religion.5.t: "Confucianismo y sintoísmo"
 japan_religion.5.d: "En el proceso de separar el budismo y el sintoísmo, se ha puesto en duda el rol del confucianismo. Muchos eruditos consideran esta filosofía altamente compatible con el sintoísmo, mientras que otros la rechazan como otra forma de influencia extranjera."
 japan_religion.5.f: "«Puede que el confucianismo nos haya llegado por canales similares al budismo, pero no hay ninguna contradicción entre esta filosofía y la adoración de los kami; al contrario, las dos se refuerzan mutuamente, englobando los mismos principios de cielo y tierra, gobernante y súbditos»."
 japan_religion.5.a: "El confucianismo es un complemento importante del sintoísmo."
 japan_religion.5.b: "Debemos restaurar las antiguas tradiciones del sintoísmo."
 fukko_shinto: "Fukko Shintō"
 japan_religion.6.t: "Cristiandad en un país abierto"
 japan_religion.6.d: "Aunque [ROOT.GetCountry.GetName] se ha abierto a los extranjeros, la religión sigue estando regulada. Los países cristianos ven la libre importación de la fe como algo igual de importante que la importación de mercancías."
 japan_religion.6.f: "«El cristianismo quiere más a sus creyentes en la muerte, morir por la fe está por encima de todo. Todo misionero colgado en la cruz o incinerado en la hoguera se convierte en el siguiente capítulo de una historia que comenzó con un hombre crucificado. Quizá sea hora de que dejemos de darles mártires»."
 japan_religion.6.a: "Se debe permitir a los misioneros que prediquen su fe."
 japan_religion.6.b: "Se puede practicar, pero no se debe extender."
 japan_religion.6.c: "La cristiandad fue y seguirá siendo una amenaza extranjera."
 permitted_christianity: "Cristiandad permitida"
 christianity_disallowed: "Cristiandad no permitida"
 japan_religion.7.t: "Líneas de pensamiento"
 japan_religion.7.d: "[ROOT.GetCountry.GetName] tiene una larga tradición en cuanto a escuelas de budismo diversas, muchas de las cuales aún tienen influencia hoy en día. Con la acumulación de poder político de [SCOPE.gsInterestGroup('devout_ig').GetName|l], hay una escuela que destaca."
 japan_religion.7.f: "«Nuevas escuelas de budismo han surgido en [ROOT.GetCountry.GetNameNoFormatting] con el paso de los siglos. No hay motivos para pensar que una de ellas pudiera aplastar a las demás. Sin embargo, el momento actual requiere liderazgo y dirección política, y es probable que algunas lo obtengan más que otras»."
 japan_religion.7.a: "La escuela de la tierra pura."
 japan_religion.7.b: "La escuela zen."
 japan_religion.7.c: "La escuela nichiren."
 japan_religion.7.e: "La escuela shingon."
 pure_land_buddhism: "Escuela de la tierra pura"
 zen_buddhism: "Escuela zen"
 shingon_buddhism: "Escuela shingon"
 japan_religion.8.t: "Palabras de Buda"
 japan_religion.8.d: "Con la apertura de [ROOT.GetCountry.GetName] al mundo, los eruditos budistas han mostrado interés en traducir más textos extranjeros que incorporen sus ideas en el budismo moderno."
 japan_religion.8.f: "«No deberíamos dejar que la ortodoxia que ha surgido a raíz del aislamiento nos retenga, ni temer encontrar la verdad en lugares inesperados. Las enseñanzas de Buda tuvieron que recorrer un largo camino hasta llegar a nosotros. Estudiar por dónde han pasado, así como adónde podrían ir, solo puede brindarnos una mayor comprensión»."
 japan_religion.8.a: "Los textos en sánscrito y pali, las raíces del Budismo."
 japan_religion.8.b: "Los textos chinos, los más cercanos a nuestras escuelas de pensamiento."
 japan_religion.8.c: "Las obras de la filosofía europea para el estudio comparativo."
 japan_religion.9.t: "Monjes guerreros"
 japan_religion.9.d: "El esfuerzo bélico constante ha generado debate entre los [SCOPE.gsInterestGroup('devout_ig').GetName] sobre el papel que desempeña el budismo a la hora de apoyar al país en conflictos violentos."
 japan_religion.9.f: "«Los monjes de antaño no dudaron en defender sus templos. ¿Deberíamos dudar en defender a nuestra nación? Una vida no se debería arrancar a la ligera, pero ¿perseguirá el estado [ROOT.GetCountry.GetAdjective] una guerra que no conduzca a una paz duradera, que no salve más vidas de las que arrebate?»."
 japan_religion.9.a: "La fuerza es necesaria para establecer una paz duradera."
 japan_religion.9.b: "La no violencia por encima de todo."
 war_buddhism: "Budismo en guerra"
 peaceful_buddhism: "Budismo pacífico"
 japan_religion.10.t: "Yōshoku"
 japan_religion.10.d: "Desde que acabara el sakoku, han proliferado los restaurantes orientados a la carne en las ciudades portuarias para satisfacer a los extranjeros. Esto ha hecho que se cuestione la prohibición por parte de [ROOT.GetCountry.GetName] de comer carne."
 japan_religion.10.f: "«Disculpe, pero la ternera es lo más delicioso que hay, ¿no le parece? Una vez que uno se aficiona a su sabor, resulta imposible volver al ciervo o al jabalí. Me pregunto por qué no se ha comido tal delicia antes en Japón».\n\n—Kanagaki Robun, #italic El comedor de carne #!"
 japan_religion.10.a: "¡Debemos poner fin a la prohibición por el bien de la nutrición y del crecimiento culinario!"
 japan_religion.10.b: "¡No permitiremos que arraigue esta costumbre bárbara!"
 maintained_meat_ban: "Prohibición sobre la carne mantenida"
 maintained_meat_ban_opinion: "$maintained_meat_ban$"
 japan_religion.11.t: "La senda de los kami"
 japan_religion.11.d: "La separación entre las prácticas sintoístas y budistas ha sido todo un éxito. La influencia de las antiguas instituciones religiosas decrece mientras da comienzo una nueva era de devoción a los dioses, el emperador y [ROOT.GetCountry.GetName]."
 japan_religion.11.f: "«En [ROOT.GetCountry.GetNameNoFormatting] hay gran cantidad de fes y rituales. Algunos son viejos, otros nuevos. Nuestro objetivo no ha sido erradicar unos para favorecer otros, sino trazar una línea entre creencias profundamente arraigadas y verdades incuestionables»."
 japan_religion.11.a: "La divinidad es absoluta."
 japan_religion.12.t: "El camino del medio"
 japan_religion.12.d: "Después de sortear una época tumultuosa en [ROOT.GetCountry.GetName], el grupo de [SCOPE.gsInterestGroup('devout_ig').GetName|l] ha logrado reafirmar su papel como autoridad religiosa del país y ha reforzado sus lazos con su [ROOT.GetCountry.GetGovernment.GetName|l]."
 japan_religion.12.f: "«Los hombres hablan del camino de los dioses. Si tal cosa existiera,\nno correspondería a los hombres andarlo; solo las deidades\npueden hollar la sagrada senda de los dioses».\n—Hagura Toman" # Arthur Lloyd, Poems by Buddhist Priests of Japan
 japan_religion.12.a: "La senda está despejada."
 japan_religion.13.t: "$je_taikyo_proclamation_button$"
 japan_religion.13.d: "La Proclamación de la Gran Doctrina, que declara la adoración a los kami y la veneración al divino emperador como principios del Estado [ROOT.GetCountry.GetAdjective] y deber de todos sus ciudadanos."
 japan_religion.13.f: "«El respeto por los kami y el amor por nuestra patria están inextricablemente ligados; he ahí la primera enseñanza.\n\nLos principios del cielo y el camino del hombre están inextricablemente ligados; he ahí la segunda enseñanza.\n\nLa veneración al emperador y la obediencia a la voluntad de la corte están inextricablemente ligadas; he ahí la tercera enseñanza»."
 japan_religion.13.a: "¡Se les ha de escuchar por todo el país!"
 concept_gongen: "Gongen"
 concept_gongen_desc: "Un buda que se manifiesta como kami, lo que une a una deidad indígena con un portador de la iluminación budista."
 concept_boddhisattva: "Bodhisattva"
 concept_boddhisattva_desc: "En el budismo, un ser iluminado y un maestro que ayuda a otros a alcanzar el nirvana."
