l_spanish:
 je_sakoku: "El país cerrado"
 je_sakoku_reason: "Desde la era Kan'ei y los primeros días del poder Tokugawa, $JAP$ ha sido un país cerrado a los forasteros. Lo único que se ha permitido ha sido un goteo comercial con determinadas naciones en unos pocos puertos designados a tal efecto. Si bien el sistema se ha mantenido más de dos siglos, el mundo está cambiando de tal forma que resulta cada vez más difícil mantener el país aislado, a pesar de que ciertos intereses dentro de $JAP$ deseen que la situación permanezca así para siempre. Si no se pueden impedir los intentos extranjeros por abrir nuestro territorio, deberemos importar sus ideas y sus productos."
 je_sakoku_meiji_restoration: "El #b emperador#! ha recuperado el poder y el #b shogún#! ha sido derrocado"
 je_sakoku_stop_being_closed_button: "Revocar el [GetLawType('law_sakoku').GetName|l]"
 je_sakoku_stop_being_closed_button_desc: "La escalada de la situación y el aumento de las presiones extranjeras han hecho que el fin del [GetLawType('law_sakoku').GetName|l] sea una urgencia. En tales circunstancias, podríamos acabar a la fuerza con el viejo sistema de aislamiento, pero algo así enfurecería a todos los que siguen apoyando las antiguas leyes."
 notification_morrison_incident_has_incidented_name: "$JAP$ dispara contra un comerciante"
 notification_morrison_incident_has_incidented_desc: "Un osado comerciante que partía de nuestra patria ha intentado saltarse las restricciones del gobierno $JAP_ADJ$ sobre barcos comerciales extranjeros y una batería costera ha disparado contra su embarcación, lo que ha empeorado las relaciones entre nuestros países."
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners: "Manga ancha con los extranjeros"
 caved_to_foreign_pressure_opposition: "Cesión ante la presión extranjera"
 caved_to_foreign_pressure_government: "Cesión ante la presión extranjera"
 overdue_break_with_tradition: "Ruptura muy esperada con la tradición"
 forced_transition_from_tradition: "Transición de la tradición a la fuerza"
 the_picked_lock_modifier: "La cerradura forzada"
 sakoku_entrenched_modifier: "Sakoku enquistado"
 meiji_failure_modifier: "Reformas de restauración fallidasfracasadas"
 ep2_sakoku.1.t: "La perturbadora derrota [SCOPE.sCountry('opium_wars_loser').GetAltAdjectiveNoFormatting('SF')]"
 ep2_sakoku.1.d: "Nuestro enorme y venerable vecino, [SCOPE.sCountry('opium_wars_loser').GetName], acaba de perder una guerra relacionada con el opio y el comercio contra una nación advenediza de ultramar. Si [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] no ha sido capaz de controlar su propio mercado ni de rechazar a los extranjeros, ¿cómo podremos mantener el [GetLawType('law_sakoku').GetName|l] en nuestras propias tierras?"
 ep2_sakoku.1.f: "«A pesar de todas las tierras, riquezas y poderío que tenían, nada pudieron hacer contra las fuerzas reunidas en su contra. Los extranjeros ya piden que les dejemos entrar en nuestro país. ¿Seguimos el ejemplo de [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] y, al igual que [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting], tratamos de contenerlos hasta que sus cañones hagan llover fuego sobre nuestras ciudades? ¿O buscamos nuestra propia vía? Hay que decidirlo ahora, antes de que esas fuerzas de hierro y cañones entren en nuestras aguas y tomen la decisión por nosotros»."
 ep2_sakoku.1.a: "Ahora hay que pensar en lo impensable."
 ep2_sakoku.1.b: "Ahora hay que aceptar lo impensable."
 end_sakoku_button_now_available: "La opción de acabar por la fuerza con el [GetLawType('law_sakoku').GetName|l] de manera anticiapada estará visible en $je_sakoku$."
 ep2_sakoku.2.t: "Forzando la cerradura"
 ep2_sakoku.2.d: "Dado el tumulto producido tanto dentro como fuera del país, el [GetLawType('law_bakufu').GetName|l] ha decidido forzar el fin inmediato del [GetLawType('law_sakoku').GetName|l]."
 ep2_sakoku.2.f: "Una multitud de comerciantes abarrotaba la aduana. Frente a ellos se alzaba un único funcionario agobiado.\n\n—Sí, por supuesto que esto significa que el país dejará de estar aislado.\n\nUna decena de preguntas procedentes del gentío sorprendió al administrador como un rugido.\n\n—¿Qué pasará entonces? Yo… no estoy seguro. Tal vez haya… No, un momento, solo porque… Tomar esa decisión no es cosa mía ni de ustedes, sencillamente no pueden…\n\nCada respuesta que daba generaba más preguntas. #italic El trabajo era mucho más fácil cuando el país estaba aislado#!, pensó."
 ep2_sakoku.2.a: "El futuro de [ROOT.GetCountry.GetNameNoFormatting] se halla en el [GetLawType('law_mercantilism').GetName|l]."
 ep2_sakoku.2.b: "El [GetLawType('law_free_trade').GetName|l] liberará a [ROOT.GetCountry.GetNameNoFormatting]."
 ep2_sakoku.2.c: "El [GetLawType('law_protectionism').GetName|l] nos permitirá comerciar con cautela con intereses extranjeros"
 ep2_sakoku.3.t: "El incidente [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]"
 ep2_sakoku.3.d: "Un comerciante de [SCOPE.sCountry('morrison_incident_country').GetName] ha intentado pasar por alto los estrictos protocolos del [GetLawType('law_sakoku').GetName|l] para hacer negocios en un puerto no autorizado. Su barco, llamado #italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#!, ha huido acosado por las andanadas de las baterías costeras. En vista de la situación, las relaciones con [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] han empeorado."
 ep2_sakoku.3.f: "El comandante sonrió cuando una bala de cañón por fin alcanzó el navío. La ley era muy clara al respecto, ese barco no tenía derecho a navegar por estas aguas. Le daba igual lo que pensara el capitán a bordo de la embarcación. Lo único que él quería era que el barco diera la vuelta y se marchara."
 ep2_sakoku.3.a: "La guarnición local hizo lo que tenía que hacer."
 ep2_sakoku.3.b: "Deberíamos disculparnos con [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] y compensar al comerciante para limar asperezas."
 ep2_sakoku.3.c: "Esta es la oportunidad que necesitamos para cuestionar la necesidad del [GetLawType('law_sakoku').GetName|l]"
 ep2_sakoku.4.t: "La cerradura forzada"
 ep2_sakoku.4.d: "Dadas las presiones tanto de dentro como de fuera, se ha puesto fin al [GetLawType('law_sakoku').GetName|l]. [ROOT.GetCountry.GetNameNoFormatting] se ha abierto a un nuevo futuro."
 ep2_sakoku.4.f: "El oficial miró hacia la bahía. Había barcos nuevos en los muelles. Barcos desconocidos, con banderas que jamás había visto antes. ¿Qué ofrecían a [ROOT.GetCountry.GetNameNoFormatting]? ¿Qué querían arrebatarle a [ROOT.GetCountry.GetNameNoFormatting]?\n\nSu mirada permaneció sobre los navíos atracados durante un buen rato, antes de apartarla finalmente. Sus ojos no podrían darle la respuesta que buscaba, hoy no. Solo el tiempo diría qué supondría esta nueva era para su patria."
 ep2_sakoku.4.a: "¡Japón se abre hoy al mundo!"
 ep2_sakoku.5.t: "Cerradura oxidada"
 ep2_sakoku.5.d: "El continuo respeto por el [GetLawType('law_sakoku').GetName|l] en [ROOT.GetCountry.GetNameNoFormatting], incluso ahora que la nación se ve convulsionada por drásticos cambios políticos, no es buen augurio para cualquier esperanza de acabar con el aislamiento autoimpuesto por el país. Parece ser que el [GetLawType('law_sakoku').GetNameNoFormatting|l] no va a desaparecer."
 ep2_sakoku.5.f: "El oficial miró hacia la bahía. En los muelles había viejos barcos, los mismos que viera su padre, o su abuelo, o sus ancestros generaciones atrás. ¿Verían sus hijos las mismas embarcaciones? ¿Y sus nietos? ¿Cambiaría este panorama alguna vez?\n\nSu mirada permaneció sobre los barcos atracados durante un buen rato, antes de apartarla finalmente. Sus ojos no podrían darle la respuesta que buscaba, hoy no. Solo el tiempo diría si su patria permanecería inmutable para siempre."
 ep2_sakoku.5.a: "La cerradura se mantiene cerrada."
 meiji.14.t: "La restauración vacía"
 meiji.14.d: "A pesar de las embriagadoras promesas de reforma enarboladas por el nuevo gobierno de [ROOT.GetCountry.GetCustom('JAP_era_name')], [ROOT.GetCountry.GetNameNoFlag] no ha experimentado ningún cambio significativo. Los críticos lamentan que el Estado de hoy no se diferencie apenas en nada al Estado que había antes de la restauración."
 meiji.14.f: "Un motor enorme silbaba y resoplaba en la planta industrial, haciendo girar una enorme rueda que accionaba enormes tornos y taladros. Estas máquinas tallaban nuevos cañones, llaves y gatillos para un vasto arsenal de armas nuevas. Una nación usaría pronto este vapor y este hierro para dejar su huella en el mundo… y esa nación no sería [ROOT.GetCountry.GetNameNoFormatting]."
 meiji.14.a: "Hoy, el sol descansa en un sueño."
 je_end_edo_system_button_name: "Terminar con el sistema de estatus de Edo"
 je_end_edo_system_button_desc: "En esta era de reformas y renovación, el sistema de castas de antaño nos retiene. Todo ciudadano debería ser una pieza valiosa del estado, sin importar su posición en la vida."
 edo_system_not_support_enforcement_tt: "No apoyar la promulgación de [GetLawType('law_intermediate_edo_system').GetName] o [GetLawType('law_strict_edo_system').GetName]"
 edo_system_ends_tt: "[ROOT.GetCountry.GetNameNoFlag] abole por completo el [Concept('concept_social_hierarchy','$edo_system$')|l]"
 notification_edo_system_disappears_name: "El sistema de Edo colapsa"
 notification_edo_system_disappears_desc: "Debido a recientes cambios culturales y sociales, el sistema de Edo ha dejado de ser una [concept_social_hierarchy|l] reconocida en [SCOPE.sCountry('relevant_country_scope').GetName]."
 notification_edo_system_disappears_tooltip: "#header $notification_edo_system_disappears_name$#!\n$TOOLTIP_DELIMITER$\n$notification_edo_system_disappears_desc$"
