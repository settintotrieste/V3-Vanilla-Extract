 je_ryukyu_rivalry_reaffirm_suzerainty_japan: "Reafirmar condición de país protector"
 je_ryukyu_rivalry_reaffirm_suzerainty_china: "Reafirmar lazos tributarios"
 je_ryukyu_rivalry_reaffirm_suzerainty_button_desc: "La corte de Ryukyu favorece a nuestro rival; debemos recordarle sus obligaciones para con nuestro dominio, y traerla de nuevo bajo nuestra influencia."
 ryukyu_rivalry_reaffirm_suzerainty_button_tt: "[ROOT.GetCountry.GetName] ejerce menos #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b persuasión#!#! sobre [SCOPE.sCountry('ryukyu_scope').GetName] que su rival"
 ryukyu_rivalry_small_influence_gain_self_tt: "[ROOT.GetCountry.GetName] gana #green 2#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b persuasión#!#!"
 ryukyu_rivalry_medium_influence_gain_self_tt: "[ROOT.GetCountry.GetName] gana #green 3#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b persuasión#!#! mensual durante #v 5 años#!"
 ryukyu_rivalry_large_influence_gain_self_tt: "[ROOT.GetCountry.GetName] gana #green 3#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b persuasión#!#! mensual hasta el final de la [concept_journal_entry|l]"
 ryukyu_rivalry_small_influence_loss_self_tt: "[ROOT.GetCountry.GetName] ha perdido #red 1#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b persuasión#!#!"
 ryukyu_rivalry_medium_influence_loss_self_tt: "[ROOT.GetCountry.GetName] ha perdido #red 2#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b persuasión#!#!"
 ryukyu_rivalry_large_influence_loss_self_tt: "[ROOT.GetCountry.GetName] ha perdido #red 10#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b persuasión#!#!"
 ryukyu_rivalry_large_influence_loss_japan_tt: "[SCOPE.sCountry('japan_scope').GetName] pierde #red 10#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b persuasión#!#!"
 ryukyu_rivalry_large_influence_loss_china_tt: "[SCOPE.sCountry('china_scope').GetName] pierde #red 10#! de #tooltippable;tooltip:ryukyu_rivalry_sway_tt #b persuasión#!#!"
 ryukyu_rivalry_send_general_tt: "[ROOT.GetCountry.GetName] asigna un [concept_general|l] permanentemente a [SCOPE.sCountry('ryukyu_scope').GetName]"
 je_ryukyu_rivalry_sway_merchants_button: "Enviar supervisores comerciales"
 je_ryukyu_rivalry_sway_merchants_button_desc: "Al supervisar el puerto de Naha, podemos emplazar enviados en la corte para que influyan sobre qué potencias extranjeras obtienen acceso al comercio y sobre los tributos."
 ryukyu_rivalry_sway_merchants_button_tt: "[ROOT.GetCountry.GetName] posee un [GetBuildingType('building_port').GetName|l] de nivel #v 2#! o superior en el [concept_capital_state|l] [SCOPE.sCountry('ryukyu_scope').GetAdjective]"
 je_ryukyu_rivalry_inspect_defenses_button: "Inspeccionar defensas costeras"
 je_ryukyu_rivalry_inspect_defenses_button_desc: "Ya que tenemos el acceso militar garantizado, podemos enviar a un general de confianza a examinar las fortificaciones de Ryukyu, para así garantizar que sus muros y torres de vigilancia son un reflejo de nuestra vigilancia e intención estratégica."
 ryukyu_rivalry_inspect_defenses_button_tt: "[ROOT.GetCountry.GetName] tiene un [concept_treaty|l] de #v acceso militar#! con [SCOPE.sCountry('ryukyu_scope').GetName]"
 je_ryukyu_rivalry_honor_kikoeogimi_button: "Honrar a la kikoe-ōgimi"
 je_ryukyu_rivalry_honor_kikoeogimi_button_desc: "Rindamos tributo a la kikoe-ōgimi, cuya autoridad sobre los rituales y prácticas sagradas de la corte pueden dar mayor peso a nuestra influencia en los consejos de Ryukyu."
 # Modifiers
 modifier_ryukyu_rivalry_overreach: "Condición de país protector extralimitada"
 modifier_ryukyu_rivalry_landowner_discontent: "Rivalidad con Ryukyu preocupante"
 modifier_ryukyu_rivalry_merchant_influence_strain: "Carga por influencia portuaria"
 modifier_ryukyu_strained_diplomatic_corps: "Presencia diplomática intensificada"
 modifier_ryukyu_rivalry_failed_ryukyu: "Ryukyu perdido"
 modifier_ryukyu_rivalry_succeeded_ryukyu: "Ryukyu ganado"
 modifier_ryukyu_rivalry_officer_training: "Inspección de las defensas ryukyuenses"
 modifier_ryukyu_rivalry_secured_neutrality: "Neutralidad asegurada"
 modifier_ryukyu_rivalry_southern_secured: "Enfoque sureño asegurado"
 modifier_ryukyu_rivalry_scholars_pleased: "Orden tributaria mantenida"
 modifier_ryukyu_rivalry_honor_kikoeogimi: "Implicación ceremonial"
 modifier_ryukyu_rivalry_diplomatic_appeasement: "Conciliación diplomática"
 modifier_ryukyu_rivalry_armed_forces_discontent: "Preocupación sobre la inacción"
 # Events
 ryukyu_rivalry.1.t: "Deliberaciones tributarias"
 ryukyu_rivalry.1.d: "[SCOPE.sCountry('ryukyu_scope').GetName] favorece cada vez más a [ROOT.GetCountry.GetName]. Ante esto, [SCOPE.sCountry('rival_scope').GetName] ha apresurado sus propios esfuerzos diplomáticos y ofrece muestras de respeto mientras refuerza las obligaciones de la relación tributaria de [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]."
 ryukyu_rivalry.1.f: "En el salón ryukyuense habían depositado con sumo cuidado unas cajas selladas. Los cortesanos susurraban tras los biombos conforme se leían las cartas en voz alta: una sellada con la escritura de China estampada en rojo, otra con la cuidadosa caligrafía de Japón. Con cada frase, detallaban obligaciones y promesas, ya que las dos potencias intentaban atraerse al reino."
 ryukyu_rivalry.1.a: "Que se envíe una protesta formal a [SCOPE.sCountry('rival_scope').GetName]."
 ryukyu_rivalry.1.b: "Aprovechemos los lazos establecidos con [SCOPE.sCountry('ryukyu_scope').GetName]."
 ryukyu_rivalry.1.c: "Hay que recordar a la corte nuestro patronazgo ancestral."
 ryukyu_rivalry.1.e: "Este asunto no requiere nuestra intervención."
 ryukyu_rivalry.1.tt1: "[SCOPE.sCountry('ryukyu_scope').GetName] es súbdito de [ROOT.GetCountry.GetName] con un [concept_liberty_desire|l] inferior a #v 25#!"
 ryukyu_rivalry.1.tt2: "[SCOPE.sCountry('ryukyu_scope').GetName] no es súbdito de [ROOT.GetCountry.GetName] con unas [concept_relations|l] #v amables#! o mejores"
 ryukyu_rivalry.1.tt3: "[ROOT.GetCountry.GetName] posee al menos 3 [Concept('concept_building','$concept_buildings$')|l] en [SCOPE.sCountry('ryukyu_scope').GetCapital.GetName]"
 ryukyu_rivalry.2.t: "Rivalidad en los puertos"
 ryukyu_rivalry.2.d: "La presencia de enviados [SCOPE.sCountry('rival_scope').GetAltAdjective('PM')] en los puertos de [SCOPE.sCountry('ryukyu_scope').GetName] ha atraído la atención y la cooperación de muchos comerciantes de la cultura [GetCulture('ryukyuan').GetName|l], lo que ha reforzado su posición a ojos de la corte. Por su parte, nuestro poder de persuasión ha disminuido."
 ryukyu_rivalry.2.f: "Se cerraban libros de cuentas y se volvían a abrir con sellos diferentes. Los comerciantes que solían buscar garantías por nuestra parte ahora aguardaban en otras salas de recepción hablando de revisión de aranceles y paso franco. Al parecer, el dinero había encontrado un administrador más persuasivo."
 ryukyu_rivalry.2.a: "Juego sucio."
 ryukyu_rivalry.3.t: "General visitante en [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]"
 ryukyu_rivalry.3.d: "[SCOPE.sCharacter('ryukyu_general_scope').GetFullName], un[SCOPE.sCharacter('ryukyu_general_scope').GetCustom('ES_XA')] general con un séquito de oficiales, ha llegado a [SCOPE.sCountry('ryukyu_scope').GetName], al parecer para inspeccionar las defensas costeras. Su presencia es recibida con respetuosa deferencia, lo que refuerza la influencia de [SCOPE.sCountry('rival_scope').GetName] en la corte y erosiona sutilmente la nuestra."
 ryukyu_rivalry.3.f: "[SCOPE.sCharacter('ryukyu_general_scope').GetCustom('ES_ElLa')|U] general caminó junto a la muralla con sus oficiales, tomando nota de cada cañón y torre de vigilancia. Las fuerzas ryukyuenses se colocaron en formación, conscientes de las miradas que las escrutaban. Cada gesto y saludo contribuía a estrechar los lazos invisibles que unían a las dos potencias."
 ryukyu_rivalry.3.a: "Una escalada peligrosa."
 ryukyu_rivalry_risk_of_confrontation: "@warning! Si las fuerzas de [SCOPE.sCountry('china_scope').GetName] y [SCOPE.sCountry('japan_scope').GetName] están inspeccionando las defensas costeras, podría producirse una #r confrontación#!"
 ryukyu_rivalry.4.t: "General visitante"
 ryukyu_rivalry.4.d: "[SCOPE.sCharacter('ryukyu_general_scope').GetFullName], un[SCOPE.sCharacter('ryukyu_general_scope').GetCustom('ES_XA')] general de [SCOPE.sCountry('from_scope').GetName] con un séquito de oficiales, ha sido recibid[SCOPE.sCharacter('ryukyu_general_scope').GetCustom('ES_OA')] en [SCOPE.sCountry('ryukyu_scope').GetName] y está ansios[SCOPE.sCharacter('ryukyu_general_scope').GetCustom('ES_OA')] por inspeccionar las defensas costeras. Su presencia ha sido recibida con respetuosa deferencia."
 ryukyu_rivalry.4.f: "$ryukyu_rivalry.3.f$"
 ryukyu_rivalry.4.a: "Tenemos que vigilar de cerca a esta persona."
 ryukyu_rivalry_officer_arrives: "Un [concept_general|l] de [SCOPE.sCountry('from_scope').GetName] está disponible"
 ryukyu_rivalry.5.t: "El destino de [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting]"
 ryukyu_rivalry.5.d_victor: "Nuestros esfuerzos en [SCOPE.sCountry('ryukyu_scope').GetName] han dado sus frutos. A través de una presión diplomática, económica y política constante, su corte ahora acude a nosotros en busca de asesoramiento, y la cuestión de su soberanía ha quedado resuelta a nuestro favor."
 ryukyu_rivalry.5.d_loser: "A pesar de nuestros esfuerzos, [SCOPE.sCountry('victor_scope').GetName] ha sido capaz de persuadir a [SCOPE.sCountry('ryukyu_scope').GetName] de manera decisiva. Su corte ha aceptado una nueva realidad política y ha posicionado a las islas dentro de la esfera de influencia de [SCOPE.sCountry('victor_scope').GetNameNoFormatting]."
 ryukyu_rivalry.5.d_ryu: "Ya no es posible mantener el equilibrio que queríamos preservar. Ante la creciente presión de [SCOPE.sCountry('victor_scope').GetName], nuestra corte ha aceptado un nuevo acuerdo político. Ahora el futuro de [SCOPE.sCountry('ryukyu_scope').GetName] se desarrollará bajo su supervisión."
 ryukyu_rivalry.5.f_annexed: "Las proclamas, escritas con la tinta de los sellos de [SCOPE.sCountry('victor_scope').GetCapital.GetName], aún seguía fresca cuando se leyeron en la plaza del mercado de Naha. Se arriaron los estandartes [SCOPE.sCountry('ryukyu_scope').GetAltAdjectiveNoFormatting('PM')] y fueron reemplazados por los del gobernante. Para cuando cayó la noche, ya se había establecido la oficina administrativa y se habían publicado nuevos edictos."
 ryukyu_rivalry.5.f_subject: "Las proclamas, escritas con la tinta de los sellos de [SCOPE.sCountry('victor_scope').GetCapital.GetNameNoFormatting], aún seguía fresca cuando se leyeron en la plaza del mercado de Naha. Cada decreto definía el nuevo lugar de [SCOPE.sCountry('ryukyu_scope').GetName] dentro del panorama global. El reino, que durante mucho fue tributario de cortes distantes, ahora veía a sus magistrados atados a una potencia mayor mediante obligaciones formales. Para cuando cayó la noche, el rumbo ya estaba trazado."
 ryukyu_rivalry_ryukyu_vassalise_tt: "[SCOPE.sCountry('ryukyu_scope').GetName] se convierte en [concept_puppet|l] de [SCOPE.sCountry('victor_scope').GetName]"
 ryukyu_rivalry_ryukyu_transfer_subject_tt: "[SCOPE.sCountry('ryukyu_scope').GetName] es transferido a [SCOPE.sCountry('victor_scope').GetName] como [concept_subject|l]"
 ryukyu_rivalry_ryukyu_annex_tt: "[SCOPE.sCountry('victor_scope').GetName] se anexionará [SCOPE.sCountry('ryukyu_scope').GetName]"
 ryukyu_rivalry.5.a: "Así pues, está decidido."
 ryukyu_rivalry.6.t: "Confrontación en [SCOPE.sCountry('ryukyu_scope').GetCapital.GetNameNoFormatting]"
 ryukyu_rivalry.6.d_brawl: "Unos oficiales enviados por [SCOPE.sCountry('japan_scope').GetName] y [SCOPE.sCountry('china_scope').GetName] han llegado a las manos mientras inspeccionaban las defensas costeras de [SCOPE.sCountry('ryukyu_scope').GetName]. La disputa se ha saldado con una muerte, lo que ha suscitado miradas ansiosas entre la corte ryukyuense."
 ryukyu_rivalry.6.d_accident: "Las fuerzas de [SCOPE.sCountry('japan_scope').GetName] y [SCOPE.sCountry('china_scope').GetName] enviadas a inspeccionar las defensas costeras se han encontrado en las mismas fortificaciones de [SCOPE.sCountry('ryukyu_scope').GetName], lo que ha provocado confusión entre la guarnición y un breve intercambio de disparos."
 ryukyu_rivalry.6.d_fire: "En [SCOPE.sCountry('ryukyu_scope').GetName], se ha producido un incendio en los alojamientos destinados a las delegaciones extranjeras de inspección. El fuego ha calcinado las habitaciones de los contingentes de [SCOPE.sCountry('japan_scope').GetName] y [SCOPE.sCountry('china_scope').GetName]. Aún no se sabe qué lo ha provocado, aunque los oficiales del lugar hablan entre susurros de unos faroles que se colocaron donde no debieron."
 ryukyu_rivalry.6.f: "El oficial Kaimon corría entre las torres de vigilancia y los almacenes para dar órdenes a los guardias. Se gritaban indicaciones, luego se contradecían y volvían a repetirse en rápida sucesión. Aunque finalmente volvió la calma, a Kaimon se le recordó que la rivalidad en las misiones entre las potencias extranjeras podía sacar a la luz la frágil situación de Ryukyu."
 ryukyu_rivalry.6.a: "Las tensiones van en aumento."
 ryukyu_rivalry_ryukyu_confrontation_tt1: "La [Concept('concept_infamy', 'infamia')] entre [SCOPE.sCountry('japan_scope').GetName] y [SCOPE.sCountry('china_scope').GetName] ha aumentado en #v 6#!"
 ryukyu_rivalry.7.t: "El decreto ryukyuense"
 ryukyu_rivalry.7.d_ryukyu: "Tras años de cuidadosa observación y sutil diplomacia, nuestro consejo ha declarado su intención de gobernar sus propios asuntos sin injerencias externas. La corte ha establecido unos claros límites ante la influencia foránea y ha consagrado la prioridad de sus rituales, ministros y consejos tradicionales. Ahora, el reino traza su propio rumbo."
 ryukyu_rivalry.7.d: "Tras años de cuidadosa observación y sutil diplomacia, [SCOPE.sCountry('ryukyu_scope').GetName] ha escapado de nuestra influencia y ha declarado su intención de gobernar sus propios asuntos sin injerencias externas. La corte ha establecido unos claros límites ante nuestra presencia y mantendrá sus rituales, ministros y consejos tradicionales a medida que el reino da la espalda a nuestra autoridad."
 ryukyu_rivalry.7.f: "Por los pulidos suelos del castillo de Shuri había sellos y registros de tributos rotos y desperdigados. En los salones de audiencias aún se sentía la influencia de potencias extranjeras, pero esta ya no dictaba lo que se hacía. La senda de Ryukyu se abría en forma de una frágil neutralidad, obtenida a través de una paciente diplomacia."
 ryukyu_rivalry.7.a: "El asunto de la lealtad queda resuelto."
 ryukyu_rivalry.7.b: "El uso de la fuerza sigue siendo una opción."
 ryukyu_rivalry.8.t: "El dominio oculto"
 ryukyu_rivalry.8.d: "Ahora que [SCOPE.sCountry('japan_scope').GetName] ha abierto sus puertos, ha vuelto a surgir la cuestión largo tiempo latente de la lealtad de [SCOPE.sCountry('ryukyu_scope').GetName]. Durante generaciones, el reino ha caminado por una delgada línea. De cara al exterior, era un tributario de [SCOPE.sCountry('china_scope').GetName] y, sin embargo, seguía manteniendo en secreto su lealtad hacia [SCOPE.sCountry('japan_scope').GetNameNoFormatting]. Ambas potencias deben valorar ahora cómo ejercer su influencia."
 ryukyu_rivalry.8.f: "Los farolillos brillaban a lo largo de los pasillos del castillo de Shuri y arrojaban luz sobre las vigas de color bermellón que los reyes de Chūzan mandaron construir en sus días de grandeza. Bajo techos pintados, los oficinistas colocaban registros de tributos junto a decretos de Satsuma. La corte llevaba mucho tiempo viviendo en equilibrio entre la investidura del Reino Medio y la sombra de Kagoshima. La calma aún se preservaba, pero la cuestión de la lealtad pronto exigiría plena atención."
 ryukyu_rivalry.8.a: "El asunto aún está por decidir."
