l_spanish:
 ## Interest Tier Types
 interest_tier_none: "Ninguno"
 interest_tier_none_desc: "En este $concept_interest_tier_short$, un [concept_country|l] está implicado por completo o solo marginalmente en una [concept_strategic_region|l] sin tener efectos en el $concept_country$ ni en la $concept_strategic_region$."
 interest_tier_observant: "Vigilante"
 interest_tier_observant_desc: "En este $concept_interest_tier_short$, se han dado los primeros pasos para establecer una presencia diplomática en la [concept_strategic_region|l], y puede que haya embarcaciones de la armada patrullando las costas o intercambios de enviados con los [Concept('concept_local_country', '$concept_local_countries$')|l]."
 interest_tier_engaged: "Involucrado"
 interest_tier_engaged_desc: "En este $concept_interest_tier_short$, un [concept_country|l] comienza a involucrarse en los asuntos locales, firma [Concept('concept_treaty', '$concept_treaties$')|l] y establece una presencia más permanente."
 interest_tier_influential: "Influyente"
 interest_tier_influential_desc: "En este $concept_interest_tier_short$, una presencia se ha establecido por completo en una [concept_strategic_region|l], los [Concept('concept_country', '$concept_countries$')|l] llegan a acuerdos a largo plazo y reivindican sus derechos.\n\n@information! Los $concept_countries$ que tengan su [Concept('concept_capital_state', '$concept_capital_state_short$')|l] en esta $concept_strategic_region$ nunca estarán por debajo de este $concept_interest_tier_short$."
 interest_tier_pervasive: "Persuasivo"
 interest_tier_pervasive_desc: "En este $concept_interest_tier_short$, un [concept_country|l] ha establecido un control considerable sobre una [concept_strategic_region|l]. Las [Concept('concept_great_power', '$concept_great_powers$')|l] y [Concept('concept_local_country', 'países locales')] luchan por la predominancia mientras consolidan su poder."
 interest_tier_hegemonic: "Hegemónico"
 interest_tier_hegemonic_desc: "En este $concept_interest_tier_short$, un [concept_country|l] se ha establecido firmemente como potencia indiscutible en la [concept_strategic_region|l]. Otras naciones, #italic si existen#!, se subordinarán o tratarán con el hegemón para asegurarse de que no se inmiscuya en sus asuntos locales."
 ## Interface
 INTEREST_TIER_TYPE_BOUNDS_DESC: "Se aplica entre una [concept_involvement|l] de [InterestTierType.GetLowerBound|v] y [InterestTierType.GetUpperBound|v]"
 INTEREST_TIER_TYPE_NO_EFFECT: "#italic Sin efecto#!"
 INTEREST_TIER_ACTIVE: "#i #b Nivel actual#!#! para [Country.GetName][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'YOU'))]"
 INTEREST_TIER_ACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#! $INTEREST_TIER_ACTIVE$\n$INTEREST_TIER_BOUNDS_DESC$\n[SelectLocalization(EqualTo_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_CURRENT_INVOLVEMENT_DESC', 'INTEREST_TIER_TARGET_INVOLVEMENT_DESC')]\n$TOOLTIP_DELIMITER$\n$INTEREST_TIER_EFFECTS_AND_BREAKDOWN$"
 INTEREST_TIER_INACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#!\n$INTEREST_TIER_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n#title Efectos:#!#indent_newline:3 \n[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)]#!"
 INTEREST_TIER_EFFECTS_AND_BREAKDOWN: "#title Efectos:#!#indent_newline:3 [ConcatIfNeitherEmpty('\n', InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', AddLocalizationIf(And(And3(StringIsEmpty(InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetStateModifier.GetDesc)), StringIsEmpty(InterestTierType.GetTradeAdvantageDesc)), 'INTEREST_TIER_NO_EFFECT'))]#!\n\n#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! La [concept_involvement|l] se debe a:#!#indent_newline:3 \n[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]#!\n $INTEREST_TIER_ACTIVE$: #i #b (Actualmente activo)#!#!"
 INTEREST_TIER_PREDICTED: "#i #b (Previsto)#!#!"
 INTEREST_TIER_BOUNDS_DESC: "Se aplica entre una [concept_involvement|l] de [InterestTierType.GetLowerBound|v0] y [InterestTierType.GetUpperBound|v0]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC: "#v [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! de [concept_involvement|l] para [Country.GetName]"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC: "[AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetTargetInvolvementIn(StrategicRegion.Self), Country.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP')][AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN')] de [concept_involvement|l] para [Country.GetName]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Tenemos #v [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! de [concept_involvement|l] [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] actualmente"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Tenemos [AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self), GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT')][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self), GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT')] de [concept_involvement|l] [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] actualmente"
 INTEREST_TIER_TARGET_UP: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/semana)"
 INTEREST_TIER_TARGET_DOWN: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/semana)"
 INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/semana)"
 INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/semana)"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN_TITLE: "#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! de la $concept_involvement$ objetivo se debe a:#!"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN: "[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]"
 INTEREST_TIER_EFFECTS_TITLE: "#title Efectos:#!"
 INTEREST_TIER_EFFECTS: "[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetDescription)]"
 INTEREST_TIER_NO_EFFECT: "#italic Sin efecto#!"
 INTEREST_TIER_TRADE_ADVANTAGE_EXPORTS_DESC: "$VAL|0=+v$ de [concept_trade_advantage|l] por [Concept('concept_trade','exportaciones')] en $concept_markets$ locales"
 INTEREST_TIER_TRADE_ADVANTAGE_IMPORTS_DESC: "$VAL|0=+v$ de [concept_trade_advantage|l] por [Concept('concept_trade','importaciones')] en $concept_markets$ locales"
 INTEREST_TIER_ON_ACTIVATE_EFFECT: "#title Cuando se gane:#!"
 INTEREST_TIER_ON_DEACTIVATE_EFFECT: "#title Cuando se pierda:#!"
 STRATEGIC_REGION_AI_STANCE_TT_HEADER: "[Country.GetNameNoFormatting] ha tomado la [Concept('concept_strategic_region_stance', '$concept_strategic_region_stance_short$')] #b [Country.GetAIStrategicRegionStanceTypeIn(StrategicRegion.Self).GetNameNoFormatting]#! en [StrategicRegion.GetName] por los siguientes motivos:\n$TOOLTIP_DELIMITER$"
 ## Effects
 interest_tier_effect_establish_missions_decree: "@checkmark! Permite el [concept_decree|l] [GetDecreeType('decree_establish_missions').GetName] en [Concept('concept_unincorporated_state','$concept_unincorporated_states$')|l]"
 interest_tier_effect_colonization: "@checkmark! Permite la acción regional #yellow;tooltip:[GetPlayer.GetTooltipTag],establish_colony_tooltip $establish_colony$#!"
 interest_tier_effect_stake_colonial_claim: "@checkmark! Permite la [concept_diplomatic_action|l] [GetDiplomaticActionType('da_stake_colonial_claim').GetName] en [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')|l]"
 interest_tier_effect_colonial_claim_generation: "@checkmark! Generará una [concept_claim|l] cuando la colonización de una [concept_state_region|l] llegue a [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_colonial_claim_generation_threshold')|v%0]"
 interest_tier_effect_infamy_cost_increase_high: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_high_value')|=n%0] de coste de [concept_infamy|l] que afecta a los [Concept('concept_war_goal', '$concept_war_goals$')] en esta [concept_strategic_region|l]"
 interest_tier_effect_infamy_cost_increase_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_medium_value')|=n%0] de coste de [concept_infamy|l] que afecta a los [Concept('concept_war_goal', '$concept_war_goals$')] en esta [concept_strategic_region|l]"
 interest_tier_effect_infamy_cost_decrease_medium: "[GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_decrease_medium_value')|=p%0] de coste de [concept_infamy|l] que afecta a los [Concept('concept_war_goal', '$concept_war_goals$')] en esta [concept_strategic_region|l]"
 interest_tier_effect_can_start_diplomatic_plays: "@checkmark! Permite iniciar [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')|l] en esta [concept_strategic_region|l]"
 interest_tier_effect_can_join_diplomatic_plays: "@checkmark! Permite tomar bando en [Concept('concept_diplomatic_play', '$concept_diplomatic_plays$')|l] en esta [concept_strategic_region|l]"
 interest_tier_effect_can_sign_alliance: "@checkmark! Permite firmar [Concept('concept_article', '$concept_treaties$')|l] de [GetArticleType('alliance').GetName|l]"
 interest_tier_effect_can_sign_defensive_pact: "@checkmark! Permite firmar [Concept('concept_article', '$concept_treaties$')|l] de [GetArticleType('defensive_pact').GetName|l]"
 interest_tier_effect_can_sign_support_independence: "@checkmark! Permite firmar [Concept('concept_article', '$concept_treaties$')|l] de [GetArticleType('support_independence').GetName|l]"
 interest_tier_effect_can_sign_guarantee_independence: "@checkmark! Permite firmar [Concept('concept_article', '$concept_treaties$')|l] de [GetArticleType('guarantee_independence').GetName|l]"
 interest_tier_effect_stake_colonial_claim_unrecognized: "@checkmark! Permite la [concept_diplomatic_action|l] [GetDiplomaticActionType('da_stake_colonial_claim').GetName] en [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')|l] y [Concept('concept_unrecognized_power', '$concept_unrecognized_powers$')|l]"
 interest_tier_effect_can_sign_foreign_investment_rights: "@checkmark! Permite firmar [Concept('concept_article', '$concept_treaties$')|l] de [GetArticleType('foreign_investment_rights').GetName|l]"
 ## Diplomatic Actions
 da_stake_colonial_claim: "Reivindicar derecho colonial"
 da_stake_colonial_claim_desc: "[Concept('concept_claim', 'Reivindica')] tus derechos sobre una [concept_state_region|l] de ultramar."
 da_stake_colonial_claim_action_notification_name: "[INITIATOR_COUNTRY.GetName] [Concept('concept_claim', 'reivindica')] su derecho colonial sobre [TARGET_STATE.GetStateRegion.GetName]"
 da_stake_colonial_claim_action_notification_desc: "¡[INITIATOR_COUNTRY.GetName] ha reivindicado [TARGET_STATE.GetStateRegion.GetName] como parte de sus crecientes ambiciones coloniales!"
 DA_STAKE_COLONIAL_CLAIM_COOLDOWN: "No puedes llevar a cabo esta acción de nuevo hasta dentro de #v [TimeKeeper.GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'da_stake_colonial_claim_cooldown') )]#!"
 DA_STAKE_COLONIAL_CLAIM_EMPTY_EFFECT: "Elige una [concept_state_region|l] en un continente diferente al de tu [concept_capital_state|l] para [Concept('concept_claim', 'reivindicar')]"
 ## Notifications
 notification_colonial_claim_generated_name: "[SCOPE.sState('colony_notification_state').GetName] se ha convertido en una #bold colonia importante#!"
 notification_colonial_claim_generated_desc: "[SCOPE.sState('colony_notification_state').GetName] ha crecido lo suficiente como para concedernos una [concept_claim|l] sobre la totalidad de [SCOPE.sState('colony_notification_state').GetStateRegion.GetName]."
 notification_colonial_claim_generated_tooltip: "#header $notification_colonial_claim_generated_name$#!\n$TOOLTIP_DELIMITER$\n$notification_colonial_claim_generated_desc$"
