 naval_mission_type_hunt_pirates_desc: "Busca y destruye los barcos piratas que interrumpen nuestras importaciones."
 naval_mission_type_blockade: "Bloquear"
 naval_mission_type_blockade_desc: "Establece un [Concept('concept_blockade','bloqueo')] sobre un nodo marítimo, lo que interrumpe el [concept_trade|l] y el [Concept('concept_supply', 'suministro')] en puertos hostiles adyacentes."
 naval_mission_type_raid_supply: "Atacar líneas de suministros"
 naval_mission_type_raid_supply_desc: "[concept_naval_mission] encargada a una [concept_fleet|l] de hundir a los [Concept('concept_supply_ship','$concept_supply_ships$')|l] enemigos que pasen a través de una región marítima."
 naval_mission_type_protect_supply: "Proteger líneas de suministros"
 naval_mission_type_protect_supply_desc: "[concept_naval_mission] encargada a una [concept_fleet|l] de proteger [Concept('concept_shipping_lane','$concept_shipping_lanes$')|l] escoltando [Concept('concept_supply_ship','$concept_supply_ships$')|l] de forma segura y enfrentándose a embarcaciones enemigas si es necesario."
 naval_mission_type_project_power: "Proyectar poder"
 naval_mission_type_project_power_desc: "[concept_naval_mission] encargada a una [concept_fleet|l] de navegar por las costas de [Concept('concept_strategic_region','$concept_strategic_regions$')|l] y, así, generar [concept_involvement|l]."
 naval_mission_type_port_bombardment: "Bombardeo de puerto"
 naval_mission_type_port_bombardment_desc: "Una [concept_naval_mission|l] que se asigna a una [concept_fleet|l] para que bombardee estados costeros adyacentes a una región marítima, lo que provocará devastación y posibles daños a los edificios costeros."
 naval_mission_type_piracy: "Piratería"
 naval_mission_type_piracy_desc: "Una [concept_naval_mission|l] que se asigna a una [concept_fleet|l] para que se apodere de [Concept('concept_good','$concept_goods$')|l] pertenecientes a países hostiles o neutrales que atraviesen las regiones designadas."
 naval_mission_type_privateer: "Corso"
 naval_mission_type_privateer_desc: "Una [concept_naval_mission|l] que se asigna a una [concept_fleet|l] para que se apodere de [Concept('concept_good','$concept_goods$')|l] pertenecientes a países hostiles que atraviesen las regiones designadas."
