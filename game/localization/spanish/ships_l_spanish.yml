 ship_type_iron_frigate_desc: "Este barco es una evolución con casco de hierro de la fragata y combina los roles tradicionales de esta embarcación con una mayor potencia de fuego y durabilidad."
 ship_type_ship_of_the_line: "Navío de línea"
 ship_type_ship_of_the_line_desc: "Barco de guerra de gran tamaño diseñado para operar en la línea de batalla. El navío de línea transporta numerosos cañones en sus múltiples cubiertas."
 ship_type_monitor: "Monitor"
 ship_type_monitor_desc: "Embarcación blindada de difícil detección, diseñada para uso en aguas costeras."
 ship_type_coastal_defense_ship: "Buque de defensa costera"
 ship_type_coastal_defense_ship_desc: "Embarcación blindada y fuertemente armada, diseñada para uso en aguas costeras."
 ship_type_destroyer: "Destructor"
 ship_type_destroyer_desc: "Embarcación rápida y fuertemente armada, diseñada para operaciones de escolta y flota."
 ship_type_aircraft_carrier: "Portaviones"
 ship_type_aircraft_carrier_desc: "Barco del que pueden despegar y aterrizar aviones. Las tareas del portaviones implican tanto operaciones de reconocimiento como ofensivas."
 ship_type_torpedo_boat: "Buque torpedero"
 ship_type_torpedo_boat_desc: "Embarcaciones ágiles y pequeñas diseñadas para realizar ataques devastadores sobre navíos de guerra más grandes y lentos."
 ship_type_torpedo_boat_destroyer: "Destructor de torpederos"
 ship_type_torpedo_boat_destroyer_desc: "Barco diseñado para contrarrestar buques torpederos más pequeños, a la vez que es capaz de lanzar ataques con torpedos."
 ship_type_light_cruiser: "Crucero ligero"
 ship_type_light_cruiser_desc: "Crucero ligeramente blindado diseñado para patrullas de larga distancia, protección del comercio y demostraciones de fuerza."
 ship_type_armored_cruiser: "Crucero acorazado"
 ship_type_armored_cruiser_desc: "Crucero grande rodeado de un cinturón de blindaje pesado, capaz de atacar a la mayoría de objetivos, salvo acorazados."
 ship_type_protected_cruiser: "Crucero protegido"
 ship_type_protected_cruiser_desc: "Crucero rápido de largo alcance con una cubierta blindada que protege sus componentes vitales."
 ship_type_seaplane_tender: "Portahidroaviones"
 ship_type_seaplane_tender_desc: "Barco diseñado para transportar y lanzar hidroaviones de reconocimiento y para operaciones ofensivas de menor impacto."
 ship_type_early_ironclad: "Buque blindado primitivo"
 ship_type_early_ironclad_desc: "Robusta embarcación oceánica con blindaje de hierro, propulsada a vapor."
 ship_type_modern_ironclad: "Buque blindado moderno"
 ship_type_modern_ironclad_desc: "La evolución del buque blindado tradicional."
 ship_type_pre_dreadnought: "Acorazado monocalibre primitivo"
 ship_type_pre_dreadnought_desc: "Poderoso acorazado con una batería combinada de cañones pesados."
 ship_type_dreadnought: "Acorazado monocalibre"
 ship_type_dreadnought_desc: "Acorazado revolucionario, construido en torno a una batería uniforme de cañones pesados."
 ship_type_super_dreadnought: "Superacorazado monocalibre"
 ship_type_super_dreadnought_desc: "Acorazado monocalibre enorme con cañones pesados y blindaje superior."
 ship_type_submarine: "Submarino"
 ship_type_submarine_desc: "Embarcación capaz de sumergirse, usada principalmente contra las naves mercantes enemigas."
 ship_type_troop_ship: "Barco de tropas"
 ship_type_troop_ship_desc: "Barco de suministro diseñado específicamente para transportar personas y material por todo el mundo."
 ship_type_supply_ship: "Barco de suministro"
 ship_type_supply_ship_desc: "Un barco que transporta bienes militares de un lugar a otro."
 ship_graphics_type_borodino: "Borodino"
 ship_graphics_type_borodino_desc: "Los acorazados monocalibre primitivos de la clase Borodino fueron los buques de guerra más modernos de la Armada Imperial Rusa en tiempos de la guerra ruso-japonesa. Constituían el núcleo del Segundo Escuadrón del Pacífico del almirante Rozhestvensky, que se enfrentó a un cruel destino: cuatro miembros de la clase fueron hundidos o capturados en la batalla de Tsushima."
 ship_graphics_type_mikasa: "Mikasa"
 ship_graphics_type_mikasa_desc: "El buque insignia del almirante Tōgō durante la guerra ruso-japonesa, anterior a los acorazados monocalibres. El Mikasa combatió en las operaciones más importantes de la guerra y se convirtió en un símbolo imperecedero del auge naval japonés."
 ship_graphics_type_dingyuan: "Dingyuan"
 ship_graphics_type_dingyuan_desc: "Como orgullo de la flota Beiyang, los buques blindados Dingyuan y Zhenyuan eran los símbolos más evidentes de la modernización militar de la dinastía Qing tardía. Tras combatir con valentía en la batalla del río Yalu, su rendimiento se vio frenado por el déficit crónico de fondos de la Armada Imperial china."
 ship_group_capital_ships: "Buques insignia"
 ship_group_capital_ships_desc: "Los buques insignia son los barcos más grandes y con mayores capacidades ofensivas listos para servir en la línea de batalla."
 ship_group_cruisers: "Cruceros"
 ship_group_cruisers_desc: "Los cruceros son embarcaciones más pequeñas con menos armamento para operaciones de patrulla de larga distancia."
 ship_group_torpedo_craft: "Embarcaciones torpederas"
 ship_group_torpedo_craft_desc: "Las embarcaciones torpederas son pequeñas y ágiles y confían en sus torpedos autopropulsados como armamento principal."
 ship_group_supply_ships: "Barcos de suministro"
 ship_group_supply_ships_desc: "Los barcos de suministro son embarcaciones civiles que apoyan y reabastecen las operaciones de las flotas militares."
