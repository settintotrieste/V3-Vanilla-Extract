 THEME_BULK_GROUP_ip3: "$dlc014$"
 THEME_BULK_GROUP_ip3_DESC: "Los temas incluidos con el DLC $dlc014$"
 gui_skin_ip3: "Balcanesca"
 gui_skin_ip3_desc: "Esta interfaz de usuario está compuesta por intrincados motivos y vivos colores inspirados en la diversidad cultural histórica y el folclore de la región."
 papermap_ip3: "Los Balcanes y Austria"
 papermap_ip3_desc: "Un mapa de papel pintado con los grupos culturales, folclore y eventos históricos de los Balcanes y Austria."
 table_ip3: "Azulejos otomanos"
 table_ip3_desc: "Una mesa de roble tallada, decorada con azulejos otomanos."
 papermap_pipe: "Pipa para tabaco"
 papermap_pipe_desc: "No solo para tabaco."
 papermap_bugbearflask: "Petaca de pesadilla"
 papermap_bugbearflask_desc: "Tallada a partir de un coco por un marinero con mucho mundo recorrido."
 papermap_sausage: "Kolbász"
 papermap_sausage_desc: "Una comida idónea tanto para una sala de juntas como para una barricada."
 papermap_coffeecup: "Café turco"
 papermap_coffeecup_desc: "Para una tarde relajante, nada como un café y un lokum."
 THEME_BULK_GROUP_ip4: "$dlc016$"
 THEME_BULK_GROUP_ip4_DESC: "Los temas incluidos con el DLC $dlc016$"
 gui_skin_ip4: "Cerámica ibérica (azul y dorada)"
 gui_skin_ip4_desc: "Una interfaz de usuario inspirada en los azulejos portugueses y españoles y en motivos florales pintados a mano, combinados con oro macizo."
 papermap_ip4_spain: "Gloria de España"
 papermap_ip4_spain_desc: "Un mapa de inspiración náutica con motivos de acontecimientos clave de la historia española."
 papermap_ip4_portugal: "Gloria de Portugal"
 papermap_ip4_portugal_desc: "Un mapa de inspiración náutica con motivos de acontecimientos clave de la historia portuguesa."
 table_ip4: "Madera de olivo"
 table_ip4_desc: "Una mesa con los exquisitos patrones de vetas típicos de la madera de olivo."
 papermap_portugese: "Sardinas enlatadas"
 papermap_portugese_desc: "Las sardinas, un ingrediente muy valorado en la cocina portuguesa, se asocian específicamente al día de san Antonio, el cual señala para muchos el inicio de la temporada de pesca de la sardina."
 papermap_philippines: "Mango"
 papermap_philippines_desc: "Apreciado por su excepcional dulzura, el mango de Manila es uno de los productos más valorados del archipiélago."
 papermap_cigar: "Puro cubano"
 papermap_cigar_desc: "Los puros cubanos, la máxima expresión del lujo, son famosos en todo el mundo por su intensidad y calidad."
 papermap_beretyrosary: "Boina"
 papermap_beretyrosary_desc: "Hecha con lana basta, esta boina roja y plana se asocia principalmente al movimiento carlista español."
 THEME_BULK_GROUP_ep2: "$dlc018$"
 THEME_BULK_GROUP_ep2_DESC: "Los temas incluidos con el DLC $dlc018$"
 gui_skin_ep2: "Lacada"
 gui_skin_ep2_desc: "Interfaz de usuario con temática japonesa de madera lacada."
 papermap_ep2: "Wakon Yōsai"
 papermap_ep2_desc: "Espíritu japonés, técnica occidental. Un mapa que ofrece tradición y mitología, y también la modernización del ejército japonés."
 papermap_tatami_mat: "Tatami"
 papermap_tatami_mat_desc: "Alfombra para sentarse hecha de juncos suaves, así como de cáñamo o algodón. Históricamente, eran un artículo de lujo reservado para aristócratas acaudalados, pero cada vez son más accesibles para la población general."
 papermap_japanese_dango: "Dango"
 papermap_japanese_dango_desc: "Dulce elaborado con harina de arroz y recubierto de glaseado dulce. Suelen servirse con té verde y se consumen en cualquier época del año."
 papermap_japanese_bonsai_tree: "Bonsái de pino blanco"
 papermap_japanese_bonsai_tree_desc: "Pino de cinco agujas, conocido por su longevidad y belleza, cultivado como bonsái. Uno de los bonsáis más antiguos del mundo que aún siguen vivos, el llamado Sandai Shōgun, fue cuidado por Tokugawa Iemitsu a principios del siglo XVII."
 papermap_japanese_dirk: "Daga de oficial de la Armada Imperial"
 papermap_japanese_dirk_desc: "Daga ceremonial del siglo XIX portada por un oficial de la Armada Imperial japonesa. Las dagas ceremoniales comenzaron a usarse dentro de la Armada Imperial japonesa a finales de la era Meiji, y se basaban en las normas navales occidentales establecidas."
 papermap_japanese_chabako_tea_set: "Chabako"
 papermap_japanese_chabako_tea_set_desc: "Caja de manera que contiene los utensilios necesarios para una ceremonia del té tradicional japonesa."
 papermap_japanese_lacquerware_box: "Caja de laca"
 papermap_japanese_lacquerware_box_desc: "Una caja recubierta de laca y decorada con #italic ojime#! y #italic netsuke#!, figuras y cuentas ornamentales talladas a mano."
 main_menu_image_ep2: "The Great Wave"
 main_menu_image_ep2_desc: "La imagen de fondo incluida con el DLC The Great Wave"
