 papermap_indianknife_desc: "Que te encanten las rosas es algo bello, cogerlas ya es otra cosa."
 papermap_hairbrooch: "Broche para el pelo"
 papermap_hairbrooch_desc: "Un espléndido broche para el pelo y para pavonearse delante de las amistades. Llevarlo puede ser todo un reto."
 papermap_cloth_indian: "Paño para monedas indias"
 papermap_cloth_indian_desc: "Damasco real con colección de monedas."
 papermap_ip2: "Maharajá"
