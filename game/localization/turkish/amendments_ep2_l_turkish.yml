l_turkish:
 amendment_frugal_ordinance: "Tasarruf Kararnamesi"
 amendment_frugal_ordinance_desc: "Sıradan halkın lüks tüketim mallarına, eğlenceye ve edebiyata erişimi hükümet tarafından sıkı bir şekilde kısıtlanmış ve düzenlenmiştir."
 amendment_zaibatsu_oligopoly: "Zaibatsu Oligopolü"
 amendment_zaibatsu_oligopoly_desc: "Ekonomi, devletle karşılıklı fayda ilişkisi içinde olan, müreffeh askeri-sanayi Zaibatsu'larından oluşan kapalı bir çevrenin hâkimiyetine girdi."
 amendment_zaibatsu_oligopoly_1: "$amendment_zaibatsu_oligopoly$"
 amendment_zaibatsu_oligopoly_1_desc: "$amendment_zaibatsu_oligopoly_desc$"
 amendment_zaibatsu_oligopoly_2: "$amendment_zaibatsu_oligopoly$"
 amendment_zaibatsu_oligopoly_2_desc: "$amendment_zaibatsu_oligopoly_desc$"
 amendment_taikunate: "Taykunluk"
 amendment_taikunate_desc: "Tokugawa klanı bu parlamenter sistem içinde özel ayrıcalıklarını korur. Klanın başı, hükümet başkanı olarak kalıcı bir konuma sahiptir."
 amendment_reformed_shinsengumi: "Shinsengumi Soyu"
 amendment_reformed_shinsengumi_desc: "Devletin gizli polis teşkilatının kökleri, Bakufu tarafından Kyoto'daki düzeni sağlamakla görevlendirilmiş seçkin bir silahşor birliği olan Shinsengumi'ye dayanır."
