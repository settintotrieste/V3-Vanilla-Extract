 japan_events.4.t: "İsimlerin Batılılaşması"
 japan_events.4.d: "[ROOT.GetCountry.GetName], yabancı güçlerle diplomasi ve ticaret yürütürken antlaşmalarda, yazışmalarda ve resmi belgelerde [GetCulture('japanese').GetName] isimlerinin nasıl aktarılması gerektiği üzerine sorular ortaya çıkmaya başladı. Batılı temsilciler isimlerin günbegün kendi geleneklerine uymasını, yani adın soyadından önce yazılmasını bekliyor."
 japan_events.4.f: "Kâtipler masalarına eğilmiş, yabancı yetkililere gidecek mektupların üzerinde kalemlerini oynatıyordu. Kendi aralarında fısıldaşıyor, yurt dışındaki diplomatik netliğin köklü usullerde yapılacak bir değişimi haklı çıkarıp çıkarmayacağını tartışıyorlardı. Mühür tutan bir el kağıdın üzerinde duraksadı; mürekkep kurumadan önce, öylece bir an bekledi."
 japan_events.4.a: "Dış yazışmalarda Batı usullerini benimse."
 japan_events.4.b: "Geleneksel isim sırasını koru."
 japan_events.4.c: "Bu yeni bir devir; tüm hususlarda Batı usullerini benimse."
