 japan_events.5.t: "Kanbun Meselesi"
 japan_events.5.d: "Hükümler, düzenlemeler ve siciller uzun zamandır yalnızca eğitimli azınlığın idrak edebildiği klasik bir lisana dayanıyordu. Reformcular idarenin günlük Japonca ile yürütülmesinin anlaşılırlığı ve verimliliği artıracağını savunurken; muhafazakârlar geleneğin, bizzat yazılı kelama otorite kattığında ısrarcı oldu."
 japan_events.5.f: "Bürokratlar gecenin geç saatlerine kadar çalışıyor, sessiz bir kararlılıkla talimatları yorulmak bilmeden baştan kaleme alıyorlardı. Bir kâtip gözlerini ovuşturmak için duraksadı, ardından tek bir işareti bile atlamamaya özen göstererek işine devam etti. Kalemin her bir cızırtısı, karmaşa ve düzensizliğe karşı verilen küçük bir muharebe gibi hissettiriyordu."
 japan_events.5.a: "Resmi yönetimde günlük Japonca kullanımını destekle."
 japan_events.5.b: "Dahili muhaberatta sınırlı bir ıslahata müsaade et."
 japan_events.5.c: "Tüm devlet belgelerinde klasik Kanbun kullanımını sürdür."
