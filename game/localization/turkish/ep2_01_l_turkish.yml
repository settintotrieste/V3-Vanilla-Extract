 japan_events.2.t: "Takvim İhtilafı"
 japan_events.2.d: "Japonya'nın asırlık ay-güneş takvimi, Batı dünyasıyla giderek daha fazla uyumsuz hâle geliyor. Tüccarlar yabancı ortaklarıyla koordine olurken yaşadıkları zorluklardan şikayet ederken, halk arasında ise uyuşmayan festival, kira ve vergi tarihleri yüzünden bir kafa karışıklığı baş gösterdi."
 japan_events.2.f: "Kâtipler defterlerinin üzerine eğilmiş, her satırı özenle temize çekiyordu. Kağıt yığınları her tekrarda daha da yükseliyor, artık var olmayan ayların izini sürmekten kâtiplerin gözleri ağrıyordu. Eski takvim usulca tarihe karışıyordu."
 japan_events.2.f_telegraph: "Ulaklar sokaklarda koşturuyor, birbiri ardına haberler yetiştiriyorlardı. İnsanlar her bir ilanı okumak için duraksıyor, tarihler takip edebileceklerinden çok daha hızlı değiştikçe başları dönüyordu. Haberler anında yayılıyor ve eski takvim neredeyse bir gecede silinip gidiyordu."
 japan_events.2.a: "Takvim reformunu derhâl yürürlüğe koy."
 japan_events.2.b: "Değişimleri hızlandırmak için [GetTechnology('electric_telegraph').GetName] teknolojisini kullan."
 japan_events.2.c: "Eski düzeni şimdilik muhafaza et."
