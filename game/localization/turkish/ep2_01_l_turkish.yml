 ## The Hidden Domain JE
 je_ryukyu_rivalry: "Gizli Hanlık"
 je_ryukyu_rivalry_reason: "#b Satsuma Hanlığı#! kuvvetleri tarafından #b 1609 yılında gerçekleştirilen istiladan#! bu yana [SCOPE.sCountry('ryukyu_scope').GetName] Krallığı, kâğıt üzerinde olmasa da fiilen [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetName, 'JAP')] sınırları içinde bir hanlık olarak varlığını sürdürdü. Shuri Sarayı, Satsuma boyunduruğu altında olmasına rağmen [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetName, 'CHI')] yönetiminden icazet almaya ve Pekin'e haraç heyetleri göndermeye devam ederek bağımsızlık görüntüsünü korumayı başardı.\n\nBu düzen nesiller boyu süregelmiştir. Ne var ki batılı güçlerin varlığının artması ve Japonya'nın dışa açılmasıyla beraber Doğu Asya'daki güç dengesi değişmiştir. Artık her iki taraf da Ryukyu ile olan ilişkilerini netleştirmek zorundadır ve bu durum, güney adaları üzerinde açık rekabete davetiye çıkarmaktadır.\n$TOOLTIP_DELIMITER$\n@warning! #r Başarısız:#! \n [SCOPE.sCountry('ryukyu_scope').GetNameNoFlag] bünyesindeki Cüretkârlık düzeyi #variable %100#!'e ulaştı.\n [SelectLocalization(SCOPE.sCountry('japan_scope').IsValid, SCOPE.sCountry('japan_scope').GetNameNoFlag, 'JAP')] veya [SelectLocalization(SCOPE.sCountry('china_scope').IsValid, SCOPE.sCountry('china_scope').GetNameNoFlag, 'CHI')], [Concept('concept_subject', 'Egemenlik Altına Alınmış')] veya #b İlhak Edilmiş#! durumda\n[SCOPE.sCountry('ryukyu_scope').GetNameNoFlag], müdahil olmayan bir ülke tarafından [Concept('concept_subject', 'Egemenlik Altına Alınmış')] veya #b İlhak Edilmiş#! durumda\n\n@information! Cezbetmek İçin:\n [SCOPE.sCountry('ryukyu_scope').GetName] ile aranızda bir #v Para Transferi#! [Concept('concept_article', 'Maddesi')] (#g @money!0,1-2B#!) bulunmalı\n [SCOPE.sCountry('ryukyu_scope').GetName] ile #v Dostane#! veya #v Barışçıl#! [concept_relations] içinde olmalısın\n En yüksek [Concept('concept_naval_power_projection', 'Donanma Güç İntikaline')] sahip olmalısın\n [SCOPE.sCountry('ryukyu_scope').GetName] ülkesinin sana karşı bir [Concept('concept_obligation', 'Yükümlülüğü')] olmasını sağlamalısın \n [concept_journal_entry] eylemlerini kullanmalısın"
 #je_ryukyu_rivalry_goal:1 "You are asserting more influence over [SCOPE.sCountry('ryukyu_scope').GetName] than your rival."
 je_ryukyu_rivalry_victory_japan: "#b Japon#! zaferini elde etmek için:\n"
 je_ryukyu_rivalry_victory_china: "#b Çin#! zaferini elde etmek için:\n"
 je_ryukyu_rivalry_victory_ryukyu: "#b Ryukyu#! zaferini elde etmek için:\n"
 ryukyu_rivalry_sway_tt: "Rakiplerin Ryukyu üzerindeki tüm hâkimiyetini kırmak için ülkeyi tamamıyla kendi saffına cezbet. Bu eylem, ülkeyi yeniden [Concept('concept_subject', 'Egemenlik Altına Girmeye')] elverişli hale getirir.\n\nCezbetmek İçin:\n Ryukyu ile aranızda bir #v Para Transferi#! [Concept('concept_article', 'Maddesi')] (#g @money!0,1-2B#!) bulunmalı\n Ryukyu ile #v Dostane#! veya #v Barışçıl#! [concept_relations] içinde olmalısın\n En yüksek [Concept('concept_naval_power_projection', 'Donanma Güç İntikaline')] sahip olmalısın\n Ryukyu'nun sana karşı bir [Concept('concept_obligation', 'Yükümlülüğü')] olmasını sağlamalısın\n [concept_journal_entry] eylemlerini kullanmalısın"
 ryukyu_rivalry_assertiveness_tt: "Ryukyu, Cezbetme çubuğu #v %100#!'e ulaştığında tarafsızlığını ilan edecek. Tarafsızlık ilanı ardından artık #v 50#! sene boyunca [Concept('concept_diplomatic_action', 'Diplomatik Eylemler')] vasıtasıyla [concept_subject] statüsüne getirilemez.\n\nBu çubuk #v -20#! ile #v +20#! arasında kaldığı sürece Cüretkârlık çubuğu her ay #g 0,5#! artar. \n\nRyukyu, Cezbetmeyi etkileyen mevcut eylemleri kullanarak Japonya ile Çin'i birbirine düşürüp tarafsızlığını koruyabilir. \n\nÖrnekler:\n Her iki tarafın da yer aldığı ya da hiçbirinin yer almadığı bir #v Para Transferi#! [Concept('concept_article', 'Maddesine')] (#g @money!0,1-2B#!) sahip olma\n Her iki tarafla da veya hiçbir tarafla #v Dostane#! veya #v Barışçıl#! [concept_relations] içinde olma\n Her iki tarafa karşı da [Concept('concept_obligation', 'Yükümlülük')] sahibi olma veya hiçbirine karşı [Concept('concept_obligation', 'Yükümlülük')] sahibi olmama\n Taraflardan biri üstünlük sağladığında veya dezavantajlı duruma düştüğünde söz konusu antlaşmaları iptal etme veya imzalama"
