 japan_events.1.t: "Herkese Mektup"
 japan_events.1.d: "Modernist düşünürler [ROOT.GetCountry.GetName] bünyesinde nüfuz kazandıkça, geleneksel ulak düzeninin yetersizlikleri giderek daha belirgin hâle geldi. Gerek feodal düzenin tasfiyesi gerekse halk arasında okuryazarlığın yayılmasıyla birlikte, modern bir devleti ayakta tutabilecek merkezi bir posta teşkilatı kurmak için şartlar artık olgunlaştı."
 japan_events.1.f: "Üzerlerinde devlet mührü taşıyan ulaklar, mektuplarla dolup taşan çantalarıyla sokaklarda koşturuyordu. Başkentte yetkililer gece boyunca haritalarına eğilmiş rotaları ayarlıyor ve pulları sayıyordu. Tüccarlar eski ulak ağlarının sekteye uğramasından homurdanırken meraklı çocuklar ilk mektuplarını yeni posta kutularına atıyordu. Bir zamanlar yerel âdetlerle bölünmüş olan ülke, artık tek bir sesle konuşmaya başlıyordu."
 japan_events.1.a: "Ulusal çapta yaygınlaşmasını tamamen finanse et."
 japan_events.1.b: "Büyük kent merkezlerine odaklan."
 japan_events.1.c: "Kırsal alanlara öncelik ver."
 japan_events.1.e: "Reform sürecini [SelectLocalization(SCOPE.sCharacter('JAP_maejima_hisoka').IsValid, SCOPE.sCharacter('JAP_maejima_hisoka').GetFullName, 'maejima_hisoka_string')] kişisine emanet et."
 japan_events.1.g: "Eski ulak düzenini muhafaza et."
