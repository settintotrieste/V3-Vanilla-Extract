 japan_events.3.t: "Yeniden Hesaplanan Yıl"
 japan_events.3.d: "Yeni takvimin kabulü yılı sessiz sedasız kısalttı. Sayılan günlerin azalmasıyla birlikte ücretler, kiralar ve vergiler eski düzende oluşan beklentilerle artık örtüşmüyor. İşçiler maaşlarının eridiğini fark ederken, memurlar bu tutarsızlığı izah etmekte zorlanıyor."
 japan_events.3.f: "İşçiler madeni paralarını tekrar tekrar sayıyor, memnuniyetsizlikle başlarını sallıyorlardı. Elleri çalışmaktan nasır tutmuştu ancak emeklerinin karşılığını göremiyorlardı. Yıl kısalmıştı ve kaybolan her gün, yorgun kollarda ve boş ceplerde izini bırakıyordu."
 japan_events.3.a: "Yıl artık daha kısa. Varsın öyle olsun."
 japan_events.3.b: "Mali yükü nüfusa dağıt."
 japan_events.3.c: "İstikrar uğruna zararı üstlen."
