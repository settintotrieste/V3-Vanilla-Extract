l_turkish:
 edo_system: "Edo Statü Sistemi"
 # Edo Social Classes
 strata_samurai_high: "Üst Sınıf Samuraylar" # High-Class Samurai
 strata_samurai_high_desc: "Daimyōlar ve kıdemli hizmetkârları gibi yüksek rütbeli savaşçı elitlerden oluşan samuray sınıfının üst tabakasıdır. Önemli devlet makamlarının çoğunu tekellerinde bulundurur ve soydan gelen ciddi bir prestije sahiptirler."
 strata_samurai_low: "Alt Sınıf Samuraylar" # Low-Class Samurai
 strata_samurai_low_desc: "Samuray seçkinlerinin emrinde idari ve askerî iş gücü olarak görev yapan, gokenin ve ashigaru gibi daha düşük rütbeli savaşçılar ve hizmetkârlardır."
 strata_religious: "Jisha" # Priests
 strata_religious_desc: "Tapınak kurumları bünyesinde örgütlenen ve otoriteler tarafından denetlenen tapınak ruhban sınıfıdır. Yerel yaşamda, eğitimde ve dinî ritüellerde büyük bir nüfuza sahip olsalar da yasal olarak tanımlanmış toplumsal statü sınıflarının bir anlamda dışında yer alırlar."
 strata_commoners_peasants: "Hyakushō" # Peasants
 strata_commoners_peasants_desc: "Avam sınıfının bir alt tabakası olan köylüler, Japon toplumsal sınıfları arasında açık ara en kalabalık olan gruptur. Köylü sınıfı mensupları doğrudan köylere kayıtlıdır ve yerel yükümlülüklere ve vergilendirmeye tabidirler. Hangi mesleği icra ettiklerine göre değil, nereye kayıtlı olduklarına göre tanımlanırlar; bu nedenle yalnızca çiftçileri değil, kırsal kesimdeki zanaatkâr ve tüccarları da kapsarlar."
 strata_commoners_townspeople: "Chōnin" # Townspeople
 strata_commoners_townspeople_desc: "Avam sınıfının bir alt tabakası olan şehirliler, Japonya'nın kentsel merkezlerinin başlıca sakinleridir. Şehirli sınıfının mensupları yerel şehir kurumları aracılığıyla kayıt altına alınır ve geleneksel olarak zanaat ve ticaretle uğraşırlar. Önemli ölçüde servet ve nüfuz elde edebilseler de savaşçı statüsüne sahip olmamaları nedeniyle toplumsal hareketlilikleri kısıtlı kalır."
 strata_outcastes: "Eta-Hinin" # Outcastes Eta, Hinin, etc.
 strata_outcastes_desc: "Eta ve Hinin kesimi, Japon toplumunun en alt kademelerini oluşturur. Ağır bir ayrımcılığa maruz kalan bu gruplar mezar kazıcılığı, dilencilik ve sokak göstericiliği gibi “kirli” mesleklerle ilişkilendirilirler."
 # Edo Social System Laws
 lawgroup_edo_social_system: "Edo Statü Sistemi"
 lawgroup_edo_social_system_desc: "$lawgroup_edo_social_system$nin Uygulanması"
 law_strict_edo_system: "Katı Statü Düzeni"
 law_strict_edo_system_desc: "Hukuki ve mesleki fırsatlardan, kişinin statüsünün elverdiği hane kapısı sayısına kadar her şey devlet tarafından sıkı bir şekilde düzenlenir ve denetlenir. Protokolün herhangi bir şekilde ihlal edilmesi ağır yaptırımlara tabidir. Şehirlilerin ve köylülerin resmî yollarla samuray saflarına katılma imkânları bulunmaz."
 law_intermediate_edo_system: "Esnetilmiş Statü Düzeni"
 law_intermediate_edo_system_desc: "Hukuki kurallar ile kılık kıyafet ve tüketimi sınırlayan yasalar esnetilmiş olup avam sınıfına toplum içinde giderek artan bir nüfuz ve statü tanınmaktadır. Varlıklı şehirliler veya köylüler, unvan satın alma yoluyla alt rütbeli bir samuray olan gokenin mertebesine erişebilirler."
 law_lax_edo_system: "Gevşek Statü Düzeni"
 law_lax_edo_system_desc: "Eskiden yalnızca samuraylara özgü olan makamlar ve roller avam sınıfına açılmıştır. Geriye kalan tüketim ve meslek kısıtlamaları ise artık yalnızca seçici bir biçimde, genellikle sadece en ağır ihlallerle sınırlı kalacak şekilde uygulanmaktadır."
 # Tenpo Crisis
 je_tenpo_crisis: "Tenpō Krizi"
 je_tenpo_crisis_reason: "1830 yılında ilan edilen Tenpō, yani 'İlahi Koruma' Çağı, başlangıçta bu uğurlu isminin hakkını veriyordu. Ancak [GetGeographicRegion('geographic_region_honshu').GetName] topraklarındaki elverişsiz hava koşulları, kısa süre içinde pirinç fiyatlarının fırlamasına ve ülke çapında bir kıtlığa yol açtı. Bu sırada [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] bünyesinde artan servet ve nüfuz, yerleşik [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] düzenini tehdit etmeye başladı.\n\nUfukta ise Batılı [Concept('concept_great_power', '$concept_great_powers$')] giderek daha küstahça bir tavır takınıyor, ticaret gemileri ve gambotları kıyılarımıza her geçen gün daha da yaklaşıyor.\n\nBu sorunları çözmek isteyen reform yanlısı eşraf, kendi vizyonlarını Bakufu makamına sundular.\n\n#tooltippable;tooltip:tenpo_reformer_tt #b Reformcu Gündemi#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_lax')] [ROOT.GetCountry.GetNameNoFlag] devleti [GetLawType('law_lax_edo_system').GetName] kanununu yürürlüğe koydu\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_bureaucrats')] [ROOT.GetCountry.GetNameNoFlag] devleti [GetLawType('law_hereditary_bureaucrats').GetName] kanununu #b yürürlüğe koymadı#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_urbanization')] [ROOT.GetCountry.GetNameNoFlag] sınırları içinde #v 3.#! seviye olan [GetBuildingType('building_urban_center').GetName] binalarına sahip #v 3#! [Concept('concept_state', 'Vilayet')] bulunuyor\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_clout')] [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] [Concept('concept_interest_group', 'Çıkar Grubunun')] [concept_clout] düzeyi #v 10#! veya üzerinde\n#tooltippable;tooltip:tenpo_hardliner_tt #b Tutucu Gündemi#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_edo_system_strict')] [ROOT.GetCountry.GetNameNoFlag] devleti [GetLawType('law_strict_edo_system').GetName] kanununu yürürlüğe koydu\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_social_control')] [ROOT.GetCountry.GetNameNoFlag] devleti [GetLawType('law_shinsengumi').GetName] kanununu yürürlüğe koydu\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_rural')] [ROOT.GetCountry.GetNameNoFlag] topraklarında toplam #v 40#! seviye [GetBuildingType('building_rice_farm').GetName] bulunuyor\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_pb_marginalized')] [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] [concept_interest_group] [concept_marginalized] durumda\n#tooltippable;tooltip:tenpo_shared_tt #b Ortak Gündem#!#!:\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_famine')] Sahip olunan #b hiçbir#! [GetCulture('japanese').GetName] [concept_homeland] [Concept('concept_state', 'Vilayetinde')] [concept_famine] yaşanmıyor\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_gdp')] [ROOT.GetCountry.GetNameNoFlag], @gdp!#v [Country.MakeScope.Var('tenpo_gdp_goal').GetValue|k0]#! veya üzerinde bir [Concept('concept_gdp', '$concept_gdp_short$')] değerine sahip\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_army_size')] [ROOT.GetCountry.GetAdjectiveNoFlag] ordusunun [concept_power_projection] değeri #v 500#!'ün üzerinde\n• [SCOPE.GetRootScope.GetCountry.GetCustom('tenpo_checkbox_naval_size')] Sahip olunan [Concept('concept_state', '$concept_states$')] içinde #v 10#! veya daha fazla seviyede [GetBuildingType('building_naval_fortification').GetName] bulunuyor"
 je_tenpo_crisis_complete_header: "Şu durumlarda başarılı bir Tenpō reformuyla sonuçlanır:\n"
 je_tenpo_crisis_failure_header: "Şu durumlarda başarısız bir Tenpō reformuyla sonuçlanır:\n"
 je_tenpo_crisis_success_tt: "En az #v 8#! gündem hedefini tamamladık"
 je_tenpo_crisis_success_2_tt: "Tamamlanan #tooltippable;tooltip:tenpo_shared_tt #b Ortak#!#!, #tooltippable;tooltip:tenpo_reformer_tt #b Reformcu#!#! veya #tooltippable;tooltip:tenpo_hardliner_tt #b Tutucu#!#! hedef sayısına bağlı olarak ödül değişkenlik gösterir."
 je_tenpo_crisis_success_outcome_tt: "Tamamlanan #b Ortak#!, #b Reformcu#! veya #b Tutucu#! hedef sayısına bağlı olarak ödül değişkenlik gösterir."
 je_tenpo_crisis_success_outcome_1_tt: "Daha fazla #b Tutucu#! gündemi tamamladıysak:"
 je_tenpo_crisis_success_outcome_2_tt: "Daha fazla #b Reformcu#! gündemi tamamladıysak:"
 je_tenpo_crisis_success_outcome_3_tt: "Eşit sayıda #b Tutucu#! ve #b Reformcu#! gündemi tamamladıysak:"
 modifier_tenpo_crisis_reward_hardliner: "Düzene Dönüş"
 modifier_tenpo_crisis_reward_reformer: "Yeninin Tesisi"
 modifier_tenpo_crisis_reward_balanced: "Ölçülü Reformlar"
 modifier_rice_hoarding: "Geniş Çapta Pirinç İstifçiliği"
 tenpo_hardliner_tt: "#b Tutucu Fraksiyon#!; Japon toplumunun ahlaki bir çöküş içinde olduğuna ve bu yozlaşmanın ancak geleneğe dönüşle durdurulabileceğine inanmaktadır.\n\nBu grup daha sıkı tüketim kanunlarının getirilmesini, samurayların şehir lükslerinden feragat etmesini ve kırsaldaki idealize edilmiş sade yönetici rollerine geri dönmelerini savunur."
 tenpo_reformer_tt: "#b Reformcu Fraksiyon#!; Japon toplumunun geri dönülemez şekilde değiştiğine ve ülke kanunlarının romantikleştirilmiş bir geçmişin idealleri yerine ülkenin mevcut durumuna dayandırılması gerektiğine inanmaktadır.\n\nBu grup, Japon halkının siyasi olarak yükseltilmesini ve ticaretin teşvik edilmesini savunur."
 tenpo_shared_tt: "#b Tutucu#! ve #b Reformcu#! fraksiyonlar, Japonya'yı dış tehditlere karşı korumanın elzem olduğuna ve gıda güvenliği ile ekonomi meselelerinin mutlaka ele alınması gerektiğine inanmaktadır."
 button_je_tenpo_combat_rice_hoarding: "Pirinç İstifçiliği ile Mücadele"
 button_je_tenpo_combat_rice_hoarding_desc: "[ROOT.GetCountry.GetNameNoFlag] sınırları içindeki siyasi ve ekonomik istikrarsızlık, bazı vicdansız aktörlerin büyük miktarlarda pirinç satın alıp istiflemesine ve fiyatların fırlamasına neden oldu. Bunun bir neticesi olarak birçok Japon hanesi artık en temel gıdaları olan pirinci dahi alamaz hâle gelerek açlığın eşiğine sürüklendi."
 button_je_tenpo_frugal_ordinance: "Tasarruf Kararnamesini Yayınla"
 button_je_tenpo_frugal_ordinance_desc: "Kentsel [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] bünyesinde artan yozlaşma, yönetimimizin istikrarını tehdit ediyor. Artık statülerinin ötesinde davranmaya, servetlerini herkesin gözü önünde sergilemeye başladılar.\n\nLüks tüketim mallarına, eğlenceye ve edebiyata yeni yasal kısıtlamalar getirerek onlara toplumdaki rollerini hatırlatmalıyız."
 button_je_tenpo_confiscate_land: "Edo-Osaka Müsadere Emrini Yayınla"
 button_je_tenpo_confiscate_land_desc: "Edo ve Osaka çevresindeki 10 #italic #tooltippable;tooltip:glossary_ri ri#!#!'lik alan; tenryo, daimyo ve hatamoto mülkiyetindeki topraklardan oluşan karmaşık bir yumaktır. Merkezî bir idari yapının eksikliği hem ulusal savunma hem de ülke topraklarının tüm imkânlarından yararlanma kabiliyetimizi ağır biçimde etkilemektedir. Bu nedenle önde gelen bir Rōjū, söz konusu toprakların müsadere edilip birleştirilmesini teklif etmiştir.\n\nYerinden edilen toprak sahiplerine Japonya sınırları içinde başka bölgelerde tazminat niteliğinde topraklar tahsis edilecektir."
 modifier_consolidation_payments: "Toprak Birleştirme Ödemeleri"
 modifier_consolidated_state_land: "10 Ri Birleştirme Kanunu"
 glossary_ri: "#b #italic Ri#!#!, Çincedeki #italic li#! biriminden türetilen geleneksel bir ölçü birimidir.\n\nRi'nin tanımlanan uzunluğu zaman içinde değişmiş olsa da, geç Edo Dönemi'nde kabaca 36 #italic chō#! birimine, yani 3,9 km'ye tekabül ediyordu."
 modifier_tenpo_crisis_ongoing: "Tenpō Dönemi Çalkantıları"
 tenpo_events.1.t: "İlahi Koruma Dönemi"
 tenpo_events.1.d: "Yıllar süren elverişsiz hava koşullarının ardından, [concept_famine] [ROOT.GetCountry.GetNameNoFlag] topraklarını pençesine aldı. Yoksul ve muhtaç kesim hayata tutunmakta zorlanırken, hükümetin çok daha fazlasını yapabileceğine inananların artan hoşnutsuzluğu da Bakufu yönetimini zor durumda bırakıyor."
 tenpo_events.1.f: "Eşinin dokuduğu kumaşlar pazarda her zaman iyi para eder, hatta daha iyi günlerde onlara ara sıra bir parça şekerleme alma imkânı bile verirdi. Şimdiyse ancak dört ya da beş gō pirinç ediyordu, o da şanslılarsa. \"Topladığımız yaprak ve otlarla karnımızı doyurmaya çalışsak bile, bırak koca bir haftayı, bir günü bile zar zor çıkarırız.\" diye düşündü.\n\nEvin yolunu tuttu. İhtiyar Tora'nın evinin göründüğü yerde kısa bir an duraksadı. Çiçek hastalığı adamın iki çocuğunu çoktan almıştı ve yağmurluklarla ilgili söylentiler doğruysa, önümüzdeki haftalarda muhtemelen daha fazlasını da alacaktı. Pirinç çuvalını sıkıca kavrayarak sessiz bir dua mırıldandı ve oradan ayrıldı."
 tenpo_events.1.a: "Ey gökler, titreyin üstümüze!"
 tenpo_events.1.tt_1: "[GetGeographicRegion('geographic_region_honshu').GetName] topraklarını vuran #r şiddetli#! [GetHarvestConditionType('torrential_rains').GetName], ülkenin hayati önem taşıyan #b pirinç hasatlarını#! #r mahvetmiş#! ve [ROOT.GetCountry.GetAdjectiveNoFlag] [concept_food_security] düzeyini ciddi biçimde aşağı çekmiştir."
 tenpo_events.1.tt_2: "Tefecilerin ve pirinç istiflediğinden şüphelenilen kişilerin [GetGeographicRegion('geographic_region_honshu').GetName] çapındaki meskenleri, #italic #tooltippable;tooltip:glossary_uchikowashi uchikowashi#!#! adı verilen eylemlere kalkışan çetelerin hedefindedir ve bu durum #r ülke çapında#! [Concept('concept_devastation', 'Yıkıma')] neden olmaktadır."
 glossary_uchikowashi: "#b #italic Uchikowashi#!#!; tefeciler, pirinç istifçileri ve fahiş fiyat uygulayanlar gibi ahlaksız olarak algılanan kişilerin mülklerinin halk tarafından tahrip edilmesi eylemini ifade eder.\n\nHer ne kadar bu eylemlerde sıklıkla yağmalamalar görülse de eylemciler, davalarının meşruluğunu ön plana çıkarmak adına çoğu zaman bundan bilerek uzak dururlardı."
 tenpo_events.2.t: "Filozof Samurayın İsyanı"
 tenpo_events.2.d: "[SCOPE.sState('osaka_scope').GetName] topraklarını kasıp kavuran [Concept('concept_famine', 'Kıtlıkla')] mücadele kapsamında kurulu düzenin yetersiz kalması üzerine hayal kırıklığına uğrayan hâkim ve âlim [SCOPE.sCharacter('oshio_scope').GetFullName], yerel otoritelere karşı isyan bayrağını çekti. Destekçileri yerel hükümet konaklarını ateşe verirken [SCOPE.sState('osaka_scope').GetCityHubName] merkezinin büyük bir kısmı şimdiden alevlere teslim olmuş durumda."
 tenpo_events.2.f: "\"Her ne kadar Tang ve Wu'nun kudretine ya da Konfüçyüs ve Mensiyüs'ün erdemine sahip olmasak da, başka çaremiz kalmadı. Soyumuzun lanetlenmesi pahasına da olsa bu diyarın bekası için harekete geçmeye karar verdik.\n\nSade vatandaşa eziyet edip acı çektiren çeşitli yetkilileri cezalandıracak ve kellerini alacağız; ardından Osaka'nın bir eli yağda bir eli balda olan varlıklı şehirlilerini de aynı cezaya çarptırıp idama mahkûm edeceğiz.\n\nSonrasında ise gizli kasalarında sakladıkları altın, gümüş ve sikkeler ile ambarlarında ve malikânelerinde gizledikleri pirinç balyalarını halka dağıtarak pay edeceğiz.\"\n\n–Ōshio Heihachirō, #italic Manifestodan Alıntılar#!"
 tenpo_events.2.a: "Milisleri toplayın ve bu haini çarmıha gerin."
 tenpo_events.2.b: "Umutsuz lakin haklı bir eylem."
 tenpo_events.2.c: "İsyancılar yerel garnizonu ezip geçiyor ve [SCOPE.sState('osaka_scope').GetCityHubName] merkezini ele geçiriyor."
 tenpo_events.2.tt_1: "[SCOPE.sCharacter('oshio_scope').GetFullName] yakalanmaktan kurtuluyor ve kendini ateşe vererek intihar ediyor."
 tenpo_events.2.tt_2: "[SCOPE.sCharacter('oshio_scope').GetFullName], yetkililer tarafından işkence görüyor, tuzlanıyor ve çarmıha geriliyor."
 tenpo_events.2.tt_3: "Yerel milisler, daha fazla yayılmasına fırsat vermeden #b ayaklanmayı bastırıyor#!."
 tenpo_events.2.tt_4: "Bir [concept_agitator] olan [SCOPE.sCharacter('oshio_scope').GetFullName], hafif ve sembolik bir cezaya çarptırılarak çalışmalarına devam etmesine izin veriliyor."
 modifier_osaka_burning: "Kanla Yazılmış Beyanname"
 modifier_controversial_pardon: "Tartışmalı Af"
 tenpo_events.3.t: "Mecburi Reformlar"
 tenpo_events.3.d: "Reformların gidişatından memnun kalan [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], kaydedilen ilerlemeden ötürü divan üyelerini tebrik etti; [ROOT.GetCountry.GetAdjective] ulusunun dâhili veya harici fark etmeksizin yaklaşan her türlü zorluğun üstesinden gelebileceğine inanıyor."
 tenpo_events.3.f: "\"On iki, efendimiz.\" dedi başdanışman, fırçayı masanın kenarına bırakırken. \"Kinai bölgesinden gelen raporlar da genel itibarıyla aynı doğrultuda. Görünüşe göre reformlarımız kök salmaya başlamış.\"\n\nKürsüden, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] kısa bir baş işaretiyle onay verdi. \"Pekâlâ. Vakti geldiğinde saray ahalisinin durumdan haberdar edilmesini istiyorum. Şimdi, Nagasaki Valisi'nden gelen rapora gelecek olursak..."
 tenpo_events.3.a: "Dileriz bu durum, [ROOT.GetCountry.GetAdjective] toplumundaki ahlaki ve siyasi yozlaşmanın sonunu getirir."
 tenpo_events.3.b: "Köylüden samuraya, hepimiz İmparator'un tebaası değil miyiz?"
 tenpo_events.3.c: "Diyarın istikrarı her şeyden önündedir."
 tenpo_outcome_hardliner_tt: "#b Reformcu#!'ya kıyasla daha fazla #b Tutucu#! gündemi tamamladık."
 tenpo_outcome_reformer_tt: "#b Tutucu#!'ya kıyasla daha fazla #b Reformcu#! gündemi tamamladık."
 tenpo_outcome_balanced_tt: "Eşit sayıda #b Tutucu#! ve #b Reformcu#! gündemi tamamladık."
 tenpo_events.4.t: "Eylem ve Eylemsizlik"
 tenpo_events.4.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], reform programından beklenen verimin alınamaması ve toplumun başdanışmanlara yönelik giderek artan hoşnutsuzluğu neticesinde [SCOPE.sCharacter('roju_scope').GetFullName] isimli devlet adamını görevinden azletti."
 tenpo_events.4.f: "Sürgün. Bu kelime, eski meclis üyesinin dilinin ucuna kadar geldi; lakin ağzında epey nahoş bir tat bıraktı. Yine de dünkü olaylar göz önüne alındığında, Edo'da kalmaktan çok daha iyi bir seçenekti. Geride kalan hizmetkârları hâlâ avluya ve havuza atılan kiremitlerle taşları temizlemekle meşguldü; meclis üyesi ise o gün işittiği bazı tehditleri aklından söküp atamıyordu.\n\nKelimeyi bir kez daha dilinin ucuna getirdi, artık o kadar da itici gelmiyordu. \"Hem zaten, Gassan Dağı'nı hep kendi gözlerimle görmek istemiştim.\" diye içinden geçirdi."
 tenpo_events.4.a: "Bu beceriksizi bir daha gözüm görmesin."
 tenpo_events.4.b: "Aldığı tüm kararları yok sayın ve halkı da bu durumdan haberdar edin."
 tenpo_events.4.tt_1: "[SCOPE.sCharacter('roju_scope').GetFullName], #r tenzil-i rütbeye#! uğratılarak #b Dewa#! vilayetine sürgün ediliyor."
 modifier_tenpo_fail: "Tenpı Reformları Yarıda Kaldı"
 tenpo_events_4_demotion_tt: "[Concept('concept_in_government', 'Devlet Yönetimindeki')] bir [concept_interest_group] [Concept('concept_leader', 'Lideri')] tenzil-i rütbeye uğratıldı ve ülke içinde sürgüne gönderildi" # tooltip for event_outcome_failed_effect_desc in je_tenpo_crisis
 tenpo_events.5.t: "Toprak Sahipleri Merkezileşmeye Direniyor"
 tenpo_events.5.d: "[SCOPE.sState('kanto_scope').GetName] ve [SCOPE.sState('kansai_scope').GetName] vilayetlerindeki arazilerin müsadere edilmesine yönelik teklifimiz, yerel toprak sahiplerinin geniş çaplı muhalefetiyle karşılaşmıştır. Bu konudaki en şiddetli itirazlar ise askeri hizmetleri karşılığında kendilerine toprak tahsis edilmiş bir kesimden gelmektedir."
 tenpo_events.5.f: "\"Şu an adıma kayıtlı olan bu topraklar, ecdadıma askeri başarıları karşılığında ödül olarak verilmişti. Sekigahara'dan bu yana her nesil bu toprağı işlemiş, mahsulünü artırmış ve efendilerimize olan yükümlülüklerini tek bir gün şikâyet etmeksizin yerine getirmiştir.\n\nBunca hizmetin karşılığında bize bu muamele mi reva görülmüştür? Münasip bir tazminat dahi alamadan yerimizden yurdumuzdan edilmek midir ödülümüz?”"
 tenpo_events.5.a: "İşler çığırından çıkmadan merkezileşme kararını iptal et."
 tenpo_events.5.b: "Yerinden edilenlere tazminat olarak ek arazi teklif et."
 tenpo_events.5.c: "Onlara bu kararın [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] makamının iradesine dayandığını hatırlat!"
 modifier_heavy_handed_land_confiscations: "Acımasız Arazi Müsadereleri"
 modifier_promotions_and_koku_redistribution: "Terfiler ve Koku Taksimatı"
 modifier_reckless_roju: "Pervasız Rōjū"
 modifier_will_of_the_shogun: "Şogun Adına"
 tenpo_events.6.t: "Ejderhanın İnine Giren Aslan"
 tenpo_events.6.d: "[SCOPE.sCountry('britain_scope').GetName] devletinin [SCOPE.sCountry('china_scope').GetAdjective] karşısında kazandığı zafer, memleketimizi derinden sarstı. Çin'in harp gemileri ve orduları, üstün [SCOPE.sCountry('britain_scope').GetAdjectiveNoFormatting] kuvvetleri tarafından adeta hezimete uğratıldı. Artık pek çok kimse, [ROOT.GetCountry.GetName] devletinin böyle bir saldırıya direnç gösterip gösteremeyeceğini sorguluyor."
 tenpo_events.6.f: "\"Batıdaki Ganlu Tapınağı'ndan doğudaki Jinshan Tapınağı'na uzanan Zhenjiang arazisi siyah ve beyaz barbarlarla dolup taşıyordu; adeta bir Go tahtasına saçılmış taşlar misali memleketi sarmışlardı. Bölgenin yerlileri de, bu belanın gün birinde nihayete erip ermeyeceğini endişeyle sorguluyordu.\"\n\n– Mineta Fūkō, #italic Denizaşırı Yeni Hikâyeler#!"
 tenpo_events.6.a: "Gökler bizi korusun, zira samuraylarımız koruyamayabilir."
 tenpo_events.6.b: "Çin'den gelen tüm olumsuz haberleri sansürle."
 tenpo_events.6.c: "Bizler, barbar dalgalarının çarpıp parçalanacağı yalçın kayalıklarız."
 modifier_opium_war_aftermath: "Barbarlar Kapıda"
 modifier_defenses_strengthened: "Sahil Garnizonları Tahkim Edildi"
 tenpo_events.7.t: "Takashima Ekolü"
 tenpo_events.7.d: "Afyon Savaşları'nın akabinde Japonya'nın istikbalinden endişe duyan Nagasaki Valisi [SCOPE.sCharacter('takashima_scope').GetFullName], Hollanda modelini örnek alan modern bir askerî birlik teşkil ederek memleketin geri kalanını da aynı minvalde hareket etmeye davet etti."
 tenpo_events.7.f: "\"Takashima'nın neferleri, kafalarında tuhaf taçlara benzeyen miğfervari başlıklar kuşanmış hâlde, Hollanda lisanının o kulak tırmalayan tınısıyla haykırılan emirleri icra ediyorlar. Buna mukabil saf nizamları ziyadesiyle talimli ve muntazam. İsabet oranları bir nebze düşük kalsa da hizmetimdeki adamlardan neredeyse iki kat daha hızlı yaylım ateşi açabiliyorlar.\"\n\n\"Peki ya topçu bataryaları?\"\n\n\"Emsalsiz. Bu silahı benimsemekte ne kadar yavaş davranırsak, barbar saldırılarını defetme şansımız da o denli zayıflayacaktır.\""
 tenpo_events.7.a: "Barbar silahlarının ve yöntemlerinin benimsenmesine onay ver."
 tenpo_events.7.b: "Bunun yerine geleneksel tüfekçi hanelerini destekle."
 modifier_inoue_tatsuke_primacy: "Inoue-Tatsuke Üstünlüğü"
 modifier_favouring_traditional_musketry_houses: "Geleneksel Tüfekçi Hanelerine Sağlanan Destek"
 modifier_favouring_takashima: "Tüfekçi Haneleri Saf Dışı Bırakıldı"
 modifier_takashima_school: "Takashima Ekolünün Teşviki"
 tenpo_events.8.t: "Bir Kâse Pirinç Uğruna"
 tenpo_events.8.d: "Pirinç stokçuluğu ve fahiş fiyat iddiaları, [SCOPE.sState('tenpo_unrest_state_scope').GetName] vilayetinde çiftçiler ile tüccarlar arasındaki gerilimin patlama noktasına gelmesine neden oldu. Eşkıyaların ve dilencilerin de köylülerin saflarına katılmasıyla yerel idareciler artık tüm idari bölgeyi saran bir ayaklanmayla yüzleşmek zorunda."
 tenpo_events.8.f: "İlk katılanlardan biriydi o. Zalim tüccarın evini basıp haksız yollarla elde ettiği malları halka pay eden bir avuç cesur adamın arasındaydı. Fakat gözleri kamp ateşinin çevresinde gezinirken geride ne kadar az dostunun kaldığını anladı. Eikichi ve Matsuzō hâlâ yanındaydı ama içleri haklı bir davanın ateşiyle dolup taşan o adamlardan artık eser kalmamıştı. Fukumatsu ikinci gün can vermiş, Takeshichi ise yedinci gün onu takip etmişti. Valinin adamları peşlerine düştüğünde geri kalanlar rüzgârdaki yapraklar misali savrulup gittiler.\n\nGidenlerin yerini dolduran yeni adamlar şahsiyetleri bakımından onu utanç ve umutsuzluğa sürüklüyordu, ancak önünde başka bir yol kalmadığını da biliyordu. Çünkü celladın testeresiyle kıyaslandığında bu kötü dostluk bile adeta bir lütuf gibiydi."
 tenpo_events.8.a: "Bu canileri ezip geçmek için birlik sevk et."
 tenpo_events.8.b: "Bırak kargaşa kendi kendine dinsin."
 tenpo_events.8.c: "Kargaşayı teskin etmeleri için yerel köy muhtarlarını hediyelerle ikna et."
 modifier_consulted_headsmen: "Köy İmtiyazları"
