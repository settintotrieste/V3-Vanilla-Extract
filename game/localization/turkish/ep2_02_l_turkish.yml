 modifier_tamed_north: "Örnek Koloni"
 modifier_northern_learnings: "Kaitakushi Öğretileri"
 button_je_taming_the_north_establish_colonies: "Devlet Destekli Koloniler Kur"
 button_je_taming_the_north_establish_colonies_desc: "Yeterli yerleşimciye sahip olmayan bir koloni başarısızlığa mahkûmdur. Kuzeye yerleşmelerini sağlamak için [ROOT.GetCountry.GetName] topraklarında yaşayan ailelere yönelik yeni teşvikler üzerinde durmalıyız."
 button_je_taming_the_north_integrate_ainu: "Aynu Yasal Güvencelerini Yürürlüğe Koy"
 button_je_taming_the_north_integrate_ainu_desc: "Bugüne kadar Komisyon, [GetCulture('ainu').GetName] halkı üzerinde zorunlu bir entegrasyon ve kültürel silme politikası gütmüştü. Buna rağmen Kuzey bölgesindeki [GetCulture('ainu').GetNameNoFormatting] yerlileri ile tesis edilen daha adil münasebetler, halklarımız arasındaki ilişkilerin yumuşamasını sağladı.\n\nBu doğrultuda [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] huzuruna bir teklif sunuldu. Buna göre [GetCulture('ainu').GetNameNoFormatting] halkı [ROOT.GetCountry.GetAdjective] kanunları uyarınca korunan bir kardeş topluluk olarak tescil edilecek; hak ve mükellefiyetler bakımından [GetCulture('japanese').GetName] halkı ile bir tutulacaktır."
 ainu_frenship_tt: "Gerçekleşen #b olaylar#! sırasında [GetCulture('ainu').GetName] halkının çıkarlarını istikrarlı biçimde gözettik."
 button_je_taming_the_north_sapporo_agricultural_college: "Sapporo Ziraat Mektebi Tesis Edilsin"
 button_je_taming_the_north_sapporo_agricultural_college_desc: "Kuzey, tarım ve arazi yönetimi alanlarındaki en yeni teorileri denemek için mükemmel bir ortam. Alanında uzman yabancı kadrosuyla ülkenin bilimsel dönüşümünün merkezi olacak son teknoloji bir tarım fakültesi kuracağız."
 sapporo_partner_positive_catalyst_tt: "Gereksinimleri karşılayan rastgele bir ülke ile #g olumlu#! bir [concept_diplomatic_catalyst] tetiklenecek."
 button_je_taming_the_north_agriculture_potentials: "Yeni Mahsuller Ek"
 button_je_taming_the_north_agriculture_potentials_desc: "Adadaki ekilebilir arazi miktarı hayati bir öneme sahip olsa da gerçek iktisadi kalkınma, yalnızca doğru mahsullerin yetiştirilmesiyle mümkün olacaktır.\n\nTarım alanında yaşanan ve #b Sapporo Ziraat Mektebi#! öncülüğünde yürütülen yeni gelişmeler, şimdiye dek imkânsız olduğu düşünülen mahsulleri dondurucu sınır boylarına getirmemize olanak tanıyor.\n\nMevcut Seçenekler:\n• #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_opimizing_existing_variants_tt $modifier_opimizing_existing_variants$#! (ölçekli)\n• [GetBuildingType('building_rice_farm').GetName]\n• [GetBuildingType('building_dye_plantation').GetName]\n• [GetBuildingType('building_opium_plantation').GetName]\n• [GetBuildingType('building_vineyard').GetName]"
 established_sapporo_college_tt: "#b Sapporo Ziraat Mektebi#! tesis edildi"
 hokkaido_agriculture_potentials_tt: "Bu karar toplamda #v 3#! kez alınabilir. (Şu anda: [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_potentials_counter_var').GetValue|v0])"
 modifier_opimizing_existing_variants_tt: "[GetStaticModifier('modifier_opimizing_existing_variants').GetName|v]\n[GetStaticModifier('modifier_opimizing_existing_variants').GetDesc]"
 button_je_taming_the_north_agriculture_arable_land: "Toprak Islahını Sürdür"
 button_je_taming_the_north_agriculture_arable_land_desc: "Bu uçsuz bucaksız araziler tarımsal açıdan henüz işlenmemiş olsa da büyük bir gelecek vaat ediyor. Bol su kaynaklarını besleyen yüce sıradağlar, araziyi kuzeye genişletmek adına pek çok fırsat sunuyor.\n\nBataklıkları kurutacak, tarlaları sulayacak ve sarsılmaz [GetCulture('japanese').GetName] ruhunun bir nişanesi olarak bu toprakları dize getireceğiz."
 hokkaido_agriculture_arable_tt: "Bu karar toplamda #v 3#! kez alınabilir. (Şu anda: [ROOT.GetCountry.MakeScope.Var('hokkaido_agriculture_arable_counter_var').GetValue|v0])"
 hokkaido_events.1.t: "Sekizinci İdari Bölge"
 hokkaido_events.1.d: "[SCOPE.sState('hokkaido_scope').GetName] ya da eski adıyla Aynu bölgesi, artık asıl Japonya sınırları içerisinde. Dolayısıyla bölgenin yeni konumunu simgeleyen bir isim tayin edilmeli. Yeni kurulan Kalkınma Komisyonu, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] tarafından incelenmek üzere bir dizi teklif sundu."
 hokkaido_events.1.f: "\"Vahşilerin diyarından başka bir şey değil. Bataklıklar ve çamurla dolu. Yoksul balıkçılar ve yamyamların yaşadığı bir yer. [ROOT.GetCountry.GetCapital.GetCityHubName] topraklarında neyi bulamadın da Tanrı'nın unuttuğu o topraklarda bulmayı umuyorsun?\"\n\n\"Amaç, anne. Ayrıca sahip olacağım bir şey istiyorum.\""
 hokkaido_events.1.a: "Adı #tooltippable;tooltip:hokkaido_events.1_tt_3 #b Hokkai-dō#!#! olacak: Kuzey Denizi İdari Bölgesi." # 北加伊道
 hokkaido_events.1.b: "#tooltippable;tooltip:hokkaido_events.1_tt_2 #b Hokkai-dō#!#!, bu toprakların sakinleri şerefine." # 北海道
 hokkaido_events.1.c: "#tooltippable;tooltip:hokkaido_events.1_tt_4 #b Kaitō-dō#!#!, yani Deniz Adası İdari Bölgesi, açıkça daha iyi bir seçenek."
 hokkaido_events.1.e: "#tooltippable;tooltip:hokkaido_events.1_tt_5 #b Hitakami-dō#!#! adının edebi bir tınısı var."
 hokkaido_events.1.tt_1: "#b Sapporo#! şehri tesis edildi ve #b Hakodate#!'nin yerini alarak adanın yeni idari başkenti ilan edildi."
 modifier_ainu_heritage_aknowleged: "Kailer Diyarı"
 modifier_breaking_new_ground: "Yeni Arazilerin Islahı"
 modifier_hokkaido_naval_connections: "Denizle Çevrili İdari Bölge"
 modifier_call_of_the_frontier: "Sınır Boylarının Çağrısı"
 the_ainu_will_appreciate_this_tt: "@information! The [GetCulture('ainu').GetName] bunu unutmayacak"
 hokkaido_events.1_tt_2: "#b Kuzey Kai İdari Bölgesi#!\nKomisyon üyesi Matsuura Takeshirō'nun ifadesiyle #italic kai#! (加伊), Aynu halkının kendilerini tanımlamak için kullandığı çok eski bir isim olarak kabul edilir."
 hokkaido_events.1_tt_3: "#b Kuzey Denizi İdari Bölgesi#!\nMatsuura Takeshirō'nun asıl teklifine karşı hükümetin sunduğu bir alternatiftir. Bu noktada #italic kai#! (加伊) karakterlerinin yerini, sesteşi olan ve \"deniz\" anlamını taşıyan #italic kai#! (海) karakteri almıştır.\n\n@information!Tarihsel süreçte kabul edilen teklif bu olmuştur."
 hokkaido_events.1_tt_4: "#b Deniz Adası İdari Bölgesi#!\nAdanın karakteri, her şeyden önce denizle olan ilişkisi üzerinden tanımlanmaktadır; dolayısıyla bu gerçek, seçilecek yeni isimde açıkça ortaya konmalıdır."
 hokkaido_events.1_tt_5: "#b Gündoğumu Diyarı İdari Bölgesi#!\nKuzeydoğu sınır boyları için Yamato Dönemi'nden kalma eski bir isim. Bu tercih sayesinde yeni koloni, Japonya'nın antik geçmişiyle sarsılmaz bir bağ kuracak."
 hokkaido_events.2.t: "Yeni Sınır Boyu"
 hokkaido_events.2.d: "Bölgeye en verimli yerleşim yönteminin ne olacağı sorusu, [SCOPE.sState('hokkaido_state_scope').GetName] Kalkınma Komisyonu gündemini epey zamandır meşgul ediyor. Sabırsızlanan yöneticiler artık kesin bir karar verilmesi konusunda ısrarcı."
 hokkaido_events.2.f: "Çocukluğunda babası sık sık atalarından bahsederdi. Savaşan devletler döneminin gururlu ve asil savaşçılarını, onların sade asaletini ve savaşlardaki büyük kahramanlıklarını anlatırdı. Bu hikâyeler çocukken onu büyülemiş olsa da artık ona sadece hüzün veriyordu. Sadece kendisine kazandırdığı saygınlık için kılıç taşıyıp evrak işleriyle uğraşan şehirli bir ayyaş olan babasının geçmişin erdemlerini övmesi dayanılmaz bir ironiydi.\n\nBu yüzden babası işin yönetiminde kendisine yardım etmesini istediğinde onu küçümseyerek reddetti ve hemen kuzeye doğru yola çıktı. Acaba orada soyunun kurtuluşunu bulabilir miydi?"
 hokkaido_events.2.a: "Asker-yerleşimci kolonistlerin iskânına öncelik ver."
 hokkaido_events.2.b: "Sıradan köylü, [ROOT.GetCountry.GetName] devletinin temel direğidir."
 hokkaido_events.2.c: "[GetCulture('japanese').GetName] yerleşimlerinin çoğunu, [GetCulture('ainu').GetName] halkı tarafından kullanılmayan alanlarla sınırla."
 modifier_tondenhei_settlements: "Tondenhei Yerleşimleri"
 modifier_peasant_settlements: "Köylü Yerleşimleri"
 modifier_restricted_settlements: "Aynu Ana Toprakları Muhafaza Edildi"
 hokkaido_events.2.tt_1: "[Concept('concept_capital_state', 'Baş Vilayette')] bulunan tüm [GetCulture('japanese').GetName] [Concept('concept_pop', 'Nüfusunun')] #v %1,5#!'i [SCOPE.sState('hokkaido_state_scope').GetName] vilayetine göç edecek."
 hokkaido_events.2.tt_2: "[GetGeographicRegion('geographic_region_home_islands').GetName] dahilindeki en düşük [Concept('concept_gdp','$concept_gdp_short$')] değerine sahip [Concept('concept_state', 'Vilayetlerden')] biri olan [SCOPE.sState('hokkaido_migration_origin_scope').GetName] içerisindeki tüm [GetCulture('japanese').GetName] [Concept('concept_pop', 'Nüfusunun')] #v %3#!'ü [SCOPE.sState('hokkaido_state_scope').GetName] vilayetine göç edecek."
 modifier_old_swords_in_new_lands: "Yeni Diyarlarda Kadim Kılıçlar"
 modifier_go_north_young_man: "Kuzeye, Genç Adam"
 hokkaido_events.3.t: "İlerlemenin Nüveleri"
 hokkaido_events.3.d: "Sapporo Ziraat Mektebi'nde gerçekleştirilen son atılımlar, [SCOPE.sState('hokkaido_state_scope').GetName] arazilerine yeni mahsuller ekilmesi yönündeki teklifleri gündeme getirdi."
 hokkaido_events.3.f: "#b Kişisel Laboratuvar Günlüğü, 154#!\nSon test sonuçlarına dayanarak batı çeşitlerine yapılan aşılamalardan vazgeçilip güney çeşitlerine geçiş yapıldı. Ekip, ekim sınırının önemli ölçüde kuzeye kaydırılmasının beklendiğini, hatta belki Kamikawa'yı bile aşabileceğini söylüyor. Verim potansiyelini değerlendirmek için daha fazla araştırma yapılması gerekiyor ancak durumdan umutluyum. Yarın fakülte başkanıyla bir görüşme talep ettim. Yeni kravat almam gerek."
 hokkaido_events.3.a: "Çabalarımızı halihazırda mevcut olan mahsullerin iyileştirilmesine odaklayalım."
 hokkaido_events.3.b: "Yerel [GetBuildingType('building_rice_farm').GetName] faaliyetlerine imkân tanımak adına soğuğa dayanıklı türler geliştir."
 hokkaido_events.3.c: "Alçak araziler, Çivit [GetBuildingType('building_dye_plantation').GetName] için oldukça elverişlidir."
 hokkaido_events.3.e: "Haşhaş bitkisi burada gayet iyi yetişir. [GetBuildingType('building_opium_plantation').GetName] bu bölgenin geleceğidir."
 hokkaido_events.3.g: "Özelleşmiş üzüm soyları kullanarak [GetBuildingType('building_vineyard').GetName] oluştur."
 button_je_taming_the_north_complete: "Teknolojimizin elverdiği ölçüde topraklarımızı ihya ettik."
 modifier_introducing_new_crops: "Yeni Mahsullerin Ekimi"
 modifier_opimizing_existing_variants: "Soğuğa Dayanıklı Mahsul Türleri"
 hokkaido_events.4.t: "Toprağın Bereketi" # Markens Grøde really does sound better in Norwegian
 hokkaido_events.4.d: "[SCOPE.sState('hokkaido_state_scope').GetName] Kalkınma Komisyonu önemli bir dönüm noktasına daha ulaştı. Eski bataklıkların büyük bir kısmı ıslah edilerek kıymetli tarım arazilerine dönüştürüldü."
 hokkaido_events.4.f: "Gerçekten etkileyiciydi. On yıl önce, önündeki nehirde güvenle seyredebilecek en büyük gemi küçük bir kayık olurdu. Şimdiyse yukarıdaki berrak dağ havasını dumana boğan devasa bir buharlı yük teknesinden bir grup işçinin sandıkları ve çuvalları indirişini izliyordu. Belki de bir sonraki kanal havuzunda veya akıntının yukarısındaki drenaj projesinde malzeme olarak kullanılacaklardı ya da sadece vadinin ötesindeki yeni köyden gelen erzaklardı. Bilemiyordu ve aslında bunun bir önemi de yoktu. Zira ne taşıyor olursa olsun o gemi geleceği taşıyordu."
 hokkaido_events.4.a: "Vurulan her çapa darbesiyle toprağı yoğuruyoruz."
 hokkaido_events.4.b: "Kurulan her yeni yuvayla da onu büyütüyoruz."
 hokkaido_events.4.tt_1: "[GetGeographicRegion('geographic_region_home_islands').GetName] dahilindeki en düşük [Concept('concept_gdp','$concept_gdp_short$')] değerine sahip [Concept('concept_state', 'Vilayetlerden')] biri olan [SCOPE.sState('hokkaido_migration_origin_scope').GetName] içerisindeki tüm [GetCulture('japanese').GetName] [Concept('concept_pop', 'Nüfusunun')] #v %2#!'si [SCOPE.sState('hokkaido_state_scope').GetName] vilayetine göç edecek."
 modifier_immigration_burst: "Göç Dalgası"
 modifier_open_to_business: "Ticarete Açık"
 hokkaido_events.5.t: "Gençler, İdealleriniz Büyük Olsun..."
 hokkaido_events.5.d: "Bünyesinde [SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective] hocaların bulunduğu Sapporo Ziraat Mektebi ilk mezunlarını verdi. Bu genç dimağlar, edindikleri yeni becerileri hayata geçirmek için sabırsızlanıyor. Bu esnada kolej heyeti, enstitünün gelecekteki istikameti ve odak noktası üzerinde mütalaada bulunuyor."
 hokkaido_events.5.f: "\"...idealleriniz büyük olsun; lakin paradan, şahsi ikbal peşinde koşmaktan veya insanların şöhret dediği o fani şeyden sakının. Bir insanın erişebileceği en yüksek mertebeye ulaşmaya çabalayın.\"\n\n–William Smith Clark, #italic Sapporo Ziraat Mektebi Başkanı'nın Veda Konuşması#!"
 hokkaido_events.5.a: "Bir ziraat mektebi, öncelikli olarak tarım faaliyetlerine odaklanmalıdır."
 hokkaido_events.5.b: "Mühendislik fakültesinin genişletilmesine öncelik vermeliyiz."
 hokkaido_events.5.c: "Beşeri bilimler fakültesi kur ve yerel kültür araştırmalarına başla."
 hokkaido_events.5.tt_1: "#b Sapporo#!'da bulunan [SCOPE.sCountry('sapporo_partner_country_scope').GetAdjective] hocaların nüfuzu, yerel bir [GetCulture('japanese').GetName] [SCOPE.sReligion('sapporo_partner_religion_scope').GetName] topluluğunun oluşmasına zemin hazırladı."
 hokkaido_events.5.tt_2: "#b $je_taming_the_north$#! [Concept('concept_journal_entry', 'Günlük Girdisi')] dahilindeki #b $button_je_taming_the_north_agriculture_potentials$#! ve #b $button_je_taming_the_north_agriculture_arable_land$#! seçeneklerinin kilidini açar."
 modifier_sapporo_expanded_agricultural_faculty: "Yenilikçi Ziraat Usulleri"
 modifier_sapporo_expanded_engineering_faculty: "Öncü Mühendislik Fakültesi"
 modifier_sapporo_humanities_faculty: "Sapporo Kültür Tetkik Heyeti"
 hokkaido_events.6.t: "Aynu Mosir, Sisam Mosir"
 hokkaido_events.6.d: "Ülke içindeki muhtelif siyasi ihtilafların gölgesinde [ROOT.GetCountry.GetCapital.GetCityHubName], [SCOPE.sState('hokkaido_state_scope').GetName] vilayetinin hukuki statüsüne dair yeni bir ferman yayımladı. Bu ferman ile Aynu anavatanının sınırları resmen tayin edilirken resmi [ROOT.GetCountry.GetAdjective] bürokrasisi ile eş zamanlı çalışacak yerel kurumların da temeli atıldı."
 hokkaido_events.6.f: "\"Hinna! Hinna!\" Yaşlı Aynu kadın, neredeyse dişsiz bir gülüşle ona bir kâse çorba uzattı. İçindeki çeşitli av etlerine göz attı ve anne babasının burada olup onu yargılamadığına şükretti.\n\nZoraki bir gülümsemeyle kâseyi kabul ederken \"Barış için yaptığım şeylere bak,\" diye kendi kendine mırıldandı."
 hokkaido_events.6.a: "\"Bu topraklar her iki taraf için de yeterince büyük.\""
 modifier_opposes_ainu_rights: "Barbar İmtiyazları"
 modifier_supports_ainu_rights: "Aynu Hakları Teminat Altına Alındı"
 hokkaido_events.7.t: "Komisyonun Son İcraatı"
 hokkaido_events.7.d: "[SCOPE.sState('hokkaido_state_scope').GetName] Kalkınma Komisyonu, hükümet tarafından kendisine verilen görevin başarıyla yerine getirildiğini ilan etti ve geriye kalan tüm yetkilerini devlet makamlarına devretme kararı aldı."
 hokkaido_events.7.f: "#b 8 Numaralı Bildirge#!\n[SCOPE.sState('hokkaido_state_scope').GetNameNoFormatting] Kalkınma Komisyonu işbu bildirgeyle feshedilmiştir ve Hakodate, Sapporo ve Nemuro vilayetleri kurulmuştur. İlgili idari sınırların kapsamı daha ileri bir tarihte ilan edilecektir."
 hokkaido_events.7.a: "Gelecekteki sömürge girişimleri için parlayan bir örnek..."
 hokkaido_events.7.b: "...ve hatta [GetGeographicRegion('geographic_region_home_islands').GetName] bölgesi için de durum tam olarak budur."
 modifier_external_applications: "Kaitakushi: Harici Uygulamalar"
 modifier_domestic_applications: "Kaitakushi: Dahili Uygulamalar"
 hokkaido_events.8.t: "Gayesiz Kalan Komisyon"
 hokkaido_events.8.d: "[SCOPE.sStateRegion('hokkaido_state_region_scope').GetName] bölgesinin kaybedilmesi üzerine Kalkınma Komisyonu, misyonunu bitiremeden dağılmak zorunda kaldı. [ROOT.GetCountry.GetName] genelinde ise sokaklara dökülen öfkeli vatandaşlar, milli onurlarının ayaklar altına alınmasını ve maddi kayıplarını protesto ediyor."
 hokkaido_events.8.f: "Yorgun düşen fahri yönetici, ofis koltuğuna çökerek kendine bolca sake doldurdu. Bardağı tek seferde boşalttıktan sonra gözlerini masanın üzerine serilmiş haritalara dikti. Karalamalar, notlar ve işaretlerle doluydular; her biri hayat enerjisini adadığı ayrı bir planı temsil ediyordu. Artık ne plan kalmıştı ne de enerji ve her notta ima edilen iyimserlik, alaycı bir ton kazanmıştı.\n\n\"Hepsinin canı cehenneme,\" diye düşündü ve kendine bir bardak daha sake koydu."
 hokkaido_events.8.a: "Maalesef bu sonuç hükümetin iradesi dışında."
 modifier_lost_northern_investments: "Zayi Olan Kuzey Yatırımları"
