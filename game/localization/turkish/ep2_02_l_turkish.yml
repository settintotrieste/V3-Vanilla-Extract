 je_taming_the_north: "Kuzey'i Ehlileştirme"
 je_taming_the_north_reason: "Bu eski sınır bölgesi, yaygın adıyla #b Kaitakushi#! olarak bilinen #b [SCOPE.sState('hokkaido_state_scope').GetName] Kalkınma Komisyonu#!'nun kurulmasıyla büyük bir canlılık kazandı. Her gün güneyden yeni topraklar ve fırsatlar arayan insanlar buraya geliyor.\n\nAncak bu, alelade bir insan akını değil. Zira yerleşimcilerle beraber, toprağı şekillendirme görevini üstlenmiş bürokratların yanı sıra entelektüeller ve modernleşme yanlısı vizyonerler de geliyor. Bu isimler, [ROOT.GetCountry.GetName] yarınları için kurdukları hayallerin, mevcut [SCOPE.sState('hokkaido_state_scope').GetName] coğrafyasında hayat bulmasını arzuluyorlar."
