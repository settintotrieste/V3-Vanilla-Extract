 je_colonize_korea_culture_percent_busan_tt: "$STATE_BUSAN$ topraklarındaki [GetCulture('japanese').GetName] [Concept('concept_pop', 'Nüfusu')|l], #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|%0]#! değerinden yüksek veya bu değere eşit"
 je_colonize_korea_culture_percent_yangho_tt: "$STATE_YANGHO$ topraklarındaki [GetCulture('japanese').GetName] [Concept('concept_pop', 'Nüfusu')|l], #bold [GetPlayer.MakeScope.ScriptValue('je_colonize_korea_state_japanese_culture_min')|%0]#! değerinden yüksek veya bu değere eşit"
