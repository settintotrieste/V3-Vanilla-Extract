 korea_colonization.2.t: "Umut Vadeden Bir Gelecek"
 korea_colonization.2.d: "Dünya artık [GetGeographicRegion('geographic_region_korea').GetName] topraklarının [ROOT.GetCountry.GetName] topraklarının bir parçası olduğunu ve ülkemizin tam kontrolü altında olduğunu biliyor. Yarımadada varlığımızı sağlamlaştırarak elde ettiğimiz başarı, dünya sahnesindeki önemli konumumuzu bir kez daha ortaya koyuyor."
 korea_colonization.2.f: "Uluslar arasındaki birleşme vizyonu artık gerçekleştiği için [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] da gittikçe hırslanıyor. [ROOT.GetCountry.GetCapital.GetCityHubName] topraklarındaki koltuğundan, bu girişimin başarısını yansıtan ve yarımadadaki gelişmelerden memnuniyet duyan tanka şiirleri yazıyor.\n\nAynı zamanda $STATE_SEOUL$ topraklarında [GetCulture('korean').GetNameNoFormatting] bir bürokrat, yeni toplumsal düzene karşı çıkan sivillerin kamuoyundaki tepkilerini bastırıyor. Onlarla büyük bir sükûnetle konuşan bürokrat, bu birliğin herkesin refahını sağlayacağını vurguluyor."
 korea_colonization.2.a: "Yarımadanın gelecekteki refahı ve güvenliği parlak görünüyor."
 korea_colonization.2.b: "Ticari işler, gündemimizin ayrılmaz bir parçasını oluşturur."
 modifier_peninsula_control_prestige_authority: "Yarımadanın Prestiji"
 modifier_peninsula_control_assimilation_migration: "Hızlandırılmış Asimilasyon"
 modifier_peninsula_control_loyal_prominence: "Üstün Gözetim"
 modifier_peninsula_control_company_bonus: "Şirket Takdirnamesi"
 korea_colonization.3.t: "Kaçırılmış Bir Fırsat"
 korea_colonization.3.d: "[GetGeographicRegion('geographic_region_korea').GetName] artık bizim kontrolümüz altında değil. Bunun ekonomik ve diplomatik etkileri, önümüzdeki yıllarda [ROOT.GetCountry.GetName] topraklarında hissedilecek."
 korea_colonization.3.f: "[ROOT.GetCountry.GetAdjectiveNoFormatting] yetkililer, hükümetin yarımadada düzeni sağlayamamasıyla ilgili görüşmek için bir araya geldi. Toplantıda hayal kırıklığı ve hoşnutsuzluk hâkimdi. Birçoğu, [ROOT.GetCountry.GetNameNoFormatting] ülkesinin son yıllarda elinde topladığı büyük güce vurulan bu darbeyi atlatmak için herhangi bir taviz vermeyi reddetti.\n\nTartışmanın gürültüsü arasında bir beyefendi söz alarak ayağa kalktı: \"Bu aksaklıktan elbette [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] sorumlu tutulabilir.\""
 korea_colonization.3.a: "Girişimimizin başarısız olmasının getirdiği yükü hepimiz üstlenmeliyiz."
 korea_colonization.3.b: "[SCOPE.sCharacter('relevant_ig_leader').GetFullName] ve [SCOPE.gsInterestGroup('relevant_ig').GetName] bu başarısızlığın sorumluluğunu üstlenmeli."
