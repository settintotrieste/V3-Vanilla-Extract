l_turkish:
 #Japan Single-Fire Events
 japan_events.31.t: "[SCOPE.sState('kabuki_theatre_state').GetCityHubName] Şehrindeki Tiyatro Yangında Yerle Bir Oldu"
 japan_events.31.d: "[SCOPE.sState('kabuki_theatre_state').GetName] vilayetindeki gözde bir kabuki tiyatrosu çıkan yangında kül oldu. Tiyatro kumpanyası binayı yeniden inşa etmenin planlarını yaparken başta [SCOPE.sCharacter('relevant_leader').GetFullName] olmak üzere [SCOPE.gsInterestGroup('relevant_ig').GetName] mensupları bu durumu [SCOPE.sState('kabuki_theatre_state').GetCityHubName] merkezindeki eğlence hayatını nizam altına almak ve sanatkârları şehir dışında bir tiyatro inşa etmeye zorlamak için fırsat kolluyor."
 japan_events.31.f: "Bir yangın kulesinin tepesinde, gözlerini [SCOPE.sState('kabuki_theatre_state').GetCityHubName] şehrinden bir an olsun ayırmayan huzursuz bir bekçi. Gecenin ilerleyen saatlerinde bulunduğu o yüksek noktadan bir yangının ilk emarelerini fark eder. Dumanlar göğe yükselip alevlerin genzi yakan o acı kokusu havayı doldururken tehlike çanını çalmak üzere telaşla atılır.\n\nGafil avlanan ahali tehlikeye karşı ikaz edilir ve itfaiye teşkilatı alevleri zapt etmek gayesiyle damlara tırmanarak derhal harekete geçer. Yangın nihayet söndürüldüğünde büyük bir tahribatın çoktan vuku bulduğu aşikârdır. Bu yıkıcı afetin ardından o meşhur kabuki tiyatrosundan geriye yalnızca kül ve köz yığınları kalmıştır."
 japan_events.31.a: "Şehir sınırları dışında yeniden inşa etmeliler."
 japan_events.31.b: "Tiyatro kumpanyasının yeniden inşasına müsaade et."
 modifier_kabuki_regulated: "Kabuki Tiyatrolarına Takibat"
 modifier_theatre_affronted_official: "Haysiyeti Zedelenmiş Yetkili"
 modifier_shogunate_opposition_ig_approval: "Fırsatçı Muhalefet"
 japan_events.32.t: "Fani Dünya Tasvirleri"
 japan_events.32.d: "[SCOPE.sState('ukiyo_e_state').GetCityHubName] merkezli üretken bir ukiyo-e sanatçısının eserleri hem [ROOT.GetCountry.GetName] içindeki hem de yurt dışındaki sanatçıların hayal gücüne ilham kaynağı oluyor."
 japan_events.32.f: "Meşhur bir ahşap baskı eseri, [SCOPE.sState('ukiyo_e_state').GetCityHubName] şehrinin çeperindeki hareketli temaşa bölgesini tasvir eder. Gümüşî mehtap, insan silüetlerinin gölgeler saldığı kalabalık ana caddeyi aydınlatmakta. Caddenin doğu tarafı, yan yana dizili çayevleri ve kukla tiyatrolarıyla bezelidir; tam karşıda, batıya doğru ise üzerlerinde birer davul kulesi yükselen üç kabuki tiyatrosu yer alır.\n\n\"Ancak bir üstat eli, hatları böylesine metin ve sadık kılabilir; gölgelendirmeyi tam da olması gereken yere böylesine latif bir surette icra edebilirdi. Ancak müstesna bir dimağ, her zerresi ahenkli bir intizam içinde böylesine kudretli, böylesine enfes bir narinliğe sahip bir figürü tahayyül edebilirdi.\"\n— F.W.G., #italic Şikago Sanat Enstitüsü Mecmuası#!"
 japan_events.32.a: "[ROOT.GetCountry.GetAdjectiveNoFormatting] sanatının küresel çapta yükselmeye devam edeceğine şüphe yok."
 japan_events.32.b: "Âlâ. Bu eserlerin daha fazla üretilmesini teşvik et."
 modifier_ukiyo_e_prestige: "Bereketli Ahşap Baskı Eserlerinde"
 modifier_ukiyo_e_production: "Ahşap Baskı Eserlerinin Üretimi"
 japan_events.33.t: "Gelenekle Boğuşmak"
 japan_events.33.d: "Batılılaşmanın [ROOT.GetCountry.GetAdjectiveNoFormatting] kültürü üzerindeki etkisi oldukça büyük. Gelenekler hızla değişirken [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullName], bu geleneğe karşı oluşan toplumsal tepkiyi kırmak için [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] şehrinde bir Sumo turnuvası düzenliyor."
 japan_events.33.f: "Tapınak avlusunda yeni inşa edilen Sumo Salonu'nda, [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] makamının himayesine mazhar olan meraklı kalabalıklar toplanmaya başladı. Hazır bulunanlar arasında Batı kültürüne olan düşkünlükleri sebebiyle bu geleneği sürdürmeye şüpheyle bakan bazı aristokratlar ve devlet adamları da mevcuttu. Sumo'nun altın çağı çoktan geride kalmış olsa da [SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting] hazretlerinin teşrifi, bu sporun halkın nazarındaki kültürel ehemmiyetini yeniden tesis edebilir."
 japan_events.33.a: "[SCOPE.sCharacter('relevant_character').GetPrimaryRoleTitle] makamının gayretleri, bu sporun toplum nezdindeki itibarını iade edecek."
 japan_events.33.b: "Bu [ROOT.GetCountry.GetAdjectiveNoFormatting] sporunun geleneği çok uzun yıllar yaşayacak."
 modifier_restored_sumo_popularity: "Sumo'nun İade Edilen İtibarı"
 modifier_traditional_sports_movement_support: "Millî Spor"
 japan_events.34.t: "[SCOPE.sState('whaling_state').GetPortHubName] Limanında Balina Avcılığı Faciası"
 japan_events.34.d: "[SCOPE.sState('whaling_state').GetName] açıklarında seyreden bir tekne, bir anne ve yavrudan oluşan iki balina tespit etti. Sezonun verimsiz geçmesiyle çaresiz kalan bir balina avcısı grubu, kötü hava koşullarına rağmen denize açıldı. 100'den fazla kişinin kayıp olduğu bildirildi."
 japan_events.34.f: "Teknedeki ateş çoktan gözden kayboldu ve filo artık karadan seçilemiyor; bu durum [SCOPE.sState('whaling_state').GetPortHubName] limanında büyük bir kargaşaya yol açıyor.\n\nİçlerinden biri, \"Ne kadar zor günlerden geçmiş olursak olalım, bir anne balinayı yavrusuyla birlikte avlamaktan hep kaçındık,\" diye karşı çıkıyor. \"Balinaların geçip gitmesine müsaade etmeliydik.\"\n\nKuzeni ise, \"Saçmalama,\" diye yanıt veriyor. \"Bu balinalar birer lütuf. Eminim ki sefere çıkanlar yakında bereketli bir avla geri dönecek.\""
 japan_events.34.a: "$bg_whaling$, [SCOPE.sState('whaling_state').GetNameNoFormatting] bölgesi için kritik bir endüstridir."
 japan_events.34.b: "Bunun yerine gelecekteki çalışmalarımızı [SCOPE.sState('whaling_state').GetNameNoFormatting] bölgesindeki $bg_fishing$ faaliyetlerine yoğunlaştıralım."
 modifier_whaling_deaths: "Balina Avcılığı Zayiatı"
 modifier_redouble_on_whaling: "Balina Avcılığının Geleceği"
 modifier_fishing_not_whaling: "Balıkçılığın Geleceği"
 japan_events.35.t: "Kundaklama Karşıtı Önlemler"
 japan_events.35.d: "[SCOPE.gsInterestGroup('relevant_ig').GetName], [SCOPE.sState('relevant_state').GetCityHubName] şehir sınırlarındaki sık kundaklama olaylarının [ROOT.GetCountry.GetName] genelinde [SCOPE.sGoods('expensive_good').GetName] fiyatlarını yükseltmesinden endişe duyuyor. Kundakçılığa karşı uygulanan sert önlemlerin iki misline çıkarılmasının şart olduğunu savunuyorlar."
 japan_events.35.f: "Yangın kulesinden yükselen alarm çanları, [SCOPE.sState('relevant_state').GetCityHubName] şehrinde bir yangının daha evleri ve iş yerlerini sardığını haber vererek herkesi yaklaşan tehlikeye karşı uyarıyor. İtfaiye ekipleri alevleri söndürmek için olay yerine ulaştığında $strata_commoners_townspeople$ sokakta büyük bir kalabalık hâlinde toplanıyor. Bazıları komşularına şüpheyle bakarken diğerleri bunun bir kaza mı yoksa bir kundakçının işi mi olduğunu tartışmaya başlıyor. Kesin olan bir şey var ki [SCOPE.sGoods('expensive_good').GetNameNoFormatting] fiyatları yakında katlanarak artacak."
 japan_events.35.a: "Şiddetli tedbirler elzemdir. Kundakçılık zanlılarını derhal idam et."
 japan_events.35.b: "Tutuklamalara katkı sağlayanların mevcut suçlarını affet."
 modifier_arson_measure_strict_ig: "Kundakçılığa Karşı Sert Önlemler"
 modifier_arson_measure_strict_pop: "Kundakçı İnfazları"
 modifier_arson_measure_lenient_ig: "Kundakçılığa Karşı Hoşgörülü Önlemler"
 # Colonization of Korea Content
 je_colonize_korea: "Chōsen Hükümeti"
 je_colonize_korea_reason: "#italic \"Sanayi ve ticaret, iyi yönetim ve barış koşullarında kayda değer bir gelişme gösterecektir. Bunun sonucunda Doğu Asya'daki barışın her zamankinden daha sağlam temellere sahip olacağından kesinlikle eminiz.\"\n- İmparator Meiji'nin Günlükleri, Cilt 12#!\n\nKore Yarımadası'nda kalıcı bir varlık oluşturmanın zamanı geldi. Ancak o zaman [JournalEntry.GetCountry.GetName] ve tüm [GetGeographicRegion('geographic_region_east_asia').GetName] topraklarının gelecekteki refahını ve güvenliğini sağlayabiliriz. Kontrolü tam anlamıyla sağlayabilmek için [GetGeographicRegion('geographic_region_korea').GetName] gelişimini yakından takip etmeli ve hedeflerimizden asla vazgeçmemeliyiz."
 je_colonize_korea_is_owned_by_tt: "[JournalEntry.GetCountry.GetName] ülkesine ait"
