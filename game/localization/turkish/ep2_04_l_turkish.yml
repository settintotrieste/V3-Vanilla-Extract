 zaibatsu.1.t: "Kurumsal İmparatorluk"
 zaibatsu.1.d: "[ROOT.GetCountry.GetAdjective] vilayeti ile [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] arasındaki kalıcı ortaklık, [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] içindeki holdinglerin gücünü artırmıştır. Yönetimde siyasetçiler olabilir ancak asıl iktidar sahibi generaller ve yöneticilerdir."
 zaibatsu.1.f: "[SCOPE.sCharacter('pm_scope').GetFullNameNoFormatting], kapalı locasından müsabakayı izliyordu. Desteklediği güreşçinin rakibi, şampiyonunu pirinç samanından yapılma ringin en ucuna kadar itmişti ve o da parmak boğumlarının bembeyaz olmasını engellemek için mücadele ediyordu. Başbakanın yanında, son derece sakin bir şekilde [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting] duruyordu.\n\nHakem yelpazesiyle galibe işaret etti ve alt sıralardan tezahüratlar yükseldi. Koltuk minderleri havada uçuşarak ringin üzerine yağdı. [SCOPE.sCharacter('relevant_zaibatsu_exec').GetFirstNameNoFormatting] başını [SCOPE.sCharacter('pm_scope').GetFirstNameNoFormatting] yönüne doğru çevirdi ve gülümsedi. Orada, ringin uzak tarafındaki duvarlardan birine kazınmış olarak [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting] #italic monu#! duruyordu."
 zaibatsu.1.a: "[ROOT.GetCountry.GetCapital.GetCityHubName] şehir merkezinin bir ışık denizi gibi açılmasına izin ver."
 zaibatsu.1.b: "İkmal zincirimizin güvenliği her zaman daha da artırılabilir."
 zaibatsu.2.t: "Kilit Altında"
 zaibatsu.2.t_1: "Denge Sağlayan El"
 zaibatsu.2.d: "[SCOPE.sCharacter('pm_scope').GetLastName] kabinesinin çabaları sayesinde, [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] üzerinde kontrol kurma konusunda [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] imkânları kısıtlandı. Yönetim siyasetçilerde olacak ve yöneticiler kendi kârlarına odaklanacak."
 zaibatsu.2.d_1: "[SCOPE.sCharacter('pm_scope').GetLastName] kabinesinin serbest ticaret politikaları, [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] üzerindeki [SCOPE.gsInterestGroup('zaibatsu_ig').GetName] kontrolünün temelini oluşturan askeri-sanayi sözleşme ağını zayıflattı. Yönetim siyasetçilerde olacak ve şirket yöneticileri kendi kârlarına odaklanacak."
 zaibatsu.2.f: "Bir grup yönetici, [SCOPE.sCompany('relevant_zaibatsu').GetNameNoFormatting] karargâhının en üst katındaki toplantı odasına akın etti. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting], sekreterlerden sonra üçüncü sırada giriş yaptı. Kapının yanındaki koltuğuna oturdu ve üstlerinin geçişini izledi. Önündeki çay fincanından hafif bir buhar yükseliyordu.\n\n[SCOPE.sCharacter('relevant_zaibatsu_exec').GetFullNameNoFormatting] en son giriş yaptı. Gözleri sırayla tüm çalışanlarının üzerinde dolaştı. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting], Baron'un gözlerinde daha önce hiç görmediği bir ifade olduğunu fark etti: yorgunluk. Yüzüne düşen gölgeler eskisinden daha belirgin görünüyordu ve gümüş rengi saçları her zamankinden daha da seyrekleşmişti."
 zaibatsu.2.a: "Egemenlik gücü yalnızca bize aittir."
 zaibatsu.2.b: "Halk duysun: [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] satılık değildir."
