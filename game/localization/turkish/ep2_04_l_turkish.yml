 glossary_zaibatsu: "#b #italic Zaibatsu#!#! bir aileye ait ve dikey bütünleşmiş bir sanayi ve finans holdingidir.\n\nTipik bir zaibatsu, genellikle sanayi sektöründe faaliyet gösteren birçok bağlı şirketin hisselerine sahip bir holding şirketi ve bir banka etrafında organize edilir. Zaibatsu, Edo döneminin sonlarında ortaya çıkan tüccar aile holdinglerinden doğmuştur. Bu holdingler, mevcut servetlerini ve devletle olan bağlarını kullanarak Japonya'nın sanayi altyapısının büyük bir kısmı üzerindeki kontrolünü pekiştirmiştir."
