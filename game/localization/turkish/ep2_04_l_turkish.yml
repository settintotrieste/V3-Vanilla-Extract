l_turkish:
 japan_politics.1.t: "Pratik Öğrenim"
 japan_politics.1.d: "[ROOT.GetCountry.GetName] devletinin dışa açılması, Hollanda Eğitimi ekolünün büyük kısmını köhneleştirdi. Başta \"pratik öğrenim\" ekolü olmak üzere, daha yeni fikirler [ROOT.GetCountry.GetAdjectiveNoFormatting] aydın kesimi arasında hızla yayılmaya başladı."
 japan_politics.1.f: "\"Mühim olan, herkesin tutum ve davranışlarını İnsanlık ilkelerine göre düzenlemesi, engin bir bilgi birikimi edinmek için şevkle çalışması ve ulusuna yaraşır yetenekler geliştirmesidir. Böylece hükümet daha kolay yönetebilecek, halk ise bu yönetimi hoşnutlukla kabul edecektir. Herkesin kendi yerini bulması ve ulusun huzurunu korumaya katkı sağlaması da ancak bu sayede olur. Yegâne gaye bu olmalıdır.\"\n\n—Fukuzawa Yūkichi, \"Öğrenme Teşviki\"" # Translated by Eiichi Kiyooka
 japan_politics.1.a: "İlimle gelen servet."
 japan_politics.2.t: "Ulu Haneler"
 japan_politics.2.d: "[ROOT.GetCountry.GetName] devletinin sanayileşmesiyle birlikte [SCOPE.gsInterestGroup('industrialists_ig').GetName], faaliyetlerini imalat ekonomisine doğru çeşitlendirdi. Servetlerinden ve devletle olan bağlantılarından yararlanarak sanayi tabanının büyük kısmını kendi kontrolleri altında toplamayı başardılar."
 japan_politics.2.f: "Maliye Bakanı, simsarların fiyat artırışlarını balkondan seyrediyordu. Eski pirinç borsası devrinde, alım satımın sona erdiğini ilan etmek için bir adam kalabalığın üzerine kovayla su boca ederdi.\n\nŞimdiyse bu işi gözlerini saate dikmiş, elinde tokmak tutan bir adam üstlenmişti. Masasının başında, yüzde yedi faizli tahvilleri kapmak üzere kollarını uzatan simsar deryasına yarı yarıya gömülmüş haldeki bu adam, ağzına tahvil kıstırmış birinin sözleşme imzalamasına tanık oluyordu. Gürültü kulakları sağır edecek raddedeydi. Alım satım naraları birbirine karışıyor, kayalıkları döven dalgaların sesini andırıyordu.\n\nSaat çaldı ve masadaki görevli, tokmağını bronz bir diskin üzerine gümletti. Kalabalıktan hoşnutsuz haykırışlar yükseldi. Son dakika pazarlıklarının gürültüsü daha da arttı. Adam homurdanarak masasının altına eğildi ve kovayı çıkardı."
 japan_politics.2.a: "Artık hüküm bankacıların."
 japan_politics.3.t: "Sade Vatandaş"
 japan_politics.3.d: "Edo sınıf sisteminin aşınması, ortak milliyet üzerine kurulu bir sivil toplumun doğuşuna zemin hazırladı. Bir zamanlar [SCOPE.gsInterestGroup('pb_ig').GetName] olarak nitelendirilenler, kendilerini her şeyden önce yurtsever vatandaşlar olarak görmeye başladılar."
 japan_politics.3.f: "Shizo başını ağır ağır iki yana çevirip bronz aynada yeni saç tıraşını süzdü. Saçları hiç olmadığı kadar kısaydı; kendini bildi bileli taşıdığı o topuzdan artık eser yoktu. Taze kesilmiş saç uçları eline sert ve kaba geliyor, elini sürekli başına götürmekten kendini alamıyordu.\n\nBirden başını silkeledi; saç tellerinin daha önce hiç bilmediği bir şekilde savrulduğunu hissetti. Tıpkı ensesini dalayan o yüksek yakalı, yeni moda giysiler gibiydi. Rahatsız ediciydi belki, ama faydalıydı. Bu yeni tarzlar bir duruşun ifadesiydi ve dükkâna müşteri çekiyordu. Onunki medeni bir işletmeydi; kendisi de vergisini ödeyen, muhafızlık yapan bir yurttaş... yani, medeni bir adamdı."
 japan_politics.3.a: "Milletin kudreti, vatandaşın huzurundadır."
