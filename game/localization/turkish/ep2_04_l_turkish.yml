 je_has_timed_out_tt: "[Concept('concept_journal_entry', 'Günlük Girdisinin')] süresi #b sona erdi#!"
 ep2_meiji.4.t: "[ROOT.GetCountry.GetCustom('get_sexagenary_cycle_term')] Savaşı"
 ep2_meiji.4.d: "[SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('shogun_scope').GetFullName], toprak ve unvanlarına el konulması neticesinde sadık hizmetkârlarını da yanına alarak İmparatorluk Sarayı'na karşı bir isyan başlattı ve bu isyanla beraber İmparatorluk gücünün geri kazanılmasını tersine çevirip Bakufu idaresini geri getirmeyi hedefliyor."
 ep2_meiji.4.f: "\"Kulunuz [SCOPE.sCharacter('shogun_scope').GetFirstNameNoFormatting], geçen dokuzuncu gününden bu yana vuku bulan gelişmeleri derinlemesine tetkik eylemiş olup bu hadiselerin hiçbirinin İmparatorluk Sarayı makamının gerçek niyetinden kaynaklanmadığını, tamamen Lord [SCOPE.sCharacter('councilor_scope').GetLastNameNoFormatting] adlı şahsın hain bakanlarının tertibi olduğunu görmüştür. Bu durum, fitnenin zuhur ettiği Edo, Nagasaki, Yashu ve Sōshū idari bölgeleri başta olmak üzere tüm diyarda malumdur.\n\nHak katında ve halk nazarında lanetlenen bu eylemler sebebiyle, sözü edilen hain bakanların teslim edilmesi için bir ferman yayımlamanızı Majesteleri huzurunda istirham ediyoruz. Şayet bu talep kabul edilmezse onların idamı için harekete geçmekten başka çaremiz kalmayacaktır.\"" # Edited petition by Yoshinobu
 ep2_meiji.4.a: "Arzumuz şudur: Haini katledin ve barışı yeniden sağlayın." # Emperor Meiji's plausibly fraudulent imperial decree of 1867
 ep2_meiji.4.b: "İmparator, eşkıyaların etkisi altına girdi."
 ep2_meiji.41.d: "[SCOPE.sCharacter('shogun_scope').GetLastName] klanının iktidara tutunma çabalarına öfkelenen restorasyon yanlısı hanlıklardan oluşan bir koalisyon, [SCOPE.sCharacter('shogun_scope').GetFullName] isimli Şogun'a karşı bir isyan başlattı. İmparator'un siyasi otoritesini Tokugawa nüfuzundan arındırarak yeniden tesis etmeyi amaçlıyorlar."
 ep2_meiji.41.d_1: "[ROOT.GetCountry.GetCapital.GetCityHubName] hükümetinin yabancıları sınır dışı etmeyi reddetmesine öfkelenen Sonnō Jōi yanlısı hanlıklardan oluşan bir koalisyon, ayaklanma başlattı. Amaçları, İmparator'un Batı Hayranı danışmanlarını görevden almak ve Japonya'daki yabancı etkisini tamamen defetmek."
 ep2_meiji.41.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting], kale surlarının üzerinde durmuş aşağıyı süzüyordu. Hemen önünde, sıra sıra [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] askerleri nizam içinde kapılardan dışarı çıkmaktaydı. Bazıları modernize edilmişti; lacivert renkli yeni üniformalar ve konik miğferler kuşanmışlardı. Diğerleri ise kırmızılı, yeşilli ve mavili geleneksel giysileri içinde eski heybetini muhafaza ediyordu. Yeni üniformalı askerler kafilenin en önüne yerleştirilmişti. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] ile aralarında birkaç metre mesafe bırakan ecnebi müşahit heyeti, bu manzarayı takdir dolu bakışlarla izlemekteydi. Onların arkasından yivli tüfekleriyle süvari samuraylar, en geriden ise topçu bataryaları geliyordu.\n\nMüttefik hanlıkların, Şogun'un ordusuna karşı yürümek üzere kuvvetleriyle bir araya gelecekleri toplanma alanı, [SCOPE.sState('revolter_state').GetCityHubName] şehrinin eteklerinde yer alıyordu. Uzaklarda, kılıç ve süngüden örülmüş duvarın ötesinde, esir tutulan İmparator beklemekteydi."
 ep2_meiji.41.f_1: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting], kale surlarının üzerinde durmuş aşağıyı süzüyordu. Hemen önünde, sıra sıra [SCOPE.sState('revolter_state').GetCustom('japan_domain_by_state')] askerleri nizam içinde kapılardan dışarı çıkmaktaydı. Bazıları modernize edilmişti; lacivert renkli yeni üniformalar ve konik miğferler kuşanmışlardı. Diğerleri ise kırmızılı, yeşilli ve mavili geleneksel giysilerini muhafaza ediyordu. Yeni üniformalı askerler birinci kolda yürüyordu ve arkalarından rengârenk sansaibaori'lerden oluşan bir sıra uzanmıştı. Onların arkasından yivli tüfekleriyle süvari samuraylar, en geriden ise topçu bataryaları geliyordu.\n\nMüttefik hanlıkların, sadıkların ordusuna karşı yürümek üzere kuvvetleriyle bir araya gelecekleri toplanma alanı; [SCOPE.sState('revolter_state').GetCityHubName] şehrinin eteklerinde yer alıyordu. Uzaklarda, kılıç ve süngüden örülmüş duvarın ötesinde, esir tutulan İmparator beklemekteydi."
 ep2_meiji.41.a: "Bu fanatikler bertaraf edilmelidir."
 ep2_meiji.41.b: "Sonnō jōi!"
 kinmon_civil_war_tt: "[ROOT.GetCountry.GetName], #b Şogunluk#! ve #b İmparatorluk Sarayı#! arasında yaşanacak bir #r $concept_civil_war$a#! doğru sürükleniyor."
 ep2_meiji.5.t: "Taisei Hōkan"
 ep2_meiji.5.d: "[GetLawType('law_bakufu').GetName] muhaliflerinin artan baskıları karşısında [SCOPE.sCharacter('shogun_scope').GetFullName], idari yetkilerini İmparatorluk Sarayı'na devretmek üzere İmparator'a resmî bir talepte bulundu."
 ep2_meiji.5.f: "\"İktidar, İmparatorluk Sarayı bünyesinde yeniden cem edilmedikçe, devletimizin temellerinin payidar kalması mümkün değildir. Binaenaleyh, gelinen bu kritik eşikte kadim usulleri ıslah etmeli ve idareyi yeniden İmparatorluk Sarayı'na iade etmeliyiz.\n\nMemleketin meşveret yollarını sonuna dek kullanıp Majesteleri'nin nihai hükmüne müracaat ettikten sonra, şuna canı gönülden inanıyorum ki; yüreklerimiz vatana hizmet uğrunda yekvücut olursa, imparatorluğumuzu hep birlikte koruyabilir ve dünya milletleriyle omuz omuza, eşit saflarda durabiliriz.\"\n\n—Tokugawa Yoshinobu, 1867"
 ep2_meiji.5.a: "Bastığı yer artık toprak değil, uçsuz bucaksız bir boşluktan ibaretti."
 ep2_meiji.51.t: "İmparatorluk Tasdiki"
 ep2_meiji.51.d: "İmparator, [SCOPE.sCharacter('shogun_scope').GetFullName] şahsının idari yetkiyi İmparatorluk Sarayı'na iade etme talebine resmî yanıtını yayımladı. Şogun'un dilekçesi kabul edilmiş ve İmparator'un siyasi üstünlüğü yeniden tesis edilmiştir."
 ep2_meiji.51.f: "\"Japonya İmparatoru, tüm yabancı ülkelerin hükümdarlarına ve onların tebaalarına, kendi talebi doğrultusunda Şogun [SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting] adlı şahsa yönetim yetkisini iade etme izni verildiğini duyurur. Bundan böyle ülkenin tüm iç ve dış işlerinde en yüksek yetkiyi biz kullanacağız. Bunun sonucunda, antlaşmaların yapıldığı Taikun unvanı yerine İmparator unvanı kullanılmalıdır. Dış işlerinin yürütülmesi için tarafımızca görevliler atanmaktadır. Antlaşmaya taraf devletlerin temsilcilerinin bu bildiriyi tanımaları arzu edilmektedir.\""
 ep2_meiji.51.a: "Ürpertici bir heyecan."
 ep2_meiji.52.t: "İmparatorluk Tasdiki"
 ep2_meiji.52.d: "İmparator, [SCOPE.sCharacter('shogun_scope').GetFullName] şahsının idari yetkiyi İmparatorluk Sarayı'na iade etme talebine resmî yanıtını yayımladı. Söz konusu yanıtta Şogun'un Saray nezdindeki itimadını muhafaza ettiği ve idari yetkinin Şogunluk makamında kalabileceği belirtiliyor."
 ep2_meiji.52.f: "[ROOT.GetCountry.GetCustom('japan_choshu_castle_name')] Kalesi çizme sesleriyle yankılanıyordu. Ulaklar ve hizmetkârlar, geçen haftanın havadislerini her defasında daha da ince ayrıntılarıyla aktarmak için gün boyu mekik dokumuştu. [SCOPE.sCharacter('choshu_daimyo_scope').GetFullNameNoFormatting] onları bizzat huzuruna kabul etmiş, ancak görüşmeler boyunca ağzını bıçak açmamıştı. Şogun'un zafer alayı ve İmparatorluk Sarayı'nı koruma görevinin Aizu Hanlığı'na bırakılması gibi gelişmeleri duydukça kaşları iyiden iyiye çatılmaya başlamıştı.\n\nSarayın dışında gün batmış, karanlık iyice çökmüştü. [SCOPE.sCharacter('choshu_daimyo_scope').GetFirstNameNoFormatting], bulunduğu yerden toplanan yirmi sadık hizmetkârına bakarak, \"Chōshū Hanlığı boyun eğmeyecek,\" dedi. \"Bunu kafanıza sokun.\"\n\nArdından ayağa kalktı ve odadan çıktı."
 ep2_meiji.52.a: "Dallar onu sarmalıyor."
 ep2_meiji.6.t: "Restorasyon Fermanı"
 ep2_meiji.6.d: "Saray içerisindeki [SCOPE.sCharacter('shogun_scope').GetLastName] klanı muhalifleri, İmparator'u kendi iktidarını resmen yeniden tesis etmesi için bir ferman çıkarmaya ikna etti. Bu ferman ile Şogunluk makamı lağvedilerek [SCOPE.sCharacter('shogun_scope').GetFullName] şahsını tüm resmî görevlerden men eden yeni bir hükümet kurulacak."
 ep2_meiji.6.f: "\"[SCOPE.sCharacter('shogun_scope').GetFullNameNoFormatting], uzun süredir tarafına tevdi edilmiş olan idari yetkilerin iadesini talep etmiş ve Şogunluk makamından istifa etme arzusunu dile getirmiştir. Talebi kabul görmüştür. Ülke, malum olduğu üzere merhum İmparator'un da bizzat ve ciddiyetle meşgul olduğu emsalsiz tehlikelerle karşı karşıyadır. Bu doğrultuda Majestelerinin hikmetli takdirleriyle, imparatorluk idaresinin yeniden tesisi ve millî haysiyetin ihyası için gerekli temellerin atılmasına karar verilmiştir.\n\nBundan böyle Sessho, Kanpaku ve Şogunluk makamları lağvedilecek; yerlerine Başdanışmanlık, Devlet Danışmanlığı ve Saray Danışmanlığı olmak üzere üç yeni makam ihdas edilecektir. Mülkî ve askerî erkân ile asilzadeler ve avam tabakası arasında hiçbir imtiyaz gözetilmeksizin, her mesele halkın makul istişaresi neticesinde karara bağlanacaktır.\"" #- Modifier text of the Great Proclamation of the Restoration of Imperial Rule
 ep2_meiji.6.a: "Karanlıkta bir başına."
 ep2_meiji.7.t: "Taykunluk"
 ep2_meiji.7.d: "İmparatorluk Sarayı'nın devleti idare etme hususundaki tecrübe noksanlığı sebebiyle Saray içerisindeki [SCOPE.sCharacter('shogun_scope').GetLastName] klanı müttefikleri, [SCOPE.sCharacter('shogun_scope').GetFullName] kişisine Taykun unvanı bahşedilmesi ve kendisinin Saray İdaresi başkanlığına getirilmesi hususunda İmparator'u ikna etti."
 ep2_meiji.7.f: "\"Çeşitli Daimyō'lar yavaş yavaş bir araya gelip toplandıkça müzakereler gerçekleştirilecek. Günümüzün ruhu, kamuoyundaki müzakerelere (bu ifade sıkça tartışılıyor) odaklanmış durumda ve kamuoyunun görüşüne uymak kaçınılmaz hale geldi. Bu nedenle, bu müzakerelerde mümkün olduğunca uzlaşmaya varılmasını ve meclisin amacının doğru bir şekilde belirlenebilmesi için gerekli önlemlerin alınmasını içtenlikle rica ederim.\n\nMüzakereler sırasında anlaşmazlık doğar ve çatışma çıkarsa bu durum hanenizin zaferiyle sonuçlansa bile, dışarıdan yabancı devletler üzerimize baskı yaparken kardeşlerin surların içinde çekişmesine eşdeğer olur.\"\n\n- Nishi Shūsuke, \"Tasarı Gündemi\""
 ep2_meiji.7.a: "Yeniden güvenli zeminde."
 ep2_meiji.8.t: "Saray ve Şogunluk"
 ep2_meiji.8.d: "[SCOPE.sCharacter('shogun_scope').GetFullName], İmparatorluk Ailesi'ne evlilik yoluyla katılıp İmparator'a ettiği yeminleri yerine getirerek Saray ile Şogunluk arasındaki gerginliği yatıştırdı. İmparator, Şogun'un kalıcı barışı tesis edeceğinden emin bir şekilde inziva hayatına devam edebilir."
 ep2_meiji.8.f: "Fırtınalı rüzgârlar\nÜlkeyi kasıp kavursa bile\nOnların, gökyüzündeki güneşi\nO ilk, saf parlaklığına\nGeri getirmesini bekleyeceğim.\n\n- İmparator Kōmei"
 ep2_meiji.8.a: "Fırtına dindi."
 ep2_meiji.9.t: "Eşitler Arasında Birinci"
 ep2_meiji.9.d: "[SCOPE.sCharacter('taikun_scope').GetFullName], özgüven ve mahir manevralar ile İmparator'a itibarını geri kazandırdı ve klanını muhafaza etmeyi başardı. [SCOPE.sCharacter('taikun_scope').GetLastName] Taykunları, modern $JAP$ sınırlarındaki asiller zümresi arasında akranlarının birincisi olarak hükümranlıklarını sürdürecek."
 ep2_meiji.9.f: "İmparator artık bir paravanın arkasında oturmuyordu. Bakanları masanın iki yanına dizilmişti, Taykun ise solunda oturuyordu. Her biri yeni bir saray üniforması giymişti; kollarında ve göğüslerinde altın varaktan detaylı desenler vardı. Alışkın olmadıkları koltuklarına yerleşirken madalyalar şıkırdadı ve hışırdadı.\n\nSon bir saattir tartışmayı Taykun yönetiyordu; İmparator ise tek kelime dahi etmemişti. Konuşmacıların her birine sırayla dikkatini vererek sadece dinlemekle yetinmişti. Odanın diğer ucundaki eski #italic sonnō jōi#! müritlerinden biri, Amerika'ya bir heyet gönderilmesinin gerekliliğinden söz ediyordu."
 ep2_meiji.9.a: "Şogun devri kapanıyor, Taykun devri başlıyor."
 ep2_meiji.9.b: "İmparator, Göklerin Oğlu'dur; Tokugawa ise onun yeryüzündeki sureti."
