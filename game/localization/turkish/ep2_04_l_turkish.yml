 je_meiji_imperial_marriage: "İmparatorluk İzdivacı"
 je_meiji_imperial_marriage_reason: "İmparatorluk Sarayı ile Şogunluk idaresini birleştirme arayışında olan Şogun [SCOPE.sCharacter('imperial_marriage_ruler').GetFullName], İmparatorluk Prensesi [SCOPE.sCharacter('imperial_princess_scope').GetFirstName] ile siyasi bir evlilik sağladı. İmparator'un bu evlilik için verdiği rıza, [GetGeographicRegion('geographic_region_home_islands').GetName] bölgesinden yabancıların çıkarılması ve yalnızcı bir politikaya dönülmesi şartına dayanıyor.\n\nŞogun verdiği sözleri yerine getirirse bu evlilik Japonya sınırlarında bulunan hukuki ve fiilî yöneticiler arasındaki ayrılığın giderilmesine büyük katkı sağlayacaktır."
