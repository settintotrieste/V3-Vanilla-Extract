 iwakura_mission.1.t: "Batı Heyeti"
 iwakura_mission.1.d: "Hükümet, Fevkalade ve Tam Yetkili Büyükelçi unvanına uygun birkaç nazır ve devlet adamından oluşan bir liste hazırladı. Seçilen aday, on ay sürmesi beklenen Batı seferine liderlik etmek üzere gönderilecek."
 iwakura_mission.1.f: "[SCOPE.sCharacter('expedition_leader_1').GetFirstNameNoFormatting] aynanın karşısına geçmiş, kravatını tekrar tekrar kontrol ediyordu. Bu aksesuar Japonya'ya geleli epey olmuştu. Önce bir akım olarak başlamış, ardından devlet kararnamesiyle resmileşmişti ancak yine de üzerinde bir türlü doğal durmuyordu. Bir şekilde idare etmek durumundaydı. Anlaşması kabul görüp hükümet planını desteklerse ve gözlerini Londra, Boston veya Paris'te açarsa artık mesai bitimlerinde soluklanma imkânı dahi olamayacaktı."
 iwakura_mission.1.a: "Mesele, bizzat [SCOPE.sCharacter('expedition_leader_1').GetFullName] kişisinin dikkatini gerektiriyor."
 iwakura_mission.1.b: "Bu role [SCOPE.sCharacter('expedition_leader_2').GetFullName] kişisini ata."
 iwakura_mission.1.c: "[SCOPE.sCharacter('expedition_leader_3').GetFullName] kişisine itimat edebiliriz."
 iwakura_mission.1.e: "[SCOPE.sCharacter('expedition_leader_4').GetFullName], fırsattan istifade edebilir."
 iwakura_mission.2.t: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] Raporu"
 iwakura_mission.2.d: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] Heyeti'nin $JAP$ topraklarına dönüşüyle birlikte [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] ve beraberindeki elçiler raporlarını [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')] makamına sundular. Bu raporlar, sanayi toplumu hakkındaki gözlemleri ve yeni devlet politikaları için hazırlanan tavsiyeleri içermektedir."
 iwakura_mission.2.f: "\"Derinlemesine bir tefekkür neticesinde görülmektedir ki Avrupa ve Amerika milletlerinin muvaffakiyeti, temel esasların layıkıyla tatbik edilmesinden kaynaklanmaktadır. Dünyayı arşınlayanlar; tetkik edilen on küsur milletin her birinde idari yapıların farklılık gösterebileceğini, lakin hepsinin tüm gücünü eğitim yolunda birleştirerek ortak bir noktada buluştuğunu gözlemler. Nitekim bu memleketlerin her birinde okulsuz tek bir köşe, aydınlanma ruhundan mahrum tek bir fert dahi bulunmamaktadır.\"\n\n—Tanaka Fujimaro"
 iwakura_mission.2.a: "Batı, modern dünyaya açılan penceremiz olmuştur."
 iwakura_mission.2.b: "[SCOPE.sCountry('iwakura_good_economy_country').GetAdjective] usulü sanayi dalları, Japonya'nın istikbali olacaktır."
 iwakura_mission.2.c: "[SCOPE.sCountry('iwakura_desired_law_country').GetAdjective] usulü siyasetten alınacak pek çok ders mevcut."
 iwakura_mission.2.e: "[SCOPE.sCountry('iwakura_land_reform_law_country').GetAdjective] usulü bir toprak reformu, kırsal bölgelere yeniden canlandıracaktır."
 iwakura_mission.4.t: "Golden Gate"
 iwakura_mission.4.d: "Deniz aşırı uzun bir seferin ardından [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] Heyeti, [SCOPE.sCountry('iwakura_mission_host').GetName] topraklarına ulaştı. Heyet, demiryolu hattını kullanarak [SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName] istikametine seyahat ederek yol güzergâhındaki [SCOPE.sCountry('iwakura_mission_host').GetAdjectiveNoFormatting] kurumlarını ve sanayi tesislerini tetkik etmeyi planlıyor."
 iwakura_mission.4.f: "\"Şafak vakti deniz üzerindeki sis tabakası o denli yoğundu ki birkaç adım ötesini dahi güçlükle seçebiliyorduk; gemi durdu, günün ağarmasını beklemeye koyuldu. Hava aydınlanınca sis yavaş yavaş dağıldı ve önümüzde Kaliforniya kıyıları belirdi. Nihayet, her iki yanda dağların yükseldiği ve yamaçlarının denizle kucaklaştığı iki kayalık burun arasına ulaştık. Bir o yana bir bu yana süzülen vapurların dumanları seçilebiliyordu. Bu muazzam manzara, Golden Gate'in ta kendisiydi. Yirmi iki gün boyunca okyanusu arşınlamıştık ve nihayet burada, bu Doğu topraklarında, ilk kez dağları ve suları temaşa ediyorduk. İçimizi tarifsiz bir sevinç kaplamıştı.\"\n\n—Kume Kunitake, #italic Iwakura Elçiliği, 1871-73#!"
 iwakura_mission.4.a: "Koca bir kıtanın ilmi önümüzde serili."
 iwakura_mission.4.b: "Amerika, Avrupa'ya ulaşmak için kullandığımız bir basamak sadece."
 iwakura_mission.5.t: "Bilinmezliğin Derinliklerinde"
 iwakura_mission.5.d: "Pasifik'ten Atlantik'e kadar olan mesafeyi kateden [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] Heyeti, [SCOPE.sCountry('iwakura_mission_host').GetName] topraklarına ulaştı. Heyet, [SCOPE.sCountry('iwakura_mission_host').GetRuler.GetPrimaryRoleTitle] Hükümeti ile diplomatik münasebetler tesis etmeyi ve Sanayi Devrimi'nin doğduğu merkezleri ziyaret etmeyi amaçlıyor."
 iwakura_mission.5.f: "\"Amerika refah buldukça Liverpool Limanı da her geçen gün daha bayındır bir hale gelmiş. Limanın girişine, kuzey kıyısı boyunca altı mil uzanan bir rıhtım silsilesi inşa edilmiş. Deniz tarafında kale surlarını andıran taş tahkimatlar yükselirken bunların iç kısımlarında her yöne doğru rıhtımlar kazılmış. Giriş çıkış yapan tüm gemiler bu rıhtımlara yanaşarak demirlemektedir. Gemilerin direkleri gür bir ormanı, donanımları ise bir balıkçı köyünde kurumaya bırakılmış ağları andırıyor. Bize söylendiğine göre bunlar dünyanın en büyük rıhtımlarıymış.\"\n\n—Kume Kunitake, #italic Iwakura Elçiliği, 1871-73#!"
 iwakura_mission.5.a: "Önümüze çıkan her ipucunu değerlendirelim."
 iwakura_mission.5.b: "[SCOPE.sCountry('iwakura_mission_host').GetCapital.GetCityHubName] şehrinin tamamını gezmek için iki ay yeterli bir zaman dilimi."
 iwakura_mission.6.t: "Kıtayı Katetmek"
 iwakura_mission.6.d: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] Heyeti, [SCOPE.sCountry('iwakura_mission_host').GetName] topraklarından başlayarak Kıta Avrupası'na ulaştı. Heyet, önümüzdeki aylar boyunca kıtanın muhtelif devletlerini tetkik etmeyi, değerlendirmeyi ve onlarla diplomatik münasebetler tesis etmeyi amaçlıyor."
 iwakura_mission.6.f: "\"Bu öğleden sonra, ismini sormayı ihmal ettiğimiz bir mezarlığı ziyaret ettik. Paris'in doğu banliyölerinde yer alan bu yer, kırk dönümlük bir alana yayılmaktadır. Tek bir geniş araba yolu haricinde neredeyse hiç boş yer bırakılmamış.\n\nBugün, mütevazı imkanlara sahip bir aileye ait olduğu anlaşılan bir cenaze merasimi vardı. Küçük bir alay eşliğinde taşınan ahşap bir tabut mezara indirildi. Rahip duasını bitirdiğinde, orada bulunanlar gözyaşları içinde birer avuç toprak attılar. Alaydaki herkesin gözleri yaşlarla dolu olmasına rağmen tek bir kişi dahi yüksek sesle feryat etmedi.\"\n\n—Kume Kunitake, #italic Iwakura Elçiliği, 1871-73#!"
 iwakura_mission.6.a: "Kıyas ve muhakeme yapmak için acele etmeyeceğiz."
 iwakura_mission.6.b: "Mevcut takvim, süratli bir inceleme gezisi gerektiriyor."
 iwakura_mission.8.t: "Madalyonun Öteki Yüzü"
 iwakura_mission.8.d: "[ROOT.GetCountry.GetName] istikametindeki seyahatine devam eden [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] Heyeti, [SCOPE.sCountry('iwakura_mission_host').GetAdjective] [SCOPE.sState('iwakura_mission_location').GetName] kolonisinde bir mola verdi. Heyet, burada geçirdiği birkaç gün boyunca Avrupa koloni toplumunu ve yerel [GetReligion('theravada').GetNameNoIcon] geleneklerini gözlemleme fırsatı buldu."
 iwakura_mission.8.f: "\"Buradaki ziyaretimiz esnasında, bize #italic danna#! diye hitap eden bir keşiş rehberlik etti ve tapınağı #italic garan#! olarak adlandırdı. Bu kelimelerin Sanskritçe kökenlerinin günümüzde dahi korunuyor olması bizi derinden etkiledi. Seylan, Buda'nın öğretilerinin yaşatıldığı kutsal bir topraktır ve yerli halk halen Budizm'e gönülden bağlıdır. Halkın yaşayışı zaten oldukça yalınken keşişlerin hayatı bu sadeliğin de ötesindedir. Sofraları son derece yoksul, inzivagâhları yabani otlarla bürülüdür; kısacası her şey uç noktada bir yalınlığa ulaşmıştır.\n\nHristiyanlık veya İslam'ın mukaddes mekânlarıyla kıyaslandığında buradaki tezat oldukça çarpıcıdır. Bu sadeliğin sebebi, dinin maddi dünyanın şatafatından arınmış olması mı? Muhtemeldir. Ancak bu sadelik, dinin yayılma gücünü kaybetmiş olmasının bir tezahürü de olabilir.\"\n\n—Kume Kunitake, #italic Iwakura Elçiliği, 1871-73#!"
 iwakura_mission.8.a: "Böylesi bir kader mi bekliyordu bizi?"
 iwakura_mission.9.t: "Yokohama Limanı"
 iwakura_mission.9.d: "Gurbette geçen ayların ve gerçekleştirdikleri devri-i alemin ardından [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] Heyeti, [ROOT.GetCountry.GetName] topraklarına geri döndü. Yanlarında malumat derlemeleri, yabancı mallar ile Batı teknolojileri ve siyasi kurumlarına dair bizzat tuttukları raporları da getirdiler."
 iwakura_mission.9.f: "Vapurun güvertesinde duran [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFirstNameNoFormatting], yüzünü batıya dönmüş ufku süzüyordu. Uzaklarda, sabah sisi henüz kalkmamış olmasına rağmen Fuji Dağı'nın o muazzam ihtişamı kendini belli ediyordu. Aralarında tüccarların ve belki de bizzat kendisi gibi çiçeği burnunda dünya gezginlerinin bulunduğu bir grup Batılı, küpeştenin etrafına toplanmıştı. Kamara kapısının yanındaki bankta oturan Alman bir adam, elindeki eskiz defterine manzarayı resmediyordu. Acaba bu onların ilk gelişi miydi ya da onlar da tıpkı kendisi gibi bu manzarayı her gördüğünde büyüleniyor muydu diye merak etti.\n\nOnun başardıklarını gerçekten başarmış kaç kişi vardı? Kaç kişi üç okyanus aşmış, dört kıta görmüştü? \"Daha fazlası, çok daha fazlası gelecek,\" diye geçirdi içinden. Demiryolu ve buharlı gemi, gelecekte onun gibi daha pek çok gezgini ortaya çıkaracaksa da onun adı tarihe ilklerden biri olarak yazılacaktı."
 iwakura_mission.9.a: "Evimiz, tüm manzaraların en güzelidir."
 je_iwakura_mission: "Restorasyon: [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] Heyeti"
 je_iwakura_mission_reason: "Yeni [ROOT.GetCountry.GetName] hükümeti, modernleşme hamlelerinin bir parçası olarak [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName] ile bakanlar ve âlimlerden oluşan kalabalık bir heyeti Batı dünyasına diplomatik bir göreve gönderdi. [ROOT.Var('expedition_leader_storage_var').GetCharacter.GetLastName] Heyeti, Batı ile imzalanan hakkaniyetsiz anlaşmaları yeniden müzakere etmeyi ve Üstün Güçlerin siyasi ve teknolojik temelleri üzerine incelemeler yapmayı amaçlıyor.\n\nHeyet, bir ülkede kaldığı her #b ay#! için o ülkenin Kanunları veya Teknolojileri hakkında bulgular toplama şansına sahip olacak. Bu bulgular, Heyet'in dönüşünde sunacağı raporu ve sefer liderinin [Concept('concept_ideology', 'İdeolojisini')] etkileyecek."
 iwakura_mission_leader_change_ideology_tt: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName], ziyaret ettiği [Concept('concept_country', 'Ülkelerin')] [Concept('concept_law', 'Kanunları')] ile örtüşecek şekilde kendi [Concept('concept_ideology', 'İdeolojisini')] değiştirecek."
 iwakura_mission_leader_traits_tt: "[ROOT.Var('expedition_leader_storage_var').GetCharacter.GetFullName]; [GetCharacterTrait('masterful_diplomat').GetName] ve [GetCharacterTrait('explorer').GetName] [Concept('concept_character_trait', 'Özelliklerini')] kazanır."
