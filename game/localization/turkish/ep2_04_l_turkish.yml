 ep2_meiji_pulse.1.t: "Grev Hakkı"
 ep2_meiji_pulse.1.d: "[SCOPE.sState('relevant_treaty_port_state').GetName] vilayetinde seyahat eden bir [SCOPE.sCountry('relevant_gp').GetAdjective] tüccar, bölgeden geçtiği sırada atından inmeyi reddettiği gerekçesiyle [SCOPE.sCharacter('daimyo_scope').GetFullName] isimli lordun hizmetkârı tarafından öldürüldü. [SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] Hanlığı Daimyō'su, kendisine saygısızlık eden sıradan bir vatandaşı cezalandırma hakkı bulunduğunu ve bu cinayetin kanunlara uygun biçimde gerçekleştiğini savundu."
 ep2_meiji_pulse.1.f: "Yabancılar, silahşor birliğinin düzenini bozdu ve her yandan bağrışmalar yükseldi. Etrafını saran silahlı adamları fark eden öndeki yabancı, dizginlere yana doğru sertçe asıldı. Atı ani bir dönüş yaptı ve bu manevra neredeyse silahşorlardan birini tından düşürecekti. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] kılıcını çekti ve iç halkadaki yoldaşları da ona katıldı.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] ilk darbeyi indirdi ve davetsiz misafirin yan tarafında derin bir yara açtı. Çığlık attı ve dizginleri bir kez daha sertçe çekti. Boşunaydı. Ona en yakın silahşor kendi kılıcını çekti ve saldırdı. Havada bir bulut gibi asılı kalan kızıl bir yay belirdi."
 ep2_meiji_pulse.1.a: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] Hanlığı başımızı belaya sokmak istiyor."
 ep2_meiji_pulse.11.t: "[SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting] Vakası"
 ep2_meiji_pulse.11.d: "[SCOPE.sCountry('japan_scope').GetName] topraklarında ticaretle uğraşan [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] isimli bir [ROOT.GetCountry.GetAdjectiveNoFlag] tüccar, [SCOPE.sCharacter('daimyo_scope').GetFullName] adlı yerel lord tarafından katledildi. Söz konusu lord, idaresindeki toprakların kanunları uyarınca kendisini haklı görmüş ve işlediği suç karşılığında herhangi bir tazminat ödemeyi reddetmiştir."
 ep2_meiji_pulse.11.f: "#b Başyazı#!\n\nMevcut koşullar altında [ROOT.GetCountry.GetNameNoFormatting] ülkesinin büyük bir savaşa hazırlanmaktan ya da Japonya'ya veda etmekten başka bir seçeneği olmadığını yineliyoruz. Orada elde ettiği dayanak noktasını terk etmek söz konusu bile olamaz. Dolayısıyla iki imparatorluk arasında bir çatışma yaşanması muhtemel. Birçok [SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')] bu fikri sevmese de [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')], Japonların [SCOPE.sCharacter('richardson_scope').GetLastNameNoFormatting] suikastçılarını cezalandırmayı reddetmesi nedeniyle bunu sadece kaçınılmaz değil, aynı zamanda haklı da buluyor... (#italic devamı sf.02#!)" #largely copied from The Anglo-Japanese War, New York Times, 1863
 ep2_meiji_pulse.11.a: "#italic Birileri#! bunun bedelini ödemeli. Konuyu Taykun makamına taşıyın."
 ep2_meiji_pulse.11.b: "Doğu ile daha fazla alakadar olmayı gerçekten istiyor muyuz?"
