 shogunate_strategy_title_decide_loc: "Reform Stratejisini Belirle"
 shogunate_strategy_title_revise_loc: "Reform Stratejisini Gözden Geçir"
 shogunate_strategy_title_decide_desc_loc: "Tokugawa iktidarının hayatta kalabilmesi için Şogunluğun reform yapması şarttır. Böylesi bir reform iki farklı istikamette seyredebilir: Şogun, İmparatorluk Sarayı ile birleşerek Bakufu'nun meşruiyetini tazelemeye çalışabilir ya da İmparatorluk makamının kontrollü restorasyonunu sağlayarak kurulacak bir parlamenter hükümetin başına bizzat geçmeyi hedefleyebilir."
 shogunate_strategy_title_revise_desc_loc: "Şogun'un mevcut reform stratejisinin pek de fayda sağlamadığı ortaya çıktı. Yaklaşımın değiştirilmesi belli bedelleri de beraberinde getirecek. Yine de başarısızlığa mahkûm bir rotada inat etmemek en doğrusu olur."
 je_meiji_restoration_proclaim_imperial_restoration: "İmparatorluk Restorasyonu İçin Başvuruda Bulun"
 je_meiji_restoration_proclaim_imperial_restoration_desc: "[ROOT.GetCountry.GetCustom('get_imperial_restoration_button_loc')]"
 imperial_restoration_unavailable_loc: "İmparator, Japonya’nın hâlâ egemen hükümdarıdır. İmparatorluk onayı olmaksızın Şogun, yüzlerce Daimyo arasındaki en kudretli kişi olmaktan öteye gidemez. Şogunluk makamının ayakta kalması veya devrilmesi, İmparatorluk Sarayı'nın iradesine bağlı olacaktır."
 imperial_restoration_kobu_gattai_loc: "Krizin sona ermesi için Şogunluk ve Saray arasında birleşme sağlanmalıdır. Daimyo, Şogun tarafından verilen emirlerin İmparator buyruğu taşıdığına ve Şogun makamının Saray'ın tam güvenine sahip olduğuna ikna edilmelidir. Bu gayeye ulaşmak için Şogun, kendini savunmasız bırakmayı göze almalı ve otoritesini yeniden tesis edebilmek adına bizzat İmparator'un iradesine sığınmalıdır.\n\nBöylesi bir hamle ateşten gömlek giymeye benzer; şayet İmparatorluk Sarayı el vermezse, Tokugawa hanedanı kendisini intikam ateşiyle yanan hasımlarının ortasında yapayalnız bulacaktır."
 imperial_restoration_kogi_yoron_loc: "Krizin sona ermesi için İmparator yönetimi devralmalıdır. Eğer Tokugawa gücü restorasyondan sağ çıkacaksa, Şogun bu süreci kendi şartlarıyla yürütmelidir. Şogun'un reformlarının nihai aşaması, idari yetkileri İmparator'a iade etmek ve reformdan geçirilmiş İmparatorluk hükümeti bünyesinde kendi klanı adına yeni bir makam tesis etmek olmalıdır.\n\nBöylesi bir hamle ateşten gömlek giymeye benzer; şayet İmparatorluk Sarayı el vermezse, Tokugawa hanedanı kendisini intikam ateşiyle yanan hasımlarının ortasında yapayalnız bulacaktır."
 je_meiji_restoration_imperial_marriage: "İmparatorluk İzdivacı Düzenle"
 je_meiji_restoration_imperial_marriage_desc: "#b Kōbu Gattai#! tasarısı, tahtta bulunan $RULER_TITLE_SHOGUN$ ile bir İmparatorluk Prensesi arasında akdedilecek siyasi bir izdivaçla perçinlenecek olan birliği zorunlu kılmaktadır. Bu birliği hayata geçirmek adına $RULER_TITLE_SHOGUN$, İmparatorluk Sarayı tarafından öne sürülen ağır şartları yerine getirmeye hazır olmalıdır."
