 ep2_meiji_pulse.4.t: "[SCOPE.sCountry('relevant_gp').GetAdjective] Elçilik Binasının Yakılması"
 ep2_meiji_pulse.4.d: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] Hanlığı bünyesindeki #italic Sonnō Jōi#! samurayları, [SCOPE.sState('edo_state').GetCityHubName] şehrinde inşası süren [SCOPE.sCountry('relevant_gp').GetAdjective] elçilik binasına bir saldırı düzenledi. Şehrin ilk Batılı tarzda inşa edilen binası olmaya hazırlanan bu yapı tamamen yakılarak kül edildi ve failler sırra kadem bastı."
 ep2_meiji_pulse.4.f: "Kapüşonlu ve maskeli iki adam, eskiden elçiliğin bulunduğu yere bakan tepenin zirvesinde durdu. Artık kararmış duvarlarından hâlâ turuncu bir parıltı yükseliyordu. Kolay tutuşan yakıtın tamamı tükendiğinden alevler yoğun iç kirişlerde sönmemek için çabalıyordu.\n\nParıltı tamamen sönünce iki adam yerlerinden kıpırdamadı. Biri, geride kalan duman yığınına bakarak sessizce konuştu.\n\n\"Külleri kar gibi üzerimize yağsa ne güzel olurdu ama değil mi?\""
 ep2_meiji_pulse.4.a: "[SCOPE.sState('edo_state').GetCityHubName] şehri artık yönetilemez hale geldi."
 ep2_meiji_pulse.4.b: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] Hanlığı mensuplarının şehirde silah taşımasını yasakla."
 shimonoseki_indemnity_tt: "[ROOT.GetCountry.GetName], #v 10 yıl#! boyunca [SCOPE.sCountry('relevant_gp').GetName] tarafına @money!#v 3M#! savaş tazminatı ödeyecek."
 shimonoseki_indemnity_port_tt: "[GetStateRegion('STATE_KANSAI').GetName] bölgesindeki $HUB_NAME_STATE_KANSAI_port_japanese$ şehri, bir [SCOPE.sCountry('relevant_gp').GetAdjective] [Concept('concept_treaty_port','Serbest Limanı')] olarak dışa açılacak."
 modifier_ungovernable_capital: "Yönetilemezliğin Kabulü"
 ep2_meiji_pulse.5.t: "Kanlı İntikam"
 ep2_meiji_pulse.5.d: "Şogunluk Başdanışmanı [SCOPE.sCharacter('tairo_scope').GetFullName], [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] ve [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] Hanlıklarına mensup rōninler tarafından Edo Kalesi girişinde katledildi. Suikastçılar, olay yerine bıraktıkları beyannamede Başdanışman'ın yabancı devletlere tanımış olduğu tavizleri kınayarak #italic Sonnō Jōi#! düsturlarını dile getirdiler."
 ep2_meiji_pulse.5.f: "Chuzaburo, Gorokuro'nun konvoyun önüne geçişini ve [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] muhafızlarından birinin onu durdurmak için ilerleyişini izledi. Gorokuro, ona tepki verecek zaman bile tanımadı; kılıcını çekti ve saldırdı. [SCOPE.sCharacter('tairo_scope').GetCustom('japan_domain_by_character')] adamın ikiye bölünmüş yüzünden kanlar fışkırdı ve arkadaşları intikam almak için ileri atıldılar.\n\nChuzaburo yağmurluğunu yere bıraktı ve tabancasını çekti. Tahtırevanın açıkta kalan tarafına nişan aldı ve tetiği çekti. Silah sesi, çarpışan kılıçların ve bağrışmaların sesini böldü; ardından bir ses daha geldi. Muhafızlardan biri ona doğru döndü ve [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] topraklarının rōnini Jizaemon, kılıcını gövdesine doğru savurdu. Chuzaburo, çatışan ikilinin yanından geçince tahtırevanın kapılarından karlı sokağa doğru süzülen kırmızı bir nehir gördü. Wakizashisini çekip oraya doğru koştu."
 ep2_meiji_pulse.5.a: "Samurayların kılıçları bir kez daha çarpışıyor."
 modifier_tairo_assassinated: "Tairo Suikasta Uğradı"
 ep2_meiji_pulse.6.t: "İkedaya Olayı"
 ep2_meiji_pulse.6.d: "[SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] saflarındaki bir militana yapılan işkence sonucu ulaşılan istihbarat doğrultusunda, [GetLawType('law_shinsengumi').GetName] teşkilatı, [SCOPE.sState('kyoto_state').GetName] sınırları içindeki İkedaya Hanı'nda bir araya gelen sözde komploculara bir baskın düzenledi. Bu baskın, hanın içinde ve çevresinde kıyasıya bir kılıç muharebesine sahne oldu."
 ep2_meiji_pulse.6.f: "Shinsengumi kapıyı kırarak içeri daldığında Otaka korkuluğa yaslandı. Soluk mavi #italic haorilerinin#! kollarındaki kan lekelerini görebiliyordu. Loş ışıkta beyaz zemin üzerinde siyah lekeler olarak görünüyorlardı. Kılıcını savunma pozisyonuna kaldırdı.\n\nİkisi diğerlerinden ayrılıp onun koruduğu merdiven boşluğuna doğru yan yana hücum etti. Kılıcıyla hamle yaptı, savuşturuldu ve karşılık verdi. Çarpışmanın etkisiyle kıvılcımlar saçıldı. İkinci adam saldırıyordu. Bir adım geri attı, bileğini çevirip...\n\nAlev alev yanan çeliğin parıltısı göründü ve ardından göğsünde soğuk bir şey hissetti."
 ep2_meiji_pulse.6.a: "Gösterdikleri inisiyatiften ötürü Shinsengumi birliğini ödüllendir."
 ep2_meiji_pulse.6.b: "Bu vahşet sadece misillemeye davetiye çıkarır."
 modifier_shinsengumi_meddling: "Zapt Edilemeyen Shinsengumi"
 modifier_shinsengumi_crackdown: "Shinsengumi Baskını"
 modifier_refrained_from_crackdowns: "Dizginlenmiş Shinsengumi"
 sufficient_pressure_from_sonno_joi_tt: "[SelectLocalization(SCOPE.sPoliticalMovement('meiji_movement_scope').IsValid, SCOPE.sPoliticalMovement('meiji_movement_scope').GetName, 'movement_meiji_restorationist_name')] bünyesindeki [concept_activism] düzeyi, @activism_red! $RADICALISM_PROTESTING$ değerinin #v ([GetDefine('NPolitics', 'RADICALISM_PROTESTING_THRESHOLD')|%0])#! üzerindedir."
 ep2_meiji_pulse.7.t: "Yasak Geçit"
 ep2_meiji_pulse.7.d: "[SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] yanlısı [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] Hanlığına bağlı askerler, [SCOPE.sState('kyoto_state').GetName] sınırları içindeki İmparatorluk Sarayı'nı zapt etmeye ve İmparator'u zor kullanarak başa geçirmeye teşebbüs etti. Onlara karşı, [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] ve Aizu Hanlıklarına mensup askerler direniş göstermektedir."
 ep2_meiji_pulse.7.f: "Hamaguri Kapısı tüfek dumanıyla dolmuştu. Etraflarında ise Kyōto alevler içindeydi.\n\nAizu askerleri duvar boyunca toplanmış, yoldan ve [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] toplarının şasisinden saçılan tüfek atışları yapıyorlardı. Birkaç saniyede bir mermiler bir insana isabet ediyor ve silah seslerinin gürültüsünü kısa süreliğine bastıran çığlıklar yükseliyordu. Kōzō, bir top tekerleğine yaslanmış şekilde tüfeğindeki tıkanıklığı açmaya çalışıyordu. Bir #italic ken#! uzaklıkta grubunun lideri yüzüstü yatıyordu; bacakları ve kolları yoktu. Bir şekilde hâlâ kıvranıyordu."
 ep2_meiji_pulse.7.a: "[SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')] ve Aizu, saldırganları geri püskürtmeyi başardı."
 ep2_meiji_pulse.7.b: "İmparatorluk Sarayı, [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] hakimiyeti altında"
 coup_resistance_below_daimyo_coup_strength_tt: "[ROOT.GetCountry.GetName] bünyesindeki [concept_coup_resistance] ([SCOPE.ScriptValue('country_coup_resistance')|v2]), [SCOPE.sCharacter('daimyo_1_scope').GetFullName] tarafından sergilenen [concept_coup_strength] ([SCOPE.sCharacter('daimyo_1_scope').MakeScope.Var('monthly_cached_commander_coup_strength').GetValue|v2]) değerinin altında kalmaktadır."
 ep2_meiji_pulse.8.t: "[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] Seferi"
 ep2_meiji_pulse.8.d: "[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] tarafından İmparatorluk Sarayı'na yönelik gerçekleştirilen saldırıya misilleme olarak Şogun, #italic Sonnō Jōi#! fraksiyonunu Hanlık'tan söküp atmak adına bir tedip seferi başlattı. [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] tarafına yakınlık duyan danışmanlar, suçluların seppuku yapması karşılığında barışı koruyacak bir çözüm yolu sundu."
 ep2_meiji_pulse.8.f: "[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] Daimyōsu [SCOPE.sCharacter('daimyo_1_scope').GetFullNameNoFormatting], kalenin balkonunda durmuş, uzaklara bakıyordu. Uzaklarda gökyüzü, yaklaşan ordunun kamp ateşlerine işaret edercesine duman bulutuyla kaplanmıştı.\n\nHizmetkâr, \"Şogun, üç kıdemli hizmetkârın seppuku yapmasını emrediyor,\" dedi. \"Dört subayın kafasının kesilmesini, beş bakanın ise sürgüne gönderilmesini istiyor.\"\n\n[SCOPE.sCharacter('daimyo_1_scope').GetFirstNameNoFormatting] kamp ateşlerine baktı. En azından yüzlerce vardı. Bir zamanlar mavi olan ufuk, iğrenç bir şeye dönüşmüştü. Sonunda konuştu.\n\n\"...[SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')] Hanlığı boyun eğecek.\""
 ep2_meiji_pulse.8.a: "Savaşmadan alt edilebileceklerse varsın öyle olsun."
 ep2_meiji_pulse.8.b: "Hanlık baştan aşağı temizlenmeli."
 modifier_daimyo_house_arrest: "Daimyo'nun Hapsedilmesi"
 modifier_daimyo_executed: "Daimyo'nun Mülksüzleştirilmesi"
 ep2_meiji_pulse.9.t: "Barbarları Def Etme Emri"
 ep2_meiji_pulse.9.d: "Batılı güçlerin [ROOT.GetCountry.GetName] üzerine dayattığı antlaşmalara hiddetlenen İmparator, Şogun'un otoritesini hiçe sayarak yabancıların [ROOT.GetCountry.GetAdjectiveNoFormatting] topraklarından defedilmesini emreden bir ferman yayımladı. [SCOPE.sPoliticalMovement('restorationist_movement_scope').GetName] militanları, İmparator'un davası uğruna safları sıklaştırdı."
 ep2_meiji_pulse.9.f: "Hizmetkâr, toplardan birinin yanında durmuş, boğaza doğru bakıyordu. Bu saatte, boğazdan geçen gemiler batan güneşin ışığında birer siluet olarak görünüyordu. Yan tarafta, Chōshū Hanlığı'nın alt rütbeli samurayları, top doldurma çubukları ve barut torbalarıyla ilgileniyordu.\n\nHinoyama'nın siluetine ve aşağıda uzanan Shimonoseki kasabasına bakarken Tebliğ'den bir pasaj akla geldi. \"Topraklar küle dönse bile limanların ticarete açılmasına izin vermeyeceğiz,\" diyordu.\n\nBu doğru muydu? O hoş, yeşil yamaçların yanıp kapkara küle dönmesine, çiçek tarlalarının tutuşmasına, evinin yerle bir edilmesine izin verir miydi? \"Evet,\" diye düşündü. Tereddüt bile etmezdi."
 ep2_meiji_pulse.9.a: "Şogun bu meseleyi görüşmek üzere Kyoto'ya gitmeli."
 ep2_meiji_pulse.9.b: "Bu emir düzmece! Derhal örtbas edilsin."
