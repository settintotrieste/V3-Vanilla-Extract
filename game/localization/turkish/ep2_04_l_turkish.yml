 ep2_meiji_pulse.2.t: "[SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] Bombardımanı"
 ep2_meiji_pulse.2.d: "[SCOPE.sCharacter('daimyo_scope').GetCustom('japan_domain_by_character')] Hanlığı'nın, [SCOPE.sCharacter('richardson_scope').GetFullNameNoFormatting] adlı şahsın ölümü için tazminat ödemeyi reddetmesine misilleme olarak [SCOPE.sCountry('relevant_gp').GetAdjective] donanma gemileri, [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] kıyı savunmaları ile günlerce süren bir topçu düellosuna tutuştu."
 ep2_meiji_pulse.2.f: "Körfez, top ateşiyle duman altındaydı; [SCOPE.sCharacter('daimyo_scope').GetHomeState.GetCustom('japan_domain_seat_name')] ise alevler içinde yanıyordu. Açıklardaki ecnebi gemilerden biri, kasabanın kuzeyindeki dökümhanelere roketler yağdırıyordu. Ateşlenen her roket, ortalığa korkunç bir kızıllık yayarak batmakta olan güneşin solgun ışığını bastırıyordu.\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting] bataryasındaki son faal top da ateşlendi; normal şartlarda bile tutturulması güç olan bu atış, artık tamamen imkânsız hale gelmişti. Toptan fırlayan gülle, ecnebi nizamındaki üçüncü geminin birkaç boy uzağında sularla buluştu ve göğe muazzam bir su sütunu savurdu. [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting], süngerini kavradı ve topu hazırlamak için ileri atıldı. Arka duvarın gerisinde bir yerlerde, son yaylım ateşiyle yaralanan adamlar hâlâ feryat ediyordu. Bir şekilde, kulaklarındaki çınlamaya rağmen onları hâlâ duyabiliyordu."
 ep2_meiji_pulse.2.a: "Pervasızlıklarının bedeli ağır olacak."
