 ep2_meiji.1.t: "Sonnō Jōi"
 ep2_meiji.1.d: "Sakoku döneminin sona ermesi, yabancı nüfuzunun yarattığı çaresizlik hissini körüklemiş ve [ROOT.GetCountry.GetRuler.GetLastName] klanının otoritesini sarsmıştır. Şogunluğun düşmanları, #italic Sonnō Jōi#! sloganı etrafında toplanmıştır: \"İmparatora saygı duy, barbarları def et\"."
 ep2_meiji.1.f: "Kyoto'daki bir hanın ikinci katında, pencerelerden fersah fersah uzak bir odada, siyahlar içindeki bir düzine rōnin masanın etrafında kümelenmişti. Dışarıda, sokaktaki tüm sesleri boğan hiddetli bir sağanak boşalıyordu. Aralarında öfkeli fısıltılar dolaşmaya başlamıştı. Önce şikayetler, ardından ağır ithamlar, en nihayetinde ise edilen sarsılmaz bir yemin ve davetsiz misafirin ölüm fermanı...\n\nUzaklarda, Iso'ya nazır bir evde, yeşil kimonolu bir adam göğe yükselen duman sütununu izliyordu. Tepelerin uzun gölgeleri sahil şeridindeki inşaatların üzerine düşmüştü. Güneş ufka yaklaştıkça, aşağıdaki dökümhanelerden yayılan parıltı giderek daha da belirgin hale geliyordu. Ufukta, suya akseden gemi ışıkları görülüyordu. \"Bir gün...\" diye geçirdi içinden adam, \"Toplarım o gemileri ufkun ötesine püskürtecek.\""
 ep2_meiji.1.a: "Yeni duruma uyum sağlamak zorundayız."
 ep2_meiji.2.t: "Şogunluğun Yapısı"
 ep2_meiji.2.d: "Şogunluk reformcuları iki yönetim teorisi arasında bölünmüş durumdadır. #italic Kōbu Gattai#! teorisi, İmparatorluk Sarayı ile birleşme yoluyla [GetLawType('law_bakufu').GetName] meşruiyetini tazelemeyi hedeflerken Kamusal Müzakere teorisi, [SCOPE.sCharacter('shogun_scope').GetLastName] klanı liderliğinde bir parlamenter sistem kurmayı amaçlar."
 ep2_meiji.2.f: "Ev sahibi, masaya bir tepsi higashi bıraktı ve misafirlerinin her birine birer kâse usucha ikram etti. Masanın etrafında üç adam oturuyordu. Ev sahibi ile birinci misafirin saçları chonmage usulü bağlanmıştı, ikincisi ise kısa saçlıydı. Önlerindeki kâselerden hafif buharlar yükseliyordu.\n\nEv sahibi bakışlarını kısa saçlı adama çevirerek konuştu:\n\n\"Dönüşünü kutlarım [SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]-#italic kun#!. Mektuplarının her biri bir öncekinden daha ilgi çekiciydi. Bize şu barbarların yanında geçirdiğin günlerinden biraz daha bahseder misin?\""
 ep2_meiji.2.a: "Bakufu yenilenmelidir."
 ep2_meiji.2.b: "Kamusal müzakere en aydınlık yoldur."
 traditionalist_shogun_warning_tt: "@warning! [GetIdeology('ideology_traditionalist').GetName] görüşüne sahip bir [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], #b Parlamenter Hükümet#! kurma konusunda isteksiz olacaktır."
 traditionalist_shogun_warning_present_tt: "[concept_ruler], [GetIdeology('ideology_traditionalist').GetName] [Concept('concept_ideology', 'İdeolojisine')] sahip #b değil#!"
 ep2_meiji.3.t: "İmparatorluk İzdivacı"
 ep2_meiji.3.d: "İmparator, [SCOPE.sCharacter('shogun_scope').GetFullName] ile Prenses [SCOPE.sCharacter('imperial_princess_scope').GetFullName] arasında bir izdivaç tertip edilmesine rıza gösterdi. Bu izdivaç, Şogun makamının [SCOPE.sTreaty('relevant_treaty_scope').GetName] Antlaşması’nı feshetmesi ve yalnızcı bir politikaya geri dönmesi şartına bağlıdır."
 ep2_meiji.3.d2: "İmparator, [SCOPE.sCharacter('shogun_scope').GetFullName] ile Prenses [SCOPE.sCharacter('imperial_princess_scope').GetFirstName] arasında bir izdivaç tertip edilmesine rıza gösterdi. Bu evlilik, Şogun makamının yabancıları sınır dışı etmesi ve yalnızcı bir politikaya geri dönmesi şartına bağlıdır."
 ep2_meiji.3.f: "Geçit alayı Nakasendō güzergâhını tamamen ihata etmişti. Owari Hanlığı neferlerinin kurduğu güvenlik kordonu altında, Iijima Kasabası'ndan Shiojiri İstasyonu'na dek uzanan otuz bin kişilik bu insan seli; ameleler, bendegân ve Prenses'in maiyetinden müteşekkildi. Prenses, alayın tam kalbinde, altın işlemeli ve kızıl ipekten bir tahtırevan üzerinde taşınıyordu. Tahtırevanın refakatinde ise bir düzine hanlıktan gelen [SCOPE.sCharacter('daimyo_1_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_2_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_3_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_4_scope').GetCustom('japan_domain_by_character')], [SCOPE.sCharacter('daimyo_5_scope').GetCustom('japan_domain_by_character')] ve [SCOPE.sCharacter('daimyo_6_scope').GetCustom('japan_domain_by_character')] samurayları at sürüyordu.\n\nTahtırevanının içindeki Prenses, perdelerin arasındaki ince aralıktan dışarıyı süzüyordu. Kasabalar birer birer geçip gidiyordu; kepenkler kapalı, her yer sessizdi. Akıbetini tefekkür etmek üzere önünde otuz #italic ri#!'lik yolu bulunuyordu."
 ep2_meiji.3.a: "Ülkenin iyiliği için."
