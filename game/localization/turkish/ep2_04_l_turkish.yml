 ep2_meiji_pulse.3.t: "Shimonoseki Savaşı"
 ep2_meiji_pulse.3.d: "Chōshū Hanlığı Daimyō'su [SCOPE.sCharacter('choshu_daimyo_scope').GetFullName], İmparator'un yabancıları sınır dışı etme fermanına itaat ettiğini bildirdi ve emrindeki donanmaya Shimonoseki Boğazı'ndan geçen tüm yabancı gemilere ateş açılması talimatını verdi. Bu hamle, bir [SCOPE.sCountry('relevant_gp').GetAdjective] savaş gemisiyle çatışmaya girilmesine neden oldu."
 ep2_meiji_pulse.3.f: "Hinoyama'nın alçak yamacının üzerinde gündüz şimşekleri çaktı ve Masatake, başını gökyüzüne çevirdi. Karşısında kabarık, beyaz bir bulut duruyordu.\n\n\"Baksana!\" diye bağırdı Jiro. Görüş alanına giren bir el aşağıyı işaret etti. Aşağıdaki boğazdan tam gaz seyreden bir gemi geçiyordu. Topları, Masatake'nin göremediği bir şeye ateş ediyordu. Gemi gövdesinden parçalar fırlasa da yoluna devam ediyordu. Tüm bunların üzerinde ise başka bir bulut büyüyordu."
 ep2_meiji_pulse.3.a: "Yabancılar, bizim muktedir olamadığımızı başarıyor."
 ep2_meiji_pulse.3.b: "Uzlaşmaya varması için hanlığa yardım et."
 ep2_meiji_pulse.3.c: "Anlaşma karşılığında Batılılara bir liman teklif et."
