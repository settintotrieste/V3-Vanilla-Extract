 shogunate.1.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] İçin Atama Kararı" # Ieyoshi
 shogunate.1.d: "[SCOPE.sCharacter('shogun_scope').GetLastName] klanının yeni lideri olan [SCOPE.sCharacter('shogun_scope').GetFullName], İmparator tarafından Şogun makamına layık görüldü. Henüz şahsi otoritesini kuramamış olan yeni Şogun, birçok [SCOPE.gsInterestGroup('daimyo_scope').GetName] mensubu tarafından küçümseniyor."
 shogunate.1.f: "Rengârenk cübbeler içindeki Daimyolar, Ō-hiroma boyunca süzülerek ilerliyordu. En üstteki sedirde siyah ve kırmızıya bürünmüş Şogun oturuyor, hemen sağındaki ahşap kutuda ise İmparatorluk fermanı duruyordu.\n\nKırmızılar, maviler ve morlar içindeki soylular birer birer önünde eğilerek kılıçlar ve altından hediyeler sundular. Ne Şogun tek bir kelime etti, ne de onun huzurunda yere kapananlar. Yüzünü görmesi yasak olan daha alt rütbeliler salonun dışına yığılmıştı. Derken bahçeden bir ezgi yükseldi."
 shogunate.1.a: "Goshōshin, goshōshin!"
 shogunate.2.t: "Veraset Meselesi"
 shogunate.2.d: "Mevcut [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] makamı sahibinin büyük oğlu olan [SCOPE.sCharacter('iesada_scope').GetFirstName] isimli varisin sağlık durumunun kötüye gitmesi, kendisinin gelecekte [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle] vazifelerini yerine getirip getiremeyeceği hususunda endişelere yol açtı. [SCOPE.sCharacter('armed_forces_leader').GetFullName] önderliğindeki Dış Daimyolar, alternatif bir aday olarak [SCOPE.sCharacter('yoshinobu_scope').GetFullName] isminin arkasında birleşti."
 shogunate.2.f: "[SCOPE.sCharacter('armed_forces_leader').GetFirstNameNoFormatting] isimli liderin yatak odası boştu. Paravanlar kapalıydı ve veranda boşaltılmıştı. Yatağının kenarında oturmuş, boş bir kâğıda bakıyordu. Gözleri kapalıydı. Yan salondan bir kedi geçecek olsa bunu kesinlikle duyardı. Ancak yine de kimsenin dinlemediğinden emin olamıyordu. Böylesine erken bir aşamada, ihtiraslarını sıkı sıkıya kendi zihninin derinliklerinde gizlemesi en doğrusuydu.\n\nİmparatorluk Sarayı da meseleyi aynı şekilde görüp onu haklı bulacak mıydı? Öyle düşünmek için geçerli sebeplere sahipti fakat bu, meselelerin en kolayıydı. Düşüncelere daldı. Bir fermanı çıkartmanın en emin yolu neydi? Fermanın sırra kadem basmamasını nasıl sağlayabilirdi?"
 shogunate.2.a: "İç [GetLawType('law_bakufu').GetName] dediğini yaptıracak."
 shogunate.2.b: "Bu durum kararlı bir liderlik gerektiriyor."
 shogunate.3.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] İçin Atama Kararı" # Iesada
 shogunate.3.d: "[SCOPE.sCharacter('shogun_scope').GetLastName] klanının yeni lideri olan [SCOPE.sCharacter('shogun_scope').GetFullName], İmparator tarafından Şogun makamına layık görüldü. Çocukluğundan beri zayıf bir bünyeye sahip olan Şogun'un bozulan sağlığı, makamına kimin geçeceğine dair yarışı şimdiden alevlendirdi."
 shogunate.3.f: "$shogunate.1.f$"
 shogunate.3.a: "Goshōshin, goshōshin!"
 shogunate.4.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] İçin Atama Kararı" # Yoshinobu
 shogunate.4.d: "[SCOPE.sCharacter('shogun_scope').GetLastName] klanının yeni lideri olan [SCOPE.sCharacter('shogun_scope').GetFullName], İmparator tarafından Şogun makamına layık görüldü. Yeni Şogun'un reformcu bölgelerdeki destekçileri, onun iktidarına dair büyük beklentiler içerisinde."
 shogunate.4.f: "$shogunate.1.f$"
 shogunate.4.a: "Goshōshin, goshōshin!"
 shogunate.5.t: "Hitotsubashi ve Nanki"
 shogunate.5.d: "Şogun Ieyoshi'nin veraseti sürecinde ortaya çıkan fraksiyonlar, varisi bulunmayan [SCOPE.sCharacter('shogun_scope').GetFullName] isimli Şogun'un yerine kimin geçeceği hususunda bir kez daha karşı karşıya geldi. Dış Daimyoların Hitotsubashi fraksiyonu ile alt kademe [SCOPE.gsInterestGroup('armed_forces_ig').GetName] mensupları [SCOPE.sCharacter('yoshinobu_scope').GetFullName] ismini desteklerken, İç [SCOPE.gsInterestGroup('daimyo_ig').GetName] grubunun Nanki fraksiyonu ise [SCOPE.sCharacter('iemochi_scope').GetFullName] ismini destekliyor."
 shogunate.5.f: "Ulak, ifadesiz bir yüzle sedirdeki adamın önünde yere bakıyordu. Fırçası kâğıdın üzerinde asılı kalmıştı.\n\n\"Yoshikatsu-sama'ya şu diyeceklerimi ilet,\" dedi Hâkim. \"Saraydaki bazı kimseler, Şogun'un sıhhati hakkında yakışıksız şayialar üretme konusunda epey cüretkâr davranır oldu. Sanki onun hiç söz hakkı yokmuş gibi tartışıyorlar. Şayet bu varsayımla kaleme alınmış herhangi bir taslak ortaya çıkarsa beni bilgilendir.\""
 shogunate.5.a: "Şogun, [SCOPE.sCharacter('iemochi_scope').GetFirstName] isimli varisin hüküm sürmesini vasiyet eder."
 shogunate.5.b: "İmparatorluk Sarayı liyakat sahibi bir halef istiyor."
 shogunate.6.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] İçin Atama Kararı" # Iemochi
 shogunate.6.d: "[SCOPE.sCharacter('shogun_scope').GetLastName] klanının yeni lideri olan [SCOPE.sCharacter('shogun_scope').GetFullName], İmparator tarafından Şogun makamına layık görüldü. Genç yaşına rağmen Şogun, şimdiden soğukkanlı ve titiz muhakemesiyle nam saldı."
 shogunate.6.f: "$shogunate.1.f$"
 shogunate.6.a: "Goshōshin, goshōshin!"
 shogunate.6.a_regency: "Sadık bir vasinin himayesinde hüküm sürecek."
 shogunate.6.b_regency: "Hitotsubashi ile Uzlaş - [SCOPE.sCharacter('yoshinobu_scope').GetFirstName] isimli kişiyi vasisi olarak ata."
 shogunate.7.t: "[SCOPE.sCharacter('shogun_scope').GetFirstName] İçin Atama Kararı" # Iesato
 shogunate.7.d: "[SCOPE.sCharacter('shogun_scope').GetLastName] klanının yeni lideri olan [SCOPE.sCharacter('shogun_scope').GetFullName], İmparator tarafından Şogun makamına layık görüldü. Görmüş geçirmiş ve açık fikirli biri olan Şogun'un, [GetLawType('law_bakufu').GetName] bünyesindeki reformcu fraksiyonları desteklemesi bekleniyor."
 shogunate.7.f: "$shogunate.1.f$"
 shogunate.7.a: "Goshōshin, goshōshin!"
 shogunate.8.t: "Sıcak Yaz"
 shogunate.8.d: "Yazın kavurucu sıcağı, yaşlı [SCOPE.sCharacter('shogun_scope').GetFullName] hazretlerinin sıhhatini hızla bozdu. Artık yatağa mahkûm olan [SCOPE.sCharacter('shogun_scope').GetPrimaryRoleTitle], yorgun düşen kalbine karşı son bir mücadele vermek zorunda."
 shogunate.8.f: "Şogun'un yatağı pencereye bakacak şekilde çevrilmişti. Hizmetkârları, denizden esen serin havanın yelpazelerine destek olmasını umut etmişti. Yatağın ayakucunda ağzı açık bir buz sandığı duruyor, alnının üzerinde ise ıslak bir bez yatıyordu.\n\nHavada rüzgârdan eser yoktu. Gün batarken hava dalga dalga titriyordu. Amansız sıcak dört bir yanı kuşatmıştı. Artık aşağıdaki dalgaların silüetini bile seçemiyordu."
 shogunate.8.a: "Yolun sonu geldi."
 shogunate.8.b: "Hollanda tedavilerine başvur."
