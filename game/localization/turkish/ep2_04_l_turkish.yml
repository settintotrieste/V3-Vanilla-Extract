 # Zaibatsu
 je_zaibatsu: "Kurumsal İmparatorluk"
 je_zaibatsu_reason: "[ROOT.GetCountry.GetName] topraklarındaki hızlı sanayileşme, ekonominin büyük bir kısmını [concept_zaibatsu] çatısı altına almıştır. Devlet kurumlarıyla yakın ilişkilerinden büyük kazanç elde eden bu şirketler, #v $JAP$#! askeri-sanayi yapısı içinde hayati öneme sahip unsurlar haline geldi.\n\n[ROOT.GetCountry.GetAdjectiveNoFormatting] sermayesinin yoğunlaşmış yapısı, ülkeyi uluslararası mecrada bir rakip haline getirdi. Bunun bedeli ise Zaibatsu ve onların askeri destekçilerinin eline giderek daha fazla siyasi güç geçmesidir.[SCOPE.GetRootScope.GetCountry.GetCustom('zaibatsu_democracy_snippet')]\n$ZAIBATSU_LIST_HEADER$$ZAIBATSU_LIST_CONTENT$"
