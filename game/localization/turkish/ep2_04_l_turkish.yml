 special_character_japanese_emperor: "Japonya İmparatoru"
 special_character_japanese_emperor_desc: "Bu karakter, Japonya'nın dini ve siyasi yapısının merkezini oluşturan mevcut Japon İmparatoru'dur."
 japan_monarchy.1.t1: "Kaei Dönemi"
 japan_monarchy.1.t2: "Tenkyū Dönemi"
 japan_monarchy.1.d1: "Prens [SCOPE.sCharacter('emperor_scope').GetFirstName], Japonya İmparatoru olarak Krizantem Tahtı'na çıktı. Tahta çıkışı, adını sonsuz mutluluktan alan Kaei Dönemi'nin başlangıcını müjdeledi."
 japan_monarchy.1.d2: "Prens [SCOPE.sCharacter('emperor_scope').GetFirstName], Japonya İmparatoru olarak Krizantem Tahtı'na çıktı. Tahta çıkışı, adını göksel istikrardan alan Tenkyū Dönemi'nin başlangıcını müjdeledi."
 japan_monarchy.1.f: "Görüş alanının dışında bir yerden bir müzisyen işaret verdi. Saray mensubu iki hanım tahtın perdelerini açtı. İmparator, beyaz ve yeşil ejderhalarla süslenmiş kızıl bir cübbe içinde karşıdan belirdi. Cübbesinin azameti oturduğu yeri tamamen örtmüş, ona adeta havada süzülüyormuş gibi bir hava vermişti. Tacından aşağı boncuklu bir perde iniyordu. Bunların düşürdüğü gölgeler gözlerini gizliyordu.\n\n[SCOPE.sCharacter('name_scope').GetFirstNameNoFormatting], etrafındaki kumaş hışırtıları arasında başını öne eğdi. Salondaki diğer davetliler peşi sıra yere kapanıyordu. O da onlara ayak uydurdu ve İmparator'un gölgeler içindeki yüzü gözden kayboldu.\n\nGünler sonra, Edo'ya dönüş yolunda, gördüklerini zihninde yeniden canlandırmaya çalıştı ancak başarılı olamadı. Tacı, perdeleri ve İmparator'un yanı başında duran kutuları gözünün önüne getirebiliyordu. Gelgelelim adamın bizzat kendisine dair zihninde hiçbir iz yoktu."
 japan_monarchy.1.a: "Ömrünüz sahildeki kum taneleri kadar uzun olsun."
 japan_monarchy.2.t: "Meiji Dönemi"
 japan_monarchy.2.d: "Prens [SCOPE.sCharacter('emperor_scope').GetFirstName], Japonya İmparatoru olarak Krizantem Tahtı'na çıktı. Tahta çıkışı, adını aydınlanmış yönetim vaadinden alan [SCOPE.sCharacter('emperor_scope').GetFirstName] Dönemi'nin başlangıcını müjdeledi."
 japan_monarchy.2.f: "Bir gong çaldı ve perde kalktı. Huzurdakiler; yüzü yarı yarıya gizlenmiş, zengin işlemeli sarı ipeklere bürünmüş İmparator'u yalnızca bir anlığına görebildi. Solundaki kaimenin üzerinde duran yeşil lake kutu kutsal kılıcı ve mücevheri gizliyordu. Derken muhafız komutanı nidasını yükseltti ve herkes bakışlarını yere indirdi. Teşrifatçı, gür ve kararlı bir sesle söze girdi:\n\n\"Tanrıların çağından, o kadim zamanlardan bu yana diyarların temelleri atılmış ve akabinde ilahi İmparator, İmparatorluk hanedanını Kashihara'da kurmuştur. İmparatorluk soyu o günden bugüne kesintisiz devam etmiştir. Kadim usullere ve geçmiş saltanatların teamüllerine riayet ederek, bizler şimdi İlahi Veraseti teslim alıyor ve Yüce İmparatorluk Tahtı'na çıkıyoruz.\"" # Very heavily pared down excerpt of the rites at Meiji's enthronement
 japan_monarchy.2.a: "Ömrünüz sahildeki kum taneleri kadar uzun olsun."
 japan_monarchy.3.t: "Taishō Dönemi"
 japan_monarchy.3.d: "Prens [SCOPE.sCharacter('emperor_scope').GetFirstName], Japonya İmparatoru olarak Krizantem Tahtı'na çıktı. Tahta çıkışı, adını yüce doğruluk erdeminden alan [SCOPE.sCharacter('emperor_scope').GetFirstName] Dönemi'nin başlangıcını müjdeledi."
 japan_monarchy.3.f: "İskeleden bir adam geçince ahşap bağlantı gıcırdadı. Yatarō onu olabildiğince sıkı tuttu. Ayak sesleri uzaklaşınca, elindeki tokmakla parçayı yerine sabitlemeye girişti.\n\nEtrafından da benzer sesler yükseliyordu. Göz ucuyla, başka bir ekibin yan binanın kara odunlu tahta duvarlarını monte ettiğini görebiliyordu. Ustabaşı, devrilmek üzere olan saman balyalarını taşıyan bir işçiye bağırıyordu.\n\nAltı gün içinde İmparator, Yatarō'nun inşa ettiği bu geçitten geçecekti; ömürde bir kez gerçekleşecek olan bu tören, geçidin ateşe verilip yok edilmesiyle son bulacaktı. Yatarō törene katılamayacaktı. Tek tesellisi, yangının gökyüzündeki bulutlara vuran parıltısını uzaktan seyretmek olacaktı."
 japan_monarchy.3.a: "Ömrünüz sahildeki kum taneleri kadar uzun olsun."
 japan_monarchy.4.t: "Shōwa Dönemi"
 japan_monarchy.4.d: "Prens [SCOPE.sCharacter('emperor_scope').GetFirstName], Japonya İmparatoru olarak Krizantem Tahtı'na çıktı. Tahta çıkışı, adını aydınlanmış barış ve uzlaşı vaadinden alan [SCOPE.sCharacter('emperor_scope').GetFirstName] Dönemi'nin başlangıcını müjdeledi."
 japan_monarchy.4.f: "Takaishi ailesinin dört kuşağı radyonun etrafına üşüşmüştü. Cihazdan gelen cızırtılı ses, sanki bir kuyunun dibinden yankılanıyordu. Giyō kadranı bir o yana, bir bu yana çevirdi. Ses yeniden duyulduğunda bu kez gür ve pürüzsüzdü.\n\n\"...Bakanlar Kurulu Başsekreteri, yeni dönemi ilan eden bir kararname yayımladı. Bugünden itibaren içinde bulunduğumuz dönem, [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting] Dönemi'nin ilk yılı olarak anılacaktır...\"\n\nAnnesinin gözleri mutfak masasındaki gazeteye kaydı. \"Kobun değil miymiş? Doğru mu söylüyor?\"\n\nOdayı şaşkınlık dolu fısıltılar sararken Giyō radyonun sesini biraz daha açtı. Nafileydi. Başka bir havadis varsa da bunu ancak yarın okuyarak öğrenebilecekti."
 japan_monarchy.4.a: "Ömrünüz sahildeki kum taneleri kadar uzun olsun."
 japan_monarchy.5.t: "Tek İmparator, Tek Dönem"
 japan_monarchy.5.d: "İmparatorluk Sarayı'nın siyasi üstünlüğünün yeniden tesis edilmesiyle birlikte İmparator, dönemler sistemini ıslah eden bir ferman neşretti. Bundan böyle yeni bir dönem, ancak yeni bir İmparator'un tahta çıkışıyla ilan edilecek ve onun saltanatı boyunca devam edecek."
 japan_monarchy.5.f: "#bold İmparatorluk Fermanı#!\n\nKutsal hükümdarın İlahi Veraseti devralmasıyla yeni bir devri başlatması, aydınlanmış bir çağın emsalsiz örneğini ve on bin nesil sürecek bir nizamı teşkil eder. Yüce soyun varisi ve devletin sayısız meselesiyle bizzat alakadar olan Ben, diyardaki cümle tebaamızla beraber yepyeni bir başlangıca imza atmak üzere dönemin adını değiştiriyorum. [ROOT.GetCountry.GetCustom('JAP_era_year_name')], bundan böyle [SCOPE.sCharacter('emperor_scope').GetFirstNameNoFormatting] Dönemi'nin ilk yılı olarak anılacaktır. Bundan böyle, eski sistem ıslah edilecek ve her saltanat için tek bir dönem ismi tahsis edilmesi ilkesi, kalıcı bir teamül olarak yerleşecektir." # Shortened 'One Emperor, One Era' edict - 今後年號ハ御一代一號ニ定メ慶應四年ヲ改テ明治元年ト爲ス及詔書
 japan_monarchy.5.a: "Makam sahipleri bu emri tatbik edecektir."
 japan_monarchy.6.t: "Daijō Tennō'nun Ölümü"
 japan_monarchy.6.d: "Mevcut İmparatorun tahttan feragat eden babası, Emekli İmparator vefat etti. Kendisi İmparatorluk prestijini yeniden tesis etme gayretleriyle yâd edildi ve vefatının ardından ona [SCOPE.sCharacter('retired_emperor_scope').GetFirstName] ismi verildi."
 japan_monarchy.6.f: "Tōhō fırçasını mürekkebe daldırdı. Fırçanın ucu sayfaya dokunup günün, yılın ve havanın durumunu belirten karakterleri resmetti. Sonraki sütuna geçtiğinde ise duraksadı.\n\nHangi ifadeleri kullanmak münasip olurdu? Vuku bulan bu hadisenin ehemmiyeti en iyi nasıl kaleme alınabilirdi? Emekli İmparator'un sarayı ihya etmeye yönelik muazzam gayretlerine dair şayialar işitmişti. Onun saltanatını, yeniden hayata geçirdiği merasimlerin havadislerini anımsadı. Derken Saray'ın elçisi huzuruna gelmiş ve işin hakikatini öğrenmişti.\n\nFırça kâğıda dokundu. \"İmparator'un unvanına dair geçmişteki emsallere dair bir beyan istendi. İmparatorluk Şeceresi incelenerek gerekli mütalaa sunuldu...\""
 japan_monarchy.6.a: "Soyundan gelenler, onun bu arzularını nihayete erdirebilecek mi?"
