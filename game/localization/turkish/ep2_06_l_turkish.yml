l_turkish:
 japan_earthquakes.1.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')] Büyük Depremleri"
 japan_earthquakes.1.d: "Dört günlük bir süre zarfında kıyı açıklarında meydana gelen üç deprem geniş bir alanda hasara yol açtı; ardından gelen dev dalgalar ise kıyı bölgelerindeki yıkımı daha da ağırlaştırdı."
 japan_earthquakes.1.f: "Çok kısa süre içinde tüm köy bu doğaüstü durumu fark etmişti. Anlaşılan o ki, kimse az önceki sarsıntıyı hissetmemişti; ancak suyun bu sıra dışı hareketi karşısında herkesin hayretler içinde kaldığı açıkça görülüyordu. İzlemek için kumsala, hatta kumsalın da ötesine koşuyorlardı. O sahilde yaşayanlar, denizin daha önce hiç bu denli çekildiğine şahit olmamıştı. Görülmemiş şeyler gün yüzüne çıkıyordu. Hamaguchi'nin gözleri önünde suyun altında saklı kalmış oluklu kum desenleri ve yosun kaplı kayalıklar belirmeye başladı. Aşağıdaki insanlar, bu korkunç durumun neyin habercisi olduğunu kestiremiyor gibiydi.\n\n—Lafcadio Hearn, #italic Yaşayan Tanrı#!"
 japan_earthquakes.1.a: "Komşu Daimyo'dan yardım iste."
 japan_earthquakes.1.b: "Bırakalım da yardım faaliyetleriyle yerel yöneticiler ilgilensin."
 earthquake_assisting_daimyo: "Komşu Daimyo'ya Yardım"
 earthquake_affected_daimyo: "Depremin Akıbeti"
 japan_earthquakes.2.t: "[ROOT.GetCountry.GetCustom('JAP_era_name')] [SCOPE.sState('japan_earthquake_state').GetCityHubName] Depremi"
 japan_earthquakes.2.d: "[SCOPE.sState('japan_earthquake_state').GetName] kıyılarını vuran şiddetli deprem, [SCOPE.sState('japan_earthquake_state').GetCityHubName] şehrini ve kalesini harabeye çevirdi."
 japan_earthquakes.2.f: "Dev yayın balığı Namazu baskıları, deprem sonrasında revaç görmeye başladığı ilk zamanlarda geleneksel anlatılara uygun biçimde ele alınıyordu. Bu eserlerde yaratık, yeni felaketlere yol açmasını engellemek isteyen tanrılarca zapt edilirken resmediliyordu.\n\nGelgelelim zamanla bu tasvirler bir dönüşüm geçirdi. Bir baskıda Namazu’nun kendi karnını yarıp kan yerine madeni paralar saçtığı görülürken bir başkasında ise inşaat ustalarıyla kadeh tokuşturduğu resmediliyordu. Sanata sızan bu hicivsel hava, canavarın getirdiği felakete rağmen belki de bazı şeyleri yoluna koyduğunu hissettiriyordu."
 japan_earthquakes.2.a: "[SCOPE.sState('japan_earthquake_state').GetCityHubName] şehrindeki vasallarımızın yardıma ihtiyacı var!"
 japan_earthquakes.2.b: "Servet, yeniden inşa edebilecek olanlara akmalı."
 earthquake_vassal_support: "Vasallara Destek"
 earthquake_rebuilding_focus: "Deprem Sonrası Yeniden İnşa"
 earthquake_rebuilding_redistribution: "Dünyanın Islah Edilmesi"
 japan_earthquakes.3.t: "Mino–Owari Depremi"
 japan_earthquakes.3.d: "[ROOT.GetCountry.GetName] topraklarının tam kalbinde binlerce kişinin ölümüne ve ülke çapında olağandışı büyüklükte fay kırıklarına yol açan büyük bir deprem meydana geldi."
 japan_earthquakes.3.f: "\"İnsanoğlunun afetlere karşı tepkisi her zaman onları birer 'suç' olarak algılamak yönünde olmuştur; sık sık 'fail kim?' sorusunu sormak, depremlere yol açtığı söylenen sayısız mitolojik canavarın ve iblisin doğmasına yol açmıştır.\n\nGünümüz deprem bilimcisi batıl inançları reddetmek zorundadır. Yine de bazı zamanlar kendisini bir cinayet mahallini inceleyen dedektif rolünde bulabilir. Hangi nesneler devrildi? Nasıl devrildiler? Tüm bu soruların amacı nihayetinde 'fail'i bulmak değil, 'nasıl'ın ve 'neden'in peşine düşmektir.\""
 japan_earthquakes.3.a: "Bu fayları incelemeleri için yabancı akademisyenleri davet et."
 japan_earthquakes.3.b: "Bu bilgiyi daha fazla meteoroloji gözlemevi kurmak için kullan."
 japan_earthquakes.3.c: "Olası artçı sarsıntılara karşı hazırlıklı ol."
 meteorological_observatories: "Meteoroloji Gözlemevleri"
 meteorological_observatories_cost: "$meteorological_observatories$"
 earthquake_bracing_for_aftershocks: "Artçı Sarsıntılara Hazırlık"
 japan_earthquakes.4.t: "Sanriku Depremi"
 japan_earthquakes.4.d: "Sanriku açıklarında meydana gelen depremin tetiklediği dev bir tsunami, [SCOPE.sState('japan_earthquake_state').GetName] kıyılarını vurdu. Bu yıkıcı felaketin ardından, gelecek nesilleri olası tsunamilere karşı uyaracak anıtların dikilmesi önerildi."
 japan_earthquakes.4.f: "\"Ölülerin anısına anıtlar dikmek kâfi değildir. Hayatta kalanların da başlarına gelen bu musibetin hatırlatılmasına ihtiyacı yoktur. Taşa kazınmış bir mesajla karşılaşan her kimse, atalarının kendisine asla unutulmaması gereken bir şey fısıldadığını anlayacaktır. Zira bu anıtlar ölenlere değil, henüz doğmamış olanlara dikilmiştir.\""
 japan_earthquakes.4.a: "[SCOPE.sState('japan_earthquake_state').GetName] vilayetinin bu tür anıtlara ihtiyacı var."
 japan_earthquakes.4.b: "Tsunaminin vurduğu her yere bu taşları dikin!"
 japan_earthquakes.4.c: "Tüm gayretimizi şu ana ve mevcut duruma yoğunlaştırmalıyız."
 tsunami_stones: "Tsunami Taşları"
 tsunami_relief_efforts: "Tsunami Yardım Faaliyetleri"
 japan_earthquakes.5.t: "Büyük Kanto Depremi"
 japan_earthquakes.5.d: "Eşi benzeri görülmemiş büyüklükte bir deprem, [SCOPE.sState('japan_earthquake_state').GetCityHubName] yakınlarını vurdu. Sadece dakikalar içinde şehrin büyük bir kısmını yerle bir eden felaket, yüz binlerce insanın ölümüne yol açtı."
 japan_earthquakes.5.f: "Sarsıntıyı takip eden dev dalgalar, çok büyük bir yıkıma yol açacak gibiydi; fakat asıl dehşet yangınlarla geldi. Çok geçmeden sadece binalar değil, toprağın ve rüzgârın kendisi bile yanıyor gibiydi.\n\nYanan evlerden canını kurtaranlar, sanki bu devasa yangın kimseyi sağ bırakmamaya yemin etmişçesine, bir alev hortumunun içinde kapana kısıldılar. [SCOPE.sState('japan_earthquake_state').GetCityHubName] tam manasıyla bir mahşer yerine dönmüştü."
 japan_earthquakes.5.a: "Japon halkı, böylesi bir yıkım karşısında tek yürek olmalıdır!"
 japan_earthquakes.5.b: "Maddi zenginliğimize inen bu darbe, yozlaşmaya karşı bir ihtar niteliğinde."
 japan_earthquakes.5.c: "Bu fırsatı daha modern bir [SCOPE.sState('japan_earthquake_state').GetCityHubName] inşa etmek için kullanmalıyız."
 earthquake_national_tragedy: "Ulusal Felaket"
 earthquake_divine_punishment: "İlahi Gazap"
 earthquake_modernization: "Modernize Edilmiş Yeniden İnşa"
 earthquake_modernization_land_confiscation: "Arazi Düzenlemesi"
 shinbutsu_bunri_decision: "$je_shinbutsu_bunri$"
 shinbutsu_bunri_decision_desc: "$je_shinbutsu_bunri_reason$"
 elevate_buddhism_decision: "$je_elevate_buddhism$"
 elevate_buddhism_decision_desc: "$je_elevate_buddhism_reason$"
 je_shinbutsu_bunri: "Shinbutsu Bunri"
 je_shinbutsu_bunri_reason: "İmparatorun gücü yeniden tesis edildiğine göre imparatorluk soyunu kutsal kabul eden yerel dini gelenekleri seçkin kılıp yüceltmemiz gerekiyor. Bunu başarmak için bu geleneklerin, senkretik uygulamalar aracılığıyla kami inancıyla ayrılmaz biçimde iç içe geçen Budizm'in yabancı etkisinden kurtulması şart. Budist kurumların Şogunluk ile olan bağlarının yarattığı hoşnutsuzluktan faydalanıp daha üstün bir yol gösterici ilke olarak Şinto'nun önünü açabiliriz."
 je_taikyo_proclamation_button: "Taikyō Bildirgesi"
 je_taikyo_proclamation_button_desc: "Kami'ya tapınma ve İmparator'a saygıya dayanan Şinto'yu devletin temel ilkesi haline getir"
 je_taikyo_proclamation_conversion_tt: "Her bir [concept_interest_group] lideri, #v %75#! ihtimalle [GetReligion('shinto').GetName] dinini benimser."
 je_elevate_buddhism: "Budizm'i Yücelt"
 je_elevate_buddhism_reason: "$JAP$ topraklarındaki Budist dini kurumlar, Şogunluk'un idari yapısıyla güçlü tarihsel bağlara sahip. Şogunluk'un sonunun gelmesini bir kez önlemiş olan bu kurumların güçlendirilmesi, Şogunluk'un iktidarını sürdürmemize ve $JAP$ topraklarında İmparator'a tapınmaya odaklanmayan dini gelenekleri güçlendirmemize yardımcı olabilir."
 je_elevate_buddhism_goal: "$je_communism_2_goal$"
 arahitogami: "Arahitogami"
 extended_danka_system: "Genişletilmiş Danka Sistemi"
 japan_religion.1.t: "Jingū-ji"
 japan_religion.1.d: "Budist rahiplerin tapınaklarda Şinto uygulamalarıyla birlikte ritüeller gerçekleştirmesi yaygındır. Budizm'in Şinto'dan ayrılmasıyla birlikte bu rahiplerin rolü sorgulanmaya başlandı."
 japan_religion.1.f: "\"Bu ritüellerin amacı ne? Kami'leri aydınlanmaya mı yönlendirecekler? Karmalarını mı iyileştirecekler? Buradan açıkça onların tapınılmaya layık varlıklar değil, rehberliğe muhtaç kayıp varlıklar olduğu sonucu çıkıyor. Artık bu tür imalara müsamaha göstermeyeceğiz!\""
 japan_religion.1.a: "Keşişlerin din değiştirip Şinto rahipleri olmalarını talep et."
 japan_religion.1.b: "Keşişlerin unvanlarını ellerinden al."
 japan_religion.1.c: "Keşişleri görevlerinde bırak."
 forced_monk_conversions: "Keşişler Din Değiştirmeye Zorlandı"
 monks_stripped_of_titles_opinion: "$monks_stripped_of_titles$"
 monks_stripped_of_titles: "Keşişlerin Unvanları Ellerinden Alındı"
 monks_left_to_duties: "Keşişler Görevlerinde Bırakıldı"
 japan_religion.1.a.tt: "[GetPopType('clergymen').GetName] nüfusunun [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] kadarı [GetReligion('shinto').GetName] dinini benimser"
 japan_religion.2.t: "Honji Suijaku"
 japan_religion.2.d: "Budaların Japonya'da kami olarak tezahür ettiği yerleşik bir görüştür. Onları tek bir varlığın iki yönü olarak gören [concept_gongen] gibi terimlerin kullanılması da bunu yansıtır. Bu tür terminoloji, Budizm'in nüfuzunu daha da artırmaktadır."
 japan_religion.2.f: "\"Bu bir zamanlar mantıklı gelmiş olmalı. Amaterasu güneştir. Dainichi Nyorai, yani Vairocana da güneştir. Ancak güneş bölünmez, başka bir ışığın yansıması ya da tezahürü de değildir. Kendi gücüyle tek başına parlar. Bugün ise [ROOT.GetCountry.GetNameNoFormatting] topraklarında yalnızca tek bir güneşe yer var.\""
 japan_religion.2.a: "[concept_gongen] kavramını yasakla."
 japan_religion.2.b: "Hachiman'ın [concept_boddhisattva] olarak anılmasını yasakla."
 japan_religion.2.c: "Terminolojiyi düzenleme."
 banned_syncretic_terminology: "Senkretik Terminoloji Yasaklandı"
 retained_syncretic_terminology: "Senkretik Terminoloji Korundu"
 japan_religion.2.a.tt: "[GetPopType('farmers').GetName] nüfusunun [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] kadarı [GetReligion('shinto').GetName] dinini benimser"
 japan_religion.2.b.tt: "[GetPopType('soldiers').GetName] nüfusunun [GetPlayer.MakeScope.ScriptValue('japan_religion_pop_converts')|0v%] kadarı [GetReligion('shinto').GetName] dinini benimser"
 japan_religion.3.t: "Çanlar Senin için Çalıyor"
 japan_religion.3.d: "Budizm'in etkisini ortadan kaldırmaya yönelik girişim, genel bir Budizm karşıtı düşünceyi harekete geçirdi. Tapınaklara ait mülklere el konuyor ve tahrip ediliyor; bazıları tamamen yıkılırken bazılarından Budist simgeler sökülüp çıkarılıyor."
 japan_religion.3.f: "Tapınağa yaklaşırken aniden durdu. Girişin önünde nöbet tutan iki güçlü Buda heykeli olan Niō'lar kaldırılmıştı. Yerlerinde hiçbir şey yoktu.\n\nİçeri girerken tapınağın tüm saflığına rağmen artık eskisi kadar güvenli olmadığı hissinden kurtulamıyordu. Kapısı korumasız kalmıştı."
 japan_religion.3.a: "Tapınak çanlarını eritip top yap!"
 japan_religion.3.b: "Tapınaklardaki Buda heykellerini yok et veya kaldır."
 japan_religion.3.c: "Tapınaklara dokunma."
 smelted_temple_bells: "Tapınak Çanları Eritildi"
 smelted_temple_bells_opinion: "$smelted_temple_bells$"
 removed_buddha_statues: "Buda Heykelleri Kaldırıldı"
 removed_buddha_statues_opinion: "$removed_buddha_statues$"
 retained_buddhist_iconography: "Budist Simgeler Korundu"
 japan_religion.4.t: "Şinto İşleri Bürosu"
 japan_religion.4.d: "Şinto uygulamalarını standartlaştırma ve devletin kami'lerinin yerel ritüellerin bir parçası olmasını sağlama çalışmalarına, bu öğretileri geleneklerden kopuş olarak gören yerel keşişler ve tapınak rahipleri karşı çıktı."
 japan_religion.4.f: "\"Şinto, devletin tapınaklarında görülen şekilde dış etkilerle karıştırılmış ve bozulmuş mevcut ritüel ve uygulamaları sürdürmekten ibaret değildir. Göklerin soyundan gelen İmparatorluk hanedanının gelenekleri, Şinto'yu saf haline döndürmek için [ROOT.GetCountry.GetNameNoFormatting] çapında öğretilmelidir.\""
 japan_religion.4.a: "Devletin yorumladığı anlama uyulmasını zorunlu kıl."
 japan_religion.4.b: "Yerel ritüellere en uygun şeyi yerel rahipler bilir."
 standardized_priest_training: "Standartlaştırılmış Rahip Eğitimi"
 standardized_priest_training_opinion: "$standardized_priest_training$"
 deferred_to_local_priests: "Yerel Rahiplere Devredildi"
 deferred_to_local_priests_opinion: "$deferred_to_local_priests$"
 japan_religion.5.t: "Konfüçyüsçülük ve Şinto"
 japan_religion.5.d: "Budizm ile Şinto'yu birbirinden ayırma sürecinde Konfüçyüsçülük'ün rolü sorgulanmıştır. Birçok akademisyen bu felsefeyi Şinto ile son derece uyumlu bulurken diğerleri onu başka bir yabancı etki olarak değerlendirir."
 japan_religion.5.f: "\"Konfüçyüsçülük, Budizm ile benzer kanallardan gelmiş olabilir ancak bu felsefe ile kami'lere tapınma arasında bir çelişki yoktur. Aksine, ikisi birbirini güçlendirir ve gök ile yer, yönetici ile tebaa gibi aynı ilkeleri kapsar.\""
 japan_religion.5.a: "Konfüçyüsçülük, Şinto için önemli bir tamamlayıcıdır."
 japan_religion.5.b: "Şinto'yu eski geleneklerine geri döndürmeliyiz."
 fukko_shinto: "Fukko Shintō"
 japan_religion.6.t: "Kırsalda Hıristiyanlık"
 japan_religion.6.d: "[ROOT.GetCountry.GetName] yabancılara açılmış olsa da din hâlâ düzenlemelere tabidir. Hıristiyan ülkeler, inançlarının serbestçe ithal edilmesini, mallarının ithalatı kadar önemli görebilir."
 japan_religion.6.f: "\"Hıristiyanlık, takipçilerini en çok ölürken, en önemlisi de imanları uğrunda ölürken sever. Çarmıha gerilen ya da ateşe atılan her misyoner, çarmıha gerilen bir adamla başlayan hikâyenin sonraki bölümü olur. Artık onları şehit etmeyi bırakmanın zamanı gelmiş olabilir mi?\""
 japan_religion.6.a: "Misyonerlerin inançlarını öğretmelerine izin verilmeli."
 japan_religion.6.b: "Dinlerini yaşayabilirler ancak yayamazlar."
 japan_religion.6.c: "Hıristiyanlık geçmişte de günümüzde de yabancı bir tehdit olarak öne çıkıyor."
 permitted_christianity: "Hıristiyanlığa İzin Verildi"
 christianity_disallowed: "Hıristiyanlığa İzin Verilmedi"
 japan_religion.7.t: "Düşünce Akımları"
 japan_religion.7.d: "[ROOT.GetCountry.GetName], günümüzde hâlâ etkisini sürdüren birçok farklı Budizm ekolüne sahip köklü bir geleneğe sahiptir. [SCOPE.gsInterestGroup('devout_ig').GetName] siyasi gücünü artırdıkça bir ekol öne çıkıyor."
 japan_religion.7.f: "\"Yüzyıllar boyunca [ROOT.GetCountry.GetNameNoFormatting] topraklarında yeni Budizm ekolleri ortaya çıktı. Birinin diğerlerini ortadan kaldıracağını düşünmek için hiçbir neden yoktur. Ancak mevcut durumda liderlik ve siyasi yönlendirme yapılması gerekmektedir. Bazıları bu zamanları muhtemelen diğerlerinden daha iyi değerlendirecektir.\""
 japan_religion.7.a: "Saf Topraklar Ekolü."
 japan_religion.7.b: "Zen Ekolü."
 japan_religion.7.c: "Nichiren Ekolü."
 japan_religion.7.e: "Shingon Ekolü."
 pure_land_buddhism: "Saf Topraklar Ekolü"
 zen_buddhism: "Zen Ekolü"
 shingon_buddhism: "Shingon Ekolü"
 japan_religion.8.t: "Buda'nın Sözleri"
 japan_religion.8.d: "[ROOT.GetCountry.GetName] ülkesinin dünyaya açılmasıyla birlikte Budist akademisyenler, fikirlerini modern Budizm'e dahil etmek için daha fazla yabancı metni çevirmeye ilgi gösteriyor."
 japan_religion.8.f: "\"Yalnızlık sonucu ortaya çıkan dogmaların bizi engellemesine izin vermemeli ve gerçeği beklenmedik yerlerde bulmaktan çekinmemeliyiz. Buda'nın öğretileri bize ulaşana kadar çok yol katetti. Geçtikleri yerleri ve ileride gidebilecekleri yerleri incelemek, bize daha derin bir kavrayış kazandırabilir.\""
 japan_religion.8.a: "Budizm'in kökenini oluşturan Sanskritçe ve Pali metinler."
 japan_religion.8.b: "Kendi düşünce ekollerimize en yakın olan Çin metinleri."
 japan_religion.8.c: "Karşılaştırmalı çalışma için Avrupa felsefesi eserleri."
 japan_religion.9.t: "Savaşçı Keşişler"
 japan_religion.9.d: "Devam eden savaş çalışmaları, [SCOPE.gsInterestGroup('devout_ig').GetName] içinde şiddetli bir çatışma sırasında ülkeyi destekleme konusunda Budizm'in rolüne ilişkin tartışmalara yol açtı."
 japan_religion.9.f: "\"Eski zamanların keşişleri tapınaklarını savunmaktan çekinmezlerdi. Biz de ulusumuzu savunmaktan mı çekineceğiz? Hiçbir can hafife alınmamalıdır ancak [ROOT.GetCountry.GetAdjective], daha uzun süreli bir barışa yol açmayacak, aldığı canlardan daha fazlasını kurtaramayacak bir savaşı sürdürür mü hiç?\""
 japan_religion.9.a: "Kalıcı barışı sağlamak için güç kullanılması gerekir."
 japan_religion.9.b: "Şiddet kullanmamak her şeyden üstündür."
 war_buddhism: "Savaş Yanlısı Budizm"
 peaceful_buddhism: "Barış Yanlısı Budizm"
 japan_religion.10.t: "Yōshoku"
 japan_religion.10.d: "Sakoku'nun sona ermesinden bu yana, yabancılara hitap eden et odaklı restoranlar liman şehirlerinde giderek yaygınlaştı. Bu durum, [ROOT.GetCountry.GetName] topraklarındaki mevcut et yeme yasağının sorgulanmasına yol açtı."
 japan_religion.10.f: "\"Affedersiniz lakin sığır eti şüphesiz en leziz nimetlerden biri değil midir? Tadına bir kez alışınca geyik veya yaban domuzuna geri dönmek mümkün olmuyor. Bizler Japonya'da, bu denli nezih bir şeyi yemeyi bunca yıl nasıl ihmal etmişiz, hayret doğrusu.\"\n\n—Kanagaki Robun, #italic Et Yiyen Adam #!"
 japan_religion.10.a: "Beslenme düzenimizi ve mutfak kültürümüzü geliştirmek adına bu yasağı kaldırmalıyız!"
 japan_religion.10.b: "Bu vahşi ve ecnebi adetlerin topraklarımızda kök salmasına müsaade etmeyeceğiz!"
 maintained_meat_ban: "Et Yasağı Muhafaza Edildi"
 maintained_meat_ban_opinion: "$maintained_meat_ban$"
 japan_religion.11.t: "Kamilerin Yolu"
 japan_religion.11.d: "Şinto ve Budist uygulamalarının ayrılması başarıyla sonuçlandı. Eski dini kurumların etkisi giderek azalırken tanrılara, imparatora ve [ROOT.GetCountry.GetName] ülkesine adanmış yeni bir çağ doğuyor."
 japan_religion.11.f: "\"[ROOT.GetCountry.GetNameNoFormatting], kimisi eski kimisi yeni birçok farklı inanca ve ritüele ev sahipliği yapmaktadır. Hedefimiz hiçbir zaman bu inançların bazılarını, diğer inançların lehine ortadan kaldırmak olmadı. Asıl amacımız değer verilen bu inançlarla tartışılmaz gerçekler arasında bir çizgi çekmekti.\""
 japan_religion.11.a: "İlahiyat mutlaktır."
 japan_religion.12.t: "Orta Yol"
 japan_religion.12.d: "[SCOPE.gsInterestGroup('devout_ig').GetName], [ROOT.GetCountry.GetName] için çalkantılı bir ayaklanma döneminin geride kalmasıyla kendisini tekrardan ülkenin dini otoritesi olarak konumlandırmayı başardı ve [ROOT.GetCountry.GetGovernment.GetName] ile bağlarını güçlendirdi."
 japan_religion.12.f: "\"İnsanlar, Tanrıların Yolu'ndan söz eder. Eğer böyle bir şey varsa\nBu yol, insanoğlunun yürümesi için değildir; yalnızca tanrılar\nyürüyebilir tanrıların kutsal yolunda\".\n-Hagura Toman" # Arthur Lloyd, Poems by Buddhist Priests of Japan
 japan_religion.12.a: "Yol apaçık."
 japan_religion.13.t: "$je_taikyo_proclamation_button$"
 japan_religion.13.d: "Büyük Doktrin Bildirgesi, kamilere tapma ve ilahi İmparator'a hürmet etmeyi [ROOT.GetCountry.GetAdjective] devletinin ilkeleri ve vatandaşlarının görevi ilan eder."
 japan_religion.13.f: "\"Kamilere duyulan saygı ve ülkemize duyulan sevgi birbiriyle iç içedir, bunlar ilk öğretidir.\n\nCennetin İlkeleri ve İnsanoğlunun Yolu birbiriyle iç içedir, bunlar ikinci öğretidir.\n\nİmparator'a duyulan hürmet ve sarayın iradesine itaat birbiriyle iç içedir, bunlar üçüncü öğretidir.\""
 japan_religion.13.a: "Seslerini ülke genelinde duyurmalıyız!"
 concept_gongen: "Gongen"
 concept_gongen_desc: "Yerli bir tanrıyla Budist aydınlanmasının öncülerinden birini eşleştiren, bir kami olarak tecelli eden bir Buda."
 concept_boddhisattva: "Boddhisattva"
 concept_boddhisattva_desc: "Budizm'de aydınlanmış bir varlık ve başkalarının nirvanaya erişmesine yardımcı olan bir öğretmen."
