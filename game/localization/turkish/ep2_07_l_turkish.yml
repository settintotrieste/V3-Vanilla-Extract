l_turkish:
 je_sakoku: "Kilitli Ülke"
 je_sakoku_reason: "Kan’ei döneminden ve Tokugawa iktidarının ilk günlerinden bu yana $JAP$, dış dünyaya kapalı bir ülke olmayı sürdürmüştür. Bugüne dek yalnızca belirlenmiş birkaç limanda, seçili birkaç ulusla yürütülen kısıtlı bir ticarete izin verilmiştir. Bu düzen iki asırdan fazla hüküm sürmüş olsa da dünya artık öyle bir değişimden geçmektedir ki; $JAP$içindeki kimi çevreler bu durumun sonsuza dek sürmesini dilese dahi ülkeyi dışa kapalı tutmak giderek zorlaşmaktadır. Şayet topraklarımızın kapılarını açmaya yönelik yabancı girişimlerin önü alınamazsa, o vakit onların yalnızca mallarını değil, fikirlerini de bünyemize katmalıyız."
 je_sakoku_meiji_restoration: "#b İmparator#! tekrar iktidarda, #b Şogunluk#! devrildi"
 je_sakoku_stop_being_closed_button: "[GetLawType('law_sakoku').GetName] Kanununu Yürürlükten Kaldır"
 je_sakoku_stop_being_closed_button_desc: "Tırmanan gerilim ve dış dünyadan gelen baskıların artması, [GetLawType('law_sakoku').GetName] düzenine son verilmesini artık kaçınılmaz bir aciliyet hâline getirdi. Bu şartlar altında eski tecrit sistemini zorla nihayete erdirebiliriz; ancak bu hamle, eski kanunları hâlâ destekleyen kesimlerde büyük bir infial yaratacaktır."
 notification_morrison_incident_has_incidented_name: "$JAP$, Bir Tüccara Ateş Açtı"
 notification_morrison_incident_has_incidented_desc: "Topraklarımızdan cüretkâr bir tüccar, yabancı ticaret gemilerine yönelik $JAP_ADJ$ kısıtlamalarını ihlal etmeye yeltenince bir kıyı bataryası tarafından ateşe tutuldu. Bu hadise, uluslarımız arasındaki diplomatik iklimin bozulmasına yol açtı."
 notification_morrison_incident_has_incidented_tooltip: "#header $notification_morrison_incident_has_incidented_name$#!\n$TOOLTIP_DELIMITER$\n$notification_morrison_incident_has_incidented_desc$"
 light_hand_with_foreigners: "Yabancılara Karşı Müsamaha"
 caved_to_foreign_pressure_opposition: "Yabancı Baskısına Boyun Eğildi"
 caved_to_foreign_pressure_government: "Yabancı Baskısına Boyun Eğildi"
 overdue_break_with_tradition: "Geleneklerden Gecikmeli Kopuş"
 forced_transition_from_tradition: "Geleneklerden Zoraki Kopuş"
 the_picked_lock_modifier: "Kırılan Kilit"
 sakoku_entrenched_modifier: "Sakoku Pekiştirildi"
 meiji_failure_modifier: "Başarısız Restorasyon Reformları"
 ep2_sakoku.1.t: "[SCOPE.sCountry('opium_wars_loser').GetAdjectiveNoFormatting] Yenilgisinin Yarattığı Huzursuzluk"
 ep2_sakoku.1.d: "Uçsuz bucaksız ve kadim komşumuz [SCOPE.sCountry('opium_wars_loser').GetName], deniz aşırı yeni yetme bir ulusa karşı afyon ve ticaret uğruna verdiği savaşı az önce kaybetti. Şayet [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] dahi kendi pazarını kontrol etmekte ve yabancıları kapı dışarı etmekte aciz kalıyorsa, biz nasıl kendi topraklarımızda [GetLawType('law_sakoku').GetName] düzenini muhafaza edelim?"
 ep2_sakoku.1.f: "\"Sahip oldukları onca toprak, zenginlik ve iktidar, karşılarında saf tutan o muazzam kuvvetin yanında adeta sönük kalıyordu. Yabancılar şimdiden ülkemize kabul edilmek için ricacı olmaya başladılar bile. [SCOPE.sCountry('opium_wars_loser').GetNameNoFormatting] örneğini mi izleyeceğiz? Tıpkı onlar gibi, yabancı topları şehirlerimize ateş yağdırana dek onları kapıda mı tutmaya çalışacağız? Yoksa kendi yolumuzu mu çizeceğiz? Kararımızı şimdi, o demirden ve baruttan kuvvetler sularımıza girip de bizim yerimize karar vermeden önce almalıyız.\""
 ep2_sakoku.1.a: "Artık akla hayale gelmeyeni düşünmek zorundayız."
 ep2_sakoku.1.b: "Artık akla hayale gelmeyeni kabullenmek zorundayız."
 end_sakoku_button_now_available: "[GetLawType('law_sakoku').GetName] kanununu erkenden zorla ilga etme seçeneği artık $je_sakoku$de görünür olacak."
 ep2_sakoku.2.t: "Kilidi Kırmak"
 ep2_sakoku.2.d: "Gerek içeride gerekse dışarıda artan kargaşa karşısında [GetLawType('law_bakufu').GetName], [GetLawType('law_sakoku').GetName] kanununun bir an evvel nihayete erdirilmesi yönünde ağırlığını koydu."
 ep2_sakoku.2.f: "Bir tüccar kalabalığı gümrük dairesine akın etmişti. Karşılarında ise bunalmış haldeki tek bir memur çaresizce dikiliyordu. \"Evet, malumunuz; bu karar artık ülkenin dışa kapalı kalmayacağı anlamına geliyor,\" dedi memur.\n\nKalabalıktan yükselen onlarca soru, bir uğultu gibi idarecinin üzerine çöktü. \"Onun yerine ne mi olacak? Ben... emin değilim. Belki şu— hayır. Yok, sırf öyle diye— bu kimsenin haddine değil, öyle kafanıza göre—\"\n\nVerdiği her cevap, onlarca yeni soruyu beraberinde getiriyordu. #italic Ülke kendi haline bırakıldığında işler ne kadar da kolaydı,#! diye geçirdi içinden."
 ep2_sakoku.2.a: "[ROOT.GetCountry.GetNameNoFormatting] için gelecek, [GetLawType('law_mercantilism').GetName] sisteminde."
 ep2_sakoku.2.b: "[GetLawType('law_free_trade').GetName], [ROOT.GetCountry.GetNameNoFormatting] ulusunu özgürleştirecek"
 ep2_sakoku.2.c: "[GetLawType('law_protectionism').GetName], yabancılarla temkinli bir şekilde ticaret yapmamıza olanak tanıyacak"
 ep2_sakoku.3.t: "[SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting] Olayı"
 ep2_sakoku.3.d: "[SCOPE.sCountry('morrison_incident_country').GetName] ülkesinden bir tüccar, [GetLawType('law_sakoku').GetName] kanunun katı protokollerini hiçe sayarak yetkisiz bir limanda ticaret yapmaya kalkıştı. #italic [SCOPE.sCharacter('morrison_incident_country_namesake').GetLastNameNoFormatting]#! isimli gemisi, kıyı bataryalarının ateşi altında bölgeden uzaklaştırıldı. [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] ile zaten kısıtlı olan ilişkiler bu olayla birlikte iyice bozuldu."
 ep2_sakoku.3.f: "Bir gülle nihayet gemiye isabet edince komutanın yüzünde müstehzi bir gülümseme belirdi. Kanunlar gayet açıktı. Geminin bu sularda yelken açmaya hiçbir hakkı yoktu. Gemideki kaptanın ne düşündüğü zerre umurunda değildi; yegâne arzusu, o geminin derhal geri dönüp gitmesiydi."
 ep2_sakoku.3.a: "Yerel garnizon sadece üzerine düşeni yaptı."
 ep2_sakoku.3.b: "Ortalığı yatıştırmak için [SCOPE.sCountry('morrison_incident_country').GetNameNoFormatting] hükümetinden özür dilemeli ve tüccarın zararını tazmin etmeliyiz."
 ep2_sakoku.3.c: "[GetLawType('law_sakoku').GetName] kanununun gerekliliğini gözden geçirmek için aradığımız fırsat işte bu."
 ep2_sakoku.4.t: "Kırılan Kilit"
 ep2_sakoku.4.d: "Gerek içeriden gerekse dışarıdan gelen baskıların ortasında [GetLawType('law_sakoku').GetName] kanunu nihayet yürürlükten kaldırıldı. [ROOT.GetCountry.GetNameNoFormatting] artık kendisi için yepyeni bir geleceğin kapılarını araladı."
 ep2_sakoku.4.f: "Memur, bakışlarını koya doğru çevirdi. Rıhtımda yeni gemiler vardı; daha önce hiç görmediği bayrakları dalgalandıran, her hâliyle yabancı gemiler... Acaba bu gemiler [ROOT.GetCountry.GetNameNoFormatting] topraklarına ne vaat ediyor, bu topraklardan neyi koparıp almak istiyorlardı?\n\nBakışları, rıhtımdaki o gemilerin üzerinde uzun, upuzun bir süre takılı kaldı; nihayetinde gözlerini onlardan ayırıp arkasını döndü. Gözleri, ona bugün aradığı cevabı vermeye yetmeyecekti. Bu yeni devrin anavatanına neler getireceğini ancak zaman söyleyebilirdi."
 ep2_sakoku.4.a: "Japonya bugün dış dünyaya açılıyor!"
 ep2_sakoku.5.t: "Pas Tutmuş Kilit"
 ep2_sakoku.5.d: "[ROOT.GetCountry.GetNameNoFormatting] devletinde yaşanan sarsıcı siyasi değişimlere rağmen [GetLawType('law_sakoku').GetName] kanununun ısrarla sürdürülmesi, ülkenin kendi isteğiyle girdiği tecritten kurtulmasına dair tüm umutları karartıyor. Anlaşılan o ki, [GetLawType('law_sakoku').GetNameNoFormatting] kalıcı olacak."
 ep2_sakoku.5.f: "Memur, bakışlarını koya doğru çevirdi. Rıhtımda demirlemiş eski gemiler; babasının, dedesinin, hatta nesiller boyu atalarının gördüğü gemilerin ta kendisiydi. Çocukları da hep bu gemilere mi bakacaktı? Ya torunları? Bu manzara hiç değişmeyecek miydi?\n\nBakışları, rıhtımdaki o gemilerin üzerinde uzun, upuzun bir süre takılı kaldı; nihayetinde gözlerini onlardan ayırıp arkasını döndü. Gözleri, ona bugün aradığı cevabı vermeye yetmeyecekti. Anavatanının ilelebet böyle değişmeden kalıp kalmayacağını ona ancak zaman söyleyebilirdi."
 ep2_sakoku.5.a: "Kilit kapalı kalmayı sürdürüyor."
 meiji.14.t: "Boş Restorasyon"
 meiji.14.d: "Yeni [ROOT.GetCountry.GetCustom('JAP_era_name')] hükümetinin iddialı reform vaatlerine rağmen [ROOT.GetCountry.GetNameNoFlag] büyük bir değişikliğe uğramadı. Eleştirmenler, bugünkü devletin Restorasyon öncesindeki devletten pek de farklı olmamasından yakınıyor."
 meiji.14.f: "Fabrika zemininde devasa bir motor homurdanarak, büyük bir volanı döndürerek ve devasa torna tezgâhları ile matkaplara güç vererek çalışıyordu. Bu makineler, yeni bir geniş silah cephaneliği için yeni namlular, yeni kilitler ve yeni tetikler üretiyordu. Kısa süre sonra bir ulus bu buharı ve demiri kullanarak dünyaya damgasını vuracaktı ve o ulus [ROOT.GetCountry.GetNameNoFormatting] olmayacaktı."
 meiji.14.a: "Bugün güneş bir hayalin üzerinde dinleniyor."
 je_end_edo_system_button_name: "Edo Statü Sistemini Sonlandır"
 je_end_edo_system_button_desc: "Bu reform ve yenilik çağında, eski kast sistemi ilerlememize engel oluyor. Sosyal statüsü ne olursa olsun her vatandaş devletin değerli bir parçası olabilir."
 edo_system_not_support_enforcement_tt: "[GetLawType('law_intermediate_edo_system').GetName] veya [GetLawType('law_strict_edo_system').GetName] kanunlarının çıkarılmasını desteklemiyor"
 edo_system_ends_tt: "[ROOT.GetCountry.GetNameNoFlag], [Concept('concept_social_hierarchy','$edo_system$ni')] tamamen kaldırır"
 notification_edo_system_disappears_name: "Edo Sistemi Çöker"
 notification_edo_system_disappears_desc: "Yakın zamandaki kültürel ve toplumsal değişiklikler sonrasında Edo Sistemi artık [SCOPE.sCountry('relevant_country_scope').GetName] içerisinde kabul gören bir [concept_social_hierarchy] değil."
 notification_edo_system_disappears_tooltip: "#header $notification_edo_system_disappears_name$#!\n$TOOLTIP_DELIMITER$\n$notification_edo_system_disappears_desc$"
