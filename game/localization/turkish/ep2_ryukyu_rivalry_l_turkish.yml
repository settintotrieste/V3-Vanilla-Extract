 # Events
 ryukyu_rivalry.1.t: "Haraçgüzarlık Müzakereleri"
 ryukyu_rivalry.1.d: "[SCOPE.sCountry('ryukyu_scope').GetName], [ROOT.GetCountry.GetName] devletine giderek daha fazla yakınlık gösteriyor. Buna karşılık [SCOPE.sCountry('rival_scope').GetName], kendi saygılarını ifade eden hediyeler takdim edip [SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting] üzerindeki haraçgüzarlık yükümlülüklerini sessiz sedasız pekiştirerek diplomatik çabalarını hızlandırdı."
 ryukyu_rivalry.1.f: "Mühürlü sandıklar, Ryukyu salonuna büyük bir ihtimamla yerleştirilmişti. Mektuplar yüksek sesle okunurken saray mensupları paravanların ardında fısıldaşıyordu: Mektuplardan biri Çin'in kırmızı mühürlü yazısıyla damgalanmış, diğeri ise Japonya'nın kusursuz kaligrafisiyle bezenmişti. Her bir satırda yükümlülükler ve vaatler sıralanıyor; iki büyük güç, krallığı kendi safına çekmek için kıyasıya bir mücadele veriyordu."
 ryukyu_rivalry.1.a: "[SCOPE.sCountry('rival_scope').GetName] hükümetine resmî bir protesto notası ver."
 ryukyu_rivalry.1.b: "Ryukyu üzerindeki maziye dayanan hukukumuzu kullan."
 ryukyu_rivalry.1.c: "Saray erkanına, geçmişi eskiye dayanan hamiliğimizi hatırlat."
 ryukyu_rivalry.1.e: "Bu mesele herhangi bir müdahaleyi gerektirmiyor."
 ryukyu_rivalry.1.tt1: "[SCOPE.sCountry('ryukyu_scope').GetName]; [ROOT.GetCountry.GetName] egemenliği altında bulunan, [concept_liberty_desire] seviyesi #v 25#!'ten düşük bir ülke"
 ryukyu_rivalry.1.tt2: "[SCOPE.sCountry('ryukyu_scope').GetName], [ROOT.GetCountry.GetName] egemenliği altında bulunan ve en az #v Barışçıl#! [Concept('concept_relations', 'İlişkilere')] sahip bir ülke değil"
 ryukyu_rivalry.1.tt3: "[ROOT.GetCountry.GetName], [SCOPE.sCountry('ryukyu_scope').GetCapital.GetName] şehrinde en az 3 [Concept('concept_building','Bina')] sahibi"
 ryukyu_rivalry.2.t: "Limanlarda Rekabet"
 ryukyu_rivalry.2.d: "[SCOPE.sCountry('rival_scope').GetAdjective] elçilerin [SCOPE.sCountry('ryukyu_scope').GetName] limanlarındaki varlığı, pek çok [GetCulture('ryukyuan').GetName] tüccarının ilgisini ve iş birliğini çekmiş; böylelikle söz konusu tüccarların saray nezdindeki konumları güçlenmiştir. Buna mukabil, bölgedeki cazibemiz ise giderek zayıflamaktadır."
 ryukyu_rivalry.2.f: "Tüccar defterleri kapatıldı ve farklı mühürlerle tekrar açıldı. Eskiden bizim kapımızda bekleyenler artık başka salonlarda vakit öldürüyor, yeni gümrük vergi oranlarını ve güvenli seyahat imkânlarını konuşuyorlar. Anlaşılan o ki sermaye kendine çok daha ikna edici bir temsilci bulmuştu."
 ryukyu_rivalry.2.a: "Kirli oyun."
 ryukyu_rivalry.3.t: "[SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting] Topraklarındaki Konuk General"
 ryukyu_rivalry.3.d: "General [SCOPE.sCharacter('ryukyu_general_scope').GetFullName], kıyı savunmalarını tetkik etmek maksadıyla kalabalık bir subay grubuyla [SCOPE.sCountry('ryukyu_scope').GetName] ülkesine intikal etti. Teşrifleri hürmetkâr bir tabiiyetle karşılandı. Bu durum, [SCOPE.sCountry('rival_scope').GetName] tarafının saraydaki nüfuzunu pekiştirirken bizimkini ise alttan alta zayıflattı."
 ryukyu_rivalry.3.f: "General, yanındaki subaylarla birlikte her bir topu ve gözetleme kulesini inceleyerek kale burçları boyunca ilerledi. Göz hapsine alındıklarının pekâlâ bilincinde olan Ryukyu kuvvetleri, derhal nizama girdi. Sergilenen tavırlar, verilen her bir selam, iki güç arasında örülen görünmez bağların daha da sıkılaşmasını sağlayacaktı."
 ryukyu_rivalry.3.a: "Tehlikeli tırmanış."
 ryukyu_rivalry_risk_of_confrontation: "@warning! [SCOPE.sCountry('china_scope').GetName] ve [SCOPE.sCountry('japan_scope').GetName] kuvvetlerinin kıyı savunmalarını teftiş etmesi halinde bir #r çatışma#! yaşanabilir"
 ryukyu_rivalry.4.t: "Konuk General"
 ryukyu_rivalry.4.d: "Kıyı savunmalarımızı teftiş etme maksadıyla [SCOPE.sCountry('from_scope').GetName] devletinden gelen General [SCOPE.sCharacter('ryukyu_general_scope').GetFullName] ve beraberindeki subay heyeti, [SCOPE.sCountry('ryukyu_scope').GetName] topraklarında kabul edildi. Teşrifleri hürmetkâr bir tabiiyetle karşılandı."
 ryukyu_rivalry.4.f: "$ryukyu_rivalry.3.f$"
 ryukyu_rivalry.4.a: "Gözünü üzerlerinden ayırma."
 ryukyu_rivalry_officer_arrives: "[SCOPE.sCountry('from_scope').GetName] ülkesinden bir [concept_general] hizmete hazır hale geldi"
 ryukyu_rivalry.5.t: "[SCOPE.sCountry('ryukyu_scope').GetNameNoFormatting] Topraklarının Akıbeti"
 ryukyu_rivalry.5.d_victor: "[SCOPE.sCountry('ryukyu_scope').GetName] üzerindeki gayretlerimiz nihayet meyvelerini verdi. Kararlı diplomatik, ekonomik ve siyasi baskılarımız neticesinde saray erkânı artık yol göstermemiz için bize bel bağlıyor. Böylece ülkenin egemenlik meselesi lehimize sonuçlanmış oldu."
 ryukyu_rivalry.5.d_loser: "[SCOPE.sCountry('victor_scope').GetName], [SCOPE.sCountry('ryukyu_scope').GetName] devletini tamamen kendi lehine cezbetmeyi bildi. Saray erkânı bu yeni siyasi gerçekliği kabullenmiş görünüyor; adalar artık bütünüyle [SCOPE.sCountry('victor_scope').GetNameNoFormatting] nüfuz alanının bir parçası hâline geldi."
 ryukyu_rivalry.5.d_ryu: "Korumaya gayret ettiğimiz o hassas denge artık sürdürülemez hâle geldi. [SCOPE.sCountry('victor_scope').GetName] devletinin giderek artan baskısı karşısında sarayımız yeni bir siyasi düzeni kabul etmek zorunda kaldı. [SCOPE.sCountry('ryukyu_scope').GetName] topraklarının geleceği, bundan böyle onların tahakkümü altında şekillenecek."
 ryukyu_rivalry.5.f_annexed: "Bildiriler Naha'nın pazar meydanında okundu; mühürlerin üzerindeki mürekkep, [SCOPE.sCountry('victor_scope').GetCapital.GetName] şehrinde basıldıkları günkü kadar tazeydi. [SCOPE.sCountry('ryukyu_scope').GetAdjectiveNoFormatting] sancakları indirildi ve yerlerine yeni hükümdarın sancağı çekildi. Gün batımına gelindiğinde idari merkez faaliyete geçmiş, yeni fermanlar duvarlara asılmıştı."
 ryukyu_rivalry.5.f_subject: "Bildiriler Naha'nın pazar meydanında okundu; mühürlerin üzerindeki mürekkep, [SCOPE.sCountry('victor_scope').GetCapital.GetNameNoFormatting] şehrinde basıldıkları günkü kadar tazeydi. Her bir ferman, [SCOPE.sCountry('ryukyu_scope').GetName] devletinin bu diyar içerisindeki yeni yerini tayin edecekti. Yüzyıllardır uzak saraylara haraçgüzarlık yapan krallık, artık mülki amirlerinin daha üstün bir güce resmî yükümlülüklerle bağlandığına şahitlik ediyordu. Güneş battığında krallığın yeni yolu artık çoktan çizilmişti."
 ryukyu_rivalry_ryukyu_vassalise_tt: "[SCOPE.sCountry('ryukyu_scope').GetName], [SCOPE.sCountry('victor_scope').GetName] devletinin [Concept('concept_puppet', 'Kuklası')] haline gelir"
 ryukyu_rivalry_ryukyu_transfer_subject_tt: "[SCOPE.sCountry('ryukyu_scope').GetName], [concept_subject] olarak [SCOPE.sCountry('victor_scope').GetName] ülkesine verilir"
 ryukyu_rivalry_ryukyu_annex_tt: "[SCOPE.sCountry('victor_scope').GetName], [SCOPE.sCountry('ryukyu_scope').GetName] ülkesini ilhak edecek"
 ryukyu_rivalry.5.a: "Böylece karar verilmiş oldu."
 ryukyu_rivalry.6.t: "[SCOPE.sCountry('ryukyu_scope').GetCapital.GetNameNoFormatting] Sınırlarında Çatışma"
 ryukyu_rivalry.6.d_brawl: "[SCOPE.sCountry('japan_scope').GetName] ve [SCOPE.sCountry('china_scope').GetName] devletleri tarafından görevlendirilen subaylar, [SCOPE.sCountry('ryukyu_scope').GetName] ülkesinin kıyı savunmalarını teftiş ettikleri sırada çatışmaya başladılar. Can kaybıyla sonuçlanan bu hadise, Ryukyu sarayı tarafından endişeli gözlerle takip edildi."
 ryukyu_rivalry.6.d_accident: "Sahil istihkâmlarını teftiş maksadıyla sevk edilen [SCOPE.sCountry('japan_scope').GetName] ve [SCOPE.sCountry('china_scope').GetName] kıtaları, [SCOPE.sCountry('ryukyu_scope').GetName] topraklarındaki aynı tahkimatlar üzerinde karşı karşıya gelince garnizon içerisinde bir kargaşa yaşandı ve taraflar arasında kısa süreli bir çatışma meydana geldi."
 ryukyu_rivalry.6.d_fire: "[SCOPE.sCountry('ryukyu_scope').GetName] topraklarında yabancı teftiş heyetlerine tahsis edilen misafirhanelerde bir yangın çıktı ve [SCOPE.sCountry('japan_scope').GetAdjective] ve [SCOPE.sCountry('china_scope').GetAdjective] kafilelere ayrılan bölümleri küle çevirdi. Yangının sebebi henüz belirsizliğini korusa da yerel yetkililer, yanlış yerleştirilen fenerlerden kaynaklanmış olabileceğini fısıldaşıyor."
 ryukyu_rivalry.6.f: "Subay Kaimon, muhafızlara talimatlar yağdırarak gözetleme kuleleri ile ambarlar arasında mekik dokuyordu. Birbiri ardına haykırılan emirler, çelişen direktifler ve hızla yinelenen komutlar birbirini izliyordu. Sükûnet sağlandığında Kaimon artık şundan emindi: Yabancı güçlerin birbiriyle çatışan çıkarları, Ryukyu'nun pamuk ipliğine bağlı vaziyetini her an açık edebilirdi."
 ryukyu_rivalry.6.a: "Gerilim yükseliyor."
 ryukyu_rivalry_ryukyu_confrontation_tt1: "[SCOPE.sCountry('japan_scope').GetAdjective] ve [SCOPE.sCountry('china_scope').GetAdjective] [concept_infamy] seviyesi #v 6#! puan arttı."
 ryukyu_rivalry.7.t: "Ryukyu Fermanı"
 ryukyu_rivalry.7.d_ryukyu: "Yıllar süren titiz gözlemler ve incelikli diplomasinin ardından meclisimiz, kendi meselelerini dış müdahale olmaksızın yönetme niyetini beyan etti. Saray; ritüellerini, devlet adamlarını ve geleneksel meclislerinin önceliğini güvence altına almıştır. Krallık artık kendi yolunu tayin etmektedir."
 ryukyu_rivalry.7.d: "Yıllar süren titiz gözlemler ve incelikli diplomasinin ardından [SCOPE.sCountry('ryukyu_scope').GetName], kendisini nüfuzumuzdan sıyırmayı başardı ve kendi meselelerini dış müdahale olmaksızın yönetme niyetini beyan etti. Krallık otoritemize yüz çevirirken saray ise kendi ritüellerini, nazırlarını ve geleneksel meclislerini muhafaza ederek varlığımıza katı sınırlar getirdi."
 ryukyu_rivalry.7.f: "Shuri Kalesi'nin cilalı zeminlerinde, parçalanmış mühürler ve haraç defterleri sağa sola saçılmış halde duruyordu. Kabul salonlarında dış güçlerin nüfuzu hâlâ hissedilse de artık irademize hükmedemiyorlar. Ryukyu'nun yolu, sabırlı diplomasi neticesinde kazanılmış hassas bir tarafsızlıkla şekillenecek."
 ryukyu_rivalry.7.a: "Bağlılık meselesi karara bağlandı."
 ryukyu_rivalry.7.b: "Zor kullanma seçeneği hâlâ masada."
 ryukyu_rivalry.8.t: "Gizli Hanlık"
 ryukyu_rivalry.8.d: "[SCOPE.sCountry('japan_scope').GetName] devletinin limanlarını açmasıyla birlikte [SCOPE.sCountry('ryukyu_scope').GetName] tarafının kime sadakat göstereceğine dair sorular uzun zaman sonra tekrar gün yüzüne çıktı. Krallık, nesiller boyu hassas bir denge politikası yürüttü. Dışarıdan [SCOPE.sCountry('china_scope').GetName] ülkesine haraçlı gibi görünse de aslında gizliden gizliye [SCOPE.sCountry('japan_scope').GetNameNoFormatting] tarafına olan sadakatini muhafaza ediyor. Her iki güç de nüfuzlarını nasıl tahkim edeceklerini artık ciddiyetle ele almak zorunda."
 ryukyu_rivalry.8.f: "Shuri Kalesi'nin koridorlarında parıldayan fenerler, Chūzan krallarının en parlak dönemlerinden miras kalan o yüksek kızıl kirişleri aydınlatıyordu. İşlemeli tavanların altında kâtipler, Çin'den gelen haraç kayıtlarını Satsuma fermanlarının yanına iliştirmekteydi. Saray, öteden beri Orta Krallık'ın bahşettiği meşruiyet beratı ile Kagoshima'nın krallık üzerindeki siyasi vesayeti arasında hassas bir denge siyaseti gözetmişti. Şu an için bir sükûnet dönemi yaşanıyordu lakin bağlılık meselesi yakında tüm ağırlığıyla gündeme oturacaktı."
 ryukyu_rivalry.8.a: "Mesele henüz belirsizliğini koruyor."
