 je_ryukyu_rivalry_sway_merchants_button_desc: "Naha limanını denetim altında tutarak saraya elçiler yerleştirebiliriz; böylece hangi yabancı güçlerin ticarete ve haraca erişim sağlayacağını cezbetme yoluyla belirleyebiliriz."
 ryukyu_rivalry_sway_merchants_button_tt: "[ROOT.GetCountry.GetName], [SCOPE.sCountry('ryukyu_scope').GetAdjective] [Concept('concept_capital_state', 'Baş Vilayetinde')] #v 2.#! seviye veya daha yüksek bir [GetBuildingType('building_port').GetName] binasına sahip"
 je_ryukyu_rivalry_inspect_defenses_button: "Kıyı Savunmalarını Denetle"
 je_ryukyu_rivalry_inspect_defenses_button_desc: "Ordu erişiminin güvence altına alınmasıyla Ryukyu tahkimatlarını tetkik etmek üzere güvenilir bir general gönderebilir; surların ve gözcü kulelerinin denetimsel ve stratejik emellerimize hizmet etmesini temin edebiliriz."
 ryukyu_rivalry_inspect_defenses_button_tt: "[ROOT.GetCountry.GetName], [SCOPE.sCountry('ryukyu_scope').GetName] ile #v Ordu Erişim#! [Concept('concept_treaty', 'Antlaşmasına')] sahip"
 je_ryukyu_rivalry_honor_kikoeogimi_button: "Kikoe-ōgimi'yi Onurlandır"
