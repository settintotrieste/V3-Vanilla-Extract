l_turkish:
 ## Interest Tier Types
 interest_tier_none: "Yok"
 interest_tier_none_desc: "Bu $concept_interest_tier_short$de, bir [concept_country] ilgili [concept_strategic_region] içerisine ya tamamen ya da sadece kısmen müdahildir. Bu durumun $concept_country$ ve $concept_strategic_region$ üzerinde bir etkisi yoktur."
 interest_tier_observant: "Gözlemci"
 interest_tier_observant_desc: "Bu $concept_interest_tier_short$de, [concept_strategic_region] içerisinde diplomatik bir varlık oluşturmak için ilk adımlar atılmıştır. Kıyılarda donanma gemileri devriye geziyor veya [Concept('concept_local_country', '$concept_local_countries$')] birbirine elçi göndermiş olabilir."
 interest_tier_engaged: "Müdahil"
 interest_tier_engaged_desc: "Bu $concept_interest_tier_short$de, bir [concept_country] yerel meselelere karışmaya, [Concept('concept_treaty', 'Antlaşmalar')] imzalamaya ve daha kalıcı bir varlık oluşturmaya başlamıştır."
 interest_tier_influential: "Nüfuzlu"
 interest_tier_influential_desc: "Bu $concept_interest_tier_short$de, bir [concept_strategic_region] içerisinde tam olarak varlık tesis edilmiştir. [Concept('concept_country', 'Ülkeler')] uzun vadeli anlaşmalar yapmakta ve hak iddia etmektedir.\n\n@information! [Concept('concept_capital_state', 'Baş Vilayeti')] bu $concept_strategic_region$ içinde yer alan $concept_countries$, asla bu $concept_interest_tier_short$in altına düşemez."
 interest_tier_pervasive: "Baskın"
 interest_tier_pervasive_desc: "Bu $concept_interest_tier_short$de, bir [concept_country] bir [concept_strategic_region] üzerinde önemli bir kontrol kurmuştur. Güç pekiştirilirken [Concept('concept_great_power', 'Büyük Güçler')] ve [Concept('concept_local_country', 'Yerel Ülke')] güçleri hakimiyet için savaşır."
 interest_tier_hegemonic: "Hegemonik"
 interest_tier_hegemonic_desc: "Bu $concept_interest_tier_short$de, bir [concept_country] kendisini [concept_strategic_region] içerisindeki tartışmasız güç simsarı olarak sağlam bir şekilde kabul ettirmiştir. #italic Var olmaları halinde#!, diğer uluslar kendilerini tabi kılmak veya yerel işlere karışmama garantisini kazanmak için Hegemon ile anlaşmak zorundadır."
 ## Interface
 INTEREST_TIER_TYPE_BOUNDS_DESC: "[InterestTierType.GetLowerBound|v] ile [InterestTierType.GetUpperBound|v] [concept_involvement] arasında geçerlidir"
 INTEREST_TIER_TYPE_NO_EFFECT: "#italic Etki yok#!"
 INTEREST_TIER_ACTIVE: "[Country.GetName][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'YOU'))] #i #b Mevcut Düzeyi#!#!"
 INTEREST_TIER_ACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#! $INTEREST_TIER_ACTIVE$\n$INTEREST_TIER_BOUNDS_DESC$\n[SelectLocalization(EqualTo_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_CURRENT_INVOLVEMENT_DESC', 'INTEREST_TIER_TARGET_INVOLVEMENT_DESC')]\n$TOOLTIP_DELIMITER$\n$INTEREST_TIER_EFFECTS_AND_BREAKDOWN$"
 INTEREST_TIER_INACTIVE_TOOLTIP: "#header [InterestTierType.GetName]#!\n$INTEREST_TIER_BOUNDS_DESC$\n$TOOLTIP_DELIMITER$\n#title Etkiler:#!#indent_newline:3 \n[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)]#!"
 INTEREST_TIER_EFFECTS_AND_BREAKDOWN: "#title Etkiler:#!#indent_newline:3 [ConcatIfNeitherEmpty('\n', InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', AddLocalizationIf(And(And3(StringIsEmpty(InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self)), StringIsEmpty(InterestTierType.GetStateModifier.GetDesc)), StringIsEmpty(InterestTierType.GetTradeAdvantageDesc)), 'INTEREST_TIER_NO_EFFECT'))]#!\n\n#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! [concept_involvement] sebebi:#!#indent_newline:3 \n[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]#!\n $INTEREST_TIER_ACTIVE$: #i #b (Şu Anda Etkin)#!#!"
 INTEREST_TIER_PREDICTED: "#i #b (Öngörülen)#!#!"
 INTEREST_TIER_BOUNDS_DESC: "[InterestTierType.GetLowerBound|v0] ile [InterestTierType.GetUpperBound|v0] [concept_involvement] arasında geçerlidir"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC: "[Country.GetName] için #v [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! [concept_involvement]"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC: "[Country.GetName] için [AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetTargetInvolvementIn(StrategicRegion.Self), Country.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP')][AddLocalizationIf(GreaterThan_CFixedPoint(Country.GetCurrentInvolvementIn(StrategicRegion.Self), Country.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN')] [concept_involvement]"
 INTEREST_TIER_CURRENT_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Güncel durumumuz: [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] #v [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! [concept_involvement]"
 INTEREST_TIER_TARGET_INVOLVEMENT_DESC_PLAYER_CONTEXT: "Güncel durumumuz: [GetPlayer.GetCurrentInterestTierTypeIn(StrategicRegion.Self).GetSmallTextIcon] [AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self), GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT')][AddLocalizationIf(GreaterThan_CFixedPoint(GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self), GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)), 'INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT')] [concept_involvement]"
 INTEREST_TIER_TARGET_UP: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/hafta)"
 INTEREST_TIER_TARGET_DOWN: "#b [Country.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [Country.GetInvolvementGrowth(StrategicRegion.Self)|+0]#!/hafta)"
 INTEREST_TIER_TARGET_UP_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_up_up!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/hafta)"
 INTEREST_TIER_TARGET_DOWN_PLAYER_CONTEXT: "#b [GetPlayer.GetCurrentInvolvementIn(StrategicRegion.Self)|0]#! @arrow_right! #v [GetPlayer.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! (@arrow_down_down!#b [GetPlayer.GetInvolvementGrowth(StrategicRegion.Self)|0]#!/hafta)"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN_TITLE: "#title #v [Country.GetTargetInvolvementIn(StrategicRegion.Self)|0]#! hedef Müdahilliğine dair gerekçeler:#!"
 INTERST_TIER_INVOLVEMENT_BREAKDOWN: "[Country.GetTargetInvolvementDescIn(StrategicRegion.Self)]"
 INTEREST_TIER_EFFECTS_TITLE: "#title Etkiler:#!"
 INTEREST_TIER_EFFECTS: "[ConcatIfNeitherEmpty('\n',InterestTierType.GetOnActivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetOnDeactivateEffectDesc(Country.Self, StrategicRegion.Self))][ConcatIfNeitherEmpty('\n', InterestTierType.GetStateModifier.GetDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetTradeAdvantageDesc)][ConcatIfNeitherEmpty('\n', InterestTierType.GetDescription)]"
 INTEREST_TIER_NO_EFFECT: "#italic Etki yok#!"
 INTEREST_TIER_TRADE_ADVANTAGE_EXPORTS_DESC: "Yerel $concept_markets$daki [Concept('concept_trade', 'İhracat')] faaliyetleri için $VAL|0=+v$ [concept_trade_advantage]"
 INTEREST_TIER_TRADE_ADVANTAGE_IMPORTS_DESC: "Yerel $concept_markets$daki [Concept('concept_trade', 'İthalat')] faaliyetleri için $VAL|0=+v$ [concept_trade_advantage]"
 INTEREST_TIER_ON_ACTIVATE_EFFECT: "#title Kazanıldığında:#!"
 INTEREST_TIER_ON_DEACTIVATE_EFFECT: "#title Kaybedildiğinde:#!"
 STRATEGIC_REGION_AI_STANCE_TT_HEADER: "[Country.GetNameNoFormatting], [StrategicRegion.GetName] bölgesinde şu sebeplerle #b [Country.GetAIStrategicRegionStanceTypeIn(StrategicRegion.Self).GetNameNoFormatting]#! [Concept('concept_strategic_region_stance', '$concept_strategic_region_stance_short$')] takındı:\n$TOOLTIP_DELIMITER$"
 ## Effects
 interest_tier_effect_establish_missions_decree: "@checkmark! [Concept('concept_unincorporated_state','Özerk Vilayetlerde')] [GetDecreeType('decree_establish_missions').GetName] [Concept('concept_decree', 'Hükümünü')] etkinleştirir"
 interest_tier_effect_colonization: "@checkmark! #yellow;tooltip:[GetPlayer.GetTooltipTag],establish_colony_tooltip $establish_colony$#! Bölgesel Eylemini etkinleştirir"
 interest_tier_effect_stake_colonial_claim: "@checkmark! [Concept('concept_decentralized_nation', 'Dağınık Ülkeler')] üzerinde [GetDiplomaticActionType('da_stake_colonial_claim').GetName] [Concept('concept_diplomatic_action', 'Diplomatik Eylemini')] etkinleştirir"
 interest_tier_effect_colonial_claim_generation: "@checkmark! Bir [Concept('concept_state_region', 'Vilayet Bölgesinin')] kolonizasyonu [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_colonial_claim_generation_threshold')|v%0] değerine ulaştığında bir [Concept('concept_claim', 'Hak İddiası')] oluşturur"
 interest_tier_effect_infamy_cost_increase_high: "Bu [Concept('concept_strategic_region', 'Stratejik Bölgedeki')] [Concept('concept_war_goal', 'Savaş Hedeflerine')] yönelik [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_high_value')|=n%0] [concept_infamy] Maliyeti"
 interest_tier_effect_infamy_cost_increase_medium: "Bu [Concept('concept_strategic_region', 'Stratejik Bölgedeki')] [Concept('concept_war_goal', 'Savaş Hedeflerine')] yönelik [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_increase_medium_value')|=n%0] [concept_infamy] Maliyeti"
 interest_tier_effect_infamy_cost_decrease_medium: "Bu [Concept('concept_strategic_region', 'Stratejik Bölgedeki')] [Concept('concept_war_goal', 'Savaş Hedeflerine')] yönelik [GetPlayer.MakeScope.ScriptValue('interest_tier_effect_infamy_cost_decrease_medium_value')|=p%0] [concept_infamy] Maliyeti"
 interest_tier_effect_can_start_diplomatic_plays: "@checkmark! Bu [Concept('concept_strategic_region', 'Stratejik Bölgede')] [Concept('concept_diplomatic_play', 'Diplomatik Hamleler')] başlatmaya izin verir"
 interest_tier_effect_can_join_diplomatic_plays: "@checkmark! Bu [Concept('concept_strategic_region', 'Stratejik Bölgedeki')] [Concept('concept_diplomatic_play', 'Diplomatik Hamlelerde')] taraf tutmaya izin verir"
 interest_tier_effect_can_sign_alliance: "@checkmark! [GetArticleType('alliance').GetName] [Concept('concept_article', 'Antlaşmaları')] imzalamaya izin verir"
 interest_tier_effect_can_sign_defensive_pact: "@checkmark! [GetArticleType('defensive_pact').GetName] [Concept('concept_article', 'Antlaşmaları')] imzalamaya izin verir"
 interest_tier_effect_can_sign_support_independence: "@checkmark! [GetArticleType('support_independence').GetName] [Concept('concept_article', 'Antlaşmaları')] imzalamaya izin verir"
 interest_tier_effect_can_sign_guarantee_independence: "@checkmark! [GetArticleType('guarantee_independence').GetName] [Concept('concept_article', 'Antlaşmaları')] imzalamaya izin verir"
 interest_tier_effect_stake_colonial_claim_unrecognized: "@checkmark! [Concept('concept_decentralized_nation', 'Dağınık Ülkeler')] ve [Concept('concept_unrecognized_power', 'Tanınmayan Güçler')] üzerinde [GetDiplomaticActionType('da_stake_colonial_claim').GetName] [Concept('concept_diplomatic_action', 'Diplomatik Eylemini')] etkinleştirir"
 interest_tier_effect_can_sign_foreign_investment_rights: "@checkmark! [GetArticleType('foreign_investment_rights').GetName] [Concept('concept_article', 'Antlaşmaları')] imzalamaya izin verir"
 ## Diplomatic Actions
 da_stake_colonial_claim: "Koloni İddiasında Bulun"
 da_stake_colonial_claim_desc: "Denizaşırı bir [Concept('concept_state_region', 'Vilayet Bölgesi')] üzerinde [Concept('concept_claim', 'Hak İddiasında')] bulunur."
 da_stake_colonial_claim_action_notification_name: "[INITIATOR_COUNTRY.GetName], [TARGET_STATE.GetStateRegion.GetName] üzerinde koloni [Concept('concept_claim', 'İddiasında')|l] bulunuyor"
 da_stake_colonial_claim_action_notification_desc: "[INITIATOR_COUNTRY.GetName], büyüyen sömürgeci hırslarının bir parçası olarak [TARGET_STATE.GetStateRegion.GetName] üzerinde hak iddia etti!"
 DA_STAKE_COLONIAL_CLAIM_COOLDOWN: "#v [TimeKeeper.GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'da_stake_colonial_claim_cooldown') )]#! tarihine kadar bu eylem tekrar gerçekleştirilemez"
 DA_STAKE_COLONIAL_CLAIM_EMPTY_EFFECT: "[Concept('concept_claim', 'Hak İddiasında Bulunmak')|l] için [Concept('concept_capital_state', 'Baş Vilayetinle')] aynı kıtada olmayan bir [Concept('concept_state_region', 'Vilayet Bölgesi')] seç"
 ## Notifications
 notification_colonial_claim_generated_name: "[SCOPE.sState('colony_notification_state').GetName] bir #bold Büyük Koloni#! haline geldi"
 notification_colonial_claim_generated_desc: "[SCOPE.sState('colony_notification_state').GetName], [SCOPE.sState('colony_notification_state').GetStateRegion.GetName] bölgesinin tamamı üzerinde bize bir [Concept('concept_claim', 'Hak İddiası')] kazandıracak kadar büyüdü."
 notification_colonial_claim_generated_tooltip: "#header $notification_colonial_claim_generated_name$#!\n$TOOLTIP_DELIMITER$\n$notification_colonial_claim_generated_desc$"
