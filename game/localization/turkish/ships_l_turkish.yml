 ship_type_frigate: "Fırkateyn"
 ship_type_frigate_desc: "Keşif, devriye ve refakat görevleri için kullanılan, hafif silahlı bir yelkenli gemi."
 ship_type_iron_frigate: "Demir Fırkateyn"
 ship_type_iron_frigate_desc: "Yelkenli fırkateynin demir gövdeli bir versiyonu olan bu gemi, fırkateynin geleneksel görevleri ile artırılmış dayanıklılık ve ateş gücünü birleştiriyor."
 ship_type_ship_of_the_line: "Hat Gemisi"
 ship_type_ship_of_the_line_desc: "Muharebe hattında kullanılmak üzere tasarlanmış büyük bir savaş gemisi. Hat Gemisi, birden fazla güvertede çok sayıda top taşır."
 ship_type_monitor: "Monitör"
 ship_type_monitor_desc: "Kıyı sularında kullanılmak üzere tasarlanmış, dikkat çekmeyen bir zırhlı gemi."
 ship_type_coastal_defense_ship: "Sahil Savunma Gemisi"
 ship_type_coastal_defense_ship_desc: "Limanlarda ve kıyı sularında kullanılmak üzere tasarlanmış, ağır silahlı ve zırhlı bir gemi."
 ship_type_destroyer: "Destroyer"
 ship_type_destroyer_desc: "Filo ve refakat görevleri için tasarlanmış, hızlı ancak ağır silahlı bir gemi."
 ship_type_aircraft_carrier: "Uçak Gemisi"
 ship_type_aircraft_carrier_desc: "Uçakların kalkabileceği ve inebileceği bir gemi olan Uçak Gemisinin görevleri arasında keşif ve bazı saldırı operasyonları yer alır."
 ship_type_torpedo_boat: "Torpido Botu"
 ship_type_torpedo_boat_desc: "Büyük ve yavaş savaş gemilerine yıkıcı darbeler yapmak için tasarlanmış küçük ve çevik gemiler."
 ship_type_torpedo_boat_destroyer: "Torpido Botu Muhribi"
 ship_type_torpedo_boat_destroyer_desc: "Küçük torpido botlarıyla çatışmak üzere tasarlanmış, kendisi de torpido saldırıları yapabilen bir gemi."
 ship_type_light_cruiser: "Hafif Kruvazör"
 ship_type_light_cruiser_desc: "Uzun menzilli devriye, ticaret koruması ve güç intikali için inşa edilmiş hafif zırhlı kruvazörler."
 ship_type_armored_cruiser: "Zırhlı Kruvazör"
 ship_type_armored_cruiser_desc: "Ağır zırh kemerine sahip, harp gemileri hariç çoğu hedefi vurabilecek kapasitede daha büyük bir kruvazör."
 ship_type_protected_cruiser: "Korumalı Kruvazör"
 ship_type_protected_cruiser_desc: "Hızlı, uzun menzilli ve hayati bileşenlerini koruyan zırhlı bir güverteye sahip kruvazör."
 ship_type_seaplane_tender: "Deniz Uçağı Ana Gemisi"
 ship_type_seaplane_tender_desc: "Keşif ve sınırlı saldırı operasyonlarında deniz uçaklarını taşımak ve kaldırmak için tasarlanmış bir gemi."
 ship_type_early_ironclad: "Erken Dönem Zırhlısı"
 ship_type_early_ironclad_desc: "Okyanus aşırı sefer yapabilen, buharla çalışan ve demir zırhlı güçlü bir gemi."
 ship_type_modern_ironclad: "Modern Zırhlı"
 ship_type_modern_ironclad_desc: "Geleneksel zırhlı fırkateynin gelişmiş bir versiyonu olan modern zırhlı gemi, birçok özelliğe sahiptir"
 ship_type_pre_dreadnought: "Ön Dretnot"
 ship_type_pre_dreadnought_desc: "Ağır toplardan oluşan karma bir bataryaya sahip güçlü harp gemisi."
 ship_type_dreadnought: "Dretnot"
 ship_type_dreadnought_desc: "Tek tip ağır toplardan oluşan bir batarya etrafında inşa edilmiş, devrim niteliğinde bir harp gemisi."
 ship_type_super_dreadnought: "Süper Dretnot"
 ship_type_super_dreadnought_desc: "Daha ağır toplara ve daha kalın zırha sahip büyük bir dretnot."
 ship_type_submarine: "Denizaltı"
 ship_type_submarine_desc: "Düşman ticaret gemilerine karşı kullanılmak üzere tasarlanmış, dalış yapabilen bir gemi."
 ship_type_troop_ship: "Asker Taşıma Gemisi"
 ship_type_troop_ship_desc: "Dünya çapında insan ve malzeme taşımak için özel olarak tasarlanmış bir ikmal gemisi."
 ship_type_supply_ship: "İkmal Gemisi"
 ship_type_supply_ship_desc: "Askeri malların bir noktadan diğerine nakliyesini sağlayan gemi."
 ship_graphics_type_borodino: "Borodino"
 ship_graphics_type_borodino_desc: "Borodino sınıfı ön-dretnotlar, Rus-Japon Savaşı sırasında Rus İmparatorluk Donanması'nın en yeni harp gemileriydi. Amiral Rozhestvensky'nin talihsiz İkinci Pasifik Filosu'nun çekirdeğini oluşturan bu sınıftaki dört gemi, Tsushima Muharebesi'nde batırıldı ya da ele geçirildi."
 ship_graphics_type_mikasa: "Mikasa"
 ship_graphics_type_mikasa_desc: "Rus-Japon Savaşı boyunca Amiral Tōgō'nun amiral gemisi olan ön-dretnot sınıfı harp gemisi Mikasa, savaşın tüm önemli filo çatışmalarında yer aldı ve Japonya'nın denizcilikteki üstünlüğünün kalıcı bir sembolü oldu."
 ship_graphics_type_dingyuan: "Dingyuan"
 ship_graphics_type_dingyuan_desc: "Beiyang Filosu'nun gururu olan zırhlı fırkateyn harp gemileri Dingyuan ve Zhenyuan, Qing Hanedanlığı'nın son dönemindeki askeri modernizasyonun en çarpıcı simgeleriydi. Yalu Nehri Muharebesi'nde cesurca savaşmış olsalar da Çin İmparatorluk Donanması'nın kronik bütçe yetersizliği nedeniyle performansları olumsuz etkilendi."
 ship_group_capital_ships: "Ana Muharebe Gemileri"
 ship_group_capital_ships_desc: "Ana muharebe gemileri, denizde seyreden en büyük ve en güçlü savaş gemileridir ve ana muharebe hattında görev yapmak üzere tasarlanmıştır."
 ship_group_cruisers: "Kruvazörler"
 ship_group_cruisers_desc: "Kruvazörler, uzun menzilli seyir görevleri için tasarlanmış, daha küçük ve daha hafif silahlı gemilerdir."
 ship_group_torpedo_craft: "Torpido Aracı"
 ship_group_torpedo_craft_desc: "Torpido araçları, ana teçhizat olarak kendinden tahrikli bir torpido kullanan küçük ve çevik gemilerdir."
 ship_group_supply_ships: "İkmal Gemileri"
 ship_group_supply_ships_desc: "İkmal gemileri, askeri filo operasyonlarını destekleyen ve ikmal sağlayan sivil ve bu amaca özel olarak inşa edilmiş gemilerdir."
